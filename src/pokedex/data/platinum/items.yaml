adamant_orb:
  names:
    jp_kana: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
  descriptions:
    jp_kana: "ディアルガに　もたせると　ドラゴンと\nはがねタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    en: "A brightly gleaming orb to be held by\nDIALGA. It boosts the power of Dragon-\nand Steel-type moves."
    fr: "Orbe très brillant destiné à DIALGA.\nAugmente la puissance des capacités de\ntype Dragon ou Acier."
    it: "Sfera molto luminosa da far tenere\na DIALGA. Potenzia le mosse\ndi tipo Drago e Acciaio."
    de: "Ein hell leuchtender Orb.\nVerstärkt Attacken vom Typ Drachen\nund Stahl, wenn DIALGA ihn trägt."
    es: "Una esfera brillante que potencia los\nataques de tipo Acero y Dragón. Debe\nllevarla DIALGA."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
aguav_berry:
  names:
    jp_kana: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nピンチのとき　ＨＰを　かいふくするが\nこんらん　することも　ある。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores the user’s HP in\na pinch, but may also cause confusion."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie restaure les PV en cas de besoin,\nmais elle peut rendre confus."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon in difficoltà, restituisce PS,\nma può causare confusione."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere die KP eines Pokémon\nauf, bewirkt aber eventuell Verwirrung."
    es: "Ingrediente para Pokochos. Restaura\nlos PS del Pokémon que la usa en\nun apuro, pero puede causar confusión."
    ko: "포핀의 재료. 지니게 하면\n위급할 때 HP를 회복하지만\n혼란에 빠질 수도 있다."
air_mail:
  names:
    jp_kana: エアメール
    en: Air Mail
    fr: Lettre Avion
    it: Mess. Aereo
    de: Luftbrief
    es: Carta Aérea
    ko: 에어메일
  descriptions:
    jp_kana: "カラフルな　びんせんの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of\ncolorful letter sets.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de lignes\ncolorées.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo\ncolorato sui bordi. Un Pokémon\npuò tenerla e consegnarla."
    de: "Das Briefpapier hat bunte\nStreifen als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con el diseño tradicional del\ncorreo aéreo. Haz que la entregue\nun Pokémon."
    ko: "컬러풀한 편지지 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
amulet_coin:
  names:
    jp_kana: おまもりこばん
    en: Amulet Coin
    fr: Pièce Rune
    it: Monetamuleto
    de: Münzamulett
    es: Mon. Amuleto
    ko: 부적금화
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles a battle’s prize money if\nthe holding Pokémon joins in."
    fr: "Objet à tenir. Double l’argent gagné si\nle porteur se joint au combat."
    it: "Strumento da far tenere a un Pokémon.\nRaddoppia i guadagni nella lotta se\nchi lo tiene vi partecipa."
    de: "Ein Item, das ein Pokémon trägt und\ndas doppeltes Preisgeld bringt, wenn\nder Träger am Kampf teilnimmt."
    es: "Si el Pokémon que la lleva lucha en\nun combate, duplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
antidote:
  names:
    jp_kana: どくけし
    en: Antidote
    fr: Antidote
    it: Antidoto
    de: Gegengift
    es: Antídoto
    ko: 해독제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　どくの\nじょうたいを　かいふくする。"
    en: "A spray-type medicine.\nIt lifts the effect of poison from one\nPokémon."
    fr: "Un médicament sous forme de spray.\nGuérit un Pokémon empoisonné."
    it: "Rimedio spray.\nCura un Pokémon dall’avvelenamento."
    de: "Ein Spray, das Vergiftungen\neines Pokémon heilt."
    es: "Medicina en spray que contrarresta los\nefectos del veneno en un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n독 상태를 회복한다."
apicot_berry:
  names:
    jp_kana: ズアのみ
    en: Apicot Berry
    fr: Baie Abriko
    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nじぶんの　とくぼうが　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\nSp. Def stat in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte la Déf. Spé. si\nnécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nla Difesa Speciale se il Pokémon\nche la tiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere in einer Notlage die\nSpezial-Verteidigung eines Pokémon."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, le subirá la\nDef. Esp. en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n자신의 특수방어가 올라간다."
armor_fossil:
  names:
    jp_kana: たてのカセキ
    en: Armor Fossil
    fr: Foss. Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nえりかざりの　いちぶ　らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat lived on the land. It appears to\nbe part of a collar."
    fr: "Fossile d’un Pokémon préhistorique\nterrestre. On dirait une partie d’un\ncollier."
    it: "Fossile di un Pokémon preistorico\nche viveva sulla terra. Sembra\nessere parte di un collare."
    de: "Ein Fossil eines antiken\nPokémon, das an Land lebte.\nEs sieht wie ein Schlüsselbein aus."
    es: "Fósil de un Pokémon prehistórico\nterrestre. Parece ser un fragmento\ndel cuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
aspear_berry:
  names:
    jp_kana: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nこおりを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to defrost it."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie dégèle\nles Pokémon."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò guarire dal congelamento."
    de: "Eine Knursp-Zutat. Als Item bewirkt\ndie Beere die Selbstheilung eines\nPokémon von Frost."
    es: "Ingrediente para Pokochos. Los\nPokémon pueden llevarla o usarla\npara descongelarse."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n얼음을 회복한다."
awakening:
  names:
    jp_kana: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    en: "A spray-type medicine.\nIt awakens a Pokémon from the\nclutches of sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: "Rimedio spray.\nSveglia un Pokémon addormentato."
    de: "Ein Spray, das ein schlafendes\nPokémon aufweckt."
    es: "Medicina en spray que libera a un\nPokémon de las garras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
azure_flute:
  names:
    jp_kana: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto Cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
  descriptions:
    jp_kana: "このよの　ものとは　おもえない\nねいろが　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds\nthat do not seem to be of this world.\nIt is unknown who made it."
    fr: "Flûte produisant des sons qui semblent\nprovenir d’un autre monde. On ne sait\npas qui l’a fabriquée."
    it: "Flauto che emette una melodia\nche sembra appartenere ad un altro\nmondo. Non si sa chi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von\ndieser Welt zu sein scheinen.\nIhr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este\nmundo. Es de fabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
babiri_berry:
  names:
    jp_kana: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　はがね　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Steel-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Acier."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Acciaio del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Stahl. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Acero."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 강철 기술을\n당했을 때 위력이 약해진다."
belue_berry:
  names:
    jp_kana: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nベリブが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nBelue Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Myrtilbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Andano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n루베가 자란다."
berry_juice:
  names:
    jp_kana: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succodibacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    en: "A 100% pure juice made of Berries.\nIt restores the HP of one Pokémon by\njust 20 points."
    fr: "Une boisson 100% pur jus de Baies.\nRestaure 20 PV à un Pokémon."
    it: "Bevanda a base di puro succo\ndi Bacche. Restituisce 20 PS\nad un Pokémon."
    de: "100%iger Fruchtsaft, aus Beeren\ngekeltert. Er stellt 20 KP eines\nPokémon wieder her."
    es: "Zumo de bayas 100% natural que\nrestaura 20 PS de un Pokémon."
    ko: "나무열매 100% 쥬스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande Fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
  descriptions:
    jp_kana: "おおきな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nとても　にんきが　たかい。"
    en: "A large and rare mushroom.\nIt is very popular among certain\nmaniacal fan segments."
    fr: "Un grand champignon plutôt rare.\nIl est très populaire parmi\ncertains fans dévoués."
    it: "Fungo grande e raro. È molto\napprezzato da alcuni gruppi\ndi intenditori fanatici."
    de: "Ein großer und seltener Pilz. Liebhaber\ndieses Pilzes freuen sich ein Loch in\nden Bauch, wenn sie einen finden."
    es: "Seta grande y poco común muy\npopular entre determinados grupos\nde gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande Perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nかなり　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    en: "A quite-large pearl that sparkles in a\npretty silver color. It can be sold at\na high price to shops."
    fr: "Une grande perle qui brille d’une jolie\ncouleur argent. Peut être vendue à\nbon prix aux magasins."
    it: "Perla piuttosto grande dai graziosi\nriflessi argentei. Si può vendere\na caro prezzo ai negozi."
    de: "Eine relativ große Perle, die in\nschönem Silber funkelt. Sie ist von\nhohem Wert."
    es: "Brillante perla plateada de gran\ntamaño que puede venderse\na buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
big_root:
  names:
    jp_kana: おおきなねっこ
    en: Big Root
    fr: Grosseracine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
  descriptions:
    jp_kana: "もたせると　ＨＰを　すいとる　わざで\nいつもより　おおく　じぶんの　ＨＰを\nかいふくできる。"
    en: "A Pokémon hold item that boosts the\npower of HP-stealing moves to let the\nholder recover more HP."
    fr: "Objet à tenir augmentant la puissance\ndes attaques volant des PV."
    it: "Strumento da far tenere a un Pokémon.\nPotenzia le mosse ruba-PS facendo\nrecuperare PS a chi lo usa."
    de: "Ein Item zum Tragen.\nVerstärkt KP-stehlende Attacken."
    es: "Potencia los movimientos que roban\nPS. Debe llevarla un Pokémon."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
bike:
  names:
    jp_kana: じてんしゃ
    en: Bicycle
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    en: "A folding Bicycle that enables much\nfaster movement than the Running\nShoes."
    fr: "Une Bicyclette pliable permettant de se\ndéplacer plus rapidement qu’avec les\nChaussures de Sport."
    it: "Bici pieghevole, che permette di\nspostarsi più velocemente che\ncon le Scarpe da Corsa."
    de: "Ein Klapprad, mit dem man schneller\nals mit Turbotretern ist."
    es: "Bicicleta plegable con la que se va más\nrápido que con deportivas."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
black_belt:
  names:
    jp_kana: くろおび
    en: Black Belt
    fr: Ceint.Noire
    it: Cinturanera
    de: Schwarzgurt
    es: Cint. Negro
    ko: 검은띠
  descriptions:
    jp_kana: "きが　ひきしまる　おび。\nもたせると　かくとうタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a belt that boosts determination\nand Fighting-type moves."
    fr: "Objet à tenir. Ceinture qui augmente la\ndétermination et la puissance des\ncapacités de type Combat."
    it: "Strumento da far tenere a un Pokémon.\nCintura che potenzia la determinazione\ne le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Der Gürtel\nverstärkt die Entschlossenheit\nund Attacken vom Typ Kampf."
    es: "Debe llevarlo un Pokémon. Aumenta la\ndecisión y fortalece los ataques de\ntipo Lucha."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
black_flute:
  names:
    jp_kana: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto Nero
    de: Schw. Flöte
    es: Flauta Negra
    ko: 검정비드로
  descriptions:
    jp_kana: "ガラスせいの　くろい　ふえ。\nふくと　やせいの　ポケモンが\nでて　きにくくなる。"
    en: "A black flute made from blown glass.\nIts melody makes wild Pokémon less\nlikely to appear."
    fr: "Une flûte en verre soufflé noir dont\nles notes aident à repousser les\nPokémon sauvages."
    it: "Flauto nero di vetro soffiato. Con la\nsua melodia rende meno probabili\ngli incontri con i Pokémon selvatici."
    de: "Eine schwarze, gläserne Flöte, die\nwilde Pokémon vom Angriff\nabhalten kann."
    es: "Flauta de cristal negro cuya melodía\nayuda a reducir las probabilidades de\nencontrarse con Pokémon salvajes."
    ko: "유리로 만든 검은 피리.\n불면 야생 포켓몬이\n나타날 확률이 낮아진다."
black_glasses:
  names:
    jp_kana: くろいメガネ
    en: BlackGlasses
    fr: Lunet.Noires
    it: Occhialineri
    de: Schattenglas
    es: Gafas de Sol
    ko: 검은안경
  descriptions:
    jp_kana: "あやしく　みえる　メガネ。\nもたせると　あくタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a shady-looking pair of glasses\nthat boosts Dark-type moves."
    fr: "Objet à tenir. Paire de lunettes à\nl’aspect louche qui monte la puissance\ndes capacités de type Ténèbres."
    it: "Strumento da far tenere a un Pokémon.\nInquietante paio di occhiali che\npotenzia le mosse di tipo Buio."
    de: "Ein Item zum Tragen. Eine\ndunkle Brille, die Attacken\nvom Typ Unlicht verstärkt."
    es: "Debe llevarlas un Pokémon. Fortalecen\nlos ataques de tipo Siniestro."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
black_sludge:
  names:
    jp_kana: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은진흙
  descriptions:
    jp_kana: "もたせると　どくタイプの　ポケモンは\nすこしずつ　ＨＰを　かいふくする。\nそれいがいは　ＨＰが　へってしまう。"
    en: "A hold item that gradually restores\nthe HP of Poison-type Pokémon.\nIt inflicts damage on all other types."
    fr: "Objet à tenir restaurant peu à peu les\nPV des Pokémon de type Poison. Inflige\ndes dégâts à tous les autres types."
    it: "Strumento da far tenere a un Pokémon:\nridà gradualmente PS ai Pokémon di\ntipo Veleno. Danneggia tutti gli altri."
    de: "Ein Item zum Tragen, das einem\nGift-Pokémon KP zurückgibt, anderen\nPokémon aber Schaden zufügt."
    es: "Restaura gradualmente los PS de los\nPokémon de tipo Veneno y daña a\ntodos los demás."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
bloom_mail:
  names:
    jp_kana: ブルームメール
    en: Bloom Mail
    fr: Lett. Pétale
    it: Mess. Petalo
    de: Blütenbrief
    es: Carta Flores
    ko: 블룸메일
  descriptions:
    jp_kana: "きれいな　はなびら　もようが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of pretty\nfloral patterns.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de ravissants\nmotifs floraux. \nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un bel motivo\nfloreale. Un Pokémon può tenerla\ne consegnarla."
    de: "Das Briefpapier hat hübsche\nBlumen als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con un bonito estampado floral.\nHaz que la entregue un Pokémon."
    ko: "아름다운 꽃잎 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
blue_flute:
  names:
    jp_kana: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto Blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
  descriptions:
    jp_kana: "ガラスせいの　あおい　ふえ。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    en: "A blue flute made from blown glass.\nIts melody awakens a single Pokémon\nfrom sleep."
    fr: "Une flûte en verre soufflé bleu dont\nles notes réveillent un Pokémon\nendormi."
    it: "Flauto blu di vetro soffiato.\nCon la sua melodia sveglia\nun Pokémon addormentato."
    de: "Eine blaue, gläserne Flöte, die\nein schlafendes Pokémon weckt."
    es: "Flauta de cristal azul cuya melodía\ndespierta a los Pokémon dormidos."
    ko: "유리로 만든 파란 피리.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    en: Blue Scarf
    fr: Foul. Bleu
    it: Fascia Blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the “Beauty” aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la “Beauté”\ndans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Bellezza” di\nchi lo tiene in una Gara."
    de: "Ein Item zum Tragen. Es verstärkt\ndie “Schönheit” eines Pokémon\nin einem Wettbewerb."
    es: "Debe llevarlo un Pokémon. Aumenta\nla belleza en los concursos."
    ko: "지니게 하고 콘테스트에 참가시키면\n그 포켓몬은 여느 때보다\n아름답게 보인다."
blue_shard:
  names:
    jp_kana: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio Blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
  descriptions:
    jp_kana: "あおい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    en: "A small blue shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson bleu.\nIl semble provenir d’un outil très\nancien."
    it: "Piccolo coccio blu.\nProbabilmente faceva parte di uno\nstrumento creato in tempi passati."
    de: "Eine blaue Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Parece formar parte de algún tipo\nde herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
bluk_berry:
  names:
    jp_kana: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nブリーが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nBluk Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Morbbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Oram."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n블리가 자란다."
brick_mail:
  names:
    jp_kana: ブリックメール
    en: Brick Mail
    fr: Lettre Brik
    it: Mess. Muro
    de: Ziegelbrief
    es: Carta Pared
    ko: 브릭메일
  descriptions:
    jp_kana: "かたそうな　レンガの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a\ntough-looking brick pattern.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de briques\nqui ont vraiment l’air solides.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nricorda un massiccio muro in mattoni.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat massive\nZiegelsteine als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con la imagen de una pared de\nladrillos. Haz que la entregue un\nPokémon."
    ko: "단단해 보이는 벽돌 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bright_powder:
  names:
    jp_kana: ひかりのこな
    en: BrightPowder
    fr: Poudreclaire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
  descriptions:
    jp_kana: "キラキラ　ひかるこな。　もたせると\nひかりが　あいてを　まどわして\nわざが　めいちゅう　しにくくなる。"
    en: "An item to be held by a Pokémon.\nIt casts a tricky glare that lowers\nthe opponent’s accuracy."
    fr: "Objet à tenir qui intimide et baisse\nla précision de l’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nLancia un bagliore insidioso che riduce\nla precisione dell’avversario."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nsenkt die Genauigkeit des Gegners."
    es: "Lanza un destello que baja la precisión\ndel enemigo. Debe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
bubble_mail:
  names:
    jp_kana: ブルーメール
    en: Bubble Mail
    fr: Lettre Mer
    it: Mess. Bolla
    de: Wasserbrief
    es: Carta Pompas
    ko: 블루메일
  descriptions:
    jp_kana: "あおい　みずの　せかいが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a blue\nworld underwater.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres représentant le\nbleu du monde sous-marin. \nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nricorda un paesaggio sottomarino. Un\nPokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine\nUnterwasserwelt als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con una imagen de burbujas.\nHaz que la entregue un Pokémon."
    ko: "파란 물의 세계가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
burn_heal:
  names:
    jp_kana: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottat.
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　やけどの\nじょうたいを　かいふくする。"
    en: "A spray-type medicine.\nIt heals a single Pokémon that is\nsuffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: "Rimedio spray.\nCura un Pokémon da una scottatura."
    de: "Ein Spray, das Verbrennungen\neines Pokémon heilt."
    es: "Medicina en spray que cura las\nquemaduras a un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
calcium:
  names:
    jp_kana: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくこうの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Sp. Atk (Special\nAttack) stat of a single Pokémon."
    fr: "Une boisson très nutritive qui monte\nl’Atq. Spé. (Attaque Spéciale) d’un\nPokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta l’Att. Sp. (Attacco Speciale)\ndi un Pokémon."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Angriff eines Pokémon\ndauerhaft hebt."
    es: "Nutritiva bebida que sube el\nAt. Esp. de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
carbos:
  names:
    jp_kana: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　すばやさの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Speed stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte la\nVitesse d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Velocità di un Pokémon."
    de: "Ein gehaltvolles Getränk, das den\nInitiative-Wert eines Pokémon\ndauerhaft hebt."
    es: "Nutritiva bebida que sube la\nVelocidad de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
charcoal:
  names:
    jp_kana: もくたん
    en: Charcoal
    fr: Charbon
    it: Carbonella
    de: Holzkohle
    es: Carbón
    ko: 목탄
  descriptions:
    jp_kana: "ものを　もやす　ねんりょう。\nもたせると　ほのおタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a combustible fuel that boosts\nthe power of Fire-type moves."
    fr: "Objet à tenir. Combustible montant la\npuissance des capacités de type Feu."
    it: "Strumento da far tenere a un Pokémon.\nSostanza combustibile che potenzia\nle mosse di tipo Fuoco."
    de: "Ein Item zum Tragen. Ein Heizmittel,\ndas Attacken vom Typ Feuer verstärkt."
    es: "Actúa como combustible y potencia\nla energía de los ataques de tipo\nFuego. Debe llevarlo un Pokémon."
    ko: "물건을 태우는 연료.\n지니게 하면 불꽃타입\n기술의 위력이 올라간다."
charti_berry:
  names:
    jp_kana: ヨロギのみ
    en: Charti Berry
    fr: Baie Charti
    it: Baccaciofo
    de: Chiaribeere
    es: Baya Alcho
    ko: 루미열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　いわ　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Rock-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Roche."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Roccia del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Gestein. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Roca."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 바위 기술을\n당했을 때 위력이 약해진다."
cheri_berry:
  names:
    jp_kana: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nまひを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\nparalysis."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie soigne\nla paralysie."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò guarire dalla paralisi."
    de: "Eine Knursp-Zutat. Als Item bewirkt\ndie Beere die Selbstheilung eines\nPokémon von Paralyse."
    es: "Ingrediente para Pokochos. Los\nPokémon pueden llevarla o usarla para\nrecuperarse de la parálisis."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n마비를 회복한다."
cherish_ball:
  names:
    jp_kana: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nかなり　めずらしい　ボール。"
    en: "A quite rare Poké Ball that has been\nspecially crafted to commemorate\nan occasion of some sort."
    fr: "Une Poké Ball plutôt rare qui fut créée\npour une occasion spéciale."
    it: "Poké Ball rara che è stata creata\nper commemorare un evento\nspeciale."
    de: "Ein seltener Ball, der als\nReminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball muy particular que\nse creó para conmemorar algún\nacontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
chesto_berry:
  names:
    jp_kana: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nねむりを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\nsleep."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie réveille\nles Pokémon endormis."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò risvegliare dal sonno."
    de: "Eine Knursp-Zutat. Als Item\nweckt die Beere ein schlafendes\nPokémon."
    es: "Ingrediente para Pokochos. Los\nPokémon pueden llevarla o usarla para\ndespertar del sueño."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n잠듦을 회복한다."
chilan_berry:
  names:
    jp_kana: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　\nもたせると　ノーマル　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nNormal-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Normal."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco di tipo\nNormale del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Normal. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita el ataque\nde tipo Normal de un enemigo."
    ko: "포핀의 재료. \n지니게 하면 노말 기술을\n당했을 때 위력이 약해진다."
choice_band:
  names:
    jp_kana: こだわりハチマキ
    en: Choice Band
    fr: Band. Choix
    it: Bendascelta
    de: Wahlband
    es: Cin. Elegida
    ko: 구애머리띠
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\nもたせると　こうげきは　あがるが\nおなじ　わざしか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis headband ups Attack, but allows\nthe use of only one kind of move."
    fr: "Objet à tenir. Ce bandeau monte\nl’Attaque, mais ne permet d’utiliser\nqu’une sorte de capacité."
    it: "Strumento da far tenere a un Pokémon.\nQuesta benda aumenta l’Attacco, ma\npermette l’uso di una sola mossa."
    de: "Ein Item, das ein Pokémon tragen\nkann. Es stärkt den Angriffs-Wert. \nAber nur eine Attacke ist einsetzbar."
    es: "Aumenta el Ataque pero solo permite\nusar un tipo de movimiento. Debe\nllevarla un Pokémon."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n똑같은 기술밖에 쓰지 못한다."
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    en: Choice Scarf
    fr: Mouch. Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañ. Elegido
    ko: 구애스카프
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\nもたせると　すばやさは　あがるが\nおなじ　わざしか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis scarf boosts Speed, but allows\nthe use of only one kind of move."
    fr: "Objet à tenir augmentant la Vitesse,\nmais ne permettant l’utilisation que\nd’une sorte de capacité."
    it: "Strumento da far tenere a un Pokémon.\nStola che aumenta la Velocità, ma\nconsente l’uso di una sola mossa."
    de: "Ein Item zum Tragen.\nDer Schal erhöht den Initiative-Wert,\nerlaubt aber nur eine Attackenart."
    es: "Debe llevarlo un Pokémon. Potencia\nla Velocidad, pero solo permite usar\nun tipo de movimiento."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
choice_specs:
  names:
    jp_kana: こだわりメガネ
    en: Choice Specs
    fr: Lunet. Choix
    it: Lentiscelta
    de: Wahlglas
    es: Gafas Elegid
    ko: 구애안경
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\nもたせると　とくこうは　あがるが\nおなじ　わざしか　だせなくなる。"
    en: "An item to be held by a Pokémon. These\ndistinctive glasses boost Sp. Atk, but\nallow only one kind of move to be used."
    fr: "Objet à tenir augmentant l’Atq. Spé.,\nmais ne permettant d’utiliser qu’une\nsorte de capacité."
    it: "Strumento da far tenere a un Pokémon.\nQuesti occhiali aumentano l’Att. Sp.,\nma permettono solo un tipo di mossa."
    de: "Ein Item zum Tragen.\nDie Brille erhöht den Spezial-Angriff,\nerlaubt aber nur eine Attackenart."
    es: "Potencian el At. Esp. pero solo\npermiten usar un tipo de movimiento.\nDebe llevarlas un Pokémon."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
chople_berry:
  names:
    jp_kana: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　かくとう　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Fighting-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Combat."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Lotta del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Kampf. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Lucha."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 격투 기술을\n당했을 때 위력이 약해진다."
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    en: Claw Fossil
    fr: Foss. Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nツメの　いちぶ　らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a claw."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un antico Pokémon che\nviveva in mare. Sembra essere\nparte di un’unghia."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie eine Klaue aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece\nser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purif.
    it: Velopuro
    de: Schutzband
    es: Amuleto
    ko: 순결의부적
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if the\nholder is the first one in the party."
    fr: "Objet à tenir. Aide à repousser les\nPokémon sauvages si le porteur est le\npremier Pokémon de l’équipe."
    it: "Strumento da far tenere a un Pokémon.\nAiuta ad allontanare i Pokémon selvatici\nse chi lo tiene è il primo della squadra."
    de: "Ein Item zum Tragen. Reduziert\nBegegnungen mit wilden Pokémon, wenn\nder Träger an erster Stelle steht."
    es: "Si lo lleva el primer Pokémon del\nequipo, se reduce la probabilidad de\nque se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
coba_berry:
  names:
    jp_kana: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　ひこう　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Flying-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Vol."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Volante del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Flug. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Volador."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 비행 기술을\n당했을 때 위력이 약해진다."
coin_case:
  names:
    jp_kana: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００まい　まで\nいれることが　できる　ケース。"
    en: "A case for holding Coins obtained at\nthe Game Corner.\nIt holds up to 50,000 Coins."
    fr: "Une boîte pour conserver les Jetons\nobtenus au Casino.\nPeut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò\nche può contenere fino a 50000\nGettoni."
    de: "Im Korb finden bis zu 50 000 Münzen\nder Spielhalle Platz."
    es: "Puedes obtenerlo en el Casino. Tiene\ncapacidad para 50000 fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
colbur_berry:
  names:
    jp_kana: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　あく　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Dark-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Ténèbres."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Buio del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Unlicht. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Siniestro."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 악 기술을\n당했을 때 위력이 약해진다."
contest_pass:
  names:
    jp_kana: コンテストパス
    en: Contest Pass
    fr: Passeconcour
    it: Tessera Gare
    de: Wettb.-Karte
    es: Pase Concur.
    ko: 콘테스트패스
  descriptions:
    jp_kana: "もっていれば　ポケモンコンテストに\nさんか　することが　できる。\nきねんリボンが　かかれている。"
    en: "The pass required for entering Pokémon\nContests. It has a drawing of an award\nribbon on it."
    fr: "La carte requise pour participer aux\nConcours Pokémon. Il y a un ruban\ndessiné dessus."
    it: "Tessera necessaria per partecipare\nalle Gare Pokémon. Riporta un\ndisegno di un fiocco."
    de: "Ausweis zur Teilnahme an Pokémon-\nWettbewerben. Die Zeichnung\neines Bandes ist aufgedruckt."
    es: "Es necesario para participar en\nConcursos Pokémon. Tiene una\ncinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념 리본이 그려져 있다."
cornn_berry:
  names:
    jp_kana: モコシのみ
    en: Cornn Berry
    fr: Baie Siam
    it: Baccavena
    de: Saimbeere
    es: Baya Mais
    ko: 수숙열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nモコシが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nCornn Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Saimbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Mais."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n수숙이 자란다."
coupon_1:
  names:
    jp_kana: ひきかえけん１
    en: Coupon 1
    fr: Bon 1
    it: Coupon 1
    de: Kupon 1
    es: Cupón 1
    ko: 교환권1
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un\nPokéKron. Ne servono 3."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_2:
  names:
    jp_kana: ひきかえけん２
    en: Coupon 2
    fr: Bon 2
    it: Coupon 2
    de: Kupon 2
    es: Cupón 2
    ko: 교환권2
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un\nPokéKron. Ne servono 3."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_3:
  names:
    jp_kana: ひきかえけん３
    en: Coupon 3
    fr: Bon 3
    it: Coupon 3
    de: Kupon 3
    es: Cupón 3
    ko: 교환권3
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    en: "A coupon to be exchanged for a\nPokémon Watch (Pokétch for short).\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre\nune Pokémontre."
    it: "Coupon da scambiare con un\nPokéKron. Ne servono 3."
    de: "Einer der drei Kupons, die du\nfür den Pokétch benötigst."
    es: "Uno de los tres cupones que sirve\npara obtener un Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
custap_berry:
  names:
    jp_kana: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき　いちどだけ\nこうどうが　はやくなる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it gets to move first just\nonce in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie permet d’attaquer\nen premier une fois si nécessaire."
    it: "Si usa per fare i Poffin. In difficoltà,\nil Pokémon che la tiene può fare la\nsua mossa per primo (solo una volta)."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nermöglicht die Beere dem Träger in\neiner Notlage einen Erstschlag."
    es: "El Pokémon que la lleve podrá actuar\nen primer lugar una vez cuando se\nencuentre en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때 한 번만\n행동이 빨라진다."
damp_mulch:
  names:
    jp_kana: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
  descriptions:
    jp_kana: "ふかふかのつちに　まいて　つかう。\nつちの　かわきが　おそくなるが\nきのみの　そだちも　おそくなる。"
    en: "A plant fertilizer spread on soft soil.\nIt slows the growth of Berries and\ncauses the soil to dry slower."
    fr: "Un engrais utilisé sur sol meuble.\nLes Baies poussent plus lentement, mais\nle sol s’assèche moins vite."
    it: "Fertilizzante da usare sul terreno\nsoffice. Le Bacche crescono piano,\nma il terreno rimane umido più a lungo."
    de: "Ein Dünger für weichen Boden.\nDie Beeren wachsen langsamer,\naber die Erde bleibt feuchter."
    es: "Fertilizante para tierra suelta que\nralentiza el crecimiento de las\nbayas y seca el suelo lentamente."
    ko: "푹신푹신한 땅에 뿌려 쓴다.\n땅의 건조가 늦어지지만\n나무열매의 성장도 늦어진다."
damp_rock:
  names:
    jp_kana: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あまごいを\nつかうと　いつもより　あめの\nじかんが　ながくなる。"
    en: "A Pokémon hold item that extends the\nduration of the move Rain Dance used\nby the holder."
    fr: "Objet à tenir augmentant la durée de\nla capacité Danse Pluie utilisée par le\nporteur."
    it: "Strumento da far tenere a un\nPokémon che allunga la durata\ndella mossa Pioggiadanza."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von Regentanz."
    es: "Prolonga la duración del movimiento\nDanza Lluvia que use el Pokémon\nque la lleva."
    ko: "지니게 한 포켓몬이 비바라기를\n쓰면 여느 때보다 비내리는\n시간이 길어진다."
dawn_stone:
  names:
    jp_kana: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひとみのように　まばゆい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt sparkles like eyes."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle brille comme un œil."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ luccicante come gli occhi."
    de: "Dieser besondere, glitzernde Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nBrilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    en: DeepSeaScale
    fr: Ecailleocéan
    it: Squamabissi
    de: Abyssplatte
    es: Escama Mar.
    ko: 심해의비늘
  descriptions:
    jp_kana: "パールルに　もたせると\nとくぼうが　あがる　ウロコ。\nうすい　ピンクいろに　ひかる。"
    en: "An item to be held by CLAMPERL.\nA scale that shines a faint pink, it\nraises the Sp. Def stat."
    fr: "Objet à faire tenir à COQUIPERL. Ecaille\nde couleur rose montant sa Déf. Spé."
    it: "Strumento da far tenere a CLAMPERL.\nSquama dai bagliori rosei che\naumenta la Difesa Speciale."
    de: "Ein Item, das von PERLU getragen\nwerden kann. Es schimmert pink\nund hebt die Spezial-Verteidigung."
    es: "Tiene un débil brillo rosado y debe\nllevarla CLAMPERL. Sube la Def. Esp."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    en: DeepSeaTooth
    fr: Dent Océan
    it: Dente Abissi
    de: Abysszahn
    es: Diente Mar.
    ko: 심해의이빨
  descriptions:
    jp_kana: "パールルに　もたせると\nとくこうが　あがる　キバ。\nするどく　ぎんいろに　ひかる。"
    en: "An item to be held by CLAMPERL.\nA fang that gleams a sharp silver, it\nraises the Sp. Atk stat."
    fr: "Objet à faire tenir à COQUIPERL. Dent\nde couleur argent montant son\nAtq. Spé."
    it: "Strumento da far tenere a CLAMPERL.\nDente dai bagliori argentei che\naumenta l’Attacco Speciale."
    de: "Ein Item, das von PERLU getragen\nwerden kann. Es schimmert silbern\nund hebt den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata y debe\nllevarlo CLAMPERL. Sube el At. Esp."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카로운 은색으로 빛난다."
destiny_knot:
  names:
    jp_kana: あかいいと
    en: Destiny Knot
    fr: Noeud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
  descriptions:
    jp_kana: "ほそくて　ながい　まっかな　いと。\nもたせると　メロメロに　なったとき\nあいても　メロメロに　できる。"
    en: "A long, thin, bright red string to\nbe held by a Pokémon. If the holder\nbecomes infatuated, the foe does too."
    fr: "Un long fil rouge vif à faire tenir à un\nPokémon. Si le porteur succombe à\nl’attirance, l’ennemi aussi."
    it: "Gomitolo di filo rosso sottile da dare\na un Pokémon. Se il Pokémon rimane\ninfatuato, contagia anche il nemico."
    de: "Ein Item zum Tragen.\nWird der Träger vernarrt, gilt\ndies auch für den Gegner."
    es: "Un hilo largo y delgado de color rojo\nque transmite el enamoramiento del\nPokémon que lo lleva a su rival."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
dire_hit:
  names:
    jp_kana: クリティカッター
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Angriffplus
    es: Directo
    ko: 크리티컬커터
  descriptions:
    jp_kana: "せんとうちゅう　きゅうしょに\nあたりやすくなる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the critical-hit\nratio of a Pokémon in battle. It wears\noff if the Pokémon is withdrawn."
    fr: "Monte le taux de critiques pendant\nun combat. L’effet s’estompe si le\nPokémon se retire."
    it: "Brutti colpi più probabili per un Pokémon\nimpegnato in una lotta. L’effetto\nsvanisce se il Pokémon è sostituito."
    de: "Hebt die Volltrefferquote des PKMN\nim Kampf. Die Wirkung wird mit\ndem Tausch des Pokémon beendet."
    es: "Aumenta el índice de golpe crítico\nen combate. Al cambiar de\nPokémon, el efecto desaparece."
    ko: "배틀 중 급소에 맞기 쉬워지는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
dive_ball:
  names:
    jp_kana: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
  descriptions:
    jp_kana: "みずの　せかいで　くらしている\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Pokémon that\nlive in the sea."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nPokémon sous-marins."
    it: "Poké Ball un po’ diversa,\nparticolarmente efficace sui\nPokémon che vivono in mare."
    de: "Ein Ball, mit dem sich Pokémon,\ndie auf dem Meeresgrund leben,\nbesser fangen lassen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nque viven en el mar."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nこうらの　いちぶ　らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a shell."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon antico che\nviveva in mare. Sembra essere\nparte di una corazza."
    de: "Ein Fossil eines antiken Pokémon,\ndas am Meeresgrund lebte. Es sieht\nwie das Stück einer Muschel aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece\nser un fragmento de concha."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등 껍질의 일부인 듯하다."
draco_plate:
  names:
    jp_kana: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
  descriptions:
    jp_kana: "ドラゴンの　タイプの　せきばん。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Dragon-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Dragon."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Drachen."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Dragón.\nDebe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dentedidrago
    de: Drachenzahn
    es: Colmillodrag
    ko: 용의이빨
  descriptions:
    jp_kana: "かたくて　するどい　キバ。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a hard and sharp fang that ups\nthe power of Dragon-type moves."
    fr: "Objet à tenir. Croc dur et pointu\nmontant la puissance des capacités de\ntype Dragon."
    it: "Strumento da far tenere a un Pokémon.\nDente duro e affilato che potenzia\nle mosse di tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und\nscharfer Reißzahn, der Attacken vom\nTyp Drachen verstärkt."
    es: "Colmillo de gran dureza que refuerza\nlos ataques de tipo Dragón. Debe\nllevarlo un Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    en: Dragon Scale
    fr: Ecailledraco
    it: Squama Drago
    de: Drachenhaut
    es: Escamadragón
    ko: 용의비늘
  descriptions:
    jp_kana: "かたくて　じょうぶな　ウロコ。\nドラゴンタイプの　ポケモンが\nもっていることが　ある。"
    en: "A thick and tough scale.\nDragon-type Pokémon may be holding\nthis item when caught."
    fr: "Une écaille épaisse et dure tenue\nparfois par les Pokémon de type Dragon\nquand ils sont attrapés."
    it: "Squama spessa e dura.\nPuò essere tenuta da un Pokémon\ndi tipo Drago quando viene catturato."
    de: "Eine dicke und starke Haut.\nDrachen-Pokémon tragen\ndieses Item gerne bei sich."
    es: "Una gruesa y resistente escama que\npueden llevar los Pokémon de tipo\nDragón cuando son capturados."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
dread_plate:
  names:
    jp_kana: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
  descriptions:
    jp_kana: "あくの　タイプの　せきばん。\nもたせると　あくタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Dark-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Ténèbres."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Siniestro.\nDebe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
dubious_disc:
  names:
    jp_kana: あやしいパッチ
    en: Dubious Disc
    fr: CD Douteux
    it: Dubbiodisco
    de: Dubiosdisc
    es: Discoxtraño
    ko: 괴상한패치
  descriptions:
    jp_kana: "なかに　あやしい　じょうほうが\nつまった　とうめいな　きかい。\nせいさくしゃは　ふめい。"
    en: "A transparent device overflowing with\ndubious data.\nIts producer is unknown."
    fr: "Appareil transparent rempli de données\ndouteuses.\nSon fabricant n’est pas connu."
    it: "Dispositivo trasparente strapieno\ndi dati di dubbia entità. Non se ne\nconosce il produttore."
    de: "Eine Scheibe voller seltsamer\nDaten. Ihr Ursprung ist unbekannt."
    es: "Dispositivo transparente que contiene\ndatos misteriosos. Es de fabricante\ndesconocido."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n제작자 불명."
durin_berry:
  names:
    jp_kana: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nドリが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nDurin Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Durinbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Rudion."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n두리가 자란다."
dusk_ball:
  names:
    jp_kana: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
  descriptions:
    jp_kana: "よるや　どうくつなど　くらいところで\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nmakes it easier to catch wild Pokémon\nat night or in dark places like caves."
    fr: "Une Poké Ball efficace pour attraper\nles Pokémon de nuit ou dans des\nendroits sombres tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più\nfacile catturare Pokémon selvatici di\nnotte o in luoghi bui come le grotte."
    de: "Ein mysteriöser Ball,\ngeeignet für Einsätze in der\nNacht oder an dunklen Orten."
    es: "Es algo distinta. Hace que sea\nmás fácil capturar a Pokémon\nsalvajes en la oscuridad."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dusk_stone:
  names:
    jp_kana: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nやみのように　くらい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as dark as dark can be."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon. Elle\nest sombre comme une nuit sans lune."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ scura come le tenebre."
    de: "Dieser besondere, düstere Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nEs oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
earth_plate:
  names:
    jp_kana: だいちのプレート
    en: Earth Plate
    fr: Plaque Terre
    it: Lastrageo
    de: Erdtafel
    es: Tabla Terrax
    ko: 대지플레이트
  descriptions:
    jp_kana: "じめんの　タイプの　せきばん。\nもたせると　じめんタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ground-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Sol."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Boden."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Tierra.\nDebe llevarla un Pokémon."
    ko: "땅타입의 석판.\n지니게 하면 땅타입\n기술의 위력이 강해진다."
electirizer:
  names:
    jp_kana: エレキブースター
    en: Electirizer
    fr: Electiriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
  descriptions:
    jp_kana: "とてつもない　でんきの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    en: "A box packed with a tremendous\namount of electric energy.\nIt is loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie électrique. Appréciée d’un\ncertain Pokémon."
    it: "Scatola strapiena di energia elettrica.\nUn Pokémon in particolare adora \nquesto strumento."
    de: "Eine Schachtel voller elektrischer\nEnergie. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran\ncantidad de energía eléctrica.\nAlgunos Pokémon lo adoran."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
elixir:
  names:
    jp_kana: ピーピーエイダー
    en: Elixir
    fr: Elixir
    it: Elisir
    de: Elixier
    es: Elixir
    ko: PP에이더
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\n１０ずつ　かいふくする。"
    en: "It restores the PP of all the\nmoves learned by the targeted Pokémon\nby 10 points each."
    fr: "Restaure 10 PP de toutes les\ncapacités d’un Pokémon."
    it: "Restituisce 10 PP a ciascuna delle\nmosse imparate dal Pokémon."
    de: "Füllt die AP aller Attacken eines\nPokémon um 10 Punkte auf."
    es: "Restaura 10 PP de todos los movimientos\naprendidos por un Pokémon."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n10씩 회복한다."
energy_powder:
  names:
    jp_kana: ちからのこな
    en: EnergyPowder
    fr: Poudrénergie
    it: Polvenergia
    de: Energiestaub
    es: Polvoenergía
    ko: 힘의가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    en: "A very bitter medicine powder.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Une poudre médicinale très amère.\nRestaure 50 PV à un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRestituisce 50 PS ad un Pokémon."
    de: "Ein bitteres, medizinisches Pulver,\ndas die KP eines Pokémon um\n50 Punkte auffüllt."
    es: "Polvo medicinal muy amargo que\nrestaura 50 PS de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
energy_root:
  names:
    jp_kana: ちからのねっこ
    en: Energy Root
    fr: Racinénergie
    it: Radicenergia
    de: Kraftwurzel
    es: Raíz Energía
    ko: 힘의뿌리
  descriptions:
    jp_kana: "とても　にがい　ねっこ。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    en: "A very bitter root.\nIt restores the HP of one Pokémon by\n200 points."
    fr: "Une racine très amère.\nRestaure 200 PV à un Pokémon."
    it: "Radice amarissima.\nRestituisce 200 PS ad un Pokémon."
    de: "Eine bittere Wurzel. Sie füllt die\nKP eines Pokémon um 200 Punkte auf."
    es: "Raíz muy amarga que restaura\n200 PS de un Pokémon."
    ko: "매우 쓴 뿌리.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
enigma_berry:
  names:
    jp_kana: ナゾのみ
    en: Enigma Berry
    fr: Baie Enigma
    it: Baccaenigma
    de: Enigmabeere
    es: Baya Enigma
    ko: 의문열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　こうかばつぐんの　わざを\nうけたとき　ＨＰを　かいふくする。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores its HP if it is\nhit by a foe’s supereffective attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie augmente les PV du Pokémon s’il\nsubit une attaque super efficace."
    it: "Si usa per fare i Poffin. Ripristina i\nPS se il Pokémon che la tiene è\ncolpito da un attacco superefficace."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere KP eines Pokémon auf,\nwenn v. sehr effekt. Att. getroffen."
    es: "Ingrediente para Pokochos. Restaura\nlos PS de un Pokémon si la lleva cuando\nle alcanza un ataque supereficaz."
    ko: "포핀의 재료.\n지니게 하면 효과가 뛰어난 공격을\n받았을 때 HP를 회복한다."
escape_rope:
  names:
    jp_kana: あなぬけのヒモ
    en: Escape Rope
    fr: Corde Sortie
    it: Fune di Fuga
    de: Fluchtseil
    es: Cuerda Huida
    ko: 동굴탈출로프
  descriptions:
    jp_kana: "ながくて　じょうぶな　ヒモ。\nどうくつや　ダンジョンから\nぬけだすことが　できる。"
    en: "A long, durable rope.\nUse it to escape instantly from a cave\nor a dungeon."
    fr: "Une corde longue et solide permettant\nde sortir rapidement d’une grotte ou\nd’un donjon."
    it: "Corda lunga e resistente.\nSi usa per fuggire immediatamente\ndalle grotte o da certi luoghi chiusi."
    de: "Ein langes, festes Seil, das die\nsofortige Flucht aus Höhlen oder\nÄhnlichem ermöglicht."
    es: "Cuerda larga y resistente que sirve\npara huir de cuevas y sitios cerrados\nen general."
    ko: "길고 튼튼한 끈.\n동굴이나 던전에서\n빠져나올 수 있다."
ether:
  names:
    jp_kana: ピーピーエイド
    en: Ether
    fr: Huile
    it: Etere
    de: Äther
    es: Éter
    ko: PP에이드
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\n１０だけ　かいふくする。"
    en: "It restores the PP of a Pokémon’s\nselected move by a maximum of\n10 points."
    fr: "Restaure jusqu’à 10 PP d’une\ncapacité sélectionnée."
    it: "Restituisce un massimo di 10 PP\na una mossa a scelta di un Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke\neines Pokémon um 10 Punkte auf."
    es: "Restaura un máximo de 10 PP del\nmovimiento que elijas de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n10만큼 회복한다."
everstone:
  names:
    jp_kana: かわらずのいし
    en: Everstone
    fr: Pierre Stase
    it: Pietrastante
    de: Ewigstein
    es: Piedraeterna
    ko: 변함없는돌
  descriptions:
    jp_kana: "ポケモンに　もたせると\nそのあいだ　しんか　しなくなる\nふしぎな　いし。"
    en: "An item to be held by a Pokémon.\nThe Pokémon holding this peculiar stone\nis prevented from evolving."
    fr: "Objet à tenir. Pierre merveilleuse\nempêchant l’évolution."
    it: "Strumento da far tenere a un Pokémon.\nChi tiene questa pietra particolare\nevita l’evoluzione."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nbewirkt einen Entwicklungsstopp."
    es: "El Pokémon que lleve esta piedra\nmágica no evolucionará."
    ko: "포켓몬에게 지니게 하면\n지닌 동안에는 진화하지 않게 되는\n이상한 돌."
exp_share:
  names:
    jp_kana: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condiv. Esp.
    de: EP-Teiler
    es: Repartir Exp
    ko: 학습장치
  descriptions:
    jp_kana: "もたせた　ポケモンは　せんとうに\nでなくても　けいけんちを\nわけてもらえる　べんりな　そうち。"
    en: "An item to be held by a Pokémon.\nThe holder gets a share of a battle’s\nExp. Points without battling."
    fr: "Objet à tenir. Le porteur reçoit une\npartie des points Exp. du combat sans\navoir à combattre."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene ottiene Punti Esp. dalla\nlotta anche se non vi partecipa."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es teilt die\nE.-Punkte aus einem Kampf auf."
    es: "El Pokémon que lo lleva obtiene parte\nde los Puntos de Exp. conseguidos en\nel combate sin participar en él."
    ko: "지니게 한 포켓몬은 배틀에\n나가지 않아도 경험치를\n나누어 받을 수 있는 편리한 장치."
expert_belt:
  names:
    jp_kana: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Xperto
    ko: 달인의띠
  descriptions:
    jp_kana: "つかいこまれた　くろい　おび。\nもたせると　こうかばつぐんの　とき\nわざの　いりょくが　すこし　あがる。"
    en: "An item to be held by a Pokémon. It is\na well-worn belt that slightly boosts\nthe power of supereffective moves."
    fr: "Objet à tenir. Ceinture usée augmentant\nlégèrement la puissance des capacités\nsuper efficaces."
    it: "Strumento da far tenere a un Pokémon.\nCintura consumata che potenzia\ndi poco le mosse superefficaci."
    de: "Ein Item zum Tragen.\nDieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos\nsupereficaces. Debe llevarla un\nPokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 뛰어날 때\n기술의 위력이 조금 올라간다."
explorer_kit:
  names:
    jp_kana: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Forschersack
    es: Kit Explor.
    ko: 탐험세트
  descriptions:
    jp_kana: "たんけんに　やくだつ　べんりな\nどうぐが　はいった　ふくろ。\nちかつうろに　はいれる。"
    en: "A bag filled with convenient tools\nfor exploring. It provides access to\nthe Underground."
    fr: "Sac rempli d’outils utiles pour\nl’exploration. Permet d’accéder au\nSouterrain."
    it: "Una borsa piena di strumenti utili\nper l’esplorazione con la quale si\npuò scendere nei Sotterranei."
    de: "Ein Beutel voller nützlicher\nEntdeckerutensilien. Öffnet\nden Untergrund."
    es: "Una bolsa con herramientas útiles\npara la exploración. Proporciona\nacceso al Subsuelo."
    ko: "탐험에 도움되는 편리한\n도구가 들어 있는 주머니다.\n지하통로로 들어갈 수 있다."
fashion_case:
  names:
    jp_kana: アクセサリーいれ
    en: Fashion Case
    fr: Coffret Mode
    it: Scatola Chic
    de: Modekoffer
    es: Caja Corazón
    ko: 액세서리상자
  descriptions:
    jp_kana: "いろとりどりの　アクセサリーを\nきれいにしまえる　すてきな　ケース。"
    en: "A fancy case for the tidy and\norganized storage of colorful Pokémon\nAccessories."
    fr: "Jolie boîte permettant de ranger les\nAccessoires Pokémon."
    it: "Elegante contenitore usato per\nconservare in modo ordinato i più\nsvariati Accessori per Pokémon."
    de: "Ein schicker Koffer für alle Accessoires\nfür deine Pokémon. Da knittert nichts."
    es: "Cajita para guardar bien organizados\nlos accesorios Pokémon."
    ko: "각양각색의 액세서리를\n깔끔하게 보관할 수 있는 멋진 케이스."
figy_berry:
  names:
    jp_kana: フィラのみ
    en: Figy Berry
    fr: Baie Figuy
    it: Baccafico
    de: Giefebeere
    es: Baya Higog
    ko: 무화열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nピンチのとき　ＨＰを　かいふくするが\nこんらん　することも　ある。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores the user’s HP in\na pinch, but may also cause confusion."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie restaure les PV en cas de besoin,\nmais elle peut rendre confus."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon in difficoltà, restituisce PS,\nma può causare confusione."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere die KP eines Pokémon\nauf, bewirkt aber eventuell Verwirrung."
    es: "Ingrediente para Pokochos. Restaura\nlos PS del Pokémon que la usa en\nun apuro, pero puede causar confusión."
    ko: "포핀의 재료. 지니게 하면\n위급할 때 HP를 회복하지만\n혼란에 빠질 수도 있다."
fire_stone:
  names:
    jp_kana: ほのおのいし
    en: Fire Stone
    fr: Pierre Feu
    it: Pietrafocaia
    de: Feuerstein
    es: Piedra Fuego
    ko: 불꽃의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nだいだいいろを　している。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is colored orange."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est jaune et orange."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ di color arancione."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die\nEntwicklung aus. Er ist orange."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs amarilla con una marca naranja."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n주황색을 띠고 있다."
fist_plate:
  names:
    jp_kana: こぶしのプレート
    en: Fist Plate
    fr: Plaque Poing
    it: Lastrapugno
    de: Fausttafel
    es: Tabla Fuerte
    ko: 주먹플레이트
  descriptions:
    jp_kana: "かくとうの　タイプの　せきばん。\nもたせると　かくとうタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Fighting-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Combat."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Lotta."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Kampf."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Lucha.\nDebe llevarla un Pokémon."
    ko: "격투타입의 석판.\n지니게 하면 격투타입\n기술의 위력이 강해진다."
flame_mail:
  names:
    jp_kana: フレイムメール
    en: Flame Mail
    fr: Lettre Feu
    it: Mess. Fiamma
    de: Feuerbrief
    es: Carta Fuego
    ko: 플레임메일
  descriptions:
    jp_kana: "まっかに　もえあがる　ほのおが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of flames\nin blazing red.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de flammes\nd’un rouge flamboyant. \nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera decorata con un\nmotivo di fiamme di un rosso acceso.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat heiße\nrote Flammen als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con los colores del fuego. Haz\nque la entregue un Pokémon."
    ko: "새빨갛게 타오르는 불꽃이\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
flame_orb:
  names:
    jp_kana: かえんだま
    en: Flame Orb
    fr: Orbe Flamme
    it: Fiammosfera
    de: Heiß-Orb
    es: Llamasfera
    ko: 화염구슬
  descriptions:
    jp_kana: "さわると　ねつをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nやけどの　じょうたいに　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that inflicts a\nburn on the holder in battle."
    fr: "Objet à tenir. Orbe bizarre brûlant son\nporteur durant le combat."
    it: "Strumento da far tenere a un Pokémon.\nSfera bizzarra che procura una\nscottatura a chi la tiene in lotta."
    de: "Ein Item zum Tragen.\nDieser bizarre Orb fügt seinem\nTräger Verbrennungen zu."
    es: "Extraña esfera que causa quemaduras\na quien la usa en combate. Debe\nllevarla un Pokémon."
    ko: "만지면 열을 내는 이상한 구슬.\n지니게 하면 배틀 중에\n화상 상태가 된다."
flame_plate:
  names:
    jp_kana: ひのたまプレート
    en: Flame Plate
    fr: Plaque Flam
    it: Lastrarogo
    de: Feuertafel
    es: Tabla Llama
    ko: 불구슬플레이트
  descriptions:
    jp_kana: "ほのおの　タイプの　せきばん。\nもたせると　ほのおタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Fire-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Feu."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Feuer."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Fuego.\nDebe llevarla un Pokémon."
    ko: "불꽃타입의 석판.\n지니게 하면 불꽃타입\n기술의 위력이 강해진다."
fluffy_tail:
  names:
    jp_kana: エネコのシッポ
    en: Fluffy Tail
    fr: Queue Skitty
    it: Coda Skitty
    de: Eneco-Rute
    es: Cola Skitty
    ko: 에나비꼬리
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    en: "An item that attracts Pokémon.\nUse it to flee from any battle with a\nwild Pokémon."
    fr: "Objet qui attire les Pokémon. Permet de\ns’enfuir d’un combat contre un Pokémon\nsauvage."
    it: "Strumento che attrae i Pokémon.\nUtile per fuggire dalla lotta con\nun Pokémon selvatico."
    de: "Ein tolles Item. Fliehe damit aus\njedem Kampf mit einem wilden\nPokémon."
    es: "Atrae a los Pokémon y sirve para huir\nde un combate con un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
focus_band:
  names:
    jp_kana: きあいのハチマキ
    en: Focus Band
    fr: Bandeau
    it: Bandana
    de: Fokus-Band
    es: Cinta Focus
    ko: 기합의머리띠
  descriptions:
    jp_kana: "もたせると　ひんしに　なりそうな\nわざを　うけても　ＨＰを　１だけ\nのこして　たえることが　ある。"
    en: "An item to be held by a Pokémon.\nThe holder may endure a potential KO\nattack, leaving it with just 1 HP."
    fr: "Objet à tenir pouvant parfois empêcher\nd’être mis K.O., ne laissant qu’un PV."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene può evitare un potenziale\nKO, ma rimane con un solo PS."
    de: "Ein Item (Tragen), das eine\nKampfunfähigkeit verhindern kann,\nda dem Anwender 1 KP bleibt."
    es: "El Pokémon que la lleve puede resistir\nun golpe que potencialmente lo dejaría\nKO y quedarse con 1 PS."
    ko: "지니게 하면\n기절할 듯한 기술을 받아도\nHP를 1 남겨서 견디기도 한다."
focus_sash:
  names:
    jp_kana: きあいのタスキ
    en: Focus Sash
    fr: Ceint. Force
    it: Focalnastro
    de: Fokusgurt
    es: Banda Focus
    ko: 기합의띠
  descriptions:
    jp_kana: "もたせると　ＨＰが　まんたんのとき\nひんしになりそうな　わざを　うけても　\nＨＰ１で　いちどだけ　たえる。"
    en: "An item to be held by a Pokémon. If it\nhas full HP, the holder will endure one\npotential KO attack, leaving 1 HP."
    fr: "Objet à tenir permettant au porteur,\ns’il a ses PV pleins, d’éviter un\npotentiel K.O. en conservant un PV."
    it: "Strumento da far tenere a un Pokémon.\nSe chi lo tiene ha tutti i PS, eviterà un\npotenziale KO, rimanendo con 1 PS."
    de: "Ein Item zum Tragen.\nBei vollen KP reduziert eine\nK.O.-Attacke die KP nur auf 1."
    es: "Si el Pokémon que la lleva tiene los\nPS al máximo, resistirá un golpe que\npotencialmente lo deja KO con 1 PS."
    ko: "지니게 하면 HP가 꽉 찼을 때\n기절할 듯한 기술을 당해도\nHP1로 한 번은 버틴다."
fresh_water:
  names:
    jp_kana: おいしいみず
    en: Fresh Water
    fr: Eau Fraîche
    it: Acqua Fresca
    de: Tafelwasser
    es: Agua Fresca
    ko: 맛있는물
  descriptions:
    jp_kana: "ミネラル　たっぷりの　みず。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    en: "Water with a high mineral content.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Une eau riche en minéraux.\nRestaure 50 PV à un Pokémon."
    it: "Acqua ricca di sostanze minerali.\nRestituisce 50 PS ad un Pokémon."
    de: "Ein stilles Wasser mit hohem\nMineralienanteil, das die KP eines\nPokémon um 50 Punkte auffüllt."
    es: "Agua de alto contenido mineral que\nrestaura 50 PS de un Pokémon."
    ko: "미네랄이 가득한 물.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
full_heal:
  names:
    jp_kana: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura Totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    en: "A spray-type medicine.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Un médicament sous forme de spray.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio spray.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Ein Spray, das alle Statusprobleme\neines Pokémon aufhebt."
    es: "Medicina en spray que cura todos los\nproblemas de estado de un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
full_incense:
  names:
    jp_kana: まんぷくおこう
    en: Full Incense
    fr: Encens Plein
    it: Gonfioaroma
    de: Lahmrauch
    es: Incie. Lento
    ko: 만복향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせた　ポケモンは　いつもより\nこうどうが　おそくなる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that makes\nthe holder bloated and slow moving."
    fr: "Objet à tenir. Encens au parfum\nexotique gonflant son porteur et le\nfaisant se déplacer lentement."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\nrende gonfio e lento chi lo tiene."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut macht den Träger benommen\nund langsam."
    es: "Exótica sustancia aromática que hace\nque el Pokémon que la lleva se mueva\nmás despacio."
    ko: "이상한 향기의 향로.\n지니게 한 포켓몬은 여느 때보다\n행동이 느려진다."
full_restore:
  names:
    jp_kana: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica Tot
    de: Top-Genesung
    es: Restau. Todo
    ko: 회복약
  descriptions:
    jp_kana: "ポケモン　１ひきの　ＨＰと\nじょうたい　いじょうを　すべて\nかいふくする。"
    en: "A medicine that fully restores the HP\nand heals any status problems of a\nsingle Pokémon."
    fr: "Un médicament qui restaure tous les\nPV d’un Pokémon et soigne tous ses\nproblèmes de statut."
    it: "Rimedio che restituisce tutti i PS\nad un solo Pokémon e risolve\ni suoi problemi di stato."
    de: "Dieses Item stellt alle KP eines\nPokémon wieder her und behebt\nalle Statusprobleme des Pokémon."
    es: "Medicina que restaura todos los PS\ny cura todos los problemas de\nestado de un Pokémon."
    ko: "포켓몬 1마리의 HP와\n상태 이상을 모두\n회복한다."
galactic_key:
  names:
    jp_kana: ギンガだんのカギ
    en: Galactic Key
    fr: Clé Galaxie
    it: Galachiave
    de: G-Schlüssel
    es: Ll. Galaxia
    ko: 갤럭시단의열쇠
  descriptions:
    jp_kana: "ギンガだんアジトの　セキュリティを\nかいじょ　するための　カードキー。\nなくすと　おしおき　されるらしい。"
    en: "A card key for disengaging security\nsystems in the Galactic HQ. Losing it\ncan result in punishment, apparently."
    fr: "Clé magnétique servant à désactiver les\nsystèmes de sécurité du QG Galaxie.\nLa perdre entraîne une punition."
    it: "Chiave a scheda per disattivare i\nsistemi di sicurezza nella Sede Galassia.\nSe la si perde, si viene puniti."
    de: "Diese Schlüsselkarte deaktiviert\ndie Sicherheitssysteme im\nHauptquartier von Team Galaktik."
    es: "Desactiva los sistemas de seguridad de\nla Base Galaxia. Por lo visto, perder\nesta tarjeta se castiga severamente."
    ko: "갤럭시단아지트의 보안을\n해제하기 위한 카드키다.\n잃어버리면 벌을 받는 듯하다."
ganlon_berry:
  names:
    jp_kana: リュガのみ
    en: Ganlon Berry
    fr: Baie Lingan
    it: Baccalongan
    de: Linganbeere
    es: Baya Gonlan
    ko: 용아열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nじぶんの　ぼうぎょが　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\nDefense stat in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte la Défense si\nnécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nla Difesa se il Pokémon che la\ntiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere den Verteidigungs-Wert\neines Pokémon in einer Notlage."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, le subirá la\nDefensa en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n자신의 방어가 올라간다."
good_rod:
  names:
    jp_kana: いいつりざお
    en: Good Rod
    fr: Super Canne
    it: Amo Buono
    de: Profiangel
    es: Caña Buena
    ko: 좋은낚싯대
  descriptions:
    jp_kana: "あたらしくて　いい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    en: "A new, good-quality fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une canne neuve et de bonne qualité.\nUtilisez-la pour pêcher des Pokémon\nsauvages dans les points d’eau."
    it: "Amo nuovo e di qualità.\nSi usa per pescare Pokémon selvatici\nin qualsiasi specchio d’acqua."
    de: "Eine recht gute Angel. Damit kannst\ndu in jedem Gewässer nach Pokémon\nangeln."
    es: "Una caña de pescar nuevecita y de\ngran calidad. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "새로 나온 좋은 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
gooey_mulch:
  names:
    jp_kana: ねばねばこやし
    en: Gooey Mulch
    fr: Fertiglu
    it: Fertilcolla
    de: Neumulch
    es: Abono Brote
    ko: 끈적끈적비료
  descriptions:
    jp_kana: "ふかふかのつちに　まいて　つかう。\nかれたあとに　あたらしい　めが\nでてくる　かいすうが　ふえる。"
    en: "A plant fertilizer spread on soft soil.\nIt ups the number of times new plants\ngrow where mature plants withered."
    fr: "Un engrais utilisé sur sol meuble.\nAugmente le nombre de nouveaux plants\nqui poussent quand la plante flétrit."
    it: "Fertilizzante da usare sul terreno\nsoffice. Crescono più piante quando\nappassiscono quelle mature."
    de: "Ein Dünger für weichen Boden.\nErhöht die Rate neuer Pflanzen,\nnachdem alte verwelkt sind."
    es: "Fertilizante para tierra suelta que\nhace que broten más plantas\nnuevas de las plantas marchitas."
    ko: "푹신푹신한 땅에 뿌려 쓴다.\n시든 뒤에 새로운 싹이\n나오는 횟수가 늘어난다."
gracidea:
  names:
    jp_kana: グラシデアのはな
    en: Gracidea
    fr: Gracidée
    it: Gracidea
    de: Gracidea
    es: Gracídea
    ko: 그라시데아꽃
  descriptions:
    jp_kana: "たんじょうびや　きねんび　などに\nかんしゃの　きもちを　つたえるため\nブーケにして　おくることが　ある。"
    en: "A flower sometimes bundled in bouquets\nto convey gratitude on special\noccasions like birthdays."
    fr: "Fleur que l’on offre en gage de\nreconnaissance, notamment à\nl’occasion d’un anniversaire."
    it: "Un fiore, a volte raccolto in bouquet,\nche esprime gratitudine in occasioni\nparticolari, come i compleanni."
    de: "Mit dieser Blume, manchmal auch als Teil\neines Bouquets, kann man an speziellen\nTagen seine Dankbarkeit ausdrücken."
    es: "Una flor que se suele regalar en ramos\npara expresar agradecimiento en\nocasiones especiales, como cumpleaños."
    ko: "생일이나 기념일 등에\n감사의 마음을 전하기 위해\n부케로 만들어 보내는 일이 있다."
grass_mail:
  names:
    jp_kana: グラスメール
    en: Grass Mail
    fr: Lettre Herbe
    it: Mess. Erba
    de: Wiesenbrief
    es: Carta Hierba
    ko: 잔디메일
  descriptions:
    jp_kana: "さわやかな　みどりの　そうげんが　\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a\nrefreshingly green field.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres représentant un\nchamp d’herbe luxuriante. \nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera decorata con ciuffi\nd’erba disegnati. Un Pokémon può\ntenerla e consegnarla."
    de: "Das Briefpapier hat eine\ngrüne Wiese als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con un estampado de hierba.\nHaz que la entregue un Pokémon."
    ko: "산뜻한 녹색 초원이\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
great_ball:
  names:
    jp_kana: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Superball
    ko: 수퍼볼
  descriptions:
    jp_kana: "モンスターボールよりも　さらに\nポケモンを　つかまえやすくなった\nすこし　せいのうのいい　ボール。"
    en: "A good, high-performance Ball that\nprovides a higher Pokémon catch rate\nthan a standard Poké Ball."
    fr: "Une Ball très performante dont le taux\nde réussite est supérieur à celui de la\nPoké Ball."
    it: "Ball dalle ottime prestazioni:\nfornisce maggiori probabilità di\ncattura rispetto alla Poké Ball."
    de: "Ein Ball mit guter Erfolgsquote.\nDem Pokéball in allen\nPunkten überlegen."
    es: "Poké Ball de alto rendimiento. Tiene\nun índice de éxito superior al de la\nPoké Ball."
    ko: "몬스터볼보다도 더욱\n포켓몬을 잡기 쉬워진\n약간 성능이 좋은 볼."
green_scarf:
  names:
    jp_kana: みどりのバンダナ
    en: Green Scarf
    fr: Foul. Vert
    it: Fascia Verde
    de: Grüner Schal
    es: Pañ. Verde
    ko: 초록밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the “Smart” aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente\nl’“Intelligence” dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta l’“Acume” di\nchi lo tiene in una Gara."
    de: "Ein Item zum Tragen. Es verstärkt\ndie “Klugheit” eines Pokémon\nin einem Wettbewerb."
    es: "Debe llevarlo un Pokémon. Aumenta\nel ingenio en los concursos."
    ko: "지니게 하고 콘테스트에 참가시키면\n그 포켓몬은 여느 때보다\n슬기롭게 보인다."
green_shard:
  names:
    jp_kana: みどりのかけら
    en: Green Shard
    fr: Tesson Vert
    it: Coccio Verde
    de: Grünstück
    es: Parte Verde
    ko: 초록조각
  descriptions:
    jp_kana: "みどりの　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    en: "A small green shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson vert.\nIl semble provenir d’un outil très\nancien."
    it: "Piccolo coccio verde.\nProbabilmente faceva parte di uno\nstrumento creato in tempi passati."
    de: "Eine grüne Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Parece formar parte de algún tipo\nde herramienta antigua."
    ko: "초록색 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
grepa_berry:
  names:
    jp_kana: ウブのみ
    en: Grepa Berry
    fr: Baie Résin
    it: Baccauva
    de: Labrusbeere
    es: Baya Uvav
    ko: 또뽀열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　とくぼうの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base Sp. Def stat."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leur stat Déf. Spé. de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne diminuisce la Dif. Sp."
    de: "Eine Knursp-Zutat. Verwendung macht\nein Pokémon freundlicher, reduziert\naber permanent d. Spezial-Verteidigung."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero reduces su Defensa Especial."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 특수방어의\n기초 포인트가 떨어진다."
grip_claw:
  names:
    jp_kana: ねばりのかぎづめ
    en: Grip Claw
    fr: Accro Griffe
    it: Presartigli
    de: Griffklaue
    es: Garra Garfio
    ko: 끈기갈고리손톱
  descriptions:
    jp_kana: "もたせると　しめつける　まきつくなど\nダメージを　あたえつづける　わざの\nターンすうが　ふえる。"
    en: "A Pokémon hold item that extends the\nduration of multiturn attacks like\nBind and Wrap."
    fr: "Objet à tenir augmentant la durée des\nattaques à tours multiples telles que\nEtreinte et Ligotage."
    it: "Strumento da far tenere a un Pokémon\nche prolunga gli attacchi multiturno\ncome Avvolgibotta e Legatutto."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von\nKlammergriff, Wickel etc."
    es: "Prolonga la duración de ataques\nmultiturno como Atadura y Repetición.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 조이기나 김밥말이 등\n데미지를 계속 주는 기술의\n턴 수가 늘어난다."
griseous_orb:
  names:
    jp_kana: はっきんだま
    en: Griseous Orb
    fr: Orbe Platiné
    it: Grigiosfera
    de: Platinum-Orb
    es: Griseosfera
    ko: 백금옥
  descriptions:
    jp_kana: "ギラティナに　もたせると　ドラゴンと\nゴーストタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    en: "A glowing orb to be held by GIRATINA.\nIt boosts the power of Dragon- and\nGhost-type moves."
    fr: "Mystérieux objet destiné à GIRATINA.\nAméliore les capacités de type Dragon\nou Spectre."
    it: "Sfera splendente da far tenere\na GIRATINA. Aumenta la potenza\ndelle mosse di tipo Drago e Spettro."
    de: "Ein glühender Orb. Verstärkt\nAttacken vom Typ Drachen und\nGeist, wenn GIRATINA ihn trägt."
    es: "Una esfera brillante que potencia los\nataques de tipo Dragón y Fantasma.\nDebe llevarla GIRATINA."
    ko: "기라티나에게 지니게 하면 드래곤과\n고스트타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
growth_mulch:
  names:
    jp_kana: すくすくこやし
    en: Growth Mulch
    fr: Fertipousse
    it: Fertilrapido
    de: Wachsmulch
    es: Abono Rápido
    ko: 무럭무럭비료
  descriptions:
    jp_kana: "ふかふかのつちに　まいて　つかう。\nつちの　かわきが　はやくなるが\nきのみの　そだちも　はやくなる。"
    en: "A plant fertilizer spread on soft soil.\nIt speeds up the growth of Berries.\nHowever, it also dries the soil faster."
    fr: "Un engrais utilisé sur sol meuble.\nLes Baies poussent plus vite, mais le sol\ns’assèche plus vite."
    it: "Fertilizzante da usare sul terreno\nsoffice. Le Bacche crescono in fretta,\nma il terreno si secca più velocemente."
    de: "Ein Dünger für weichen Boden.\nDie Beeren wachsen schneller,\naber die Erde trocknet aus."
    es: "Un fertilizante que se usa en tierra\nsuelta. Acelera el crecimiento de las\nbayas, pero también seca el suelo."
    ko: "푹신푹신한 땅에 뿌려 쓴다.\n땅의 건조가 빨라지지만\n나무열매의 성장도 빨라진다."
guard_spec:
  names:
    jp_kana: エフェクトガード
    en: Guard Spec.
    fr: Défense Spéc
    it: Superguardia
    de: Megablock
    es: Protec. Esp.
    ko: 이펙트가드
  descriptions:
    jp_kana: "せんとうちゅう　５ターンの　あいだ\nみかたの　のうりょくを\nさげられなくする　どうぐ。"
    en: "An item that prevents stat reduction\namong the Trainer’s party Pokémon\nfor five turns after use."
    fr: "Empêche la réduction des stats de tous\nles Pokémon de l’équipe pendant 5\ntours."
    it: "Per 5 turni dopo l’uso, evita la\nriduzione delle statistiche dei\nPokémon della squadra dell’Allenatore."
    de: "Eine mögliche Statuswertänderung\nder Pokémon im Team wird für\n5 Runden verhindert."
    es: "Evita que bajen las características\ndel equipo Pokémon durante\ncinco turnos."
    ko: "배틀 중 5턴 동안\n같은 편의 능력을\n떨어뜨리지 않게 하는 도구."
guidebook:
  names:
    jp_kana: ぼうけんノート
    en: Journal
    fr: Journal
    it: Agenda
    de: Tagebuch
    es: Diario
    ko: 모험노트
  descriptions:
    jp_kana: "これまでの　ぼうけんの　ようすが\nきろく　されている　ノート。"
    en: "A notebook that keeps a day-to-day\nrecord of your adventure so far."
    fr: "Journal de bord qui garde en mémoire\nvos aventures quotidiennes."
    it: "Agenda in cui viene registrata\nla tua avventura giorno per giorno."
    de: "In diesem Tagebuch steht, was du\nin den letzten Tagen erlebt hast."
    es: "Un cuaderno en el que se recogen, día\na día, los progresos de tu aventura."
    ko: "지금까지의 모험 상황이\n기록되어 있는 노트."
haban_berry:
  names:
    jp_kana: ハバンのみ
    en: Haban Berry
    fr: Baie Fraigo
    it: Baccahaban
    de: Terirobeere
    es: Baya Anjiro
    ko: 하반열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　ドラゴン　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Dragon-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Dragon."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Drago del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Drachen. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Dragón."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 드래곤 기술을\n당했을 때 위력이 약해진다."
hard_stone:
  names:
    jp_kana: かたいいし
    en: Hard Stone
    fr: Pierre Dure
    it: Pietradura
    de: Granitstein
    es: Piedra Dura
    ko: 딱딱한돌
  descriptions:
    jp_kana: "ぜったいに　われない　いし。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is an unbreakable stone that ups\nthe power of Rock-type moves."
    fr: "Objet à tenir. Pierre incassable qui\nmonte la puissance des capacités de\ntype Roche."
    it: "Strumento da far tenere a un Pokémon.\nPietra indistruttibile che potenzia\nle mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Ein unzer-\nbrechlicher Stein, der Attacken\nvom Typ Gestein verstärkt."
    es: "Debe llevarla un Pokémon. La robustez\nde la piedra fortalece los ataques de\ntipo Roca."
    ko: "절대 깨지지 않는 돌.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
heal_ball:
  names:
    jp_kana: ヒールボール
    en: Heal Ball
    fr: Soin Ball
    it: Cura Ball
    de: Heilball
    es: Sana Ball
    ko: 힐볼
  descriptions:
    jp_kana: "つかまえた　ポケモンの　ＨＰと\nじょうたい　いじょうを　かいふくする\nちょっと　やさしい　ボール。"
    en: "A remedial Poké Ball that restores the\ncaught Pokémon’s HP and eliminates\nany status problem."
    fr: "Une Poké Ball de soin qui rend tous les\nPV du Pokémon attrapé et qui soigne\ntous les changements de statut."
    it: "Poké Ball curativa che ridà PS\nal Pokémon catturato e risolve\nogni problema di stato."
    de: "Ein wohltuender Ball. Er füllt alle KP\ndes gefangenen Pokémon auf und hebt\nalle Statusprobleme auf."
    es: "Poké Ball curativa que restaura los PS\nde un Pokémon capturado y cura sus\nproblemas de estado."
    ko: "잡은 포켓몬의 HP와\n상태 이상을 회복시키는\n조금 다정한 볼."
heal_powder:
  names:
    jp_kana: ばんのうごな
    en: Heal Powder
    fr: Poudre Soin
    it: Polvocura
    de: Heilpuder
    es: Pol.curación
    ko: 만능가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    en: "A very bitter medicine powder.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Une poudre médicinale très amère.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Ein bitteres, medizinisches Pulver,\ndas alle Statusprobleme eines Pokémon \naufhebt."
    es: "Polvos muy amargos que curan todos los\nproblemas de estado de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
heart_mail:
  names:
    jp_kana: ラブラブメール
    en: Heart Mail
    fr: Lettre Coeur
    it: Mess. Cuore
    de: Rosabrief
    es: Car. Corazón
    ko: 러브러브메일
  descriptions:
    jp_kana: "おおきな　ハートの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of giant\nheart patterns.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de cœurs\ngigantesques.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un cuore\ngigante sullo sfondo. Un Pokémon\npuò tenerla e consegnarla."
    de: "Das Briefpapier hat riesige\nHerzen als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con un estampado de corazones.\nHaz que la entregue un Pokémon."
    ko: "큰 하트 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
heart_scale:
  names:
    jp_kana: ハートのウロコ
    en: Heart Scale
    fr: Ecaillecoeur
    it: Squama Cuore
    de: Herzschuppe
    es: Esc. Corazón
    ko: 하트비늘
  descriptions:
    jp_kana: "きれいな　ハートの　かたちの\nとても　めずらしい　ウロコ。\nにじいろに　うすく　かがやく。"
    en: "A pretty, heart-shaped scale that is\nextremely rare. It glows faintly in the\ncolors of the rainbow."
    fr: "Une jolie écaille en forme de cœur qui\nest très rare. Elle brille légèrement\nd’un éclat arc-en-ciel."
    it: "Squama graziosa a forma di cuore\nmolto rara. Riflette tutti i colori\ndell’iride."
    de: "Eine hübsche, herzförmige, sehr\nseltene Schuppe. Sie erstrahlt in\nden Farben des Regenbogens."
    es: "Bella escama con forma de corazón\nque brilla con los colores del arco iris.\nEs muy poco común."
    ko: "예쁜 하트 모양의\n무척 진귀한 비늘.\n무지개색으로 연하게 반짝인다."
heat_rock:
  names:
    jp_kana: あついいわ
    en: Heat Rock
    fr: Roche Chaude
    it: Rocciacalda
    de: Heißbrocken
    es: Roca Calor
    ko: 뜨거운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　にほんばれを\nつかうと　いつもより　はれの\nじかんが　ながくなる。"
    en: "A Pokémon hold item that extends the\nduration of the move Sunny Day used\nby the holder."
    fr: "Objet à tenir augmentant la durée de\nla capacité Zénith utilisée par le\nporteur."
    it: "Strumento da far tenere a un\nPokémon che allunga la durata\ndella mossa Giornodisole."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von Sonnentag."
    es: "Prolonga la duración del movimiento Día\nSoleado que use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 쾌청을\n쓰면 여느 때보다 쾌청의\n시간이 길어진다."
helix_fossil:
  names:
    jp_kana: かいのカセキ
    en: Helix Fossil
    fr: Nautile
    it: Helixfossile
    de: Helixfossil
    es: Fósil Helix
    ko: 조개화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nかいがらの　いちぶ　らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a seashell."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de coquillage."
    it: "Fossile di un Pokémon antico che\nviveva in mare. Sembra essere\nparte di una conchiglia."
    de: "Ein Fossil eines antiken Pokémon,\ndas am Meeresgrund lebte. Es sieht\nwie ein Muschelstück aus."
    es: "Fósil de un Pokémon ancestral que vivió\nen el fondo del mar. Parece ser un\nfragmento de concha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n조개껍질의 일부인 듯하다."
hm01:
  names:
    jp_kana: ひでんマシン０１
    en: HM01
    fr: CS01
    it: MN01
    de: VM01
    es: MO01
    ko: 비전머신01
  descriptions:
    jp_kana: "カマや　ツメなどの　するどいもので\nきりつけて　こうげきする。\nほそいきを　きることも　できる。"
    en: "The foe is cut with a scythe or a claw.\nIt can also be used to cut down thin\ntrees."
    fr: "Coupe l’ennemi avec des lames ou des\ngriffes. Hors combat, permet de couper\ndes arbres fins."
    it: "Attacca il nemico con artigli o\nfalci affilate. Fuori dalla lotta\nsi usa per tagliare piccoli alberi."
    de: "Der Gegner wird mit scharfen Klingen\nattackiert. Außerhalb des Kampfes\nwerden damit kleine Bäume gefällt."
    es: "Corta al rival con una cuchilla o garra.\nTambién puede usarse para cortar\nárboles delgados."
    ko: "낫이나 발톱 등 날카로운 것으로\n갈라서 공격한다.\n얇은 나무를 자를 수도 있다."
hm02:
  names:
    jp_kana: ひでんマシン０２
    en: HM02
    fr: CS02
    it: MN02
    de: VM02
    es: MO02
    ko: 비전머신02
  descriptions:
    jp_kana: "１ターンめで　そらへ　とびあがって\n２ターンめで　こうげきする。\nしっているまちに　いどうも　できる。"
    en: "The user soars, then strikes on the\nsecond turn. It can also be used to\nfly to any familiar town."
    fr: "Le lanceur s’envole au 1ᵉʳ tour et\nfrappe au 2ᵉ. Permet aussi d’être\nporté dans une ville connue."
    it: "Chi la usa si alza da terra per attac-\ncare al turno successivo. Utile anche\nper volare in città già visitate."
    de: "In Runde 1 fliegt der Angreifer empor\nund attackiert in Runde 2. Man kann\ndamit zu jedem bekannten Ort fliegen."
    es: "Quien lo usa levanta el vuelo y ataca en\nel siguiente turno. También se puede\nusar para volar a algún sitio conocido."
    ko: "1턴째에 하늘을 날아올라\n2턴째에 공격한다.\n알고 있는 도시로 이동할 수 있다."
hm03:
  names:
    jp_kana: ひでんマシン０３
    en: HM03
    fr: CS03
    it: MN03
    de: VM03
    es: MO03
    ko: 비전머신03
  descriptions:
    jp_kana: "おおきな　なみを　おこして\nすべての　ポケモンを　こうげきする。\nみずのうえを　すすむことも　できる。"
    en: "It swamps the entire battlefield with\na giant wave. It can also be used\nto cross water."
    fr: "Une énorme vague s’abat sur le\nchamp de bataille. Permet aussi\nde voyager sur l’eau."
    it: "Un’onda enorme sommerge il campo\ndi battaglia. Si usa anche per\nspostarsi sull’acqua."
    de: "Eine riesige Flutwelle ergießt sich\nüber alle, außer den Anwender. Damit\nkann man auch auf dem Wasser surfen."
    es: "Inunda el campo de batalla con una\nola gigante. También puede usarse\npara desplazarse por el agua."
    ko: "큰 파도를 일으켜서\n모든 포켓몬을 공격한다.\n물 위를 나아갈 수도 있다."
hm04:
  names:
    jp_kana: ひでんマシン０４
    en: HM04
    fr: CS04
    it: MN04
    de: VM04
    es: MO04
    ko: 비전머신04
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nおもいいわを　おすことも　できる。"
    en: "The foe is slugged with a punch thrown\nat maximum power. It can also be used\nto move boulders."
    fr: "Le lanceur cogne l’ennemi de toute sa\nforce. Permet aussi de déplacer des\nrochers."
    it: "Colpisce il nemico con un’enorme\nenergia. Si usa anche per spostare\ni massi."
    de: "Den Gegner trifft ein energiegeladener\nKraftschlag. Außerdem lassen sich mit\nder Attacke schwere Felsen bewegen."
    es: "Genera mucha fuerza y ataca con\ngran energía al rival. También puede\nusarse para mover piedras grandes."
    ko: "혼신의 힘으로 공격한다.\n무거운 바위를 밀 수도 있다."
hm05:
  names:
    jp_kana: ひでんマシン０５
    en: HM05
    fr: CS05
    it: MN05
    de: VM05
    es: MO05
    ko: 비전머신05
  descriptions:
    jp_kana: "しょうがいぶつを　なくして　あいての\nかいひりつを　さげる。\nふかいきりを　けすことも　できる。"
    en: "Obstacles are moved, reducing the\nfoe’s evasion stat. It can also be\nused to clear deep fog."
    fr: "Dégage les obstacles pour baisser\nl’esquive de l’ennemi. Permet aussi de\nchasser le brouillard."
    it: "Rimuove gli ostacoli e riduce l’elusione\ndel nemico. Si può usare per disperdere\nla nebbia fitta."
    de: "Versetzt Hindernisse, senkt\nden Fluchtwert des Gegners\nund vertreibt Nebel."
    es: "Desplaza obstáculos y reduce la\nevasión del rival. También puede\nusarse para despejar niebla densa."
    ko: "장애물을 없애\n상대의 회피율을 떨어뜨린다.\n짙은 안개를 없앨 수도 있다."
hm06:
  names:
    jp_kana: ひでんマシン０６
    en: HM06
    fr: CS06
    it: MN06
    de: VM06
    es: MO06
    ko: 비전머신06
  descriptions:
    jp_kana: "いわを　くだくような　パンチで\nこうげきする。　ひびわれた　いわを\nこわすことも　できる。"
    en: "The user slugs the foe with a\nshattering punch. It can also smash\ncracked boulders."
    fr: "Le lanceur porte un coup dévastateur\nà l’ennemi. Permet aussi de briser des\nrochers fissurés."
    it: "Colpisce il nemico con un pugno\ndevastante. Può anche frantumare\nrocce crepate."
    de: "Steinbrecherische Attacke, die den\nVerteidigungs-Wert senken kann. Kleine\nFelsen können zerschmettert werden."
    es: "Ataque demoledor que puede\nbajar la Defensa. También puede\ndestrozar piedras resquebrajadas."
    ko: "바위를 깨는 듯한 펀치로 공격한다.\n금이 간 바위를 부술 수도 있다."
hm07:
  names:
    jp_kana: ひでんマシン０７
    en: HM07
    fr: CS07
    it: MN07
    de: VM07
    es: MO07
    ko: 비전머신07
  descriptions:
    jp_kana: "たきを　さかのぼるような　すさまじい\nいきおいで　とっしん　こうげきする。\nたきを　のぼることも　できる。"
    en: "The user charges the foe at an\nawesome speed. It can also be used\nto climb a waterfall."
    fr: "Le lanceur charge l’ennemi à une\nvitesse remarquable. Permet aussi\nde franchir une cascade."
    it: "Carica il nemico ad una velocità\nimpressionante. Si può usare per\nrisalire una cascata."
    de: "Eine mächtige Attacke, die den Gegner\nmit rasender Geschwindigkeit angreift.\nSie macht Wasserfälle bezwingbar."
    es: "Carga contra el rival a una velocidad\nincreíble. También puede usarse\npara remontar una cascada."
    ko: "폭포를 거꾸로 오르는 듯한\n엄청난 기세로 돌진하여 공격한다.\n폭포를 오를 수도 있다."
hm08:
  names:
    jp_kana: ひでんマシン０８
    en: HM08
    fr: CS08
    it: MN08
    de: VM08
    es: MO08
    ko: 비전머신08
  descriptions:
    jp_kana: "とっしん　こうげきで　こんらん\nさせることが　ある。　ごつごつした\nいわを　のぼることも　できる。"
    en: "A charging attack that may also leave\nthe foe confused. It can also be used\nto scale rocky walls."
    fr: "Charge pouvant rendre l’ennemi confus.\nPermet aussi d’escalader des parois\nrocheuses."
    it: "Carica che può confondere il nemico.\nSi può usare anche per scalare pareti\nrocciose."
    de: "Eine Attacke, die den Gegner\neventuell verwirrt. Mit ihr\nkann man Felswände bezwingen."
    es: "Embestida enérgica que también\npuede confundir al enemigo. Puede\nusarse para escalar muros de piedra."
    ko: "돌진 공격으로 혼란 시키기도 한다.\n울퉁불퉁한 바위를 오를 수도 있다."
hondew_berry:
  names:
    jp_kana: ロメのみ
    en: Hondew Berry
    fr: Baie Lonme
    it: Baccamelon
    de: Honmelbeere
    es: Baya Meluce
    ko: 로매열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　とくこうの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base Sp. Atk stat."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leur stat Atq. Spé. de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne diminuisce l’Att. Sp."
    de: "Eine Knursp-Zutat. Verwendung macht\nein Pokémon freundlicher, reduziert\naber permanent den Spezial-Angriff."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero reduces su Ataque Especial."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 특수공격의\n기초 포인트가 떨어진다."
honey:
  names:
    jp_kana: あまいミツ
    en: Honey
    fr: Miel
    it: Miele
    de: Honig
    es: Miel
    ko: 달콤한꿀
  descriptions:
    jp_kana: "くさむらや　どうくつ　などで\nつかうと　あまいにおいに　さそわれて\nやせいポケモンが　あらわれる。"
    en: "A sweet honey with a lush aroma that\nattracts wild Pokémon when it is used\nin grass, caves, or on special trees."
    fr: "Un miel au parfum riche qui, utilisé dans\nl’herbe, une grotte ou sur des arbres\nspéciaux, attire les Pokémon sauvages."
    it: "Miele dolce dall’aroma intenso che\nattrae i Pokémon selvatici. Usalo nelle\ngrotte, nell’erba o su alberi speciali."
    de: "Der Duft dieses Honigs lockt\nwilde Pokémon an. Verwende ihn in\nhohem Gras oder an besonderen Bäumen."
    es: "Su delicioso aroma atrae a Pokémon\nsalvajes si se usa en zonas de hierba\nalta, cuevas o árboles especiales."
    ko: "풀밭이나 동굴 등에서 사용하면\n달콤한 냄새에 이끌려서\n야생 포켓몬이 나타난다."
hp_up:
  names:
    jp_kana: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-Su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ＨＰの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base HP of a single\nPokémon."
    fr: "Une boisson très nutritive qui monte\nles PV d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i PS di un Pokémon."
    de: "Ein gehaltvolles Getränk, das\ndie KP-Anzahl eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que aumenta los PS\nde un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\n200 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 200 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 200 PS ad un Pokémon."
    de: "Hilft bei Wunden.\nFüllt die KP eines Pokémon\num 200 Punkte wieder auf."
    es: "Medicina en spray que cura heridas\ny restaura 200 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
iapapa_berry:
  names:
    jp_kana: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nピンチのとき　ＨＰを　かいふくするが\nこんらん　することも　ある。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores the user’s HP in\na pinch, but may also cause confusion."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie restaure les PV en cas de besoin,\nmais elle peut rendre confus."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon in difficoltà, restituisce PS,\nma può causare confusione."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere die KP eines Pokémon\nauf, bewirkt aber eventuell Verwirrung."
    es: "Ingrediente para Pokochos. Restaura\nlos PS del Pokémon que la usa en\nun apuro, pero puede causar confusión."
    ko: "포핀의 재료. 지니게 하면\n위급할 때 HP를 회복하지만\n혼란에 빠질 수도 있다."
ice_heal:
  names:
    jp_kana: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　こおりの\nじょうたいを　かいふくする。"
    en: "A spray-type medicine.\nIt defrosts a Pokémon that has been\nfrozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: "Rimedio spray.\nLibera un Pokémon dal congelamento."
    de: "Ein Spray, das ein eingefrorenes\nPokémon auftaut."
    es: "Medicina en spray que descongela\na un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
icicle_plate:
  names:
    jp_kana: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
  descriptions:
    jp_kana: "こおりの　タイプの　せきばん。\nもたせると　こおりタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ice-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Glace."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Eis."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Hielo.\nDebe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
icy_rock:
  names:
    jp_kana: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あられを\nつかうと　いつもより　あられの\nじかんが　ながくなる。"
    en: "A Pokémon hold item that extends the\nduration of the move Hail used by the\nholder."
    fr: "Objet à tenir augmentant la durée de\nla capacité Grêle utilisée par le\nporteur."
    it: "Strumento da far tenere a un\nPokémon che allunga la durata\ndella mossa Grandine."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von Hagelsturm."
    es: "Prolonga la duración del movimiento\nGranizo del Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 싸라기눈을\n쓰면 여느 때보다 싸라기눈의\n시간이 길어진다."
insect_plate:
  names:
    jp_kana: たまむしプレート
    en: Insect Plate
    fr: Plaquinsect
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
  descriptions:
    jp_kana: "むしの　タイプの　せきばん。\nもたせると　むしタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Bug-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Insecte."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Käfer."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Bicho.\nDebe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
iron:
  names:
    jp_kana: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Defense stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte la\nDéfense d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Difesa di un Pokémon."
    de: "Ein gehaltvolles Getränk, das den\nVerteidigungs-Wert eines Pokémon\ndauerhaft hebt."
    es: "Nutritiva bebida que aumenta la\nDefensa de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
  descriptions:
    jp_kana: "もたせると　すばやさが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめんわざが　あたって　しまう。"
    en: "A Pokémon hold item that cuts Speed.\nIt makes Flying-type and levitating\nholders susceptible to Ground moves."
    fr: "Objet à tenir réduisant la Vitesse. Rend\nles porteurs de type Vol et lévitant\nsensibles aux capacités de type Sol."
    it: "Strumento da far tenere a un Pokémon:\nriduce la Velocità. Pokémon sospesi e\nvolanti vulnerabili alle mosse terra."
    de: "Ein Item zum Tragen, das Flug-Pokémon\nanfällig für Attacken vom Typ Boden\nmacht. Senkt den Initiative-Wert."
    es: "Reduce la Velocidad. Los Pokémon que \nlevitan y los de tipo Volador se tornan \nsensibles a movimientos de Tierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
iron_plate:
  names:
    jp_kana: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
  descriptions:
    jp_kana: "はがねの　タイプの　せきばん。\nもたせると　はがねタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Steel-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Acier."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Stahl."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Acero.\nDebe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせて　ぶつりわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    en: "A Poffin ingredient. If held by a\nPokémon, and if a foe’s physical attack\nlands, the foe also takes damage."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie fait subir des dommages au lanceur\nd’une attaque physique qui a touché."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon, il nemico subirà danni\nse il suo attacco fisico va a segno."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nbewirkt die Beere beim Gegner Schaden,\nwenn dieser einen phys. Treffer landet."
    es: "Si la lleva un Pokémon cuando un\nenemigo lanza un ataque físico,\neste también recibirá daño."
    ko: "포핀의 재료.\n지닌 상태에서 물리 기술을 당했을 때\n상대에게도 데미지를 준다."
kasib_berry:
  names:
    jp_kana: カシブのみ
    en: Kasib Berry
    fr: Baie Sédra
    it: Baccacitrus
    de: Zitarzbeere
    es: Baya Drasi
    ko: 수불열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　ゴースト　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Ghost-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Spectre."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Spettro del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Geist. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Fantasma."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 고스트 기술을\n당했을 때 위력이 약해진다."
kebia_berry:
  names:
    jp_kana: ビアーのみ
    en: Kebia Berry
    fr: Baie Kébia
    it: Baccakebia
    de: Grarzbeere
    es: Baya Kebia
    ko: 으름열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　どく　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Poison-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Poison."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Veleno del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Gift. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Veneno."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 독 기술을\n당했을 때 위력이 약해진다."
kelpsy_berry:
  names:
    jp_kana: ネコブのみ
    en: Kelpsy Berry
    fr: Baie Alga
    it: Baccalga
    de: Setangbeere
    es: Baya Algama
    ko: 시마열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　こうげきの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base Attack stat."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leur stat Attaque de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne diminuisce l’Attacco."
    de: "Eine Knursp-Zutat. Verwendung macht\nein Pokémon freundlicher, reduziert\naber permanent den Angriffs-Wert."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero reduces su Ataque."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 공격의\n기초 포인트가 떨어진다."
kings_rock:
  names:
    jp_kana: おうじゃのしるし
    en: King’s Rock
    fr: Roche Royale
    it: Roccia Di Re
    de: King-Stein
    es: Roca del Rey
    ko: 왕의징표석
  descriptions:
    jp_kana: "もたせると　こうげきして\nダメージを　あたえたときに\nあいてを　　ひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nIt may cause the foe to flinch when\nthe holder inflicts damage."
    fr: "Objet à tenir. Peut apeurer l’ennemi\nlorsque le porteur lui inflige des\ndégâts."
    it: "Strumento da far tenere a un Pokémon.\nSe chi lo usa arreca danni, può far\ntentennare il nemico."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nkann Gegner zurückweichen lassen."
    es: "Puede hacer retroceder al enemigo\ncuando el Pokémon que la lleva le hiera."
    ko: "지니게 하면\n공격해서 데미지를 줄 때\n상대를 풀죽이기도 한다."
lagging_tail:
  names:
    jp_kana: こうこうのしっぽ
    en: Lagging Tail
    fr: Ralentiqueue
    it: Rallentocoda
    de: Schwerschwf.
    es: Cola Plúmbea
    ko: 느림보꼬리
  descriptions:
    jp_kana: "とても　おもたい　なにかの　しっぽ。\nもたせると　いつもより　こうどうが\nおそくなる。"
    en: "An item to be held by a Pokémon.\nIt is tremendously heavy and makes\nthe holder move slower than usual."
    fr: "Objet à tenir extrêmement lourd qui\nralentit le porteur."
    it: "Strumento da far tenere a un Pokémon.\nÈ tremendamente pesante e rende chi\nlo tiene più lento del normale."
    de: "Ein Item zum Tragen.\nEs ist immens schwer und senkt\ndie Geschwindigkeit des Trägers."
    es: "Es muy pesada y hace que el Pokémon\nque la lleva se mueva más lento de lo\nnormal."
    ko: "매우 무거운 무언가의 꼬리.\n지니게 하면 여느 때보다\n행동이 느려진다."
lansat_berry:
  names:
    jp_kana: サンのみ
    en: Lansat Berry
    fr: Baie Lansat
    it: Baccalangsa
    de: Lansatbeere
    es: Baya Zonlan
    ko: 랑사열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nきゅうしょに　あたりやすくなる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\ncritical-hit ratio in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte le taux de\ncritiques si nécessaire."
    it: "Si usa per fare i Poffin. Brutti colpi\npiù probabili se il Pokémon che la\ntiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere in einer Notlage die\nVolltrefferquote eines Pokémon."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, sube su capacidad\nde dar un golpe crítico en un apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n급소를 맞추기 쉬워진다."
lava_cookie:
  names:
    jp_kana: フエンせんべい
    en: Lava Cookie
    fr: Lava Cookie
    it: Lavottino
    de: Lavakeks
    es: Galleta Lava
    ko: 용암전병
  descriptions:
    jp_kana: "フエンめいぶつの　せんべい。\nポケモン　１ひきの　じょうたい\nいじょうを　かいふくする。"
    en: "Lavaridge Town’s local specialty.\nIt heals all the status problems of\none Pokémon."
    fr: "La spécialité de la ville de Vermilava.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Specialità tipica di Cuordilava.\nRisolve tutti i problemi di stato\ndi un Pokémon."
    de: "Eine Spezialität aus Bad Lavastadt,\ndie alle Statusprobleme eines\nPokémon heilt."
    es: "Dulce típico de Pueblo Lavacalda\nque cura todos los problemas de\nestado de un Pokémon."
    ko: "용암마을의 명물인 전병.\n포켓몬 1마리의\n상태 이상을 회복한다."
lax_incense:
  names:
    jp_kana: のんきのおこう
    en: Lax Incense
    fr: Encens Doux
    it: Distraroma
    de: Laxrauch
    es: Incie. Suave
    ko: 무사태평향로
  descriptions:
    jp_kana: "もたせると　おこうの　ふしぎな\nかおりが　あいてを　まどわせて\nわざが　めいちゅう　しにくくなる。"
    en: "An item to be held by a Pokémon. The\ntricky aroma of this incense lowers the\nfoe’s accuracy."
    fr: "Objet à tenir. Le parfum trompeur de\ncet encens baisse la précision de\nl’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nIl suo aroma insidioso riduce la\nprecisione del nemico."
    de: "Ein Item zum Tragen. Das\nkomplizierte Aroma senkt die\nGenauigkeit des Gegners."
    es: "Debe llevarlo un Pokémon. Su peculiar\naroma reduce la precisión del rival."
    ko: "지니게 하면 향로의 이상한\n향기가 상대를 혼란시켜\n기술이 명중하기 어려워진다."
leaf_stone:
  names:
    jp_kana: リーフのいし
    en: Leaf Stone
    fr: Pierreplante
    it: Pietrafoglia
    de: Blattstein
    es: Piedra Hoja
    ko: 리프의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nはっぱの　もようが　ある。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt has a leaf pattern."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nUne feuille est dessinée dessus."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon. Sopra\nvi appare l’immagine di una foglia."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er hat ein Blattmuster."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nTiene dibujada una hoja."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n잎사귀 무늬가 있다."
leek:
  names:
    jp_kana: ながねぎ
    en: Stick
    fr: Bâton
    it: Gambo
    de: Lauchstange
    es: Palo
    ko: 대파
  descriptions:
    jp_kana: "とても　ながくて　かたい　クキ。\nカモネギに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    en: "An item to be held by FARFETCH’D. It is\na very long and stiff stalk of leek\nthat boosts the critical-hit ratio."
    fr: "Objet à faire tenir à CANARTICHO.\nPoireau très long et solide qui monte\nson taux de critiques."
    it: "Strumento da far tenere a FARFETCH’D.\nGambo di porro lungo che migliora\nla probabilità di brutti colpi."
    de: "Ein Item, das von PORENTA getragen\nwerden kann. Diese lange Lauchstange\nerhöht die Volltrefferquote."
    es: "Es un puerro muy largo que suele llevar\nFARFETCH’D. Aumenta la probabilidad\nde que logre un golpe crítico."
    ko: "매우 길고 단단한 줄기.\n파오리에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
leftovers:
  names:
    jp_kana: たべのこし
    en: Leftovers
    fr: Restes
    it: Avanzi
    de: Überreste
    es: Restos
    ko: 먹다남은음식
  descriptions:
    jp_kana: "もたせると　ポケモンの　ＨＰが\nせんとうの　あいだ　すこしずつ\nかいふくする。"
    en: "An item to be held by a Pokémon.\nThe holder’s HP is gradually restored\nduring battle."
    fr: "Objet à tenir permettant de restaurer\nles PV du porteur graduellement durant\nle combat."
    it: "Strumento da far tenere a un Pokémon.\nFa recuperare gradualmente i PS a\nchi lo usa nella lotta."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nfüllt im Kampf stetig KP auf."
    es: "Restauran gradualmente los PS del\nPokémon que los lleva durante el\ncombate."
    ko: "지니게 하면 포켓몬의 HP가\n배틀을 하는 동안 조금씩\n회복된다."
lemonade:
  names:
    jp_kana: ミックスオレ
    en: Lemonade
    fr: Limonade
    it: Lemonsucco
    de: Limonade
    es: Limonada
    ko: 후르츠밀크
  descriptions:
    jp_kana: "とても　あまい　ジュース。\nポケモン　１ひきの　ＨＰを\n８０だけ　かいふくする。"
    en: "A very sweet drink.\nIt restores the HP of one Pokémon by\n80 points."
    fr: "Une boisson très sucrée.\nRestaure 80 PV à un Pokémon."
    it: "Bevanda molto dolce.\nRestituisce 80 PS ad un Pokémon."
    de: "Ein süßes Getränk, das die KP eines\nPokémon um 80 Punkte auffüllt."
    es: "Bebida dulce que restaura 80 PS\nde un Pokémon."
    ko: "매우 달콤한 쥬스.\n포켓몬 1마리의 HP를\n80만큼 회복한다."
leppa_berry:
  names:
    jp_kana: ヒメリのみ
    en: Leppa Berry
    fr: Baie Mepo
    it: Baccamela
    de: Jonagobeere
    es: Baya Zanama
    ko: 과사열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nＰＰを　１０だけ　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to restore a\nmove’s PP by 10."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie restaure\n10 PP d’une capacité."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\nrestituisce 10 PP a una mossa."
    de: "Eine Knursp-Zutat. Als Item füllt\ndie Beere die AP einer Attacke\neines Pokémon um 10 Punkte auf."
    es: "Ingrediente para Pokochos que los\nPokémon pueden llevar o usar para\nrestaurar 10 PP de un movimiento."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\nPP를 10만큼 회복한다."
liechi_berry:
  names:
    jp_kana: チイラのみ
    en: Liechi Berry
    fr: Baie Lichii
    it: Baccalici
    de: Lydzibeere
    es: Baya Lichi
    ko: 치리열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nじぶんの　こうげきが　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\nAttack stat in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte l’Attaque si\nnécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nl’Attacco se il Pokémon che la\ntiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere den Angriffs-Wert\neines Pokémon in einer Notlage."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, le subirá el\nAtaque en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n자신의 공격이 올라간다."
life_orb:
  names:
    jp_kana: いのちのたま
    en: Life Orb
    fr: Orbe Vie
    it: Assorbisfera
    de: Leben-Orb
    es: Vidasfera
    ko: 생명의구슬
  descriptions:
    jp_kana: "もたせると　こうげきする　たびに\nＨＰが　すこし　へってしまうが\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts the power of moves, but at\nthe cost of some HP on each hit."
    fr: "Objet à tenir augmentant la puissance\ndes capacités, mais qui dépense des\nPV à chaque coup."
    it: "Strumento da far tenere a un Pokémon.\nPotenzia le mosse, a scapito di alcuni\nPS per ogni colpo."
    de: "Ein Item zum Tragen.\nVerstärkt Attacken, aber jede\nAttacke kostet den Träger KP."
    es: "Potencia los movimientos, pero\nconsume PS con cada ataque.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 공격할 때마다\nHP가 조금씩 줄지만\n기술의 위력이 올라간다."
light_ball:
  names:
    jp_kana: でんきだま
    en: Light Ball
    fr: Ballelumière
    it: Elettropalla
    de: Kugelblitz
    es: Bolaluminosa
    ko: 전기구슬
  descriptions:
    jp_kana: "ピカチュウに　もたせると\nこうげきと　とくこうの　いりょくが\nあがる　ふしぎな　たま。"
    en: "An item to be held by PIKACHU.\nIt is a puzzling orb that raises\nthe Attack and Sp. Atk stat."
    fr: "Objet à faire tenir à PIKACHU. Orbe\nénigmatique qui monte son Attaque et\nson Atq. Spé."
    it: "Strumento da far tenere a PIKACHU.\nSfera insolita che aumenta l’Attacco e\nl’Attacco Speciale."
    de: "Ein Item, das von PIKACHU\ngetragen werden kann. Es erhöht\nden Angriffs-Wert und Spezial-Angriff."
    es: "Asombrosa esfera que debe llevar\nPIKACHU y que aumenta el Ataque\ny el Ataque Especial."
    ko: "피카츄에게 지니게 하면\n공격과 특수공격의 위력이\n올라가는 이상한 구슬."
light_clay:
  names:
    jp_kana: ひかりのねんど
    en: Light Clay
    fr: Lumargile
    it: Creta Luce
    de: Lichtlehm
    es: Refleluz
    ko: 빛의점토
  descriptions:
    jp_kana: "もたせた　ポケモンが　ひかりのかべや\nリフレクターを　つかったとき\nいつもよりも　ながく　のこる。"
    en: "A Pokémon hold item that extends the\nduration of barrier moves like Light\nScreen and Reflect used by the holder."
    fr: "Objet à tenir augmentant la durée de\ncapacités barrières telles que\nMur Lumière et Protection."
    it: "Strumento da far tenere a un Pokémon.\nAllunga la durata delle mosse barriera\ncome Schermoluce e Riflesso."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von\nLichtschild, Reflektor etc."
    es: "Prolonga la duración de barreras como\nReflejo y Pantalla de Luz. Debe llevarla\nun Pokémon."
    ko: "지니게 한 포켓몬이 빛의장막이나\n리플렉터를 사용했을 때\n여느 때보다 긴 시간동안 지속된다."
loot_sack:
  names:
    jp_kana: たからぶくろ
    en: Loot Sack
    fr: Sac Butin
    it: Bottinosacca
    de: Beutesack
    es: Saca Botín
    ko: 보물주머니
  descriptions:
    jp_kana: "たんこうで　てにいれた\nたからものを　しまっておける\nおおきくて　じょうぶな　ふくろ。"
    en: "A sturdy, spacious bag that is used\nto carry loot obtained in the coal\nmine."
    fr: "Grand sac robuste utilisé pour\ntransporter le butin obtenu dans la\nmine de charbon."
    it: "Una sacca spaziosa e resistente\nusata per trasportare il bottino\nottenuto nella Cava."
    de: "Ein fester Sack. Wird verwendet,\num Beute aus der Kohlemine\nzu transportieren."
    es: "Una saca grande y resistente utilizada\npara transportar el botín reunido en\nla mina de carbón."
    ko: "탄갱에서 손에 넣은\n보물을 보관해둘 수 있는\n크고 튼튼한 주머니다."
luck_incense:
  names:
    jp_kana: こううんのおこう
    en: Luck Incense
    fr: Encens Veine
    it: Fortunaroma
    de: Glücksrauch
    es: Incie. Duplo
    ko: 행운의향로
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles a battle’s prize money if\nthe holding Pokémon joins in."
    fr: "Objet à tenir doublant l’argent gagné si\nle porteur se joint au combat."
    it: "Strumento da far tenere a un Pokémon.\nRaddoppia il premio ottenuto nella lotta\nse il Pokémon che lo tiene vi partecipa."
    de: "Ein Item zum Tragen.\nEs bringt doppeltes Preisgeld, wenn\nder Träger am Kampf teilnimmt."
    es: "Incienso de aroma exótico. Si el\nPokémon que lo lleva participa en\nun combate, duplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
lucky_egg:
  names:
    jp_kana: しあわせタマゴ
    en: Lucky Egg
    fr: Oeuf Chance
    it: Fortunuovo
    de: Glücks-Ei
    es: Huevo Suerte
    ko: 행복의알
  descriptions:
    jp_kana: "しあわせが　つまった　タマゴ。\nもたせた　ポケモンは　もらえる\nけいけんちが　すこし　ふえる。"
    en: "An item to be held by a Pokémon.\nIt is an egg filled with happiness that\nearns extra Exp. Points in battle."
    fr: "Objet à tenir. Oeuf rempli de joie qui\naugmente le nombre de points Exp.\ngagnés au combat."
    it: "Strumento da far tenere a un Pokémon.\nUovo pieno di felicità che aumenta\ni Punti Esp. in lotta."
    de: "Ein Item (Tragen), das mit Glück\ngefüllt ist und für zusätzliche\nE.-Punkte im Kampf sorgt."
    es: "Es un huevo lleno de felicidad que te\nhará ganar Puntos de Exp. extra en\ncombate. Debe llevarlo un Pokémon."
    ko: "행복이 가득한 알.\n지니게 한 포켓몬은 받을 수 있는\n경험치가 조금 늘어난다."
lucky_punch:
  names:
    jp_kana: ラッキーパンチ
    en: Lucky Punch
    fr: Poing Chance
    it: Fortunpugno
    de: Lucky Punch
    es: Puño Suerte
    ko: 럭키펀치
  descriptions:
    jp_kana: "こううんを　よぶ　グローブ。\nラッキーに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    en: "An item to be held by CHANSEY. It is a\npair of gloves that boosts CHANSEY’s\ncritical-hit ratio."
    fr: "Objet à faire tenir à LEVEINARD. Paire\nde gants montant son taux de critiques."
    it: "Strumento da far tenere a CHANSEY.\nGuanti che aumentano la\nprobabilità di brutti colpi."
    de: "Ein Item, das von CHANEIRA getragen\nwerden kann. Diese Handschuhe erhöhen\ndie Volltrefferrate von CHANEIRA."
    es: "Debe llevarlo CHANSEY. Potencia su\níndice de golpe crítico."
    ko: "행운을 부르는 글러브다.\n럭키에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
lum_berry:
  names:
    jp_kana: ラムのみ
    en: Lum Berry
    fr: Baie Prine
    it: Baccaprugna
    de: Prunusbeere
    es: Baya Ziuela
    ko: 리샘열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nじょうたい　いじょうを　かいふく。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\nany status problem."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie soigne\ntous les problèmes de statut."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore ri-\nsolve qualsiasi problema di stato."
    de: "Eine Knursp-Zutat. Als Item hebt\ndie Beere die Statusprobleme\neines Pokémon auf."
    es: "Ingrediente para Pokochos que los\nPokémon pueden llevar o usar para\nrecuperarse de problemas de estado."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n상태 이상을 회복한다."
lunar_feather:
  names:
    jp_kana: みかづきのはね
    en: Lunar Wing
    fr: Lun’Aile
    it: Alalunare
    de: Lunarfeder
    es: Pluma Lunar
    ko: 초승달날개
  descriptions:
    jp_kana: "つきのような　かがやきを　はなつ\nはね。　あくむを　ふりはらう　ちからを\nひめていると　つたえられている。"
    en: "A feather that glows like the moon.\nIt is said to possess the power to\ndispel nightmares."
    fr: "Plume qui brille comme la lune. On dit\nqu’elle a le pouvoir de chasser les\ncauchemars."
    it: "Piuma che brilla come la luna.\nPare che possieda il potere di\nallontanare gli incubi."
    de: "Diese Feder leuchtet wie der Mond.\nKann angeblich Alpträume vertreiben."
    es: "Pluma que brilla como la Luna. Se dice\nque tiene el poder de disipar pesadillas."
    ko: "달처럼 반짝임을 발산하는 날개.\n악몽을 뿌리치는 힘을\n간직하고 있다고 전해진다."
lustrous_orb:
  names:
    jp_kana: しらたま
    en: Lustrous Orb
    fr: Orbe Perlé
    it: Splendisfera
    de: Weiß-Orb
    es: Lustresfera
    ko: 백옥
  descriptions:
    jp_kana: "パルキアに　もたせると　ドラゴンと\nみずタイプの　わざの　いりょくが\nあがる　うつくしく　かがやく　たま。"
    en: "A beautifully glowing orb to be held by\nPALKIA. It boosts the power of Dragon-\nand Water-type moves."
    fr: "Bel orbe luisant destiné à PALKIA.\nAugmente la puissance des capacités de\ntype Dragon ou Eau."
    it: "Sfera splendente da far tenere\na PALKIA. Potenzia le mosse\ndi tipo Drago e Acqua."
    de: "Ein hell leuchtender Orb.\nVerstärkt Attacken vom Typ Drachen\nund Wasser, wenn PALKIA ihn trägt."
    es: "Una bonita esfera que potencia los\nataques de tipo Dragón y Agua.\nDebe llevarla PALKIA."
    ko: "펄기아에게 지니게 하면 드래곤과\n물타입 기술의 위력이 올라가는\n아름답게 반짝이는 구슬."
luxury_ball:
  names:
    jp_kana: ゴージャスボール
    en: Luxury Ball
    fr: Luxe Ball
    it: Chic Ball
    de: Luxusball
    es: Lujo Ball
    ko: 럭셔리볼
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nとても　なつきやすくなる\nいごこちの　いい　ボール。"
    en: "A comfortable Poké Ball that makes a\ncaught wild Pokémon quickly grow\nfriendly."
    fr: "Une Poké Ball pratique qui permet de\ngagner rapidement l’amitié d’un Pokémon\nsauvage attrapé."
    it: "Poké Ball utile che rende\npiù amichevoli i Pokémon\nselvatici catturati."
    de: "Ein behaglicher Ball, der Pokémon\nveranlasst, nach dem Fang schneller\nfreundlicher zu werden."
    es: "Acogedora Poké Ball que hace más\namistosos a los Pokémon salvajes\ncapturados."
    ko: "잡은 야생 포켓몬이\n매우 친밀해지기 쉬운\n편안한 볼."
macho_brace:
  names:
    jp_kana: きょうせいギプス
    en: Macho Brace
    fr: Brac. Macho
    it: Crescicappa
    de: Machoband
    es: Brazal Firme
    ko: 교정깁스
  descriptions:
    jp_kana: "かたくて　おもい　ギプス。\nもたせると　すばやさは　さがるが\nふつうより　つよく　そだちやすい。"
    en: "An item to be held by a Pokémon. It is\na stiff and heavy brace that promotes\nstrong growth but lowers Speed."
    fr: "Objet à tenir. C’est un bracelet dur et\nlourd qui favorise la croissance, mais\nbaisse la Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAttrezzo duro e pesante che favorisce\nla crescita, ma riduce la Velocità."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann.\nFördert Wachstum, senkt Initiative."
    es: "Sólido y pesado brazal que fomenta\nel crecimiento pero reduce la\nVelocidad. Debe llevarlo un Pokémon."
    ko: "단단하고 무거운 깁스.\n지니게 하면 스피드는 떨어지지만\n여느 때보다 강하게 키우기 쉽다."
magma_stone:
  names:
    jp_kana: かざんのおきいし
    en: Magma Stone
    fr: Pierre Magma
    it: Magmapietra
    de: Magmastein
    es: Piedra Magma
    ko: 화산의돌
  descriptions:
    jp_kana: "しゃくねつの　マグマの　ねつでとけた\nがんせきが　かたまって　できたもの。\nなかに　マグマが　のこっている。"
    en: "A stone formed when boulders melted in\nintensely hot magma, then hardened.\nMagma remains sealed inside."
    fr: "Pierre formée à partir de roche en\nfusion solidifiée. Elle contient du\nmagma."
    it: "Pietra che si è formata in seguito\nad un’intensa colata lavica. Il magma\nè rimasto intrappolato al suo interno."
    de: "Ein Stein aus gehärtetem Magma.\nSein innerer Kern ist noch flüssig\nund heiß."
    es: "Formada a partir de magma enfriado\ny endurecido. Aún hay magma\nlíquido en su interior."
    ko: "이글거리는 마그마의 열로 녹은\n암석이 굳어져 생긴 것.\n안에는 마그마가 남아 있다."
magmarizer:
  names:
    jp_kana: マグマブースター
    en: Magmarizer
    fr: Magmariseur
    it: Magmatore
    de: Magmaisierer
    es: Magmatizador
    ko: 마그마부스터
  descriptions:
    jp_kana: "とてつもない　マグマの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    en: "A box packed with a tremendous\namount of magma energy.\nIt is loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie magmatique. Appréciée d’un\ncertain Pokémon."
    it: "Scatola strapiena di energia lavica. \nUn Pokémon in particolare adora \nquesto strumento."
    de: "Eine Schachtel voller Magmaenergie.\nDas Lieblingsstück eines bestimmten\nPokémon."
    es: "Esta caja contiene una enorme\ncantidad de energía magmática.\nAlgunos Pokémon lo adoran."
    ko: "엄청난 마그마의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
magnet:
  names:
    jp_kana: じしゃく
    en: Magnet
    fr: Aimant
    it: Calamita
    de: Magnet
    es: Imán
    ko: 자석
  descriptions:
    jp_kana: "きょうりょくな　じしゃく。\nもたせると　でんきタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a powerful magnet that boosts\nthe power of Electric-type moves."
    fr: "Objet à tenir. Aimant puissant montant\nla puissance des capacités de type\nElectrik."
    it: "Strumento da far tenere a un Pokémon.\nPotente magnete che potenzia\nle mosse di tipo Elettro."
    de: "Ein Item zum Tragen, dessen\nmagnetische Kraft Attacken\nvom Typ Elektro verstärkt."
    es: "Debe llevarlo un Pokémon. Su potente\nmagnetismo fortalece los ataques de\ntipo Eléctrico."
    ko: "강력한 자석.\n지니게 하면 전기타입\n기술의 위력이 올라간다."
mago_berry:
  names:
    jp_kana: マゴのみ
    en: Mago Berry
    fr: Baie Mago
    it: Baccamango
    de: Magobeere
    es: Baya Ango
    ko: 마고열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nピンチのとき　ＨＰを　かいふくするが\nこんらん　することも　ある。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores the user’s HP in\na pinch, but may also cause confusion."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie restaure les PV en cas de besoin,\nmais elle peut rendre confus."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon in difficoltà, restituisce PS,\nma può causare confusione."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere die KP eines Pokémon\nauf, bewirkt aber eventuell Verwirrung."
    es: "Ingrediente para Pokochos. Restaura\nlos PS del Pokémon que la usa en\nun apuro, pero puede causar confusión."
    ko: "포핀의 재료. 지니게 하면\n위급할 때 HP를 회복하지만\n혼란에 빠질 수도 있다."
magost_berry:
  names:
    jp_kana: ゴスのみ
    en: Magost Berry
    fr: Baie Mangou
    it: Baccagostan
    de: Magostbeere
    es: Baya Aostan
    ko: 고스티열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nゴスが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nMagost Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Magostbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Aostan."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n고스티가 자란다."
master_ball:
  names:
    jp_kana: マスターボール
    en: Master Ball
    fr: Master Ball
    it: Master Ball
    de: Meisterball
    es: Master Ball
    ko: 마스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンを　かならず\nつかまえることが　できる\nさいこう　せいのうの　ボール。"
    en: "The best Ball with the ultimate level of\nperformance. It will catch any wild\nPokémon without fail."
    fr: "Assurément la Ball la plus performante.\nElle permet de capturer à coup sûr un\nPokémon sauvage."
    it: "La Ball dalle prestazioni migliori:\ncattura qualsiasi Pokémon\nselvatico senza mai fallire."
    de: "Der beste Ball!\nDamit fängst du garantiert\njedes wilde Pokémon."
    es: "La Poké Ball definitiva. Atrapa a\ncualquier Pokémon salvaje y no\nfalla nunca."
    ko: "야생 포켓몬을 반드시\n잡을 수 있는\n최고 성능의 볼."
max_elixir:
  names:
    jp_kana: ピーピーマックス
    en: Max Elixir
    fr: Max Elixir
    it: Elisir Max
    de: Top-Elixier
    es: Elixir Máx.
    ko: PP맥스
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\nすべて　かいふくする。"
    en: "It fully restores the PP of all the\nmoves learned by the targeted\nPokémon."
    fr: "Restaure tous les PP de toutes\nles capacités d’un Pokémon."
    it: "Restituisce tutti i PP a ogni mossa\nimparata dal Pokémon."
    de: "Füllt alle AP aller Attacken eines\nPokémon vollständig auf."
    es: "Restaura completamente los PP de\ntodos los movimientos aprendidos\npor el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n모두 회복한다."
max_ether:
  names:
    jp_kana: ピーピーリカバー
    en: Max Ether
    fr: Huile Max
    it: Etere Max
    de: Top-Äther
    es: Éter Máx.
    ko: PP회복
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\nすべて　かいふくする。"
    en: "It fully restores the PP of a single\nselected move that has been learned\nby the target Pokémon."
    fr: "Restaure tous les PP d’une capacité\nsélectionnée."
    it: "Restituisce tutti i PP a una mossa\na scelta che è stata imparata\ndal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke\neines Pokémon vollständig auf."
    es: "Restaura completamente los PP del\nmovimiento que elijas de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n모두 회복한다."
max_potion:
  names:
    jp_kana: まんたんのくすり
    en: Max Potion
    fr: Potion Max
    it: Pozione Max
    de: Top-Trank
    es: Máx. Poción
    ko: 풀회복약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\nすべて　かいふくする。"
    en: "A spray-type medicine for wounds.\nIt completely restores the HP of a\nsingle Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure tous les PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce tutti i PS ad\nun Pokémon."
    de: "Hilft bei Wunden.\nFüllt die KP eines Pokémon\nvollständig wieder auf."
    es: "Medicina en spray que cura heridas\ny restaura todos los PS de un\nPokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n모두 회복한다."
max_repel:
  names:
    jp_kana: ゴールドスプレー
    en: Max Repel
    fr: Max Repousse
    it: Repell. Max
    de: Top-Schutz
    es: Máx. Repel
    ko: 골드스프레이
  descriptions:
    jp_kana: "２５０ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 250 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 250 pas."
    it: "Strumento che evita l’incontro con\nPokémon selvatici deboli per\n250 passi dopo l’utilizzo."
    de: "Hält 250 Schritte lang schwache \nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 250 pasos."
    ko: "250보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
max_revive:
  names:
    jp_kana: げんきのかたまり
    en: Max Revive
    fr: Rappel Max
    it: Revital. Max
    de: Top-Beleber
    es: Máx. Revivir
    ko: 기력의덩어리
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　１ひきの　ＨＰを\nすべて　かいふくする。"
    en: "A medicine that revives a fainted\nPokémon. It fully restores the\nPokémon’s HP."
    fr: "Un médicament qui ranime un Pokémon\nK.O. et restaure tous ses PV."
    it: "Rimedio che rianima un Pokémon\nesausto ridandogli tutti i PS."
    de: "Eine Medizin, die ein kampfunfähiges\nPokémon wiederbelebt. Die KP werden\nvollständig wiederhergestellt."
    es: "Medicina que reanima a un Pokémon\ndebilitado y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 1마리의 HP를\n모두 회복한다."
meadow_plate:
  names:
    jp_kana: みどりのプレート
    en: Meadow Plate
    fr: Plaque Herbe
    it: Lastraprato
    de: Wiesentafel
    es: Tabla Pradal
    ko: 초록플레이트
  descriptions:
    jp_kana: "くさの　タイプの　せきばん。\nもたせると　くさタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Grass-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Plante."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Erba."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Pflanze."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Planta.\nDebe llevarla un Pokémon."
    ko: "풀타입의 석판.\n지니게 하면 풀타입\n기술의 위력이 강해진다."
member_card:
  names:
    jp_kana: メンバーズカード
    en: Member Card
    fr: Carte Membre
    it: Scheda Soci
    de: Mitgl.Karte
    es: Carné Socio
    ko: 멤버스카드
  descriptions:
    jp_kana: "ミオシティの　やどやに　はいれる\nカード。　なぜか　５０ねんほどまえの\nひづけが　きざまれている。"
    en: "A card needed for entering the inn in\nCanalave City. Oddly, the last date\nmarked on it was 50 years ago."
    fr: "Carte nécessaire pour entrer à\nl’auberge de Joliberges. Le dernier\ntampon date d’il y a 50 ans!"
    it: "Scheda necessaria per entrare\nnella locanda di Canalipoli. L’ultimo\ntimbro risale a 50 anni fa."
    de: "Eine Eintrittskarte für den Gasthof\nin Fleetburg. Sie ist über 50 Jahre\nalt..."
    es: "Necesario para entrar en la posada de\nCiudad Canal. Es extraño pero la última\nfecha registrada es de hace 50 años."
    ko: "운하시티의 여관에 들어갈 수 있는\n카드. 어찌된 일인지 50년 정도 전의\n날짜가 새겨져 있다."
mental_herb:
  names:
    jp_kana: メンタルハーブ
    en: Mental Herb
    fr: Herbe Mental
    it: Mentalerba
    de: Mentalkraut
    es: Hier. Mental
    ko: 멘탈허브
  descriptions:
    jp_kana: "もたせた　ポケモンが　メロメロの\nじょうたいに　なったときに\nいちどだけ　かいふくする。"
    en: "An item to be held by a Pokémon. It\nsnaps the holder out of infatuation.\nIt can be used only once."
    fr: "Objet à tenir qui annule l’attirance\nd’un Pokémon. Ne peut être utilisé\nqu’une fois."
    it: "Strumento da far tenere a un Pokémon.\nLibera chi lo usa dall’attrazione.\nPuò essere usato una volta sola."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nerlöst Pokémon von Anziehung."
    es: "El Pokémon que la lleve se libera\ndel enamoramiento. Solo puede\nusarse una vez."
    ko: "지니게 한 포켓몬은\n헤롱헤롱 상태가 되었을 때\n한 번만 회복한다."
metal_coat:
  names:
    jp_kana: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcoperta
    de: Metallmantel
    es: Rev.metálico
    ko: 금속코트
  descriptions:
    jp_kana: "とくしゅな　きんぞくの　まく。\nもたせると　はがねタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a special metallic film that ups\nthe power of Steel-type moves."
    fr: "Objet à tenir. Pellicule métallique\nspéciale qui monte la puissance des\ncapacités de type Acier."
    it: "Strumento da far tenere a un Pokémon.\nSpeciale pellicola metallica che\npotenzia le mosse di tipo Acciaio."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nverstärkt Attacken vom Typ Stahl."
    es: "Película metálica que fortalece los\nataques de tipo Acero. Debe llevarlo\nun Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
metal_powder:
  names:
    jp_kana: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Pol.metálico
    ko: 금속파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　ぼうぎょが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    en: "An item to be held by DITTO.\nExtremely fine yet hard, this odd\npowder boosts the Defense stat."
    fr: "Objet à faire tenir à METAMORPH. Cette\npoudre étrange, très fine mais\nrésistante, booste sa Défense."
    it: "Strumento da far tenere a DITTO.\nStrana polvere finissima e al tempo\nstesso dura che migliora la Difesa."
    de: "Ein Item, das von DITTO getragen\nwerden kann. Es erhöht seinen\nVerteidigungs-Wert."
    es: "Debe llevarlo DITTO. Es un polvo muy\nfino, pero a la vez resistente, que\naumentará su Defensa."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
metronome:
  names:
    jp_kana: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
  descriptions:
    jp_kana: "もたせると　おなじわざを　れんぞくで\nつかったとき　いりょくが　あがる。\nやめると　いりょくは　もどる。"
    en: "A Pokémon hold item that boosts a move\nused consecutively. Its effect is\nreset if another move is used."
    fr: "Objet à tenir boostant une capacité\nutilisée à répétition. L’effet s’annule\nsi une autre capacité est utilisée."
    it: "Strumento da far tenere a un Pokémon\nche potenzia una mossa usata più volte.\nSi annulla se si usa un’altra mossa."
    de: "Ein Item zum Tragen.\nVerstärkt eine Attacke, je öfter sie\nununterbrochen ausgeführt wird."
    es: "Potencia un movimiento que se use de\nforma consecutiva. Pero el efecto se\npierde si se emplea otro movimiento."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
micle_berry:
  names:
    jp_kana: ミクルのみ
    en: Micle Berry
    fr: Baie Micle
    it: Baccaracolo
    de: Wunfrubeere
    es: Baya Lagro
    ko: 미클열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき　いちどだけ\nわざの　めいちゅうりつが　あがる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it raises the accuracy of a\nmove just once in a pinch."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie augmente une fois la précision\nd’une capacité si nécessaire."
    it: "Si usa per fare i Poffin. Aumenta la\nprecisione di una mossa una volta se\nil Pokémon che la tiene è in difficoltà."
    de: "Knursp-Zutat. Als Item (Tragen) hebt\ndie Beere die Genauigkeit, wenn sich\ndas Pokémon in einer Notlage befindet."
    es: "Cuando la lleve un Pokémon, le subirá\nla precisión de un movimiento en un\nmomento de apuro. Ing. para Pokochos."
    ko: "포핀의 재료.\n지니게 하면 위급할 때 한 번만\n기술의 명중률이 올라간다."
mind_plate:
  names:
    jp_kana: ふしぎのプレート
    en: Mind Plate
    fr: Plaquesprit
    it: Lastramente
    de: Hirntafel
    es: Tabla Mental
    ko: 이상한플레이트
  descriptions:
    jp_kana: "エスパーの　タイプの　せきばん。\nもたせると　エスパータイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Psychic-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Psy."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Psico."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Psycho."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Psíquico.\nDebe llevarla un Pokémon."
    ko: "에스퍼타입의 석판.\n지니게 하면 에스퍼타입\n기술의 위력이 강해진다."
miracle_seed:
  names:
    jp_kana: きせきのタネ
    en: Miracle Seed
    fr: Grain Miracl
    it: Miracolseme
    de: Wundersaat
    es: Sem. Milagro
    ko: 기적의씨
  descriptions:
    jp_kana: "せいめいが　やどる　タネ。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a seed imbued with life that ups\nthe power of Grass-type moves."
    fr: "Objet à tenir. Graine remplie de vie qui\nmonte la puissance des capacités de\ntype Plante."
    it: "Strumento da far tenere a un Pokémon.\nSeme intriso di vita che potenzia\nle mosse di tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen\nvoller Lebenskraft, der Attacken\nvom Typ Pflanze verstärkt."
    es: "Debe llevarla un Pokémon. La vitalidad\nde la semilla fortalece los ataques de\ntipo Planta."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
  descriptions:
    jp_kana: "えいよう　まんてんの　ミルク。\nポケモン　１ひきの　ＨＰを\n１００だけ　かいふくする。"
    en: "Milk with a very high nutrition content.\nIt restores the HP of one Pokémon by\n100 points."
    fr: "Un lait très nourrissant.\nRestaure 100 PV à un Pokémon."
    it: "Latte ricco di sostanze nutrienti.\nRestituisce 100 PS ad un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die\ndie KP eines Pokémon um 100 Punkte\nwieder auffüllt."
    es: "Leche de alto valor nutritivo que\nrestaura 100 PS de un Pokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
moon_stone:
  names:
    jp_kana: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nよぞらのように　くろい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as black as the night sky."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est noire comme la nuit."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ nera come il cielo di notte."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist schwarz wie die Nacht."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs negra como el azabache."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
mosaic_mail:
  names:
    jp_kana: モザイクメール
    en: Mosaic Mail
    fr: Lettremosaïk
    it: Mess. Iride
    de: Mosaikbrief
    es: Car. Mosaico
    ko: 모자이크메일
  descriptions:
    jp_kana: "あざやかな　にじいろ　もようが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a vivid\nrainbow pattern.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné d’un motif\nmulticolore éclatant.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera decorata con i\ncolori dell’arcobaleno. Un Pokémon\npuò tenerla e consegnarla."
    de: "Das Briefpapier erstrahlt in\nden Farben des Regenbogens.\nGib es einem Pokémon mit."
    es: "Carta con un mosaico de arco iris.\nHaz que la entregue un Pokémon."
    ko: "선명한 무지개 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    en: Muscle Band
    fr: Band. Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\nもたせると　ぶつりわざの\nいりょくが　すこし　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a headband that slightly boosts\nthe power of physical moves."
    fr: "Objet à tenir. Bandeau augmentant\nlégèrement la puissance des attaques\nphysiques."
    it: "Strumento da far tenere a un Pokémon.\nFascia che potenzia di poco\ngli attacchi fisici."
    de: "Ein Item zum Tragen.\nDieses Stirnband verstärkt\nphysische Attacken."
    es: "Cinta de pelo que aumenta ligeramente\nla potencia de los movimientos físicos.\nDebe llevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
mystic_water:
  names:
    jp_kana: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua Magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
  descriptions:
    jp_kana: "しずくの　かたちの　ほうせき。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a teardrop-shaped gem that ups\nthe power of Water-type moves."
    fr: "Objet à tenir. Gemme en forme de goutte\nd’eau montant la puissance des\ncapacités de type Eau."
    it: "Strumento da far tenere a un Pokémon.\nGemma a forma di goccia che\npotenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränen-\nförmiger Edelstein, der Attacken\nvom Typ Wasser verstärkt."
    es: "Gema con forma de lágrima que\nfortalece los ataques de tipo Agua.\nDebe llevarla un Pokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
nanab_berry:
  names:
    jp_kana: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nナナが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nNanab Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Nanabbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Latano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n나나가 자란다."
nest_ball:
  names:
    jp_kana: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
  descriptions:
    jp_kana: "つかまえる　やせいの　ポケモンが\nよわいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on weaker\nPokémon in the wild."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nPokémon les plus faibles."
    it: "Poké Ball un po’ diversa,\nparticolarmente efficace sui\nPokémon selvatici più deboli."
    de: "Ein Ball, dessen Erfolgsquote\nbesonders bei schwächeren\nPokémon sehr hoch ist."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nsalvajes de menor nivel."
    ko: "잡을 수 있는 야생 포켓몬이\n약할수록 잡기 쉬운\n조금 특이한 볼."
net_ball:
  names:
    jp_kana: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 넷트볼
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Water- and\nBug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nPokémon Eau ou Insecte."
    it: "Poké Ball un po’ diversa, particolar-\nmente efficace sui Pokémon di tipo\nAcqua e Coleottero."
    de: "Ein Ball, der sich besonders gut eignet,\num Wasser- und Käfer-Pokémon\nzu fangen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\nde tipo Agua y Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
never_melt_ice:
  names:
    jp_kana: とけないこおり
    en: NeverMeltIce
    fr: Glacéternel
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
  descriptions:
    jp_kana: "ねつを　よせつけない　こおり。\nもたせると　こおりタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a piece of ice that repels heat\nand boosts Ice-type moves."
    fr: "Objet à tenir. Morceau de glace qui\nréfléchit la chaleur et monte la\npuissance des capacités de type Glace."
    it: "Strumento da far tenere a un Pokémon.\nPezzo di ghiaccio che respinge il calore\ne potenzia le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis,\ndas Hitze fernhält und Attacken\nvom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor\ny fortalece los ataques de tipo Hielo. \nDebe llevarlo un Pokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
nomel_berry:
  names:
    jp_kana: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nノメルが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nNomel Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Tronzibeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Monli."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n노멜이 자란다."
nugget:
  names:
    jp_kana: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきん　せいの　たま。\nショップで　たかく　うれる。"
    en: "A nugget of pure gold that gives off a\nlustrous gleam. It can be sold at a\nhigh price to shops."
    fr: "Pépite d’or pur qui brille\nmagnifiquement. Peut être vendue à bon\nprix aux magasins."
    it: "Pepita d’oro puro dal luccichio\nsfavillante. Si può vendere\na caro prezzo ai negozi."
    de: "Ein Nugget aus purem Gold, das\neinen schimmernden Glanz besitzt. \nEs ist von großem Wert."
    es: "Pepita de oro puro que desprende un\nbrillo espectacular. Puede venderse\nmuy cara en las tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Pr Oak
    ko: 오박사의편지
  descriptions:
    jp_kana: "オーキドはかせ　からの　てがみ。\nなかには　２２４ばんどうろに\nきてほしいと　かかれている。"
    en: "A letter from Prof. Oak.\nWritten in it is a request for you to\ngo to Rt. 224."
    fr: "Lettre du Prof. Chen vous demandant de\nvous rendre sur la Route 224."
    it: "Lettera da parte del Prof. Oak con\nla richiesta di dirigerti verso\nil Percorso 224."
    de: "Ein Brief von Prof. Eich.\nEr bittet dich, zur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se\nte pide que vayas a la Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와달라고 적혀 있다."
occa_berry:
  names:
    jp_kana: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　ほのお　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Fire-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Feu."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Fuoco del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Feuer. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Fuego."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 불꽃 기술을\n당했을 때 위력이 약해진다."
odd_incense:
  names:
    jp_kana: あやしいおこう
    en: Odd Incense
    fr: Bizar.Encens
    it: Bizzoaroma
    de: Schrägrauch
    es: Incie. Raro
    ko: 괴상한향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Psychic-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance des\nattaques de type Psy."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut verstärkt Attacken vom\nTyp Psycho."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Psíquico. Debe\nllevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
odd_keystone:
  names:
    jp_kana: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: P. Espíritu
    ko: 쐐기돌
  descriptions:
    jp_kana: "これがないと　いしのとうが\nくずれてしまう　だいじないし。\nときどき　いしから　こえがきこえる。"
    en: "A vital item that is needed to keep a\nstone tower from collapsing. Voices\ncan be heard from it occasionally."
    fr: "Objet très important qui empêche une\ntour en pierre de s’écrouler. Des\nbruits de voix en sortent parfois."
    it: "Strumento importante che impedisce\nil crollo di un pozzo di pietra. A volte\ndal suo interno provengono delle voci."
    de: "Ein wichtiges Item, mit dem\nein Steinturm repariert werden\nkann."
    es: "Vital para impedir que una torre de\npiedra se derrumbe. A veces se\noyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
old_amber:
  names:
    jp_kana: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra Antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
  descriptions:
    jp_kana: "こだい　ポケモンの　いでんしが\nとじこめられている　コハク。\nあかみを　おびて　すけている。"
    en: "A piece of amber that contains the\ngenetic material of an ancient Pokémon.\nIt is clear with a reddish tint."
    fr: "Un morceau d’ambre contenant\nl’ADN d’un ancien Pokémon. Il est\nde couleur jaune."
    it: "Pezzo di ambra che contiene il materiale\ngenetico di un Pokémon antico.\nÈ chiara e di colore giallastro."
    de: "Ein Stück Bernstein, in dem die Gene\neines antiken Pokémon enthalten\nsind. Es ist durchsichtig!"
    es: "Fragmento de ámbar que contiene \ninformación genética de un Pokémon\nancestral. Es de color amarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
old_charm:
  names:
    jp_kana: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Arcamuleto
    de: Talisman
    es: Talismán
    ko: 고대의부적
  descriptions:
    jp_kana: "カンナギタウンの　ちょうろうに\nとどける　おおむかしの　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made of\nPokémon bones to be taken to the elder\nof Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de\nPokémon à porter à la doyenne de\nCélestia."
    it: "Antico portafortuna fatto di ossa\ndi Pokémon da portare all’anziana\ndi Memoride."
    de: "Ein antiker Glücksbringer. Soll der\nÄltesten in Elyses überbracht werden."
    es: "Está hecho con huesos de Pokémon y\ntrae buena suerte. Hay que llevarlo a\nla anciana de Pueblo Caelestis."
    ko: "봉신마을의 장로에게\n전해줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
old_gateau:
  names:
    jp_kana: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce Gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
  descriptions:
    jp_kana: "ハクタイの　かくれた　めいぶつ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    en: "Old Chateau’s hidden specialty.\nIt heals all the status problems of a\nsingle Pokémon."
    fr: "Spécialité du Vieux Château. Il\nsoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di\nun Pokémon."
    de: "Eine unbekannte Spezialität.\nSie behebt alle Statusprobleme\neines Pokémon."
    es: "Especialidad de la Vieja Mansión.\nCura los problemas de estado de\nun Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
old_rod:
  names:
    jp_kana: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Amo Vecchio
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une vieille canne usée. Utilisez-la pour\npêcher des Pokémon sauvages dans\nles points d’eau."
    it: "Amo vecchio e rovinato.\nSi usa per pescare Pokémon selvatici\nin qualsiasi specchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit\nkannst du in jedem Gewässer nach\nPokémon angeln."
    es: "Una caña de pescar bastante usada\ny desgastada. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
oran_berry:
  names:
    jp_kana: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nＨＰを　１０だけ　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to heal the\nuser by just 10 HP."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie restaure\n10 PV au Pokémon."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\nrestituisce 10 PS."
    de: "Eine Knursp-Zutat. Als Item füllt\ndie Beere die KP eines Pokémon\num 10 Punkte auf."
    es: "Ingrediente para Pokochos que los\nPokémon pueden usar o llevar para\nrestaurar 10 PS."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\nHP를 10만큼 회복한다."
oval_stone:
  names:
    jp_kana: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたまのように　まるい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is shaped like an egg."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ a forma di uovo."
    de: "Dieser besondere, eiförmige Stein\nhilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nTiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
pal_pad:
  names:
    jp_kana: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco Amici
    de: Adressbuch
    es: Bloc amigos
    ko: 친구수첩
  descriptions:
    jp_kana: "ともだちを　とうろくしたり\nあそんだ　ことを　きろくする\nべんりな　てちょう。"
    en: "A convenient notepad that is used for\nregistering your friends, Friend Codes,\nand keeping a record of game play."
    fr: "Un carnet bien pratique pour\nenregistrer vos amis, les codes\nami et des données de jeu."
    it: "Blocco appunti utile per registrare gli\namici, il loro codice amico e per tenere\nun resoconto dell’esperienza di gioco."
    de: "In diesem praktischen Buch\nkannst du die Freundescodes\ndeiner Freunde aufbewahren."
    es: "Un cuaderno muy práctico en el que\npuedes registrar amigos, claves\nde amigo, etc."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nシーヤが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nPamtre Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Pallmbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Plama."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n자야가 자란다."
paralyze_heal:
  names:
    jp_kana: まひなおし
    en: Parlyz Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparaliz
    ko: 마비치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　まひの\nじょうたいを　かいふくする。"
    en: "A spray-type medicine.\nIt eliminates paralysis from a single\nPokémon."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: "Rimedio spray.\nCura un solo Pokémon dalla paralisi."
    de: "Ein Spray, das ein Pokémon\nvon Paralyse heilt."
    es: "Medicina en spray que cura a un\nPokémon paralizado."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
  descriptions:
    jp_kana: "フタバタウンから　たびだった\nおさななじみに　わたすように\nたのまれた　おとどけもの。"
    en: "A parcel entrusted in your care.\nYou are supposed to deliver it to your\nchildhood friend who left Twinleaf Town."
    fr: "Paquet qu’on vous a confié. Vous devez\nle remettre à votre ami d’enfance qui a\nquitté Bonaugure."
    it: "Pacchetto che ti è stato affidato\nper essere consegnato al tuo amico\nd’infanzia cha ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde.\nDu sollst es deinem besten Freund\ngeben, der Zweiblattdorf verließ."
    es: "Paquete encomendado a tu cuidado que\ntienes que entregar a tu amigo de la\ninfancia que dejó Pueblo Hojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
passho_berry:
  names:
    jp_kana: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　みず　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Water-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Eau."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Acqua del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Wasser. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Agua."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 물 기술을\n당했을 때 위력이 약해진다."
payapa_berry:
  names:
    jp_kana: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　エスパー　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Psychic-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Psy."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Psico del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Psycho. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Psíquico."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 에스퍼 기술을\n당했을 때 위력이 약해진다."
pearl:
  names:
    jp_kana: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nすこし　ちいさめの　しんじゅ。\nショップで　やすく　うれる。"
    en: "A somewhat-small pearl that sparkles\nin a pretty silver color.\nIt can be sold cheaply to shops."
    fr: "Une petite perle qui brille d’une jolie\ncouleur argent. Peut être vendue\nà bas prix aux magasins."
    it: "Perla piuttosto piccola dai graziosi\nriflessi argentei. Si può vendere\na basso prezzo ai negozi."
    de: "Eine relativ kleine Perle, die in\nschönem Silber funkelt. Sie ist von\ngeringem Wert."
    es: "Brillante perla plateada de tamaño\nmás bien pequeño que no alcanza\nmucho precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
pecha_berry:
  names:
    jp_kana: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nどくを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\npoison."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie soigne\ndu poison."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò guarire dall’avvelenamento."
    de: "Eine Knursp-Zutat. Als Item bewirkt\ndie Beere die Selbstheilung eines\nPokémon von Vergiftung."
    es: "Ingrediente para Pokochos. Los\nPokémon pueden llevarla o usarla para\ncurarse del envenenamiento."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n독을 회복한다."
persim_berry:
  names:
    jp_kana: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nこんらんを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\nconfusion."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie soigne\nla confusion."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò liberare dalla confusione."
    de: "Eine Knursp-Zutat. Als Item bewirkt\ndie Beere die Selbstheilung eines\nPokémon von Verwirrung."
    es: "Ingrediente para Pokochos que los\nPokémon pueden usar o llevar para\nsalir del estado de confusión."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n혼란을 회복한다."
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nじぶんの　とくこうが　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\nSp. Atk stat in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte l’Atq. Spé. si\nnécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nl’Attacco Speciale se il Pokémon\nche la tiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere in einer Notlage den\nSpezial-Angriff eines Pokémon."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, le subirá el\nAt. Esp. en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n자신의 특수공격이 올라간다."
pinap_berry:
  names:
    jp_kana: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nパイルが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nPinap Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Sananabeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Pinia."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n파인이 자란다."
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    en: Pink Scarf
    fr: Foul. Rose
    it: Fascia Rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the “Cute” aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la “Grâce” dans\nles Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Grazia” di\nchi lo tiene in una Gara."
    de: "Ein Item zum Tragen. Es\nverstärkt die “Anmut” eines\nPokémon in einem Wettbewerb."
    es: "Debe llevarlo un Pokémon. Aumenta\nla dulzura en los concursos."
    ko: "지니게 하고 콘테스트에 참가시키면\n그 포켓몬은 여느 때보다\n귀엽게 보인다."
poffin_case:
  names:
    jp_kana: ポフィンケース
    en: Poffin Case
    fr: Boîte Poffin
    it: Portapoffin
    de: Knurspbox
    es: Pokochera
    ko: 포핀케이스
  descriptions:
    jp_kana: "おりょうりで　つくった　ポフィンを\nほぞんする　いれもの。"
    en: "A case for storing Poffin cooked from\nBerries."
    fr: "Boîte pour ranger les Poffins faits\nà partir de Baies."
    it: "Contenitore per conservare i\nPoffin cucinati con le Bacche."
    de: Eine Box für leckere Knurspe.
    es: "Caja en la que se transportan los\nPokochos elaborados con bayas."
    ko: "요리로 만든 포핀을\n보존하는 용기."
point_card:
  names:
    jp_kana: ポイントカード
    en: Point Card
    fr: Carte Points
    it: Scheda Punti
    de: Punktekarte
    es: Tarj. Puntos
    ko: 포인트카드
  descriptions:
    jp_kana: "かちとった　バトルポイントの　かずを\nみることが　できる　カード。"
    en: "A card that lists the Battle Points\nyou have earned."
    fr: "Carte indiquant le nombre de Points de\nCombat obtenus."
    it: "Scheda che elenca i Punti Lotta\nche hai ottenuto."
    de: "Auf dieser Karte werden deine bisher\nerhaltenen Gewinnpunkte festgehalten."
    es: "Una tarjeta en la que se registran los\nPuntos de Batalla que has ganado."
    ko: "이겨서 받은 배틀포인트 수를\n볼 수 있는 카드."
poison_barb:
  names:
    jp_kana: どくバリ
    en: Poison Barb
    fr: Pic Venin
    it: Velenaculeo
    de: Giftstich
    es: Flecha Ven.
    ko: 독바늘
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\nもたせると　どくタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a small, poisonous barb that ups\nthe power of Poison-type moves."
    fr: "Objet à tenir. Petit pic empoisonné\nmontant la puissance des capacités de\ntype Poison."
    it: "Strumento da far tenere a un Pokémon.\nAculeo piccolo e tossico che potenzia\nle mosse di tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und\ngiftiger Widerhaken, der Attacken vom\nTyp Gift verstärkt."
    es: "Flecha venenosa que refuerza los\nmovimientos de tipo Veneno. Debe\nllevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
poke_ball:
  names:
    jp_kana: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンに　なげて\nつかまえる　ための　ボール。\nカプセルしきに　なっている。"
    en: "A device for catching wild Pokémon.\nIt is thrown like a ball at the target.\nIt is designed as a capsule system."
    fr: "Un objet pareil à une capsule qui\ncapture les Pokémon sauvages. Il suffit\npour cela de le jeter comme une balle."
    it: "Strumento dotato di Capsula usato per\ncatturare Pokémon selvatici. Si lancia\ncontro il bersaglio come una palla."
    de: "Damit fängst du wilde Pokémon.\nDu wirfst ihn wie einen normalen Ball.\nDas Design ähnelt dem einer Kapsel."
    es: "Dispositivo con diseño capsular que\natrapa Pokémon salvajes. Se lanza\ncomo una bola contra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    en: Poké Doll
    fr: Poképoupée
    it: Poké Bambola
    de: Poképuppe
    es: Poké Muñeco
    ko: 삐삐인형
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    en: "A doll that attracts Pokémon.\nUse it to flee from any battle with a\nwild Pokémon."
    fr: "Poupée qui attire les Pokémon. Permet\nde s’enfuir d’un combat contre un\nPokémon sauvage."
    it: "Bambola che attrae i Pokémon.\nUtile per fuggire dalla lotta con\nun Pokémon selvatico."
    de: "Eine hübsche Puppe. Sie ermöglicht\ndie Flucht im Kampf gegen wilde\nPokémon."
    es: "Un muñeco que atrae a los Pokémon.\nPuedes utilizarlo para huir de un\ncombate con un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
poke_radar:
  names:
    jp_kana: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Pokéradar
    ko: 포켓트레
  descriptions:
    jp_kana: "くさむらに　かくれている　ポケモンを\nさがしだせる　どうぐ。\nあるくと　でんちが　たまる。"
    en: "A tool that can search out Pokémon\nthat are hiding in grass. Its battery is\nrecharged as you walk."
    fr: "Objet permettant de trouver les\nPokémon qui se cachent dans l’herbe.\nSe recharge quand vous marchez."
    it: "Strumento con cui individuare\ni Pokémon nascosti nell’erba.\nLa batteria si ricarica mentre cammini."
    de: "Findet Pokémon, die sich im Gras\nverstecken. Die Batterie lädt sich\nbeim Reisen auf."
    es: "Busca Pokémon que se esconden en la\nhierba. La batería se recarga mientras\ncaminas."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　ＨＰの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base HP."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leurs PV de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne riduce i PS."
    de: "Eine Knursp-Zutat. Verwendung\nmacht ein Pokémon freundlicher,\nreduziert aber permanent KP."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero también reduces sus PS."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 HP의\n기초 포인트가 떨어진다."
potion:
  names:
    jp_kana: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\njust 20 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 20 PS ad un Pokémon."
    de: "Hilft bei Wunden.\nDie KP eines Pokémon\nwerden um 20 Punkte aufgefüllt."
    es: "Medicina en spray que cura heridas\ny restaura 20 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
power_anklet:
  names:
    jp_kana: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouv.
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　すばやさが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nSpeed gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir augmentant la Vitesse\nlors des montées de niveau mais rédui-\nsant la stat Vitesse pendant le combat."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la Velocità al salire di livello,\nma ne riduce la statistica."
    de: "Ein Item zum Tragen. Erhöht bei\nLevelaufstieg den Initiative-Wert,\nsenkt aber die Initiative allgemein."
    es: "Ayuda a ganar Velocidad al subir de\nnivel, pero reduce la Velocidad en\ncombate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
power_band:
  names:
    jp_kana: パワーバンド
    en: Power Band
    fr: Band. Pouv.
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくぼうが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nSp. Def gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir augmentant la Déf. Spé.\nlors des montées de niveau, mais\nréduisant la stat Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la Dif. Sp. al salire di livello,\nma riduce la Velocità."
    de: "Ein Item zum Tragen.\nErhöht bei Levelaufstieg die Spezial-\nVerteidigung, senkt aber die Initiative."
    es: "Ayuda a ganar Def. Esp. al subir de\nnivel, pero reduce la Velocidad.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
power_belt:
  names:
    jp_kana: パワーベルト
    en: Power Belt
    fr: Ceint. Pouv.
    it: Vigorfascia
    de: Machtgurt
    es: Cinto Recio
    ko: 파워벨트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ぼうぎょが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nDefense gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir augmentant la Défense\nlors des montées de niveau, mais\nréduisant la stat Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la Difesa al salire di livello,\nma riduce la Velocità."
    de: "Ein Item zum Tragen.\nErhöht bei Levelaufstieg den Verteidi-\ngungs-Wert, senkt aber die Initiative."
    es: "Ayuda a ganar Defensa al subir de\nnivel, pero reduce la Velocidad.\nDebe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 방어를\n올리면서 키우기가 쉽다."
power_bracer:
  names:
    jp_kana: パワーリスト
    en: Power Bracer
    fr: Poign. Pouv.
    it: Vigorcerchio
    de: Machtreif
    es: Brazal Recio
    ko: 파워리스트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　こうげきが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nAttack gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir augmentant l’Attaque lors\ndes montées de niveau, mais réduisant\nla stat Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAumenta l’Attacco al salire di livello,\nma riduce la Velocità."
    de: "Ein Item zum Tragen.\nErhöht bei Levelaufstieg den Angriffs-\nWert, senkt aber die Initiative."
    es: "Ayuda a ganar Ataque al subir de\nnivel, pero reduce la Velocidad.\nDebe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
power_herb:
  names:
    jp_kana: パワフルハーブ
    en: Power Herb
    fr: Herbe Pouv.
    it: Vigorerba
    de: Energiekraut
    es: Hierba Única
    ko: 파워풀허브
  descriptions:
    jp_kana: "もたせた　ポケモンは　いちどだけ\n１ターンめに　ちからを　ためるわざを\nすぐに　つかうことが　できる。"
    en: "A single-use item to be held by a\nPokémon. It allows the immediate use of\na move that charges on the first turn."
    fr: "Objet à tenir et à usage unique. Permet\nd’utiliser immédiatement une capacité\nqui devrait se charger au premier tour."
    it: "Strumento monouso da far tenere a un\nPokémon. Permette l’uso immediato di\nuna mossa che al primo turno si carica."
    de: "Ein Item (Tragen), das dem Träger den\nsofortigen Einsatz einer Attacke, die\nsonst aufgeladen werden muss, erlaubt."
    es: "Permite el uso inmediato de cualquier\nmovimiento en el primer turno. Es de un\nsolo uso y debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수가 있다."
power_lens:
  names:
    jp_kana: パワーレンズ
    en: Power Lens
    fr: Lent. Pouv.
    it: Vigorlente
    de: Machtlinse
    es: Lente Recia
    ko: 파워렌즈
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくこうが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nSp. Atk gain on leveling, but reduces\nthe Speed stat."
    fr: "Objet à tenir augmentant l’Atq. Spé.\nlors des montées de niveau, mais\nréduisant la stat Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAumenta l’Att. Sp. al salire di livello,\nma riduce la Velocità."
    de: "Ein Item zum Tragen.\nErhöht bei Levelaufstieg den Spezial-\nAngriff, senkt aber die Initiative."
    es: "Ayuda a ganar At. Esp. al subir de\nnivel, pero reduce la Velocidad.\nDebe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수공격을\n올리면서 키우기가 쉽다."
power_weight:
  names:
    jp_kana: パワーウエイト
    en: Power Weight
    fr: Poids Pouv.
    it: Vigorpeso
    de: Machtgewicht
    es: Pesa Recia
    ko: 파워웨이트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ＨＰが\nたかく　そだちやすい。"
    en: "A Pokémon hold item that promotes\nHP gain on leveling, but reduces the\nSpeed stat."
    fr: "Objet à tenir augmentant les PV lors\ndes montées de niveau mais réduisant\nla stat Vitesse."
    it: "Strumento da far tenere a un Pokémon.\nAumenta i PS al salire di livello, ma\nriduce la Velocità."
    de: "Ein Item zum Tragen.\nErhöht bei Levelaufstieg die maximalen\nKP, senkt aber die Initiative."
    es: "Ayuda a conseguir más PS al subir de\nnivel, pero reduce la Velocidad. Debe\nllevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 HP를\n올리면서 키우기가 쉽다."
pp_max:
  names:
    jp_kana: ポイントマックス
    en: PP Max
    fr: PP Max
    it: PP-Max
    de: AP-Top
    es: Máx. PP
    ko: 포인트맥스
  descriptions:
    jp_kana: "おぼえている　わざのうち\n１つの　ＰＰの　さいだいちを\nさいこうまで　あげる。"
    en: "It maximally raises the top PP of a\nselected move that has been learned\nby the target Pokémon."
    fr: "Monte les PP d’une capacité à son\nmaximum."
    it: "Porta al limite i PP massimi\ndi una mossa a scelta che è\nstata imparata dal Pokémon."
    de: "Maximiert die Anzahl der AP\neiner Attacke eines Pokémon."
    es: "Aumenta al máximo los PP del movimiento\nque elijas de un Pokémon."
    ko: "기억하고 있는 기술 중\n1개의 PP 최대치를\n최고까지 올린다."
pp_up:
  names:
    jp_kana: ポイントアップ
    en: PP Up
    fr: PP Plus
    it: PP-Su
    de: AP-Plus
    es: Más PP
    ko: 포인트업
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰの\nさいだいちを　すこし　あげる。"
    en: "It slightly raises the maximum PP of\na selected move that has been learned\nby the target Pokémon."
    fr: "Monte un peu les PP max. d’une\ncapacité sélectionnée."
    it: "Aumenta di poco i PP massimi\ndi una mossa a scelta che è\nstata imparata dal Pokémon."
    de: "Hebt die maximale Anzahl der AP\neiner Attacke eines Pokémon."
    es: "Aumenta ligeramente los PP máximos del\nmovimiento que elijas de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP\n최대치를 조금 올린다."
premier_ball:
  names:
    jp_kana: プレミアボール
    en: Premier Ball
    fr: Honor Ball
    it: Premier Ball
    de: Premierball
    es: Honor Ball
    ko: 프레미어볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nちょっと　めずらしい　ボール。"
    en: "A somewhat rare Poké Ball that has\nbeen specially made to commemorate\nan event of some sort."
    fr: "Une Poké Ball assez rare qui fut créée\npour un événement particulier."
    it: "Poké Ball rara che è stata realizzata\nappositamente per commemorare\nun particolare evento."
    de: "Ein eher seltener Ball, der als\nReminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball muy particular que\nse creó para conmemorar algún\nacontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n조금 희귀한 볼."
protector:
  names:
    jp_kana: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても　かたくて　おもい。\nある　ポケモンが　このんでいる。"
    en: "A protective item of some sort.\nIt is extremely stiff and heavy.\nIt is loved by a certain Pokémon."
    fr: "Objet protecteur très dur et très\nlourd, apprécié d’un certain Pokémon."
    it: "Specie di strumento protettivo, molto \nduro e pesante. Un Pokémon in\nparticolare lo adora."
    de: "Eine Art Schutzvorrichtung. Steif\nund schwer. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado.\nAlgunos Pokémon lo adoran."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
protein:
  names:
    jp_kana: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　こうげきの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Attack stat of a\nsingle Pokémon."
    fr: "Une boisson très nutritive qui monte\nl’Attaque d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta l’Attacco di un Pokémon."
    de: "Ein gehaltvolles Getränk, das den\nAngriffs-Wert eines Pokémon\ndauerhaft hebt."
    es: "Nutritiva bebida que aumenta el\nAtaque de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
pure_incense:
  names:
    jp_kana: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incie. Puro
    ko: 순결의향로
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if the\nholder is the first one in the party."
    fr: "Objet à tenir. Aide à repousser les\nPokémon sauvages si le porteur est le\npremier Pokémon de l’équipe."
    it: "Strumento da far tenere a un Pokémon.\nAiuta ad allontanare i Pokémon selvatici\nse chi lo tiene è il primo della squadra."
    de: "Ein Item zum Tragen. Reduziert\nBegegnungen mit wilden Pokémon, wenn\nder Träger an erster Stelle steht."
    es: "Si lo lleva el primer Pokémon del\nequipo, los Pokémon salvajes se\nacercarán con menos frecuencia."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
qualot_berry:
  names:
    jp_kana: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　ぼうぎょの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base Defense stat."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leur stat Défense de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne diminuisce la Difesa."
    de: "Eine Knursp-Zutat. Verwendung macht\nein Pokémon freundlicher, reduziert\naber permanent den Verteidigungs-Wert."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero reduces su Defensa."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 방어의\n기초 포인트가 떨어진다."
quick_ball:
  names:
    jp_kana: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
  descriptions:
    jp_kana: "せんとうが　はじまって　すぐに\nつかうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nprovides a better catch rate if it is\nused at the start of a wild encounter."
    fr: "Une Poké Ball qui permet d’attraper un\nPokémon sauvage plus facilement si on\nl’utilise au début du combat."
    it: "Poké Ball un po’ diversa che facilita\nla cattura di un Pokémon selvatico\nse usata all’inizio della lotta."
    de: "Ein ungewöhnlicher Ball, der\nzu Beginn eines Kampfes am\nwirkungsvollsten ist."
    es: "Una Poké Ball algo distinta que potencia\nel índice de captura si se usa al inicio\nde un encuentro con Pokémon salvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
quick_claw:
  names:
    jp_kana: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartigli
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
  descriptions:
    jp_kana: "かるくて　するどい　ツメ。\nもたせると　あいてより　さきに\nこうどう　できることが　ある。"
    en: "An item to be held by a Pokémon.\nA light, sharp claw that lets the\nbearer move first occasionally."
    fr: "Objet à tenir. Griffe légère mais\ntranchante qui permet parfois de\nfrapper le premier."
    it: "Strumento da far tenere a un Pokémon.\nLeggero e affilato, permette di fare\nla prima mossa ogni tanto."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nhebt die Erstschlagquote."
    es: "Garra ligera y afilada que permite que\nel Pokémon que la lleve ataque el\nprimero ocasionalmente."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
quick_powder:
  names:
    jp_kana: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　すばやさが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    en: "An item to be held by DITTO.\nExtremely fine yet hard, this odd\npowder boosts the Speed stat."
    fr: "Objet à faire tenir à METAMORPH. Cette\npoudre étrange, très fine mais\nrésistante, augmente sa Vitesse."
    it: "Strumento da far tenere a DITTO.\nQuesta strana polvere, fine ma nel\ncontempo dura, aumenta la Velocità."
    de: "Ein Item, das DITTO zum Tragen gegeben\nwerden kann. Fein und doch hart,\nerhöht es den Initiative-Wert."
    es: "Este polvo fino pero de gran fuerza\npotencia la Velocidad. Debe llevarlo\nDITTO."
    ko: "메타몽에게 지니게 하면 스피드가\n올라가는 이상한 가루.\n매우 작고 단단하다."
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nラブタが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nRabuta Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Rabutabeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Rautan."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n라부탐이 자란다."
rare_bone:
  names:
    jp_kana: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso Raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
  descriptions:
    jp_kana: "ポケモンこうこがくの　うえで\nとても　きちょうな　ホネ。\nショップで　たかく　うれる。"
    en: "A bone that is extremely valuable for\nPokémon archaeology. It can be sold\nfor a high price to shops."
    fr: "Un os d’une grande valeur pour\nl’archéologie Pokémon. Peut être vendu\nà bon prix aux magasins."
    it: "Osso di altissimo valore per la\narcheologia Pokémon. Può essere\nvenduto a caro prezzo ai negozi."
    de: "Dieser Knochen erfreut jeden\nPokémon-Archäologen. Er ist\nvon hohem Wert."
    es: "Un hueso de gran valor arqueológico\nque puede alcanzar un alto precio en\nlas tiendas."
    ko: "포켓몬 고고학 상에서\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caram. Rara
    de: Sonderbonbon
    es: Carameloraro
    ko: 이상한사탕
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy.\nIt raises the level of a single Pokémon\nby one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner\nun niveau d’expérience."
    it: "Caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das\nden Level eines Pokémon dauerhaft\num eins anhebt."
    es: "Caramelo energético que sube a un\nPokémon de nivel."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
rawst_berry:
  names:
    jp_kana: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nやけどを　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to recover from\na burn."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie soigne\nune brûlure."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\npuò guarire da una scottatura."
    de: "Eine Knursp-Zutat. Als Item bewirkt\ndie Beere die Selbstheilung eines\nPokémon von Verbrennung."
    es: "Ingrediente para Pokochos. Los\nPokémon pueden llevarla o usarla\npara curarse las quemaduras."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\n화상을 회복한다."
razor_claw:
  names:
    jp_kana: するどいツメ
    en: Razor Claw
    fr: Grif. Rasoir
    it: Affilartigli
    de: Scharfklaue
    es: Garrafilada
    ko: 예리한손톱
  descriptions:
    jp_kana: "するどく　とがった　ツメ。\nもたせると　わざが　きゅうしょに\nあたりやすくなる。"
    en: "An item to be held by a Pokémon.\nIt is a sharply hooked claw that ups\nthe holder’s critical-hit ratio."
    fr: "Objet à tenir. Griffe crochue et pointue\naugmentant le taux de critiques."
    it: "Strumento da far tenere a un Pokémon.\nUn artiglio affilato e ricurvo che\naumenta i brutti colpi di chi lo tiene."
    de: "Ein Item zum Tragen.\nDie scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Aumenta la probabilidad de que el\nPokémon que la lleva consiga un\ngolpe crítico."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
razor_fang:
  names:
    jp_kana: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillagudo
    ko: 예리한이빨
  descriptions:
    jp_kana: "するどく　とがった　キバ。\nもたせると　ダメージを　あたえたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nIt may cause the foe to flinch when\nthe holder inflicts damage."
    fr: "Objet à tenir pouvant apeurer l’ennemi\nquand le porteur inflige des dégâts."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene può far tentennare\nil nemico colpito."
    de: "Ein Item zum Tragen.\nVerursacht der Träger Schaden,\nerschrickt der Gegner eventuell."
    es: "Si lo lleva un Pokémon cuando hiere a\nun rival, puede hacerle retroceder."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
razz_berry:
  names:
    jp_kana: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nズリが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nRazz Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Himmihbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Frambu."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n라즈가 자란다."
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Telaterrible
    ko: 영계의천
  descriptions:
    jp_kana: "おそろしく　つよい　れいりょくが\nこめられている　ぬの。\nある　ポケモンが　このんでいる。"
    en: "A cloth imbued with horrifyingly strong\nspiritual energy.\nIt is loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie\nspirituelle horriblement puissante.\nApprécié d’un certain Pokémon."
    it: "Panno intriso di un’energia spirituale\nterribilmente forte. Un Pokémon in\nparticolare adora questo strumento."
    de: "Ein Stoffumhang voller geistiger\nEnergie. Das Lieblingsstück\neines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual\nmuy potente. Algunos Pokémon la\nadoran."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
red_chain:
  names:
    jp_kana: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Rossocatena
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강쇠사슬
  descriptions:
    jp_kana: "シンオウちほうを　うみだした\nでんせつの　ポケモンを　つなぐと\nいわれる　しんわの　どうぐ。"
    en: "A mythical chain that is said to link\nthe legendary Pokémon that created\nthe Sinnoh region."
    fr: "Chaîne mystique qui serait reliée au\nPokémon légendaire ayant créé la\nrégion de Sinnoh."
    it: "Catena mitica che pare essere\ncollegata al Pokémon leggendario\nche ha creato la regione di Sinnoh."
    de: "Diese mythische Kette ist angeblich\ndie Verbindung zu einem Legendären\nPokémon."
    es: "Una cadena mítica que se dice vincula\nal Pokémon legendario que creó la\nregión de Sinnoh."
    ko: "신오지방을 만들어낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
red_flute:
  names:
    jp_kana: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto Rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
  descriptions:
    jp_kana: "ガラスせいの　あかい　ふえ。\nポケモン　１ひきの　メロメロの\nじょうたいを　かいふくする。"
    en: "A red flute made from blown glass.\nIts melody snaps a single Pokémon out\nof infatuation."
    fr: "Une flûte en verre soufflé rouge dont\nles notes mettent fin à l’attirance."
    it: "Flauto rosso di vetro soffiato.\nCon la sua melodia libera\nun Pokémon dall’attrazione."
    de: "Eine rote, gläserne Flöte, die\nein Pokémon von Anziehung heilt."
    es: "Flauta de cristal rojo que libera a un\nPokémon del enamoramiento."
    ko: "유리로 만든 빨간 피리.\n포켓몬 1마리의\n헤롱헤롱 상태를 회복한다."
red_scarf:
  names:
    jp_kana: あかいバンダナ
    en: Red Scarf
    fr: Foul. Rouge
    it: Fascia Rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the “Cool” aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente le “Sang-froid”\ndans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Classe” di\nchi lo tiene in una Gara."
    de: "Ein Item zum Tragen. Es verstärkt\ndie “Coolness” eines Pokémon in\neinem Wettbewerb."
    es: "Debe llevarlo un Pokémon. Aumenta\nel carisma en los concursos."
    ko: "지니게 하고 콘테스트에 참가시키면\n그 포켓몬은 여느 때보다\n근사하게 보인다."
red_shard:
  names:
    jp_kana: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio Rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
  descriptions:
    jp_kana: "あかい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    en: "A small red shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson rouge.\nIl semble provenir d’un outil très\nancien."
    it: "Piccolo coccio rosso.\nProbabilmente faceva parte di uno\nstrumento creato in tempi passati."
    de: "Eine rote Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Parece formar parte de algún tipo\nde herramienta antigua."
    ko: "빨간 작은 조각.\n이전에 만들어진 어떤\n도구의 일부인 듯하다."
repeat_ball:
  names:
    jp_kana: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피드볼
  descriptions:
    jp_kana: "つかまえたことの　ある\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on Pokémon\nspecies that were previously caught."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne particulièrement bien sur les\nespèces de Pokémon déjà capturées."
    it: "Poké Ball un po’ diversa, particolar-\nmente efficace sulle specie di Pokémon\ngià catturate in precedenza."
    de: "Ein Ball, der besonders dann sehr gut\nist, wenn man ein Pokémon fängt, dessen\nArt bereits gefangen wurde."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon\niguales a los que ya has capturado."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
repel:
  names:
    jp_kana: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
  descriptions:
    jp_kana: "１００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 100 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 100 pas."
    it: "Strumento che evita l’incontro con\nPokémon selvatici deboli per\n100 passi dopo l’utilizzo."
    de: "Hält 100 Schritte lang schwache \nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 100 pasos."
    ko: "100보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
revival_herb:
  names:
    jp_kana: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Rev.
    ko: 부활초
  descriptions:
    jp_kana: "とても　にがい　やくそう。\nひんしの　ポケモン　１ひきの\nＨＰを　すべて　かいふくする。"
    en: "A very bitter medicinal herb.\nIt revives a fainted Pokémon, fully\nrestoring its HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure\ntous ses PV."
    it: "Erba medicinale amarissima.\nRianima un Pokémon esausto\nrestituendogli tutti i PS."
    de: "Ein bitteres, medizinisches Kraut, das\nkampfunfähige Pokémon belebt und\ndie KP vollständig auffüllt."
    es: "Hierba muy amarga que reanima a un\nPokémon debilitado y restaura todos\nsus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
revive:
  names:
    jp_kana: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitaliz.
    de: Beleber
    es: Revivir
    ko: 기력의조각
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　１ひきの　ＨＰを\nはんぶんまで　かいふくする。"
    en: "A medicine that revives a fainted\nPokémon. It restores half the\nPokémon’s maximum HP."
    fr: "Un médicament qui ranime un Pokémon\nK.O. et restaure la moitié de ses PV\nmax."
    it: "Rimedio che rianima un Pokémon\nesausto e gli restituisce metà dei\nsuoi PS massimi."
    de: "Eine Medizin, die ein kampfunfähiges\nPokémon wiederbelebt. Die Hälfte der\nmaximalen KP werden wiederhergestellt."
    es: "Medicina que reanima a un Pokémon\ndebilitado y restaura la mitad de\nsus PS."
    ko: "기절해 버린\n포켓몬 1마리의 HP를\n절반까지 회복한다."
rindo_berry:
  names:
    jp_kana: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　くさ　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Grass-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Plante."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Erba del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Pflanze. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Planta."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 풀 기술을\n당했을 때 위력이 약해진다."
rock_incense:
  names:
    jp_kana: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incie. Roca
    ko: 암석향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Rock-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes attaques de type Roche."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut verstärkt Attacken vom\nTyp Gestein."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Roca. Debe\nllevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    en: Root Fossil
    fr: Foss. Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nねっこの　いちぶ　らしい。"
    en: "A fossil of an ancient Pokémon that\nlived in the sea. It appears to be\npart of a plant root."
    fr: "Fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine de\nplante."
    it: "Fossile di un antico Pokémon che\nviveva in mare. Sembra essere\nparte di una radice."
    de: "Das Fossil eines uralten Pokémon,\ndas in der Tiefsee lebte. Es sieht\nwie eine Pflanzenwurzel aus."
    es: "Fósil de un Pokémon ancestral que\nvivió en el fondo del mar. Parece\nser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
rose_incense:
  names:
    jp_kana: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Inc. Floral
    ko: 꽃향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Grass-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Plante."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut verstärkt Attacken vom\nTyp Pflanze."
    es: "Incienso de exótico aroma que fortalece\nlos movimientos de tipo Planta. Debe\nllevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
rowap_berry:
  names:
    jp_kana: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせて　とくしゅわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    en: "A Poffin ingredient. If held by a\nPokémon, and if a foe’s special attack\nlands, the foe also takes damage."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie fait subir des dommages au lanceur\nd’une attaque spéciale qui a touché."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon, il nemico subirà danni\nse il suo Attacco Speciale va a segno."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nbewirkt die Beere beim Gegner Schaden,\nwenn er von Spez.-Att. getroffen wird."
    es: "Si la lleva un Pokémon cuando un\nenemigo lanza un ataque especial,\neste también recibirá daño."
    ko: "포핀의 재료.\n지닌 상태에서 특수 기술을 당했을 때\n상대에게도 데미지를 준다."
rule_book:
  names:
    jp_kana: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro Regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
  descriptions:
    jp_kana: "たいせんの　ルールが　かかれている。\nつうしんたいせん　するとき\nルールを　えらぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor linked battles, you may choose\nwhich set of rules you wish to use."
    fr: "La liste des règles de combat. Vous\npouvez choisir les règles des combats\nen Link."
    it: "Elenca le regole per le lotte.\nNelle Lotte in Link, puoi scegliere\nil set di regole da usare."
    de: "Enthält die Kampfregeln.\nBei Link-Kämpfen kannst du daraus\ndie gewünschten Regeln wählen."
    es: "Recoge las normas de los combates.\nEn los combates enlazados puedes elegir\nel conjunto de reglas que quieres usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
sacred_ash:
  names:
    jp_kana: せいなるはい
    en: Sacred Ash
    fr: Cendresacrée
    it: Ceneremagica
    de: Zauberasche
    es: Cen. Sagrada
    ko: 성스러운분말
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　ぜんいんの　ＨＰを\nすべて　かいふくする。"
    en: "It revives all fainted Pokémon.\nIn doing so, it also fully restores\ntheir HP."
    fr: "Ranime tous les Pokémon K.O. et\nrestaure tous leurs PV."
    it: "Rianima tutti i Pokémon esausti,\nrestituendogli anche tutti i PS."
    de: "Belebt und erfrischt alle besiegten\nPokémon und füllt deren KP\nvollständig wieder auf."
    es: "Reanima completamente a los Pokémon\ndebilitados y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
safari_ball:
  names:
    jp_kana: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
  descriptions:
    jp_kana: "だいしつげんの　なか　だけで\nつかう　とくべつな　ボール。\nめいさいがらに　なっている。"
    en: "A special Poké Ball that is used only in\nthe Great Marsh. It is decorated in a\ncamouflage pattern."
    fr: "Une Poké Ball spéciale dont l’usage\nest réservé au Grand Marais. Elle est\ndécorée d’un motif camouflage."
    it: "Poké Ball speciale, usata soltanto\nnella Gran Palude. È decorata con\nun motivo mimetico."
    de: "Ein Ball, der nur in der Safarizone\neingesetzt wird. Er besticht durch\nsein Tarnfarbenmuster."
    es: "Poké Ball con un diseño de camuflaje\nque se utiliza únicamente en el Gran\nPantano."
    ko: "대습초원 안에서만\n쓰는 특별한 볼.\n얼룩무늬로 되어있다."
salac_berry:
  names:
    jp_kana: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき\nじぶんの　すばやさが　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it raises its\nSpeed stat in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte la Vitesse si\nnécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nla Velocità se il Pokémon che la\ntiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere in einer Notlage den\nInitiative-Wert eines Pokémon."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, le subirá la\nVelocidad en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n자신의 스피드가 올라간다."
scope_lens:
  names:
    jp_kana: ピントレンズ
    en: Scope Lens
    fr: Lentilscope
    it: Mirino
    de: Scope-Linse
    es: Periscopio
    ko: 초점렌즈
  descriptions:
    jp_kana: "じゃくてんが　みえる　レンズ。\nもたせた　ポケモンの　わざが\nきゅうしょに　あたりやすくなる。"
    en: "An item to be held by a Pokémon.\nIt is a lens that boosts the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Lentille qui monte le taux\nde critiques du porteur."
    it: "Strumento da far tenere a un Pokémon.\nLente che aumenta le probabilità\ndi brutti colpi di chi la tiene."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nerhöht die Volltrefferquote."
    es: "Su lente aumenta la posibilidad que\ntiene el Pokémon que lo lleva de\nconseguir un golpe crítico."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
sea_incense:
  names:
    jp_kana: うしおのおこう
    en: Sea Incense
    fr: Encens Mer
    it: Marearoma
    de: Seerauch
    es: Incie. Mar.
    ko: 바닷물향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\nincense with a curious aroma that\nboosts the power of Water-type moves."
    fr: "Objet à tenir. Encens au parfum curieux\nqui augmente la puissance des capacités\nde type Eau."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal curioso aroma che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Sein\nausgefallenes Aroma verstärkt\nAttacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia\nla energía de los ataques de tipo Agua.\nDebe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
secret_key:rotoms_room:
  names:
    jp_kana: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave Segr.
    de: ?-Öffner
    es: Ll. Secreta
    ko: 비밀의열쇠
  descriptions:
    jp_kana: "きまった　ばしょで　つかうことで\nとくしゅな　でんきしんごうを　だして\nとびらを　あける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at\na specific location. It emits a special\nelectric signal to open a door."
    fr: "Clé destinée à une serrure très\ncomplexe. Ouvre une porte en\ntransmettant un signal électrique."
    it: "Una sofisticata chiave da usare in un\ndeterminato luogo. Emette un impulso\nelettrico speciale per aprire una porta."
    de: "Ein besonderer Schlüssel, der an einem\nspeziellen Ort verwendet werden muss.\nÖffnet Türen durch ein elektr. Signal."
    es: "Una llave de alta tecnología que debe\nusarse en un lugar concreto. Emite una\nseñal eléctrica que abre una puerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단기술의 열쇠."
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    en: SecretPotion
    fr: Potionsecret
    it: Poz. Segreta
    de: Geheimtrank
    es: Poc. Secreta
    ko: 비전신약
  descriptions:
    jp_kana: "タンバシティの　くすりやで　もらえる\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the\npharmacy in Cianwood City. It fully\nheals a Pokémon of any ailment."
    fr: "Médicament génial vendu à la pharmacie\nd’Irisia. Soigne totalement un Pokémon\nde tout problème de statut."
    it: "Rimedio fantastico distribuito dalla\nfarmacia a Fiorlisopoli. Cura tutti\ni problemi di un Pokémon."
    de: "Eine fantastische Medizin aus\nAnemonia City. Heilt und kuriert\nein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la\nfarmacia de Ciudad Orquídea. Cura\ncompletamente a un Pokémon."
    ko: "진청시티의 약국에서 받을 수 있는\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
sharp_beak:
  names:
    jp_kana: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Hackattack
    es: Pico Afilado
    ko: 예리한부리
  descriptions:
    jp_kana: "ながく　とがった　くちばし。\nもたせると　ひこうタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a long, sharp beak that boosts\nthe power of Flying-type moves."
    fr: "Objet à tenir. Bec long et pointu\nmontant la puissance des capacités de\ntype Vol."
    it: "Strumento da far tenere a un Pokémon.\nBecco lungo e affilato che potenzia\nle mosse di tipo Volante."
    de: "Ein Item zum Tragen. Ein langer,\nscharfer Schnabel verstärkt\nAttacken vom Typ Flug."
    es: "Pico largo y afilado que aumenta la\npotencia de los movimientos de tipo\nVolador. Debe llevarlo un Pokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
  descriptions:
    jp_kana: "じょうぶで　かたい　ぬけがら。\nもたせた　ポケモンは　ひかえの\nポケモンと　かならず　いれかわれる。"
    en: "A tough, discarded carapace to be held\nby a Pokémon. It enables the holder to\nswitch with a waiting Pokémon in battle."
    fr: "Carapace dure pouvant être tenue.\nPermet au porteur de changer de place\navec un autre Pokémon lors de combats."
    it: "Duro guscio abbandonato da far tenere\na un Pokémon. Chi lo tiene può darsi\nil cambio con un Pokémon in attesa."
    de: "Ein Item zum Tragen. Dieser harte\nPanzer ermöglicht den Austausch des\nTrägers gegen ein wartendes Pokémon."
    es: "En combate, esta concha desechada\nsirve para que un Pokémon se cambie\npor otro que no esté combatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
shell_bell:
  names:
    jp_kana: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Seegesang
    es: Camp. Concha
    ko: 조개껍질방울
  descriptions:
    jp_kana: "もたせた　ポケモンが　こうげきして\nあいてに　ダメージを　あたえたとき\nＨＰを　すこし　かいふく　できる。"
    en: "An item to be held by a Pokémon.\nThe holder’s HP is restored a little\nevery time it inflicts damage."
    fr: "Objet à tenir. Restaure un peu les PV\ndu porteur à chaque fois qu’il inflige\ndes dégâts."
    it: "Strumento da far tenere a un Pokémon.\nChi lo tiene recupera un po’ di PS\nogni volta che infligge danni."
    de: "Ein Item zum Tragen. Es stellt einige\nKP des Trägers immer dann wieder her,\nwenn dieser dem Gegner Schaden zufügt."
    es: "Debe llevarla un Pokémon. Cada vez\nque este inflija daño, recuperará\nalgunos PS."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
shiny_stone:
  names:
    jp_kana: ひかりのいし
    en: Shiny Stone
    fr: Pierre Eclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひかりのように　まぶしい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt shines with a dazzling light."
    fr: "Pierre étrange qui fait évoluer\ncertaines espèces de Pokémon. Elle\nbrille d’une lumière aveuglante."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nBrilla di una luce abbagliante."
    de: "Dieser besondere, hell leuchtende\nStein hilft manchen Pokémon bei\nihrer Evolution."
    es: "Una piedra peculiar que hace\nevolucionar a algunos Pokémon.\nTiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
shoal_salt:
  names:
    jp_kana: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale Ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
  descriptions:
    jp_kana: "あさせのほらあなの　なかで\nみつけた　きれいな　しお。\nものすごく　しょっぱい。"
    en: "Pure salt that was discovered deep\ninside the Shoal Cave.\nIt is extremely salty."
    fr: "Sel pur provenant des profondeurs de\nla Grotte Tréfonds. Il est extrêmement\nsalé."
    it: "Sale purissimo scoperto nel\nprofondo della Grotta Ondosa.\nHa un gusto molto intenso."
    de: "Salz, das sich tief in der Küstenhöhle\nbefand. Es ist extrem salzig!"
    es: "Sal pura y de sabor intenso procedente\nde las profundidades de la Cueva\nCardumen."
    ko: "여울의 동굴 속에서\n발견한 깨끗한 소금.\n굉장히 짜다."
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    en: Shoal Shell
    fr: Co. Tréfonds
    it: Gusciondoso
    de: Küstenschale
    es: C. Cardumen
    ko: 여울조개껍질
  descriptions:
    jp_kana: "あさせのほらあなの　なかで\nみつけた　きれいな　かいがら。\nあおと　しろの　しまもよう。"
    en: "A pretty seashell that was found deep\ninside the Shoal Cave.\nIt is striped in blue and white."
    fr: "Joli coquillage trouvé au fin fond de la\nGrotte Tréfonds. Il est orné de\nrayures bleues et blanches."
    it: "Conchiglia graziosa trovata nel\nprofondo della Grotta Ondosa.\nÈ a strisce bianche e blu."
    de: "Eine schöne Muschelschale, die\nsich in der Küstenhöhle befand.\nSie ist blauweiß gestreift."
    es: "Hermosa concha marina hallada en lo\nmás profundo de la Cueva Cardumen.\nTiene rayas azules y blancas."
    ko: "여울의 동굴 속에서\n발견한 예쁜 조개껍질.\n파랑과 하양의 줄무늬."
shuca_berry:
  names:
    jp_kana: シュカのみ
    en: Shuca Berry
    fr: Baie Jouca
    it: Baccanaca
    de: Schukebeere
    es: Baya Acardo
    ko: 슈캐열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　じめん　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Ground-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Sol."
    it: "Si usa per fare i Poffin. Se tenuta\nda un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Terra del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Boden. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Tierra."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 땅 기술을\n당했을 때 위력이 약해진다."
silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    en: Silk Scarf
    fr: Mouch. Soie
    it: Sciarpa Seta
    de: Seidenschal
    es: Pañuelo Seda
    ko: 실크스카프
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\nもたせると　ノーマルタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a sumptuous scarf that boosts\nthe power of Normal-type moves."
    fr: "Objet à tenir. Mouchoir somptueux\nmontant la puissance des capacités de\ntype Normal."
    it: "Strumento da far tenere a un Pokémon.\nSciarpa raffinata che potenzia\nle mosse di tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer\nSchal, der Attacken vom Typ Normal\nverstärkt."
    es: "La delicadeza del pañuelo fortalece\nlos ataques de tipo Normal. Debe\nllevarlo un Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
silver_powder:
  names:
    jp_kana: ぎんのこな
    en: SilverPowder
    fr: Poudre Arg.
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
  descriptions:
    jp_kana: "ぎんいろに　かがやく　こな。\nもたせると　むしタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a shiny, silver powder that ups\nthe power of Bug-type moves."
    fr: "Objet à tenir. Poudre d’argent\nbrillante qui monte la puissance des\ncapacités de type Insecte."
    it: "Strumento da far tenere a un Pokémon.\nPolvere argentea e brillante che\npotenzia le mosse di tipo Coleottero."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nverbessert Attacken vom Typ Käfer."
    es: "Polvo de brillo argénteo que fortalece\nlos ataques de tipo Bicho. Debe\nllevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
sitrus_berry:
  names:
    jp_kana: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかったり　もたせたりすると\nＨＰを　すこしだけ　かいふくする。"
    en: "A Poffin ingredient. It may be used\nor held by a Pokémon to heal the\nuser’s HP a little."
    fr: "Ingrédient pour Poffin.\nUtilisée ou tenue, cette Baie restaure\nquelques PV au Pokémon."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon o usata dall’Allenatore\nrestituisce un po’ di PS."
    de: "Eine Knursp-Zutat. Als Item füllt\ndie Beere die KP eines Pokémon\nein wenig auf."
    es: "Ingrediente para Pokochos que los\nPokémon pueden usar o llevar para\nrestaurar algunos PS."
    ko: "포핀의 재료. 포켓몬에게\n사용하거나 지니게 하면\nHP를 조금 회복한다."
skull_fossil:
  names:
    jp_kana: ずがいのカセキ
    en: Skull Fossil
    fr: Foss. Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nあたまの　いちぶ　らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat lived on the land. It appears to\nbe part of a head."
    fr: "Fossile d’un Pokémon préhistorique\nterrestre. On dirait une partie d’un\ncrâne."
    it: "Fossile di un Pokémon preistorico\nche viveva sulla terra. Sembra\nessere parte di un teschio."
    de: "Ein Fossil eines antiken\nPokémon, das an Land lebte.\nEs sieht wie ein Schädel aus."
    es: "Fósil de un Pokémon prehistórico\nterrestre. Parece ser parte de una\ncabeza."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
sky_plate:
  names:
    jp_kana: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
  descriptions:
    jp_kana: "ひこうの　タイプの　せきばん。\nもたせると　ひこうタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Flying-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Vol."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Flug."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Volador.\nDebe llevarla un Pokémon."
    ko: "비행타입의 석판.\n지니게 하면 비행타입\n기술의 위력이 강해진다."
smoke_ball:
  names:
    jp_kana: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla Fumo
    de: Rauchball
    es: Bola Humo
    ko: 연막탄
  descriptions:
    jp_kana: "もたせた　ポケモンは　やせいの\nポケモンとの　せんとうから\nぜったいに　にげられる。"
    en: "An item to be held by a Pokémon.\nIt enables the holder to flee from any\nwild Pokémon without fail."
    fr: "Objet à tenir. Permet au porteur de\ns’enfuir à coup sûr face à un Pokémon\nsauvage."
    it: "Strumento da far tenere a un Pokémon.\nPermette a chi lo tiene di fuggire con\nsuccesso da un Pokémon selvatico."
    de: "Ein Pokémon kann dieses Item tragen.\nEs erhöht die Chance, aus einem Kampf\nmit einem wilden Pokémon zu fliehen."
    es: "Debe llevarla un Pokémon. Permite\nhuir de combates contra Pokémon\nsalvajes."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
smooth_rock:
  names:
    jp_kana: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　すなあらしを\nつかうと　いつもより　すなあらしの\nじかんが　ながくなる。"
    en: "A Pokémon hold item that extends the\nduration of the move Sandstorm used\nby the holder."
    fr: "Objet à tenir augmentant la durée de\nla capacité Tempêtesable utilisée par le\nporteur."
    it: "Strumento da far tenere a un\nPokémon che allunga la durata\ndella mossa Terrempesta."
    de: "Ein Item zum Tragen.\nVerlängert die Dauer von Sandsturm."
    es: "Prolonga la duración del movimiento\nTorm. Arena que use el Pokémon\nque la lleva."
    ko: "지니게 한 포켓몬이 모래바람을\n쓰면 여느 때보다 모래바람의\n시간이 길어진다."
snow_mail:
  names:
    jp_kana: ブリザードメール
    en: Snow Mail
    fr: Lettre Neige
    it: Mess. Neve
    de: Schneebrief
    es: Carta Nieve
    ko: 블리자드메일
  descriptions:
    jp_kana: "さむそうな　ゆきの　せかいが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a\nchilly, snow-covered world.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres représentant un\nmonde gelé, recouvert de neige.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nricorda un paesaggio innevato. Un\nPokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine\nEislandschaft als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con la imagen de un bonito mundo\ncubierto de nieve. Haz que la entregue\nun Pokémon."
    ko: "추워 보이는 눈의 세계가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
soda_pop:
  names:
    jp_kana: サイコソーダ
    en: Soda Pop
    fr: Soda Cool
    it: Gassosa
    de: Sprudel
    es: Refresco
    ko: 미네랄사이다
  descriptions:
    jp_kana: "シュワっと　はじける　ソーダ。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    en: "A fizzy soda drink.\nIt restores the HP of one Pokémon by\n60 points."
    fr: "Une boisson pétillante.\nRestaure 60 PV à un Pokémon."
    it: "Bevanda frizzante.\nRestituisce 60 PS ad un Pokémon."
    de: "Ein sprudelndes Mineralwasser,\ndas die KP eines Pokémon\num 60 Punkte auffüllt."
    es: "Chispeante bebida gaseosa que\nrestaura 60 PS de un Pokémon."
    ko: "쏴하고 톡 쏘는 사이다.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
soft_sand:
  names:
    jp_kana: やわらかいすな
    en: Soft Sand
    fr: Sable Doux
    it: Sabbia Soff.
    de: Pudersand
    es: Arena Fina
    ko: 부드러운모래
  descriptions:
    jp_kana: "さわると　サラサラする　すな。\nもたせると　じめんタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a loose, silky sand that boosts\nthe power of Ground-type moves."
    fr: "Objet à tenir. Sable fin et soyeux\nmontant la puissance des capacités de\ntype Sol."
    it: "Strumento da far tenere a un Pokémon.\nSabbia leggera e farinosa che potenzia\nle mosse di tipo Terra."
    de: "Ein Item zum Tragen. Samtiger\nSand, der Attacken vom Typ\nBoden verstärkt."
    es: "Debe llevarla un Pokémon. La\nsuavidad de la arena fortalece\nlos ataques de tipo Tierra."
    ko: "만지면 보슬보슬한 모래.\n지니게 하면 땅타입\n기술의 위력이 올라간다."
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Camp. Alivio
    ko: 평온의방울
  descriptions:
    jp_kana: "ここちよい　ねいろの　すず。\nもたせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    en: "An item to be held by a Pokémon. It is\na bell with a comforting chime that\ncalms the holder and makes it friendly."
    fr: "Objet à tenir. Grelot dont le carillon\ncalme le porteur et favorise l’amitié."
    it: "Strumento da far tenere a un Pokémon.\nCampanella dal suono rassicurante che\ncalma chi la usa rendendolo amichevole."
    de: "Ein Item, das einem Pokémon zum\nTragen gegeben werden kann. Es\nbesänftigt und fördert Sympathie."
    es: "Una campana con un tañido calmante\nque reconforta al Pokémon que la lleva\ny lo vuelve más amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
soul_dew:
  names:
    jp_kana: こころのしずく
    en: Soul Dew
    fr: Rosée Ame
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
  descriptions:
    jp_kana: "ラティオス　または　ラティアスに\nもたせると　とくこうと　とくぼうが\nあがる　ふしぎな　たま。"
    en: "A wondrous orb to be held by LATIOS or\nLATIAS. It raises both the Sp. Atk and\nSp. Def stats."
    fr: "Orbe prodigieux à faire tenir à LATIOS\nou LATIAS qui monte leur Atq. Spé. et\nleur Déf. Spé."
    it: "Sfera miracolosa da far tenere a\nLATIOS o LATIAS. Aumenta l’Attacco\nSpeciale e la Difesa Speciale."
    de: "Ein Item, das von LATIOS oder LATIAS\ngetragen werden kann. Es hebt Spezial-\nAngriff und Spezial-Verteidigung."
    es: "Un orbe fantástico que deben llevar\nLATIOS o LATIAS. Sube el At. Esp. y\nla Def. Esp."
    ko: "라티오스 혹은 라티아스에게\n지니게 하면 특수공격과 특수방어가\n올라가는 이상한 구슬."
space_mail:
  names:
    jp_kana: スペースメール
    en: Space Mail
    fr: Lettre Cosmo
    it: Mess. Spazio
    de: Sternbrief
    es: Car. Sideral
    ko: 스페이스메일
  descriptions:
    jp_kana: "ゆうだいな　うちゅう　くうかんが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print depicting\nthe huge expanse of space.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres représentant le\nvide interstellaire.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nrichiama l’immensità dell’universo. Un\nPokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat den\nweiten Weltraum als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con la imagen de una galaxia.\nHaz que la entregue un Pokémon."
    ko: "웅대한 우주 공간이\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
spell_tag:
  names:
    jp_kana: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
  descriptions:
    jp_kana: "あやしくて　ぶきみな　おふだ。\nもたせると　ゴーストタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a sinister, eerie tag that boosts\nthe power of Ghost-type moves."
    fr: "Objet à tenir. Plaque sinistre et\nétrange montant la puissance des\ncapacités de type Spectre."
    it: "Strumento da far tenere a un Pokémon.\nTarga sinistra e inquietante che\npotenzia le mosse di tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser,\nunheimlicher Sticker, der Attacken\nvom Typ Geist verstärkt."
    es: "Misterioso y oscuro objeto que\nrefuerza los ataques de tipo Fantasma.\nDebe llevarlo un Pokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
spelon_berry:
  names:
    jp_kana: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nノワキが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nSpelon Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Kiwanbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Wikano."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n메호키가 자란다."
splash_plate:
  names:
    jp_kana: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
  descriptions:
    jp_kana: "みずの　タイプの　せきばん。\nもたせると　みずタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Water-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Eau."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Wasser."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Agua.\nDebe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
spooky_plate:
  names:
    jp_kana: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantô
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
  descriptions:
    jp_kana: "ゴーストの　タイプの　せきばん。\nもたせると　ゴーストタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Ghost-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Spectre."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Geist."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Fantasma.\nDebe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
sprayduck:
  names:
    jp_kana: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Entonkanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた　きのみを\nすくすく　そだてる。"
    en: "A watering can shaped like a PSYDUCK.\nIt helps promote healthy growth of\nBerries planted in soft soil."
    fr: "Arrosoir en forme de PSYKOKWAK. Aide\nà la croissance des Baies plantées dans\nles sols meubles."
    it: "Annaffiatoio fatto a forma di PSYDUCK.\nFavorisce la crescita delle Bacche\npiantate nel terreno soffice."
    de: "Eine Gießkanne in Form von\nENTON. Gieße gepflanzte Beeren,\ndamit sie besser wachsen."
    es: "Una regadera con forma de PSYDUCK.\nAyuda a que las bayas plantadas en\ntierra suelta crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 땅에 심은 나무열매를\n쑥쑥 키운다."
ss_ticket:ss_anne:
  names:
    jp_kana: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Bigl. Nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
  descriptions:
    jp_kana: "サント・アンヌごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    en: "The ticket required for sailing on the\nferry S.S. Anne. It has a drawing of a\nship on it."
    fr: "Le ticket requis pour embarquer à bord\ndu ferry L’Océane. Il y a un bateau\ndessiné dessus."
    it: "Biglietto necessario per salire sulla\nM/N Anna. C’è disegnata una nave."
    de: "Ein Ticket, um auf der M.S. Anne\nzu fahren. Eine Zeichnung der\nFähre ist auf dem Ticket zu sehen."
    es: "Es el billete válido para embarcar en el\nS.S. Anne. Tiene dibujado un barco."
    ko: "상트앙느호에 탈 때\n필요한 승선티켓.\n배의 그림이 그려져 있다."
stable_mulch:
  names:
    jp_kana: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Ab. Fijador
    ko: 오래오래비료
  descriptions:
    jp_kana: "ふかふかのつちに　まいて　つかう。\nきのみが　おちるまでの　じかんが\nふだんより　ながくなる。"
    en: "A plant fertilizer spread on soft soil.\nIt extends the time ripened Berries\nremain on their plants before falling."
    fr: "Un engrais utilisé sur sol meuble.\nLes Baies mûres tombent moins vite de\nla plante."
    it: "Fertilizzante da usare sul terreno\nsoffice. Le Bacche mature rimangono\nsulla pianta più a lungo prima di cadere."
    de: "Ein Dünger für weichen Boden.\nDie Beeren halten länger, bevor\nsie zu Boden fallen."
    es: "Fertilizante para tierra suelta que\nretrasa la caída de las bayas\nmaduras."
    ko: "푹신푹신한 땅에 뿌려 쓴다.\n나무열매가 떨어질 때까지 시간이\n여느 때보다 길어진다."
star_piece:
  names:
    jp_kana: ほしのかけら
    en: Star Piece
    fr: Morc. Etoile
    it: Pezzo Stella
    de: Sternenstück
    es: Tr. Estrella
    ko: 별의조각
  descriptions:
    jp_kana: "キラキラと　あかく　ひかる\nきれいな　ほうせきの　かけら。\nショップで　たかく　うれる。"
    en: "A shard of a pretty gem that sparkles\nin a red color. It can be sold at a\nhigh price to shops."
    fr: "Fragment de gemme qui brille d’un éclat\nrouge. Peut se vendre à bon prix aux\nmagasins."
    it: "Frammento di una bella gemma\ndi un rosso brillante. Si può\nvendere a caro prezzo ai negozi."
    de: "Teil eines hübschen Edelsteins, der in\nrötlicher Farbe schimmert. Erzielt einen\nhohen Preis, wenn man ihn verkauft."
    es: "Fragmento de una bonita gema roja\nque puede venderse muy caro en las\ntiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
stardust:
  names:
    jp_kana: ほしのすな
    en: Stardust
    fr: Pouss.Etoile
    it: Polvostella
    de: Sternenstaub
    es: Polvoestelar
    ko: 별의모래
  descriptions:
    jp_kana: "てざわりが　サラサラの\nあかくて　きれいな　すな。\nショップで　たかく　うれる。"
    en: "Lovely, red-colored sand with a loose,\nsilky feel. It can be sold at a high\nprice to shops."
    fr: "Sable rouge ravissant, aux grains très\nfins. Peut être vendu à bon prix aux\nmagasins."
    it: "Bella sabbia rossa dalla consistenza\nleggera e farinosa. Si può vendere\na caro prezzo ai negozi."
    de: "Schöner, roter Sand, der sich\nseidenweich anfühlt. Er ist von\nhohem Wert."
    es: "Bonita arena roja de tacto sedoso que\nalcanza un alto precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 비싸게 팔린다."
starf_berry:
  names:
    jp_kana: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nもたせると　ピンチのとき　１つの\nのうりょくが　ぐーんと　あがる。"
    en: "A Poffin ingredient.\nIf held by a Pokémon, it sharply raises\none of its stats in a pinch."
    fr: "Ingrédient pour Poffin.\nTenue, cette Baie monte beaucoup une\ndes stats si nécessaire."
    it: "Si usa per fare i Poffin. Aumenta\nmolto una statistica se il Pokémon\nche la tiene si trova in difficoltà."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nhebt die Beere in einer Notlage\neinen Statuswert eines Pokémon."
    es: "Ingrediente para Pokochos. Si la lleva\nun Pokémon, aumenta drásticamente 1\ncaracterística en un momento de apuro."
    ko: "포핀의 재료.\n지니게 하면 위급할 때\n능력 중 하나가 크게 올라간다."
steel_mail:
  names:
    jp_kana: スチールメール
    en: Steel Mail
    fr: Lettre Acier
    it: Mess. Lega
    de: Stahlbrief
    es: Carta Acero
    ko: 스틸메일
  descriptions:
    jp_kana: "かっこいい　きかいの　もようが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of cool\nmechanical designs.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres orné de motifs\nmécaniques assez froids.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nrichiama grandiosi disegni meccanici.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat ein\nMetallmuster als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con un estupendo diseño de\nestilo industrial. Haz que la entregue\nun Pokémon."
    ko: "멋진 기계 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
sticker_bag:
  names:
    jp_kana: シールぶくろ
    en: Seal Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa Sellos
    ko: 실주머니
  descriptions:
    jp_kana: "シールが　１０まい　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold ten Seals for\ndecorating Poké Balls."
    fr: "Petit sac pouvant contenir dix Sceaux\npour décorer les Poké Balls."
    it: "Sacchettino che può contenere\ndieci Bolli per decorare le Poké Ball."
    de: "Ein kleines Tütchen. Es bietet Platz\nfür bis zu zehn Sticker für die\nPokébälle."
    es: "Bolsita con capacidad para diez sellos\nde los que decoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
sticker_case:
  names:
    jp_kana: シールいれ
    en: Seal Case
    fr: Boîte Sceaux
    it: Portabolli
    de: Stick.Koffer
    es: Caja Sellos
    ko: 실상자
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Seals that can be\napplied to the capsule cases of Poké\nBalls."
    fr: "Boîte contenant les Sceaux pouvant\nêtre placés sur les capsules des\nPoké Balls."
    it: "Contenitore per conservare i Bolli\nche possono essere applicati sulle\nCapsule delle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker\nfür die Ballkapseln der Pokébälle\naufbewahren."
    es: "Caja en la que se pueden guardar los\nsellos que se aplican a las cápsulas\nde las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
sticky_barb:
  names:
    jp_kana: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
  descriptions:
    jp_kana: "もたせると　まいターン　ダメージを\nうける。　じぶんに　ふれてきた\nあいてに　くっつく　ことも　ある。"
    en: "A hold item that damages the holder on\nevery turn. It may latch on to foes\nthat touch the holder."
    fr: "Objet à tenir blessant le porteur à\nchaque tour. Peut s’accrocher aux\nennemis qui attaquent le porteur."
    it: "Strumento che danneggia chi lo\ntiene ad ogni turno. Può attaccarsi\nal nemico che tocca chi lo tiene."
    de: "Dieses Item (Tragen) schadet dem\nTräger in jeder Runde und eventuell dem\nGegner, wenn der den Träger berührt."
    es: "Daña en cada turno al Pokémon que\nla lleva y también puede dañar a los\nenemigos que toquen al Pokémon."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해온 상대에게\n들러붙기도 한다."
stone_plate:
  names:
    jp_kana: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
  descriptions:
    jp_kana: "いわの　タイプの　せきばん。\nもたせると　いわタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Rock-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Roche."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Gestein."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Roca.\nDebe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Depochiave
    de: L-Schlüssel
    es: Ll. Almacén
    ko: 창고열쇠
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガだんの　あやしい\nそうこに　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister\nwarehouse located at the edge of\nVeilstone City."
    fr: "La clé de l’entrepôt de la Team Galaxie\nsitué à la périphérie de Voilaroc."
    it: "Chiave necessaria per aprire il\nmisterioso deposito del Team Galassia\nsituato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle des\nTeams Galaktik am Rande von Schleiede."
    es: "Llave del siniestro almacén del Equipo\nGalaxia que se encuentra en las afueras\nde Ciudad Rocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
suite_key:
  names:
    jp_kana: ルームキー
    en: Suite Key
    fr: Clé Chambre
    it: Chiave Suite
    de: B-Schlüssel
    es: Llave Suite
    ko: 룸키
  descriptions:
    jp_kana: "みずうみの　ほとりにある\nこうきゅうホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at the\nluxury hotel by a lake. For some odd\nreason, it often disappears."
    fr: "Clé de l’une des suites de l’hôtel de\nluxe se trouvant près du lac.\nBizarrement, elle disparaît souvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare\nspesso."
    de: "Schlüssel zu einer Hotelsuite.\nVerschwindet seltsamerweise\nimmer wieder mal."
    es: "Llave de una suite del hotel de lujo del\nlago. Por algún motivo, se pierde a\nmenudo."
    ko: "호수 근처에 있는 고급 호텔의 룸 키.\n왜인지는 모르나 잘 없어진다."
sun_stone:
  names:
    jp_kana: たいようのいし
    en: Sun Stone
    fr: Pierresoleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたいようのように　あかい。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is as red as the sun."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est rouge comme le soleil."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nÈ rossa come il sole."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er ist rot wie die Sonne."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs roja como el núcleo del sol."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
super_potion:
  names:
    jp_kana: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    en: "A spray-type medicine for wounds.\nIt restores the HP of one Pokémon by\n50 points."
    fr: "Un spray qui soigne les blessures.\nRestaure 50 PV à un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 50 PS ad un Pokémon."
    de: "Hilft bei Wunden.\nEs füllt die KP eines Pokémon\num 50 Punkte wieder auf."
    es: "Medicina en spray que cura heridas\ny restaura 50 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
super_repel:
  names:
    jp_kana: シルバースプレー
    en: Super Repel
    fr: Superepousse
    it: Superrepell.
    de: Superschutz
    es: Superrepel
    ko: 실버스프레이
  descriptions:
    jp_kana: "２００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents weak wild\nPokémon from appearing for 200 steps\nafter its use."
    fr: "Repousse les Pokémon sauvages\nfaibles pendant 200 pas."
    it: "Strumento che evita l’incontro con\nPokémon selvatici deboli per\n200 passi dopo l’utilizzo."
    de: "Hält 200 Schritte lang schwache \nwilde Pokémon ab."
    es: "Repele Pokémon salvajes débiles\nen un recorrido de 200 pasos."
    ko: "200보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
super_rod:
  names:
    jp_kana: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Super Amo
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
  descriptions:
    jp_kana: "さいしんの　すごい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    en: "An awesome, high-tech fishing rod.\nUse it by any body of water to fish for\nwild aquatic Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon\nsauvages dans les points d’eau."
    it: "Amo super tecnologico.\nSi usa per pescare Pokémon selvatici\nin qualsiasi specchio d’acqua."
    de: "Eine wundervoll gefertigte Angel.\nDie beste Angel, um nach\nPokémon zu fischen."
    es: "Una increíble caña de pescar de alta\ntecnología. Pesca Pokémon salvajes\nen todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
tamato_berry:
  names:
    jp_kana: マトマのみ
    en: Tamato Berry
    fr: Baie Tamato
    it: Baccamodoro
    de: Tamotbeere
    es: Baya Tamate
    ko: 토망열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　ポケモンに\nつかうと　なつくが　すばやさの\nきそポイントが　さがる。"
    en: "A Poffin ingredient. Using it on a\nPokémon makes it more friendly, but\nit also lowers its base Speed stat."
    fr: "Ingrédient pour Poffin.\nRend les Pokémon plus amicaux, mais\nbaisse leur stat Vitesse de base."
    it: "Si usa per fare i Poffin. Utilizzata su\nun Pokémon, lo rende più amichevole,\nma ne diminuisce la Velocità."
    de: "Eine Knursp-Zutat. Verwendung macht\nein Pokémon freundlicher, reduziert\naber permanent die Initiative."
    es: "Ingrediente para Pokochos. Si la usas\nen un Pokémon te ganas su amistad,\npero baja su Velocidad."
    ko: "포핀의 재료. 포켓몬에게\n사용하면 친밀해지지만 스피드의\n기초 포인트가 떨어진다."
tanga_berry:
  names:
    jp_kana: タンガのみ
    en: Tanga Berry
    fr: Baie Panga
    it: Baccaitan
    de: Tanigabeere
    es: Baya Yecana
    ko: 리체열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　むし　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Bug-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Insecte."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Coleottero del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Käfer. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Bicho."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 벌레 기술을\n당했을 때 위력이 약해진다."
thick_club:
  names:
    jp_kana: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Ossospesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
  descriptions:
    jp_kana: "なにかの　かたい　ホネ。\nカラカラ　または　ガラガラに\nもたせると　こうげきが　あがる。"
    en: "An item to be held by CUBONE or\nMAROWAK. It is a hard bone of some\nsort that boosts the Attack stat."
    fr: "Objet à faire tenir à OSSELAIT et\nOSSATUEUR. Os dur qui monte leur\nAttaque."
    it: "Strumento da far tenere a CUBONE o\nMAROWAK. Osso duro che migliora\nl’Attacco."
    de: "Ein harter Knochen, der den Angriffs-\nWert von TRAGOSSO oder KNOGGA\nerhöht, wenn sie ihn tragen."
    es: "Un extraño tipo de hueso que potencia\nel Ataque. Suelen llevarlo CUBONE o\nMAROWAK."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
thunder_stone:
  names:
    jp_kana: かみなりのいし
    en: Thunderstone
    fr: Pierrefoudre
    it: Pietratuono
    de: Donnerstein
    es: Piedratrueno
    ko: 천둥의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nいなずまの　もようが　ある。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt has a thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nUn éclair est dessiné dessus."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon. Sopra\nvi appare l’immagine di un fulmine."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die Entwicklung\naus. Er hat ein Blitzmuster."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nTiene dibujado un rayo."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n천둥번개 무늬가 있다."
timer_ball:
  names:
    jp_kana: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이마볼
  descriptions:
    jp_kana: "ターンすうが　かかれば　かかるほど\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    en: "A somewhat different Ball that\nbecomes progressively better the\nmore turns there are in a battle."
    fr: "Une Poké Ball un peu spéciale qui\nfonctionne de mieux en mieux à mesure\nque le combat s’éternise."
    it: "Poké Ball un po’ diversa che diventa\nprogressivamente più efficace con\nl’aumentare dei turni in lotta."
    de: "Ein Ball, der mit zunehmender\nKampfdauer effektiver wird."
    es: "Una Poké Ball algo distinta que va\nmejorando su rendimiento con cada\nturno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    en: TinyMushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Mini Seta
    ko: 작은버섯
  descriptions:
    jp_kana: "ちいさな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nけっこう　にんきが　たかい。"
    en: "A small and rare mushroom.\nIt is quite popular among certain\nmaniacal fan segments."
    fr: "Un petit champignon plutôt rare.\nIl est plutôt populaire parmi\ncertains fans dévoués."
    it: "Fungo piccolo e raro. È parecchio\napprezzato da alcuni gruppi\ndi intenditori fanatici."
    de: "Ein kleiner und seltener Pilz.\nSeine Fans sind ganz aus dem Häuschen,\nwenn sie einen finden."
    es: "Seta pequeña y poco común bastante\npopular entre determinados grupos\nde gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
tm001:
  names:
    jp_kana: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
    ko: 기술머신01
  descriptions:
    jp_kana: "せいしんを　たかめて　こうげきする。\nわざを　だすまえに　こうげきを\nうけると　しっぱいする。"
    en: "The user focuses its mind before\nlaunching this attack. It will fail if\nthe user is hit before it is used."
    fr: "Le lanceur se concentre avant\nd’attaquer. Echoue s’il est touché\navant d’avoir frappé."
    it: "Chi la usa prende la mira prima di\nsferrare un pugno. Fallirà se verrà\ncolpito prima di fare la mossa."
    de: "Der Anwender konzentriert sich vor\ndem Angriff. Wird er davor getroffen,\nist die Attacke wirkungslos."
    es: "Quien lo usa se concentra antes de\nlanzar su ataque. Fracasará si el rival\nle golpea antes de usarlo."
    ko: "정신력을 높여서 공격한다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
tm002:
  names:
    jp_kana: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
    ko: 기술머신02
  descriptions:
    jp_kana: "するどく　とがった　きょだいな\nツメで　ひっかいて　こうげきする。"
    en: "Sharp, huge claws hook and slash\nthe foe quickly and with great\npower."
    fr: "Le lanceur lacère l’ennemi de ses\ngrandes griffes aiguisées."
    it: "Chi la usa attacca con artigli\naffilati che graffiano il nemico\nrapidamente e con grande forza."
    de: "Der Gegner wird mit langen,\nscharfen Krallen brutal attackiert."
    es: "Engancha y araña al rival con unas\npotentes y enormes garras afiladas."
    ko: "날카롭고 뾰족한 모양의\n거대한 발톱으로 할퀴어 공격한다."
tm003:
  names:
    jp_kana: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
    ko: 기술머신03
  descriptions:
    jp_kana: "みずの　しんどうを　あたえて\nこうげきする。　あいてを　こんらんの\nじょうたいに　することが　ある。"
    en: "The foe is hit with a pulsing blast\nof water. It may also confuse the\ntarget."
    fr: "Le lanceur envoie de puissants jets\nd’eau. Cela peut rendre l’ennemi\nconfus."
    it: "Il nemico viene colpito da un getto\nd’acqua ultrasonico che può anche\nconfonderlo."
    de: "Der Gegner wird von einer kräftigen\nWasserwelle getroffen. Diese\nkann ihn eventuell verwirren."
    es: "Embiste al enemigo con una ola de gran\npotencia que también puede causar\nconfusión."
    ko: "물의 진동으로 공격한다. \n상대를 혼란 상태로\n만들기도 한다."
tm004:
  names:
    jp_kana: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
    ko: 기술머신04
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつして\nこころを　しずめることで　じぶんの\nとくこうと　とくぼうを　あげる。"
    en: "The user quietly focuses its mind and\ncalms its spirit to raise its Sp. Atk\nand Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide\ndans son esprit pour monter son\nAtq. Spé. et sa Déf. Spé."
    it: "Chi la usa si concentra mentalmente e\ncalma il suo spirito per aumentare\nl’Attacco Speciale e la Difesa Speciale."
    de: "Der Anwender konzentriert und beruhigt\nsich. So werden Spezial-Angriff und\nSpezial-Verteidigung verstärkt."
    es: "Quien lo usa concentra su energía\nmental y calma su espíritu para\naumentar su At. Esp. y su Def. Esp."
    ko: "조용히 정신을 통일해서\n마음을 가라앉혀 자신의\n특수공격과 특수방어를 올린다."
tm005:
  names:
    jp_kana: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
    ko: 기술머신05
  descriptions:
    jp_kana: "あいてを　にがして　ひかえポケモンを\nひきずりだす。　やせいポケモンなら\nせんとうは　おわる。"
    en: "The foe is scared off, to be replaced\nby another Pokémon in its party.\nIn the wild, the battle ends."
    fr: "Effraie le Pokémon ennemi et le\nremplace par un autre. Dans la nature,\nmet fin au combat."
    it: "Il nemico è costretto a lasciare\nla lotta e viene sostituito. Se\nè selvatico, la lotta finisce."
    de: "Der Brüller schlägt den Gegner in\ndie Flucht. Ein Kampf gegen ein\nwildes Pokémon wird beendet."
    es: "Asusta tanto al rival que tiene que ser\nsustituido por otro de su grupo. Si es\nun Pokémon salvaje, la batalla acaba."
    ko: "상대를 도망치게 해서 교대 포켓몬을\n꺼내게 한다. 야생 포켓몬과\n배틀 중이었다면 배틀이 끝난다."
tm006:
  names:
    jp_kana: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
    ko: 기술머신06
  descriptions:
    jp_kana: "もうどくの　じょうたいに　する。\nターンすうが　すすむほど　どくの\nダメージりょうは　ふえる。"
    en: "A move that leaves the foe badly\npoisoned. This poison damage\nworsens every turn."
    fr: "Empoisonne gravement l’ennemi. Les\ndégâts dus au poison augmentent à\nchaque tour."
    it: "Iperavvelena il nemico con\nuna potente tossina. Il danno\npeggiora ad ogni turno."
    de: "Der Gegner wird schwer vergiftet.\nDer Schaden durch das Gift wird\nin jeder Runde stärker."
    es: "Un movimiento altamente tóxico que\nenvenena gravemente al rival y causa\nun daño mayor en cada turno."
    ko: "맹독 상태로 만든다.\n턴 수가 올라갈수록 독의\n데미지량이 늘어난다."
tm007:
  names:
    jp_kana: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
    ko: 기술머신07
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを\nふらして　こおりタイプ　いがいの\nポケモンに　ダメージを　あたえる。"
    en: "Summons a hailstorm that lasts for\nfive turns. The hailstorm damages\nall types except Ice."
    fr: "Invoque une tempête de grêle qui dure\n5 tours. Ne blesse pas les Pokémon de\ntype Glace."
    it: "Chi la usa causa una grandinata di\n5 turni. Danneggia tutti i Pokémon\ntranne il tipo Ghiaccio."
    de: "Der verursachte Hagelsturm hält 5\nRunden an und schadet allen Pokémon,\naußer denen des Typs Eis."
    es: "Invoca una tormenta de granizo que\ndura cinco turnos y daña a todos los\nPokémon excepto a los de tipo Hielo."
    ko: "5턴 동안 싸라기눈을\n내리게 해서 얼음타입 이외의\n포켓몬에게 데미지를 준다."
tm008:
  names:
    jp_kana: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
    ko: 기술머신08
  descriptions:
    jp_kana: "ちからを　こめて　きんにくを\nあつくする　ことで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    en: "The user tenses its muscles to bulk up\nits body, boosting both its Attack and\nDefense stats."
    fr: "Le lanceur tend ses muscles pour se\ngonfler, ce qui booste son Attaque et\nsa Défense."
    it: "Chi la usa tende i muscoli per\ningrossare il corpo, facendo\nsalire Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an\nund steigert damit den Angriffs- und\nden Verteidigungs-Wert."
    es: "Tensa los músculos de quien lo usa y\npotencia su Ataque y su Defensa."
    ko: "힘을 담아 근육을 두껍게 하여\n자신의 공격과 방어를 올린다."
tm009:
  names:
    jp_kana: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
    ko: 기술머신09
  descriptions:
    jp_kana: "タネを　いきおいよく　２ー５かい\nはっしゃして　こうげきする。"
    en: "The user forcefully shoots seeds at\nthe foe. Two to five seeds are shot in\nrapid succession."
    fr: "Le lanceur mitraille l’ennemi avec\nune rafale de graines. De 2 à 5\nrafales sont lancées à la suite."
    it: "Chi la usa spara raffiche di semi sul\nnemico. Vengono sparate da 2 a 5\nraffiche in rapida successione."
    de: "Der Anwender bewirft den Gegner\nin schneller Folge 2- bis 5-mal\nmit Samen."
    es: "Dispara de dos a cinco potentes\nráfagas de semillas contra el rival."
    ko: "씨앗을 기세 좋게 2-5회\n발사하여 공격한다."
tm010:
  names:
    jp_kana: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
    ko: 기술머신10
  descriptions:
    jp_kana: "おぼえる　ポケモンの　かくされた\nのうりょくで　わざの　タイプと\nいりょくが　　かわる。"
    en: "A variable move that changes type\nand power depending on the hidden\nability of the Pokémon using it."
    fr: "La puissance et le type de la\ncapacité dépendent de l’aptitude\ncachée du lanceur."
    it: "Mossa variabile che cambia tipo e\npotenza secondo l’abilità nascosta\ndel Pokémon che la usa."
    de: "Die Stärke und der Typ dieser Attacke\nhängen vom jeweiligen Pokémon ab."
    es: "Movimiento variable que cambia de tipo\ny potencia en función de la habilidad\noculta del Pokémon que lo use."
    ko: "기술을 배운 포켓몬의\n숨겨진 능력으로\n기술 타입과 위력이 바뀐다."
tm011:
  names:
    jp_kana: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
    ko: 기술머신11
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを\nつよくして　ほのおタイプの\nわざの　いりょくを　あげる。"
    en: "The user intensifies the sun for\nfive turns, powering up Fire-type\nmoves."
    fr: "Fait briller le soleil pendant 5 tours et\naméliore les capacités de type Feu."
    it: "Chi la usa intensifica il sole per\n5 turni, potenziando le mosse di\ntipo Fuoco."
    de: "Die Sonne brennt unbarmherzig 5\nRunden lang. Dadurch werden Attacken\nvom Typ Feuer verstärkt."
    es: "Quien lo usa intensifica el sol durante\ncinco turnos, lo que potencia los\nataques de tipo Fuego."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다."
tm012:
  names:
    jp_kana: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
    ko: 기술머신12
  descriptions:
    jp_kana: "あいてを　おこらせて　２ー４ターンの\nあいだ　ダメージを　あたえるわざ\nいがい　だせない　ようにする。"
    en: "The foe is taunted into a rage that\nallows it to use only attack moves for\ntwo to four turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser\nque des attaques pendant 2 à 4 tours."
    it: "Mossa che provoca il nemico,\ninducendolo ad usare solo\nmosse d’attacco per 2-4 turni."
    de: "Der Gegner wird so gereizt,\ndass er über 2 - 4 Runden\nnur Angriffsattacken einsetzt."
    es: "Provoca un ataque de ira en el rival que\nsolo le permite usar movimientos de\nataque en dos a cuatro turnos."
    ko: "상대를 화나게 해서 2-4턴 동안\n데미지를 주는 기술 이외는\n쓸 수 없게 한다."
tm013:
  names:
    jp_kana: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
    ko: 기술머신13
  descriptions:
    jp_kana: "れいきの　ビームを　はっしゃして\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    en: "The foe is struck with an icy-cold\nbeam of energy. It may also freeze\nthe target solid."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il nemico è colpito da un raggio di\nenergia gelido che può anche\ncongelarlo."
    de: "Der Gegner wird von einem eiskalten\nEnergiestrahl getroffen. Dieser friert\nihn eventuell ein."
    es: "Ataca al enemigo con un rayo de hielo\nque puede llegar a congelarlo."
    ko: "냉기 빔을 발사해서 공격한다.\n상대를 얼음 상태로 만들기도 한다."
tm014:
  names:
    jp_kana: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
    ko: 기술머신14
  descriptions:
    jp_kana: "はげしい　ふぶきを　ぶつけて\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    en: "A howling blizzard is summoned to\nstrike the foe. It may also freeze\nthe target solid."
    fr: "Une violente tempête de neige est\ndéclenchée sur l’ennemi. Peut aussi\nle geler."
    it: "Colpisce il nemico con una tremenda\ntempesta di ghiaccio che può anche\ncongelarlo."
    de: "Eine gnadenlose Eis- und Schnee- \nAttacke, die alle Gegner trifft und\nsie eventuell einfrieren kann."
    es: "Invoca una tormenta de viento y nieve\nque envuelve al enemigo y puede llegar\na congelarlo."
    ko: "세찬 눈보라를 부딪쳐서 공격한다.\n상대를 얼음 상태로 만들기도 한다."
tm015:
  names:
    jp_kana: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
    ko: 기술머신15
  descriptions:
    jp_kana: "つよい　こうせんを　はっしゃする。\nつかった　つぎのターンは　はんどうで\nうごけなくなる。"
    en: "The foe is attacked with a powerful\nbeam. The user must rest on the next\nturn to regain its energy."
    fr: "Projette un puissant rayon sur\nl’ennemi. Le lanceur doit se reposer\nau tour suivant."
    it: "Colpisce il nemico con un potente\nraggio. Chi la usa salta il turno\nsuccessivo per recuperare energia."
    de: "Eine äußerst starke Attacke, die\nviel Schaden anrichtet. Anwender\nmuss sich in nächster Runde ausruhen."
    es: "Ataca al rival con un potente rayo,\npero quien lo usa debe descansar en el\nsiguiente turno para reponer energía."
    ko: "강한 광선을 발사한다.\n사용한 다음 턴은 반동으로\n움직일 수 없다."
tm016:
  names:
    jp_kana: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
    ko: 기술머신16
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅわざの\nダメージを　よわめる。"
    en: "A wondrous wall of light is put up to\nsuppress damage from special attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit\nles dégâts causés par les attaques\nspéciales durant 5 tours."
    it: "Innalza una barriera di luce meravi-\ngliosa per ridurre i danni degli attacchi\nspeciali per 5 turni."
    de: "Eine Wand aus Licht wird über 5 Runden\nerrichtet. Sie senkt den Schaden\ndurch Attacken des Spezial-Angriffs."
    es: "Impresionante pared de luz que reduce\nel daño de los ataques especiales\ndurante cinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수 기술의\n데미지를 약하게 만든다."
tm017:
  names:
    jp_kana: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
    ko: 기술머신17
  descriptions:
    jp_kana: "こうげきを　まったく　うけない。\nわざを　れんぞくで　だすと　しっぱい\nしやすくなる。"
    en: "It enables the user to evade all\nattacks. Its chance of failing rises\nif it is used in succession."
    fr: "Le lanceur esquive toutes les attaques.\nPlus la capacité est utilisée de fois à la\nsuite, plus elle risque d’échouer."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Garantierter Schutz in der Runde,\nin der die Attacke eingesetzt wird.\nKönnte bei häufigem Einsatz versagen."
    es: "Ayuda a esquivar todos los ataques. Si\nse usa varias veces seguidas, aumentan\nlas probabilidades de que falle."
    ko: "모든 공격을 받지 않는다.\n기술을 연속으로 쓰면\n실패하기 쉬워진다."
tm018:
  names:
    jp_kana: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
    ko: 기술머신18
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらして\nみずタイプの　わざの　いりょくを\nあげる。"
    en: "The user summons a heavy rain that\nfalls for five turns, powering up\nWater-type moves."
    fr: "Invoque de fortes pluies qui durent 5\ntours et améliorent les capacités de\ntype Eau."
    it: "Chi la usa provoca una forte pioggia\nper 5 turni che potenzia le mosse\ndi tipo Acqua."
    de: "Schwerer Niederschlag setzt für 5\nRunden ein. Attacken vom Typ Wasser\nwerden verstärkt."
    es: "Quien lo usa invoca una fuerte lluvia\nque dura cinco turnos y fortalece los\nataques de tipo Agua."
    ko: "5턴 동안 비를 내려서\n물타입 기술의 위력을 올린다."
tm019:
  names:
    jp_kana: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
    ko: 기술머신19
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあたえた　ダメージの　はんぶんの\nＨＰを　かいふく　できる。"
    en: "A nutrient-draining attack. The user’s\nHP is restored by half the damage\ntaken by the target."
    fr: "Une attaque qui convertit la moitié des\ndégâts infligés en PV."
    it: "Mossa che assorbe PS. Chi la usa\nrecupera una quantità di PS pari\nalla metà del danno inferto."
    de: "Der Gegner wird angegriffen und\ndie Hälfte des zugefügten Schadens\ndem Angreifer als KP gutgeschrieben."
    es: "Un ataque que consume nutrientes.\nQuien lo usa recupera la mitad de PS\ndel daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
tm020:
  names:
    jp_kana: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
    ko: 기술머신20
  descriptions:
    jp_kana: "ふしぎな　ちからに　まもられて\nどく　まひ　やけど　ねむりなどの\nじょうたい　いじょうに　ならない。"
    en: "The user creates a protective field\nthat prevents status problems like\npoison, paralysis, burn, and sleep."
    fr: "Champ protecteur empêchant les\nproblèmes de statut comme poison,\nparalysie, brûlure et sommeil."
    it: "Chi la usa crea un campo protettivo\nche difende da avvelenamento,\nsonno, paralisi e scottatura."
    de: "Ein Schild schützt das Team 5\nRunden vor Statusproblemen\njeglicher Art."
    es: "Un escudo que protege de problemas\nde estado como el sueño, la parálisis,\nel envenenamiento y las quemaduras."
    ko: "이상한 힘으로 보호받아\n독, 마비, 화상, 잠듦 등의\n상태 이상이 되지 않는다."
tm021:
  names:
    jp_kana: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
    ko: 기술머신21
  descriptions:
    jp_kana: "ふまんを　はらすために　ぜんりょくで\nこうげきする。　なついて　いないほど\nいりょくは　あがる。"
    en: "A full-power attack that grows more\npowerful the less the user likes its\nTrainer."
    fr: "Moins le Pokémon aime son Dresseur,\nplus cette attaque est puissante."
    it: "Mossa molto potente che infligge\nmaggiori danni se chi la usa non è\namico del suo Allenatore."
    de: "Je unbeliebter der Trainer bei\nseinem Pokémon ist, desto größer\nist die Wirkung."
    es: "Un ataque de gran potencia que resulta\nmás fuerte cuanto menos le gustes al\nPokémon que lo usa."
    ko: "불만을 풀기 위해서 전력으로\n공격한다. 친밀하지 않을수록\n위력이 올라간다."
tm022:
  names:
    jp_kana: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
  descriptions:
    jp_kana: "１ターンめに　ひかりを　あつめて\n２ターンめに　ひかりの　こうせんを\nはっしゃして　こうげきする。"
    en: "A two-turn attack. The user gathers\nlight, then blasts a bundled beam on\nthe second turn."
    fr: "Absorbe la lumière au premier tour et\nenvoie un rayon puissant au tour\nsuivant."
    it: "Chi la usa assorbe luce al primo turno\nper proiettare un raggio intenso al\nturno successivo."
    de: "Eine Attacke über 2 Runden.\nZunächst wird Sonnenlicht absorbiert,\nanschließend erfolgt der Angriff."
    es: "Ataque de dos turnos. En el primer\nturno se concentra luz y en el segundo,\nse canaliza en un rayo para atacar."
    ko: "1턴째에 빛을 모아서\n2턴째에 빛의 광선을\n발사하여 공격한다."
tm023:
  names:
    jp_kana: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
  descriptions:
    jp_kana: "かたいシッポで　こうげきする。\nダメージを　あたえた　あいての\nぼうぎょを　さげることが　ある。"
    en: "The foe is slammed with a sturdy\ntail of steel. It may also lower the\ntarget’s Defense stat if it hits."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser la Défense de\nl’ennemi."
    it: "Il nemico viene colpito da una\nrobusta coda d’acciaio. Può anche\nridurne la Difesa se va a segno."
    de: "Der Gegner wird mit der harten\nRute attackiert. Gleichzeitig kann\nsein Verteidigungs-Wert sinken."
    es: "Golpea al rival con un fuerte latigazo\nde acero. Si el ataque es certero,\npuede bajar la Defensa."
    ko: "단단한 꼬리로 공격한다.\n데미지를 준 상대의\n방어를 떨어뜨리기도 한다."
tm024:
  names:
    jp_kana: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
  descriptions:
    jp_kana: "つよい　でんげきを　あびせて\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    en: "A strong electric blast is loosed at\nthe foe. It may also leave the foe\nparalyzed."
    fr: "Une grosse décharge électrique tombe\nsur l’ennemi. Peut aussi le paralyser."
    it: "Il nemico viene colpito da una\npotente scarica elettrica che\npuò anche paralizzarlo."
    de: "Der Gegner wird mit einem verheerenden\nStromschlag gefrizzelt. Kann eventuell\nParalyse bewirken."
    es: "Ataca al rival con una fuerte descarga\neléctrica que puede llegar a paralizar."
    ko: "강한 전자파를 날려 공격한다.\n상대를 마비 상태로 만들기도 한다."
tm025:
  names:
    jp_kana: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
  descriptions:
    jp_kana: "はげしい　かみなりを　おとして\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    en: "A wicked thunderbolt is dropped on the\nfoe to inflict damage. It may also\nleave the target paralyzed."
    fr: "La foudre tombe sur l’ennemi pour\nlui infliger des dégâts. Peut aussi le\nparalyser."
    it: "Il nemico è colpito da un lampo\nviolentissimo che può anche\nparalizzarlo."
    de: "Der Gegner wird von einem mächtigen\nDonnerschlag, der Paralyse bewirken\nkann, heimgesucht."
    es: "Ataca con un terrible rayo que puede\nparalizar al rival."
    ko: "세찬 번개를 떨어뜨려 공격한다.\n상대를 마비 상태로 만든다."
tm026:
  names:
    jp_kana: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
  descriptions:
    jp_kana: "たたかっている　ポケモン　すべてに\nじしんの　しょうげきを　あたえて\nこうげきする。"
    en: "The user sets off an earthquake\nthat hits all the Pokémon in the\nbattle."
    fr: "Le lanceur provoque un tremblement\nde terre touchant tous les autres\nPokémon au combat."
    it: "Chi la usa provoca un potente sisma\nche colpisce gli altri Pokémon in campo."
    de: "Ein starkes Beben wird verursacht,\ndas allen Pokémon, außer Flug-Pokémon\nund dem Angreifer, Schaden zufügt."
    es: "Quien lo usa genera un terremoto que\nafecta a los demás Pokémon que están\ncombatiendo."
    ko: "지진의 충격을 일으켜서\n싸우고 있는 모든 포켓몬을\n공격한다."
tm027:
  names:
    jp_kana: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
  descriptions:
    jp_kana: "トレーナーのために　ぜんりょくで\nこうげきする。　なついて　いるほど\nいりょくは　あがる。"
    en: "A full-power attack that grows more\npowerful the more the user likes its\nTrainer."
    fr: "Une attaque furieuse dont la puissance\naugmente quand le Pokémon apprécie\nson Dresseur."
    it: "Mossa molto potente che infligge\nmaggiori danni se chi la usa è amico\ndel suo Allenatore."
    de: "Je beliebter der Trainer bei\nseinem Pokémon ist, desto\ngrößer ist die Wirkung."
    es: "Un ataque de gran potencia que resulta\nmás fuerte cuanto más le gustes al\nPokémon que lo usa."
    ko: "트레이너를 위해 전력으로 공격한다.\n친밀할수록 위력이 올라간다."
tm028:
  names:
    jp_kana: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nこうげきする。　どうくつで　つかうと\nそとに　だっしゅつ　できる。"
    en: "The user burrows, then attacks on the\nsecond turn. It can also be used to\nexit dungeons."
    fr: "Le lanceur creuse au 1ᵉʳ tour et frappe\nau 2ᵉ. Permet aussi de s’échapper d’un\ndonjon."
    it: "Chi la usa scava al primo turno e\nattacca al successivo. Si può\nusare per uscire dai luoghi chiusi."
    de: "Eine Attacke über 2 Runden.\nZunächst gräbt sich der Angreifer ein,\nanschließend erfolgt der Angriff."
    es: "Quien lo usa cava en el primer turno y\nataca en el segundo. También se puede\nusar para escapar de lugares cerrados."
    ko: "1턴째에 파고들어 2턴째에\n공격한다. 동굴에서 사용하면\n밖으로 탈출할 수 있다."
tm029:
  names:
    jp_kana: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
  descriptions:
    jp_kana: "つよい　ねんりきを　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    en: "The foe is hit by a strong telekinetic\nforce. It may also reduce the foe’s\nSp. Def stat."
    fr: "Une puissante force télékinésique\nfrappe l’ennemi. Peut aussi faire\nbaisser sa Déf. Spé."
    it: "Il nemico viene colpito da una potente\nforza telecinetica che può anche\nridurne la Difesa Speciale."
    de: "Ein mächtiger Strahl telekinetischer\nEnergie trifft den Gegner. Die\nSpezial-Verteidigung des Gegners sinkt."
    es: "Ataca al rival con un potente ataque\ntelequinético que le puede bajar la\nDefensa Especial."
    ko: "강한 초능력을 보내어 공격한다.\n상대의 특수방어를 떨어뜨리기도 한다."
tm030:
  names:
    jp_kana: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the\nfoe. It may also lower the foe’s\nSp. Def stat."
    fr: "Projette une grande ombre sur\nl’ennemi. Peut aussi faire baisser\nsa Déf. Spé."
    it: "Lancia sul nemico una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Der Gegner wird mit einem dunklen\nKlumpen attackiert, der eventuell die\nSpezial-Verteidigung senkt."
    es: "Lanza una bola oscura contra el rival\nque puede bajar la Defensa Especial."
    ko: "검은 그림자 덩어리를\n내던져서 공격한다.\n상대의 특수방어를 떨어뜨리기도 한다."
tm031:
  names:
    jp_kana: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
  descriptions:
    jp_kana: "こぶしなどで　こうげきする。\nひかりのかべや　リフレクターも\nはかいできる。"
    en: "The user attacks with tough fists,\netc. It can also break any barrier\nsuch as Light Screen and Reflect."
    fr: "Une attaque avec la main ou autre.\nPeut briser les barrières comme Mur\nLumière et Protection."
    it: "Colpisce il nemico con una mano.\nPuò rompere barriere come Riflesso\ne Schermoluce."
    de: "Der Gegner wird mit der Faust\nangegriffen. Barrieren wie Lichtschild\noder Reflektor werden zerstört."
    es: "Ataca con contundentes puñetazos.\nPuede destruir barreras como Pantalla\nLuz y Reflejo."
    ko: "주먹 등으로 공격한다.\n빛의장막이나 리플렉터도\n파괴할 수 있다."
tm032:
  names:
    jp_kana: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを\nつくる。　あいてを　まどわせることで\nかいひりつを　あげる。"
    en: "The user begins moving so quickly\nthat it creates illusory copies to\nraise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée\ndes copies illusoires de lui, augmentant\nson esquive."
    it: "Chi la usa si muove in fretta e crea\ncopie illusorie di se stesso che\naumentano la capacità di elusione."
    de: "Der Angreifer ist so schnell, dass\nvirtuelle Abbilder generiert werden,\ndie den Fluchtwert erhöhen."
    es: "Quien lo usa se mueve tan rápido que\ndeja una estela de sí mismo que\naumenta la evasión."
    ko: "재빠른 움직임으로 분신을 만든다.\n상대를 혼란시켜서 회피율을 올린다."
tm033:
  names:
    jp_kana: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつりわざの\nダメージを　よわめる。"
    en: "A wondrous wall of light is put up to\nsuppress damage from physical attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit\nles dégâts causés par les attaques\nphysiques durant 5 tours."
    it: "Innalza una barriera di luce mera-\nvigliosa per ridurre i danni degli\nattacchi fisici per 5 turni."
    de: "Eine Wand aus Licht wird für 5\nRunden errichtet, die den Schaden\nvon geg. physischen Att. reduziert."
    es: "Impresionante pared de luz que reduce\nel daño de los ataques físicos durante\ncinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대에게 받은 물리 기술의\n데미지를 약하게 만든다."
tm034:
  names:
    jp_kana: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
  descriptions:
    jp_kana: "でんげきを　すばやく　あびせて\nこうげきする。　こうげきは　かならず\nめいちゅうする。"
    en: "The user strikes the foe with a quick\njolt of electricity. This attack cannot\nbe evaded."
    fr: "Le lanceur envoie un choc électrique\nrapide à l’ennemi. Impossible à\nesquiver."
    it: "Chi la usa colpisce il nemico con una\nscossa di elettricità. Impossibile\neludere questa mossa."
    de: "Ein blitzschneller Elektroschock\ntrifft den Gegner. Ausweichen\nist unmöglich!"
    es: "Ataca al rival con una rápida sacudida\neléctrica que no se puede esquivar."
    ko: "전격을 재빠르게 날려 공격한다.\n공격은 반드시 명중한다."
tm035:
  names:
    jp_kana: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
  descriptions:
    jp_kana: "はげしい　ほのおを　はっしゃして\nこうげきする。　あいてを　やけどの\nじょうたいに　することが　ある。"
    en: "The foe is scorched with an intense\nblast of fire. The target may also be\nleft with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il nemico viene colpito da intense\nfiammate che possono anche scottarlo."
    de: "Der Gegner wird in ein Flammenmeer\ngehüllt. Verursacht eventuell\nVerbrennungen."
    es: "Abrasa al rival con una intensa\nllamarada que puede causarle\nquemaduras."
    ko: "세찬 불꽃을 발사해서 공격한다.\n상대를 화상 상태로 만들기도 한다."
tm036:
  names:
    jp_kana: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
  descriptions:
    jp_kana: "きたない　ヘドロを　なげつける。\nあいてを　どくの　じょうたいに\nすることが　ある。"
    en: "Unsanitary sludge is hurled at\nthe foe. It may also poison the\ntarget."
    fr: "Envoie des détritus sur l’ennemi. Peut\naussi l’empoisonner."
    it: "Chi la usa attacca lanciando fango\nsul nemico. Può anche avvelenarlo."
    de: "Der Gegner versinkt im Giftschlamm.\nKann eventuell Vergiftungen\nhervorrufen."
    es: "Descarga de lodo tóxico que puede\nllegar a envenenar al objetivo."
    ko: "더러운 오물을 내던진다.\n상대를 독 상태로 만들기도 한다."
tm037:
  names:
    jp_kana: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで\nじめん　いわ　はがね　タイプいがいに\nダメージを　あたえる。"
    en: "A five-turn sandstorm is summoned\nto hurt all combatants except the\nRock, Ground, and Steel types."
    fr: "Une tempête de sable de 5 tours qui\nblesse tous les Pokémon sauf les types\nRoche, Sol et Acier."
    it: "Causa una tempesta di sabbia per\n5 turni che danneggia tutti i tipi in\ncampo tranne Terra, Roccia e Acciaio."
    de: "Ein Sandsturm trifft für 5 Runden\nalle Pokémon, außer die des Typs\nBoden, Gestein und Stahl."
    es: "Tormenta de arena que dura 5 turnos y\ndaña a todos los Pokémon excepto\na los de tipo Roca, Tierra y Acero."
    ko: "5턴 동안 모래바람으로\n땅, 바위, 강철타입 이외의\n타입에게는 데미지를 준다."
tm038:
  names:
    jp_kana: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
  descriptions:
    jp_kana: "だいのじの　ほのおで　すべてを\nやきつくす。　あいてを　やけどの\nじょうたいに　することが　ある。"
    en: "The foe is attacked with an intense\nblast of all-consuming fire. It may\nalso leave the target with a burn."
    fr: "Un déluge de flammes ardentes submerge\nl’ennemi. Peut le brûler."
    it: "Investe il nemico con un’intensa\nfiammata che fa terra bruciata.\nPuò anche scottarlo."
    de: "Dem Gegner wird ordentlich eingeheizt.\nKann eventuell Verbrennungen\nhervorrufen."
    es: "Ataca al rival con una intensa ráfaga\nde fuego abrasador que puede causarle\nquemaduras."
    ko: "큰 대자의 불꽃으로\n모든 것을 불태운다.\n상대를 화상 상태로 만들기도 한다."
tm039:
  names:
    jp_kana: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
  descriptions:
    jp_kana: "いわを　なげつけ　こうげきする。\nおちた　いわが　うごきを　ふうじて\nあいての　すばやさを　さげる。"
    en: "Large boulders are hurled at the foe\nto inflict damage. It lowers the foe’s\nSpeed."
    fr: "Des rochers frappent l’ennemi. Réduit\naussi sa Vitesse en l’empêchant de\nse déplacer."
    it: "Colpisce il nemico con rocce. Inoltre,\nlo rallenta riducendone la Velocità."
    de: "Der Gegner wird mit Felsen be-\nworfen, die ihn blockieren und\nschnelle Angriffe verlangsamen."
    es: "Tira rocas que detienen al rival y\nbajan su Velocidad."
    ko: "바위를 내던져서 공격한다.\n떨어진 바위가 움직임을 막아\n상대의 스피드를 떨어뜨린다."
tm040:
  names:
    jp_kana: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
  descriptions:
    jp_kana: "すばやい　うごきで　ほんろうする。\nこうげきは　かならず　あいてに\nめいちゅうする。"
    en: "The user confounds the foe with speed,\nthen strikes. The attack lands without\nfail."
    fr: "Le lanceur prend l’ennemi de vitesse\net le lacère. N’échoue jamais."
    it: "Chi la usa confonde il nemico con\nla velocità, poi colpisce. L’attacco\nè infallibile."
    de: "Der Anwender irritiert den Gegner\ndurch Schnelligkeit, bevor er angreift.\nDiese Attacke trifft immer ihr Ziel."
    es: "Ataque que desconcierta al rival por\nsu rapidez y que no falla nunca."
    ko: "재빠른 움직임으로\n상대를 어지럽게 만든다.\n공격은 반드시 상대에게 명중한다."
tm041:
  names:
    jp_kana: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
  descriptions:
    jp_kana: "いちゃもんを　つけて　おなじわざを\nれんぞくで　だせない　ようにする。"
    en: "The user torments and enrages the\nfoe, making it incapable of using the\nsame move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour\nl’empêcher d’utiliser la même capacité\n2 fois de suite."
    it: "Chi la usa tormenta e fa infuriare\nil nemico, impedendogli di usare\nla stessa mossa 2 volte di seguito."
    de: "Der Anwender bringt den Gegner in Rage.\nDieser ist nicht mehr in der Lage, eine\nAttacke zweimal anzuwenden."
    es: "Atormenta al rival y le provoca un\nataque de ira que le impide usar el\nmismo movimiento dos veces seguidas."
    ko: "트집을 잡아서 똑같은 기술을\n연속으로 쓸 수 없게 한다."
tm042:
  names:
    jp_kana: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
  descriptions:
    jp_kana: "どく　まひ　やけど　のじょうたいで\nわざを　だすと　２ばいの　いりょくで\nこうげき　できる。"
    en: "An attack move that doubles its power\nif the user is poisoned, paralyzed, or\nhas a burn."
    fr: "Une attaque dont la puissance double\nlorsque le lanceur est empoisonné,\nparalysé ou brûlé."
    it: "Mossa d’attacco che raddoppia\nil suo effetto se chi la usa è\nscottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralys.\noder leidet er unter Verbrennung,\nverdoppelt sich die Kraft der Attacke."
    es: "Movimiento de ataque que dobla su\npotencia si quien lo utiliza está\nenvenenado, quemado o paralizado."
    ko: "독, 마비, 화상 상태에서\n기술을 쓰면 2배의 위력으로\n공격할 수 있다."
tm043:
  names:
    jp_kana: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
  descriptions:
    jp_kana: "くさむらや　みずべ　どうくつ　など\nたたかう　ばしょによって　あたえる\nついかこうかが　かわる。"
    en: "An attack move with effects that\nvary depending on the user’s\nenvironment."
    fr: "Les effets de cette attaque varient\nen fonction de l’environnement."
    it: "Mossa d’attacco con effetti che\nvariano a seconda del luogo in cui\nsi trova chi la usa."
    de: "Die Wirkung dieser Attacke ist\nabhängig von der Umgebung des\nAnwenders."
    es: "Movimiento de ataque que tiene efectos\ndistintos según la zona en la que se\nencuentre quien lo usa."
    ko: "풀밭이나 물가, 동굴 등\n싸우는 장소에 따라\n기술의 추가 효과가 바뀐다."
tm044:
  names:
    jp_kana: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむりつづける。\nＨＰと　からだの　いじょうを\nすべて　かいふくする。"
    en: "The user goes to sleep for two\nturns. It fully restores the user’s HP\nand heals any status problem."
    fr: "Le lanceur dort pendant 2 tours. Il\nregagne tous ses PV et n’a plus de\nproblèmes de statut."
    it: "Chi la usa dorme per 2 turni. Recupera,\nperò, tutti i PS e risolve tutti i suoi\nproblemi di stato."
    de: "Der Angreifer schläft 2 Runden. \nDabei werden die KP aufgefüllt und\ndie Statusprobleme behoben."
    es: "Quien lo usa duerme durante 2 turnos\ny restaura su salud y estado."
    ko: "2턴 동안 계속 잠잔다.\nHP와 몸의 이상을\n모두 회복한다."
tm045:
  names:
    jp_kana: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロにする。　メロメロに　なった\nあいては　わざが　だしにくくなる。"
    en: "If it is the opposite gender of the\nuser, the foe becomes infatuated\nand less likely to attack."
    fr: "Si l’ennemi est du sexe opposé, il\ntombe amoureux et rechigne alors\nà attaquer."
    it: "Se il nemico è del sesso opposto,\ns’infatua e attacca con meno\nprobabilità."
    de: "Gehört der Gegner dem anderen\nGeschlecht an, verliebt er sich\nund greift eventuell nicht an."
    es: "Si el rival de quien lo usa es del sexo\nopuesto, el enamoramiento reducirá las\nprobabilidades de que ataque."
    ko: "수컷은 암컷을, 암컷은 수컷을 유혹해\n헤롱헤롱하게 한다. 헤롱헤롱해진\n상대는 기술을 쓰기 어려워진다."
tm046:
  names:
    jp_kana: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
  descriptions:
    jp_kana: "こうげきと　どうじに　もちものを\nぬすむ。　じぶんに　もちものが\nあると　しっぱいする。"
    en: "The user attacks and steals the foe’s\nheld item simultaneously. It can’t\nsteal if the user holds an item."
    fr: "Le lanceur attaque l’ennemi et vole son\nobjet. Le lanceur ne peut rien voler\ns’il tient déjà un objet."
    it: "Se chi la usa non tiene uno strumento,\nattaccando il nemico, gli ruba lo\nstrumento."
    de: "Der Anwender greift an und stiehlt dem\nGegner gleichzeitig ein Item, sofern er\nselbst gerade kein Item trägt."
    es: "Quien lo usa ataca y roba el objeto que\nlleva su rival simultáneamente. Si lleva\nun objeto, no podrá robar el del rival."
    ko: "공격과 동시에 지닌 물건을 훔친다.\n자신이 물건을 지니고 있으면 실패한다."
tm047:
  names:
    jp_kana: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
  descriptions:
    jp_kana: "かたい　つばさを　おおきく　ひろげて\nたいあたりする。　じぶんの\nぼうぎょを　あげることが　ある。"
    en: "The foe is hit with wings of steel.\nIt may also raise the user’s Defense\nstat."
    fr: "Le lanceur frappe l’ennemi avec des\nailes d’acier. Peut aussi augmenter la\nDéfense du lanceur."
    it: "Colpisce il nemico con ali d’acciaio.\nPuò anche aumentare la Difesa\ndi chi la usa."
    de: "Den Gegner treffen stählerne\nFlügelschläge. Der Verteidigungs-Wert\ndes Angreifers steigt eventuell."
    es: "Ataca al adversario con alas de acero.\nTambién puede subir la Defensa de quien\nlo usa."
    ko: "단단한 날개를 크게 펼쳐서\n몸통박치기한다. 자신의\n방어가 올라가기도 한다."
tm048:
  names:
    jp_kana: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんの\nとくせいと　あいての　とくせいを\nいれかえる。"
    en: "The user employs its psychic power to\nexchange abilities with the foe."
    fr: "Le lanceur utilise ses pouvoirs\npsychiques pour échanger sa capacité\nspéciale avec l’ennemi."
    it: "Chi la usa sfrutta le sue facoltà\nmentali per scambiare l’abilità\ncon il nemico."
    de: "Durch Einsatz von Psycho-Kraft werden\nFähigkeiten mit dem Gegner getauscht."
    es: "Quien lo usa aprovecha su energía\npsíquica para intercambiar habilidades\ncon su adversario."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
tm049:
  names:
    jp_kana: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
  descriptions:
    jp_kana: "あいてが　つかおうとする　かいふくや\nのうりょく　へんかの　わざを\nよこどりして　じぶんに　つかう。"
    en: "The user steals the effects of any\nhealing or status-changing move the\nfoe attempts to use."
    fr: "Le lanceur vole l’effet des capacités\nde soin ou de changement de stats\nutilisées par l’ennemi."
    it: "Chi la usa ruba e utilizza una mossa\ncurativa o modifica-statistiche che\nil nemico vuole usare."
    de: "Stiehlt die Effekte der gegnerischen\nAttacke, wenn diese heilender oder\nstatusverändernder Natur sind."
    es: "Roba el efecto de cualquier movimiento\ncurativo o de cambio de características\nque intente usar el rival."
    ko: "상대가 사용하려고 하는\n회복이나 능력 변화 기술을\n가로채 자신이 쓴다."
tm050:
  names:
    jp_kana: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
  descriptions:
    jp_kana: "フルパワーで　ほのおの　こうげき。\nつかったあと　じぶんの　とくこうは\nがくっと　さがる。"
    en: "The user attacks the foe at full\npower using fiery energy. It also\nsharply reduces the user’s Sp. Atk."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse énormément\nl’Atq. Spé. du lanceur."
    it: "Chi la usa attacca il nemico usando\nenergia rovente. Riduce anche molto\nl’Attacco Speciale di chi la usa."
    de: "Angriff mit maximaler Kraft und\nfeuriger Energie, der gleichzeitig den\nSpezial-Angriff des Angreifers senkt."
    es: "Quien lo usa ataca con toda su fuerza,\npero ve muy reducido su At. Esp."
    ko: "풀 파워로 불꽃 공격을 한다.\n사용한 뒤 자신의 특수공격이\n크게 떨어진다."
tm051:
  names:
    jp_kana: わざマシン５１
    en: TM51
    fr: CT51
    it: MT51
    de: TM51
    es: MT51
    ko: 기술머신51
  descriptions:
    jp_kana: "じめんにおりて　からだを　やすめる。\nさいだいＨＰの　はんぶんだけ\nＨＰを　かいふくする。"
    en: "The user lands and rests its body.\nIt restores the user’s HP by up to\nhalf of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV\nmaximum."
    it: "Chi la usa sta fermo e riposa. Recupera\nfino a metà dei suoi PS massimi."
    de: "Der Anwender landet und ruht\nsich aus. Dabei füllen sich bis zu\n50 % der maximalen KP wieder auf."
    es: "Quien lo usa se posa y descansa, lo\nque restaura sus PS hasta la mitad\nde sus PS máximos."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
tm052:
  names:
    jp_kana: わざマシン５２
    en: TM52
    fr: CT52
    it: MT52
    de: TM52
    es: MT52
    ko: 기술머신52
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nあたった　あいての　とくぼうを\nさげることが　ある。"
    en: "The user attacks at full power.\nIt may also lower the foe’s Sp. Def\nstat if it hits."
    fr: "Le lanceur rassemble ses forces et\nlaisse éclater son pouvoir. Peut aussi\nbaisser la Déf. Spé. de l’ennemi."
    it: "Chi la usa attacca con tutta la sua\nforza. Se va a segno, può anche\ndiminuire la Difesa Speciale del nemico."
    de: "Ein Angriff mit aller Macht.\nDie Spezial-Verteidigung des\nGegners sinkt eventuell."
    es: "Quien lo usa ataca con toda su energía.\nTambién puede bajar la Defensa\nEspecial del enemigo si lo alcanza."
    ko: "혼신의 힘으로 공격한다.\n기술을 맞은 상대의\n특수방어를 떨어뜨리기도 한다."
tm053:
  names:
    jp_kana: わざマシン５３
    en: TM53
    fr: CT53
    it: MT53
    de: TM53
    es: MT53
    ko: 기술머신53
  descriptions:
    jp_kana: "いのちの　ちからを　あつめて　\nこうげきする。　あたった　あいての\nとくぼうを　さげることが　ある。"
    en: "The user draws power from nature and\nfires it at the foe. It may also lower\nthe target’s Sp. Def."
    fr: "Utilise les pouvoirs de la nature pour\nattaquer l’ennemi. Peut aussi baisser\nla Déf. Spé. de l’ennemi."
    it: "Chi la usa attinge energia dalla natura\ne la scaglia contro il nemico. Può anche\nridurne la Difesa Speciale."
    de: "Entfesselt die Kraft der Natur\ngegen den Gegner. Dessen\nSpezial-Verteidigung sinkt eventuell."
    es: "Quien lo usa extrae energía de la\nnaturaleza y la lanza contra su rival.\nPuede reducir la Defensa Especial."
    ko: "생명의 힘을 모아 공격한다.\n기술을 맞은 상대의\n특수방어를 떨어뜨리기도 한다."
tm054:
  names:
    jp_kana: わざマシン５４
    en: TM54
    fr: CT54
    it: MT54
    de: TM54
    es: MT54
    ko: 기술머신54
  descriptions:
    jp_kana: "てかげんして　こうげきする。\nこうげきした　あいての　ＨＰは\nかならず　１のこる。"
    en: "A restrained attack that prevents the\nfoe from fainting. The target is left\nwith at least 1 HP."
    fr: "Le lanceur retient ses coups pour que\nl’ennemi garde au moins 1 PV et ne\ntombe pas K.O."
    it: "Mossa limitata che impedisce al\nnemico di andare KO, lasciandogli\nalmeno 1 PS."
    de: "Eine zurückhaltende Attacke, die\neine Kampfunfähigkeit des Gegners\nverhindert, dem mindestens 1 KP bleibt."
    es: "Ataque controlado que impide que el\nenemigo se debilite; respeta 1 PS."
    ko: "어림짐작으로 공격한다.\n공격한 상대의 HP는\n반드시 1이 남는다."
tm055:
  names:
    jp_kana: わざマシン５５
    en: TM55
    fr: CT55
    it: MT55
    de: TM55
    es: MT55
    ko: 기술머신55
  descriptions:
    jp_kana: "あいての　ＨＰが　さいだいＨＰの\nはんぶんも　ないときに　つかうと\nわざの　いりょくは　２ばいに　なる。"
    en: "If the foe’s HP is down to under half,\nthis attack will hit with double the\npower."
    fr: "Cette attaque est deux fois plus\npuissante lorsque l’ennemi a moins\nde la moitié de ses PV."
    it: "Se i PS del nemico sono scesi a\nmeno di metà, questa mossa colpirà\ncon il doppio della forza."
    de: "Trifft mit doppelter Wucht, wenn\nder Gegner weniger als die Hälfte\nseiner KP hat."
    es: "Si los PS del rival bajan a menos de la\nmitad, este ataque lo alcanzará con el\ndoble de potencia."
    ko: "상대의 HP가 최대 HP의\n절반도 남지 않았을 때 사용하면\n기술의 위력이 2배가 된다."
tm056:
  names:
    jp_kana: わざマシン５６
    en: TM56
    fr: CT56
    it: MT56
    de: TM56
    es: MT56
    ko: 기술머신56
  descriptions:
    jp_kana: "どうぐを　なげつけて　こうげきする。\nなげる　もちものに　よって　わざの\nいりょくと　こうかは　かわる。"
    en: "The user flings its held item at the\nfoe to attack. Its power and effects\ndepend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient\nsur l’ennemi. La puissance et les effets\ndépendent de l’objet."
    it: "Chi la usa lancia sul nemico lo\nstrumento che tiene. La forza e\nl’effetto dipendono dallo strumento."
    de: "Der Anwender wirft sein Item auf den\nGegner. Die Kraft und die Wirkung\nhängen vom jeweiligen Item ab."
    es: "Quien lo usa ataca al enemigo arrojando\nel objeto que lleve. La potencia y los\nefectos dependen del objeto arrojado."
    ko: "도구를 내던져서 공격한다.\n던질 물건에 따라 기술의\n위력과 효과가 바뀐다."
tm057:
  names:
    jp_kana: わざマシン５７
    en: TM57
    fr: CT57
    it: MT57
    de: TM57
    es: MT57
    ko: 기술머신57
  descriptions:
    jp_kana: "でんげきを　あびせて　こうげきする。\nのこった　でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    en: "The user attacks with an electric\ncharge. The user may use any remaining\nelectricity to raise its Sp. Atk stat."
    fr: "Le lanceur tire un rayon chargé\nd’électricité. Peut aussi augmenter\nson Atq. Spé."
    it: "Chi la usa attacca con una carica\nelettrica e può usare l’elettricità\nrimasta per aumentare l’Att. Sp."
    de: "Greift mit einer elektrischen\nEntladung an. Der Spezial-Angriff\ndes Angreifers steigt eventuell."
    es: "Quien lo usa ataca con una descarga\neléctrica y puede usar la electricidad\nrestante para subir su At. Esp."
    ko: "전격을 날려 공격한다.\n남은 전기를 모아 자신의\n특수공격을 올리기도 한다."
tm058:
  names:
    jp_kana: わざマシン５８
    en: TM58
    fr: CT58
    it: MT58
    de: TM58
    es: MT58
    ko: 기술머신58
  descriptions:
    jp_kana: "こうげきを　うけても　ＨＰを　１だけ\nのこして　たえる。　れんぞくで\nだすと　しっぱい　しやすくなる。"
    en: "The user endures any attack, leaving\n1 HP. Its chance of failing rises if it\nis used in succession."
    fr: "Le lanceur résiste aux attaques avec\n1 PV. Peut échouer si utilisé plusieurs\nfois de suite."
    it: "Chi la usa evita di andare KO anche\nse gli rimane solo 1 PS. Usata in\nsuccessione può fallire."
    de: "Der Anwender übersteht auch\nstarke Attacken mit mindestens 1 KP.\nKann bei häufigem Einsatz versagen."
    es: "Quien lo usa resiste a cualquier ataque\ny se queda con 1 PS. Puede fallar si\nse usa varias veces seguidas."
    ko: "공격을 받아도\nHP를 1 남겨서 견딘다.\n연속으로 쓰면 실패하기 쉬워진다."
tm059:
  names:
    jp_kana: わざマシン５９
    en: TM59
    fr: CT59
    it: MT59
    de: TM59
    es: MT59
    ko: 기술머신59
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nはなって　こうげきする。"
    en: "The foe is attacked with a shock\nwave generated by the user’s gaping\nmouth."
    fr: "Le lanceur ouvre la bouche pour\nenvoyer une onde de choc qui frappe\nl’ennemi."
    it: "Chi la usa spalanca la bocca e genera\nun’onda d’urto che va a colpire il\nnemico."
    de: "Greift den Gegner mit einer \nSchockwelle, die aus dem Mund\ndes Anwenders kommt, an."
    es: "Ataca al enemigo con una onda\nexpansiva que se genera en la\nboca de quien lo usa."
    ko: "큰 입에서 충격파를\n쏘아 공격한다."
tm060:
  names:
    jp_kana: わざマシン６０
    en: TM60
    fr: CT60
    it: MT60
    de: TM60
    es: MT60
    ko: 기술머신60
  descriptions:
    jp_kana: "こぶしから　あいての　ＨＰを　\nすいとり　あたえた　ダメージの\nはんぶん　ＨＰを　かいふくする。"
    en: "An energy-draining punch. The user’s\nHP is restored by half the damage\ntaken by the target."
    fr: "Un coup de poing qui draine l’énergie. \nConvertit la moitié des dégâts infligés\nen PV pour le lanceur."
    it: "Pugno che assorbe energia. Chi\nusa la mossa recupera una quantità\ndi PS pari alla metà del danno inferto."
    de: "Schlag, der Energie stiehlt. Der\nAngreifer erhält die Hälfte des\nzugefügten Schadens als KP."
    es: "Un golpe que absorbe energía. Quien lo\nusa recupera en PS la mitad del daño\nque ha causado a su objetivo."
    ko: "주먹으로 상대의 HP를 흡수하여\n상대에게 준 데미지의\n절반에 해당하는 HP를 회복한다."
tm061:
  names:
    jp_kana: わざマシン６１
    en: TM61
    fr: CT61
    it: MT61
    de: TM61
    es: MT61
    ko: 기술머신61
  descriptions:
    jp_kana: "あおじろく　もえる　あやしげな\nほのおを　はなつ。　あいてを\nやけどの　じょうたいに　する。"
    en: "The user shoots a sinister, bluish\nwhite flame at the foe to inflict a\nburn."
    fr: "Lance une sinistre flamme violette à\nl’ennemi pour lui infliger une brûlure."
    it: "Fiamme intense di colore viola\ncausano una scottatura al nemico."
    de: "Feuert eine fiese, blauweiße Flamme\nauf den Gegner ab, um eine Verbrennung\nzu verursachen."
    es: "Lanza una siniestra llamarada blanco\nazulada que provoca quemaduras al\nadversario."
    ko: "푸르스름하게 타오르는\n괴상한 불꽃을 쏜다.\n상대를 화상 상태로 만든다."
tm062:
  names:
    jp_kana: わざマシン６２
    en: TM62
    fr: CT62
    it: MT62
    de: TM62
    es: MT62
    ko: 기술머신62
  descriptions:
    jp_kana: "かぜに　りんぷんを　のせて\nこうげきする。　じぶんの　すべての\nのうりょくを　あげることが　ある。"
    en: "The foe is attacked with powdery\nscales blown by wind. It may also\nraise all the user’s stats."
    fr: "Vent qui projette des écailles\npoudreuses sur l’ennemi. Peut aussi\nmonter toutes les stats du lanceur."
    it: "Chi la usa colpisce il nemico con\nsquame polverose portate dal vento.\nLe statistiche possono salire."
    de: "Pudriger Staub wird mit einem\nWindstoß verschossen. Die Statuswerte\ndes Anwenders können sich erhöhen."
    es: "Ataca al enemigo con un vendaval de\npolvo de escamas. Puede subir todas\nlas características de quien lo usa."
    ko: "바람에 날개 가루를 실어서 공격한다.\n자신의 모든 능력을 올리기도 한다."
tm063:
  names:
    jp_kana: わざマシン６３
    en: TM63
    fr: CT63
    it: MT63
    de: TM63
    es: MT63
    ko: 기술머신63
  descriptions:
    jp_kana: "もたせた　どうぐを　つかえなくする。\nトレーナーも　その　ポケモンには\nどうぐを　つかうことが　できない。"
    en: "It prevents the foe from using its\nheld item. Its Trainer is also\nprevented from using items on it."
    fr: "Empêche l’ennemi d’utiliser un objet\ntenu et son Dresseur d’utiliser un\nobjet sur lui."
    it: "Impedisce al nemico di usare lo\nstrumento che tiene e al suo\nAllenatore di usarne altri sul Pokémon."
    de: "Verhindert, dass der Gegner\nItems einsetzt. Dies wirkt sich auch\nauf den gegnerischen Trainer aus."
    es: "Impide que el rival use el objeto que\nlleva y que su entrenador use objetos\nen él."
    ko: "지니게 한 도구를 사용할 수 없게 한다.\n트레이너도 그 포켓몬에게는\n도구를 사용할 수 없다."
tm064:
  names:
    jp_kana: わざマシン６４
    en: TM64
    fr: CT64
    it: MT64
    de: TM64
    es: MT64
    ko: 기술머신64
  descriptions:
    jp_kana: "おおきな　ばくはつを　おこして\nまわりを　まきこみ　こうげきする。\nつかったあと　ひんしに　なる。"
    en: "The user explodes to inflict damage on\nall Pokémon in battle. The user faints\nupon using this move."
    fr: "Le lanceur explose et inflige des\ndégâts à tous les autres Pokémon\nau combat. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon in campo, ma va KO."
    de: "Diese besondere Attacke verletzt\nalle Pokémon im Kampf. Der Angreifer\nwird dabei allerdings kampfunfähig."
    es: "Quien lo usa explosiona en combate\ne inflige daño a todos los Pokémon. \nLuego, se debilita."
    ko: "큰 폭발을 일으켜서\n주위를 끌어들여 공격한다.\n사용한 뒤 기절한다."
tm065:
  names:
    jp_kana: わざマシン６５
    en: TM65
    fr: CT65
    it: MT65
    de: TM65
    es: MT65
    ko: 기술머신65
  descriptions:
    jp_kana: "かげで　つくった　するどいツメで\nきりさいて　こうげきする。\nきゅうしょに　あたりやすい。"
    en: "The user slashes with a sharp claw\nmade from shadows. It has a high\ncritical-hit ratio."
    fr: "Attaque avec une griffe puissante\nfaite d’ombres. Taux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra\nche colpiscono con gran forza.\nProbabile brutto colpo."
    de: "Eine Klaue aus Schatten greift\nden Gegner an. Die Volltrefferquote\nist dabei sehr hoch."
    es: "Quien lo usa ataca con una afilada\ngarra de sombras. Su índice de golpe\ncrítico es muy alto."
    ko: "그림자로 만든 날카로운 발톱으로\n할퀴어 공격한다.\n급소에 맞기 쉽다."
tm066:
  names:
    jp_kana: わざマシン６６
    en: TM66
    fr: CT66
    it: MT66
    de: TM66
    es: MT66
    ko: 기술머신66
  descriptions:
    jp_kana: "ちからを　ためこみ　こうげきする。\nあいてより　あとに　だせると\nわざの　いりょくは　２ばいに　なる。"
    en: "The user stores power, then attacks.\nIf the user can use this attack after\nthe foe, its power is doubled."
    fr: "Le lanceur charge son énergie, puis\nattaque. La puissance est doublée si\ncela suit une capacité ennemie."
    it: "Chi la usa accumula forza, poi attacca.\nLa potenza raddoppia se agisce dopo\nl’attacco di uno dei Pokémon in campo."
    de: "Der Anwender lädt die Attacke auf.\nSetzt er sie nach einem gegnerischen\nAngriff ein, verdoppelt sich die Kraft."
    es: "Quien lo usa se carga de energía y\nluego ataca. Y si ataca después del\nenemigo, dobla la potencia del ataque."
    ko: "힘을 모아 공격한다.\n상대보다 나중에 쓰면\n기술의 위력은 2배가 된다."
tm067:
  names:
    jp_kana: わざマシン６７
    en: TM67
    fr: CT67
    it: MT67
    de: TM67
    es: MT67
    ko: 기술머신67
  descriptions:
    jp_kana: "せんとうちゅうに　つかって\nなくなった　じぶんの　もちものを\nもういちど　つかえるように　する。"
    en: "The user recycles a single-use item\nthat has been used in battle so it can\nbe used again."
    fr: "Recycle un objet à usage unique déjà\nutilisé lors du combat pour pouvoir\nl’utiliser à nouveau."
    it: "Chi la usa ricicla e riutilizza uno\nstrumento monouso già usato\nnella lotta."
    de: "Ein einmal einsetzbares Item,\ndas in diesem Kampf verwendet\nwurde, erscheint wieder."
    es: "Quien lo usa recicla un objeto de un\nsolo uso que ya haya utilizado en\ncombate."
    ko: "배틀 중에 사용해서 사라진\n자신이 지니고 있던 물건을\n한 번 더 사용하도록 만든다."
tm068:
  names:
    jp_kana: わざマシン６８
    en: TM68
    fr: CT68
    it: MT68
    de: TM68
    es: MT68
    ko: 기술머신68
  descriptions:
    jp_kana: "もてる　ちからの　すべてを　あつめて\nとつげきする。　つぎの　ターン\nはんどうで　うごけなくなる。"
    en: "The user charges the foe using every\nbit of its power. It must rest on the\nnext turn to recover."
    fr: "Le lanceur charge l’ennemi de toute sa\npuissance. Il doit ensuite se reposer\nau tour suivant."
    it: "Chi la usa carica il nemico usando\ntutta la sua forza, ma al turno\nsuccessivo deve riposare."
    de: "Ein harter Angriff mit aller Energie.\nDanach muss der Anwender sich\nausruhen und neue Energie sammeln."
    es: "Quien lo usa carga contra el enemigo\nusando toda su energía y en el turno\nsiguiente tiene que descansar."
    ko: "가지고 있는 힘을 모두 모아서\n돌격한다. 다음 턴은\n반동으로 움직일 수 없다."
tm069:
  names:
    jp_kana: わざマシン６９
    en: TM69
    fr: CT69
    it: MT69
    de: TM69
    es: MT69
    ko: 기술머신69
  descriptions:
    jp_kana: "からだを　みがきあげて　くうきの\nていこうを　すくなくする。\nすばやさを　ぐーんと　あげる。"
    en: "The user polishes its body to reduce\ndrag. It sharply raises the Speed\nstat."
    fr: "Le lanceur polit son corps pour diminuer\nsa résistance au vent. Peut augmenter\nfortement la Vitesse."
    it: "Chi la usa leviga il proprio corpo\nper ridurre l’attrito. Aumenta di\nmolto la Velocità."
    de: "Der Anwender poliert seinen Körper.\nErhöht den Initiative-Wert deutlich."
    es: "Quien lo usa reduce la resistencia\nque ofrece su cuerpo y gana en\nVelocidad."
    ko: "몸을 닦아 공기의 저항을 줄인다.\n스피드를 크게 올린다."
tm070:
  names:
    jp_kana: わざマシン７０
    en: TM70
    fr: CT70
    it: MT70
    de: TM70
    es: MT70
    ko: 기술머신70
  descriptions:
    jp_kana: "あいての　めいちゅうりつを　さげる。\nくらい　どうくつを　あかるく\nてらすことも　できる。"
    en: "The user flashes a light that cuts the\nfoe’s accuracy. It can also be used to\nilluminate caves."
    fr: "Explosion lumineuse qui fait baisser\nla précision de l’ennemi. Permet\naussi d’éclairer les grottes."
    it: "Investe il nemico con un flash che\nne riduce la precisione. Si usa\nanche per illuminare le grotte."
    de: "Ein flackerndes Licht reduziert\ndie Genauigkeit des Gegners.\nKann auch Höhlen erleuchten."
    es: "Lanza una luz cegadora que reduce\nla precisión del enemigo. También\npuede usarse para iluminar cuevas."
    ko: "상대의 명중률을 떨어뜨린다.\n어두운 동굴을 밝게\n비출 수도 있다."
tm071:
  names:
    jp_kana: わざマシン７１
    en: TM71
    fr: CT71
    it: MT71
    de: TM71
    es: MT71
    ko: 기술머신71
  descriptions:
    jp_kana: "とがった　がんせきを　したから\nつきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    en: "The user stabs the foe with a\nsharpened stone from below. It has\na high critical-hit ratio."
    fr: "Fait surgir des pierres aiguisées sous\nl’ennemi. Taux de critiques élevé."
    it: "Chi la usa colpisce il nemico dal\nbasso con pietre affilate. Probabile\nbrutto colpo."
    de: "Angriff mit spitzen Steinen.\nBesitzt eine hohe Volltrefferquote."
    es: "Apuñala al enemigo desde abajo con\npiedras afiladas. Su índice de golpe\ncrítico es muy alto."
    ko: "뾰족한 암석을 밑에서부터\n꿰찔러 공격한다.\n급소에 맞기 쉽다."
tm072:
  names:
    jp_kana: わざマシン７２
    en: TM72
    fr: CT72
    it: MT72
    de: TM72
    es: MT72
    ko: 기술머신72
  descriptions:
    jp_kana: "わざを　だすまえに　こうげきを\nうけていたとき　その　あいてには\nいりょくが　２ばいに　なる。"
    en: "An attack move that inflicts double\nthe damage if the user has been hurt\nby the foe in the same turn."
    fr: "Une attaque deux fois plus puissante\nsi le lanceur a été blessé par l’ennemi\ndurant le tour."
    it: "Mossa d’attacco che infligge doppi\ndanni, se chi la usa è stato ferito\ndal nemico nello stesso turno."
    de: "Wurde der Angreifer in dieser Runde\nverletzt, fügt diese Attacke dem\nGegner doppelten Schaden zu."
    es: "Un movimiento de ataque que inflige el\ndoble de daño si quien lo usa ha sido\nherido por el enemigo en ese turno."
    ko: "기술을 쓰기 전에 공격을 당했을 때\n그 상대에게는 위력이 2배가 된다."
tm073:
  names:
    jp_kana: わざマシン７３
    en: TM73
    fr: CT73
    it: MT73
    de: TM73
    es: MT73
    ko: 기술머신73
  descriptions:
    jp_kana: "よわい　でんきを　あびせることで\nあいてを　まひじょうたいに　する。"
    en: "A weak electric charge is launched\nat the foe. It causes paralysis if it\nhits."
    fr: "Un faible choc électrique frappe\nl’ennemi. Si l’attaque touche, l’ennemi\nest paralysé."
    it: "Il nemico viene colpito da una debole\nscarica elettrica che, se va a segno,\npuò causarne la paralisi."
    de: "Der Gegner wird mit einem schwachen\nelektrischen Schlag angegriffen. Wird\ner getroffen, wird er paralysiert."
    es: "Débil descarga eléctrica que se lanza\ncontra el enemigo y causa parálisis si\nes certera."
    ko: "약한 전기를 날려\n상대를 마비 상태로 만든다."
tm074:
  names:
    jp_kana: わざマシン７４
    en: TM74
    fr: CT74
    it: MT74
    de: TM74
    es: MT74
    ko: 기술머신74
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん\nさせて　たいあたりする。　あいてより\nおそいほど　いりょくは　あがる。"
    en: "The user tackles the foe from a\nhigh-speed spin. The slower the user,\nthe greater the damage."
    fr: "Le lanceur effectue une rotation et\nfrappe l’ennemi. Plus le lanceur est\nlent, plus il fait de dégâts."
    it: "Chi la usa colpisce il nemico con un\nvortice rapidissimo. Più lento è chi\nla usa, maggiore è il danno."
    de: "Eine verzerrte Drehattacke. Je\nlangsamer der Anwender, desto\nmehr Schaden fügt er zu."
    es: "Quien lo usa ataca al enemigo como\nun remolino. Cuanto más lento sea\nquien lo usa, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다\n늦게 공격할수록 위력은 올라간다."
tm075:
  names:
    jp_kana: わざマシン７５
    en: TM75
    fr: CT75
    it: MT75
    de: TM75
    es: MT75
    ko: 기술머신75
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどり\nきあいを　たかめる。　じぶんの\nこうげきを　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting\nspirit. It sharply raises the user’s\nAttack stat."
    fr: "Danse frénétique qui exalte l’esprit\ncombatif. Augmente considérablement\nl’Attaque du lanceur."
    it: "Danza frenetica che migliora lo spirito\ndi combattimento. Fa salire di molto\nl’Attacco di chi la usa."
    de: "Ein wilder Tanz, der den Kampfgeist\nerhöhen soll. Der Angriffs-Wert des\nAnwenders steigt deutlich."
    es: "Danza frenética que eleva el espíritu\ncombativo. Aumenta drásticamente el\nAtaque de quien lo usa."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
tm076:
  names:
    jp_kana: わざマシン７６
    en: TM76
    fr: CT76
    it: MT76
    de: TM76
    es: MT76
    ko: 기술머신76
  descriptions:
    jp_kana: "あいての　まわりに　とがった　いわを\nうかべて　こうたいで　でてきた\nポケモンに　ダメージを　あたえる。"
    en: "The user lays a trap of levitating\nstones around the foe. The trap hurts\nfoes that switch into battle."
    fr: "Lance des pierres flottantes autour de\nl’ennemi, qui blessent tout ennemi\nentrant au combat."
    it: "Chi la usa piazza una trappola di rocce\nsospese che danneggiano i nemici che\nentrano in lotta."
    de: "Eine Falle aus schwebenden\nSteinen. Verletzt Gegner, die\nneu in den Kampf gerufen wurden."
    es: "Tiende una trampa de piedras que\nrodean al enemigo. Daña a los rivales\nque se incorporan al combate."
    ko: "상대 주위에 뾰족한 바위를 띄워서\n교체하여 나온 포켓몬에게\n데미지를 준다."
tm077:
  names:
    jp_kana: わざマシン７７
    en: TM77
    fr: CT77
    it: MT77
    de: TM77
    es: MT77
    ko: 기술머신77
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    en: "The user hypnotizes itself into\ncopying any stat change made\nby the foe."
    fr: "Une autohypnose qui permet au lanceur\nde copier les changements de stats de\nl’ennemi."
    it: "Chi la usa s’ipnotizza per copiare ogni\nmodifica alle statistiche del nemico."
    de: "Der Anwender hypnotisiert sich, um\ndie Statusveränderungen des Gegners\nzu kopieren."
    es: "Quien lo usa se hipnotiza y copia\ncualquier cambio que haya en las\ncaracterísticas de su rival."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
tm078:
  names:
    jp_kana: わざマシン７８
    en: TM78
    fr: CT78
    it: MT78
    de: TM78
    es: MT78
    ko: 기술머신78
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nとくこうを　がくっと　さげる。"
    en: "If it is the opposite gender of the\nuser, the foe is charmed into sharply\nlowering its Sp. Atk stat."
    fr: "Si l’ennemi est de sexe opposé au\nlanceur, il est séduit et sa stat Atq.\nSpé. baisse fortement."
    it: "Se il nemico è del sesso opposto di\nchi la usa, verrà ammaliato e il suo\nAttacco Speciale diminuirà di molto."
    de: "Gehört der Gegner dem anderen\nGeschlecht an, verfällt er dem Charme\ndes Anwenders, sein Sp.-Angriff sinkt."
    es: "Si el enemigo es del sexo opuesto,\nsu At. Esp. caerá drásticamente."
    ko: "수컷은 암컷을, 암컷은 수컷을 유혹해\n특수공격을 크게 떨어뜨린다."
tm079:
  names:
    jp_kana: わざマシン７９
    en: TM79
    fr: CT79
    it: MT79
    de: TM79
    es: MT79
    ko: 기술머신79
  descriptions:
    jp_kana: "あくいに　みちた　おそろしい\nオーラを　はっして　こうげきする。\nあいてを　ひるませることが　ある。"
    en: "The user releases a horrible aura\nimbued with dark thoughts. It may also\nmake the target flinch."
    fr: "Le lanceur dégage une horrible aura\nchargée d’idées noires. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata\ndi oscuri pensieri. Può anche far\ntentennare il Pokémon colpito."
    de: "Strahlt eine böse Aura voller\ndüsterer Gedanken aus.\nDer Gegner erschrickt eventuell."
    es: "Quien lo usa desprende una terrible\naura imbuida de pensamientos oscuros. \nPuede hacer retroceder al objetivo."
    ko: "악의로 가득한 무서운\n오라를 발산하여 공격한다.\n상대를 풀죽게 만들기도 한다."
tm080:
  names:
    jp_kana: わざマシン８０
    en: TM80
    fr: CT80
    it: MT80
    de: TM80
    es: MT80
    ko: 기술머신80
  descriptions:
    jp_kana: "おおきな　がんせきを　なげつけて\nこうげきする。\nあいてを　ひるませることが　ある。"
    en: "Large boulders are hurled at the foe\nto inflict damage. It may also make the\ntarget flinch."
    fr: "Envoie de gros rochers sur l’ennemi\npour infliger des dégâts. Peut\nl’apeurer."
    it: "Il nemico viene colpito da grandi\nmassi che possono anche farlo\ntentennare."
    de: "Der Anwender schleudert große\nFelsbrocken auf den Gegner.\nDieser erschrickt eventuell."
    es: "Arroja grandes rocas contra el enemigo\npara infligir daño. También puede\nhacer retroceder al objetivo."
    ko: "큰 암석을 내던져\n공격한다.\n상대를 풀죽게 하기도 한다."
tm081:
  names:
    jp_kana: わざマシン８１
    en: TM81
    fr: CT81
    it: MT81
    de: TM81
    es: MT81
    ko: 기술머신81
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　きりさいて\nこうげきする。"
    en: "The user slashes at the foe by\ncrossing its scythes or claws as if\nthey were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant\nses faux ou ses griffes comme une\npaire de ciseaux."
    it: "Chi la usa colpisce il nemico usando\nfalci o artigli come se fossero un\npaio di forbici."
    de: "Der Anwender greift mit gekreuzten\nScheren oder Klauen an, als wären\ndiese eine normale Schere."
    es: "Ataca al enemigo con cuchillas o garras\nque se cruzan a modo de tijera."
    ko: "낫이나 손톱을\n가위처럼 교차시키며\n공격한다."
tm082:
  names:
    jp_kana: わざマシン８２
    en: TM82
    fr: CT82
    it: MT82
    de: TM82
    es: MT82
    ko: 기술머신82
  descriptions:
    jp_kana: "おぼえている　わざのうち　どれか\n１つを　くりだす。　じぶんが\nねむっている　ときだけ　つかえる。"
    en: "While it is asleep, the user\nrandomly uses one of the moves\nit knows."
    fr: "Le lanceur utilise un coup au hasard en\ndormant."
    it: "Chi la usa sfodera una delle proprie\nmosse a caso nel sonno."
    de: "Während der Angreifer schläft,\nverwendet er eine seiner\nzufällig ausgewählten Attacken."
    es: "Quien lo usa mientras duerme utiliza\nal azar uno de los movimientos que\nha aprendido."
    ko: "기억하고 있는 기술 중 하나를\n무작위로 사용한다. 자신이\n잠자고 있을 때만 사용할 수 있다."
tm083:
  names:
    jp_kana: わざマシン８３
    en: TM83
    fr: CT83
    it: MT83
    de: TM83
    es: MT83
    ko: 기술머신83
  descriptions:
    jp_kana: "きのみから　ちからを　もらい\nこうげきする。　もたせた　きのみで\nいりょくと　タイプは　かわる。"
    en: "The user draws power from the Berry\nit is holding to attack. The Berry\ndetermines its type and power."
    fr: "Avant d’attaquer, le lanceur rassemble\nses forces grâce à sa Baie. Elle\ndétermine le type et la puissance."
    it: "Chi la usa trae forza dalla Bacca\nche tiene. Da questa dipende\nil tipo e la forza dell’attacco."
    de: "Verwendet die Energie einer\nBeere, die der Angreifer hält.\nEffekte hängen von der Beere ab."
    es: "Quien lo usa extrae energía de la baya\nque lleva para atacar. Esta determina\nel tipo y la potencia del ataque."
    ko: "나무열매로부터 힘을 받아 공격한다.\n지니게 한 나무열매에 따라\n위력과 타입이 바뀐다."
tm084:
  names:
    jp_kana: わざマシン８４
    en: TM84
    fr: CT84
    it: MT84
    de: TM84
    es: MT84
    ko: 기술머신84
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや\nうでで　こうげきする。どくの\nじょうたいに　することが　ある。"
    en: "The foe is stabbed with a tentacle or\narm seeped with poison. It may also\npoison the foe."
    fr: "Attaque l’ennemi avec un tentacule ou\nun bras plein de poison. Peut aussi\nl’empoisonner."
    it: "Il nemico viene colpito da un braccio\no tentacolo intriso di una sostanza\ntossica. Può anche avvelenarlo."
    de: "Der Anwender greift mit giftigen\nTentakeln oder Armen an. Der Gegner\nwird dabei eventuell vergiftet."
    es: "Ataca al enemigo con un tentáculo o\nbrazo impregnado de veneno y puede\nllegar a envenenarlo."
    ko: "독에 물든 촉수나 팔로 공격한다.\n독 상태가 되는 경우가 있다."
tm085:
  names:
    jp_kana: わざマシン８５
    en: TM85
    fr: CT85
    it: MT85
    de: TM85
    es: MT85
    ko: 기술머신85
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　あたえた　ダメージの\nはんぶん　ＨＰを　かいふくする。"
    en: "An attack that works only on a\nsleeping foe. It absorbs half the\ndamage caused to heal the user’s HP."
    fr: "Attaque réservée aux ennemis endormis.\nLe lanceur récupère en PV la moitié des\ndégâts infligés."
    it: "Attacco che funziona solo su un\nnemico che dorme. Chi lo usa\nriceve metà dei PS persi dal nemico."
    de: "Wirkt nur auf schlafende\nGegner. Angreifer erhält 50 %\ndes Schadens als KP."
    es: "Solo funciona con enemigos dormidos.\nAbsorbe la mitad del daño causado para\nrestaurar los PS de quien lo usa."
    ko: "자고 있는 상대의 꿈을 먹어서\n공격한다. 상대에게 준 데미지의\n절반에 해당하는 HP를 회복한다."
tm086:
  names:
    jp_kana: わざマシン８６
    en: TM86
    fr: CT86
    it: MT86
    de: TM86
    es: MT86
    ko: 기술머신86
  descriptions:
    jp_kana: "くさを　からませて　ころばせる。\nあいてが　おもいほど　わざの\nいりょくは　あがる。"
    en: "The user snares the foe with grass\nand trips it. The heavier the foe, the\ngreater the damage."
    fr: "L’ennemi est piégé dans de l’herbe qui\nle fait trébucher. Plus il est lourd,\nplus il y a de dégâts."
    it: "Chi la usa intrappola il nemico con\nl’erba e lo fa cadere. Più pesante\nè il nemico, maggiore è il danno."
    de: "Gras lässt Gegner straucheln.\nJe schwerer der Gegner,\ndesto mehr Schaden wird verursacht."
    es: "Atrapa al enemigo con hierbas y lo\nderriba. Cuanto más pesado sea el\nenemigo, más daño causa."
    ko: "풀을 휘감아서 쓰러뜨린다.\n상대가 무거울수록 기술의\n위력이 올라간다."
tm087:
  names:
    jp_kana: わざマシン８７
    en: TM87
    fr: CT87
    it: MT87
    de: TM87
    es: MT87
    ko: 기술머신87
  descriptions:
    jp_kana: "おこらせて　こんらんさせる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    en: "The user enrages the foe into\nconfusion. However, it also sharply\nraises the foe’s Attack stat."
    fr: "Fait enrager l’ennemi et le plonge dans\nla confusion, mais augmente fortement\nson Attaque."
    it: "Chi la usa provoca il nemico e lo\nconfonde, facendo però aumentare\ndi molto il suo Attacco."
    de: "Reizt den Gegner und verursacht\nVerwirrung. Erhöht jedoch den\ngegnerischen Angriffs-Wert."
    es: "Envuelve al enemigo en confusión, pero\ntambién sube marcadamente su Ataque."
    ko: "화나게 해서 혼란시킨다.\n분노로 상대의 공격이\n크게 올라가 버린다."
tm088:
  names:
    jp_kana: わざマシン８８
    en: TM88
    fr: CT88
    it: MT88
    de: TM88
    es: MT88
    ko: 기술머신88
  descriptions:
    jp_kana: "くちばしで　こうげきする。\nあいてが　きのみを　もっているとき\nついばんで　こうかを　うけられる。"
    en: "The user pecks the foe. If the foe is\nholding a Berry, the user plucks it and\ngains its effect."
    fr: "Le lanceur picore l’ennemi. S’il tient\nune Baie, le lanceur s’en empare et\nprofite de ses effets."
    it: "Chi la usa becca il nemico. Se il\nnemico tiene una Bacca, gliela\nruba e ne sfrutta gli effetti."
    de: "Hält der Gegner eine Beere,\nstiehlt der Angreifer sie und\ngenießt ihre Auswirkungen."
    es: "Ataca picoteando al rival. Si este tiene\nuna baya, se la arrebata y se beneficia\nde sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 갖고 있을 때\n쪼아서 효과를 볼 수 있다."
tm089:
  names:
    jp_kana: わざマシン８９
    en: TM89
    fr: CT89
    it: MT89
    de: TM89
    es: MT89
    ko: 기술머신89
  descriptions:
    jp_kana: "あいてを　こうげきした　あとに\nひかえの　ポケモンと　いれかわる。"
    en: "After making its attack, the user\nrushes back to switch places with a\nparty Pokémon in waiting."
    fr: "Après avoir attaqué, le lanceur change\nde place avec un Pokémon de l’équipe\nqui attend son tour."
    it: "Chi usa questa mossa fa marcia\nindietro per farsi sostituire dopo\naver sferrato l’attacco."
    de: "Direkt nach der Attacke tauscht\nder Angreifer mit einem wartenden\nPokémon den Platz."
    es: "Después de atacar, quien lo usa cambia\nrápidamente su puesto con un compañero\nque no esté combatiendo."
    ko: "상대를 공격한 뒤\n교대 포켓몬과 교체한다."
tm090:
  names:
    jp_kana: わざマシン９０
    en: TM90
    fr: CT90
    it: MT90
    de: TM90
    es: MT90
    ko: 기술머신90
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。　じぶんの\nかわりに　こうげきを　うける。"
    en: "The user makes a copy of itself using\nsome of its HP. The copy serves as\nthe user’s decoy."
    fr: "Le lanceur fait une copie de lui-même\nen sacrifiant quelques PV. La copie sert\nde leurre."
    it: "Chi la usa crea una copia di se stesso\nusando alcuni PS. La copia serve come\nesca per il nemico."
    de: "Der Angreifer erschafft aus\nein paar eigenen KP einen\nKlon, der als Ablenkung dient."
    es: "Quien lo usa utiliza parte de sus PS\npara hacer una copia de sí mismo\nque sirve como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다. 자신을\n대신하여 공격을 받는다."
tm091:
  names:
    jp_kana: わざマシン９１
    en: TM91
    fr: CT91
    it: MT91
    de: TM91
    es: MT91
    ko: 기술머신91
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに\nあつめ　ひかりを　はなつ。　あいての\nとくぼうを　さげることがある。"
    en: "The user gathers all its light energy\nand releases it in one shot. It may\nalso lower the foe’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie\nlumineuse et la fait exploser. Peut\naussi baisser la Déf. Spé. de l’ennemi."
    it: "Chi la usa attacca raccogliendo e rila-\nsciando energia luminosa. Può anche\nridurre la Dif. Sp. del nemico."
    de: "Entfesselt konzentrierte Lichtenergie.\nDie Spezial-Verteidigung des Gegners\nsinkt eventuell."
    es: "Quien lo usa concentra toda su energía\nlumínica y la libera en un solo ataque.\nPuede reducir la Def. Esp. del rival."
    ko: "몸의 빛을 한 곳에 모아 빛을 쏜다.\n상대의 특수방어를 떨어뜨리기도 한다."
tm092:
  names:
    jp_kana: わざマシン９２
    en: TM92
    fr: CT92
    it: MT92
    de: TM92
    es: MT92
    ko: 기술머신92
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ　うごきの　おそい\nポケモンから　こうげきできる。"
    en: "The user creates a bizarre space in\nwhich slower Pokémon get to move\nfirst for five turns."
    fr: "Le lanceur crée une zone étrange\noù les Pokémon les plus lents\nfrappent en 1ᵉʳ pendant 5 tours."
    it: "Chi la usa crea una dimensione in\ncui i Pokémon più lenti si muovono\nper primi per 5 turni."
    de: "Verzerrt die Raumzeit für 5\nRunden. Langsamere Pokémon\ngreifen zuerst an."
    es: "Distorsiona el espacio de forma que los\nPokémon más lentos consiguen moverse\nen primer lugar durante cinco turnos."
    ko: "아주 이상한 공간을 만든다.\n5턴 동안 움직임이 느린\n포켓몬부터 공격할 수 있다."
town_map:
  names:
    jp_kana: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa Città
    de: Karte
    es: Mapa
    ko: 타운맵
  descriptions:
    jp_kana: "いつでも　てがるに　みることが\nできる　べんりな　ちず。\nじぶんの　ばしょも　わかる。"
    en: "A very convenient map that can be\nviewed anytime. It even shows your \npresent location."
    fr: "Une carte très pratique pouvant\nêtre consultée n’importe quand. Elle\nindique votre position actuelle."
    it: "Utile mappa, consultabile in\nogni situazione. Mostra anche la\npropria posizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit\naufgerufen werden kann. Dein aktueller\nStandort wird auch angezeigt."
    es: "Un mapa muy útil que puede consultarse\nen cualquier momento y que, además,\nte indica dónde te encuentras."
    ko: "언제라도 간편하게 볼 수 \n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
toxic_orb:
  names:
    jp_kana: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
  descriptions:
    jp_kana: "さわると　どくをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nもうどくの　じょうたいに　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that badly poisons\nthe holder in battle."
    fr: "Objet à tenir. Orbe bizarre\nempoisonnant gravement son porteur\ndurant le combat."
    it: "Strumento da far tenere a un Pokémon.\nSfera bizzarra che avvelena gravemente\nchi la tiene in lotta."
    de: "Ein Item zum Tragen. Dieser\nbizarre Orb vergiftet seinen\nTräger im Kampf schwer."
    es: "Extraña esfera que envenena\ngravemente a quien la usa en\ncombate. Debe llevarla un Pokémon."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
toxic_plate:
  names:
    jp_kana: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxic
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
  descriptions:
    jp_kana: "どくの　タイプの　せきばん。\nもたせると　どくタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Poison-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Poison."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Gift."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Veneno.\nDebe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
tunnel_mail:
  names:
    jp_kana: トンネルメール
    en: Tunnel Mail
    fr: Lettre Mine
    it: Mess. Tunnel
    de: Minenbrief
    es: Carta Mina
    ko: 터널메일
  descriptions:
    jp_kana: "うすぐらい　たんこうの　せかいが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    en: "Stationery featuring a print of a dimly\nlit coal mine.\nLet a Pokémon hold it for delivery."
    fr: "Un papier à lettres représentant une\nmine de charbon peu éclairée.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettera con un motivo che\nricorda una miniera poco illuminata.\nUn Pokémon può tenerla e consegnarla."
    de: "Das Briefpapier hat eine\ndunkle Kohlemine als Hintergrund.\nGib es einem Pokémon mit."
    es: "Carta con la imagen de una mina de\ncarbón poco iluminada. Haz que la\nentregue un Pokémon."
    ko: "어둑한 탄광 세계가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    en: TwistedSpoon
    fr: Cuillertordu
    it: Cucch. Torto
    de: Krummlöffel
    es: Cuchara Tor
    ko: 휘어진스푼
  descriptions:
    jp_kana: "ねんりきを　こめた　スプーン。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\na spoon imbued with telekinetic power\nthat boosts Psychic-type moves."
    fr: "Objet à tenir. Cuillère contenant un\npouvoir télékinésique montant la\npuissance des capacités de type Psy."
    it: "Strumento da far tenere a un Pokémon.\nCucchiaio dotato di potere telecinetico\nche potenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voll mit\ntelekinetischer Energie, der Attacken\nvom Typ Psycho verstärkt."
    es: "Cuchara llena de energía telequinética\nque potencia los movimientos de tipo\nPsíquico. Debe llevarla un Pokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
ultra_ball:
  names:
    jp_kana: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultraball
    ko: 하이퍼볼
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　つかまえやすくなった\nすごく　せいのうのいい　ボール。"
    en: "An ultra-performance Ball that\nprovides a higher Pokémon catch rate\nthan a Great Ball."
    fr: "Une Ball ultraperformante dont le taux\nde réussite est supérieur à celui de la\nSuper Ball."
    it: "Ball dalle prestazioni eccellenti:\nfornisce maggiori probabilità di\ncattura rispetto alla Mega Ball."
    de: "Ein Ball mit hoher Erfolgsquote.\nDem Superball in allen\nPunkten überlegen."
    es: "Poké Ball de rendimiento superior.\nTiene más índice de éxito que la\nSuperball."
    ko: "수퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
upgrade:
  names:
    jp_kana: アップグレード
    en: Up-Grade
    fr: Améliorator
    it: Upgrade
    de: Up-Grade
    es: Mejora
    ko: 업그레이드
  descriptions:
    jp_kana: "なかに　いろんな　じょうほうが\nつまった　とうめいの　きかい。\nシルフ　カンパニーせい。"
    en: "A transparent device filled with all\nsorts of data.\nIt was produced by Silph Co."
    fr: "Dispositif transparent rempli de\ndonnées diverses et variées. Fabriqué\npar la Sylphe SARL."
    it: "Apparecchio trasparente pieno\nzeppo di dati di ogni tipo,\nprodotto dalla Silph SpA."
    de: "Ein durchsichtiges Gerät. Es\nenthält jede Menge Daten der\nSilph Co."
    es: "Peculiar dispositivo fabricado en\nSilph S.A. que contiene todo tipo\nde datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
  descriptions:
    jp_kana: "ともだち　との　しょうぶや\nとくしゅな　しせつでの　しょうぶを\nきろくできる　かっこいい　きかい。"
    en: "An amazing device that can record a\nbattle either between friends or at a\nspecial battle facility."
    fr: "Appareil utile permettant d’enregistrer\nles combats entre amis et ceux ayant\nlieu dans un bâtiment de combat."
    it: "Un fantastico dispositivo che registra\nle lotte tra amici o quelle che avvengo-\nno negli edifici dedicati alla lotta."
    de: "Ein tolles Gerät, mit dem man Kämpfe zw.\nFreunden oder Kämpfe in einer speziel-\nlen Kampfeinrichtung aufzeichnen kann."
    es: "Un fantástico dispositivo que graba\ncombates entre amigos o celebrados\nen algún recinto especial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    en: Vs. Seeker
    fr: Cherche VS
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
  descriptions:
    jp_kana: "たたかいたい　トレーナーを\nおしえてくれる　きかい。\nあるくと　でんちが　たまる。"
    en: "A device that indicates Trainers who\nwant to battle. Its battery charges\nwhile you walk."
    fr: "Un appareil indiquant les Dresseurs\nprêts à se battre. La batterie se\nrecharge quand vous marchez."
    it: "Apparecchio per trovare gli Allenatori\nche vogliono lottare. La batteria si\nricarica camminando."
    de: "Ein Gerät, das rückkampfwillige\nTrainer ausfindig macht. Die\nBatterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca entrenadores\nlistos para el combate. La batería se\ncarga mientras caminas."
    ko: "싸우고 싶어하는 트레이너를\n알려주는 기계.\n걸으면 전지가 충전된다."
wacan_berry:
  names:
    jp_kana: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　でんき　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Electric-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Electrik."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon, riduce l’attacco super-\nefficace di tipo Elettro del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Elektro. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Eléctrico."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 전기 기술을\n당했을 때 위력이 약해진다."
water_stone:
  names:
    jp_kana: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nすんだ　みずいろを　している。"
    en: "A peculiar stone that makes certain\nspecies of Pokémon evolve.\nIt is a clear, light blue."
    fr: "Une pierre étrange qui fait évoluer\ncertaines espèces de Pokémon.\nElle est de couleur bleue."
    it: "Pietra particolare che fa evolvere\ndeterminate specie di Pokémon.\nHa delle macchioline azzurre."
    de: "Dieser spezielle Stein löst bei\nbestimmten Pokémon die\nEntwicklung aus. Er ist hellblau."
    es: "Curiosa piedra que hace evolucionar\na determinadas especies de Pokémon.\nEs de color azul, como el agua."
    ko: "어느 특정한 포켓몬을\n진화시키는 이상한 돌.\n맑고 푸른 색을 띠고 있다."
watmel_berry:
  names:
    jp_kana: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nカイスが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nWatmel Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Wasmelbeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Sambia."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n슈박이 자란다."
wave_incense:
  names:
    jp_kana: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incie. Aqua
    ko: 잔물결향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    en: "An item to be held by a Pokémon. It is\nan exotic-smelling incense that boosts\nthe power of Water-type moves."
    fr: "Objet à tenir. Encens au parfum\nexotique augmentant la puissance\ndes capacités de type Eau."
    it: "Strumento da far tenere a un Pokémon.\nIncenso dal profumo esotico che\npotenzia le mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische\nDuftkraut verstärkt Attacken vom\nTyp Wasser."
    es: "Incienso exótico que fortalece los\nmovimientos de tipo Agua. Debe\nllevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
wepear_berry:
  names:
    jp_kana: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。\nふかふかのつちに　うめると\nセシナが　そだつ。"
    en: "A Poffin ingredient.\nBury it in soft soil to grow a\nWepear Plant."
    fr: "Ingrédient pour Poffin. Plantez cette\nBaie dans un sol meuble pour obtenir\nun plant."
    it: "Si usa per fare i Poffin. Seminala\nnel terreno soffice per far crescere\nuna pianta."
    de: "Eine Knursp-Zutat.\nPflanze sie in Erde ein, damit\nneue Nirbebeeren wachsen."
    es: "Ingrediente para Pokochos. Si la\nplantas en tierra suelta, saldrá\nuna planta de Peragu."
    ko: "포핀의 재료.\n푹신푹신한 땅에 심으면\n서배가 자란다."
white_flute:
  names:
    jp_kana: しろいビードロ
    en: White Flute
    fr: Flûteblanche
    it: Flauto B.nco
    de: Weiße Flöte
    es: Fl. Blanca
    ko: 하양비드로
  descriptions:
    jp_kana: "ガラスせいの　しろい　ふえ。\nふくと　やせいの　ポケモンが\nでて　きやすくなる。"
    en: "A white flute made from blown glass.\nIts melody makes wild Pokémon more\nlikely to appear."
    fr: "Une flûte en verre soufflé blanc dont\nles notes attirent les Pokémon\nsauvages."
    it: "Flauto bianco di vetro soffiato. Con la\nsua melodia rende più probabili\ngli incontri con i Pokémon selvatici."
    de: "Eine durchsichtige, gläserne Flöte,\ndie wilde Pokémon anziehen kann."
    es: "Flauta de cristal blanco cuya melodía\nayuda a aumentar las probabilidades de\nencontrarse con Pokémon salvajes."
    ko: "유리로 만든 하얀 피리.\n불면 야생 포켓몬이\n나타날 확률이 높아진다."
white_herb:
  names:
    jp_kana: しろいハーブ
    en: White Herb
    fr: Herbeblanche
    it: Erbachiara
    de: Schlohkraut
    es: Hier. Blanca
    ko: 하양허브
  descriptions:
    jp_kana: "もたせた　ポケモンの　のうりょくが\nさがったとき　いちどだけ　もとの\nじょうたいに　もどす。"
    en: "An item to be held by a Pokémon.\nIt restores any lowered stat in\nbattle. It can be used only once."
    fr: "Objet à tenir qui restaure les stats\nbaissées. Ne peut être utilisé qu’une\nfois."
    it: "Strumento da far tenere a un Pokémon.\nRipristina le statistiche in lotta.\nSi può usare una sola volta."
    de: "Ein Item, das einem PKMN zum Tragen\ngegeben werden kann. Es hebt jede\nnegative Statuswertveränderung auf."
    es: "Restaura cualquier característica\ndebilitada en combate. Solo se puede\nusar una vez. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
wide_lens:
  names:
    jp_kana: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
  descriptions:
    jp_kana: "ものが　おおきく　みえる　レンズ。\nもたせると　わざの　めいちゅうりつが\nすこし　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a magnifying lens that slightly\nboosts the accuracy of moves."
    fr: "Objet à tenir. Magnifique loupe\naugmentant un peu la précision des\ncapacités."
    it: "Strumento da far tenere a un Pokémon.\nLente d’ingrandimento che aumenta\ndi poco la precisione delle mosse."
    de: "Ein Item zum Tragen.\nDieses Vergrößerungsglas\nerhöht die Genauigkeit."
    es: "Debe llevarla un Pokémon. Aumenta\nligeramente la precisión de los\nmovimientos."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
wiki_berry:
  names:
    jp_kana: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nピンチのとき　ＨＰを　かいふくするが\nこんらん　することも　ある。"
    en: "A Poffin ingredient. If held by a\nPokémon, it restores the user’s HP in\na pinch, but may also cause confusion."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie restaure les PV en cas de besoin,\nmais elle peut rendre confus."
    it: "Si usa per fare i Poffin. Se tenuta da\nun Pokémon in difficoltà, restituisce PS,\nma può causare confusione."
    de: "Eine Knursp-Zutat. Als Item (Tragen)\nfüllt die Beere die KP eines Pokémon\nauf, bewirkt aber eventuell Verwirrung."
    es: "Ingrediente para Pokochos. Restaura\nlos PS del Pokémon que la usa en\nun apuro, pero puede causar confusión."
    ko: "포핀의 재료. 지니게 하면\n위급할 때 HP를 회복하지만\n혼란에 빠질 수도 있다."
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    en: Wise Glasses
    fr: Lunet. Sages
    it: Saviocchiali
    de: Schlauglas
    es: Gafas Esp.
    ko: 박식안경
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\nもたせると　とくしゅわざの\nいりょくが　すこし　あがる。"
    en: "An item to be held by a Pokémon. It is\na thick pair of glasses that slightly\nboosts the power of special moves."
    fr: "Objet à tenir. Paire de lunettes\népaisses augmentant un peu la\npuissance des attaques spéciales."
    it: "Strumento da far tenere a un Pokémon.\nPaio di occhiali dalle lenti spesse che\npotenzia di poco le mosse speciali."
    de: "Ein Item zum Tragen.\nDiese dicke Brille verstärkt auf\nSpezial-Angriff basierende Attacken."
    es: "Potencian ligeramente los movimientos\nespeciales. Debe llevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
works_key:
  names:
    jp_kana: はつでんしょキー
    en: Works Key
    fr: Clé Centrale
    it: Turbinchiave
    de: K-Schlüssel
    es: Ll. Central
    ko: 발전소키
  descriptions:
    jp_kana: "たにまのはつでんしょの　とびらを\nあけしめする　おおきな　カギ。\nなぜか　ギンガだんが　もっていた。"
    en: "A large key for operating the doors of\nthe Valley Windworks in the canyon.\nIt was held by a Team Galactic Grunt."
    fr: "Grande clé servant à ouvrir la porte\nde la centrale Les Eoliennes du canyon.\nUn sbire de la Team Galaxie la détenait."
    it: "Grande chiave usata per azionare la\nporta dell’Impianto Turbine. Prima ce\nl’aveva una Recluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum\nWindkraftwerk gehört. Einer der Rüpel\nvon Team Galaktik hatte ihn im Besitz."
    es: "Abre la puerta de la Central del Valle\nEólico. La llevaba un recluta del Equipo\nGalaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌된 영문인지\n갤럭시단이 지니고 있었다."
x_accuracy:
  names:
    jp_kana: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Treffer
    es: Precisión X
    ko: 잘-맞히기
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the accuracy\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte la précision d’un Pokémon pendant\nun combat. L’effet s’estompe si le\nPokémon se retire."
    it: "Aumenta la precisione di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt die Genauigkeit eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nTausch des Pokémon beendet."
    es: "Aumenta la precisión de los\nataques en combate. Al cambiar\nde Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_attack:
  names:
    jp_kana: プラスパワー
    en: X Attack
    fr: Attaque +
    it: Attacco X
    de: X-Angriff
    es: Ataque X
    ko: 플러스파워
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nこうげきを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the Attack stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte l’Attaque pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta l’Attacco di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Angriffs-Wert eines PKMN\nim Kampf. Die Wirkung wird mit dem\nTausch des Pokémon beendet."
    es: "Aumenta el Ataque en combate.\nAl cambiar de Pokémon, el efecto\ndesaparece."
    ko: "배틀 중인 포켓몬의 공격을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_defense:
  names:
    jp_kana: ディフェンダー
    en: X Defend
    fr: Défense +
    it: Difesa X
    de: X-Abwehr
    es: Defensa X
    ko: 디펜드업
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nぼうぎょを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the Defense stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte la Défense pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta la Difesa di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Verteidigungs-Wert eines\nPokémon im Kampf. Die Wirkung wird\nmit dem Tausch des Pokémon beendet."
    es: "Aumenta la Defensa en combate.\nAl cambiar de Pokémon, el efecto\ndesaparece."
    ko: "배틀 중인 포켓몬의 방어를 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_sp_atk:
  names:
    jp_kana: スペシャルアップ
    en: X Special
    fr: Spécial +
    it: Special X
    de: X-Spezial
    es: Especial X
    ko: 스페셜업
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nとくこうを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the Sp. Atk stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte l’Atq. Spé. pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta l’Att. Sp. di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Spezial-Angriff eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nTausch des Pokémon beendet."
    es: "Aumenta el Ataque Especial en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 특수공격을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_sp_def:
  names:
    jp_kana: スペシャルガード
    en: X Sp. Def
    fr: Déf. Spé. +
    it: Dif. Sp. X
    de: X-SpezialVer
    es: Def. Esp. X
    ko: 스페셜가드
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nとくぼうを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the Sp. Def stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte la Déf. Spé. pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta la Dif. Sp. di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt die Spezial-Verteidigung eines\nPokémon im Kampf. Die Wirkung wird\nmit dem Tausch des Pokémon beendet."
    es: "Aumenta la Defensa Especial en\ncombate. Al cambiar de Pokémon,\nel efecto desaparece."
    ko: "배틀 중인 포켓몬의 특수방어를 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_speed:
  names:
    jp_kana: スピーダー
    en: X Speed
    fr: Vitesse +
    it: Velocità X
    de: X-Tempo
    es: Velocidad X
    ko: 스피드업
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nすばやさを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    en: "An item that raises the Speed stat\nof a Pokémon in battle. It wears off if\nthe Pokémon is withdrawn."
    fr: "Monte la Vitesse pendant un combat.\nL’effet s’estompe si le Pokémon se\nretire."
    it: "Aumenta la Velocità di un Pokémon\nin una lotta. L’effetto svanisce se\nil Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon\nim Kampf. Die Wirkung wird mit dem\nTausch des Pokémon beendet."
    es: "Aumenta la Velocidad en combate.\nAl cambiar de Pokémon, el efecto\ndesaparece."
    ko: "배틀 중인 포켓몬의 스피드를 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
yache_berry:
  names:
    jp_kana: ヤチェのみ
    en: Yache Berry
    fr: Baie Nanone
    it: Baccamoya
    de: Kiroyabeere
    es: Baya Rimoya
    ko: 플카열매
  descriptions:
    jp_kana: "ポフィンの　ざいりょう。　もたせると\nこうかばつぐんの　こおり　わざを\nうけたとき　いりょくが　よわまる。"
    en: "A Poffin ingredient. If held by a\nPokémon, it weakens a foe’s\nsupereffective Ice-type attack."
    fr: "Ingrédient pour Poffin. Tenue, cette\nBaie affaiblit une attaque ennemie super\nefficace de type Glace."
    it: "Si usa per fare i Poffin. Se tenuta da un\nPokémon, indebolisce l’attacco super-\nefficace di tipo Ghiaccio del nemico."
    de: "Item (Tragen) schwächt sehr\neffektive gegnerische Attacken\nvom Typ Eis. Eine Knursp-Zutat."
    es: "Ingrediente para Pokochos. Si la\nlleva un Pokémon, debilita ataques\nsupereficaces de tipo Hielo."
    ko: "포핀의 재료. 지니게 하면\n효과가 뛰어난 얼음 기술을\n당했을 때 위력이 약해진다."
yellow_flute:
  names:
    jp_kana: きいろビードロ
    en: Yellow Flute
    fr: Flûte Jaune
    it: Flauto Gial.
    de: Gelbe Flöte
    es: Fl. Amarilla
    ko: 노랑비드로
  descriptions:
    jp_kana: "ガラスせいの　きいろい　ふえ。\nポケモン　１ひきの　こんらんの\nじょうたいを　かいふくする。"
    en: "A yellow flute made from blown glass.\nIts melody snaps a single Pokémon out\nof confusion."
    fr: "Une flûte en verre soufflé jaune dont\nles notes sortent un Pokémon de sa\nconfusion."
    it: "Flauto giallo di vetro soffiato.\nCon la sua melodia libera\nun Pokémon dalla confusione."
    de: "Eine gelbe, gläserne Flöte, die\nein Pokémon von Verwirrung heilt."
    es: "Flauta de cristal amarillo que espabila\na los Pokémon confusos."
    ko: "유리로 만든 노란 피리.\n포켓몬 1마리의\n혼란 상태를 회복한다."
yellow_scarf:
  names:
    jp_kana: きいろのバンダナ
    en: Yellow Scarf
    fr: Foul. Jaune
    it: Fascia Gial.
    de: Gelber Schal
    es: P. Amarillo
    ko: 노랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    en: "An item to be held by a Pokémon.\nIt boosts the “Tough” aspect of the\nholder in a Contest."
    fr: "Objet à tenir. Augmente la\n“Robustesse” dans les Concours."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la “Grinta” di\nchi lo tiene in una Gara."
    de: "Ein Item zum Tragen. Es verstärkt\ndie “Stärke” eines Pokémon\nin einem Wettbewerb."
    es: "Debe llevarlo un Pokémon. Aumenta\nla dureza en los concursos."
    ko: "지니게 하고 콘테스트에 참가시키면\n그 포켓몬은 여느 때보다\n강인하게 보인다."
yellow_shard:
  names:
    jp_kana: きいろいかけら
    en: Yellow Shard
    fr: Tesson Jaune
    it: Coccio Gial.
    de: Gelbstück
    es: P. Amarilla
    ko: 노랑조각
  descriptions:
    jp_kana: "きいろい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    en: "A small yellow shard.\nIt appears to be from some sort of\nimplement made long ago."
    fr: "Petit tesson jaune.\nIl semble provenir d’un outil très\nancien."
    it: "Piccolo coccio giallo.\nProbabilmente faceva parte di uno\nstrumento creato in tempi passati."
    de: "Eine gelbe Scherbe eines antiken\nWerkzeugs, das vor langer Zeit\nangefertigt wurde."
    es: "Parece formar parte de algún tipo\nde herramienta antigua."
    ko: "노란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
zap_plate:
  names:
    jp_kana: いかずちプレート
    en: Zap Plate
    fr: Plaque Volt
    it: Lastrasaetta
    de: Blitztafel
    es: Tabla Trueno
    ko: 우뢰플레이트
  descriptions:
    jp_kana: "でんきの　タイプの　せきばん。\nもたせると　でんきタイプの\nわざの　いりょくが　つよまる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Electric-type moves."
    fr: "Objet à tenir. Tablette en pierre\naugmentant la puissance des capacités\nde type Electrik."
    it: "Strumento da far tenere a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen. Diese Steintafel\nverstärkt Attacken vom Typ Elektro."
    es: "Tabla de piedra que potencia\nlos movimientos de tipo Eléctrico.\nDebe llevarla un Pokémon."
    ko: "전기타입의 석판.\n지니게 하면 전기타입\n기술의 위력이 강해진다."
zinc:
  names:
    jp_kana: キトサン
    en: Zinc
    fr: Zinc
    it: Zinco
    de: Zink
    es: Zinc
    ko: 키토산
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくぼうの\nきそポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nIt raises the base Sp. Def (Special\nDefense) stat of a single Pokémon."
    fr: "Une boisson très nutritive qui monte la\nDéf. Spé. (Défense Spéciale) d’un\nPokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta la Dif. Sp. (Difesa Speciale)\ndi un Pokémon."
    de: "Ein gehaltvolles Getränk, das die\nSpezial-Verteidigung eines Pokémon\ndauerhaft hebt."
    es: "Nutritiva bebida que aumenta la\nDefensa Especial de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
zoom_lens:
  names:
    jp_kana: フォーカスレンズ
    en: Zoom Lens
    fr: Lentil. Zoom
    it: Zoomlente
    de: Zoomlinse
    es: Telescopio
    ko: 포커스렌즈
  descriptions:
    jp_kana: "もたせた　ポケモンが　あいてよりも\nこうどうするのが　おそいとき\nわざが　めいちゅう　しやすくなる。"
    en: "An item to be held by a Pokémon.\nIf the holder moves after the foe, its\naccuracy will be boosted."
    fr: "Objet à tenir. Augmente la précision\ndu porteur s’il attaque après l’ennemi."
    it: "Strumento da far tenere a un Pokémon.\nAumenta la precisione se chi lo tiene\nattacca dopo il nemico."
    de: "Ein Item zum Tragen.\nAgiert der Gegner zuerst, erhöht\nsich die Genauigkeit des Trägers."
    es: "Debe llevarlo un Pokémon. Si se mueve\ndespués del enemigo, aumenta el índice\nde precisión del Pokémon."
    ko: "지니게 한 포켓몬이 상대보다도\n행동하는 것이 늦을 때\n기술이 명중하기 쉬워진다."
