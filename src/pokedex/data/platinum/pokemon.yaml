        fr:
          platinum: "Il fait peur aux aventuriers en\npleine nuit et se nourrit de leur\nfrayeur."
        it:
          platinum: "Un Pokémon che terrorizza la gente\nnel cuore della notte. Assorbe la\npaura per usarla come energia."
        de:
          platinum: "Ein Pokémon, das Menschen mitten in\nder Nacht erschreckt. Es sammelt\ndie Angst als seine Energie."
        es:
          platinum: "Sorprende a la gente en mitad de\nla noche y acumula su miedo como\nenergía."
        ko:
          platinum: "한밤중에 사람을 놀라게 하고\n무서워하는 마음을 모아 자신의\n에너지로 만드는 포켓몬이다."
