        en:
          platinum: "If spotted, it will lure an unwary\nperson into chasing it, then lose\nthe pursuer on mountain trails."
        fr:
          platinum: "Quand il est en danger, il tente de\nsemer ses poursuivants dans les\nchemins montagneux."
        it:
          platinum: "Se individuato, cerca di farsi\ninseguire, per poi far perdere le\nsue tracce su sentieri di montagna."
        de:
          platinum: "Wird es entdeckt, lockt es seinen\nVerfolger auf eine Jagd in die\nBerge, wo es ihn dann abschüttelt."
        es:
          platinum: "Si algún incauto logra detectarlo,\nse verá abocado a perseguirlo\nhasta perderse en las montañas."
        ko:
          platinum: "니로우를 발견했을 때\n조심성 없이 따라가면 \n길을 잃고 산중에 혼자 남게 된다."
