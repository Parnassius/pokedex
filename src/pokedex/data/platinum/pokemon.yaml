        fr:
          platinum: "La flamme de sa queue symbolise sa\nvitalité. Elle est intense quand il\nest en bonne santé."
        it:
          platinum: "La fiamma sulla punta della coda\nindica la sua vitalità. Se sta bene,\nla fiamma è più ardente."
        de:
          platinum: "Lodert die Flamme auf seiner\nSchweifspitze hell, ist GLUMANDA\ngesund."
        es:
          platinum: "La llama de la punta de su cola\nindica su salud. Si CHARMANDER\nestá sano, arderá con más fuerza."
        ko:
          platinum: "파이리 꼬리의 불꽃은\n생명의 등불이다. 건강할 때는\n불꽃도 강하게 타오른다."
