        fr:
          platinum: "Ses antennes rouges libèrent une\npuanteur qui repousse l’ennemi. Il\ngrandit par mues régulières."
        it:
          platinum: "Dalle antenne rosse emana un puzzo\nche respinge il nemico. Cresce\ncambiando più volte la pelle."
        de:
          platinum: "Seine roten Antennen sondern einen\nGestank ab, der Feinde verjagt. Es\nwächst, indem es sich häutet."
        es:
