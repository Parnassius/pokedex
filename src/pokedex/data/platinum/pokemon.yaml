        en:
          platinum: "When alone, nothing happens.\nHowever, if there are two or more,\nan odd power is said to emerge."
        fr:
          platinum: "Quand il est seul, il ne se passe\nrien... Mais en groupe, il semble\nhabité par un mystérieux pouvoir."
