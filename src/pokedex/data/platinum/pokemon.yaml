        en:
          platinum: "Its fur is so sensitive, it can\nsense minute shifts in the air\nand predict the weather."
        fr:
          platinum: "Sa fourrure est si sensible qu’il\npeut détecter les vibrations de\nl’air et prédire le temps qu’il fera."
        it:
          platinum: "Con il pelo sensibile riesce ad ana-\nlizzare le correnti d’aria e a pre-\nvedere le condizioni atmosferiche."
        de:
          platinum: "Kann durch sein Fell geringste\nLuftveränderungen wahrnehmen\nund das Wetter vorhersagen."
        es:
          platinum: "Su pelaje es tan sensible que puede\npercibir cualquier cambio en el aire\ny predecir el tiempo."
        ko:
          platinum: "전신에 나있는 털이 민감하다.\n아주 적은 공기의 진동도 느껴\n앞으로의 날씨를 맞춘다."
