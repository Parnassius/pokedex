        en:
          platinum: "When the bud on its back starts\nswelling, a sweet aroma wafts to\nindicate the flower’s coming bloom."
        fr:
          platinum: "Lorsque le bourgeon sur son dos\néclot, il répand un doux parfum\npour célébrer sa floraison."
        it:
          platinum: "Quando il bocciolo che ha sul dorso\nsi gonfia, emana un dolce profumo.\nÈ indice dell’imminente fioritura."
        de:
          platinum: "Sobald die Knospe auf seinem Rücken\nein süßes Aroma abgibt, steht die\nBlüte kurz bevor."
        es:
          platinum: "Cuando el bulbo de su lomo se\nhincha, desprende un dulce aroma\npara indicar el florecimiento."
        ko:
          platinum: "등의 봉오리가 부풀어오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
