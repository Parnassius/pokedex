        en:
          platinum: "It has an easygoing nature. It\ndoesn’t care if it bumps its head on\nboats and boulders while swimming."
        fr:
          platinum: "De nature placide, il a tendance à\nse cogner la tête contre les récifs\net autres bateaux de passage."
        it:
          platinum: "È molto tranquillo per natura. Non\nsi scompone se nuotando sbatte\nla testa contro barche e scogli."
        de:
          platinum: "Es ist sehr unbekümmert und stört\nsich nicht daran, wenn es während\ndes Schwimmens an etwas stößt."
        es:
          platinum: "Es de naturaleza sencilla. Cuando\nnada se choca de cabeza contra\nbarcos o rocas y no le importa."
        ko:
          platinum: "배의 밑바닥이나 물가의 바위에\n머리를 부딪쳐도 신경 쓰지 않고\n헤엄치는 무사태평한 포켓몬이다."
