        en:
          platinum: "When UXIE flew, people gained the\nability to solve problems.\nIt was the birth of knowledge."
        fr:
          platinum: "Quand il prit son envol, les\nhommes apprirent à résoudre les\nproblèmes. Le savoir était né."
        it:
          platinum: "Al volo di UXIE, gli uomini impa-\nrarono a risolvere i problemi. In\ntal modo nacque la conoscenza."
        de:
