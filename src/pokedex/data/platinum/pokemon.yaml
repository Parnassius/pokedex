        en:
          platinum: "The jets of water it spouts from\nthe rocket cannons on its shell\ncan punch through thick steel."
        fr:
          platinum: "Les trombes d’eau projetées par\nles canons de sa carapace peuvent\npercer le métal le plus résistant."
        it:
          platinum: "I getti d’acqua lanciati dai\ncannoni sul suo guscio riescono\na perforare persino l’acciaio."
        de:
          platinum: "Der Wasserstrahl, der aus den\nWasserdüsen schießt, kann\nsogar Stahlwände durchdringen."
        es:
