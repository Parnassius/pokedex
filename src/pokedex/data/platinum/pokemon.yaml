        en:
          platinum: "When exposed to the moon’s aura,\nthe rings on its body glow faintly\nand it gains a mysterious power."
        fr:
          platinum: "Quand il s’expose à la lumière de la\nlune, ses anneaux brillent et il\nobtient un mystérieux pouvoir."
        it:
          platinum: "Quando è esposto alla luce lunare\ni cerchi sul suo corpo brillano e\nacquisisce uno strano potere."
        de:
          platinum: "Wird es der Aura des Mondes\nausgesetzt, glühen seine Ringe und\nes erhält eine mysteriöse Kraft."
        es:
          platinum: "Si se expone al aura de la luna,\nlos anillos de su cuerpo relucen y\nadquiere un poder misterioso."
        ko:
          platinum: "달의 파동을 몸에 쬐면\n고리 모양이 희미하게 빛나\n이상한 힘에 눈을 뜬다."
