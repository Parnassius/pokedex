          platinum: "Un solo esemplare non produce al-\ncun effetto, ma se ce ne sono due o\npiù, emerge uno strano potere."
        de:
          platinum: "Sind sie zu zweit oder mehr,\nentsteht eine eigentümliche Kraft.\nSo sagt man zumindest."
        es:
          platinum: "Si están en solitario no pasa nada,\npero si se juntan dos o más, se\ndice que surge un extraño poder."
        ko:
          platinum: "혼자 있으면 아무 일도 일어나지\n않지만 두 마리 이상 있게 되면\n어떤 힘이 생긴다고 한다."
