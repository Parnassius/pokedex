          platinum: "Sa façon de flotter sans but au\ngré du vent lui a valu le surnom\nde “bouée des esprits égarés”."
        it:
          platinum: "Fluttua qua e là senza motivo e\nper questo una leggenda lo defini-\nsce “Guida degli spiriti vaganti”."
        de:
          platinum: "Laut einer alten Volkssage nennt\nman es den “Wegweiser für\numherstreifende Geister”."
        es:
