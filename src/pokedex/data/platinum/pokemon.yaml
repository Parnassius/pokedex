        en:
          platinum: "After a rainy day, the flower on\nits back smells stronger. The\nscent attracts other Pokémon."
        fr:
          platinum: "Le parfum de sa fleur se fait plus\npénétrant les lendemains de pluie.\nCela appâte les autres Pokémon."
        it:
          platinum: "Dopo la pioggia, il fiore sul suo\ndorso emana un profumo più\nintenso e attira gli altri Pokémon."
        de:
          platinum: "Nach einem Regentag riecht die\nBlume auf seinem Rücken intensiver.\nDas Aroma zieht andere Pokémon an."
        es:
          platinum: "Después de un día de lluvia, la flor\nde su lomo tiene un aroma más\npotente y atrae a otros Pokémon."
        ko:
          platinum: "비가 내린 다음 날은 등의\n꽃향기가 강해진다. 향기에\n이끌려 포켓몬이 모여든다."
