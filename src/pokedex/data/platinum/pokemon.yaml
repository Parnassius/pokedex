        jp_kana:
          platinum: "しっぽで　じめんを　ほって\nめいろのような　すあなを　つくる。\nはねで　すこしだけ　とべる。"
        en:
          platinum: "It digs into the ground with its\ntail and makes a mazelike nest.\nIt can fly just a little."
        fr:
          platinum: "Son nid est un véritable labyrinthe\nqu’il creuse à l’aide de sa queue.\nIl sait à peine voler."
        it:
          platinum: "Scava nel terreno con la coda\ncreando una tana simile a un labi-\nrinto. Sa spiccare brevissimi voli."
        de:
          platinum: "Es gräbt sich mit seinem Schweif in\ndie Erde und baut ein labyrinth-\nartiges Nest. Es kann kaum fliegen."
        es:
          platinum: "Cava el suelo con su cola para\nconstruir su madriguera. Puede\nvolar distancias cortas."
        ko:
          platinum: "꼬리로 땅을 파서\n미로 같은 둥지를 만든다.\n날개로 조금 날 수 있다."
