        en:
          platinum: "It loves vengeful emotions and\nhangs in rows under the eaves of\nhouses where vengeful people live."
        fr:
          platinum: "Il aime le goût de la vengeance.\nIls vivent en rangs sous les \ngouttières des gens vindicatifs."
        it:
          platinum: "Si annida sotto le grondaie di case\ndove vive gente che cova sentimenti\ndi vendetta, che lui adora."
