        en:
          platinum: "For some time after its birth, it\ngrows by gaining nourishment from\nthe seed on its back."
        fr:
          platinum: "Au matin de sa vie, la graine sur\nson dos lui fournit les éléments\ndont il a besoin pour grandir."
        it:
          platinum: "Dopo la nascita, cresce traendo\nnutrimento dal seme piantato\nsul suo dorso."
        de:
          platinum: "Nach der Geburt nimmt es für eine\nWeile Nährstoffe über den Samen\nauf seinem Rücken auf."
        es:
          platinum: "Después de nacer, crece\nalimentándose de las semillas\nde su lomo."
        ko:
          platinum: "태어나서부터 얼마 동안은\n등의 씨앗으로부터 영양을 \n공급받아 크게 성장한다."
