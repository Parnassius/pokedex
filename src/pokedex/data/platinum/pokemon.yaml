        - damp
        - water_absorb
      descriptions:
        jp_kana:
          platinum: "ちじょうを　あるくときは　ひふが\nかんそう　しないように　どくの\nねんまくで　からだを　おおっている。"
        en:
          platinum: "When walking on land, it covers its\nbody with a poisonous film that\nkeeps its skin from dehydrating."
        fr:
          platinum: "Sur la terre ferme, il couvre son\ncorps d’un fluide toxique qui le\nprotège de la déshydratation."
        it:
          platinum: "Quando si avventura sulla terra-\nferma, ricopre il suo corpo di una\nsostanza velenosa che lo idrata."
        de:
          platinum: "An Land bedeckt es die Haut mit\neiner giftigen Schicht, die es vor\ndem Austrocknen bewahrt."
        es:
          platinum: "Cuando anda por la tierra cubre su\ncuerpo con una capa venenosa para\nmantener hidratada su piel."
        ko:
          platinum: "지상에서 걸을 때는 피부가\n건조해지지 않도록 독성분의\n점막으로 몸을 감싸고 있다."
quagsire:
  species_id: 195
