wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          platinum: "くろい　しっぽを　ひっしになって\nかくすのは　しっぽに　ひみつがある\nしょうこだと　かんぐられている。"
        en:
          platinum: "It desperately tries to keep its\nblack tail hidden. It is said to be\nproof the tail hides a secret."
        fr:
          platinum: "Il cherche désespérément à cacher\nsa queue noire. Certains pensent\nqu’elle renferme un secret."
        it:
          platinum: "Cerca di tenere nascosta la sua\ncoda nera ad ogni costo. Pare\nche essa celi un segreto."
        de:
          platinum: "Verzweifelt versucht es, seinen\nschwarzen Schweif zu verstecken.\nEr soll ein Geheimnis enthalten."
        es:
          platinum: "Siempre intenta ocultar su cola,\npor lo que muchos creen que\ncontiene un secreto."
        ko:
          platinum: "까만 꼬리를 필사적으로\n숨기는 것은 꼬리에 비밀이 있다는\n증거라고 의심받고 있다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    en: GIRAFARIG
    fr: GIRAFARIG
    it: GIRAFARIG
    de: GIRAFARIG
    es: GIRAFARIG
    ko: 키링키
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          platinum: "しっぽの　あたまにも　ちいさな\nのうがあり　うしろを　むいたままでも\nほんのうで　たたかうことが　できる。"
        en:
          platinum: "The head on its tail contains a\nsmall brain. It can instinctively\nfight even while facing backward."
        fr:
          platinum: "La tête qu’il a sur la queue dispose\nde son propre cerveau et lui\npermet de couvrir ses arrières."
        it:
          platinum: "Sulla coda ha una testa con un pic-\ncolo cervello. Riesce a lottare\nanche se il nemico è alle sue spalle."
        de:
          platinum: "Es kann sich in beide Richtungen\nverteidigen, da der Kopf auf seinem\nSchweif ein kleines Gehirn besitzt."
        es:
          platinum: "La cabeza de su cola también tiene\nun pequeño cerebro, así que puede\ncombatir por delante o por detrás."
        ko:
          platinum: "꼬리의 머리에도 작은\n뇌가 있어서 뒤를 향한 채로도\n본능적으로 싸울 수 있다."
pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
    en: PINECO
    fr: POMDEPIK
    it: PINECO
    de: TANNZA
    es: PINECO
    ko: 피콘
  forms:
    pineco:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 90
        special_attack: 35
        special_defense: 35
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          platinum: "きのみに　そっくり。まちがわれて\nとりポケモンに　つつかれてしまうが\nかたい　カラで　まもられている。"
        en:
          platinum: "It looks just like a pinecone.\nIts shell protects it from bird\nPokémon that peck it by mistake."
        fr:
          platinum: "Il ressemble à une pomme de pin.\nSa carapace le protège des Pokémon\nOiseau qui le picorent par erreur."
        it:
          platinum: "Ha l’aspetto di una pigna. Il suo\nguscio lo protegge dai Pokémon\nuccello che lo beccano per errore."
        de:
          platinum: "Es sieht aus wie ein Tannenzapfen.\nSeine Schale schützt es vor Vogel-\nPokémon, die an ihm picken wollen."
        es:
          platinum: "Es como una piña piñonera. Su\ncoraza lo protege de los pájaros\nque lo picotean por error."
        ko:
          platinum: "나무열매와 똑 닮았다. 실수로\n새 포켓몬에게 쪼이기도 하지만\n단단한 껍질이 몸을 보호하고 있다."
forretress:
  species_id: 205
  names:
    jp_kana: フォレトス
    en: FORRETRESS
    fr: FORETRESS
    it: FORRETRESS
    de: FORSTELLKA
    es: FORRETRESS
    ko: 쏘콘
