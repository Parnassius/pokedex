        - bug
        - steel
      egg_groups:
        - bug
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          platinum: "こうてつの　カラで　まもられている。\nすきまから　めだまが　のぞいているが\nなかみの　しょうたいは　なぞのまま。"
        en:
          platinum: "It is encased in a steel shell. Its\npeering eyes are all that can be\nseen of its mysterious innards."
        fr:
          platinum: "Il est prisonnier d’une coquille \nd’acier. Ses yeux vigilants sont la\nseule partie visible de son corps."
        it:
          platinum: "È incassato in una conchiglia d’ac-\nciaio. A parte gli occhi scrutatori,\nnessuno sa cosa ci sia all’interno."
        de:
          platinum: "Dieses PKMN ist von einer Stahlhülle\numgeben. Seine stechenden Augen\nsind alles, was man von ihm sieht."
        es:
          platinum: "Se protege con su concha de\nacero de tal manera que solo se\npueden ver sus ojos."
        ko:
          platinum: "강철 껍질이 몸을 보호하고 있다.\n틈새에서 엿보고 있는 눈이 있지만\n내용물의 정체는 수수께끼다."
