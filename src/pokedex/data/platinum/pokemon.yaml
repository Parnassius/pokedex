        fr:
          platinum: "Une poupée mue par la tristesse qui\nla ronge depuis qu’on l’a délaissée.\nElle recherche son propriétaire."
        it:
          platinum: "Un peluche divenuto Pokémon per la\nrabbia di essere stato buttato via\nda un bimbo, di cui è alla ricerca."
        de:
          platinum: "Dieses PKMN war eine Puppe, die\nweggeworfen wurde. Es sucht nun\ndas Kind, das dies getan hat."
        es:
          platinum: "Este muñeco se convirtió en un\nPokémon cuando lo tiraron a la\nbasura. Busca a su antiguo dueño."
        ko:
          platinum: "버려진 인형에 원념이\n깃들어 포켓몬이 되었다.\n자신을 버린 아이를 찾고 있다."
