          sapphire: "JOLTEON’s cells generate a low level of\nelectricity. This power is amplified by\nthe static electricity of its fur,\fenabling the POKéMON to drop\nthunderbolts. The bristling fur is made\nof electrically charged needles."
        fr:
          ruby: "Les cellules de VOLTALI génèrent un\ncourant de faible intensité. Ce pouvoir\nest amplifié par l’électricité statique\fde ses poils, ce qui lui permet d’envoyer\ndes éclairs. Sa fourrure hérissée est\nfaite d’aiguilles chargées d’électricité."
          sapphire: "Les cellules de VOLTALI génèrent un\ncourant de faible intensité. Ce pouvoir\nest amplifié par l’électricité statique\fde ses poils, ce qui lui permet d’envoyer\ndes éclairs. Sa fourrure hérissée est\nfaite d’aiguilles chargées d’électricité."
        it:
          ruby: "Le cellule di JOLTEON generano un\nbasso potenziale elettrico, che viene\ntuttavia amplificato dall’elettricità\fstatica della sua pelliccia, da cui\nscatena fulmini. La pelliccia arruffata\nè fatta di aghi caricati elettricamente."
          sapphire: "Le cellule di JOLTEON generano un\nbasso potenziale elettrico, che viene\ntuttavia amplificato dall’elettricità\fstatica della sua pelliccia, da cui\nscatena fulmini. La pelliccia arruffata\nè fatta di aghi caricati elettricamente."
        de:
          ruby: "BLITZAs Zellen erzeugen schwache\nElektrizität. Diese wird aber durch die\nstatische Aufladung seines Fells\fverstärkt, so dass es Blitzschläge\nerzeugen kann. Sein Fell besteht aus \nelektrisch geladenen Nadeln."
          sapphire: "BLITZAs Zellen erzeugen schwache\nElektrizität. Diese wird aber durch die\nstatische Aufladung seines Fells\fverstärkt, so dass es Blitzschläge\nerzeugen kann. Sein Fell besteht aus \nelektrisch geladenen Nadeln."
        es:
          ruby: "Las células de JOLTEON generan un nivel\nbajo de electricidad, cuya intensidad\naumenta con la electricidad estática\fque acumula en un pelaje formado por\nagujas cargadas de electricidad. Esta\ncaracterística le permite lanzar rayos."
          sapphire: "Las células de JOLTEON generan un nivel\nbajo de electricidad, cuya intensidad\naumenta con la electricidad estática\fque acumula en un pelaje formado por\nagujas cargadas de electricidad. Esta\ncaracterística le permite lanzar rayos."
