          sapphire: "OTARIA chasse ses proies dans l’eau\ngelée, sous la couche de glace.\nLorsqu’il cherche à respirer, il perce\fun trou en frappant la glace avec la\npartie saillante de sa tête."
        it:
          ruby: "SEEL caccia le prede nel mare gelido\nsotto le lastre di ghiaccio. Per\nrespirare apre un foro nel ghiaccio\fusando la protuberanza appuntita\nsulla sommità del capo."
          sapphire: "SEEL caccia le prede nel mare gelido\nsotto le lastre di ghiaccio. Per\nrespirare apre un foro nel ghiaccio\fusando la protuberanza appuntita\nsulla sommità del capo."
        de:
          ruby: "JUROB jagt unter der eisigen Ober-\nfläche des Eismeeres nach Beute. Zum\nLuft holen schlägt es mit dem\fvorstehenden Teil seines Kopfes ein \nLoch ins Eis."
          sapphire: "JUROB jagt unter der frostigen Ober-\nfläche des Eismeeres nach Beute. Zum\nLuft holen schlägt es mit dem\fvorstehenden Teil seines Kopfes ein \nLoch ins Eis."
        es:
          ruby: "SEEL busca a sus presas en aguas\nheladas, bajo las capas de hielo. Cuando\nnecesita respirar, abre un agujerito\fen el hielo con la afilada protuberancia\nque tiene encima de la cabeza."
