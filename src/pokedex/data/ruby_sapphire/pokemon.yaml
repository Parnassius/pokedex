      descriptions:
        jp_kana:
          ruby: "ふだんは　ちゅういしないと　ききとれない　くらい\nちいさな　こえだが　きけんを　さっち　すると\nずつうを　おこす　ほどの　おおごえで　なきだす。"
          sapphire: "ひとたび　おおごえで　なきだすと　じぶんの\nこえに　びっくりして　さらに　はげしく　なく。\nなきやむと　つかれて　ねむってしまう。"
        en:
          ruby: "Normally, WHISMUR’s voice is very quiet -\nit is barely audible even if one is\npaying close attention.\fHowever, if this POKéMON senses danger,\nit starts crying at an earsplitting\nvolume."
          sapphire: "WHISMUR is very timid. If it starts to\ncry loudly, it becomes startled by its\nown crying and cries even harder.\fWhen it finally stops crying, the\nPOKéMON goes to sleep, all tired out."
        fr:
          ruby: "Généralement, la voix de CHUCHMUR est\ntrès douce, à peine audible, même\nsi on tend l’oreille.\fPourtant, lorsque ce POKéMON sent\nl’approche du danger, il se met à crier\nsi fort qu’il peut déchirer des tympans."
          sapphire: "CHUCHMUR est très timide. S’il\ncommence à pleurer, il s’effraie\ntout seul et pleure de plus belle.\fQuand ce POKéMON finit enfin de pleurer,\nil s’endort, épuisé."
        it:
          ruby: "Normalmente la voce di WHISMUR è\nmolto tenue, quasi impercettibile, \nanche se ci si concentra.\fTuttavia, se questo POKéMON\npercepisce un pericolo, inizia a\nemettere suoni assordanti."
          sapphire: "WHISMUR è estremamente timido.\nSe gli capita di emettere suoni forti, è\natterrito nell’udire la sua stessa voce,\fquindi urla ancora più fragorosamente.\nQuando finalmente si placa,\nva a dormire, spossato."
        de:
          ruby: "Normalerweise ist FLURMELs Stimme sehr\nleise, selbst mit größter Anstrengung\nist sie kaum hörbar. Wenn dieses\fPOKéMON jedoch eine Gefahr wittert,\nstößt es ohrenbetäubende Schreie aus."
          sapphire: "FLURMEL ist sehr scheu. Wenn es laut\nbrüllt, erschrickt es und brüllt dadurch\nnoch lauter. Wenn es schließlich damit\faufhört, ist es völlig ausgepumpt und \nlegt sich schlafen."
        es:
          ruby: "Normalmente, WHISMUR tiene una voz\ntenue, casi inaudible, aunque se preste\natención.\fNo obstante, si este POKéMON siente\nque el peligro acecha, puede ponerse\na chillar con un volumen ensordecedor."
          sapphire: "WHISMUR es muy tímido. Si empieza\na gritar fuerte, se asusta a sí mismo\ny chilla más alto todavía.\fCuando para por fin, se va a dormir\ncompletamente agotado."
loudred:
  species_id: 294
  names:
    jp_kana: ドゴーム
    en: LOUDRED
