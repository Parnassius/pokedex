          ruby: "３つの　あたまが　べつべつの　ほうこうを\nむいている　ときは　けいかいしている　しょうこ。\nうかつに　ちかよると　くちばしで　つつかれるぞ。"
          sapphire: "３つあるのは　あたまだけでは　ないらしい。\nしんぞうと　はいも　３つなので　いきぎれしないで\nながい　きょりを　はしる　ことが　できるのだ。"
        en:
          ruby: "Watch out if DODRIO’s three heads are\nlooking in three separate directions.\nIt’s a sure sign that it is on its guard.\fDon’t go near this POKéMON if it’s being\nwary - it may decide to peck you."
          sapphire: "Apparently, the heads aren’t the only\nparts of the body that DODRIO has\nthree of.\fIt has three sets of hearts and lungs\nas well, so it is capable of running long\ndistances without rest."
        fr:
          ruby: "Il faut se méfier lorsque les trois\ntêtes de DODRIO regardent dans des\ndirections différentes. Cela signifie\fqu’il est sur ses gardes. Si c’est le cas,\nil vaut mieux ne pas s’approcher de ce\nPOKéMON, il pourrait décider d’attaquer."
          sapphire: "Apparemment, DODRIO ne se contente\npas d’avoir trois têtes. Il semble\négalement avoir trois cœurs et six\fpoumons, ce qui lui permet de courir\ntrès longtemps sans s’épuiser."
        it:
          ruby: "Se le tre teste di DODRIO guardano\nin tre direzioni diverse, significa che\nil POKéMON è vigile.\fIn questo stato il POKéMON non va\navvicinato, poiché potrebbe decidere\ndi attaccare."
          sapphire: "Pare che DODRIO non abbia soltanto\ntre teste, ma anche altri organi triplici:\nHa infatti anche tre cuori e tre polmoni\fche gli consentono di percorrere\ngrandi distanze senza sosta."
        de:
          ruby: "DODRIs drei Köpfe blicken in drei ver-\nschiedene Richtungen. Es ist immer auf\nder Hut.\fDu solltest dich diesem POKéMON nicht\nnähern, wenn es bereits misstrauisch \nist. Es könnte nach dir hacken."
          sapphire: "DODRI hat nicht nur drei Köpfe, auch\nandere Körperteile sind dreifach\nvorhanden. Es besitzt drei Herzen und\fdrei Lungen, so dass es lange Strecken\nohne Pause rennen kann."
        es:
          ruby: "Hay que tener cuidado cuando las tres\ncabezas de DODRIO miran cada una para\nun lado, pues están en guardia.\fNo te acerques a este POKéMON cuando\nestá vigilando porque puede darte un\npicotazo."
          sapphire: "Según parece, las cabezas no son las\núnicas partes del cuerpo que tiene\ntriplicadas. DODRIO también tiene tres\fcorazones y tres pares de pulmones.\nCon esta constitución, puede correr\nlargas distancias sin cansarse."
