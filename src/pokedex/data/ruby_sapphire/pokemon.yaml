          sapphire: "PARASEK sucht große Bäume heim und\nentzieht Nährstoffe aus Stamm und \nWurzeln.\fWenn ein befallener Baum stirbt, sucht\nes sich zusammen mit seinen \nArtgenossen einen neuen Wirt."
        es:
          ruby: "PARASECT es conocido por destruir en\nplaga grandes árboles, absorbiendo los\nnutrientes que tienen en la parte baja\fdel tronco y las raíces. Cuando un árbol\nazotado por la plaga muere, los PARASECT\nvan a por el siguiente al instante."
