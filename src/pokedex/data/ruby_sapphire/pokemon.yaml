        fr:
          ruby: "Lorsqu’il se bat, MAGMAR fait jaillir\ndes flammes de son corps pour\nintimider son adversaire. Les\fexplosions enflammées de ce POKéMON\ndéclenchent des vagues de chaleur qui\nembrasent la végétation environnante."
          sapphire: "Lorsqu’il se bat, MAGMAR fait jaillir\ndes flammes de son corps pour\nintimider son adversaire. Les\fexplosions enflammées de ce POKéMON\ndéclenchent des vagues de chaleur qui\nembrasent la végétation environnante."
        it:
          ruby: "In lotta, MAGMAR sputa fiamme roventi\nda tutto il corpo per intimidire\nl’avversario.\fLa sua furia irruente provoca ondate\ndi calore che bruciano tutta\nla vegetazione attorno a lui."
          sapphire: "In lotta, MAGMAR sputa fiamme roventi\nda tutto il corpo per intimidire\nl’avversario.\fLa sua furia irruente provoca ondate\ndi calore che bruciano tutta\nla vegetazione attorno a lui."
        de:
          ruby: "Im Kampf stößt MAGMAR glühend heiße\nFlammen aus, um seinen Gegner\neinzuschüchtern.\fDiese Feuersalven erzeugen Hitzewellen,\ndie das Gras und die Bäume der Umgebung\nin Brand setzen."
          sapphire: "Im Kampf stößt MAGMAR glühend heiße\nFlammen aus, um seinen Gegner\neinzuschüchtern.\fDiese Feuersalven erzeugen Hitzewellen,\ndie das Gras und die Bäume der Umgebung\nin Brand setzen."
        es:
          ruby: "Al luchar, MAGMAR expulsa violentas\nllamas por todo el cuerpo para intimidar\na su rival.\fEstos estallidos de fuego crean ondas\nde calor que abrasan la hierba y los\nárboles que haya en las proximidades."
          sapphire: "Al luchar, MAGMAR expulsa violentas\nllamas por todo el cuerpo para intimidar\na su rival.\fEstos estallidos de fuego crean ondas\nde calor que abrasan la hierba y los\nárboles que haya en las proximidades."
