        jp_kana:
          ruby: "あぶらの　つまった　しっぽは　うきわの　かわり。\nすいめんに　しっぽだけが　ういている　ときは\nもぐって　みずくさを　たべている　めじるしだ。"
          sapphire: "ながれの　はやい　かわで　エサを　とる　ときは\nしっぽを　かわべりの　きの　みきに　まきつける。\nしっぽは　だんりょくがあって　のびる　しくみ。"
        en:
          ruby: "MARILL’s oil-filled tail acts much like\na life preserver. If you see just its\ntail bobbing on the water’s surface,\fit’s a sure indication that this POKéMON\nis diving beneath the water to feed on\naquatic plants."
          sapphire: "When fishing for food at the edge of a\nfast-running stream, MARILL wraps its\ntail around the trunk of a tree.\fThis POKéMON’s tail is flexible and\nconfigured to stretch."
        fr:
          ruby: "La queue remplie d’huile de MARILL lui\nsert de gilet de sauvetage. Parfois, on\npeut voir sa queue flotter à la surface.\fOn peut en déduire que ce POKéMON\na plongé sous l’eau pour se nourrir de\nplantes aquatiques."
          sapphire: "Lorsqu’il pêche pour se nourrir sur les\nrives d’un fleuve rapide, MARILL \naccroche sa queue autour d’un\ftronc d’arbre pour ne pas être emporté.\nLa queue de ce POKéMON est flexible\net résiste à l’étirement."
        it:
          ruby: "La coda di MARILL contiene dell’olio\nche agisce da salvavita. Se si scorge\nsoltanto la sua coda a pelo d’acqua,\fsignifica che questo POKéMON si sta\nimmergendo in profondità per cibarsi\ndi piante acquatiche."
          sapphire: "Per nutrirsi MARILL pesca il cibo in riva\na torrenti impetuosi, avvinghiando\nla coda attorno ai tronchi degli alberi.\fLa coda di questo POKéMON è flessibile\ne dalla costituzione elastica."
        de:
          ruby: "MARILLs Schweif ist mit Öl gefüllt und\ndient ihm als eine Art Rettungsring.\nWenn nur sein Schweif an der\fWasseroberfläche zu sehen ist, taucht\ndieses POKéMON gerade, um sich von\nWasserpflanzen zu ernähren."
          sapphire: "Wenn es am Ufer eines reißenden Flusses\nfischt, wickelt MARILL seinen Schweif\num einen Baumstamm. Der Schweif dieses\fPOKéMON ist flexibel und elastisch, so\ndass es ihn ausdehnen kann."
        es:
          ruby: "La cola de MARILL contiene un aceite\nque hace las veces de chaleco\nsalvavidas. Si ves una moviéndose\fen el agua, seguro que debajo está\nMARILL medio sumergido buscando\nplantas acuáticas para comer."
          sapphire: "Este POKéMON tiene la cola muy flexible\ny elástica. A la hora de pescar\na su presa en una rápida corriente,\fMARILL enrosca la cola en un árbol."
