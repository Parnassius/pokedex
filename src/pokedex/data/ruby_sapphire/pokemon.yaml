        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - fighting
      egg_groups:
        - field
      abilities:
        - blaze
      descriptions:
        jp_kana:
          ruby: "たたかいに　なると　てくびから　しゃくねつの\nほのおを　ふきあげ　ゆうかんに　いどみかかる。\nあいてが　てごわいほど　はげしく　もえあがる。"
          sapphire: "きょうじんな　あしこしを　もち　３０かい　だての\nビルも　らくらく　とびこす　ことが　できる。\nほのおの　パンチで　あいてを　くろこげに　する。"
        en:
          ruby: "In battle, BLAZIKEN blows out intense\nflames from its wrists and attacks foes\ncourageously.\fThe stronger the foe, the more\nintensely this POKéMON’s wrists burn."
          sapphire: "BLAZIKEN has incredibly strong legs -\nit can easily clear a 30-story building\nin one leap.\fThis POKéMON’s blazing punches leave\nits foes scorched and blackened."
        fr:
          ruby: "Au combat, BRASEGALI envoie des\nflammes ardentes de ses poignets. Il\nfait preuve d’un courage exceptionnel.\fPlus l’ennemi est puissant, plus les\npoignets de ce POKéMON sont ardents."
          sapphire: "BRASEGALI a des jambes\nincroyablement puissantes. Il peut\nsauter par-dessus un immeuble de\f30 étages. Les coups de poing\nenflammés de ce POKéMON peuvent\ncarboniser ses ennemis."
        it:
          ruby: "In lotta BLAZIKEN emette fiamme\nmicidiali coi suoi pugni, attaccando\ncoraggiosamente il nemico.\fPiù forte è il nemico, tanto più intenso\nè il fuoco proveniente dai pugni."
          sapphire: "BLAZIKEN è dotato di zampe molto\npotenti in grado di radere al suolo\nun edificio di 30 piani in un colpo solo.\fI suo pugni fulminei lasciano il nemico\nustionato e talvolta carbonizzato."
        de:
          ruby: "LOHGOCK stößt heftige Flammen aus\nseinen Handgelenken aus und greift\nseine Feinde mutig an. Je stärker ein\fFeind ist, desto stärker lodern die\nHandgelenke dieses POKéMON."
          sapphire: "LOHGOCK besitzt unglaublich starke\nBeine, mit denen es ein 30 Stockwerke\nhohes Gebäude mit einem Sprung\füberwinden kann. Die flammenden Schläge\ndieses POKéMON lassen verkohlte Gegner\nzurück."
        es:
          ruby: "En combate, BLAZIKEN expulsa vivas\nllamas por las muñecas y ataca\nal enemigo con fiereza.\fCuanto más fuerte sea el enemigo,\nmás intensas serán las llamas."
          sapphire: "BLAZIKEN tiene unas piernas\nrealmente fuertes. De una patada\nes capaz de derribar rascacielos.\fAdemás, da unos puñetazos\nfulminantes que dejan al oponente\nchamuscado y lleno de tizne."
