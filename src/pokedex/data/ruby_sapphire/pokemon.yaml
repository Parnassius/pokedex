      descriptions:
        jp_kana:
          ruby: "からだの　ほとんどが　みずで　できているので\nうみから　でると　からからに　ひからびてしまう。\nひからびた　ときは　うみに　もどしてあげよう。"
          sapphire: "たいようこうせんを　からだの　なかの　すいぶんで\nくっせつさせて　ビームの　エネルギーに　かえる。\nすいしょうの　ような　めだまから　はっしゃする。"
        en:
          ruby: "TENTACOOL’s body is largely composed\nof water. If it is removed from the\nsea, it dries up like parchment.\fIf this POKéMON happens to become\ndehydrated, put it back into the sea."
          sapphire: "TENTACOOL absorbs sunlight and\nrefracts it using water inside its body\nto convert it into beam energy.\fThis POKéMON shoots beams from its\ncrystal-like eyes."
        fr:
          ruby: "Le corps de TENTACOOL est princi-\npalement aqueux. Si on le retire\nde l’eau, il se déshydrate complètement.\fSi cela arrive, il suffit de le replonger\ndans un liquide pour qu’il reprenne sa\nforme normale."
          sapphire: "Grâce à l’eau de son corps, TENTACOOL\nconvertit la lumière du soleil absorbée\net la renvoie sous forme de\frayon d’énergie. Ce POKéMON lance\nces rayons par ses yeux, semblables\nà des cristaux."
        it:
          ruby: "Il corpo di TENTACOOL è costituito\nquasi solo d’acqua. Se pescato ed\nesposto all’aria, si secca totalmente.\fIn caso di disidratazione, dunque,\nsi consiglia di rimetterlo in mare."
          sapphire: "TENTACOOL assorbe la luce solare e\nla rifrange usando l’acqua che ha nel\ncorpo per convertirla in raggi\fenergetici. Successivamente \nemette questi raggi attraverso\ngli occhi cristallini."
        de:
          ruby: "TENTACHAs Körper setzt sich zum größ-\nten Teil aus Wasser zusammen. Wenn es\ndas Meer verlässt, vertrocknet es.\fWenn dieses POKéMON auszutrocknen be-\nginnt, sollte man es schnell wieder ins\nWasser zurückbringen."
          sapphire: "TENTACHA nimmt Sonnenlicht auf und\nbricht es in seinem Körper mit Hilfe von\nWasser, um es in Strahlenenergie\fumzuwandeln. Dieses POKéMON verschießt\nStrahlen aus seinen kristallartigen\nAugen."
        es:
          ruby: "TENTACOOL está compuesto en su mayor\nparte por agua. Si lo sacas del mar,\nse secará y se quedará acartonado.\fSi este POKéMON se deshidrata,\nhay que ponerlo inmediatamente\nde vuelta en el mar."
          sapphire: "TENTACOOL absorbe luz solar, la\nrefracta a través del agua que tiene\nen su interior y la convierte en un rayo\fde energía. Este POKéMON tiene unos\nojos que parecen de cristal, por los que\ndispara rayos."
