          ruby: "コイキングから　ギャラドスに　しんかする　とき\nのうさいぼうの　こうぞうが　くみかわる　ために\nせいかくが　きょうぼうに　なると　いわれている。"
          sapphire: "いちど　あばれはじめると　すべてを　もやさないと\nきょうぼうな　ちが　おさまらなく　なってしまう。\nひとつき　あばれつづけた　きろくが　のこる。"
        en:
          ruby: "When MAGIKARP evolves into GYARADOS,\nits brain cells undergo a structural\ntransformation. It is said that this\ftransformation is to blame for this\nPOKéMON’s wildly violent nature."
          sapphire: "Once GYARADOS goes on a rampage, its\nferociously violent blood doesn’t calm\nuntil it has burned everything down.\fThere are records of this POKéMON’s\nrampages lasting a whole month."
        fr:
          ruby: "Quand MAGICARPE évolue et devient\nLEVIATOR, la structure de ses cellules\ncérébrales est modifiée. On pense que\fl’extrême violence de ce POKéMON\ndécoule de cette modification."
          sapphire: "Lorsque LEVIATOR commence à\ns’énerver, sa nature violente ne se\ncalme qu’une fois qu’il a tout réduit\fen cendres. La fureur de ce POKéMON\npeut durer pendant un mois."
        it:
          ruby: "Quando MAGIKARP si evolve in GYARADOS,\nle cellule cerebrali subiscono una\ntrasformazione strutturale, dovuta\fpresumibilmente alla natura selvaggia\ne violenta di questo POKéMON."
          sapphire: "Quando GYARADOS s’infuria, la sua\nindole feroce e violenta non si placa\nfinché non ha incendiato ogni cosa.\fCi sono testimonianze di sfuriate di\nquesto POKéMON durate anche\nun mese intero."
        de:
          ruby: "Wenn sich KARPADOR zu GARADOS\nentwickelt, durchlaufen seine\nGehirnzellen eine strukturelle\fVeränderung, was wohl der Grund für die\nzügellose, gewalttätige Natur dieses\nPOKéMON ist."
          sapphire: "Wenn GARADOS in Rage gerät, ist sein\nwildes Blut kaum zu beruhigen, bis es\nalles niedergebrannt hat.\fAufzeichnungen belegen, dass die\nZerstörungswut dieses POKéMON einen\nganzen Monat anhalten kann."
        es:
          ruby: "Cuando MAGIKARP evoluciona y se\nconvierte en GYARADOS, sufre un cambio\nestructural en las células del cerebro.\fDicen que esa transformación\nes la causa de la naturaleza violenta\ny salvaje de este POKéMON."
          sapphire: "Una vez que GYARADOS se desmanda, \nla presión incontrolable y enrabiada de\nla sangre no se le calmará hasta que no\fhaya quemado todo lo que le rodea.\nSegún parece, a este POKéMON le duran\nlos arranques de cólera hasta un mes."
