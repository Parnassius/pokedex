        special_defense: 0
        speed: 2
      types:
        - fighting
        - psychic
      egg_groups:
        - human_like
      abilities:
        - pure_power
      descriptions:
        jp_kana:
          ruby: "めいそうする　ことで　からだの　エネルギーが\nたかまり　だい６かんが　するどくなる　という。\nのやまと　いったいになって　けはいを　けす。"
          sapphire: "ヨガの　ちからで　だい６かんが　はったつして\nサイコパワーを　あやつれる　ように　なった。\n１かげつかん　なにも　たべずに　めいそうする。"
        en:
          ruby: "It is said that through meditation,\nMEDICHAM heightens energy inside\nits body and sharpens its sixth sense.\fThis POKéMON hides its presence by\nmerging itself with fields and\nmountains."
          sapphire: "Through the power of meditation,\nMEDICHAM developed its sixth sense.\nIt gained the ability to use\fpsychokinetic powers. This POKéMON is\nknown to meditate for a whole month\nwithout eating."
        fr:
          ruby: "On dit que grâce à la méditation,\nCHARMINA stocke de l’énergie dans\nson corps et affine son sixième sens.\fCe POKéMON se cache des autres en\nse fondant dans les champs et les\nmontagnes."
          sapphire: "Grâce au pouvoir de la méditation,\nCHARMINA a développé son sixième\nsens. Il peut utiliser des pouvoirs\ftélékinésiques. On sait que ce POKéMON\npeut méditer pendant un mois sans\nmanger."
        it:
          ruby: "Si dice che, grazie alla meditazione,\nMEDICHAM incrementi la propria energia\nfisica e affini il sesto senso.\fSi nasconde efficacemente\nmimetizzandosi nei campi e in\nmontagna."
          sapphire: "Grazie alla propria abilità meditativa\nMEDICHAM ha sviluppato il sesto senso.\nHa acquisito anche la capacità di usare\fi poteri psicocinetici. È noto per\nrimanere fermo in meditazione\nun mese intero senza mangiare."
        de:
          ruby: "Mittels Meditation erhöht MEDITALIS\nseine Körperenergie und schärft seinen\nsechsten Sinn. Dieses POKéMON\fverbirgt sich, indem es eins mit den\nFeldern und Bergen wird."
          sapphire: "Mittels Meditation hat MEDITALIS\nseinen sechsten Sinn entwickelt. So\nkann es seine psychokinetischen\fKräfte nutzen. Dieses POKéMON\nmeditiert einen ganzen Monat ohne\netwas zu essen."
        es:
          ruby: "Dicen que, a través de la meditación,\nMEDICHAM aumenta su energía interior\ny agudiza el sexto sentido que tiene.\fEste POKéMON suele esconderse\nmezclándose con el campo\ny las montañas."
          sapphire: "A través de la meditación, MEDICHAM\ndesarrolló su sexto sentido y aprendió\na usar poderes psicoquinéticos.\fSe sabe que este POKéMON puede\npasarse un mes meditando y sin comer."
electrike:
  species_id: 309
  names:
    jp_kana: ラクライ
    en: ELECTRIKE
    fr: DYNAVOLT
    it: ELECTRIKE
    de: FRIZELBLIZ
    es: ELECTRIKE
  forms:
    electrike:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 40
        special_attack: 65
        special_defense: 40
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - static
        - lightning_rod
      descriptions:
        jp_kana:
          ruby: "ながい　たいもうに　でんきを　ためている。\nでんりゅうで　あしの　きんにくを　しげきして\nばくはつてきな　しゅんぱつりょくを　うみだす。"
          sapphire: "めにも　とまらぬ　スピードで　はしる　ポケモン。\nくうきの　まさつで　でんきを　はっせいさせて\nぜんしんの　たいもうに　たくわえている。"
        en:
          ruby: "ELECTRIKE stores electricity in its\nlong body hair. This POKéMON stimulates\nits leg muscles with electric charges.\fThese jolts of power give its legs\nexplosive acceleration performance."
          sapphire: "ELECTRIKE runs faster than the human\neye can follow. The friction from\nrunning is converted into electricity,\fwhich is then stored in this POKéMON’s\nfur."
        fr:
          ruby: "DYNAVOLT stocke de l’électricité dans\nles poils de son corps allongé. Ce\nPOKéMON stimule les muscles de ses\fjambes avec des charges électriques, ce\nqui le rend capable d’accélérations\nfulgurantes."
          sapphire: "DYNAVOLT court tellement vite que\nl’œil humain ne peut pas le suivre. La\nfriction de sa course est convertie en\félectricité, puis stockée dans la\nfourrure de ce POKéMON."
        it:
          ruby: "ELECTRIKE accumula l’elettricità nella\nsua folta pelliccia. Stimola i muscoli\ndegli arti inferiori con cariche\felettriche, grazie alle quali ottiene\nprestazioni e accelerazioni esplosive."
          sapphire: "ELECTRIKE corre più velocemente\ndi quanto l’occhio umano possa\npercepire. L’attrito dovuto\falla corsa viene trasformato in\nelettricità, accumulata poi nella\npelliccia del POKéMON."
        de:
          ruby: "FRIZELBLIZ speichert Elektrizität in\nseiner langen Körperbehaarung. Dieses\nPOKéMON stimuliert seine\fBeinmuskulatur durch Stromstöße.\nDadurch ist es in der Lage, explosiv\nzu beschleunigen."
          sapphire: "FRIZELBLIZ rennt so schnell, dass\ndas menschliche Auge es nicht\nwahrnehmen kann. Die Reibung,\fdie dabei entsteht, wandelt es in\nElektrizität um, die es in seinem Fell\nspeichert."
        es:
          ruby: "ELECTRIKE acumula electricidad en el\nlargo pelaje que tiene. Este POKéMON\nestimula los músculos de las patas\fmediante descargas eléctricas.\nEstas explosiones de energía le\npermiten acelerar de forma increíble."
          sapphire: "ELECTRIKE corre tan rápido que escapa\nhasta al ojo humano. La fricción que\nse origina en la carrera se transforma\fen electricidad que almacena\nen el pelaje."
manectric:
  species_id: 310
  names:
    jp_kana: ライボルト
    en: MANECTRIC
    fr: ELECSPRINT
    it: MANECTRIC
    de: VOLTENSO
    es: MANECTRIC
