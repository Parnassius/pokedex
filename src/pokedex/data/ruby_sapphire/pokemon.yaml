      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - pressure
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ruby: "からだの　なかみは　くうどうで　なにも　ない。\nブラックホールの　ように　なんでも　すいこみ\nすいこまれると　もどって　これないと　いわれる。"
          sapphire: "どんな　おおきさの　ものも　すいこんで　しまう。\nあやしげな　ての　うごきと　ひとつめの　ちからで\nあいてを　さいみん　じょうたいにして　あやつる。"
        en:
          ruby: "DUSCLOPS’s body is completely hollow -\nthere is nothing at all inside.\nIt is said that its body is like a black\fhole. This POKéMON will absorb anything\ninto its body, but nothing will ever come\nback out."
          sapphire: "DUSCLOPS absorbs anything, however\nlarge the object may be. This POKéMON\nhypnotizes its foe by waving its hands\fin a macabre manner and by bringing its\nsingle eye to bear. The hypnotized foe\nis made to do DUSCLOPS’s bidding."
        fr:
          ruby: "Le corps de TERACLOPE est totalement\ncreux. Il n’y a rien du tout à l’intérieur.\nOn raconte que son corps est comme\fun trou noir. Ce POKéMON peut absorber\nn’importe quoi, mais rien n’en ressort\njamais."
          sapphire: "TERACLOPE peut absorber des objets\nde toute taille. Ce POKéMON hypnotise\nson ennemi en faisant des gestes\fmacabres et en attirant l’attention sur\nson unique œil. L’ennemi hypnotisé obéit\nensuite aux ordres de TERACLOPE."
        it:
          ruby: "Il corpo di DUSCLOPS è completamente\nvuoto. Non contiene assolutamente\nnulla. Infatti si dice che sia una sorta\fdi buco nero. Il POKéMON assorbe\nogni cosa all’interno del proprio corpo,\nma non rilascia mai nulla."
          sapphire: "DUSCLOPS assorbe qualsiasi cosa\nindipendentemente dalle sue dimensioni.\nQuesto POKéMON ipnotizza il nemico\fcon un macabro movimento delle mani\ne con il suo unico occhio, costrin-\ndolo ad eseguire i suoi ordini."
        de:
          ruby: "ZWIRRKLOPs Körper ist komplett hohl. Es\nwird auch mit einem Schwarzen Loch\nverglichen. Dieses POKéMON nimmt alles\fin seinem Körper auf, es kommt jedoch\nnichts wieder heraus."
          sapphire: "ZWIRRKLOP absorbiert alles, egal, wie\ngroß es auch sein mag. Dieses POKéMON\nhypnotisiert seinen Gegner, indem es\fauf makabre Weise winkt und sein\neinziges Auge zeigt. Der hypnotisierte\nGegner führt dann seine Befehle aus."
        es:
          ruby: "DUSCLOPS está completamente hueco\npor dentro. Dicen que su cuerpo es como\nun agujero negro.\fEste POKéMON es capaz de absorber\ncualquier cosa, pero cosa que absorba,\ncosa que no dejará salir nunca más."
          sapphire: "DUSCLOPS absorbe todo lo que pilla,\nal margen del tamaño que tenga.\nEste POKéMON hipnotiza a su rival\fmoviendo las manos de forma macabra y\nusando el ojo de manera implacable. Una\nvez hipnotizado, el enemigo obedecerá."
tropius:
  species_id: 357
  names:
    jp_kana: トロピウス
