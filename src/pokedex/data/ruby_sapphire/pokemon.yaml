          sapphire: "FORRETRESS si nasconde all’interno\ndella sua conchiglia d’acciaio temprato.\nLa conchiglia si apre soltanto per\fcatturare la preda, ma il POKéMON\nha una rapidità tale che non è possibile\nosservarne l’interno."
        de:
