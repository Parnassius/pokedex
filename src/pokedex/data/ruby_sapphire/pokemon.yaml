        - fairy
      abilities:
        - hyper_cutter
        - intimidate
      descriptions:
        jp_kana:
          ruby: "はがねの　ツノが　へんけいした　おおきな　あご。\nおとなしそうな　かおに　ゆだんを　していると\nとつぜん　ふりむき　バクリと　かみつかれるぞ。"
          sapphire: "あいてを　ゆだんさせ　おおきな　あごで　がぶり。\nかわいい　かおに　だまされると　きけんだよ。\nはがねの　あごは　ツノが　へんけいした　ものだ。"
        en:
          ruby: "MAWILE’s huge jaws are actually steel\nhorns that have been transformed.\nIts docile-looking face serves to lull\fits foe into letting down its guard.\nWhen the foe least expects it, MAWILE\nchomps it with its gaping jaws."
          sapphire: "Don’t be taken in by this POKéMON’s\ncute face - it’s very dangerous. MAWILE\nfools the foe into letting down its\fguard, then chomps down with its\nmassive jaws. The steel jaws are really\nhorns that have been transformed."
        fr:
          ruby: "Les énormes mâchoires de MYSDIBULE\nsont en réalité des cornes en métal\ntransformées. Son visage doux et gentil\fest un leurre pour tromper l’ennemi.\nQuand l’ennemi s’y attend le moins,\nil le croque d’un coup de mâchoire."
          sapphire: "Il ne faut pas se fier au visage mignon\nde ce POKéMON. Il est très dangereux.\nMYSDIBULE leurre son ennemi,\fpuis le croque avec son énorme\nmâchoire constituée en fait des\ncornes transformées."
        it:
          ruby: "Le enormi mascelle di MAWILE sono\nin realtà corna d’acciaio trasformate.\nIl volto dallo sguardo tanto mansueto\fserve a indurre i nemici ad abbassare\nla guardia. Infatti MAWILE attacca\nquando l’avversario meno se l’aspetta."
          sapphire: "Non bisogna mai farsi ingannare dallo\nsguardo mansueto di MAWILE, che\nè invece estremamente pericoloso.\fTenta così di far abbassare la guardia\nal nemico per attaccare con le possenti\nmascelle formate da corna trasformate."
        de:
          ruby: "FLUNKIFERs sagenhafte Kiefer sind\neigentlich umgewandelte Stahlhörner.\nSein unterwürfiger Gesichtsausdruck\fdient dazu, seinen Gegner in Sicherheit\nzu wiegen, so dass er unaufmerksam\nwird. Dann schnappt es zu!"
          sapphire: "Fall bloß nicht auf das hübsche Gesicht\ndieses POKéMON herein - es ist sehr ge-\nfährlich. FLUNKIFER lenkt seine Feinde\fab und schlägt dann mit seinem massiven\nKiefer zu. Seine kräftigen Stahlkiefer\nsind eigentlich umgewandelte Hörner."
        es:
          ruby: "Las descomunales fauces de acero de\nMAWILE son la evolución de unos cuernos\nque tuvo en su día.\fCon su expresión dócil puede engañar al\nenemigo y hacer que baje la guardia para\nsorprenderle con las fauces."
          sapphire: "No te dejes engañar por el aspecto\ntierno de este POKéMON; es un verdadero\npeligro. MAWILE engaña a su enemigo.\fPrimero hace que baje la guardia, y\ndespués despliega las horribles fauces\nde acero, que antes eran cuernos."
aron:
  species_id: 304
  names:
    jp_kana: ココドラ
    en: ARON
    fr: GALEKID
    it: ARON
    de: STOLLUNIOR
    es: ARON
