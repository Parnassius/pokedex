          sapphire: "Quando LICKITUNG si trova di fronte\na qualcosa di nuovo, istintivamente\nlo assaggia con una leccata.\fÈ dotato infatti di una memoria legata\nal gusto e alla consistenza degli\noggetti. Non ama i sapori aspri."
