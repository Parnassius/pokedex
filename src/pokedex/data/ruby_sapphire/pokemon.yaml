          sapphire: "まいにち　１８じかん　ねむらないと　ねぶそくで\nちょうのうりょくが　つかえなくなってしまう。\nおそわれると　ねたまま　テレポートで　にげる。"
        en:
          ruby: "ABRA sleeps for eighteen hours a day.\nHowever, it can sense the presence of\nfoes even while it is sleeping.\fIn such a situation, this POKéMON\nimmediately teleports to safety."
          sapphire: "ABRA needs to sleep for eighteen hours\na day. If it doesn’t, this POKéMON loses\nits ability to use telekinetic powers.\fIf it is attacked, ABRA escapes using\nTELEPORT while it is still sleeping."
        fr:
          ruby: "ABRA dort dix-huit heures par jour.\nPourtant, il peut sentir la présence de\nses ennemis, même endormi.\fDans ce genre de situation, ce POKéMON\nse téléporte en lieu sûr."
          sapphire: "ABRA doit dormir dix-huit heures par\njour. S’il dort moins, ce POKéMON ne peut\nplus utiliser ses pouvoirs\ftélékinésiques. Lorsqu’il est attaqué,\nABRA s’enfuit en utilisant TELEPORT,\nsans même se réveiller."
        it:
          ruby: "ABRA dorme per 18 ore al giorno, ma\nriesce a captare la presenza dei nemici\nanche durante il sonno.\fIn questo caso il POKéMON si\nteletrasporta immediatamente al sicuro."
          sapphire: "ABRA ha bisogno di 18 ore di sonno\nal giorno. In caso contrario perde\nle sue abilità telecinetiche.\fSe attaccato, ABRA fugge usando\nTELETRASPORTO mentre dorme."
        de:
          ruby: "ABRA schläft 18 Stunden am Tag.\nEs nimmt die Gegenwart von Feinden\naber auch im Schlaf wahr.\fIn einer solchen Situation bringt es\nsich umgehend mit TELEPORT in\nSicherheit."
          sapphire: "ABRA braucht achtzehn Stunden Schlaf\npro Tag, sonst verliert es die Fähigkeit,\nseine telekinetischen Kräfte zu\fnutzen. ABRA flüchtet mit Hilfe des\nTELEPORT, schläft dabei aber weiter."
        es:
          ruby: "ABRA duerme 18 horas al día, pero\npuede detectar a cualquier enemigo\nque se le acerque mientras duerme.\fEn una situación así, usa\nTELETRANSPORTE para protegerse."
          sapphire: "ABRA necesita dormir 18 horas al día.\nSi no, pierde la habilidad que tiene de\nusar poderes de telequinesia.\fSi le atacan, ABRA puede escapar usando\nTELETRANSPORTE mientras duerme."
