          sapphire: "より　くさい　クサイハナから　しんかした　ほうが\nきれいな　はなを　つけた　キレイハナに　なるよ。\nよるに　なると　はなびらを　つぼめて　ねむる。"
        en:
          ruby: "When BELLOSSOM gets exposed to plenty\nof sunlight, the leaves ringing its body\nbegin to spin around.\fThis POKéMON’s dancing is renowned in\nthe southern lands."
          sapphire: "A BELLOSSOM grows flowers more\nbeautifully if it has evolved from a\nsmelly GLOOM - the stinkier the better.\fAt night, this POKéMON closes its\npetals and goes to sleep."
        fr:
          ruby: "Lorsque JOLIFLOR reste exposé à la\nlumière du soleil, les feuilles autour\nde son corps se mettent à tournoyer.\fLa danse de ce POKéMON est très\ncélèbre dans les régions du sud."
          sapphire: "Les fleurs de JOLIFLOR sont encore plus\njolies s’il s’agit d’une évolution d’un\nORTIDE qui sentait vraiment\ftrès mauvais. La nuit, ce POKéMON\nferme ses pétales pour dormir."
        it:
          ruby: "Quando BELLOSSOM si espone al\nsole, le foglie che circondano il suo\ncorpo iniziano a girare vorticosamente.\fLa danza di questo POKéMON è nota\nnelle regioni meridionali."
          sapphire: "I fiori di BELLOSSOM sono tanto più\nbelli se si è evoluto da un fetido\nGLOOM: più puzza meglio è!\fQuando la sera chiude i petali\nsignifica che se ne va a dormire."
        de:
          ruby: "Wenn BLUBELLA starkem Sonnenlicht\nausgesetzt ist, beginnen sich die Blät-\nter an seinem Körper zu drehen.\fDer Tanz dieses POKéMON ist in\nsüdlichen Ländern sehr bekannt."
          sapphire: "BLUBELLA wachsen schönere Blumen,\nwenn es sich aus einem übel riechenden\nDUFLOR entwickelt hat - je stinkender,\fdesto besser. Nachts schließt dieses\nPOKéMON seine Blätter und schläft."
        es:
          ruby: "Cuando BELLOSSOM se expone a gran\ncantidad de luz solar, le empiezan\na girar las hojas que le rodean.\fLa danza de este POKéMON es famosa\nen las zonas del sur."
          sapphire: "La belleza de las flores que le crecen\na BELLOSSOM depende de lo mal que\noliera el GLOOM a partir del cual\fevolucionó. A mayor hedor, mayor belleza.\nPor la noche, este POKéMON cierra\nlos pétalos y se echa a dormir."
