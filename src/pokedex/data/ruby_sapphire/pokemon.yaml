          sapphire: "PARAS ha sulla schiena dei funghi\nparassiti chiamati tochukaso, che\ncrescono traendo nutrimento\fdal PARAS ospite. Sono molto \napprezzati come farmaco \ndi longevità."
        de:
          ruby: "Auf PARAS’ Rücken wachsen parasitäre\nPilze, die Tochukaso genannt werden.\nSie wachsen, indem sie dem\fKÄFER/PFLANZEN-PKMN Nährstoffe\nentziehen. Sie sind sehr wertvoll als\nlebensverlängernde Medizin."
          sapphire: "Auf PARAS’ Rücken wachsen parasitäre\nPilze, die Tochukaso genannt werden.\nSie wachsen, indem sie diesem\fKÄFER-/PFLANZEN-PKMN Nährstoffe\nentziehen. Sie sind sehr wertvoll als\nlebensverlängernde Medizin."
        es:
          ruby: "PARAS lleva dos setas parásitas\na cuestas llamadas tochukaso. Éstas\ncrecen alimentándose de los nutrientes\fde este POKéMON de tipo BICHO/PLANTA\nque les sirve de huésped.\nLas setas se usan como elixir de vida."
