        - ground
      egg_groups:
        - bug
      abilities:
        - hyper_cutter
        - arena_trap
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          ruby: "すりばちじょうの　すあなの　そこで　じっと\nえものが　おちて　くるのを　まちつづけている。\nおおきな　アゴは　いわをも　くだく　いりょく。"
          sapphire: "だっしゅつ　ふかのうな　あなを　さばくに　つくり\nえものが　くるのを　ひたすら　まちかまえている。\nみずが　なくても　１しゅうかんは　へっちゃら。"
        en:
          ruby: "TRAPINCH’s nest is a sloped, bowl-like\npit dug in sand. This POKéMON patiently\nwaits for prey to tumble down the pit.\fIts giant jaws have enough strength\nto crush even boulders."
          sapphire: "TRAPINCH is a patient hunter. It digs\nan inescapable pit in a desert and waits\nfor its prey to come tumbling down.\fThis POKéMON can go a whole week\nwithout access to any water."
        fr:
          ruby: "Le nid de KRAKNOIX consiste en un\ntrou en pente creusé dans le sable,\ncomme une cuvette. Ce POKéMON attend\fpatiemment que sa proie tombe dedans.\nSes gigantesques mâchoires sont assez\npuissantes pour croquer des rochers."
          sapphire: "KRAKNOIX est un chasseur patient.\nDans le désert, il creuse un trou dont\non ne peut pas s’échapper et attend\fque sa proie tombe dedans. Ce \nPOKéMON peut se passer d’eau\nune semaine entière."
        it:
          ruby: "La tana di TRAPINCH è ricavata in una\nripida fossa a forma di sacca scavata\nnella sabbia. Il POKéMON attende\fpazientemente che la preda cada in\ntrappola. Le sue possenti mascelle\nfrantumano anche la pietra."
          sapphire: "TRAPINCH è un paziente cacciatore. Nel\ndeserto scava fosse micidiali e attende\nche la preda cada in trappola.\fQuesto POKéMON può vivere senz’acqua\nanche per una settimana."
        de:
          ruby: "KNACKLIONs Bau ist eine Art in den Sand\ngegrabener Kessel. Dieses POKéMON\nwartet geduldig auf Beute, um sie in\fseinen Bau zu werfen. Seine gigan-\ntischen Kiefer verfügen über genügend\nKraft, um einen Felsen zu zerquetschen."
          sapphire: "KNACKLION ist ein geduldiger Jäger. Es\ngräbt in einer Wüste eine tiefe Grube\nund wartet auf Beute, die hineinfällt.\fDieses POKéMON kommt eine ganze Woche\nohne Wasser aus."
        es:
          ruby: "El nido de TRAPINCH está situado bajo\nla arena, en una zona cóncava.\nEste POKéMON espera con paciencia\fa que su presa caiga en la misma.\nCon las fauces que tiene puede\ndestruir hasta piedras."
          sapphire: "TRAPINCH es un cazador paciente.\nSuele cavar una fosa profunda en el\ndesierto y esperar a que su presa caiga\fen ella.\nEste POKéMON puede aguantar toda\nuna semana sin beber nada de agua."
vibrava:
  species_id: 329
