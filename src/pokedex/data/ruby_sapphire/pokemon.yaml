      egg_groups:
        - field
        - dragon
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          ruby: "せんぞだいだい　ザングースと　たたかってきた。\nからだの　キズは　はげしい　たたかいの　しるし。\nするどい　きれあじの　しっぽで　こうげきするぞ。"
          sapphire: "かたなの　ような　しっぽは　てきを　きりさくのと\nどうじに　しみだした　もうどくを　あびせるぞ。\nしゅくてき　ザングースと　たたかい　つづける。"
        en:
          ruby: "SEVIPER shares a generations-long\nfeud with ZANGOOSE. The scars on its\nbody are evidence of vicious battles.\fThis POKéMON attacks using its sword-\nedged tail."
          sapphire: "SEVIPER’s swordlike tail serves two\npurposes - it slashes foes and douses\nthem with secreted poison.\fThis POKéMON will not give up its long-\nrunning blood feud with ZANGOOSE."
        fr:
          ruby: "SEVIPER partage une querelle datant\nde plusieurs générations avec\nMANGRIFF. Ses cicatrices sont les\fpreuves de ses nombreux combats. Ce\nPOKéMON attaque à l’aide de sa queue,\naiguisée comme une épée."
          sapphire: "La queue tranchante comme un sabre de\nSEVIPER a deux fonctions : elle peut\nfrapper l’ennemi et lui injecter un\fpoison qu’il sécrète. Ce POKéMON\nn’oublie jamais sa vieille rancune\nenvers MANGRIFF."
        it:
          ruby: "Da generazioni SEVIPER è in lotta\ncontro ZANGOOSE, suo nemico dichiarato.\nLe cicatrici sul suo corpo sono prove\fdi scontri efferati. Questo POKéMON\nattacca usando la coda a forma\ndi spada."
          sapphire: "La coda a forma di spada di SEVIPER\nha una duplice funzione: lacera il nemico\ne gli inietta un potente veleno.\fIl POKéMON non dimentica mai\nle lotte con il suo secolare\nnemico, ZANGOOSE."
        de:
          ruby: "VIPITIS lebt seit Generationen in\nFehde mit SENGO. Die Narben auf\nseinem Körper sind Zeugen grausamer\fKämpfe. Dieses POKéMON greift seine\nGegner mit seinem scharfkantigen\nSchweif an."
          sapphire: "VIPITIS kann mit seinem Schweif\nFeinden einen Hieb versetzen und sie\nmit einem abgesonderten Gift\fbespritzen. Dieses POKéMON wird in der\nlangwährenden Blutsfehde mit SENGO\nnicht nachgeben."
        es:
          ruby: "SEVIPER lleva años de gran enemistad\ncon ZANGOOSE. Las cicatrices que tiene\npor todo el cuerpo dan buena muestra\fde los encarnizados combates en los que\nse han enfrentado. SEVIPER ataca\nusando su cola con forma de espada."
          sapphire: "SEVIPER tiene una cola que parece\nuna espada y le sirve para dar un\nsablazo al enemigo y para envenenarlo.\fEste POKéMON se mantiene firme en la\nenemistad que siente hacia ZANGOOSE."
lunatone:
  species_id: 337
