          sapphire: "KOKOWEI stammt ursprünglich aus den\nTropen. Seine Köpfe wachsen stetig,\nwenn es starkem Sonnenlicht\fausgesetzt ist. Wenn seine Köpfe\nabfallen, bilden sie zusammen ein OWEI."
        es:
