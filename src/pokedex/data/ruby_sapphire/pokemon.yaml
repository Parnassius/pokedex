          sapphire: "あしの　せんたんには　ちいさな　カギヅメが　あり\nてんじょうや　すいちょくの　かべも　あるける。\nほそく　じょうぶな　いとで　てきを　しめあげる。"
        en:
          ruby: "ARIADOS’s feet are tipped with tiny\nhooked claws that enable it to scuttle\non ceilings and vertical walls.\fThis POKéMON constricts the foe with\nthin and strong silk webbing."
          sapphire: "ARIADOS’s feet are tipped with tiny\nhooked claws that enable it to scuttle\non ceilings and vertical walls.\fThis POKéMON constricts the foe with\nthin and strong silk webbing."
        fr:
          ruby: "A l’extrémité des pattes de MIGALOS, on\ntrouve de petits crochets qui lui\npermettent de cavaler sur les surfaces\fverticales et au plafond. Ce POKéMON\npeut piéger ses ennemis dans sa solide\ntoile de soie."
          sapphire: "A l’extrémité des pattes de MIGALOS, on\ntrouve de petits crochets qui lui\npermettent de cavaler sur les surfaces\fverticales et au plafond. Ce POKéMON\npeut piéger ses ennemis dans sa solide\ntoile de soie."
        it:
          ruby: "Le zampe di ARIADOS sono dotate di\nartigli uncinati che gli consentono di\naggrapparsi a soffitti e pareti.\fQuesto POKéMON intrappola il nemico\ncon la sua ragnatela sottile e robusta."
          sapphire: "Le zampe di ARIADOS sono dotate di\nartigli uncinati che gli consentono di\naggrapparsi a soffitti e pareti.\fQuesto POKéMON intrappola il nemico\ncon la sua ragnatela sottile e robusta."
        de:
          ruby: "ARIADOS hat kleine hakenförmige Krallen\nan seinen Füßen. Damit kann es an\nDecken und Wänden entlang flitzen.\fDieses POKéMON erdrückt seine Gegner\nmit starkem, dünnem Seidenfaden."
          sapphire: "ARIADOS hat kleine hakenförmige Krallen\nan seinen Füßen. Damit kann es an\nDecken und Wänden entlangflitzen.\fDieses POKéMON erdrückt seine Gegner\nmit starkem, dünnem Seidenfaden."
        es:
          ruby: "ARIADOS tiene unas patas con forma\nde garfio que le permiten correr por\ntechos y superficies verticales.\fEste POKéMON oprime al rival con una\ntela de araña fina y resistente."
          sapphire: "ARIADOS tiene unas patas con forma\nde garfio que le permiten correr por\ntechos y superficies verticales.\fEste POKéMON oprime al rival con una\ntela de araña fina y resistente."
