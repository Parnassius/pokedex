          ruby: "KAPOERA tournoie à toute vitesse sur\nsa tête, tout en donnant des coups\nde pied. Cette technique combine\fdes attaques offensives et\ndéfensives. Ce POKéMON se déplace\nplus vite sur la tête qu’en marchant."
          sapphire: "KAPOERA tournoie à toute vitesse sur\nsa tête, tout en donnant des coups\nde pied. Cette technique combine\fdes attaques offensives et\ndéfensives. Ce POKéMON se déplace\nplus vite sur la tête qu’en marchant."
        it:
