      types:
        - ground
        - dragon
      egg_groups:
        - bug
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ruby: "２まいの　ハネを　はげしく　しんどうさせて\nちょうおんぱを　だし　えものを　きぜつさせる。\nにんげんも　ずつうを　おこす　ほどの　いりょく。"
          sapphire: "ビブラーバの　ハネは　まだ　せいちょうとちゅう。\nながい　きょりを　とぶ　よりも　しんどうさせて\nちょうおんぱを　だす　ほうが　とくいなのだ。"
        en:
          ruby: "To make prey faint, VIBRAVA generates\nultrasonic waves by vigorously making\nits two wings vibrate.\fThis POKéMON’s ultrasonic waves are so\npowerful, they can bring on headaches\nin people."
          sapphire: "VIBRAVA’s wings have not yet\ncompleted the process of growing.\nRather than flying long distances,\fthey are more useful for generating\nultrasonic waves by vibrating."
        fr:
          ruby: "Pour mettre ses proies K.O., VIBRANINF\nenvoie des ultrasons en faisant vibrer\nses deux ailes.\fLes ondes sonores de ce POKéMON sont\nsi puissantes qu’elles peuvent déclen-\ncher des maux de tête chez les gens."
          sapphire: "Les ailes de VIBRANINF n’ont pas\ncomplètement fini de pousser.\nElles ne lui servent pas à voler sur de\flongues distances, mais plutôt à\ngénérer des ultrasons en vibrant."
        it:
          ruby: "VIBRAVA attacca la preda generando\nonde ad ultrasuoni con le vigorose\nvibrazioni delle due ali.\fTali onde sono così potenti da\ncausare il mal di testa a chi le sente."
          sapphire: "Le ali di VIBRAVA non hanno ancora\ncompletato il loro sviluppo. Più che\nper affrontare lunghe distanze,\fle utilizza per generare onde \nultrasoniche facendole vibrare."
        de:
          ruby: "Um seine Beute zu schwächen, erzeugt\nVIBRAVA Ultraschallwellen, indem es\nseine Flügel vibrieren lässt.\fDie Ultraschallwellen dieses POKéMON \nsind so stark, dass sie bei Menschen\nKopfschmerzen verursachen können."
          sapphire: "VIBRAVAs Flügel sind noch nicht ganz\nausgewachsen. Für lange Strecken sind\nseine Flügel weniger geeignet.\fAber es kann mit ihnen Ultraschallwellen\nerzeugen, wenn es sie vibrieren lässt."
        es:
          ruby: "Para debilitar a su víctima, VIBRAVA\ngenera ondas ultrasónicas haciendo\nvibrar con fuerza las alas.\fLas ondas que crea son tan fuertes que\npueden dar dolor de cabeza a la gente."
          sapphire: "VIBRAVA no ha desarrollado las alas\ndel todo. Más que para volar y recorrer\nlargas distancias, le resultan útiles\fpara generar ondas ultrasónicas\nal hacer que vibren."
flygon:
  species_id: 330
  names:
    jp_kana: フライゴン
    en: FLYGON
    fr: LIBEGON
    it: FLYGON
    de: LIBELLDRA
    es: FLYGON
  forms:
    flygon:
      form_id: 0
      base_stats:
        hp: 80
        attack: 100
        defense: 80
        special_attack: 80
        special_defense: 80
        speed: 100
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ground
        - dragon
      egg_groups:
        - bug
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ruby: "さばくの　せいれいと　よばれる　ポケモン。\nハネの　はばたきで　すなを　まいあげるため\nとんでいる　ときは　いつも　すなあらしの　なか。"
          sapphire: "はばたきで　おこす　すなあらしの　なかから\nうたごえの　ような　はおと　だけが　きこえるため\nフライゴンは　さばくの　せいれいと　いわれた。"
        en:
          ruby: "FLYGON is nicknamed “the elemental \nspirit of the desert.” Because its\nflapping wings whip up a cloud of sand,\fthis POKéMON is always enveloped in a\nsandstorm while flying."
          sapphire: "FLYGON whips up a sandstorm by\nflapping its wings. The wings create a\nseries of notes that sound like singing.\fBecause the “singing” is the only thing\nthat can be heard in a sandstorm, this\nPOKéMON is said to be the desert spirit."
        fr:
          ruby: "LIBEGON est surnommé «l’esprit\nélémentaire du désert». Le battement\nde ses ailes soulève des nuages de\fsable. C’est pourquoi ce POKéMON est\ntoujours entouré d’une tempête de\nsable quand il vole."
          sapphire: "LIBEGON peut déclencher une\ntempête de sable en battant des ailes.\nLes ailes créent une suite de notes\fressemblant à une mélodie. Comme cette\n«mélodie» est le seul son audible, on\nappelle ce POKéMON l’esprit du désert."
        it:
          ruby: "FLYGON è detto anche “Spirito\nprimordiale del deserto”. Poiché le sue\nali sollevano nubi di sabbia, è sempre\faccompagnato da una tempesta di\nsabbia quando vola."
          sapphire: "FLYGON crea tempeste di sabbia\nagitando le ali, che emettono note\nmusicali creando una sorta di canto.\fPoiché questo “canto” è l’unica cosa\nudibile durante la tempesta, FLYGON\nè considerato lo spirito del deserto."
        de:
          ruby: "LIBELLDRA wird auch „Geist der\nWüste“ genannt. Da seine flatternden\nFlügel eine Sandwolke aufwirbeln, ist\fdieses POKéMON beim Fliegen immer\nvon einem Sandsturm umgeben."
          sapphire: "LIBELLDRA wirbelt einen Sandsturm auf,\nwenn es mit den Flügeln schlägt. Seine\nFlügel erzeugen dabei Töne, die wie\fGesang klingen. Da dieser „Gesang“ das\nEinzige ist, was man in einem Sandsturm\nhört, wird es auch Wüstengeist genannt."
        es:
          ruby: "A FLYGON se le conoce como “el alma del\ndesierto”.\nAl volar, como levanta una nube de arena\fal batir las alas, está siempre envuelto\nen una tormenta de arena."
          sapphire: "FLYGON puede provocar una tormenta\nde arena batiendo las alas. Éstas,\nal ser agitadas, crean una melodía.\fY como las “melodías” pueden\noírse cuando hay tormenta,\ndicen que es el espíritu del desierto."
cacnea:
  species_id: 331
  names:
    jp_kana: サボネア
    en: CACNEA
    fr: CACNEA
    it: CACNEA
    de: TUSKA
    es: CACNEA
