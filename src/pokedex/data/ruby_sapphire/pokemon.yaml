      descriptions:
        jp_kana:
          ruby: "１おくねんの　ながい　あいだ　まったく　すがたが\nかわらずに　しんかいで　くらしていた　ポケモン。\nはの　ない　くちで　びせいぶつだけを　たべる。"
          sapphire: "しんかい　ちょうさで　はっけんされた　ちんしゅ。\nごつごつした　いわの　ような　うろこで　おおわれ\nかいていの　すいあつに　たえる　からだを　もつ。"
        en:
          ruby: "RELICANTH is a POKéMON species that\nexisted for a hundred million years\nwithout ever changing its form.\fThis ancient POKéMON feeds on\nmicroscopic organisms with its\ntoothless mouth."
          sapphire: "RELICANTH is a rare species that was\ndiscovered in deep-sea explorations.\nThis POKéMON’s body withstands the\fenormous water pressure of the ocean\ndepths. Its body is covered in tough\nscales that are like craggy rocks."
        fr:
          ruby: "Les RELICANTH sont une espèce de\nPOKéMON qui a existé pendant cent\nmillions d’années sans jamais changer\fde forme. Ce POKéMON antique se nourrit\nd’organismes microscopiques avec sa\nbouche édentée."
          sapphire: "RELICANTH est une espèce rare\ndécouverte pendant des explorations\nsous-marines. Son corps peut supporter\fl’énorme pression des profondeurs\nocéaniques. Il est recouvert d’écailles\nsemblables à des pierres."
        it:
          ruby: "RELICANTH è una specie esistente\nda cento milioni di anni senza\nalcuna mutazione di forma.\fQuesto antichissimo POKéMON\nsi nutre di microrganismi come\nprova la sua bocca sdentata."
          sapphire: "RELICANTH è una specie rara scoperta\ndurante le esplorazioni nelle profondità\nmarine. Il suo corpo riesce a resistere\fall’incredibile pressione degli abissi\noceanici ed è ricoperto di squame\ndure come roccia viva."
        de:
          ruby: "RELICANTH ist eine POKéMON-Spezies,\ndie vor hundert Millionen Jahren\nexistierte, ohne jemals ihre Form zu\fverändern. Dieses antike POKéMON\nhat ein zahnloses Maul und ernährt sich\nvon Mikroorganismen."
          sapphire: "RELICANTH ist eine seltene Spezies, die\nauf einer Tiefsee-Expedition entdeckt\nwurde. Dieses POKéMON hält dem\fenormen Wasserdruck des Ozeans stand.\nSein Körper ist mit steinharten\nSchuppen bedeckt."
        es:
          ruby: "RELICANTH pertenece a una especie\nde POKéMON que lleva millones de años\nsin cambiar de forma.\fEste ancestral POKéMON se alimenta\nde microorganismos por la boca\ndesdentada que tiene."
          sapphire: "RELICANTH pertenece a una rara especie\ndescubierta al explorar el fondo\nmarino.\fEs grande y está cubierto de toscas\ny duras escamas, con las que puede\nsoportar la presión del fondo oceánico."
