      descriptions:
        jp_kana:
          ruby: "いわを　たべて　せいちょうする　ポケモンだ。\nコケの　ついた　いわの　ほうが　すき　らしい。\n１にちに　１トンの　いわを　たべてしまうぞ。"
          sapphire: "やまの　ふもとから　さんちょうまで　のぼる\nあいだに　だいすきな　いわを　ガリガリ　たべる。\nちょうじょうに　つくと　また　ころがりおちる。"
        en:
          ruby: "GRAVELER grows by feeding on rocks.\nApparently, it prefers to eat rocks\nthat are covered in moss.\fThis POKéMON eats its way through\na ton of rocks on a daily basis."
          sapphire: "Rocks are GRAVELER’s favorite food.\nThis POKéMON will climb a mountain from\nthe base to the summit, crunchingly\ffeasting on rocks all the while.\nUpon reaching the peak, it rolls back\ndown to the bottom."
        fr:
          ruby: "GRAVALANCH grandit en se nourrissant\nde cailloux. Apparemment, il a une\npréférence pour les cailloux recouverts\fde mousse. En moyenne, il mange une\ntonne de rochers par jour."
          sapphire: "La nourriture préférée de GRAVALANCH\nest la roche. Ce POKéMON escalade\nparfois les montagnes, dévorant les\frochers sur son passage.\nUne fois au sommet, il se laisse rouler\njusqu’en bas."
        it:
          ruby: "GRAVELER si ciba di rocce. Pare\nche preferisca quelle ricoperte di\nmuschio.\fQuesto POKéMON mangia ogni giorno\ndieci quintali di pietre."
          sapphire: "Il cibo preferito da GRAVELER sono\nle rocce. Infatti è capace di risalire\nun monte dalla base alla cima,\fsgranocchiando rocce tutto il tempo.\nUna volta raggiunta la cima, si lancia\nin discesa rotolando."
        de:
          ruby: "GEOROK wächst, indem es sich von Stei-\nnen ernährt. Am liebsten mag es Steine,\ndie mit Moos überzogen sind.\fDieses POKéMON frisst sich täglich\ndurch eine riesige Menge von Steinen."
          sapphire: "Steine sind GEOROKs Lieblingsspeise.\nDieses POKéMON klettert vom Fuße\neines Berges zu seinem Gipfel empor\fund zermalmt dabei das Gestein. Wenn es\nden Gipfel erreicht hat, rollt es wieder\nherunter."
        es:
          ruby: "GRAVELER crece alimentándose a base\nde piedras. Y, según parece, las prefiere\ncubiertas de musgo.\fCada día se abre camino comiéndose\ntoneladas de rocas."
          sapphire: "Las piedras son la comida preferida de\nGRAVELER. Este POKéMON sube a la cima\nde las montañas devorando todas\flas rocas que va encontrando a su paso.\nUna vez que alcanza la cumbre, se baja\nrodando hasta la falda."
golem:
  species_id: 76
  names:
    jp_kana: ゴローニャ
    en: GOLEM
    fr: GROLEM
    it: GOLEM
    de: GEOWAZ
    es: GOLEM
  forms:
