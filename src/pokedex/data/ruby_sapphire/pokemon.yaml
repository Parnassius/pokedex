        fr:
          ruby: "L’énergie de TOGEPI provient des\némotions positives et du plaisir exprimé\npar les gens et les POKéMON.\fCe POKéMON accumule les sentiments\nde bonheur dans sa coquille, puis les\npartage avec les autres."
          sapphire: "L’énergie de TOGEPI provient des\némotions positives et du plaisir exprimé\npar les gens et les POKéMON.\fCe POKéMON accumule les sentiments\nde bonheur dans sa coquille, puis les\npartage avec les autres."
        it:
          ruby: "TOGEPI ricava la sua energia dai\nnobili sentimenti di affetto e\ngenerosità emanati dai POKéMON\fe dall’uomo. TOGEPI immagazzina le\nsensazioni di felicità dentro il suo\nguscio e le divide con gli altri."
          sapphire: "TOGEPI ricava la sua energia dai\nnobili sentimenti di affetto e\ngenerosità emanati dai POKéMON\fe dall’uomo. TOGEPI immagazzina le\nsensazioni di felicità dentro il suo\nguscio e le divide con gli altri."
        de:
          ruby: "TOGEPI nutzt die positiven Emotionen,\nwie Freude und Mitgefühl, von Menschen\nund POKéMON als Energie.\fDieses POKéMON speichert Glücksgefühle\nin seiner Schale und teilt sie mit\nanderen."
          sapphire: "TOGEPI benutzt die positiven Emotionen\nFreude und Mitgefühl von Menschen und\nPOKéMON als Energie.\fDieses POKéMON speichert Glücksgefühle\nin seiner Schale und teilt sie mit\nanderen."
        es:
          ruby: "TOGEPI usa los sentimientos positivos\nde compasión y alegría que desprenden\nlas personas y los POKéMON.\fEste POKéMON almacena sentimientos\nde felicidad en su interior y después\nlos comparte con otros."
          sapphire: "TOGEPI usa los sentimientos positivos\nde compasión y alegría que desprenden\nlas personas y los POKéMON.\fEste POKéMON almacena sentimientos\nde felicidad en su interior y después\nlos comparte con otros."
