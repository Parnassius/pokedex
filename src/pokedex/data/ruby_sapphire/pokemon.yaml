          sapphire: "KEIFEL hat ein dichtes Fell aus langen\nHaaren. Dadurch ist es gegen eisige\nKälte gewappnet.\fDieses POKéMON benutzt seine\nStoßzähne, um an Nahrung zu gelangen,\ndie unter dem Eis eingeschlossen ist."
        es:
