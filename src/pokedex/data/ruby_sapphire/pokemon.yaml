          sapphire: "PHARAMP est si lumineux qu’on peut le\nvoir de l’espace. Jadis, les gens\nutilisaient la lumière de ce POKéMON\fpour communiquer et s’envoyer des\nsignaux à grande distance."
        it:
          ruby: "AMPHAROS emana una luce così intensa\nda essere visibile anche dallo spazio.\nIn passato si usava questo POKéMON\fper mandare segnali luminosi a\npersone molto lontane."
          sapphire: "AMPHAROS emana una luce così intensa\nda essere visibile anche dallo spazio.\nIn passato si usava questo POKéMON\fper mandare segnali luminosi a\npersone molto lontane."
        de:
          ruby: "AMPHAROS strahlt so viel Licht aus,\ndass es sogar aus dem Weltraum noch \ngesehen werden kann. In der Antike\fbenutzten die Menschen das Licht\ndieses POKéMON dazu, Signale über\nweite Entfernungen auszutauschen."
          sapphire: "AMPHAROS strahlt so viel Licht aus,\ndass es sogar aus dem Weltraum noch \ngesehen werden kann. In der Antike\fbenutzten die Menschen das Licht\ndieses POKéMON dazu, Signale über\nweite Entfernungen auszutauschen."
        es:
          ruby: "AMPHAROS desprende tanta luz que es\nposible verle hasta desde el espacio.\nAntes, la gente usaba su luz como\fsistema de comunicación para\nenviarse señales."
          sapphire: "AMPHAROS desprende tanta luz que es\nposible verle hasta desde el espacio.\nAntes, la gente usaba su luz como\fsistema de comunicación para\nenviarse señales."
