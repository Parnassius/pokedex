        de:
          ruby: "BOTOGEL sammelt seine Nahrung in\nseinem Schweif. Es gab einmal einen\nberühmten Entdecker, der es dank eines\fBOTOGELs geschafft hat, einen der\nhöchsten Berge der Welt zu besteigen.\nEs hatte seine Nahrung mit ihm geteilt."
          sapphire: "BOTOGEL sammelt seine Nahrung in\nseinem Schweif. Es gab einmal einen\nberühmten Entdecker, der es dank eines\fBOTOGEL geschafft hat, einen der\nhöchsten Berge der Welt zu besteigen.\nEs hat seine Nahrung mit ihm geteilt."
        es:
          ruby: "DELIBIRD usa la cola a modo de saco\npara llevar su alimento. En una ocasión,\nun famoso escalador consiguió alcanzar\fla cima del Everest gracias a que uno\nde estos POKéMON compartió sus\nalimentos con él."
