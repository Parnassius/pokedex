      descriptions:
        jp_kana:
          ruby: "はじめて　みる　ものには　でんげきを　あてる。\nくろこげの　きのみが　おちていたら　それは\nでんげきの　つよさを　まちがえた　しょうこだよ。"
          sapphire: "ほっぺの　でんきぶくろの　でんきは　まよなか\nねている　あいだに　ためられている　らしいよ。\nねぼけて　ほうでんしてしまう　ことが　ある。"
        en:
          ruby: "Whenever PIKACHU comes across\nsomething new, it blasts it with a jolt\nof electricity.\fIf you come across a blackened berry,\nit’s evidence that this POKéMON\nmistook the intensity of its charge."
          sapphire: "This POKéMON has electricity-storing\npouches on its cheeks. These appear to\nbecome electrically charged during the\fnight while PIKACHU sleeps.\nIt occasionally discharges electricity\nwhen it is dozy after waking up."
        fr:
          ruby: "Chaque fois que PIKACHU découvre\nquelque chose de nouveau, il envoie\nun arc électrique. Lorsqu’on tombe\fsur une BAIE carbonisée, ça signifie\nsans doute qu’un de ces POKéMON\na envoyé une charge trop forte."
          sapphire: "Ce POKéMON dispose de petites poches\ndans les joues pour stocker de\nl’électricité. Elles semblent se charger\fpendant que PIKACHU dort.\nIl libère parfois un peu d’électricité\nlorsqu’il n’est pas encore bien réveillé."
        it:
          ruby: "Quando PIKACHU incontra qualcosa\nche non conosce, lo colpisce con\nuna scarica elettrica.\fQuando si vede una bacca annerita,\nè evidente che questo POKéMON\nha emesso una scossa troppo forte."
          sapphire: "PIKACHU immagazzina l’elettricità\nnelle guance. Pare che queste si\nricarichino durante la notte quando\fdorme. Talvolta emette delle scariche\nelettriche al risveglio mentre è ancora\nassonnato."
        de:
          ruby: "Immer wenn PIKACHU auf etwas Neues\nstößt, jagt es einen Elektroschock \nhindurch.\fWenn du eine verkohlte Beere findest,\nhat dieses POKéMON seine elektrische\nLadung falsch eingeschätzt."
          sapphire: "Dieses POKéMON kann in seinen\nBackentaschen Elektrizität speichern.\nDiese laden sich nachts auf, während\fPIKACHU schläft. Es entlädt manchmal\nseine elektrische Ladung, wenn es gera-\nde aufgewacht und noch schläfrig ist."
        es:
          ruby: "Cada vez que PIKACHU se encuentra\ncon algo nuevo, le lanza una sacudida\neléctrica.\fSi ves alguna BAYA chamuscada, seguro\nque ha sido PIKACHU; a veces no\ncontrola la intensidad de la descarga."
          sapphire: "Este POKéMON tiene unas bolsas en \nlas mejillas donde almacena electricidad.\nParece ser que se recargan por la noche,\fmientras PIKACHU duerme. A veces,\ncuando se acaba de despertar y está\naún medio dormido, descarga un poco."
