          sapphire: "NIDORAN besitzt Widerhaken, die ein\nstarkes Gift ausstoßen. Sie sind \nvermutlich zum Schutz dieses\fschmächtigen POKéMON entstanden.\nWenn es wütend wird, stößt es ein\ngefährliches Gift aus seinem Horn aus."
        es:
