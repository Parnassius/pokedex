          sapphire: "たいおんが　やく１まんども　あるので　あまつぶに\nうたれると　じょうきが　もうもうと　たちこめて\nあたりは　ふかい　きりに　おおわれると　いう。"
        en:
          ruby: "MAGCARGO’s shell is actually its skin\nthat hardened as a result of cooling.\nIts shell is very brittle and fragile -\fjust touching it causes it to crumble\napart. This POKéMON returns to its\noriginal size by dipping itself in magma."
          sapphire: "MAGCARGO’s body temperature is\napproximately 18,000 degrees F.\nWater is vaporized on contact.\fIf this POKéMON is caught in the rain,\nthe raindrops instantly turn into\nsteam, cloaking the area in a thick fog."
        fr:
          ruby: "La carapace de VOLCAROPOD est en fait\nconstituée de sa peau, qui s’est durcie\naprès un refroidissement. Elle est très\fcassante et fragile. Il suffit de la\ntoucher pour qu’elle casse. Il reprend\nsa forme en plongeant dans le magma."
          sapphire: "La température de VOLCAROPOD est\nd’environ 10 000 degrés. L’eau s’évapore\nà son contact.\fSi ce POKéMON se retrouve sous la pluie,\nles gouttes d’eau forment de la vapeur\net couvrent la zone de brouillard."
        it:
          ruby: "La corazza di MAGCARGO è formata\ndalla sua pelle induritasi per effetto\ndel raffreddamento. La corazza è\ffragile e friabile: cade a pezzi al minimo\ncontatto. Riacquista le sue dimensioni\nnormali immergendosi nel magma."
          sapphire: "La temperatura corporea di MAGCARGO\nsi aggira attorno ai 10.000 gradi\ncentigradi. A contatto col suo corpo\fl’acqua diventa vapore all’istante.\nIn caso di pioggia la zona circostante\nè invasa da una fitta nebbia."
        de:
          ruby: "MAGCARGOs Schale ist eigentlich seine\nHaut, die erhärtet ist, als es auskühlte.\nSeine Schale ist sehr spröde und\fzerbrechlich. Schon bei einer leichten\nBerührung bricht sie auseinander. Dann\nmuss es ein Bad in Magma nehmen."
          sapphire: "MAGCARGOs Körpertemperatur liegt bei\netwa 10.000 Grad. Dieses POKéMON\nbringt Wasser sofort zum Verdampfen.\fWenn dieses POKéMON im Regen steht,\nwerden die Tropfen augenblicklich zu\nDampf und es entsteht dichter Nebel."
        es:
          ruby: "La coraza de MAGCARGO es en realidad\nsu propia piel que quedó endurecida al\nenfriarse. Está muy resquebrajada y es\fmuy frágil; se desharía solo con tocarla.\nEste POKéMON debe sumergirse en magma\npara recuperar su forma."
          sapphire: "MAGCARGO tiene una temperatura\ncorporal de 1.000 grados centígrados\naproximadamente. El agua se evapora\fal contacto con él. Si llueve, las gotas\nque le rozan se transforman en vapor\nal instante y crean una densa niebla."
