      descriptions:
        jp_kana:
          ruby: "めの　うえに　ついている　はなの　あなから\nからだに　ためた　かいすいを　ふきだし\nひとを　おどろかすのが　だいすきな　ポケモンだ。"
          sapphire: "からだに　かいすいを　ためると　ボールの　ように\nじめんで　とびはねることが　できるように　なる。\nたくさん　ためると　たかく　ジャンプできる。"
        en:
          ruby: "WAILMER’s nostrils are located above\nits eyes. This playful POKéMON loves\nto startle people by forcefully snorting\fout seawater it stores inside its body\nout of its nostrils."
          sapphire: "WAILMER can store water inside its body\nto transform itself into a ball for\nbouncing around on the ground.\fBy filling itself up with more water, this\nPOKéMON can elevate the height of its\nbounces."
        fr:
          ruby: "Les narines de WAILMER sont situées\nau-dessus de ses yeux. Ce joyeux\nPOKéMON adore effrayer les gens en\fexpulsant de l’eau de mer\npar les narines."
          sapphire: "WAILMER peut stocker de l’eau\ndans son corps pour se transformer en\nballe et rebondir sur le sol.\fPlus ce POKéMON se remplit d’eau,\nplus il peut rebondir haut."
        it:
          ruby: "Le narici di WAILMER sono posizionate\nsopra gli occhi. È un giocherellone e ama\nspaventare le persone sparando dalle\fnarici l’acqua del mare, che accumula\nall’interno del proprio corpo."
          sapphire: "WAILMER accumula acqua all’interno\ndel proprio corpo per trasformarsi in\nun pallone e rimbalzare al suolo.\fQuesto POKéMON aumenta l’altezza\ndel balzo incrementando la quantità\nd’acqua con cui si gonfia."
        de:
          ruby: "WAILMERs Nasenlöcher liegen über\nseinen Augen. Dieses verspielte\nPOKéMON erschreckt gern Menschen,\findem es das Meerwasser, das es in\nseinem Körper speichert, mit aller Kraft\nherausprustet."
          sapphire: "WAILMER kann Wasser in seinem Körper\nspeichern, um sich in einen Ball zu\nverwandeln und herumzuhüpfen.\fWenn es die Wassermenge steigert, kann\ndieses POKéMON noch höher hüpfen."
        es:
          ruby: "WAILMER tiene los espiráculos encima de\nla cabeza. A este juguetón POKéMON le\nencanta asustar a la gente expulsando\fel agua que acumula a través de estos\norificios."
          sapphire: "WAILMER puede almacenar agua dentro\nde su organismo para convertirse\nen una pelota y botar por tierra firme.\fCuanta más agua trague, mayor altura\nalcanzará al saltar."
wailord:
  species_id: 321
  names:
    jp_kana: ホエルオー
    en: WAILORD
    fr: WAILORD
    it: WAILORD
    de: WAILORD
    es: WAILORD
  forms:
