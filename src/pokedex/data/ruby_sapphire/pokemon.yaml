      types:
        - water
        - ground
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          ruby: "おもさ　１トンいじょう　ある　いわの　かたまりを\nかるがる　ひっぱる　パワーを　もつ　ポケモンだ。\nにごった　すいちゅうも　みとおす　しりょく。"
          sapphire: "ラグラージは　なみおとや　しおかぜの　わずかな\nちがいを　ヒレで　かんじ　あらしを　よかんする。\nあらしになると　いわを　つみあげ　すを　まもる。"
        en:
          ruby: "SWAMPERT is very strong. It has enough\npower to easily drag a boulder weighing\nmore than a ton.\fThis POKéMON also has powerful vision\nthat lets it see even in murky water."
          sapphire: "SWAMPERT predicts storms by sensing\nsubtle differences in the sounds of\nwaves and tidal winds with its fins.\fIf a storm is approaching, it piles up\nboulders to protect itself."
        fr:
          ruby: "LAGGRON est très fort. Tellement\nfort qu’il peut aisément tracter un\nrocher pesant plus d’une tonne.\fCe POKéMON est également doté d’une\nvision si efficace qu’il peut même voir à\ntravers l’eau trouble."
          sapphire: "LAGGRON peut prédire l’arrivée des\ntempêtes en utilisant ses nageoires\npour sentir les variations dans les\fvagues et les marées. Si une tempête\ns’approche, il empile des rochers pour\nprotéger son habitat."
        it:
          ruby: "SWAMPERT è molto forte. Ha una forza\ntale da riuscire a trascinare un masso\ndel peso di una tonnellata senza fatica.\fLa sua vista è così acuta da riuscire\na penetrare anche l’acqua più torbida."
          sapphire: "SWAMPERT prevede le tempeste poiché\ngrazie alle pinne percepisce le sottili\ndifferenze nel suono delle onde e dei\fventi dovuti alle maree. In caso di\nburrasca imminente, crea delle pile\ndi massi per proteggere il nido."
        de:
          ruby: "SUMPEX ist sehr stark. Es kann mit\nLeichtigkeit einen Felsblock bewegen,\nder über eine Tonne wiegt.\fWeiterhin ist es mit einem exzellenten\nSehvermögen ausgestattet, wodurch es\nauch in trüben Gewässern sehen kann."
          sapphire: "SUMPEX kann Stürme voraussagen,\nindem es feine Veränderungen der\nGeräusche von Wellen und Wind mit\fseinen Finnen wahrnimmt. Wenn eine\nSturmfront aufzieht, häuft es\nFelsbrocken an, um sich zu schützen."
        es:
          ruby: "SWAMPERT es muy fuerte. Puede\narrastrar una roca que pese más de\n1 tonelada sin ningún problema.\fEste POKéMON tiene el sentido de la\nvista muy desarrollado. Es capaz de ver\nhasta en aguas cenagosas."
          sapphire: "SWAMPERT puede predecir tormentas\nal percibir con las aletas los sutiles\ncambios que producen las olas\fy las corrientes. Si está a punto\nde estallar una tormenta, empezará\na apilar piedras para resguardarse."
poochyena:
  species_id: 261
  names:
    jp_kana: ポチエナ
    en: POOCHYENA
    fr: MEDHYENA
    it: POOCHYENA
    de: FIFFYEN
    es: POOCHYENA
