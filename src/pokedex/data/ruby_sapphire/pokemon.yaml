          sapphire: "PERSIAN a six grosses vibrisses qui lui\ndonnent un air costaud et lui\npermettent de sentir les mouvements\fde l’air pour savoir ce qui se trouve à\nproximité. Il devient docile lorsqu’on\nl’attrape par les moustaches."
        it:
          ruby: "PERSIAN è dotato di sei baffetti furbi\nche gli conferiscono un aspetto forte.\nI baffi captano ogni movimento dell’aria\friconoscendo presenze vicine. Se\nafferrato per i baffi, diventa docile."
          sapphire: "PERSIAN è dotato di sei baffetti furbi\nche gli conferiscono un aspetto forte.\nI baffi captano ogni movimento dell’aria\friconoscendo presenze vicine. Se\nafferrato per i baffi, diventa docile."
        de:
          ruby: "SNOBILIKAT hat sechs dicke Schnurr-\nhaare, wodurch es Furcht einflößend\nwirkt. Durch diese nimmt es wahr, wenn\fsich etwas in seiner Nähe bewegt. Es\nwird sehr zutraulich, wenn man es an den\nSchnurrhaaren berührt."
          sapphire: "SNOBILIKAT hat sechs dicke Schnurr-\nhaare, wodurch es Furcht einflößend\nwirkt. Durch diese nimmt es wahr, wenn\fsich etwas in seiner Nähe bewegt. Es\nwird sehr zutraulich, wenn man es an den\nSchnurrhaaren berührt."
        es:
          ruby: "PERSIAN tiene seis llamativos bigotes\nque le dan un aspecto feroz. Además,\nle sirven para detectar el movimiento\fdel aire, delator de la presencia\ncercana de algún POKéMON. Si se le\nagarra por los bigotes, se vuelve dócil."
          sapphire: "PERSIAN tiene seis llamativos bigotes\nque le dan un aspecto feroz. Además,\nle sirven para detectar el movimiento\fdel aire, delator de la presencia\ncercana de algún POKéMON. Si se le\nagarra por los bigotes, se vuelve dócil."
