      descriptions:
        jp_kana:
          ruby: "ねったいの　あさい　うみで　くらしている。\nカップルを　みつけると　うしろに　くっついて\nおよぐ　ことから　この　なまえが　つけられた。"
          sapphire: "ハートがたの　からだは　あいじょうの　シンボル。\nラブカスに　であった　カップルは　えいえんの\nあいが　やくそくされると　いわれているよ。"
        en:
          ruby: "LUVDISC live in shallow seas in the\ntropics. This heart-shaped POKéMON\nearned its name by swimming after\floving couples it spotted in the\nocean’s waves."
          sapphire: "LUVDISC’s heart-shaped body is a\nsymbol of love and romance.\nIt is said that any couple meeting this\fPOKéMON is promised a loving\nrelationship that never ends."
        fr:
          ruby: "LOVDISC vit dans les mers peu\nprofondes des tropiques. Ce POKéMON\nen forme de cœur a gagné son nom en\fnageant derrière les couples d’amoureux\nqu’il repérait dans les eaux claires\nde l’océan."
          sapphire: "Le corps de LOVDISC en forme de\ncœur représente l’amour et les\nsentiments. On raconte qu’un couple qui\frencontre ce POKéMON s’aimera\njusqu’à la fin des temps."
        it:
          ruby: "LUVDISC vive nei mari tropicali poco\nprofondi. Questo POKéMON a forma di\ncuore ha preso questo nome per aver\fseguito una coppia innamorata\nindividuata tra le onde oceaniche."
          sapphire: "Il corpo a forma di cuore di LUVDISC\nè il simbolo delle storie d’amore.\nSi dice che le coppie a cui capita\fdi vederlo siano destinate a vivere\nun’intensa passione che non avrà\nmai fine."
        de:
          ruby: "LIEBISKUS lebt in den seichten\nGewässern der Tropen. Dieses herz-\nförmige POKéMON verdankt seinen Namen\fder Tatsache, dass es hinter Liebes-\npaaren herschwamm, die es in den Wellen\ndes Ozeans beobachtet hatte."
          sapphire: "LIEBISKUS’ herzförmiger Körper ist ein\nSymbol der Liebe und der Romantik.\nMan sagt, jedem Paar, dem es begegnet,\fstünde eine unendliche Liebesbeziehung\nbevor."
        es:
          ruby: "LUVDISC vive en aguas tropicales poco\nprofundas. Este POKéMON con forma\nde corazón se ha ganado la reputación\fque tiene por ir nadando detrás de las\nparejas de enamorados que veía entre\nlas olas del océano."
          sapphire: "LUVDISC tiene forma de corazón\ny simboliza el amor y el romanticismo.\nDicen que la pareja que se encuentre\fcon él mantendrá una relación\nde amor de por vida."
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
    en: BAGON
    fr: DRABY
    it: BAGON
    de: KINDWURM
    es: BAGON
  forms:
    bagon:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 60
        special_attack: 40
