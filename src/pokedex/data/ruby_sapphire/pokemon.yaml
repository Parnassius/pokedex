          sapphire: "KRABBOSS est doté d’une pince\ngigantesque, surdimensionnée. Il l’agite\nen l’air pour communiquer avec ses\fsemblables. En revanche, sa pince est\ntellement lourde que ce POKéMON se\nfatigue très vite."
        it:
