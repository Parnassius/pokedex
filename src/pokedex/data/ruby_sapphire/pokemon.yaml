      descriptions:
        jp_kana:
          ruby: "ちいさな　ポケモンや　タマゴを　クチバシに\nいれて　はこぶ　そらの　はこびやだ。\nうみべの　けわしい　がけに　すを　つくる。"
          sapphire: "かいめん　すれすれを　とび　エサを　さがす。\nおおきな　クチバシを　うみの　なかへ　いれて\nエサを　すくいとり　ひとのみで　たべるぞ。"
        en:
          ruby: "PELIPPER is a flying transporter that\ncarries small POKéMON and eggs inside\nits massive bill.\fThis POKéMON builds its nest on steep\ncliffs facing the sea."
          sapphire: "PELIPPER searches for food while in\nflight by skimming the wave tops.\nThis POKéMON dips its large bill in the\fsea to scoop up food, then swallows\neverything in one big gulp."
        fr:
          ruby: "BEKIPAN est un transporteur volant\nchargeant des petits POKéMON et des\nœufs dans son énorme bec.\fCe POKéMON construit son nid sur\nles falaises, face à la mer."
          sapphire: "BEKIPAN récupère sa nourriture en\nvol, en rasant l’écume des vagues.\nCe POKéMON trempe son énorme bec\fdans l’eau, puis avale tout\nen une bouchée."
        it:
          ruby: "PELIPPER fa le veci di un aereo cargo\npoiché trasporta piccoli POKéMON e\nuova all’interno del suo becco enorme.\fQuesto POKéMON crea il proprio nido\nsulle scogliere a picco sul mare."
          sapphire: "PELIPPER si avventura in cerca di cibo\nvolando radente sulla cresta delle onde.\nImmerge il suo becco enorme nell’acqua\fdel mare per catturare la preda e poi\ninghiotte tutto in un sol boccone."
        de:
          ruby: "PELIPPER transportiert kleine POKéMON\nund Eier in seinem riesigen Schnabel\ndurch die Lüfte. Dieses POKéMON baut\fsein Nest auf steilen Klippen am Meer."
          sapphire: "PELIPPER sucht nach Nahrung, während\nes über die Wellen fliegt. Dieses \nPOKéMON taucht seinen großen Schnabel\fins Meer, um seine Beute abzuschöpfen.\nDann schluckt es alles auf einmal\nherunter."
        es:
          ruby: "PELIPPER vuela transportando pequeños\nhuevos y POKéMON dentro del descomunal\npico que tiene.\fEste POKéMON construye su nido en\nescarpados acantilados frente al mar."
          sapphire: "PELIPPER busca su comida mientras\nvuela y esquiva las crestas de las olas.\nCuando localiza una presa, sumerge\fel largo pico en el agua para pescarla\ny se la traga de una vez."
ralts:
  species_id: 280
