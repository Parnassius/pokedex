          sapphire: "Les TAUPIQUEUR sont élevés dans la\nplupart des fermes. En effet, lorsque ce\nPOKéMON creuse quelque part, le sol est\fcomme labouré, prêt à recevoir les\nsemences. On peut alors y planter\nde délicieux légumes."
        it:
