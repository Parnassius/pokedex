      descriptions:
        jp_kana:
          ruby: "かみなりぐもが　でている　ときや　くうきの\nかんそうした　ひは　でんきが　たまりやすい。\nパチパチ　せいでんきの　おとが　なっているよ。"
          sapphire: "なかまと　あそんでいるとき　おたがいの　でんきが\nショートして　ひばなを　だす　ことが　あるぞ。\nひばなに　びっくり　すると　なきだしてしまうよ。"
        en:
          ruby: "PICHU charges itself with electricity\nmore easily on days with thunderclouds\nor when the air is very dry.\fYou can hear the crackling of static\nelectricity coming off this POKéMON."
          sapphire: "When PICHU plays with others, it may\nshort out electricity with another\nPICHU, creating a shower of sparks.\fIn that event, this POKéMON will begin\ncrying, startled by the flash of sparks."
        fr:
          ruby: "PICHU se charge plus facilement en\nélectricité les jours d’orage ou lorsque\nl’air est très sec.\fOn peut entendre le crépitement\nde l’électricité statique générée par\nce POKéMON."
          sapphire: "Lorsque PICHU joue, il lui arrive de\nfaire des courts-circuits avec un autre\nPICHU, créant ainsi une gerbe\fd’étincelles. Du coup, ce POKéMON\nprend peur et se met à pleurer."
        it:
          ruby: "PICHU si carica di elettricità più\nfacilmente in caso di cielo coperto da\nnubi temporalesche o aria molto secca.\fSpesso si può percepire lo scoppiettio\ndella sua carica elettrostatica."
          sapphire: "Quando PICHU gioca con i suoi simili,\nla sua elettricità crea una pioggia di\nscintille, scontrandosi con quella\fdegli altri. In questo caso, inizia a\nlacrimare accecato dalla luce delle\nscintille."
        de:
          ruby: "An Gewittertagen oder Tagen, an denen\ndie Luft sehr trocken ist, kann sich\nPICHU leichter mit Elektrizität\faufladen. Dann kann man das Knistern\nstatischer Aufladung hören."
          sapphire: "Wenn PICHU mit anderen spielt, kann es\neinen Kurzschluss mit einem seiner \nArtgenossen erzeugen, so dass die\fFunken sprühen. Dann beginnt es zu\nweinen, weil es vor den Funken\nerschrickt."
        es:
          ruby: "A PICHU le resulta más fácil cargarse\nde electricidad en días de nubarrones\no cuando sopla un aire muy seco.\fEs posible oír la electricidad estática\nque emana este POKéMON."
          sapphire: "Cuando PICHU juega con otros, puede\nliberar cargas y producir una auténtica\nlluvia de chispas.\fCuando esto ocurre, los POKéMON\nchillan asustados por tanta chispa."
