          ruby: "HYPNO hält ein Pendel in der Hand. Das\nSchwingen und Glitzern des Pendels \nversetzt seine Feinde in eine tiefe\fHypnose. Während dieses POKéMON auf \nder Suche nach Beute ist, poliert es \nsein Pendel."
          sapphire: "HYPNO hält ein Pendel in der Hand. Das\nSchwingen und Glitzern des Pendels \nversetzt seine Feinde in eine tiefe\fHypnose. Während dieses POKéMON auf \nder Suche nach Beute ist, poliert es \nsein Pendel."
        es:
          ruby: "HYPNO lleva un péndulo en la mano.\nEl balanceo y el brillo que tiene\nsumen al rival en un estado de hipnosis\fprofundo. \nMientras busca a su presa, saca brillo\nal péndulo."
          sapphire: "HYPNO lleva un péndulo en la mano.\nEl balanceo y el brillo que tiene\nsumen al rival en un estado de hipnosis\fprofundo. \nMientras busca a su presa, saca brillo\nal péndulo."
