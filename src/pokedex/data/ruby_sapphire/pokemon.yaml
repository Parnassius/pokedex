      descriptions:
        jp_kana:
          ruby: "かわの　ほとりに　たてあなを　ほって　くらす。\nすみかの　ちかくに　はなの　しるしを　つけて\nじぶんの　ばしょだと　なかまに　おしえているよ。"
          sapphire: "ながい　はなを　つかって　みずあびを　する。\nなかまが　あつまってくると　みずを　かけあう。\nずぶぬれの　からだを　みずべで　かわかすよ。"
        en:
          ruby: "For its nest, PHANPY digs a vertical pit \nin the ground at the edge of a river.\nIt marks the area around its nest with\fits trunk to let the others know that\nthe area has been claimed."
          sapphire: "PHANPY uses its long nose to shower\nitself. When others gather around, they\nthoroughly douse each other with water.\fThese POKéMON can be seen drying their\nsoaking-wet bodies at the edge of\nwater."
        fr:
          ruby: "Pour faire son nid, PHANPY creuse\nun trou au bord d’une rivière.\nIl délimite la zone autour de son nid\favec sa trompe pour prévenir les\nautres que ce territoire est le sien."
          sapphire: "PHANPY utilise sa petite trompe pour se\ndoucher. Quand plusieurs d’entre eux se\nréunissent, ils s’arrosent joyeusement.\fOn peut souvent voir ces POKéMON\nse sécher au bord de l’eau."
        it:
          ruby: "PHANPY scava il suo nido in fosse\nscavate in senso verticale nel terreno\nin riva al fiume.\fDelimita l’area attorno al nido\nusando la proboscide per indicare\nla sua proprietà."
          sapphire: "PHANPY usa la lunga proboscide per\nfarsi la doccia. Questi POKéMON sono\nsoliti raggrupparsi per spruzzarsi\fd’acqua a vicenda.\nPoi, è frequente vederli mentre si\nasciugano il corpo fradicio a riva."
        de:
          ruby: "Um sich ein Nest zu bauen, gräbt\nPHANPY am Flussufer ein Loch ins\nErdreich. Es markiert die Umgebung\fseines Nests mit Hilfe seines Rüssels,\ndamit seine Artgenossen wissen, dass\ndieses Gebiet vergeben ist."
          sapphire: "PHANPY kann sich mit seiner langen Nase\nselbst duschen. Wenn andere dabei sind,\nbegießen sie sich gegenseitig mit\fWasser. Danach trocknet es seinen \ndurchnässten Körper am Ufer."
        es:
          ruby: "PHANPY cava un agujero profundo para\nhacer su nido en el suelo, en la ribera de\nlos ríos, y marca con la trompa la zona\fpara que el resto vea que ese terreno\nya está ocupado."
          sapphire: "PHANPY se vale de la larga trompa\npara ducharse. Mientras otros\nse agrupan a su alrededor, se dedican\fa echarse agua unos a otros.\nEs muy fácil ver a estos POKéMON\nsecándose cerca del agua."
