        - water_2
      abilities:
        - rough_skin
      descriptions:
        jp_kana:
          ruby: "はったつした　アゴと　するどく　とがった　キバは\nふなぞこを　かみちぎる　ほどの　はかいりょく。\nキバニアに　おそわれ　しずんだ　ふねは　おおい。"
          sapphire: "テリトリーを　あらす　ものには　しゅうだんで\nおそいかかり　とがった　キバで　やつざきにする。\n１ぴきに　なると　とたんに　よわごしに　なるぞ。"
        en:
          ruby: "CARVANHA’s strongly developed jaws\nand its sharply pointed fangs pack the\ndestructive power to rip out boat hulls.\fMany boats have been attacked and\nsunk by this POKéMON."
          sapphire: "If anything invades CARVANHA’s\nterritory, it will swarm and tear at the\nintruder with its pointed fangs.\fOn its own, however, this POKéMON turns\nsuddenly timid."
        fr:
          ruby: "Les mâchoires surdéveloppées de\nCARVANHA et ses crocs acérés sont\nsi puissants qu’ils peuvent déchirer la\fcoque des bateaux. De nombreux navires\nont été attaqués et coulés\npar ce POKéMON."
          sapphire: "Si un intrus s’aventure sur le territoire\ndes CARVANHA, ils se ruent sur lui et le\nmordent à l’aide de leurs crocs acérés.\fEn revanche, lorsqu’il est seul, ce\nPOKéMON devient tout à coup\ntrès timide."
        it:
          ruby: "Le sviluppate mascelle di CARVANHA e i\ndenti estremamente appuntiti e affilati\nhanno una potenza distruttiva tale da\fsventrare la carena di una nave.\nGià molte navi sono state attaccate\ne affondate da questo POKéMON."
          sapphire: "In caso di invasione del proprio\nterritorio, i CARVANHA si lanciano in\nbranco contro gli intrusi annientandoli\fsenza pietà. Preso singolarmente,\ninvece, questo POKéMON diventa\nestremamente timido."
        de:
          ruby: "KANIVANHAs starke Kiefer und seine\nspitzen Zähne verfügen über die \nzerstörerische Kraft, Bootsrümpfe\fverschlingen zu können. Dieses POKéMON\nhat schon viele Boote versenkt."
          sapphire: "Wenn jemand KANIVANHAs Revier betritt,\nschwärmt es aus und schnappt mit\nseinen spitzen Zähnen nach dem\fEindringling. Wenn es allein ist, ist\ndieses POKéMON sehr scheu."
        es:
          ruby: "CARVANHA, gracias a las descomunales\nfauces de afilados colmillos que tiene,\nes capaz de hacer trizas un barco.\fSon muchas las naves que han sufrido\nel ataque de este POKéMON y han\nacabado naufragando."
          sapphire: "Si algo o alguien invade el territorio de\nlos CARVANHA, se acercarán en masa y\nharán trizas al intruso con los afilados\fcolmillos. Sin embargo, cuando están\nen solitario, estos POKéMON se vuelven\ntímidos de repente."
sharpedo:
  species_id: 319
  names:
    jp_kana: サメハダー
    en: SHARPEDO
    fr: SHARPEDO
    it: SHARPEDO
    de: TOHAIDO
    es: SHARPEDO
  forms:
    sharpedo:
      form_id: 0
      base_stats:
        hp: 70
        attack: 120
        defense: 40
        special_attack: 95
        special_defense: 40
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - rough_skin
      descriptions:
        jp_kana:
          ruby: "うみのギャングと　よばれ　おそれられている。\nおれても　すぐに　はえかわる　キバを　もち\nおおがたタンカーも　１ぴきで　バラバラに　する。"
          sapphire: "かいすいを　おしりの　あなから　ふきだして\nじそく１２０キロで　およぐことが　できる。\nながい　きょりを　およげないのが　じゃくてんだ。"
        en:
          ruby: "Nicknamed “the bully of the sea,”\nSHARPEDO is widely feared.\nIts cruel fangs grow back immediately\fif they snap off.\nJust one of these POKéMON can\nthoroughly tear apart a supertanker."
          sapphire: "SHARPEDO can swim at speeds of up to\n75 mph by jetting seawater out of its\nbackside.\fThis POKéMON’s drawback is its inability\nto swim long distances."
        fr:
          ruby: "Surnommé le «tyran des mers»,\nSHARPEDO est craint de par le\nmonde. Ses crocs menaçants\frepoussent lorsqu’ils se brisent.\nUn seul de ces POKéMON peut détruire\nun pétrolier gros porteur."
          sapphire: "SHARPEDO peut nager à plus de\n120 km/h en propulsant de l’eau de mer\npar l’arrière de son corps.\fCe PoKéMON a un point faible: il ne peut\npas parcourir de longues distances."
        it:
          ruby: "Soprannominato “Tiranno del mare”,\nSHARPEDO è molto temuto. Se perde\nqualcuno dei suoi temibili denti, questo\fricresce all’istante. Uno di questi\nPOKéMON da solo riesce ad\naffondare una superpetroliera."
          sapphire: "SHARPEDO riesce a nuotare fino alla\nvelocità di 120 km/h, espellendo acqua\ndi mare dalla parte posteriore del corpo\fcome un propulsore. La sua unica\ndebolezza è la mancanza di\nresistenza sulle lunghe distanze."
        de:
          ruby: "TOHAIDO trägt den Spitznamen\n„Tyrann des Meeres“ und ist\nsehr gefürchtet. Seine grausamen Zähne\fwachsen sofort nach, wenn sie\nausgebrochen sind. Es kann sogar einen\nÖltanker zerreißen."
          sapphire: "TOHAIDO kann bis zu 120 km/h schnell\nschwimmen, indem es Meerwasser aus\nseinem Hinterteil herausschießt.\fDieses POKéMON kann jedoch nicht sehr\nweite Strecken zurücklegen."
        es:
          ruby: "Conocido como “el terror de los mares”,\nSHARPEDO es temido por todos. Si este\nPOKéMON pierde las escalofriantes\fmandíbulas que tiene, las recupera en\nbreve. Basta con un SHARPEDO para\ndestrozar un buque-cisterna."
          sapphire: "SHARPEDO puede alcanzar nadando\nlos 120 kilómetros por hora agitando\nla aleta trasera y propulsándose\fpor el agua. El punto flaco de este\nPOKéMON es la imposibilidad que tiene\nde nadar largas distancias."
wailmer:
  species_id: 320
  names:
    jp_kana: ホエルコ
    en: WAILMER
    fr: WAILMER
    it: WAILMER
    de: WAILMER
