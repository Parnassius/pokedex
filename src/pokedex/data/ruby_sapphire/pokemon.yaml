          sapphire: "If you come across a young KANGASKHAN\nplaying by itself, you must never\ndisturb it or attempt to catch it.\fThe baby POKéMON’s parent is sure to\nbe in the area, and it will become\nviolently enraged at you."
        fr:
          ruby: "Lorsqu’on rencontre un petit KANGOUREX\nqui joue tout seul, il ne faut jamais le\ndéranger ou essayer de l’attraper.\fLes parents du bébé POKéMON sont\nsûrement dans le coin et ils risquent\nd’entrer dans une colère noire."
          sapphire: "Lorsqu’on rencontre un petit KANGOUREX\nqui joue tout seul, il ne faut jamais le\ndéranger ou essayer de l’attraper.\fLes parents du bébé POKéMON sont\nsûrement dans le coin et ils risquent\nd’entrer dans une colère noire."
        it:
          ruby: "Vedendo un cucciolo di KANGASKHAN\ngiocare per conto suo, non bisogna mai\ndisturbarlo o cercare di catturarlo.\fIl suo genitore, infatti, è sicuramente\nnei paraggi e potrebbe reagire molto\nviolentemente."
          sapphire: "Vedendo un cucciolo di KANGASKHAN\ngiocare per conto suo, non bisogna mai\ndisturbarlo o cercare di catturarlo.\fIl suo genitore, infatti, è sicuramente\nnei paraggi e potrebbe reagire molto\nviolentemente."
        de:
          ruby: "Wenn du auf ein spielendes KANGAMA\nstößt, solltest du es nicht stören oder\nversuchen, es einzufangen.\fDie Mutter dieses Baby-POKéMON ist\nbestimmt in Reichweite und könnte\nsehr wütend auf dich werden."
          sapphire: "Wenn du auf ein junges, spielendes\nKANGAMA stößt, solltest du es nicht\nstören oder versuchen es einzufangen.\fDie Mutter dieses Baby-POKéMON ist\nbestimmt in Reichweite und könnte\nsehr wütend auf dich werden."
        es:
          ruby: "Si te cruzas alguna vez con un\nKANGASKHAN que esté jugando,\nno le molestes ni intentes atraparlo.\fSeguro que estará cerca alguno\nde sus progenitores, que reaccionará\ncon enfado y violencia."
          sapphire: "Si te cruzas alguna vez con un\nKANGASKHAN que esté jugando,\nno le molestes ni intentes atraparlo.\fSeguro que estará cerca alguno\nde sus progenitores, que reaccionará\ncon enfado y violencia."
