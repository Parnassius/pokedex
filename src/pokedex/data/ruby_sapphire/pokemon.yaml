        jp_kana:
          ruby: "はねが　まだ　そだって　いないので　とべない。\nめを　あわせると　じっと　みつめるが　あいてが\nすこしでも　うごくと　とびはねて　にげていく。"
          sapphire: "ジャンプりょくの　はったつした　ポケモン。\nおとなの　せたけ　いじょうある　たかさの　えだに\nひらりと　とびのり　きのめを　ついばむ。"
        en:
          ruby: "NATU cannot fly because its wings are\nnot yet fully grown. If your eyes meet\nwith this POKéMON’s eyes, it will stare\fback intently at you. But if you move\neven slightly, it will hop away to safety."
          sapphire: "NATU has a highly developed jumping\nability. The POKéMON flaps and leaps\nonto tree branches that are taller than\fgrown-up people to pick at the tree’s\nnew shoots."
        fr:
          ruby: "NATU ne peut pas voler, car ses ailes\nn’ont pas encore fini de grandir. Si ses\nyeux croisent le regard de quelqu’un\fd’autre, il reste immobile et concentré.\nMais si la personne en question détour-\nne son regard, il s’enfuit en lieu sûr."
          sapphire: "NATU est capable de sauter très haut.\nCe POKéMON bat des ailes et saute\nsur les branches élevées des\farbres pour en récupérer les\nbourgeons."
        it:
          ruby: "NATU non riesce a volare a causa delle\nali non ancora totalmente sviluppate.\nSe lo si guarda negli occhi, ricambia\flo sguardo, ma al primo movimento\nscappa via per mettersi al sicuro."
          sapphire: "NATU ha una spiccata attitudine al\nsalto. È in grado di raggiungere con\nun balzo rami più alti di un adulto,\fe si ciba dei germogli di cui\nva ghiotto."
        de:
          ruby: "NATU kann nicht fliegen, da seine Flügel\nnoch nicht ausgewachsen sind. Wenn du\ndiesem POKéMON in die Augen schaust,\fstarrt es dich konzentriert an. Wenn du\ndich aber bewegst, hüpft es weg, um sich\nin Sicherheit zu bringen."
          sapphire: "NATU kann hervorragend springen.\nDieses POKéMON schlägt mit den Flügeln\nund springt auf Äste, die höher liegen,\fals ein Erwachsener groß ist, um an die\nneuen Triebe eines Baumes zu kommen."
        es:
          ruby: "NATU no puede volar porque las alas\nno le han crecido lo suficiente.\nSi tu mirada se cruza con la suya,\fte la devolverá fijamente. Pero si haces\nel mínimo movimiento, huirá dando\nsaltitos para ponerse a salvo."
          sapphire: "NATU ha desarrollado tremendamente\nla habilidad de saltar. Este POKéMON\naletea y da brinquitos por las ramas\faltas a las que no alcanza nadie\npara hacerse con los nuevos brotes\nde los árboles."
