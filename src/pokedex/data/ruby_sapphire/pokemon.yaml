      descriptions:
        jp_kana:
          ruby: "どんなに　うんどうを　しても　いたくならない\nとくべつな　きんにくを　もつ　ポケモン。\nおとな　１００にんを　なげとばす　パワー。"
          sapphire: "ゴローンを　もちあげて　からだを　きたえる。\nすべての　かくとうぎを　マスターするために\nせかいじゅうを　たびする　ワンリキーも　いる。"
        en:
          ruby: "MACHOP’s muscles are special - they\nnever get sore no matter how much they\nare used in exercise.\fThis POKéMON has sufficient power to\nhurl a hundred adult humans."
          sapphire: "MACHOP exercises by hefting around\na GRAVELER as if it were a barbell.\nThere are some MACHOP that travel\fthe world in a quest to master all\nkinds of martial arts."
        fr:
          ruby: "Les muscles de MACHOC sont spéciaux.\nQuels que soient les efforts qu’il\nproduit, il n’a jamais de courbature.\fCe POKéMON est assez puissant pour\nlancer une centaine d’hommes adultes."
          sapphire: "MACHOC s’entraîne en soulevant un\nGRAVALANCH, comme s’il s’agissait\nd’haltères. Certains MACHOC voyagent\fun peu partout dans le monde pour\napprendre à maîtriser tous les\ntypes d’arts martiaux."
        it:
          ruby: "I particolari muscoli di MACHOP non\nsi infiammano mai, nemmeno in caso\ndi esercizio eccessivo.\fQuesto POKéMON ha forza\nsufficiente per scagliare lontano\nun centinaio di uomini."
          sapphire: "MACHOP si allena sollevando un\nGRAVELER come fosse un attrezzo\nginnico.\fEsistono MACHOP che girano il mondo\nnel tentativo di imparare ogni tipo\ndi arte marziale."
        de:
          ruby: "MACHOLLOs Muskeln sind etwas Beson-\nderes. Sie schmerzen nie, egal, wie sehr\nsie beansprucht werden.\fDieses POKéMON hat genug Kraft, um 100\nErwachsene umherzuwerfen."
          sapphire: "MACHOLLO trainiert, indem es ein GEOROK\nhochhebt, als wäre es eine Hantel. Es\ngibt auch MACHOLLO, die durch die Welt\freisen, um alle Arten der Kampfkunst \nzu erlernen."
        es:
          ruby: "MACHOP tiene una musculatura\nespecial que nunca se agota\npor mucho que la use.\fEste POKéMON es tan fuerte que\npuede derrotar a cien personas\nadultas de una sola vez."
          sapphire: "MACHOP se entrena levantando a\nGRAVELER a modo de pesa. Algunos de\nestos POKéMON viajan por todo el mundo\fpara aprender todo tipo de artes\nmarciales."
machoke:
