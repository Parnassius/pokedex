          sapphire: "CADOIZO transporte sa nourriture dans\nsa queue. Il y a longtemps, un célèbre\nexplorateur réussit à atteindre le\fsommet de l’Everest grâce à un de ces\nPOKéMON, qui partagea sa nourriture\navec lui."
