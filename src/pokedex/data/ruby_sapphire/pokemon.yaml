      descriptions:
        jp_kana:
          ruby: "こうらは　あらゆる　こうげきを　はねかえす。\nのび　ちぢみする　きょだいな　２ほんの　ツメは\nてっぱんを　くしざしにする　ほどの　いりょくだ。"
          sapphire: "おおむかし　ぜつめつした　ポケモンの　いっしゅ。\nちじょうで　くらすとき　べんりな　ように\n２ほんの　あしで　あるくように　なったと　いう。"
        en:
          ruby: "ARMALDO’s tough armor makes all attacks\nbounce off. This POKéMON’s two\nenormous claws can be freely extended\for contracted. They have the power to\npunch right through a steel slab."
          sapphire: "ARMALDO is a POKéMON species that\nbecame extinct in prehistoric times.\nThis POKéMON is said to have walked on\fits hind legs, which would have been\nmore convenient for life on land."
        fr:
          ruby: "Le puissant blindage d’ARMALDO\npeut repousser toute attaque. Les\nénormes pinces de ce POKéMON peuvent\fs’allonger ou se rétracter. Elles\npeuvent transpercer une plaque d’acier."
          sapphire: "ARMALDO fait partie d’une espèce de\nPOKéMON qui s’est éteinte à l’époque\npréhistorique. On raconte que ce\fPOKéMON marchait sur ses pattes\narrière, ce qui facilitait sa vie sur\nla terre ferme."
        it:
          ruby: "La dura corazza di ARMALDO protegge\nda ogni tipo di attacco. I suoi due\nenormi artigli sono in grado di\festendersi e contrarsi. Inoltre sono\ndotati di una potenza tale da\nspaccare una lastra in acciaio."
          sapphire: "ARMALDO è una specie di POKéMON\nestinta già in tempi antichi.\nSi dice che camminasse sugli arti\finferiori per affrontare meglio\nil tipo di vita che conduceva\nsulla terra ferma."
        de:
          ruby: "Von ARMALDOs hartem Panzer prallen\nalle Angriffe ab. Dieses POKéMON\nhat zwei mächtige Klauen, die es\fausfahren oder einziehen kann. Es hat\nso viel Kraft, dass es damit eine\nStahlplatte pulverisieren kann."
          sapphire: "ARMALDO ist eine POKéMON-Spezies, die\nvor vielen Jahren ausgestorben ist.\nDieses POKéMON soll sich auf seinen\fHinterbeinen fortbewegt haben, da dies\nfür das Leben an Land bequemer war."
        es:
          ruby: "ARMALDO tiene una sólida armadura que\nrepele cualquier ataque.\nEste POKéMON puede estirar o encoger\ftodo lo que quiera las pinzas que tiene.\nCon ellas, puede atravesar una plancha\nde acero."
          sapphire: "ARMALDO es una de las especies de\nPOKéMON que se extinguieron en la era\nprehistórica. Se cree que caminaban\fsobre las patas traseras; lo más\napropiado para la vida en tierra firme."
feebas:
  species_id: 349
  names:
    jp_kana: ヒンバス
    en: FEEBAS
    fr: BARPAU
    it: FEEBAS
    de: BARSCHWA
    es: FEEBAS
  forms:
    feebas:
      form_id: 0
      base_stats:
        hp: 20
        attack: 15
        defense: 20
        special_attack: 10
        special_defense: 55
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - swift_swim
      descriptions:
        jp_kana:
          ruby: "うまれつき　ヒレが　ボロボロで　みっともないため\nだれにも　あいてに　されない　ポケモンだ。\nうみと　かわの　どちらでも　せいかつできる。"
          sapphire: "からだは　ボロボロだが　どこでも　いきていける\nしぶとい　せいめいりょくを　もつ　ポケモン。\nしかし　ノロマなので　すぐに　つかまってしまう。"
        en:
          ruby: "FEEBAS’s fins are ragged and\ntattered from the start of its life.\nBecause of its shoddy appearance, this\fPOKéMON is largely ignored.\nIt is capable of living in both the sea\nand in rivers."
          sapphire: "While FEEBAS’s body is in tatters,\nit has a hardy and tenacious life force\nthat enables it to live anywhere.\fHowever, this POKéMON is also slow and\ndimwitted, making it an easy catch."
        fr:
          ruby: "Les nageoires de BARPAU sont\nabîmées et déchirées dès sa naissance.\nCe POKéMON est généralement ignoré\fà cause de son apparence miséreuse.\nIl peut vivre dans la mer ou\nen eau douce."
          sapphire: "Même si le corps de BARPAU est en\nlambeaux, il reste tenace et\nobstiné, ce qui lui permet de survivre\fpartout. Cependant, ce POKéMON est\ntrès lent et un peu bête, ce qui en fait\nune proie facile."
        it:
          ruby: "Le pinne di FEEBAS sono logore e\nsbrindellate fin dalla nascita. A causa\ndi questo suo aspetto disordinato,\fil POKéMON è solitamente ignorato.\nÈ in grado di vivere in mare e nei fiumi."
          sapphire: "Sebbene abbia il corpo logoro,\nFEEBAS è molto tenace e resistente,\npotendo così vivere in ogni luogo.\fTuttavia, questo POKéMON è anche\nlento e poco sveglio, il che lo rende\nuna preda facile."
        de:
          ruby: "BARSCHWAs Flossen waren schon immer\nzerfetzt. Wegen seines merkwürdigen\nAussehens wird dieses POKéMON\fweitgehend ignoriert. Es kann sowohl im\nMeer als auch in Flüssen leben."
          sapphire: "Obwohl BARSCHWAs Körper zerfetzt ist,\nbesitzt es eine harte und zähe Lebens-\nkraft, so dass es überall leben kann.\fAber dieses POKéMON ist langsam und\ndusselig. Daher ist es leicht zu fangen."
        es:
          ruby: "FEEBAS tiene las aletas melladas y\nrasgadas desde que nace. Debido a\neste aspecto poco imponente,\fson pocos los que lo tienen en cuenta.\nEste POKéMON puede vivir tanto en agua\nsalada como dulce."
          sapphire: "Aunque FEEBAS tenga un cuerpo poco\ncompacto, posee una tremenda y\nconstante fuerza vital que le permite\fvivir en cualquier lugar. Con todo,\nes un POKéMON lento y simplón;\nes fácil de atrapar."
