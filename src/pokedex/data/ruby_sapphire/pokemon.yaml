        fr:
          ruby: "SCORPLANE plane dans les airs sans un\nbruit, comme s’il glissait. Ce POKéMON\ns’accroche au visage de son ennemi\fgrâce aux serres de ses pattes arrière\net aux pinces de ses pattes avant,\net pique avec son dard empoisonné."
          sapphire: "SCORPLANE plane dans les airs sans un\nbruit, comme s’il glissait. Ce POKéMON\ns’accroche au visage de son ennemi\fgrâce aux serres de ses pattes arrière\net aux pinces de ses pattes avant,\net pique avec son dard empoisonné."
        it:
          ruby: "GLIGAR fende l’aria impercettibilmente\ncome se stesse scivolando. Questo\nPOKéMON si aggrappa al viso del nemico\fusando le zampe posteriori artigliate e\nle possenti chele sulle zampe anteriori,\npoi avvelena la preda con il suo aculeo."
          sapphire: "GLIGAR fende l’aria impercettibilmente\ncome se stesse scivolando. Questo\nPOKéMON si aggrappa al viso del nemico\fusando le zampe posteriori artigliate e\nle possenti chele sulle zampe anteriori,\npoi avvelena la preda con il suo aculeo."
        de:
          ruby: "SKORGLA segelt lautlos durch die Lüfte.\nEs verankert sich mit Hilfe der Krallen\nan seinen Hinterbeinen und der riesigen\fScheren an seinen Vorderbeinen am\nGesicht eines Feindes fest und\nvergiftet ihn mit seinem Giftstachel."
          sapphire: "SKORGLA segelt lautlos durch die Lüfte.\nEs verankert sich mit Hilfe der Krallen\nan seinen Hinterbeinen und der riesigen\fScheren an seinen Vorderbeinen am\nGesicht eines Feindes fest und\nvergiftet ihn mit seinem Giftstachel."
        es:
          ruby: "GLIGAR planea por el aire sin hacer\nningún ruido, como si se deslizara.\nEste POKéMON se agarra a la cara de su\frival con las patas traseras, con forma\nde garra, y las pinzas de las delanteras,\ninyectándole veneno por el aguijón."
          sapphire: "GLIGAR planea por el aire sin hacer\nningún ruido, como si fuera patinando.\nEste POKéMON se agarra a la cara de su\frival con las patas traseras, con forma\nde garra, y las pinzas de las delanteras\ny le inyecta veneno por el aguijón."
