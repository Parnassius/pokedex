      types:
        - grass
      egg_groups:
        - monster
        - dragon
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          ruby: "からだから　はえた　はっぱは　もりの　なかで\nてきから　すがたを　かくす　ときに　べんり。\nみつりんに　くらす　きのぼりの　めいしゅ。"
          sapphire: "えだから　えだへ　みがるに　とびまわる。\nどんなに　すばやい　ポケモンも　もりの　なかで\nジュプトルを　つかまえる　ことは　ふかのうだ。"
        en:
          ruby: "The leaves growing out of GROVYLE’s\nbody are convenient for camouflaging\nit from enemies in the forest.\fThis POKéMON is a master at climbing\ntrees in jungles."
          sapphire: "This POKéMON adeptly flies from branch\nto branch in trees.\nIn a forest, no POKéMON can ever hope\fto catch a fleeing GROVYLE however\nfast they may be."
        fr:
          ruby: "Les feuilles qui poussent sur le corps\nde MASSKO sont bien pratiques\nlorsqu’il veut se camoufler\fdans la forêt. Ce POKéMON est passé\nmaître dans l’art de grimper aux arbres."
          sapphire: "Ce POKéMON vole de branche en branche\navec brio. En forêt, aucun POKéMON,\nmême le plus rapide, ne peut espérer\fattraper un MASSKO qui s’enfuit."
        it:
          ruby: "Le foglie che crescono sul corpo di\nGROVYLE sono utili per mimetizzarsi\ncontro i nemici nella foresta.\fQuesto POKéMON sa arrampicarsi\nsugli alberi della giungla con\nuna maestria senza pari."
          sapphire: "GROVYLE vola di ramo in ramo e\ndi albero in albero. Non c’è nessun\nPOKéMON nella foresta in grado\fdi catturarlo in volo: la sua velocità\nè impressionante!"
        de:
          ruby: "REPTAIN kann sich mit den Blättern, die\naus seinem Körper herauswachsen, im\nWald hervorragend tarnen.\fDieses POKéMON ist ein wahrer Meister\ndarin, auf die Bäume des Dschungels zu\nklettern."
          sapphire: "Dieses POKéMON fliegt geschickt von\nAst zu Ast. Keinem POKéMON wird es\njemals gelingen, ein REPTAIN zu\ferwischen. Da kann es noch so schnell\nsein."
        es:
          ruby: "Las hojas que GROVYLE tiene por el\ncuerpo le resultan muy útiles para\ncamuflarse en el bosque y esconderse\fde los enemigos.\nA este POKéMON no hay quien lo supere\nsubiendo a los árboles del bosque."
          sapphire: "Este POKéMON revolotea de rama en rama\ncon maestría. Cuando GROVYLE\nva volando por el bosque, no hay quien\flo alcance por muy rápido que sea."
sceptile:
  species_id: 254
  names:
    jp_kana: ジュカイン
    en: SCEPTILE
    fr: JUNGKO
    it: SCEPTILE
    de: GEWALDRO
    es: SCEPTILE
  forms:
