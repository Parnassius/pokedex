          sapphire: "めにも　とまらぬ　スピードが　りょううでの\nカマの　きれあじを　さらに　するどく　するのだ。\nひとふり　すれば　たいぼくも　まっぷたつだ。"
        en:
          ruby: "SCYTHER is blindingly fast. Its blazing\nspeed enhances the effectiveness of\nthe twin scythes on its forearms.\fThis POKéMON’s scythes are so\neffective, they can slice through thick\nlogs in one wicked stroke."
          sapphire: "SCYTHER is blindingly fast. Its blazing\nspeed enhances the effectiveness of\nthe twin scythes on its forearms.\fThis POKéMON’s scythes are so\neffective, they can slice through thick\nlogs in one wicked stroke."
        fr:
          ruby: "INSECATEUR est incroyablement rapide.\nSa vitesse fulgurante améliore\nl’efficacité des deux lames situées sur\fses avant-bras. Elles sont si coupantes\nqu’elles peuvent trancher un énorme\ntronc d’arbre en un coup."
          sapphire: "INSECATEUR est incroyablement rapide.\nSa vitesse fulgurante améliore\nl’efficacité des deux lames situées sur\fses avant-bras. Elles sont si coupantes\nqu’elles peuvent trancher un énorme\ntronc d’arbre en un coup."
        it:
          ruby: "SCYTHER è veloce come una saetta.\nLa sua rapidità migliora l’efficacia delle\ndue falci sulle zampe anteriori.\fInfatti riesce a tranciare con un colpo\nsecco persino un tronco secolare."
          sapphire: "SCYTHER è veloce come una saetta.\nLa sua rapidità migliora l’efficacia delle\ndue falci sulle zampe anteriori.\fInfatti riesce a tranciare con un colpo\nsecco persino un tronco secolare."
        de:
          ruby: "SICHLOR ist unheimlich schnell. Dadurch\nwerden die beiden Sensen an seinen\nUnterarmen noch effektiver.\fDieses POKéMON kann mit seinen Sensen\nin Sekundenschnelle Baumstämme\nzerteilen."
          sapphire: "SICHLOR ist unheimlich schnell. Dadurch\nwerden die beiden Sensen an seinen\nUnterarmen noch effektiver.\fDieses POKéMON kann mit seinen Sensen\nin Sekundenschnelle Baumstämme\nzerteilen."
        es:
          ruby: "Es espectacular ver lo rápido que es\nSCYTHER. Su increíble velocidad\nrefuerza el efecto del par de guadañas\fque tiene en los brazos, que ya son\nde por sí contundentes; rebanan\ngruesos troncos de un tajo."
          sapphire: "Es espectacular ver lo rápido que es\nSCYTHER. Su increíble velocidad\nrefuerza el efecto del par de guadañas\fque tiene en los brazos, que ya son\nde por sí contundentes; rebanan\ngruesos troncos de un tajo."
