        fr:
          ruby: "REPTINCEL lacère ses ennemis sans\npitié grâce à ses griffes acérées. S’il\nrencontre un ennemi puissant, il\fdevient agressif et la flamme au bout\nde sa queue s’embrase et prend une\ncouleur bleu clair."
          sapphire: "REPTINCEL lacère ses ennemis sans\npitié grâce à ses griffes acérées. S’il\nrencontre un ennemi puissant, il\fdevient agressif et la flamme au bout\nde sa queue s’embrase et prend une\ncouleur bleu clair."
        it:
          ruby: "CHARMELEON distrugge il nemico senza\npietà con i suoi artigli affilati. Quando\nincontra un avversario molto forte\fdiventa aggressivo. In questo stato di\ngrande agitazione la fiamma della coda\ndiventa di colore bianco bluastro."
          sapphire: "CHARMELEON distrugge il nemico senza\npietà con i suoi artigli affilati. Quando\nincontra un avversario molto forte\fdiventa aggressivo. In questo stato di\ngrande agitazione la fiamma della coda\ndiventa di colore bianco bluastro."
        de:
          ruby: "Gnadenlos besiegt GLUTEXO seine Geg-\nner mit seinen scharfen Klauen. Wenn es \nauf starke Gegner trifft, wird es\fwütend und die Flamme auf seiner\nSchweifspitze flackert in einem\nbläulichen Ton."
          sapphire: "GLUTEXO attackiert seine Feinde mit\naller Gewalt und unter Einsatz seiner\nscharfen Krallen. Trifft es auf starke\fGegner, wird es wütend und die\nFlamme auf seiner Schweifspitze\nflackert in einem bläulichen Ton."
        es:
          ruby: "CHARMELEON no tiene reparo en acabar\ncon su rival usando las afiladas garras\nque tiene. Si su enemigo es fuerte, se\fvuelve agresivo, y la llama que tiene en\nel extremo de la cola empieza a arder con\nmayor intensidad tornándose azulada."
          sapphire: "CHARMELEON no tiene reparo en acabar\ncon su rival usando las afiladas garras\nque tiene. Si su enemigo es fuerte, se\fvuelve agresivo, y la llama que tiene en\nel extremo de la cola empieza a arder con\nmayor intensidad tornándose azulada."
