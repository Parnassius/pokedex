          ruby: "ドロドロ　ブヨブヨした　からだは　どんなに\nほそい　すきまにも　はいりこむことが　できる。\nげすいかんに　もぐって　きたない　みずを　のむ。"
          sapphire: "おせんされた　かいていの　ヘドロから　うまれた。\nきたない　ものが　だいすきで　からだじゅうから\nバイキンだらけの　えきたいを　たれながしている。"
        en:
          ruby: "GRIMER’s sludgy and rubbery body can\nbe forced through any opening, however\nsmall it may be.\fThis POKéMON enters sewer pipes to\ndrink filthy wastewater."
          sapphire: "GRIMER emerged from the sludge that\nsettled on a polluted seabed.\nThis POKéMON loves anything filthy.\fIt constantly leaks a horribly germ-\ninfested fluid from all over its body."
        fr:
          ruby: "Le corps boueux et gélatineux de\nTADMORV peut être enfoncé dans\nn’importe quelle ouverture, même\fla plus petite. Ce POKéMON se promène\ndans les tuyaux des égouts pour\nboire de l’eau croupie."
          sapphire: "TADMORV est apparu dans la vase\naccumulée sur un bord de mer pollué. \nCe POKéMON aime tout ce qui est\fdégoûtant. Une substance pleine de\ngermes suinte constamment de tout\nson corps."
        it:
          ruby: "Il corpo fangoso e gommoso di GRIMER\npuò passare attraverso ogni apertura,\nanche la più angusta.\fSi intrufola dentro le condotte\nfognarie per bere le ripugnanti\nacque di scarico."
          sapphire: "GRIMER proviene dal fango depositato\nsui fondali inquinati. Infatti ama tutto\nciò che è sudicio e tossico.\fEmana continuamente un fluido\nbatterico velenoso da ogni\nparte del corpo."
        de:
          ruby: "SLEIMAs glitschiger, gummiartiger\nKörper passt durch jede noch so kleine\nÖffnung. Dieses POKéMON steigt in die\fKanalisation hinab, um fauliges\nAbwasser zu trinken."
          sapphire: "SLEIMA ist aus dem Schlamm eines\nverseuchten Flussbetts entstanden.\nDieses POKéMON liebt verschmutzte\fDinge. Es scheidet ständig eine mit\nBakterien verseuchte Flüssigkeit aus\nseinem ganzen Körper aus."
        es:
          ruby: "El elástico cuerpo de lodo de GRIMER\nle permite colarse por cualquier\norificio, sea del tamaño que sea.\fEste POKéMON entra en los bajantes de\nlas cloacas para beberse el agua sucia."
          sapphire: "GRIMER emergió del lodo que se formó\nen una zona contaminada en el fondo del\nmar. A este POKéMON le encanta todo lo\fque sea suciedad. Emana continuamente\ny por todo el cuerpo un horrible fluido\ncontaminado de bacterias."
