          sapphire: "On voit souvent GALOPA trotter dans\nles champs et les plaines. Cependant,\nlorsque ce POKéMON s’en donne la peine,\fil peut galoper à plus de 240 km/h et\nsa crinière flamboyante s’embrase."
        it:
          ruby: "RAPIDASH si vede comunemente\ngaloppare in campagne e pianure.\nQuando si lancia a tutta velocità\fla sua fiera criniera brilla e arde\nmentre galoppa fino a 240 km/h."
          sapphire: "RAPIDASH si vede comunemente\ngaloppare in campagne e pianure.\nQuando si lancia a tutta velocità\fla sua fiera criniera brilla e arde\nmentre galoppa fino a 240 km/h."
        de:
          ruby: "Man kann GALLOPA dabei beobachten, \nwie es lässig über Felder und Wiesen\ngaloppiert. Wenn dieses POKéMON\fjedoch Ernst macht, erreicht es bis zu\n240 km/h. Dann beginnt seine Mähne\nzu lodern."
          sapphire: "Man kann GALLOPA dabei beobachten, \nwie es fröhlich über Felder und Wiesen\ngaloppiert. Wenn dieses POKéMON\fjedoch Ernst macht, erreicht es bis zu\n240 km/h. Dann beginnt seine Mähne\nzu lodern."
        es:
          ruby: "A RAPIDASH se le suele ver trotando sin\nrumbo fijo por los campos y llanos. Pero\ncuando tiene que ir a algún sitio en\fconcreto, se le aviva el fuego de las\nmelenas y emprende el galope llameante\nllegando a 240 km por hora."
          sapphire: "A RAPIDASH se le suele ver trotando sin\nrumbo fijo por los campos y llanos. Pero\ncuando tiene que ir a algún sitio en\fconcreto, se le aviva el fuego de las\nmelenas y emprende el galope llameante\nllegando a 240 km por hora."
