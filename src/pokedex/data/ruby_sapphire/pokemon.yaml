          sapphire: "Il pennacchio arricciato sul capo di\nPOLITOED simboleggia il suo stato\ndi re. Si dice che più lungo e più\farricciato è il pennacchio, maggiore\nsia il rispetto che questo POKéMON\nriceve dai suoi pari."
        de:
