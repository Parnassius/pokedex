        jp_kana:
          ruby: "ずつうを　おこす　とくしゅな　アルファはを\nだすので　つよい　せいしんりょくの　もちぬしじゃ\nないと　ユンゲラーの　トレーナーには　なれない。"
          sapphire: "ぎんの　スプーンは　アルファはを　たかめる。\nスプーンが　ないと　いつもの　はんぶんしか\nちょうのうりょくを　つかえなくなると　いう。"
        en:
          ruby: "KADABRA emits a peculiar alpha wave\nif it develops a headache. Only those\npeople with a particularly strong\fpsyche can hope to become a TRAINER\nof this POKéMON."
          sapphire: "KADABRA holds a silver spoon in its\nhand. The spoon is used to amplify the\nalpha waves in its brain.\fWithout the spoon, the POKéMON is said\nto be limited to half the usual amount\nof its telekinetic powers."
        fr:
          ruby: "KADABRA émet une onde alpha si\nparticulière qu’elle vous donne\nmal à la tête.\fSeuls les gens avec un psychisme\npuissant peuvent espérer devenir\nDRESSEUR de ce POKéMON."
          sapphire: "KADABRA tient une cuillère en argent\ndans la main. Elle est utilisée pour\namplifier les ondes alpha de son\fcerveau. Sans elle, on raconte que ce\nPOKéMON ne peut utiliser que la moitié\nde ses pouvoirs télékinésiques."
        it:
          ruby: "KADABRA emette particolari onde alfa\nche causano mal di testa a chi si trova\nnelle vicinanze.\fSoltanto chi ha una psiche molto stabile\npuò sperare di diventare ALLENATORE\ndi questo POKéMON."
          sapphire: "KADABRA tiene in mano un cucchiaio\nd’argento per amplificare le onde alfa\nnel suo cervello.\fSi dice che senza cucchiaio\ni suoi abituali poteri telecinetici\nsiano dimezzati."
        de:
          ruby: "KADABRA sendet Alphawellen aus, wenn es\nKopfschmerzen hat. Nur wer eine beson-\nders starke Psyche hat, kann\fdieses POKéMON unter seine Fittiche\nnehmen."
          sapphire: "KADABRA hält einen silbernen Löffel in\nder Hand. Es verstärkt damit die\nAlphawellen in seinem Gehirn. Ohne den\fLöffel könnte dieses POKéMON nur die\nHälfte seiner telekinetischen Kräfte\nnutzen."
        es:
          ruby: "KADABRA emite unas ondas alfa muy\nparticulares cuando le duele la cabeza.\nSólo aquellos que tengan gran poder\fmental podrán optar a ser\nENTRENADOR de este POKéMON."
          sapphire: "KADABRA lleva siempre una cuchara de\nplata en la mano, que usa para amplificar\nlas ondas alfa de su cerebro.\fDicen que sin la cuchara, sus poderes de\ntelequinesia se reducen a la mitad."
