      descriptions:
        jp_kana:
          ruby: "すいちゅうで　ゆうがに　たなびく　ひれが　とても\nうつくしい　ポケモンだが　ゆだんを　していると\nきょうれつな　ツノの　ひとつきを　くらうぞ。"
          sapphire: "かわや　いけを　およぐ　ことが　だいすきなので\nすいそう　なんかに　いれていたら　ぶあつい\nガラスも　ツノの　ひとつきで　わって　にげるぞ。"
        en:
          ruby: "GOLDEEN is a very beautiful POKéMON\nwith fins that billow elegantly in water.\nHowever, don’t let your guard down\faround this POKéMON - it could ram you\npowerfully with its horn."
          sapphire: "GOLDEEN loves swimming wild and free\nin rivers and ponds.\nIf one of these POKéMON is placed in an\faquarium, it will shatter even the\nthickest glass with one ram of its horn\nand make its escape."
        fr:
          ruby: "POISSIRENE est un POKéMON magnifique\ndoté de nageoires qui ondulent\nélégamment dans les profondeurs.\fIl ne faut pourtant pas baisser sa\ngarde face à ce POKéMON, car il peut \ncharger avec sa puissante corne."
          sapphire: "POISSIRENE adore nager librement dans\nles rivières et les étangs. Si l’un de ces\nPOKéMON est mis dans un aquarium,\fil n’hésitera pas à casser la vitre avec\nsa puissante corne pour s’enfuir."
        it:
          ruby: "GOLDEEN è un POKéMON molto\nelegante dai movimenti aggraziati.\nTuttavia, è necessario stare attenti\fpoiché potrebbe attaccare\nviolentemente con il suo corno."
          sapphire: "GOLDEEN ama nuotare libero in fiumi\ne laghetti. Se messo in acquario, questo\nPOKéMON riesce a fuggire spaccando\fanche il vetro più spesso con un\ncolpo secco del suo corno."
        de:
          ruby: "GOLDINI ist ein wunderschönes POKéMON,\ndessen Flossen sich elegant im Wasser\nwiegen. Aber man muss auf dieses\fPOKéMON Acht geben. Es könnte einen\nsonst heftig mit seinem Horn rammen."
          sapphire: "GOLDINI liebt es, in Teichen und Flüssen\nzu schwimmen. Wenn ein solches\nPOKéMON in ein Aquarium gebracht wird,\fwird es selbst das dickste Glas mit\neinem Stoß seines Horns zum Zerbersten\nbringen und die Flucht ergreifen."
        es:
          ruby: "GOLDEEN es un bello POKéMON que mueve\ncon elegancia las aletas en el agua.\nCon todo, no hay que bajar la guardia,\fen cualquier momento puede embestirte\ncon el cuerno."
          sapphire: "A GOLDEEN le encanta nadar libremente\ny a su aire en ríos y estanques.\nSi pones a uno de estos POKéMON en un\facuario, usará el cuerno que tiene para\nromper las paredes, independientemente\ndel grosor del cristal, y escapar."
seaking:
