      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - insomnia
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ruby: "じぶんの　からだを　はりで　キズつける　とき\nつよい　のろいの　エネルギーが　はっせいする。\nもとは　すてられた　かわいそうな　ぬいぐるみ。"
          sapphire: "すてられた　ぬいぐるみの　わたに　のろいの\nエネルギーが　しみこんで　ポケモンに　なった。\nくちを　あけると　エネルギーが　にげてしまう。"
        en:
          ruby: "BANETTE generates energy for laying\nstrong curses by sticking pins into its\nown body.\fThis POKéMON was originally a pitiful\nplush doll that was thrown away."
          sapphire: "A cursed energy permeated the stuffing\nof a discarded and forgotten plush doll,\ngiving it new life as BANETTE.\fThe POKéMON’s energy would escape if it\nwere to ever open its mouth."
        fr:
          ruby: "En plantant des aiguilles dans son\npropre corps, BRANETTE génère de\nl’énergie permettant de lancer de\fpuissantes malédictions. Au départ, ce\nPOKéMON n’était qu’une malheureuse\npeluche jetée à la poubelle."
          sapphire: "Une énergie maudite a pénétré le rem-\nbourrage d’une vieille peluche aban-\ndonnée, donnant ainsi vie à BRANETTE.\fL’énergie de ce POKéMON s’échappe s’il\nouvre la bouche."
        it:
          ruby: "BANETTE genera energia per lanciare\nterribili maledizioni, conficcandosi\nalcuni spilli nel corpo.\fOriginariamente questo POKéMON era\nun dolce peluche, successivamente\ngettato via."
          sapphire: "Un’energia maledetta ha permeato\nl’imbottitura di un peluche vecchio e\ndimenticato, dando vita a BANETTE.\fQuesto POKéMON deve tenere sempre la\nbocca chiusa per evitare che l’energia\naccumulata scappi fuori."
        de:
          ruby: "BANETTE belegt andere mit Flüchen,\nindem es Nadeln in seinen eigenen\nKörper sticht. Dieses POKéMON war\fursprünglich eine Mitleid erregende\nPlüschpuppe, die weggeworfen wurde."
          sapphire: "Die Energie eines Fluchs durchdrang\ndie Füllung einer weggeworfenen und\nvergessenen Plüschpuppe und erweckte\fBANETTE zum Leben. Die Energie dieses\nPOKéMON würde entweichen, wenn es\nseinen Mund öffnen sollte."
        es:
          ruby: "BANETTE genera energía para echar\nun infalible hechizo clavándose púas\na sí mismo.\fLos orígenes de este POKéMON son algo\ntristes: era un muñeco de felpa al que\ntiraron a la basura."
          sapphire: "Fue un hechizo el que hizo que el relleno\nde este muñeco de felpa olvidado y\nabandonado pasara a ser BANETTE.\fSi este POKéMON abriera la boca, se\nquedaría sin energía."
duskull:
  species_id: 355
  names:
    jp_kana: ヨマワル
    en: DUSKULL
    fr: SKELENOX
    it: DUSKULL
    de: ZWIRRLICHT
    es: DUSKULL
