      descriptions:
        jp_kana:
          ruby: "シッポの　あたまにも　ちいさな　のうが　ある。\nにおいや　おとに　はんのうして　こうげきするので\nうしろから　ちかよると　いきなり　かみつかれる。"
          sapphire: "しっぽの　のうは　かんがえごとが　できないほど\nちいさいけど　ねむらなくても　へいき　なので\n２４じかん　あたりを　みはりつづけて　いるぞ。"
        en:
          ruby: "GIRAFARIG’s rear head also has a brain,\nbut it is small. The rear head attacks in\nresponse to smells and sounds.\fApproaching this POKéMON from behind\ncan cause the rear head to suddenly\nlash out and bite."
          sapphire: "GIRAFARIG’s rear head contains a tiny\nbrain that is too small for thinking.\nHowever, the rear head doesn’t need to\fsleep, so it can keep watch over its\nsurroundings 24 hours a day."
        fr:
          ruby: "La tête à l’arrière de GIRAFARIG a aussi\nun cerveau, mais il est plus petit. Elle\nattaque en réponse aux sons et\faux odeurs. Si on approche de ce\nPOKéMON par derrière, cette petite\ntête peut tout à coup jaillir et mordre."
          sapphire: "La tête à l’arrière de GIRAFARIG abrite\nun cerveau trop petit pour penser.\nEn revanche, cette tête arrière\fn’a pas besoin de dormir, ce qui lui\npermet de monter la garde tout le\ntemps."
        it:
          ruby: "La testa posteriore di GIRAFARIG è\ndotata di un cervello piccolissimo, che\nattacca soltanto in risposta agli odori\fe ai suoni. Avvicinando questo POKéMON\nda dietro sussiste il pericolo di essere\nmorsi dalla testa posteriore."
          sapphire: "La testa posteriore di GIRAFARIG\ncontiene un cervello minuto, troppo\npiccolo per pensare. Tuttavia, questa\ftestolina non dorme mai, così può\nrimanere di sorveglianza 24 ore su 24."
        de:
          ruby: "Der Kopf an GIRAFARIGs Hinterteil hat\nein eigenes Gehirn. Er reagiert mit\nAngriffen auf Gerüche und Geräusche.\fWenn man sich diesem POKéMON von\nhinten nähert, könnte der hintere Kopf\nplötzlich vorschnellen und zubeißen."
          sapphire: "Der Kopf an GIRAFARIGs Hinterteil\nverfügt nur über ein kleines Gehirn, mit\ndem es nicht denken kann. Dieses Gehirn\fbenötigt jedoch keinen Schlaf und ist\nsomit in der Lage, die Umgebung rund\num die Uhr im Auge zu behalten."
        es:
          ruby: "GIRAFARIG tiene un cerebro también\nen la cabeza trasera, que reacciona\natacando ante olores y sonidos.\fSi te acercas a este POKéMON desde\natrás, puedes provocar que la cabeza\ntrasera salga de repente y te muerda."
          sapphire: "La cabeza trasera de GIRAFARIG tiene\nun cerebro muy pequeño para pensar,\npero como no le hace falta dormir\fal menos puede hacer de centinela\nlas 24 horas del día."
