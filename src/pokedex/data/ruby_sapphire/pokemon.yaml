      descriptions:
        jp_kana:
          ruby: "ひょうがじだいに　つくられた　こおりの　からだは\nほのおでも　とかす　ことが　できない。\nマイナス　２００どの　れいきを　あやつる。"
          sapphire: "マイナス２００どの　れいきが　からだを　つつむ。\nちかづいた　だけでも　こおりついて　しまうぞ。\nマグマでも　とけない　こおりの　からだを　もつ。"
        en:
          ruby: "REGICE’s body was made during an ice\nage. The deep-frozen body can’t be\nmelted, even by fire.\fThis POKéMON controls frigid air of\nminus 328 degrees F."
          sapphire: "REGICE cloaks itself with frigid air of\nnegative 328 degrees F.\nThings will freeze solid just by going\fnear this POKéMON.\nIts icy body is so cold, it will not melt\neven if it is immersed in magma."
        fr:
          ruby: "Le corps de REGICE fut créé\npendant l’ère glaciaire. Son corps est\ntellement gelé qu’il ne peut pas fondre,\fmême en le brûlant. Ce POKéMON\npeut contrôler l’air glacé jusqu’à une\ntempérature de - 200 degrés."
          sapphire: "REGICE se recouvre d’air glacé à\n- 200 degrés. Tout ce qui passe à\nproximité de ce POKéMON gèle\fsur place. Son corps est si froid\nqu’il ne fond jamais, même s’il plonge\ndans du magma."
        it:
          ruby: "Il corpo di REGICE è stato creato\ndurante l’era glaciale. Il corpo\ncongelato non può essere fuso\fneanche col fuoco. Questo POKéMON\nriesce a gestire perfettamente l’aria\ngelida a meno 200 gradi C."
          sapphire: "REGICE si avvolge in un manto d’aria\nalla temperatura di meno 200 gradi C.\nOgni cosa che si avvicina a questo\fPOKéMON si congela all’istante.\nIl suo corpo gelido non si fonde\nnemmeno se immerso nel magma."
        de:
          ruby: "REGICEs tiefgefrorener Körper\nentstand während der Eiszeit. Es kann\nnicht einmal durch Feuer geschmolzen\fwerden. Dieses POKéMON kontrolliert\neisige Luft von minus 200 Grad."
          sapphire: "REGICE umhüllt sich selbst mit kalter\nLuft von 200 Grad minus. Alles\nund jeder, der sich diesem POKéMON\fnähert, friert sofort ein. Sein eisiger\nKörper ist so kalt, dass nicht einmal\nMagma es schmelzen könnte."
        es:
          ruby: "REGICE surgió durante la edad de hielo.\nEl cuerpo de este POKéMON está\ntotalmente congelado, ni siquiera\fel fuego puede derretirlo.\nREGICE libera y regula un aire gélido\nde - 200 grados centígrados."
          sapphire: "REGICE se rodea de un aire gélido que\nllega a - 200 grados centígrados y deja\ncongelado a todo lo que se le acerca.\fEs imposible derretir a este POKéMON;\ntiene una temperatura demasiado baja."
registeel:
  species_id: 379
  names:
    jp_kana: レジスチル
