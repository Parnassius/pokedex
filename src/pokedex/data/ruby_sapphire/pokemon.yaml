          ruby: "SIMULARBRE se camoufle en arbre\npour éviter d’être attaqué par ses\nennemis. Mais étant donné que ses\fpattes restent vertes toute\nl’année, ce POKéMON est facile à\nrepérer pendant l’hiver."
          sapphire: "SIMULARBRE se camoufle en arbre\npour éviter d’être attaqué par ses\nennemis. Mais étant donné que ses\fpattes restent vertes toute\nl’année, ce POKéMON est facile à\nrepérer pendant l’hiver."
        it:
          ruby: "SUDOWOODO si camuffa da albero\nper evitare gli attacchi nemici.\nTuttavia, poiché le zampe anteriori\fsono sempreverdi, d’inverno\nil POKéMON viene spesso\nscambiato per una pianta artificiale."
          sapphire: "SUDOWOODO si camuffa da albero\nper evitare gli attacchi nemici.\nTuttavia, poiché le zampe anteriori\fsono sempreverdi, d’inverno\nil POKéMON viene spesso\nscambiato per una pianta artificiale."
        de:
          ruby: "MOGELBAUM tarnt sich als Baum, um\nAngriffen von Feinden aus dem Weg\nzu gehen. Da seine Vorderbeine aber\fdas ganze Jahr über grün bleiben, fällt\nseine Tarnung im Winter leicht auf."
          sapphire: "MOGELBAUM tarnt sich als Baum, um\nAngriffen von Feinden aus dem Weg\nzu gehen. Da seine Vorderbeine aber\fdas ganze Jahr über grün bleiben, fällt\nseine Tarnung im Winter leicht auf."
        es:
          ruby: "SUDOWOODO se camufla adoptando\nla imagen de un árbol para que no\nle ataque ningún enemigo. El problema\fviene en invierno; ya que las patas se le\nven verdes y es fácil identificarle."
          sapphire: "SUDOWOODO se camufla adoptando\nla imagen de un árbol para que no\nle ataque ningún enemigo. El problema\fviene en invierno; ya que las patas se le\nven verdes y es fácil identificarle."
