        fr:
          ruby: "On dit que dans les pays où le ciel est\ndégagé et où les étoiles illuminent les\ncieux, vivent d’innombrables quantités\fde COXYCLAQUE. La raison en est simple:\nl’énergie de ce POKéMON provient de\nla lumière des étoiles."
          sapphire: "On dit que dans les pays où le ciel est\ndégagé et où les étoiles illuminent les\ncieux, vivent d’innombrables quantités\fde COXYCLAQUE. La raison en est simple :\nl’énergie de ce POKéMON provient de\nla lumière des étoiles."
        it:
          ruby: "Si dice che in luoghi dall’aria pura e dal\ncielo terso e stellato vivano moltissimi\nLEDIAN.\fCiò è dovuto alla sua abitudine\ndi usare la luce delle stelle\ncome fonte energetica."
          sapphire: "Si dice che in luoghi dall’aria pura e dal\ncielo terso e stellato vivano moltissimi\nLEDIAN.\fCiò è dovuto alla sua abitudine\ndi usare la luce delle stelle\ncome fonte energetica."
        de:
          ruby: "In Ländern mit frischer Luft und\nSternen am Himmel leben unzählig viele\nLEDIAN.\fDafür gibt es einen guten Grund:\nDieses POKéMON nutzt das Licht der\nSterne als Energie."
          sapphire: "In Ländern mit frischer Luft und\nSternen am Himmel leben unzählig viele\nLEDIAN.\fDafür gibt es einen guten Grund:\nDieses POKéMON nutzt das Licht der\nSterne als Energie."
        es:
          ruby: "Dicen que en zonas en las que el aire\nestá limpio, en las que se ven las\nestrellas, hay enormes poblaciones\fde LEDIAN. La razón es muy sencilla:\neste POKéMON usa la luz de las\nestrellas como fuente de energía."
          sapphire: "Dicen que en zonas en las que el aire\nestá limpio, en las que se ven las\nestrellas, hay enormes poblaciones\fde LEDIAN. La razón es muy sencilla:\neste POKéMON usa la luz de las\nestrellas como fuente de energía."
