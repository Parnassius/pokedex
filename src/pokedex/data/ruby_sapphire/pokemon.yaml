      descriptions:
        jp_kana:
          ruby: "うでか　あしの　どちらかだけで　はばたいている\nときは　ながい　きょりを　とんでいる　しょうこ。\nつかれると　はばたく　ハネを　かえるのだ。"
          sapphire: "みみを　すまさないと　きこえないほど　ちいさな\nはおとで　ねらった　えものに　しのびよるぞ。\nうしろあしの　ハネで　えだに　つかまり　やすむ。"
        en:
          ruby: "If this POKéMON is flying by fluttering\nonly a pair of wings on either the\nforelegs or hind legs, it’s proof that\fCROBAT has been flying a long distance.\nIt switches the wings it uses if it is\ntired."
          sapphire: "CROBAT sneaks up on its intended prey\nusing wings that barely make a sound.\nThis POKéMON rests by hanging on a\ftree branch with its rear legs that\nserve as wings."
        fr:
          ruby: "Lorsque NOSTENFER vole depuis\nlongtemps, il utilise les ailes de ses\npattes avant ou arrière en alternance.\fIl peut aisément changer de paire \nd’ailes lorsqu’il est fatigué."
          sapphire: "NOSTENFER s’approche discrètement de\nsa proie grâce à ses ailes silencieuses.\nCe POKéMON se repose en s’accrochant\fà une branche avec ses pattes arrière,\nqui peuvent aussi lui servir d’ailes."
        it:
          ruby: "Quando CROBAT vola agitando soltanto\nun paio d’ali, quelle anteriori o quelle\nposteriori, significa che ha affrontato\fun volo molto lungo. Infatti, se è stanco\ncambia le ali che sta usando."
          sapphire: "CROBAT si avvicina furtivo alla preda\ncon le sue ali silenziosissime.\nQuesto POKéMON si riposa aggrappato\fai rami degli alberi con le zampe\nposteriori, che servono anche da ali."
        de:
          ruby: "Wenn IKSBAT fliegt, indem es nur ein \nPaar Flügel, entweder an seinen Vorder-\noder Hinterbeinen bewegt, ist dies ein\fAnzeichen dafür, dass dieses POKéMON \nbereits eine lange Strecke hinter sich\nhat. Dann wechselt es die Flügel häufig."
          sapphire: "IKSBATs Flügelschlag ist so leise, dass\ndie Beute lautlos überrascht wird.\nDieses POKéMON ruht sich\faus, indem es sich mit seinen\nHinterbeinen, die ihm als Flügel\ndienen, an einen Ast hängt."
        es:
          ruby: "Cuando este POKéMON vuela\nbatiendo sólo las alas de las patas\ndelanteras o de las traseras es porque\flleva volando bastante tiempo.\nCuando se cansa, CROBAT alterna\nlas alas."
          sapphire: "CROBAT se acerca hasta su posible\npresa usando las alas casi sin hacer\nruido.\fLa forma de descansar que tiene es\ncolgarse de la rama de un árbol por las\npatas traseras, que también son alas."
