      descriptions:
        jp_kana:
          ruby: "はねる　ことしか　しない　なさけない　ポケモン。\nなぜ　はねるのか　しらべた　けんきゅうしゃが\nいるほど　とにかく　はねて　はねて　はねまくる。"
          sapphire: "はねている　だけで　まんぞくに　たたかえないため\nよわいと　おもわれているが　どんなに　よごれた\nみずでも　くらせる　しぶとい　ポケモンなのだ。"
        en:
          ruby: "MAGIKARP is a pathetic excuse for a\nPOKéMON that is only capable of\nflopping and splashing.\fThis behavior prompted scientists to\nundertake research into it."
          sapphire: "MAGIKARP is virtually useless in battle\nas it can only splash around.\nAs a result, it is considered to be weak.\fHowever, it is actually a very hardy\nPOKéMON that can survive in any body of\nwater no matter how polluted it is."
        fr:
          ruby: "MAGICARPE est un POKéMON ridicule qui\nne sait faire que des ronds dans l’eau\nou se laisser porter par les courants.\fSon comportement a donné envie\naux savants d’étudier son cas."
          sapphire: "MAGICARPE est virtuellement inutile\nen combat. Il se contente de faire des\nronds dans l’eau. On le considère plutôt\ffaible. Pourtant, ce POKéMON est très\nrobuste et peut survivre dans n’importe\nquel environnement, même très pollué."
        it:
          ruby: "MAGIKARP è un patetico esempio di\nPOKéMON capace soltanto di dimenarsi\ne sguazzare.\fLa natura di questo comportamento\ninutile è oggetto di studi da parte\ndel mondo scientifico."
          sapphire: "Nella lotta MAGIKARP è\ninutile, poiché può solo sguazzare.\nInfatti è considerato debole.\fIn realtà si tratta di un POKéMON\nmolto robusto che sopravvive in tutte\nle acque, anche le più inquinate."
        de:
          ruby: "KARPADOR ist ein armseliges POKéMON,\ndas nur platschen kann. Sein\nmerkwürdiges Verhalten hat so manchen\fWissenschaftler zum Forschen\nangeregt."
          sapphire: "KARPADOR ist im Kampf praktisch nutz-\nlos, da es nur platschen kann.\nDaher wird es als schwach eingeschätzt.\fEs ist aber tatsächlich sehr robust und\nkann in jedem Gewässer überleben, egal,\nwie verseucht dieses ist."
        es:
          ruby: "MAGIKARP es el triste ejemplo de un\nPOKéMON capaz únicamente de saltar\ny salpicar.\fEsta conducta llevó a científicos\na estudiarlo en profundidad."
          sapphire: "MAGIKARP es prácticamente inútil\nen combate; sólo sirve para salpicar,\ny se le considera muy débil.\fCon todo, en realidad es un POKéMON muy\npráctico. Sobrevive en cualquier medio\nacuático, aunque esté contaminado."
