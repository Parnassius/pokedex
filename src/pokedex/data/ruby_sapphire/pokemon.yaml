        - dark
      egg_groups:
        - grass
        - human_like
      abilities:
        - sand_veil
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ruby: "さばくの　ひざしで　すいぶんを　うしなわない\nように　ひるまは　じっと　たちつくしている。\nきおんの　さがる　よるに　かつどうを　はじめる。"
          sapphire: "まよなか　さばくを　あるく　たびびとの　うしろを\nぞろぞろと　しゅうだんで　くっついて　あるく。\nつかれて　うごけなく　なるのを　まっているのだ。"
        en:
          ruby: "During the daytime, CACTURNE remains\nunmoving so that it does not lose any\nmoisture to the harsh desert sun.\fThis POKéMON becomes active at night\nwhen the temperature drops."
          sapphire: "If a traveler is going through a desert\nin the thick of night, CACTURNE\nwill follow in a ragtag group.\fThe POKéMON are biding their time,\nwaiting for the traveler to tire and\nbecome incapable of moving."
        fr:
          ruby: "Pendant la journée, CACTURNE reste\nimmobile pour éviter de se\ndéshydrater sous le soleil du désert.\fCe POKéMON ne commence son activité\nqu’une fois la nuit tombée, sous une\ntempérature plus fraîche."
          sapphire: "Lorsqu’un voyageur traverse le désert\nau milieu de la nuit, les CACTURNE le \nsuivent en groupe.\fCes POKéMON attendent le bon moment,\nquand le voyageur est fatigué et qu’il\nn’est plus capable de bouger."
        it:
          ruby: "Di giorno CACTURNE rimane immobile in\nmodo da non perdere neanche una goccia\nd’acqua al sole cocente del deserto.\fIl POKéMON si desta di notte\nquando cala la temperatura."
          sapphire: "Se un viaggiatore passa attraverso\nil deserto nella notte tenebrosa, un\ngruppo scomposto di CACTURNE lo segue.\fPoi attende pazientemente che il\nmalcapitato sia esausto e incapace\ndi muoversi."
        de:
          ruby: "Am Tage bleibt NOKTUSKA reglos, damit es\nin der brennenden Wüstenhitze keine\nFeuchtigkeit verliert.\fDieses POKéMON wird bei Nacht aktiv,\nwenn die Temperatur sinkt."
          sapphire: "Wenn ein Reisender mitten in der Nacht\ndurch eine Wüste wandert, folgt \nNOKTUSKA ihm und spielt ihm Streiche.\fDann wartet dieses POKéMON darauf,\ndass der Reisende müde wird und sich\nnicht mehr bewegen kann."
        es:
          ruby: "Durante el día, CACTURNE permanece\ninmóvil para no perder nada de humedad\nbajo el sol de justicia del desierto.\fEste POKéMON entra en acción por la\nnoche, cuando bajan las temperaturas."
          sapphire: "Si te adentras en un desierto por la\nnoche, CACTURNE te seguirá junto\ncon varios de los suyos.\fEste POKéMON espera pacientemente\na que el viajero se canse y no pueda\ncontinuar más, vencido por el cansancio."
swablu:
  species_id: 333
  names:
    jp_kana: チルット
    en: SWABLU
    fr: TYLTON
    it: SWABLU
    de: WABLU
    es: SWABLU
  forms:
    swablu:
      form_id: 0
      base_stats:
        hp: 45
        attack: 40
        defense: 60
        special_attack: 40
        special_defense: 75
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
        - dragon
      abilities:
        - natural_cure
      descriptions:
        jp_kana:
          ruby: "わたぐもの　ような　ふさふさの　つばさを　もつ。\nひとを　こわがらず　わたの　ぼうし　みたいに\nあたまに　ちょこんと　のっかる　ポケモンだ。"
          sapphire: "よごれたものを　みると　わたの　ような　つばさで\nせっせと　ふきとる　きれいずきな　ポケモンだ。\nつばさが　よごれると　かわで　みずあびを　する。"
        en:
          ruby: "SWABLU has light and fluffy wings that\nare like cottony clouds. This POKéMON\nis not frightened of people.\fIt lands on the heads of people and\nsits there like a cotton-fluff hat."
          sapphire: "SWABLU loves to make things clean.\nIf it spots something dirty, it will wipe\nand polish it with its cottony wings.\fIf its wings become dirty, this POKéMON\nfinds a stream and showers itself."
        fr:
          ruby: "TYLTON est doté d’ailes légères et\nduveteuses comme des nuages\ncotonneux. Ce POKéMON n’est pas\ftrès sauvage. Il lui arrive d’atterrir\nsur la tête des gens et d’y rester,\ncomme un chapeau ouaté."
          sapphire: "TYLTON adore nettoyer. S’il\nrepère quelque chose de sale, il l’essuie\net le polit avec ses ailes cotonneuses.\fLorsque ses ailes se salissent, ce\nPOKéMON trouve un cours d’eau\net se lave."
        it:
          ruby: "SWABLU ha ali leggere e soffici molto\nsimili a nuvole di cotone. Ha un\naspetto mansueto e rassicurante.\fSi posa sulla testa delle persone\ncome fosse un copricapo cotonato."
          sapphire: "SWABLU ama la pulizia. Se vede\nqualcosa di sporco, inizia a pulire\nmeticolosamente con le sue ali\fdi cotone. Se poi le ali si sporcano,\nil POKéMON cerca un corso d’acqua\nper lavarsi."
        de:
          ruby: "WABLU hat leichte, flauschige Flügel,\ndie wie Schäfchenwolken aussehen.\nDieses POKéMON hat keine Angst vor\fMenschen. Es landet auf ihren Köpfen \nund bleibt dort sitzen wie ein \nwattierter Hut."
          sapphire: "WABLU liebt es, Dinge zu putzen. Wenn\nes etwas Schmutziges bemerkt, fängt\nes an, dieses mit seinen weichen\fFlügeln zu putzen. Wenn seine Flügel\ndreckig werden, sucht sich dieses\nPOKéMON einen Fluss und duscht sich ab."
        es:
          ruby: "SWABLU tiene unas alas ligeras\ny esponjosas que parecen nubes de\nalgodón. A este POKéMON no le asusta\fla gente.\nDe hecho, se te puede posar en la\ncabeza y servirte de gorro sedoso."
          sapphire: "A SWABLU le encanta limpiarlo todo.\nSi ve algo sucio, lo dejará como nuevo\ny reluciente con las alas de algodón\fque tiene. Cuando se le ensucian,\nbusca un manantial y las limpia."
