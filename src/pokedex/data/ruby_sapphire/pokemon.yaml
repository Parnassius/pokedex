      descriptions:
        jp_kana:
          ruby: "２ひきの　ダンバルが　がったいした　すがた。\n２つの　のうを　じりょくの　しんけいが　むすぶ\nことで　つよい　サイコエネルギーを　うみだす。"
          sapphire: "２ひきの　ダンバルが　がったいしたとき　２つの\nのうが　じりょくの　しんけいで　むすばれる。\nうでを　うしろへ　まわし　こうそくで　いどう。"
        en:
          ruby: "When two BELDUM fuse together, METANG\nis formed. The brains of the BELDUM are\njoined by a magnetic nervous system.\fBy linking its brains magnetically,\nthis POKéMON generates strong\npsychokinetic power."
          sapphire: "When two BELDUM fuse together, METANG\nis formed. The brains of the BELDUM are\njoined by a magnetic nervous system.\fThis POKéMON turns its arms to the rear\nfor traveling at high speed."
        fr:
          ruby: "Lorsque deux TERHAL fusionnent, un\nMETANG apparaît. Les cerveaux des\nTERHAL sont reliés par un système\fnerveux magnétique, ce qui permet à ce\nPOKéMON de générer un puissant pouvoir\ntélékinésique."
          sapphire: "Lorsque deux TERHAL fusionnent,\nun METANG se forme. Les cerveaux\ndes TERHAL sont reliés par un\fsystème nerveux magnétique. Ce\nPOKéMON dirige ses bras vers\nl’arrière pour voyager à grande vitesse."
        it:
          ruby: "Fondendo insieme due BELDUM, si crea\nMETANG. I cervelli dei BELDUM sono\nuniti da un sistema nervoso magnetico.\fQuesto particolare sistema di unione\ngenera forti poteri psicocinetici."
          sapphire: "Fondendosi, due BELDUM formano\nMETANG. I cervelli dei BELDUM sono\nuniti da un sistema nervoso magnetico.\fQuesto POKéMON ruota le zampe\nall’indietro per muoversi ad elevata\nvelocità."
        de:
          ruby: "Wenn zwei TANHEL miteinander\nverschmelzen, entsteht daraus METANG.\nDie Gehirne der TANHEL werden mit\feinem magnetischen Nervensystem\nverbunden. Dadurch erzeugt es starke\npsychokinetische Energie."
          sapphire: "Wenn zwei TANHEL miteinander\nverschmelzen, entsteht daraus METANG.\nDie Gehirne der TANHEL werden mit\feinem magnetischen Nervensystem ver-\nbunden. Es schlägt seine Arme nach hin-\nten, um sich schnell bewegen zu können."
        es:
          ruby: "Cuando dos BELDUM se fusionan, forman\nun METANG. Los cerebros de los BELDUM\nse unen mediante un sistema nervioso\fmagnético y generan potente energía\npsicoquinética."
          sapphire: "Cuando se funden dos BELDUM, uniendo\nlos cerebros por un sistema nervioso\nmagnético, se forma un METANG.\fPara desplazarse a mayor velocidad,\neste POKéMON echa los brazos hacia\natrás."
