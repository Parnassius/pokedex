        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - pressure
      descriptions:
        jp_kana:
          ruby: "アブソルが　ひとまえに　あらわれると　かならず\nじしんや　つなみなどの　さいがいが　おこったので\nわざわいポケモン　という　べつめいで　よばれた。"
          sapphire: "しぜんさいがいを　キャッチする　ちからを　もつ。\nけわしい　さんがくちたいに　せいそくし\nめったに　やまの　ふもとには　おりてこない。"
        en:
          ruby: "Every time ABSOL appears before people,\nit is followed by a disaster such as an\nearthquake or a tidal wave.\fAs a result, it came to be known as the\ndisaster POKéMON."
          sapphire: "ABSOL has the ability to foretell the\ncoming of natural disasters.\nIt lives in a harsh, rugged mountain\fenvironment. This POKéMON very rarely\nventures down from the mountains."
        fr:
          ruby: "Chaque fois qu’ABSOL apparaît\ndevant des gens, une catastrophe\ncomme un tremblement de terre ou un raz\fde marée survient peu de temps après.\nIl est devenu tristement célèbre sous\nl’appellation de POKéMON désastreux."
          sapphire: "ABSOL a le pouvoir de prédire les\ncatastrophes naturelles. Il vit dans un\nmilieu montagneux aride et accidenté.\fCe POKéMON s’éloigne très rarement\ndes montagnes."
        it:
          ruby: "Ogni volta che compare ABSOL,\nsegue un disastro come un\nterremoto o un maremoto.\fPer questo motivo è noto come\nil POKéMON dei disastri."
          sapphire: "ABSOL ha l’abilità di predire le\ncatastrofi naturali. Vive negli ambienti\nmontani più aspri e inospitali.\fSoltanto raramente si allontana dalle\nmontagne per avventurarsi a valle."
        de:
          ruby: "Jedes Mal, wenn ABSOL sich den Menschen\nzeigt, endet dies in einer Katastrophe\nwie Erdbeben oder Sturmflut.\fDeswegen ist es auch als das\nKatastrophen-POKéMON bekannt."
          sapphire: "ABSOL kann bevorstehende Natur-\nkatastrophen voraussagen. Es lebt auf\neinem kargen, zerklüfteten Berg.\fDieses POKéMON wagt sich nur sehr\nselten ins Tal herunter."
        es:
          ruby: "Cada vez que ABSOL aparece ante\nla gente, ocurre una catástrofe natural\ncomo un terremoto o un maremoto.\fPor esta razón se le conoce como\nel POKéMON de las catástrofes."
          sapphire: "ABSOL tiene la habilidad de predecir\nlas catástrofes naturales.\nEste POKéMON vive en hábitats\fmontañosos, hostiles y accidentados\nde los que rara vez se aleja."
wynaut:
  species_id: 360
  names:
    jp_kana: ソーナノ
    en: WYNAUT
    fr: OKEOKE
    it: WYNAUT
    de: ISSO
    es: WYNAUT
  forms:
    wynaut:
      form_id: 0
      base_stats:
        hp: 95
        attack: 23
        defense: 48
        special_attack: 23
        special_defense: 48
        speed: 23
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          ruby: "いつも　ニコニコ　えがおの　ソーナノ。\nおこっているときは　しっぽに　ちゅうもく。\nじめんを　パタパタ　たたいているぞ。"
          sapphire: "つきのよる　なかまたちと　おしくらまんじゅう。\nぎゅうぎゅう　おされて　がまんづよくなる。\nきょうれつな　カウンターを　くりだす　くんれん。"
        en:
          ruby: "WYNAUT can always be seen with a big,\nhappy smile on its face. Look at its tail\nto determine if it is angry.\fWhen angered, this POKéMON will be\nslapping the ground with its tail."
          sapphire: "WYNAUT gather on moonlit nights to play\nby squeezing up against each other.\nBy being squeezed, this POKéMON gains\fendurance and is trained to dole out\npowerful counterattacks."
        fr:
          ruby: "OKEOKE a toujours un grand sourire\nqui illumine son visage. On peut savoir\ns’il est en colère en regardant sa queue.\fLorsqu’il est furieux, sa queue\nremue en frappant le sol."
          sapphire: "Les OKEOKE se rassemblent quand la\nnuit est claire pour jouer à se presser\nles uns contre les autres. En se\fpoussant, ce POKéMON améliore son\nendurance et s’entraîne à renvoyer\nde puissantes contre-attaques."
        it:
          ruby: "WYNAUT ha sempre un sorriso grande e\ngenuino stampato sul volto. La coda\nè indice del suo vero stato d’animo.\fSe la sbatte violentemente a terra,\nsignifica che è infuriato."
          sapphire: "Gli WYNAUT si riuniscono di notte al\nchiaro di luna per giocare stringendosi\nfra loro. In tal modo il POKéMON\facquisisce resistenza e sferra\npotenti contrattacchi."
        de:
          ruby: "ISSO hat immer ein breites, fröhliches\nLächeln auf seinem Gesicht. Um \nfestzustellen, ob es wütend ist, muss\fman seinen Schweif betrachten. Wenn es\nwütend ist, schlägt es damit auf den\nBoden."
          sapphire: "ISSO sammeln sich in Mondnächten,\num sich gegenseitig zu quetschen.\nDadurch gewinnt dieses POKéMON an\fAusdauer und kann wirkungsvolle \nGegenangriffe trainieren."
        es:
          ruby: "WYNAUT está siempre con una gran\nsonrisa puesta. Para ver si está\nenfadado, basta con mirarle la cola.\fCuando se le molesta, se pone a dar\ngolpetazos en el suelo."
          sapphire: "Los WYNAUT se agrupan cuando hay luna\npara jugar achuchándose unos a otros.\nCuanto más se achuchan, más\fganan en resistencia y lanzan fuertes\ncontraataques con más facilidad."
snorunt:
  species_id: 361
  names:
    jp_kana: ユキワラシ
    en: SNORUNT
    fr: STALGAMIN
    it: SNORUNT
    de: SCHNEPPKE
    es: SNORUNT
  forms:
    snorunt:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 50
        special_attack: 50
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - inner_focus
      descriptions:
        jp_kana:
          ruby: "ゆきの　おおい　とちで　くらす　ポケモン。\nはるや　なつの　ゆきの　ふらない　きせつには\nしょうにゅうどうの　おくで　しずかに　くらす。"
          sapphire: "ゆきや　こおりだけを　たべて　くらしている。\nユキワラシの　おとずれた　いえは　だいだい\nさかえるという　いいつたえが　のこっている。"
        en:
          ruby: "SNORUNT live in regions with heavy\nsnowfall. In seasons without snow, such\nas spring and summer, this POKéMON\fsteals away to live quietly among\nstalactites and stalagmites deep in\ncaverns."
          sapphire: "SNORUNT survives by eating only snow\nand ice.\nOld folklore claims that a house visited\fby this POKéMON is sure to prosper for\nmany generations to come."
        fr:
          ruby: "Les STALGAMIN vivent dans les régions\nenneigées. Pendant les saisons sans\nneige, comme le printemps et l’été, ces\fPOKéMON se retirent pour vivre dans les\ncavernes, au milieu des stalactites et\ndes stalagmites."
          sapphire: "STALGAMIN survit en se nourrissant\nuniquement de neige et d’eau. De vieilles\nlégendes racontent que les maisons\fvisitées par ce POKéMON sont assurées\nd’être prospères pendant plusieurs\ngénérations."
        it:
          ruby: "SNORUNT vive in regioni molto nevose.\nNelle stagioni più calde, come l’estate\ne la primavera, questo POKéMON\fsi ritira a vivere in tranquillità nel\ncuore delle caverne tra stalattiti\ne stalagmiti."
          sapphire: "SNORUNT si nutre soltanto\ndi neve e ghiaccio. Gli antichi\ndetti popolari affermano che\fquesto POKéMON porta fortuna e\nprosperità per molte generazioni\nalle case che visita."
        de:
          ruby: "SCHNEPPKE lebt in Gebieten mit heftigem\nSchneefall. In Jahreszeiten, in denen es\nnicht schneit, wie im Frühling oder im\fSommer, nimmt das POKéMON Reißaus, um\nin einer Höhle ein ruhiges Leben unter\nStalaktiten und Stalagmiten zu führen."
          sapphire: "SCHNEPPKE kann überleben, indem es nur\nSchnee und Eis zu sich nimmt. Alte\nÜberlieferungen besagen, dass ein Haus,\fwelches von diesem POKéMON besucht\nwird, vielen kommenden Generationen\nGlück und Erfolg beschert."
        es:
          ruby: "SNORUNT vive en zonas de grandes\nnevadas. En primavera y verano (cuando\nno nieva), se retira a las cavernas para\fvivir tranquilamente entre estalactitas\ny estalagmitas."
          sapphire: "SNORUNT sobrevive alimentándose sólo\nde nieve y hielo. Se dice que la casa por\nla que pase este POKéMON estará llena\fde prosperidad durante generaciones."
glalie:
  species_id: 362
  names:
    jp_kana: オニゴーリ
    en: GLALIE
    fr: ONIGLALI
    it: GLALIE
    de: FIRNONTOR
    es: GLALIE
  forms:
    glalie:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 80
        special_attack: 80
        special_defense: 80
        speed: 80
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - inner_focus
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          ruby: "いわの　からだを　こおりの　よろいで　かためた。\nくうきちゅうの　すいぶんを　こおらせて　じゆうな\nかたちに　かえる　のうりょくを　もつ　ポケモン。"
          sapphire: "こおりを　じざいに　あつかう　ちからを　もつ。\nえものを　いっしゅんで　こおらせて　うごけなく\nなった　ところを　おいしく　いただくのだ。"
        en:
          ruby: "GLALIE has a body made of rock, which it\nhardens with an armor of ice.\nThis POKéMON has the ability to freeze\fmoisture in the atmosphere into any\nshape it desires."
          sapphire: "GLALIE has the ability to freely\ncontrol ice. For example, it can\ninstantly freeze its foe solid.\fAfter immobilizing its foe in ice, this\nPOKéMON enjoys eating it in leisurely\nfashion."
        fr:
          ruby: "Le corps de ONIGLALI est fait de\nrochers qu’il endurcit grâce à une\ncouche de glace. Ce POKéMON a le\fpouvoir de geler l’humidité ambiante et\nde lui donner n’importe quelle forme."
          sapphire: "ONIGLALI a le pouvoir de contrôler la\nglace à volonté. Par exemple, il peut\ngeler son ennemi sur place.\fUne fois l’ennemi immobilisé, ce\nPOKéMON le mange sans se presser."
        it:
          ruby: "Il corpo di GLALIE è fatto di pietra\nrivestita da un’armatura di ghiaccio.\nQuesto POKéMON ha la capacità\fdi congelare l’umidità nell’atmosfera\ne darle le forme più svariate."
          sapphire: "GLALIE ha la capacità di sfruttare il\nghiaccio a suo vantaggio. Ad esempio\nriesce a congelare il nemico all’istante.\fDopo averlo immobilizzato nel\nghiaccio, se lo mangia con gusto\ne in tutta calma."
        de:
          ruby: "FIRNONTOR hat einen Körper aus Stein,\nden es mit einem Panzer aus Eis noch\nverstärkt. Dieses POKéMON kann\fdie Luftfeuchtigkeit der Atmosphäre\neinfrieren und in jegliche Form\nverwandeln."
          sapphire: "FIRNONTOR hat die Fähigkeit, Eis zu\nkontrollieren. Es kann beispielsweise\neinen Gegner augenblicklich einfrieren.\fNachdem es einen Gegner im Eis\nbewegungsunfähig gemacht hat,\nverspeist es ihn genüsslich."
        es:
          ruby: "GLALIE endurece el cuerpo rocoso que\ntiene con una coraza de hielo. Este\nPOKéMON tiene la habilidad de congelar\fla humedad del ambiente y formar\nla figura que se le antoje."
          sapphire: "GLALIE tiene la habilidad de controlar\nel hielo con total libertad. Por ejemplo,\npuede dejar a su rival totalmente\fcongelado en un instante. Y, una vez\nhelado, lo devora lentamente."
spheal:
  species_id: 363
  names:
    jp_kana: タマザラシ
    en: SPHEAL
    fr: OBALIE
    it: SPHEAL
    de: SEEMOPS
    es: SPHEAL
  forms:
    spheal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 40
        defense: 50
        special_attack: 55
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - thick_fat
      descriptions:
        jp_kana:
          ruby: "あるくより　ころがる　ほうが　だんぜん　はやい。\nしょくじの　じかんは　みんなが　いっせいに　てを\nたたいて　よろこぶので　けっこう　うるさいのだ。"
          sapphire: "いつも　ころがって　いどうする　ポケモンだ。\nりゅうひょうの　きせつに　こおりの　うえを\nころがり　うみを　わたる　すがたを　みかける。"
        en:
          ruby: "SPHEAL is much faster rolling than \nwalking to get around. When groups of\nthis POKéMON eat, they all clap at once\fto show their pleasure. Because of this,\ntheir mealtimes are noisy."
          sapphire: "SPHEAL always travels by rolling\naround on its ball-like body. When the\nseason for ice floes arrives, this\fPOKéMON can be seen rolling about on\nice and crossing the sea."
        fr:
          ruby: "OBALIE est bien plus rapide quand\nil roule que quand il marche. Lorsque des\ngroupes de ce POKéMON mangent,\fils applaudissent tous en même temps\npour montrer qu’ils sont contents.\nLeurs repas sont très bruyants."
          sapphire: "OBALIE voyage toujours en faisant\nrouler son corps tout rond. Lorsque la\nsaison des neiges arrive, on peut voir\fce POKéMON rouler sur la glace et\ntraverser la mer."
        it:
          ruby: "SPHEAL si muove molto più velocemente\nrotolando che non camminando.\nQuando si raggruppano per\fpranzo, questi POKéMON sbattono\nle zampette per dimostrare la loro gioia.\nI loro pasti sono molto rumorosi."
          sapphire: "SPHEAL si muove sempre rotolando\nsul corpo a pallone. Nella stagione\ndel disgelo lo si vede rotolare da\funa lastra di ghiaccio all’altra per\nattraversare il mare."
        de:
          ruby: "SEEMOPS kann schneller rollen als laufen.\nWenn Gruppen dieses POKéMON \nzusammen essen, klatschen sie\fgleichzeitig, um ihre Freude zu zeigen.\nDeswegen sind ihre Mahlzeiten sehr\nlaut."
          sapphire: "SEEMOPS bewegt sich fort, indem es\nseinen ballartigen Körper herumrollt.\nWenn Eisschollen auftauchen, kann man\fdieses POKéMON dabei beobachten, wie\nes über das Eis rollt und das Meer\nüberquert."
        es:
          ruby: "SPHEAL se desplaza por el suelo más\nrápido rodando que caminando.\nCuando come con otros de su especie,\ftodos se ponen a aplaudir para expresar\nsu alegría. Por eso, a veces son algo\nescandalosos."
          sapphire: "SPHEAL se desplaza siempre rodando\ngracias al cuerpo esférico que tiene.\nAl comenzar la época glacial,\fes fácil verle rodando por\nsuperficies heladas y atravesando\nel mar."
sealeo:
  species_id: 364
  names:
    jp_kana: トドグラー
    en: SEALEO
    fr: PHOGLEUR
    it: SEALEO
    de: SEEJONG
    es: SEALEO
  forms:
    sealeo:
      form_id: 0
      base_stats:
        hp: 90
        attack: 60
        defense: 70
        special_attack: 75
        special_defense: 70
        speed: 45
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - thick_fat
      descriptions:
        jp_kana:
          ruby: "はじめて　めにした　ものは　かならず　はなで\nクルクル　まわしてみる　しゅうせいを　もつ。\nタマザラシを　まわして　あそぶ　ことが　ある。"
          sapphire: "しょっちゅう　はなで　なにかを　まわしている。\nまわしながら　においや　かんしょくを　たしかめて\nすきな　ものと　きらいな　ものを　わけるのだ。"
        en:
          ruby: "SEALEO has the habit of always juggling\non the tip of its nose anything it sees\nfor the first time.\fThis POKéMON occasionally entertains\nitself by balancing and rolling a SPHEAL\non its nose."
          sapphire: "SEALEO often balances and rolls\nthings on the tip of its nose. While the\nPOKéMON is rolling something, it checks\fthe object’s aroma and texture to\ndetermine whether it likes the object\nor not."
        fr:
          ruby: "PHOGLEUR a pris l’habitude de jongler\navec tout ce qu’il découvre pour la\npremière fois. Ce POKéMON se divertit\fparfois en faisant tourner un\nOBALIE sur le bout de son museau."
          sapphire: "PHOGLEUR tient souvent quelque\nchose en équilibre sur son museau et\nle fait rouler. Pendant ce temps,\fce POKéMON peut sentir l’odeur et la\ntexture de l’objet pour savoir s’il lui\nplaît ou pas."
        it:
          ruby: "SEALEO è solito giocare con qualsiasi\ncosa veda per la prima volta, tenendola\nin equilibrio sulla punta del naso.\fTalvolta, si diverte a far rotolare\nsul proprio naso anche SPHEAL."
          sapphire: "SEALEO gioca spesso tenendo in\nequilibrio oggetti sulla punta del naso\ne facendoli rotolare. Riesce così\fanche ad annusarli e provarne la\nconsistenza per capire se sono di\nsuo gradimento o meno."
        de:
          ruby: "SEEJONG hat die Angewohnheit, alles,\nwas es zum ersten Mal sieht, auf seiner \nNasenspitze zu jonglieren. Dieses\fPOKéMON hält sich bei Laune, indem es\nmanchmal ein SEEMOPS auf seiner Nase\nbalanciert und hin- und herrollt."
          sapphire: "SEEJONG balanciert häufig Dinge auf\nseiner Nasenspitze und rollt sie hin und\nher. Während es das tut, überprüft es\fden Duft und die Beschaffenheit des\nGegenstandes und stellt fest, ob es das\nObjekt mag oder nicht."
        es:
          ruby: "Cada vez que SEALEO ve algo nuevo,\nse lo pone en el morro y empieza\na darle vueltas.\fA veces, para entretenerse,\nhace lo mismo con un SPHEAL."
          sapphire: "SEALEO suele balancear y hacer rodar\ncosas en la punta del morro. Al mismo\ntiempo, aprovecha para olerlas\fy detectar la textura que tienen\npara ver si le gustan o no."
walrein:
  species_id: 365
  names:
    jp_kana: トドゼルガ
    en: WALREIN
    fr: KAIMORSE
    it: WALREIN
    de: WALRAISA
    es: WALREIN
  forms:
    walrein:
      form_id: 0
      base_stats:
        hp: 110
        attack: 80
        defense: 90
        special_attack: 95
        special_defense: 90
        speed: 65
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - thick_fat
      descriptions:
        jp_kana:
          ruby: "はったつした　２ほんの　キバは　１０トンも　ある\nひょうざんを　いちげきで　ふんさいする。\nしぼうが　ぶあつく　ひょうてんかでも　へいき。"
          sapphire: "おおきな　キバで　ひょうざんを　くだきながら\nひょうてんかの　うみを　およぎまわる。\nぶあつい　しぼうが　こうげきを　はねかえす。"
        en:
          ruby: "WALREIN’s two massively developed\ntusks can totally shatter blocks of\nice weighing ten tons with one blow.\fThis POKéMON’s thick coat of blubber\ninsulates it from subzero temperatures."
          sapphire: "WALREIN swims all over in frigid\nseawater while crushing icebergs with\nits grand, imposing tusks.\fIts thick layer of blubber makes enemy\nattacks bounce off harmlessly."
        fr:
          ruby: "Les deux énormes défenses de\nKAIMORSE peuvent détruire en un\nseul coup des blocs de glace de plus\fde dix tonnes. L’épaisse couche de\ngraisse de ce POKéMON l’isole lorsque la\ntempérature est en dessous de zéro."
          sapphire: "KAIMORSE nage dans l’eau glacée et\ndétruit les icebergs sur son passage à\nl’aide de ses grandes et\fimpressionnantes défenses. Son\népaisse couche de graisse lui permet de\nfaire rebondir les attaques ennemies."
        it:
          ruby: "Le due zanne molto sviluppate di\nWALREIN sono in grado di ridurre\nin polvere blocchi di ghiaccio del\fpeso di 100 quintali. Lo spesso strato\ndi grasso attorno al corpo lo isola\ndalle rigide temperature polari."
          sapphire: "WALREIN nuota in tutti i mari glaciali\ne frantuma gli iceberg con\nle sue enormi e potenti zanne.\fLo spesso strato di grasso che\navvolge il suo corpo fa rimbalzare\nsenza danno gli attacchi nemici."
        de:
          ruby: "WALRAISA hat zwei massive Stoßzähne,\ndie mit einem Hieb Eisblöcke\nzertrümmern können, die bis zu\f10 Tonnen wiegen. Es besitzt eine dicke\nSpeckschicht, die es vor eisigen\nTemperaturen schützt."
          sapphire: "WALRAISA schwimmt in eiskaltem Meer-\nwasser und zertrümmert Eisberge mit\nseinen beeindruckenden Stoßzähnen.\fEine dicke Schicht aus Walfischspeck\nlässt gegnerische Attacken von ihm ab-\nprallen."
        es:
          ruby: "WALREIN tiene unos exagerados colmillos\ncon los que puede hacer añicos bloques\nde hielo de hasta 10 toneladas de una\fsola dentellada. La gruesa capa de grasa\nde ballena que lo recubre le protege de\ntemperaturas inferiores a 0 grados."
          sapphire: "WALREIN va nadando por mares glaciales\ny destrozando icebergs con los enormes\ne imponentes colmillos que tiene.\fLa capa de grasa de ballena que le rodea\nhace que los ataques enemigos reboten\ny no le hagan ningún daño."
clamperl:
  species_id: 366
  names:
    jp_kana: パールル
    en: CLAMPERL
    fr: COQUIPERL
    it: CLAMPERL
    de: PERLU
    es: CLAMPERL
  forms:
    clamperl:
      form_id: 0
      base_stats:
        hp: 35
        attack: 64
        defense: 85
        special_attack: 74
        special_defense: 55
        speed: 32
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - shell_armor
      held_items:
        rare: blue_shard
      descriptions:
        jp_kana:
          ruby: "がんじょうな　カラは　みを　まもる　だけではなく\nえものを　はさんで　つかまえる　ことも　できる。\nそだった　パールルの　かいがらは　キズだらけ。"
          sapphire: "かたい　かいがらに　まもられて　せいちょうする。\nほんたいが　カラに　おさまり　きらなくなると\nしんかの　しゅんかんが　ちかづいた　しょうこ。"
        en:
          ruby: "CLAMPERL’s sturdy shell is not only good\nfor protection - it is also used for\nclamping and catching prey.\fA fully grown CLAMPERL’s shell will be\nscored with nicks and scratches all\nover."
          sapphire: "CLAMPERL grows while being protected\nby its rock-hard shell. When its body\nbecomes too large to fit inside the\fshell, it is sure evidence that this\nPOKéMON is getting close to evolution."
        fr:
          ruby: "La puissante coquille de COQUIPERL ne\nsert pas qu’à le protéger. Elle lui\npermet également de pincer et\fd’attraper sa proie. Une coquille de\nCOQUIPERL adulte porte souvent de\nnombreuses égratignures et éraflures."
          sapphire: "COQUIPERL grandit protégé par sa\ncoquille dure comme de la pierre. Lorsque\nson corps devient trop grand pour sa\fcoquille, cela signifie que ce POKéMON\nva bientôt évoluer."
        it:
          ruby: "La robusta conchiglia di CLAMPERL\nè un’eccellente protezione, ma è anche\nmolto utile per intrappolare e catturare\fla preda. Di solito una conchiglia giunta\nalla sua completa maturità è segnata da\ntacche e graffi."
          sapphire: "CLAMPERL cresce ben protetto dalla\nsua conchiglia dura come la pietra.\nQuando cresce oltre la misura\fdella conchiglia, significa che è\nprossimo all’evoluzione."
        de:
          ruby: "PERLUs kräftige Schale dient nicht\nnur dem Schutz, es nutzt sie auch zum\nFangen von Beute. Die ausgewachsene\fSchale eines PERLU weist viele\nKerben und Kratzer auf."
          sapphire: "PERLU wächst, während es von seiner\nsteinharten Schale geschützt wird. \nWenn sein Körper zu groß für seine\fSchale wird, ist dies ein sicheres\nAnzeichen dafür, dass dieses POKéMON\nkurz vor seiner Entwicklung steht."
        es:
          ruby: "La sólida concha que rodea a CLAMPERL\nno sólo le sirve para protegerse, sino\ntambién para poner un cepo y atrapar\fa su presa. Cuando la concha alcanza\nsu mayor tamaño, presenta muescas\ny rasguños por todas partes."
          sapphire: "CLAMPERL crece protegido por la sólida\nconcha que tiene. Si vemos que el\ncuerpo no le cabe, será porque está\fa punto de evolucionar."
huntail:
  species_id: 367
  names:
    jp_kana: ハンテール
    en: HUNTAIL
    fr: SERPANG
    it: HUNTAIL
    de: AALABYSS
    es: HUNTAIL
