        fr:
          ruby: "EVOLI a une structure génétique\ninstable qui se transforme en fonction\nde l’environnement dans lequel il vit.\fCe POKéMON évolue grâce aux\nradiations de diverses PIERRES."
          sapphire: "EVOLI a une structure génétique\ninstable qui se transforme en fonction\nde l’environnement dans lequel il vit.\fCe POKéMON évolue grâce aux\nradiations de diverses PIERRES."
        it:
          ruby: "EEVEE è dotato di un instabile corredo\ngenetico che muta in base all’habitat\nnaturale in cui è integrato.\fLe radiazioni di diverse PIETRE\nscatenano l’evoluzione di questo\nPOKéMON."
          sapphire: "EEVEE è dotato di un instabile corredo\ngenetico che muta in base all’habitat\nnaturale in cui è integrato.\fLe radiazioni di diverse PIETRE\nscatenano l’evoluzione di questo\nPOKéMON."
        de:
          ruby: "EVOLIs genetisches Erbmaterial ist so\ninstabil, dass die Umgebung plötzliche\nMutationen auslösen kann.\fDie Wirkung verschiedener \nSTEINE führt zur Entwicklung dieses \nPOKéMON."
          sapphire: "EVOLIs genetisches Erbmaterial ist so\ninstabil, dass die Umgebung plötzliche\nMutationen auslösen kann.\fDie Wirkung verschiedener STEINE\nführt zur Entwicklung dieses POKéMON."
        es:
          ruby: "La configuración genética de EEVEE\nle permite mutar y adaptarse enseguida\na cualquier medio en el que viva.\fLa evolución de este POKéMON es posible\ngracias a las radiaciones emitidas por\nvarias PIEDRAS."
          sapphire: "La configuración genética de EEVEE\nle permite mutar y adaptarse enseguida\na cualquier medio en el que viva.\fLa evolución de este POKéMON es posible\ngracias a las radiaciones emitidas por\nvarias PIEDRAS."
