        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - white_smoke
      descriptions:
        jp_kana:
          ruby: "やまを　ほって　せきたんを　みつけては　せっせと\nこうらの　くうどうに　いれて　もやす　ポケモン。\nおそわれると　くろい　けむりを　だして　にげる。"
          sapphire: "せきたんを　もやして　エネルギーを　つくりだす。\nひの　いきおいが　よわまると　げんきが　なくなり\nたたかう　ときは　せきたんを　たくさん　もやす。"
        en:
          ruby: "TORKOAL digs through mountains in\nsearch of coal. If it finds some, it fills\nhollow spaces on its shell with the coal\fand burns it.\nIf it is attacked, this POKéMON spouts\nthick black smoke to beat a retreat."
          sapphire: "TORKOAL generates energy by burning\ncoal. It grows weaker as the fire\ndies down.\fWhen it is preparing for battle, this\nPOKéMON burns more coal."
        fr:
          ruby: "CHARTOR fore les montagnes à la\nrecherche de charbon. Lorsqu’il en\ntrouve, il le met dans les emplacements\fcreux de sa carapace pour le brûler.\nQuand il est attaqué, ce POKéMON crache\nune épaisse fumée noire pour s’enfuir."
          sapphire: "CHARTOR génère de l’énergie en\nbrûlant du charbon. Il s’affaiblit\nlorsque le feu s’éteint.\fLorsqu’il se prépare au combat, ce\nPOKéMON brûle plus de charbon."
        it:
          ruby: "TORKOAL scava in montagna in cerca\ndi carbone. Quando lo trova, lo usa per\nriempire la cavità della propria corazza\fe poi lo brucia. In caso di aggressione,\nemette nubi di fumo nero per poi\nbattere in ritirata."
          sapphire: "TORKOAL genera energia bruciando\nil carbone. Si indebolisce con\nl’affievolirsi del fuoco.\fIn preparazione alle lotte il POKéMON\nbrucia maggiori quantità di carbone."
        de:
          ruby: "QURTEL schaufelt sich auf der Suche\nnach Kohle durch die Berge. Wenn es\nwelche findet, füllt es die Hohlräume\fseines Panzers mit Kohle und verbrennt\ndiese. Wenn es angegriffen wird, stößt\nes dicken schwarzen Rauch aus."
          sapphire: "QURTEL erzeugt Energie, indem es Kohle\nverbrennt. Wenn das Feuer nachlässt,\nwird es schwächer.\fIn der Vorbereitung auf einen Kampf\nverbrennt dieses POKéMON mehr Kohle."
        es:
          ruby: "TORKOAL va cavando por las montañas en\nbusca de carbón. Cuando lo encuentra,\nrellena los huecos que tiene dentro del\fcaparazón y lo quema.\nSi le atacan, este POKéMON echa un humo\nnegro que le permite la retirada."
          sapphire: "TORKOAL genera energía quemando\ncarbón. A medida que se extingue\nel fuego, se va debilitando.\fAntes de entrar en combate, quema más\ncarbón de lo habitual."
spoink:
  species_id: 325
  names:
    jp_kana: バネブー
    en: SPOINK
    fr: SPOINK
    it: SPOINK
    de: SPOINK
    es: SPOINK
  forms:
    spoink:
      form_id: 0
      base_stats:
        hp: 60
        attack: 25
        defense: 35
        special_attack: 70
        special_defense: 80
        speed: 60
