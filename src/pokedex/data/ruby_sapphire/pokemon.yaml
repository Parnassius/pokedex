          ruby: "サンゴの　えだの　すきまに　もぐって　ねむる。\nシードラに　きづかず　サンゴを　とろうとして\nどくの　トゲに　さされてしまう　ことが　ある。"
          sapphire: "からだを　かいてんさせて　うずまきを　つくる。\nぎょせんも　のみこまれる　ほどの　げきりゅうで\nえものを　よわらせてから　まるごと　のみこむ。"
        en:
          ruby: "SEADRA sleeps after wriggling itself\nbetween the branches of coral.\nThose trying to harvest coral are\foccasionally stung by this POKéMON’s\npoison barbs if they fail to notice it."
          sapphire: "SEADRA generates whirlpools by spinning\nits body. The whirlpools are strong\nenough to swallow even fishing boats.\fThis POKéMON weakens prey with these\ncurrents, then swallows it whole."
        fr:
          ruby: "HYPOCEAN s’accroche aux récifs de\ncorail avant de s’endormir. Les pêcheurs\nde coraux se font parfois piquer par\fles aiguillons de ce POKéMON\nlorsqu’ils ne font pas attention."
          sapphire: "HYPOCEAN déclenche des tourbillons\nen faisant tournoyer son corps. Ces\ntourbillons sont assez puissants pour\fengloutir des bateaux de pêche. Ce\nPOKéMON affaiblit sa proie grâce à ces\ncourants, puis l’avale en une bouchée."
        it:
          ruby: "SEADRA dorme dopo essersi sistemato\ntra i rami di un corallo. I cercatori di\ncorallo spesso rischiano di essere\fpunti dai suoi aculei velenosi se non\nsi accorgono della sua presenza."
          sapphire: "Roteando turbinosamente, SEADRA\ngenera vortici così forti da riuscire a \ninghiottire persino\fun peschereccio. In questo modo il\nPOKéMON indebolisce le prede e\npoi le inghiotte intere."
        de:
          ruby: "Sobald sich SEEMON um eine Koralle\ngewickelt hat, schläft es. Von Zeit zu\nZeit werden Menschen durch die\fWiderhaken dieses POKéMON verletzt, \nwenn sie versuchen, Korallen zu ernten\nund es dabei nicht bemerken."
          sapphire: "SEEMON erzeugt Strudel, indem es sich\nschnell um die eigene Achse dreht. Diese\nStrudel können sogar Fischerboote in\fdie Tiefe reißen. Damit schwächt es\nBeute, bevor es sie im Ganzen\nverschlingt."
        es:
          ruby: "SEADRA se echa a dormir tras abrirse\nun hueco entre las ramas de los corales.\nLos amantes de estos animales marinos\fsuelen pincharse con las púas\nvenenosas de estos POKéMON\nsi no los ven."
          sapphire: "SEADRA gira sobre sí mismo y crea\nunos remolinos lo suficientemente\nfuertes como para engullir barcos\fde pesca. Este POKéMON aprovecha\nlas corrientes que crea para debilitar\na su presa y tragársela de una vez."
