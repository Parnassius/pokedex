          ruby: "AEROMITE est un POKéMON nocturne,\nil ne sort donc que la nuit. Ses proies\npréférées sont les petits insectes\fqui se rassemblent autour des\nréverbères, attirés par la lumière."
          sapphire: "AEROMITE est un POKéMON nocturne,\nil ne sort donc que la nuit. Ses proies\npréférées sont les petits insectes\fqui se rassemblent autour des\nréverbères, attirés par la lumière."
        it:
          ruby: "VENOMOTH è un POKéMON notturno,\ncioè attivo soltanto di notte.\nLe sue prede favorite sono i piccoli\finsetti che si raggruppano attorno ai\nlampioni attratti dalla luce nel buio."
          sapphire: "VENOMOTH è un POKéMON notturno,\ncioè attivo soltanto di notte.\nLe sue prede favorite sono i piccoli\finsetti che si raggruppano attorno ai\nlampioni attratti dalla luce nel buio."
        de:
          ruby: "OMOT ist ein nachtaktives POKéMON.\nKleine Insekten, die vom Licht in der\nDunkelheit angezogen Straßenlaternen\fumschwärmen, sind seine bevorzugte\nBeute."
          sapphire: "OMOT ist ein nachtaktives POKéMON.\nKleine Insekten, die vom Licht in der\nDunkelheit angezogen, Straßenlaternen\fumschwärmen, sind seine bevorzugte\nBeute."
        es:
          ruby: "VENOMOTH es nocturno, sólo actúa\nen la oscuridad. Su alimento preferido\nson los pequeños insectos que se\fconcentran cerca de los focos de\nluz en la oscuridad de la noche."
          sapphire: "VENOMOTH es nocturno, sólo actúa\nen la oscuridad. Su alimento preferido\nson los pequeños insectos que se\fconcentran cerca de los focos de\nluz en la oscuridad de la noche."
