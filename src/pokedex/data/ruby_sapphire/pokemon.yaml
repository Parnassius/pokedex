          sapphire: "BALDORFISH saugt Wasser ein, um sich\naufzublasen. Dieses POKéMON nutzt den\nDruck des Wassers dazu, giftige\fStacheln zu verschießen. Es betrachtet\nSchwimmen als eine echte Heraus-\nforderung."
        es:
          ruby: "QWILFISH bebe agua y se hincha y,\na continuación, usa la presión del agua\nque ha tragado para lanzar plumas\ftóxicas por todo el cuerpo.\nPara este POKéMON nadar es una especie\nde desafío."
