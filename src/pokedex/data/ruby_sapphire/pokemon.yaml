        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fighting
        - psychic
      egg_groups:
        - human_like
      abilities:
        - pure_power
      descriptions:
        jp_kana:
          ruby: "やまおくで　ヨガの　しゅぎょうを　している。\nめいそうを　していても　しゅうちゅうりょくが\nとぎれてしまうため　しゅぎょうは　おわらない。"
          sapphire: "めいそうで　せいしんエネルギーを　たかめている。\n１にちに　きのみを　１こだけしか　たべない。\nあまり　たべない　ことも　しゅぎょうの　ひとつ。"
        en:
          ruby: "MEDITITE undertakes rigorous mental\ntraining deep in the mountains.\nHowever, whenever it meditates, this\fPOKéMON always loses its concentration\nand focus. As a result, its training\nnever ends."
          sapphire: "MEDITITE heightens its inner energy\nthrough meditation. It survives on\njust one berry a day.\fMinimal eating is another aspect of\nthis POKéMON’s training."
        fr:
          ruby: "MEDITIKKA poursuit un difficile\nentraînement mental dans les\nmontagnes. Cependant, à chaque fois\fqu’il médite, ce POKéMON perd sa\nconcentration. Du coup, son\nentraînement ne s’arrête jamais."
          sapphire: "MEDITIKKA intensifie son énergie\nintérieure grâce à la méditation. Il lui\nsuffit d’une BAIE par jour pour\fsurvivre. La diète fait partie\nde l’entraînement de ce POKéMON."
        it:
          ruby: "MEDITITE esegue rigorosi esercizi\nmentali in montagna. Tuttavia, quando\nè immerso in meditazione, perde\fsempre la concentrazione, dovendo\ncosì ricominciare da capo. Il suo\nesercizio dunque non finisce mai."
          sapphire: "MEDITITE incrementa la sua energia\ninteriore grazie alla meditazione.\nLa sua alimentazione minima - si\fnutre di una bacca al giorno - è\nun’altra peculiarità dell’esercizio\ndi questo POKéMON."
        de:
          ruby: "MEDITIE unterzieht sich einem\nstrikten mentalen Training tief in den\nBergen. Wenn es meditiert, verliert es\fjedoch immer seine Konzentration.\nDeshalb wird sein Training niemals\nein Ende haben."
          sapphire: "MEDITIE erhöht seine Energie durch\nMeditation. Es lebt von nur einer Beere\nam Tag. Diese absolut reduzierte\fErnährung ist Bestandteil seines \nTrainings."
        es:
          ruby: "MEDITITE lleva a cabo un entrenamiento\nmental exhaustivo en lo más profundo de\nlas montañas.\fAunque, cuando medita, pierde toda la\nconcentración y se descentra. Por eso\nno deja nunca de entrenarse."
          sapphire: "MEDITITE aumenta su energía interior\nmediante meditación. Para subsistir\nle basta con una BAYA al día.\fEl comer poco entra dentro de su\nentrenamiento."
medicham:
  species_id: 308
  names:
    jp_kana: チャーレム
    en: MEDICHAM
    fr: CHARMINA
    it: MEDICHAM
    de: MEDITALIS
    es: MEDICHAM
  forms:
    medicham:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 80
      evs_yield:
        hp: 0
