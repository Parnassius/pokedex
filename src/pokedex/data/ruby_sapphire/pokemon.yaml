          sapphire: "QUAXO hat lockiges Haar, das ihm den\nStatus eines Königs bescheinigt. Je\nlänger und lockiger sein Haar ist, desto\fmehr Respekt erntet dieses POKéMON\nvon seinen Artgenossen."
        es:
