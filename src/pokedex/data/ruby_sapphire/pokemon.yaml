          sapphire: "Les TRIOPIKEUR sont en fait des triplés\nqui ont émergé du même corps. C’est\npourquoi chaque triplé pense\fexactement comme les deux autres.\nIls creusent inlassablement, dans une\ncoopération parfaite."
        it:
