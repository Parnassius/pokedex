          sapphire: "La qualité de la laine de LAINERGIE se\nmodifie pour générer un maximum\nd’électricité statique avec un minimum\fde laine. Les sections glabres de sa\npeau sont résistantes à l’électricité."
        it:
          ruby: "La qualità della lana di FLAAFFY varia\nin modo da generare un’alta carica\nelettrostatica con un ridotto\fquantitativo di lana. Le parti scoperte\ne vulnerabili del suo corpo sono\nschermate contro le scosse."
          sapphire: "La qualità della lana di FLAAFFY varia\nin modo da generare un’alta carica\nelettrostatica con un ridotto\fquantitativo di lana. Le parti scoperte\ne vulnerabili del suo corpo sono\nschermate contro le scosse."
        de:
          ruby: "Die Qualität von WAATYs Wolle verändert\nsich, so dass es mit nur wenig Wolle eine\ngroße statische Aufladung erzeugen\fkann. Die kahlen Stellen in seinem Fell\nsind gegen Elektrizität abgeschirmt."
          sapphire: "Die Qualität von WAATYs Wolle verändert\nsich, so dass es mit nur wenig Wolle eine\ngroße statische Aufladung erzeugen\fkann. Die kahlen Stellen in seinem Fell\nsind gegen Elektrizität abgeschirmt."
        es:
          ruby: "La calidad de la lana de FLAAFFY varía\npara poder generar mucha electricidad\nestática con muy poca cantidad de lana.\fLas zonas suaves de la piel en las que\nno tiene pelaje están protegidas\ncontra la electricidad."
          sapphire: "La calidad de la lana de FLAAFFY varía\npara poder generar mucha electricidad\nestática con muy poca cantidad de lana.\fLas zonas suaves de la piel en las que\nno tiene pelaje están protegidas\ncontra la electricidad."
