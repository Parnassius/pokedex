          sapphire: "よわい　でんきを　ぜんしんから　だしているので\nくらやみでは　うっすら　ひかって　みえるよ。\nシッポを　じめんに　さして　でんきを　にがす。"
        en:
          ruby: "If the electrical sacks become\nexcessively charged, RAICHU plants its\ntail in the ground and discharges.\fScorched patches of ground will be\nfound near this POKéMON’s nest."
          sapphire: "This POKéMON exudes a weak electrical\ncharge from all over its body that makes\nit take on a slight glow in darkness.\fRAICHU searches for electricity by\nplanting its tail in the ground."
        fr:
          ruby: "Si ses joues contiennent trop\nd’électricité, RAICHU plante sa queue\ndans le sol pour se décharger.\fOn trouve des parcelles de terre brûlée\nà proximité du nid de ce POKéMON."
          sapphire: "Ce POKéMON libère un faible champ\nélectrique tout autour de son corps, ce\nqui le rend légèrement lumineux dans\fle noir. RAICHU plante sa queue dans\nle sol pour évacuer de l’électricité."
        it:
          ruby: "Se l’elettricità accumulata nelle guance\ndiventa eccessiva, RAICHU la scarica\npiantando la coda nel terreno.\fVicino al suo nido sono presenti\nspesso chiazze di erba arsa."
          sapphire: "RAICHU emana una debole carica\nelettrica da tutto il corpo rilucendo\ncosì nell’oscurità.\fScarica l’elettricità piantando\nla coda nel terreno."
        de:
          ruby: "Wenn seine elektrische Ladung zu groß\nwird, entlädt RAICHU seine Energie ins\nErdreich.\fNeben dem Nest dieses POKéMON findet\nman häufig versengtes Erdreich."
          sapphire: "Dieses POKéMON gibt eine schwache\nelektrische Ladung ab. Dadurch glüht\nes bei Dunkelheit leicht. RAICHU entlädt\fElektrizität, indem es sein\nHinterteil in den Boden gräbt."
        es:
          ruby: "Si las bolsas de los mofletes se le\ncargan demasiado, RAICHU planta\nla cola en el suelo para liberar\felectricidad. Es común encontrar\nzonas chamuscadas cerca de la\nmadriguera de este POKéMON."
          sapphire: "Este POKéMON libera una débil carga\neléctrica por todo su cuerpo,\nque le hace brillar en la oscuridad.\fRAICHU descarga electricidad\nplantando la cola en el suelo."
sandshrew:
