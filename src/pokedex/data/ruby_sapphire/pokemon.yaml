        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ruby: "どんなに　あつい　カベも　とおりぬける。\nねらわれたら　さいご　あさひが　のぼるまで\nずっと　おいかけられる　ことに　なるぞ。"
          sapphire: "まよなか　やみに　まぎれて　さまよっている。\nママに　しかられるような　わるいこは　ヨマワルに\nさらわれるという　いいつたえが　のこっている。"
        en:
          ruby: "DUSKULL can pass through any wall no\nmatter how thick it may be.\nOnce this POKéMON chooses a target,\fit will doggedly pursue the intended\nvictim until the break of dawn."
          sapphire: "DUSKULL wanders lost among the deep\ndarkness of midnight. There is an oft-\ntold admonishment given to misbehaving\fchildren that this POKéMON will spirit\naway bad children who earn scoldings\nfrom their mothers."
        fr:
          ruby: "SKELENOX peut traverser n’importe\nquel mur, même le plus épais. Une fois que\nce POKéMON a choisi une cible, il la\fpourchasse sans relâche jusqu’à l’aube."
          sapphire: "SKELENOX erre seul dans l’obscurité \nde la nuit. On fait souvent\npeur aux enfants en leur disant\fque ce POKéMON viendra les chercher\ns’ils n’obéissent pas à leur maman."
        it:
          ruby: "DUSKULL riesce a passare attraverso\ni muri indipendentemente dal loro\nspessore. Una volta scelto un bersaglio\fperseguita la vittima designata fino\nall’alba."
          sapphire: "DUSKULL vaga come un’anima persa\nnella tetra oscurità notturna. Spesso\nai bimbi capricciosi si dice che\fquesto POKéMON si porti via i\nbambini che fanno arrabbiare\nla mamma."
        de:
          ruby: "ZWIRRLICHT kann durch jede Wand gehen,\negal, wie dick diese ist. Wenn dieses\nPOKéMON sich ein Ziel gesucht hat,\fverfolgt es seinen Feind unnachgiebig\nbis zum Sonnenaufgang."
          sapphire: "ZWIRRLICHT wandert verloren durch die\ntiefe Dunkelheit der Nacht. Kinder\nwerden oft ermahnt, dass dieses\fPOKéMON böse Kinder wegzaubert, die\nvon ihren Müttern ausgeschimpft \nworden sind."
        es:
          ruby: "DUSKULL puede atravesar los muros,\nsea cual sea el grosor que tengan.\nCuando este POKéMON elige su objetivo,\flo persigue hábilmente hasta\nel amanecer."
          sapphire: "DUSKULL vaga perdido por la oscuridad\nde la noche. Cuando los niños se portan\nmal y desobedecen a sus padres,\fse les dice que este POKéMON\naparecerá y se los llevará con él."
dusclops:
  species_id: 356
  names:
    jp_kana: サマヨール
    en: DUSCLOPS
    fr: TERACLOPE
    it: DUSCLOPS
    de: ZWIRRKLOP
    es: DUSCLOPS
