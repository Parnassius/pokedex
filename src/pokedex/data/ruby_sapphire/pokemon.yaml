        fr:
          ruby: "Ce POKéMON doté d’une force\nextraordinaire peut étrangler ses\nproies avec son corps. Il peut même\fécraser des tonneaux métalliques. Une\nfois sous l’étreinte d’ARBOK,\nil est impossible de lui échapper."
          sapphire: "Ce POKéMON doté d’une force\nextraordinaire peut étrangler ses\nproies avec son corps. Il peut même\fécraser des tonneaux métalliques. Une\nfois sous l’étreinte d’ARBOK,\nil est impossible de lui échapper."
        it:
          ruby: "Questo POKéMON è così forte\nda riuscire a stritolare qualsiasi\ncosa col corpo, persino un bidone\fin acciaio. Se ARBOK si avvinghia\nad un nemico è impossibile\nsfuggire a questa morsa fatale."
          sapphire: "Questo POKéMON è così forte\nda riuscire a stritolare qualsiasi\ncosa col corpo, persino un bidone\fin acciaio. Se ARBOK si avvinghia\nad un nemico è impossibile\nsfuggire a questa morsa fatale."
        de:
          ruby: "Dieses POKéMON ist unheimlich stark. Es\nkann seine Beute mit seinem Körper um-\nwickeln und sogar Ölfässer zerdrücken.\fWenn ARBOK einen Gegner umwickelt, ist\nes unmöglich, seinem Würgegriff zu ent-\nkommen."
          sapphire: "Dieses POKéMON ist unheimlich stark. Es\nkann seine Beute mit seinem Körper um-\nwickeln und sogar Ölfässer zerdrücken.\fWenn ARBOK einen Gegner umwickelt, ist\nes unmöglich, seinem Würgegriff zu ent-\nkommen."
        es:
          ruby: "Este POKéMON es tremendamente fuerte,\npuede oprimir cualquier cosa con su\ncuerpo y hasta es capaz de estrujar un\fbarril de acero. Una vez que ARBOK\nse enrosca a su víctima, no hay forma\nde escapar de su asfixiante abrazo."
          sapphire: "Este POKéMON es tremendamente fuerte,\npuede oprimir cualquier cosa con su\ncuerpo y hasta es capaz de estrujar un\fbarril de acero. Una vez que ARBOK\nse enrosca a su víctima, no hay forma\nde escapar de su asfixiante abrazo."
