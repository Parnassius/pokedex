          sapphire: "DEWGONG adora riposare su una\ngelida lastra di ghiaccio. In passato\ni marinai confondevano l’immagine\fdi questo POKéMON addormentato\nsulla superficie gelata con una sirena."
        de:
          ruby: "JUGONG liebt es, auf bitterkalten Eis-\nschollen ein Nickerchen zu machen.\nEin Seemann, der einmal ein solches\fPOKéMON schlafend auf einem\nEisberg sah, hielt es irrtümlicherweise\nfür eine Meerjungfrau."
          sapphire: "JUGONG liebt es, auf bitterkalten \nEisschollen ein Nickerchen zu machen.\nEin Seemann, der ein solches POKéMON\feines Tages auf einem Eisberg schlafen\nsah, hielt es für eine Meerjungfrau."
        es:
          ruby: "A DEWGONG le encanta dormitar\nsobre la frialdad del hielo.\nEn una ocasión, algún marinero\flo confundió con una sirena\nal verlo dormido sobre un glaciar."
          sapphire: "A DEWGONG le encanta dormitar\nsobre la frialdad del hielo.\nEn una ocasión, algún marinero\flo confundió con una sirena\nal verlo dormido sobre un glaciar."
