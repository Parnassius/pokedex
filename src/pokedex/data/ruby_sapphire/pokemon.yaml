          sapphire: "はしっているうちに　もくてきを　わすれるほど\nのうみそが　ちいさく　あたまが　わるいぞ。\nなにかを　こわすと　たまに　おもいだすらしい。"
        en:
          ruby: "RHYHORN runs in a straight line,\nsmashing everything in its path.\nIt is not bothered even if it rushes\fheadlong into a block of steel.\nThis POKéMON may feel some pain from\nthe collision the next day, however."
          sapphire: "RHYHORN’s brain is very small. It is so\ndense, while on a run it forgets why it\nstarted running in the first place.\fIt apparently remembers sometimes if it\ndemolishes something."
        fr:
          ruby: "RHINOCORNE charge droit devant lui,\ndétruisant tout sur son passage. Il\nne s’arrête jamais, même lorsqu’il charge\fun bloc d’acier. Malgré tout, il sent \nla douleur le lendemain."
          sapphire: "Le cerveau de RHINOCORNE est tout\npetit, à tel point que lorsqu’il attaque,\nil lui arrive d’oublier pourquoi il a\fcommencé à charger. Il lui arrive de se\nsouvenir qu’il a démoli certaines\nchoses."
        it:
          ruby: "RHYHORN corre diritto per la sua strada\nfracassando tutto ciò che trova.\nNon si scompone nemmeno\fscontrandosi con un blocco d’acciaio.\nTuttavia, il giorno seguente può\naccusare qualche dolore."
          sapphire: "Il cervello di RHYHORN è così piccolo\nche durante la corsa il POKéMON non\nriesce neanche a ricordare dov’era\fdiretto. A volte gli capita di\nricordare di aver distrutto qualcosa."
        de:
          ruby: "RIHORN läuft immer geradeaus und\nzerstampft alles, was ihm in die Quere\nkommt. Es macht ihm auch nichts aus,\fwenn es mit dem Kopf voran gegen einen\nStahlklotz rennt. Am nächsten Tag\nallerdings könnte es Schmerzen haben."
          sapphire: "RIHORNs Hirn ist sehr klein. Es ist so\nbeschränkt, dass es während des\nLaufens vergisst, warum es überhaupt\flosgelaufen ist. Manchmal erinnert es\nsich aber daran, dass es etwas\nzerstört hat."
        es:
          ruby: "RHYHORN corre en línea recta arrasando\ntodo lo que encuentra en su camino.\nAun estrellándose de cabeza\fcontra un bloque de acero, no se vería\nafectado. Bueno, como mucho notaría\nalgo de dolor al día siguiente."
          sapphire: "RHYHORN tiene un cerebro muy pequeño.\nSi se pone a correr, por ejemplo,\nse le olvida qué le llevó a hacerlo.\fLo que si parece recordar (a veces)\nes si ha destrozado alguna cosa."
