      descriptions:
        jp_kana:
          ruby: "なんでも　なげとばす　パワーを　もつが　こまかい\nさぎょうを　すると　うでが　からまってしまう。\nかんがえる　よりも　さきに　からだが　うごく。"
          sapphire: "あらゆる　かくとうぎを　マスターした　ポケモン。\n４ほんの　うでで　つかまれたら　もう　おわり。\nちへいせんの　むこうまで　なげとばされてしまう。"
        en:
          ruby: "MACHAMP has the power to hurl anything\naside. However, trying to do any work\nrequiring care and dexterity causes\fits arms to get tangled.\nThis POKéMON tends to leap into action\nbefore it thinks."
          sapphire: "MACHAMP is known as the POKéMON that\nhas mastered every kind of martial arts.\nIf it grabs hold of the foe with its four\farms, the battle is all but over.\nThe hapless foe is thrown far over the\nhorizon."
        fr:
          ruby: "MACKOGNEUR est capable de déplacer\nn’importe quelle masse. Cependant, ses\nbras s’emmêlent dès qu’il essaye de\fréaliser un travail délicat ou minutieux.\nCe POKéMON a tendance à cogner\nd’abord et à réfléchir ensuite."
          sapphire: "MACKOGNEUR est célèbre, car c’est le\nseul POKéMON qui a réussi à maîtriser\ntous les types d’arts martiaux. S’il\fparvient à attraper son ennemi avec\nses quatre bras, il le projette\npar delà l’horizon."
        it:
          ruby: "MACHAMP è dotato di una forza tale da\nriuscire a scagliare lontano ogni cosa.\nLe sue braccia sono troppo possenti\fper riuscire a eseguire qualsiasi lavoro\nche richieda attenzione e destrezza.\nTende ad agire prima di pensare."
          sapphire: "MACHAMP è noto per la sua maestria\nnella pratica di tutte le arti marziali.\nSe afferra il nemico con le sue quattro\fbraccia possenti, la lotta è già decisa.\nLo sventurato avversario verrà infatti\nscagliato ben oltre l’orizzonte."
        de:
          ruby: "MACHOMEI hat genug Kraft, um alles \nMögliche zu stemmen. Bei Tätigkeiten,\ndie Geschick und Sorgfalt erfordern,\fmachen es ihm seine Arme jedoch nicht\nleicht. Dieses POKéMON neigt dazu,\nzuerst zu handeln und dann zu denken."
          sapphire: "MACHOMEI wurde berühmt, da es alle\nArten der Kampfkunst beherrscht. Wenn\nes einen Gegner mit seinen vier Armen zu\ffassen gekriegt hat, ist der Kampf noch\nnicht vorbei. Es schleudert ihn dann\nnämlich weit über den Horizont hinaus."
        es:
          ruby: "MACHAMP es tan fuerte que puede\nderribar lo que quiera. Sin embargo,\ncuando tiene que realizar una tarea\fque requiere delicadeza y destreza, se\nle enredan los brazos. Este POKéMON\npasa a la acción sin pensar."
          sapphire: "MACHAMP es conocido como el POKéMON\nque domina todas las artes marciales. Si\nagarra a su rival con los cuatro brazos\fque tiene, su enemigo no tendrá nada\nque hacer. El pobre contrincante saldrá\nvolando hasta perderse en el horizonte."
