          sapphire: "あたたかい　うみに　あつまった　サニーゴは\nちいさい　ポケモンたちの　かくれがに　なる。\nすいおんが　さがると　みなみへ　いどうする。"
        en:
          ruby: "CORSOLA’s branches glitter very\nbeautifully in seven colors when they\ncatch sunlight.\fIf any branch breaks off, this POKéMON\ngrows it back in just one night."
          sapphire: "Clusters of CORSOLA congregate in warm\nseas where they serve as ideal hiding\nplaces for smaller POKéMON.\fWhen the water temperature falls, this\nPOKéMON migrates to the southern seas."
        fr:
          ruby: "Les branches de CORAYON brillent de\nsept couleurs quand elles sont\nexposées à la lumière du soleil.\fSi une des branches casse, ce POKéMON\npeut la faire repousser en une nuit."
          sapphire: "Les CORAYON se rassemblent dans les\nmers chaudes, offrant ainsi un abri\nidéal aux plus petits POKéMON.\fQuand la température baisse, ce \nPOKéMON migre vers les mers du sud."
        it:
          ruby: "Le ramificazioni del CORSOLA\nbrillano in sette meravigliosi colori\nse esposte alla luce del sole.\fSe qualche ramo si spezza e cade\nviene rigenerato nell’arco di una notte."
          sapphire: "I CORSOLA formano grandi colonie nei\nmari più caldi dove costituiscono\nrifugi ideali per POKéMON più piccoli.\fQuando la temperatura dell’acqua\nsi abbassa, migrano verso i mari del sud."
        de:
          ruby: "Wenn CORASONNs Arme Sonnenlicht\nabbekommen, glitzern sie wunderschön\nin sieben Farben. Wenn ein Arm\fabbricht, wächst über Nacht ein neuer\nnach."
          sapphire: "Scharen von CORASONN sammeln sich im\nwarmen Meer und dienen kleineren\nPOKéMON als ideale Plätze zum\fVerstecken. Wenn die Wassertemperatur\nsinkt, wandert dieses POKéMON in die\nsüdlichen Meere ab."
        es:
          ruby: "Las ramas de CORSOLA brillan con belleza\nhasta en siete colores cuando les da el\nsol.\fSi se le rompe alguna, el POKéMON\nla regenera en tan solo una noche."
          sapphire: "Las aguas templadas son el hábitat de\nCORSOLA. Allí se agrupan grandes bancos\nde estos POKéMON que sirven de\fescondite a POKéMON más pequeños.\nCuando la temperatura del agua baja,\nsuelen migrar a los Mares del Sur."
