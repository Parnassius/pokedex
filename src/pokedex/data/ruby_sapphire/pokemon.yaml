        de:
          ruby: "REMORAID saugt Wasser ein und spritzt\nes unter Einsatz seiner Bauchmuskeln\nmit Hochdruck wieder heraus. So schießt\fes fliegende Beute ab. Wenn seine\nEntwicklung näher rückt, wandert\ndieses POKéMON flussabwärts."
          sapphire: "REMORAID saugt Wasser ein und spritzt\nes unter Einsatz seiner Bauchmuskeln\nmit Hochdruck wieder heraus. So schießt\fes fliegende Beute ab. Wenn seine\nEntwicklung näher rückt, wandert\ndieses POKéMON flussabwärts."
        es:
