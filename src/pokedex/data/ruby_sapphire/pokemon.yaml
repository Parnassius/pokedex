      descriptions:
        jp_kana:
          ruby: "あきに　なると　メスに　プロポーズする　ために\nかわぞこで　おどる　オスを　みることが　できる。\nからだの　いろが　もっとも　うつくしい　きせつ。"
          sapphire: "タマゴを　まもるため　オスと　メスは　こうたいで\nすの　まわりを　およぎまわり　パトロールする。\nタマゴが　かえるまで　ひとつきいじょう　つづく。"
        en:
          ruby: "In the autumn, SEAKING males can be\nseen performing courtship dances in\nriverbeds to woo females.\fDuring this season, this POKéMON’s body\ncoloration is at its most beautiful."
          sapphire: "SEAKING is very protective of its eggs.\nThe male and female will take turns\npatrolling around their nest and eggs.\fThe guarding of eggs by these POKéMON\ngoes on for over a month."
        fr:
          ruby: "En automne, on peut voir les POISSOROY\nmâles effectuer des danses nuptiales\ndans les rivières pour plaire\faux femelles. C’est pendant cette\nsaison que le corps de ce POKéMON\nprend ses plus belles couleurs."
          sapphire: "Les POISSOROY font tout pour protéger\nleurs œufs. Les mâles et les femelles\npatrouillent pour surveiller le nid\fet les œufs. La garde de ces œufs\ndure un peu plus d’un mois."
        it:
          ruby: "In autunno, i SEAKING maschio sono\nsoliti corteggiare le femmine con\nparticolari danze rituali.\fIn questa stagione il corpo di questi\nPOKéMON assume una colorazione\nparticolare."
          sapphire: "SEAKING protegge gelosamente le sue\nuova. Il maschio e la femmina si danno\nil cambio attorno al nido e alle uova.\fLe uova vengono sorvegliate\nper oltre un mese."
        de:
          ruby: "Im Herbst kann man männliche GOLKING\ndabei beobachten, wie sie Balztänze in \nFlussbetten aufführen, um die\fweiblichen Exemplare zu beeindrucken.\nWährend dieser Zeit ist die Farbe\ndieser POKéMON am schönsten."
          sapphire: "GOLKING gibt sehr viel Acht auf seine\nBrut. Es patrouilliert um sein Nest und\ndie Eier herum, wobei sich das männliche\fund das weibliche Exemplar abwechseln.\nDas Bewachen der Eier beschäftigt\ndieses POKéMON für über einen Monat."
        es:
          ruby: "En otoño, se ven ejemplares de SEAKING\nmacho danzando en las riberas de los\nríos para cortejar a las hembras.\fEn esta época, la coloración de este\nPOKéMON alcanza sus niveles máximos\nde belleza."
          sapphire: "SEAKING protege sus huevos con uñas\ny dientes. Macho y hembra se turnan\npara vigilar el nido y los huevos.\fEste periodo de protección dura más de\nun mes en el caso de estos POKéMON."
