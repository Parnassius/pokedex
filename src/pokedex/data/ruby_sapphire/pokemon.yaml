        special_defense: 0
        speed: 0
      types:
        - fire
        - fighting
      egg_groups:
        - field
      abilities:
        - blaze
      descriptions:
        jp_kana:
          ruby: "のやまを　はしりまわって　あしこしを　きたえる。\nスピードと　パワーを　かねそなえた　あしは\n１びょうかんに　１０ぱつの　キックを　くりだす。"
          sapphire: "クチバシから　はきだす　しゃくねつの　ほのおと\nはかいりょく　ばつぐんの　キックで　たたかう。\nなきごえが　おおきいので　とても　やかましい。"
        en:
          ruby: "COMBUSKEN toughens up its legs and\nthighs by running through fields and\nmountains.\fThis POKéMON’s legs possess both speed\nand power, enabling it to dole out ten\nkicks in one second."
          sapphire: "COMBUSKEN battles with the intensely\nhot flames it spews from its beak and\nwith outstandingly destructive kicks.\fThis POKéMON’s cry is very loud and\ndistracting."
        fr:
          ruby: "GALIFEU muscle ses cuisses et ses\nmollets en courant dans les champs\nou dans les montagnes.\fLes jambes de ce POKéMON sont très\npuissantes et rapides, capables de\ndonner 10 coups de pied en 1 seconde."
          sapphire: "GALIFEU combat grâce aux flammes\nardentes qu’il crache de son bec et à\nses coups de pied destructeurs.\fLe cri de ce POKéMON est très puissant\net très gênant pour l’adversaire."
        it:
          ruby: "COMBUSKEN allena gli arti superiori e\ninferiori correndo in campagna e in\nmontagna.\fLe zampe inferiori sono rapide\ne potenti e riescono a sferrare\ndieci calci al secondo."
          sapphire: "COMBUSKEN combatte sputando fiamme\nroventi dal becco e sferrando calci\ndall’enorme potenza distruttiva.\fIl verso di questo POKéMON è\nlacerante e distrae gli avversari."
        de:
          ruby: "JUNGGLUT trainiert seine Beine und\nOberschenkel, indem es über Felder und\nBerge läuft. Die Beine dieses POKéMON\fsind sowohl schnell als auch kräftig,\nso dass es 10 Tritte pro Sekunde\nausführen kann."
          sapphire: "JUNGGLUT stößt im Kampf glühend\nheiße Flammen aus seinem Schnabel aus\nund setzt extrem vernichtende Tritte\fein. Das Geschrei dieses POKéMON ist\nsehr laut und verwirrend."
        es:
          ruby: "COMBUSKEN fortalece las piernas\ncorriendo por llanos y montañas.\nEste POKéMON tiene en las extremidades\finferiores tanto fuerza como velocidad.\nPuede dar hasta diez patadas\npor segundo."
          sapphire: "COMBUSKEN lucha haciendo uso de\nlas abrasadoras llamas que expulsa por\nel pico y de unas patadas fulminantes.\fEste POKéMON emite un sonido\nmuy fuerte y molesto."
blaziken:
  species_id: 257
  names:
    jp_kana: バシャーモ
    en: BLAZIKEN
    fr: BRASEGALI
    it: BLAZIKEN
    de: LOHGOCK
    es: BLAZIKEN
