          sapphire: "いとで　つくった　ワナは　だい２の　しんけい。\nいとを　つたわる　わずかな　しんどう　だけで\nえものの　しゅるいが　わかると　いわれている。"
        en:
          ruby: "The web spun by SPINARAK can be\nconsidered its second nervous system.\nIt is said that this POKéMON can\fdetermine what kind of prey is touching\nits web just by the tiny vibrations it\nfeels through the web’s strands."
          sapphire: "The web spun by SPINARAK can be\nconsidered its second nervous system.\nIt is said that this POKéMON can\fdetermine what kind of prey is touching\nits web just by the tiny vibrations it\nfeels through the web’s strands."
        fr:
          ruby: "La toile tissée par MIMIGAL peut être\ncomparée à un second système nerveux.\nOn raconte que ce POKéMON peut\fdéterminer quel type de proie touche\nsa toile grâce aux infimes vibrations\ndes fils."
          sapphire: "La toile tissée par MIMIGAL peut être\ncomparée à un second système nerveux.\nOn raconte que ce POKéMON peut\fdéterminer quel type de proie touche\nsa toile grâce aux infimes vibrations\ndes fils."
        it:
          ruby: "La ragnatela tessuta da SPINARAK può\nessere considerata il suo secondo\nsistema nervoso. Infatti, pare che\fquesto POKéMON riesca a capire la\nnatura della sua preda dalle leggere\nvibrazioni di tale ragnatela."
          sapphire: "La ragnatela tessuta da SPINARAK può\nessere considerata il suo secondo\nsistema nervoso. Infatti, pare che\fquesto POKéMON riesca a capire la\nnatura della sua preda dalle leggere\nvibrazioni di tale ragnatela."
        de:
          ruby: "Das von WEBARAK gesponnene Netz ist\nsein zweites Nervensystem. Dieses\nPOKéMON kann anhand der feinen\fVibrationen der Netzfäden bestimmen,\nwelche Art Beute sich darauf befindet."
          sapphire: "Das von WEBARAK gesponnene Netz ist\nsein zweites Nervensystem. Dieses\nPOKéMON kann anhand der feinen\fVibrationen der Netzfäden bestimmen,\nwelche Art Beute sich darauf befindet."
        es:
          ruby: "La tela que teje SPINARAK puede\nconsiderarse como su segundo sistema\nnervioso. Dicen que puede adivinar qué\ftipo de presa ha caído en su red con\nsólo observar las leves vibraciones de\nlos hilos de la tela."
          sapphire: "La tela que teje SPINARAK puede\nconsiderarse como su segundo sistema\nnervioso. Dicen que puede adivinar qué\ftipo de presa ha caído en su red con\nsólo observar las leves vibraciones de\nlos hilos de la tela."
