      descriptions:
        jp_kana:
          ruby: "ちじょうでも　せいかつできる　ように　からだの\nひょうめんを　うすい　ねんまくが　つつんでいる。\nしおの　ひいた　かいがんで　どろあそびを　する。"
          sapphire: "すいちゅうを　およぐより　どろの　なかを\nすすむ　ほうが　だんぜん　はやく　いどうできる。\nあしこしが　はったつして　２ほんあしで　あるく。"
        en:
          ruby: "The surface of MARSHTOMP’s body is\nenveloped by a thin, sticky film that\nenables it to live on land.\fThis POKéMON plays in mud on beaches\nwhen the ocean tide is low."
          sapphire: "MARSHTOMP is much faster at traveling\nthrough mud than it is at swimming.\nThis POKéMON’s hindquarters exhibit\fobvious development, giving it the\nability to walk on just its hind legs."
        fr:
          ruby: "Le corps de FLOBIO est enveloppé\npar un film fin et collant qui lui permet\nde vivre hors de l’eau.\fCe POKéMON joue dans la vase sur les\nplages lorsque la marée est basse."
          sapphire: "FLOBIO est bien plus rapide dans\nla boue que dans l’eau. L’arrière-train\nde ce POKéMON est particulièrement\fdéveloppé, ce qui lui donne la\ncapacité de marcher sur ses pattes\narrière."
        it:
          ruby: "La superficie corporea di MARSHTOMP\nè avvolta da una spessa pellicola\nappiccicosa che gli consente di vivere\fsulla terraferma. Questo POKéMON\ngioca con la fanghiglia sul fondo del\nmare nei momenti di bassa marea."
          sapphire: "MARSHTOMP è molto più a suo agio nel\nfango che non in acqua e sa muoversi\ncon estrema rapidità.\fLa parte inferiore del suo corpo mostra\nun chiaro sviluppo, consentendogli di\ncamminare solo sugli arti inferiori."
        de:
          ruby: "MOORABBELs Körper ist mit einem\nklebrigen Film überzogen, durch den es\nan Land überleben kann. Dieses POKéMON\fspielt bei Ebbe in den Schlammpfützen\nam Strand."
          sapphire: "MOORABBEL kommt im Schlamm besser\nvoran als im Wasser. Das Hinterteil\ndieses POKéMON ist gut entwickelt,\fso dass es auf seinen Hinterbeinen\nlaufen kann."
        es:
          ruby: "El cuerpo de MARSHTOMP está cubierto\npor una fina película pegajosa gracias\na la cual puede vivir en tierra.\fCuando la marea está baja, a este\nPOKéMON le encanta jugar en el fango."
          sapphire: "MARSHTOMP se desplaza más rápido por\nel lodo que por el agua. Los cuartos\ntraseros de este POKéMON muestran\fun desarrollo más que evidente, que le\nhan proporcionado la habilidad de andar\nsólo sobre las patas traseras."
swampert:
  species_id: 260
  names:
    jp_kana: ラグラージ
    en: SWAMPERT
    fr: LAGGRON
    it: SWAMPERT
    de: SUMPEX
    es: SWAMPERT
  forms:
