      descriptions:
        jp_kana:
          ruby: "からだの　なかでは　しゃくねつの　ようがんが\nうずまいているが　ひえると　かたまって　しまい\nくずれて　からだが　ちいさく　なっていく。"
          sapphire: "からだの　なかでは　けつえきの　かわりに\nひつような　えいようと　さんそを　はこぶために\nしゃくねつの　マグマが　じゅんかんしている。"
        en:
          ruby: "Molten magma courses throughout\nSLUGMA’s circulatory system.\nIf this POKéMON is chilled, the magma\fcools and hardens. Its body turns\nbrittle and chunks fall off, reducing\nits size."
          sapphire: "SLUGMA does not have any blood in its\nbody. Instead, intensely hot magma\ncirculates throughout this POKéMON’s\fbody, carrying essential nutrients and\noxygen to its organs."
        fr:
          ruby: "Du magma en fusion coule dans les\nveines de LIMAGMA. Si ce POKéMON\nest refroidi, le magma se solidifie.\fSon corps devient alors cassant et des\nmorceaux s’en détachent,\ndiminuant ainsi sa taille."
          sapphire: "Les veines de LIMAGMA ne contiennent\npas de sang. Au lieu de ça, du magma en\nfusion circule dans le corps de ce\fPOKéMON, apportant les nutriments et\nl’oxygène nécessaires à ses organes."
        it:
          ruby: "Nel corpo di SLUGMA scorre magma\nliquido. In caso di congelamento, il\nmagma si raffredda e si solidifica.\fIl corpo diventa fragile e cade a pezzi\nconsumandosi progressivamente."
          sapphire: "Nel corpo di SLUGMA non scorre\nnemmeno una goccia di sangue,\nbensì magma rovente,\fche garantisce l’apporto di ossigeno\ne sostanze nutritive fondamentali\nper i suoi organi."
        de:
          ruby: "Durch SCHNECKMAGs Kreislaufsystem\nfließt Magma. Wenn dieses POKéMON\nerkältet ist, kühlt das Magma\faus und erhärtet. Sein Körper wird\nspröde und es brechen Stücke heraus,\nso dass es kleiner wird."
          sapphire: "SCHNECKMAG hat kein Blut in seinem\nKörper. Stattdessen fließt glühend\nheißes Magma in diesem POKéMON,\fdas seine Organe mit lebenswichtigen\nNährstoffen und Sauerstoff versorgt."
        es:
          ruby: "Por el sistema circulatorio de SLUGMA\ncorre magma líquido. Si este POKéMON\nse enfriara, el magma perdería el calor\fy se solidificaría, con lo que se\nresquebrajaría entero, perdería trozos\ny reduciría su tamaño."
          sapphire: "SLUGMA no tiene sangre en su organismo,\nsino ardiente magma que hace circular\npor todo el cuerpo los nutrientes y el\foxígeno que necesitan sus órganos."
