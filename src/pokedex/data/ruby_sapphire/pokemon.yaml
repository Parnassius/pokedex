        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - monster
        - dragon
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          ruby: "あしの　うらの　ちいさな　トゲを　ひっかけて\nすいちょくの　カベを　のぼることが　できる。\nふとい　しっぽを　たたきつけて　こうげきする。"
          sapphire: "ちんちゃく　れいせい　なにごとにも　どうじない。\nからだの　おおきな　ポケモンに　にらまれても\nいっぽも　ひかずに　にらみかえすぞ。"
        en:
          ruby: "TREECKO has small hooks on the bottom\nof its feet that enable it to scale\nvertical walls.\fThis POKéMON attacks by slamming foes\nwith its thick tail."
          sapphire: "TREECKO is cool, calm, and collected -\nit never panics under any situation.\nIf a bigger foe were to glare at this\fPOKéMON, it would glare right back\nwithout conceding an inch of ground."
        fr:
          ruby: "ARCKO est doté de petits\ncrochets sous les pattes, ce qui lui\npermet de grimper aux murs.\fCe POKéMON attaque en frappant ses\nennemis avec son épaisse queue."
          sapphire: "ARCKO est cool, calme et serein. Il\nne panique jamais, quelle que soit la\nsituation. Quand un ennemi plus gros\fque lui lui lance un regard de défi,\nce POKéMON reste stoïque et ne cède\npas un centimètre de terrain."
        it:
          ruby: "TREECKO è dotato di piccoli uncini\nsulla pianta delle zampe inferiori, che\ngli consentono di camminare su pareti\fverticali. Attacca frustando i suoi\nnemici con la coda grossa e forte."
          sapphire: "TREECKO ha classe, è calmo e posato:\nnon si lascia mai prendere dal panico.\nQuando affronta un nemico più grande\fdi lui, lo fissa dritto negli occhi\nsenza la minima esitazione."
        de:
          ruby: "Mit den kleinen Haken unter seinen\nFüßen kann GECKARBOR an Wänden\nhochklettern. Dieses POKéMON greift\fFeinde an, indem es mit seinem\nmächtigen Schweif zuschlägt."
          sapphire: "GECKARBOR ist ruhig und beherrscht, es\ngerät niemals in Panik. Wenn es ein\nstärkerer Feind zornig anstarrt,\ferwidert es den bösen Blick, weicht aber\nkeinen Millimeter zurück."
        es:
          ruby: "TREECKO tiene unos ganchos pequeños\nen las plantas de los pies con los que\npuede escalar superficies verticales.\fEste POKéMON ataca dando un golpetazo\ncon la cola."
          sapphire: "TREECKO es carismático, tranquilo y\ntiene gran capacidad de autocontrol;\nno pierde la calma en ninguna situación.\fSi algún rival se le queda mirando\nfijamente, le devolverá la mirada sin\nceder ni lo más mínimo de su territorio."
grovyle:
  species_id: 253
  names:
    jp_kana: ジュプトル
    en: GROVYLE
    fr: MASSKO
    it: GROVYLE
    de: REPTAIN
    es: GROVYLE
  forms:
