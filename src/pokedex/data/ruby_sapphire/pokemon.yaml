      descriptions:
        jp_kana:
          ruby: "くびの　フサは　あまくて　こどもに　だいにんき。\nくだものが　だいこうぶつで　たべつづけて　いたら\nくびに　くだものが　できるように　なったらしい。"
          sapphire: "なんごくの　こどもたちは　トロピウスの　くびに\nなった　くだものの　フサを　おやつに　たべるよ。\nせなかの　はっぱを　はばたかせて　そらを　とぶ。"
        en:
          ruby: "The bunches of fruit around TROPIUS’s\nneck are very popular with children.\nThis POKéMON loves fruit, and eats it\fcontinuously. Apparently, its love for\nfruit resulted in its own outgrowth\nof fruit."
          sapphire: "Children of the southern tropics eat\nas snacks the fruit that grows in\nbunches around the neck of TROPIUS.\fThis POKéMON flies by flapping the\nleaves on its back as if they were\nwings."
        fr:
          ruby: "Les enfants adorent les fruits autour\ndu cou de TROPIUS.\nApparemment, son penchant pour les\ffruits l’a conduit à en faire pousser\nsur son propre corps. Il les aime tant\nqu’il en mange sans arrêt."
          sapphire: "Les enfants des tropiques mangent les\nfruits qui poussent autour du cou de\nTROPIUS pour leur goûter.\fCe POKéMON peut voler en agitant les\nfeuilles situées sur son dos, comme\ns’il s’agissait d’ailes."
        it:
          ruby: "Tutti i bambini conoscono i grappoli\ndi frutti penzolanti attorno al collo di\nTROPIUS. Anche il POKéMON stesso\fne mangia in continuazione. Pare che\nil suo amore per la frutta sia dovuto\nal fatto che egli stesso la produca."
          sapphire: "I bambini dei tropici meridionali fanno\nmerenda coi frutti che crescono a\ngrappoli attorno al collo di TROPIUS.\fQuesto POKéMON vola agitando le\nfoglie sulla schiena come se fossero\nali."
        de:
          ruby: "Die Früchte am Nacken von TROPIUS\nsind bei Kindern sehr beliebt. Dieses\nPOKéMON liebt Früchte und isst sie\fständig. Offensichtlich sind ihm wegen\ndieser Vorliebe selber Früchte\ngewachsen."
          sapphire: "Kinder aus den südlichen Tropen essen\ndie Früchte, die am Nacken von TROPIUS\nhängen, als Zwischenmahlzeit.\fDieses POKéMON kann fliegen, indem es\nmit den Blättern auf seinem Rücken\nschlägt, als ob es Flügel wären."
        es:
          ruby: "A los niños les encantan los racimos de\nfruta que TROPIUS tiene en el cuello.\nEste POKéMON siempre come fruta;\fle encanta. De hecho, ése parece ser el\nmotivo por el que él mismo da fruta."
          sapphire: "Los niños de la zona sur de los trópicos\nse comen los racimos de fruta que le\ncrecen a TROPIUS alrededor del cuello.\fEste POKéMON vuela batiendo las hojas\nque tiene en el lomo como si fueran alas."
chimecho:
  species_id: 358
  names:
    jp_kana: チリーン
    en: CHIMECHO
    fr: EOKO
    it: CHIMECHO
    de: PALIMPALIM
    es: CHIMECHO
  forms:
    chimecho:
      form_id: 0
      base_stats:
        hp: 65
        attack: 50
        defense: 70
        special_attack: 95
        special_defense: 80
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ruby: "こえを　からだの　くうどうに　はんきょうさせる。\nおこった　ときの　なきごえは　てきを　ふきとばす\nいりょくを　もった　ちょうおんぱに　なるぞ。"
          sapphire: "かぜが　つよくなると　きの　えだや　のきしたに\nあたまの　きゅうばんで　ぶらさがり　なきだす。\nながい　シッポで　きのみを　つまんで　たべる。"
        en:
          ruby: "CHIMECHO makes its cries echo\ninside its hollow body. When this\nPOKéMON becomes enraged, its cries\fresult in ultrasonic waves that have\nthe power to knock foes flying."
          sapphire: "In high winds, CHIMECHO cries as it\nhangs from a tree branch or the eaves\nof a building using a suction cup on its\fhead.\nThis POKéMON plucks berries with its\nlong tail and eats them."
        fr:
          ruby: "EOKO fait résonner son cri dans\nson corps creux. Lorsque ce POKéMON\nest en colère, les échos de son cri\fgénèrent des ultrasons capables\nd’envoyer voler des ennemis."
          sapphire: "Lorsqu’il y a beaucoup de vent, EOKO\npousse des cris, accroché à une\nbranche ou à un auvent\fpar une ventouse placée sur sa tête.\nCe POKéMON attrape des BAIES avec\nsa longue queue pour les manger."
        it:
          ruby: "CHIMECHO fa riecheggiare il suo verso\ndentro al corpo vuoto. Quando s’infuria\femette onde ad ultrasuoni in grado di\nabbattere i nemici in volo."
          sapphire: "Quando soffia il vento forte, CHIMECHO\nemette il suo verso penzolando dai rami\ndegli alberi o dai cornicioni, a cui\fsi attacca con la ventosa che ha sul\ncapo. Con la sua lunga coda scova\nle bacche dal terreno e se ne ciba."
        de:
          ruby: "PALIMPALIMs Schreie hallen durch\nseinen hohlen Körper. Wenn dieses\nPOKéMON wütend wird, erzeugen\fseine Schreie Ultraschallwellen, die\nseine Feinde buchstäblich wegfegen\nkönnen."
          sapphire: "Bei starkem Wind hängt sich\nPALIMPALIM an einen Ast oder an die\nDachrinne eines Gebäudes, wobei es eine\fSaugkappe auf seinem Kopf benutzt.\nDas POKéMON pflückt mit seinem langen\nSchweif Beeren und verspeist sie."
        es:
          ruby: "CHIMECHO hace que sus gritos resuenen\ncon eco en su interior. Cuando\nse enfada, los chillidos se convierten\fen ondas ultrasónicas capaces de\nderribar a los enemigos voladores."
          sapphire: "Cuando hay viento fuerte, CHIMECHO\nchilla colgado de la rama de un árbol o de\nlos aleros de un edificio por la ventosa\fque tiene en la cabeza.\nEste POKéMON usa la larga cola que tiene\npara agarrar BAYAS y comérselas."
absol:
  species_id: 359
  names:
    jp_kana: アブソル
    en: ABSOL
    fr: ABSOL
    it: ABSOL
    de: ABSOL
    es: ABSOL
  forms:
    absol:
      form_id: 0
      base_stats:
        hp: 65
        attack: 130
        defense: 60
        special_attack: 75
        special_defense: 60
        speed: 75
      evs_yield:
        hp: 0
