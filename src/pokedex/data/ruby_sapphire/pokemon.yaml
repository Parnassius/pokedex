          sapphire: "くうきの　ふうせんを　つくる　ことが　できる。\nポケモンが　おぼれていると　くうきだまを　だして\nこきゅうが　できる　ように　してあげるのだ。"
        en:
          ruby: "AZUMARILL’s long ears are indispensable\nsensors. By focusing its hearing, this\nPOKéMON can identify what kinds of\fprey are around, even in rough and\nfast-running rivers."
          sapphire: "AZUMARILL can make balloons out of\nair. It makes these air balloons if it\nspots a drowning POKéMON.\fThe air balloons enable the POKéMON in\ntrouble to breathe."
        fr:
          ruby: "Les longues oreilles d’AZUMARILL sont\ndes capteurs indispensables. Lorsqu’il\nse concentre pour écouter, ce POKéMON\fpeut identifier les proies aux\nalentours, même dans les cours\nd’eau à fort courant ou les rapides."
          sapphire: "AZUMARILL peut faire des bulles d’air.\nIl fabrique ces bulles lorsqu’il voit\nun POKéMON en train de se noyer.\fLes bulles d’air permettent au POKéMON\nen difficulté de respirer."
        it:
          ruby: "Le lunghe orecchie di AZUMARILL sono\nsensori indispensabili. Concentrandosi\nsull’udito, è in grado di identificare\fche tipo di prede ci siano nelle\nvicinanze, anche in torrenti rapidi e\nimpetuosi."
          sapphire: "AZUMARILL riesce a creare bolle d’aria\nin grado di aiutare un POKéMON che\nsta per affogare. Quando ne vede uno,\fAZUMARILL gli manda una bolla\nper aiutarlo a respirare."
        de:
          ruby: "AZUMARILLs lange Ohren dienen ihm\nals unentbehrliche Sensoren. Wenn es\nsein Gehör fokussiert, kann dieses\fPOKéMON auch in reißenden Flüssen\nidentifizieren, welche Art von Beute\nsich in seiner Nähe befindet."
          sapphire: "AZUMARILL kann aus Luft Ballons\nmachen. Diese Luft-Ballons erzeugt es,\nwenn es ein ertrinkendes POKéMON\ferspäht. Durch die Ballons kann das\nPOKéMON, das in Schwierigkeiten \ngeraten ist, atmen."
        es:
          ruby: "AZUMARILL tiene unas orejas enormes,\nindispensables para hacer de sensores.\nAl aguzar el oído, este POKéMON puede\fidentificar qué tipo de presa tiene\ncerca. Puede detectarlo hasta en ríos\nde fuertes y rápidas corrientes."
          sapphire: "AZUMARILL puede hacer burbujas de aire\nsi ve a algún POKéMON que esté a punto\nde ahogarse.\fEstas burbujas de aire son básicas\npara que los POKéMON puedan seguir\nrespirando."
