        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          ruby: "どうもうな　うなりごえを　あげながら　しせいを\nひくく　している　ときは　こうげきの　まえぶれ。\nするどく　とがった　キバで　がぶりと　かみつく。"
          sapphire: "グループで　こうどうしていた　やせいの　ちが\nのこっているので　すぐれた　トレーナー　だけを\nリーダーと　みとめて　めいれいに　したがう。"
        en:
          ruby: "MIGHTYENA gives obvious signals when\nit is preparing to attack. It starts to\ngrowl deeply and then flattens its body.\fThis POKéMON will bite savagely with its\nsharply pointed fangs."
          sapphire: "MIGHTYENA travel and act as a pack\nin the wild. The memory of its life in the\nwild compels the POKéMON to obey only\fthose TRAINERS that it recognizes to\npossess superior skill."
        fr:
          ruby: "On peut facilement deviner quand\nGRAHYENA se prépare à attaquer. Il\ngrogne et se met à plat ventre.\fCe POKéMON mord sauvagement ses\nennemis avec ses crocs acérés."
          sapphire: "Les GRAHYENA vivent et se déplacent\nen meute. Ses réminiscences de la vie\nsauvage le poussent à n’obéir qu’aux\fDRESSEURS qu’il considère comme\nréellement talentueux."
        it:
          ruby: "MIGHTYENA invia chiari segnali quando\nsta preparando un attacco. Inizia a\nringhiare cupo e a lisciarsi il pelo.\fMorde selvaggiamente con le zanne\nappuntite ed affilate."
          sapphire: "Allo stato brado MIGHTYENA si sposta\ne agisce soltanto assieme al suo branco.\nA causa della sua natura selvatica\fobbedisce solo a quegli ALLENATORI\nche considera possedere abilità\nsuperiori."
        de:
          ruby: "MAGNAYEN sendet deutliche Signale\naus, wenn es sich auf einen Angriff\nvorbereitet. Es knurrt heftig und macht\fsich flach. Dieses POKéMON kann mit\nseinen spitzen Zähnen brutal zubeißen."
          sapphire: "MAGNAYEN zieht in Gruppen durch die\nWildnis. Durch seine Erfahrungen in der\nWildnis hört es nur auf TRAINER, die\faußergewöhnliche Fähigkeiten haben."
        es:
          ruby: "Es muy fácil prever cuándo va a atacar\nMIGHTYENA; se pone a gruñir con fuerza\ny se estira.\fEste POKéMON da unos mordiscos\ntremendos con los afilados colmillos\nque tiene."
          sapphire: "MIGHTYENA se desplaza y vive\ncon su jauría en estado salvaje.\nPor eso, acostumbrado a esta libertad,\fobedece al ENTRENADOR al que\nconsidere realmente dotado\nde habilidades superiores al resto."
zigzagoon:
  species_id: 263
  names:
    jp_kana: ジグザグマ
    en: ZIGZAGOON
    fr: ZIGZATON
    it: ZIGZAGOON
    de: ZIGZACHS
    es: ZIGZAGOON
  forms:
    zigzagoon:
      form_id: 0
      base_stats:
        hp: 38
        attack: 30
        defense: 41
        special_attack: 30
        special_defense: 41
