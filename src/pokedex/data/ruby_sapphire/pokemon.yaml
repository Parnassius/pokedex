      descriptions:
        jp_kana:
          ruby: "からだの　なかでは　けつえきの　かわりに\nきょうりょくな　じりょくが　めぐっている。\nじりょくの　はどうで　なかまと　かいわする。"
          sapphire: "からだから　でている　じりょくと　ちきゅうの\nじりょくを　はんぱつさせて　ちゅうに　うかぶ。\nおしりの　ツメを　がけに　くいこませて　ねむる。"
        en:
          ruby: "Instead of blood, a powerful magnetic\nforce courses throughout BELDUM’s\nbody. This POKéMON communicates with\fothers by sending controlled pulses of\nmagnetism."
          sapphire: "BELDUM keeps itself floating by\ngenerating a magnetic force that\nrepels earth’s natural magnetism.\fWhen it sleeps, this POKéMON anchors\nitself to a cliff using the hooks on\nits rear."
        fr:
          ruby: "Au lieu du sang, une force magnétique\ntrès puissante coule dans les veines de\nTERHAL. Ce POKéMON communique\favec les autres en envoyant des\npulsations magnétiques."
          sapphire: "TERHAL peut léviter en générant un\nchamp magnétique qui repousse le\nmagnétisme naturel de la terre.\fLorsqu’il dort, ce POKéMON s’ancre à une\nfalaise grâce à ses crochets dorsaux."
        it:
          ruby: "Al posto del sangue, il corpo di BELDUM\nè attraversato da una potente\nforza magnetica.\fIl POKéMON comunica\ncon gli altri inviando pulsazioni\nmagnetiche controllate."
          sapphire: "BELDUM fluttua nell’aria generando\nuna forza magnetica contraria alla\nnaturale forza di gravità terrestre.\fQuando dorme, si ancora alle\nscogliere usando il suo gancio\nposteriore."
        de:
          ruby: "Anstelle von Blut fließt eine starke\nmagnetische Energie durch TANHELs\nKörper. Dieses POKéMON kommuniziert\fmit anderen, indem es kontrollierte\nmagnetische Impulse aussendet."
          sapphire: "TANHEL hält sich am Schweben, indem es\neine magnetische Kraft erzeugt, die die\nnatürliche Anziehungskraft der Erde\fabstößt. Wenn es schläft, verankert\nsich dieses POKéMON mit den Haken an\nseinem Hinterteil an einem Felsen."
        es:
          ruby: "En lugar de sangre, BELDUM tiene una\npoderosa fuerza magnética corriéndole\npor las venas.\fEste POKéMON se comunica enviando\ncontrolados impulsos magnéticos."
          sapphire: "BELDUM se mantiene flotando en el aire\ngracias a la fuerza magnética que\ngenera y que repele la gravedad.\fPara dormir, este POKéMON se ancla a los\nriscos usando los ganchos que tiene."
metang:
