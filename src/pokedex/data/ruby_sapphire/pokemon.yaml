        special_defense: 0
        speed: 0
      types:
        - dark
        - ghost
      egg_groups:
        - human_like
      abilities:
        - keen_eye
      descriptions:
        jp_kana:
          ruby: "どうくつの　おくで　ひっそりと　せいかつする。\nくらやみで　ひとみが　あやしく　かがやく　とき\nひとの　たましいを　うばうと　おそれられている。"
          sapphire: "するどい　ツメで　つちを　ほり　いしを　たべる。\nいしに　ふくまれた　せいぶんは　けっしょうとなり\nからだの　ひょうめんに　うかびあがってくる。"
        en:
          ruby: "SABLEYE lead quiet lives deep inside\ncaverns. They are feared, however,\nbecause these POKéMON are thought to\fsteal the spirits of people when their\neyes burn with a sinister glow in the\ndarkness."
          sapphire: "SABLEYE digs the ground with sharpened\nclaws to find rocks that it eats.\nSubstances in the eaten rocks\fcrystallize and rise up to the POKéMON’s\nbody surface."
        fr:
          ruby: "Les TENEFIX mènent une vie\ntranquille dans les cavernes. Pourtant,\nils sont craints, car on raconte que ces\fPOKéMON volent l’esprit des gens quand\nleurs yeux brillent dans l’obscurité."
          sapphire: "TENEFIX creuse le sol avec ses\ngriffes acérées pour trouver des\nrochers à manger. Les substances\fdes rochers avalés se cristallisent\net remontent sur la peau de\nce POKéMON."
        it:
          ruby: "SABLEYE conduce una vita tranquilla\nnel profondo delle grotte. Tuttavia, è\nmolto temuto perché si dice che rubi\flo spirito degli umani con lo sguardo\nsinistro dei suoi occhi opalescenti\nche fendono le tenebre."
          sapphire: "SABLEYE scava il terreno con i suoi\nartigli affilati per trovare le pietre\ndi cui si nutre.\fLe sostanze ingerite si cristallizzano\ned emergono a livello epidermico."
        de:
          ruby: "ZOBIRIS führt ein ruhiges, \nzurückgezogenes Leben tief im Innern\neiner Höhle. Es ist aber trotzdem sehr\fgefürchtet, da man sagt, es stehle die\nSeelen der Menschen, wenn seine Augen\nim Dunkeln Furcht erregend funkeln."
          sapphire: "ZOBIRIS durchwühlt mit seinen scharfen\nKrallen den Erdboden auf der Suche nach\nSteinen, von denen es sich ernährt.\fDie Substanzen in den Steinen nehmen\nschließlich eine feste Form an und\ngelangen auf seine Körperoberfläche."
        es:
          ruby: "Los SABLEYE hacen una vida muy\ntranquila en cavernas. Pero son muy\ntemidos; se dice que, cuando los ojos\fles brillan de manera siniestra,\nestán robándole el alma a alguien."
          sapphire: "SABLEYE cava en el suelo para buscar\ncon las afiladas garras que tiene rocas\npara comer.\fLas sustancias que hay en las rocas que\ningiere se solidifican y se le quedan\nen la piel."
mawile:
  species_id: 303
  names:
    jp_kana: クチート
    en: MAWILE
    fr: MYSDIBULE
    it: MAWILE
    de: FLUNKIFER
    es: MAWILE
