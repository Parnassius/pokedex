          sapphire: "ドリルに　なる　ツノで　がんせきを　はかいする。\nマグマを　ふきださせてしまう　ことも　あるが\nよろいの　ような　ひふは　あつさを　かんじない。"
        en:
          ruby: "RHYDON’s horn can crush even uncut\ndiamonds. One sweeping blow of its tail\ncan topple a building.\fThis POKéMON’s hide is extremely tough.\nEven direct cannon hits don’t leave\na scratch."
          sapphire: "RHYDON has a horn that serves as a\ndrill. It is used for destroying rocks\nand boulders.\fThis POKéMON occasionally rams into\nstreams of magma, but the armor-like\nhide prevents it from feeling the heat."
        fr:
          ruby: "La corne de RHINOFEROS peut même\ncasser du diamant brut. Et avec un\nsimple coup de queue, il peut détruire\fun bâtiment. La peau de ce POKéMON est\nincroyablement dure. Un boulet de canon\nne lui ferait même pas une égratignure."
          sapphire: "La corne de RHINOFEROS lui sert de\nforeuse. Il l’utilise pour détruire des\nrochers et des cailloux.\fCe POKéMON charge de temps en\ntemps dans du magma en fusion, mais\nsa peau blindée le protège de la chaleur."
        it:
          ruby: "Il corno di RHYDON riesce a fracassare\nanche un diamante grezzo. Un colpo\ndella sua coda abbatte un edificio.\fLa pelle-armatura di questo POKéMON è\ncosì coriacea da essere immune anche\nalle cannonate."
          sapphire: "RHYDON è dotato di un corno che usa\na mo’ di trapano. Serve a distruggere\nrocce e massi.\fTalvolta questo POKéMON s’imbatte in\nrivoli di magma, ma la sua pelle-armatura\nlo protegge dall’eccessivo calore."
        de:
          ruby: "Mit seinem Horn kann RIZEROS selbst\nDiamanten zerbrechen. Ein einziger\nHieb mit seinem Schweif kann ein Haus\fzum Einsturz bringen. Die Haut dieses\nPOKéMON ist so hart, dass nicht einmal\nKanonenkugeln Kratzer hinterlassen."
          sapphire: "RIZEROS hat ein Horn, das es als Bohrer\nbenutzen kann. Damit zerstört es \nFelsblöcke und Steine. Dieses POKéMON\frammt sein Horn manchmal in Ströme von\nMagma. Seine panzerähnliche Haut\nschützt es dabei vor der Hitze."
        es:
          ruby: "RHYDON tiene un cuerno capaz de\nhoradar hasta un diamante en bruto.\nY con una sacudida de la cola puede\fderribar un edificio. La piel de este\nPOKéMON es muy fuerte; ni los disparos\nde un cañón le arañarían."
          sapphire: "RHYDON tiene un cuerno anillado\nque le sirve de taladro. Le resulta\nmuy útil para horadar rocas y piedras.\fA veces, se queda atrapado en\ncorrientes de magma, pero la tosca\npiel que tiene impide que sienta el calor."
