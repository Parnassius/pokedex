        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - dark
      egg_groups:
        - field
        - grass
      abilities:
        - chlorophyll
        - early_bird
      descriptions:
        jp_kana:
          ruby: "じゅれい　１０００ねんを　こえた　たいぼくの\nてっぺんに　すむと　いわれる　なぞの　ポケモン。\nはっぱの　うちわで　きょうふうを　まきおこす。"
          sapphire: "おおきな　うちわは　ふうそく　３０メートルの\nきょうふうを　おこし　なんでも　ふきとばす。\nもりの　おくで　ひっそり　くらす　ポケモンだ。"
        en:
          ruby: "SHIFTRY is a mysterious POKéMON that\nis said to live atop towering trees \ndating back over a thousand years.\fIt creates terrific windstorms with\nthe fans it holds."
          sapphire: "SHIFTRY’s large fans generate awesome\ngusts of wind at a speed close to 100\nfeet per second. The whipped-up wind\fblows anything away.\nThis POKéMON chooses to live quietly\ndeep in forests."
        fr:
          ruby: "TENGALICE est un mystérieux POKéMON\nvivant dans les cimes d’immenses arbres,\nvieux de plus de mille ans.\fIl peut créer de formidables tempêtes\ngrâce à ses éventails."
          sapphire: "Les grands éventails de TENGALICE\npeuvent déclencher des bourrasques\nde vent allant jusqu’à 30 m/s. Le vent\fdéchaîné peut tout envoyer balader.\nCe POKéMON a choisi de vivre\ntranquillement dans la forêt."
        it:
          ruby: "SHIFTRY è un POKéMON misterioso\nche vive sulla cima degli alberi più alti,\ndi solito plurisecolari.\fUsa le foglie degli arti superiori\ncome ventole per generare\nterribili raffiche di vento."
          sapphire: "Le grandi ventole di SHIFTRY generano\nforti raffiche di vento alla velocità\ndi 30 metri al secondo. La violenza\fdel vento spazza via ogni cosa.\nVive pacifico nel cuore della foresta."
        de:
          ruby: "TENGULIST ist ein geheimnisvolles\nPOKéMON, das angeblich auf hohen\nBäumen lebt, die tausende von Jahren\falt sind. Mit den Blätterventilatoren an\nseinen Händen kann es heftige Stürme\nerzeugen."
          sapphire: "TENGULISTs große Fächer erzeugen\nBöen, die eine Geschwindigkeit von\n30 m/sek erreichen können und alles\fund jeden hinwegfegen können. Dieses\nPOKéMON lebt still und zurückgezogen\nin den Tiefen der Wälder."
        es:
          ruby: "SHIFTRY es un enigmático POKéMON\nque vive, dicen, en las copas\nde los árboles milenarios.\fEste POKéMON genera fuertes\ncorrientes de aire con los abanicos\nque lleva en las manos."
          sapphire: "Los grandes colmillos de SHIFTRY\ngeneran grandes corrientes de aire que\npueden alcanzar 30 metros por segundo\fy barrer lo que sea.\nEste POKéMON opta por vivir\nen el bosque con tranquilidad."
taillow:
  species_id: 276
  names:
    jp_kana: スバメ
    en: TAILLOW
    fr: NIRONDELLE
    it: TAILLOW
    de: SCHWALBINI
    es: TAILLOW
  forms:
    taillow:
      form_id: 0
      base_stats:
        hp: 40
        attack: 55
        defense: 30
        special_attack: 30
        special_defense: 30
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - guts
      descriptions:
        jp_kana:
          ruby: "どんな　つよい　あいてでも　ゆうかんに　いどむ。\nまけても　へこたれない　こんじょうの　もちぬし。\nおなかが　すくと　おおごえで　ないて　しまう。"
          sapphire: "すだちを　おえたばかり　なので　よるに　なると\nさみしく　なって　ないてしまう　ことも　ある。\nもりに　すむ　ケムッソを　つかまえて　たべる。"
        en:
          ruby: "TAILLOW courageously stands its\nground against foes, however strong\nthey may be.\fThis gutsy POKéMON will remain defiant\neven after a loss. On the other hand,\nit cries loudly if it becomes hungry."
          sapphire: "TAILLOW is young - it has only just\nleft its nest. As a result, it sometimes\nbecomes lonesome and cries at night.\fThis POKéMON feeds on WURMPLE that\nlive in forests."
        fr:
          ruby: "NIRONDELLE défend courageusement\nson territoire contre ses ennemis, même\nles plus puissants.\fCe vaillant POKéMON est toujours prêt à\nrelever un défi, mais s’il a faim, il\nse met à pleurer à chaudes larmes."
          sapphire: "NIRONDELLE est jeune. Il vient de\nquitter son nid. Du coup, il se sent\nparfois un peu seul et pleure la nuit.\fCe POKéMON se nourrit des CHENIPOTTE\nqu’il trouve dans les forêts."
        it:
          ruby: "TAILLOW affronta coraggiosamente\npersino i nemici più forti.\fAnche in caso di sconfitta rimane fiero\ne spavaldo. D’altra parte, quando ha\nfame, si lamenta rumorosamente."
          sapphire: "TAILLOW è molto piccolo, infatti\nha appena lasciato il nido. Talvolta\ndi notte si sente solo e piange.\fSi nutre dei WURMPLE che vivono\nnella foresta."
        de:
          ruby: "Mutig behauptet SCHWALBINI sein\nTerritorium gegen Eindringlinge, so\nstark diese auch sein mögen.\fDieses unerschrockene POKéMON bleibt\ntrotz einer Niederlage angriffslustig,\nheult aber laut, wenn es Hunger hat."
          sapphire: "SCHWALBINI ist noch klein, es hat\ngerade erst sein Nest verlassen. Daher\nfühlt es sich manchmal einsam und weint\fnachts. Dieses POKéMON ernährt sich\nvon WAUMPEL."
        es:
          ruby: "TAILLOW se mantiene firme ante sus\nrivales, sean lo fuertes que sean.\nEste valiente POKéMON seguirá\fmostrándose desafiante, aunque pierda\nen combate. Además, si se enfada,\nse pondrá a gritar con energía."
          sapphire: "TAILLOW es pequeño, está recién salido\ndel nido. Por eso se siente solo\ncon frecuencia y se pone a piar.\fEste POKéMON se alimenta de los\nWURMPLE que hay por el bosque."
swellow:
  species_id: 277
  names:
    jp_kana: オオスバメ
    en: SWELLOW
    fr: HELEDELLE
    it: SWELLOW
    de: SCHWALBOSS
    es: SWELLOW
  forms:
    swellow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 60
        special_attack: 50
        special_defense: 50
        speed: 125
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - guts
      descriptions:
        jp_kana:
          ruby: "はるか　じょうくうを　えんを　えがく　ように\nとびまわり　えものを　みつけると　きゅうこうか。\nあしの　ツメで　がっしり　つかんで　にがさない。"
          sapphire: "ツヤの　ある　はねの　ていれは　おこたらない。\nオオスバメが　２ひき　あつまると　かならず\nおたがいの　はねを　きれいに　ていれするぞ。"
        en:
          ruby: "SWELLOW flies high above our heads,\nmaking graceful arcs in the sky.\nThis POKéMON dives at a steep angle as\fsoon as it spots its prey. The hapless\nprey is tightly grasped by SWELLOW’s\nclawed feet, preventing escape."
          sapphire: "SWELLOW is very conscientious about\nthe upkeep of its glossy wings.\nOnce two SWELLOW are gathered, they\fdiligently take care of cleaning each\nother’s wings."
        fr:
          ruby: "HELEDELLE vole dans les cieux en\ndessinant de grands arcs.\nCe POKéMON plonge en piqué dès\fqu’il repère sa proie. Il attrape\nfermement la malheureuse cible dans\nses serres, empêchant toute fuite."
          sapphire: "HELEDELLE fait attention à bien\nentretenir ses ailes brillantes. Lorsque\ndeux HELEDELLE se rencontrent,\fils se nettoient mutuellement les\nailes avec attention."
        it:
          ruby: "SWELLOW vola alto sopra le nostre teste\ndisegnando armoniosi archi in cielo.\nAppena scova una preda si lancia su\fdi essa in picchiata. SWELLOW cattura\npoi la sventurata preda con le sue\nzampe artigliate impedendole la fuga."
          sapphire: "SWELLOW è molto attento a mantenere\nle proprie ali sempre lucide e splendenti.\nSpesso si incontra coi propri simili\fe questi POKéMON in gruppo si lisciano\nvicendevolmente le piume."
        de:
          ruby: "Dieses POKéMON taucht in einem steilen\nWinkel ab, sobald es Beute wahrgenommen\nhat. Es packt seine Beute mit\fseinen Krallen und lässt sie\nnicht mehr entkommen."
          sapphire: "SCHWALBOSS ist sehr gewissenhaft bei\nder Pflege seiner glänzenden Flügel.\nWenn zwei SCHWALBOSS zusammen sind,\fputzen sie sich ihre Flügel gegenseitig."
        es:
          ruby: "SWELLOW vuela muy alto dibujando\nelegantes arcos en el cielo.\nEste POKéMON se sumerge en el agua con\frapidez y eficacia en cuanto detecta\nuna presa. Con las garras, atrapa a la \ndesdichada víctima y no la deja huir."
          sapphire: "SWELLOW se preocupa a conciencia del\nmantenimiento de sus lustrosas alas.\nCuando hay dos juntos, el uno se ocupa\fde limpiarle las alas al otro."
wingull:
  species_id: 278
  names:
    jp_kana: キャモメ
    en: WINGULL
    fr: GOELISE
    it: WINGULL
    de: WINGULL
    es: WINGULL
  forms:
    wingull:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 30
        special_attack: 55
        special_defense: 30
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
        - flying
      egg_groups:
        - water_1
        - flying
      abilities:
        - keen_eye
      descriptions:
        jp_kana:
          ruby: "エサや　だいじな　ものを　くちばしに　はさみ\nいろんな　ばしょに　かくす　しゅうせいを　もつ。\nかぜに　のって　すべる　ように　そらを　とぶ。"
          sapphire: "うみから　ふく　じょうしょう　きりゅうに　のり\nほそながい　つばさを　のばして　かっくうする。\nながい　くちばしは　エサを　とるときに　べんり。"
        en:
          ruby: "WINGULL has the habit of carrying prey\nand valuables in its beak and hiding\nthem in all sorts of locations.\fThis POKéMON rides the winds and flies\nas if it were skating across the sky."
          sapphire: "WINGULL rides updrafts rising from the\nsea by extending its long and narrow\nwings to glide.\fThis POKéMON’s long beak is useful for\ncatching prey."
        fr:
          ruby: "GOELISE a l’habitude de transporter\nses proies et ses objets de valeur dans\nson bec avant de les cacher.\fCe POKéMON se laisse porter par le\nvent et vole comme s’il surfait\ndans les cieux."
          sapphire: "Grâce à ses ailes longues et étroites,\nGOELISE se laisse porter par les\ncourants d’air ascendants venant\fde la mer. Le long bec de ce POKéMON\nest bien pratique pour attraper\nses proies."
        it:
          ruby: "WINGULL ha l’abitudine di trasportare\nprede e oggetti preziosi nel becco\nper poi nasconderli dappertutto.\fQuesto POKéMON vola a cavallo dei venti\nplanando in cielo."
          sapphire: "WINGULL segue le correnti ascensionali\npresenti sul mare allargando le sue ali\nlunghe e strette per planare.\fIl lungo becco del POKéMON è utile\nper catturare la preda."
        de:
          ruby: "Man sieht WINGULL oft mit seiner\nBeute oder seinen Besitztümern im\nSchnabel herumfliegen auf der Suche\fnach geeigneten Verstecken. Dieses\nPOKéMON fliegt durch die Lüfte, als\nwürde es gleiten."
          sapphire: "WINGULL breitet seine langen, schmalen\nFlügel aus und segelt im Seewind. Der\nlange Schnabel dieses POKéMON\fist ihm beim Jagen nach Beute sehr\nhilfreich."
        es:
          ruby: "WINGULL tiene la costumbre de llevar a\nsu presa y objetos de valor en el pico,\ny esconderlos en distintos sitios.\fEste POKéMON vuela dejándose llevar\npor las corrientes de aire como si fuera\npatinando por el cielo."
          sapphire: "WINGULL emerge del mar y asciende\ndesplegando las largas y estrechas\nalas que posee.\fEste POKéMON tiene un pico largo\nque le resulta muy útil para pescar."
pelipper:
  species_id: 279
  names:
    jp_kana: ペリッパー
    en: PELIPPER
    fr: BEKIPAN
    it: PELIPPER
    de: PELIPPER
