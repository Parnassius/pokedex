        fr:
          ruby: "Un bourgeon a poussé sur le dos de ce\nPOKéMON. Pour en supporter le poids,\nHERBIZARRE a dû se muscler les pattes.\fLorsqu’il commence à se prélasser au\nsoleil, ça signifie que son bourgeon va\néclore, donnant naissance à une fleur."
          sapphire: "Un bourgeon a poussé sur le dos de ce\nPOKéMON. Pour en supporter le poids,\nHERBIZARRE a dû se muscler les pattes.\fLorsqu’il commence à se prélasser au\nsoleil, ça signifie que son bourgeon va\néclore, donnant naissance à une fleur."
        it:
          ruby: "C’è un germoglio piantato nella schiena\ndi IVYSAUR. Per sopportarne il peso, le\nzampe e il corpo crescono robusti.\fQuando inizia a passare più tempo\nesposto al sole, significa che il germo-\nglio sboccerà presto in un grande fiore."
          sapphire: "C’è un germoglio piantato nella schiena\ndi IVYSAUR. Per sopportarne il peso, le\nzampe e il corpo crescono robusti.\fQuando inizia a passare più tempo\nesposto al sole, significa che il germo-\nglio sboccerà presto in un grande fiore."
        de:
          ruby: "BISAKNOSP hat eine Knospe auf seinem\nRücken. Beine und Rumpf sind kräftig\ngenug, um sein Gewicht zu tragen.\fWenn es lange in der Sonne liegt, ist das\nein Anzeichen dafür, dass die Knospe\nbald blüht."
          sapphire: "BISAKNOSP hat eine Knospe auf seinem\nRücken. Seine Beine und sein Stamm sind\nkräftig genug, um sein Gewicht zu\ftragen. Wenn es lange in der Sonne liegt,\nist das ein Anzeichen dafür, dass die\nKnospe bald blüht."
        es:
          ruby: "Este POKéMON lleva un bulbo en el lomo\ny, para poder con su peso, tiene unas\npatas y un tronco gruesos y fuertes.\fSi empieza a pasar más tiempo\nal sol, será porque el bulbo está\na punto de hacerse una flor grande."
          sapphire: "Este POKéMON lleva un bulbo en el lomo\ny, para poder con su peso, tiene unas\npatas y un tronco gruesos y fuertes.\fSi empieza a pasar más tiempo\nal sol, será porque el bulbo está\na punto de hacerse una flor grande."
