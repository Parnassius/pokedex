        en:
          ruby: "SKARMORY is entirely encased in hard,\nprotective armor. This POKéMON flies at\nclose to 190 mph.\fIt slashes foes with its wings that\npossess swordlike cutting edges."
          sapphire: "SKARMORY’s steel wings become tattered\nand bashed in from repeated battles.\nOnce a year, the battered wings grow\fback completely, restoring the cutting\nedges to their pristine state."
        fr:
          ruby: "AIRMURE est entièrement recouvert\nd’une armure très dure. Ce POKéMON\npeut voler à plus de 300 km/h.\fIl peut mettre ses ennemis en pièces\ngrâce à ses ailes tranchantes\ncomme des sabres."
          sapphire: "Les ailes d’acier d’AIRMURE s’abîment\net se cabossent à force de se battre.\nUne fois par an, les ailes endommagées\frepoussent complètement, rendant à\nleurs bords tranchants leur\nétat d’origine."
        it:
          ruby: "SKARMORY è interamente corazzato\nall’interno di una dura armatura di\nprotezione.\fVola alla velocità di 300 km/h.\nLacera il nemico con le sue ali\ntaglienti come la lama di una spada."
          sapphire: "Le ali d’acciaio di SKARMORY portano\ni segni e le ammaccature delle\nlotte. Una volta l’anno le ali ricrescono\fcompletamente, ripristinando\nil filo tagliente delle lame."
        de:
          ruby: "PANZAERON ist komplett in einen harten,\nschützenden Panzer eingehüllt. Dieses\nPOKéMON fliegt 300 km/h.\fEs greift seine Feinde mit seinen\nmesserscharfen Flügeln an."
          sapphire: "PANZAERONs Stahlflügel bekommen in den\nvielen Kämpfen, die es austrägt, Risse\nund Beulen. Einmal im Jahr wachsen\fseine Flügel komplett nach und werden\nwiederhergestellt."
        es:
          ruby: "SKARMORY está totalmente encerrado\nen el interior de una fuerte coraza\nprotectora.\fEn vuelo, puede llegar a alcanzar los\n300 km por hora y usa las afiladas\nalas que tiene para azotar al rival."
          sapphire: "A SKARMORY se le quedan las alas\nabolladas y hechas jirones tras varios\ncombates.\fUna vez al año, le vuelven a crecer\ncompletamente y a restaurar los bordes\ncortantes que tenían en un principio."
