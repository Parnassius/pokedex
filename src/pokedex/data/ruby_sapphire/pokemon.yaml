        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - static
        - lightning_rod
      descriptions:
        jp_kana:
          ruby: "たてがみから　いつも　ほうでんしているため\nひばなで　やまかじを　おこしてしまう　ことも。\nたたかいに　なると　かみなりぐもを　つくりだす。"
          sapphire: "たてがみから　つよい　でんきを　はっしている。\nくうきちゅうの　でんきを　たてがみに　あつめ\nあたまの　うえに　かみなりぐもを　つくりだす。"
        en:
          ruby: "MANECTRIC is constantly discharging\nelectricity from its mane. The sparks\nsometimes ignite forest fires.\fWhen it enters a battle, this POKéMON\ncreates thunderclouds."
          sapphire: "MANECTRIC discharges strong\nelectricity from its mane. The mane is\nused for collecting electricity in the\fatmosphere. This POKéMON creates\nthunderclouds above its head."
        fr:
          ruby: "La crinière d’ELECSPRINT libère\nconstamment de l’électricité. Les\nétincelles déclenchent parfois des feux\fde forêt. Au début de ses combats, ce\nPOKéMON crée des nuages orageux."
          sapphire: "ELECSPRINT peut libérer un courant\nintense de sa crinière. Cette crinière\nlui permet de récupérer l’électricité de\fl’atmosphère. Ce POKéMON peut créer\ndes nuages orageux au-dessus de\nsa tête."
        it:
          ruby: "MANECTRIC scarica costantemente\nl’elettricità dalla propria criniera.\nSpesso le scintille scatenano incendi\fnei boschi. In lotta questo POKéMON\ncrea nubi temporalesche."
          sapphire: "MANECTRIC scarica forti scosse\nelettriche dalla propria criniera,\nusata come collettore dell’elettricità\fpresente nell’atmosfera. Crea\ninoltre nubi temporalesche in cielo."
        de:
          ruby: "VOLTENSO entlädt ständig Elektrizität\naus seiner Mähne. Es fliegen dabei\nFunken, die zuweilen zu Waldbränden\fführen. In einem Kampf erzeugt dieses\nPOKéMON Gewitterwolken."
          sapphire: "VOLTENSO sammelt Elektrizität aus\nder Atmosphäre in seiner Mähne und\nentlädt diese. Dieses POKéMON erzeugt\fGewitterwolken über seinem Kopf."
        es:
          ruby: "MANECTRIC está continuamente\ndescargando electricidad por las\nmelenas, y a veces causa incendios\fen el bosque con las chispas que suelta.\nCuando entra en combate, este POKéMON\ncrea nubarrones."
          sapphire: "MANECTRIC acumula en las melenas la\nelectricidad que hay en el ambiente, y la\ndescarga a través de ellas en grandes\fdosis. Este POKéMON crea nubarrones\nque se le quedan por encima de la\ncabeza."
plusle:
  species_id: 311
  names:
    jp_kana: プラスル
    en: PLUSLE
    fr: POSIPI
    it: PLUSLE
    de: PLUSLE
    es: PLUSLE
  forms:
    plusle:
      form_id: 0
      base_stats:
        hp: 60
        attack: 50
        defense: 40
        special_attack: 85
        special_defense: 75
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - fairy
      abilities:
        - plus
      descriptions:
        jp_kana:
          ruby: "いつも　なかまを　おうえんしている　ポケモン。\nなかまが　がんばると　からだを　ショートさせて\nパチパチと　ひばなの　おとを　たてて　よろこぶ。"
          sapphire: "なかまを　おうえんする　ときは　ぜんしんから\nでんきの　ひばなを　だして　パチパチ　ひかる。\nなかまが　まけると　おおごえで　ないてしまう。"
        en:
          ruby: "PLUSLE always acts as a cheerleader\nfor its partners. Whenever a teammate\nputs out a good effort in battle, this\fPOKéMON shorts out its body to create\nthe crackling noises of sparks to show\nits joy."
          sapphire: "When PLUSLE is cheering on its partner,\nit flashes with electric sparks from all\nover its body.\fIf its partner loses, this POKéMON cries\nloudly."
        fr:
          ruby: "POSIPI sert de supporter à ses\npartenaires. Chaque fois qu’un membre\nde son équipe fait une belle action dans\fun combat, ce POKéMON court-circuite\nson corps et libère des étincelles\npour montrer sa joie."
          sapphire: "Quand POSIPI veut encourager\nson partenaire, des étincelles\njaillissent un peu partout de son\fcorps. Si son partenaire perd, ce\nPOKéMON pleure à chaudes larmes."
        it:
          ruby: "PLUSLE agisce sempre da mascotte\ndel gruppo. Ogni volta che un suo\ncompagno ottiene buoni risultati in\flotta, PLUSLE crea un cortocircuito\nper provocare l’allegro scoppiettio\ndelle scintille e dimostrare la sua gioia."
          sapphire: "Quando PLUSLE s’esibisce per\nrallegrare i suoi compagni, emana vivaci\nscintille elettriche da tutto il corpo.\fSe la sua squadra perde,\npiange rumorosamente."
        de:
          ruby: "PLUSLE dient seinen Artgenossen als\nCheerleader. Wenn ein Teamkamerad\nim Kampf erfolgreich ist, erzeugt es\fdas prasselnde Geräusch von Funken, um\nso seine Freude zu zeigen."
          sapphire: "Wenn PLUSLE seinen Partner anfeuert,\nsprüht es Funken aus seinem Körper.\nWenn sein Partner verliert, brüllt dieses\fPOKéMON laut."
        es:
          ruby: "PLUSLE siempre hace las veces de líder\ncon sus compañeros. Cuando algún\nmiembro de su grupo hace un gran\fesfuerzo en combate, causa un\ncortocircuito en su interior para\nmostrar con el chisporroteo su alegría."
          sapphire: "Cuando PLUSLE está animando a su\ncompañero, resplandece y provoca\nun chisporroteo que le rodea todo\fel cuerpo. Si su compañero pierde,\nse pone a chillar a voz en grito."
minun:
  species_id: 312
  names:
    jp_kana: マイナン
    en: MINUN
    fr: NEGAPI
    it: MINUN
    de: MINUN
    es: MINUN
  forms:
    minun:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 50
        special_attack: 75
        special_defense: 85
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - fairy
      abilities:
        - minus
      descriptions:
        jp_kana:
          ruby: "じぶんよりも　なかまの　おうえんが　だいじ。\nからだから　はっする　でんきを　ショートさせて\nはでに　ひばなを　だしながら　おうえんするぞ。"
          sapphire: "なかまの　おうえんが　だいすきな　ポケモン。\nなかまが　まけそうに　なると　からだから　でる\nひばなの　かずが　どんどん　ふえていくよ。"
        en:
          ruby: "MINUN is more concerned about cheering\non its partners than its own safety.\nIt shorts out the electricity in its\fbody to create brilliant showers of\nsparks to cheer on its teammates."
          sapphire: "MINUN loves to cheer on its partner in\nbattle. It gives off sparks from its\nbody while it is doing so.\fIf its partner is in trouble, this\nPOKéMON gives off increasing amounts\nof sparks."
        fr:
          ruby: "NEGAPI n’hésite pas à se mettre en\ndanger pour soutenir ses partenaires.\nIl court-circuite son corps pour faire\fjaillir des gerbes d’étincelles et donner\ndu cœur à l’ouvrage à ses équipiers."
          sapphire: "NEGAPI adore encourager son\npartenaire pendant les combats. Des\nétincelles jaillissent alors de son\fcorps. Lorsque son partenaire est en\ndifficulté, le corps de ce POKéMON\nlibère encore plus d’étincelles."
        it:
          ruby: "MINUN si impegna a tenere alto il morale\ndei suoi compagni di squadra, anche a\nrischio della sua stessa sicurezza.\fCrea vivaci cortocircuiti con\nla sua elettricità fisica per\nrallegrare tutta la squadra."
          sapphire: "MINUN ama tenere alto il morale della\nsquadra in lotta, emanando scintille\nda tutto il corpo.\fSe la sua squadra è in difficoltà,\nemette una maggiore quantità\ndi scintille."
        de:
          ruby: "MINUN kümmert sich mehr um das\nAnfeuern seiner Partner als um seine\neigene Sicherheit. Es nutzt die\fElektrizität in seinem Körper dazu,\neinen Funkenregen zu erzeugen und\nseine Teamkameraden anzufeuern."
          sapphire: "MINUN liebt es, seinen Partner im Kampf\nanzufeuern. Dabei sprüht es Funken aus\nseinem Körper. Wenn sein Partner in\fSchwierigkeiten gerät, sprüht es immer\nmehr Funken."
        es:
          ruby: "MINUN está más preocupado de animar\na sus compañeros de equipo\nque de su propia seguridad.\fPara animar a los miembros de su grupo,\ncrea un cortocircuito en su interior\ny libera un chisporroteo espectacular."
          sapphire: "MINUN empieza a echar chispas cuando\nestá animando a su compañero en pleno\ncombate.\fSi su compañero está en peligro,\nel chisporroteo aumenta su intensidad\npor momentos."
volbeat:
  species_id: 313
  names:
    jp_kana: バルビート
