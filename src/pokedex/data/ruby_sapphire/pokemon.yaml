      descriptions:
        jp_kana:
          ruby: "いっぽんあしで　かいてん　しながら　いどうする。\nヤジロンと　にんげんが　いっしょに　くらす\nこだいの　へきがが　いせきから　はっけんされた。"
          sapphire: "なかまを　みつけると　すぐに　あつまって　きて\nいっせいに　なきごえを　あげるので　うるさい。\nいっぽんあしで　きように　たったまま　ねむる。"
        en:
          ruby: "BALTOY moves while spinning around on\nits one foot. Primitive wall paintings\ndepicting this POKéMON living among\fpeople were discovered in some ancient\nruins."
          sapphire: "As soon as it spots others of its kind,\nBALTOY congregates with them and\nthen begins crying noisily in unison.\fThis POKéMON sleeps while cleverly\nbalancing itself on its one foot."
        fr:
          ruby: "BALBUTO se déplace en pivotant sur\nson unique pied. Des peintures\nrupestres montrant ce POKéMON vivant\favec les hommes furent découvertes\ndans des ruines très anciennes."
          sapphire: "Dès qu’il repère ses congénères,\nBALBUTO les rejoint et ils se\nmettent tous à crier en choeur.\fCe POKéMON arrive à dormir en\nrestant adroitement en équilibre."
        it:
          ruby: "BALTOY si muove piroettando sull’unica\nestremità inferiore del proprio corpo.\nLa scoperta di alcune rovine antiche\fha portato alla luce dipinti di questo\nPOKéMON che viveva a stretto\ncontatto con gli esseri umani."
          sapphire: "Appena incontra i propri simili,\nBALTOY forma un gruppo molto\nrumoroso.\fQuesto POKéMON dorme bilanciandosi\ncon maestria sull’unica estremità\ninferiore del proprio corpo."
        de:
          ruby: "PUPPANCE bewegt sich, indem es sich auf\nseinem Fuß im Kreis dreht. In sehr alten\nRuinen wurden primitive Wandmalereien\fentdeckt, die dieses POKéMON in\nBegleitung von Menschen zeigen."
          sapphire: "Sobald es Artgenossen bemerkt, tut\nsich PUPPANCE mit ihnen zusammen und\nsie brüllen gemeinsam. Dieses POKéMON\fschläft, während es geschickt auf \nseinem Fuß balanciert."
        es:
          ruby: "BALTOY se mueve girando alrededor\nde sí mismo sobre la extremidad inferior\nque tiene.\fEn unas ruinas antiguas, descubrieron\npinturas rupestres en las que aparecía\neste POKéMON conviviendo con personas."
          sapphire: "Al ver a más de los suyos, BALTOY\nse une al grupo y todos se ponen a\nchillar escandalosamente y al unísono.\fEste POKéMON duerme manteniendo\nhábilmente el equilibrio sobre\nla extremidad inferior que tiene."
claydol:
