        - run_away
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          ruby: "うごく　ものを　みつけると　すぐに　かみつく。\nえものが　ヘトヘトに　なるまで　おいかけまわすが\nはんげきされると　しりごみする　ことも　あるよ。"
          sapphire: "なんでも　たべる　ざっしょくせいの　ポケモン。\nからだに　くらべ　おおきな　キバが　とくちょう。\nしっぽの　けを　さかだてて　てきを　いかくする。"
        en:
          ruby: "At first sight, POOCHYENA takes a bite\nat anything that moves.\nThis POKéMON chases after prey until\fthe victim becomes exhausted.\nHowever, it may turn tail if the prey\nstrikes back."
          sapphire: "POOCHYENA is an omnivore - it will eat\nanything. A distinguishing feature is\nhow large its fangs are compared to\fits body. This POKéMON tries to\nintimidate its foes by making the hair\non its tail bristle out."
        fr:
          ruby: "Sans se poser de questions, MEDHYENA\nessaye de mordre tout ce qui bouge.\nCe POKéMON pourchasse sa proie\fjusqu’à ce qu’elle s’épuise. Cependant,\nil se peut qu’il prenne peur et s’enfuie\nsi la proie riposte."
          sapphire: "MEDHYENA est omnivore. Il mange de\ntout. Ses crocs sont très gros,\ncomparés à son corps.\fCe POKéMON essaie d’intimider ses\nennemis en hérissant les poils\nde sa queue."
        it:
          ruby: "POOCHYENA azzanna al minimo\nmovimento anche senza sapere cos’è.\nCaccia la sua preda finché questa\fnon è tanto stanca da cedere.\nTuttavia, se il nemico contrattacca,\nPOOCHYENA talvolta scappa."
          sapphire: "POOCHYENA è onnivoro: mangia di\ntutto. Una caratteristica distintiva è\nla dimensione delle zanne rispetto\fal corpo. Cerca di intimidire i nemici\nrizzando il pelo della coda."
        de:
          ruby: "Sobald FIFFYEN eine Bewegung wahr-\nnimmt, schnappt es zu. Es jagt seine\nBeute so lange, bis sie vollkommen\ferschöpft ist. Wenn sich die Beute\nallerdings wehrt, kann es passieren, \ndass FIFFYEN klein beigibt und flieht."
          sapphire: "FIFFYEN ist ein Allesfresser.\nAuffällig an diesem POKéMON ist das\nVerhältnis seiner Körpergröße zur\fLänge seiner Zähne. Es versucht Feinde\neinzuschüchtern, indem es die Haare an\nseinem Schweif abstehen lässt."
        es:
          ruby: "La primera reacción que POOCHYENA\ntiene al ver algo moverse es darle un\nmordisco. Este POKéMON persigue a su\fpresa hasta que cae agotada. Aunque,\na veces, sale huyendo si su presa le\nresponde con un ataque."
          sapphire: "POOCHYENA es un POKéMON omnívoro.\nSe come lo que sea. El gran tamaño de los\ncolmillos respecto al resto del cuerpo\fle dan una característica especial.\nEste POKéMON hace que se le erice la\ncola para intentar intimidar a su rival."
mightyena:
  species_id: 262
  names:
    jp_kana: グラエナ
    en: MIGHTYENA
    fr: GRAHYENA
    it: MIGHTYENA
    de: MAGNAYEN
    es: MIGHTYENA
