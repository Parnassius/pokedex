        jp_kana:
          ruby: "しげきを　あたえると　ガスの　どくそが　つよまり\nからだの　あちこちから　いきおいよく　ふきだす。\nまんまるに　ふくらんだ　あと　だいばくはつする。"
          sapphire: "なまゴミと　からだの　どくそを　かがくはんのう\nさせる　ことで　もうどくの　ガスを　つくりだす。\nきおんが　たかいほど　ガスが　たくさん　できる。"
        en:
          ruby: "If KOFFING becomes agitated, it raises\nthe toxicity of its internal gases and\njets them out from all over its body.\fThis POKéMON may also overinflate its\nround body, then explode."
          sapphire: "KOFFING embodies toxic substances.\nIt mixes the toxins with raw garbage to\nset off a chemical reaction that\fresults in a terribly powerful poison\ngas. The higher the temperature, the\nmore gas is concocted by this POKéMON."
        fr:
          ruby: "Lorsque SMOGO s’agite, ça augmente la\ntoxicité de ses gaz internes. Il les\nprojette ensuite par les nombreux\forifices de son corps. Ce POKéMON peut\naussi gonfler son corps et le\nfaire exploser."
          sapphire: "SMOGO est composé de substances\ntoxiques. Il mélange des toxines et des\ndétritus pour déclencher une réaction\fchimique générant un gaz très dange-\nreux. Plus la température est élevée,\nplus la quantité de gaz est importante."
        it:
          ruby: "Se KOFFING si agita, aumenta la\ntossicità dei suoi gas interni e li\nespelle violentemente da tutto il corpo.\fQuesto POKéMON riesce anche a\ngonfiarsi fino al punto di esplodere."
          sapphire: "KOFFING consiste di sostanze velenose.\nMischia tossine con rifiuti putrefatti\nper scatenare reazioni chimiche\fche generano un micidiale gas velenoso.\nCon l’aumento della temperatura, sale\nla quantità di gas prodotto da KOFFING."
        de:
          ruby: "Wenn SMOGON sich aufregt, lässt es\ndas giftige Gas in seinem Inneren\nentweichen. Wenn es sich zu sehr\faufbläht, explodiert dieses POKéMON."
          sapphire: "SMOGONs Körper enthält giftige\nSubstanzen. Es vermischt die Toxine mit\nMüll, um eine chemische Reaktion in Gang\fzu bringen, die ein unheimlich starkes\nGiftgas hervorbringt. Je höher die Tem-\nperatur, desto mehr Gas produziert es."
        es:
          ruby: "Si KOFFING se pone nervioso, aumenta\nel nivel de toxicidad de los gases que\ntiene y los expulsa por todo el cuerpo.\fTambién suele hincharse mucho hasta\nllegar a explotar."
          sapphire: "KOFFING contiene sustancias tóxicas\nque mezcla con desperdicios para\nprovocar una reacción química que\flibera un gas tremendamente venenoso.\nA mayor temperatura, mayor será la\ncantidad de gas que cree este POKéMON."
