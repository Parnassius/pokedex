      descriptions:
        jp_kana:
          ruby: "いつも　あっち　こっちへ　ジグザグ　あるくのは\nこうきしんが　とても　つよくて　めに　うつる\nいろんな　ものに　きょうみを　もつからだ。"
          sapphire: "せなかの　かたい　けを　じゅもくに　こすりつけ\nじぶんの　なわばりで　ある　しるしを　つける。\nしんだ　ふりを　して　てきの　めを　ごまかすぞ。"
        en:
          ruby: "ZIGZAGOON restlessly wanders\neverywhere at all times. This POKéMON\ndoes so because it is very curious.\fIt becomes interested in anything\nthat it happens to see."
          sapphire: "The hair on ZIGZAGOON’s back is \nbristly. It rubs the hard back hair\nagainst trees to leave its territorial\fmarkings.\nThis POKéMON may play dead to fool foes\nin battle."
        fr:
          ruby: "ZIGZATON se promène nerveusement\nun peu partout. En effet, ce POKéMON\nest très curieux.\fTout ce qu’il voit l’intéresse."
          sapphire: "Les poils sur le dos de ZIGZATON sont\ndurs. Il frotte son dos contre les\narbres pour marquer son territoire.\fCe POKéMON fait parfois le mort pour\ntromper ses ennemis au combat."
        it:
          ruby: "ZIGZAGOON scorrazza a destra e a manca\nsenza sosta, a causa della sua indole\nmolto curiosa.\fQualunque cosa veda riesce\nad attirare la sua attenzione."
          sapphire: "La schiena di ZIGZAGOON è\ncaratterizzata da una folta pelliccia\nrizzata. Per delimitare il suo territorio\fstrofina il suo pelo irsuto contro\ni tronchi degli alberi. Per confondere\ni nemici, in lotta si finge morto."
        de:
          ruby: "ZIGZACHS ist ein rastloser Wanderer.\nDieses POKéMON ist nämlich sehr\nneugierig und es inspiziert alles,\fwas ihm zufällig begegnet."
          sapphire: "Das Haar auf ZIGZACHS’ Rücken ist\nstruppig. Es reibt seine Rückenborsten\nan Bäumen, um sein Revier zu markieren.\fDieses POKéMON stellt sich im Kampf\nschon einmal tot, um seine Feinde\nreinzulegen."
        es:
          ruby: "ZIGZAGOON está todo el día dando\nvueltas de aquí para allá.\nEs un POKéMON muy inquieto.\fSe interesa por todo lo que se\nencuentra en su camino."
          sapphire: "ZIGZAGOON tiene erizado el pelo del lomo,\ny suele frotárselo contra los árboles\npara marcar su territorio.\fEste POKéMON hace como si estuviera\ndebilitado para engañar a sus enemigos\nen combate."
linoone:
  species_id: 264
  names:
    jp_kana: マッスグマ
    en: LINOONE
    fr: LINEON
    it: LINOONE
    de: GERADAKS
    es: LINOONE
  forms:
    linoone:
      form_id: 0
      base_stats:
        hp: 78
        attack: 70
        defense: 61
        special_attack: 50
        special_defense: 61
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
      held_items:
        common: oran_berry
        rare: sitrus_berry
      descriptions:
        jp_kana:
          ruby: "まっすぐに　つっぱしり　しょうがいぶつが　ある\nときは　ちょっかくに　おれまがって　よける。\nゆるやかに　カーブした　みちが　とても　にがて。"
          sapphire: "えもの　めがけて　いっちょくせんに　つっぱしる。\nじそく　１００キロを　こえる　スピードを　だすが\nいちど　きゅうていし　しないと　まがれないのだ。"
        en:
          ruby: "LINOONE always runs full speed and only\nin straight lines. If facing an obstacle,\nit makes a right-angle turn to evade it.\fThis POKéMON is very challenged by\ngently curving roads."
          sapphire: "When hunting, LINOONE will make a\nbeeline straight for the prey at a full\nrun. While this POKéMON is capable of\ftopping 60 mph, it has to come to a\nscreeching halt before it can turn."
        fr:
          ruby: "LINEON court très vite et toujours\nen ligne droite. Si un obstacle survient,\nil l’évite en prenant un angle droit.\fCe POKéMON a beaucoup de mal à suivre\nles routes légèrement courbées."
          sapphire: "Lorsqu’il chasse, LINEON fonce toujours\ntout droit sur sa proie à pleine vitesse.\nBien que ce POKéMON puisse atteindre\f100 km/h, il doit s’arrêter en\ncatastrophe avant de pouvoir tourner."
        it:
          ruby: "LINOONE è solito correre a tutta\nvelocità e sempre in linea retta.\nDavanti ad un ostacolo fa una curva\fad angolo retto per evitarlo. Questo\nPOKéMON si trova in difficoltà su\npercorsi con curve poco accentuate."
          sapphire: "Quando caccia, LINOONE si lancia\nrapido sulla preda. Infatti riesce\na raggiungere la velocità di 100 km/h\fma prima di girare è costretto a\nfermarsi in modo brusco e repentino."
        de:
          ruby: "GERADAKS rennt immer mit vollem Tempo\nund nie im Zickzack, sondern nur gerade.\nWenn ihm ein Hindernis im Weg ist,\fläuft es rechtwinklig daran vorbei. Für\ndieses POKéMON stellen leichte Kurven\neine große Herausforderung dar."
          sapphire: "Auf der Jagd rennt GERADAKS so schnell\nes kann schnurstracks hinter seiner\nBeute her. Es erreicht zwar über\f100 km/h, muss aber erst aus vollem\nLauf zum Stehen kommen, bevor es die\nRichtung wechseln kann."
        es:
          ruby: "LINOONE siempre corre todo lo rápido\nque puede y sólo en línea recta.\nSi encuentra un obstáculo en el camino,\fse moverá hacia la derecha para\nesquivarlo. Correr bien por caminos\ntortuosos es todo un reto para él."
          sapphire: "Cuando LINOONE caza, va directo\nhacia su presa a toda velocidad. Si por\nun lado puede alcanzar 100 kilómetros\fpor hora, por otro tiene que frenar\nen seco para poder cambiar de sentido."
wurmple:
  species_id: 265
