          ruby: "Wenn TYRACROC einen Feind mit seinen\nKiefern eingeklemmt hat, lässt es ihn\nnicht mehr los. Da seine Zahnspitzen\fwie Angelhaken gebogen sind, kann man\nsie nicht mehr entfernen, wenn sie\nsich verfangen haben."
          sapphire: "Wenn TYRACROC einen Feind mit seinen\nKiefern eingeklemmt hat, lässt es ihn\nnicht mehr los. Da seine Zahnspitzen\fwie Angelhaken gebogen sind, kann man\nsie nicht mehr entfernen, wenn sie\nsich verfangen haben."
        es:
          ruby: "Una vez que CROCONAW le ha clavado\nlos colmillos a su presa, es imposible\nque escape porque los tiene hacia\fadentro como si fueran anzuelos.\nCuando CROCONAW hinca los\ndientes, no hay escapatoria."
