          ruby: "のうが　どんどん　おおきくなったので　くびでは\nささえきれないほど　あたまが　おもくなった。\nちょうのうりょくで　あたまを　ささえているのだ。"
          sapphire: "むげんに　ふえる　のうさいぼうが　ちのうしすう\n５０００の　スーパーずのうを　つくりだした。\nせかいの　できごとを　すべて　きおくしている。"
        en:
          ruby: "ALAKAZAM’s brain continually grows,\nmaking its head far too heavy to\nsupport with its neck.\fThis POKéMON holds its head up using\nits psychokinetic power instead."
          sapphire: "ALAKAZAM’s brain continually grows,\ninfinitely multiplying brain cells.\nThis amazing brain gives this POKéMON\fan astoundingly high IQ of 5,000.\nIt has a thorough memory of everything\nthat has occurred in the world."
        fr:
          ruby: "Le cerveau d’ALAKAZAM grossit sans\narrêt, si bien que sa tête devient trop\nlourde pour son cou.\fCe POKéMON maintient sa tête relevée\ngrâce à son pouvoir télékinésique."
          sapphire: "Le cerveau d’ALAKAZAM grossit sans\narrêt, multipliant sans cesse ses\ncellules. Ce POKéMON a un QI\fincroyablement élevé, de 5 000.\nIl peut garder en mémoire tout ce qui\ns’est passé dans le monde."
        it:
          ruby: "Il cervello di ALAKAZAM cresce in\ncontinuazione rendendo la sua testa\ntroppo pesante per il collo.\fPertanto è costretto ad usare i suoi\npoteri psicocinetici per sostenerla."
          sapphire: "Il cervello di ALAKAZAM cresce in\ncontinuazione, moltiplicando all’infinito\nle cellule cerebrali. Questo gli assegna\fun sorprendente QI di 5.000.\nRicorda nei minimi dettagli ogni\nevento accaduto nel mondo."
        de:
          ruby: "SIMSALAs Gehirn hört nicht auf zu\nwachsen, so dass sein Kopf zu schwer\nfür seine Nackenmuskulatur wird.\fDieses POKéMON hält seinen Kopf mit\npsychokinetischer Energie aufrecht."
          sapphire: "SIMSALAs Hirn wächst stetig weiter und\nseine Gehirnzellen werden unendlich\nvervielfacht. Durch sein verblüffendes\fGehirn erreicht dieses POKéMON einen IQ\nvon 5.000. Es erinnert sich an alles, was\nin der Welt passiert ist."
        es:
          ruby: "El cerebro de ALAKAZAM nunca deja\nde crecer y por eso al cuello le cuesta\nsostener el peso de la cabeza.\fEste POKéMON usa sus poderes\npsicoquinéticos para mantener\nen alto la cabeza."
          sapphire: "El cerebro de ALAKAZAM siempre está\ncreciendo y el número de neuronas no\ndeja de aumentar. Este POKéMON tiene\fun coeficiente intelectual de 5.000.\nTiene archivado en su memoria todo\nlo que ha ocurrido en el mundo."
machop:
  species_id: 66
  names:
    jp_kana: ワンリキー
    en: MACHOP
    fr: MACHOC
    it: MACHOP
    de: MACHOLLO
    es: MACHOP
