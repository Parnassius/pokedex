        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - dark
      egg_groups:
        - field
        - grass
      abilities:
        - chlorophyll
        - early_bird
      descriptions:
        jp_kana:
          ruby: "うっそうと　しげった　もりに　すむ　ポケモン。\nたまに　もりを　でては　ひとを　おどろかせる。\nながい　はなを　つかまれるのは　だいきらい。"
          sapphire: "あたまの　はっぱを　ぬいて　くさぶえを　つくる。\nコノハナが　かなでる　くさぶえの　ねいろは\nもりで　まよった　ひとを　ふあんにさせる。"
        en:
          ruby: "NUZLEAF live in densely overgrown\nforests. They occasionally venture out\nof the forest to startle people.\fThis POKéMON dislikes having its long\nnose pinched."
          sapphire: "This POKéMON pulls out the leaf on its\nhead and makes a flute with it.\nThe sound of NUZLEAF’s flute strikes\ffear and uncertainty in the hearts of\npeople lost in a forest."
        fr:
          ruby: "Les PIFEUIL vivent dans des forêts\ntrès densément boisées. Il leur arrive\nde sortir de la forêt pour faire\fpeur aux gens. Ce POKéMON déteste\nqu’on lui pince son grand nez."
          sapphire: "Ce POKéMON se sert de la feuille sur\nsa tête pour jouer de la flûte. Le son\nde la flûte de PIFEUIL effraie et\fdécontenance les gens perdus en forêt."
        it:
          ruby: "NUZLEAF vive in foreste molto fitte.\nA volte si avventura fuori dalla foresta\nper spaventare le persone.\fQuesto POKéMON si irrita molto,\nse qualcuno tenta di pizzicargli\nil lungo naso."
          sapphire: "NUZLEAF crea una sorta di flauto\ncon la foglia che ha sul capo.\nIl suono di questo flauto placa\fla paura e l’incertezza nel cuore\ndi coloro che si sono persi\nnella foresta."
        de:
          ruby: "BLANAS lebt in dichten Wäldern.\nManchmal wagt es sich aus dem Wald\nheraus, um Menschen zu erschrecken.\fDieses POKéMON mag es überhaupt nicht,\nwenn man seine lange Nase zwickt."
          sapphire: "Dieses POKéMON reißt das Blatt auf\nseinem Kopf heraus und benutzt es\nals Flöte. Diese Geräusche jagen den\fMenschen, die sich im Wald verirrt haben,\nAngst ein."
        es:
          ruby: "NUZLEAF habita bosques muy poblados.\nY, en ocasiones, se atreve a salir para\nasustar a la gente.\fA este POKéMON no le gusta nada\nque le pellizquen la nariz."
          sapphire: "NUZLEAF saca la hoja que tiene en\nla cabeza y la usa como flauta. El sonido\nque emite infunde miedo e incertidumbre\fa quien se encuentre perdido\npor el bosque."
shiftry:
  species_id: 275
  names:
    jp_kana: ダーテング
    en: SHIFTRY
    fr: TENGALICE
    it: SHIFTRY
    de: TENGULIST
    es: SHIFTRY
  forms:
    shiftry:
      form_id: 0
      base_stats:
        hp: 90
        attack: 100
        defense: 60
        special_attack: 90
        special_defense: 60
        speed: 80
      evs_yield:
        hp: 0
