          sapphire: "DIGLETT è allevato in molte aziende\nagricole. La ragione è semplice: quando\nquesto POKéMON scava, lascia il suolo\fperfettamente arato per la semina.\nIl suolo è poi pronto per la\ncoltivazione di squisite verdure."
        de:
