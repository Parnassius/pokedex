          sapphire: "Les LOKHLASS sont en voie d’extinction.\nLe soir, on entend ce POKéMON\nchantonner une complainte mélancolique,\fespérant retrouver ses\nrares congénères."
        it:
          ruby: "L’uomo ha portato LAPRAS quasi alla\nsua totale estinzione. Si dice che la\nsera lo si senta cantare malinconico\fper richiamare i suoi pochi\nsimili ancora in vita."
          sapphire: "L’uomo ha portato LAPRAS quasi alla\nsua totale estinzione. Si dice che la\nsera lo si senta cantare malinconico\fper richiamare i suoi pochi\nsimili ancora in vita."
        de:
          ruby: "Die Menschen sind dafür verantwortlich,\ndass LAPRAS fast ausgestorben wäre.\nAbends singt es traurige Klagelieder,\fda nur noch wenige seiner Artgenossen\nübrig sind."
          sapphire: "Die Menschen sind dafür verantwortlich,\ndass LAPRAS fast ausgestorben wäre.\nAbends singt es traurige Klagelieder,\fda nur noch wenige seiner Artgenossen\nübrig sind."
        es:
          ruby: "Por culpa de la gente, LAPRAS está casi\nen extinción. Dicen que, al anochecer,\nse pone a cantar quejicoso mientras\fbusca a los miembros de su especie\nque puedan quedar."
          sapphire: "Por culpa de la gente, LAPRAS está casi\nen extinción. Dicen que, al anochecer,\nse pone a cantar quejicoso mientras\fbusca a los miembros de su especie\nque puedan quedar."
