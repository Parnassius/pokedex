      types:
        - bug
        - water
      egg_groups:
        - water_1
        - bug
      abilities:
        - swift_swim
      descriptions:
        jp_kana:
          ruby: "つまさきから　あぶらが　にじみでて　いるので\nみずの　うえを　すべる　ように　あるけるのだ。\nいけや　みずうみの　びせいぶつを　たべている。"
          sapphire: "きけんを　かんじると　あたまの　さきっぽから\nみずあめのような　あまい　えきたいを　だす。\nこれが　こうぶつの　ポケモンも　いるよ。"
        en:
          ruby: "From the tips of its feet, SURSKIT\nsecretes an oil that enables it to walk\non water as if it were skating.\fThis POKéMON feeds on microscopic\norganisms in ponds and lakes."
          sapphire: "If SURSKIT senses danger, it secretes\na thick, sugary syrup from the tip of\nits head.\fThere are some POKéMON that love\neating this syrup."
        fr:
          ruby: "Du bout de ses pattes, ARAKDO\nsécrète une huile lui permettant de\nmarcher sur l’eau, comme s’il glissait.\fCe POKéMON se nourrit des organismes\nmicroscopiques présents dans les\nlacs et les étangs."
          sapphire: "Lorsqu’ARAKDO se sent en danger,\nle haut de sa tête sécrète un sirop\népais et sucré.\fCertains POKéMON adorent boire de\nce sirop."
        it:
          ruby: "Dalla punta delle zampe SURSKIT\nsecerne un olio che gli consente di\ncamminare sul pelo dell’acqua\fcome se stesse pattinando.\nSi ciba di organismi microscopici\nin stagni e laghi."
          sapphire: "In caso di pericolo SURSKIT secerne\nun fluido denso e zuccheroso dall’aculeo\nposto sulla sommità del capo.\fEsistono POKéMON che adorano\ncibarsi di questo fluido."
        de:
          ruby: "GEHWEIHER scheidet aus seinen Zehen\nein Öl aus, das es ihm ermöglicht, über\nWasser zu gleiten. Dieses POKéMON\fernährt sich von Mikroorganismen aus\nTeichen und Seen."
          sapphire: "Wenn GEHWEIHER Gefahr wittert,\nscheidet es einen dickflüssigen Sirup\naus seinem Kopf aus. Es gibt einige\fPOKéMON, die ganz wild auf diesen\nSirup sind."
        es:
          ruby: "SURSKIT segrega un aceite por la punta\nde las patas que le permite caminar\nsobre el agua como si fuera patinando.\fEste POKéMON se alimenta de\nmicroorganismos en charcas y lagos."
          sapphire: "Cuando SURSKIT siente que hay peligro,\nsegrega un néctar espeso y dulce por la\ncabeza.\fHay POKéMON a los que les encanta\nbebérselo."
masquerain:
  species_id: 284
  names:
    jp_kana: アメモース
    en: MASQUERAIN
    fr: MASKADRA
    it: MASQUERAIN
    de: MASKEREGEN
    es: MASQUERAIN
  forms:
