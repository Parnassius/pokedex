      descriptions:
        jp_kana:
          ruby: "すいぶんを　むだなく　きゅうしゅうする　からだの\nつくりなので　かんそうした　すなちでも　へいき。\nからだを　まるめて　てきの　こうげきを　ふせぐ。"
          sapphire: "からからに　かわいた　ひふは　とても　かたく\nまるくなると　どんな　こうげきでも　はねかえす。\nよなかは　さばくの　すなに　もぐって　ねむる。"
        en:
          ruby: "SANDSHREW’s body is configured to\nabsorb water without waste, enabling it\nto survive in an arid desert.\fThis POKéMON curls up to protect itself\nfrom its enemies."
          sapphire: "SANDSHREW has a very dry hide that is\nextremely tough. The POKéMON can roll\ninto a ball that repels any attack.\fAt night, it burrows into the desert\nsand to sleep."
        fr:
          ruby: "Le corps de SABELETTE lui permet\nd’économiser l’eau qu’il absorbe, afin\nde survivre longtemps dans le désert.\fCe POKéMON s’enroule sur lui-même\npour se protéger de ses ennemis."
          sapphire: "SABELETTE a une peau très sèche et\nextrêmement dure. Ce POKéMON peut\ns’enrouler sur lui-même pour repousser\fles attaques. La nuit, il s’enterre dans\nle sable du désert pour dormir."
        it:
          ruby: "Il corpo di SANDSHREW ha una\nconformazione che gli consente di\nassorbire l’acqua senza perdite e di\fsopravvivere nell’aridità del deserto.\nQuesto POKéMON si avvolge su se\nstesso per proteggersi dai nemici."
          sapphire: "SANDSHREW ha una corazza estremamente\nsecca e dura. Può chiudersi a sfera e\nrotolare per difendersi dagli attacchi.\fQuando cala la notte, si nasconde\nnella sabbia del deserto per dormire."
        de:
          ruby: "SANDANs Körper kann sehr viel Wasser\naufnehmen, so dass es auch in der\nWüste überleben kann.\fDieses POKéMON rollt sich zusammen, um\nsich vor Feinden zu schützen."
          sapphire: "SANDAN hat eine sehr trockene und\nextrem robuste Haut. Dieses POKéMON\nkann sich zu einem Ball zusammenrollen,\fvon dem jegliche Angriffe abprallen.\nNachts gräbt es sich im Wüstensand ein\nund schläft dort."
        es:
          ruby: "SANDSHREW es capaz de absorber\nagua y no perder ni una gota, algo\nque le permite sobrevivir en el desierto.\fEste POKéMON se enrosca para\ndefenderse de los enemigos."
          sapphire: "SANDSHREW tiene una piel muy seca y\ntremendamente dura. Tiene la habilidad\nde hacerse una bola y evitar cualquier\fataque. Por las noches, escarba en la\narena del desierto y se echa a dormir."
sandslash:
  species_id: 28
  names:
