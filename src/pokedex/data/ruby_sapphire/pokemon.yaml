          sapphire: "FORSTELLKA versteckt sich in seiner\nstahlharten Schale. Die Schale öffnet\nsich, wenn es nach Beute schnappt.\fDies geht jedoch so schnell, dass man\ndas Innere der Schale nicht zu Gesicht\nbekommt."
        es:
          ruby: "FORRETRESS se esconde dentro de su\nconcha de acero reforzada. Sólo la abre\ncuando va a atrapar a su presa, pero\focurre tan rápido que no da tiempo de\nver su interior."
          sapphire: "FORRETRESS se esconde dentro de su\nconcha de acero reforzada. Sólo la abre\ncuando va a atrapar a su presa, pero\focurre tan rápido que no da tiempo de\nver su interior."
