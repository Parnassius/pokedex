          sapphire: "Ce POKéMON n’est pas satisfait s’il ne\ndétruit pas tout sur son passage.\nLorsque TAUROS ne trouve pas\fd’adversaire, il se rue sur de gros\narbres et les déracine pour passer\nses nerfs."
        it:
          ruby: "Questo POKéMON è molto insofferente\ne sempre alla ricerca della rissa.\nSe non trova un avversario con cui\flottare, TAUROS si lancia contro grossi\ntronchi per abbatterli e calmarsi."
          sapphire: "Questo POKéMON è molto insofferente\ne sempre alla ricerca della rissa.\nSe non trova un avversario con cui\flottare, TAUROS si lancia contro grossi\ntronchi per abbatterli e calmarsi."
        de:
          ruby: "Dieses POKéMON ist nur zufrieden, wenn\nes kämpfen kann. Wenn TAUROS keinen\nGegner findet, sucht es sich starke\fBäume und lässt sich an ihnen aus,\num sich abzureagieren."
          sapphire: "Dieses POKéMON ist nur zufrieden, wenn\nes kämpfen kann. Wenn TAUROS keinen\nGegner findet, sucht es sich robuste\fBäume und haut sie um, um sich\nabzureagieren."
        es:
          ruby: "Este POKéMON no está contento a menos\nque esté continuamente de aquí para\nallá. Si no hay rival que luche contra\fTAUROS, se estampa contra árboles\ngrandes para calmarse y los embiste\npara echarlos abajo."
          sapphire: "Este POKéMON no está contento a menos\nque esté continuamente de aquí para\nallá. Si no hay rival que luche contra\fTAUROS, se estampa contra árboles\ngrandes para calmarse y los embiste\npara echarlos abajo."
