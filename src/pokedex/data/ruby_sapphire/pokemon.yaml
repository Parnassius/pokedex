      descriptions:
        jp_kana:
          ruby: "おおきな　じしんが　おこると　やまに　すんでいる\nゴローニャが　なんびきも　ふもとまで　ごろごろ\nころがり　おちてくる　ことが　あるよ。"
          sapphire: "やまの　しゃめんに　ほってある　みぞは　ころがり\nおちてきた　ゴローニャが　みんかに　ぶつからない\nように　するための　とおりみちに　なっているぞ。"
        en:
          ruby: "GOLEM live up on mountains.\nIf there is a large earthquake, these\nPOKéMON will come rolling down off\fthe mountains en masse to the\nfoothills below."
          sapphire: "GOLEM is known for rolling down from\nmountains. To prevent them from rolling\ninto the homes of people downhill,\fgrooves have been dug into the sides of\nmountains to serve as guideways for\ndiverting this POKéMON’s course."
        fr:
          ruby: "GROLEM vit à la montagne.\nLorsqu’il y a un tremblement de terre,\fces POKéMON roulent en groupe\nvers les contreforts montagneux."
          sapphire: "On sait que les GROLEM se laissent\nrouler en bas des montagnes. Afin\nd’éviter qu’ils roulent sur les maisons\fdes gens, des tranchées ont été\ncreusées le long des montagnes pour les\nguider dans leurs descentes infernales."
        it:
          ruby: "I GOLEM vivono in alta montagna.\nIn caso di terremoto, questi POKéMON\frotolano giù per i monti in massa\ne si fermano a valle."
          sapphire: "GOLEM è noto per rotolare in discesa\nlungo il pendio dei monti. Per evitare\nche finisca dentro le case a valle,\fsono stati creati dei canaloni sui\npendii dei monti per guidarne\nil percorso durante la discesa."
        de:
          ruby: "GEOWAZ lebt hoch in den Bergen. Gibt es \nein starkes Erdbeben, rollt dieses\nPOKéMON so lange den Berg hinunter,\fbis es schließlich unten angekommen ist."
          sapphire: "GEOWAZ ist dafür bekannt, dass es\nBerghänge herunterrollt. Damit es nicht\nin die Häuser der Menschen hineinrollt,\fwurden Gräben so an den Bergen\nangelegt, dass der Weg dieses POKéMON\numgeleitet wird."
        es:
          ruby: "GOLEM vive en las montañas.\nSi se produce un gran terremoto,\nestos POKéMON descienden rodando\fen masa por las laderas."
