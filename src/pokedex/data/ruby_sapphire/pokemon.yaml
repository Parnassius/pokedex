      egg_groups:
        - undiscovered
      abilities:
        - clear_body
      descriptions:
        jp_kana:
          ruby: "どんな　きんぞくよりも　かたい　からだを　もつ。\nからだの　なかは　くうどうに　なっているらしく\nたべている　ものも　わからない　ポケモンだ。"
          sapphire: "むかし　ひとによって　ふういんされた　ポケモン。\nからだを　つくる　きんぞくは　ちきゅうじょうに\nそんざいしない　ぶっしつと　かんがえられている。"
        en:
          ruby: "REGISTEEL has a body that is harder\nthan any kind of metal.\nIts body is apparently hollow.\fNo one has any idea what this POKéMON\neats."
          sapphire: "REGISTEEL was imprisoned by people\nin ancient times.\nThe metal composing its body is thought\fto be a curious substance that is not\nof this earth."
        fr:
          ruby: "Le corps de REGISTEEL est plus dur\nque n’importe quel métal existant. Il est\napparemment creux.\fPersonne ne sait ce que ce POKéMON\nmange."
          sapphire: "Il y a très longtemps, REGISTEEL fut\nemprisonné par les hommes.\nOn pense que l’étrange métal qui\fcompose son corps provient d’une\nautre planète."
        it:
          ruby: "REGISTEEL ha un corpo più duro\ndi ogni tipo di metallo. Pare inoltre\nche all’interno sia totalmente vuoto.\fNessuno sa cosa mangi\nquesto POKéMON."
          sapphire: "REGISTEEL è stato imprigionato\ndagli esseri umani nell’antichità.\fPare che il metallo di cui è composto\nprovenga dallo spazio."
        de:
          ruby: "REGISTEEL hat einen Körper, der härter\nist als jede Art von Metall. Sein Körper\nscheint hohl zu sein.\fNiemand hat eine Ahnung, was dieses\nPOKéMON wohl frisst."
          sapphire: "REGISTEEL wurde in der Antike von\nden Menschen eingesperrt. Das Metall,\naus dem sein Körper besteht, ist eine\fseltsame Substanz, die nicht von dieser\nWelt sein soll."
        es:
          ruby: "No hay metal que supere en dureza\nel cuerpo de REGISTEEL, que tiene\naspecto de estar hueco.\fNadie sabe de qué se alimenta\neste POKéMON."
          sapphire: "Hace mucho tiempo REGISTEEL estuvo\npreso. La gente piensa que el metal\ndel que está hecho es una curiosa\fsustancia extraterrestre."
