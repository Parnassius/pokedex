          sapphire: "QWILFISH si gonfia assorbendo acqua.\nPoi usa la pressione dell’acqua ingerita\nper sparare i suoi aculei velenosi\ftutti insieme in un colpo solo.\nNon si può certo dire che sia\nun grande nuotatore."
        de:
