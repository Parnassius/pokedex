          sapphire: "PORYGON est capable de se décompiler et\nde retourner à l’état de programme\ninformatique pour entrer\fdans le cyber-espace. Ce POKéMON est\nprotégé contre le piratage, il est donc\nimpossible de le copier."
        it:
          ruby: "PORYGON è in grado di regredire ai\nsuoi codici di programmazione originari\ned entrare nel ciberspazio.\fQuesto POKéMON è dotato di un\nsistema anti-pirateria per evitarne\nla duplicazione illecita."
          sapphire: "PORYGON è in grado di regredire ai\nsuoi codici di programmazione originari\ned entrare nel ciberspazio.\fQuesto POKéMON è dotato di un\nsistema anti-pirateria per evitarne\nla duplicazione illecita."
        de:
          ruby: "PORYGON ist in der Lage, sich in Daten\nzurückzuverwandeln und in den\nCyberspace zu gelangen.\fDieses POKéMON ist kopiergeschützt, so\ndass es durch Kopieren nicht\nvervielfältigt werden kann."
          sapphire: "PORYGON ist in der Lage, sich in Daten\nzurückzuverwandeln und in den\nCyberspace zu gelangen.\fDieses POKéMON ist kopiergeschützt, so\ndass es durch Kopieren nicht\nvervielfältigt werden kann."
        es:
          ruby: "PORYGON es capaz de convertirse otra\nvez en datos informáticos y de entrar\nen el ciberespacio.\fTiene protección anti-copia, así que\nes imposible duplicarlo."
          sapphire: "PORYGON es capaz de convertirse otra\nvez en datos informáticos y de entrar\nen el ciberespacio.\fTiene protección anti-copia, así que\nes imposible duplicarlo."
