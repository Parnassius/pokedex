      descriptions:
        jp_kana:
          ruby: "うごく　ものを　みつけると　むちゅうに　なって\nおいかけまわす　しゅうせいを　もつ　ポケモン。\nじぶんの　シッポを　おいかけて　めを　まわす。"
          sapphire: "じぶんの　シッポを　おいかけまわす　ポケモン。\nやせいは　もりの　じゅもくの　あなで　くらす。\nあいくるしい　かおで　ペットとして　だいにんき。"
        en:
          ruby: "SKITTY has the habit of becoming\nfascinated by moving objects and\nchasing them around.\fThis POKéMON is known to chase after\nits own tail and become dizzy."
          sapphire: "SKITTY is known to chase around\nplayfully after its own tail. In the wild,\nthis POKéMON lives in holes in the trees\fof forests. It is very popular as a pet\nbecause of its adorable looks."
        fr:
          ruby: "SKITTY a pris l’habitude de\npourchasser les objets mobiles qui\nle fascinent.\fOn sait que ce POKéMON court souvent\naprès sa queue, jusqu’à ce qu’il ait\nla tête qui tourne."
          sapphire: "On sait que SKITTY court souvent\naprès sa queue. A l’état sauvage, ce\nPOKéMON vit dans les cavités des\farbres de la forêt. Il est tellement\nadorable qu’il a un grand succès\ncomme animal de compagnie."
        it:
          ruby: "SKITTY ha l’abitudine di lasciarsi\nammaliare dagli oggetti in movimento\ne seguirli dando loro la caccia.\fQuesto POKéMON è noto anche per\nrincorrere la sua stessa coda fino\na rimanere stordito."
          sapphire: "SKITTY è noto per il suo movimento\nrotatorio inteso a mordere la propria\ncoda. Allo stato brado, vive all’interno\fdi tronchi cavi nella foresta.\nÈ molto amato come animale domestico\ngrazie all’aspetto estremamente dolce."
        de:
          ruby: "ENECO ist davon fasziniert,\nGegenstände zu bewegen und sie zu\njagen. Dieses POKéMON jagt häufig\fseinen eigenen Schweif, so dass ihm\nschwindlig wird."
          sapphire: "ENECO jagt spielerisch seinen eigenen\nSchweif. In der Wildnis lebt dieses\nPOKéMON in den Löchern von Bäumen.\fEs ist als Haustier sehr beliebt, da es\nbezaubernd aussieht."
        es:
          ruby: "A SKITTY le encanta mover cosas e ir\ndetrás de ellas. Es de todos sabido que\nse dedica a ir detrás de su propia cola\fy que, al final, acaba mareándose."
          sapphire: "SKITTY es conocido por la costumbre\nque tiene de juguetear y de intentar\npillarse la cola. En estado salvaje,\fhabita en las cavidades de los troncos\nde los árboles del bosque. Es la mascota\nde muchos por lo dulce que parece."
delcatty:
  species_id: 301
  names:
    jp_kana: エネコロロ
    en: DELCATTY
    fr: DELCATTY
    it: DELCATTY
    de: ENEKORO
