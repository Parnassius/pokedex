        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      descriptions:
        jp_kana:
          ruby: "トレーナーに　くっついて　ちょこちょこ　あるく。\nくちから　とばす　ほのおは　せっし　１０００ど。\nあいてを　くろコゲにする　しゃくねつの　たまだ。"
          sapphire: "たいないに　ほのおを　もやす　ばしょが　あるので\nだきしめると　ぽかぽか　とっても　あたたかい。\nぜんしん　ふかふかの　うもうに　おおわれている。"
        en:
          ruby: "TORCHIC sticks with its TRAINER,\nfollowing behind with unsteady\nsteps.\fThis POKéMON breathes fire of over\n1,800 degrees F, including fireballs\nthat leave the foe scorched black."
          sapphire: "TORCHIC has a place inside its body\nwhere it keeps its flame. Give it a hug -\nit will be glowing with warmth.\fThis POKéMON is covered all over by a\nfluffy coat of down."
        fr:
          ruby: "POUSSIFEU ne lâche pas son DRESSEUR\nd’une semelle, marchant maladroitement\nderrière lui.\fCe POKéMON crache des flammes pouvant\natteindre 1 000 degrés et des boules\nde feu qui carbonisent l’ennemi."
          sapphire: "POUSSIFEU dispose d’un endroit dans\nson corps pour stocker sa flamme.\nSi on lui fait un gros câlin, sa flamme\fs’illumine chaleureusement. Ce POKéMON\nest couvert d’un duvet très doux."
        it:
          ruby: "TORCHIC segue il proprio ALLENATORE\novunque, saltellandogli dietro\ncon passo incerto.\fQuesto POKéMON sputa fiammate roventi\na 1000 gradi C, con sfere infuocate\ncapaci di carbonizzare il nemico."
          sapphire: "Nel corpo di TORCHIC è custodita\nla sua fiamma. Abbracciandolo si\nillumina emanando un incredibile calore.\fQuesto POKéMON è ricoperto da\nun piumaggio soffice e caldo."
        de:
          ruby: "FLEMMLI hängt an seinem Trainer wie\neine Klette. Es schlurft immer hinter ihm\nher. Dieses POKéMON spuckt 1000 Grad\fheißes Feuer, das seinen Feinden\nordentlich einheizt."
          sapphire: "In FLEMMLIs Körper brennt eine\nFlamme. Wenn man es umarmt, beginnt\nes zu glühen.\fDieses POKéMON trägt ein flauschiges\nFell aus Daunen."
        es:
          ruby: "TORCHIC no se separa de su ENTRENADOR.\nSiempre va detrás de él con sus pasitos\ninseguros.\fEste POKéMON echa fuego en forma\nde bola, que llega a subir la temperatura\nhasta 1.000 grados centígrados."
          sapphire: "TORCHIC tiene un lugar en el interior\nde su organismo en el que guarda la llama\nque posee. Si le das un abrazo, arderá\fencantado.\nEste POKéMON está recubierto\ntotalmente de sedoso plumón."
combusken:
  species_id: 256
  names:
    jp_kana: ワカシャモ
