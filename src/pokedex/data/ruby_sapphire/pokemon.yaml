        fr:
          ruby: "BULBIZARRE passe son temps à faire la\nsieste sous le soleil.\nIl y a une graine sur son dos.\fIl absorbe les rayons du soleil pour\nfaire doucement pousser la graine."
          sapphire: "BULBIZARRE passe son temps à faire la\nsieste sous le soleil.\nIl y a une graine sur son dos.\fIl absorbe les rayons du soleil pour\nfaire doucement pousser la graine."
        it:
          ruby: "È possibile vedere BULBASAUR mentre\nschiaccia un pisolino sotto il sole.\nHa un seme piantato sulla schiena.\fGrazie ai raggi solari il seme cresce\ningrandendosi progressivamente."
          sapphire: "È possibile vedere BULBASAUR mentre\nschiaccia un pisolino sotto il sole.\nHa un seme piantato sulla schiena.\fGrazie ai raggi solari il seme cresce\ningrandendosi progressivamente."
        de:
          ruby: "BISASAM macht gern einmal ein\nNickerchen im Sonnenschein.\nAuf seinem Rücken trägt es einen Samen.\fIndem es Sonnenstrahlen aufsaugt,\nwird der Samen zunehmend größer."
          sapphire: "BISASAM macht gern einmal ein\nNickerchen im Sonnenschein.\nAuf seinem Rücken trägt es einen Samen.\fIndem es Sonnenstrahlen aufsaugt,\nwird er zunehmend größer."
        es:
          ruby: "A BULBASAUR es fácil verle echándose\nuna siesta al sol. La semilla que tiene\nen el lomo va creciendo cada vez más\fa medida que absorbe los rayos del sol."
          sapphire: "A BULBASAUR es fácil verle echándose\nuna siesta al sol. La semilla que tiene\nen el lomo va creciendo cada vez más\fa medida que absorbe los rayos del sol."
