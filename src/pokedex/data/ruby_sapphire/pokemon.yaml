      form_id: 0
      base_stats:
        hp: 72
        attack: 60
        defense: 30
        special_attack: 20
        special_defense: 30
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - thick_fat
        - guts
      descriptions:
        jp_kana:
          ruby: "なんかい　たおされても　あきらめず　たちあがる。\nたちあがるたび　しんかするための　エネルギーが\nからだの　なかに　どんどん　たくわえられていく。"
          sapphire: "ぜったいに　あきらめない　こんじょうを　もつ。\nたくさん　たべ　よく　ねて　うんどうする　ことで\nからだの　なかに　エネルギーが　じゅうまんする。"
        en:
          ruby: "MAKUHITA is tenacious - it will keep\ngetting up and attacking its foe\nhowever many times it is knocked down.\fEvery time it gets back up, this\nPOKéMON stores more energy in its body\nfor evolving."
          sapphire: "MAKUHITA has a tireless spirit -\nit will never give up hope. It eats a lot\nof food, gets plenty of sleep, and it\ftrains very rigorously. By living that\nway, this POKéMON packs its body with\nenergy."
        fr:
          ruby: "MAKUHITA est tenace. Même s’il est\npresque battu, il continue à se\nrelever et à attaquer son ennemi.\fChaque fois qu’il se relève, ce POKéMON\nstocke plus d’énergie en vue de\nsa future évolution."
          sapphire: "MAKUHITA a un moral infatigable. Il ne\ndésespère jamais. Il mange beaucoup,\ndort beaucoup et s’entraîne avec\frigueur. Son hygiène de vie\npermet à ce POKéMON d’accumuler\nun maximum d’énergie."
        it:
          ruby: "MAKUHITA è estremamente tenace:\nanche se messo al tappeto più volte\nsi rialza sempre e contrattacca.\fOgni volta che riceve aiuto, questo\nPOKéMON accumula ulteriore energia\nper la futura evoluzione."
          sapphire: "MAKUHITA è infaticabile, perseverante\ne non perde mai la speranza. Mangia\nmolto, dorme molto e si allena con\frigore. Questo tenore di vita gli\nconsente di essere sempre carico\ndi energia."
        de:
          ruby: "MAKUHITA ist sehr zäh. Selbst wenn es im\nKampf mehrfach niedergeschlagen\nwurde, steht es immer wieder auf und\fgreift seinen Gegner an. Bei jedem Mal\nspeichert es mehr Energie in seinem\nKörper für seine Entwicklung."
          sapphire: "MAKUHITAs Geist ist unbezwingbar. Es\ngibt die Hoffnung niemals auf. Es frisst\neine Menge, bekommt viel Schlaf und\ftrainiert unermüdlich. Dadurch füllt es\nseinen Körper mit Energie auf."
        es:
          ruby: "MAKUHITA es tenaz. Da igual las veces\nque le venzan; volverá a ponerse\nen pie y a atacar.\fDe hecho, cada vez que se recupera,\nacumula más energía para poder\nevolucionar."
          sapphire: "MAKUHITA tiene un ánimo inagotable.\nNunca pierde la esperanza. Come mucho,\nduerme bastante y se entrena de forma\fmetódica. Siguiendo estos hábitos de\nvida, este POKéMON tiene siempre\nmucha energía."
hariyama:
  species_id: 297
  names:
    jp_kana: ハリテヤマ
    en: HARIYAMA
    fr: HARIYAMA
    it: HARIYAMA
    de: HARIYAMA
    es: HARIYAMA
  forms:
    hariyama:
      form_id: 0
      base_stats:
        hp: 144
        attack: 120
        defense: 60
        special_attack: 40
        special_defense: 60
        speed: 50
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - thick_fat
        - guts
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          ruby: "いろんな　ばしょで　はりての　けいこに　はげむ。\nきょうれつな　はりて　こうげきを　くらうと\nでんしんばしらも　いちげきで　まっぷたつだ。"
          sapphire: "ふとった　からだは　きんにくの　かたまり。\nぐぐっと　ぜんしんに　ちからを　こめると\nきんにくは　いわと　おなじ　かたさになるぞ。"
        en:
          ruby: "HARIYAMA practices its straight-arm\nslaps in any number of locations.\nOne hit of this POKéMON’s powerful,\fopenhanded, straight-arm punches\ncould snap a telephone pole in two."
          sapphire: "HARIYAMA’s thick body may appear fat,\nbut it is actually a hunk of solid muscle.\nIf this POKéMON bears down and\ftightens all its muscles, its body\nbecomes as hard as a rock."
        fr:
          ruby: "HARIYAMA s’entraîne à donner ses coups\ndirects avec sa paume le plus souvent\npossible. Un seul de ces puissants\fcoups de paume peut plier un poteau\ntéléphonique en deux."
          sapphire: "HARIYAMA a l’air un peu enrobé, mais\nc’est en fait une montagne de muscles.\nSi ce POKéMON se raidit et contracte\fses muscles, son corps devient dur\ncomme de la pierre."
        it:
          ruby: "HARIYAMA sferra potenti schiaffi a\nbraccia tese in ogni occasione.\fUn colpo delle sue violente mani\naperte è in grado di spaccare\nin due un palo della luce."
          sapphire: "Il robusto corpo di HARIYAMA può\napparire grasso, ma in realtà è formato\nda una muscolatura tonica. Se contrae\fe tende ogni singolo muscolo,\nil suo corpo diventa duro come\nla roccia."
        de:
          ruby: "HARIYAMA führt seinen berüchtigten\nStreckarm-Schlag überall aus. Ein Schlag\nvon diesem POKéMON reicht aus,\fum einen Strommast zu zerlegen."
          sapphire: "HARIYAMAs Körper mag vielleicht fett\naussehen, er besteht aber aus festen\nMuskeln. Wenn dieses POKéMON all\fseine Muskeln anspannt, wird sein\nKörper steinhart."
        es:
          ruby: "HARIYAMA practica los empujones que da\nestirando los brazos allá por donde va.\nEste POKéMON puede partir por la mitad\fun poste de teléfono de un enérgico\ngolpe con los brazos estirados y las\nmanos abiertas."
          sapphire: "Puede que parezca que HARIYAMA está\ngrueso, pero en realidad es una mole de\npuro músculo.\fSi este POKéMON hace fuerza y tensa\nla musculatura, se pone sólido como\nuna roca."
azurill:
  species_id: 298
  names:
    jp_kana: ルリリ
    en: AZURILL
    fr: AZURILL
    it: AZURILL
    de: AZURILL
    es: AZURILL
  forms:
    azurill:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 40
        special_attack: 20
        special_defense: 40
        speed: 20
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - thick_fat
        - huge_power
      descriptions:
        jp_kana:
          ruby: "なげなわの　ようりょうで　しっぽを　ふりまわし\nなげた　ときの　ちからで　とんでいく。\nさいこう　１０メートル　とんだ　きろくが　ある。"
          sapphire: "しっぽには　せいちょうする　ために　ひつような\nえいようが　たっぷり　つまっているぞ。\nだんりょくの　ある　しっぽに　のって　あそぶ。"
        en:
          ruby: "AZURILL spins its tail as if it were a\nlasso, then hurls it far. The momentum\nof the throw sends its body flying, too.\fUsing this unique action, one of these\nPOKéMON managed to hurl itself a record\n33 feet."
          sapphire: "AZURILL’s tail is large and bouncy.\nIt is packed full of the nutrients this\nPOKéMON needs to grow.\fAZURILL can be seen bouncing and\nplaying on its big, rubbery tail."
        fr:
          ruby: "AZURILL fait tournoyer sa queue comme\nun lasso et l’envoie si fort que le reste\nde son corps est également projeté.\fLe record de lancer de ce POKéMON\nest actuellement de 10 m."
          sapphire: "La grande queue d’AZURILL est\nélastique. Elle lui permet de stocker les\nnutriments nécessaires à sa\fcroissance. Parfois, on voit AZURILL\ns’amuser à rebondir sur sa\nqueue élastique."
        it:
          ruby: "AZURILL fa roteare la propria coda\ncome un lazzo, poi la scaglia lontano.\nNel momento del lancio prende il volo\fanche il suo corpo. Grazie a questa\ntecnica unica, uno di questi POKéMON\nè riuscito a lanciarsi a 10 m di distanza."
          sapphire: "AZURILL è dotato di una coda lunga\ned elastica. Inoltre, è ricca di sostanze\nnutritive indispensabili per la sua\fsopravvivenza. Spesso lo si vede\nsaltellare e giocare sulla coda\ngommosa e molleggiata."
        de:
          ruby: "AZURILL schleudert seinen Schweif wie\nein Lasso weit aus und fliegt dann \nselbst hinterher. Ein AZURILL\fhat es auf diese Weise geschafft, die\nRekordweite von 10 Metern\nzurückzulegen."
          sapphire: "AZURILLs Schweif ist lang und federnd.\nEr ist vollgepackt mit Nährstoffen, die\ndieses POKéMON zum Wachsen braucht.\fMan kann es häufig dabei beobachten,\nwie es auf seinem gummiartigen Schweif\numherhüpft und spielt."
        es:
          ruby: "AZURILL enrolla la cola como si fuera\nun lazo y la despliega a continuación\ntodo lo que puede.\fDe esta forma, un AZURILL llegó\na lanzarse a sí mismo hasta 10 metros."
          sapphire: "AZURILL tiene una especie de pelota\nen la cola, que contiene los nutrientes\nnecesarios para crecer.\fEs fácil ver a este POKéMON saltando\ny jugueteando sentado encima de la\nmisma."
nosepass:
  species_id: 299
  names:
    jp_kana: ノズパス
    en: NOSEPASS
    fr: TARINOR
    it: NOSEPASS
    de: NASGNET
    es: NOSEPASS
  forms:
    nosepass:
      form_id: 0
      base_stats:
        hp: 30
        attack: 45
        defense: 135
        special_attack: 45
        special_defense: 90
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - mineral
      abilities:
        - sturdy
        - magnet_pull
      descriptions:
        jp_kana:
          ruby: "じしゃくの　はなは　いつも　きたを　むいている。\nノズパスどうしは　じしゃくが　はんぱつしあうため\nちかくで　かおを　あわせる　ことが　できない。"
          sapphire: "じしゃくの　はなを　きたに　むけたまま　まったく\nうごかないと　いわれていたが　１ねんに　１センチ\nいどう　している　ことが　かんそくされた。"
        en:
          ruby: "NOSEPASS’s magnetic nose is always\npointed to the north. If two of these\nPOKéMON meet, they cannot turn\ftheir faces to each other when they\nare close because their magnetic noses\nrepel one another."
          sapphire: "NOSEPASS had been said to be completely\nunmoving, with its magnetic nose\npointed due north.\fHowever, close observation has revealed\nthat the POKéMON actually moves by a\nlittle over 3/8 of an inch every year."
        fr:
          ruby: "Le nez magnétique de TARINOR\npointe toujours vers le nord. Si deux de\nces POKéMON se rencontrent, ils ne\fpeuvent pas se faire face car leurs\nnez magnétiques se repoussent."
          sapphire: "On raconte que TARINOR reste\ncomplètement immobile, avec son nez\nmagnétique orienté vers le nord.\fCependant, des études minutieuses ont\ndémontré que ce POKéMON se déplace\nd’un centimètre par an."
        it:
          ruby: "Il naso magnetico di NOSEPASS è\nsempre puntato verso nord. Quando\nincontra un suo simile, non riesce a\fguardarlo in volto da vicino perché\ni nasi magnetici si respingono l’un\nl’altro."
          sapphire: "Pare che NOSEPASS sia completamente\nimmobile, sempre col naso magnetico\npuntato verso nord.\fTuttavia, studi più dettagliati hanno\nrivelato che questo POKéMON\nsi sposta di un centimetro all’anno."
        de:
          ruby: "NASGNET besitzt eine magnetische\nNase, die immer nach Norden zeigt. Wenn\nsich zwei NASGNET treffen, können sie\fsich einander nicht zuwenden, da ihre\nmagnetischen Nasen sich gegenseitig\nabstoßen."
          sapphire: "NASGNET wurde zunächst als völlig\nunbeweglich beschrieben, da seine\nmagnetische Nase immer nach Norden\fzeigt. Genauere Beobachtungen haben\njedoch ergeben, dass es sich pro Jahr\ntatsächlich etwa um 1 cm bewegt."
        es:
          ruby: "NOSEPASS siempre está con el pico\nmagnético que tiene orientado hacia\nel norte.\fSi se encuentra con otro ejemplar de\nsu especie, no puede mirarle de frente\nporque sus polos magnéticos se repelen."
          sapphire: "De NOSEPASS se llegó a decir que era\ntotalmente estático; siempre con\nel pico orientado hacia el norte.\fSin embargo, tras recientes estudios\nse ha visto que sí se mueve en realidad,\napenas un centímetro al año."
skitty:
  species_id: 300
