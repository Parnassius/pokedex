      descriptions:
        jp_kana:
          ruby: "ひるま　じめんの　なかに　からだを　うめて\nつちの　えいようを　ぜんしんで　すいあげている。\nこえた　つちほど　はっぱに　ツヤが　でるという。"
          sapphire: "えいよう　たっぷりの　つちを　さがして　うまる。\nひるま　つちに　うまっている　ときには　あしが\nきの　ねっこのような　かたちを　しているらしい。"
        en:
          ruby: "During the daytime, ODDISH buries\nitself in soil to absorb nutrients from \nthe ground using its entire body.\fThe more fertile the soil, the glossier\nits leaves become."
          sapphire: "ODDISH searches for fertile, nutrient-\nrich soil, then plants itself.\nDuring the daytime, while it is planted,\fthis POKéMON’s feet are thought to\nchange shape and become similar to\nthe roots of trees."
        fr:
          ruby: "Pendant la journée, MYSTHERBE\ns’enterre dans le sol pour absorber avec\nson corps tout entier les nutriments\fprésents dans la terre. Plus le sol est\nfertile, plus ses feuilles sont\nbrillantes."
          sapphire: "MYSTHERBE cherche un sol fertile et\nriche en nutriments, pour s’y planter.\nPendant la journée, quand il est planté,\fles pieds de ce POKéMON changent de\nforme et deviennent similaires à\ndes racines."
        it:
          ruby: "Durante il giorno, ODDISH si nasconde\nnel terreno per assorbire sostanze\nnutritive con tutto il corpo.\fPiù il suolo è fertile, più lucide\ndiventano le foglie."
          sapphire: "ODDISH cerca suolo fertile e ricco di\nsostanze nutritive per piantarvi le\nradici. Durante il giorno quando è fisso\fnel terreno, si dice che le sue zampe\nsi trasformino prendendo la forma\ndelle radici degli alberi."
        de:
          ruby: "Am Tage vergräbt sich MYRAPLA im Boden,\num mit seinem ganzen Körper Nahrung\naufzunehmen.\fJe fruchtbarer der Boden ist, desto\nglänzender werden seine Blätter."
          sapphire: "MYRAPLA sucht nach fruchtbarem, \nnahrhaftem Boden und pflanzt sich\nselbst darin ein. Solange es\feingepflanzt ist, nehmen seine Füße\ntagsüber die Gestalt von Baumwurzeln\nan."
        es:
          ruby: "Durante el día, ODDISH se entierra\nen el suelo para absorber nutrientes\nvaliéndose de todo el cuerpo.\fCuanto más fértil sea el suelo,\nmayor brillo tendrá en las hojas."
          sapphire: "ODDISH busca los suelos fértiles\ny ricos en nutrientes para plantarse\nen la tierra. Durante el día,\fse cree que le cambia la forma de los\npies y se le empiezan a parecer a las\nraíces de los árboles."
