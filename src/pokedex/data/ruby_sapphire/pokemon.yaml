        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - synchronize
        - trace
      descriptions:
        jp_kana:
          ruby: "あたまの　ツノで　ひとの　きもちを　かんじとる。\nひとまえには　めったに　すがたを　あらわさないが\nまえむきな　きもちを　キャッチすると　ちかよる。"
          sapphire: "ひとの　かんじょうを　さっちする　ちからを　もち\nトレーナーが　あかるい　きぶんの　ときには\nいっしょに　なって　よろこぶ　ポケモンだ。"
        en:
          ruby: "RALTS senses the emotions of\npeople using the horns on its head.\nThis POKéMON rarely appears before\fpeople. But when it does, it draws\ncloser if it senses that the person has\na positive disposition."
          sapphire: "RALTS has the ability to sense the\nemotions of people.\nIf its TRAINER is in a cheerful mood,\fthis POKéMON grows cheerful and joyous\nin the same way."
        fr:
          ruby: "TARSAL ressent les émotions des\ngens grâce à ses cornes. Ce POKéMON se\nmontre rarement, mais il arrive qu’il\fs’approche d’une personne s’il la sent\ndans un état d’esprit positif."
          sapphire: "TARSAL a le pouvoir de ressentir\nles émotions des gens. Si son DRESSEUR\nest d’humeur joyeuse, ce POKéMON\fdevient lui aussi gai et enjoué."
        it:
          ruby: "RALTS percepisce le emozioni delle\npersone usando le corna poste sul capo.\nRaramente si fa vedere dagli esseri\fumani, ma se percepisce un’energia\npositiva provenire da qualcuno è\npossibile che si avvicini."
          sapphire: "RALTS ha la capacità di percepire le\nemozioni delle persone. Se il suo\nALLENATORE è di buon umore,\fquesto influisce positivamente sul\ncarattere di RALTS, che crescerà\ncosì allegro e gioioso."
        de:
          ruby: "TRASLA nimmt mit den Hörnern an seinem\nKopf die Gefühle von Menschen wahr.\nMenschen bekommen dieses POKéMON\fnur selten zu Gesicht. Wenn es bemerkt,\ndass eine Person gut gelaunt ist, traut\nes sich näher an sie heran."
          sapphire: "TRASLA hat die Fähigkeit, die Emotionen\nvon Menschen wahrzunehmen. Wenn sein\nTRAINER gute Laune hat, ist dieses\fPOKéMON ebenfalls fröhlich."
        es:
          ruby: "RALTS percibe las sensaciones de\nla gente por los colmillos que tiene\nencima y detrás de la cabeza. No es\fcomún que este POKéMON aparezca en\npúblico, pero cuando lo hace, se acerca\nsi ve buena disposición en la gente."
          sapphire: "RALTS tiene la habilidad de percibir\nlas sensaciones que tiene la gente.\nSi su ENTRENADOR está alegre, este\fPOKéMON se pondrá igualmente contento."
kirlia:
  species_id: 281
  names:
    jp_kana: キルリア
    en: KIRLIA
