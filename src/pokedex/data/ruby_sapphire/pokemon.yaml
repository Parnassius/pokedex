          sapphire: "GASTLY è composto prevalentemente\ndi sostanze gassose. Se esposto\nal vento forte il suo corpo gassoso\fsi disperde subito. Gruppi di questo\nPOKéMON si radunano sotto i\ncornicioni per ripararsi dal vento."
        de:
