      descriptions:
        jp_kana:
          ruby: "りょうての　はなを　ねらう　あいてには\nするどい　トゲを　とばして　こうげきする。\nはなの　かおりは　きもちを　なごませる。"
          sapphire: "ごく　まれに　めずらしい　いろの　はなを\nさかせている　ロゼリアが　いると　いわれる。\nあたまの　トゲは　もうどくを　もっているぞ。"
        en:
          ruby: "ROSELIA shoots sharp thorns as\nprojectiles at any opponent that tries\nto steal the flowers on its arms.\fThe aroma of this POKéMON brings\nserenity to living things."
          sapphire: "On extremely rare occasions, a ROSELIA\nis said to appear with its flowers in\nunusual colors.\fThe thorns on this POKéMON’s head\ncontain a vicious poison."
        fr:
          ruby: "ROSELIA utilise ses épines pointues\ncomme projectiles si on tente de cueillir\nles fleurs sur ses bras.\fLe parfum de ce POKéMON apporte\nsérénité et plénitude à ceux\nqui le sentent."
          sapphire: "En de très rares occasions, on dit qu’un\nROSELIA peut apparaître en arborant\ndes fleurs aux couleurs inhabituelles.\fLes épines sur la tête de ce POKéMON\ncontiennent un dangereux poison."
        it:
          ruby: "ROSELIA spara spine molto affilate come\nfossero proiettili, a tutti coloro che\ntentano di rubargli i fiori dal braccio.\fIl profumo di questo POKéMON infonde\nserenità a tutti gli esseri viventi."
          sapphire: "In qualche rarissima occasione,\nROSELIA è stata vista con fiori\ndai colori inconsueti.\fLe spine sulla testa di questo POKéMON\ncontengono un veleno micidiale."
        de:
          ruby: "ROSELIA verschießt scharfe Stacheln\nauf jeden Feind, der versucht, die\nBlumen an seinen Armen zu stehlen.\fDer Duft dieses POKéMON beruhigt\nLebewesen."
          sapphire: "Nur sehr selten bekommt man ROSELIA\nmit seinen ungewöhnlich farbigen Blumen\nzu Gesicht. Die Dornen am Kopf dieses\fPOKéMON enthalten ein grausames Gift."
        es:
          ruby: "ROSELIA lanza finas espinas a todo\nel que se le acerca con intención\nde robarle las flores de los brazos.\fEl aroma de este POKéMON resulta\nrelajante a los seres vivos."
          sapphire: "Dicen que, en muy raras ocasiones,\naparece un ejemplar de ROSELIA con las\nflores de colores muy poco comunes.\fLas espinas que este POKéMON tiene\nen la cabeza contienen un veneno\nextremadamente peligroso."
gulpin:
  species_id: 316
