      descriptions:
        jp_kana:
          ruby: "ながいきの　イシツブテほど　からだの　かどは\nけずれ　まるくなっていくが　きもちは　いつまでも\nごつごつ　とがって　あらあらしいのだ。"
          sapphire: "じめんに　はんぶん　うまり　ぐっすり　ねむる。\nとざんしゃに　ふまれても　まったく　おきないよ。\nあさ　エサを　さがして　さかを　ころがりおちる。"
        en:
          ruby: "The longer a GEODUDE lives, the more\nits edges are chipped and worn away,\nmaking it more rounded in appearance.\fHowever, this POKéMON’s heart will\nremain hard, craggy, and rough always."
          sapphire: "When GEODUDE sleeps deeply, it buries\nitself halfway into the ground.\nIt will not awaken even if hikers step\fon it unwittingly.\nIn the morning, this POKéMON rolls\ndownhill in search of food."
        fr:
          ruby: "Lorsqu’un RACAILLOU prend de l’âge,\nses bords s’ébrèchent et s’usent, ce\nqui lui donne une apparence plus ronde.\fCependant, le cœur de ce POKéMON\nreste dur, rocailleux et rugueux."
          sapphire: "Pour dormir profondément, RACAILLOU\ns’enterre à moitié dans le sol. Il ne se\nréveille pas, même si des randonneurs\flui marchent dessus. Au petit matin,\nce POKéMON roule en contrebas\nen quête de nourriture."
        it:
          ruby: "Col passare del tempo, i profili di\nGEODUDE diventano sempre più\nlevigati, rendendolo più tondeggiante.\fTuttavia il cuore di questo POKéMON\nrimane sempre duro, ruvido e roccioso."
          sapphire: "Quando GEODUDE dorme profondamente\nsi nasconde parzialmente nel terreno.\nNon si sveglia neanche se i passanti\flo calpestano involontariamente.\nLa mattina questo POKéMON rotola\na valle in cerca di cibo."
        de:
          ruby: "Je länger ein KLEINSTEIN lebt, desto\nmehr wird seine raue Oberfläche ab-\ngeschliffen, so dass es runder wird.\fDas Herz dieses POKéMON bleibt aber\nfür immer versteinert, hart und rau."
          sapphire: "Wenn KLEINSTEIN tief und fest schläft,\ngräbt es sich selbst zur Hälfte im Boden\nein. Selbst wenn Wanderer versehentlich\fauf KLEINSTEIN treten, wacht es nicht\nauf. Am Morgen rollt es auf der Suche\nnach Nahrung den Berg herunter."
        es:
          ruby: "Cuanto más larga es la vida de GEODUDE,\nmayor es el desgaste y la erosión que\nsufre, y más redondeada la forma que va\fadquiriendo. Sin embargo, el corazón\npermanece siempre duro, rocoso\ny tosco."
          sapphire: "Cuando GEODUDE duerme profundamente,\nse entierra a medias en el suelo y no se\ndespierta ni aunque lo pisen sin querer.\fPor la mañana, se dedica a buscar comida\nrodando ladera abajo."
