          sapphire: "ほそく　しなやかな　からだは　どんな　つよい\nこうげきでも　しなって　よける　ことが　できる。\nくちから　てつも　とかしてしまう　えきを　だす。"
        en:
          ruby: "BELLSPROUT’s thin and flexible body\nlets it bend and sway to avoid any\nattack, however strong it may be.\fFrom its mouth, this POKéMON spits a\ncorrosive fluid that melts even iron."
          sapphire: "BELLSPROUT’s thin and flexible body\nlets it bend and sway to avoid any\nattack, however strong it may be.\fFrom its mouth, this POKéMON spits a\ncorrosive fluid that melts even iron."
        fr:
          ruby: "Le corps long et flexible de CHETIFLOR\nlui permet de se tordre et d’osciller\npour éviter tout type d’attaque,\fmême les plus puissantes.\nCe POKéMON crache un fluide corrosif\nqui peut même dissoudre le fer."
          sapphire: "Le corps long et flexible de CHETIFLOR\nlui permet de se tordre et d’osciller\npour éviter tout type d’attaque,\fmême les plus puissantes.\nCe POKéMON crache un fluide corrosif\nqui peut même dissoudre le fer."
        it:
          ruby: "Il corpo esile e flessibile di BELLSPROUT\ngli consente di piegarsi e oscillare per\nevitare ogni attacco, anche violento.\fDalla bocca sputa un fluido corrosivo\nin grado di sciogliere anche il ferro."
          sapphire: "Il corpo esile e flessibile di BELLSPROUT\ngli consente di piegarsi e oscillare per\nevitare ogni attacco, anche violento.\fDalla bocca sputa un fluido corrosivo\nin grado di sciogliere anche il ferro."
        de:
          ruby: "KNOFENSAs schlanker und elastischer\nKörper ermöglicht es ihm, jedem\nAngriff auszuweichen, so heftig dieser\fauch sein mag. Dieses POKéMON spuckt\neine ätzende Flüssigkeit aus, die sogar\nEisen zersetzen kann."
          sapphire: "KNOFENSAs schlanker und elastischer\nKörper ermöglicht es ihm, jeglichem\nAngriff auszuweichen, so heftig dieser\fauch sein mag. Dieses POKéMON spuckt\neine ätzende Flüssigkeit aus, die sogar\nEisen zersetzen kann."
        es:
          ruby: "BELLSPROUT tiene un cuerpo delgado\ny flexible que le permite inclinarse y\nbalancearse para esquivar los ataques.\fEste POKéMON escupe por la boca un\nfluido corrosivo capaz de hacer que se\nderrita hasta el hierro."
          sapphire: "BELLSPROUT tiene un cuerpo delgado\ny flexible que le permite inclinarse y\nbalancearse para esquivar los ataques.\fEste POKéMON escupe por la boca un\nfluido corrosivo capaz de hacer que se\nderrita hasta el hierro."
