          sapphire: "OMANYTE is one of the ancient and long-\nsince-extinct POKéMON that have been\nregenerated from fossils by people.\fIf attacked by an enemy, it withdraws\nitself inside its hard shell."
        fr:
          ruby: "AMONITA est l’un des POKéMON de\nl’antiquité disparus depuis longtemps\net qui furent ressuscités à partir\fde fossiles. Lorsqu’il est attaqué par\nun ennemi, il se rétracte\ndans sa coquille."
          sapphire: "AMONITA est l’un des POKéMON de\nl’antiquité disparus depuis longtemps\net qui furent ressuscités à partir\fde fossiles. Lorsqu’il est attaqué par\nun ennemi, il se rétracte\ndans sa coquille."
        it:
          ruby: "OMANYTE è uno degli antichi POKéMON\nestinti, recentemente rigenerati\ndall’uomo.\fIn caso di aggressione da parte\ndi un nemico, si ritira all’interno\ndella sua dura corazza."
          sapphire: "OMANYTE è uno degli antichi POKéMON\nestinti, recentemente rigenerati\ndall’uomo.\fIn caso di aggressione da parte\ndi un nemico, si ritira all’interno\ndella sua dura corazza."
        de:
          ruby: "AMONITAS ist ein POKéMON, das seit\nlanger Zeit ausgestorben war, aber\nvon den Menschen aus Fossilien\freproduziert wurde. Wenn es von einem\nFeind angegriffen wird, zieht es sich in\nsein hartes Gehäuse zurück."
          sapphire: "AMONITAS ist ein POKéMON, das seit\nlanger Zeit ausgestorben war, aber\ndurch die Menschen aus Fossilien\freproduziert wurde. Wenn es von einem\nFeind angegriffen wird, zieht es sich in\nsein hartes Gehäuse zurück."
        es:
          ruby: "OMANYTE es uno de esos POKéMON\nancestrales que se extinguieron hace\nmuchísimo tiempo y que la gente\fha recuperado a partir de fósiles.\nSi un enemigo le ataca, se esconderá\ndentro de la dura concha que tiene."
          sapphire: "OMANYTE es uno de esos POKéMON\nancestrales que se extinguieron hace\nmuchísimo tiempo y que la gente\fha recuperado a partir de fósiles.\nSi un enemigo le ataca, se esconderá\ndentro de la dura concha que tiene."
