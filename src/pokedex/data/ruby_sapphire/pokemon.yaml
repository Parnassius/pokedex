          sapphire: "In den von URSARING bewohnten Wäldern\ngibt es viele Flüsse und hohe Bäume, in\ndenen es Nahrung findet. Dieses\fPOKéMON läuft täglich durch den Wald,\num nach Essbarem zu suchen."
        es:
