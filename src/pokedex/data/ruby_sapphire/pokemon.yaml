          sapphire: "CHANEIRA legt täglich ausgesprochen\nnahrhafte Eier. Sie sind so köstlich,\ndass sie sogar von Menschen verspeist\fwerden, die gar keinen Appetit haben."
        es:
          ruby: "CHANSEY pone a diario huevos con\nun valor nutritivo altísimo. Están tan\nricos que hasta quien no tenga\fhambre se los comerá en un abrir\ny cerrar de ojos."
          sapphire: "CHANSEY pone a diario huevos con\nun valor nutritivo altísimo. Están tan\nricos que hasta quien no tenga\fhambre se los comerá en un abrir\ny cerrar de ojos."
