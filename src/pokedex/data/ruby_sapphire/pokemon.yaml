          sapphire: "きょうりょくな　じりょくせんで　せいみつきかいを\nこわしてしまうため　モンスターボールに　いれて\nおかないと　ちゅういされる　まちも　あるという。"
        en:
          ruby: "MAGNETON emits a powerful magnetic\nforce that is fatal to mechanical\ndevices. As a result, large cities sound\fsirens to warn citizens of large-scale\noutbreaks of this POKéMON."
          sapphire: "MAGNETON emits a powerful magnetic\nforce that is fatal to electronics and\nprecision instruments. Because of\fthis, it is said that some towns warn\npeople to keep this POKéMON inside\na POKé BALL."
        fr:
          ruby: "MAGNETON émet un puissant champ\nmagnétique qui neutralise les appareils\nmécaniques.\fLorsque ces POKéMON débarquent\nen masse, les villes sonnent l’alarme\net préviennent les habitants."
          sapphire: "MAGNETON émet un puissant champ\nmagnétique qui neutralise les appareils\nélectroniques. Certaines villes\fdemandent aux propriétaires de ces\nPOKéMON de les garder dans leurs\nPOKé BALLS."
        it:
          ruby: "MAGNETON emette una potente\ncarica magnetica fatale per tutte\nle apparecchiature meccaniche.\fSpesso le sirene avvertono la\npopolazione di grandi invasioni\ndi questi POKéMON."
          sapphire: "MAGNETON emette una potente\ncarica magnetica fatale per gli\nstrumenti elettronici e di precisione.\fPer questo motivo molte città\nimpongono ai cittadini di tenere\nquesti POKéMON nelle POKé BALL."
        de:
          ruby: "MAGNETON erzeugt ein sehr starkes Mag-\nnetfeld, das Maschinen zerstören kann.\nDeshalb hört man in großen Städten oft\fSirenen, die die Bürger vor Scharen\ndieses POKéMON warnen sollen."
          sapphire: "MAGNETON strahlt eine starke magne-\ntische Energie ab, die für elektronische\nGeräte und Präzisionsinstrumente sehr\fschädlich ist. In einigen Städten\nwerden die Bewohner gebeten, dieses\nPOKéMON in einem POKéBALL zu halten."
        es:
          ruby: "MAGNETON emite una fuerte energía\nmagnética que causa estragos en los\ninstrumentos mecánicos. Por ello,\fen las ciudades se avisa con sirenas\ncuando hay concentraciones\nde estos POKéMON."
          sapphire: "MAGNETON emite una fuerte energía\nmagnética, fatal para los instrumentos\nelectrónicos y de precisión.\fÉste es el motivo por el que, dicen,\nmucha gente mantiene a este POKéMON\nen POKé BALL."
