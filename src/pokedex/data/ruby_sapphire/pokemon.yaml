        jp_kana:
          ruby: "せいたいが　まだ　じゅうぶんに　はったつして\nいないので　うたい　つづけると　ノドが　いたむ。\nきれいな　おがわの　みずで　うがいをするよ。"
          sapphire: "マシュマロ　みたいな　さわりごこちの　からだから\nほんのり　あまい　においが　ただよってくるよ。\nにおいは　てきの　きもちを　おだやかにする。"
        en:
          ruby: "IGGLYBUFF’s vocal chords are not\nsufficiently developed. It would hurt\nits throat if it were to sing too much.\fThis POKéMON gargles with freshwater\nfrom a clean stream."
          sapphire: "IGGLYBUFF has a soft and plushy body\nthat feels very much like a marshmallow.\nFrom this body wafts a gently sweet\ffragrance that soothes and calms the\nemotions of its foes."
        fr:
          ruby: "Les cordes vocales de TOUDOUDOU ne\nsont pas assez développées. S’il devait\nchanter trop longtemps, il se ferait mal\fà la gorge. Ce POKéMON se gargarise\nsouvent avec de l’eau fraîche puisée\ndans un ruisseau clair."
          sapphire: "TOUDOUDOU a un corps mou et pelucheux,\nsemblable à de la guimauve. Un parfum\ndoux et sucré s’échappe de son corps,\fce qui lui permet d’apaiser et de\ncalmer ses ennemis."
        it:
          ruby: "Le corde vocali di IGGLYBUFF non\nsono sufficientemente sviluppate.\nSe eccede nel canto, gli viene il\fmal di gola. È solito fare i gargarismi\ncon l’acqua corrente dei torrenti puri."
          sapphire: "IGGLYBUFF, così morbido e soffice,\nsembra fatto di gommapiuma rosa.\nIl suo corpo emana un lieve aroma\fche placa le emozioni e\nl’aggressività del nemico."
        de:
          ruby: "FLUFFELUFFs Stimmbänder sind noch\nnicht voll entwickelt. Wenn es zu viel\nsingt, schmerzt ihm die Kehle.\fDieses POKéMON gurgelt mit Süßwasser\naus einem sauberen Fluss."
          sapphire: "FLUFFELUFF hat einen weichen Körper,\nder sich anfühlt wie ein Marshmallow. Es\nverströmt einen süßlichen Duft, der\fdie Emotionen seiner Gegner beruhigt."
        es:
          ruby: "Las cuerdas vocales de IGGLYBUFF no\nestán suficientemente desarrolladas.\nSi tuviera que cantar mucho, se haría\fdaño en la garganta.\nEste POKéMON suele hacer gárgaras\ncon agua pura de manantial."
          sapphire: "IGGLYBUFF es suave y tierno, parece un\nmerengue. Emana un aroma dulce y\nagradable que le sirve para calmar los\fánimos de sus oponentes en combate."
