          sapphire: "およぐ　スピードは　ポケモンじゅうで　いちばん。\nあらしで　おおあれの　うみでも　へっちゃら。\nなんぱせんから　ひとを　たすける　ことも　ある。"
        en:
          ruby: "The webbed flippers on its forelegs and\nhind legs and the streamlined body of\nGOLDUCK give it frightening speed.\fThis POKéMON is definitely much faster\nthan even the most athletic swimmer."
          sapphire: "GOLDUCK is the fastest swimmer among\nall POKéMON. It swims effortlessly, even\nin a rough, stormy sea.\fIt sometimes rescues people from\nwrecked ships floundering in high seas."
        fr:
          ruby: "Les pattes avant et arrière palmées et\nle corps aérodynamique d’AKWAKWAK lui\ndonnent une vitesse effrayante.\fCe POKéMON est bien plus rapide que les\nplus grands champions de natation."
          sapphire: "AKWAKWAK est le POKéMON qui nage le\nplus vite. Il nage sans se fatiguer,\nmême lorsque la mer est agitée.\fIl sauve parfois des gens coincés\ndans les navires bloqués en haute mer."
        it:
          ruby: "Le zampe anteriori e posteriori a pinna\ndotate di membrana interdigitale e\nil corpo longilineo di GOLDUCK\fgli conferiscono una velocità incre-\ndibile. Infatti è molto più veloce dei\npiù esperti nuotatori umani."
          sapphire: "GOLDUCK è il più veloce nuotatore\ntra tutti i POKéMON. Nuota senza\nfatica anche nel mare agitato e\ftempestoso. Talvolta salva naufraghi\ndai relitti affondati in alto mare."
        de:
          ruby: "Die schwimmhäutigen Flossen an seinen\nVorder- und Hinterbeinen und der \nstromlinienförmige Körper machen\fENTORON unheimlich schnell. Dieses\nPOKéMON ist auf jeden Fall schneller als\ndie meisten Hochleistungsschwimmer."
          sapphire: "ENTORON ist der schnellste Schwimmer\nvon allen POKéMON. Es schwimmt mit\nLeichtigkeit auch durch eine raue,\fstürmische See. Manchmal rettet es\nMenschen, die in Seenot geraten sind\nund auf dem Meer treiben."
        es:
          ruby: "GOLDUCK alcanza una velocidad de\nvértigo gracias a las aletas palmípedas\nde las extremidades y a la forma\faerodinámica de su cuerpo. Realmente,\nla velocidad de este POKéMON supera\nla de cualquier nadador."
          sapphire: "GOLDUCK es el nadador más rápido de los\nPOKéMON. Además nada sin esfuerzo\nhasta en aguas turbulentas en plena\ftormenta. En ocasiones, ha rescatado\na náufragos en alta mar."
