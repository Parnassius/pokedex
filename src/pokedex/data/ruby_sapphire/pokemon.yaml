        jp_kana:
          ruby: "２ほんの　しょくしゅから　プラスと　マイナスの\nでんきを　ながして　えものを　きぜつ　させる。\nでんきの　あかりは　なかまとの　サインだ。"
          sapphire: "つよい　でんきを　はっせいさせる　さいぼうが\n２ほんの　しょくしゅの　なかに　つまっている。\nじぶんも　ちょっと　ピリピリ　しびれるらしい。"
        en:
          ruby: "CHINCHOU lets loose positive and\nnegative electrical charges from its\ntwo antennas to make its prey faint.\fThis POKéMON flashes its electric\nlights to exchange signals with others."
          sapphire: "CHINCHOU’s two antennas are filled with\ncells that generate strong electricity.\nThis POKéMON’s cells create so much\felectrical power, it even makes itself\ntingle slightly."
        fr:
          ruby: "LOUPIO relâche des charges électriques\npositives et négatives de ses deux\nantennes pour mettre sa proie K.O.\fCe POKéMON illumine ses ampoules\nélectriques pour communiquer avec\nses congénères."
          sapphire: "Les deux antennes de LOUPIO sont\nchargées de cellules qui génèrent un\ncourant de forte intensité. Ces cellules\flibèrent tellement d’électricité qu’elles\nvibrent légèrement."
        it:
          ruby: "CHINCHOU libera una carica elettrica\npositiva e negativa dalle due antenne\nper intontire la preda.\fIl POKéMON usa le sue luci elettriche\nper scambiare segnali coi suoi simili."
          sapphire: "Le due antenne di CHINCHOU\ncontengono cellule che generano\fun’elettricità incredibile,\ntanto forte da farlo vibrare tutto."
        de:
          ruby: "LAMPI gibt positive und negative\nelektrische Ladungen durch seine\nAntennen ab, um seine Beute zu lähmen.\fDieses POKéMON lässt seine Lichter\naufflackern und tauscht Signale mit\nseinen Artgenossen aus."
          sapphire: "LAMPIs zwei Antennen sind mit Zellen\ngefüllt, die Elektrizität erzeugen. \nDie elektrische Ladung ist so stark,\fdass es sogar ein leichtes Kribbeln\nverspürt."
        es:
          ruby: "CHINCHOU libera cargas eléctricas\npositivas y negativas a través de las\ndos antenas que tiene para que su rival\fpierda el conocimiento. Asimismo,\nusa los destellos de electricidad para\ncomunicarse con otros."
          sapphire: "Las dos antenas de CHINCHOU están\nllenas de células que generan potente\nelectricidad. Crean tal cantidad que\fhasta el propio POKéMON siente cierto\nhormigueo."
