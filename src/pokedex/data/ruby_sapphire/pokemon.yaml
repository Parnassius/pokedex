          sapphire: "In der Antike jagte KABUTOPS unter\nWasser nach Beute. Es hat sich von\neinem Meeresbewohner zu einem Land-\fbewohner entwickelt, was man an den\nVeränderungen seiner Kiemen und\nBeine sehen kann."
        es:
          ruby: "Hace mucho tiempo KABUTOPS buceaba\npara atrapar a su presa. Ahora, parece\nque este POKéMON ha evolucionado y ha\fcambiado su hábitat; del agua ha pasado\na la tierra. El cambio que se aprecia en\nlas patas y branquias así lo confirma."
