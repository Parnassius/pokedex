      descriptions:
        jp_kana:
          ruby: "やく　１おくねんまえに　ぜつめつした　ポケモン。\nかいていの　いわに　くっつき　はなびらの　ような\nしょくしゅで　よってきた　えものを　つかまえる。"
          sapphire: "かせきから　さいせいした　こだいの　ポケモン。\nいわに　くっつき　あるく　ことが　できない。\n２つの　めで　じっと　えものを　さがしている。"
        en:
          ruby: "LILEEP became extinct approximately\na hundred million years ago.\nThis ancient POKéMON attaches itself\fto a rock on the seafloor and catches\napproaching prey using tentacles \nshaped like flower petals."
          sapphire: "LILEEP is an ancient POKéMON that was\nregenerated from a fossil. It remains\npermanently anchored to a rock.\fFrom its immobile perch, this POKéMON\nintently scans for prey with its two\neyes."
        fr:
          ruby: "L’espèce des LILIA s’est éteinte\nil y a environ cent millions d’années.\nCet ancien POKéMON s’accroche à\fun rocher, sous l’eau, et attrape ses\nproies à l’aide de ses tentacules en\nforme de pétales de fleur."
          sapphire: "LILIA est un POKéMON très\nancien ressuscité à partir d’un fossile.\nIl reste en permanence fixé à un rocher.\fCe POKéMON balaye l’horizon depuis son\nperchoir, immobile, en quête de proies."
        it:
          ruby: "LILEEP si è estinto circa cento\nmilioni di anni or sono. Questo\nPOKéMON antico si aggrappa\falle rocce sui fondali marini e cattura\nle prede che si avvicinano con i propri\ntentacoli a forma di petali di fiori."
          sapphire: "LILEEP è un POKéMON antico\nrigenerato da un fossile. Rimane\nsempre attaccato alla roccia.\fDalla sua postazione fissa, questo\nPOKéMON scandaglia attentamente\ni fondali con i suoi due occhi."
        de:
          ruby: "Von LILIEP nahm man an, es sei seit\netwa hundert Millionen Jahren\nausgestorben. Mit seinen wie\fBlütenblätter geformten Tentakeln\nheftet es sich an einen Felsen auf dem\nMeeresboden und fängt Beute."
          sapphire: "LILIEP ist ein antikes POKéMON, das aus\neinem Fossil erzeugt wurde. Es bleibt\nständig an einem Felsen verankert.\fMit seinen beiden Augen hält es ständig\nAusschau nach Beute."
        es:
          ruby: "Los LILEEP se extinguieron hace unos\ncien millones de años aproximadamente.\nEste POKéMON se ancla a una roca en el\ffondo del mar y atrapa a las presas\nque se le acercan con los tentáculos\nque tiene en forma de pétalos de flor."
          sapphire: "LILEEP es un POKéMON antiguo que\nse regeneró a partir de un fósil.\nSiempre está anclado a una roca.\fDesde su percha inmóvil está al acecho\ny pendiente de que no se le escape su\npresa."
