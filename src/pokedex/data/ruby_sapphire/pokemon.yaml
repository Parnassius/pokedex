        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - undiscovered
      abilities:
        - drizzle
      descriptions:
        jp_kana:
          ruby: "そら　いちめんを　おおう　あまぐもを　つくりだし\nおおあめを　ふらせる　ちからを　もつ　ポケモン。\nかんばつに　くるしむ　ひとびとを　すくった。"
          sapphire: "おおあめと　おおなみで　だいちを　おおい　うみを\nひろげた　ポケモンと　しんわで　かたられている。\nグラードンと　しとうの　すえ　ねむりに　ついた。"
        en:
          ruby: "KYOGRE has the power to create massive\nrain clouds that cover the entire sky\nand bring about torrential downpours.\fThis POKéMON saved people who were\nsuffering from droughts."
          sapphire: "KYOGRE is named in mythology as the\nPOKéMON that expanded the sea by\ncovering the land with torrential rains\fand towering tidal waves.\nIt took to sleep after a cataclysmic\nbattle with GROUDON."
        fr:
          ruby: "KYOGRE a le pouvoir de créer\nd’imposants nuages pluvieux capables\nde couvrir le ciel et de déclencher\fdes pluies torrentielles. Ce POKéMON\na sauvé des gens de la sécheresse."
          sapphire: "La mythologie mentionne KYOGRE\ncomme le POKéMON qui a agrandi la\nmer en déclenchant des pluies\ftorrentielles et des raz-de-marée.\nIl s’est endormi à la suite d’un combat\ncataclysmique contre GROUDON."
        it:
          ruby: "KYOGRE ha la capacità di creare\nenormi nubi temporalesche in modo da\ncoprire il cielo totalmente e causare\fpiogge torrenziali. Questo POKéMON\nha salvato molte persone dalla siccità."
          sapphire: "Nella mitologia KYOGRE è considerato\nil POKéMON che ha ingrandito il mare\nallagando la terra con alluvioni\fed enormi maree. Dopo un cataclisma\ncausato dalla sua lotta con GROUDON\nè andato in letargo."
        de:
          ruby: "KYOGRE kann riesige Regenwolken\nerzeugen, die den gesamten Himmel\nbedecken, und wolkenbruchartige\fNiederschläge hervorrufen. Dieses\nPOKéMON hat vielen Menschen das Leben\ngerettet, die unter einer Dürre litten."
          sapphire: "In der Mythologie taucht KYOGRE als\ndasjenige POKéMON auf, das das Meer\nvergrößert hat, indem es sintflutartige\fRegenfälle und Sturmfluten erzeugt hat.\nNach einem katastrophalen Kampf mit\nGROUDON legte es sich schlafen."
        es:
          ruby: "KYOGRE es capaz de crear grandes\ncantidades de nubarrones, cubrir\nel cielo y desatar lluvias torrenciales.\fEste POKéMON ha salvado de la sequía\na mucha gente."
          sapphire: "En mitología se conoce a KYOGRE como\nel POKéMON que extendió la superficie\nde los mares haciendo que diluviara\fy creando maremotos. Tras un combate\ncontra GROUDON, que acabó\nen cataclismo, se echó a dormir."
