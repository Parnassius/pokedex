          sapphire: "KRABBY vive in spiaggia, nascosto\nin buche scavate nella sabbia.\nSulle spiagge molto sabbiose, dove\fscarseggia il cibo, è possibile vedere\nquesti POKéMON attaccarsi a vicenda\nin difesa del proprio territorio."
        de:
          ruby: "KRABBY lebt an Stränden, in Löchern im \nSand. An Sandstränden, an denen es\nwenig Nahrung findet, sieht man dieses\fPOKéMON mit Artgenossen um sein\nRevier streiten."
          sapphire: "KRABBY lebt an Stränden, in Löchern im \nSand. An Sandstränden, an denen es\nwenig Nahrung findet, sieht man dieses\fPOKéMON mit Artgenossen streiten."
        es:
          ruby: "KRABBY vive en la playa, enterrado en\nagujeros en la arena. Cuando en las\nplayas de arena fina escasea la comida,\fes común ver a estos POKéMON echando\nun pulso panza contra panza en defensa\nde su territorio."
