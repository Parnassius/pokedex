        jp_kana:
          ruby: "いきものの　けつえきが　だいこうぶつ。\nとくに　まよなか　かつどうする　ことが　おおく\nいきちを　もとめて　よぞらを　とびまわる。"
          sapphire: "４ほんの　キバで　かみつき　けつえきを　のむ。\nつきの　でてない　まっくらな　よるは　かっぱつに\nとびまわり　ひとや　ポケモンを　おそうぞ。"
        en:
          ruby: "GOLBAT loves to drink the blood of\nliving things. It is particularly active\nin the pitch black of night.\fThis POKéMON flits around in the night\nskies, seeking fresh blood."
          sapphire: "GOLBAT bites down on prey with its four\nfangs and drinks the victim’s blood.\nIt becomes active on inky dark\fmoonless nights, flying around to\nattack people and POKéMON."
        fr:
          ruby: "NOSFERALTO adore boire le sang des\ncréatures vivantes. Il est particuli-\nèrement actif pendant les nuits noires.\fCe POKéMON se balade dans les cieux\nétoilés, à la recherche de sang frais."
          sapphire: "NOSFERALTO mord sa proie grâce à ses\nquatre crocs pour boire son sang.\nIl ne sort que lorsque la nuit est noire\fet sans lune, pour voleter en quête de\ngens et de POKéMON à mordre."
        it:
          ruby: "GOLBAT adora bere il sangue di\ncreature viventi. È particolarmente\nattivo di notte, nella totale oscurità.\fSvolazza nel cielo notturno\nin cerca di sangue fresco."
          sapphire: "GOLBAT azzanna i nemici con i suoi\nquattro canini e ne beve il sangue.\nÈ particolarmente attivo\fnel buio pesto delle notti senza luna\ne vola attaccando le persone e\ngli altri POKéMON."
        de:
          ruby: "GOLBAT hat es auf das Blut von Lebe-\nwesen abgesehen. Im Schutze der Nacht\nwird es besonders aktiv.\fDieses POKéMON fliegt durch die\nNacht, um nach frischem Blut zu\nsuchen."
          sapphire: "GOLBAT beißt seine Beute mit seinen\nvier Reißzähnen und trinkt das Blut\nseiner Opfer. Es wird in Nächten aktiv,\fin denen nicht einmal der Mond scheint.\nEs fliegt dann durch die Dunkelheit und\ngreift Menschen und POKéMON an."
        es:
          ruby: "A GOLBAT le encanta chuparle la sangre\na los seres vivos. Este POKéMON es\nmás activo en la oscuridad de la noche.\fEs al caer la noche cuando sale a\nrevolotear y a buscar sangre fresca."
          sapphire: "GOLBAT derriba a sus víctimas\nmordiéndoles con los cuatro colmillos\nque tiene y chupándoles la sangre.\fSólo entra en acción en las noches\nsin luna. Revolotea en la oscuridad\npara atacar a POKéMON y personas."
oddish:
