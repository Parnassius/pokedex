          sapphire: "KICKLEE kann seine Beine ausfahren\nund einziehen. Es verblüfft seine\nGegner mit brutalen Tritten.\fNach einem Kampf massiert es seine\nBeine und lockert die Muskeln, um der\nErschöpfung vorzubeugen."
