          sapphire: "MEOWTH ritira i suoi artigli affilati\nall’interno delle zampe per poter\naggirarsi furtivo camuffando le tracce.\fPer qualche oscura ragione questo\nPOKéMON è attratto dalle monetine\nche splendono alla luce."
        de:
