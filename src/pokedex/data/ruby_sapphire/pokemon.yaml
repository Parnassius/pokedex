          sapphire: "どうやら　クサイハナは　くちから　たらしている\nもうれつに　くさい　ニオイが　だいすき　らしい。\nニオイを　かいで　さらに　みつを　あふれさせる。"
        en:
          ruby: "GLOOM releases a foul fragrance from\nthe pistil of its flower. When faced\nwith danger, the stench worsens.\fIf this POKéMON is feeling calm and\nsecure, it does not release its usual\nstinky aroma."
          sapphire: "From its mouth GLOOM drips honey that\nsmells absolutely horrible.\nApparently, it loves the horrid stench.\fIt sniffs the noxious fumes and then \ndrools even more of its honey."
        fr:
          ruby: "ORTIDE dégage un parfum immonde du\npistil de sa fleur. Lorsqu’il se sent en\ndanger, la puanteur est encore pire.\fLorsque ce POKéMON se sent bien et en\nsécurité, il ne dégage aucune odeur\nnauséabonde."
          sapphire: "ORTIDE bave un miel qui sent\nhorriblement mauvais. Apparemment, il\nadore cette odeur nauséabonde.\fIl en renifle les fumées toxiques et se\nmet à baver du miel de plus belle."
        it:
          ruby: "GLOOM rilascia un odore fetido dai\npistilli dei suoi fiori. Quando è in\npericolo, l’olezzo peggiora.\fQuando invece si sente tranquillo \ne sicuro, non emana questa \nsostanza maleodorante."
          sapphire: "Dalla bocca di GLOOM fuoriesce una\nresina maleodorante e disgustosa.\nEvidentemente adora questo fetido\folezzo, poiché lo annusa avidamente\nproducendo poi altra resina."
        de:
          ruby: "DUFLOR produziert einen Ekel\nerregenden Gestank aus dem Stempel\nseiner Blume. Wenn es in Gefahr gerät,\fwird der Gestank noch unerträglicher. \nWenn sich dieses POKéMON in Sicherheit\nbefindet, stößt es keinen Gestank aus."
          sapphire: "Aus DUFLORs Mund tropft übelst\nriechender Honig. Diesen Gestank\nscheint es zu lieben, denn es\fschnieft die giftigen Dämpfe ein und\nsabbert danach noch mehr Honig."
        es:
          ruby: "GLOOM libera un fétido olor por los\npistilos de la flor. Cuando está en\npeligro, el hedor se intensifica. Si este\fPOKéMON está tranquilo y no se siente\namenazado, no libera el desagradable\nolor."
          sapphire: "GLOOM babea una miel que tiene un olor\nrealmente horrible, aunque parece ser\nque a él le gusta.\fDe hecho, aspira los gases nocivos\ny libera más miel aún."
