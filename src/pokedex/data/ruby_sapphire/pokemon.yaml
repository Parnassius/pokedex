      descriptions:
        jp_kana:
          ruby: "こだいじんの　どろにんぎょうが　かいこうせんを\nあびて　せいめいを　やどしたと　いわれている。\nくうちゅうに　ういて　いどうしている。"
          sapphire: "２まんねんまえに　さかえた　こだい　ぶんめいの\nどろにんぎょうから　うまれた　ナゾの　ポケモン。\nりょうてから　ビームを　はっしゃするぞ。"
        en:
          ruby: "CLAYDOL are said to be dolls of mud made\nby primitive humans and brought to life\nby exposure to a mysterious ray.\fThis POKéMON moves about while\nlevitating."
          sapphire: "CLAYDOL is an enigma that appeared\nfrom a clay statue made by an ancient\ncivilization dating back 20,000 years.\fThis POKéMON shoots beams from both\nits hands."
        fr:
          ruby: "On raconte que les KAORINE sont des\npoupées de boue créées par les premiers\nhommes et qu’elles furent amenées à la\fvie après une exposition à un \nmystérieux rayon. Ce POKéMON se\ndéplace en lévitant."
          sapphire: "KAORINE est un mystérieux POKéMON\napparu sous la forme d’une statue en\nargile fabriquée par une civilisation\fvieille de plus de 20 000 ans. Ce POKéMON\nenvoie des rayons avec ses mains."
        it:
          ruby: "Pare che CLAYDOL sia una bambola\nd’argilla creata dall’uomo primitivo e\nportata in vita grazie all’esposizione\fa misteriose radiazioni. Questo\nPOKéMON si muove per levitazione."
          sapphire: "CLAYDOL rimane ancora un mistero:\ncomparve da una statua d’argilla creata\nda un popolo antico 20.000 anni fa.\fQuesto POKéMON emette radiazioni\ndai propri arti superiori."
        de:
          ruby: "LEPUMENTAS sind aus Schlamm gefertigte\nPuppen, die von primitiven Menschen\nhergestellt und durch mysteriöse\fStrahlen zum Leben erweckt wurden.\nDiese POKéMON bewegen sich\nschwebend fort."
          sapphire: "LEPUMENTAS ist ein Rätsel um eine Ton-\nstatue, die vor 20.000 Jahren von einer\nantiken Zivilisation geschaffen wurde.\fDieses POKéMON verschießt Strahlen aus\nbeiden Händen."
        es:
          ruby: "Dicen que los CLAYDOL son figuras de\nbarro hechas por humanos primitivos. Y\ndicen también que cobraron vida gracias\fa un misterioso rayo.\nEste POKéMON se mueve mientras levita."
          sapphire: "CLAYDOL es un enigma, una figura de\nbarro procedente de una civilización\nantigua de hace más de 20.000 años.\fEste POKéMON dispara rayos por las\nmanos."
