      descriptions:
        jp_kana:
          ruby: "なんおくねんも　オゾンそうの　なかを　とびつづけ\nけっして　ちじょうには　おりてこない　ポケモン。\nくうきちゅうの　チリと　みずを　たべるらしい。"
          sapphire: "なんおくねんも　いきつづけていると　いわれる。\nくもの　うえに　ひろがる　オゾンそうの　なかを\nとんでいるため　だれも　はっけん　できなかった。"
        en:
          ruby: "RAYQUAZA lived for hundreds of millions\nof years in the earth’s ozone layer, \nnever descending to the ground.\fThis POKéMON appears to feed on water\nand particles in the atmosphere."
          sapphire: "RAYQUAZA is said to have lived for\nhundreds of millions of years in the\nearth’s ozone layer, above the clouds.\fIts existence had been completely\nunknown because it lived so high in\nthe sky."
        fr:
          ruby: "RAYQUAZA a vécu des centaines de\nmillions d’années dans la couche\nd’ozone, sans jamais descendre\fsur terre. Ce POKéMON se nourrit de\nl’eau ou des particules contenues\ndans l’atmosphère."
          sapphire: "On raconte que RAYQUAZA a vécu\npendant des centaines de millions\nd’années dans la couche d’ozone de la\fplanète, au-dessus des nuages. Il vivait\ntellement loin que son existence était\ntotalement inconnue."
        it:
          ruby: "RAYQUAZA visse per centinaia di\nmilioni di anni nello strato d’ozono\nterrestre, non scendendo mai a terra.\fQuesto POKéMON pare nutrirsi\ndi acqua e particelle presenti\nnell’atmosfera."
          sapphire: "Pare che RAYQUAZA abbia vissuto\nper centinaia di migliaia di anni nello\nstrato di ozono terrestre oltre le nubi.\fSi ignorava la sua esistenza\npoiché viveva così in alto,\nsperduto nel cielo."
        de:
          ruby: "RAYQUAZA lebte für hunderte Millionen\nJahre in der Ozonschicht und stieg nie\nzur Erde hinab. Dieses POKéMON\flebt von Wasser und Partikeln aus der\nAtmosphäre."
          sapphire: "RAYQUAZA soll für hunderte Millionen\nJahre in der Ozonschicht der Erde über\nden Wolken gelebt haben. Daher wusste\fman so lange nicht von seiner Existenz."
        es:
          ruby: "RAYQUAZA vivió durante cientos de\nmillones de años en la capa de ozono\nsin bajar a la tierra ni una vez.\fSegún parece, este POKéMON\nse alimentaba del agua y las partículas\nque había en la atmósfera."
          sapphire: "Dicen que RAYQUAZA ha vivido más allá\nde las nubes, en la capa de ozono,\ndurante cientos de millones de años.\fPor este motivo nunca se había tenido\nconstancia de su existencia."
