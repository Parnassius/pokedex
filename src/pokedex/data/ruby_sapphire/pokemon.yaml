          sapphire: "ほしがたの　からだを　スクリューの　ように\nかいてんさせて　すいちゅうを　およぎまわる。\nちゅうおうに　ある　コアが　なないろに　ひかる。"
        en:
          ruby: "STARMIE’s center section - the core -\nglows brightly in seven colors.\nBecause of its luminous nature, this\fPOKéMON has been given the nickname\n“the gem of the sea.”"
          sapphire: "STARMIE swims through water by\nspinning its star-shaped body as if it\nwere a propeller on a ship.\fThe core at the center of this\nPOKéMON’s body glows in seven colors."
        fr:
          ruby: "Le centre de STAROSS, son cœur,\nresplendit de sept différentes\ncouleurs. A cause de sa brillance\fnaturelle, on appelle ce POKéMON le\n«joyau des mers»."
          sapphire: "STAROSS nage en faisant tournoyer son\ncorps en forme d’étoile, un peu à la\nmanière d’une hélice de bateau.\fLe cœur au centre du corps de ce\nPOKéMON brille de sept couleurs."
        it:
          ruby: "Il centro del corpo di STARMIE,\nil suo nucleo, brilla in sette colori.\fPer la sua luminosità è chiamato\n“Gemma del mare.”"
          sapphire: "STARMIE nuota roteando vorticosa-\nmente il corpo a stella come fosse\nl’elica di una nave.\fIl suo nucleo brilla in sette\ndiversi colori."
        de:
          ruby: "STARMIEs Mittelteil, sein Kern, leuchtet\nin sieben Farben. Aufgrund dieser\nEigenschaft wird es auch\f„Juwel des Meeres“ genannt."
          sapphire: "STARMIE kann schwimmen, indem es\nseinen sternförmigen Körper wie eine\nSchiffsschraube dreht. Der Kern in\fseiner Körpermitte leuchtet in sieben\nFarben."
        es:
          ruby: "La parte central de STARMIE (el núcleo\nbrillante) resplandece con siete colores\ndistintos. Debido a su naturaleza\fluminosa, a este POKéMON se le ha\ndado el apelativo de “la gema del mar”."
          sapphire: "STARMIE nada por el agua haciendo girar\nsu cuerpo estrellado a modo de hélice.\nEl núcleo de este POKéMON brilla y\fllega a tornarse de siete colores."
