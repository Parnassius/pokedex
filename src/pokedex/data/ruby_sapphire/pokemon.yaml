      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - field
        - water_2
      abilities:
        - water_veil
        - oblivious
      descriptions:
        jp_kana:
          ruby: "みつかった　なかでは　さいだいの　ポケモン。\nおおうなばらを　ゆったりと　およぎ　おおきな\nくちで　いっきに　たいりょうの　エサを　たべる。"
          sapphire: "えものを　おいたてる　ために　すいちゅうから\nジャンプして　おおきな　みずしぶきを　あげる。\nむれで　ジャンプする　すがたは　だいはくりょく。"
        en:
          ruby: "WAILORD is the largest of all identified\nPOKéMON up to now.\nThis giant POKéMON swims languorously\fin the vast open sea, eating massive\namounts of food at once with its\nenormous mouth."
          sapphire: "When chasing prey, WAILORD herds them\nby leaping out of the water and making\na humongous splash.\fIt is breathtaking to see this POKéMON\nleaping out of the sea with others in\nits pod."
        fr:
          ruby: "WAILORD est le plus grand POKéMON\ndécouvert à ce jour. Ce POKéMON géant\nnage lascivement dans les grandes\fétendues maritimes, avalant d’énormes\nquantités de nourriture en une seule\nde ses monstrueuses bouchées."
          sapphire: "Lorsqu’il chasse ses proies, WAILORD\nles rassemble en sautant hors de l’eau\net en créant une énorme vague.\fLa vue de plusieurs de ces POKéMON\nbondissant hors de l’eau laisse \ngénéralement sans voix."
        it:
          ruby: "WAILORD è il più grande tra tutti i\nPOKéMON finora identificati.\nCon la sua gigante mole nuota\fdolcemente nella vastità del mare\naperto, ingoiando enormi quantità\ndi cibo con la bocca enorme."
          sapphire: "Cacciando le prede, i WAILORD\neseguono balzi e tuffi\nspettacolari in acqua.\fÈ davvero uno spettacolo mozzafiato\nvedere questi POKéMON esibirsi in\nbranco."
        de:
          ruby: "WAILORD ist bisher das größte aller\nidentifizierten POKéMON. Es schwimmt\nreglos auf dem offenen Meer und nimmt\fmit seinem enormen Maul riesige Mengen\nan Nahrung auf."
          sapphire: "WAILORD jagt seine Beute, indem es aus\ndem Meer herausspringt und ein gewal-\ntiges Platschen erzeugt. Es ist\fatemberaubend, eine Gruppe dieses\nPOKéMON aus dem Wasser springen zu\nsehen."
        es:
          ruby: "WAILORD es el mayor POKéMON registrado\nhasta la fecha. Este coloso va nadando\nlánguidamente por el ancho mar\fcon la boca abierta para que penetre\nla mayor cantidad posible de alimento."
          sapphire: "WAILORD caza con otros miembros\nde su especie. Es espectacular ver\ncómo saltan y chapotean en el agua\fpara agrupar a sus presas.\nRealmente impresiona ver\ncómo impactan contra el agua."
numel:
  species_id: 322
