      descriptions:
        jp_kana:
          ruby: "２つの　あたまが　どうじに　ねむることは　ない。\nねている　とき　てきから　おそわれない　ように\nかわりばんこで　みはりを　しているからだ。"
          sapphire: "２つの　あたまは　おなじ　のうみそを　もつ。\nまれに　べつべつの　のうを　もった　ドードーが\nうまれてくると　けんきゅうで　ほうこくされた。"
        en:
          ruby: "DODUO’s two heads never sleep at the\nsame time.\nIts two heads take turns sleeping,\fso one head can always keep watch for\nenemies while the other one sleeps."
          sapphire: "DODUO’s two heads contain completely\nidentical brains.\nA scientific study reported that on\frare occasions, there will be examples\nof this POKéMON possessing different\nsets of brains."
        fr:
          ruby: "Les deux têtes de DODUO ne dorment\njamais en même temps. Elles dorment à\ntour de rôle pour que l’une puisse\fmonter la garde pendant que\nl’autre dort."
          sapphire: "Les deux têtes de DODUO contiennent\ndes cerveaux totalement identiques.\nUne étude scientifique démontra que\fdans des cas rares, certains de\nces POKéMON possèdent des\ncerveaux différents."
        it:
          ruby: "Le due teste di DODUO non dormono\nmai nello stesso momento, in modo\nche una sia sempre vigile per difendersi\fdai nemici, mentre l’altra può riposare\ntranquilla."
          sapphire: "Le due teste di DODUO contengono\nlo stesso identico cervello.\nSecondo uno studio scientifico sono\fstati riportati rari casi di POKéMON\ncon cervelli diversi."
        de:
          ruby: "DODU hat zwei Köpfe, die nie zur \nselben Zeit, sondern abwechselnd\nschlafen. Während ein Kopf schläft,\fhält der andere Ausschau nach Feinden."
          sapphire: "DODU hat zwei Köpfe mit absolut\nidentischen Gehirnen. Eine wissen-\nschaftliche Studie hat allerdings\fnachgewiesen, dass es auch Exemplare\ndieses POKéMON gibt, die zwei\nunterschiedliche Gehirne haben."
        es:
          ruby: "Las dos cabezas de DODUO duermen\nde forma independiente, siempre por\nturnos. Así que mientras una duerme,\fla otra hace de centinela por si\naparecen enemigos."
          sapphire: "DODUO es un POKéMON bicéfalo,\nde cerebros idénticos. Según un\nestudio científico, podría darse\fel extraño caso de que hubiera DODUO\ncon cerebros distintos."
