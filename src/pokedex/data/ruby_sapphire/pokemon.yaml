        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - thick_fat
        - own_tempo
      descriptions:
        jp_kana:
          ruby: "シッポで　びょんびょん　とびはねる　ポケモン。\nとびはねる　しんどうで　しんぞうを　うごかして\nいるので　とびはねる　ことは　やめられないのだ。"
          sapphire: "あたまに　のせた　しんじゅが　バネブーの\nサイコパワーを　たかめる　はたらきをする。\nおおきな　しんじゅを　いつも　さがしている。"
        en:
          ruby: "SPOINK bounces around on its tail.\nThe shock of its bouncing makes its\nheart pump. As a result, this POKéMON\fcannot afford to stop bouncing - if it\nstops, its heart will stop."
          sapphire: "SPOINK keeps a pearl on top of its head.\nThe pearl functions to amplify this\nPOKéMON’s psychokinetic powers.\fIt is therefore on a constant search\nfor a bigger pearl."
        fr:
          ruby: "SPOINK rebondit sur sa queue.\nLe choc du rebond fait battre son cœur.\nDu coup, ce POKéMON ne peut pas\fs’arrêter de rebondir, sinon,\nson cœur s’arrête."
          sapphire: "SPOINK garde une perle sur sa tête.\nElle lui sert à amplifier ses pouvoirs\ntélékinésiques.\fIl est constamment en quête d’une perle\nplus grosse."
        it:
          ruby: "SPOINK rimbalza come una molla sulla\ncoda. Il colpo ricevuto dal rimbalzo gli\nfa battere il cuore. Di conseguenza,\fnon può mai smettere di saltellare,\naltrimenti il suo cuore smette\ndi battere."
          sapphire: "Sulla sommità del capo SPOINK porta\nun perla che serve per amplificare\ni suoi poteri psicocinetici.\fPer questo motivo è sempre in cerca\ndi una perla più grande."
        de:
          ruby: "SPOINK hüpft auf seinem Schweif durch\ndie Gegend. Die Erschütterung des\nHüpfens bringt sein Herz zum Schlagen.\fDeshalb kann dieses POKéMON das Hüpfen\nnicht sein lassen, ansonsten würde sein\nHerz aufhören zu schlagen."
          sapphire: "SPOINK trägt eine Perle auf seinem\nKopf, die seine psychokinetische\nEnergie verstärkt. Deshalb ist es\fdauernd auf der Suche nach einer\ngrößeren Perle."
        es:
          ruby: "SPOINK se pasa todo el día saltando\nsobre la cola. Con cada salto, hace latir\nel corazón. Por eso no puede permitirse\fdejar de saltar. Si lo hace, se le parará\nel corazón."
          sapphire: "SPOINK lleva una perla en la cabeza,\nque sirve para amplificar los poderes\npsicoquinéticos que tiene.\fPor eso está continuamente buscando\nuna perla mayor."
grumpig:
  species_id: 326
  names:
    jp_kana: ブーピッグ
    en: GRUMPIG
    fr: GRORET
    it: GRUMPIG
    de: GROINK
    es: GRUMPIG
  forms:
    grumpig:
      form_id: 0
      base_stats:
        hp: 80
        attack: 45
        defense: 65
        special_attack: 90
        special_defense: 110
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - thick_fat
        - own_tempo
      descriptions:
        jp_kana:
          ruby: "サイコパワーの　はどうを　くろしんじゅで　つよめ\nじゆうじざいに　あいてを　あやつる　ポケモン。\nちからを　つかうとき　はないきが　あらくなるぞ。"
          sapphire: "くろしんじゅを　りようして　ふしぎな　ちからを\nつかうとき　きみょうな　ステップで　おどりだす。\nくろしんじゅは　びじゅつひんの　かちを　もつ。"
        en:
          ruby: "GRUMPIG uses the black pearls on its\nbody to amplify its psychic power waves\nfor gaining total control over its foe.\fWhen this POKéMON uses its special\npower, its snorting breath grows\nlabored."
          sapphire: "GRUMPIG uses the black pearls on its\nbody to wield its fantastic powers.\nWhen it is doing so, it dances bizarrely.\fThis POKéMON’s black pearls are valuable\nas works of art."
        fr:
          ruby: "GRORET utilise les perles noires\nsituées sur son corps pour amplifier la\npuissance de ses ondes psychiques et\fprendre le contrôle de son ennemi. Quand\nil utilise son pouvoir spécial, ce\nPOKéMON a du mal à respirer."
          sapphire: "GRORET utilise les perles noires\nsur son corps pour exercer ses\nformidables pouvoirs. Quand il est en\faction, il entame une étrange danse.\nLes perles noires de ce POKéMON ont\nune valeur inestimable."
        it:
          ruby: "GRUMPIG usa le perle nere del suo corpo\nper amplificare le onde psichiche e\nacquisire il pieno controllo del nemico.\fQuando usa i suoi speciali poteri,\nil suo respiro diventa affannoso."
          sapphire: "GRUMPIG usa le perle nere che ha sul\ncorpo per esercitare i suoi fantastici\npoteri. In queste occasioni danza\fin modo bizzarro. Le perle nere di\nquesto POKéMON sono preziose\nopere d’arte."
        de:
          ruby: "GROINK benutzt die schwarzen Perlen\nan seinem Körper dazu, die\npsychischen Kraftwellen zu verstärken.\fWenn es diese spezielle Fähigkeit nutzt,\nwird sein schnaubender Atem\nschwerfällig."
          sapphire: "GROINK benutzt die schwarzen Perlen\nan seinem Körper, um seine fantas-\ntischen Kräfte nutzen zu können. Dabei\ftanzt es sonderbar. Die schwarzen\nPerlen dieses POKéMON sind wahre\nKunstwerke und ebenso wertvoll."
        es:
          ruby: "GRUMPIG usa las perlas negras que tiene\npara amplificar las ondas de su poder\npsíquico y controlar del todo al rival.\fCuando usa su poder especial,\nse le cansa la respiración y resopla\ncon pesadez."
          sapphire: "GRUMPIG utiliza las perlas negras que\ntiene para usar fantásticos poderes\nmientras baila de forma muy extraña.\fLas perlas de este POKéMON\nestán consideradas como valiosas\nobras de arte."
spinda:
  species_id: 327
  names:
    jp_kana: パッチール
    en: SPINDA
    fr: SPINDA
    it: SPINDA
    de: PANDIR
    es: SPINDA
  forms:
    spinda:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 60
        special_defense: 60
