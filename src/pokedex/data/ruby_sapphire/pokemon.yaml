      descriptions:
        jp_kana:
          ruby: "じぶんの　たいじゅうの　２ばいも　ある　あいてを\nツノで　はさみ　かるがる　もちあげる　かいりき。\nさむい　ばしょでは　からだの　うごきが　にぶる。"
          sapphire: "たくましい　２ほんの　ツノの　ひょうめんに　ある\nトゲが　あいての　からだに　ふかく　くいこむので\nはさまれると　かんたんに　はずせないのだ。"
        en:
          ruby: "PINSIR is astoundingly strong. It can\ngrip a foe weighing twice its weight\nin its horns and easily lift it.\fThis POKéMON’s movements turn sluggish\nin cold places."
          sapphire: "PINSIR has a pair of massive horns \nProtruding from the surface of these\nhorns are thorns.\fThese thorns are driven deeply into the\nfoe’s body when the pincer closes,\nmaking it tough for the foe to escape."
        fr:
          ruby: "SCARABRUTE est incroyablement fort.\nIl peut attraper un ennemi qui pèse\ndeux fois son poids dans ses mandibules\fet le soulever sans le moindre problème.\nLorsqu’il fait froid, les mouvements de\nce POKéMON sont un peu ralentis."
          sapphire: "SCARABRUTE est doté de cornes\nimposantes. Des pointes jaillissent de\nla surface de ses cornes.\fCes pointes s’enfoncent profondément\ndans le corps de l’ennemi, l’empêchant\nainsi de s’échapper."
        it:
          ruby: "PINSIR è incredibilmente forte. Può\nafferrare e sollevare tra le chele sul\ncapo un nemico dal peso doppio rispetto\fal suo. I suoi movimenti sono impacciati\nin luoghi freddi."
          sapphire: "PINSIR è dotato di due chele enormi\nsul capo, dalla cui superficie sporgono\naculei.\fQuesti vengono conficcati nel corpo\ndel nemico quando le chele si chiudono,\nper impedirne la fuga."
        de:
          ruby: "PINSIR ist erstaunlich stark. Es kann\neinen Feind, der doppelt so viel wiegt\nwie es selbst, mit seinen Hörnern\fpacken und hochheben. Bei niedrigen\nTemperaturen werden die Bewegungen\ndieses POKéMON schwerfällig."
          sapphire: "PINSIR hat ein Paar massive Hörner. Aus\ndiesen ragen Dornen hervor, die sich in\nden Körper seines Gegners\fhineinbohren, wenn sich die Zange\nschließt, und ihm das Entkommen\nschwer machen."
        es:
          ruby: "PINSIR es sorprendentemente grande.\nPuede agarrar con los cuernos a un rival\nque pese el doble que él y levantarlo por\flos aires.\nEn zonas frías, los movimientos de este\nPOKéMON se vuelven lentos."
          sapphire: "PINSIR tiene un par de cuernos\nimponentes recubiertos de pinchos,\nque se clavan en el cuerpo del rival.\fUna vez los ha clavado, no hay\nquien escape de su abrazo."
