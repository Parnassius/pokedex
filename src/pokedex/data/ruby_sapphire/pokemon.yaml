      descriptions:
        jp_kana:
          ruby: "からだの　トゲは　ひふが　かたくなったもの。\n１ねんに　１かい　ふるい　トゲが　ぬけおちて\nあたらしい　トゲが　したから　はえてくる。"
          sapphire: "せなかを　まるめると　トゲトゲの　ボールみたい。\nトゲに　さされて　ひるんだ　あいてに　とびかかり\nするどい　ツメで　ばりばり　ひっかきまくるぞ。"
        en:
          ruby: "SANDSLASH’s body is covered by tough\nspikes, which are hardened sections of\nits hide. Once a year, the old spikes fall\fout, to be replaced with new spikes that\ngrow out from beneath the old ones."
          sapphire: "SANDSLASH can roll up its body as if it\nwere a ball covered with large spikes.\nIn battle, this POKéMON will try to make\fthe foe flinch by jabbing it with its\nspines. It then leaps at the stunned\nfoe to tear wildly with its sharp claws."
        fr:
          ruby: "Le corps de SABLAIREAU est recouvert\nde pointes très dures, qui sont des\nextensions de sa peau. Une fois par an,\fce POKéMON mue et les vieilles pointes\ntombent, remplacées par de nouvelles."
          sapphire: "SABLAIREAU peut enrouler son corps\npour prendre la forme d’une balle\nhérissée de pointes. Ce POKéMON\fessaie de faire peur à son ennemi en le\nfrappant avec ses pointes. Puis, il se\nrue sur lui avec ses griffes acérées."
        it:
          ruby: "Il corpo di SANDSLASH è ricoperto da\naculei coriacei, costituiti da parti\ndi corazza indurita. I vecchi aculei\fcadono una volta all’anno per essere\nsostituiti dai nuovi che crescono\nsotto i precedenti."
          sapphire: "SANDSLASH arrotola il proprio corpo\ncome fosse una sfera ricoperta di\ngrandi aculei, che usa in lotta per far\ftentennare il nemico. Poi gli si scaglia\ncontro per colpirlo selvaggiamente\ncon gli artigli affilati."
        de:
          ruby: "SANDAMERs Körper ist übersät\nmit spitzen Stacheln, die eigentlich\nHauthärtungen darstellen.\fEinmal im Jahr fallen die alten Stacheln\naus und werden durch neue ersetzt."
          sapphire: "SANDAMER kann sich zu einem Ball mit\nlangen Stacheln zusammenrollen. Im\nKampf schlägt es seine Gegner in die\fFlucht, indem es sie mit seinen Stacheln\nsticht. Dann springt es sie an und\nschlägt mit seinen scharfen Klauen zu."
        es:
          ruby: "SANDSLASH está recubierto de duras\npúas que son partes endurecidas de la\npiel. Suele mudarlas una vez al año;\fdebajo de las viejas púas crecen unas\nnuevas que las sustituyen."
          sapphire: "SANDSLASH se puede enroscar y\nconvertirse en una bola de largas\npúas. En combate, este POKéMON\fhará lo posible por debilitar a su rival:\nle clavará las púas, se le acercará y\nle atacará con las afiladas garras."
