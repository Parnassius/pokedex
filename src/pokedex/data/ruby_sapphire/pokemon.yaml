          sapphire: "MAUZI zieht seine scharfen Krallen ein,\num umherschleichen zu können, ohne\nverräterische Spuren zu hinterlassen.\fDieses POKéMON hat eine Vorliebe für\nMünzen, die das Licht reflektieren."
        es:
          ruby: "MEOWTH saca las afiladas uñas de las\nzarpas para caminar a hurtadillas, dando\nsigilosos pasos para pasar inadvertido.\fNo se sabe muy bien por qué, pero este\nPOKéMON adora las monedas brillantes\nque resplandecen con la luz."
          sapphire: "MEOWTH saca las afiladas uñas de las\nzarpas para caminar a hurtadillas, dando\nsigilosos pasos para pasar inadvertido.\fNo se sabe muy bien por qué, pero este\nPOKéMON adora las monedas brillantes\nque resplandecen con la luz."
