        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - bug
      egg_groups:
        - bug
        - human_like
      abilities:
        - illuminate
        - swarm
      descriptions:
        jp_kana:
          ruby: "ひが　くれると　しっぽから　ひかりを　だして\nあかるさや　てんめつで　なかまと　かいわする。\nイルミーゼの　あまい　かおりに　ひきよせられる。"
          sapphire: "しっぽの　あかりを　つかって　しゅうだんで\nよぞらに　きかがくてきな　ずけいを　えがく。\nイルミーゼの　だす　あまい　かおりが　だいすき。"
        en:
          ruby: "With the arrival of night, VOLBEAT emits\nlight from its tail. It communicates with\nothers by adjusting the intensity and\fflashing of its light.\nThis POKéMON is attracted by the sweet\naroma of ILLUMISE."
          sapphire: "VOLBEAT’s tail glows like a lightbulb.\nWith other VOLBEAT, it uses its tail to\ndraw geometric shapes in the night sky.\fThis POKéMON loves the sweet aroma\ngiven off by ILLUMISE."
        fr:
          ruby: "A la tombée de la nuit, la queue de\nMUCIOLE émet de la lumière. Il\ncommunique avec les autres en ajustant\fl’intensité et le clignotement de sa\nlumière. Ce POKéMON est attiré par\nle doux parfum de LUMIVOLE."
          sapphire: "La queue de MUCIOLE éclaire comme\nune ampoule. Ensemble, les MUCIOLE\ndessinent des figures géométriques\fdans la nuit étoilée. Ce POKéMON adore\nle parfum dégagé par LUMIVOLE."
        it:
          ruby: "Quando cala la notte, VOLBEAT emette\nuna luce intensa dalla coda. Comunica\ncon gli altri regolando l’intensità e\fl’intermittenza della propria luce.\nIl POKéMON è attratto dal dolce\naroma di ILLUMISE."
          sapphire: "La coda di VOLBEAT si illumina come\nuna lampadina. Assieme ai suoi simili\nusa la coda per tracciare figure\fgeometriche nel cielo notturno.\nQuesto POKéMON ama il dolce\naroma emanato da ILLUMISE."
        de:
          ruby: "Wenn es Nacht wird, beginnt VOLBEATs\nSchweif zu leuchten. Es kommuniziert\nmit anderen, indem es die Helligkeit\fund das Blinken dieses Lichts reguliert.\nDieses POKéMON wird vom süßen Duft\nder ILLUMISE angezogen."
          sapphire: "VOLBEATs Schweif leuchtet wie eine\nGlühbirne. Zusammen mit anderen \nVOLBEAT malt es mit seinem Schweif\fgeometrische Figuren an den Nacht-\nhimmel. Dieses POKéMON liebt den von\nILLUMISE verströmten Duft."
        es:
          ruby: "Cuando llega la noche, VOLBEAT emite luz\npor la cola y regula la intensidad y el\ndestello para comunicarse con el resto.\fA este POKéMON le atrae el dulce aroma\nde ILLUMISE."
          sapphire: "La cola de VOLBEAT brilla como una\nbombilla. Ante otro de su grupo, la usa\npara dibujar formas geométricas\fen la oscuridad del cielo por la noche.\nEste POKéMON adora el dulce aroma\nque desprende ILLUMISE."
illumise:
  species_id: 314
