        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - immunity
      descriptions:
        jp_kana:
          ruby: "しゅくてき　ハブネークとの　たたかいの　きおくが\nからだじゅうの　さいぼうに　きざみこまれている。\nびんしょうな　みのこなしで　こうげきを　かわす。"
          sapphire: "ふだんは　４ほんあしで　こうどうして　いるが\nおこると　うしろあしで　たち　ツメが　とびだす。\nハブネークとは　せんぞから　つづく　ライバルだ。"
        en:
          ruby: "Memories of battling its arch-rival\nSEVIPER are etched into every cell of\nZANGOOSE’s body.\fThis POKéMON adroitly dodges attacks\nwith incredible agility."
          sapphire: "ZANGOOSE usually stays on all fours,\nbut when angered, it gets up on its\nhind legs and extends its claws.\fThis POKéMON shares a bitter rivalry\nwith SEVIPER that dates back over\ngenerations."
        fr:
          ruby: "Chaque cellule du corps de MANGRIFF\nporte les stigmates de sa rivalité avec\nSEVIPER.\fCe POKéMON est capable d’esquiver les\nattaques avec une agilité incroyable."
          sapphire: "MANGRIFF est généralement à quatre\npattes, mais lorsqu’il est en colère,\nil se lève sur ses pattes arrière et\fmontre ses griffes. Ce POKéMON est\nl’ennemi juré de SEVIPER depuis\nplusieurs générations."
        it:
          ruby: "I ricordi delle lotte contro il suo\nacerrimo nemico SEVIPER sono insiti\nin ogni cellula del corpo di ZANGOOSE.\fQuesto POKéMON riesce a schivare\ngli attacchi con incredibile maestria."
          sapphire: "Di solito ZANGOOSE cammina a quattro\nzampe, ma quando si infuria si alza sulle\nzampe posteriori ed estrae gli artigli.\fQuesto POKéMON è acerrimo nemico\ndi SEVIPER, infatti la loro inimicizia\nè ormai leggendaria."
        de:
          ruby: "Die Erinnerungen an den Kampf mit\nseinem Erzrivalen VIPITIS haben sich in\njede Zelle von SENGOs Körper\feingebrannt. Dieses POKéMON weicht\nfeindlichen Angriffen unheimlich\nraffiniert und geschickt aus."
          sapphire: "SENGO bewegt sich normalerweise auf\nallen Vieren. Wenn es aber wütend wird, \nstellt es sich auf seine Hinterbeine und\ffährt seine Klauen aus. Dieses POKéMON\nist seit Generationen ein erbitterter\nRivale von VIPITIS."
        es:
          ruby: "Los ecos del combate mantenido con su\nrival más feroz, SEVIPER, resuenan aún\nen cada célula de ZANGOOSE.\fEste POKéMON esquiva los ataques\ncon auténtica destreza."
          sapphire: "ZANGOOSE suele caminar a cuatro patas,\npero cuando se enfada se pone de pie\nsobre las traseras y saca las zarpas.\fEste POKéMON tiene desde hace varias\ngeneraciones una áspera rivalidad con\nSEVIPER."
seviper:
  species_id: 336
  names:
    jp_kana: ハブネーク
    en: SEVIPER
    fr: SEVIPER
    it: SEVIPER
    de: VIPITIS
