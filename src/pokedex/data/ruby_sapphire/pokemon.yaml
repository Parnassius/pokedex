          sapphire: "Le zampe di HITMONLEE sono estrema-\nmente elastiche. Usandole a mo’ di molla,\nsi scaglia sul nemico con calci rovinosi.\fDopo la lotta si strofina le zampe e\nscioglie i muscoli per recuperare\nle forze."
