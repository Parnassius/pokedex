        fr:
          ruby: "Les nuits de pleine lune, des groupes de\nce POKéMON sortent jouer. Lorsque\nl’aube commence à poindre, les MELOFEE\ffatigués rentrent dans leur retraite\nmontagneuse et vont dormir, blottis les\nuns contre les autres."
          sapphire: "Les nuits de pleine lune, des groupes de\nce POKéMON sortent jouer. Lorsque\nl’aube commence à poindre, les MELOFEE\ffatigués rentrent dans leur retraite\nmontagneuse et vont dormir, blottis les\nuns contre les autres."
        it:
          ruby: "In ogni notte di luna piena questi\nPOKéMON escono in gruppo a giocare.\nAll’alba i CLEFAIRY tornano stanchi\fnella quiete delle loro tane montane e\nvanno a dormire stretti fra loro."
          sapphire: "In ogni notte di luna piena questi\nPOKéMON escono in gruppo a giocare.\nAll’alba i CLEFAIRY tornano stanchi\fnella quiete delle loro tane montane e\nvanno a dormire stretti fra loro."
        de:
          ruby: "In Vollmondnächten sammeln sich einige\ndieser POKéMON, um zu spielen. Wird es \nTag, kehrt PIEPI zu seinem Zufluchts-\fort in den Bergen zurück und\nschläft eingekuschelt neben\nseinen Artgenossen ein."
          sapphire: "In Vollmondnächten zeigt sich dieses\nPOKéMON. Wenn es Tag wird, kehrt \nPIEPI zu seinem Zufluchtsort in den\fBergen zurück und schläft \neingekuschelt neben seinen\nArtgenossen ein."
        es:
          ruby: "Siempre que hay luna llena, salen en\ngrupo para jugar. Al amanecer, los\nCLEFAIRY, agotados, regresan a sus\frefugios de montaña para dormir\nacurrucados unos con otros."
          sapphire: "Siempre que hay luna llena, salen en\ngrupo para jugar. Al amanecer, los\nCLEFAIRY, agotados, regresan a sus\frefugios de montaña para dormir\nacurrucados unos con otros."
