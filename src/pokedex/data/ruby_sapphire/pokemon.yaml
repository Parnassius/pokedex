        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - undiscovered
      abilities:
        - drought
      descriptions:
        jp_kana:
          ruby: "だいちを　もりあげて　たいりくを　ひろげた\nポケモンと　しんわで　かたり　つがれている。\nカイオーガと　しとうの　すえ　ねむりに　ついた。"
          sapphire: "あまぐもを　ふきはらい　ひかりと　ねつで　みずを\nじょうはつさせる　ちからを　もつ　ポケモン。\nこうずいに　くるしむ　ひとびとを　すくった。"
        en:
          ruby: "GROUDON has long been described in \nmythology as the POKéMON that raised\nlands and expanded continents.\fThis POKéMON took to sleep after a\ncataclysmic battle with KYOGRE."
          sapphire: "GROUDON has the power to scatter rain\nclouds and make water evaporate with\nlight and heat.\fIt came as a savior to people who had\nbeen suffering from terrible floods."
        fr:
          ruby: "GROUDON est depuis longtemps décrit\ndans la mythologie comme le POKéMON qui\na créé les terres et agrandi\fles continents. Ce POKéMON s’est\nendormi après un combat cataclysmique\ncontre KYOGRE."
          sapphire: "GROUDON a le pouvoir de disperser\nles nuages et de créer de la chaleur et\nde la lumière pour provoquer\fl’évaporation de l’eau. Il est apparu\ncomme un sauveur aux yeux des gens qui\nsubissaient de terribles inondations."
        it:
          ruby: "La mitologia descriveva GROUDON\ncome colui che fa emergere\nle terre ed espandere i continenti.\fQuesto POKéMON entrò in letargo\ndopo una lotta contro KYOGRE\nche causò un cataclisma."
          sapphire: "GROUDON ha il potere di dissolvere le\nnubi cariche di pioggia e far evaporare\nl’acqua con la luce e il calore.\fÈ considerato il salvatore di tutti\ncoloro che sono stati colpiti da\nterribili inondazioni."
        de:
          ruby: "GROUDON wurde lange Zeit in der\nMythologie als ein POKéMON\nbeschrieben, das Land erschaffen und\fKontinente vergrößern kann. Dieses\nPOKéMON fiel nach einem erbitterten\nKampf mit KYOGRE in den Schlaf."
          sapphire: "GROUDON hat die Macht, mit Licht und\nHitze Regenwolken zu vertreiben und \nWasser verdunsten zu lassen.\fEs brachte den Menschen Erlösung, die\nunter schrecklichen Überschwemmungen\ngelitten hatten."
        es:
          ruby: "A GROUDON siempre se le ha descrito\nen mitología como el POKéMON que elevó\nla tierra y expandió los continentes.\fTras un combate contra KYOGRE\nque acabó en cataclismo, se echó\na dormir."
          sapphire: "GROUDON tiene el poder de disipar\nlas nubes que amenazan con lluvia\ny de hacer que el agua se evapore\fcon luz y calor. Es el héroe de quienes\nsufren terribles inundaciones."
