      descriptions:
        jp_kana:
          ruby: "はがねの　からだを　つくるため　てっこうせきを\nやまから　ほりだして　たべているが　たまに\nはしや　レールを　たべてしまう　こまりものだ。"
          sapphire: "こうてつの　からだで　おもいっきり　ぶつかれば\nおおきな　ダンプカーも　いちげきで　バラバラだ。\nこわれた　ダンプカーを　むしゃむしゃ　たべるぞ。"
        en:
          ruby: "This POKéMON has a body of steel.\nTo make its body, ARON feeds on\niron ore that it digs from mountains.\fOccasionally, it causes major trouble by\neating bridges and rails."
          sapphire: "ARON has a body of steel.\nWith one all-out charge, this POKéMON\ncan demolish even a heavy dump truck.\fThe destroyed dump truck then becomes\na handy meal for the POKéMON."
        fr:
          ruby: "Ce POKéMON a un corps en acier. Pour\nconstituer son corps, GALEKID se\nnourrit de minerai de fer extrait\fdes montagnes. De temps en temps, il\ncause de nombreux dégâts en mangeant\ndes ponts ou des rails."
          sapphire: "GALEKID a un corps d’acier.\nEn une seule charge, ce POKéMON\npeut démolir un camion poids lourd.\fLe camion détruit devient ensuite le\nrepas de ce POKéMON."
        it:
          ruby: "Il corpo di ARON è costituito d’acciaio.\nPer mantenerne la consistenza ARON\nsi ciba di pepite di ferro rinvenute\fscavando in montagna. Talvolta crea\nenorme scompiglio poiché si nutre\nanche di ponti e ferrovie."
          sapphire: "ARON è dotato di un corpo d’acciaio.\nCon una sola potente carica riesce a\ndemolire anche un camion a rimorchio.\fQuesto costituisce poi un sano e ricco\npasto per il POKéMON."
        de:
          ruby: "Dieses POKéMON hat einen Körper aus\nStahl. STOLLUNIOR ernährt sich von\nEisenerz aus den Bergen. Zuweilen\frichtet es großen Schaden an, weil es\nBrücken und Bahngleise auffrisst."
          sapphire: "STOLLUNIORs Körper besteht aus Stahl.\nMit 1 Schlag kann dieses POKéMON einen\nSchwerlasttransporter demolieren.\fDer Lastwagen stellt danach eine\nhandliche Mahlzeit für dieses POKéMON\ndar."
        es:
          ruby: "Este POKéMON tiene el cuerpo de acero.\nPara mantenerlo, se alimenta del hierro\nque saca de las montañas.\fA veces, causa verdaderos problemas,\npues se come puentes y vías de tren."
          sapphire: "ARON tiene el cuerpo de acero. Con una\ncarga hecha con toda la fuerza es capaz\nde demoler hasta un camión de basura.\fY, a continuación, comérselo."
lairon:
  species_id: 305
  names:
    jp_kana: コドラ
    en: LAIRON
    fr: GALEGON
    it: LAIRON
    de: STOLLRAK
    es: LAIRON
  forms:
    lairon:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 140
        special_attack: 50
        special_defense: 50
