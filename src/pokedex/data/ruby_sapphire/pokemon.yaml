      abilities:
        - natural_cure
      descriptions:
        jp_kana:
          ruby: "わたぐもに　まぎれて　おおぞらを　まう。\nすきとおった　こえで　メロディを　さえずれば\nみみにした　ものは　うっとり　ゆめごこち。"
          sapphire: "うつくしい　ソプラノで　うたう　ポケモン。\nわたぐもの　ような　つばさで　じょうしょう\nきりゅうを　うけて　おおぞらへ　まいあがる。"
        en:
          ruby: "ALTARIA dances and wheels through the\nsky among billowing, cotton-like clouds.\nBy singing melodies in its crystal-clear\fvoice, this POKéMON makes its listeners\nexperience dreamy wonderment."
          sapphire: "ALTARIA sings in a gorgeous soprano.\nIts wings are like cotton clouds.\nThis POKéMON catches updrafts with its\fbuoyant wings and soars way up into\nthe wild blue yonder."
        fr:
          ruby: "ALTARIA danse et tournoie dans les\ncieux, au milieu des nuages gonflés et\ncotonneux. Ce POKéMON chante des\fmélodies de sa voix cristalline pour\noffrir aux auditeurs une expérience\nmerveilleuse et inoubliable."
          sapphire: "ALTARIA chante avec une\nmagnifique voix de soprano. Ses ailes\nressemblent à des nuages cotonneux.\fCe POKéMON se laisse porter par les\ncourants d’air ascendants et disparaît\ndans le bleu du ciel."
        it:
          ruby: "ALTARIA danza e volteggia nel cielo\ntra le nubi soffici come batuffoli di\ncotone. Cantando con la sua voce\fcristallina, riesce a mandare in\nonirica estasi chi lo ascolta."
          sapphire: "ALTARIA canta con una sublime voce\ndi soprano. Le sue ali spumeggianti,\nche sembrano nubi di cotone, gli\fconsentono di sfruttare le correnti\nascensionali e di risalire verso\nl’infinito cielo blu."
        de:
          ruby: "ALTARIA tanzt und dreht sich in der\nLuft durch viele Schäfchenwolken.\nIndem es mit seiner kristallklaren\fStimme Melodien singt, versetzt es\nseine Zuhörer in verträumtes\nErstaunen."
          sapphire: "ALTARIA hat eine tolle Sopran-Stimme.\nSeine Flügel sehen aus wie Schäfchen-\nwolken. Dieses POKéMON stürzt sich\fin einen Aufwind und steigt in den\nHimmel empor."
        es:
          ruby: "ALTARIA baila y revolotea por el cielo\nentre ondeantes nubes que parecen\nde algodón.\fAl entonar melodías con su voz\ncristalina, este POKéMON deja a sus\noyentes embobados y admirados."
          sapphire: "ALTARIA canta soprano de maravilla.\nTiene unas alas que parecen nubes de\nalgodón. Este POKéMON aprovecha las\fcorrientes ascendentes y remonta el\nvuelo con sus flamantes alas hacia la\ninmensidad del cielo azul."
zangoose:
  species_id: 335
  names:
    jp_kana: ザングース
    en: ZANGOOSE
    fr: MANGRIFF
    it: ZANGOOSE
    de: SENGO
