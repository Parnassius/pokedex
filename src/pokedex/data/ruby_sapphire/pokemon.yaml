      descriptions:
        jp_kana:
          ruby: "うみの　そこで　エサを　さがして　あるきまわる。\nきの　えだの　ような　くびを　じざいに　のばして\n８まいの　しょくしゅで　えものを　つかまえる。"
          sapphire: "からだが　おもりがわりに　なっているので\nうみが　あれても　ながされる　ことは　ない。\nしょくしゅから　つよい　しょうかえきを　だす。"
        en:
          ruby: "CRADILY roams around the ocean floor\nin search of food. This POKéMON freely\nextends its tree trunk-like neck and\fcaptures unwary prey using its eight\ntentacles."
          sapphire: "CRADILY’s body serves as an anchor,\npreventing it from being washed away in\nrough seas.\fThis POKéMON secretes a strong\ndigestive fluid from its tentacles."
        fr:
          ruby: "VACILYS erre dans les profondeurs\nde l’océan pour chercher de la\nnourriture. Ce POKéMON peut allonger\fson cou à volonté et capturer ses\nproies à l’aide de ses huit tentacules."
          sapphire: "Le corps de VACILYS lui sert d’ancre\net l’empêche d’être emporté quand la\nmer est déchaînée.\fLes tentacules de ce POKéMON\nsécrètent un puissant fluide digestif."
        it:
          ruby: "CRADILY scandaglia i fondali oceanici\nin cerca di nutrimento. Riesce ad\nestendere il collo, simile al tronco\fdi un albero, per catturare ignare\nprede con i propri otto tentacoli."
          sapphire: "Il corpo di CRADILY funge da ancora,\nper evitare di essere spazzato via\ndal mare grosso.\fIl POKéMON secerne un potente\nliquido digestivo dai propri tentacoli."
        de:
          ruby: "WIELIE durchforstet den Meeresboden\nnach Beute. Dieses POKéMON fährt\nseinen baumstammartigen Nacken aus\fund fängt mit seinen acht Tentakeln\nBeute."
          sapphire: "WIELIEs Körper dient ihm als Anker und\nschützt ihn davor, in die stürmische\nSee gespült zu werden. Dieses POKéMON\fsondert eine starke Verdauungsflüssig-\nkeit aus seinen Tentakeln ab."
        es:
          ruby: "CRADILY va por el fondo oceánico sin\nrumbo fijo en busca de comida. El cuello\nde este POKéMON se parece al tronco\fde un árbol. Cuando quiere atrapar\na su presa desprevenida, lo estira\ny usa los ocho tentáculos que tiene."
          sapphire: "A CRADILY le sirve el cuerpo de ancla\ny sostén en aguas turbulentas. Gracias\na él no es arrastrado por las corrientes.\fEste POKéMON segrega un fuerte jugo\ndigestivo a través de los tentáculos."
anorith:
  species_id: 347
  names:
    jp_kana: アノプス
    en: ANORITH
    fr: ANORITH
    it: ANORITH
    de: ANORITH
    es: ANORITH
  forms:
    anorith:
      form_id: 0
      base_stats:
        hp: 45
        attack: 95
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 75
      evs_yield:
        hp: 0
