      types:
        - water
      egg_groups:
        - water_1
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      descriptions:
        jp_kana:
          ruby: "もともと　がいこくに　すんでいた　ポケモンを\nペットとして　つれてきた　ものが　やせいかした。\nせいめいりょくが　つよいので　どんどん　ふえた。"
          sapphire: "するどい　ハサミで　えものを　つかまえる。\nすき　きらいが　ないので　なんでも　たべるぞ。\nきたない　みずでも　へっちゃらな　ポケモン。"
        en:
          ruby: "CORPHISH were originally foreign\nPOKéMON that were imported as pets.\nThey eventually turned up in the wild.\fThis POKéMON is very hardy and has\ngreatly increased its population."
          sapphire: "CORPHISH catches prey with its sharp\nclaws. It has no likes or dislikes when it\ncomes to food - it will eat anything.\fThis POKéMON has no trouble living in\nfilthy water."
        fr:
          ruby: "Les ECRAPINCE étaient au départ des\nPOKéMON étrangers importés comme\nanimaux domestiques. Ils ont fini par\fretrouver leur état sauvage. Ce\nPOKéMON est particulièrement robuste\net sa population augmente sans arrêt."
          sapphire: "ECRAPINCE attrape ses proies avec\nses puissantes pinces. Pour la\nnourriture, il n’est pas difficile.\fIl mange de tout. Vivre dans de l’eau\nsale ne dérange pas ce POKéMON."
        it:
          ruby: "Originariamente CORPHISH era una\ncreatura straniera, importata poi come\nPOKéMON domestico. Attualmente\fne sono stati trovati anche allo stato\nbrado. Essendo molto resistente, ha\nmoltiplicato la sua popolazione."
          sapphire: "CORPHISH cattura la preda con\ni suoi artigli affilati. Non ha esigenze\nparticolari riguardo al cibo, infatti\fmangia di tutto. Riesce a vivere\nanche in acque molto inquinate."
        de:
          ruby: "KREBSCORPS ist kein heimisches\nPOKéMON, sondern wurde als Haustier\nimportiert. Schließlich verwilderte es.\fDieses POKéMON ist mittlerweile sehr\nrobust und hat seine Population\nvergrößert."
          sapphire: "KREBSCORPS fängt seine Beute mit\nseinen scharfen Krallen. Es hat keine\nbesonderen Ansprüche an seine\fNahrung, es frisst einfach alles.\nDieses POKéMON lebt gern in\nschmutzigem Wasser."
        es:
          ruby: "En un principio, se importaban CORPHISH\ncomo mascota. Pero, al final, se hicieron\nsalvajes.\fEste POKéMON es muy resistente\ny ha aumentado su población de forma\nconsiderable."
          sapphire: "CORPHISH atrapa a su presa con finas\npinzas. En lo referente a comida no es\ndelicado; se come lo que sea.\fTampoco tiene ningún problema en vivir\nen aguas sucias."
crawdaunt:
