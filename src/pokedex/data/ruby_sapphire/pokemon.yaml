          sapphire: "On sait que les PARASECT vivent en\ngroupe dans les grands arbres et se\nnourrissent des nutriments contenus\fdans le tronc et les racines. Lorsqu’un\narbre infesté meurt, ils se précipitent\nvers le prochain."
