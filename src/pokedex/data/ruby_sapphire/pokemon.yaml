          sapphire: "On reconnaît un RAPASDEPIC à son long\ncou et à son bec allongé. Ces attributs\nlui permettent d’attraper facilement\fses proies dans la terre ou dans l’eau.\nIl bouge son bec long et fin avec une\ngrande agilité."
        it:
          ruby: "FEAROW è caratterizzato da un collo\ne un becco molto lunghi, dalla forma\nottimale per la cattura della preda\fa terra o in acqua. Muove agilmente\nil becco lungo e affusolato per\nstanare la preda."
          sapphire: "FEAROW è caratterizzato da un collo\ne un becco molto lunghi, dalla forma\nottimale per la cattura della preda\fa terra o in acqua. Muove agilmente\nil becco lungo e affusolato per\nstanare la preda."
        de:
          ruby: "IBITAK erkennt man an seinem langen \nHals und Schnabel. \nEr ist hervorragend dafür geeignet,\fim Erdreich oder im Wasser Beute zu\njagen. Es setzt seinen langen, dünnen\nSchnabel dabei sehr geschickt ein."
          sapphire: "IBITAK erkennt man an seinem langen \nSchnabel. \nEr ist hervorragend dafür geeignet,\fim Erdreich oder im Wasser Beute zu\njagen. Es setzt seinen langen, dünnen\nSchnabel dabei sehr geschickt ein."
        es:
          ruby: "A FEAROW se le reconoce por tener\nun pescuezo y un pico largo que\nle permiten cazar en tierra y en el\fagua.\nTiene una gran habilidad moviendo\nel fino pico para atrapar a sus presas."
          sapphire: "A FEAROW se le reconoce por tener\nun pescuezo y un pico largo que\nle permiten cazar en tierra y en el\fagua.\nTiene una gran habilidad moviendo\nel fino pico para atrapar a sus presas."
