          ruby: "HERACROSS charges in a straight line at\nits foe, slips beneath the foe’s grasp,\nand then scoops up and hurls the\fopponent with its mighty horn.\nThis POKéMON even has enough power\nto topple a massive tree."
          sapphire: "HERACROSS has sharp claws on its feet.\nThese are planted firmly into the\nground or the bark of a tree, giving the\fPOKéMON a secure and solid footing\nto forcefully fling away foes with\nits proud horn."
        fr:
          ruby: "SCARHINO charge ses ennemis en ligne\ndroite, se glisse dessous, les attrape\net les projette violemment d’un coup\fde sa puissante corne. Ce POKéMON est\ntellement fort qu’il pourrait\ndéraciner un arbre."
          sapphire: "SCARHINO est doté de griffes acérées\nsur ses pieds. Elles se plantent\nfermement dans le sol ou dans l’écorce\fd’un arbre, ce qui permet à ce POKéMON\nd’être bien stable lorsqu’il veut pro-\njeter ses ennemis d’un coup de corne."
        it:
          ruby: "HERACROSS si lancia all’attacco dritto\ncontro il nemico, lo afferra con forza,\nlo solleva in aria e poi lo incorna\fviolentemente scagliandolo lontano.\nRiesce ad abbattere un grosso albero."
          sapphire: "HERACROSS è dotato di artigli affilati\nsulle zampe inferiori, che conficca\nnel terreno o nella corteccia degli\falberi per guadagnare stabilità\nmentre incorna violentemente\ni nemici e li scaglia lontano."
        de:
          ruby: "SKARABORN geht direkt auf seinen\nGegner los, rutscht auf ihn zu, um ihn\nauszuhebeln und mit seinem mächtigen\fHorn wegzuschleudern. Dieses POKéMON\nhat genug Kraft, um einen massigen\nBaum umzustoßen."
          sapphire: "SKARABORN hat scharfe Krallen an den\nFüßen. Diese bohren sich fest in den\nBoden oder in die Rinde eines Baumes\fund geben diesem POKéMON einen siche-\nren Halt. So kann es seine Gegner mit\nseinem imposanten Horn wegschleudern."
        es:
          ruby: "HERACROSS carga en línea recta contra\nel enemigo, se le queda encajado por\ndebajo, lo agarra y lo lanza con ayuda\fdel fuerte cuerno que tiene.\nEste POKéMON tiene fuerza hasta para\nechar abajo un árbol descomunal."
          sapphire: "HERACROSS tiene unas afiladas garras\nen los pies, que se clavan con firmeza\nen la tierra o la corteza de los árboles,\fdando al POKéMON gran estabilidad\ny seguridad a la hora de embestir y herir\na su rival con el cuerno que tiene."
