        - monster
        - dragon
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          ruby: "からだに　はえた　はっぱは　するどい　きれあじ。\nすばやい　みのこなしで　きの　えだを　とびまわり\nてきの　ずじょうや　はいごから　おそいかかるぞ。"
          sapphire: "せなかの　タネには　じゅもくを　げんきにする\nえいようが　たくさん　つまっていると　いわれる。\nもりの　きを　だいじに　そだてている　ポケモン。"
        en:
          ruby: "The leaves growing on SCEPTILE’s body\nare very sharp edged. This POKéMON is\nvery agile - it leaps all over the\fbranches of trees and jumps on its foe\nfrom above or behind."
          sapphire: "SCEPTILE has seeds growing on its back.\nThey are said to be bursting with\nnutrients that revitalize trees.\fThis POKéMON raises the trees in a\nforest with loving care."
        fr:
          ruby: "Les feuilles qui poussent sur le corps\nde JUNGKO sont extrêmement\ntranchantes. Ce POKéMON est très agile.\fIl bondit de branche en branche avant\nde sauter sur son ennemi."
          sapphire: "JUNGKO a des graines qui lui\npoussent sur le dos. On dit qu’elles\nregorgent de nutriments qui\frevitalisent les arbres. Ce POKéMON\ns’occupe des forêts avec amour."
        it:
          ruby: "Le foglie che crescono sul corpo di\nSCEPTILE hanno margini taglienti.\nQuesto POKéMON è agilissimo,\finfatti salta da un ramo all’altro e\npiomba sui nemici sorprendendoli\ndall’alto."
          sapphire: "Sulla schiena di SCEPTILE crescono\nalcuni semi. Si dice che germoglino con\ni fertilizzanti per le piante.\fQuesto POKéMON coltiva\namorevolmente le sue piante\nnella foresta."
        de:
          ruby: "Die Blätter, die auf GEWALDROs Körper\nwachsen, sind sehr scharfkantig. Dieses\nPOKéMON ist sehr agil. Es hüpft von\fAst zu Ast und springt seine Feinde\nvon oben oder hinten an."
          sapphire: "Auf GEWALDROs Rücken wachsen Samen.\nDarin sind Nährstoffe, die Bäume\nbeleben können. Dieses POKéMON\fachtet mit viel Fürsorge darauf, dass\ndie Bäume seines Waldes prächtig\ngedeihen."
        es:
          ruby: "Las hojas que le salen a SCEPTILE del\ncuerpo tienen unos bordes muy afilados.\nEste POKéMON es muy ágil, va saltando\fde rama en rama y se lanza sobre\nel enemigo por la espalda."
          sapphire: "A SCEPTILE le crecen en la espalda\nunas semillas llenas de nutrientes\nque sirven para revitalizar los árboles.\fDe hecho, se dedica a cuidarlos\ncon mimo para que crezcan bien."
torchic:
  species_id: 255
  names:
    jp_kana: アチャモ
    en: TORCHIC
    fr: POUSSIFEU
    it: TORCHIC
    de: FLEMMLI
    es: TORCHIC
