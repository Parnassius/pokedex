          sapphire: "All’arrivo di un temporale questi\nPOKéMON si raggruppano e a gara\nscalano le vette più alte sperando\fdi riuscire a prendere qualche fulmine.\nAlcune città usano gli ELECTABUZZ\nal posto dei parafulmini."
        de:
          ruby: "Bei Gewitter konkurrieren diese\nPOKéMON darum, wie viele\nSpannungseinheiten sie erreichen,\fwenn sie vom Blitz getroffen werden.\nEinige Ortschaften benutzen ELEKTEK\nan Stelle von Blitzableitern."
          sapphire: "Bei Gewitter konkurrieren diese\nPOKéMON darum, wie viele\nSpannungseinheiten sie erreichen,\fwenn sie vom Blitz getroffen werden.\nEinige Ortschaften benutzen ELEKTEK\nan Stelle von Blitzableitern."
        es:
          ruby: "Al desatarse una tormenta, bandadas\nde estos POKéMON se enfrentan entre\nsí para ver quién alcanza antes sitios\faltos en los que suelan caer rayos.\nHay ciudades que usan ELECTABUZZ\nen lugar de pararrayos."
