      descriptions:
        jp_kana:
          ruby: "あたまの　ひれは　とても　びんかんな　レーダー。\nみずや　くうきの　うごきから　めを　つかわずに\nまわりの　ようすを　キャッチすることが　できる。"
          sapphire: "すいちゅうでは　ほっぺの　エラで　こきゅうする。\nピンチに　なると　からだより　おおきな　いわを\nこなごなに　くだく　パワーを　はっきする。"
        en:
          ruby: "The fin on MUDKIP’s head acts as highly\nsensitive radar. Using this fin to sense\nmovements of water and air, this\fPOKéMON can determine what is taking\nplace around it without using its eyes."
          sapphire: "In water, MUDKIP breathes using the\ngills on its cheeks.\nIf it is faced with a tight situation in\fbattle, this POKéMON will unleash its\namazing power - it can crush rocks\nbigger than itself."
        fr:
          ruby: "La nageoire sur la tête de GOBOU\nlui sert de radar hyper-sensible. Il\nl’utilise pour sentir les mouvements\fde l’eau et de l’air. Ainsi, ce POKéMON\npeut savoir ce qui se passe autour de\nlui sans avoir à se servir de ses yeux."
          sapphire: "Sous l’eau, GOBOU peut respirer\ngrâce aux branchies sur ses joues.\nS’il se retrouve en difficulté pendant\fun combat, ce POKéMON déchaîne ses\npouvoirs incroyables. Il peut détruire\ndes rochers plus gros que lui."
        it:
          ruby: "La pinna sulla testa di MUDKIP agisce\ncome un radar sensibilissimo. Usando\nquesta pinna come sensore in acqua\fe in aria, riesce a determinare cosa\nsuccede attorno a lui senza bisogno\ndi guardare."
          sapphire: "In acqua MUDKIP respira usando\nle branchie sulle mascelle.\nIn caso di situazioni critiche in lotta\fscatena la sua forza strabiliante,\nriuscendo a frantumare rocce\npiù grandi di lui."
        de:
          ruby: "Die Flosse an HYDROPIs Kopf dient als\nhochempfindliches Radar. Damit kann es\nBewegungen im Wasser und in der Luft\fwahrnehmen. So weiß es jederzeit, was\nin seiner Umgebung passiert, ohne\ndabei seine Augen zu benutzen."
          sapphire: "Im Wasser atmet HYDROPI durch die\nKiemen an seinen Wangen. Wenn es im\nKampf in eine brenzlige Situation gerät,\fsetzt es seine verblüffende Kraft ein,\nmit der es Felsbrocken zerquetschen\nkann, die größer sind als es selbst."
        es:
          ruby: "La aleta que tiene MUDKIP en la cabeza\nactúa de radar y es muy sensible. Puede\ncaptar movimientos que se produzcan en\fel agua y en el aire, y todo lo que ocurra\na su alrededor, sin necesidad de abrir\nlos ojos."
          sapphire: "En el agua, MUDKIP usa las branquias que\ntiene en los mofletes para respirar.\nCuando tiene que enfrentarse a una\fsituación delicada en combate, desata\nuna fuerza asombrosa con la que puede\ndestruir rocas incluso mayores que él."
marshtomp:
  species_id: 259
  names:
    jp_kana: ヌマクロー
