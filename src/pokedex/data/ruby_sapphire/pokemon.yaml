          ruby: "Les lianes de SAQUEDENEU se brisent\nfacilement lorsqu’on les attrape. Cela\nne lui fait pas mal et lui permet\fsimplement de s’échapper rapidement.\nLes lianes cassées repoussent\nle lendemain."
          sapphire: "Les lianes de SAQUEDENEU se brisent\nfacilement lorsqu’on les attrape. Cela\nne lui fait pas mal et lui permet\fsimplement de s’échapper rapidement.\nLes lianes cassées repoussent\nle lendemain."
        it:
          ruby: "Se afferrate, le liane di TANGELA si\nstaccano con facilità, ma in modo\nindolore, consentendo così una pratica\fscappatoia. Le liane cadute vengono\nsostituite da quelle nuove\nil giorno dopo."
          sapphire: "Se afferrate, le liane di TANGELA si\nstaccano con facilità, ma in modo\nindolore, consentendo così una pratica\fscappatoia. Le liane cadute vengono\nsostituite da quelle nuove\nil giorno dopo."
        de:
          ruby: "Wenn man TANGELAs Ranken berührt, \nfallen diese sofort ab. Das tut ihm\naber nicht weh und es kann\fsich schnell in Sicherheit bringen. \nVerliert es Ranken, werden diese am\nnächsten Tag durch neue ersetzt."
          sapphire: "Wenn man TANGELAs Ranken berührt, \nfallen diese oft ab. Dabei empfindet\nes keine Schmerzen und es kann\fsich schnell in Sicherheit bringen. \nVerliert es Ranken, werden diese am\nnächsten Tag durch neue ersetzt."
        es:
          ruby: "A TANGELA se le desprenden los\ntentáculos con facilidad en cuanto\nse los agarras.\fY no sólo no le duele, sino que le resulta\nmuy útil para escapar rápido. Además,\nal día siguiente le crecen otros."
          sapphire: "A TANGELA se le desprenden los\ntentáculos con facilidad en cuanto\nse los agarras.\fY no sólo no le duele, sino que le resulta\nmuy útil para escapar rápido. Además,\nal día siguiente le crecen otros."
