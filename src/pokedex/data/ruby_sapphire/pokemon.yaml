          sapphire: "１にちじゅう　たいようを　みつめて　うごかない。\nみらいを　みとおす　ちからを　もつと　しんじられ\nせいなる　ポケモンとして　まつる　ひとも　いる。"
        en:
          ruby: "XATU stands rooted and still in one\nspot all day long. People believe that\nthis POKéMON does so out of fear of\fthe terrible things it has foreseen in\nthe future."
          sapphire: "XATU is known to stand motionless while\nstaring at the sun all day long.\nSome people revere it as a mystical\fPOKéMON out of their belief that XATU\nis in possession of the power to see\ninto the future."
        fr:
          ruby: "XATU se tient debout et immobile toute\nla journée. Certains pensent que ce\nPOKéMON a adopté cette position\fà cause de la terreur qu’il a ressenti\nen prévoyant l’avenir."
          sapphire: "On sait que XATU se tient toute la\njournée debout, les yeux perdus vers\nl’horizon. Certaines personnes le\fvénèrent comme un POKéMON mystique,\npersuadées que XATU a le pouvoir de\nprédire l’avenir."
        it:
          ruby: "XATU rimane in piedi immobile nello\nstesso punto tutto il giorno.\fQualcuno crede che si comporti così\nper gli eventi terribili che ha previsto\nper il futuro."
          sapphire: "XATU è noto per la sua immobilità\nmentre guarda il sole stando in piedi\ntutto il giorno. Alcuni lo considerano\fun POKéMON mistico, convinti che\nXATU possegga il potere di prevedere\nil futuro."
        de:
          ruby: "XATU bleibt den ganzen Tag an ein und\ndemselben Ort wie angewurzelt stehen. \nDie Menschen glauben, dass es dies aus\fAngst vor den Dingen tut, die es für die\nZukunft vorausgesehen hat."
          sapphire: "XATU steht den ganzen Tag \nbewegungslos herum und starrt die\nSonne an. Einige Menschen verehren es\fals ein mystisches POKéMON. Sie glauben,\ndass XATU in die Zukunft sehen könne."
        es:
          ruby: "XATU permanece de pie inmóvil y\ntranquilo en el mismo sitio durante\ntodo el día.\fSe cree que no se mueve por temor\na lo que ha visto que ocurrirá\nen el futuro."
          sapphire: "XATU es conocido por el hábito\nque tiene de quedarse todo el día\ncontemplando el sol.\fHay mucha gente que lo venera como\nPOKéMON místico, pues piensan que XATU\ntiene el poder de ver el futuro."
