        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
        - human_like
      abilities:
        - own_tempo
      held_items:
        rare: chesto_berry
      descriptions:
        jp_kana:
          ruby: "よのなかに　いる　パッチールは　みんな　ちがう\nところに　ブチもようが　あると　いわれている。\nおぼつかない　あゆみが　おどりのように　みえる。"
          sapphire: "おなじ　ブチもようは　ないと　いわれている。\nいつも　めを　まわしている　ような　フラフラした\nうごきには　てきを　まどわせる　こうかが　ある。"
        en:
          ruby: "All the SPINDA that exist in the\nworld are said to have utterly unique\nspot patterns.\fThe shaky, tottering steps of this\nPOKéMON give it the appearance of\ndancing."
          sapphire: "No two SPINDA are said to have\nidentical spot patterns on their hides.\nThis POKéMON moves in a curious manner\fas if it is stumbling in dizziness.\nIts lurching movements can cause the\nopponent to become confused."
        fr:
          ruby: "On raconte que chaque SPINDA\ndispose d’un agencement de taches\ntout à fait unique.\fLa démarche chancelante et titubante\nde ce POKéMON donne l’impression\nqu’il danse."
          sapphire: "On dit que chaque SPINDA dispose\nd’un agencement de taches unique.\nCe POKéMON se déplace bizarrement,\fcomme s’il titubait. Ses mouvements\nhésitants décontenancent ses ennemis."
        it:
          ruby: "Pare che ogni SPINDA esistente\nabbia un motivo maculato unico\nrispetto agli altri.\fIl suo passo barcollante e malsicuro\ndà l’impressione che stia ballando."
          sapphire: "Pare che non esistano due SPINDA\ndall’identico motivo maculato. Questo\nPOKéMON si muove in modo curioso\fbarcollando come in preda alle vertigini.\nTale comportamento può confondere\nl’avversario."
        de:
          ruby: "Jedes PANDIR auf der Welt soll ein\neinzigartiges Fleckenmuster haben. Der\nschwankende Gang dieses POKéMON\ferweckt den Eindruck, es würde tanzen."
          sapphire: "Jedes PANDIR trägt ein einzigartiges \nFleckenmuster auf seiner Haut. Dieses\nPOKéMON bewegt sich höchst seltsam.\fEs schwankt und stolpert, als wäre ihm\nschwindlig. Seine schlingernden Bewe-\ngungen verwirren seine Gegner."
        es:
          ruby: "Dicen que no hay dos SPINDA que tengan\nlos mismos dibujos en el pelaje.\nEste POKéMON tiene una forma de andar\finestable, va tambaleándose. \nDa la sensación de ir bailando."
          sapphire: "No hay dos SPINDA con los mismos\ndibujos en el pelaje. Este POKéMON\nse mueve de forma muy curiosa.\fDa la impresión de estar mareado.\nSe tambalea y puede llegar a causar\nconfusión a su enemigo."
trapinch:
  species_id: 328
  names:
    jp_kana: ナックラー
