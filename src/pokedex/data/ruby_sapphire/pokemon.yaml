          ruby: "くさった　なまゴミから　でる　ガスが　だいすき。\nそうじを　しない　いえに　すみつき　かぞくが\nねしずまった　まよなか　ゴミばこを　あさる。"
          sapphire: "ふたごの　からだを　こうごに　しぼませたり\nふくらませたりして　どくガスを　まぜている。\nまぜるほど　どくそが　つよまり　くさくなる。"
        en:
          ruby: "WEEZING loves the gases given off by\nrotted kitchen garbage. This POKéMON\nwill find a dirty, unkempt house and\fmake it its home. At night, when the\npeople in the house are asleep, it will\ngo through the trash."
          sapphire: "WEEZING alternately shrinks and\ninflates its twin bodies to mix together\ntoxic gases inside.\fThe more the gases are mixed, the more\npowerful the toxins become. The\nPOKéMON also becomes more putrid."
        fr:
          ruby: "SMOGOGO adore les gaz qui se dégagent\ndes aliments pourris dans les poubelles.\nCe POKéMON cherche généralement\fles maisons sales et mal tenues pour y\nhabiter. La nuit, quand tout le monde\nest endormi, il fouille les détritus."
          sapphire: "SMOGOGO rétrécit ou gonfle ses deux\ncorps pour mélanger les gaz toxiques\nqui s’y trouvent.\fLorsque les gaz sont bien mélangés, la\ntoxine devient très puissante. Le\nPOKéMON se putréfie aussi un peu plus."
        it:
          ruby: "WEEZING adora i gas emanati dai\nresti alimentari in decomposizione.\nSi sente a suo agio in case sudicie\fe maltenute. La notte, mentre dormono\ntutti, lui si aggira furtivo tra i rifiuti\ndomestici."
          sapphire: "WEEZING gonfia e sgonfia ritmicamente\nil suo duplice corpo per miscelare\ni gas tossici all’interno.\fPiù a lungo vengono mescolati i gas,\npiù nocive diventano le tossine. Anche\nil POKéMON diventa ancora più putrido."
        de:
          ruby: "SMOGMOG liebt die Gase verrottender,\nfauler Küchenabfälle. Dieses POKéMON\nsucht sich ein vernachlässigtes,\fschmutziges Gebäude und richtet sich\ndort häuslich ein. Nachts, wenn die\nMenschen schlafen, wühlt es im Müll."
          sapphire: "SMOGMOG bläst seine beiden Körper\nabwechselnd auf und lässt sie wieder\nzusammenschrumpfen, um die giftigen\fGase darin zu vermischen. Je mehr Gase\nvermischt werden, desto stärker werden\ndie Toxine."
        es:
          ruby: "A WEEZING le encantan los gases que\nemanan de los desperdicios que quedan\nen la cocina. Este POKéMON busca casas\fsucias y abandonadas para crear su\nhogar. De noche, cuando los habitantes\nde la casa duermen, va a por la basura."
          sapphire: "WEEZING reduce y agranda el doble\ncuerpo que tiene para mezclar\nlos gases tóxicos que contiene.\fCuantos más gases mezcle, mayor\nserán la toxicidad y el nivel de\nputrefacción del POKéMON."
