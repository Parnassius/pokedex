        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - swift_swim
      descriptions:
        jp_kana:
          ruby: "みなみの　しんかいに　せいそくする　ポケモン。\nしんかいの　すいあつに　きたえられた　からだは\nちょっとの　こうげきでは　キズも　つかない。"
          sapphire: "およぐ　すがたは　ゆうがで　とても　きれいだが\nえものを　みつけると　ほそい　くちを　からだに\nさしこんで　たいえきを　ずるずる　すするぞ。"
        en:
          ruby: "GOREBYSS lives in the southern seas\nat extreme depths. Its body is built to\nwithstand the enormous pressure of\fwater at incredible depths. Because of\nthis, this POKéMON’s body is unharmed\nby ordinary attacks."
          sapphire: "Although GOREBYSS is the very picture\nof elegance and beauty while swimming,\nit is also cruel. When it spots prey, this\fPOKéMON inserts its thin mouth into the\nprey’s body and drains the prey of its\nbody fluids."
        fr:
          ruby: "ROSABYSS vit dans les profondeurs\ndes mers du sud. Son corps est conçu\npour supporter l’énorme pression des\fprofondeurs abyssales. Du coup, le\ncorps de ce POKéMON n’est pas\nendommagé par les attaques ordinaires."
          sapphire: "Même si ROSABYSS est l’image même\nde l’élégance et de la beauté quand il\nnage, il est aussi très cruel. Quand il\frepère sa proie, ce POKéMON insère sa\nfine bouche dans le corps de sa proie et\naspire ses fluides corporels."
        it:
          ruby: "GOREBYSS vive nei mari meridionali\na profondità estreme. Il suo corpo è\nstrutturato in modo da poter resistere\fall’incredibile pressione degli abissi.\nProprio per questo il POKéMON\nè immune agli attacchi comuni."
          sapphire: "Nonostante GOREBYSS sia il ritratto\ndell’eleganza e della bellezza in nuoto,\nè anche molto crudele. Quando scova\funa preda, la perfora con il muso\nappuntito e la dissangua totalmente."
        de:
          ruby: "SAGANABYSS lebt in extremen Tiefen des\nSüdmeeres. Sein Körper ist so angelegt,\ndass er dem enormen Wasserdruck dieser\funglaublichen Tiefe standhalten kann.\nDaher übersteht dieses POKéMON\ngewöhnliche Attacken unbeschadet."
          sapphire: "Obwohl SAGANABYSS beim Schwimmen ein\nBild von Eleganz und Schönheit bietet,\nkann es auch sehr grausam sein. Wenn es\fBeute sichtet, sticht es sein dünnes\nMaul in den Körper eines Gegners und\nentzieht ihm die Flüssigkeit."
        es:
          ruby: "GOREBYSS vive en los Mares del Sur,\nen lo más profundo; de ahí que tenga\nel cuerpo preparado para soportar\fla presión tan grande que hay en el\nfondo marino, y que no le hagan daño\nlos ataques comunes."
          sapphire: "Aunque GOREBYSS es la imagen\nde la elegancia y la belleza al nadar,\nes también la definición de la crueldad.\fAl detectar a su presa, este POKéMON\nle hinca los finos dientes que tiene y\nle absorbe los fluidos corporales."
relicanth:
  species_id: 369
  names:
    jp_kana: ジーランス
