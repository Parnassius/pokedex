        - shield_dust
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          ruby: "あかりに　ひきよせられる　しゅうせいを　もつ。\nまちあかりに　さそわれた　ドクケイルの　むれが\nがいろじゅの　はっぱを　たべちらかしてしまう。"
          sapphire: "はばたくと　こまかい　こなが　まいあがる。\nすいこむと　プロレスラーも　ねこむ　もうどくだ。\nしょっかくの　レーダーで　エサを　さがす。"
        en:
          ruby: "DUSTOX is instinctively drawn to light.\nSwarms of this POKéMON are attracted\nby the bright lights of cities, where\fthey wreak havoc by stripping the\nleaves off roadside trees for food."
          sapphire: "When DUSTOX flaps its wings, a fine\ndust is scattered all over. This dust is\nactually a powerful poison that will\feven make a pro wrestler sick.\nThis POKéMON searches for food using\nits antennae like radar."
        fr:
          ruby: "PAPINOX est instinctivement attiré\npar la lumière. Des nuées de ce POKéMON\nsont attirées par les réverbères des\fvilles, où ils sèment la pagaille en\ngrignotant les feuilles des arbres\nen bordure de route."
          sapphire: "Lorsque PAPINOX bat des ailes,\nune légère poussière se répand. Cette\npoussière est en fait un puissant\fpoison capable de rendre un cheval\nmalade. Ce POKéMON cherche sa nourri-\nture avec ses antennes, comme un radar."
        it:
          ruby: "DUSTOX è istintivamente attratto dalla\nluce. Nuvoli di questi POKéMON sono\nattirati dalla luce intensa delle città,\fdove causano danni ingenti strappando\nle foglie delle piante di cui si nutrono\nlungo le strade urbane."
          sapphire: "Quando agita le ali, DUSTOX sparge\nuna polvere sottile tutt’intorno. In\nrealtà si tratta di un potente veleno\fcapace di mettere al tappeto anche\nun campione di lotta libera. Per cercare\nil cibo usa le antenne come un radar."
        de:
          ruby: "PUDOX wird instinktiv vom Licht\nangezogen. In hell erleuchteten \nStädten kann man Scharen dieses\fPOKéMON dabei beobachten, die\ngroßen Schaden anrichten, indem sie die\nBlätter von Bäumen abfressen."
          sapphire: "Wenn PUDOX mit den Flügeln schlägt,\nverteilt es einen feinen Puder. Es\nhandelt sich um ein starkes Gift, das\fsogar einen Profiboxer umhauen würde.\nBei der Futtersuche benutzt dieses \nPOKéMON seine Antennen als Radar."
        es:
          ruby: "Los DUSTOX se acercan a la luz de forma\ninstintiva. De hecho, se agrupan\nen enjambres alrededor de las luces\fde las ciudades y causan estragos\nen las hojas de los árboles que están\na pie de calle para alimentarse."
          sapphire: "Cuando DUSTOX bate las alas, libera\nun polvillo fino que en realidad es un\npeligroso veneno que puede resultar\fdañino hasta al más fuerte de los\nfuertes. Las antenas le sirven\nde radar para buscar comida."
lotad:
  species_id: 270
  names:
    jp_kana: ハスボー
    en: LOTAD
    fr: NENUPIOT
    it: LOTAD
    de: LOTURZEL
    es: LOTAD
  forms:
    lotad:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 30
        special_attack: 40
        special_defense: 50
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - grass
      egg_groups:
        - water_1
        - grass
      abilities:
        - swift_swim
        - rain_dish
      descriptions:
        jp_kana:
          ruby: "いけや　みずうみの　すいめんに　ういて　くらす。\nはっぱが　かれると　よわってしまうが　きれいな\nみずを　もとめて　たまに　りくちを　いどうする。"
          sapphire: "もともとは　ちじょうで　せいかつしていたが\nあたまの　はっぱが　おもくなったので　みずに\nうかんで　くらすようになったと　いわれている。"
        en:
          ruby: "LOTAD live in ponds and lakes, where\nthey float on the surface.\nIt grows weak if its broad leaf dies.\fOn rare occasions, this POKéMON travels\non land in search of clean water."
          sapphire: "LOTAD is said to have dwelled on land\nbefore. However, this POKéMON is\nthought to have returned to water\fbecause the leaf on its head grew large\nand heavy. It now lives by floating\natop the water."
        fr:
          ruby: "NENUPIOT vit dans les étangs et les\nlacs, sur lesquels il flotte à la\nsurface. Si sa feuille tombe, il est\faffaibli. De temps en temps, ce POKéMON\nsort sur la terre ferme à la\nrecherche d’eau propre."
          sapphire: "On raconte que jadis, NENUPIOT vivait\nsur terre. Mais on pense que ce POKéMON\nest retourné dans l’eau car la feuille\fsur sa tête était devenue trop grande\net trop lourde. Maintenant, il vit en\nflottant à la surface de l’eau."
        it:
          ruby: "LOTAD vive in stagni e laghi,\ngalleggiando a pelo d’acqua.\nS’indebolisce se muoiono le larghe\ffoglie in superficie. In rare occasioni\nsi avventura sulla terraferma in cerca\ndi acqua pulita."
          sapphire: "Si dice che prima LOTAD vivesse sulla\nterraferma. Tuttavia, si dice che sia\ntornato all’acqua perché le foglie che\fha sulla testa erano diventate\ntroppo grandi e pesanti. Ora vive\ngalleggiando a pelo d’acqua."
        de:
          ruby: "LOTURZEL lebt auf der Wasseroberfläche\nvon Teichen oder Seen. Es wird\nschwächer, wenn sein breites Blatt\fabstirbt. Nur selten geht dieses\nPOKéMON an Land, um nach sauberem\nWasser Ausschau zu halten."
          sapphire: "LOTURZEL soll einige Zeit an Land\nverbracht haben, aber ins Wasser\nzurückgekehrt sein, weil das Blatt\fauf seinem Kopf zu groß und zu schwer\ngeworden ist. Nun lässt es sich auf dem\nWasser treiben."
        es:
          ruby: "LOTAD vive en estanques y lagos,\ndonde permanece flotando.\nSi se le marchita la ancha hoja que tiene\fen la cabeza, se debilitará.\nDe vez en cuando se desplaza\nen busca de agua limpia."
          sapphire: "A LOTAD se le atribuye el haber vivido\nantes en tierra. En cualquier caso, se\ncree que volvió al agua porque la hoja\fde la cabeza le creció mucho y le empezó\na pesar. Ahora vive flotando en el agua."
lombre:
  species_id: 271
  names:
    jp_kana: ハスブレロ
    en: LOMBRE
    fr: LOMBRE
    it: LOMBRE
    de: LOMBRERO
    es: LOMBRE
  forms:
    lombre:
      form_id: 0
      base_stats:
        hp: 60
        attack: 50
        defense: 50
        special_attack: 60
        special_defense: 70
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
        - grass
      egg_groups:
        - water_1
        - grass
      abilities:
        - swift_swim
        - rain_dish
      descriptions:
        jp_kana:
          ruby: "ゆうぐれになると　かつどうする　やこうせい。\nつりびとを　みかけると　すいちゅうから　いとを\nひっぱり　ジャマをしては　よろこんでいる。"
          sapphire: "からだじゅう　ヌルヌルした　ねんえきで　おおわれ\nその　てで　さわられると　とても　きもちわるい。\nにんげんの　こどもと　よく　まちがえられる。"
        en:
          ruby: "LOMBRE is nocturnal - it will get active\nafter dusk. It is also a mischief-maker.\nWhen this POKéMON spots anglers,\fit tugs on their fishing lines from\nbeneath the surface and enjoys their\nconsternation."
          sapphire: "LOMBRE’s entire body is covered by a\nslippery, slimy film. It feels horribly\nunpleasant to be touched by this\fPOKéMON’s hands.\nLOMBRE is often mistaken for a human\nchild."
        fr:
          ruby: "LOMBRE est nocturne, il commence ses\nactivités malicieuses et sournoises\nau crépuscule. Lorsque ce\fPOKéMON repère des pêcheurs, il\ns’approche de leur ligne, tire dessus et\nse moque de leur regard perplexe."
          sapphire: "Le corps de LOMBRE tout entier\nest recouvert d’un voile visqueux et\nglissant. Toucher ce POKéMON est\fextrêmement déplaisant. On croit\nsouvent à tort que LOMBRE \nest un enfant."
        it:
          ruby: "LOMBRE è un POKéMON notturno,\nche si sveglia dopo il crepuscolo.\nÈ anche molto dispettoso: quando\fscopre un pescatore, inizia a tirare\nl’amo sott’acqua e si diverte a\nspiare la costernazione del malcapitato."
          sapphire: "L’intero corpo di LOMBRE è ricoperto\ndi una pellicola viscida e scivolosa.\nIl contatto con le sue zampe dà una\fsensazione orribile. Spesso LOMBRE\nè confuso con un bambino piccolo."
        de:
          ruby: "LOMBRERO liebt die Nacht und wird mit\nEinbruch der Dunkelheit aktiv. Es spielt\nauch gerne Streiche.\fWenn es Angler sieht, zieht es unter\nWasser an ihren Angelschnüren und\nerfreut sich an ihrer Entrüstung."
          sapphire: "LOMBREROs Körper ist mit einem\nglitschigen Film bedeckt. Es fühlt sich\nwiderlich an, wenn einen dieses POKéMON\fmit seinen Händen berührt. LOMBRERO\nwird häufig für ein Kind gehalten."
        es:
          ruby: "LOMBRE es, además de travieso,\nnocturno; entra en acción de noche.\nCuando ve a gente pescando, se pone a\ftirar del sedal por debajo del agua\ny se divierte viendo la cara de enfado\nque se les queda."
          sapphire: "LOMBRE está completamente recubierto\npor una película viscosa y resbaladiza.\nLa sensación que te produce al rozarte\fcon las manos es muy desagradable.\nA veces se confunde a este POKéMON\ncon un niño pequeño."
ludicolo:
  species_id: 272
  names:
    jp_kana: ルンパッパ
    en: LUDICOLO
    fr: LUDICOLO
    it: LUDICOLO
    de: KAPPALORES
    es: LUDICOLO
