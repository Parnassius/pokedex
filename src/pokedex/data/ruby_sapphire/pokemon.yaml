        special_defense: 0
        speed: 1
      types:
        - bug
      egg_groups:
        - bug
        - human_like
      abilities:
        - oblivious
      descriptions:
        jp_kana:
          ruby: "あまい　かおりで　バルビートを　ひきよせる。\nたくさん　あつまった　バルビートを　ゆうどうして\nよぞらに　きかがくてきな　ずけいを　えがくぞ。"
          sapphire: "バルビートを　ゆうどうして　サインを　えがく。\nふくざつな　サインを　えがく　イルミーゼほど\nなかまから　そんけいされると　いわれているよ。"
        en:
          ruby: "ILLUMISE attracts a swarm of VOLBEAT\nusing a sweet fragrance. Once the\nVOLBEAT have gathered, this POKéMON\fleads the lit-up swarm in drawing\ngeometric designs on the canvas of\nthe night sky."
          sapphire: "ILLUMISE leads a flight of illuminated\nVOLBEAT to draw signs in the night sky.\nThis POKéMON is said to earn greater\frespect from its peers by composing\nmore complex designs in the sky."
        fr:
          ruby: "LUMIVOLE peut attirer un essaim de\nMUCIOLE grâce à son doux parfum.\nUne fois les MUCIOLE rassemblés, ce\fPOKéMON dirige cette nuée lumineuse et\nlui fait dessiner des figures\ngéométriques dans la nuit étoilée."
          sapphire: "LUMIVOLE dirige un vol de\nMUCIOLE lumineux pour dessiner des\nfigures dans la nuit étoilée. On raconte\fque ce POKéMON gagne le respect de ses\npairs en composant des figures\ncomplexes dans le ciel."
        it:
          ruby: "ILLUMISE attrae uno sciame di VOLBEAT\ncon la sua fragranza dolce. Una volta\nradunato un gruppo di VOLBEAT,\fILLUMISE dirige lo sciame luminoso,\nche disegna così figure geometriche\nnel setoso cielo notturno."
          sapphire: "ILLUMISE dirige i voli dei VOLBEAT\nluminosi per disegnare figure nel cielo\nnotturno. Pare che guadagni maggior\frispetto dai suoi simili componendo\ndisegni sempre più complessi."
        de:
          ruby: "ILLUMISE zieht ganze VOLBEAT-Scharen\nmit seinem süßlichen Duft an. Dann\nführt es diesen hell leuchtenden\fSchwarm an, indem es geometrische\nFiguren an den Nachthimmel malt."
          sapphire: "ILLUMISE leitet einen Schwarm VOLBEAT\nan, wenn sie Zeichen an den Nachthimmel\nmalen. Je komplexer diese werden, desto\fmehr Respekt bekommt es von seinen\nArtgenossen."
        es:
          ruby: "ILLUMISE atrae mediante su dulce aroma\na enjambres de VOLBEAT. Una vez los ha\nagrupado, les guía en el vuelo para que\fdibujen formas geométricas en el lienzo\ndel oscuro cielo."
          sapphire: "ILLUMISE guía en el vuelo a un grupo de\niluminados VOLBEAT para que hagan\ndibujos en el oscuro cielo. Según dicen,\fcuanto más complejos sean los dibujos,\nmás le respetan los miembros de su\ngrupo."
