      descriptions:
        jp_kana:
          ruby: "あたまの　あかい　たまが　ひかるとき　はげしい\nちょうおんぱが　あたりに　はっしゃ　される。\nそのとき　かいめんが　はげしく　なみうつという。"
          sapphire: "じゆうに　のびちぢみする　しょくしゅで　えものを\nからめとり　もうどくを　あたえて　よわらせる。\nいっぺんに　８０ぴきの　えものを　つかまえるぞ。"
        en:
          ruby: "TENTACRUEL has large red orbs on its\nhead. The orbs glow before lashing the\nvicinity with a harsh ultrasonic blast.\fThis POKéMON’s outburst creates rough\nwaves around it."
          sapphire: "TENTACRUEL has tentacles that can be\nfreely elongated and shortened at will.\nIt ensnares prey with its tentacles and\fweakens the prey by dosing it with a\nharsh toxin. It can catch up to 80\nprey at the same time."
        fr:
          ruby: "TENTACRUEL a deux gros globes sur la\ntête. Les globes s’illuminent lorsqu’il va\nenvoyer un violent rayon d’ultrasons.\fLorsque ce POKéMON se déchaîne, il\ncrée d’énormes vagues autour de lui."
          sapphire: "Les tentacules de TENTACRUEL peuvent\ns’allonger et se rétracter à volonté.\nIl serre sa proie dans ses tentacules et\fl’affaiblit en lui injectant une toxine.\nIl peut attraper jusqu’à 80 proies\nen même temps."
        it:
          ruby: "Gli occhi di TENTACRUEL sono due\ngrandi sfere rosse. Le sfere brillano\nprima di emettere potenti ultrasuoni.\fGli attacchi di questo POKéMON\ncreano onde impetuose nei dintorni."
          sapphire: "TENTACRUEL è dotato di tentacoli che\nsi allungano e accorciano in base alle\nsue esigenze. Intrappola la preda con\fi tentacoli e la indebolisce con un\npotente veleno. Riesce a catturare\nfino a 80 prede contemporaneamente."
        de:
          ruby: "TENTOXA hat große, rote Kugeln auf \nseinem Kopf. Sie glühen auf, bevor sie \nseine Gegner mit Ultraschall\ferschüttern. Ein Ausbruch dieses \nPOKéMON erzeugt starke Wellen \nin seiner Umgebung."
          sapphire: "TENTOXA besitzt Tentakel, die es\njederzeit ausfahren und einziehen\nkann. Es fängt damit Beute und\fschwächt diese, indem es ihr ein\nstarkes Gift verabreicht. Es kann bis\nzu 80 Opfer gleichzeitig fangen."
        es:
          ruby: "TENTACRUEL tiene unas enormes\nesferas rojas en la cabeza, que brillan\nantes de lanzar una descarga\fultrasónica a lo que le rodea.\nEste estallido crea unas\nolas tremendas a su alrededor."
          sapphire: "TENTACRUEL tiene unos tentáculos\nque puede alargar o acortar. Los usa\npara atrapar a su presa y debilitarla\fmediante una sustancia muy tóxica.\nPuede llegar a atrapar hasta a 80\npresas a la vez."
