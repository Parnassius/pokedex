      descriptions:
        jp_kana:
          ruby: "やま　ひとつを　じぶんの　なわばりに　していて\nあらした　あいては　ようしゃなく　たたきのめす。\nいつも　やまの　なかを　みまわり　している。"
          sapphire: "どしゃくずれや　やまかじで　やまが　あれると\nせっせと　つちを　はこび　きの　なえを　うえて\nじぶんの　なわばりを　きれいに　そうじする。"
        en:
          ruby: "AGGRON claims an entire mountain as its\nown territory. It mercilessly beats up\nanything that violates its environment.\fThis POKéMON vigilantly patrols its\nterritory at all times."
          sapphire: "AGGRON is surprisingly protective\nof its environment. If its mountain\nis ravaged by a landslide or a fire, this\fPOKéMON will haul topsoil to the area,\nplant trees, and beautifully restore its\nown territory."
        fr:
          ruby: "GALEKING marque son territoire\nautour d’une montagne entière. Il\ncombat sans merci quiconque pénètre\fdans son environnement. Ce POKéMON\npatrouille sans arrêt son territoire."
          sapphire: "GALEKING est étonnamment\nattentif à son environnement.\nSi sa montagne est ravagée par un\fglissement de terrain ou un incendie,\nce POKéMON laboure la terre, plante\ndes arbres et restaure le paysage."
        it:
          ruby: "AGGRON è solito delimitare un’intera\nmontagna come suo territorio esclusivo\ned è spietato con coloro che osano\fviolare tali confini. Questo POKéMON\npattuglia il proprio spazio senza mai\nabbassare la guardia."
          sapphire: "AGGRON difende strenuamente il\nproprio territorio. In caso di frana o\nincendio, questo POKéMON è in grado\fdi risistemare il terreno, ripiantare\ngli alberi e ristabilire al meglio\nil proprio ambiente naturale."
        de:
          ruby: "STOLLOSS nennt einen ganzen Berg sein\nTerritorium. Gnadenlos schlägt es jeden\nin die Flucht, der sein Reich betritt.\fDieses POKéMON behält sein Territorium\njederzeit im Auge."
          sapphire: "STOLLOSS geht erstaunlicherweise sehr\nbehutsam mit der Umwelt um. Wenn sein\nBerg von einem Erdrutsch oder einem\fFeuer verwüstet wurde, schleppt es\nErde in das Gebiet, pflanzt Bäume an und\nrichtet sein Territorium wieder her."
        es:
          ruby: "AGGRON marca una montaña entera\ncomo su territorio y acaba con todo\nlo que pueda ponerlo en peligro.\fEste POKéMON está continuamente\npatrullando la zona en defensa de su\nterreno."
          sapphire: "AGGRON es increíblemente cuidadoso con\nsu hábitat. Si su montaña sufre algún\ncorrimiento de tierras o algún incendio,\fcargará con tierra nueva, plantará\nárboles y restaurará con cuidado\nel terreno."
meditite:
  species_id: 307
  names:
    jp_kana: アサナン
    en: MEDITITE
    fr: MEDITIKKA
    it: MEDITITE
    de: MEDITIE
    es: MEDITITE
  forms:
    meditite:
      form_id: 0
      base_stats:
        hp: 30
        attack: 40
        defense: 55
        special_attack: 40
        special_defense: 55
