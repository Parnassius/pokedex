          sapphire: "NEBULAK hat einen gasförmigen Körper.\nWenn es starkem Wind ausgesetzt wird,\nkann es davongeweht werden.\fScharen dieses POKéMON sammeln sich\nunter Dachrinnen, um sich vor dem\ngefährlichen Wind zu schützen."
        es:
