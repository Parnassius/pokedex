          sapphire: "OCTILLERY se apodera de su enemigo con\nlos tentáculos y lo deja inmovilizado\nantes de propinarle el golpe final.\fSi el enemigo resulta ser demasiado\nfuerte, OCTILLERY expulsará tinta\npara escapar."
