          ruby: "めに　みえない　ものを　みぶりで　そこに　あると\nしんじこませる　パントマイムの　たつじん。\nしんじさせた　ものは　ほんとうに　あらわれる。"
          sapphire: "めに　みえない　ものを　みぶりで　そこに　あると\nしんじこませる　パントマイムの　たつじん。\nしんじさせた　ものは　ほんとうに　あらわれる。"
        en:
          ruby: "MR. MIME is a master of pantomime.\nIts gestures and motions convince\nwatchers that something unseeable\factually exists. Once it is believed,\nit will exist as if it were a real thing."
          sapphire: "MR. MIME is a master of pantomime.\nIts gestures and motions convince\nwatchers that something unseeable\factually exists. Once it is believed,\nit will exist as if it were a real thing."
        fr:
          ruby: "M. MIME est un pantomime hors pair.\nSes gestes et ses mouvements\nparviennent à faire croire que quelque\fchose d’invisible existe réellement.\nLorsqu’on y croit, ces choses\ndeviennent palpables."
          sapphire: "M. MIME est un pantomime hors pair.\nSes gestes et ses mouvements\nparviennent à faire croire que quelque\fchose d’invisible existe réellement.\nLorsqu’on y croit, ces choses\ndeviennent palpables."
        it:
          ruby: "MR. MIME è un esperto di mimica.\nLa sua gestualità e i movimenti\nconvincono l’osservatore dell’esistenza\fdi oggetti invisibili, che saranno\npercepiti come concreti e reali."
          sapphire: "MR. MIME è un esperto di mimica.\nLa sua gestualità e i movimenti\nconvincono l’osservatore dell’esistenza\fdi oggetti invisibili, che saranno\npercepiti come concreti e reali."
        de:
          ruby: "PANTIMOS ist ein Meister der Pantomime.\nSeine Gesten und Bewegungen machen\nden Zuschauer glauben, dass etwas\fUnsichtbares tatsächlich existiert.\nWenn ein Objekt für real gehalten wird,\nbeginnt es wirklich zu existieren."
          sapphire: "PANTIMOS ist ein Meister der Pantomime.\nSeine Gesten und Bewegungen machen\nden Zuschauer glauben, dass etwas\fUnsichtbares tatsächlich existiert.\nWenn ein Objekt für real gehalten wird,\nbeginnt es wirklich zu existieren."
        es:
          ruby: "MR. MIME es un experto en pantomima.\nCon sus gestos y movimientos es capaz\nde convencer a sus espectadores de que\falgo existe, cuando en realidad no es\nasí. Pero, cuando el público se lo cree,\nlas ilusiones se hacen realidad."
          sapphire: "MR. MIME es un experto en pantomima.\nCon sus gestos y movimientos es capaz\nde convencer a sus espectadores de que\falgo existe, cuando en realidad no es\nasí. Pero, cuando el público se lo cree,\nlas ilusiones se hacen realidad."
