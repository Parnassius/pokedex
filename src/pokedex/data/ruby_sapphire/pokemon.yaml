        fr:
          ruby: "POMDEPIK s’accroche à une branche\nd’arbre et attend patiemment que sa\nproie passe. Si ce POKéMON est dérangé\fpendant qu’il mange par quelqu’un qui\nsecoue son arbre, il tombe au sol et\nexplose sans prévenir."
          sapphire: "POMDEPIK s’accroche à une branche\nd’arbre et attend patiemment que sa\nproie passe. Si ce POKéMON est dérangé\fpendant qu’il mange par quelqu’un qui\nsecoue son arbre, il tombe au sol et\nexplose sans prévenir."
        it:
          ruby: "PINECO pende dal ramo di un albero\ne attende pazientemente l’arrivo della\nsua preda. Se l’albero viene scosso\fmentre il POKéMON mangia, PINECO\ncade a terra esplodendo senza\npreavviso."
          sapphire: "PINECO pende dal ramo di un albero\ne attende pazientemente l’arrivo della\nsua preda. Se l’albero viene scosso\fmentre il POKéMON mangia, PINECO\ncade a terra esplodendo senza\npreavviso."
        de:
          ruby: "TANNZA hängt an Ästen und wartet auf\nBeute. Wenn man dieses POKéMON bei\neiner Mahlzeit stört, indem man den\fBaum, auf dem es sich befindet,\nschüttelt, fällt es herunter und\nexplodiert ohne Vorwarnung."
          sapphire: "TANNZA hängt an Ästen und wartet auf\nBeute. Wenn man dieses POKéMON bei\neiner Mahlzeit stört, indem man seinen\fBaum schüttelt, fällt es herunter und\nexplodiert ohne Vorwarnung."
        es:
          ruby: "PINECO permanece colgado de la rama\nde un árbol esperando pacientemente\na su presa. Si alguien sacude el árbol en\fel que está mientras come y le molesta,\nse tira al suelo y explota sin dar ningún\ntipo de aviso."
          sapphire: "PINECO permanece colgado de la rama\nde un árbol esperando pacientemente\na su presa. Si alguien sacude el árbol en\fel que está mientras come y le molesta,\nse tira al suelo y explota sin dar ningún\ntipo de aviso."
