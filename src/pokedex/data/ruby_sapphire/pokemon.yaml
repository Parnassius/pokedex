      held_items:
        common: star_piece
        rare: star_piece
      descriptions:
        jp_kana:
          ruby: "めざめた　とき　あたまの　たんざくに　かかれた\nねがいを　かなえると　いう　でんせつを　もつ。\nきけんを　かんじると　ねむったまま　たたかう。"
          sapphire: "きよらかな　こえで　うたを　きかせて　あげると\n１０００ねんの　ねむりから　めを　さます。\nひとの　ねがいを　なんでも　かなえると　いう。"
        en:
          ruby: "A legend states that JIRACHI will make\ntrue any wish that is written on notes\nattached to its head when it awakens.\fIf this POKéMON senses danger, it will\nfight without awakening."
          sapphire: "JIRACHI will awaken from its sleep of\na thousand years if you sing to it in a\nvoice of purity.\fIt is said to make true any wish that\npeople desire."
        fr:
          ruby: "Une légende raconte qu’à son réveil,\nJIRACHI réalise n’importe quel\nsouhait inscrit sur les papiers collés\fsur sa tête. Si ce POKéMON se sent en\ndanger, il se défend sans même se\nréveiller."
          sapphire: "JIRACHI dort depuis mille ans, mais\nil se réveillera si on lui chante quelque\nchose avec une voix d’une grande\fpureté. On raconte qu’il peut exaucer\nles vœux des gens."
        it:
          ruby: "La leggenda racconta che JIRACHI\nrealizza ogni desiderio scritto su\nbigliettini che trova attaccati alla\fpropria testa, quando si sveglia.\nIn caso di pericolo, lotta senza\nmai svegliarsi."
          sapphire: "JIRACHI può essere destato dal suo\nsonno millenario cantando con una\nvoce pura e cristallina.\fRiesce a realizzare ogni desiderio\nespresso dalle persone."
        de:
          ruby: "Einer Legende nach erfüllt JIRACHI\njeden Wunsch, der auf einen Notizzettel\nan seinem Kopf geschrieben wird. Wenn\fdieses POKéMON Gefahr wittert, kämpft\nes bereits, bevor es überhaupt\naufgewacht ist."
          sapphire: "JIRACHI wird aus seinem tausend-\njährigen Schlaf erwachen, wenn du ihm\nmit klarer Stimme etwas vorsingst.\fEs soll angeblich alle Wünsche der\nMenschen erfüllen."
        es:
          ruby: "Cuenta la leyenda que JIRACHI hará\nrealidad el deseo que se le escriba en\nlas notas que lleva en la cabeza cuando\flas lea al despertarse.\nSi este POKéMON siente peligro, luchará\nsin haber llegado a despertarse."
          sapphire: "JIRACHI despertará de su letargo de\nmiles de años si se le canta con una voz\npura.\fDicen que este POKéMON hace realidad\ncualquier deseo que se tenga."
deoxys:
  species_id: 386
