  species_id: 351
  names:
    jp_kana: ポワルン
    en: CASTFORM
    fr: MORPHEO
    it: CASTFORM
    de: FORMEO
    es: CASTFORM
  forms:
    castform_normal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ruby: "てんきに　よって　すがたが　かわる　ポケモン。\nちいさい　からだを　まもる　ために　だいしぜんの\nおおきな　パワーを　つかえる　ように　なった。"
          sapphire: "しぜんの　ちからを　うけて　たいよう　あまみず\nゆきぐもに　すがたを　かえる　ポケモン。\nきしょうが　かわると　きしょうも　かわるぞ。"
        en:
          ruby: "CASTFORM’s appearance changes with\nthe weather.\nThis POKéMON gained the ability to use\fthe vast power of nature to protect\nits tiny body."
          sapphire: "CASTFORM borrows the power of nature\nto transform itself into the guises of\nthe sun, rain clouds, and snow clouds.\fThis POKéMON’s feelings change with the\nweather."
        fr:
          ruby: "L’apparence de MORPHEO change en\nfonction du temps. Ce POKéMON a appris\fà utiliser l’immense pouvoir de la nature\npour protéger son corps minuscule."
          sapphire: "MORPHEO emprunte le pouvoir de\nla nature pour prendre l’apparence du\nsoleil, de la pluie ou de la neige.\fLe type de ce POKéMON change\nen fonction du temps."
        it:
          ruby: "L’aspetto di CASTFORM cambia con le\ncondizioni atmosferiche.\fQuesto POKéMON ha imparato ad usare\nla potente forza della natura per\nproteggere il suo corpicino indifeso."
          sapphire: "CASTFORM usa il potere della natura\nper trasformarsi in sole, gocce di\npioggia e nubi nevose.\fIl tipo di questo POKéMON\nvaria con i mutamenti\nmeteorologici."
        de:
          ruby: "FORMEOs Erscheinung ändert sich\nmit dem Wetter. Dieses POKéMON hat\ndie Fähigkeit erworben, die mächtige\fKraft der Natur zu nutzen, um seinen\nwinzigen Körper zu schützen."
          sapphire: "FORMEO bedient sich der Kraft der\nNatur, um die Gestalt der Sonne, von\nRegen- oder Schneewolken anzunehmen.\fDie Gefühlslage dieses POKéMON\nverändert sich mit dem Wetter."
        es:
          ruby: "El tipo de CASTFORM cambia con las\nvariaciones del tiempo.\nEste POKéMON consiguió aprender a usar\fel gran poder de la Naturaleza para\nproteger el pequeño cuerpo que tiene."
          sapphire: "CASTFORM se vale del poder de la\nNaturaleza para transformarse en el\nsol y en nubarrones cargados de lluvia\fo nieve. El tipo de este POKéMON\nvaría según el clima."
