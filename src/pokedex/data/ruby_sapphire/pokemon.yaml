      descriptions:
        jp_kana:
          ruby: "なつの　おわりごろ　よるに　すなはまへ　いくと\nコアと　よばれる　きかんを　あかく　ひからせた\nヒトデマンが　ほしの　ように　みえるよ。"
          sapphire: "ちゅうしんの　あかい　コアを　てんめつさせて\nよぞらの　ほしと　こうしん　している　らしい。\nからだは　ちぎれても　じこさいせい　するぞ。"
        en:
          ruby: "STARYU’s center section has an organ\ncalled the core that shines bright red.\nIf you go to a beach toward the\fend of summer, the glowing cores of\nthese POKéMON look like the stars\nin the sky."
          sapphire: "STARYU apparently communicates with\nthe stars in the night sky by flashing\nthe red core at the center of its body.\fIf parts of its body are torn, this\nPOKéMON simply regenerates the\nmissing pieces and limbs."
        fr:
          ruby: "Au centre de STARI se trouve un organe\nrouge et brillant appelé le cœur. A la\nfin de l’été, sur les plages, les cœurs\fde ces POKéMON brillent comme les\nétoiles dans le ciel."
          sapphire: "STARI communique apparemment avec\nles étoiles dans le ciel en\nfaisant clignoter son cœur rouge.\fSi des parties de son corps sont\ncassées, ce POKéMON les régénère."
        it:
          ruby: "Al centro del corpo di STARYU è\npresente un nucleo che brilla di un\nrosso intenso. In spiaggia, a fine\festate, il nucleo di questi POKéMON\nha l’aspetto delle stelle nel firmamento."
          sapphire: "Pare che la notte STARYU comunichi\ncon le stelle facendo brillare il suo\nnucleo rosso al centro del corpo.\fIn caso di perdita di qualche appendice\nquesto POKéMON riesce a rigenerarla\nsenza problemi."
        de:
          ruby: "In STERNDUs Körpermitte befindet sich\nein hellrot leuchtendes Organ - \nsein Kern. Wenn du im Spätsommer\fan einen Strand gehst, sehen die\nleuchtenden Kerne dieser POKéMON aus\nwie Sterne."
          sapphire: "STERNDU kommuniziert mit den Sternen\nam Nachthimmel, indem es den roten\nKern in seiner Körpermitte blinken\flässt. Wenn Teile seines Körpers\nbeschädigt wurden, stellt es die\nfehlenden Teile selber wieder her."
        es:
          ruby: "STARYU posee un órgano central\nconocido como su núcleo, que brilla\ncon una luz roja.\fSi vas a la playa a finales de verano,\npodrás ver los núcleos de estos POKéMON\nbrillando como las estrellas del cielo."
          sapphire: "STARYU parece comunicarse por la\nnoche con las estrellas haciendo brillar\nel núcleo rojo de su cuerpo.\fSi este POKéMON sufre algún daño en\nalguna zona de su cuerpo, la regenerará\nsin problema."
