          ruby: "ちいさな　ムシや　いわばの　コケを　たべる。\nかいりゅうが　はやく　なると　しっぽを　いわばや\nサンゴに　まきつけ　ながされない　ように　する。"
          sapphire: "きけんを　かんじると　はんしゃてきに　くちから\nまっくろい　スミを　はきだして　にげるぞ。\nせびれを　きように　うごかして　およぐ。"
        en:
          ruby: "HORSEA eats small insects and moss off\nof rocks. If the ocean current turns\nfast, this POKéMON anchors itself by\fwrapping its tail around rocks or coral\nto prevent being washed away."
          sapphire: "If HORSEA senses danger, it will\nreflexively spray a dense black ink\nfrom its mouth and try to escape.\fThis POKéMON swims by cleverly flapping\nthe fins on its back."
        fr:
          ruby: "HYPOTREMPE mange des petits insectes\net de la mousse trouvée sur les cailloux.\nLorsque les courants océaniques sont\ftrop forts, ce POKéMON peut s’ancrer\nen accrochant sa queue aux rochers\nou aux coraux."
          sapphire: "Lorsque HYPOTREMPE sent un danger,\nil libère instinctivement une épaisse\nencre noire pour pouvoir s’échapper.\fCe POKéMON nage en agitant ses\nnageoires dorsales."
        it:
          ruby: "HORSEA si nutre di piccoli insetti e del\nmuschio trovato sugli scogli. Se la\ncorrente oceanica si fa rapida,\favvolge la coda attorno agli spuntoni di\nroccia o ai coralli per evitare di essere\nspazzato via."
          sapphire: "Avvertendo il pericolo, HORSEA spruzza\nistintivamente una nube d’inchiostro\nnero dalla bocca, tentando poi la fuga.\fQuesto POKéMON nuota agitando\nabilmente le pinne sulla schiena."
        de:
          ruby: "SEEPER ernährt sich von kleinen\nInsekten und dem Moos auf Steinen.\nBei unruhiger See verankert sich\fdieses POKéMON mit seinem Schweif an\nSteinen oder Korallen, damit es nicht\nweggespült wird."
          sapphire: "Wenn SEEPER Gefahr wittert, versprüht\nes reflexartig eine tiefschwarze Tinte\naus seinem Mund und ergreift die Flucht.\fDieses POKéMON kann schwimmen, indem\nes geschickt mit den Flossen auf seinem\nRücken schlägt."
        es:
          ruby: "HORSEA come insectos pequeños\ny el musgo de las rocas. Si las\ncorrientes del océano cobran fuerza,\feste POKéMON se anclará con la\ncola a rocas o corales para evitar\nque las aguas lo arrastren."
          sapphire: "Si HORSEA siente peligro, echará\npor la boca una densa tinta negra\ninconscientemente e intentará huir.\fEste POKéMON nada muy bien batiendo\nlas aletas que tiene en el lomo."
