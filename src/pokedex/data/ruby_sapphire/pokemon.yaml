        jp_kana:
          ruby: "きたえあげた　きんにくは　はがねの　かたさ。\nすもうとりの　からだも　ゆび　１ぽんで　らくらく\nもちあげてしまう　かいりきの　ポケモンだ。"
          sapphire: "にんげんの　ちからしごとを　てつだいながら\nからだを　まいにち　きたえている　ポケモン。\nやすみの　ひには　のやまで　からだを　きたえる。"
        en:
          ruby: "MACHOKE’s thoroughly toned muscles\npossess the hardness of steel.\nThis POKéMON has so much strength,\fit can easily hold aloft a sumo wrestler\non just one finger."
          sapphire: "MACHOKE undertakes bodybuilding every\nday even as it helps people with tough,\nphysically demanding labor.\fOn its days off, this POKéMON heads to\nthe fields and mountains to exercise\nand train."
        fr:
          ruby: "Les muscles toniques de MACHOPEUR\nsont durs comme de l’acier.\nCe POKéMON est si fort qu’il\fpeut facilement soulever un sumo\navec un seul doigt."
          sapphire: "MACHOPEUR pratique le body-building\ntous les jours, même lorsqu’il aide\nles gens à réaliser de durs travaux.\fPendant ses congés, ce POKéMON va\ns’entraîner dans les champs et les\nmontagnes."
        it:
          ruby: "I muscoli perfettamente tonici di\nMACHOKE possiedono la durezza\ndell’acciaio. Questo POKéMON è\fcosì forte, da riuscire a sollevare\nun lottatore di sumo con un dito."
          sapphire: "MACHOKE si allena ogni giorno\ncon esercizi di body building, aiutando\nl’uomo nei lavori fisicamente pesanti.\fNei giorni di riposo, si reca in campagna\no in montagna per allenarsi ancora."
        de:
          ruby: "MASCHOCKs starke Muskeln sind so hart\nwie Stahl. Dieses POKéMON hat so viel\nKraft, dass es mit nur einem Finger\feinen Sumo-Ringer in der Luft halten\nkann."
          sapphire: "MASCHOCK stählt seinen Körper jeden\nTag, zum Beispiel indem es Menschen bei\neiner harten körperlichen Arbeit hilft.\fAn seinen freien Tagen begibt es sich\nauf Felder und Berge, um zu trainieren."
        es:
          ruby: "Los entrenados músculos de MACHOKE\nson tan fuertes como el acero. Este\nPOKéMON es tan fuerte que puede\flevantar con un solo dedo a un luchador\nde sumo."
          sapphire: "MACHOKE realiza sesiones de culturismo\ntodos los días. De entrenamiento le\nsirven también las veces que ayuda a la\fgente en tareas de esfuerzo físico.\nEn sus días libres, va al campo o a la\nmontaña para hacer más ejercicio."
machamp:
  species_id: 68
