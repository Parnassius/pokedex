          sapphire: "からだの　さいぼうを　くみかえて　へんしんする。\nおもいだしながら　いぜん　みた　ものに　かわると\nちょっと　ちがう　かたちに　なってしまうのだ。"
        en:
          ruby: "DITTO rearranges its cell structure to\ntransform itself into other shapes.\nHowever, if it tries to transform itself\finto something by relying on its memory,\nthis POKéMON manages to get details\nwrong."
          sapphire: "DITTO rearranges its cell structure to\ntransform itself into other shapes.\nHowever, if it tries to transform itself\finto something by relying on its memory,\nthis POKéMON manages to get details\nwrong."
        fr:
          ruby: "METAMORPH peut modifier sa structure\nmoléculaire pour prendre d’autres\nformes. En revanche, lorsqu’il essaye\fde se transformer de mémoire, il lui\narrive de se tromper sur\ncertains détails."
          sapphire: "METAMORPH peut modifier sa structure\nmoléculaire pour prendre d’autres\nformes. En revanche, lorsqu’il essaye\fde se transformer de mémoire, il lui\narrive de se tromper sur\ncertains détails."
        it:
          ruby: "DITTO cambia la sua struttura cellulare\nper assumere molte altre forme.\nTuttavia, quando si affida solo\falla sua memoria, talvolta dimentica\ndettagli importanti."
          sapphire: "DITTO cambia la sua struttura cellulare\nper assumere molte altre forme.\nTuttavia, quando si affida solo\falla sua memoria, talvolta dimentica\ndettagli importanti."
        de:
          ruby: "DITTO verändert seine Zellstruktur, um\nsich in eine andere Form zu verwandeln.\nWenn es sich dabei jedoch auf sein\fGedächtnis verlässt, unterlaufen \ndiesem POKéMON schon mal Fehler."
          sapphire: "DITTO verändert seine Zellstruktur, um\nsich in eine andere Form zu verwandeln.\nWenn es sich dabei jedoch auf sein\fGedächtnis verlässt, unterlaufen \ndiesem POKéMON schon mal Fehler."
        es:
          ruby: "DITTO reorganiza la estructura de sus\ncélulas para adoptar otras formas.\nPero como intente transformarse en\falgo guiándose por los datos que tenga\nalmacenados en la memoria,\nhabrá detalles que se le escapen."
          sapphire: "DITTO reorganiza la estructura de sus\ncélulas para adoptar otras formas.\nPero como intente transformarse en\falgo guiándose por los datos que tenga\nalmacenados en la memoria,\nhabrá detalles que se le escapen."
