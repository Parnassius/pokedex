      descriptions:
        jp_kana:
          ruby: "マイペースで　じゆうきままな　くらしを　このむ。\nきのむくまま　エサを　たべたり　ねむったり\nしているので　１にちの　リズムが　バラバラだ。"
          sapphire: "きまった　すみかを　もたずに　くらす　ポケモン。\nほかの　ポケモンが　ねどこに　ちかよって　きても\nけっして　あらそわず　ねる　ばしょを　かえる。"
        en:
          ruby: "DELCATTY prefers to live an unfettered\nexistence in which it can do as it\npleases at its own pace.\fBecause this POKéMON eats and sleeps\nwhenever it decides, its daily routines\nare completely random."
          sapphire: "DELCATTY sleeps anywhere it wants\nwithout keeping a permanent nest.\nIf other POKéMON approach it as it\fsleeps, this POKéMON will never fight -\nit will just move away somewhere else."
        fr:
          ruby: "DELCATTY préfère vivre une\nexistence sans contraintes, au cours\nde laquelle chacun pourrait faire ce\fqu’il veut. Comme ce POKéMON mange\net dort quand il le décide, son rythme\nde vie est totalement aléatoire."
          sapphire: "DELCATTY peut dormir n’importe où.\nIl n’a pas de nid permanent. Lorsque\nd’autres POKéMON lui cherchent des\fnoises pendant son sommeil, il ne\nrépond pas et se contente de partir \ndormir ailleurs."
        it:
          ruby: "DELCATTY preferisce vivere una vita in\nlibertà, in cui poter fare ciò che più gli\naggrada in base alle proprie esigenze.\fPoiché anche gli orari dei pasti e del\nsonno sono completamente liberi,\nla sua vita quotidiana è casuale."
          sapphire: "DELCATTY dorme dove più gli aggrada\nsenza mai una dimora fissa.\fSe gli si avvicinano altri POKéMON,\nDELCATTY non lotta mai, ma leva\nle tende e si sposta da un’altra parte."
        de:
          ruby: "ENEKORO liebt seine Eigenständigkeit.\nSo kann es das tun, was es möchte, und\nkann selbst das Tempo bestimmen.\fDa dieses POKéMON schläft und isst,\nwenn es Lust dazu hat, ist sein\nTagesablauf eher zufälliger Natur."
          sapphire: "ENEKORO schläft dort, wo es ihm gefällt\nund hat kein dauerhaftes Nest. Nähern\nsich ihm andere POKéMON, wenn\fes schläft, kämpft es nicht mit ihnen,\nsondern zieht weiter."
        es:
          ruby: "DELCATTY prefiere llevar una vida\nindependiente y hacer lo que se le\nantoje. Como este POKéMON come\fy duerme según vea en cada momento,\nno se puede decir que tenga unos\nhábitos regulares en el día a día."
          sapphire: "DELCATTY duerme en cualquier lugar sin\ntener que mantener el nido en un mismo\nsitio. Si otro POKéMON se le acerca\fmientras duerme, no se pondrá a luchar\ncon él; simplemente se irá a otro sitio."
sableye:
  species_id: 302
  names:
    jp_kana: ヤミラミ
    en: SABLEYE
    fr: TENEFIX
    it: SABLEYE
    de: ZOBIRIS
    es: SABLEYE
  forms:
