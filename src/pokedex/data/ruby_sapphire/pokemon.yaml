      descriptions:
        jp_kana:
          ruby: "こえの　はちょうを　じざいに　かえる　せいたいを\nもっているので　あいてが　いちばん　ねむくなる\nはちょうで　うたを　うたう　ことが　できる。"
          sapphire: "うたう　ときは　いちども　いきつぎをしない。\nなかなか　ねむらない　てきを　あいてに　した\nときは　いきを　できない　プリンも　いのちがけ。"
        en:
          ruby: "JIGGLYPUFF’s vocal chords can freely\nadjust the wavelength of its voice.\nThis POKéMON uses this ability to sing\fat precisely the right wavelength to\nmake its foes most drowsy."
          sapphire: "When this POKéMON sings, it never\npauses to breathe. If it is in a battle\nagainst an opponent that does not\feasily fall asleep, JIGGLYPUFF cannot\nbreathe, endangering its life."
        fr:
          ruby: "RONDOUDOU utilise ses cordes vocales\npour ajuster librement la longueur\nd’onde de sa voix.\fCela permet à ce POKéMON de chanter\nen utilisant une longueur d’onde qui\nendort ses ennemis."
          sapphire: "Lorsque ce POKéMON chante, il ne\ns’arrête pas pour respirer. Quand il se\nbat contre un adversaire qu’il ne peut\fpas facilement endormir, RONDOUDOU\nreste donc sans respirer, mettant sa\nvie en danger."
        it:
          ruby: "Le corde vocali di JIGGLYPUFF gli\nconsentono di cantare esattamente\falla lunghezza d’onda richiesta\nper addormentare il suo avversario."
          sapphire: "Quando canta, JIGGLYPUFF non si ferma\na prendere fiato. Se lotta contro un\nnemico che non si addormenta\ffacilmente, non respira rischiando così\ndi esaurire tutte le sue energie."
        de:
          ruby: "PUMMELUFFs Stimmbänder können die\nTonlage seiner Stimme beliebig vari-\nieren. Dieses POKéMON benutzt diese\fFähigkeit, um seine Gegner mit monoto-\nnem Gesang in Tiefschlaf zu versetzen."
          sapphire: "Wenn dieses POKéMON singt, hört es\nnicht auf zu atmen. Im Kampf gegen\neinen Gegner, der nicht so leicht\fin Schlaf zu versetzen ist, kann\nPUMMELUFF nicht atmen. Leider\ngefährdet es sich dadurch selbst."
        es:
          ruby: "JIGGLYPUFF tiene unas cuerdas vocales\nque ajustan sin problema la longitud de\nonda de su voz.\fEste POKéMON usa la habilidad que tiene\npara cantar con la longitud de onda\nnecesaria para adormecer a su rival."
          sapphire: "Cuando este POKéMON canta, no para\nnunca para respirar. Si en combate\nel enemigo no se queda dormido\fcon facilidad, JIGGLYPUFF no podrá\nrespirar y su vida correrá peligro."
