          ruby: "からだから　しみだしている　たいえきは　はなが\nまがるほど　きょうれつな　においを　はなつ。\n１てきで　プールのみずが　にごり　においだす。"
          sapphire: "きたない　ものが　だいこうぶつなので　ゴミを\nみちばたに　すてる　ような　ひとが　すんでいる\nまちには　ベトベトンが　あつまってくるぞ。"
        en:
          ruby: "From MUK’s body seeps a foul fluid that\ngives off a nose-bendingly horrible\nstench.\fJust one drop of this POKéMON’s body\nfluid can turn a pool stagnant and\nrancid."
          sapphire: "This POKéMON’s favorite food is\nanything that is repugnantly filthy.\nIn dirty towns where people think\fnothing of throwing away litter on the\nstreets, MUK are certain to gather."
        fr:
          ruby: "Un fluide nauséabond suinte du corps de\nGROTADMORV, agressant les narines\nde ses ennemis.\fUne seule goutte de ce fluide suffit à\nfaire croupir un bassin d’eau propre."
          sapphire: "Ce POKéMON ne mange que ce qui est\nrépugnant et abject.\nLes GROTADMORV se rassemblent dans\fles villes où les gens jettent tout\npar terre, dans la rue."
        it:
          ruby: "Il corpo di questo POKéMON emana un\nliquido marcio dall’odore nauseabondo.\nUna sola goccia di questo liquido\fè in grado di trasformare una piscina\nin una pozza di putrida acqua\nstagnante."
          sapphire: "Questo POKéMON si ciba di qualunque\ncosa sia sudicia e ripugnante. Le\ncittà più inquinate, dove la popolazione\fgetta i rifiuti in strada, sono un luogo\ndi ritrovo frequente per i MUK."
        de:
          ruby: "SLEIMOK scheidet eine widerlich\nstinkende Substanz aus. Ein einziger\nTropfen seiner Körpersubstanz reicht\faus, um ein Gewässer zu verseuchen."
          sapphire: "SLEIMOKs Lieblingsspeise ist alles, was\nwiderlich verschmutzt ist. In dreckigen\nStädten, in denen sich Menschen nichts\fdabei denken, wenn sie Müll auf die\nStraße werfen, lassen sich diese\nPOKéMON mit Vorliebe in Scharen nieder."
        es:
          ruby: "MUK emana por todo el cuerpo un fluido\nmaloliente que obliga a taparse la nariz.\nCon sólo una gota de la sustancia\fque exuda este POKéMON, se podría\ncontaminar un estanque."
          sapphire: "A este POKéMON le encanta comer cosas\nrepulsivas. En ciudades sucias en las\nque la gente tira la basura por la calle,\flos MUK tienen sin duda su punto\nde encuentro."
