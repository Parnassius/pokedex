  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          ruby: "２ひき　いじょう　あつまると　がまん　くらべを\nはじめるが　くうふくを　がまんして　しまうので\nソーナンス　トレーナーは　ちゅういが　ひつよう。"
          sapphire: "ひたすら　がまんする　ポケモンだが　しっぽを\nこうげきされる　ことだけは　がまん　できない。\nあいてを　みちづれにする　チャンスを　うかがう。"
        en:
          ruby: "If two or more WOBBUFFET meet, they will\nturn competitive and try to outdo each\nother’s endurance.\fHowever, they may try to see which one\ncan endure the longest without food.\nTRAINERS need to beware of this habit."
          sapphire: "WOBBUFFET does nothing but endure\nattacks - it won’t attack on its own.\nHowever, it won’t endure an attack on\fits tail. When that happens, the\nPOKéMON will try to take the foe with it\nusing DESTINY BOND."
        fr:
          ruby: "Si un ou plusieurs QULBUTOKE se ren-\ncontrent, ils se mesurent les uns aux\nautres et font des concours d’endu-\france. Parfois, ils tentent de voir qui\npeut rester le plus longtemps sans\nmanger. Mieux vaut être prévenu."
          sapphire: "QULBUTOKE ne fait rien, à part en-\ncaisser des coups. Il n’attaque jamais\nde lui-même. Cependant, il ne supporte\fpas qu’on attaque sa queue. Lorsque ça\narrive, ce POKéMON essaie d’entraîner\nson ennemi grâce à PRLVT DESTIN."
        it:
          ruby: "Quando due o più WOBBUFFET si incon-\ntrano, diventano competitivi tentando\ndi vanificare la reciproca resistenza.\fTalvolta fanno anche a gara per vedere\nchi resiste di più senza cibo. Gli\nALLENATORI devono fare attenzione."
          sapphire: "WOBBUFFET non fa altro che subire\nle azioni nemiche: non agisce mai per\nprimo. Tuttavia, non sopporta di essere\fattaccato alla coda. In questo caso\ncerca di trascinare con sé il nemico\nusando DESTINOBBLIGATO."
        de:
          ruby: "Wenn zwei oder mehr WOINGENAU \naufeinander treffen, versuchen sie,\ngegenseitig ihre Geduld zu übertreffen.\fSie möchten herausfinden, welches\nPOKéMON es am längsten ohne Nahrung\naushält. Darauf müssen Trainer achten."
          sapphire: "WOINGENAU tut nichts anderes als\nAngriffe auszuhalten. Von sich aus\nwürde es nie angreifen. Eine Attacke\fauf seinen Schweif würde es allerdings\nniemals dulden. Wenn das passiert, \nsetzt es ABGANGSBUND ein."
        es:
          ruby: "Si dos o más WOBBUFFET se encuentran,\nse volverán competitivos e intentarán\nsuperarse en resistencia. Pero también\fpuede que intenten aguantar sin\ncomer; algo que los ENTRENADORES\ndeben tener muy en cuenta."
          sapphire: "WOBBUFFET no hace otra cosa que\naguantar los golpes que recibe (nunca\nusa movimientos ofensivos).\fPero si le atacan a la cola, intentará\nllevarse con él al enemigo usando\nMISMODESTINO."
