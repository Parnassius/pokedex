          sapphire: "すこしの　ショックで　すぐに　ばくはつする。\nモンスターボールに　きょうりょくな　パルスを\nあびせた　ときに　うまれたと　ウワサされている。"
        en:
          ruby: "VOLTORB was first sighted at a company\nthat manufactures POKé BALLS.\nThe link between that sighting and\fthe fact that this POKéMON looks very\nsimilar to a POKé BALL remains a\nmystery."
          sapphire: "VOLTORB is extremely sensitive - it\nexplodes at the slightest of shocks.\nIt is rumored that it was first created\fwhen a POKé BALL was exposed to a\npowerful pulse of energy."
        fr:
          ruby: "La première fois qu’on a vu VOLTORBE,\nc’était dans une usine qui fabrique\ndes POKé BALLS. Personne n’a\fjamais pu expliquer le lien entre cet\névénement et la ressemblance frappante\nde ce POKéMON avec une POKé BALL."
          sapphire: "VOLTORBE est extrêmement sensible.\nIl explose au moindre choc.\nOn raconte qu’il fut créé par\fl’exposition d’une POKé BALL à une\npuissante dose d’énergie."
        it:
          ruby: "VOLTORB è stato avvistato per la\nprima volta in un’azienda produttrice\ndi POKé BALL.\fIl nesso tra la sua presenza in questa\nfabbrica e l’estrema somiglianza ad\nuna POKé BALL rimane un mistero."
          sapphire: "VOLTORB è estremamente sensibile,\nesplode alla minima sollecitazione.\nSi dice che sia stato creato\fesponendo una POKé BALL ad\nuna forte carica energetica."
        de:
          ruby: "VOLTOBAL wurde zuerst bei einer Firma\nbeobachtet, die POKéBÄLLE herstellt.\nDer Zusammenhang zwischen dieser\fBeobachtung und der Tatsache, dass\ndieses POKéMON wie ein POKéBALL\naussieht, ist noch ungeklärt."
          sapphire: "VOLTOBAL ist äußerst empfindlich, es\nexplodiert schon bei der leichtesten\nErschütterung. Man munkelt, es\fsei entstanden, als ein POKéBALL einen\nstarken elektrischen Schlag bekommen\nhat."
        es:
          ruby: "VOLTORB fue visto por primera vez en\nuna empresa encargada de comercializar\nPOKé BALLS. La conexión que existe\fentre aquella primera vez que se le vio\ny el hecho de que se parece mucho a una\nPOKé BALL sigue siendo un misterio."
          sapphire: "VOLTORB es tremendamente sensible\ny a la más mínima sacudida, explota. \nCuentan que se creó cuando alguien\fexpuso una POKé BALL a una gran\ndescarga eléctrica."
