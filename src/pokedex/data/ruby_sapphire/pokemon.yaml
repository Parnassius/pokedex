        jp_kana:
          ruby: "でんせんに　くっついて　でんきを　たべている。\nていでんに　なったら　ブレーカーを　しらべよう。\nコイルが　びっしり　くっついて　いるかも。"
          sapphire: "さゆうの　ユニットから　でんじはを　だす　ことで\nじゅうりょくを　さえぎり　くうちゅうに　うかぶ。\nたいないの　でんきが　なくなると　とべなくなる。"
        en:
          ruby: "MAGNEMITE attaches itself to power\nlines to feed on electricity.\nIf your house has a power outage,\fcheck your circuit breakers. You may\nfind a large number of this POKéMON\nclinging to the breaker box."
          sapphire: "MAGNEMITE floats in the air by emitting\nelectromagnetic waves from the units\nat its sides. These waves block gravity.\fThis POKéMON becomes incapable of\nflight if its internal electrical supply\nis depleted."
        fr:
          ruby: "MAGNETI s’attache aux lignes à haute\ntension pour se charger en électricité.\nSi une maison a une panne de courant,\fil est conseillé de vérifier les fusibles\ncar on trouve parfois ces POKéMON\namassés sur la boîte à fusibles."
          sapphire: "MAGNETI flotte dans les airs en\némettant des ondes électromagnétiques\npar les aimants sur ses côtés. Ces\fondes annulent les effets de la gravité.\nCe POKéMON ne peut plus voler\nsi son stock d’électricité est épuisé."
        it:
          ruby: "MAGNEMITE si attacca alle linee\nelettriche per caricarsi di energia.\nIn caso di assenza di corrente in\fcasa, controllare gli interruttori.\nPotrebbero esserci dei POKéMON attac-\ncati alla cassetta degli interruttori."
          sapphire: "MAGNEMITE fluttua a mezz’aria emanando\nonde elettromagnetiche dai suoi\nelementi laterali. Queste onde bloccano\fla forza di gravità. Il POKéMON non\nriesce a rimanere sospeso dopo aver\nesaurito la carica elettrica."
        de:
          ruby: "MAGNETILO ernährt sich von Elektri-\nzität aus Stromleitungen. Dieses\nPOKéMON hängt sich gern an\fSicherungskästen. Wenn es in deinem\nHaus zu einem Stromausfall kommt,\nsolltest du die Sicherungen überprüfen."
          sapphire: "MAGNETILO segelt durch die Luft und \nsendet dabei elektromagnetische Wellen\nan beiden Seiten seines Körpers aus.\fDieses POKéMON wird flugunfähig, wenn\ndie Stromquelle in seinem Inneren\nerschöpft ist."
        es:
          ruby: "MAGNEMITE se engancha a las líneas de\ntensión para nutrirse de electricidad.\nSi se produce un apagón en tu casa,\fmira el automático, no vaya a ser que\nhaya un montón de estos POKéMON\ncolgados de la caja de fusibles."
          sapphire: "MAGNEMITE flota en el aire emitiendo\nondas electromagnéticas a través\nde las unidades de las extremidades,\fque bloquean la gravedad. Si se agota\nsu suministro de electricidad interno,\nes incapaz de mantenerse flotando."
