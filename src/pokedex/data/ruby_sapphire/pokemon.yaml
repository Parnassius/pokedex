        jp_kana:
          ruby: "うまれた　ときは　しろい　１ぽんの　しっぽ。\nあいじょうを　たっぷり　うけると　しっぽは\n６ぽんに　わかれて　みごとな　まきげになる。"
          sapphire: "からだの　なかで　ほのおが　いつも　もえている。\nひるま　きおんが　あがると　たいおんも　たかく\nなってしまうので　くちから　ほのおを　にがす。"
        en:
          ruby: "At the time of its birth, VULPIX has one\nwhite tail. The tail separates into six\nif this POKéMON receives plenty of love\ffrom its TRAINER.\nThe six tails become magnificently\ncurled."
          sapphire: "Inside VULPIX’s body burns a flame that\nnever goes out. During the daytime,\nwhen the temperatures rise, this\fPOKéMON releases flames from its mouth\nto prevent its body from growing too\nhot."
        fr:
          ruby: "A sa naissance, GOUPIX a une queue\nblanche. Cette queue se divise en six\nsi le POKéMON reçoit de l’amitié de la\fpart de son DRESSEUR.\nLes six queues sont courbées et\nmagnifiques."
          sapphire: "A l’intérieur du corps de GOUPIX se\ntrouve une flamme qui ne s’éteint\njamais. Pendant la journée, lorsque la\ftempérature augmente, ce POKéMON\ncrache des flammes pour éviter que\nson corps ne devienne trop chaud."
        it:
          ruby: "Al momento della nascita VULPIX ha una\nsola coda bianca. Se il POKéMON riceve\nmolto amore dal proprio ALLENATORE\fla coda si divide in sei diramazioni\nche poi si arricciano elegantemente."
          sapphire: "All’interno del corpo di VULPIX brucia\nuna fiamma inestinguibile. Di giorno,\nquando sale la temperatura, questo\fPOKéMON emette fiamme dalla bocca\nper evitare il surriscaldamento del\nproprio corpo."
        de:
          ruby: "VULPIX kommt mit einem weißen Schweif\nzur Welt. Dieser teilt sich sechsfach, \nwenn das POKéMON von seinem TRAINER\fviel Zuneigung bekommt.\nSeine sechs Schweife kräuseln sich\nschließlich."
          sapphire: "In VULPIX’ Körper brennt eine Flamme,\ndie niemals erlischt. Am Tage, wenn die\nTemperaturen steigen, stößt dieses\fPOKéMON Flammen aus seinem Mund aus.\nSo schützt es sich davor, dass sein\nKörper zu heiß wird."
        es:
          ruby: "Al nacer, VULPIX tiene una cola blanca\nque se divide en seis si recibe cariño\npor parte de su ENTRENADOR.\fLas seis colas se le rizan de forma\nmajestuosa."
          sapphire: "En el interior del cuerpo de VULPIX\narde una llama que nunca se extingue.\nDurante el día, cuando suben las\ftemperaturas, este POKéMON\nlibera llamas por la boca para evitar\nrecalentarse."
