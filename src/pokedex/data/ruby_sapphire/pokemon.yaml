      descriptions:
        jp_kana:
          ruby: "えものを　みつけると　けあなから　もうどくの\nたいえきを　ふきだして　あびせかけるぞ。\nよわった　ところを　おおきな　くちで　ペロリ。"
          sapphire: "はが　１ぽんも　ないので　なんでも　まるのみ。\nいっぱいに　あけた　くちは　とても　おおきく\nじどうしゃの　タイヤだって　すっぽり　はいるぞ。"
        en:
          ruby: "When SWALOT spots prey, it spurts out\na hideously toxic fluid from its pores\nand sprays the target.\fOnce the prey has weakened, this\nPOKéMON gulps it down whole with its\ncavernous mouth."
          sapphire: "SWALOT has no teeth, so what it\neats, it swallows whole, no matter what.\nIts cavernous mouth yawns widely.\fAn automobile tire could easily fit\ninside this POKéMON’s mouth."
        fr:
          ruby: "Lorsqu’AVALTOUT repère une proie,\nil libère une substance terriblement\ntoxique de ses pores et en enduit\fson ennemi pour l’affaiblir. Ce POKéMON\npeut ensuite l’avaler d’un coup dans sa\ngigantesque bouche."
          sapphire: "AVALTOUT n’a pas de dents, ce qui\nle force à tout avaler en une bouchée.\nQuand il bâille, sa bouche prend une\ftaille impressionnante, et on pourrait y\nplacer une roue de voiture."
        it:
          ruby: "Quando individua la preda, SWALOT\nspruzza sul bersaglio un ripugnante\nfluido tossico dai propri pori.\fUna volta indebolito l’avversario,\nSWALOT lo ingoia intero con la\nbocca simile ad una voragine."
          sapphire: "SWALOT non ha denti, così quando\nmangia ingoia ogni cosa intera, senza\nmasticare. Quando sbadiglia, la sua\fbocca enorme si apre a mo’ di\nvoragine. È così grande che potrebbe\ncontenere persino un pneumatico."
        de:
          ruby: "Wenn SCHLUKWECH Beute sichtet,\nverspritzt es eine höchst giftige\nSubstanz aus seinen Poren und\fbesprüht damit sein Ziel. Wenn die Beute\ngeschwächt ist, schluckt es sie mit\nseinem riesigen Maul im Ganzen herunter."
          sapphire: "SCHLUKWECH hat keine Zähne. Alles was\nes isst, schluckt es im Ganzen herunter.\nSein Maul ist so riesig, dass mit\fLeichtigkeit ein Autoreifen hinein-\npassen würde."
        es:
          ruby: "Cuando SWALOT detecta una presa, echa\npor los poros y a borbotones un fluido\ntóxico espantoso y rocía a su víctima.\fUna vez la debilita, se la traga entera\ngracias a la gigantesca boca que\ntiene."
          sapphire: "SWALOT no tiene dientes, así que lo que\ncome se lo traga de una vez; da igual\nlo que sea.\fA este POKéMON le cabría un neumático\nen la boca sin problema."
carvanha:
  species_id: 318
  names:
    jp_kana: キバニア
    en: CARVANHA
    fr: CARVANHA
    it: CARVANHA
    de: KANIVANHA
    es: CARVANHA
  forms:
