      descriptions:
        jp_kana:
          ruby: "よるに　なると　おしりの　フックを　きの　えだに\nひっかけて　ぶらさがり　ねむりに　つく。\nねぞうが　わるいと　あさ　おっこちているよ。"
          sapphire: "よるに　なると　おしりの　フックを　きの　えだに\nひっかけて　ぶらさがり　ねむりに　つく。\nねぞうが　わるいと　あさ　おっこちているよ。"
        en:
          ruby: "WEEPINBELL has a large hook on its rear\nend. At night, the POKéMON hooks on to\na tree branch and goes to sleep.\fIf it moves around in its sleep, it may\nwake up to find itself on the ground."
          sapphire: "WEEPINBELL has a large hook on its rear\nend. At night, the POKéMON hooks on to\na tree branch and goes to sleep.\fIf it moves around in its sleep, it may\nwake up to find itself on the ground."
        fr:
          ruby: "BOUSTIFLOR est doté d’un gros crochet\nsur l’arrière. La nuit, ce POKéMON\ns’accroche à une branche pour\fs’endormir. Quand il a un sommeil agité,\nil se réveille par terre."
          sapphire: "BOUSTIFLOR est doté d’un gros crochet\nsur l’arrière. La nuit, ce POKéMON\ns’accroche à une branche pour\fs’endormir. Quand il a un sommeil agité,\nil se réveille par terre."
        it:
          ruby: "WEEPINBELL è dotato di un grande\nuncino posteriore. Di notte lo usa\nper appendersi ad un ramo e mettersi\fa dormire. Talvolta, agitandosi nel\nsonno, si sveglia al suolo."
          sapphire: "WEEPINBELL è dotato di un grande\nuncino posteriore. Di notte lo usa\nper appendersi ad un ramo e mettersi\fa dormire. Talvolta, agitandosi nel\nsonno, si sveglia al suolo."
        de:
          ruby: "ULTRIGARIA hat einen großen Haken\nan seinem Hinterteil. Nachts hängt\nsich dieses POKéMON zum Schlafen an\feinen Ast. Wenn es sich im Schlaf be-\nwegt, kann es passieren, dass es auf\ndem Boden wieder aufwacht."
          sapphire: "ULTRIGARIA hat einen großen Haken\nan seinem Hinterteil. Nachts hängt\nsich dieses POKéMON zum Schlafen an\feinen Ast. Wenn es sich im Schlaf \nbewegt, kann es passieren, dass es auf\ndem Boden wieder aufwacht."
        es:
          ruby: "WEEPINBELL tiene un gancho a modo de\nextremidad superior trasera, que usa\npor la noche para colgarse de una rama\fy echarse a dormir. Si se mueve mientras\nduerme, puede acabar en el suelo."
          sapphire: "WEEPINBELL tiene un gancho a modo de\nextremidad superior trasera, que usa\npor la noche para colgarse de una rama\fy echarse a dormir. Si se mueve mientras\nduerme, puede acabar en el suelo."
