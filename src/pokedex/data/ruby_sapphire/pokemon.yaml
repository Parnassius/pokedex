          sapphire: "せかいいち　おおきな　はなびらで　えものを\nおびきよせ　どくの　かふんを　あびせかける。\nうごけなくなった　えものを　つかまえて　たべる。"
        en:
          ruby: "VILEPLUME’s toxic pollen triggers\natrocious allergy attacks. That’s why\nit is advisable never to approach any\fattractive flowers in a jungle, however\npretty they may be."
          sapphire: "VILEPLUME has the world’s largest\npetals. They are used to attract prey\nthat are then doused with toxic spores.\fOnce the prey are immobilized, this\nPOKéMON catches and devours them."
        fr:
          ruby: "Le pollen toxique de RAFFLESIA\ndéclenche d’affreuses réactions\nallergiques. C’est pourquoi il est\fconseillé de ne jamais s’approcher des\njolies fleurs trouvées dans la jungle,\nmême lorsqu’elles sont magnifiques."
          sapphire: "RAFFLESIA dispose des plus grands\npétales du monde. Il s’en sert pour\nattirer ses proies avant de les endormir\favec ses spores toxiques. Ce POKéMON\nn’a plus alors qu’à attraper sa\nproie et à la manger."
        it:
          ruby: "Il polline velenoso di VILEPLUME\nscatena paurose reazioni allergiche.\nPer questo motivo si consiglia di\fnon avvicinarsi mai a nessun fiore\ndi bosco, per quanto bello possa essere."
          sapphire: "VILEPLUME ha i petali più grandi al\nmondo. Li usa per attirare la preda\nper poi ricoprirla di spore velenose.\fUna volta immobilizzata la preda,\nil POKéMON la cattura e la divora."
        de:
          ruby: "GIFLORs giftige Pollen rufen böse\nallergische Anfälle hervor. Deshalb ist\nes ratsam, sich keiner schönen Blume im\fDschungel zu nähern, so anziehend sie\nauch sein mag."
          sapphire: "GIFLOR hat die größten Blätter der Welt.\nSie ziehen Beute an und bestäuben sie\nmit giftigen Sporen. Wenn die Beute\fsich nicht mehr rührt, fängt dieses\nPOKéMON sie und frisst sie auf."
        es:
          ruby: "El polen que contienen las esporas\ntóxicas de VILEPLUME causan unos\nataques de alergia muy agudos.\fPor eso, no es aconsejable acercarse\na ninguna flor que resulte atractiva,\npor muy bonita que sea."
          sapphire: "VILEPLUME tiene los mayores pétalos\ndel mundo. Los usa para atraer a sus\npresas y llenarlas de esporas tóxicas.\fUna vez ha inmovilizado a las víctimas,\nlas atrapa y las devora."
