          sapphire: "AQUALI a subi une mutation spontanée.\nDes nageoires et des branchies sont\napparues sur son corps, ce qui lui\fpermet de vivre dans les fonds marins.\nCe POKéMON peut contrôler\nl’eau à volonté."
        it:
          ruby: "VAPOREON, frutto di una mutazione\nnaturale, ha sviluppato pinne e branchie\nper poter vivere sott’acqua.\fQuesto POKéMON ha la capacità di\nsfruttare l’acqua a suo vantaggio."
          sapphire: "VAPOREON, frutto di una mutazione\nnaturale, ha sviluppato pinne e branchie\nper poter vivere sott’acqua.\fQuesto POKéMON ha la capacità di\nsfruttare l’acqua a suo vantaggio."
        de:
          ruby: "AQUANA hat eine spontane Mutation\ndurchgemacht und ihm sind Flossen und \nKiemen gewachsen. Dadurch kann es\funter Wasser leben.\nDieses POKéMON kann Wasser nach\nBelieben manipulieren."
          sapphire: "AQUANA hat eine spontane Mutation\ndurchlaufen. Ihm sind Flossen und \nKiemen gewachsen. Dadurch kann es\funter Wasser leben.\nDieses POKéMON kann Wasser nach\nBelieben manipulieren."
        es:
          ruby: "VAPOREON sufrió una mutación repentina\ny desarrolló aletas y branquias que le\npermiten vivir bajo el agua.\fAsimismo, este POKéMON tiene la\nhabilidad de controlar las aguas."
          sapphire: "VAPOREON sufrió una mutación repentina\ny desarrolló aletas y branquias que le\npermiten vivir bajo el agua.\fAsimismo, este POKéMON tiene la\nhabilidad de controlar las aguas."
