        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - swift_swim
      descriptions:
        jp_kana:
          ruby: "とても　ふかい　うみの　そこに　すんでいるため\nながい　あいだ　ひとに　みつからなかった。\nくらい　しんかいでも　よく　みえる　めを　もつ。"
          sapphire: "さかなの　かたちをした　シッポで　おびきよせ\nおおきな　くちで　エサを　まるのみ　する。\nヘビのように　からだを　くねらせて　およぐ。"
        en:
          ruby: "HUNTAIL’s presence went unnoticed by\npeople for a long time because it lives\nat extreme depths in the sea.\fThis POKéMON’s eyes can see clearly\neven in the murky dark depths of the\nocean."
          sapphire: "HUNTAIL’s tail is shaped like a fish.\nIt uses the tail to attract prey, then\nswallows the prey whole with its large,\fgaping mouth.\nThis POKéMON swims by wiggling its\nslender body like a snake."
        fr:
          ruby: "L’existence de SERPANG fut\nlongtemps ignorée, car il vit dans les\nprofondeurs abyssales des océans.\fLes yeux de ce POKéMON sont excellents\net peuvent même voir à travers les eaux\ntroubles des grandes profondeurs."
          sapphire: "La queue de SERPANG est en forme de\npoisson. Il l’utilise pour attirer sa\nproie qu’il avale en une fois\fgrâce à sa bouche béante. Ce POKéMON\nnage en tortillant son corps comme un\nserpent."
        it:
          ruby: "L’esistenza di HUNTAIL è rimasta\na lungo sconosciuta perché vive solo\nin mare ad incredibili profondità.\fLa sua vista così acuta riesce a\nvedere chiaramente persino nel\nbuio pesto degli abissi oceanici."
          sapphire: "La coda di HUNTAIL è a forma di pesce.\nIl POKéMON la usa come esca per la preda,\nche poi ingoia intera con l’enorme\fbocca spalancata.\nNuota ondeggiando il corpo\nsnello a forma di serpente."
        de:
          ruby: "AALABYSS entging lange der\nAufmerksamkeit des Menschen, da es in\nextremen Tiefen des Meeres lebt.\fDie Augen dieses POKéMON können\nselbst in den dunklen und trüben Tiefen\ndes Meeres einwandfrei sehen."
          sapphire: "AALABYSS’ Schweif ist wie ein Fisch\ngeformt. Es benutzt ihn, um Beute\nanzuziehen und schluckt diese dann\fim Ganzen herunter. Beim Schwimmen\nbewegt es seinen schlanken Körper\nwie eine Schlange."
        es:
          ruby: "HUNTAIL ha pasado desapercibido\ndurante mucho tiempo por vivir\nen las profundidades del mar.\fEl sentido de la vista de este POKéMON\nle permite ver en las oscuras y lodosas\nprofundidades del océano."
          sapphire: "HUNTAIL tiene una cola en forma de\npez, que usa para atraer a su presa. Una\nvez la tiene cerca, la engulle sin más.\fEste POKéMON nada haciendo serpentear\nel cuerpo como si fuera un reptil."
gorebyss:
  species_id: 368
  names:
    jp_kana: サクラビス
    en: GOREBYSS
    fr: ROSABYSS
    it: GOREBYSS
    de: SAGANABYSS
    es: GOREBYSS
