          sapphire: "RETTAN rollt sich zu einer Spirale \nzusammen, wenn es sich ausruht.\nAus dieser Haltung kann es blitzschnell\fauf Bedrohungen aus allen Richtungen\nreagieren, indem es seinen Kopf hebt."
        es:
          ruby: "EKANS se enrosca para descansar.\nAdoptando esta posición puede\nresponder rápidamente a cualquier\famenaza que le aceche desde\ncualquier lugar, levantando la\ncabeza con una feroz mirada."
          sapphire: "EKANS se enrosca para descansar.\nAdoptando esta posición puede\nresponder rápidamente a cualquier\famenaza que le aceche desde\ncualquier lugar, levantando la\ncabeza con una feroz mirada."
