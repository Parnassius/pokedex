          ruby: "つばさを　つかって　とぶように　スキップ。\nすいめんを　あるく　ことだって　できるのだ。\nしずかな　つきよに　みずうみを　あるく。"
          sapphire: "つばさを　つかって　とぶように　スキップ。\nすいめんを　あるく　ことだって　できるのだ。\nしずかな　つきよに　みずうみを　あるく。"
        en:
          ruby: "CLEFABLE moves by skipping lightly as if\nit were flying using its wings. Its\nbouncy step lets it even walk on water.\fIt is known to take strolls on lakes on\nquiet, moonlit nights."
          sapphire: "CLEFABLE moves by skipping lightly as if\nit were flying using its wings. Its\nbouncy step lets it even walk on water.\fIt is known to take strolls on lakes on\nquiet, moonlit nights."
        fr:
          ruby: "Les MELODELFE se déplacent en sautant\ndoucement, comme s’ils volaient avec\nleurs ailes. Leur démarche légère leur\fpermet même de marcher sur l’eau.\nOn raconte qu’ils se promènent sur\nles lacs, les soirs où la lune est claire."
          sapphire: "Les MELODELFE se déplacent en sautant\ndoucement, comme s’ils volaient avec\nleurs ailes. Leur démarche légère leur\fpermet même de marcher sur l’eau.\nOn raconte qu’ils se promènent sur\nles lacs, les soirs où la lune est claire."
        it:
          ruby: "CLEFABLE si muove saltellando leggero\ncome se fluttuasse sorretto dalle sue\nali. Così riesce anche a camminare\fsull’acqua. È solito passeggiare sui\nlaghi in silenziose notti di luna piena."
          sapphire: "CLEFABLE si muove saltellando leggero\ncome se fluttuasse sorretto dalle sue\nali. Così riesce anche a camminare\fsull’acqua. È solito passeggiare sui\nlaghi in silenziose notti di luna piena."
        de:
          ruby: "PIXI bewegt sich fort, indem es leicht\nmit den Flügeln schlägt. Durch seinen\nfedernden Gang kann es sogar über\fWasser gehen. Bei Mondschein \nunternimmt es Spaziergänge auf Seen."
          sapphire: "PIXI bewegt sich fort, indem es leicht\nmit den Flügeln schlägt. Durch seinen\nfedernden Gang kann es sogar über\fWasser gehen. Bei Mondschein \nunternimmt es Spaziergänge auf Seen."
        es:
          ruby: "CLEFABLE se mueve dando saltitos como\nsi fuera haciendo uso de las alas. Estos\npequeños brincos le permiten caminar\fpor el agua. De todos es sabido que le\nencanta darse paseos por los lagos\nen tranquilas noches de luna llena."
          sapphire: "CLEFABLE se mueve dando saltitos como\nsi fuera haciendo uso de las alas. Estos\npequeños brincos le permiten caminar\fpor el agua. De todos es sabido que le\nencanta darse paseos por los lagos\nen tranquilas noches de luna llena."
