        jp_kana:
          ruby: "おおきな　まるい　ひとみの　ひょうめんには\nなみだの　うすい　まくが　いつも　はっている。\nほこりが　ついても　すぐに　あらい　ながされる。"
          sapphire: "だんりょくせいに　すぐれた　からだは　おおきく\nいきを　すいこむと　どこまでも　ふくれていく。\nふくらんだ　プクリンは　ふんわり　はねるよ。"
        en:
          ruby: "WIGGLYTUFF has large, saucerlike eyes.\nThe surfaces of its eyes are always\ncovered with a thin layer of tears.\fIf any dust gets in this POKéMON’s\neyes, it is quickly washed away."
          sapphire: "WIGGLYTUFF’s body is very flexible.\nBy inhaling deeply, this POKéMON can\ninflate itself seemingly without end.\fOnce inflated, WIGGLYTUFF bounces\nalong lightly like a balloon."
        fr:
          ruby: "GRODOUDOU a des yeux immenses et\nécarquillés. La surface de ses yeux est\ncouverte d’une fine couche de larmes.\fSi de la poussière est projetée dans les\nyeux de ce POKéMON, elle est\nrapidement nettoyée."
          sapphire: "Le corps de GRODOUDOU est très\nélastique. S’il inspire profondément, ce\nPOKéMON peut se gonfler à volonté.\fUne fois gonflé, GRODOUDOU peut\nrebondir comme un ballon."
        it:
          ruby: "WIGGLYTUFF è dotato di occhi grandi\ncome dischi, resi lucidi da un sottile \nstrato lacrimale in superficie.\fSe gli va della polvere negli occhi,\nquesta è lavata via subito."
          sapphire: "WIGGLYTUFF è molto elastico. Se respira\nprofondamente, questo POKéMON riesce\na gonfiarsi praticamente all’infinito.\fUna volta gonfio, WIGGLYTUFF\nrimbalza leggero come un pallone."
        de:
          ruby: "KNUDDELUFF hat handtellergroße Augen,\ndie immer mit Tränenflüssigkeit bedeckt\nsind. Gerät Staub in die Augen dieses\fPOKéMON, so wird dieser sofort ausge-\nspült."
          sapphire: "KNUDDELUFFs Körper ist sehr dehnbar.\nIndem es tief einatmet, kann sich\ndieses POKéMON selbst aufblasen.\fWenn es aufgepumpt ist, hüpft es\nwie ein Luftballon umher."
        es:
          ruby: "WIGGLYTUFF tiene unos ojos enormes\ncon forma de platillo, que siempre están\ncubiertos de lágrimas.\fSi se le metiera algo en el ojo, enseguida\nse le saldría solo."
          sapphire: "El cuerpo de WIGGLYTUFF es muy\nflexible. Dicen que, al aspirar aire,\npuede hincharse sin límites.\fY, una vez hinchado, se pone a botar\ncomo si fuera un globo."
zubat:
  species_id: 41
  names:
    jp_kana: ズバット
    en: ZUBAT
    fr: NOSFERAPTI
    it: ZUBAT
    de: ZUBAT
    es: ZUBAT
  forms:
    zubat:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 30
        special_defense: 40
