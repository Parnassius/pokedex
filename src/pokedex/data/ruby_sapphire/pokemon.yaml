          sapphire: "KINGLER è dotato di un’enorme chela,\nche brandisce nell’aria per comunicare\ncon i suoi simili.\fTuttavia, dato il notevole peso della\nchela sovradimensionata, il POKéMON\nsi stanca in fretta."
        de:
          ruby: "KINGLER hat eine riesige Schere. Es\nwinkt damit, um mit anderen zu \nkommunizieren.\fDa seine Schere aber so schwer ist, wird\ndieses POKéMON schnell müde."
          sapphire: "KINGLER hat eine riesige Schere. Es\nwinkt damit, um mit anderen zu \nkommunizieren.\fDa seine Schere aber so schwer ist, wird\ndieses POKéMON schnell müde."
