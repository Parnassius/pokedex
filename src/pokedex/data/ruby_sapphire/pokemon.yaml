          sapphire: "ながれぼしの　おおい　よるは　わ　に　なって\nおどる　ピィの　すがたを　みることが　できる。\nひのでまで　おどり　よつゆで　のどを　うるおす。"
        en:
          ruby: "On nights with many shooting stars,\nCLEFFA can be seen dancing in a ring.\nThey dance through the night and stop\fonly at the break of day, when these\nPOKéMON quench their thirst with the\nmorning dew."
          sapphire: "On nights with many shooting stars,\nCLEFFA can be seen dancing in a ring.\nThey dance through the night and stop\fonly at the break of day, when these\nPOKéMON quench their thirst with the\nmorning dew."
        fr:
          ruby: "Les nuits où il y a des étoiles filantes,\non peut voir des MELO danser en cercle.\nIls dansent toute la nuit et ne\fs’arrêtent qu’à l’aube. Ces POKéMON se\ndésaltèrent alors avec la\nrosée du matin."
          sapphire: "Les nuits où il y a des étoiles filantes,\non peut voir des MELO danser en cercle.\nIls dansent toute la nuit et ne\fs’arrêtent qu’à l’aube. Ces POKéMON se\ndésaltèrent alors avec la\nrosée du matin."
        it:
          ruby: "In notti con molte stelle cadenti,\nè facile vedere molti CLEFFA danzare\nin cerchio. Ballano per tutta la notte\ffermandosi soltanto alle prime luci\ndell’alba per dissetarsi bevendo le\ngocce di rugiada."
          sapphire: "In notti con molte stelle cadenti,\nè facile vedere molti CLEFFA danzare\nin cerchio. Ballano per tutta la notte\ffermandosi soltanto alle prime luci\ndell’alba per dissetarsi bevendo le\ngocce di rugiada."
        de:
          ruby: "In Nächten mit vielen Sternschnuppen,\nkann man PII im Kreis tanzen sehen. Es\ntanzt die ganze Nacht hindurch und\fhört erst bei Sonnenaufgang auf, um\nseinen Durst mit Morgentau zu stillen."
          sapphire: "In Nächten mit vielen Sternschnuppen\nkann man PII im Kreis tanzen sehen. Es\ntanzt die ganze Nacht hindurch und\fhört erst bei Sonnenaufgang auf, um\nseinen Durst mit Morgentau zu stillen."
        es:
          ruby: "Cuando hay lluvia de estrellas, a los\nCLEFFA se les puede ver danzando\nen círculos durante toda la noche.\fSólo paran cuando rompe el día;\nentonces, dejan de bailar y calman su\nsed con el rocío de la mañana."
          sapphire: "Cuando hay lluvia de estrellas, a los\nCLEFFA se les puede ver danzando\nen círculos durante toda la noche.\fSólo paran cuando rompe el día;\nentonces, dejan de bailar y calman su\nsed con el rocío de la mañana."
