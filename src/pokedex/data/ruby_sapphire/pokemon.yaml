        - shell_armor
      descriptions:
        jp_kana:
          ruby: "すぐに　たたかいを　いどむ　きしょうの　あらさ。\nシザリガーの　すむ　いけには　ほかの　いきものが\nすみつかず　さみしい　ばしょに　なってしまう。"
          sapphire: "だっぴした　ちょくごは　こうらが　やわらかい。\nこうらが　かたくなるまで　てきの　こうげきを\nさけるため　かわぞこの　あなに　かくれている。"
        en:
          ruby: "CRAWDAUNT has an extremely violent\nnature that compels it to challenge\nother living things to battle.\fOther life-forms refuse to live in\nponds inhabited by this POKéMON,\nmaking them desolate places."
          sapphire: "CRAWDAUNT molts (sheds) its shell\nregularly. Immediately after molting,\nits shell is soft and tender.\fUntil the shell hardens, this POKéMON\nhides in its streambed burrow to avoid\nattack from its foes."
        fr:
          ruby: "COLHOMARD a un tempérament très\nviolent, ce qui le pousse à défier\ntout ce qui passe près de lui.\fCertaines formes de vie refusent\nd’habiter dans les étangs occupés par\nce POKéMON et désertent ces eaux."
          sapphire: "COLHOMARD mue et perd sa carapace\nrégulièrement. Immédiatement après sa\nmue, sa nouvelle carapace est tendre\fet molle. Il s’enterre au fond des cours\nd’eau pour ne pas être attaqué avant\nque sa carapace ne soit assez dure."
        it:
          ruby: "CRAWDAUNT, dalla natura estremamente\nviolenta, sfida sempre in lotta gli altri\nesseri viventi, che per questo motivo\fabbandonano i laghi abitati da\nquesto POKéMON, lasciandoli\ndeserti e desolati."
          sapphire: "CRAWDAUNT muta regolarmente la\ncorazza. Subito dopo la muta, la\nnuova corazza è tenera e delicata.\fFinché non si è indurita totalmente,\nil POKéMON vive nascosto nella sua\ntana sott’acqua per evitare attacchi."
        de:
          ruby: "KREBUTACK ist von Natur aus sehr\ngewalttätig, so dass es dauernd andere\nLebewesen zum Kampf herausfordern\fmuss. Andere Lebensformen lehnen es ab,\nmit diesem POKéMON in ein und demselben\nTeich zu leben."
          sapphire: "KREBUTACK legt seine Schale regelmäßig\nab. Direkt danach ist seine Schale weich\nund empfindlich. Bis sie gehärtet\fist, sucht es sich ein Versteck in einem\nFlussbett, damit es nicht von Gegnern\nangegriffen wird."
        es:
          ruby: "CRAWDAUNT es de una naturaleza\nextremadamente violenta que le lleva\na desafiar a otros seres vivos.\fHay formas de vida que se niegan a vivir\nen los estanques donde habitan estos\nPOKéMON, y los dejan medio vacíos."
          sapphire: "CRAWDAUNT muda el caparazón\nregularmente y, en cuanto lo hace,\nse le queda la piel tersa y suave.\fMientras el nuevo caparazón se\nendurece, permanece escondido en\nsu madriguera para que no le ataquen."
baltoy:
  species_id: 343
  names:
    jp_kana: ヤジロン
    en: BALTOY
    fr: BALBUTO
    it: BALTOY
    de: PUPPANCE
    es: BALTOY
  forms:
