      descriptions:
        jp_kana:
          ruby: "４つの　のうみそは　スーパーコンピュータよりも\nはやく　むずかしい　けいさんの　こたえを　だす。\n４ほんあしを　おりたたみ　くうちゅうに　うかぶ。"
          sapphire: "２ひきの　メタングが　がったいした　すがた。\nきょたいで　えものを　おさえつけながら\nおなかに　ある　おおきな　くちで　たべるのだ。"
        en:
          ruby: "METAGROSS has four brains in total.\nCombined, the four brains can breeze\nthrough difficult calculations faster\fthan a supercomputer.\nThis POKéMON can float in the air by\ntucking in its four legs."
          sapphire: "METAGROSS is the result of two METANG\nachieving fusion. When hunting, this\nPOKéMON pins the prey to the ground\funder its massive body. It then eats\nthe helpless victim using the large \nmouth on its stomach."
        fr:
          ruby: "METALOSSE dispose de quatre\ncerveaux. Combinés, ces cerveaux\npeuvent effectuer des calculs très\fcomplexes plus vite qu’un ordinateur.\nCe POKéMON peut flotter dans l’air\nen repliant ses jambes."
          sapphire: "METALOSSE est le résultat de la fusion\nde deux METANG. Lorsqu’il chasse,\nce POKéMON bloque sa proie au sol,\fsous son corps massif. Il mange ensuite\nla victime impuissante avec son énorme\nbouche, ouverte sur son estomac."
        it:
          ruby: "METAGROSS è dotato in tutto di\nquattro cervelli, che combinati assieme\nriescono a risolvere difficili calcoli\fpiù rapidamente di un supercomputer.\nRiesce a fluttuare nell’aria facendo\nrientrare le quattro zampe."
          sapphire: "METAGROSS è il risultato della fusione\ndi due METANG. In caccia questo\nPOKéMON blocca la preda al suolo\fcon il proprio corpo massiccio.\nPoi divora la vittima indifesa con\nla grande bocca dello stomaco."
        de:
          ruby: "METAGROSS hat insgesamt vier Gehirne.\nDiese können schwierige Berechnungen\nschneller lösen als ein Supercomputer.\fDieses POKéMON kann durch die Lüfte\nschweben, indem es seine vier Beine\neinklappt."
          sapphire: "METAGROSS ist aus der Verschmelzung\nzweier METANG hervorgegangen. Auf der\nJagd drückt es seine Beute mit seinem\fmassigen Körper zu Boden. Dann frisst\nes sein hilfloses Opfer auf."
        es:
          ruby: "METAGROSS tiene cuatro cerebros\nen total que, combinados, son capaces\nde resolver cálculos complicados más\frápido que el mejor ordenador que haya.\nMETAGROSS puede flotar en el aire\nsi mete las patas hacia adentro."
          sapphire: "METAGROSS es el resultado de la fusión\nde dos METANG. Cuando caza,\nacorrala a su presa, sujetándola contra\fel suelo con el cuerpo.\nDespués, devora a la víctima indefensa\ncon la gran boca del estómago."
