        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      descriptions:
        jp_kana:
          ruby: "レーザーを　あびた　うちゅうウィルスの　ＤＮＡが\nとつぜんへんいを　おこして　うまれた　ポケモン。\nむねの　すいしょうたいが　のうみそ　らしい。"
          sapphire: "うちゅうウィルスから　たんじょうした　ポケモン。\nちのうが　たかく　ちょうのうりょくを　あやつる。\nむねの　すいしょうたいから　レーザーを　だす。"
        en:
          ruby: "The DNA of a space virus underwent a\nsudden mutation upon exposure to a\nlaser beam and resulted in DEOXYS.\fThe crystalline organ on this POKéMON’s\nchest appears to be its brain."
          sapphire: "DEOXYS emerged from a virus that came\nfrom space. It is highly intelligent and\nwields psychokinetic powers.\fThis POKéMON shoots lasers from the\ncrystalline organ on its chest."
        fr:
          ruby: "L’ADN d’un virus extraterrestre entama\nune mutation non attendue suite à une\nexposition à un rayon laser, ce qui\fcréa DEOXYS. L’organe cristallin\nse trouvant sur la poitrine de ce\nPOKéMON semble être son cerveau."
          sapphire: "DEOXYS était à l’origine un virus\nprovenant de l’espace. Il est\nextrêmement intelligent et dispose de\fpouvoirs télékinésiques. Ce POKéMON\nenvoie des lasers avec l’organe\ncristallin situé sur sa poitrine."
        it:
          ruby: "Il DNA di un virus spaziale ha subito\nun’improvvisa mutazione, in seguito\nall’esposizione ad un raggio laser.\fQuesto ha dato vita a DEOXYS.\nPare che l’organo cristallino sul\nsuo petto costituisca il cervello."
          sapphire: "DEOXYS è nato da un virus proveniente\ndallo spazio. È dotato di estrema\nintelligenza e di poteri psicocinetici.\fSpara raggi laser dall’organo cristallino\ndel proprio corpo."
        de:
          ruby: "Die DNS eines Weltraumvirus hat eine\nspontane Mutation erfahren, da sie\neinem Laserstrahl ausgesetzt wurde.\fDaraus entstand DEOXYS. \nDas kristallartige Organ auf der Brust\ndieses POKéMON ist sein Gehirn."
          sapphire: "DEOXYS ging aus einem Virus aus dem\nWeltraum hervor. Es ist sehr intelligent\nund nutzt psychokinetische Energie.\fDieses POKéMON verschießt\nLaserstrahlen aus einem kristallartigen\nOrgan auf seinem Brustkorb."
        es:
          ruby: "Tras estar expuesto a un rayo láser,\nel ADN de un virus espacial sufrió\nuna mutación y dio origen a DEOXYS.\fSegún parece, el órgano cristalino\nque este POKéMON tiene en el torso\nes el cerebro."
          sapphire: "DEOXYS surgió a partir de un virus\nespacial. Tiene un alto nivel intelectual\ny poderes psicoquinéticos.\fEste POKéMON dispara rayos láser por el\nórgano cristalino que tiene en el torso."
