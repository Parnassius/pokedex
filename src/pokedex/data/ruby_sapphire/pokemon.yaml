          sapphire: "HITMONTOP fa roteare la testa ad\nalta velocità sferrando calci violenti.\nQuesta tecnica è molto efficace sia\fin attacco che in difesa. Il POKéMON\nsi muove molto più velocemente \nroteando che non camminando."
        de:
          ruby: "KAPOERA dreht sich auf dem Kopf\nstehend um die eigene Achse und teilt\nTritte aus. Seine Technik ist eine\fbemerkenswerte Mischung aus Angriff \nund Verteidigung. Es bewegt sich \ndrehend schneller voran als laufend."
          sapphire: "KAPOERA dreht sich auf dem Kopf\nstehend um die eigene Achse und teilt\nTritte aus. Seine Technik ist eine\fbemerkenswerte Mischung aus Angriff \nund Verteidigung. Es bewegt sich\ndrehend schneller voran als laufend."
        es:
          ruby: "HITMONTOP hace el pino con la cabeza\ny se pone a girar rápido al tiempo que\nreparte patadas. Ésta es una técnica\fofensiva y defensiva a la vez.\nEste POKéMON se desplaza más rápido\ngirando sobre sí que caminando."
          sapphire: "HITMONTOP hace el pino con la cabeza\ny se pone a girar rápido al tiempo que\nreparte patadas. Ésta es una técnica\fofensiva y defensiva a la vez.\nEste POKéMON se desplaza más rápido\ngirando sobre sí que caminando."
