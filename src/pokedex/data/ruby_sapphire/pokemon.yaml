        fr:
          ruby: "La fourrure soyeuse de PYROLI a une\nfonction anatomique. Elle rejette la\nchaleur dans l’air pour que son corps\fne surchauffe pas. La température du\ncorps de ce POKéMON peut\natteindre 900 degrés."
          sapphire: "La fourrure soyeuse de PYROLI a une\nfonction anatomique. Elle rejette la\nchaleur dans l’air pour que son corps\fne surchauffe pas. La température du\ncorps de ce POKéMON peut\natteindre 900 degrés."
        it:
          ruby: "La morbida pelliccia di FLAREON ha\nuno scopo ben preciso: libera calore\nnell’aria in modo da abbassare\fla temperatura corporea, che nel caso\ndi questo POKéMON può raggiungere\nal massimo 900ºC."
          sapphire: "La morbida pelliccia di FLAREON ha\nuno scopo ben preciso: libera calore\nnell’aria in modo da abbassare\fla temperatura corporea, che nel caso\ndi questo POKéMON può raggiungere\nal massimo 900ºC."
        de:
          ruby: "FLAMARAs flauschiges Fell dient einem\nbesonderen Zweck. Es gibt Hitze an die\nLuft ab, damit sein Körper nicht\fzu heiß wird. Die Körpertemperatur \ndieses POKéMON kann bis auf 900 Grad\nansteigen."
          sapphire: "FLAMARAs flauschiges Fell dient einem\nbesonderen Zweck. Es gibt Hitze an die\nLuft ab, damit sein Körper nicht\fzu heiß wird. Die Körpertemperatur \ndieses POKéMON kann bis auf 900 Grad\nansteigen."
        es:
          ruby: "La suavidad del pelaje de FLAREON\ntiene una función clara: libera calor\npara que el POKéMON no se asfixie.\fLa temperatura corporal de este\nPOKéMON puede alcanzar\nlos 900 grados centígrados."
          sapphire: "La suavidad del pelaje de FLAREON\ntiene una función clara: libera calor\npara que el POKéMON no se asfixie.\fLa temperatura corporal de este\nPOKéMON puede alcanzar\nlos 900 grados centígrados."
