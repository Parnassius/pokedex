      descriptions:
        jp_kana:
          ruby: "からだの　ほとんどが　いぶくろで　できているので\nじぶんと　おなじ　おおきさの　ものも　のみこむ。\nとくしゅな　いえきで　なんでも　しょうかするぞ。"
          sapphire: "からだの　だいぶぶんが　いぶくろで　できていて\nしんぞうや　のうみそは　とても　ちいさい。\nなんでも　とかす　とくしゅな　いえきを　もつ。"
        en:
          ruby: "Virtually all of GULPIN’s body is its\nstomach. As a result, it can swallow\nsomething its own size.\fThis POKéMON’s stomach contains a\nspecial fluid that digests anything."
          sapphire: "Most of GULPIN’s body is made up of its\nstomach - its heart and brain are very\nsmall in comparison.\fThis POKéMON’s stomach contains\nspecial enzymes that dissolve anything."
        fr:
          ruby: "Virtuellement, le corps de GLOUPTI\nn’est qu’un estomac. Il est capable\nd’avaler des objets aussi gros que lui.\fL’estomac de ce POKéMON contient un\nfluide spécial qui lui permet de digérer\nn’importe quoi."
          sapphire: "Le corps de GLOUPTI n’est\npratiquement qu’un gros estomac. En\ncomparaison, son cœur et son cerveau\fsont tout petits. L’estomac de ce\nPOKéMON contient des enzymes\nspéciales capables de tout dissoudre."
        it:
          ruby: "Praticamente l’intero corpo di GULPIN\nè costituito dallo stomaco, che gli\nconsente di ingoiare oggetti delle sue\fstesse dimensioni. Inoltre, il suo \nstomaco contiene un fluido speciale \nin grado di fargli digerire ogni cosa."
          sapphire: "La maggior parte del corpo di GULPIN\nè formato dallo stomaco di dimensioni\nenormi rispetto al cuore e al cervello.\fLo stomaco di questo POKéMON\ncontiene enzimi speciali che\nsciolgono qualsiasi cosa."
        de:
          ruby: "Eigentlich besteht SCHLUPPUCKs Körper\nnur aus einem Magen. Daher kann es\netwas verschlingen, das beinahe seine\fGröße hat. Sein Magen enthält eine\nspezielle Flüssigkeit, die wirklich alles\nverdauen kann."
          sapphire: "SCHLUPPUCKs Körper besteht zum\ngrößten Teil aus seinem Magen. Sein Herz\nund sein Gehirn sind im Vergleich dazu\fsehr klein. Der Magen dieses POKéMON\nenthält Enzyme, die alles zersetzen\nkönnen."
        es:
          ruby: "Casi la totalidad del cuerpo de GULPIN\nestá compuesto por el estómago. Por eso\npuede tragarse todo lo que tenga su\ftamaño.\nEn el interior del estómago,\ntiene un fluido capaz de corroerlo todo."
          sapphire: "La mayor parte del cuerpo de GULPIN\nestá ocupado por su estómago.\nEn comparación, el corazón y el cerebro\fson muy pequeños. Este POKéMON\ntiene enzimas especiales en el estómago\ncapaces de corroerlo todo."
swalot:
  species_id: 317
  names:
    jp_kana: マルノーム
