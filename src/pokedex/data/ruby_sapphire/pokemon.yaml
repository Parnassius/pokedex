          sapphire: "いきものの　すまない　かいていで　ねむっている。\nたいふうが　やってくると　めを　さまして\nえものを　さがしに　うろつきまわると　いわれる。"
        en:
          ruby: "KINGDRA lives at extreme ocean depths\nthat are otherwise uninhabited.\nIt has long been believed that the\fyawning of this POKéMON creates\nspiraling ocean currents."
          sapphire: "KINGDRA sleeps on the seafloor where\nit is otherwise devoid of life.\nWhen a storm arrives, the POKéMON is\fsaid to awaken and wander about in\nsearch of prey."
        fr:
          ruby: "HYPOROI vit au fin fond des\nprofondeurs océaniques généralement\ninhabitées. On a longtemps cru que le\fbâillement de ce POKéMON créait les\ntourbillons dans les océans."
          sapphire: "HYPOROI dort au fond de l’océan, où\naucune autre forme de vie ne réside.\nOn raconte que lorsqu’une tempête\fsurvient, c’est que ce POKéMON\ns’éveille et erre dans les profondeurs\nen quête de proies."
        it:
          ruby: "KINGDRA vive negli abissi oceanici\ndi solito privi di ogni forma di vita.\fSi crede che uno sbadiglio di KINGDRA\ngeneri correnti oceaniche spiraliformi."
          sapphire: "KINGDRA dorme sui fondali marini dove\ndi solito non esistono forme di vita.\fSi dice che in caso di tempesta KINGDRA\nsi svegli e vada in cerca di prede."
        de:
          ruby: "SEEDRAKING lebt in den Tiefen des\nOzeans, die ansonsten verwaist sind.\nLange hat man geglaubt, dass das\fGähnen dieses POKéMON Strudel auslöst."
          sapphire: "SEEDRAKING schläft auf dem Meeres-\nboden, wo ansonsten niemand lebt. Wenn\nein Sturm aufkommt, wacht es auf und\fmacht sich auf die Suche nach Beute."
        es:
          ruby: "KINGDRA vive en lo más profundo del\nocéano, donde no habita ninguna otra\nespecie.\fSiempre se ha pensado que su bostezo\ncausaba las corrientes en remolino\nque se dan en el océano."
          sapphire: "KINGDRA duerme en el suelo marino\ndonde, en realidad, no tiene mucha vida.\nCuando estalla una tormenta,\fdicen que se despierta y se pone\na vagar en busca de su presa."
