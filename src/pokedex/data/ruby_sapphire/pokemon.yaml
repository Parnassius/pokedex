      descriptions:
        jp_kana:
          ruby: "つばさが　ほしいと　つよく　おもい　つづけてきた\nけっか　からだの　さいぼうが　とつぜんへんいを\nおこし　みごとな　つばさが　はえてきたと　いう。"
          sapphire: "ゆめにまで　みた　つばさが　やっと　はえてきた。\nうれしい　きもちを　あらわすため　おおぞらを\nとびまわり　ほのおを　はいて　よろこんでいる。"
        en:
          ruby: "SALAMENCE came about as a result of a\nstrong, long-held dream of growing\nwings. It is said that this powerful\fdesire triggered a sudden mutation in\nthis POKéMON’s cells, causing it to\nsprout its magnificent wings."
          sapphire: "By evolving into SALAMENCE, this\nPOKéMON finally realizes its long-held\ndream of growing wings.\fTo express its joy, it flies and wheels\nall over the sky while spouting flames\nfrom its mouth."
        fr:
          ruby: "DRATTAK a ce physique grâce à son\ndésir de pouvoir s’envoler. On\ndit que cette puissante envie a\fdéclenché une soudaine mutation\nmoléculaire de ce POKéMON, faisant\nsurgir de splendides ailes."
          sapphire: "En évoluant en DRATTAK, ce POKéMON\nréalise un rêve d’enfance, celui d’avoir\ndes ailes.\fPour exprimer sa joie, il vole et plane\ndans les cieux en crachant des flammes."
        it:
          ruby: "SALAMENCE rappresenta la realizzazione\ndel sogno atavico e irrinunciabile delle\nali. Si dice che questo forte desiderio\fabbia scatenato l’improvvisa mutazione\ndelle sue cellule, portando infine\nalla crescita di ali meravigliose."
          sapphire: "Evolvendosi in SALAMENCE, questo\nPOKéMON realizza finalmente il suo\nantico sogno di avere le ali.\fPer esprimere la sua gioia, volteggia\ne turbina nel cielo sputando fiamme\ndalla bocca."
        de:
          ruby: "BRUTALANDA träumte sehr lange davon,\ndass ihm Flügel wachsen mögen. Dieser\nsehnliche Wunsch hat wohl eine\fplötzliche Mutation in den Zellen dieses\nPOKéMON hervorgerufen, so dass ihm\nplötzlich prächtige Flügel wuchsen."
          sapphire: "Indem es sich in BRUTALANDA verwandelt,\nsetzt dieses POKéMON seinen lang\ngehegten Traum von Flügeln um.\fUm seine Freude zu zeigen, fliegt es\ndurch die Luft und dreht sich. Dabei\nverspuckt es Flammen aus seinem Mund."
        es:
          ruby: "SALAMENCE surgió del profundo deseo\nde tener alas.\nDicen que este fuerte deseo fue lo que\fcausó la repentina mutación de las\ncélulas y el crecimiento de las alas."
          sapphire: "Al evolucionar SHELGON y convertirse\npor fin en SALAMENCE, ve cumplido\nel sueño de su vida de tener alas.\fPara expresar su alegría, SALAMENCE\nvuela y revolotea por el cielo al tiempo\nque lanza llamas por la boca."
