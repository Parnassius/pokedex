          ruby: "まっかな　ひとみは　あやしい　ひかりを　はなち\nあいての　こころを　じざいに　あやつる。\n１０００ねんかん　いきると　いわれている。"
          sapphire: "９にんの　せいなる　ちからを　もった　せんにんが\nがったいして　うまれたという　でんせつが　ある。\nちのうが　たかく　ひとの　ことばを　りかいする。"
        en:
          ruby: "NINETALES casts a sinister light from\nits bright red eyes to gain total\ncontrol over its foe’s mind.\fThis POKéMON is said to live for a\nthousand years."
          sapphire: "Legend has it that NINETALES came into\nbeing when nine wizards possessing\nsacred powers merged into one.\fThis POKéMON is highly intelligent - it\ncan understand human speech."
        fr:
          ruby: "FEUNARD peut envoyer un inquiétant\nrayon avec ses yeux rouge vif pour\nprendre le contrôle de l’esprit de son\fennemi. On raconte que ce POKéMON\npeut vivre mille ans."
          sapphire: "La légende raconte que FEUNARD est\napparu lorsque neuf sorciers aux\npouvoirs sacrés décidèrent de\ffusionner. Ce POKéMON est très\nintelligent. Il comprend la langue\ndes hommes."
        it:
          ruby: "NINETALES emana sinistri bagliori\ndai luminosi occhi rossi per acquisire\nil controllo totale della mente del suo\fnemico. Si dice che possa vivere\nanche per mille anni."
          sapphire: "Narra la leggenda che NINETALES sia\nnato dalla fusione di nove maghi \ndai sacri poteri in un’unica creatura.\fQuesto POKéMON estremamente\nintelligente riesce a capire\nil linguaggio umano."
        de:
          ruby: "VULNONA sendet einen unheimlichen\nLichtstrahl aus seinen hellroten Augen\naus, um totale Kontrolle über die\fGedanken seines Gegners zu erlangen.\nMan sagt, dieses POKéMON könne 1000\nJahre leben."
          sapphire: "Eine Legende besagt, dass VULNONA\nzu existieren begann, als neun\nZauberer mit heiligen Kräften zu einem\fverschmolzen. Dieses POKéMON ist\nhochintelligent und versteht die\nmenschliche Sprache."
        es:
          ruby: "NINETALES emite una siniestra luz a\ntravés de los brillantes ojos rojos que\ntiene, para conseguir controlar del todo\fla mente de su rival.\nDicen que este POKéMON llega a vivir\nmiles de años."
          sapphire: "Cuenta la leyenda que NINETALES nació\nde la fusión de nueve hechiceros que\ntenían poderes sagrados.\fEste POKéMON es realmente inteligente.\nEntiende el lenguaje humano."
