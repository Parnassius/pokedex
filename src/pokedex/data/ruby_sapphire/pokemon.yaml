          sapphire: "ちのうが　たかく　ひとの　ことばを　りかいする。\nガラスの　ような　うもうで　からだを　つつみこみ\nひかりを　くっせつさせて　すがたを　かえる。"
        en:
          ruby: "LATIAS is highly sensitive to the\nemotions of people. If it senses any\nhostility, this POKéMON ruffles the\ffeathers all over its body and cries\nshrilly to intimidate the foe."
          sapphire: "LATIAS is highly intelligent and capable\nof understanding human speech.\nIt is covered with a glass-like down.\fThe POKéMON enfolds its body with its\ndown and refracts light to alter its\nappearance."
        fr:
          ruby: "LATIAS est extrêmement sensible\naux émotions des gens. S’il ressent une\nhostilité, ce POKéMON ébouriffe ses\fplumes et pousse un cri strident pour\nintimider son ennemi."
          sapphire: "LATIAS est très intelligent et\ncomprend le langage des hommes. Il est\nrecouvert d’une espèce de duvet\fressemblant à du verre. Ce POKéMON\ns’enveloppe dans ce duvet et reflète la\nlumière pour changer son apparence."
        it:
          ruby: "LATIAS è sensibilissimo alle emozioni\ndelle persone. Se percepisce una certa\nostilità, questo POKéMON arruffa le\fpiume su tutto il corpo ed emette\nun grido lancinante per intimidire\nil nemico."
          sapphire: "Estremamente intelligente, LATIAS\nè in grado di capire il linguaggio umano.\nIl suo corpo e ricoperto di piumino\fvetroso che usa per rifrangere\nla luce e mutare il proprio aspetto."
        de:
          ruby: "LATIAS ist in höchstem Maße empfindlich\ngegenüber den Emotionen der Menschen.\nWenn es den Anflug von Feindseligkeit\fwahrnimmt, werden seine Federn\nzerzaust und es stößt schrille Schreie\naus, um seinen Gegner einzuschüchtern."
          sapphire: "LATIAS ist sehr intelligent und kann die\nmenschliche Sprache verstehen. Es ist\nmit gläsernen Daunen bedeckt.\fDieses POKéMON umhüllt seinen Körper\nmit den Daunen und kann Licht brechen,\num seine Gestalt zu verändern."
        es:
          ruby: "LATIAS es muy sensible a los\nsentimientos de la gente. Si detecta\nalgún ápice de hostilidad, desplegará\flas plumas que tiene por todo el cuerpo\ny se pondrá a chillar para intimidar\nal enemigo."
          sapphire: "LATIAS tiene un nivel de inteligencia\ntan alto que es capaz de entender\nel lenguaje humano.\fEste POKéMON usa el plumón cristalizado\ndel que está cubierto como peto para\ndesprender luz y cambiar de aspecto."
