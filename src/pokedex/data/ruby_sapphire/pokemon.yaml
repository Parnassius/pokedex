        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          ruby: "おおぞらを　とぶことを　ゆめみて　くりかえし\nだんがいから　とびおりている　うちに　あたまが\nきたえられ　こうてつの　ように　かたく　なった。"
          sapphire: "おおぞらを　とぶことを　ゆめみている　ポケモン。\nとべない　くやしさを　はらす　ように　おおいわに\nいしあたまを　うちつけては　コナゴナに　くだく。"
        en:
          ruby: "BAGON has a dream of one day soaring\nin the sky. In doomed efforts to fly,\nthis POKéMON hurls itself off cliffs.\fAs a result of its dives, its head has \ngrown tough and as hard as tempered\nsteel."
          sapphire: "BAGON harbors a never-ending dream of\none day soaring high among the clouds.\nAs if trying to dispel its frustration\fover its inability to fly, this POKéMON\nslams its hard head against huge rocks\nand shatters them into pebbles."
        fr:
          ruby: "DRABY rêve de pouvoir un jour\ns’élancer dans les cieux. Bien que voué\nà l’échec, ce POKéMON se jette des\ffalaises pour essayer de voler. A force,\nsa tête est devenue aussi dure\nque de l’acier."
          sapphire: "DRABY rêve depuis toujours de\nvoler au milieu des nuages. Ce POKéMON\néclate d’énormes rochers avec sa tête,\fcomme pour exorciser le fait qu’il ne\npuisse pas voler."
        it:
          ruby: "BAGON serba in sé il sogno di volare\nalto in cielo. Nei suoi vani tentativi di\nspiccare il volo, si lancia a picco dalle\falture. A causa di queste rovinose\ncadute, la testa gli è diventata dura\ncome l’acciaio temprato."
          sapphire: "Da sempre BAGON serba in sé\nil sogno di volare alto tra le nuvole.\nSfoga la sua frustrazione per\fl’incapacità di volare sbattendo la \ntesta dura contro rocce enormi,\nche frantuma in mille pezzi."
        de:
          ruby: "KINDWURM hat den Traum, fliegen zu\nkönnen. In zahlreichen vergeblichen\nVersuchen stürzte es sich die Klippen\fherunter. Daher ist sein Kopf sehr\nrobust und so hart wie Stahl geworden."
          sapphire: "KINDWURM hegt einen unerfüllten Traum.\nEs möchte einmal hoch über den Wolken\nfliegen. Um seinen Frust über seine\fFlugunfähigkeit zu vertreiben, rammt\nes seinen harten Kopf gegen riesige\nFelsen und macht Kiesel aus ihnen."
        es:
          ruby: "BAGON sueña con poder pasar un día\nvolando por el cielo. En vanos intentos\npor volar, ha llegado a tirarse desde\friscos. Como resultado de estas caídas\nen picado, se le ha puesto la cabeza\ndura como las piedras."
          sapphire: "BAGON sueña siempre con lo mismo: pasar\ntodo un día volando entre las nubes.\nFrustrado ante la imposibilidad de volar,\fparece que se desahoga dándose\ncabezazos contra rocas enormes\nhasta hacerlas añicos."
shelgon:
  species_id: 372
  names:
    jp_kana: コモルー
    en: SHELGON
    fr: DRACKHAUS
    it: SHELGON
    de: DRASCHEL
    es: SHELGON
  forms:
    shelgon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 100
        special_attack: 60
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          ruby: "かたい　カラの　ないぶは　さいぼうが　へんかして\nあたらしい　からだを　つくっている　さいちゅう。\nカラが　とても　おもいので　うごきは　にぶいぞ。"
          sapphire: "からだを　おおっているのは　ホネのような　もの。\nとても　かたく　てきの　こうげきを　はねかえす。\nほらあなで　みを　ひそめ　しんかを　まっている。"
        en:
          ruby: "Inside SHELGON’s armor-like shell, cells\nare in the midst of transformation\nto create an entirely new body.\fThis POKéMON’s shell is extremely heavy,\nmaking its movements sluggish."
          sapphire: "Covering SHELGON’s body are outgrowths\nmuch like bones. The shell is very hard\nand bounces off enemy attacks.\fWhen awaiting evolution, this POKéMON\nhides away in a cavern."
        fr:
          ruby: "A l’intérieur de la carapace blindée de\nDRACKHAUS, ses cellules sont en pleine\ntransformation pour créer un nouveau\fcorps. La carapace de ce POKéMON est\ntrès lourde, ce qui rend ses mouvements\ntrès lents."
          sapphire: "Des excroissances osseuses recouvrent\nle corps de DRACKHAUS. Cette carapace\nest extrêmement dure et le protège des\fattaques ennemies. En attendant son\névolution, ce POKéMON reste caché dans\nune caverne."
        it:
          ruby: "All’interno della conchiglia-armatura\ndi SHELGON, le cellule sono in continua\ntrasformazione per creare un corpo\fcompletamente nuovo. La conchiglia\npesantissima rende difficili i \nmovimenti."
          sapphire: "Il corpo di SHELGON è ricoperto\nda escrescenze simili ad ossa.\nLa conchiglia è così dura da\fproteggere completamente dagli\nattacchi nemici. Si rintana nelle\ngrotte in attesa dell’evoluzione."
        de:
          ruby: "In DRASCHELs panzerartiger Schale\nvollziehen seine Zellen eine\nTransformation, um einen völlig neuen\fKörper zu bilden. Die Schale dieses\nPOKéMON ist ausgesprochen schwer, so\ndass seine Bewegungen träge wirken."
          sapphire: "Auf DRASCHELs Körper befinden sich\nknochenähnliche Auswüchse. Sein Panzer\nist sehr hart und wehrt jeden Angriff\feines Gegners ab. Während es auf seine\nEntwicklung wartet, versteckt es sich\nin einer Höhle."
        es:
          ruby: "Dentro de la capa acorazada de SHELGON,\nlas células están en pleno proceso de\ncreación de un cuerpo nuevo.\fEl peso de la coraza le hace tener unos\nmovimientos lentos."
          sapphire: "SHELGON está recubierto por una\nespecie de capa ósea: una coraza\nmuy dura que hace rebotar los ataques\fenemigos. Este POKéMON se esconde\nen las cavernas para evolucionar."
