        special_defense: 2
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - marvel_scale
      descriptions:
        jp_kana:
          ruby: "もっとも　うつくしい　ポケモンと　いわれている。\nいかりや　にくしみの　こころを　いやして\nあらそいを　しずめる　ちからを　もっている。"
          sapphire: "おおきな　みずうみの　そこに　すんでいる。\nからだが　あざやかな　ピンクいろに　かがやくとき\nすさんだ　こころを　いやす　はどうを　はなつ。"
        en:
          ruby: "MILOTIC is said to be the most\nbeautiful of all the POKéMON.\nIt has the power to becalm such\femotions as anger and hostility to quell\nbitter feuding."
          sapphire: "MILOTIC live at the bottom of large\nlakes. When this POKéMON’s body glows a\nvivid pink, it releases a pulsing wave of\fenergy that brings soothing calm to\nrestless spirits."
        fr:
          ruby: "Certains prétendent que MILOBELLUS\nest le plus beau de tous les POKéMON.\nIl a le pouvoir d’apaiser certaines\fémotions comme la colère ou l’hostilité,\nafin d’éviter les querelles inutiles."
          sapphire: "MILOBELLUS vit au fond des grands lacs.\nLorsque le corps de ce POKéMON devient\nrose vif, il libère une pulsation\fd’énergie, capable d’apaiser les esprits\nagités."
        it:
          ruby: "Pare che MILOTIC sia il più bello\ntra tutti i POKéMON. Ha il potere\ndi placare emozioni come la rabbia\fe l’astio, domando così anche le\npiù accese controversie."
          sapphire: "MILOTIC vive sui fondali dei grandi\nlaghi. Quando il suo corpo riluce di un\nrosa intenso, rilascia una forte onda\fenergetica, in grado di placare\ngli spiriti instabili."
        de:
          ruby: "MILOTIC soll das Schönste aller\nPOKéMON sein. Es hat die Macht,\nEmotionen wie Wut und Feindseligkeit zu\fbesänftigen und somit erbitterten\nStreit zu vermeiden."
          sapphire: "MILOTIC lebt auf dem Grund großer Seen.\nWenn dieses POKéMON rosa leuchtet,\ngibt es eine Energiewelle ab, die einem\frastlosen Geist wohltuende Ruhe\nverschaffen kann."
        es:
          ruby: "De MILOTIC se dice que es el POKéMON\nmás bello. Tiene la capacidad de calmar\nsentimientos tales como el miedo y la\fhostilidad, y apaciguar las relaciones\nde áspera enemistad."
          sapphire: "MILOTIC vive en lo más profundo de\nlos lagos. Cuando intensifica el color\nrosa de la piel, libera una fuerte onda\fde energía que tranquiliza a todo el que\ntenga el ánimo alterado."
