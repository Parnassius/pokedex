        fr:
          ruby: "LIPPOUTOU marche en rythme, ondule\nde tout son corps et se déhanche comme\ns’il dansait. Ses mouvements sont si\fcommunicatifs que les gens qui le voient\nsont soudain pris d’une terrible envie\nde bouger les hanches, sans réfléchir."
          sapphire: "LIPPOUTOU marche en rythme, ondule\nde tout son corps et se déhanche comme\ns’il dansait. Ses mouvements sont si\fcommunicatifs que les gens qui le voient\nsont soudain pris d’une terrible envie\nde bouger les hanches, sans réfléchir."
        it:
          ruby: "JYNX avanza oscillando ed ancheggiando\nritmicamente come in una specie di\ndanza tesa ad ammaliare il nemico.\fChi lo vede è costretto ad iniziare\nla stessa danza senza pensare\na cosa sta facendo."
          sapphire: "JYNX avanza oscillando ed ancheggiando\nritmicamente come in una specie di\ndanza tesa ad ammaliare il nemico.\fChi lo vede è costretto ad iniziare\nla stessa danza senza pensare\na cosa sta facendo."
        de:
          ruby: "ROSSANA bewegt sich rhythmisch fort.\nEs wiegt und schwingt seine Hüften, als\nwürde es tanzen. Seine Bewegungen\fwirken so anziehend auf Menschen, dass\ndiese beginnen, mit den Hüften zu\nschwingen, ohne darüber nachzudenken."
          sapphire: "ROSSANA bewegt sich rhythmisch fort.\nEs wiegt und schwingt seine Hüften, als\nwürde es tanzen. Seine Bewegungen\fwirken so anziehend auf Menschen, dass\ndiese beginnen, mit den Hüften zu\nschwingen, ohne darüber nachzudenken."
        es:
          ruby: "JYNX camina con ritmo, balanceándose\ny moviendo las caderas como si\nestuviera bailando.\fRealiza unos movimientos tan vistosos\ny atractivos que no hay quien pueda\nresistirse a mover las caderas."
          sapphire: "JYNX camina con ritmo, balanceándose\ny moviendo las caderas como si\nestuviera bailando.\fRealiza unos movimientos tan vistosos\ny atractivos que no hay quien pueda\nresistirse a mover las caderas."
