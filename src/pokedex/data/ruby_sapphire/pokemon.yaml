          sapphire: "Dieses POKéMON besteht aus sechs\nEiern, die ein engmaschiges Netz\nbilden. Die sechs Eier ziehen sich\fgegenseitig an und drehen sich. Wenn\ndie Eier Risse bekommen, steht OWEI\nkurz vor seiner Entwicklung."
        es:
