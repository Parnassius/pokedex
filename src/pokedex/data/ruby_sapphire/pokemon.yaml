          sapphire: "かたい　からだで　ぶつかれば　いえも　こわれる。\nその　ちからを　つかって　やまみちを　ふさいだ\nどしゃくずれを　どかす　しごとを　てつだうよ。"
        en:
          ruby: "DONPHAN’s favorite attack is curling\nits body into a ball, then charging at\nits foe while rolling at high speed.\fOnce it starts rolling, this POKéMON\ncan’t stop very easily."
          sapphire: "If DONPHAN were to tackle with its hard\nbody, even a house could be destroyed.\nUsing its massive strength, the\fPOKéMON helps clear rock and mud slides\nthat block mountain trails."
        fr:
          ruby: "L’attaque favorite de DONPHAN consiste\nà se mettre en boule et à charger\nson ennemi en roulant à pleine vitesse.\fUne fois qu’il commence à rouler, ce\nPOKéMON a du mal à s’arrêter."
          sapphire: "Si DONPHAN décidait de charger, il\npourrait détruire une maison.\nGrâce à sa force étonnante, ce\fPOKéMON peut aider à déplacer les\nrochers et les coulées de boue qui\nbloquent les chemins de montagne."
        it:
          ruby: "DONPHAN adora attaccare arrotolandosi\nin forma sferica e puntando sul nemico\nad elevata velocità.\fUna volta partito, questo POKéMON\nè molto difficile da fermare."
          sapphire: "Il massiccio corpo di DONPHAN dispone\ndi una forza tale da poter abbattere\npersino una casa. La sua incredibile\fpotenza aiuta a liberare i sentieri\nmontani dopo una frana di massi\no fango."
        de:
          ruby: "DONPHANs Lieblingsattacke ist es, als\nBall zusammengerollt mit voller Wucht\ngegen seine Gegner zu krachen.\fWenn es erst einmal rollt, ist dieses\nPOKéMON nur schwer aufzuhalten."
          sapphire: "DONPHAN kann mit seinem harten Körper\nsogar ein Haus zerstören. Mit seiner\nimposanten Kraft hilft dieses POKéMON\fdabei, Erdrutsche aus dem Weg zu\nräumen, die Bergpfade versperren."
        es:
          ruby: "A DONPHAN le encanta enrollarse como\nuna pelota y cargar contra el enemigo\nrodando a toda velocidad.\fUna vez ha comenzado a rodar, no es\nfácil pararlo."
          sapphire: "Si DONPHAN tuviera que dar un golpe\ncon todo el cuerpo, con lo robusto\nque es echaría abajo hasta una casa.\fEstos POKéMON usan su fuerza para\nayudar a despejar pasos de montaña\ncuando hay piedras o lodo."
