        - steel
        - rock
      egg_groups:
        - monster
      abilities:
        - sturdy
        - rock_head
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          ruby: "えいよう　まんてんの　わきみずを　おなかいっぱい\nのむ　ことで　はがねの　からだが　きたえられる。\nおいしい　わきみずの　ちかくに　すを　つくる。"
          sapphire: "いしや　みずに　ふくまれる　てつぶんを　たべる。\nてっこうせきの　うもれた　やまに　すを　つくるが\nてつを　とりにくる　にんげんと　あらそいになる。"
        en:
          ruby: "LAIRON tempers its steel body by\ndrinking highly nutritious mineral\nspringwater until it is bloated.\fThis POKéMON makes its nest close to\nsprings of delicious water."
          sapphire: "LAIRON feeds on iron contained in\nrocks and water. It makes its nest on\nmountains where iron ore is buried.\fAs a result, the POKéMON often clashes\nwith humans mining the iron ore."
        fr:
          ruby: "GALEGON adoucit son corps d’acier en\nbuvant une eau minérale jusqu’à ce \nqu’il soit tout boursouflé.\fCe POKéMON fait son nid près des\nsources d’eau minérale riches\nen nutriments."
          sapphire: "GALEGON se nourrit du fer contenu\ndans les rochers et dans l’eau. Il fait\nson nid sur les montagnes renfermant\fdu minerai de fer. Du coup, il se\nconfronte souvent aux humains\ntravaillant dans les mines."
        it:
          ruby: "LAIRON tempra la sua fibra d’acciaio\ningerendo dosi enormi di minerali\naltamente nutritivi presenti nell’acqua\fdi sorgente. Questo POKéMON crea\nla propria dimora nei pressi di\nsorgenti d’acqua purissima."
          sapphire: "LAIRON si nutre del ferro contenuto\nnelle rocce e nell’acqua. Crea la propria\ndimora in montagna vicino a giacimenti\fferrosi. Per questo motivo il POKéMON\nsi scontra spesso con minatori alla\nricerca di pepite di ferro."
        de:
          ruby: "STOLLRAK temperiert seinen Körper,\nindem es ausgesprochen nahrhaftes \nQuellwasser trinkt, bis es völlig\faufgebläht ist. Dieses POKéMON baut\nsein Nest in der Nähe von Quellen, aus\ndenen köstliches Wasser sprudelt."
          sapphire: "STOLLRAK ernährt sich von Eisen, das in\nSteinen und Wasser enthalten ist. Es \nbaut sein Nest in Bergen, in denen\fEisenerz abgebaut wird. Es gerät dabei\nhäufig mit Bergarbeitern in Konflikt."
        es:
          ruby: "LAIRON templa su cuerpo de acero\nbebiendo agua mineral muy rica en\nnutrientes hasta que no puede más.\fEste POKéMON suele crear su nido cerca\nde manantiales de rica agua."
          sapphire: "LAIRON se alimenta del hierro que hay en\nlas rocas y el agua. Hace su nido en las\nmontañas, de donde se saca el hierro.\fPor eso, se encuentra muchas veces\ncon las personas que están trabajando\nen las minas extrayéndolo."
aggron:
  species_id: 306
  names:
    jp_kana: ボスゴドラ
