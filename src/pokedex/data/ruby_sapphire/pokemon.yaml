      types:
        - water
        - grass
      egg_groups:
        - water_1
        - grass
      abilities:
        - swift_swim
        - rain_dish
      descriptions:
        jp_kana:
          ruby: "ようきな　おんがくを　みみにすると　おどりだす。\nハイキングを　している　こどもの　がっしょうに\nさそわれて　すがたを　あらわすと　いわれている。"
          sapphire: "ようきな　リズムを　きくと　からだの　さいぼうが\nかっぱつに　かつどうを　はじめる　たいしつ。\nたたかいでも　すごい　パワーを　はっきするぞ。"
        en:
          ruby: "LUDICOLO begins dancing as soon as\nit hears cheerful, festive music.\nThis POKéMON is said to appear when it\fhears the singing of children on hiking\noutings."
          sapphire: "Upon hearing an upbeat and cheerful\nrhythm, the cells in LUDICOLO’s body\nbecome very energetic and active.\fEven in battle, this POKéMON will\nexhibit an amazing amount of power."
        fr:
          ruby: "LUDICOLO ne peut pas s’empêcher\nde danser quand il entend une\nmusique joyeuse et festive.\fOn raconte que ce POKéMON apparaît\nlorsqu’il entend les enfants chanter\npendant leurs randonnées."
          sapphire: "Lorsque LUDICOLO entend un rythme\nentraînant et joyeux, les cellules de\nson corps s’activent énergiquement.\fMême pendant les combats, ce POKéMON\nmontre énormément d’énergie."
        it:
          ruby: "LUDICOLO inizia a ballare appena\nsente una musica allegra e festosa.\nPare che questo POKéMON appaia\fquando sente il canto gioioso dei\nbambini durante le escursioni."
          sapphire: "Quando sente un motivetto allegro e\nvivace, le cellule corporee di LUDICOLO\ndiventano attive e piene di energia.\fAnche in lotta il POKéMON dimostra\nuna potenza incredibile."
        de:
          ruby: "KAPPALORES fängt sofort zu tanzen an,\nwenn es stimmungsvolle, feierliche Musik\nvernimmt. Dieses POKéMON erscheint\fangeblich, wenn es Kinder auf \nWanderausflügen singen hört."
          sapphire: "Wenn KAPPALORES einen fröhlichen\nRhythmus hört, werden die Zellen in\nseinem Körper aktiviert. Auch im Kampf\fzeigt dieses POKéMON seine\nverblüffende Stärke."
        es:
          ruby: "LUDICOLO empieza a bailar en cuanto oye\nmúsica alegre y de fiesta.\nDicen que este POKéMON aparece cuando\foye cantar a los niños que van de\nexcursión para hacer senderismo."
          sapphire: "Las células de LUDICOLO se revolucionan\ny llenan de energía cuando oye sonidos\nrítmicos y alegres.\fEn combate hace gala también\nde esta cantidad desmesurada\nde energía."
seedot:
  species_id: 273
  names:
    jp_kana: タネボー
    en: SEEDOT
    fr: GRAINIPIOT
    it: SEEDOT
    de: SAMURZEL
    es: SEEDOT
  forms:
