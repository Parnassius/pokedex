        - sand_veil
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ruby: "さばく　など　かんそうした　ちいきに　せいそく。\nつよい　はなの　かおりで　えものを　さそいこみ\nするどい　からだの　トゲを　とばして　しとめる。"
          sapphire: "あめの　すくない　きびしい　かんきょう　ほど\nきれいで　かおりの　つよい　はなを　さかせる。\nトゲの　ついた　うでを　ふりまわして　たたかう。"
        en:
          ruby: "CACNEA lives in arid locations such\nas deserts. It releases a strong aroma\nfrom its flower to attract prey.\fWhen prey comes near, this POKéMON\nshoots sharp thorns from its body to\nbring the victim down."
          sapphire: "The more arid and harsh the\nenvironment, the more pretty and\nfragrant a flower CACNEA grows.\fThis POKéMON battles by wildly swinging\nits thorny arms."
        fr:
          ruby: "CACNEA vit dans les milieux arides,\ntels les déserts. Sa fleur libère un\nparfum entêtant pour attirer sa proie.\fLorsqu’elle s’approche, ce POKéMON\nenvoie des épines pour la neutraliser."
          sapphire: "Si son environnement est aride et\ndifficile, la fleur de CACNEA\ndevient plus jolie et dégage un parfum\fdélicat. Ce POKéMON se bat en\nagitant ses bras épineux."
        it:
          ruby: "CACNEA vive in luoghi molto aridi come\nil deserto. Il suo fiore rilascia un forte\naroma per attirare le prede.\fQuando la preda si avvicina, il POKéMON\nle spara contro un nuvolo di spine\ndel proprio corpo per abbatterla."
          sapphire: "Quanto più arido e aspro è \nl’ambiente, tanto più rigoglioso\ncresce il fiore di CACNEA.\fIl POKéMON lotta agitando\nfuriosamente gli spinosi arti superiori."
        de:
          ruby: "TUSKA lebt an trockenen Orten, z. B. in\nWüsten. Es versprüht einen starken\nDuft aus seiner Blume, um Beute\fanzuziehen. Wenn sich Beute nähert,\nverschießt es scharfe Stacheln, um\nseinen Gegner zu überwältigen."
          sapphire: "Je trockener und trostloser seine\nUmgebung ist, desto schöner und\nduftender wird TUSKAs Blume.\fDieses POKéMON schwingt im Kampf wild\nmit seinen dornigen Armen."
        es:
          ruby: "CACNEA habita en desiertos y otras\nzonas áridas.\nPara atraer a su presa, libera un fuerte\faroma por la flor y, cuando se le acerca,\nle lanza pinchos por todo el cuerpo\npara reducirla."
          sapphire: "Cuanto más árido y hostil sea el hábitat\nde CACNEA, más bonita y aromática será\nla flor que le crece.\fEste POKéMON lucha agitando\nviolentamente los brazos cargados\nde pinchos que tiene."
cacturne:
  species_id: 332
  names:
    jp_kana: ノクタス
    en: CACTURNE
    fr: CACTURNE
    it: CACTURNE
    de: NOKTUSKA
    es: CACTURNE
