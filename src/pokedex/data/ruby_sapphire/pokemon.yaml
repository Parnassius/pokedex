          sapphire: "HOPPSPROSS lässt sich vom Wind\ntreiben. Wenn es bemerkt, dass ein\nSturm aufkommt, verbindet es seine\fBlätter mit anderen HOPPSPROSS,\ndamit es nicht davongeweht wird."
        es:
