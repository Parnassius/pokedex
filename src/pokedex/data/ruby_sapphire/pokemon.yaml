      types:
        - dragon
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ruby: "みた　ものや　かんがえた　イメージを　あいてに\nえいぞうとして　みせる　のうりょくを　もつ。\nにんげんの　ことばを　りかいすることが　できる。"
          sapphire: "やさしい　こころの　もちぬしにしか　なつかない。\nうでを　おりたたむと　くうきていこうが　へって\nジェットき　よりも　はやく　そらを　とべるぞ。"
        en:
          ruby: "LATIOS has the ability to make its foe\nsee an image of what it has seen or\nimagines in its head.\fThis POKéMON is intelligent and\nunderstands human speech."
          sapphire: "LATIOS will only open its heart to a\nTRAINER with a compassionate spirit.\nThis POKéMON can fly faster than a jet\fplane by folding its forelegs to minimize\nair resistance."
        fr:
          ruby: "LATIOS a le pouvoir de faire en sorte\nque son adversaire voie une image\nprovenant de son subconscient.\fCe POKéMON est intelligent et comprend\nle langage humain."
          sapphire: "LATIOS n’ouvrira son cœur qu’à un\nDRESSEUR doté d’un esprit\ncompatissant. Ce POKéMON peut voler\fplus vite qu’un avion à réaction en\nrepliant ses pattes avant pour\naméliorer son aérodynamisme."
        it:
          ruby: "LATIOS ha l’abilità di far vedere al\nproprio nemico l’immagine di ciò che ha\nvisto o immaginato nella propria testa.\fQuesto POKéMON è intelligente e\ncapisce il linguaggio umano."
          sapphire: "LATIOS apre il proprio cuore ad\nALLENATORI d’animo buono e generoso.\nIl POKéMON riesce a volare più veloce\fdi un aereo a reazione, piegando\nle zampe anteriori per minimizzare\nl’attrito dell’aria."
        de:
          ruby: "LATIOS kann seinem Feind ein Bild\nvon etwas, das dieser einmal gesehen\nhat, in den Kopf projizieren. Dieses\fPOKéMON ist intelligent und es versteht\ndie menschliche Sprache."
          sapphire: "LATIOS schüttet nur seinem TRAINER\ngegenüber sein Herz aus. Dieses\nPOKéMON fliegt schneller als ein\fFlugzeug, indem es seine Vorderbeine\neinklappt, um den Luftwiderstand zu\nverringern."
        es:
          ruby: "LATIOS tiene la habilidad de hacer\nque su rival vea algo que él ha visto\no imaginado.\fEste POKéMON es muy inteligente.\nEs capaz de entender el lenguaje\nhumano."
          sapphire: "LATIOS sólo le abre el corazón a los\nENTRENADORES compasivos.\nA la hora de volar, este POKéMON pliega\flas patas delanteras para minimizar\nla resistencia al aire y supera\nen velocidad a un avión a reacción."
