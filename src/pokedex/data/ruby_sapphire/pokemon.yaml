        it:
          ruby: "FARFETCH’D ha sempre con sé lo stelo\ndi qualche pianta. Pare che alcuni steli\nsiano migliori di altri.\fSpesso lotta con altri POKéMON\nper avere lo stelo migliore."
          sapphire: "FARFETCH’D ha sempre con sé lo stelo\ndi qualche pianta. Pare che alcuni steli\nsiano migliori di altri.\fSpesso lotta con altri POKéMON\nper avere lo stelo migliore."
        de:
          ruby: "PORENTA trifft man immer mit einer\nLauchstange an. Es gibt gute und\nschlechte Stangen.\fDieses POKéMON kämpft mit Hilfe seiner\nStange gegen seine Gegner."
          sapphire: "PORENTA trifft man immer mit einem\nStock irgendeiner Pflanze an. Es gibt\ngute und schlechte Stöcke.\fVon diesem POKéMON wird behauptet, es \nkämpfe gegen die eigenen Artgenossen\num die besten Stöcke."
        es:
          ruby: "FARFETCH’D lleva siempre una especie\nde palo de algún tipo de planta. Según\nparece, los hay mejores y peores.\fTiene fama de haber luchado contra\notros POKéMON con distintos palos."
          sapphire: "FARFETCH’D lleva siempre una especie\nde palo de algún tipo de planta. Según\nparece, los hay mejores y peores.\fTiene fama de haber luchado contra\notros POKéMON con distintos palos."
