          sapphire: "La maman d’OSSELAIT lui manque ter-\nriblement et il ne la reverra jamais. La\nlune le fait pleurer, car elle\flui rappelle sa mère. Les taches sur le\ncrâne que porte ce POKéMON sont\nles marques de ses larmes."
        it:
          ruby: "CUBONE si strugge per la madre che\nnon rivedrà mai più. Piange alla luna\npiena che somiglia molto alla madre.\fLe macchie sul teschio che indossa\nsono dovute alle lacrime copiose."
          sapphire: "CUBONE si strugge per la madre che\nnon rivedrà mai più. Piange alla luna\npiena che somiglia molto alla madre.\fLe macchie sul teschio che indossa\nsono dovute alle lacrime copiose."
        de:
          ruby: "TRAGOSSO sehnt sich nach seiner\nMutter, die nicht mehr da ist. Wenn es\nim Vollmond das Ebenbild seiner Mutter\ferblickt, muss es weinen. Die Flecken\nauf dem Totenkopf, den es trägt,\nstammen von vergossenen Tränen."
          sapphire: "TRAGOSSO sehnt sich nach seiner\nMutter, die nicht mehr da ist. Wenn es\nim Vollmond das Ebenbild seiner Mutter\ferblickt, muss es weinen. Die Flecken\nauf dem Totenkopf, den es trägt,\nstammen von vergossenen Tränen."
        es:
          ruby: "A CUBONE le ahoga la pena porque\nno volverá a ver jamás a su madre.\nLa luna le recuerda a veces a ella\fy se pone a chillar. Los churretes que\ntiene en el cráneo que lleva puesto,\nson debidos a las lágrimas que derrama."
          sapphire: "A CUBONE le ahoga la pena porque\nno volverá a ver jamás a su madre.\nLa luna le recuerda a veces a ella\fy se pone a chillar. Los churretes que\ntiene en el cráneo que lleva puesto,\nson debidos a las lágrimas que derrama."
