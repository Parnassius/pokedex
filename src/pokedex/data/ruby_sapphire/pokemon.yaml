      descriptions:
        jp_kana:
          ruby: "おしりの　トゲで　きの　かわを　はがして\nしみだした　じゅえきを　しょくりょうに　する。\nきゅうばんの　あしは　ガラスでも　すべらない。"
          sapphire: "エサにしようと　つかまえにきた　オオスバメに\nおしりの　トゲを　むけて　ていこうする。\nしみだした　どくで　あいてを　よわらせるぞ。"
        en:
          ruby: "Using the spikes on its rear end,  \nWURMPLE peels the bark off trees and\nfeeds on the sap that oozes out.\fThis POKéMON’s feet are tipped with\nsuction pads that allow it to cling to\nglass without slipping."
          sapphire: "WURMPLE is targeted by SWELLOW as\nprey. This POKéMON will try to resist by\npointing the spikes on its rear at the\fattacking predator.\nIt will weaken the foe by leaking poison\nfrom the spikes."
        fr:
          ruby: "A l’aide des pointes derrière sa tête,\nCHENIPOTTE déchire l’écorce des arbres\net mange la sève qui coule dessus.\fLes pattes de ce POKéMON sont dotées\nde coussinets à ventouses pour adhérer\naux parois en verre sans en glisser."
          sapphire: "CHENIPOTTE est la proie de HELEDELLE.\nCe POKéMON essaye de résister en\ndirigeant les pointes de son dos vers\fle prédateur.\nIl affaiblit son ennemi en lui injectant\ndu poison."
        it:
          ruby: "Grazie agli aculei sulla parte posteriore\ndel corpo, WURMPLE scorteccia i tronchi\ndegli alberi e si nutre della loro linfa.\fLe sue zampe sono dotate di ventose\nche gli consentono di attaccarsi ai\nvetri senza scivolare."
          sapphire: "WURMPLE è la preda favorita di SWELLOW.\nQuesto POKéMON cerca di resistere\npuntando gli aculei irti sulla schiena\fcontro il predatore che attacca.\nPoi indebolisce il nemico emettendo\nveleno da questi aculei."
        de:
          ruby: "WAUMPEL kann mit den Stacheln an\nseinem Hinterteil die Rinde von Bäumen\nentfernen und ernährt sich von dem\faustretenden Saft. An den Füßen dieses\nPOKéMON befinden sich Saugnäpfe, mit\ndenen es auch an Glas nicht abrutscht."
          sapphire: "WAUMPEL wird von SCHWALBOSS als Beute\nangesehen. Dieses POKéMON wehrt sich\ngegen angreifende Räuber, indem es die\fStacheln an seinem Hinterteil auf sie\nrichtet. Es schwächt seine Gegner mit\ndem Gift, das aus den Stacheln austritt."
        es:
          ruby: "WURMPLE usa las púas del lomo para\nraspar los troncos de los árboles,\nquitarles la corteza y beber la savia\fque emanan. Este POKéMON tiene unas\nventosas rematándole los pies, con las\nque se adhiere al cristal sin resbalarse."
          sapphire: "WURMPLE es la presa preferida de\nSWELLOW. La forma que tiene de intentar\ndefenderse es apuntar con las púas\fdel lomo al amenazante enemigo\ny debilitarlo inyectándole veneno."
silcoon:
  species_id: 266
  names:
    jp_kana: カラサリス
    en: SILCOON
    fr: ARMULYS
    it: SILCOON
    de: SCHALOKO
    es: SILCOON
  forms:
    silcoon:
      form_id: 0
      base_stats:
        hp: 50
        attack: 35
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          ruby: "おちない　ように　いとを　えだに　まきつけて\nからだを　ささえながら　しんかを　まっている。\nちいさな　あなから　そとの　ようすを　うかがう。"
          sapphire: "しんかするまで　なにも　たべずに　たえていると\nかんがえられていたが　どうやら　いとに　ついた\nあまみずで　かわきを　いやしているらしい。"
        en:
          ruby: "SILCOON tethers itself to a tree branch\nusing silk to keep from falling. There, \nthis POKéMON hangs quietly while it\fawaits evolution.\nIt peers out of the silk cocoon through\na small hole."
          sapphire: "SILCOON was thought to endure hunger\nand not consume anything before its\nevolution. However, it is now thought\fthat this POKéMON slakes its thirst by\ndrinking rainwater that collects on its\nsilk."
        fr:
          ruby: "ARMULYS s’accroche à une branche\nd’arbre avec de la soie pour éviter de\ntomber. Ce POKéMON y reste\ftranquillement en attendant son évo-\nlution. Il regarde l’extérieur à travers\nun petit trou dans son cocon de soie."
          sapphire: "On pensait qu’ARMULYS pouvait\nrésister à la faim et ne consommait rien\navant son évolution. On sait maintenant\fque ce POKéMON étanche sa soif en\nrécupérant l’eau de pluie déposée\nsur sa soie."
        it:
          ruby: "SILCOON si lega ai rami degli alberi\ngrazie ad alcuni fili di seta che gli\nimpediscono di cadere. In tale\fposizione aspetta pazientemente\nl’evoluzione. Da un piccolo foro sbircia\nfuori dal proprio bozzolo di seta."
          sapphire: "In passato si pensava che SILCOON\nresistesse alla fame senza ingerire\nnulla fino all’evoluzione. Tuttavia,\fora si presume che il POKéMON plachi\nla sua sete bevendo l’acqua piovana\nche si posa sul suo bozzolo."
        de:
          ruby: "SCHALOKO bindet sich mit einem\nSeidenfaden an einen Ast. Es baumelt\ndort und wartet auf seine Entwicklung.\fDurch ein kleines Loch in seinem\nSeidenkokon lugt es heraus."
          sapphire: "Bisher nahm man an, dass SCHALOKO vor\nseiner Entwicklung hungert und\nüberhaupt nichts zu sich nimmt. Nun\faber wird behauptet, dass es seinen \nDurst mit Regenwasser löscht, das sich\nauf seinem seidigen Fell sammelt."
        es:
          ruby: "SILCOON usa la seda que produce para\natarse a la rama de un árbol y sujetarse\nbien.\fY se queda ahí colgado a la espera\nde su evolución, asomado por un agujero\ndel capullo de seda."
          sapphire: "Se pensaba que SILCOON podía aguantar\nel hambre y no consumir nada antes de\nevolucionar. Sin embargo, ahora se cree\fque sacia su necesidad bebiendo el agua\nde la lluvia que se le queda sobre la piel."
beautifly:
  species_id: 267
  names:
    jp_kana: アゲハント
    en: BEAUTIFLY
    fr: CHARMILLON
    it: BEAUTIFLY
    de: PAPINELLA
    es: BEAUTIFLY
  forms:
    beautifly:
      form_id: 0
      base_stats:
        hp: 60
        attack: 70
        defense: 50
        special_attack: 90
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          ruby: "あまい　かふんが　だいこうぶつの　ポケモン。\nはなを　つけた　はちうえを　まどべに　おけば\nかふんを　あつめに　かならず　とんでくるよ。"
          sapphire: "くるりと　まいた　はりの　ような　ながい　くちは\nかふんを　あつめる　ときに　とても　べんり。\nはるかぜに　のって　かふんを　あつめて　まわる。"
        en:
          ruby: "BEAUTIFLY’s favorite food is the sweet\npollen of flowers. If you want to see\nthis POKéMON, just leave a potted\fflower by an open window. BEAUTIFLY\nis sure to come looking for pollen."
          sapphire: "BEAUTIFLY has a long mouth like a coiled\nneedle, which is very convenient for\ncollecting pollen from flowers.\fThis POKéMON rides the spring winds as\nit flits around gathering pollen."
        fr:
          ruby: "La nourriture préférée de CHARMILLON\nest le pollen sucré des fleurs. Si on\nveut voir ce POKéMON, il suffit de\flaisser une fleur en pot sur un rebord\nde fenêtre. CHARMILLON viendra\nsûrement voir s’il y a du pollen."
          sapphire: "CHARMILLON a une longue trompe en\nspirale, particulièrement pratique pour\nrécupérer le pollen des fleurs.\fCe POKéMON se laisse porter par les\nvents printaniers pendant qu’il butine."
        it:
          ruby: "Il nutrimento preferito da BEAUTIFLY\nè il polline dei fiori. Per attirare\nquesto POKéMON basta mettere\funa pianta fiorita sul davanzale:\nsenza dubbio si avvicinerà\nin cerca di polline."
          sapphire: "La bocca di BEAUTIFLY è costituita\nda un ago spiraliforme, molto utile\nper succhiare il polline dai fiori.\fQuesto POKéMON si fa trasportare\ndal vento nei suoi viaggi alla ricerca\ndel polline."
        de:
          ruby: "PAPINELLAs Lieblingsspeise ist\nBlütenstaub. Wenn du dieses POKéMON\nbeobachten möchtest, musst du bloß\feinen Blumentopf vor ein geöffnetes\nFenster stellen. PAPINELLA wird sich\ndiese Leckerei nicht entgehen lassen."
          sapphire: "PAPINELLA hat einen langen Rüssel, der\nhervorragend zum Sammeln von Blüten-\npollen geeignet ist. Dieses POKéMON\fflattert im Frühlingswind herum\nund sammelt Blütenstaub."
        es:
          ruby: "La comida favorita de BEAUTIFLY es el\ndulce polen de las flores. Si quieres ver\na este POKéMON, deja una maceta con\fflores al lado de la ventana y verás\ncómo aparece un ejemplar de BEAUTIFLY\nen busca de polen."
          sapphire: "BEAUTIFLY tiene una boca enorme\nen espiral que parece una aguja y le\nresulta muy útil para recolectar polen.\fEste POKéMON va revoloteando de flor\nen flor para recogerlo."
cascoon:
  species_id: 268
  names:
    jp_kana: マユルド
    en: CASCOON
    fr: BLINDALYS
    it: CASCOON
    de: PANEKON
    es: CASCOON
  forms:
    cascoon:
      form_id: 0
      base_stats:
        hp: 50
        attack: 35
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          ruby: "マユルドの　からだは　くちから　だした　ほそい\nいとが　からだを　つつみ　かたくなった　もの。\nマユの　なかで　しんかの　じゅんびを　している。"
          sapphire: "うごくと　つよい　からだに　しんか　できないので\nどんなに　いためつけられても　じっと　している。\nそのとき　うけた　いたみは　ずっと　わすれない。"
        en:
          ruby: "CASCOON makes its protective cocoon\nby wrapping its body entirely with a\nfine silk from its mouth. Once the silk\fgoes around its body, it hardens.\nThis POKéMON prepares for its evolution\ninside the cocoon."
          sapphire: "If it is attacked, CASCOON remains\nmotionless however badly it may be\nhurt. It does so because if it were to\fmove, its body would be weak upon\nevolution. This POKéMON will also not\nforget the pain it endured."
        fr:
          ruby: "BLINDALYS fabrique son cocon\nprotecteur en s’enveloppant dans la\nsoie qui sort de sa bouche. Une fois la\fsoie autour de son corps, elle se met\nà durcir. Ce POKéMON prépare son\névolution à l’intérieur du cocon."
          sapphire: "Lorsqu’il est attaqué, BLINDALYS\nreste immobile, même s’il a très mal.\nEn effet, s’il bougeait, son corps serait\faffaibli lors de son évolution. En\nrevanche, ce POKéMON n’oubliera pas\nla douleur endurée."
        it:
          ruby: "CASCOON crea il bozzolo protettivo\navvolgendo interamente il proprio corpo\ncon finissima seta secreta dalla bocca.\fSuccessivamente la seta si indurisce.\nA questo punto CASCOON si prepara\nall’evoluzione."
          sapphire: "In caso di aggressione CASCOON rimane\nimmobile indipendentemente dalla\nviolenza dell’attacco subito.\fQuesto lo aiuta a rafforzare il suo\ncorpo in vista dell’evoluzione. Non\ndimentica mai il dolore provato."
        de:
          ruby: "PANEKON baut seinen schützenden\nKokon, indem es seinen Körper mit\nfeiner Seide einwickelt, die aus seinem\fMund austritt. Wenn sein Körper mit\nSeide bedeckt ist, wird diese hart. Im\nKokon wartet es auf seine Entwicklung."
          sapphire: "Wenn es angegriffen wird, bewegt sich\nPANEKON in keiner Weise, egal, wie\nschwer es dabei verletzt wird. Wenn es\fsich bewegen würde, wäre sein Körper zu\nschwach für seine Entwicklung. Die\nSchmerzen allerdings vergisst es nie."
        es:
          ruby: "CASCOON forma el capullo que lo protege\nenrollándose por completo en la seda que\nlibera por la boca.\fCuando está totalmente recubierto, se\nprepara para evolucionar en el interior\ndel capullo."
          sapphire: "Si atacan a CASCOON, se queda inmóvil\naunque le hayan hecho mucho daño. Y es\nque, si se moviera, perdería fuerzas\fpara evolucionar. Aunque nunca\nolvida el daño que le han hecho."
dustox:
  species_id: 269
  names:
    jp_kana: ドクケイル
    en: DUSTOX
    fr: PAPINOX
    it: DUSTOX
    de: PUDOX
    es: DUSTOX
