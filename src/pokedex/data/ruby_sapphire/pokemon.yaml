        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - bug
      egg_groups:
        - water_3
      abilities:
        - battle_armor
      descriptions:
        jp_kana:
          ruby: "たいこの　かせきから　よみがえった　ポケモン。\nあたたかい　うみに　せいそくし　はったつした\n２ほんの　ツメで　えものを　がっちり　つかむ。"
          sapphire: "ポケモンの　せんぞの　いっしゅと　いわれている。\nからだの　よこに　ついた　８まいの　はねを\nくねらせて　たいこの　うみを　およいでいた。"
        en:
          ruby: "ANORITH was regenerated from a\nprehistoric fossil. This primitive\nPOKéMON once lived in warm seas.\fIt grips its prey firmly between its\ntwo large claws."
          sapphire: "ANORITH is said to be a type of \nPOKéMON predecessor, with eight wings\nat the sides of its body.\fThis POKéMON swam in the primordial sea\nby undulating these eight wings."
        fr:
          ruby: "ANORITH fut régénéré à partir d’un\nfossile préhistorique. Ce POKéMON\nprimitif vivait à l’époque dans les\feaux tropicales. Il attrape fermement\nsa proie avec ses deux grandes pinces."
          sapphire: "On raconte qu’avec ses huit ailes sur\nles côtés de son corps, ANORITH est\nun peu l’ancêtre des POKéMON.\fCe POKéMON nageait dans la mer\noriginelle en ondulant ses huit ailes."
        it:
          ruby: "ANORITH è stato rigenerato da un\nfossile preistorico. Un tempo viveva\nnei mari caldi.\fQuesto POKéMON afferra saldamente\nla preda con i suoi due artigli."
          sapphire: "Si dice che ANORITH sia un POKéMON\nantenato, con otto ali sui fianchi.\fIl POKéMON nuotava nei mari\nprimordiali remando con le otto ali."
        de:
          ruby: "ANORITH wurde aus einem\nprähistorischen Fossil erzeugt. Dieses\nprimitive POKéMON lebte einst in warmen\fGewässern. Es klemmt seine Beute\nfest zwischen seine beiden riesigen\nKlauen ein."
          sapphire: "ANORITH soll ein POKéMON-Vorgänger\nsein, es hat acht Flügel an seinem\nKörper. Dieses POKéMON schwamm im\fUrmeer, indem es seine acht Flügel\nschwang."
        es:
          ruby: "ANORITH se regeneró a partir de un fósil\nprehistórico. Este POKéMON primitivo\nvivió en una ocasión en mares cálidos.\fPara cazar, utiliza las grandes pinzas\nque tiene y agarra con firmeza a su\nvíctima con ellas."
          sapphire: "De ANORITH dicen que es una especie\nde POKéMON predecesor. Tiene ocho\nalas a ambos lados del cuerpo.\fGracias a ellas, pudo nadar por las\nprimeras aguas que hubo."
