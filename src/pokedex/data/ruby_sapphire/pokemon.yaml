        jp_kana:
          ruby: "くうきちゅうの　でんきエネルギーを　たべる。\nカミナリの　おちる　ひは　でんきを　たべすぎた\nマルマインが　あちらこちらで　だいばくはつする。"
          sapphire: "でんきに　ひきよせられる　せいしつを　もつ。\nおもに　はつでんしょに　あつまってきて　つくった\nばかりの　でんきを　たべてしまう　こまりものだ。"
        en:
          ruby: "ELECTRODE eats electricity in the\natmosphere. On days when lightning\nstrikes, you can see this POKéMON\fexploding all over the place from\neating too much electricity."
          sapphire: "One of ELECTRODE’s characteristics is\nits attraction to electricity.\nIt is a problematical POKéMON that\fcongregates mostly at electrical\npower plants to feed on electricity\nthat has just been generated."
        fr:
          ruby: "ELECTRODE mange l’électricité qui se\ntrouve dans l’atmosphère. Les jours\nd’orage, on peut voir ce POKéMON\fexploser sans arrêt parce qu’il a\navalé trop d’électricité."
          sapphire: "L’une des caractéristiques d’ELECTRODE\nest son attirance pour l’électricité.\nCes POKéMON posent problème lorsqu’ils\fse rassemblent dans les usines\nd’électricité pour se nourrir de courant\nfraîchement généré."
        it:
          ruby: "ELECTRODE si nutre dell’elettricità\npresente nell’atmosfera. Quando i \nfulmini solcano il cielo, è possibile\fscorgere molti di questi POKéMON\nesplodere per aver ingerito\nun’eccessiva dose di elettricità."
          sapphire: "Una delle caratteristiche di ELECTRODE\nè la sua affinità con l’elettricità.\nSi tratta di un POKéMON problematico\fche spesso si raduna attorno alle\ncentrali elettriche per trarre nutri-\nmento dall’elettricità appena generata."
        de:
          ruby: "LEKTROBAL ernährt sich von\nElektrizität aus der Atmosphäre. An\nTagen, an denen es blitzt, explodiert\fdieses POKéMON dauernd, da es zu viel\nElektrizität zu sich nimmt."
          sapphire: "Typisch für LEKTROBAL ist seine große\nFaszination für Elektrizität. Es ist ein\nproblematisches POKéMON, das sich\fmeistens in Kraftwerken niederlässt, wo\nes sich von frisch erzeugtem Strom\nernähren kann."
        es:
          ruby: "Los ELECTRODE se alimentan de la\nelectricidad de la atmósfera. En días\nde tormenta con rayos, es fácil verlos\fexplotando por todos lados tras haber\nconsumido demasiada electricidad."
          sapphire: "Una de las características de\nELECTRODE es la atracción que siente\nhacia la electricidad. Son POKéMON\fproblemáticos que suelen agruparse\ncerca de centrales eléctricas para\nnutrirse de la energía recién generada."
