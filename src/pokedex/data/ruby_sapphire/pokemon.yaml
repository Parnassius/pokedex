          sapphire: "Nach seiner Geburt ist PONITA sehr\nschwach. Es braucht sehr lange, bis es\nauf allen Vieren steht. Dieses POKéMON\fwird stärker, da es bei dem Versuch, mit\nseinen Eltern Schritt zu halten, immer\nwieder stolpert und hinfällt."
