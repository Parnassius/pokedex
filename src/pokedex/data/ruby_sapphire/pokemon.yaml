  species_id: 352
  names:
    jp_kana: カクレオン
    en: KECLEON
    fr: KECLEON
    it: KECLEON
    de: KECLEON
    es: KECLEON
  forms:
    kecleon:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 120
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - color_change
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          ruby: "からだの　いろを　じざいに　かえる　ことで\nまわりの　けしきに　とけこむ　ことが　できる。\nおなかの　ギザギザもよう　だけは　かえられない。"
          sapphire: "からだを　けしきと　おなじ　いろに　かえて\nえものに　きづかれない　ように　しのびよる。\nながく　のびる　ベロで　すばやく　つかまえる。"
        en:
          ruby: "KECLEON is capable of changing its body\ncolors at will to blend in with its\nsurroundings.\fThere is one exception - this POKéMON\ncan’t change the zigzag pattern on its\nbelly."
          sapphire: "KECLEON alters its body coloration to\nblend in with its surroundings, allowing\nit to sneak up on its prey unnoticed.\fThen it lashes out with its long,\nstretchy tongue to instantly ensnare\nthe unsuspecting target."
        fr:
          ruby: "KECLEON est capable de modifier les\ncouleurs de son corps pour se\nfondre dans son environnement.\fIl y a cependant une exception: ce\nPOKéMON ne peut pas modifier la figure\ngéométrique en zigzag sur son ventre."
          sapphire: "KECLEON change la couleur de son\ncorps pour se fondre dans son environ-\nnement, ce qui lui permet de s’approcher\fde sa proie sans être repéré. Il envoie\nensuite sa grande langue élastique pour\npiéger sa proie qui ne se doute de rien."
        it:
          ruby: "KECLEON è in grado di mutare il colore\ndel proprio corpo per mimetizzarsi\ncon l’ambiente circostante.\fTuttavia, fa eccezione il motivo\nzigzagato sulla pancia, che rimane\nsempre visibile."
          sapphire: "KECLEON varia la colorazione del proprio\ncorpo per mimetizzarsi con l’ambiente\ncircostante, consentendogli di tendere\fun agguato alla preda senza farsi\nnotare. Poi l’attacca con la sua lingua\nelastica sopraffacendola."
        de:
          ruby: "KECLEON kann die Farbe seines Körpers\nbei Bedarf verändern, um sich seiner\nUmgebung anzupassen. Es gibt allerdings\feine Ausnahme: Das Zickzackmuster auf\nseinem Bauch kann es nicht verändern."
          sapphire: "KECLEON verändert seine Körper-\nfärbung, um sich seiner Umgebung\nanzupassen. Dadurch kann es sich\fprima an seine ahnungslose Beute an-\nschleichen. Es schlägt mit seiner dehn-\nbaren, langen Zunge aus und fängt sie."
        es:
          ruby: "KECLEON puede alterar la pigmentación\nde la piel para mezclarse con su entorno.\nLo único que no es capaz de cambiar\fes el trazado en zigzag que tiene\nen la panza."
          sapphire: "KECLEON modifica la coloración de la piel\npara camuflarse en el medio en el que\nesté. Así, puede acercarse a hurtadillas\fa su enemigo sin que se dé cuenta\ny lanzarle la larga y elástica lengua\nque tiene para atraparlo por sorpresa."
shuppet:
  species_id: 353
  names:
    jp_kana: カゲボウズ
    en: SHUPPET
    fr: POLICHOMBR
    it: SHUPPET
    de: SHUPPET
