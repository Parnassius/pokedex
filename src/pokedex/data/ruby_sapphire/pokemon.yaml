          sapphire: "POTTROTT versteckt sich leise unter\nSteinen und verbirgt seinen Körper in\nseiner harten Schale, wenn es Beeren\fzu sich nimmt.\nDie Beeren vermischen sich mit seinen\nKörperflüssigkeiten zu einem Saft."
