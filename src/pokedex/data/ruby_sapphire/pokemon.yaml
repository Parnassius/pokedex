          sapphire: "Les jambes de KICKLEE peuvent se\ncontracter et s’étirer à volonté. Grâce\nà ces jambes à ressort, il terrasse ses\fennemis en les rouant de coups de pied.\nAprès les combats, il masse ses jambes\npour éviter de sentir la fatigue."
