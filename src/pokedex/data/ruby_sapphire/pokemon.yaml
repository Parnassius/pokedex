          sapphire: "RAMOLOSS trempe sa queue dans\nl’eau au bord des rivières pour\nattraper ses proies.\fCependant, ce POKéMON oublie souvent\nce qu’il fait là et passe des jours\nentiers à traîner au bord de l’eau."
        it:
          ruby: "SLOWPOKE usa la coda per pescare\nla preda, immergendola in acqua dalle\nrive dei fiumi.\fTuttavia, spesso dimentica cosa stava\nfacendo e trascorre giorni interi a\nciondolare vicino ai corsi d’acqua."
          sapphire: "SLOWPOKE usa la coda per pescare\nla preda, immergendola in acqua dalle\nrive dei fiumi.\fTuttavia, spesso dimentica cosa stava\nfacendo e trascorre giorni interi a\nciondolare vicino ai corsi d’acqua."
        de:
          ruby: "FLEGMON benutzt seinen Schweif, um \nBeute zu fangen, indem es ihn an einem \nFlussufer ins Wasser taucht.\fDieses POKéMON vergisst häufig, was es\ngerade tun wollte, und verbringt ganze \nTage damit, am Ufer herumzutrödeln."
          sapphire: "FLEGMON benutzt seinen Schweif, um \nBeute zu fangen, indem es ihn an einem \nFlussufer ins Wasser taucht.\fDieses POKéMON vergisst häufig, was es\ngerade tun wollte, und verbringt ganze \nTage damit, am Ufer herumzutrödeln."
        es:
          ruby: "SLOWPOKE usa la cola para atrapar a sus\npresas metiéndolas bajo el agua en las\nriberas de los ríos. Con todo, es\folvidadizo, se le puede pasar lo que\nestaba haciendo y quedarse días\nenteros holgazaneando en la orilla."
          sapphire: "SLOWPOKE usa la cola para atrapar a sus\npresas metiéndolas bajo el agua en las\nriberas de los ríos. Con todo, es\folvidadizo, se le puede pasar lo que\nestaba haciendo y quedarse días\nenteros holgazaneando en la orilla."
