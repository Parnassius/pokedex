        defense: 62
        special_attack: 80
        special_defense: 82
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - water_1
        - bug
      abilities:
        - intimidate
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          ruby: "しょっかくの　めだま　もようで　てきを　いかく。\n４まいの　はねを　つかい　ヘリコプターの　ように\nくうちゅうで　ぜんごさゆう　じゆうに　すすめる。"
          sapphire: "おこった　ひょうじょうの　めだま　もようが\nかなしそうに　たれさがっている　ときは\nゆうだちの　ふりだす　ぜんちょうと　いわれる。"
        en:
          ruby: "MASQUERAIN intimidates enemies with\nthe eyelike patterns on its antennas.\nThis POKéMON flaps its four wings to\ffreely fly in any direction - even\nsideways and backwards - as if it were\na helicopter."
          sapphire: "MASQUERAIN’s antennas have eyelike\npatterns that usually give it an angry\nlook. If the “eyes” are droopy and\fappear sad, it is said to be a sign\nthat a heavy rainfall is on its way."
        fr:
          ruby: "MASKADRA intimide ses ennemis grâce\naux motifs en forme de regard sur\nses antennes. En battant des ailes, ce\fPOKéMON peut voler librement dans\ntoutes les directions, même\nlatéralement ou à reculons."
          sapphire: "Les antennes de MASKADRA ont la\nforme de grands yeux qui lancent un\nregard noir. Si ces «yeux» sont tristes,\fcela signifie qu’un déluge se prépare."
        it:
          ruby: "MASQUERAIN intimorisce i nemici\ncon il motivo a forma d’occhio sulle\nantenne. Agita le quattro ali per\fvolare libero in ogni direzione, anche\nlateralmente e posteriormente, come\nfosse un elicottero."
          sapphire: "Le antenne di MASQUERAIN presentano\nun motivo a forma d’occhio che gli\nconferisce un aspetto aggressivo.\fQuando questa specie di occhi ha\nl’aspetto triste e depresso significa\nche si sta avvicinando un acquazzone."
        de:
          ruby: "MASKEREGEN schüchtert seine Feinde\nmit den augenähnlichen Mustern auf\nseinen Antennen ein. Dieses POKéMON\fkann mit seinen vier Flügeln wie ein\nHubschrauber in jede Richtung fliegen,\nsogar seitwärts und rückwärts."
          sapphire: "MASKEREGENs Antennen haben ein\naugenähnliches Muster, das ihm ein\nFurcht erregendes Äußeres verleiht.\fWenn seine „Augen“ \ntraurig aussehen, ist ein heftiger \nRegenguss im Anzug."
        es:
          ruby: "MASQUERAIN intimida a sus enemigos\ncon los ojos que tiene dibujados en las\nantenas. Este POKéMON bate las cuatro\falas que tiene para volar libremente en\ncualquier dirección (hasta de lado y\nhacia atrás) como un helicóptero."
          sapphire: "MASQUERAIN tiene unas antenas\ncon ojos dibujados que le dan aspecto\nde estar enfadado. Si tiene los “ojos”\fmedio cerrados y con aspecto triste,\nes probable que esté a punto de caer\nun buen aguacero."
shroomish:
  species_id: 285
  names:
    jp_kana: キノココ
    en: SHROOMISH
    fr: BALIGNON
    it: SHROOMISH
    de: KNILZ
    es: SHROOMISH
  forms:
    shroomish:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 60
        special_attack: 40
        special_defense: 60
        speed: 35
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - fairy
        - grass
      abilities:
        - effect_spore
      descriptions:
        jp_kana:
          ruby: "ふかい　もりの　しめった　じめんに　せいそく。\nおちばの　したで　じっとしていることが　おおい。\nおちばが　つもって　できた　ふようどを　たべる。"
          sapphire: "きけんを　かんじると　からだを　ふるわせて\nあたまの　てっぺんから　ほうしを　ばらまくぞ。\nくさきも　しおれてしまうほどの　もうどくだ。"
        en:
          ruby: "SHROOMISH live in damp soil in the dark\ndepths of forests. They are often\nfound keeping still under fallen leaves.\fThis POKéMON feeds on compost that\nis made up of fallen, rotted leaves."
          sapphire: "If SHROOMISH senses danger, it shakes\nits body and scatters spores from the\ntop of its head.\fThis POKéMON’s spores are so toxic,\nthey make trees and weeds wilt."
        fr:
          ruby: "Les BALIGNON vivent dans les sols\nhumides et les recoins sombres des\ngrandes forêts. On les trouve souvent\fimmobiles sous les feuilles mortes. Ce\nPOKéMON se nourrit d’un compost fait\nde feuilles mortes pourries."
          sapphire: "Lorsque BALIGNON sent un danger,\nil secoue son corps et répand ses\nspores du haut de sa tête.\fLes spores de ce POKéMON sont si\ntoxiques qu’elles font faner les arbres\net les herbes."
        it:
          ruby: "SHROOMISH vive nel suolo umido\nnel cuore della foresta buia. Spesso\nsi nasconde sotto le foglie cadute.\fSi ciba dell’humus creato dal letto\ndi foglie decomposte sul terreno."
          sapphire: "In caso di pericolo SHROOMISH agita\nil proprio corpo spargendo spore dalla\nsommità del capo.\fLe spore di questo POKéMON sono\ncosì tossiche da far appassire\nfiori e piante."
        de:
          ruby: "KNILZ lebt im feuchten Erdboden\nfinsterer Wälder. Es wird oft reglos\nunter herabgefallenen Blättern\fgefunden. Dieses POKéMON ernährt sich\nvon Kompost aus verrotteten Blättern."
          sapphire: "Wenn KNILZ Gefahr wittert, \nschüttelt es seinen Körper und verteilt\nSporen von seinem Kopf.\fDiese Sporen sind so giftig, dass Bäume\nund Gräser davon eingehen."
        es:
          ruby: "Los SHROOMISH viven en zonas\nhúmedas en la profunda oscuridad del\nbosque. Suelen quedarse tranquilamente\fbajo las hojas caídas. Se alimentan\ndel abono que éstas generan al empezar\na pudrirse."
          sapphire: "Si SHROOMISH siente peligro,\nagita el cuerpo y libera esporas\nvenenosas por la cabeza.\fEstas esporas son tan tóxicas\nque pueden hacer que se marchiten\nlos árboles y hasta las malas hierbas."
breloom:
  species_id: 286
  names:
    jp_kana: キノガッサ
    en: BRELOOM
    fr: CHAPIGNON
    it: BRELOOM
    de: KAPILZ
    es: BRELOOM
  forms:
    breloom:
      form_id: 0
      base_stats:
        hp: 60
        attack: 130
        defense: 80
        special_attack: 60
        special_defense: 60
        speed: 70
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - fighting
      egg_groups:
        - fairy
        - grass
      abilities:
        - effect_spore
      descriptions:
        jp_kana:
          ruby: "かろやかな　フットワークで　てきに　ちかづき\nのびちぢみする　うでで　パンチを　くりだす。\nボクサー　かおまけの　テクニックの　もちぬし。"
          sapphire: "シッポの　タネは　どくの　ほうしが　かたまって\nできた　ものなので　たべたら　たいへんだ。\nひとくちで　おなかが　グルグル　なりだすぞ。"
        en:
          ruby: "BRELOOM closes in on its foe with light\nand sprightly footwork, then throws\npunches with its stretchy arms.\fThis POKéMON’s fighting technique puts\nboxers to shame."
          sapphire: "The seeds ringing BRELOOM’s tail are\nmade of hardened toxic spores. It is\nhorrible to eat the seeds.\fJust taking a bite of this POKéMON’s\nseed will cause your stomach to rumble."
        fr:
          ruby: "CHAPIGNON se rapproche de son ennemi\nen se servant de son jeu de jambes, puis\ndonne des coups de poing avec ses\fgrands bras. La technique de combat de\nce POKéMON est digne des meilleurs\nboxeurs."
          sapphire: "Les graines autour de la queue de\nCHAPIGNON sont des spores toxiques.\nElles sont totalement immangeables.\fUne simple bouchée d’une graine de ce\nPOKéMON peut causer de grandes\ndouleurs à l’estomac."
        it:
          ruby: "BRELOOM si avvicina al nemico con\npassettini leggeri e veloci, poi sferra\nscariche di pugni con gli elastici arti\fsuperiori. Le sue tecniche di lotta\nsuperano quelle dei pugili più esperti."
          sapphire: "I semi sulla punta della coda di BRELOOM\nsono costituiti da spore tossiche\nindurite. Se ingeriti hanno un effetto\forribile, infatti un solo morso a questi\nsemi crea gravi disturbi allo stomaco."
        de:
          ruby: "Mit leichtfüßiger Beinarbeit nähert \nsich KAPILZ seinen Feinden und\nschlägt dann mit seinen dehnbaren\fArmen um sich. Die Kampftechnik dieses\nPOKéMON treibt Profiboxern die\nSchamesröte ins Gesicht."
          sapphire: "Die Samen am Schweif von KAPILZ\nbestehen aus gehärteten Giftsporen.\nMan sollte sie lieber nicht essen.\fEin einziger Bissen davon kann eine\nheftige Magenverstimmung hervorrufen."
        es:
          ruby: "BRELOOM se acerca al enemigo realizando\nun juego de piernas ágil y enérgico. Y, a \ncontinuación, le da unos puñetazos con\flos brazos elásticos que tiene. Las\ntécnicas de lucha que usa dejan\nen ridículo al boxeador más profesional."
          sapphire: "Las semillas que BRELOOM tiene\nprendidas de la cola están formadas\npor sólidas esporas tóxicas.\fComérselas puede resultar fatal.\nHasta el más mínimo bocado puede\nhacerte polvo el estómago."
slakoth:
  species_id: 287
  names:
    jp_kana: ナマケロ
    en: SLAKOTH
    fr: PARECOOL
    it: SLAKOTH
    de: BUMMELZ
    es: SLAKOTH
  forms:
    slakoth:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 35
        special_defense: 35
        speed: 30
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - truant
      descriptions:
        jp_kana:
          ruby: "１にち　２０じかん　いじょう　ねそべっている。\nほとんど　からだを　うごかさないので　はっぱを\n３まい　たべれば　１にちの　しょくじが　おわる。"
          sapphire: "しんぞうの　こどうは　１ぷんかんに　１かい。\nとにかく　じっと　ねそべっている　ポケモンで\nうごく　すがたを　みることは　ほとんど　ない。"
        en:
          ruby: "SLAKOTH lolls around for over twenty\nhours every day. Because it moves so\nlittle, it does not need much food.\fThis POKéMON’s sole daily meal consists\nof just three leaves."
          sapphire: "SLAKOTH’s heart beats just once a\nminute. Whatever happens, it is\ncontent to loaf around motionless.\fIt is rare to see this POKéMON in\nmotion."
        fr:
          ruby: "PARECOOL se prélasse pendant plus\nde vingt heures par jour. Il bouge\ntellement peu qu’il n’a presque pas\fbesoin de manger. Le repas quotidien de\nce POKéMON n’est constitué que de\ntrois feuilles."
          sapphire: "Le cœur de PARECOOL ne bat qu’une\nfois par minute. Quoi qu’il arrive, il se\ncontente de s’avachir, immobile.\fIl est très rare de voir ce POKéMON\nse déplacer."
        it:
          ruby: "SLAKOTH ciondola in ozio per oltre\nventi ore al giorno. Poiché si muove\ncosì poco, non ha bisogno di molto\fnutrimento. L’unico pasto giornaliero\ndi questo POKéMON consiste in tre\nfoglie fresche."
          sapphire: "Il cuore di SLAKOTH batte con una\nfrequenza di appena un battito al\nminuto. Qualsiasi cosa accada,\fnon si muove mai. Infatti adora\npoltrire, riducendo al minimo\ni suoi movimenti."
        de:
          ruby: "BUMMELZ geht zwanzig Stunden pro Tag\nmüßig. Da es sich sehr wenig bewegt,\nbraucht es auch nicht viel Nahrung.\fSeine Tagesration besteht lediglich aus\ndrei Blättern."
          sapphire: "BUMMELZ’ Herz schlägt nur ein Mal pro\nMinute. Dieses POKéMON ist damit\nzufrieden, bewegungslos\fherumzulungern. Nur ganz selten sieht\nman dieses POKéMON sich bewegen."
        es:
          ruby: "SLAKOTH se pasa más de veinte horas\nal día tumbado. Como se mueve tan poco,\nnecesita muy poca comida.\fDe hecho, la única toma que hace al\ndía la componen tan solo tres hojas."
          sapphire: "A SLAKOTH le late el corazón una vez\npor minuto. Ya puede pasar lo que pase,\nque este POKéMON no mueve un dedo.\fEstá todo el día holgazaneando.\nEs muy raro verlo en movimiento."
vigoroth:
  species_id: 288
  names:
    jp_kana: ヤルキモノ
    en: VIGOROTH
    fr: VIGOROTH
    it: VIGOROTH
    de: MUNTIER
    es: VIGOROTH
  forms:
    vigoroth:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 80
        special_attack: 55
        special_defense: 55
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          ruby: "いつも　あばれたくて　ウズウズ　している。\n１ぷんでも　すわっている　ことが　たえられない。\nうごいて　いないと　ストレスが　たまってしまう。"
          sapphire: "じっとしている　ことが　できない　ポケモンだ。\nねむろうとしても　からだの　ちが　たぎってしまい\nもりじゅうを　かけまわらないと　おさまらない。"
        en:
          ruby: "VIGOROTH is always itching and agitated\nto go on a wild rampage. It simply can’t\ntolerate sitting still for even a minute.\fThis POKéMON’s stress level rises if it\ncan’t be moving constantly."
          sapphire: "VIGOROTH is simply incapable of\nremaining still. Even when it tries to\nsleep, the blood in its veins grows\fagitated, compelling this POKéMON to\nrun wild throughout the jungle before\nit can settle down."
        fr:
          ruby: "VIGOROTH est toujours impatient de\nse défouler. Il ne supporte pas l’idée de\nrester sans rien faire, même une minute.\fLe niveau de stress de ce POKéMON\naugmente énormément s’il ne peut pas\nbouger."
          sapphire: "VIGOROTH ne tient pas en place.\nMême quand il essaye de dormir, le\nsang dans ses veines s’agite,\fobligeant ce POKéMON à courir comme\nun fou dans la forêt pour s’épuiser afin\nde pouvoir se reposer."
        it:
          ruby: "VIGOROTH scalpita e smania\ncontinuamente dalla voglia di correre\nselvaggiamente. Non sopporta di stare\ffermo neanche un secondo. Il livello\ndi stress di questo POKéMON va alle\nstelle in mancanza di movimento."
          sapphire: "VIGOROTH è incapace di stare fermo\ne tranquillo. Anche quando cerca di\ndormire, il sangue gli ribolle nelle vene,\fcostringendolo a correre\nselvaggiamente in lungo e in largo nella\nforesta prima di riuscire a calmarsi."
        de:
          ruby: "MUNTIER brennt darauf, sich\nauszutoben. Es kann nicht einmal für\neine Minute stillsitzen. Es gerät in\fStress, wenn es sich nicht andauernd\nbewegen kann."
          sapphire: "MUNTIER findet einfach keine Ruhe.\nWenn es versucht zu schlafen, beginnt\ndas Blut in seinen Adern zu pulsieren.\fDann muss es wie wild durch den \nDschungel rennen, um überhaupt Ruhe zu\nfinden."
        es:
          ruby: "VIGOROTH está continuamente inquieto, \nrabiando por salir corriendo sin control.\nEstar quieto un solo minuto es superior\fa sus fuerzas. Si no puede estar en\ncontinuo movimiento, el nivel de estrés\nde este POKéMON se dispara."
          sapphire: "A VIGOROTH le resulta totalmente\nimposible estarse quieto. Cuando\nintenta dormir, la sangre le fluye\fa velocidad de vértigo y se pone\na correr por el bosque de un lado\na otro hasta que se calma."
slaking:
  species_id: 289
  names:
    jp_kana: ケッキング
    en: SLAKING
    fr: MONAFLEMIT
    it: SLAKING
    de: LETARKING
    es: SLAKING
  forms:
    slaking:
      form_id: 0
      base_stats:
        hp: 150
        attack: 160
        defense: 100
        special_attack: 95
        special_defense: 65
        speed: 100
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - truant
      descriptions:
        jp_kana:
          ruby: "１にちじゅう　ねそべったまま　くらす　ポケモン。\nての　とどく　ばしょに　はえている　くさを　たべ\nくさが　なくなると　しぶしぶ　ばしょを　かえる。"
          sapphire: "そうげんに　きざまれた　はんけい　１メートルの\nわっかは　ケッキングが　ねそべったまま　まわりの\nくさを　たべつくして　できた　ものだ。"
        en:
          ruby: "SLAKING spends all day lying down and\nlolling about.\nIt eats grass growing within its reach.\fIf it eats all the grass it can reach,\nthis POKéMON reluctantly moves to\nanother spot."
          sapphire: "Wherever SLAKING live, rings of over\na yard in diameter appear in grassy\nfields. They are made by the POKéMON\fas it eats all the grass within reach\nwhile lying prone on the ground."
        fr:
          ruby: "MONAFLEMIT passe toute sa journée\nallongé à paresser. Il mange l’herbe qu’il\ntrouve à portée de sa main.\fUne fois qu’il a mangé toute l’herbe\nautour de lui, ce POKéMON change\nd’endroit, à contrecœur."
          sapphire: "On trouve parfois des cercles de plus\nd’un mètre de rayon totalement\ndésherbés dans les plaines. Ils sont\ffaits par les MONAFLEMIT qui\npassent leurs journées allongés à\nmanger toute l’herbe à portée de main."
        it:
          ruby: "SLAKING passa tutto il giorno disteso\ncomodamente, mangiando l’erba\nche cresce a portata di mano.\fAnche dopo aver esaurito l’erba vicino\na sé, è raro che si sposti in un altro\nluogo."
          sapphire: "Dove vive SLAKING, si formano anelli\ndel raggio di un metro nei prati\nerbosi. Infatti, quando questo POKéMON\fsi stende prono al suolo, mangia\ntutta l’erba che riesce a raggiungere."
        de:
          ruby: "LETARKING verbringt den Tag damit,\nherumzuliegen und nichts zu tun. Es \nernährt sich von Gras, das in seiner\fReichweite wächst. Hat es alles\naufgefressen, so sucht es sich\nwiderwillig ein anderes Plätzchen."
          sapphire: "Wo dieses LETARKING lebt, hinterlässt\nes Kreise von 1 m Radius auf den\nWiesen. Es frisst nämlich all das Gras,\fdas in seiner Reichweite wächst. Dabei\nliegt es bäuchlings auf dem Boden."
        es:
          ruby: "SLAKING se pasa todo el día tumbado\nvagueando. Se come la hierba que tiene\na su alcance y, una vez ha acabado\fcon ella, se va de mala gana\na otro sitio."
          sapphire: "Cuando SLAKING se instala a vivir\nen una zona, aparecen círculos\nde un metro de radio de terreno\fbaldío, pues se come todo el césped\nque pilla mientras está tumbado boca\nabajo."
nincada:
  species_id: 290
  names:
    jp_kana: ツチニン
    en: NINCADA
    fr: NINGALE
    it: NINCADA
    de: NINCADA
    es: NINCADA
  forms:
    nincada:
      form_id: 0
      base_stats:
        hp: 31
        attack: 45
        defense: 90
        special_attack: 30
        special_defense: 30
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - ground
      egg_groups:
        - bug
      abilities:
        - compound_eyes
      descriptions:
        jp_kana:
          ruby: "なんねんも　まっくらな　つちの　なかで　くらす。\nきの　ねっこから　えいようを　きゅうしゅうして\nじっと　うごかず　しんかの　ときを　まっている。"
          sapphire: "するどい　ツメで　じゅもくの　ねっこを　けずり\nすいぶんや　えいようを　きゅうしゅうする。\nたいようの　ひかりは　まぶしいので　にがて。"
        en:
          ruby: "NINCADA lives underground for many\nyears in complete darkness.\nThis POKéMON absorbs nutrients from\fthe roots of trees. It stays motionless\nas it waits for evolution."
          sapphire: "NINCADA lives underground. It uses its\nsharp claws to carve the roots of trees\nand absorb moisture and nutrients.\fThis POKéMON can’t withstand bright\nsunlight so avoids it."
        fr:
          ruby: "NINGALE vit depuis des années sous\nterre, dans l’obscurité la plus totale.\nCe POKéMON absorbe les nutriments\fdes racines des arbres. Il reste\nimmobile, attendant patiemment\nson évolution."
          sapphire: "NINGALE vit sous terre. Il utilise\nses griffes acérées pour creuser les\nracines des arbres et en absorber\fl’humidité et les nutriments. Ce POKéMON\nne supporte pas la lumière du soleil."
        it:
          ruby: "NINCADA vive sottoterra per molti anni\nnell’oscurità più assoluta. Questo\nPOKéMON assume le sostanze nutritive\fdalle radici degli alberi. Rimane immobile\nin attesa dell’evoluzione."
          sapphire: "NINCADA vive sottoterra. Usa i suoi\nartigli affilati per incidere le radici\ndegli alberi e assorbirne l’acqua e\faltre sostanze nutritive. Il POKéMON\nnon sopporta la luce del sole, quindi\ncerca di evitarla."
        de:
          ruby: "NINCADA lebt viele Jahre in absoluter\nDunkelheit unter der Erde. Dieses\nPOKéMON nimmt Nährstoffe aus\fBaumwurzeln auf. Es rührt sich nicht,\nda es auf seine Entwicklung wartet."
          sapphire: "NINCADA lebt unter der Erde. Es benutzt\nseine scharfen Krallen, um die Wurzeln\nvon Bäumen freizulegen und an\fFlüssigkeit und Nährstoffe zu kommen. \nDieses POKéMON kann grelles Sonnen-\nlicht nicht aushalten und meidet es."
        es:
          ruby: "NINCADA vive bajo tierra en la\nmás absoluta oscuridad durante años.\nEste POKéMON absorbe nutrientes de\flas raíces de los árboles y permanece\ninmóvil a la espera de la evolución."
          sapphire: "NINCADA vive bajo tierra y usa las\ngarras afiladas que tiene para escarbar\ny buscar raíces de árboles y absorber\fhumedad y nutrientes.\nEste POKéMON huye de la luz del sol\nporque le hace daño."
ninjask:
  species_id: 291
  names:
    jp_kana: テッカニン
    en: NINJASK
    fr: NINJASK
    it: NINJASK
    de: NINJASK
    es: NINJASK
  forms:
    ninjask:
      form_id: 0
      base_stats:
        hp: 61
        attack: 90
        defense: 45
        special_attack: 50
        special_defense: 50
        speed: 160
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - speed_boost
      descriptions:
        jp_kana:
          ruby: "こうそくで　うごきまわり　すがたが　みえない。\nなきごえしか　きこえて　こないので　ながいあいだ\nとうめいな　ポケモンと　かんがえられていた。"
          sapphire: "じょうずに　そだてないと　いうことを　きかず\nおおごえで　なきつづけるので　トレーナーの\nうでが　ためされる　ポケモンと　いわれている。"
        en:
          ruby: "NINJASK moves around at such a high\nspeed that it cannot be seen, even\nwhile its crying can be clearly heard.\fFor that reason, this POKéMON was long\nbelieved to be invisible."
          sapphire: "If NINJASK is not trained properly,\nit will refuse to obey the TRAINER and\ncry loudly continuously.\fBecause of this quality, this POKéMON\nis said to be one that puts the\nTRAINER’s abilities to the test."
        fr:
          ruby: "NINJASK se déplace tellement vite\nqu’il est impossible de le voir. En\nrevanche, on entend clairement son cri.\fOn a pendant très longtemps cru que\nce POKéMON était invisible."
          sapphire: "Si NINJASK n’est pas dressé\ncorrectement, il refuse d’obéir à son\nDRESSEUR et crie sans arrêt.\fC’est pourquoi on dit que ce POKéMON\npeut réellement mettre son\nDRESSEUR à l’épreuve."
        it:
          ruby: "NINJASK si muove ad una velocità tale\nda rendersi praticamente invisibile,\nnonostante il suo verso si possa udire\fchiaramente. Per questo motivo, per\nmolto tempo si è pensato che fosse\neffettivamente invisibile."
          sapphire: "Se NINJASK non viene allenato\nadeguatamente, si rifiuta di obbedire\nall’ALLENATORE, lamentandosi di\fcontinuo. Questa sua caratteristica\nmette alla prova le capacità di\nciascun ALLENATORE di POKéMON."
        de:
          ruby: "NINJASK bewegt sich so schnell, dass\nman es nicht sehen kann. Seine Schreie\nsind aber laut und deutlich zu hören.\fDeshalb hielt man dieses POKéMON lange\nfür unsichtbar."
          sapphire: "Wenn NINJASK nicht richtig trainiert\nwird, hört es nicht mehr auf seinen\nTRAINER und beginnt unaufhörlich und\flaut zu brüllen. Es stellt die Fähig-\nkeiten eines TRAINERs auf eine harte\nProbe."
        es:
          ruby: "NINJASK se mueve de un lado a otro a tal\nvelocidad que es imposible verlo. Sin\nembargo, como su zumbido no deja de\foírse, se pensó durante mucho tiempo\nque este POKéMON era invisible."
          sapphire: "Si NINJASK no recibe un entrenamiento\nadecuado, desobedece a su ENTRENADOR\ny empieza a dar zumbidos sin parar.\fEs muy buen POKéMON; todos dicen\nque pone a prueba las habilidades\nde su ENTRENADOR."
shedinja:
  species_id: 292
  names:
    jp_kana: ヌケニン
    en: SHEDINJA
    fr: MUNJA
    it: SHEDINJA
    de: NINJATOM
    es: SHEDINJA
  forms:
    shedinja:
      form_id: 0
      base_stats:
        hp: 1
        attack: 90
        defense: 45
        special_attack: 30
        special_defense: 30
        speed: 40
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - ghost
      egg_groups:
        - mineral
      abilities:
        - wonder_guard
      descriptions:
        jp_kana:
          ruby: "かたい　からだは　ぴくりとも　うごかない。\nせなかから　からだの　くうどうを　のぞくと\nたましいを　すいとられると　しんじられている。"
          sapphire: "ツチニンが　しんかしたとき　なぜか　かってに\nモンスターボールに　はいっている　ポケモンだ。\nからだは　まったく　うごかず　いきも　しない。"
        en:
          ruby: "SHEDINJA’s hard body doesn’t move -\nnot even a twitch. In fact, its body\nappears to be merely a hollow shell.\fIt is believed that this POKéMON will\nsteal the spirit of anyone peering into\nits hollow body from its back."
          sapphire: "SHEDINJA is a peculiar POKéMON.\nIt seems to appear unsought in a POKé\nBALL after a NINCADA evolves.\fThis bizarre POKéMON is entirely\nimmobile - it doesn’t even breathe."
        fr:
          ruby: "Le corps robuste de MUNJA ne\nbouge pas d’un pouce. En fait, son corps\nsemble être une coquille vide.\fCertains croient que ce POKéMON peut\nvoler l’âme de quiconque regarderait à\nl’intérieur de son corps creux."
          sapphire: "MUNJA est un étrange POKéMON. Il\nsemble apparaître sans raison dans une\nPOKé BALL après l’évolution\fd’un NINGALE. Ce POKéMON bizarre\nest totalement immobile. Il ne respire\nmême pas."
        it:
          ruby: "Il corpo coriaceo di SHEDINJA non\nsi muove neanche di un millimetro.\nIn realtà sembra quasi un guscio\fvuoto. Si dice che questo POKéMON\nrubi lo spirito di chiunque osi\nspiare dentro il suo guscio."
          sapphire: "SHEDINJA è molto particolare.\nPare comparire all’improvviso in una\nPOKé BALL dopo l’evoluzione di NINCADA.\fQuesto strano POKéMON è\ncompletamente immobile. Non è\nnemmeno in grado di respirare."
        de:
          ruby: "NINJATOMs harter Körper bewegt sich\nüberhaupt nicht. Er scheint bloß eine\nhohle Schale zu sein. Dieses POKéMON\fsoll angeblich die Seele eines jeden\nstehlen, der hinterrücks einen Blick in\nseinen hohlen Körper riskiert."
          sapphire: "NINJATOM ist ein ganz besonderes\nPOKéMON. Es taucht plötzlich in\neinem POKéBALL auf, nachdem sich\fein NINCADA entwickelt hat. Dieses\nPOKéMON ist absolut bewegungsunfähig\nund atmet nicht einmal."
        es:
          ruby: "SHEDINJA  tiene un cuerpo robusto que\nno mueve en absoluto. De hecho, parece\nuna especie de caparazón hueco.\fSe cree que si alguien se atreviera a\nmirarle por la espalda lo que tiene en su\ninterior, SHEDINJA le robaría el alma."
          sapphire: "SHEDINJA es un POKéMON peculiar.\nSegún parece, surge por las buenas\nen una POKé BALL cuando NINCADA\fevoluciona. Este raro POKéMON no se\nmueve nada; ni siquiera respira."
whismur:
  species_id: 293
