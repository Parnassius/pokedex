        - fire
        - ground
      egg_groups:
        - field
      abilities:
        - oblivious
      held_items:
        common: rawst_berry
        rare: rawst_berry
      descriptions:
        jp_kana:
          ruby: "たたかれても　きが　つかない　にぶさ　だが\nくうふくは　１びょうでも　がまん　できない。\nからだの　なかでは　マグマが　にえたぎっている。"
          sapphire: "１２００どの　マグマを　からだに　ためている。\nみずに　ぬれると　マグマが　ひえて　かたまり\nおもたくなるので　うごきが　にぶって　しまう。"
        en:
          ruby: "NUMEL is extremely dull witted - it\ndoesn’t notice being hit. However, it\ncan’t stand hunger for even a second.\fThis POKéMON’s body is a seething\ncauldron of boiling magma."
          sapphire: "NUMEL stores magma of almost 2,200\ndegrees F within its body. If it gets\nwet, the magma cools and hardens.\fIn that event, the POKéMON’s body\ngrows heavy and its movements become\nsluggish."
        fr:
          ruby: "CHAMALLOT est terriblement lent\nd’esprit. Il ne remarque même pas quand\nil est touché. Il ne supporte pas d’avoir\ffaim, même une seconde. Le corps de ce\nPOKéMON est comparable à un chaudron\nde magma bouillonnant."
          sapphire: "CHAMALLOT stocke du magma à\n1 200 degrés dans son corps. Lorsqu’il\nest mouillé, le magma se refroidit\fet durcit. Le corps du POKéMON devient\nalors très lourd et ses mouvements\ntrès lents."
        it:
          ruby: "NUMEL è estremamente tardo, tanto\nda non notare di essere attaccato.\nTuttavia, non sa resistere alla fame\fper più di un secondo. Il suo corpo\nè un calderone bollente di magma\nliquido."
          sapphire: "NUMEL accumula magma ad una\ntemperatura di 1.200 gradi centigradi\nall’interno del proprio corpo.\fSe si bagna, il magma si raffredda e si\nsolidifica. Se si appesantisce diventa\ngoffo nei movimenti."
        de:
          ruby: "CAMAUB ist nicht besonders helle. Es\nnimmt nicht einmal wahr, wenn es\ngetroffen wurde. Ein Hungergefühl\fallerdings kann es nicht einmal eine\nSekunde lang aushalten. In seinem\nKörper brodelt glühend heißes Magma."
          sapphire: "CAMAUB speichert fast 1200 Grad heißes\nMagma in seinem Körper. Wenn es nass\nwird, kühlt das Magma ab und wird hart.\fDadurch wird der Körper dieses POKéMON\nschwer und seine Bewegungen träge."
        es:
          ruby: "NUMEL tarda en percibir las cosas (no se\nentera ni cuando lo golpean). Pero se\nda cuenta enseguida de si tiene hambre.\fEl cuerpo de este POKéMON es un caldero\nde magma hirviendo."
          sapphire: "NUMEL acumula en su interior un magma\nde 1.200 grados centígrados. Si se\nmoja, el magma se enfría y se solidifica.\fCuando esto ocurre, aumenta su tamaño\ny se vuelve pesado y lento en sus\nmovimientos."
camerupt:
  species_id: 323
