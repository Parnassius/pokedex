        - insomnia
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ruby: "ねたみ　うらみの　かんじょうに　ひきよせられる。\nだれかを　うらむ　こころが　つよく　なると\nカゲボウズが　のきしたに　ずらりと　ならぶぞ。"
          sapphire: "ひとの　こころに　ある　うらみや　ねたみ　などの\nかんじょうを　たべて　せいちょうする　ポケモン。\nうらむ　こころを　さがして　まちを　さまよう。"
        en:
          ruby: "SHUPPET is attracted by feelings\nof jealousy and vindictiveness.\nIf someone develops strong feelings of\fvengeance, this POKéMON will appear\nin a swarm and line up beneath the eaves\nof that person’s home."
          sapphire: "SHUPPET grows by feeding on dark\nemotions, such as vengefulness and \nenvy, in the hearts of people.\fIt roams through cities in search of\ngrudges that taint people."
        fr:
          ruby: "Les POLICHOMBR sont attirés par les\nsentiments de jalousie et les esprits\nrevanchards. Si quelqu’un veut\fse venger, ces POKéMON\napparaissent en nuée et s’alignent\ndevant la porte des gens concernés."
          sapphire: "POLICHOMBR grandit en se nourrissant\ndes émotions négatives des gens, comme\nle désir de vengeance ou la jalousie.\fIl erre dans les villes à la recherche des\ngens qui n’ont pas le moral."
        it:
          ruby: "SHUPPET è attratto dai sentimenti\nturpi di gelosia e vendetta. Se qualcuno\nserba un forte rancore, questi POKéMON\farrivano a frotte per annidarsi sotto\ni cornicioni di casa sua."
          sapphire: "SHUPPET cresce alimentandosi di\nsentimenti turpi, come la vendetta e\nl’invidia, insiti nel cuore delle persone.\fSi aggira per le città in cerca del\nrancore che insudicia gli animi."
        de:
          ruby: "SHUPPET wird durch Gefühle wie Neid und\nRachsucht angezogen. Wenn jemand\nstarke Rachegelüste entwickelt,\ferscheint dieses POKéMON in Scharen\nund reiht sich unter der Dachrinne der\nPerson auf."
          sapphire: "SHUPPET wächst, indem es sich von\ndüsteren Gefühlen wie Rachsucht und\nNeid ernährt.\fEs streift durch Städte und sucht nach\nEmpfindungen, die als Ursache für den\nVerderb der Menschen gelten."
        es:
          ruby: "A SHUPPET le atraen los sentimientos\nde celos y rencor. Si alguien desarrolla\nfuertes sentimientos de venganza,\faparecerá una multitud de SHUPPET\nque se quedará bajo los aleros\nde su casa."
          sapphire: "SHUPPET crece alimentándose de\nsentimientos negativos como el rencor\ny la envidia, que nacen en el corazón\fde las personas. Se dedica a vagar\npor las ciudades en busca del rencor\nque contamina a la gente."
banette:
  species_id: 354
  names:
    jp_kana: ジュペッタ
    en: BANETTE
    fr: BRANETTE
    it: BANETTE
