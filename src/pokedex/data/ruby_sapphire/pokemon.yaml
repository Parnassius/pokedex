          sapphire: "DIGDA wird zumeist auf Farmen\ngezüchtet. Denn wo auch immer dieses\nPOKéMON zu graben beginnt, hinterlässt\fes Erde, die für das Anpflanzen von\nFeldfrüchten perfekt geeignet und für\nden Anbau köstlichen Gemüses ideal ist."
        es:
