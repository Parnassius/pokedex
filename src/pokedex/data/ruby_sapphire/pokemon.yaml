      descriptions:
        jp_kana:
          ruby: "いんせきの　おちた　ばしょから　みつかったため\nうちゅうから　やってきた　ポケモンという　せつも\nあるが　まだ　しょうめいされていない。"
          sapphire: "まんげつの　じき　かっぱつになる　しゅうせい。\nくうちゅうに　ういて　いどうし　あかい　ひとみは\nみたものの　からだを　すくませる　はくりょく。"
        en:
          ruby: "LUNATONE was discovered at a location\nwhere a meteorite fell. As a result, some\npeople theorize that this POKéMON\fcame from space. However, no one has\nbeen able to prove this theory so far."
          sapphire: "LUNATONE becomes active around the\ntime of the full moon. Instead of\nwalking, it moves by floating in midair.\fThe POKéMON’s intimidating red eyes\ncause all those who see it to become\ntransfixed with fear."
        fr:
          ruby: "SELEROC fut découvert à côté\nd’un cratère de météorite. Du\ncoup, certaines personnes pensent que\fce POKéMON vient de l’espace.\nCependant, rien ne peut prouver\ncette théorie pour le moment."
          sapphire: "SELEROC ne s’active que pendant la\npériode de pleine lune. Il ne marche\npas, mais se déplace en lévitant.\fLes yeux rouges et intimidants de ce\nPOKéMON pétrifient ses ennemis\nde terreur."
        it:
          ruby: "LUNATONE è stato scoperto nel luogo\ndove una volta cadde un meteorite.\nSi è pertanto dedotto che questo\fPOKéMON venga dallo spazio.\nTuttavia, questa teoria non è\nancora stata confermata."
          sapphire: "LUNATONE si desta quando domina\nla luna piena. Invece di camminare,\nfluttua a mezz’aria.\fI suoi occhi rossi così minacciosi\nterrorizzano chiunque li guardi."
        de:
          ruby: "LUNASTEIN wurde in der Nähe eines\nMeteoritenkraters entdeckt. Daher\nnehmen einige Menschen an, dass\fdieses POKéMON aus dem Weltall stammt.\nDiese Theorie konnte allerdings bisher\nnoch nicht belegt werden."
          sapphire: "LUNASTEIN wird bei Vollmond aktiv.\nEs läuft nicht, sondern schwebt\ndurch die Luft.\fDie bedrohlichen roten Augen dieses\nPOKéMON lassen alle, die es sehen,\nvor Angst erstarren."
        es:
          ruby: "LUNATONE fue descubierto en el lugar\nde impacto de un meteorito. Por eso,\nhay quien especula con la idea de que\fprocede del espacio. Con todo, hasta el\ndía de hoy nadie ha podido probar esta\nteoría."
          sapphire: "LUNATONE entra en actividad en épocas\nde luna llena más o menos. No camina,\nse desplaza flotando por el aire.\fTiene unos ojos rojos sobrecogedores\nque cortan la respiración a todo aquel\nque los ve."
