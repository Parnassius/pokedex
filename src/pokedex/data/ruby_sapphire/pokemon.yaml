          sapphire: "OCTILLERY afferra il nemico con i\ntentacoli immobilizzandolo prima di\nsferrare il colpo finale.\fSe il nemico è molto forte,\nOCTILLERY sputa inchiostro e scappa."
        de:
          ruby: "OCTILLERY saugt sich mit seinen\nTentakeln an einem Feind fest. Dieses\nPOKéMON betäubt seinen Gegner,\fbevor es ihm den Rest gibt.\nWenn ein Feind zu stark ist, speit es\nTinte aus und flüchtet."
          sapphire: "OCTILLERY saugt sich mit seinen\nTentakeln an einem Feind fest. Dieses\nPOKéMON betäubt seinen Gegner,\fbevor es ihm den Rest gibt.\nWenn ein Feind zu stark ist, speit es\nTinte aus und flüchtet."
        es:
