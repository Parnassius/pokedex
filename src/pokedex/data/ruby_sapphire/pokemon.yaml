      descriptions:
        jp_kana:
          ruby: "うちゅうから　おちてきたと　いわれる　しんしゅ。\nくうちゅうに　うかび　おともなく　いどうする。\nたたかいに　なると　つよい　ひかりを　はなつ。"
          sapphire: "たいよう　こうせんが　パワーの　みなもと。\nあいての　こころを　よみとると　いわれている。\nからだを　かいてんさせて　こうねつを　はなつ。"
        en:
          ruby: "SOLROCK is a new species of POKéMON\nthat is said to have fallen from space.\nIt floats in air and moves silently.\fIn battle, this POKéMON releases\nintensely bright light."
          sapphire: "Sunlight is the source of SOLROCK’s\npower. It is said to possess the ability\nto read the emotions of others.\fThis POKéMON gives off intense heat\nwhile rotating its body."
        fr:
          ruby: "SOLAROC est une nouvelle espèce\nde POKéMON. On raconte qu’il serait\ntombé de l’espace. Il flotte dans les\fairs et se déplace silencieusement. Au\ncombat, ce POKéMON libère une lumière\nintense."
          sapphire: "La lumière du soleil est à l’origine du\npouvoir de SOLAROC. On raconte\nqu’il peut lire les pensées d’autrui.\fCe POKéMON peut libérer une chaleur\ninsoutenable en faisant tournoyer\nson corps."
        it:
          ruby: "SOLROCK è una nuova specie di POKéMON\nche pare sia precipitata dallo spazio.\nFluttua a mezz’aria spostandosi\fsilenziosamente. In lotta emana\nuna luce estremamente intensa."
          sapphire: "La luce solare è la fonte primaria\ndell’energia di SOLROCK. Pare che\nriesca a carpire i pensieri degli altri.\fIl POKéMON emana un calore\nintenso roteando vorticosamente."
        de:
          ruby: "SONNFEL ist eine neue POKéMON-Spezies,\ndie angeblich aus dem Weltall\nkam. Es gleitet durch die\fLuft und bewegt sich leise. Im Kampf\nsetzt dieses POKéMON sehr helles Licht\nein."
          sapphire: "Aus Sonnenlicht zieht SONNFEL seine\nEnergie. Es kann angeblich die Emotio-\nnen anderer sehen.\fDieses POKéMON gibt eine starke Hitze\nab, wenn es sich um die eigene Achse\ndreht."
        es:
          ruby: "SOLROCK pertenece a una nueva especie\nde POKéMON a la que se le atribuye una\nprocedencia extraterrestre.\fEste POKéMON permanece flotando en el\naire y se mueve muy despacio. Al luchar,\ndesprende una luz viva e intensa."
          sapphire: "La fuente de energía de SOLROCK es la\nluz del sol. Dicen que tiene la habilidad\nde leer la mente de los demás.\fAl rotar, libera mucho calor."
barboach:
  species_id: 339
