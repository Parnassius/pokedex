      descriptions:
        jp_kana:
          ruby: "びんかんな　ヒゲは　すぐれた　レーダーだ。\nドロの　なかから　２ほんの　ヒゲだけを　だして\nえものが　ちかよってくるのを　まちかまえている。"
          sapphire: "からだが　ヌルヌルの　まくで　おおわれているので\nてきに　つかまれても　ヌルリと　にげだせるのだ。\nヌルヌルが　かわくと　からだが　よわってしまう。"
        en:
          ruby: "BARBOACH’s sensitive whiskers serve\nas a superb radar system.\nThis POKéMON hides in mud, leaving only\fits two whiskers exposed while it waits\nfor prey to come along."
          sapphire: "BARBOACH’s body is covered with a\nslimy film. If a foe grabs it, this\nPOKéMON just slips out of the enemy’s\fgrip.\nThis POKéMON grows weak if the slimy\ncoating dries up."
        fr:
          ruby: "Les vibrisses sensibles de BARLOCHE\nagissent comme un système radar\nsophistiqué. Ce POKéMON se cache dans\fla boue, laissant dépasser ses\nvibrisses, et attend que sa proie passe\nà proximité."
          sapphire: "Le corps de BARLOCHE est couvert\nd’un voile visqueux. Lorsqu’un ennemi\nl’attrape, ce POKéMON peut se glisser\fhors de son étreinte. Il s’affaiblit\nquand la pellicule visqueuse\nde son corps s’assèche."
        it:
          ruby: "I sensibili baffi di BARBOACH fungono\nda sistema radar precisissimo.\nIl POKéMON vive nel fango, lasciando\fesposti soltanto i due baffi mentre\nattende pazientemente che\nsi avvicini la preda."
          sapphire: "Il corpo di BARBOACH è coperto da\nuna pellicola viscida. Se un nemico\ncerca di afferrarlo, il POKéMON\fgli scivola via dalle grinfie.\nSe la pellicola viscida si secca,\nBARBOACH si indebolisce."
        de:
          ruby: "SCHMERBEs empfindliche Barthaare\ndienen ihm als hervorragendes\nRadarsystem. Dieses POKéMON versteckt\fsich im Schlamm, so dass nur noch seine\nBarthaare herausgucken, und wartet\nauf Beute."
          sapphire: "SCHMERBEs Körper ist mit einem\nschleimigen Film bedeckt. Wenn ein\nGegner es packen will, entgeht es\fseinem Griff. Dieses POKéMON wird\ngeschwächt, wenn sein schleimiger\nÜberzug austrocknet."
        es:
          ruby: "BARBOACH tiene unos bigotes sensibles\nque le sirven de infalible radar.\nEste POKéMON se sumerge en lodo\fy sólo deja los bigotes por fuera de la\nsuperficie, al acecho, mientras espera\na que llegue su presa."
          sapphire: "BARBOACH está completamente\nrecubierto por una película viscosa. Si\nlo atrapan, puede escurrirse fácilmente.\fSi se le seca la capa viscosa,\neste POKéMON se debilitará."
whiscash:
  species_id: 340
  names:
    jp_kana: ナマズン
    en: WHISCASH
    fr: BARBICHA
    it: WHISCASH
    de: WELSAR
    es: WHISCASH
  forms:
    whiscash:
      form_id: 0
      base_stats:
        hp: 110
        attack: 78
        defense: 73
        special_attack: 76
        special_defense: 71
        speed: 60
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_2
      abilities:
        - oblivious
      descriptions:
        jp_kana:
          ruby: "なわばり　いしきが　とても　つよい　ポケモン。\nおおきな　ぬま　ぜんぶを　なわばりに　している。\nてきが　ちかづくと　あばれて　じしんを　おこす。"
          sapphire: "おおあばれ　すると　ぬまの　しゅうい　５キロの\nはんいで　じしんの　ような　ゆれが　おこる。\nほんとうの　じしんを　よちする　ちからも　もつ。"
        en:
          ruby: "WHISCASH is extremely territorial.\nJust one of these POKéMON will claim a\nlarge pond as its exclusive territory.\fIf a foe approaches it, it thrashes\nabout and triggers a massive\nearthquake."
          sapphire: "If WHISCASH goes on a wild rampage,\nit sets off a quake-like tremor with a\nradius of over three miles.\fThis POKéMON has the ability to predict\nreal earthquakes."
        fr:
          ruby: "Quand il s’agit de territoire,\nBARBICHA est très possessif.\nUn seul de ces POKéMON réclame parfois\fun étang entier. Si un ennemi\ns’approche, il fonce sur lui et déclenche\nun violent tremblement de terre."
          sapphire: "Lorsque BARBICHA se déchaîne, il\ndéclenche des secousses sismiques\ndans un rayon de plus de 5 km\fautour de lui.\nCe POKéMON a le pouvoir de prédire\nles véritables tremblements de terre."
        it:
          ruby: "WHISCASH è estremamente legato\nall’area in cui vive e delimita\nlaghi enormi come proprio territorio.\fAll’avvicinarsi di un nemico,\ns’infuria scatenando terribili\nterremoti."
          sapphire: "Se WHISCASH si infuria, è in grado\ndi scatenare una specie di terremoto\ndel raggio di 5 km.\fInoltre ha la capacità di\nprevedere i terremoti reali."
        de:
          ruby: "WELSAR legt viel Wert auf sein\nTerritorium. Ein einzelnes POKéMON\ndieser Art nennt einen Teich sein Eigen.\fWenn sich ein Feind nähert, schlägt es\num sich und verursacht ein gewaltiges\nErdbeben."
          sapphire: "Wenn WELSAR auf einen wilden Beute-\nzug geht, erzeugt es ein Beben mit \neinem Radius von 5 Kilometern.\fDieses POKéMON kann wirkliche Erdbeben\nvoraussehen."
        es:
          ruby: "WHISCASH defiende su territorio\na toda costa. Es capaz de apoderarse\nde un estanque entero para sí solo.\fSi alguien se le acerca, se revolverá\ny provocará un terremoto devastador."
          sapphire: "Si WHISCASH entra en estado de cólera\nsalvaje, provoca un temblor sísmico\nde un radio de cinco kilómetros.\fEste POKéMON tiene la habilidad de\npredecir terremotos de verdad."
