        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      descriptions:
        jp_kana:
          ruby: "ひるま　くらやみで　じっと　しているのは\nたいようの　ひかりを　ながい　じかん　あびると\nぜんしんが　かるく　やけどしてしまうからだ。"
          sapphire: "たいようの　ひかりを　あびると　たいちょうが\nわるくなるので　ひるまは　どうくつや　ふるびた\nいえの　のきしたに　ぶらさがって　ねている。"
        en:
          ruby: "ZUBAT remains quietly unmoving in a\ndark spot during the bright daylight\nhours. It does so because prolonged\fexposure to the sun causes its body to\nbecome slightly burned."
          sapphire: "ZUBAT avoids sunlight because exposure\ncauses it to become unhealthy.\nDuring the daytime, it stays in caves or\funder the eaves of old houses, sleeping\nwhile hanging upside down."
        fr:
          ruby: "NOSFERAPTI reste calme et immobile\ndans un coin sombre pendant la journée.\nEn effet, une exposition trop longue\fà la lumière du soleil lui brûle légèrement\nla peau."
          sapphire: "NOSFERAPTI évite la lumière du soleil,\ncar ça le rend malade. Pendant la\njournée, il reste dans les cavernes ou à\fl’ombre des vieilles maisons, où il dort,\nla tête à l’envers."
        it:
          ruby: "ZUBAT rimane perfettamente\nimmobile al buio durante le ore\ndiurne più luminose.\fInfatti la prolungata esposizione al\nsole gli provoca gravi ustioni."
          sapphire: "ZUBAT evita la luce del sole perché\nnociva per la sua salute. Durante il\ngiorno sta rintanato in grotte o sotto\fi cornicioni di vecchie case,\ndormendo appeso a testa in giù."
        de:
          ruby: "Tagsüber bleibt ZUBAT an einem dunklen\nOrt und bewegt sich kaum. Wenn es dem \nSonnenlicht längere Zeit ausgesetzt\fwird, zieht es sich Verbrennungen an\nseinem Körper zu."
          sapphire: "ZUBAT meidet Sonnenlicht, da es dadurch\nkrank würde. Am Tage hält es sich in\nHöhlen oder unter den Dachrinnen alter\fHäuser auf. Dort schläft es mit dem\nKopf nach unten."
        es:
          ruby: "Durante el día, ZUBAT permanece inmóvil\ny a oscuras. Si este POKéMON pasara\nmucho tiempo expuesto al sol, correría\fel peligro de sufrir quemaduras."
          sapphire: "ZUBAT evita la luz del día porque le\nresulta perjudicial para la salud.\nDurante el día, permanece en cuevas\fo bajo los aleros de las casas viejas\ndurmiendo colgado de las patas, cabeza\nabajo."
