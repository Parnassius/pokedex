      descriptions:
        jp_kana:
          ruby: "ふしぎな　ちからを　はっきしている　コダックから\nねむっている　ときにだけ　でるはずの　のうはが\nかんそくされて　がっかいの　わだいに　なった。"
          sapphire: "ふしぎな　ちからを　つかった　きおくが　ないのは\nちからを　はっきした　ときは　じゅくすいしている\nときと　おなじ　じょうたいだから　らしい。"
        en:
          ruby: "PSYDUCK uses a mysterious power.\nWhen it does so, this POKéMON \ngenerates brain waves that are\fsupposedly only seen in sleepers.\nThis discovery spurred controversy\namong scholars."
          sapphire: "If it uses its mysterious power,\nPSYDUCK can’t remember having done so.\nIt apparently can’t form a memory of\fsuch an event because it goes into\nan altered state that is much like\ndeep sleep."
        fr:
          ruby: "PSYKOKWAK utilise un mystérieux\npouvoir. Ce POKéMON peut générer\ndes ondes cérébrales normalement\fobservées chez les dormeurs.\nCette découverte a lancé une polémique\ndans le milieu universitaire."
          sapphire: "Lorsqu’il utilise son mystérieux\npouvoir, PSYKOKWAK ne s’en souvient\npas. Apparemment, il ne peut pas garder\fce genre d’événement en mémoire, car\nil pratique ce pouvoir dans un état\nproche du sommeil profond."
        it:
          ruby: "PSYDUCK usa poteri misteriosi, che\nscatenano onde cerebrali rilevabili\napparentemente soltanto su persone\fin stato di sonno. Questa scoperta\nha causato reazioni contrastanti\ntra gli studiosi."
          sapphire: "Quando usa i suoi misteriosi poteri,\nPSYDUCK se ne dimentica subito.\nApparentemente non riesce a\fricordarsene perché entra in uno stato\ninnaturale molto simile ad un sonno\nprofondo."
        de:
          ruby: "ENTON verwendet eine geheimnisvolle\nKraft. Dabei erzeugt es Gehirnströme,\ndie man sonst nur von Schlafenden\fkennt. Diese Entdeckung führte zu \neiner umstrittenen Diskussion unter\nWissenschaftlern."
          sapphire: "ENTON besitzt mystische Kräfte. Wenn\nes sie einsetzt, erinnert es sich nicht\nmehr daran. Es kann ein solches\fEreignis offensichtlich nicht im Ge-\ndächtnis behalten, da es sich in einen\ntiefschlafähnlichen Zustand versetzt."
        es:
          ruby: "PSYDUCK tiene un extraño poder,\nque consiste en generar ondas\ncerebrales iguales a las que se\fgeneran cuando se está dormido.\nEste descubrimiento levantó una\ngran polémica entre eruditos."
          sapphire: "PSYDUCK no se acuerda nunca de haber\nusado su misterioso poder. Parece ser\nque no puede registrar en la memoria\fhaber usado el ataque porque se queda\ninmerso en un estado parecido a un\nsueño profundo."
