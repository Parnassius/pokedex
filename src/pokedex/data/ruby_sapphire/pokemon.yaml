      descriptions:
        jp_kana:
          ruby: "むかし　ひとに　ふういんされた　ポケモン。\nたたかいで　からだが　くずれると　じぶんで\nあたらしい　いわを　さがして　なおすと　いう。"
          sapphire: "からだを　つくっている　がんせきは　すべて\nちがう　とちから　ほりだされた　ものであると\nさいきんの　けんきゅうで　はんめいした。"
        en:
          ruby: "REGIROCK was sealed away by people\nlong ago. If this POKéMON’s body is\ndamaged in battle, it is said to seek\fout suitable rocks on its own to repair\nitself."
          sapphire: "REGIROCK’s body is composed entirely of\nrocks. Recently, a study made the\nstartling discovery that the rocks\fwere all unearthed from different\nlocations."
        fr:
          ruby: "REGIROCK fut isolé par les gens il\ny a très longtemps. Lorsque le corps de\nce POKéMON est endommagé au combat,\fon raconte qu’il cherche des rochers\npour se réparer."
          sapphire: "Le corps de REGIROCK est\nentièrement constitué de rochers.\nRécemment, une étude a découvert\fque ces rochers provenaient de\nlieux très variés."
        it:
          ruby: "Molto tempo fa REGIROCK era stato\nimprigionato dagli esseri umani.\fSe subisce danni in lotta, cerca\nnuove rocce adatte per riparare\nle rotture."
          sapphire: "Il corpo di REGIROCK è formato\ninteramente da pietre.\nDa un recente studio è emerso\fche ogni pietra proviene\nda un luogo diverso."
        de:
          ruby: "REGIROCK wurde vor langer Zeit von\nMenschen weggeschlossen. Wenn der\nKörper dieses POKéMON im Kampf\fSchaden nimmt, sucht es nach\npassenden Steinen, um sich selber zu\nreparieren."
          sapphire: "REGIROCKs Körper besteht komplett aus\nSteinen. Erst kürzlich stellte man\nerstaunt fest, dass die Steine alle an\funterschiedlichen Orten ausgegraben\nwurden."
        es:
          ruby: "A REGIROCK lo mantuvieron encerrado\ny lejos hace tiempo.\nDicen que, si resulta dañado en combate,\fse pone él mismo a buscar piedras\nparecidas a las suyas y se las pone para\nrecomponerse."
          sapphire: "REGIROCK está formado en su totalidad\npor piedras. Debido a un estudio\nreciente, se descubrió que cada una\fde las piedras había sido\ndesenterrada en sitios distintos."
