      descriptions:
        jp_kana:
          ruby: "しんかいのほし　と　よばれる　ポケモンだ。\nしょくしゅの　なかの　バクテリアと　たいえきを\nかがくはんのうさせる　ことで　ひかりを　つくる。"
          sapphire: "よなかに　ふねから　くらい　うみを　のぞきこむと\nしんかいを　およぐ　ランターンの　ひかりが\nほしぞらの　ように　みえる　ことが　あるよ。"
        en:
          ruby: "LANTURN is nicknamed “the deep-sea\nstar” for its illuminated antenna.\nThis POKéMON produces light by\fcausing a chemical reaction between\nbacteria and its bodily fluids inside\nthe antenna."
          sapphire: "LANTURN is known to emit light.\nIf you peer down into the dark sea from\na ship at night, you can sometimes see\fthis POKéMON’s light rising from the\ndepths where it swims. It gives the sea\nan appearance of a starlit night."
        fr:
          ruby: "On surnomme LANTURN «l’étoile des\nprofondeurs» à cause de son antenne\nlumineuse. Ce POKéMON produit de la\flumière en provoquant une réaction\nchimique entre des bactéries et les\nfluides corporels de son antenne."
          sapphire: "On sait que LANTURN émet de la lumière.\nSi on regarde attentivement la mer\nde nuit à partir d’un bateau, on peut\fvoir la lumière générée par ce POKéMON\néclairer les profondeurs. Cela donne à la\nmer l’apparence d’un ciel étoilé."
        it:
          ruby: "LANTURN è detto anche\n“Stella degli abissi” per la sua\nantenna-lanterna.\fGenera la luce grazie ad una reazione\nchimica tra i batteri e i fluidi corporei\nall’interno dell’antenna stessa."
          sapphire: "LANTURN emette una luce intensa.\nOsservando il mare da un’imbarcazione,\ndi notte, è possibile scorgere la sua\fluce risalire dagli abissi dov’è\nsolito nuotare. Il mare assume\nl’aspetto d’un cielo stellato."
        de:
          ruby: "LANTURN wird auch „Tiefseestern“\ngenannt, da es leuchtende Antennen\nbesitzt. Dieses POKéMON erzeugt Licht,\findem es in den Antennen eine chemische\nReaktion zwischen Bakterien und seinen\nKörperflüssigkeiten erzeugt."
          sapphire: "LANTURN strahlt Licht ab. Wenn du\nnachts aufs dunkle Meer hinausblickst,\nkannst du vielleicht das Licht dieses\fPKMN aus der Tiefe, in der es schwimmt,\nheraufschimmern sehen. Es lässt das\nMeer wie eine sternklare Nacht wirken."
        es:
          ruby: "A LANTURN lo llaman “la estrella del\nfondo del mar” por la antena iluminada\nque tiene.\fEste POKéMON produce luz creando una\nreacción química entre una bacteria y\nlos fluidos corporales de la antena."
          sapphire: "Todos saben que LANTURN emite luz. Si \nechas un ojo al mar desde un barco en\nuna noche cerrada, quizás veas su luz\fa través de las aguas, brillando desde lo\nmás profundo, por donde suele nadar.\nCon él, el mar parece un cielo estrellado."
pichu:
  species_id: 172
  names:
    jp_kana: ピチュー
