        - fire
        - ground
      egg_groups:
        - field
      abilities:
        - magma_armor
      held_items:
        common: rawst_berry
        rare: rawst_berry
      descriptions:
        jp_kana:
          ruby: "からだの　なかに　かざんを　もつ　ポケモンだ。\nからだに　たまった　せっし　１まんどの　マグマを\nときどき　せなかの　コブから　ふきあげている。"
          sapphire: "せなかの　コブは　ほねが　かたちを　かえたもの。\nにえたぎった　マグマを　ときどき　ふきあげる。\nおこった　ときに　よく　ふんかする　らしい。"
        en:
          ruby: "CAMERUPT has a volcano inside its body.\nMagma of 18,000 degrees F courses\nthrough its body.\fOccasionally, the humps on this\nPOKéMON’s back erupt, spewing the\nsuperheated magma."
          sapphire: "The humps on CAMERUPT’s back are\nformed by a transformation of its\nbones. They sometimes blast out molten\fmagma. This POKéMON apparently erupts\noften when it is enraged."
        fr:
          ruby: "Le corps de CAMERUPT renferme un\nvolcan. Du magma à 10 000 degrés coule\ndans ses veines.\fDe temps en temps, les bosses sur le dos\nde ce POKéMON entrent en éruption et\ncrachent le magma surchauffé."
          sapphire: "Les bosses sur le dos de CAMERUPT\nsont apparues après une déformation\nde ses os. Elles crachent parfois du\fmagma en fusion. Ce POKéMON entre\napparemment en éruption lorsqu’il est\nénervé."
        it:
          ruby: "CAMERUPT ha un vulcano all’interno\ndel proprio corpo. Nelle sue vene scorre\nmagma liquido a 10.000 gradi centigradi.\fTalvolta le gobbe che ha sulla schiena\neruttano, espellendo magma rovente."
          sapphire: "Le gobbe sulla schiena di CAMERUPT si\nsono formate dalla trasformazione delle\nsue ossa. Talvolta emettono magma fuso.\fPare che questo POKéMON erutti\nspesso quando è infuriato."
        de:
          ruby: "CAMERUPT trägt einen Vulkan in seinem\nKörper. 10.000 Grad heißes Magma fließt\nin ihm. Manchmal brechen die Höcker auf\fseinem Rücken aus und verspucken \nglühend heißes Magma."
          sapphire: "Die Höcker auf CAMERUPTs Rücken sind\ndurch eine Transformation seiner\nKnochen entstanden. Hin und wieder\fstoßen sie Magma aus. Dieses POKéMON\nbricht häufig aus, wenn es wütend ist."
        es:
          ruby: "CAMERUPT encierra un volcán\nen su interior y un magma de 10.000\ngrados centígrados que le recorre\fel cuerpo. A veces, las jorobas de la\nespalda entran en erupción y escupen\nel abrasivo magma."
          sapphire: "Las jorobas de CAMERUPT se originaron\npor una deformación de los huesos.\nA veces escupen magma líquido, sobre\ftodo cuando el POKéMON se enfada."
torkoal:
  species_id: 324
  names:
    jp_kana: コータス
    en: TORKOAL
    fr: CHARTOR
    it: TORKOAL
    de: QURTEL
    es: TORKOAL
  forms:
    torkoal:
      form_id: 0
      base_stats:
        hp: 70
