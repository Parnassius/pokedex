        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - synchronize
        - trace
      descriptions:
        jp_kana:
          ruby: "トレーナーの　あかるい　かんじょうに　ふれている\nキルリアは　うつくしく　せいちょうすると　いう。\nはったつした　のうで　サイコパワーを　あやつる。"
          sapphire: "あたまの　ツノで　ぞうふくされた　サイコパワーが\nつかわれるとき　まわりの　くうかんが　ねじまがり\nげんじつには　ない　けしきが　みえると　いう。"
        en:
          ruby: "It is said that a KIRLIA that is\nexposed to the positive emotions of\nits TRAINER grows beautiful.\fThis POKéMON controls psychokinetic\npowers with its highly developed brain."
          sapphire: "KIRLIA uses the horns on its head\nto amplify its psychokinetic power.\nWhen the POKéMON uses its power,\fthe air around it becomes distorted,\ncreating mirages of nonexistent\nscenery."
        fr:
          ruby: "On dit qu’un KIRLIA exposé aux\némotions positives de son DRESSEUR\ndevient très beau.\fLe cerveau surdéveloppé de ce POKéMON\nlui permet de contrôler les forces\ntélékinésiques."
          sapphire: "KIRLIA utilise ses cornes pour\namplifier ses pouvoirs télékinésiques.\nLorsque ce POKéMON utilise son pouvoir,\fl’air ambiant se déforme et crée des\nmirages de paysages qui n’existent pas."
        it:
          ruby: "Si dice che KIRLIA cresca molto bene\nse viene esposto alle emozioni positive\ndel suo ALLENATORE.\fQuesto POKéMON è dotato di poteri\npsicocinetici grazie al suo cervello\naltamente sviluppato."
          sapphire: "KIRLIA usa le corna sul capo per\namplificare il potere psicocinetico.\nQuando il POKéMON usa tali poteri,\fl’aria circostante assume un aspetto\ndistorto, creando miraggi di scenari\ninesistenti."
        de:
          ruby: "Man sagt, dass ein KIRLIA, das häufig\npositive Emotionen seines TRAINERs\nwahrnimmt, sehr schön wird.\fDieses POKéMON kontrolliert\npsychokinetische Energie mit seinem\nhochentwickelten Gehirn."
          sapphire: "KIRLIA benutzt die Hörner an seinem\nKopf dazu, seine psychokinetische\nEnergie zu verstärken. Wenn dieses\fPOKéMON seine spezielle Kraft einsetzt,\nwird die Luft verformt und ein Trugbild\neiner Landschaft erzeugt."
        es:
          ruby: "Dicen que al recibir los sentimientos\npositivos de su ENTRENADOR, KIRLIA\ncrece con gran belleza.\fEste POKéMON controla poderes\npsicoquinéticos gracias al desarrollado\ncerebro que tiene."
          sapphire: "KIRLIA usa los cuernos para amplificar\nlos poderes de psicoquinesia que tiene.\nCuando los usa, altera el ambiente, se\ftransforma y crea espejismos de cosas\nque no existían con anterioridad."
gardevoir:
  species_id: 282
