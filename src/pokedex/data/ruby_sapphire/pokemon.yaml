          sapphire: "GLURAK fliegt durch die Lüfte, um\nstarke Gegner aufzuspüren. Sein heißer\nFeueratem bringt alles zum Schmelzen.\fAber es richtet seinen Feueratem nie\ngegen schwächere Gegner."
