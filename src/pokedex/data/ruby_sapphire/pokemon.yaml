          sapphire: "Lorsqu’une tempête approche, des\ngroupes entiers de ce POKéMON se\nbattent pour grimper sur les hauteurs,\foù la foudre a plus de chance de\ntomber. Certaines villes se servent\nd’ELEKTEK en guise de paratonnerres."
        it:
