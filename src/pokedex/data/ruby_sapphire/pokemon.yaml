      types:
        - normal
      egg_groups:
        - monster
        - field
      abilities:
        - soundproof
      held_items:
        rare: chesto_berry
      descriptions:
        jp_kana:
          ruby: "もくぞうの　いえを　コナゴナに　ふきとばすほどの\nおおごえを　だして　あいてを　いためつける。\nまるい　みみが　スピーカーの　はたらきを　する。"
          sapphire: "あしを　ふみならしながら　おおごえを　だす。\nおおごえを　だしたあとは　しばらくの　あいだ\nなにも　きこえなくなってしまうのが　じゃくてん。"
        en:
          ruby: "LOUDRED’s bellowing can completely\ndecimate a wood-frame house. It uses\nits voice to punish its foes.\fThis POKéMON’s round ears serve as\nloudspeakers."
          sapphire: "LOUDRED shouts while stamping its feet.\nAfter it finishes shouting, this\nPOKéMON becomes incapable of hearing\fanything for a while. This is considered\nto be a weak point."
        fr:
          ruby: "Le hurlement de RAMBOUM est si fort\nqu’il peut faire s’effondrer une petite\nmaison en bois. Il se sert de sa voix\fpour punir ses ennemis. Les oreilles\nrondes de ce POKéMON servent de\nhaut-parleurs."
          sapphire: "RAMBOUM hurle en trépignant.\nQuand il a fini de hurler, ce POKéMON\nreste incapable d’entendre le moindre\fson pendant un long moment. Il semble\nque ce soit son point faible."
        it:
          ruby: "I suoni assordanti emessi da LOUDRED\nsono in grado di abbattere anche una\ncasa in legno. La sua voce è così\fpotente da poter essere usata come\nattacco contro i nemici. Le sue\norecchie tonde fungono da altoparlanti."
          sapphire: "LOUDRED urla pestando i piedi.\nAlla fine dei suoi strepiti è tempora-\nneamente incapace di udire qualsiasi\frumore. Questo è considerato\nil suo tallone d’Achille."
        de:
          ruby: "KRAKEELOs Brüllen kann ein Holzhaus zum\nEinsturz bringen. Es setzt seine Stimme\nein, um seine Gegner anzugreifen.\fDie runden Ohren dieses POKéMON dienen\nals Lautsprecher."
          sapphire: "KRAKEELO schreit und stampft mit\nseinen Füßen auf den Boden. Danach\nkann es für eine Weile nichts hören.\fDies scheint die Schwachstelle dieses\nPOKéMON zu sein."
        es:
          ruby: "Los bramidos de LOUDRED pueden echar\nabajo una casa reforzada con vigas de\nmadera.\fEste POKéMON usa el vozarrón que tiene\npara castigar a sus rivales. Las orejas\nredondas le sirven de altavoces."
          sapphire: "LOUDRED grita a la vez que da pisotones.\nUna vez que deja de chillar, se queda\nensordecido durante un buen rato;\flo que se considera su punto débil."
exploud:
  species_id: 295
  names:
    jp_kana: バクオング
    en: EXPLOUD
    fr: BROUHABAM
    it: EXPLOUD
    de: KRAWUMMS
    es: EXPLOUD
  forms:
    exploud:
      form_id: 0
      base_stats:
        hp: 104
        attack: 91
        defense: 63
        special_attack: 91
        special_defense: 63
        speed: 68
      evs_yield:
