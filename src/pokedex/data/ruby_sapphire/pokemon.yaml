          sapphire: "FLAGADOSS a un KOKIYAS solidement\nattaché à sa queue. Du coup, il ne\npeut plus utiliser sa queue pour pêcher.\fFLAGADOSS est donc obligé, à\ncontrecœur, de nager pour attraper\nses proies."
        it:
          ruby: "SLOWBRO ha uno SHELLDER saldamente\nattaccato alla coda, che quindi non\npuò più essere usata per pescare.\fCosì SLOWBRO può essere visto\nnuotare di malavoglia per catturare\nuna preda."
          sapphire: "SLOWBRO ha uno SHELLDER saldamente\nattaccato alla coda, che quindi non\npuò più essere usata per pescare.\fCosì SLOWBRO può essere visto\nnuotare di malavoglia per catturare\nuna preda."
        de:
          ruby: "An LAHMUS’ Rute hat sich ein MUSCHAS\nfestgebissen. Daher kann es ihn nicht\nmehr zum Angeln benutzen\fund es ist dazu gezwungen, umherzu-\nschwimmen und nach Beute Ausschau\nzu halten."
          sapphire: "An LAHMUS’ Schweif hat sich ein \nMUSCHAS festgebissen. Daher kann es\nihn nicht mehr zum Fischen benutzen\fund ist dazu gezwungen, umherzu-\nschwimmen und Ausschau nach Beute zu\nhalten."
        es:
          ruby: "SLOWBRO lleva en la cola un SHELLDER\nenganchado, sujeto por los dientes.\nComo SLOWBRO no puede usar la cola\fpara pescar, se mete en el agua de mala\ngana en busca de sus presas."
