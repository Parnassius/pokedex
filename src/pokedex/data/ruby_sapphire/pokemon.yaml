        - normal
      egg_groups:
        - monster
        - field
      abilities:
        - soundproof
      held_items:
        rare: chesto_berry
      descriptions:
        jp_kana:
          ruby: "おおごえの　しんどうで　じしんを　おこす。\nからだの　あなから　くうきを　はげしく　すいこみ\nはじめたら　おおごえを　だす　まえぶれだ。"
          sapphire: "からだの　あなから　ふえの　ような　おとを\nだして　なかまに　きもちを　つたえている。\nおおごえは　たたかう　ときしか　ださないのだ。"
        en:
          ruby: "EXPLOUD triggers earthquakes with the\ntremors it creates by bellowing. If this\nPOKéMON violently inhales from the\fports on its body, it’s a sign that it is\npreparing to let loose a huge bellow."
          sapphire: "EXPLOUD communicates its feelings to\nthe others by emitting whistle-like\nsounds from the tubes on its body.\fThis POKéMON only raises its voice when\nit is in battle."
        fr:
          ruby: "BROUHABAM peut déclencher des\ntremblements de terre grâce aux\nvibrations de son hurlement. Lorsque ce\fPOKéMON inspire fortement, cela\nsignifie qu’il se prépare à lâcher un\ngigantesque mugissement."
          sapphire: "BROUHABAM communique avec les autres\nen émettant un sifflement qui provient\ndes tubes de son corps.\fCe POKéMON n’élève la voix que\npendant les combats."
        it:
          ruby: "EXPLOUD è in grado di generare\nterremoti con le vibrazioni vocali.\nQuando inala grandi quantità d’aria\fdalle numerose aperture del corpo,\nsignifica che si sta preparando ad\nemettere un grido lancinante."
          sapphire: "EXPLOUD comunica le sue sensazioni\nemettendo una sorta di fischi dai\ncanali tubolari del suo corpo.\fQuesto POKéMON alza la voce\nsoltanto in lotta."
        de:
          ruby: "KRAWUMMS kann durch sein Brüllen\nErdbeben auslösen. Wenn dieses\nPOKéMON durch seine Körperöffnungen\fkräftig einatmet, ist es kurz davor,\nein mächtiges Brüllen von sich zu geben."
          sapphire: "KRAWUMMS vermittelt seinen Artge-\nnossen seine Gefühle, indem es eine Art\nPfeifen durch die Röhren an seinem\fKörper von sich gibt. Dieses\nPOKéMON erhebt nur im Kampf\nseine Stimme."
        es:
          ruby: "EXPLOUD provoca terremotos con el\ntemblor que causa al levantar la voz.\nSi ves a este POKéMON inhalar aire por\flos tubos, ojo, que está a punto de\nsoltar un buen bramido."
          sapphire: "EXPLOUD expresa sus sentimientos a los\notros emitiendo una especie de silbidos\na través de los tubos que tiene.\fEste POKéMON sólo levanta la voz cuando\nestá en combate."
makuhita:
  species_id: 296
  names:
    jp_kana: マクノシタ
    en: MAKUHITA
    fr: MAKUHITA
    it: MAKUHITA
    de: MAKUHITA
    es: MAKUHITA
  forms:
