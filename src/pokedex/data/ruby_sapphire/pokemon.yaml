          sapphire: "DUMMISEL hat einen Bohrer als Schweif.\nDiesen benutzt es, um sich rückwärts in\nden Boden einzugraben.\fDieses POKéMON baut seinen \nNestkomplex tief unter der\nErdoberfläche auf."
        es:
          ruby: "La cola de DUNSPARCE es un taladro\nque usa para enterrarse de espaldas\nen el suelo.\fDe todos es sabido que este POKéMON\nhace su nido a gran profundidad y con\nuna forma muy compleja."
          sapphire: "La cola de DUNSPARCE es un taladro\nque usa para enterrarse en el suelo de\nespaldas.\fDe todos es sabido que este POKéMON\nhace su nido a gran profundidad y con\nuna forma muy compleja."
