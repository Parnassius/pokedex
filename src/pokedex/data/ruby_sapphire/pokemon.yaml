      descriptions:
        jp_kana:
          ruby: "ときを　こえ　みらいから　やってきた　ポケモン。\nセレビィが　すがたを　あらわす　かぎり　あかるい\nみらいが　まっていると　かんがえられている。"
          sapphire: "ときを　こえ　みらいから　やってきた　ポケモン。\nセレビィが　すがたを　あらわす　かぎり　あかるい\nみらいが　まっていると　かんがえられている。"
        en:
          ruby: "This POKéMON came from the future by\ncrossing over time.\nIt is thought that so long as CELEBI\fappears, a bright and shining future\nawaits us."
          sapphire: "This POKéMON came from the future by\ncrossing over time.\nIt is thought that so long as CELEBI\fappears, a bright and shining future\nawaits us."
        fr:
          ruby: "Ce POKéMON est venu du futur en\nvoyageant dans le temps. On raconte\nque tant que CELEBI apparaît,\fcela signifie que le futur sera\nbon et agréable."
          sapphire: "Ce POKéMON est venu du futur en\nvoyageant dans le temps. On raconte\nque tant que CELEBI apparaît,\fcela signifie que le futur sera\nbon et agréable."
        it:
          ruby: "CELEBI è giunto a noi dal futuro,\nviaggiando attraverso il tempo.\fSi dice che ogni sua apparizione\npreannunci un futuro roseo e\nsplendente."
          sapphire: "CELEBI è giunto a noi dal futuro,\nviaggiando attraverso il tempo.\fSi dice che ogni sua apparizione\npreannunci un futuro roseo e\nsplendente."
        de:
          ruby: "Dieses POKéMON kommt aus der Zukunft\nund ist durch die Zeit gereist. Solange\nCELEBI auftaucht,\fist der Menschheit angeblich eine\nrosige Zukunft beschieden."
          sapphire: "Dieses POKéMON kommt aus der Zukunft\nund ist durch die Zeit gereist. Solange\nCELEBI auftaucht, ist der\fMenschheit angeblich eine rosige\nZukunft beschieden."
        es:
          ruby: "Este POKéMON vino del futuro haciendo\nun viaje en el tiempo.\nHay quien piensa que, mientras CELEBI\fsiga apareciendo, hay un futuro\nbrillante y esperanzador."
          sapphire: "Este POKéMON vino del futuro haciendo\nun viaje en el tiempo.\nHay quien piensa que, mientras CELEBI\fsiga apareciendo, hay un futuro\nbrillante y esperanzador."
treecko:
  species_id: 252
  names:
    jp_kana: キモリ
    en: TREECKO
    fr: ARCKO
    it: TREECKO
    de: GECKARBOR
    es: TREECKO
  forms:
    treecko:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 65
        special_defense: 55
