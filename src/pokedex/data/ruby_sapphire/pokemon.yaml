          sapphire: "あたまに　ついている　ながい　つるを　ちいさな\nいきものに　みえる　うごきで　えものを　さそい\nちかづいてきた　ところを　ぱくりと　ひとのみ。"
        en:
          ruby: "VICTREEBEL has a long vine that\nextends from its head. This vine is\nwaved and flicked about as if it were\fan animal to attract prey. When an\nunsuspecting prey draws near, this\nPOKéMON swallows it whole."
          sapphire: "VICTREEBEL has a long vine that\nextends from its head. This vine is\nwaved and flicked about as if it were\fan animal to attract prey. When an\nunsuspecting prey draws near, this\nPOKéMON swallows it whole."
        fr:
          ruby: "EMPIFLOR est doté d’une longue liane\nqui part de sa tête. Cette liane se\nbalance et remue comme un animal pour\fattirer ses proies. Lorsqu’une proie\ns’approche un peu trop près, ce\nPOKéMON l’avale entièrement."
          sapphire: "EMPIFLOR est doté d’une longue liane\nqui part de sa tête. Cette liane se\nbalance et remue comme un animal pour\fattirer ses proies. Lorsqu’une proie\ns’approche un peu trop près, ce\nPOKéMON l’avale entièrement."
        it:
          ruby: "VICTREEBEL è dotato di una lunga\nliana che parte dalla testa. Il POKéMON\nla sventola e la agita come fosse\fun’esca per attirare la preda. Quando\nla preda ignara si avvicina, il POKéMON\nla inghiotte in un sol boccone."
          sapphire: "VICTREEBEL è dotato di una lunga\nliana che parte dalla testa. Il POKéMON\nla sventola e la agita come fosse\fun’esca per attirare la preda. Quando\nla preda ignara si avvicina, il POKéMON\nla inghiotte in un sol boccone."
        de:
          ruby: "Aus SARZENIAs Kopf ragt eine lange\nRanke hervor. Diese schwingt hin und \nher, als ob sie etwas fangen\fmöchte. Wenn sich ahnungslose Beute \nnähert, wird sie von diesem POKéMON\nim Ganzen verschlungen."
          sapphire: "Aus SARZENIAs Kopf ragt eine lange\nRanke hervor. Diese schwingt hin und \nher, als ob sie etwas fangen\fmöchte. Wenn sich ahnungslose Beute \nnähert, wird sie von diesem POKéMON\nim Ganzen verschlungen."
        es:
          ruby: "VICTREEBEL tiene una enredadera que le\nsale de la cabeza. Cuando la agita\ny colea, recuerda a un animal que está\fa punto de atacar a su presa. Como se le\nacerque un rival, se lo tragará entero."
          sapphire: "VICTREEBEL tiene una enredadera que le\nsale de la cabeza. Cuando la agita\ny colea, recuerda a un animal que está\fa punto de atacar a su presa. Como se le\nacerque un rival, se lo tragará entero."
