        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - chlorophyll
        - early_bird
      descriptions:
        jp_kana:
          ruby: "あたまの　てっぺんを　きの　えだに　くっつけて\nぶらさがり　ながら　すいぶんを　すいとっている。\nみずを　のむほど　からだが　ツヤツヤ　ひかる。"
          sapphire: "えだに　ぶらさがる　すがたは　きのみ　そっくり。\nいきなり　うごいて　ポケモンを　ビックリさせる。\n１にち　１かい　はっぱで　からだを　みがくよ。"
        en:
          ruby: "SEEDOT attaches itself to a tree\nbranch using the top of its head.\nIt sucks moisture from the tree while\fhanging off the branch.\nThe more water it drinks, the glossier\nthis POKéMON’s body becomes."
          sapphire: "SEEDOT looks exactly like an acorn\nwhen it is dangling from a tree branch.\nIt startles other POKéMON by suddenly\fmoving.\nThis POKéMON polishes its body once a\nday using leaves."
        fr:
          ruby: "GRAINIPIOT s’accroche par la tête aux\nbranches d’arbre. Il en profite alors\npour absorber l’humidité de l’arbre.\fPlus ce POKéMON boit d’eau,\nplus son corps devient brillant."
          sapphire: "GRAINIPIOT ressemble à s’y méprendre\nà un gland quand il s’accroche à une\nbranche. Il effraie les autres POKéMON\fquand il se met à bouger. Ce POKéMON\nse lustre le corps une fois par jour\navec des feuilles."
        it:
          ruby: "SEEDOT si attacca ai rami degli alberi\nusando il picciolo che ha sul capo.\nIn questa posizione succhia la linfa\fdell’albero per nutrirsi.\nPiù acqua assume, più lucido\nappare il suo corpo."
          sapphire: "SEEDOT è molto simile ad una ghianda\npenzolante dal ramo della quercia.\nÈ solito spaventare gli altri POKéMON\fcon movimenti improvvisi.\nPulisce il proprio corpo una volta\nal giorno usando delle foglie."
        de:
          ruby: "SAMURZEL hängt sich mit dem Kopf an\neinen Ast. Dabei entzieht es dem Baum\nFeuchtigkeit. Je mehr Wasser es trinkt,\fdesto glänzender wird der Körper dieses\nPOKéMON."
          sapphire: "SAMURZEL sieht aus wie eine Eichel, wenn\nes an einem Ast hängt. Es erschreckt\nandere POKéMON, indem es sich dann\fplötzlich bewegt. Dieses POKéMON\npoliert seinen Körper einmal am Tag mit\nBlättern."
        es:
          ruby: "SEEDOT se queda enganchado a las ramas\nde los árboles por el extremo que tiene\nen la cabeza. Mientras está ahí colgado,\faprovecha para tomar la humedad\ndel árbol. Cuanta más agua bebe,\nmás lustroso se le ve."
          sapphire: "SEEDOT es igualito que una bellota\ncolgada de la rama de un árbol.\nA veces asusta a más de un POKéMON\fcon movimientos repentinos.\nSEEDOT suele acicalarse con hojas\nuna vez al día."
nuzleaf:
  species_id: 274
