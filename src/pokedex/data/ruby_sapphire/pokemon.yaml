        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - synchronize
        - trace
      descriptions:
        jp_kana:
          ruby: "みらいを　よちする　のうりょくで　トレーナーの\nきけんを　さっちしたとき　さいだい　パワーの\nサイコエネルギーを　つかうと　いわれている。"
          sapphire: "サイコパワーで　くうかんを　ねじまげ　ちいさな\nブラックホールを　つくりだす　ちからを　もつ。\nいのちがけで　トレーナーを　まもる　ポケモン。"
        en:
          ruby: "GARDEVOIR has the ability to read the\nfuture. If it senses impending danger\nto its TRAINER, this POKéMON is said to\funleash its psychokinetic energy at\nfull power."
          sapphire: "GARDEVOIR has the psychokinetic\npower to distort the dimensions and\ncreate a small black hole.\fThis POKéMON will try to protect its\nTRAINER even at the risk of its own\nlife."
        fr:
          ruby: "GARDEVOIR a le pouvoir de prédire\nl’avenir. On raconte que lorsqu’il sent\nque son DRESSEUR est en danger,\fil libère une puissante décharge\nd’énergie télékinésique."
          sapphire: "GARDEVOIR est doté d’un pouvoir\ntélékinésique lui permettant de\ndéformer les dimensions et de créer un\fpetit trou noir. Ce POKéMON est prêt à\nrisquer sa vie pour protéger\nson DRESSEUR."
        it:
          ruby: "GARDEVOIR ha l’abilità di prevedere\nil futuro. Se percepisce un pericolo\nimminente per il proprio ALLENATORE,\fpare che scateni tutta l’energia\npsicocinetica di cui è capace."
          sapphire: "GARDEVOIR ha il potere psicocinetico\ndi distorcere le dimensioni creando\nun piccolo buco nero.\fQuesto POKéMON cerca di proteggere\nil proprio ALLENATORE anche\na rischio della sua stessa vita."
        de:
          ruby: "GUARDEVOIR kann in die Zukunft\nschauen. Wenn es eine Gefahr für seinen\nTRAINER voraussieht, entlädt es seine\fpsychokinetische Energie mit voller\nKraft."
          sapphire: "GUARDEVOIR kann mit seiner psycho-\nkinetischen Energie die Dimensionen\nverzerren und ein kleines Schwarzes\fLoch erzeugen. Es schützt seinen\nTRAINER selbst unter Einsatz seines\neigenen Lebens."
        es:
          ruby: "GARDEVOIR es capaz de leer el futuro.\nSi siente que su ENTRENADOR está\nen peligro inminente, dicen que libera\fautomáticamente toda su energía\npsicoquinética."
          sapphire: "GARDEVOIR tiene el poder psicoquiné-\ntico de alterar las dimensiones y crear\nun agujero negro pequeño.\fEste POKéMON intenta proteger siempre\na su ENTRENADOR aunque tenga que\narriesgar su propia vida."
surskit:
  species_id: 283
