        ko:
          legends_za: "붙어 있는 셀러는\n꼬리에서 배어 나오는 맛을\n좋아해서 계속 떨어지지 않는다."
        zh_simp:
          legends_za: "紧咬不放的大舌贝很想吃\n它尾巴上渗出的鲜味，\n所以一直都不愿松口。"
        zh_trad:
          legends_za: "緊咬不放的大舌貝很愛吃\n牠尾巴上滲出的鮮味，\n所以一直都不放開。"
        es_latam:
