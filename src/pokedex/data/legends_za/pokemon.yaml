        en:
          legends_za: "It punches things without pausing to think. There\nare even records of Crabominable forcing back an\navalanche with a flurry of punches."
        fr:
          legends_za: "Il frappe toujours avant de\nréfléchir. Certaines sources attestent qu’un\nCrabominable aurait un jour repoussé\nune avalanche à coups de pinces."
        it:
          legends_za: "Attacca subito, senza pensarci due volte.\nSecondo alcune testimonianze, ha fermato\nuna valanga con una raffica di pugni."
        de:
          legends_za: "Es denkt nicht lange nach und schlägt einfach zu.\nBerichten zufolge soll es mit seinen schnellen\nSchlägen einmal eine Lawine gestoppt haben."
        es:
          legends_za: "No se lo piensa dos veces a la\nhora de zurrar. Se tiene constancia\nde que sus puñetazos frenéticos han\nllegado a detener aludes."
        ko:
          legends_za: "생각하기보다는 일단 때리고 본다.\n눈사태를 펀치 러시로\n되받아쳤다는 기록도 있다."
        zh_simp:
          legends_za: "比起思考，会先试着打打看。\n曾经有过用拳头猛攻\n打退雪崩的记录。"
        zh_trad:
          legends_za: "習慣不經過大腦先動手打了再說。\n以前曾有過用連續不斷的拳擊\n把雪崩推回去的紀錄。"
        es_latam:
          legends_za: "No lo piensa dos veces antes de golpear.\nHay registros de que sus puñetazos frenéticos\ndetuvieron aludes."
