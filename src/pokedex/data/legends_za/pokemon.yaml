        es:
          legends_za: "Surca el cielo nocturno cuando ni siquiera la luna\nbrilla y ataca a presas incautas. Es imbatible en\ncombates que tienen lugar a oscuras."
        ko:
          legends_za: "달빛조차 없는 어둠 속을 날며\n방심하고 있는 사냥감을 덮친다.\n어둠 속의 싸움에서는 무적이다."
        zh_simp:
          legends_za: "飞行在连月光都没有的黑夜里，\n袭击那些疏忽大意的猎物。\n在黑暗的战斗中所向无敌。"
        zh_trad:
          legends_za: "在連月光也沒有的暗夜飛行，\n襲擊粗心大意的獵物。\n在黑暗裡的戰鬥中所向無敵。"
        es_latam:
          legends_za: "Surca el cielo en las noches sin luna y ataca\na presas incautas. Es imbatible en combates\nque tienen lugar a oscuras."
