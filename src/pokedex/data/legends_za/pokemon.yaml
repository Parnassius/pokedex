          legends_za: "￹王￺おう￻の　￹素質￺そしつ￻を　￹持￺も￻つ　￹人間￺にんげん￻を\n￹見抜￺みぬ￻くらしい。　￹認￺みと￻められた　￹人￺ひと￻は\nやがて　￹王￺おう￻になると　いわれている。"
        en:
          legends_za: "Apparently, it can detect the innate qualities of\nleadership. According to legend, whoever it\nrecognizes is destined to rule."
        fr:
          legends_za: "Il pourrait déceler les qualités régaliennes chez\nles êtres humains. On raconte que quiconque\nobtient sa faveur montera sur le trône."
        it:
          legends_za: "Si dice che sia in grado di riconoscere chi\npossiede le qualità per diventare re e che\nle persone da lui indicate siano effettivamente\ndestinate al trono."
        de:
          legends_za: "Angeblich erkennt es in Menschen das Potenzial\nzum Herrscher. Es heißt, von ihm anerkannte\nPersonen werden einst den Thron besteigen."
        es:
          legends_za: "Al parecer, puede intuir si un humano tiene\nmadera de rey. Según se dice, las personas\nque obtuvieron su reconocimiento acabaron\nsiendo monarcas."
        ko:
          legends_za: "왕의 기질을 가진 인간을\n간파하는 듯하다. 인정받은 자는\n이윽고 왕이 된다고 한다."
        zh_simp:
          legends_za: "好像能看出哪个人有成为国王的潜质。\n据说，被它认可的人最终会成为国王。"
        zh_trad:
          legends_za: "似乎能看出具有王者潛質的人。\n據說被牠認可的人終將成為國王。"
        es_latam:
          legends_za: "Al parecer, puede intuir si un humano tiene\npotencial de liderazgo. Según se dice, las\npersonas que obtuvieron su reconocimiento\nse convirtieron en reyes."
