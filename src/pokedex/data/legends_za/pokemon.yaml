          legends_za: "被滑腻腻的粘膜覆盖着的身体\n可以让敌人的拳击和脚踢\n哧溜一下滑开。"
        zh_trad:
          legends_za: "被黏呼呼的黏膜包裹的身體\n能讓敵人的拳擊或腳踢\n咕溜地滑開。"
        es_latam:
          legends_za: "La viscosidad de la membrana que lo recubre\nhace resbalar tanto los puñetazos como las\npatadas de los enemigos que lo golpean."
