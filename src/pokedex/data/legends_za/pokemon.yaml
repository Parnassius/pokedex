        de:
          legends_za: "Sie sind bekannt für ihr schäbiges Äußeres.\nObwohl sie ihr Habitat in großer Zahl bevölkern,\nversammeln sie sich nur an bestimmten Orten."
        es:
          legends_za: "Se caracteriza por tener un aspecto descuidado.\nSu numerosa población se halla distribuida y\nconcentrada en lugares muy concretos."
        ko:
          legends_za: "볼품없는 모습으로 유명하다.\n개체 수는 많지만\n한군데 모여 있는 습성이 있다."
        zh_simp:
          legends_za: "以样子寒酸而闻名。\n尽管数量非常多，\n但还是会聚居在一处。"
        zh_trad:
