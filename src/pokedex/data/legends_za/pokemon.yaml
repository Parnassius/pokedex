        en:
          legends_za: "This absent-minded Pokémon tends to forget\nabout the prey it has salt-cured. It’s even prone to\nforgetting the orders its Trainer has given it."
        fr:
          legends_za: "Ce Pokémon a une mauvaise mémoire. Il oublie\nnon seulement les proies qu’il a recouvertes de\nsel, mais parfois même les ordres qu’il reçoit."
        it:
          legends_za: "È smemorato di natura e tende a dimenticare\nnon solo le prede che ha messo sotto sale, ma\naddirittura gli ordini del proprio Allenatore."
        de:
          legends_za: "Dieses Pokémon hat ein schlechtes Gedächtnis\nund vergisst nicht nur seine eingepökelte Beute,\nsondern auch oft die Befehle seines Trainers."
        es:
          legends_za: "Su mala memoria lo hace propenso a olvidar\nlas presas que ha sometido a salazón y, por\nsupuesto, también las órdenes de su Entrenador."
        ko:
          legends_za: "잘 잊어버리는 성격이라\n자신이 소금에 절여 둔 먹잇감은 물론\n트레이너의 지시도 쉽게 잊어버린다."
        zh_simp:
          legends_za: "性格健忘。\n别说自己盐腌的猎物了，\n连训练家的指示也经常忘记。"
        zh_trad:
          legends_za: "有著忘東忘西的健忘性格。\n不僅會忘了自己醃漬的獵物，\n連訓練家的指示都常會忘記。"
        es_latam:
          legends_za: "Su mala memoria lo hace propenso a olvidar\nlas presas que sometió a salación y, por\nsupuesto, también las órdenes de su Entrenador."
