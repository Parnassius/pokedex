        de:
          legends_za: "Sein Zwitschern ist wunderschön, aber wenn\nGegner sein Revier betreten, kennt es keine\nGnade."
        es:
          legends_za: "A pesar de la belleza de su melodioso gorjeo,\nadopta una actitud agresiva y despiadada hacia\ncualquiera que ose invadir su territorio."
        ko:
          legends_za: "아름다운 소리로 지저귀지만\n자신의 영역에 들어온 상대를\n용서하지 않는 난폭한 성격이다."
        zh_simp:
          legends_za: "婉转的叫声很美，\n但对于进入领地的对手\n毫不留情，非常粗暴。"
        zh_trad:
          legends_za: "婉轉的叫聲雖然美麗，\n但對於入侵領地的對手\n會毫不留情地粗暴對待。"
        es_latam:
          legends_za: "A pesar de la belleza de su melodioso gorjeo,\ntiene una actitud agresiva y despiadada con\ncualquiera que se atreva a invadir su territorio."
