        en:
          legends_za: "If anything bad happens to it, Goodra retreats into\nits shell and bounces around like a rubber ball,\nknocking down trees and boring into mountains."
        fr:
          legends_za: "Lorsqu’une chose lui déplaît, il se réfugie dans sa\ncoquille et s’élance telle une balle rebondissante,\nabattant les arbres et perçant les montagnes."
        it:
          legends_za: "Se gli capita qualcosa di spiacevole, si rintana\nnel guscio e rimbalza come una palla di gomma,\nabbattendo alberi e solcando montagne."
        de:
          legends_za: "Es zieht sich in sein Gehäuse zurück und hüpft wie\nein Gummiball umher, wenn es sich unwohl fühlt.\nDabei schlägt es Schneisen in Wälder und Berge."
        es:
          legends_za: "Si le ocurre algo malo, se refugia en su concha\ny rebota cual pelota, llevándose árboles por\ndelante y agujereando montañas a su paso."
        ko:
          legends_za: "안 좋은 일이 있으면 껍질 속에 숨어서\n고무공처럼 통통 튀어 다니며\n나무를 쓰러뜨리고 산을 파헤쳐 놓는다."
        zh_simp:
          legends_za: "一不高兴就会缩在壳里，\n如橡胶球一般跳来跳去，\n横扫树木，把山掏得千疮百孔。"
        zh_trad:
          legends_za: "一不順心就會縮在殼裡，\n像顆皮球般地四處跳來跳去\n擊倒樹木，把山撞得千瘡百孔。"
        es_latam:
          legends_za: "Si le ocurre algo malo, se refugia en su caparazón\ny rebota como una pelota. Destruye los árboles\ny agujerea las montañas que encuentra a su paso."
