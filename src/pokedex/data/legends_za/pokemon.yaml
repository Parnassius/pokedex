        fr:
          legends_za: "Depuis très longtemps, les êtres humains\napprécient ce Pokémon pour sa faculté à\nmanipuler le feu."
        it:
          legends_za: "Un Pokémon capace di controllare le fiamme,\ncaro agli esseri umani fin dai tempi più antichi."
        de:
          legends_za: "Dieses Pokémon vermag es, Flammen zu lenken.\nSeit Urzeiten genießt es hohe Wertschätzung bei\nden Menschen."
        es:
          legends_za: "Desde tiempos inmemoriales, los humanos\nhan apreciado mucho a este Pokémon por\nsu habilidad para manipular el fuego."
        ko:
          legends_za: "불꽃을 조종하는 기술을 가지고 있어\n먼 옛날부터 사람들에게\n소중히 여겨지던 포켓몬이다."
        zh_simp:
          legends_za: "会使用操纵火焰的招式，\n自古以来就一直都是\n深受人类重视的宝可梦。"
        zh_trad:
          legends_za: "擁有操縱火焰的招式，\n是從遙遠的過去就\n備受人們珍惜的寶可夢。"
        es_latam:
          legends_za: "Desde tiempos inmemoriales, los humanos\nhan apreciado mucho a este Pokémon por\nsu habilidad para manipular el fuego."
