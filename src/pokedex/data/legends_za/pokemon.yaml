        de:
          legends_za: "Es hält seine Gegner mit seinen vielen Armen\nzum Narren. Dabei hat das Thanathora, das den\nKopf bildet, alle Hände voll zu tun."
        es:
          legends_za: "Es capaz de doblegar a sus adversarios con sus\nnumerosos brazos, pero es una ardua tarea para\nel Barbaracle de la cabeza."
        ko:
          legends_za: "수많은 팔을 사용해서 상대를 농락한다.\n이때, 머리인 거북손데스는 매우 바쁘다."
        zh_simp:
          legends_za: "虽然能用很多胳膊\n将对手耍得团团转，\n但头部的龟足巨铠会相当忙。"
        zh_trad:
          legends_za: "雖然能用很多隻手臂\n把對手耍得團團轉，\n但頭部的龜足巨鎧會相當忙碌。"
        es_latam:
