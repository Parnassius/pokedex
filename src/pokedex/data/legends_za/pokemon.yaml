          legends_za: "L’acqua contenuta nel suo ciuffo è ricca di\nnutrienti e la usa per annaffiare le piante con\nla coda."
        de:
          legends_za: "Das Büschel auf seinem Kopf enthält eine sehr\nnahrhafte Flüssigkeit, die es mit seinem Schweif\nnutzt, um Pflanzen zu bewässern."
        es:
          legends_za: "El agua acumulada en su mata de pelo es rica\nen nutrientes. Usa la cola para regar plantas con\nesa misma agua."
        ko:
          legends_za: "머리털에 모은 물에는\n영양이 듬뿍 담겨 있다.\n꼬리를 사용해서 그 물을 초목에 뿌린다."
        zh_simp:
          legends_za: "头上的毛发丛里储藏的水\n充满了营养。\n会用尾巴给草木浇这种水。"
        zh_trad:
          legends_za: "頭上的毛髮叢裡儲藏的水\n營養非常豐富。\n牠會用尾巴拿這種水來灌溉草木。"
        es_latam:
          legends_za: "El agua acumulada en su mata de pelo es rica\nen nutrientes. Usa su cola para regar plantas\ncon esa misma agua."
