        de:
          legends_za: "Allein der Geruch von Vipitis lässt ihm alle Haare\nzu Berge stehen. Mit seinen scharfen Klauen\nschlitzt es seine Feinde auf."
        es:
          legends_za: "Se le eriza todo el pelaje con solo oler un Seviper.\nCon sus afiladas zarpas puede rajar a sus\nenemigos."
        ko:
          legends_za: "세비퍼의 냄새를 맡는 것만으로도\n전신의 털이 곤두선다.\n예리한 손톱으로 적을 베어 가른다."
        zh_simp:
