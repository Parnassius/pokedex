        en:
          legends_za: "Eating a twig fills it with energy, and its roomy\nears give vent to air hotter than 390 degrees\nFahrenheit."
        fr:
          legends_za: "Quand il grignote des rameaux, il reprend\ndes forces et ses grandes oreilles dégagent\nune chaleur qui dépasse les 200 °C."
        it:
          legends_za: "Fa il pieno di energia mangiando ramoscelli\nper poi emettere aria calda dalle grandi orecchie\na una temperatura di oltre 200 ºC."
        de:
          legends_za: "Wenn es Zweige frisst, schöpft es neue Kraft und\nstößt aus seinen großen Ohren über 200 °C heiße\nLuft aus."
        es:
          legends_za: "Tras masticar e ingerir pequeñas ramas se siente\npletórico y expulsa aire caliente por sus grandes\norejas a temperaturas superiores a los 200 ºC."
        ko:
          legends_za: "잔가지를 먹으면 힘이 나서\n섭씨 200도가 넘는 열기를\n커다란 귀에서 내뿜는다."
        zh_simp:
          legends_za: "吃小树枝后就会变得充满活力，\n会从大大的耳朵里喷出超过\n摄氏２００度的热气。"
        zh_trad:
          legends_za: "吃了小樹枝就會變得有精神，\n從大大的耳朵中噴出超過\n攝氏２００度的熱氣。"
        es_latam:
          legends_za: "Tras masticar e ingerir pequeñas ramas, se siente\npletórico y expulsa aire caliente por sus grandes\norejas a temperaturas superiores a los 200 ºC."
