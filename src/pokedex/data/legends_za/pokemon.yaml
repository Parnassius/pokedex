        en:
          legends_za: "According to old tales, these Pokémon are stumps\npossessed by the spirits of children who died\nwhile lost in the forest."
        fr:
          legends_za: "Cette espèce de Pokémon aurait vu le jour après\nque des âmes d’enfants perdus dans la forêt\nauraient élu domicile dans des souches d’arbres."
        it:
          legends_za: "Secondo la leggenda, lo spirito di un bambino\nsmarritosi e morto in un bosco è entrato in un\nceppo d’albero, dando vita a questo Pokémon."
        de:
          legends_za: "Bei diesen Pokémon soll es sich um die Seelen\nvon Kindern handeln, die sich im Wald verliefen\nund ums Leben kamen und nun in Baumstümpfen\nhausen."
        es:
          legends_za: "Según una leyenda, son en realidad almas de\nniños que pasaron a mejor vida tras perderse\nen el bosque y se convirtieron en Pokémon al\nhabitar un tocón."
        ko:
          legends_za: "숲에서 헤매다 죽은 아이의\n영혼이 나무 그루터기에 씌어\n포켓몬이 되었다고 한다."
        zh_simp:
          legends_za: "据说，在森林中迷路死去的\n孩子的魂魄寄生在树桩上，\n变成了宝可梦。"
        zh_trad:
          legends_za: "據說是在森林中迷路而死的\n小孩靈魂寄宿在樹樁上\n所變成的寶可夢。"
        es_latam:
          legends_za: "Según una leyenda, son en realidad almas de\nniños que, tras perderse en el bosque, pasaron\na mejor vida y se convirtieron en Pokémon al\nhabitar un tronco cortado."
