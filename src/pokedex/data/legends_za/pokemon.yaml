          legends_za: "出于好玩偷盗人的物品。\n被偷的人也因其逗人喜爱的动作\n而不自觉地原谅它。"
        zh_trad:
          legends_za: "把偷別人的東西當遊戲。\n被偷的苦主也會因為牠\n惹人憐愛的動作而不禁原諒牠。"
        es_latam:
          legends_za: "Roba a los humanos por mera diversión, pero\nlas víctimas lo perdonan al ver lo encantador\nque es este Pokémon."
