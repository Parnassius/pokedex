        ko:
          legends_za: "빛을 깜박여서 덮쳐 온 적이\n전의를 잃게 한다.\n그 틈에 모습을 감춘다."
        zh_simp:
          legends_za: "通过光的闪烁\n让来袭击的敌人战意全消。\n就在那空当隐藏自己的身体。"
        zh_trad:
          legends_za: "會以光的閃爍\n讓襲擊自己的對手失去戰意。\n並趁機隱藏自己的身影。"
        es_latam:
