        de:
          legends_za: "Es weiß Objekte geschickt einzusetzen. So greift\nund wirft es zum Beispiel kleine Steine mit seinen\nKrallen oder wickelt Seile um Gegner."
        es:
          legends_za: "Su inteligencia le permite servirse de objetos.\nPor ejemplo, recoge y lanza piedras con las patas,\no utiliza cuerdas para atrapar a su oponente."
        ko:
          legends_za: "발로 돌멩이를 쥐어서 던지거나\n로프를 상대에게 휘감는 등\n도구를 다루는 지혜를 가졌다."
        zh_simp:
          legends_za: "头脑聪明，懂得使用工具。\n会用爪子抓起小石头投向敌人，\n或是用绳子把敌人捆住。"
        zh_trad:
          legends_za: "頭腦聰明，懂得使用工具。\n會用爪子抓起小石頭投向敵人，\n或是用繩子把敵人綑住。"
        es_latam:
          legends_za: "Su inteligencia le permite utilizar herramientas.\nPor ejemplo, recoge y lanza piedras con las patas,\no utiliza cuerdas para atrapar a su oponente."
