        es:
          legends_za: "Atrae a sus presas con una dulce fragancia y usa\nsus cepas venenosas para atenazarlas y acabar\ncon ellas."
        ko:
          legends_za: "달콤한 향기로 먹이를 유인한 뒤\n양팔의 독 채찍을 사용하여\n찌르거나 조여서 꼼짝 못 하게 한다."
