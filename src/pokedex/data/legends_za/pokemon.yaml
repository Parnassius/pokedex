        zh_simp:
          legends_za: "用经过锻炼的颈部肌肉\n和铁一般坚硬的头\n把巨大的岩石撞得粉碎。"
        zh_trad:
          legends_za: "會用經過鍛鍊的頸部肌肉\n和鐵一般堅硬的頭顱\n把巨大的岩石撞得粉碎。"
        es_latam:
          legends_za: "Su cuello desarrollado y su cabeza dura como el\nacero le permiten reducir rocas enormes a añicos."
