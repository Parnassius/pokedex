        zh_simp:
          legends_za: "体毛中蓄满电力后，\n尾巴就会发光。会射出\n碰到就会被电麻的体毛。"
        zh_trad:
          legends_za: "體毛中蓄滿電力後，\n尾巴就會開始發光。\n會射出碰到就會被電麻的體毛。"
        es_latam:
          legends_za: "Cuando su pelaje se carga de electricidad,\nsu cola se enciende. Puede lanzar lana\nque electrocuta al contacto."
