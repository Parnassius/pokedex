        es:
          legends_za: "Vive en pequeños agujeros en las paredes de\ncuevas. Cuando una presa pasa cerca, salta hacia\nella sin demora."
        ko:
          legends_za: "동굴의 조그만 구멍을 보금자리로 쓴다.\n먹이가 가까이 다가오면\n재빠르게 뛰쳐나가 붙잡는다."
