        it:
          legends_za: "Hanno un pelo così morbido che se due di loro\nsi abbracciano non vogliono più separarsi."
        de:
          legends_za: "Sein Fell ist so flauschig, dass, wenn zwei\nzusammenstehen, sie nicht getrennt werden\nmöchten."
        es:
          legends_za: "Su pelaje es tan suave que, si dos de ellos se\nacurrucan juntos, no querrán separarse nunca."
        ko:
          legends_za: "2마리가 바싹 붙게 되면\n서로 털의 감촉이 좋은 건지\n떨어지려 하지 않는다."
        zh_simp:
          legends_za: "当２只胖可丁依偎在一起时，\n它们便会因对方的毛皮\n太过舒适而难以分开。"
        zh_trad:
          legends_za: "當２隻依偎在一起時，\n牠們會因為對方的毛皮\n太過舒適而難以分開。"
        es_latam:
          legends_za: "Su pelaje es tan suave que, si dos de ellos se\nacurrucan juntos, no querrán separarse nunca."
