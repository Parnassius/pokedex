        - poison
      descriptions:
        jp_kanji:
          legends_za: "メガシンカにより　￹増量￺ぞうりょう￻した\n￹溶解液￺ようかいえき￻が　￹口内￺こうない￻を　￹満￺み￻たす。\n￹気￺き￻を￹抜￺ぬ￻くと　￹口￺くち￻から　￹溢￺あふ￻れだす。"
        en:
          legends_za: "The volume of this Pokémon’s acid has increased\ndue to Mega Evolution, filling its mouth. If it’s\nnot careful, the acid will overflow and spill out."
        fr:
          legends_za: "Lorsqu’il méga-évolue, le volume d’acide\ndans sa bouche augmente jusqu’à\nla remplir entièrement. Il renverse\nde ce liquide à la moindre inattention."
        it:
          legends_za: "Con la megaevoluzione il volume dell’acido\nnella sua bocca è aumentato fino a riempirla\ndel tutto. Se si distrae, ne fuoriesce un po’."
        de:
          legends_za: "Die Mega-Entwicklung führte zur Zunahme\nder Säure, die nun sein Maul ausfüllt. Wenn\nes unachtsam ist, schwappt diese über."
        es:
          legends_za: "Tras la megaevolución, el volumen de ácido\nha aumentado hasta llenarle la boca por\ncompleto. Si se descuida, le rebosa."
        ko:
          legends_za: "메가진화로 인해 증가한 용해액이\n입속을 가득 채우고 있어서\n긴장이 풀리면 입 밖으로 넘치게 된다."
        zh_simp:
          legends_za: "口中充满因超级进化\n而增加的溶解液。\n一不留神就会从嘴里溢出。"
        zh_trad:
          legends_za: "口中充滿了因超級進化\n而增量的溶解液。\n一不留神就會從口中溢出。"
        es_latam:
          legends_za: "Tras la megaevolución, su volumen de\nácido aumentó hasta llenarle la boca\npor completo. Si se descuida, se le derrama."
