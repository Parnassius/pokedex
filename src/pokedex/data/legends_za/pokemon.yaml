        fr:
          legends_za: "À la recherche de légumes d’hiver nutritifs, il\nparcourt les champs et les vallées en se frayant un\nchemin dans la neige avec sa mâchoire de glace."
        it:
          legends_za: "Vaga per valli e monti innevati facendosi strada\ncon la sua mandibola di ghiaccio in cerca di\nverdure nutrienti in conserva sotto la neve."
        de:
          legends_za: "Es prescht auf der Suche nach nährstoffreichem\nWintergemüse wild über Berge und Felder und\npflügt mit seinem Eiskiefer durch den Schnee."
        es:
