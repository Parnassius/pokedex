          legends_za: "Aus der Bindung zu seinem Trainer schöpft es\nseine Kraft. Seine Fluggeschwindigkeit übertrifft\nsogar die eines Düsenjets."
        es:
          legends_za: "El vínculo que lo une a su Entrenador es la fuente\nde su poder. Su capacidad de vuelo supera la de\nun avión a reacción."
        ko:
          legends_za: "트레이너와의 유대가 힘의 원천이다.\n제트기를 능가하는\n비행 능력을 자랑한다."
        zh_simp:
          legends_za: "与训练家的牵绊是它的力量\n之源。它引以为傲的飞行能力\n完全凌驾于喷气式飞机之上。"
        zh_trad:
          legends_za: "與訓練家的牽絆是牠力量的\n泉源。引以為傲的飛行能力\n甚至凌駕於噴射機之上。"
        es_latam:
          legends_za: "El vínculo que lo une a su Entrenador es la fuente\nde su poder. Su capacidad de vuelo supera la de\nun avión de combate."
