        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      descriptions:
        jp_kanji:
          legends_za: "ツノを　￹握￺にぎ￻る　わずかな　￹違￺ちが￻いから\nトレーナーの　￹気持￺きも￻ちを　￹読￺よ￻み￹取￺と￻るので\n￹一体￺いったい￻となって　￹走￺はし￻れるのだ。"
        en:
          legends_za: "It can tell how its Trainer is feeling by subtle shifts\nin their grip on its horns. This empathic sense lets\nhuman and Pokémon run as if one being."
        fr:
          legends_za: "Il lit les émotions selon la manière dont on agrippe\nses cornes ultrasensibles, et peut ainsi galoper en\nharmonie avec son Dresseur ou sa Dresseuse."
        it:
          legends_za: "È in grado di intuire gli stati d’animo del suo\nAllenatore dal modo in cui questi gli afferra\nle corna. Questo permette loro di galoppare\nin perfetta armonia."
        de:
          legends_za: "Da es die Gefühle seines Trainers an der kleinsten\nVeränderung des Griffes um seine Hörner abliest,\nkönnen sie im Galopp eine ideale Einheit bilden."
        es:
          legends_za: "Percibe los sentimientos del Entrenador por la\nforma en la que agarra sus cuernos, aunque sean\nvariaciones sutiles, y así avanzan como si fueran\nun solo ente."
        ko:
          legends_za: "뿔을 잡을 때 느껴지는 작은 차이로\n트레이너의 마음을 읽어 내기 때문에\n하나가 되어 달릴 수 있는 것이다."
        zh_simp:
          legends_za: "从握角的细微差异\n就能读取训练家的心情，\n所以会心灵一体奔跑。"
        zh_trad:
          legends_za: "可以從握住角時的些微差異\n領會訓練家的心情，所以能夠\n與訓練家一體同心地奔跑。"
        es_latam:
          legends_za: "Percibe los sentimientos del Entrenador a través\nde los sutiles cambios en la forma en la que\nagarra sus cuernos, y así avanzan como si fueran\nun solo ente."
