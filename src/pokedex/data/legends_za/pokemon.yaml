        es:
          legends_za: "Acecha a sus presas adaptando sus colores\na los del paisaje, pero el dibujo de su panza\nnunca cambia."
        ko:
          legends_za: "풍경에 녹아들게끔 몸의 색을 바꿔\n먹이에게 다가간다.\n배의 무늬는 지울 수 없다."
        zh_simp:
          legends_za: "改变身体颜色，融入景色中，\n悄悄地靠近猎物。\n但腹部的花纹是不会消失的。"
        zh_trad:
          legends_za: "能夠改變體色，融入景色中，\n悄悄地靠近獵物。\n但腹部的花紋是不會消失的。"
        es_latam:
          legends_za: "Acecha a sus presas adaptando sus colores\na los del paisaje, pero la marca de su panza\nnunca cambia."
