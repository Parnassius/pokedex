        es:
          legends_za: "Vive cerca de aguas cristalinas. Su capullo se\nabre y esparce polen cuando lo bañan los rayos\ndel sol."
        ko:
          legends_za: "따뜻한 햇볕을 쬐면\n봉오리를 피워서 꽃가루를 날린다.\n깨끗한 물 가까이에 거처가 있다."
        zh_simp:
