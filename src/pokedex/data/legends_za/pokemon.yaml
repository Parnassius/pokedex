          legends_za: "불켜미가 밝히는 빛은\n사람과 포켓몬의 생명력을\n빨아들여 불타고 있는 것이다."
        zh_simp:
          legends_za: "烛光灵点亮的烛光\n是靠吸取人和宝可梦的\n生命力来燃烧的。"
        zh_trad:
          legends_za: "燭光靈頭上的燭火\n是靠著吸取人與寶可夢的\n生命力來燃燒的。"
        es_latam:
          legends_za: "Litwick desprende una luz que absorbe\nla energía vital de humanos y Pokémon,\ny luego la convierte en combustible."
