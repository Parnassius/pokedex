      descriptions:
        jp_kanji:
          legends_za: "￹進化￺しんか￻して　２￹本￺ほん￻に　￹分裂￺ぶんれつ￻した。\nテレパシーで　￹会話￺かいわ￻して\n￹連携攻撃￺れんけいこうげき￻で　￹敵￺てき￻を　￹切￺き￻り￹刻￺きざ￻む。"
        en:
          legends_za: "When Honedge evolves, it divides into two swords\nthat cooperate via telepathy to coordinate attacks\nand slash their enemies to ribbons."
        fr:
          legends_za: "En évoluant, il se divise en deux épées qui\ncoordonnent leurs attaques par télépathie\npour découper leurs adversaires en morceaux."
        it:
          legends_za: "Sdoppiatesi con l’evoluzione, le due parti\ncomunicano telepaticamente per tagliare\na pezzi i nemici con attacchi coordinati."
        de:
          legends_za: "Bei der Entwicklung hat es sich in zwei Schwerter\ngeteilt. Diese verständigen sich mittels Telepathie\nund zerteilen Gegner mit koordinierten Attacken."
        es:
          legends_za: "Al evolucionar se divide en dos espadas.\nSe comunican entre sí mediante telepatía y\ncoordinan los ataques para rebanar al enemigo."
        ko:
          legends_za: "진화하여 2자루로 분열되었다.\n텔레파시로 서로 대화하며\n연계 공격으로 적을 조각낸다."
        zh_simp:
          legends_za: "进化后分裂为２把。\n通过心灵感应对话，\n用配合攻击砍碎敌人。"
        zh_trad:
          legends_za: "進化後分裂為２把。\n會透過心靈感應來交談，\n並以合作攻擊砍碎敵人。"
        es_latam:
          legends_za: "Al evolucionar, se divide en dos espadas, las\ncuales se comunican entre sí mediante telepatía y\ncoordinan los ataques para rebanar al enemigo."
