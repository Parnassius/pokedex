        de:
          legends_za: "Bithora bewohnen jeweils zu zweit einen Felsen.\nEntzweien sie sich im Streit, sucht sich eines der\nbeiden einen neuen Felsen als Unterkunft."
        es:
          legends_za: "Dos Binacle conviven en la misma roca, pero,\ncuando se produce un altercado entre ambos,\nuno de ellos se muda a otra."
        ko:
          legends_za: "2마리의 거북손손이 하나의\n바위에서 산다. 서로 싸우면\n한쪽이 다른 바위로 옮겨 간다."
        zh_simp:
          legends_za: "２只龟脚脚生活在一块岩石上。\n如果吵架了，就会有某只转移到\n其他岩石上去。"
        zh_trad:
          legends_za: "２隻龜腳腳在同一塊岩石上生活。\n一旦雙方吵架，其中１隻\n就會搬到別的岩石上。"
        es_latam:
          legends_za: "Dos Binacle conviven en la misma roca, pero,\ncuando se produce un altercado entre ambos,\nuno de ellos se muda a una roca diferente."
