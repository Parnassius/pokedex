        it:
          legends_za: "Emette un profumo intensissimo. Se un\nAllenatore non è un assoluto estimatore\ndel suo aroma, avrà grosse difficoltà anche\nsolo a stargli vicino."
        de:
          legends_za: "Weil sein Duft äußerst stark ist, muss sein Trainer\ndiesen wirklich mögen, da es sich sonst als sehr\nunangenehm erweist, es an seiner Seite zu haben."
        es:
          legends_za: "La fragancia que despide es tan potente que\nsolo podría caminar a su lado un Entrenador\nque tenga especial predilección por ese aroma."
        ko:
          legends_za: "향기가 지나치게 강하기 때문에\n어지간히 좋아하는 트레이너가 아니면\n데리고 다니기 힘들다."
        zh_simp:
          legends_za: "因为气味过于强烈，\n如果不是相当喜爱它的训练家，\n要带着走路都相当困难。"
        zh_trad:
          legends_za: "由於氣味過於強烈，\n如果不是相當喜歡牠的訓練家，\n就連要帶著一起走都十分困難。"
        es_latam:
          legends_za: "La fragancia que despide es tan potente que\nsolo podría caminar a su lado un Entrenador\nque realmente disfrute ese aroma."
