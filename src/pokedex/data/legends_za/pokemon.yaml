        it:
          legends_za: "Quando è concitato si scalda e iniziano a levarsi\nscintille dalla testa e dalla coda. Per qualche\nmotivo adora i dolci."
        de:
          legends_za: "Ist es aufgeregt, erhitzt sich sein Körper und aus\nseinem Kopf und Schweif sprühen Funken.\nAus irgendeinem Grund liebt es Süßigkeiten."
        es:
          legends_za: "Cuando se emociona, echa chispas por la cola y\nla cabeza, y calienta su cuerpo. Por alguna razón\nle encantan los dulces."
        ko:
          legends_za: "흥분하면 머리나 꼬리에서\n불티가 날아올라 뜨거워진다.\n왜인지 달콤한 것을 매우 좋아한다."
        zh_simp:
          legends_za: "兴奋的时候，从头和尾巴\n飞扬起火花，身体变热。\n不知为何，很喜欢吃甜的东西。"
        zh_trad:
          legends_za: "興奮的時候，\n頭部與尾巴就會變熱並飛出火花。\n不知為何最喜歡吃甜的。"
        es_latam:
          legends_za: "Cuando se emociona, echa chispas por la cola y\nla cabeza, y su temperatura corporal sube.\nPor alguna razón, le encantan los dulces."
