        it:
          legends_za: "Soffre molto la solitudine e, per poter avvicinare\ngli esseri umani e gli altri Pokémon, cela il suo\ntremendo aspetto sotto a un panno."
        de:
          legends_za: "Es versteckt seine schreckliche Gestalt unter\neinem Lumpen, um sich Menschen und anderen\nPokémon zu nähern. Oft fühlt es sich einsam."
        es:
          legends_za: "El saco andrajoso le permite ocultar su aspecto\naterrador para acercarse a otros Pokémon o a la\ngente y vencer así la soledad que lo atenaza."
        ko:
          legends_za: "무시무시한 모습을 누더기로 가리고\n사람이나 다른 포켓몬에게 다가가는\n외로움이 많은 포켓몬이다."
        zh_simp:
