        en:
          legends_za: "It lazes vacantly near water. If something bites its\ntail, it won’t even notice for a whole day."
        fr:
          legends_za: "Ce Pokémon se prélasse mollement au bord de\nl’eau. Il est si distrait qu’il lui faut une journée\npour remarquer qu’on lui mord la queue."
        it:
          legends_za: "Ozia distrattamente vicino all’acqua. Se gli si\nmordesse la coda non se ne accorgerebbe\nneppure dopo un giorno intero."
        de:
          legends_za: "Es faulenzt geistesabwesend am Wasser.\nWenn es in den Schweif gebissen wird,\nbemerkt es das erst am nächsten Tag."
        es:
          legends_za: "Descansa ocioso junto al agua. Aunque le\nmuerdan la cola, no se percata en todo el día."
        ko:
          legends_za: "물가에서 멍하니 있다.\n뭔가가 꼬리를 깨물어도\n하루 종일 눈치채지 못한다."
        zh_simp:
          legends_za: "一直在水边发呆。\n就算有什么东西咬住了尾巴，\n它也一整天不会注意到。"
        zh_trad:
          legends_za: "一直在水邊發呆。\n就算有東西咬住牠的尾巴一整天，\n牠也不會注意到。"
        es_latam:
          legends_za: "Descansa ocioso cerca del agua. Aunque le\nmuerdan la cola, no se dará cuenta en todo el día."
