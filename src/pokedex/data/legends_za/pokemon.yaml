          legends_za: "Sus fornidas patas y lomo le permiten aguantar\nel retroceso del cañón de su caparazón, cuya\npotencia de disparo es pareja a la de un tanque."
        ko:
          legends_za: "등껍질의 대포는 전차 수준의\n위력을 가졌다. 발사의 충격을\n강인한 하체로 견뎌 낸다."
        zh_simp:
          legends_za: "龟甲上的大炮拥有不逊于坦克的\n威力。结实的腰腿使它能在\n发射的冲击力之下用力站稳。"
        zh_trad:
          legends_za: "甲殼上的大砲有著不遜於戰車\n的威力。靠著強韌的下盤筋骨\n承受大砲發射時的衝擊力。"
        es_latam:
          legends_za: "Sus fornidas patas y lomo le permiten aguantar\nel retroceso del cañón de su caparazón, cuya\npotencia es tan poderosa como la de un tanque."
