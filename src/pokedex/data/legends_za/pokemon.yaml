        fr:
          legends_za: "Bien qu’il ait juré fidélité à son Dresseur ou à\nsa Dresseuse, il s’entraîne seul et sans relâche\npour apprendre à maîtriser son énergie Psy."
        it:
          legends_za: "Giura fedeltà al suo Allenatore, ma si sottopone\nad allenamenti solitari per potenziare la propria\nenergia Psico."
        de:
          legends_za: "Es schwört seinem Trainer Treue, aber trainiert\nunablässig alleine, um seine Psycho-Energie\nzu stärken."
        es:
          legends_za: "Aunque ha jurado lealtad a su Entrenador,\nacostumbra a practicar en solitario para\nperfeccionar su dominio de la energía psíquica."
        ko:
          legends_za: "트레이너에게 충성을 맹세하나\n에스퍼 에너지를 단련하기 위해\n혼자서 수련을 반복한다."
        zh_simp:
          legends_za: "它会对训练家宣誓忠诚，\n但为了锻炼超能力能量，\n会独自反复进行训练。"
        zh_trad:
          legends_za: "雖對訓練家忠心耿耿，\n但會為了提升超能力\n而隻身一而再地鍛鍊。"
        es_latam:
          legends_za: "Aunque le juró lealtad a su Entrenador,\nsuele entrenar en solitario para perfeccionar\nsu dominio de la energía psíquica."
