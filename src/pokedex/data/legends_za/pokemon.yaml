        de:
          legends_za: "Es kann in Schwärmen auftauchen und schwirrt\nenorm schnell umher. Mit dem Giftstachel an\nseinem Hinterteil sticht es unablässig zu."
        es:
          legends_za: "En ocasiones forma enjambres. Revolotea a\ngran velocidad y ataca clavando repetidas veces\nel aguijón venenoso del abdomen."
        ko:
          legends_za: "떼를 지어 나타나기도 한다.\n맹렬한 스피드로 날아다니며\n엉덩이의 독침으로 마구 찌른다."
        zh_simp:
          legends_za: "有时会成群结队地出现。\n能以超快的速度飞来飞去，\n并用尾部的毒针不断刺击对手。"
        zh_trad:
          legends_za: "有時會成群結隊地出現。\n能以極快的速度飛來飛去，\n並用尾部的毒針不斷刺擊對手。"
        es_latam:
