          legends_za: "녹색 그룹에 이어\n두 번째로 개체 수가 많다.\n녹색 그룹을 적으로 여기고 있다."
        zh_simp:
          legends_za: "个体数位居第二，\n仅次于绿色的队。\n非常敌视绿队。"
        zh_trad:
          legends_za: "個體數僅次於綠色羽毛的群體，\n是怒鸚哥的第２大勢力。\n敵視著綠色羽毛的群體。"
        es_latam:
