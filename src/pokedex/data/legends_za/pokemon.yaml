        es:
          legends_za: "Es capaz de crear olas gigantescas al desbocarse\ngracias a su fuerza titánica y su enorme cuerpo,\npero es un pésimo cazador."
        ko:
          legends_za: "마구 날뛰면 큰 파도를 일으키는\n큰 몸집과 괴력을 가졌지만\n먹이를 잡는 실력은 좋지 못하다고 한다."
        zh_simp:
