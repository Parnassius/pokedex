          legends_za: "Anche gli arti possiedono un cervello\ne possono muoversi autonomamente, ma in\ngenere seguono le direttive impartite della testa."
        de:
          legends_za: "Die Arme und Beine von Thanathora verfügen\nüber eigene Gehirne, dank denen sie sich frei\nbewegen können. Sie ordnen sich jedoch zumeist\nden Befehlen des Kopfes unter."
        es:
          legends_za: "Si bien todas las extremidades de Barbaracle\ntienen cerebro propio y se mueven a su antojo,\nsuelen seguir las órdenes que imparte la cabeza."
        ko:
          legends_za: "손과 발에도 뇌가 있어 멋대로\n움직일 수 있지만 보통은 머리인\n거북손데스의 명령에 따른다."
        zh_simp:
          legends_za: "手脚也有大脑，可以随意活动。\n但通常会听从头部龟足巨铠的命令。"
        zh_trad:
          legends_za: "雖然手腳上也有大腦，\n會擅自活動，但平常還是\n會聽從頭部龜足巨鎧的命令。"
        es_latam:
          legends_za: "Si bien todas las extremidades de\nBarbaracle tienen cerebro propio y se\nmueven a su antojo, suelen seguir las\nórdenes que imparte la cabeza."
