        de:
          legends_za: "Es verfügt über einen feinen Geruchssinn, mit\ndem es selbst die schwächsten Gerüche erkennen\nkann. Es hilft deshalb oft in Konditoreien aus."
        es:
          legends_za: "Puede rastrear hasta el más débil de los olores.\nHace uso de su fino olfato para ayudar a los\npasteleros más exquisitos."
        ko:
          legends_za: "아주 약간의 냄새도 구별할 수 있는\n민감한 후각을 살려\n파티시에를 돕고 있다."
        zh_simp:
          legends_za: "拥有即便是细微气味\n也能区分的敏锐嗅觉，\n是西点师傅的好帮手。"
        zh_trad:
          legends_za: "善用能辨別細微氣味的敏銳嗅覺，\n幫忙分擔甜點師傅的工作。"
        es_latam:
          legends_za: "Puede rastrear hasta el olor más sutil.\nHace uso de su fino olfato para ayudar\na los pasteleros más talentosos."
