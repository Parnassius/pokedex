        de:
          legends_za: "In seinem Schweif steckt ein Zweig, den es\nmit der Reibungswärme seiner Schweifhaare\nanzündet, um zu kämpfen."
        es:
          legends_za: "Tiene una rama enredada en la cola. Cuando la\nsaca, la rama prende fuego al hacer fricción con\nsu pelaje y se lanza al ataque con ella."
        ko:
          legends_za: "나뭇가지를 꼬리에 꽂고 있다.\n꼬리털의 마찰열로\n가지에 불을 붙여 싸운다."
        zh_simp:
          legends_za: "尾巴上插着树枝。\n通过尾巴上的毛摩擦生热，\n点燃树枝来战斗。"
        zh_trad:
          legends_za: "尾巴上插有樹枝。\n用樹枝和尾巴上的毛摩擦生熱，\n點燃樹枝應戰。"
        es_latam:
          legends_za: "Tiene una rama enredada en la cola. Al hacer\nfricción con su pelaje, le prende fuego a la\nrama y la utiliza para atacar."
