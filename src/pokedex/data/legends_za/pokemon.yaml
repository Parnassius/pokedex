        en:
          legends_za: "Squawkabilly with yellow plumage grew\nincreasingly aggressive in order to be taken\nseriously by the more populous varieties."
        fr:
          legends_za: "Pour ne pas se faire sous-estimer par les groupes\nplus nombreux qu’eux, les Tapatoès jaunes sont\ndevenus de plus en plus agressifs."
        it:
          legends_za: "Nel timore di venire sottovalutati dagli esemplari\ndei gruppi più numerosi, gli Squawkabilly gialli\nsono diventati man mano sempre più aggressivi."
        de:
          legends_za: "Gelbe Krawalloro sind zunehmend angriffslustiger\ngeworden, um von den zahlenmäßig überlegenen\nGruppen ernst genommen zu werden."
        es:
          legends_za: "La agresividad de los ejemplares de plumaje\namarillo responde a su negativa a ser sometidos\npor otros grupos más numerosos."
        ko:
          legends_za: "노란 깃털의 시비꼬는 개체 수가\n많은 그룹에게 무시당하지 않도록\n점점 공격적으로 변했다."
        zh_simp:
          legends_za: "为了不被个体数多的队\n看不起，黄色的怒鹦哥\n变得越来越有攻击性。"
        zh_trad:
          legends_za: "黃色羽毛的怒鸚哥為了\n避免被個體數多的群體看扁，\n於是變得越來越具攻擊性。"
        es_latam:
          legends_za: "La agresividad de los ejemplares de plumaje\namarillo responde a su negativa a ser sometidos\npor otros grupos más numerosos."
