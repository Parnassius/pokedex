        en:
          legends_za: "It filches food from people and Pokémon alike.\nWhile fleeing the scene, it wipes its tracks away\nwith its tail to throw off pursuers."
        fr:
          legends_za: "Il dérobe la nourriture des Pokémon et des êtres\nhumains, puis s’enfuit et efface ses traces de pas\navec sa queue pour semer ses poursuivants."
        it:
          legends_za: "Arraffa il cibo di Pokémon ed esseri umani per poi\nseminare gli inseguitori cancellando le sue orme\ncon la coda durante la fuga."
        de:
          legends_za: "Es stibitzt Futter von Menschen und Pokémon.\nBei der Flucht verwischt es seine Spuren mit\nseinem Schweif, um Verfolger abzuschütteln."
        es:
          legends_za: "Tras robarle el alimento a personas u otros\nPokémon, borra con la cola las huellas que deja\nal huir para así despistar a quien lo persiga."
        ko:
          legends_za: "사람이나 포켓몬의 음식을\n잽싸게 훔치고 도망갈 때\n꼬리로 발자국을 지워서 추격을 따돌린다."
        zh_simp:
          legends_za: "会掠夺人和宝可梦的\n食物，逃跑时用尾巴\n擦掉足迹来甩开追兵。"
        zh_trad:
          legends_za: "搶走人類或寶可夢的食物後，\n會在逃跑時用尾巴擦掉足跡\n以藉此擺脫追兵。"
        es_latam:
          legends_za: "Luego de robar alimento a personas o Pokémon,\nhuye borrando sus huellas con la cola\npara despistar a quien lo persiga."
