        en:
          legends_za: "Its body is made up of molten steel. It melts\nparticles of iron and other metals it finds in the\nground and absorbs them into itself."
        fr:
          legends_za: "Ce Pokémon fait fondre le fer et les autres métaux\ncontenus dans le sol pour les intégrer à son corps\ncomposé d’acier fondu."
        it:
          legends_za: "Il suo corpo è composto di acciaio liquefatto.\nScioglie il ferro e gli altri metalli presenti nel\nsottosuolo per assorbirli."
        de:
          legends_za: "Sein Körper besteht aus geschmolzenem Stahl.\nEs bringt Eisen und andere Metalle im Boden zum\nSchmelzen, um sie dann zu absorbieren."
        es:
          legends_za: "Su cuerpo está compuesto de acero líquido.\nFunde las partículas de hierro y otros metales\ndel subsuelo para luego absorberlas."
        ko:
          legends_za: "걸쭉하게 녹은 강철의 몸을 가졌다.\n땅속의 철분이나 금속을\n녹여서 흡수한다."
        zh_simp:
          legends_za: "身体是化成液状的钢铁。\n它能够将土壤中的铁或\n其它金属溶解后吸收进体内。"
        zh_trad:
          legends_za: "身體是化成液狀的鋼鐵。\n能夠將地底的鐵或其他金屬\n溶解後吸收進體內。"
        es_latam:
          legends_za: "Su cuerpo está compuesto de acero líquido.\nFunde las partículas de hierro y otros metales\ndel subsuelo para luego absorberlas."
