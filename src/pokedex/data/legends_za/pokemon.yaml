        de:
          legends_za: "Da sie alleine nur geringe Mengen an Elektrizität\nerzeugen, sammeln sie sich in Schwärmen,\num mächtige Stromsalven abzufeuern."
        es:
          legends_za: "Apenas puede generar energía por sí mismo,\npero un banco de Tynamo es capaz de crear\nviolentas descargas eléctricas."
        ko:
          legends_za: "약한 전기밖에 낼 수 없기 때문에\n많은 저리어가 모여서\n강력한 전기를 발산한다."
        zh_simp:
          legends_za: "因为只能发出很弱的电，\n所以要许多麻麻小鱼聚集起来，\n才能放出强力的电来。"
        zh_trad:
          legends_za: "由於只能放出微弱的電，\n所以會由許多麻麻小魚聚集起來，\n放出強大的電流。"
        es_latam:
          legends_za: "Apenas puede generar energía por sí mismo,\npero un banco de Tynamo es capaz de crear\nviolentas descargas eléctricas."
