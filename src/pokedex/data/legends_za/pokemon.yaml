        es:
          legends_za: "Cultiva levadura en el interior de su cuerpo.\nConvive con los humanos desde antaño y\nlos ayuda en la producción de alimentos."
        ko:
          legends_za: "체내에서 효모를 키우고 있다.\n먼 옛날부터 사람과 함께 살며\n식생활에 도움을 주고 있다."
        zh_simp:
