        es:
          legends_za: "Las hojas que tiene en los brazos son tan afiladas\nque pueden cortar gruesos árboles. Es invencible\ncuando combate en la selva."
        ko:
          legends_za: "팔에 자란 잎사귀는 큰 나무도\n싹둑 베어 넘어뜨릴 정도다.\n밀림의 싸움에서는 무적이다."
        zh_simp:
