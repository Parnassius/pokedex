        fr:
          legends_za: "Il vit caché sous le couvert des buissons. Quand\nun ennemi l’attaque, il tente de l’intimider en\nhérissant les poils acérés qui couvrent son corps."
        it:
          legends_za: "Vive nascosto nella penombra della boscaglia.\nSe attaccato, minaccia i nemici rizzando il pelo\na mo’ di punte."
        de:
          legends_za: "Es lebt versteckt im schattigen Dickicht. Wird es\nvon einem Feind angegriffen, stellt es sein Fell zur\nAbschreckung zu scharfen Spitzen auf."
        es:
