    zh_trad: 妙蛙種子
    es_latam: Bulbasaur
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      descriptions:
        jp_kanji:
          legends_za: "￹生￺う￻まれたときから　￹背中￺せなか￻に\n￹不思議￺ふしぎ￻な　タネが　￹植￺う￻えてあって\n￹体￺からだ￻と　ともに　￹育￺そだ￻つという。"
        en:
          legends_za: "A strange seed was planted on its back at birth.\nThe plant sprouts and grows with this Pokémon."
        fr:
          legends_za: "Il a un étrange bulbe planté sur le dos qui\ngrandirait avec lui depuis sa naissance."
        it:
          legends_za: "Ha uno strano bulbo piantato sul dorso fin dalla\nnascita che cresce e si sviluppa assieme a lui."
        de:
          legends_za: "Diesem Pokémon wurde bei seiner Geburt ein\nsonderbarer Samen auf dem Rücken eingepflanzt,\nvon dem man sagt, dass er mit ihm wachse."
        es:
          legends_za: "Nace con un extraño bulbo plantado en el lomo\nque se va desarrollando a medida que el Pokémon\ncrece."
        ko:
          legends_za: "태어났을 때부터 등에\n이상한 씨앗이 심어져 있으며\n몸과 함께 자란다고 한다."
        zh_simp:
          legends_za: "据说在它出生的时候，\n背上就种有一个会和它身体\n一同成长的神奇种子。"
        zh_trad:
          legends_za: "據說從牠出生的時候開始，\n背上就種著奇妙的種子，\n和牠的身體一起成長。"
        es_latam:
          legends_za: "Nace con un extraño bulbo plantado en el lomo\nque se va desarrollando a medida que el Pokémon\ncrece."
