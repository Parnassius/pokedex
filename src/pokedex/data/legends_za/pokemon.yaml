        es:
          legends_za: "La impresión del mordisco del Shellder provocó\nuna reacción química con las especias que había\ningerido, tras lo cual adquirió el tipo Veneno."
        ko:
          legends_za: "셀러에게 물렸을 때의 자극과\n체내의 향신료가 화학 반응을\n일으켜 독타입이 되었다."
        zh_simp:
