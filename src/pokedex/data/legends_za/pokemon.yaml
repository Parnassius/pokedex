      descriptions:
        jp_kanji:
          legends_za: "￹大昔￺おおむかし￻の　カロス￹地方￺ちほう￻では\n￹王様￺おうさま￻を　￹護衛￺ごえい￻する　￹役目￺やくめ￻を\n￹与￺あた￻えられた　ポケモン。"
        en:
          legends_za: "Historically, in the Kalos region, these Pokémon\nwere the designated guardians of the king."
        fr:
          legends_za: "Il y a très longtemps, ce Pokémon avait pour rôle\nde protéger le roi de la région de Kalos."
        it:
          legends_za: "Nell’antica Kalos, questo Pokémon aveva\nil compito di proteggere i re."
        de:
          legends_za: "Vor langer Zeit wurde diesem Pokémon in der\nKalos-Region die Rolle zugeteilt, dem König als\nLeibwache zu dienen."
        es:
          legends_za: "Antiguamente, este Pokémon desempeñaba\nel cometido de guardián del rey en la región de\nKalos."
        ko:
          legends_za: "먼 옛날 칼로스지방에서\n왕을 호위하는 역할을\n맡았던 포켓몬이다."
        zh_simp:
          legends_za: "在遥远过去的卡洛斯地区，\n被授予了护卫国王职责的宝可梦。"
        zh_trad:
          legends_za: "在遙遠過去的卡洛斯地區，\n被授予護衛國王職責的寶可夢。"
        es_latam:
          legends_za: "Antiguamente, estos Pokémon se desempeñaban\ncomo guardianes del rey en la región de Kalos."
