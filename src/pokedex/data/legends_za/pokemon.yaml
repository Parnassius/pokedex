        es:
          legends_za: "Su pelaje es tan sensible que percibe los cambios\nen el aire y predice así el tiempo atmosférico y los\npensamientos de sus enemigos."
        ko:
          legends_za: "전신의 세밀한 털로\n공기의 흐름을 알아차려\n상대의 생각이나 날씨를 예측한다."
        zh_simp:
