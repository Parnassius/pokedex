        zh_trad:
          legends_za: "只要聞到飯匙蛇的氣味，\n全身的體毛就會倒豎。\n會用鋒利的爪子撕裂敵人。"
        es_latam:
          legends_za: "Se le eriza todo el pelaje con solo oler un Seviper.\nCon sus afiladas garras puede despedazar a sus\nenemigos."
