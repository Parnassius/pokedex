          legends_za: "Depuis sa bouche à la mâchoire déboîtée,\nil souffle un vent glacial terrible qui recouvre\nles alentours d’un voile blanc."
        it:
          legends_za: "Soffia un potente getto di aria gelida dalla bocca\ndisarticolata, creando tutt’intorno una nuvola di\nneve che offusca la vista e disorienta il nemico."
        de:
          legends_za: "Aus seinem zerbrochenen Maul stößt es eiskalte\nLuftströme aus, welche die gesamte Umgebung\nin Weiß hüllen."
        es:
          legends_za: "Por su boca desencajada exhala una ventisca\nhelada que cubre de blanco sus alrededores."
        ko:
          legends_za: "벌어진 입에서 엄청난\n냉기를 내뿜으면 주변 일대는\n화이트아웃이 발생한다."
        zh_simp:
          legends_za: "如果从破碎的嘴里吐出可怕的冷气，\n会让周围陷入一片白茫茫之中。"
        zh_trad:
          legends_za: "當牠從裂開的口中吐出\n強烈的寒氣時，周遭會\n化成一片白色世界。"
        es_latam:
