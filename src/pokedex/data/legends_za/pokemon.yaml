        de:
          legends_za: "Um seine Gesangskünste zu verbessern, übt es\npausenlos. Selbst wenn es schon schläft, singt es\nin seinen Träumen weiter."
        es:
          legends_za: "Practica constantemente para mejorar su canto,\nllegando incluso a cantar en sueños."
        ko:
          legends_za: "노래를 잘하고 싶어서\n계속 연습을 한다.\n잘 때도 꿈속에서 노래를 부른다."
        zh_simp:
          legends_za: "为了能动听地歌唱，它会一直练习唱歌。\n就算是睡着了，也会在梦中不停地歌唱哦。"
        zh_trad:
          legends_za: "為了讓歌喉變好，\n牠一直努力練習唱歌，\n就連在睡夢中也不斷歌唱。"
        es_latam:
          legends_za: "Practica constantemente para mejorar su canto,\nllegando incluso a cantar en sueños."
