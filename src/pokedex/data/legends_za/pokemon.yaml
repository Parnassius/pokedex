        it:
          legends_za: "Con le sue grandi orecchie può sollevare\nfacilmente massi da più di una tonnellata.\nPuò essere di grande aiuto nei cantieri edili."
        de:
          legends_za: "Seine großen Ohren besitzen die Kraft, über eine\nTonne schwere Felsen mühelos hochzuheben.\nAuf Baustellen ist es deshalb eine große Hilfe."
        es:
          legends_za: "Sus grandes orejas tienen tal fuerza que con ellas\npuede levantar con facilidad rocas de más de una\ntonelada. Es de una ayuda inestimable en las\nobras."
        ko:
          legends_za: "커다란 귀에는 1톤이 넘는 무게의 바위를\n가뿐히 들어 올릴 만한 파워가 있다.\n공사 현장에서 대활약한다."
        zh_simp:
          legends_za: "大大的耳朵拥有轻松举起\n超过１吨重的岩石的力量。\n在施工现场非常活跃。"
        zh_trad:
          legends_za: "大大的耳朵有著能輕易舉起\n超過１噸重的岩石的力量。\n在工地能幫上大忙。"
        es_latam:
          legends_za: "Sus grandes orejas son tan poderosas que\npueden levantar con facilidad rocas de más\nde una tonelada. Su ayuda en las obras es\nincalculable."
