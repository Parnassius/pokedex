        jp_kanji:
          legends_za: "￹昔￺むかし￻の　￹貴婦人￺きふじん￻たちは　￹香水￺こうすい￻の　かわりに\n￹好￺この￻みの　￹香￺かお￻りを　￹出￺だ￻す\nシュシュプを　￹連￺つ￻れていたという。"
        en:
          legends_za: "In the past, rather than using perfume, royal\nladies carried a Spritzee that would waft a\nfragrance they liked."
        fr:
          legends_za: "Par le passé, les femmes de la noblesse ne se\nparfumaient pas, mais étaient accompagnées\nd’un Fluvetin exhalant leur parfum favori."
        it:
          legends_za: "Si dice che nell’antichità, al posto del profumo,\nle nobildonne portassero sempre con sé uno\nSpritzee che emanava la loro fragranza preferita."
        de:
          legends_za: "Statt Parfüm zu benutzen, sollen vornehme\nDamen früher ein Parfi mit sich geführt haben,\ndas ihren Lieblingsduft verströmte."
        es:
          legends_za: "Antaño, las damas de la nobleza llevaban\nun Spritzee consigo que desprendía su aroma\npreferido, en vez de utilizar un perfume\nconvencional."
        ko:
          legends_za: "옛 귀부인들은 향수 대신에\n좋아하는 향을 내는 슈쁘를\n데리고 다녔다고 한다."
        zh_simp:
          legends_za: "听说过去的贵妇们会带着\n能散发自己喜欢的香气的\n粉香香来代替香水。"
        zh_trad:
          legends_za: "據說以前的貴婦們會帶著\n散發自己喜歡的香氣的\n粉香香來代替香水。"
        es_latam:
          legends_za: "En el pasado, las damas de la nobleza llevaban\nun Spritzee consigo que desprendía su aroma\npreferido, en vez de utilizar un perfume\nconvencional."
