        it:
          legends_za: "Il salgemma estraibile da Garganacl contiene\nnumerosi principi rigeneranti con effetti utili\nal mantenimento di una buona salute."
        de:
          legends_za: "Das Steinsalz, das aus Saltigant gewonnen\nwerden kann, ist reich an heilenden Inhaltsstoffen\nund trägt zum Erhalt der Gesundheit bei."
        es:
          legends_za: "La sal de roca extraída de los Garganacl tiene\naltas propiedades curativas, por lo que resulta\nun complemento útil para una vida saludable."
        ko:
          legends_za: "콜로솔트로부터 얻을 수 있는 암염은\n회복 성분이 많이 포함되어 있어\n건강을 유지하는 데 도움을 준다."
        zh_simp:
          legends_za: "从盐石巨灵身上采集的\n岩盐富含回复成分，\n对维持健康很有帮助。"
        zh_trad:
          legends_za: "從鹽石巨靈採收的岩鹽\n富含具有恢復作用的成分，\n有助於維持身體健康。"
        es_latam:
          legends_za: "La sal de roca extraída de los Garganacl tiene\naltas propiedades curativas, por lo que resulta\nun complemento útil para una vida saludable."
