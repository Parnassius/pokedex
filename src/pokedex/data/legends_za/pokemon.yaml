        en:
          legends_za: "The bulbous ends of its tentacles are perfect for\npummeling but next to useless for gripping."
        fr:
          legends_za: "Ses tentacules aux extrémités gonflées sont\nparfaits pour frapper tout ce qu’il voit, mais\ntrès mal adaptés pour saisir des objets."
        it:
          legends_za: "I suoi tentacoli dalle estremità rigonfie sono\nl’ideale per malmenare, ma non sono affatto\nidonei ad afferrare oggetti."
        de:
          legends_za: "Seine verdickten Tentakelspitzen eignen sich sehr\ngut zum Prügeln. Das Greifen von Gegenständen\nfällt mit ihnen allerdings schwer."
        es:
          legends_za: "Sus tentáculos de extremos hinchados son\nperfectos para golpear cosas, pero inútiles a\nla hora de agarrarlas."
        ko:
          legends_za: "끝이 부풀어 오른 촉수는\n마구 때리는 데는 매우 유용하나\n물건을 쥐기가 상당히 어렵다."
        zh_simp:
          legends_za: "触手前端鼓鼓的，\n很擅长一个劲地敲打，\n但极不擅长抓取东西。"
        zh_trad:
          legends_za: "很擅長用前端圓膨膨的觸手\n盡情地大敲特敲一番，\n但最不拿手的就是用它抓東西。"
        es_latam:
          legends_za: "Las protuberancias de sus tentáculos\nson perfectas para golpear cosas,\npero inútiles para agarrarlas."
