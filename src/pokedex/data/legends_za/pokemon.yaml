        zh_simp:
          legends_za: "戴着自己出生后不久\n就去世的母亲的头骨，\n绝不露出本来的面貌。"
        zh_trad:
          legends_za: "戴著自己一出生就\n死別的母親的頭骨，\n絕對不露出真面貌。"
        es_latam:
          legends_za: "Perdió a su madre apenas nació. Lleva puesto\nsu cráneo y nunca muestra el rostro."
