      descriptions:
        jp_kanji:
          legends_za: "￹水￺みず￻と　￹太陽￺たいよう￻が　あれば　￹背中￺せなか￻の\n￹葉￺は￻っぱで　エネルギーが　￹作￺つく￻れるので\nエサを　￹食￺た￻べなくても　￹平気￺へいき￻なのだ。"
        en:
          legends_za: "If it has sunshine and water, it doesn’t need to\neat, because it can generate energy from the\nleaves on its back."
        fr:
          legends_za: "Tant qu’il a de l’eau et du soleil, ce Pokémon n’a\npas besoin de nourriture, car les feuilles sur son\ndos produisent l’énergie qui lui est nécessaire."
        it:
          legends_za: "Ricava energia dal sole e dall’acqua grazie alle\nfoglie che ha sul dorso. In questo modo può\nsopravvivere anche senza mangiare."
        de:
          legends_za: "Solange es Wasser und Sonnenlicht hat, kann es\nmit den Blättern auf seinem Rücken Energie\nerzeugen. Deswegen kommt es auch ohne Futter\nzurecht."
        es:
          legends_za: "Puede generar energía con las hojas que tiene\nen la espalda disponiendo tan solo de agua y luz\nsolar. Gracias a ello puede sobrevivir sin comer."
        ko:
          legends_za: "물과 태양이 있으면 등에 있는\n잎으로 에너지를 만들 수 있어서\n먹이를 먹지 않아도 괜찮다."
        zh_simp:
          legends_za: "如果有水和阳光，\n就能用背上的叶子制造能量，\n所以即使不吃食物也没事。"
        zh_trad:
          legends_za: "只要有水與陽光，\n就能以背上的葉子產生能量，\n即使不吃東西也沒問題。"
        es_latam:
          legends_za: "Si cuenta con luz solar y agua, puede generar\nenergía con las hojas que tiene en la espalda.\nGracias a ello, puede sobrevivir sin comer."
gogoat:
  species_id: 673
  names:
    jp_kanji: ゴーゴート
    en: Gogoat
    fr: Chevroum
    it: Gogoat
