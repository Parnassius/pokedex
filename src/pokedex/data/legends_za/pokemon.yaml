        zh_trad:
          legends_za: "把洞窟裡的小洞當成住所。\n如果有獵物靠近，\n就會迅速地撲出來捕捉。"
        es_latam:
          legends_za: "Vive en pequeños agujeros en las paredes de\nlas cuevas. Cuando una presa pasa cerca, salta\npara capturarla."
