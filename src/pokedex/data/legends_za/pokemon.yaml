        ko:
          legends_za: "딱딱한 집게는 공격과 수비에\n모두 능하다. 오기지게끼리의\n싸움은 복싱 같다."
        zh_simp:
          legends_za: "坚硬的钳子攻守皆宜。\n好胜蟹同类之间的战斗\n就像是拳击一样。"
        zh_trad:
          legends_za: "堅硬的鉗子攻守皆宜。\n好勝蟹與好勝蟹之間的戰鬥\n就像是拳擊賽一樣。"
        es_latam:
          legends_za: "Usa hábilmente sus robustas pinzas tanto para\natacar como para defenderse. Las peleas entre\ncongéneres parecen combates de boxeo."
