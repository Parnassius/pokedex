        fr:
          legends_za: "Lorsqu’une étoile filante illumine le ciel\nnocturne, il se pourrait qu’il s’agisse en réalité\nde Méga-Rayquaza pourchassant une météorite."
        it:
          legends_za: "Se vedi una stella cadente brillare nel\ncielo notturno, potrebbe essere in realtà\nMegaRayquaza che insegue un meteorite."
        de:
