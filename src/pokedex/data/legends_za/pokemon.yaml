        es:
          legends_za: "Si le dan un golpecito en la cabeza, retrae el\ncuerpo en el caparazón para protegerse, aunque\nla punta de la cola siempre le asoma un poco."
        ko:
          legends_za: "딱 하고 머리를 맞을 때\n등껍질로 숨어서 피한다.\n하지만 꼬리가 살짝 삐져나와 있다."
        zh_simp:
          legends_za: "如果拍打它的头部，它会\n把头缩进壳里，但尾巴\n还是会露出来一点点。"
        zh_trad:
          legends_za: "如果有人打牠的頭，\n牠會縮進殼裡來躲避，\n但會留下一小截尾巴在外面。"
        es_latam:
          legends_za: "Si le dan un golpecito en la cabeza, retrae el\ncuerpo en el caparazón para protegerse, aunque\nla punta de la cola siempre se le asoma un poco."
