        en:
          legends_za: "This Pokémon spins a giant shuriken at high\nspeed to make it float, then clings to it upside\ndown to catch opponents unawares."
        fr:
          legends_za: "Il fait tournoyer un shuriken géant à toute vitesse\npour le faire flotter, puis s’y accroche la tête en\nbas afin de prendre ses ennemis par surprise."
        it:
          legends_za: "Fa roteare uno shuriken gigante a gran velocità\nper farlo rimanere in aria, poi vi si attacca a testa\nin giù per cogliere di sorpresa l’avversario."
        de:
          legends_za: "Es heftet sich kopfüber an einen riesigen\nWurfstern, den es so schnell dreht, dass er in der\nLuft schwebt, und überrumpelt so seine Gegner."
        es:
          legends_za: "Hace girar un enorme shuriken a tal velocidad\nque queda suspendido en el aire, y se adhiere a él\nboca abajo para atacar por sorpresa al enemigo."
        ko:
          legends_za: "고속 회전에 의해 떠 있는\n거대 수리검에 거꾸로 달라붙어서\n상대의 허를 찌른다."
        zh_simp:
          legends_za: "会高速旋转巨大的手里剑\n使其浮空，倒贴在上面\n打对手一个出其不意。"
        zh_trad:
          legends_za: "利用高速旋轉讓巨大的手裡劍\n浮在空中，自己倒貼在上面\n出其不意地攻擊對手。"
        es_latam:
          legends_za: "Hace girar un enorme shuriken a tal velocidad\nque queda suspendido en el aire, y se adhiere a él\nboca abajo para atacar por sorpresa al enemigo."
