        zh_trad:
          legends_za: "結凍的身體有如鋼鐵般堅硬。\n用巨大的身體壓碎\n擋路的東西前進。"
        es_latam:
          legends_za: "Su cuerpo, cubierto de hielo, es tan duro como\nel propio acero. Su robusta forma le permite\narrasar con todo lo que se encuentra a su paso."
