        en:
          legends_za: "Wielding a thick, heavy leek has strengthened its\nbody. In battle, it bets everything on a single\ndestructive blow."
        fr:
          legends_za: "À force de soulever son poireau lourd et massif,\nil a musclé son corps. Il compte sur la puissance\ndestructrice d’une seule frappe pour gagner."
        it:
          legends_za: "Ha irrobustito il corpo a furia di maneggiare\nun porro grosso e pesante. Punta tutto sulla\npotenza distruttiva dei suoi singoli colpi."
        de:
          legends_za: "Die Nutzung der dicken, schweren Lauchstange\nhat seinen Körper gestählt. Es setzt alles auf die\nZerstörungskraft eines einzigen Schlages."
        es:
          legends_za: "Ha fortalecido el cuerpo a base de cargar con un\npuerro enorme y pesado. Al atacar, apuesta por\nasestar un solo golpe devastador."
