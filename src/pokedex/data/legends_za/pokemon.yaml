          legends_za: "￹夜明￺よあ￻けごろ　あたり￹一帯￺いったい￻に\n￹響￺ひび￻きわたる　￹不気味￺ぶきみ￻な　￹遠￺とお￻ぼえで\n￹自分￺じぶん￻たちの　￹縄張￺なわば￻りを　アピール。"
        en:
          legends_za: "Around dawn, their ominous howls echo through\nthe area to announce their territory."
        fr:
          legends_za: "À l’aube, ils poussent des hurlements sinistres\nqui résonnent aux alentours pour annoncer\nqu’ils contrôlent le territoire."
        it:
          legends_za: "All’alba, i suoi sinistri urli riecheggiano nell’aria.\nIn questo modo marca il territorio."
        de:
          legends_za: "Mit dem ominösen Heulen, das bei Morgengrauen\nüber das Gebiet schallt, erheben diese Pokémon\nAnspruch auf ihr Territorium."
        es:
          legends_za: "Al amanecer, proclaman su territorio con un\ninquietante aullido que resuena en toda la zona."
        ko:
          legends_za: "새벽녘이 되면 주변 일대에\n울려 퍼지는 기분 나쁜 울음소리로\n자신들의 영역을 어필한다."
        zh_simp:
          legends_za: "黎明时分，会用响彻附近一带的\n恐怖长嚎来宣示它们自己的领地。"
        zh_trad:
          legends_za: "會在黎明時分用響徹附近一帶的\n嚇人長嚎來宣示牠們自己的地盤。"
        es_latam:
          legends_za: "Al amanecer, proclaman su territorio con un\nsombrío aullido que resuena en toda la zona."
