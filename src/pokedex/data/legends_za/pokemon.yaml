        it:
          legends_za: "Emette dalle braccia sul dorso il vapore\ngenerato nel suo corpo con una potenza\ntale da spazzare via una montagna."
        de:
          legends_za: "Über die Arme auf seinem Rücken stößt es\nWasserdampf aus. Seine Kraft reicht aus,\num einen ganzen Berg davonzublasen."
        es:
          legends_za: "Expulsa vapor de agua por los brazos que\ntiene en la espalda. Sale a tal potencia que\nsería capaz de arrasar una montaña entera."
        ko:
          legends_za: "등에 있는 팔로 체내의\n수증기를 분사한다.\n산 하나를 날려 버릴 정도의 위력이다."
        zh_simp:
          legends_za: "从背上的手臂里喷射出\n体内的水蒸气。\n有着把整座山一下子吹飞的威力。"
        zh_trad:
          legends_za: "從背上的手臂噴出\n體內的水蒸氣。\n有著將整座山轟飛的威力。"
        es_latam:
          legends_za: "Expulsa vapor de agua por los brazos que\ntiene en la espalda. Este sale con tanta potencia\nque es capaz de arrasar una montaña entera."
