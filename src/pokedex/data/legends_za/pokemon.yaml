        es:
          legends_za: "Posee un carácter manso a pesar de su aspecto,\npero, si alguien amenaza a su familia, lo persigue\nsin piedad hasta eliminar el peligro."
        ko:
          legends_za: "겉모습에 어울리지 않게 상냥하지만\n가족을 위협하는 상대는\n자비 없이 추격해서 처치한다."
        zh_simp:
          legends_za: "拥有和外表不相称的好心肠。\n但如果家人受到对手威胁，\n则会无情地追击并了结对手。"
        zh_trad:
          legends_za: "有著與外表不相稱的善良性格，\n但在面對威脅家族安危的對手時，\n就會不留情地窮追到底並加以收拾。"
        es_latam:
