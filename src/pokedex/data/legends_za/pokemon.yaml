        en:
          legends_za: "It sleeps in caves during the day. It has no eyes,\nso it emits ultrasonic waves to check its\nsurroundings while flying."
        fr:
          legends_za: "Il dort dans des grottes pendant la journée.\nComme il n’a pas d’yeux, il vole en se repérant\ngrâce à ses ultrasons."
        it:
          legends_za: "Di giorno dorme dentro le grotte. Non ha occhi\ne quando vola emette ultrasuoni tramite i quali\npercepisce l’ambiente circostante."
        de:
          legends_za: "Tagsüber schläft es in Höhlen. Da es keine Augen\nhat, erschließt es sich seine Umgebung im Flug\ndurch das Aussenden von Schallwellen."
        es:
          legends_za: "Duerme en cuevas durante el día. Como no tiene\nojos, se guía emitiendo ultrasonidos cuando\nvuela."
        ko:
          legends_za: "낮에는 동굴에서 자고 있다.\n눈이 없어서 초음파로\n주변을 확인하면서 날아다닌다."
        zh_simp:
          legends_za: "白天在洞穴里睡觉。\n因为没有眼睛，所以用超音波\n一边探测周围，一边飞行。"
        zh_trad:
          legends_za: "白天在洞穴裡睡覺。\n由於沒有眼睛，會利用超音波\n一邊確認周圍環境一邊飛行。"
        es_latam:
          legends_za: "Duerme en cuevas durante el día. Como no tiene\nojos, se guía emitiendo ultrasonidos cuando\nvuela."
