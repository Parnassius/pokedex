        en:
          legends_za: "Electricity sparks from the pads on its limbs.\nWherever Zeraora runs, lightning flashes and\nthunder echoes."
        fr:
          legends_za: "Il envoie des décharges électriques avec\nles coussinets de ses pattes. Quand il court,\ndes éclairs jaillissent et le tonnerre gronde."
        it:
          legends_za: "Emette scariche elettriche dai cuscinetti delle\nzampe. Sfreccia a tutta velocità accompagnato\nda saette e rombi di tuono."
        de:
          legends_za: "Über die Ballen an seinen Pfoten entlädt es\nElektrizität. Wenn Zeraora an einem vorbeirennt,\nzuckt ein Blitz auf und man hört Donnergrollen."
        es:
          legends_za: "Las almohadillas de sus patas desprenden\ndescargas eléctricas. Cuando corre, hace\nque caigan rayos y reverberen los truenos."
        ko:
          legends_za: "손발의 볼록살에서 전기를 내보낸다.\n제라오라가 달려 나가면 번개가 치고\n우렛소리가 울려 퍼진다."
        zh_simp:
          legends_za: "从手脚的肉球放电。\n当捷拉奥拉奔驰而过时，\n周围将充斥着电闪雷鸣。"
        zh_trad:
          legends_za: "從手腳的肉球放電。\n當捷拉奧拉奔馳而過時，\n周圍將充斥著電閃雷鳴。"
        es_latam:
          legends_za: "Las almohadillas de sus patas desprenden\ndescargas eléctricas. Cuando corre, hace\nque los rayos caigan y que los truenos resuenen."
