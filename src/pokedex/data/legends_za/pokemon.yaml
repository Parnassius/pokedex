          legends_za: "Sa morsure est très venimeuse. Elle paralyse\nmême les grands Pokémon oiseaux,\nses prédateurs."
        it:
          legends_za: "Mordendo inietta un veleno potente. Anche\ni grandi Pokémon alati, suoi predatori naturali,\nne rimangono paralizzati."
        de:
          legends_za: "Sein Biss injiziert ein starkes Gift, das selbst\ngroße Vogel-Pokémon, seine natürlichen Feinde,\nlähmt."
        es:
          legends_za: "Inocula un poderoso veneno al morder que\ninmoviliza hasta a los Pokémon pájaro más\ngrandes, sus enemigos naturales."
        ko:
          legends_za: "물어서 맹독을 퍼뜨린다.\n천적인 커다란 새포켓몬도\n몸이 마비돼서 움직일 수 없다."
        zh_simp:
          legends_za: "会咬住对手施以剧毒。\n就连它的天敌大型鸟宝可梦\n也会身体麻痹，动弹不得。"
        zh_trad:
          legends_za: "會咬住對手後注入劇毒。\n即使是天敵的大型鳥寶可夢，\n也會身體麻痺，動彈不得。"
        es_latam:
