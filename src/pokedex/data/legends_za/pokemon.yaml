        en:
          legends_za: "Its habitat includes everything from beaches to\nseabeds. It is happy to eat up even rotten scraps,\nproviding a sort of natural cleaning service."
        fr:
          legends_za: "Il vit aussi bien en bord de mer que dans les fonds\nmarins. Véritable aspirateur sur pattes, il avale\nn’importe quelle nourriture, même pourrie."
        it:
          legends_za: "Vive dappertutto, dalle spiagge ai fondali marini.\nMangia volentieri anche sostanze putrescenti,\nperciò viene chiamato \"lo spazzino della natura\"."
        de:
          legends_za: "Es mag verschiedene Habitate, vom Strand bis hin\nzum Meeresgrund. Unterwegs frisst es gern\nFaules und ist eine natürliche Reinigungskraft."
        es:
          legends_za: "Su hábitat es muy variado, desde playas hasta\nel fondo del mar. Hace de barrendero natural al\nir engullendo presas podridas por el camino."
        ko:
          legends_za: "해변부터 해저까지 다양한 장소에 산다.\n썩은 먹이라도 기꺼이 먹는\n자연의 청소부와도 같은 존재다."
        zh_simp:
          legends_za: "从沙滩到海底，栖息在各式各样的地方。\n即使是腐烂的食物也能吃得很开心，\n是大自然的清洁员。"
        zh_trad:
          legends_za: "從沙灘到海底，會棲息在各式各樣的地方。\n即使是腐爛的食物也能吃得很開心，\n是大自然的清潔員。"
        es_latam:
          legends_za: "Su hábitat es muy variado, desde playas hasta\nel fondo del mar. Hace de barrendero natural al\nir engullendo carroña por el camino."
