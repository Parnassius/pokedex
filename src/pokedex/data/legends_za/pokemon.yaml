        zh_simp:
          legends_za: "当空前的危机来临时，\n感受人类的思绪而超级进化。\n能用无双之力将事态平息。"
        zh_trad:
          legends_za: "當前所未有的危機來臨時，\n會感受人的心思而超級進化。\n能用獨一無二的力量平息事態。"
        es_latam:
