        it:
          legends_za: "In passato era venerato perché lo si riteneva\ncapace di generare ferro. È misteriosamente\nricomparso dopo 3.000 anni di assenza."
        de:
          legends_za: "Einst wurde es für seine Fähigkeit verehrt, Eisen\nerschaffen zu können. Nach 3000 Jahren ist es\naus einem unerfindlichen Grund wieder erwacht."
        es:
          legends_za: "En la antigüedad se le veneraba por su poder\nde crear hierro. Después de tres milenios, ha\nregresado misteriosamente."
        ko:
          legends_za: "철을 만들어 내는 힘을 가졌다고\n추앙받았었다. 모종의 이유로\n3000년의 세월이 흘러 되살아났다."
        zh_simp:
          legends_za: "因为拥有产出铁的力量而\n受到崇拜。不知为何，经过\n３０００年后突然苏醒了过来。"
        zh_trad:
          legends_za: "擁有產出鐵的力量，因而受到\n人們的崇拜。不知為何，在經過\n３０００年的時間後甦醒過來。"
        es_latam:
          legends_za: "En la antigüedad, se le veneraba por su poder\npara crear hierro. Después de tres milenios,\nregresó misteriosamente."
