        es:
          legends_za: "Su cuerpo, cubierto de hielo, es tan duro como\nel propio acero. Su abultada figura le permite\narramblar con todo lo que se encuentra a su paso."
        ko:
          legends_za: "얼어붙은 몸은 강철처럼 단단하다.\n앞을 가로막는 것을\n커다란 몸으로 파괴하며 이동한다."
        zh_simp:
