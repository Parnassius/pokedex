          legends_za: "Forma original que adopta tras recuperar su\npoder sellado. Se dice que el agujero que tiene\nen el pecho es un portal a otra dimensión."
        ko:
          legends_za: "봉인된 힘을 되찾은 본래의 모습.\n가슴의 구멍은 다른 차원과\n연결되어 있다고 전해진다."
        zh_simp:
          legends_za: "将被封印的力量\n找回来后的本来面目。\n据说胸上的洞与异次元相连。"
        zh_trad:
          legends_za: "重獲了被封印的力量後\n恢復的原本的樣子。\n據說胸口的洞與異次元相連。"
        es_latam:
          legends_za: "Forma original que adopta tras recuperar su poder\nsellado. Se dice que el agujero que tiene\nen el pecho es un portal hacia otra dimensión."
