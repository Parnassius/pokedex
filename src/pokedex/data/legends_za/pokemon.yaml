        ko:
          legends_za: "머리의 잎사귀에서 살짝 달콤한\n향기가 감돈다. 얌전하며\n햇볕을 쬐는 것을 매우 좋아한다."
        zh_simp:
          legends_za: "从头上的叶子那里\n会飘散出淡淡的甜香。\n性情温和，非常喜欢沐浴阳光。"
        zh_trad:
          legends_za: "從頭上的葉子飄散出\n淡淡的清甜香氣。\n性情溫和，最愛沐浴在陽光下。"
        es_latam:
          legends_za: "La hoja de su cabeza desprende un dulce\ny sutil aroma. Es dócil y le encanta absorber\nlos rayos de sol."
