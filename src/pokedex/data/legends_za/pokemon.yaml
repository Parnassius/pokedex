        en:
          legends_za: "Its wings, now made of steel, are extremely\ntough. Even if it’s attacked mid-flight, Corviknight\nflies on mightily through the sky, unbothered."
        fr:
          legends_za: "Ses ailes, désormais en acier, sont devenues\nsi résistantes qu’il ne craint plus les attaques\nquand il vole vigoureusement."
        it:
          legends_za: "Le sue ali d’acciaio sono talmente dure da\npermettergli di volare in cielo con imperturbato\nvigore anche dopo aver subito un attacco."
        de:
          legends_za: "Seine zu Stahl gewordenen Flügel sind so robust,\ndass es unbeirrt weiter kraftvoll durch die Lüfte\nfliegen kann, selbst wenn es Angriffe einsteckt."
        es:
          legends_za: "El acero en el que se han convertido sus alas es\nde tal dureza que le permite surcar los cielos con\nbrío sin inmutarse ante los ataques que reciba."
        ko:
          legends_za: "강철이 된 날개는 매우 단단하여\n공격을 받아도 신경 쓰지 않고\n힘차게 하늘을 날 수 있다."
        zh_simp:
          legends_za: "变成钢铁的翅膀非常坚硬，\n即使遭受攻击也毫不在意，\n会在空中奋力地持续飞翔。"
        zh_trad:
          legends_za: "變成鋼鐵的羽毛非常堅硬，\n即使遭受攻擊也毫不在乎，\n會繼續奮力地在天空翱翔。"
        es_latam:
          legends_za: "La dureza de sus alas convertidas en acero es tal\nque le permite surcar los cielos con brío sin\ninmutarse ante los ataques que recibe."
