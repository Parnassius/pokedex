        zh_simp:
          legends_za: "在朔月的夜晚一边在街上游荡\n一边用诡异的声音唱歌。\n如果听到那歌声，就会被诅咒。"
        zh_trad:
          legends_za: "每到新月之夜，會一邊用\n詭異的聲音唱歌一邊在街上徘徊。\n聽到歌聲者會遭到詛咒。"
