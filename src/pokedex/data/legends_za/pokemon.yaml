        en:
          legends_za: "It is not yet skilled at storing electricity. It may\nsend out a jolt if amused or startled."
        fr:
          legends_za: "Il n’est pas encore très doué pour stocker\nl’électricité. Il lui arrive d’envoyer des décharges\nlorsqu’il est surpris ou qu’il se met à rire."
        it:
          legends_za: "Non è ancora bravo a immagazzinare elettricità.\nSe si spaventa o scoppia a ridere, gli sfuggono\nsubito delle scosse elettriche."
        de:
          legends_za: "Das Speichern von Elektrizität fällt ihm noch\nschwer. Wenn es erschrickt oder sich freut,\nstößt es sofort eine elektrische Ladung aus."
        es:
          legends_za: "Todavía no domina el almacenamiento de\nelectricidad, por lo que descarga rayos si\nse divierte o se asusta."
        ko:
          legends_za: "아직 전기를 모으는 게 서툴다.\n놀라거나 웃으면\n바로 방전돼 버린다."
        zh_simp:
          legends_za: "仍然不擅长蓄电。\n惊讶或者发笑时，\n就会立刻进行放电。"
        zh_trad:
          legends_za: "還不擅長蓄電。\n驚訝或是發笑的時候\n就會不由自主地放電。"
        es_latam:
          legends_za: "Aún no aprende cómo almacenar electricidad,\npor lo que puede descargar rayos cuando se\nemociona o se asusta."
