        it:
          legends_za: "Il porro che ha coltivato dedicandovi anima e corpo\nè la sua ragione di vita. Si distingue in battaglia\nmaneggiandolo con grazia."
        de:
          legends_za: "Seine mit Hingabe herangezogene Lauchstange\nist sein Ein und Alles. Mit ihr führt es kunstvolle\nTechniken aus, um im Kampf Ruhm zu erringen."
        es:
          legends_za: "Su puerro, a cuyo cuidado dedica cuerpo y alma,\nes su razón de ser. Lo blande con maestría en\ncombate para cosechar grandes hazañas."
        ko:
          legends_za: "심혈을 기울여 키워 낸 파는\n창파나이트의 목숨과도 같다.\n화려한 파 놀림으로 무공을 세웠다."
        zh_simp:
          legends_za: "对于葱游兵来说，倾注心血\n培育的葱比任何事物都重要。\n以华丽的葱术在战场上立功。"
        zh_trad:
          legends_za: "傾注精力心血栽培出來的蔥，\n對蔥遊兵而言如同生命般重要。\n以華麗的蔥術在戰場上立下功績。"
        es_latam:
          legends_za: "Su puerro, a cuyo cuidado dedica cuerpo y alma,\nes su razón de ser. Lo blande con maestría en\ncombate para cosechar grandes hazañas."
