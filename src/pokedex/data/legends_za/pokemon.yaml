        en:
          legends_za: "Its down is so soft, it seems as if a touch could\nmelt it. But it’s strong enough that just a few\nstrands could be used to hoist a dump truck."
        fr:
          legends_za: "Ses douces plumes si fragiles en apparence sont\ntellement robustes qu’une poignée suffit pour\nhisser un camion-benne."
        it:
          legends_za: "Le sue piume dalla sublime morbidezza sono\ncosì resistenti che ne bastano poche per tenere\nsospeso in aria un autocarro."
        de:
          legends_za: "Seine Daunen, die sich unfassbar weich anfühlen,\nsind so robust, dass ein paar davon reichen,\num einen Kipplaster in der Luft zu halten."
        es:
          legends_za: "Sus plumas, increíblemente suaves al tacto, son\ntan resistentes que solo unas pocas bastarían\npara sostener un camión en el aire."
        ko:
          legends_za: "녹아내릴 것만 같은 촉감의 털은\n단 몇 가닥으로 덤프트럭을\n매달아 올릴 수 있을 정도로 튼튼하다."
        zh_simp:
          legends_za: "羽毛有溶化般的触感，\n只需几根就能吊起\n翻斗车，十分强韧。"
        zh_trad:
          legends_za: "彷彿一觸即化的羽毛\n強韌得只需要幾根\n就足以吊起砂石車。"
        es_latam:
          legends_za: "Aunque sus plumas son increíblemente suaves,\nson tan resistentes que solo unas pocas bastarían\npara mantener un camión suspendido en el aire."
