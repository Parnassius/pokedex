        ko:
          legends_za: "영양 만점인 겨울 채소를 찾아\n얼음으로 된 턱으로 눈을 가로지르며\n산과 들을 뛰어다닌다."
        zh_simp:
          legends_za: "为了寻找营养十足的越冬蔬菜，\n会用冰的颚部将雪拨开，\n在山野之间跑来跑去。"
        zh_trad:
          legends_za: "為了尋找營養滿分的雪藏蔬菜，\n會用冰顎剷開積雪，\n在山野之間四處奔跑。"
        es_latam:
          legends_za: "Se abre paso entre la nieve con su mandíbula\nde hielo, y recorre prados y montes en busca\nde hortalizas invernales ricas en nutrientes."
