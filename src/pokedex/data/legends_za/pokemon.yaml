        fr:
          legends_za: "Il méga-évolue en réponse aux émotions des êtres\nhumains frappés par un danger sans précédent,\net apaise la situation grâce à son pouvoir inégalé."
        it:
          legends_za: "Quando sopraggiunge una crisi senza precedenti,\navverte le emozioni delle persone e si megaevolve\nper risolverla con forza impareggiabile."
        de:
