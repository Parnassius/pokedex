        en:
          legends_za: "In order to support its flower, which has\ngrown larger due to Mega Evolution, its\nback and legs have become stronger."
        fr:
          legends_za: "Ses pattes se sont renforcées pour supporter\nle poids de sa fleur dorsale, qui s’est\népanouie davantage grâce à la Méga-Évolution."
        it:
          legends_za: "Le zampe si sono irrobustite per sostenere\nil fiore, diventato ancora più grande per via\ndella megaevoluzione."
        de:
          legends_za: "Die Mega-Entwicklung macht die Blume\nauf seinem Rücken noch größer. Um sie zu\ntragen, werden Beine und Rumpf robuster."
        es:
          legends_za: "Sus patas y lomo se han fortalecido para\nsoportar el peso de la flor, que ha crecido\nconsiderablemente tras la megaevolución."
        ko:
          legends_za: "메가진화하여 더욱 크게\n성장한 꽃을 지탱하기 위해\n등과 다리가 전보다 튼튼해졌다."
        zh_simp:
          legends_za: "为了支撑在超级进化后\n成长得更大的花，它的\n腰腿也变得更加健壮了。"
        zh_trad:
          legends_za: "為了支撐超級進化之後\n變得更大的花，下盤的\n筋骨變得更加強壯了。"
        es_latam:
          legends_za: "Sus patas y lomo se fortalecieron para\nsoportar el peso de la flor, que creció\nconsiderablemente tras la megaevolución."
