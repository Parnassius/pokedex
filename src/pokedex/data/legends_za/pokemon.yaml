          legends_za: "１￹億年前￺おくねんまえ￻の　￹世界￺せかい￻では\n￹無敵￺むてき￻を　ほこり　￹王様￺おうさま￻のように\nふるまっていた　ポケモンだ。"
        en:
          legends_za: "This Pokémon behaved like a king 100 million\nyears ago. Nothing could stop it."
        fr:
          legends_za: "Il y a 100 millions d’années, ce Pokémon régnait\nen maître absolu. Personne ne pouvait se mesurer\nà lui."
        it:
          legends_za: "Cento milioni di anni fa questo Pokémon non\naveva rivali al mondo, e faceva il bello e il brutto\ntempo come un re nel suo regno."
        de:
          legends_za: "Vor 100 Millionen Jahren rühmte sich dieses\nPokémon damit, dass niemand ihm gewachsen\nsei, weshalb es sich wie ein König verhielt."
        es:
          legends_za: "Hace cien millones de años, este Pokémon se\ncomportaba como un rey, sin nadie que osase\nhacerle frente."
        ko:
          legends_za: "1억 년 전 세계에서는\n무적을 뽐내며 왕처럼\n행동하던 포켓몬이다."
        zh_simp:
          legends_za: "在１亿年前的世界里，\n以无敌而自豪，\n像国王一样行动的宝可梦。"
        zh_trad:
          legends_za: "在１億年前的世界裡所向無敵。\n如王者般君臨大地的寶可夢。"
        es_latam:
          legends_za: "Hace cien millones de años, este Pokémon se\ncomportaba como un rey, sin que nadie se\natreviera a desafiarlo."
