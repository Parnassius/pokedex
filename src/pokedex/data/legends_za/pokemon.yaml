        ko:
          legends_za: "흙을 먹으며 살고 있다.\n큰 산 하나를 다 먹으면\n성장을 위해 잠자기 시작한다."
        zh_simp:
          legends_za: "以吃土为生。\n吃掉一座大山后，\n就会为了成长而开始沉睡。"
        zh_trad:
          legends_za: "靠吃泥土維生。\n吃掉一座大山後，\n就會為了成長而開始沉睡。"
        es_latam:
