        ko:
          legends_za: "머리의 지느러미로 물의 흐름을 느껴\n주위의 상황을 파악한다.\n바위를 들어 올릴 정도로 힘이 세다."
        zh_simp:
          legends_za: "会用头上的鳍感知水流，\n从而了解周围的情况。\n有着能举起岩石的力量。"
        zh_trad:
          legends_za: "會用頭上的鰭感知水流，\n藉此了解周圍的狀況。\n是個能舉起岩石的大力士。"
        es_latam:
          legends_za: "La aleta de su cabeza le permite analizar las\ncorrientes de agua para inspeccionar su entorno.\nSu fuerza le permite levantar grandes rocas."
