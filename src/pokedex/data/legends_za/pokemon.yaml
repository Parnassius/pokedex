        zh_trad:
          legends_za: "能吐出超過１萬度的火焰。\n一邊激烈擺動熊熊燃燒的鬃毛，\n一邊保護夥伴。"
        es_latam:
          legends_za: "Las llamas que escupe superan los 10,000 ºC.\nProtege a la manada agitando su abrasadora\nmelena de fuego."
