        en:
          legends_za: "This stance is dedicated to offense. It can cleave\nany opponent with the strength and weight of its\nsteel blade."
        fr:
          legends_za: "Sous cette forme, il excelle en attaque. Il utilise\nle poids et la puissance de l’acier pour fendre\nses adversaires."
        it:
          legends_za: "Questa forma è specializzata nell’attacco.\nSfrutta il peso e la durezza dell’acciaio per\nfare a pezzi il nemico."
        de:
          legends_za: "In dieser Form ist es auf Offensive spezialisiert.\nEs nutzt das Gewicht und die Härte von Stahl,\num seine Gegner zu vernichten."
        es:
          legends_za: "Al adoptar esta forma, centra su estrategia en la\nofensiva, aprovechando todo el peso y la fuerza\ndel acero para destrozar al rival."
        ko:
          legends_za: "공격에 특화된 태세.\n강철의 무게와 강도를 살려서\n상대를 가른다."
        zh_simp:
          legends_za: "特别强化了攻击的状态。\n会运用钢铁的重量和强度\n来击碎对手。"
        zh_trad:
          legends_za: "特別強化了攻擊的狀態。\n會運用鋼鐵的重量和強度\n來擊碎對手。"
        es_latam:
          legends_za: "Al adoptar esta forma, centra su estrategia en la\nofensiva y aprovecha todo el peso y la fuerza\ndel acero para destrozar al rival."
