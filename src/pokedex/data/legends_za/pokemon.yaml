        de:
          legends_za: "Es täuscht seine Gegner mit flinken Bewegungen,\num sie dann blitzartig anzugreifen und ohne jede\nGnade mit seinen Hörnern aufzuschlitzen."
        es:
          legends_za: "Confunde a los enemigos con sus movimientos\nrelampagueantes y luego los rebana sin piedad\ncon sus afilados cuernos."
        ko:
          legends_za: "회오리바람처럼 재빠른 몸동작으로\n적을 농락하고 예리한 뿔로\n가차 없이 베어 버린다."
        zh_simp:
          legends_za: "以敏捷的身手像旋风一般将敌人\n玩弄于股掌之中，会用锋利的角\n毫不留情地切斩对手。"
        zh_trad:
          legends_za: "以敏捷的身手像旋風一般將敵人\n玩弄於股掌之中，會用鋒利的角\n毫不留情地斬斷對手。"
        es_latam:
