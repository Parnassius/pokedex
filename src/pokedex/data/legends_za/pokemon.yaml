        en:
          legends_za: "It uses four of its arms to fiercely assail its foes.\nOnce they’ve been pushed to the brink of defeat,\nit finishes them off with the arms it kept hidden."
        fr:
          legends_za: "Il attaque son adversaire en frappant sans\nrelâche avec quatre bras, et quand la fin\nest proche, il l’achève avec les autres bras\nqu’il dissimulait."
        it:
          legends_za: "Assale furiosamente gli avversari con i quattro\narti primari e quando sono alle strette li finisce\ncon gli arti nascosti."
        de:
          legends_za: "Es greift unerbittlich mit vier Armen an. Hat es\nden Gegner in die Enge getrieben, versetzt es ihm\nmit seinen verborgenen Armen den finalen Schlag."
        es:
          legends_za: "Arremete sin piedad con cuatro garras y,\ncuando tiene al rival contra las cuerdas,\npropina el golpe de gracia con otro par\nque permanecía oculto."
        ko:
          legends_za: "4개의 팔로 격렬하게 공격해서\n상대를 궁지에 몰아넣은 뒤\n숨겨진 팔로 마무리한다."
        zh_simp:
          legends_za: "用４根臂膀猛烈地攻击，\n将对手逼入绝境后，就会\n用隐藏的臂膀给予致命一击。"
        zh_trad:
          legends_za: "用４條手臂猛烈地進攻，\n將對手逼入絕境後，就用\n藏著的手臂給予致命一擊。"
        es_latam:
          legends_za: "Ataca sin piedad con cuatro garras y, cuando\ntiene al rival contra las cuerdas, da el golpe\nde gracia con otro par que permanecía oculto."
