          legends_za: "￹体￺からだ￻は　￹小￺ちい￻さくなったが　パワーは\nケタはずれ。　￹軽￺かる￻く　￹念￺ねん￻じるだけで\n￹高層￺こうそう￻ビルも　￹木￺こ￻っ￹端微塵￺ぱみじん￻　だ。"
        en:
          legends_za: "Despite its diminished size, its mental power has\ngrown phenomenally. With a mere thought, it can\nsmash a skyscraper to smithereens."
        fr:
          legends_za: "Son corps a rétréci, mais sa puissance s’est\ndémultipliée. Il peut réduire un gratte-ciel\nen miettes d’une simple pensée."
        it:
          legends_za: "Il suo corpo si è rimpicciolito, ma la sua potenza\nè aumentata a dismisura. Gli basta concentrarsi\nappena per fare a pezzi un intero edificio."
        de:
          legends_za: "Obwohl sein Körper geschrumpft ist, verfügt es\nüber gewaltige Stärke. Mit bloßer Willenskraft\nkann es ein ganzes Hochhaus zertrümmern."
        es:
          legends_za: "Aunque su cuerpo se ha encogido, el poder tan\nextraordinario que atesora le permite reducir a\nescombros un rascacielos con solo pensarlo."
        ko:
          legends_za: "몸집은 작아졌지만 파워는\n상상을 초월한다. 가벼운 염력만으로\n고층 빌딩도 산산이 조각난다."
        zh_simp:
          legends_za: "虽然身体变小了，力量却大到无法\n计算。只要稍稍使用念力，哪怕\n是高楼大厦也会化为灰烬。"
        zh_trad:
          legends_za: "雖然身體變小，力量卻大到\n難以估計。只要稍微使出一些\n念力就能將高樓大廈化成灰燼。"
        es_latam:
          legends_za: "Aunque su cuerpo se encogió, su extraordinario\npoder le permite reducir un rascacielos a\nescombros con tan solo pensarlo."
