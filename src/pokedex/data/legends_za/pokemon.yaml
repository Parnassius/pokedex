        fr:
          legends_za: "Ses pas de danse burlesques provoquent l’hilarité\nde ses adversaires. Il en profite alors pour les geler\navec une vague d’air glacial atteignant -200 °C."
        it:
          legends_za: "I comici passi di danza sono il suo segno\ndistintivo. Riversa sui nemici aria gelida a -200 ºC\nmentre sono sopraffatti dalle risate."
        de:
          legends_za: "Seine witzigen Tanzschritte zeichnen es aus.\nWährend seine Gegner lachen, hüllt es sie in\nklirrend kalte Luft von −200 °C."
        es:
          legends_za: "Destaca por lo cómicos que resultan sus pasos\nde baile. Aprovecha mientras sus rivales se ríen\npara rociarlos con un aire gélido a −200 ºC."
        ko:
          legends_za: "우스꽝스러운 스텝이 특기다.\n상대가 웃는 사이에\n마이너스 200도의 냉기를 퍼붓는다."
        zh_simp:
          legends_za: "滑稽的舞步是它的绝学。\n会趁着敌方大笑之际，\n施以零下２００度的冷气。"
        zh_trad:
          legends_za: "滑稽的舞步是牠的獨門絕活。\n會趁著敵方在笑的時候，\n施以零下２００度的寒氣。"
        es_latam:
          legends_za: "Se destaca por lo cómicos que resultan sus pasos\nde baile. Aprovecha mientras sus rivales se ríen\npara rociarlos con un aire gélido a −200 °C."
