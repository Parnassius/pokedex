        fr:
          legends_za: "Il frappe en un éclair avec ses énormes griffes\nacérées. Elles sont si tranchantes qu’elles\npeuvent fendre en deux l’eau comme l’air."
        it:
          legends_za: "È talmente abile con i suoi enormi artigli affilati\nda essere in grado di tagliare in due persino mari\ne cieli."
        de:
          legends_za: "Es ist so geschickt mit seinen riesigen, scharfen\nKlauen, dass es selbst Luft und Salzwasser mit\neinem Hieb zerteilen kann."
        es:
          legends_za: "Gracias a su destreza y sus enormes y afiladas\ngarras, puede cortar hasta el aire y el agua de\nun solo tajo."
        ko:
          legends_za: "날카롭고 거대한 발톱으로 공격한다.\n공기나 해수마저 두 동강 낼 정도의\n실력을 갖추고 있다."
        zh_simp:
          legends_za: "用锐利而巨大的爪子一挥而下。\n连空气和海水都能一分为二的本事。"
        zh_trad:
          legends_za: "本領高強，當銳利而巨大的爪子\n一揮而下，連空氣和海水都能一分為二。"
        es_latam:
          legends_za: "Gracias a su destreza y a sus enormes y afiladas\ngarras, puede cortar hasta el aire y el agua en\nun solo movimiento."
