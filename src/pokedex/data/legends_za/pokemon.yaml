        special_attack: 83
        special_defense: 81
        speed: 104
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - psychic
      descriptions:
        jp_kanji:
          legends_za: "オスに　￹比￺くら￻べて　すこし　わがままで\n￹攻撃的￺こうげきてき￻。　￹機嫌￺きげん￻を　￹損￺そこ￻ねると\nサイコパワーで　￹痛￺いた￻めつけられる。"
        en:
          legends_za: "Females are a bit more selfish and aggressive\nthan males. If they don’t get what they want, they\nwill torment you with their psychic abilities."
        fr:
          legends_za: "Les femelles sont un peu plus agressives et\négoïstes que les mâles. Si on les contrarie,\nelles se vengent avec leurs pouvoirs psychiques."
        it:
          legends_za: "La femmina è un po’ più capricciosa e aggressiva\ndel maschio. Con i suoi poteri psichici concia per\nle feste i seccatori."
        de:
          legends_za: "Weibliche Psiaugon sind etwas aggressiver und\neigensinniger als männliche. Wer ihnen die Laune\nverdirbt, bekommt ihre Psycho-Kräfte zu spüren."
        es:
          legends_za: "Son ligeramente más agresivas y egoístas que\nlos machos. Castigan sin piedad con sus poderes\npsíquicos a quienes las enojen."
        ko:
          legends_za: "수컷보다 살짝 더 제멋대로이고\n공격적이다. 기분이 상하면\n사이코 파워로 괴롭힌다."
        zh_simp:
          legends_za: "性格要比雄性更任性一些，\n而且也更具攻击性。要是惹得它不高兴，\n就会被它用精神力量狠狠教训。"
        zh_trad:
          legends_za: "性格要比雄性更任性一些，\n而且也更具攻擊性。要是惹得牠不高興，\n就會被牠用精神力量狠狠教訓。"
        es_latam:
          legends_za: "Son ligeramente más agresivas y egoístas que\nlos machos. Castigan sin piedad con sus poderes\npsíquicos a quienes las hagan enojar."
