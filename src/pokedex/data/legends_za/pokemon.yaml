        es:
          legends_za: "Almacena en una membrana la electricidad\ngenerada en las bolsas de las mejillas y planea\npor los aires soltando descargas."
        ko:
          legends_za: "볼의 전기 주머니에서 만든\n전기를 막 안쪽에 모아\n활공하며 전기를 발산한다."
        zh_simp:
          legends_za: "将脸颊的电力袋制造出的电\n储藏在膜的内侧，\n一边滑翔一边放电。"
        zh_trad:
          legends_za: "將臉頰裡的電囊製造出的電\n儲藏在膜的內側，\n一邊滑翔一邊放電。"
        es_latam:
          legends_za: "Almacena la electricidad que genera en las bolsas\nde sus mejillas dentro de una membrana y luego\nla descarga mientras planea por los aires."
