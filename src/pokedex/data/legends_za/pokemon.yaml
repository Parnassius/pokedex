        jp_kanji:
          legends_za: "￹尻尾￺しっぽ￻を　￹振￺ふ￻りまわして\n￹相手￺あいて￻を　なぎ￹倒￺たお￻し　￹鋭￺するど￻い　ツメで\nズタズタに　ひきさいてしまう。"
        en:
          legends_za: "It lashes about with its tail to knock down its foe.\nIt then tears up the fallen opponent with sharp\nclaws."
        fr:
          legends_za: "Il se sert de sa queue pour faire tomber\nses adversaires. Une fois qu’ils sont au sol,\nil les lacère de ses griffes acérées."
        it:
          legends_za: "Fa cadere a terra il nemico colpendolo con\nla coda, per poi finirlo con gli artigli affilati."
        de:
          legends_za: "Es schlägt mit dem Schwanz um sich und stößt\ndamit seine Gegner um. Anschließend zerfetzt es\ndie Gegner mit seinen scharfen Klauen."
        es:
          legends_za: "Propina coletazos al rival para derribarlo,\nmomento que aprovecha para hacerlo trizas\ncon sus afiladas garras."
        ko:
          legends_za: "꼬리를 휘둘러 상대를 쓰러뜨리고\n날카로운 발톱으로\n갈기갈기 찢어 버린다."
        zh_simp:
          legends_za: "会先挥舞尾巴扫倒对手，\n然后再用利爪将其撕成碎片。"
        zh_trad:
          legends_za: "會揮動尾巴掃倒對手，\n再用銳利的爪子\n把對手撕成碎塊。"
        es_latam:
          legends_za: "Ataca a su rival con coletazos para derribarlo,\ntras lo cual aprovecha para hacerlo trizas\ncon sus afiladas garras."
