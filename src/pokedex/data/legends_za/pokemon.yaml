        en:
          legends_za: "It’s fickle, selfish, and easily bored. This species is\nvery popular with certain Trainers—ones who\nprefer fulfilling others’ needs over their own."
        fr:
          legends_za: "Capricieux, nombriliste et inconstant, il est très\npopulaire auprès des personnes qui aiment faire\ndes efforts sans rien attendre en retour."
        it:
          legends_za: "È capriccioso, egoista e volubile. È molto\npopolare tra certi Allenatori che amano viziare\ni loro Pokémon."
        de:
          legends_za: "Es ist launenhaft, selbstsüchtig und wankelmütig.\nBei Trainern, die ihre Pokémon gerne verwöhnen,\nerfreut es sich großer Beliebtheit."
        es:
          legends_za: "Su naturaleza caprichosa, egoísta y voluble lo\nhace popular entre los Entrenadores a los que\nles gusta cumplir los caprichos de sus Pokémon."
        ko:
          legends_za: "변덕이 심하고 제멋대로에 싫증을 잘 낸다.\n사랑받는 것보다 사랑을 주는 걸 좋아하는\n일부 트레이너에게 큰 인기다."
        zh_simp:
          legends_za: "浮躁、任性、耐不住性子。\n深受那些比起被别人照顾，\n更喜欢照顾别人的训练家欢迎。"
        zh_trad:
          legends_za: "性情善變、任性、缺乏耐性，\n很受那些比起被別人照顧，\n更喜歡去照顧別人的訓練家歡迎。"
        es_latam:
