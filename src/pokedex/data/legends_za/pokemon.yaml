        es:
          legends_za: "Ataca de manera indiscriminada a quien ose\nadentrarse en su territorio, escupiéndole un\nvirulento veneno que puede corroer hasta el\ncasco de un petrolero."
        ko:
          legends_za: "유조선의 선체를 썩게 할 정도의\n맹독을 영역 안에 들어온 것에\n무턱대고 끼얹는다."
        zh_simp:
