        de:
          legends_za: "Dieses äußerst freundliche Drachen-Pokémon\nneigt dazu, seinen geliebten Trainer zu umarmen\nund so mit einer dicken Schleimschicht zu\numhüllen."
        es:
          legends_za: "Pokémon de tipo Dragón muy afable al que le\ngusta abrazar con efusión a su Entrenador,\naunque después lo deja totalmente pringado."
        ko:
          legends_za: "사람을 잘 따르는 드래곤포켓몬이다.\n좋아하는 트레이너에게 달려들어\n미끈미끈한 점액투성이로 만들어 버린다."
        zh_simp:
          legends_za: "和人很亲近的龙属性宝可梦。\n抱着非常喜爱的训练家，\n用粘液把对方弄得黏糊糊的。"
        zh_trad:
          legends_za: "親近人類的龍屬性寶可夢。\n抱著最喜歡的訓練家，\n用黏液把他弄得黏呼呼的。"
        es_latam:
          legends_za: "Pokémon de tipo Dragón muy afable al\nque le gusta abrazar cariñosamente a\nsu Entrenador, aunque después lo deja\ntotalmente cubierto de baba."
