      descriptions:
        jp_kanji:
          legends_za: "いつも　ボーッとしているが　たまに\n￹顔￺かお￻つきが　ピリッと　￹引￺ひ￻き￹締￺し￻まる。\n￹食￺た￻べている　エサが　￹原因￺げんいん￻らしい。"
        en:
          legends_za: "Although this Pokémon is normally zoned out, its\nexpression abruptly sharpens on occasion. The\ncause for this seems to lie in Slowpoke’s diet."
        fr:
          legends_za: "Bien qu’il ait toujours l’air un peu absent,\nil arrive que son visage se crispe brusquement.\nSon alimentation serait à l’origine du phénomène."
        it:
          legends_za: "Ha sempre un’aria assente, ma a volte contrae\nimprovvisamente il muso in una smorfia. Pare\nche questo sia dovuto alla sua alimentazione."
        de:
          legends_za: "Es blickt zwar stets geistesabwesend drein, doch\nhin und wieder wird sein Ausdruck einen Moment\nlang hart. Der Grund dafür soll sein Futter sein."
        es:
          legends_za: "Siempre está distraído, pero, de vez en cuando,\nmuestra un extraño rictus en el rostro, tal vez\ndebido a su alimentación."
        ko:
          legends_za: "항상 멍하니 있지만\n가끔 찌릿해하며 인상을 쓴다.\n먹고 있는 먹이가 원인이라는 듯하다."
        zh_simp:
          legends_za: "平时一直都在发呆，\n但偶尔会突然露出锐利的神色。\n据说这和它所吃的食物有关。"
        zh_trad:
          legends_za: "平時一直都在發呆，\n但偶爾會突然露出銳利的神色。\n據說這和牠所吃的食物有關。"
        es_latam:
          legends_za: "Siempre está distraído, pero de vez en cuando\nmuestra una extraña expresión en el rostro, tal\nvez debido a su alimentación."
