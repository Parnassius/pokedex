      descriptions:
        jp_kanji:
          legends_za: "￹気性￺きしょう￻が　￹荒￺あら￻く　ケンカっ￹早￺ぱや￻いが\n￹弱￺よわ￻いものいじめは　￹許￺ゆる￻さない。\n￹葉￺は￻っぱで　￹敵￺てき￻の　￹動￺うご￻きを　￹読￺よ￻む。"
        en:
          legends_za: "Although it has a violent temperament, it won’t\nput up with those who bully the weak. It senses\nfoes’ movements with its leaf."
        fr:
          legends_za: "Il est irascible et bagarreur, mais ne supporte pas\nque l’on s’en prenne aux faibles. Sa feuille lui\npermet d’anticiper les mouvements de l’ennemi."
        it:
          legends_za: "Ha un carattere focoso e attaccabrighe, ma non\nsopporta chi maltratta i più deboli. Usa le foglie\nper prevedere i movimenti dei nemici."
        de:
          legends_za: "Es ist sehr grob und streitlustig, lässt es aber\nnicht zu, dass Schwächere gemobbt werden.\nMit seinem Blatt erspürt es die Bewegungen\ndes Gegners."
        es:
          legends_za: "Es muy temperamental, pero no permite que\nnadie se meta con los débiles. Mediante su hoja,\npredice los movimientos del enemigo."
        ko:
          legends_za: "성질이 거칠어 툭하면 싸우려 들지만\n약자를 괴롭히는 일은 용서하지 않는다.\n잎사귀로 적의 움직임을 읽는다."
        zh_simp:
          legends_za: "性格暴躁，很冲动，\n但不容许欺负弱小。\n会用叶子洞悉敌人的动向。"
        zh_trad:
          legends_za: "性格暴躁衝動，\n但絕不容許欺負弱小。\n會用樹葉預測敵人的動作。"
        es_latam:
          legends_za: "Es muy temperamental, pero no permite que\nnadie se meta con los más débiles. Utiliza su hoja\npara predecir los movimientos del enemigo."
