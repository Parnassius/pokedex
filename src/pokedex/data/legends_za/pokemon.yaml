        it:
          legends_za: "Quando produce energia elettrica strofinando\nle protuberanze che ha sul petto, tutt’intorno\nriverbera un suono simile a quello di una chitarra."
        de:
          legends_za: "Wenn es am Fortsatz an seiner Brust kratzt und\ndadurch Strom erzeugt, dann erklingt in der\nUmgebung ein Ton wie von einer Gitarre."
        es:
          legends_za: "Cuando rasga las protuberancias del pecho para\ngenerar energía eléctrica, emite un sonido similar\nal de una guitarra, que reverbera en el entorno."
        ko:
