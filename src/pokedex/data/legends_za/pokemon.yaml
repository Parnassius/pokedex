        es:
          legends_za: "Sus patas robustas impiden que pierda el\nequilibrio y se caiga, incluso en el barro.\nDuerme enterrado en el lodo."
        ko:
          legends_za: "발밑이 질퍽거려도 잘 걸을 수 있는\n튼튼한 다리를 가졌다.\n진흙에 몸을 묻고 잠잔다."
        zh_simp:
          legends_za: "腰腿十分结实，即使是在\n泥泞的地上也能稳步前进。\n会把身体埋进泥里睡觉。"
        zh_trad:
          legends_za: "下盤十分結實，即使是在\n泥濘的地上也能穩步前進。\n會把身體埋進泥裡睡覺。"
        es_latam:
          legends_za: "Sus fuertes patas le ayudan a mantener\nel equilibrio, incluso en el barro. Duerme\nenterrado en el lodo."
