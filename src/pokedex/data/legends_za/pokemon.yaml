        zh_trad:
          legends_za: "龐大的能量激烈地刺激細胞。\n沉睡在體內的龍血\n似乎因此而覺醒了。"
        es_latam:
          legends_za: "La descomunal energía de la megaevolución lo\nafecta a nivel celular, lo que hace resurgir la\nsangre de dragón que late en su interior."
