        es:
          legends_za: "La energía de la megaevolución hace que su\ncuerpo desprenda un calor ardiente. Reduce\na cenizas al oponente con su aliento de fuego."
        ko:
          legends_za: "메가진화로 인해 전신이 발열한다.\n격렬한 불꽃의 숨결을 뿜어내서\n상대를 재로 만들어 버린다."
        zh_simp:
