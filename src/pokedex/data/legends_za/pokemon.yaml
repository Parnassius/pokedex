          legends_za: "Vuela pausadamente por el cielo azul.\nSu hermoso trino cautiva a todo aquel\nque lo escucha."
        ko:
          legends_za: "넓은 하늘을 느긋하게 난다.\n파비코리의 아름다운 콧노래를 들으면\n황홀한 꿈을 꾸는 기분이 든다."
        zh_simp:
          legends_za: "会悠然地飞翔在天空之中。\n听见七夕青鸟优美的哼唱，\n就会让人心醉神迷，仿佛置身梦境。"
        zh_trad:
          legends_za: "會悠然地飛翔在天空中。\n聽見七夕青鳥優美的哼唱，\n就會心醉神迷，彷彿置身夢境。"
        es_latam:
