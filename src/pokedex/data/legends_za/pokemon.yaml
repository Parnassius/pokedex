        de:
          legends_za: "Es lebt auf dem Grund großer Seen.\nEs heißt, der Anblick seiner Schönheit\nbefreie jedes Herz von Unreinheit."
        es:
          legends_za: "Vive en lo más profundo de los grandes\nlagos. Se dice que su gran belleza purifica\nel corazón de todos aquellos que lo contemplen."
        ko:
          legends_za: "큰 호수의 바닥에 산다.\n아름다운 그 모습은 보는 이의\n부정적인 마음을 정화한다고 한다."
        zh_simp:
          legends_za: "栖息在很大的湖底。\n听说，只要看见它那美丽的样子，\n心里的污秽就会被清除。"
        zh_trad:
          legends_za: "棲息在大湖的湖底。\n據說只要看見牠美麗的身影，\n心中的污穢就會得到淨化。"
        es_latam:
          legends_za: "Vive en lo más profundo de los grandes\nlagos. Se dice que su gran belleza purifica\nel corazón de quienes lo contemplen."
