          legends_za: "Durch die urzeitliche Energie des Blauen\nEdelsteins nahm es seine ursprüngliche\nForm an. Sein Körper ähnelt Meerwasser."
        es:
          legends_za: "Experimentó una regresión a causa de la energía\nprimigenia que albergaba el Prisma Azul. Su\ncuerpo parece estar compuesto de agua marina."
        ko:
          legends_za: "원시 세계의 에너지가 담긴\n쪽빛구슬에 의해 회귀했다.\n바닷물과 유사한 육체를 가졌다."
        zh_simp:
          legends_za: "通过拥有原始世界的能量的\n靛蓝色宝珠回归而来。\n肉体就像是海水一样。"
        zh_trad:
          legends_za: "藉由是原始世界能量的\n靛藍色寶珠回歸而來。\n肉體與海水非常相似。"
        es_latam:
