        en:
          legends_za: "A timid fairy Pokémon that is rarely seen, it will\nrun and hide the moment it senses people."
        fr:
          legends_za: "Ce Pokémon s’apparente à une petite fée\nqui n’apparaît que rarement devant les humains.\nIl court se cacher dès qu’il ressent une présence."
        it:
          legends_za: "Della stessa famiglia delle fate, si mostra di rado\nagli esseri umani. Si dilegua non appena\nne avverte la presenza."
        de:
          legends_za: "Ein feenhaftes Pokémon, das sich den Menschen\nnur selten zeigt. Es scheint sofort die Flucht zu\nergreifen, wenn es deren Anwesenheit spürt."
        es:
          legends_za: "Este Pokémon de aspecto feérico, raramente\nvisto por los humanos, corre a esconderse en\ncuanto detecta que hay alguien cerca."
        ko:
          legends_za: "요정의 동료로\n좀처럼 사람 앞에 나타나지 않는다.\n기척을 느끼면 바로 도망가는 듯하다."
        zh_simp:
          legends_za: "妖精的一种，极少出现在人前。\n察觉到有人存在后，\n好像就会立刻逃走。"
        zh_trad:
          legends_za: "妖精的一種，\n極少出現在人類面前。\n一感覺到有人就會立刻逃走。"
        es_latam:
