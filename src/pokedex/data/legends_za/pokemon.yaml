          legends_za: "Al adoptar esta forma, se activa un modo\nsupresor que anula sus sentimientos y le\npermite derrotar sin remisión a sus rivales."
        ko:
          legends_za: "숨겨진 모드를 발동한 모습.\n싹텄던 감정은 자취를 감췄고\n그저 눈앞의 적을 쓰러뜨린다."
        zh_simp:
          legends_za: "启动了隐藏模式的样子。\n会将萌生的感情藏匿起来，\n不停地打倒眼前的敌人。"
        zh_trad:
          legends_za: "啟動了隱藏模式的樣子。\n萌生的感情不再顯露，\n只會不斷擊潰眼前的敵人。"
        es_latam:
          legends_za: "Al adoptar esta forma, se activa un modo\nsupresor que anula sus sentimientos y le\npermite derrotar sin remisión a sus rivales."
