        fr:
          legends_za: "Ce Pokémon est mentionné dans d’innombrables\nrécits héroïques pour sa force incomparable en\ncombat, et pourtant, il vit au milieu des ordures."
        it:
          legends_za: "Nella lotta vanta una forza impareggiabile e sono\nmolti i racconti che narrano le sue gesta, ma la\nsua tana è piena zeppa di rifiuti."
        de:
          legends_za: "Es rühmt sich seiner unvergleichlichen Stärke im\nKampf und wurde in zahlreichen Heldensagen\nverewigt, doch sein Zuhause ist sehr vermüllt."
        es:
          legends_za: "Su inigualable fuerza en combate lo ha hecho\nprotagonista de innumerables sagas heroicas,\npero en su madriguera no hay más que basura."
        ko:
          legends_za: "싸움 실력은 타의 추종을 불허하고\n수많은 무용담을 남겼으나\n사는 곳은 쓰레기투성이다."
        zh_simp:
          legends_za: "战斗中的实力无与伦比，\n留下了无数的英勇事迹，\n但栖身之处却堆满垃圾。"
        zh_trad:
          legends_za: "在戰鬥上以無與倫比的實力為傲，\n並留下了無數的英勇事蹟，\n但棲身之處卻堆滿了垃圾。"
        es_latam:
          legends_za: "Su inigualable fuerza en combate lo convirtió en\nprotagonista de innumerables sagas heroicas,\npero en su madriguera no hay más que basura."
