        it:
          legends_za: "Usa le radici come un sistema nervoso per\ncontrollare gli alberi dei boschi. È gentile con\ni Pokémon che fanno il nido nel suo corpo."
        de:
          legends_za: "Es nutzt seine Wurzeln als Nervensystem und\nkontrolliert so die Bäume des Waldes. Zu den\nPokémon, die in ihm hausen, ist es stets nett."
        es:
          legends_za: "Sus raíces le permiten controlar los árboles del\nbosque, al funcionar como un sistema nervioso.\nEs amable con los Pokémon que habitan su\ncuerpo."
        ko:
          legends_za: "뿌리를 신경 대신으로 삼아\n숲의 나무를 조종한다.\n몸에 자리 잡은 포켓몬에게는 친절하다."
        zh_simp:
          legends_za: "用根茎代替神经操纵森林里的树木。\n对住在它身体里的宝可梦很亲切。"
        zh_trad:
          legends_za: "以樹根代替神經，\n操縱森林裡的樹木。\n對住在自己身上的寶可夢十分親切。"
        es_latam:
          legends_za: "Sus raíces le permiten controlar los\nárboles del bosque, al funcionar como\nun sistema nervioso. Es amable con los\nPokémon que habitan su cuerpo."
