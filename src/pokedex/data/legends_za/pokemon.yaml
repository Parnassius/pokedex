          legends_za: "Cuando acumula energía, las suaves púas de su\ncabeza se vuelven tan duras y afiladas que hasta\npueden atravesar rocas."
        ko:
          legends_za: "머리의 가시는 평소에는 부드럽지만\n힘을 주면 뾰족하고 날카로워지며\n바위를 뚫어 버릴 정도로 단단해진다."
        zh_simp:
