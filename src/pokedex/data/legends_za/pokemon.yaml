        it:
          legends_za: "Spara acqua dagli zoccoli e si sposta scivolando\nsulla superficie bagnata. Lotta usando abilmente\nle zampe."
        de:
          legends_za: "Es gleitet über das Wasser, indem es seine Hufe\nals Wasserdüsen nutzt. Seine Beintechnik\nverschafft ihm im Kampf Vorteile."
        es:
          legends_za: "Expulsa agua por las pezuñas para poder\ndeslizarse. Es especialista en atacar usando\nlas patas."
        ko:
          legends_za: "발굽에서 물을 뿜어내서\n수면을 미끄러지듯이 이동한다.\n특기인 발 기술로 싸운다."
        zh_simp:
