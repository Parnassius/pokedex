        fr:
          legends_za: "Ses larges oreilles lui permettent de creuser\ndes terriers. Il est capable de forer sans s’arrêter\npendant toute une nuit."
        it:
          legends_za: "Scava tane nel terreno grazie alle grandi\norecchie. Può andare avanti senza fermarsi\nper tutta la notte."
        de:
          legends_za: "Mit seinen großen Ohren schaufelt es sich\neinen Bau. Es kann die ganze Nacht ohne Pause\ndurchschaufeln."
        es:
          legends_za: "Usa sus grandes orejas para excavar en la tierra y\nasí crear madrigueras. Puede pasarse una noche\nentera cavando sin parar."
        ko:
          legends_za: "커다란 귀로 땅을 파고\n보금자리를 만든다.\n하룻밤 동안 쉬지 않고 계속 팔 수 있다."
        zh_simp:
          legends_za: "用大大的耳朵挖掘地面制造巢穴。\n可以整晚不休息连续不停地挖。"
        zh_trad:
          legends_za: "用大大的耳朵挖掘地面做出巢穴。\n能整晚不眠不休地持續挖掘。"
        es_latam:
          legends_za: "Usa sus grandes orejas para excavar en la tierra\ny así crear madrigueras. Puede pasar una noche\nentera cavando sin parar."
