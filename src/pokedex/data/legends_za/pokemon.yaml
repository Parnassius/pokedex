        it:
          legends_za: "La punta molto luminosa della coda è visibile da\ngrandi distanze. Fa da segnale per chi si è perso."
        de:
          legends_za: "Seine Schwanzspitze leuchtet hell. Ihr Licht ist\nvon Weitem zu sehen und dient all jenen, die sich\nverirrt haben, als Orientierungspunkt."
        es:
          legends_za: "La punta de su cola reluce brillantemente y se\nve desde lejos. La usa como baliza para guiar a\naquellos que se han perdido."
        ko:
          legends_za: "꼬리 끝이 빛나며 반짝인다.\n빛이 아득히 먼 곳까지 닿아서\n길 잃은 자들의 이정표가 된다."
        zh_simp:
          legends_za: "尾巴的前端闪耀着光芒。\n这光能传播到很远的地方，\n成为迷途者的路标。"
        zh_trad:
          legends_za: "尾巴尖端閃耀著光輝。\n光輝能夠傳播到很遠的地方，\n成為迷途者的路標。"
        es_latam:
          legends_za: "La punta de su cola reluce brillantemente y se\npuede ver desde lejos, por lo que la usa como\nun faro para guiar a quienes se perdieron."
