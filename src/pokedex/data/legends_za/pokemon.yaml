        en:
          legends_za: "The iron in Sliggoo’s drinking water turned its\nshell metallic. The Pokémon doesn’t come out of\nits shell on sunny days."
        fr:
          legends_za: "Sa coquille est devenue métallique en raison\ndu fer contenu dans l’eau qu’il boit. Il n’en sort\njamais lorsque le soleil brille."
        it:
          legends_za: "Il suo guscio è diventato metallico per effetto\ndel ferro contenuto nell’acqua che beve. Nei\ngiorni di sole non esce dal guscio."
        de:
          legends_za: "Das in seinem Trinkwasser enthaltene Eisen hat\nsein Gehäuse zu Metall werden lassen. Bei klarem\nWetter kommt es nicht daraus hervor."
        es:
          legends_za: "Su concha es metálica debido al hierro presente\nen el agua que bebe. No sale en días despejados."
        ko:
          legends_za: "식수에 포함된 철분에 의해\n껍질이 금속이 되었다.\n맑은 날에는 밖으로 나오지 않는다."
        zh_simp:
          legends_za: "在饮用水所含的铁成分的\n作用下，壳变成了金属。\n晴天时不会冒出来。"
        zh_trad:
          legends_za: "在喝的水所含的鐵質作用下，\n外殼變成了金屬質地。\n晴天時不會到殼的外頭來。"
        es_latam:
          legends_za: "Su caparazón es metálico debido al hierro\npresente en el agua que bebe. No sale de él\nen días despejados."
