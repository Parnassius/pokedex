        zh_trad:
          legends_za: "被大舌貝咬住的刺激和\n體內的香料發生化學反應，\n讓牠變成了毒屬性。"
        es_latam:
          legends_za: "El sobresalto de la mordida del Shellder provocó\nuna reacción química con las especias que había\ningerido, por lo que adquirió el tipo Veneno."
