        it:
          legends_za: "Un colpo leggero dei suoi pugni ricoperti da\nuno spesso strato di ghiaccio è sufficiente\na sbriciolare persino il cemento armato."
        de:
          legends_za: "Seine von dickem Eis umhüllten Fäuste\nzerschmettern selbst Stahlbeton mit einem\neinzigen leichten Schlag."
        es:
