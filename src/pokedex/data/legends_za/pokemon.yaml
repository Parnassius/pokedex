      descriptions:
        jp_kanji:
          legends_za: "￹一生懸命￺いっしょうけんめい￻　￹怖￺こわ￻い　￹顔￺かお￻で　￹相手￺あいて￻を\nにらみつけるが　￹頭￺あたま￻を　なでられると\nつい　にやけてしまう。"
        en:
          legends_za: "It does its level best to glare and pull a scary face,\nbut it can’t help grinning if anyone pats its head."
        fr:
          legends_za: "Il tente à tout prix de se donner un air menaçant,\nmais ne peut pas s’empêcher de sourire\ndès qu’on lui caresse la tête."
        it:
          legends_za: "Ce la mette tutta per intimorire i nemici con uno\nsguardo truce, ma appena qualcuno gli accarezza\nla testa, gli scappa un sorriso."
        de:
          legends_za: "Es gibt alles, um ein finsteres Gesicht zu machen\nund sein Gegenüber böse anzustarren, aber\nwenn es am Kopf gestreichelt wird, muss es\nunwillkürlich grinsen."
        es:
          legends_za: "Se desvive tratando de fulminar a su rival con una\nmirada aterradora, pero, en cuanto le acarician la\ncabeza, no puede evitar sonreír de oreja a oreja."
        ko:
          legends_za: "무서운 얼굴로 열심히\n상대를 노려보지만 머리를\n쓰다듬어 주면 금방 해죽거린다."
        zh_simp:
          legends_za: "拼命做出可怕的表情瞪着对手，\n但只要被摸到头，\n就会忍不住一下子笑起来。"
        zh_trad:
          legends_za: "努力擺出可怕的表情瞪視對手。\n但一被摸到頭就會忍不住偷笑。"
        es_latam:
          legends_za: "Se esfuerza por fulminar a su rival con una\nmirada aterradora, pero, en cuanto le acarician la\ncabeza, no puede evitar sonreír de oreja a oreja."
