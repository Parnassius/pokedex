        jp_kanji:
          legends_za: "￹雨￺あめ￻の　￹降￺ふ￻った　￹翌日￺よくじつ￻は\n￹背中￺せなか￻の　￹花￺はな￻の￹香￺かお￻りが　￹強￺つよ￻まる。\n￹香￺かお￻りに　￹誘￺さそ￻われ　ポケモンが　￹集￺あつ￻まる。"
        en:
          legends_za: "After a rainy day, the flower on its back smells\nstronger. The scent attracts other Pokémon."
        fr:
          legends_za: "Le parfum de sa fleur est plus fort après\nune journée pluvieuse, ce qui appâte\nles autres Pokémon."
        it:
          legends_za: "Il giorno dopo che è piovuto, il fiore sul suo\ndorso emana un profumo più intenso e attira\ngli altri Pokémon."
        de:
          legends_za: "Nach einem Regentag duftet die Blume auf\nseinem Rücken noch intensiver und zieht mit\nihrem Aroma andere Pokémon an."
        es:
          legends_za: "Después de un día de lluvia, el aroma de\nla flor que tiene en el lomo se intensifica\ny atrae a otros Pokémon."
        ko:
          legends_za: "비가 내린 다음 날은\n등의 꽃향기가 강해진다.\n향기에 이끌려 포켓몬이 모여든다."
        zh_simp:
          legends_za: "雨后第二天，\n它背上花朵的香味会愈加浓郁。\n宝可梦会被香味引诱而聚拢过来。"
        zh_trad:
          legends_za: "下雨過後的第二天，\n背上花朵散發的香味會變得濃郁。\n香味會吸引寶可夢聚集而來。"
        es_latam:
          legends_za: "Después de un día de lluvia, el aroma de\nla flor que tiene en el lomo se intensifica\ny atrae a otros Pokémon."
