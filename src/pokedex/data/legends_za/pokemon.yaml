        en:
          legends_za: "It spins a web using fine yet durable thread. It\nthen waits patiently for prey to be trapped."
        fr:
          legends_za: "Il tisse une toile en utilisant un fil fin mais solide,\npuis attend tranquillement sa proie."
        it:
          legends_za: "Tesse la tela con un filo sottile ma resistente.\nPoi attende paziente che una preda ci finisca\ndentro."
        de:
          legends_za: "Es spinnt ein Netz aus feinem, aber reißfestem\nFaden. Dann wartet es geduldig auf Beute,\ndie darin hängen bleibt."
        es:
          legends_za: "Teje su telaraña con hilo fino pero resistente y\nespera pacientemente a que su presa caiga en\nella."
        ko:
          legends_za: "가늘고 튼튼한 실을\n뿜어 엮어서 덫을 만들고\n먹이가 걸리기만을 기다린다."
        zh_simp:
          legends_za: "在用又细又结实的丝布满陷阱后，\n就会一直等着猎物落网。"
        zh_trad:
          legends_za: "會用又細又結實的\n絲線佈下陷阱，\n然後靜靜等待獵物落網。"
        es_latam:
          legends_za: "Teje su telaraña con un hilo fino pero resistente\ny espera pacientemente a que caiga su presa."
