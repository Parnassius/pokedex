        it:
          legends_za: "Immobilizza il nemico avvolgendolo in filamenti\nbianchi, dolci e appiccicosi, simili a zucchero\nfilato."
        de:
          legends_za: "Es stößt weiße Fäden aus, die so süß und klebrig\nwie Zuckerwatte sind. Mit ihnen umwickelt es den\nGegner und hindert ihn daran, sich zu bewegen."
        es:
          legends_za: "Escupe hebras pegajosas de color blanco y\ntextura parecida a la del algodón de azúcar,\ncon las que envuelve al enemigo y le impide\nque se mueva."
        ko:
          legends_za: "솜사탕 같은 달고 끈적끈적한\n하얀 실을 내뿜어서 상대를 휘감아\n움직이지 못하게 한다."
        zh_simp:
          legends_za: "放出像棉花糖那样\n又甜又黏的白丝缠住对手，\n封住其行动。"
        zh_trad:
          legends_za: "放出棉花糖般又甜又黏的\n白絲纏繞對手，\n藉此封住對手的行動。"
        es_latam:
          legends_za: "Escupe hebras pegajosas de color blanco y de\nuna textura parecida a la del algodón de azúcar,\ncon las que envuelve al enemigo y le impide que\nse mueva."
