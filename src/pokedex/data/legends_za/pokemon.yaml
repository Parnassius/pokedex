          legends_za: "Accumula energia elettrica pari a dieci fulmini.\nQuando decide di trascendere i suoi limiti, diventa\nuno dei migliori Pokémon Elettro."
        de:
          legends_za: "Es speichert die Elektrizität von zehn Blitzen in\nsich. Wenn es bewusst sein Limit überschreitet,\nzählt es zu den stärksten Elektro-Pokémon."
        es:
          legends_za: "Almacena en su cuerpo la energía eléctrica de\ndiez rayos. Cuando desata su poder, se encuentra\nentre los Pokémon de tipo Eléctrico más fuertes."
        ko:
          legends_za: "벼락 10개 정도 분량의 전기를\n비축하고 있다. 리미터를 해제하면\n전기포켓몬 중 최강 클래스가 된다."
        zh_simp:
          legends_za: "能储存相当于１０个雷的\n电力。解除限制后是\n电气宝可梦中最强的级别。"
        zh_trad:
          legends_za: "能蓄積相當於１０次雷電的電力。\n當牠不抑制自身力量時，\n會是最強級別的電氣寶可夢。"
        es_latam:
          legends_za: "Almacena en su cuerpo la energía eléctrica de\ndiez rayos. Cuando desata su poder, se vuelve\nuno de los Pokémon de tipo Eléctrico más fuertes."
