        fr:
          legends_za: "Ce Pokémon brave affronte même les adversaires\nles plus redoutables. Il devient plus fort à mesure\nqu’il subit des défaites."
        it:
          legends_za: "Ha un’indole temeraria che lo porta ad attaccare\nbriga anche con nemici molto forti. Perfino le\nsconfitte lo aiutano a diventare più forte."
        de:
          legends_za: "Es ist von Natur aus sehr mutig und fordert daher\njeden noch so starken Feind heraus. Selbst wenn\nes den Kürzeren zieht, dient dies seinem Training."
        es:
          legends_za: "De naturaleza valiente, planta cara a cualquier\nrival, por muy fuerte que sea. Los contraataques\nque recibe le sirven para fortalecerse."
        ko:
          legends_za: "아무리 강한 상대라도 덤벼드는\n용감한 성격을 가졌다. 도리어\n당하면서도 점점 단련되어 간다."
        zh_simp:
          legends_za: "性格勇敢，无论多强的敌人\n都勇于挑战。即使在敌人的反击中\n被打败，也能从中得到锻炼。"
        zh_trad:
          legends_za: "性情勇敢，無論多強的敵人\n都勇於挑戰。即使在敵人的反擊中\n被打敗，也能從中得到鍛鍊。"
        es_latam:
          legends_za: "De naturaleza valiente, le hace frente a cualquier\nrival, por muy fuerte que sea. Los contraataques\nque recibe le sirven para fortalecerse."
