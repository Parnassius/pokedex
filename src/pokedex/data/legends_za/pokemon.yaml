        ko:
          legends_za: "두꺼운 얼음으로 뒤덮인 주먹은\n가볍게 휘두르기만 해도\n철근 콘크리트조차 분쇄해 버린다."
        zh_simp:
          legends_za: "被厚厚的冰所包覆的\n拳头只需要轻轻一挥，\n连钢筋混凝土都能粉碎。"
        zh_trad:
          legends_za: "被厚厚的冰包覆的\n拳頭只要輕輕一揮，\n就連鋼筋混凝土都能粉碎。"
        es_latam:
          legends_za: "Sus pinzas, ahora recubiertas de una gruesa capa\nde hielo, son como puños capaces de pulverizar\nel hormigón armado de un solo y rápido golpe."
