        es:
          legends_za: "Su potencia al embestir es capaz de derribar\nlas murallas de un castillo. Las leyendas\nhablan de sus proezas."
        ko:
          legends_za: "거대한 성벽을 일격에\n돌파할 만한 돌진력을 가졌다.\n전설로 전해지는 포켓몬이다."
        zh_simp:
          legends_za: "拥有一击冲破巨大城墙的猛撞力。\n是传说中所描述的宝可梦。"
        zh_trad:
          legends_za: "有著能一舉衝破\n巨大城牆的衝撞力。\n是傳說裡描述的寶可夢。"
        es_latam:
          legends_za: "La potencia de su embestida puede derribar\nlas murallas de un castillo. Las leyendas\nhablan de sus proezas."
