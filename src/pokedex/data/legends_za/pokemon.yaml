        en:
          legends_za: "This clever Pokémon marks potential targets with\nits scent, then follows its nose to locate their\nnests."
        fr:
          legends_za: "En marquant ses proies avec son odeur,\nil peut les suivre à la trace et déterminer\noù se trouve leur tanière."
        it:
          legends_za: "Marca le prede con il proprio odore per poi\nseguirle con astuzia e individuare così la\nloro tana."
        de:
          legends_za: "Dieses scharfsinnige Pokémon markiert Beute\nmit seinem Geruch und folgt diesem, um ihr Nest\nausfindig zu machen."
        es:
          legends_za: "Deja marcas de olor sobre su presa y es capaz\nde seguir el rastro con sagacidad hasta dar con\nsu madriguera."
        ko:
          legends_za: "먹잇감에 자신의 냄새를 남겨서\n마킹한 다음 냄새를 쫓아\n거처를 특정해 내는 지혜를 가졌다."
        zh_simp:
          legends_za: "会在猎物身上留下自身的\n气味作为标记。拥有顺着\n气味确定巢穴所在的智慧。"
        zh_trad:
          legends_za: "會在獵物身上沾染自己的\n氣味作為標記。擁有追蹤\n氣味找出對方巢穴的智慧。"
        es_latam:
          legends_za: "Marca su presa con olor para seguirle el rastro\ncon sagacidad hasta dar con su madriguera."
