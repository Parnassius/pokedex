          legends_za: "La convicción que lo insta a proteger a los\ndemás a toda costa es tan inquebrantable\ncomo su coraza reforzada."
        ko:
          legends_za: "반드시 지키겠다는 의지와\n강화된 장갑 모두\n어마어마하게 견고하다."
        zh_simp:
          legends_za: "拥有防守至上的意志\n以及经过强化的装甲。\n两者都坚不可摧。"
        zh_trad:
          legends_za: "擁有守護到底的意志\n以及經過強化的裝甲。\n兩者皆堅不可摧。"
        es_latam:
          legends_za: "La convicción que lo impulsa a proteger a los\ndemás a toda costa es tan inquebrantable\ncomo su coraza reforzada."
