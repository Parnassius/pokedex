          legends_za: "La megaevoluzione ha trasformato lo Shellder in\nun’armatura impenetrabile. Lo Slowpoke, invece,\nnon sembra aver subito cambiamenti."
        de:
          legends_za: "Muschas wurde durch die Energie der Mega-\nEntwicklung zu einem undurchdringbaren Panzer.\nFlegmon hingegen hat sich kaum verändert."
        es:
          legends_za: "La energía de la megaevolución ha convertido a\nShellder en una armadura impenetrable. No hay\nningún cambio aparente en Slowpoke."
        ko:
