        es:
          legends_za: "Tiene un humor muy volátil, tal vez por efecto de\nlos capsaicinoides. Si algo o alguien no le cae en\ngracia, le propina un mordisco."
        ko:
          legends_za: "매운 성분의 영향인지\n감정의 기복이 심하다.\n마음에 들지 않으면 금방 물려고 한다."
        zh_simp:
          legends_za: "或许是受辣味成分影响，\n它的情绪起伏非常剧烈。\n若不满便会直接咬过去。"
        zh_trad:
          legends_za: "也許是辣味成分的影響，\n牠的情緒起伏非常激烈。\n只要不順心就會咬上來。"
        es_latam:
