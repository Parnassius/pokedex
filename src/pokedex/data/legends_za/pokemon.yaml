        en:
          legends_za: "It resembles an X as it flies through the air with\n50 million volts of electricity sparking from its\nears and forked tail."
        fr:
          legends_za: "Pour voler, il prend la forme de la lettre X et émet\nune décharge électrique de 50 millions de volts\nà partir de ses oreilles et de sa double queue."
        it:
          legends_za: "Vola formando una X sprigionando dalle orecchie\ne dalle due code scintille elettriche da 50 milioni\ndi volt."
        de:
          legends_za: "Über seine Ohren und den gegabelten Schweif\nentlädt es 50 Millionen Volt an Elektrizität. So\nkann es in Form eines X durch die Lüfte fliegen."
        es:
          legends_za: "Vuela adoptando una postura en forma de X y\nsoltando descargas eléctricas de 50 000 000 V\npor las orejas y las dos colas."
        ko:
          legends_za: "두 귀와 두 갈래의 꼬리에서\n5000만 볼트의 전기로\n스파크를 일으켜 X자 형태로 날아오른다."
        zh_simp:
          legends_za: "从双耳和分叉的尾巴\n发出５０００万伏特的电光，\n并以Ｘ字的样子飞翔。"
        zh_trad:
          legends_za: "從雙耳和分叉的尾巴發出\n５０００萬伏特的電光，\n並以Ｘ的樣子飛行。"
        es_latam:
          legends_za: "Vuela adoptando una postura en forma de X y\nsuelta descargas eléctricas de 50,000,000 V\npor las orejas y las dos colas."
