        it:
          legends_za: "Si infiltra nell’ombra del nemico, copiandone\ni movimenti e i poteri. A forza di imitarlo,\nfinisce per diventare più forte dell’originale."
        de:
          legends_za: "Schlüpft es in den Schatten seines Gegners,\num dessen Bewegungen und Kräfte zu imitieren,\nkann es sogar stärker als das Original werden."
        es:
          legends_za: "Se oculta en la sombra de su oponente y copia\nsus movimientos y su fuerza. Su imitación resulta\nmás poderosa que el original."
        ko:
          legends_za: "상대 그림자에 숨어들어\n움직임이나 능력을 흉내 낸다.\n그러다가 진짜보다 강해진다."
        zh_simp:
          legends_za: "能潜入对方的影子，\n模仿对方的动作和力量。\n在模仿的过程中会变得比本尊更强。"
        zh_trad:
          legends_za: "能夠潛入對手的影子，\n模仿對手的動作和能力。\n在模仿的過程中會變得比本尊更強。"
        es_latam:
          legends_za: "Se oculta en la sombra de su oponente y copia\nsus movimientos y su fuerza. Su imitación resulta\nmás poderosa que el original."
