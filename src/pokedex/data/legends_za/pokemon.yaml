        it:
          legends_za: "Più è intenso il fuoco della sacca che ha\nnel ventre e più velocemente può volare,\nma avviare la combustione richiede tempo."
        de:
          legends_za: "Je mehr sich der Flammensack in seinem Bauch\naufheizt, desto schneller kann es fliegen. Bis es\nzur Zündung kommt, dauert es jedoch eine Weile."
        es:
          legends_za: "Cuanto más intenso sea el calor que se genera\nen la saca de fuego de su vientre, más rápido\nes capaz de volar. Sin embargo, la llama tarda\nen prender."
        ko:
          legends_za: "배에 있는 불꽃 주머니의 화력이\n강해질수록 빨리 날 수 있지만\n점화할 때까지 시간이 걸린다."
        zh_simp:
          legends_za: "腹部火袋的火力越强，\n飞得越快。\n但是点着火需要花些时间。"
        zh_trad:
          legends_za: "腹部火袋的火力越強，\n就能飛得越快，\n但點火需要花點時間。"
        es_latam:
          legends_za: "Cuanto más intenso sea el calor que se genere\nen el saco de fuego de su vientre, más rápido\npodrá volar. Sin embargo, la llama tarda\nen encenderse."
