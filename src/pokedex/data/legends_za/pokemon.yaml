        it:
          legends_za: "Provoca una reazione chimica delle sue tossine\nper produrre elettricità. La potenza elettrica\nè debole, ma può intorpidire il nemico."
        de:
          legends_za: "Es ändert sein Toxin auf chemischer Ebene,\num Strom zu erzeugen. Dieser ist zwar schwach,\nkann aber einen lähmenden Schlag verursachen."
        es:
          legends_za: "Provoca una reacción química para generar\nenergía eléctrica con sus toxinas. Aunque de\nbajo voltaje, puede causar entumecimiento."
        ko:
          legends_za: "독소를 화학 변화시켜\n전기를 만들어 낸다. 전력은\n약하지만 찌릿찌릿 마비된다."
        zh_simp:
          legends_za: "通过让自身的毒素产生\n化学反应来发电。电力\n虽然弱，却能造成麻痹。"
        zh_trad:
          legends_za: "透過讓自身的毒素產生\n化學反應來發電。電力\n雖然弱，卻能造成麻痺。"
        es_latam:
          legends_za: "Provoca una reacción química para generar\nelectricidad con sus toxinas. Aunque es de\nbajo voltaje, puede causar entumecimiento."
