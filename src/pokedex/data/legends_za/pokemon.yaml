        en:
          legends_za: "Looking into its cute, round eyes prompts it to\nstart singing a song so pleasant that listeners\ncan’t help but fall asleep."
        fr:
          legends_za: "Quand on le regarde droit dans ses grands yeux\nronds, il entonne un chant apaisant qui provoque\nun sommeil irrésistible."
        it:
          legends_za: "Se incroci i suoi occhioni tondi, inizia a cantare\nuna melodia così dolce e soave che restare svegli\ndiventa impossibile."
        de:
          legends_za: "Blickt man in ihre Kulleraugen, singen sie ein\nberuhigendes Lied, das alle Zuhörer ins Reich\nder Träume entführt."
        es:
          legends_za: "Si alguien fija la mirada sobre sus redondos y\nadorables ojos, comienza a entonar una dulce\nnana con la que es imposible no dormirse."
        ko:
          legends_za: "동그란 눈동자를 보고 있으면\n자지 않고는 견딜 수 없을 정도의\n기분 좋은 노래를 부르기 시작한다."
        zh_simp:
          legends_za: "只要盯着它圆溜溜的眼睛，\n它就会唱起让听众惬意得\n无法抵挡睡意的歌曲。"
        zh_trad:
          legends_za: "只要盯著牠圓圓的眼睛看，\n牠就會開始唱出悅耳到\n讓對方忍不住入睡的歌曲。"
        es_latam:
          legends_za: "Si alguien fija la mirada sobre sus redondos y\nadorables ojos, entona una dulce canción de cuna\ncon la que es imposible no dormirse."
