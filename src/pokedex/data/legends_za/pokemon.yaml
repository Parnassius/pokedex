        en:
          legends_za: "If both heads get angry simultaneously, this\nPokémon expels a blizzard from its horn, burying\neverything in snow."
        fr:
          legends_za: "Quand ses deux têtes se fâchent en même temps,\nil souffle un blizzard depuis sa corne et couvre\nles alentours de neige."
        it:
          legends_za: "Se le due teste si arrabbiano allo stesso tempo,\nscatena una bufera dal corno, coprendo di neve\ni dintorni."
        de:
          legends_za: "Wenn seine beiden Köpfe gleichzeitig in Rage\ngeraten, stößt sein Horn heftige Eisböen aus und\nalles in seiner Umgebung versinkt im Schnee."
        es:
          legends_za: "Si sus dos cabezas se enfadan al mismo tiempo,\nexpulsa una ventisca por el cuerno y cubre todo\nsu entorno con nieve."
        ko:
          legends_za: "두 개의 머리가 동시에 화를 내면\n뿔에서 강한 눈보라가 뿜어져 나온다.\n주변을 많은 눈으로 묻어 버린다."
        zh_simp:
          legends_za: "如果２个头同时发怒，\n就会从角上喷出猛烈的暴风雪。\n会用大雪掩埋四周。"
        zh_trad:
          legends_za: "當２顆頭同時生氣時，\n就會從角噴出猛烈的暴風雪。\n讓四周被大雪掩埋。"
        es_latam:
          legends_za: "Si sus dos cabezas se enojan al mismo tiempo,\nexpulsa una ventisca por el cuerno y cubre todo\nsu entorno con nieve."
