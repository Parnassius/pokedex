        it:
          legends_za: "Giura fedeltà al suo Allenatore e trancia senza\nindugio chiunque gli si dimostri ostile."
        de:
          legends_za: "Es ist seinem Trainer treu ergeben. Wer feindliche\nAbsichten zeigt, wird von diesem Pokémon ohne\nviel Aufhebens in Stücke geschnitten."
        es:
          legends_za: "Si detecta la menor hostilidad hacia el Entrenador\na quien ha jurado lealtad, no dudará en resolverla\na base de cuchilladas."
        ko:
          legends_za: "트레이너에게는 충성을 다하며\n적의를 드러내는 자가 있으면\n묻지도 않고 베어 버리려 한다."
        zh_simp:
          legends_za: "它会对训练家宣誓忠诚，\n一旦发现谁带有敌意，\n便会二话不说地劈过去。"
        zh_trad:
