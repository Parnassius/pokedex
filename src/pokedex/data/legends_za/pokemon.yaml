        en:
          legends_za: "It spins string not only from its rear but also from\nits mouth. It’s hard to tell which end is which."
        fr:
          legends_za: "Comme il peut sécréter du fil par l’arrière-train\nou par la bouche, il est difficile de deviner de\nquel côté se trouve sa tête."
        it:
          legends_za: "Poiché tesse il filo sia dall’addome che dalla\nbocca, a prima vista è difficile capire quale\nsia la testa."
        de:
          legends_za: "Da es Fäden sowohl mit dem Hinterleib als auch\nmit dem Mund spinnt, ist auf den ersten Blick\nschwer erkennbar, wo sein Kopf ist."
        es:
          legends_za: "Como segrega hilo por el abdomen y por la boca,\nes muy difícil saber dónde está cada cual."
        ko:
          legends_za: "엉덩이뿐 아니라 입에서도\n실을 뿜기 때문에 그냥 봐서는\n어느 쪽이 머리인지 모른다."
        zh_simp:
          legends_za: "不仅会从臀部，还会从口中\n吐出丝来，所以仅凭眼睛看，\n无法分清哪边才是头。"
        zh_trad:
          legends_za: "不僅會從臀部，還會從口中\n吐出絲線。所以光用眼睛看\n無法分辨哪邊才是頭部。"
        es_latam:
          legends_za: "Segrega hilo tanto por el abdomen como por\nla boca, lo que hace difícil diferenciar ambos\nextremos."
