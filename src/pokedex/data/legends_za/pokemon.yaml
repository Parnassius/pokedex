          legends_za: "￹体内￺たいない￻に　￹取￺と￻りこまれた　ものは\nどんなに　￹硬￺かた￻くても　￹溶解液￺ようかいえき￻で\n￹跡形￺あとかた￻なく　￹溶￺と￻かされてしまう。"
        en:
          legends_za: "Once taken into Victreebel’s body, even the\nhardest object will be melted into nothing by\nthe Pokémon’s acid."
        fr:
          legends_za: "Tout corps ingéré par ce Pokémon, aussi solide\nsoit-il, finit entièrement dissous dans l’acide."
        it:
          legends_za: "Qualunque cosa resti intrappolata dentro\nil suo corpo, fosse anche la più dura al mondo,\nsvanisce nell’acido senza lasciar traccia."
        de:
          legends_za: "In seinen Körper aufgenommene Objekte werden\nvon der Säure restlos aufgelöst, egal wie hart sie\nsind."
        es:
          legends_za: "Sus jugos gástricos son capaces de disolver\ncompletamente cualquier cosa que ingiera por\ndura que sea."
        ko:
          legends_za: "체내로 거둬들인 것은\n아무리 단단할지라도 용해액으로\n흔적도 없이 녹여 버린다."
        zh_simp:
          legends_za: "被它吞进体内的东西不管有多硬，\n都会被溶解液不留痕迹地溶化掉。"
        zh_trad:
          legends_za: "被牠吞進體內的東西不管有多硬，\n都會被溶解液不留痕跡地融化掉。"
        es_latam:
          legends_za: "Sus jugos gástricos son capaces de disolver\ncompletamente cualquier cosa que ingiera,\npor más dura que sea."
    victreebel_mega:
