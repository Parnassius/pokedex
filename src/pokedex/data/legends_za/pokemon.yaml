      descriptions:
        jp_kanji:
          legends_za: "コジオが　￹歩￺ある￻いたあとの　￹地面￺じめん￻には\n￹岩塩￺がんえん￻の　￹粒￺つぶ￻が　￹残￺のこ￻るため\n￹昔￺むかし￻から　ソルトロードと￹呼￺よ￻ばれる。"
        en:
          legends_za: "As Nacli treads along the ground, grains of rock\nsalt are left behind. These trails have been called\n“salt roads” since long ago."
        fr:
          legends_za: "Ce Pokémon laisse des grains de sel dans\nson sillage. Cette trace est depuis longtemps\nsurnommée « route du sel »."
        it:
          legends_za: "Al loro passaggio i Nacli lasciano sul terreno dei\ngrani di salgemma formando quelle che fin dai\ntempi antichi vengono chiamate \"vie del sale\"."
        de:
          legends_za: "Wenn Geosali sich fortbewegt, lässt es Salzkörner\nauf dem Boden zurück. Diese Spur wird schon\nseit jeher als „Salzstraße“ bezeichnet."
        es:
          legends_za: "Deja pequeños trozos de sal al desplazarse,\nde ahí que comúnmente se conozca a ese\nrastro como \"la ruta de la sal\"."
        ko:
          legends_za: "베베솔트가 지나간 자리에는\n암염의 입자가 남아 있기 때문에\n예로부터 솔트 로드라 불리고 있다."
        zh_simp:
          legends_za: "由于盐石宝会在走过的\n地面留下岩盐的颗粒，\n因此从前就被称为盐路。"
        zh_trad:
          legends_za: "鹽石寶走過後地面上\n會留下岩鹽的顆粒，\n那痕跡自古被稱為鹽路。"
        es_latam:
          legends_za: "Deja pequeños cristales de sal al desplazarse,\nformando un rastro que se conoce comúnmente\ncomo \"ruta de sal\"."
