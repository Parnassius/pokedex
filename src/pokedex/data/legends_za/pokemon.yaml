        fr:
          legends_za: "La tige qu’il porte lui est très précieuse.\nIl la brandit comme une épée et peut s’en servir\npour trancher toutes sortes de choses."
        it:
          legends_za: "Il gambo di porro che brandisce è la sua fidata\narma, che utilizza come spada per tagliare tante\ncose diverse."
        de:
          legends_za: "Der Stängel, den es trägt, dient ihm auch als\nwichtige Waffe. Es schwingt ihn wie ein Schwert\nund kann damit allerlei Dinge zerschneiden."
        es:
          legends_za: "El puerro que lleva es su mejor arma.\nSuele usarlo como espada para cortar cosas."
        ko:
          legends_za: "가지고 있는 파 줄기는 소중한\n무기이기도 하며 칼처럼 휘둘러서\n다양한 것을 자를 수 있다."
        zh_simp:
          legends_za: "手上拿着的茎也是重要的武器，\n能像刀一样挥舞并切断很多东西。"
        zh_trad:
          legends_za: "手上拿著的莖同時也是重要的武器，\n能像刀一樣揮舞並斬斷各種東西。"
        es_latam:
          legends_za: "El puerro que lleva es su mejor arma.\nSuele usarlo como espada para cortar cosas."
