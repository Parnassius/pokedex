        en:
          legends_za: "The flame on its tail indicates Charmander’s life\nforce. If it is healthy, the flame burns brightly."
        fr:
          legends_za: "La flamme sur la queue de Salamèche représente\nson énergie vitale. Elle brûle plus fort quand\nce dernier est en pleine forme."
        it:
          legends_za: "La fiamma che Charmander ha sulla coda\nindica la sua forza vitale. Se è in forma,\nla fiamma è vivace."
        de:
          legends_za: "Die Flamme auf seiner Schwanzspitze ist ein\nZeichen seiner Lebensenergie. Ist es gesund,\nlodert sie kräftig."
        es:
          legends_za: "La llama de la cola indica la fuerza vital de\nCharmander. Arderá vigorosamente si está sano."
        ko:
          legends_za: "꼬리의 불꽃은 파이리의\n생명력의 상징이다.\n건강할 때 왕성하게 불타오른다."
        zh_simp:
          legends_za: "尾巴上的火焰\n是小火龙生命力的象征。\n如果精神不错，火焰就会熊熊燃烧。"
        zh_trad:
          legends_za: "尾巴上的火焰是\n小火龍生命力的象徵。\n如果活力十足，火焰就會熊熊燃燒。"
        es_latam:
          legends_za: "La llama de la cola indica la fuerza vital de\nCharmander. Esta arderá vigorosamente si\nestá sano."
