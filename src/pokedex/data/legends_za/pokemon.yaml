        en:
          legends_za: "It hides in its shell to protect itself, then strikes\nback with spouts of water at every opportunity."
        fr:
          legends_za: "Il se protège en se réfugiant dans sa carapace,\net réplique en projetant de l’eau sur ses ennemis\ndès que ces derniers baissent leur garde."
        it:
          legends_za: "Si ritira nel suo guscio per proteggersi e,\nalla prima occasione, contrattacca colpendo\nil nemico con spruzzi d’acqua."
        de:
          legends_za: "Es zieht sich zum Schutz in seinen Panzer zurück\nund nutzt jede Unachtsamkeit des Gegners aus,\num mit Wasserstrahlen zurückzuschlagen."
        es:
          legends_za: "Se mete en el caparazón para protegerse y\nno desaprovecha ninguna oportunidad para\ncontraatacar con un chorro de agua a presión."
        ko:
          legends_za: "등껍질에 숨어 몸을 보호한다.\n상대의 빈틈을 놓치지 않고\n물을 뿜어내어 반격한다."
        zh_simp:
          legends_za: "它会躲进甲壳里保护自己。\n会抓住对手的破绽，\n用喷水来反击。"
        zh_trad:
          legends_za: "會躲進甲殼裡保護自己。\n從不放過對手的破綻，\n會抓準時機用噴水來反擊。"
        es_latam:
          legends_za: "Se mete en el caparazón para protegerse y\naprovecha cada oportunidad para\ncontraatacar con un chorro de agua a presión."
