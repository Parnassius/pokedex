        en:
          legends_za: "According to local rumors, Cleffa are often seen in\nplaces where shooting stars have fallen."
        fr:
          legends_za: "Des rumeurs locales prétendent que\nMélo apparaît souvent là où se sont\nécrasées des météorites."
        it:
          legends_za: "Si dice che sia facile incontrarlo dove sono\nprecipitate delle stelle cadenti."
        de:
          legends_za: "Man erzählt sich, dass überall dort besonders\nhäufig Pii anzutreffen seien, wo Sternschnuppen\neingeschlagen sind."
        es:
          legends_za: "Los lugareños rumorean que suele encontrarse\nen lugares donde han caído estrellas fugaces."
        ko:
          legends_za: "삐가 자주 보이는 장소는\n별똥별이 떨어진 장소라고\n그 고장에서 소문이 돈다."
        zh_simp:
          legends_za: "根据当地的传说，\n皮宝宝经常出没的地方\n就是流星陨落之处。"
        zh_trad:
          legends_za: "根據當地的傳說，\n皮寶寶經常出沒的地方\n就是流星隕落之處。"
        es_latam:
          legends_za: "Los lugareños rumorean que se suelen encontrar\nen lugares donde cayeron estrellas fugaces."
