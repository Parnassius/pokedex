        en:
          legends_za: "The powder that covers its body regulates its\ntemperature, so it can live in any region or\nclimate."
        fr:
          legends_za: "La poudre qui recouvre son corps l’aide\nà réguler sa température. Il peut s’adapter à\ntous les climats et à toutes les topographies."
        it:
          legends_za: "La sua temperatura corporea è regolata dalle\nscaglie che ne ricoprono il corpo. Grazie a esse\npuò adattarsi e sopravvivere in qualsiasi\ncondizione climatica."
        de:
          legends_za: "Da der Puder, der seinen Körper bedeckt, seine\nKörpertemperatur reguliert, kann es sich an\njedes Klima und jede Topografie anpassen."
        es:
          legends_za: "Gracias al polvo que lo recubre y regula su\ntemperatura, puede vivir en cualquier región,\nsin importar las características del terreno\no el clima."
        ko:
          legends_za: "몸을 덮은 가루가 체온을\n조절하고 있어 어떤 기후나\n풍토의 지역에서도 살 수 있다."
        zh_simp:
          legends_za: "覆盖身体的粉末能调节体温，\n所以无论在什么地域\n和气候下都能生活。"
        zh_trad:
          legends_za: "覆蓋身體的粉末能夠調節體溫。\n無論在任何氣候或水土下都能生活。"
        es_latam:
          legends_za: "Gracias al polvo que lo recubre y le regula la\ntemperatura, puede vivir en cualquier región,\nsin importar las características del terreno\no el clima."
