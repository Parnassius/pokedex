          legends_za: "Controla la electricidad mediante telequinesis.\nPuede subirse a su propia cola y desplazarse\nflotando con sus poderes psíquicos."
        ko:
          legends_za: "염동력으로 전기를 조종한다.\n꼬리에 타면 사이코 파워로\n떠올라 그대로 이동한다."
        zh_simp:
          legends_za: "用念力操纵电力。\n乘在尾巴上，利用精神力量浮起，\n就这么移动。"
        zh_trad:
          legends_za: "透過念力操縱電力。\n乘在尾巴上，利用精神力量\n浮起來進行移動。"
        es_latam:
          legends_za: "Controla la electricidad mediante\ntelequinesis. Puede subirse a su\npropia cola y desplazarse flotando\ncon sus poderes psíquicos."
