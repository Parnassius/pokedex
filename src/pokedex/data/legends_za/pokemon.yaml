        es:
          legends_za: "Para acabar con su enemigo, lo aplasta con\nel peso de su cuerpo. En momentos de apuro,\nse esconde en el caparazón."
        ko:
          legends_za: "무거운 몸으로 상대를\n덮쳐서 기절시킨다.\n위기에 처하면 등껍질에 숨는다."
        zh_simp:
          legends_za: "身体很重，压住对手后\n就能让对手昏厥。\n遇到危险时会躲进壳里。"
        zh_trad:
          legends_za: "會用重量驚人的身體\n壓住對手使其昏厥。\n遇到危險時會躲進殼裡。"
        es_latam:
