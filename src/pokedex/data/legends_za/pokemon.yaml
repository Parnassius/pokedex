        it:
          legends_za: "È affranto perché il suo vero aspetto rischia di\nessere scoperto. Si vendica sempre su chi ha rotto\nla parte di travestimento che corrisponde al collo."
        de:
          legends_za: "Es wird traurig, wenn seine wahre Gestalt zum\nVorschein zu kommen droht. Wer sein Kostüm\nbeschädigt, zieht seine Rachsucht auf sich."
        es:
          legends_za: "Le entristece que pueda descubrirse su identidad.\nJamás perdona a quienes rompen su disfraz y no\ndescansa hasta vengarse."
        ko:
          legends_za: "정체를 들킬 것 같아 슬퍼한다.\n목 부분을 꺾은 상대에게는\n가차 없이 복수한다."
        zh_simp:
          legends_za: "因正身就要暴露而很悲痛。\n绝不原谅折断了它脖子的对手，\n会向对方报仇。"
        zh_trad:
          legends_za: "因為真面目快要曝光而傷心。\n不會原諒折斷脖子部分的對手，\n無論如何都會報仇。"
        es_latam:
