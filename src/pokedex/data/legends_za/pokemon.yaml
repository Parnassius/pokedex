        de:
          legends_za: "Mit seinen Tentakeln, auf die es sehr stolz ist,\nführt es Haltegriffe aus, denen selbst übermäßig\nstarke Pokémon nicht entkommen können."
        es:
          legends_za: "Utiliza sus portentosos tentáculos para sujetar\na sus rivales contra el suelo, impidiendo hasta\na los Pokémon de mayor fuerza liberarse y huir."
        ko:
          legends_za: "자랑거리인 촉수로 굳히기를 건다.\n괴력을 가진 포켓몬이라도\n이를 풀고 도망치는 것은 불가능하다."
        zh_simp:
          legends_za: "会用自豪的触手施展寝技\n压制对手。即便力量惊人的\n宝可梦也无法挣脱并逃走。"
        zh_trad:
          legends_za: "會以自豪的觸手施展寢技制服對手。\n即使是力大無窮的寶可夢\n也沒有辦法掙脫逃跑。"
        es_latam:
          legends_za: "Utiliza sus portentosos tentáculos para sujetar\na sus rivales contra el suelo, impidiéndole hasta\na los Pokémon de mayor fuerza liberarse y huir."
