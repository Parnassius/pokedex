        en:
          legends_za: "It fires bolts of electricity from the tip of its tail\nand from the spiky tufts of fur growing out of its\ntemples. This electricity forms the letter Y."
        fr:
          legends_za: "Il émet de l’électricité depuis les extrémités de sa\nqueue et des poils en zigzag qui ont poussé sous\nses tempes. Le courant forme un Y sur son corps."
        it:
          legends_za: "Quando emette scosse elettriche convoglia\nelettricità dalla punta della coda al pelo a zigzag\nche gli cresce sulle tempie, tracciando una Y."
        de:
          legends_za: "Es schießt Stromstöße ab, die eine Y-förmige Spur\nvon seiner Schweifspitze über das gezackte Fell\nziehen, das an seinen Schläfen gewachsen ist."
        es:
          legends_za: "Emite descargas eléctricas por los pelos en zigzag\nque le crecen en las sienes tras haber trazado un\ncircuito en forma de Y desde la punta de la cola."
        ko:
          legends_za: "관자놀이로부터 뻗어 나온\n뾰족뾰족한 털과 꼬리 끝에서\nY자 궤적으로 전격을 방출한다."
        zh_simp:
          legends_za: "从太阳穴伸展出来的\n锯齿状体毛和尾巴尖端\n会放出Ｙ字轨迹的电击。"
        zh_trad:
          legends_za: "從太陽穴延伸出的\n鋸齒狀體毛及尾巴尖端\n會放出Ｙ字軌跡的電擊。"
        es_latam:
          legends_za: "Emite descargas eléctricas por los pelos en zigzag\nque le crecen en las sienes tras haber trazado un\ncircuito en forma de Y desde la punta de la cola."
