        zh_simp:
          legends_za: "全身充斥着非比寻常的力量，\n这种力量染黑了它的身体，\n燃烧出炽热的蓝色火焰。"
        zh_trad:
          legends_za: "全身湧出超乎尋常的力量，\n將身體染成了黑色，同時\n熊熊燃燒著藍色的火焰。"
        es_latam:
