espurr:
  species_id: 677
  names:
    jp_kanji: ニャスパー
    en: Espurr
    fr: Psystigri
    it: Espurr
    de: Psiau
    es: Espurr
    ko: 냐스퍼
    zh_simp: 妙喵
    zh_trad: 妙喵
    es_latam: Espurr
  forms:
    espurr:
      form_id: 0
      base_stats:
        hp: 62
        attack: 48
        defense: 54
        special_attack: 63
        special_defense: 60
        speed: 68
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - psychic
      descriptions:
        jp_kanji:
          legends_za: "￹強力￺きょうりょく￻な　サイコパワーが\n￹漏￺も￻れ￹出￺だ￻さないように　￹放出￺ほうしゅつ￻する　￹器官￺きかん￻を\n￹耳￺みみ￻で　ふさいでいるのだ。"
        en:
          legends_za: "It keeps its intense psychic power from leaking\nout by using its ears to cover the organs emitting\nthat power."
        fr:
          legends_za: "Il utilise ses oreilles pour couvrir ses organes\németteurs de pouvoirs psychiques\nafin de contenir leur redoutable puissance."
        it:
          legends_za: "Copre con le orecchie gli organi di propagazione\ndei suoi incredibili poteri psichici per controllarne\nl’emissione."
        de:
          legends_za: "Damit die starken Psycho-Kräfte dieses Pokémon\nnicht unkontrolliert nach außen dringen, bedeckt\nes das Organ, das sie freisetzt, mit seinen Ohren."
        es:
          legends_za: "Protege con las orejas el órgano con el que irradia\nsu intenso poder psíquico para evitar que este se\nescape al exterior."
        ko:
          legends_za: "강력한 사이코 파워가\n새어 나가지 않도록\n방출되는 기관을 귀로 막고 있다."
        zh_simp:
          legends_za: "为了不让强大的精神力量漏出，\n用耳朵捂住释放力量的器官。"
        zh_trad:
          legends_za: "為了不讓強大的精神力量流出，\n因此用耳朵掩住放出精神力量的器官。"
        es_latam:
          legends_za: "Usa sus orejas para proteger el órgano con el\nque irradia su intenso poder psíquico para evitar\nque este se escape al exterior."
meowstic:
  species_id: 678
  names:
    jp_kanji: ニャオニクス
    en: Meowstic
    fr: Mistigrix
    it: Meowstic
    de: Psiaugon
    es: Meowstic
    ko: 냐오닉스
    zh_simp: 超能妙喵
    zh_trad: 超能妙喵
    es_latam: Meowstic
  forms:
    meowstic_male:
      form_id: 0
      names:
        jp_kanji: オスのすがた
        en: Male
        fr: Mâle
        it: Maschio
        de: Männlich
        es: Macho
        ko: 수컷의 모습
        zh_simp: 雄性的样子
        zh_trad: 雄性的樣子
        es_latam: Macho
      base_stats:
        hp: 74
        attack: 48
        defense: 76
        special_attack: 83
        special_defense: 81
        speed: 104
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - psychic
      descriptions:
        jp_kanji:
          legends_za: "￹危険￺きけん￻が　￹迫￺せま￻ると　￹耳￺みみ￻を　￹持￺も￻ち￹上￺あ￻げ\n１０トン　トラックを　ひねりつぶす\nサイコパワーを　￹解放￺かいほう￻する。"
        en:
          legends_za: "When in danger, it raises its ears and releases\nenough psychic power to grind a 10-ton truck\ninto dust."
        fr:
          legends_za: "S’il se sent menacé, il lève les oreilles et déchaîne\ndes pouvoirs psychiques capables de broyer\nun camion de 10 tonnes."
        it:
          legends_za: "Se si sente minacciato, drizza le orecchie e libera\nun potere psichico in grado di accartocciare un\ncamion da 10 tonnellate come fosse una lattina."
        de:
          legends_za: "In Gefahrensituationen hebt es seine Ohren an\nund setzt Psycho-Kräfte frei, die einen 10 t\nschweren LKW zu Schrott verarbeiten können."
        es:
          legends_za: "Cuando percibe peligro, yergue las orejas y desata\nun poder psíquico capaz de levantar un camión de\nunas diez toneladas."
        ko:
          legends_za: "위험이 다가오면 귀를 들어 올리고\n10톤 트럭을 눌러 부술 정도의\n사이코 파워를 방출한다."
        zh_simp:
          legends_za: "如果危险逼近，就会竖起耳朵，\n释放出能拧碎１０吨重卡车的精神力量。"
        zh_trad:
          legends_za: "危險逼近時，會豎起耳朵，\n釋放出能夠碾碎１０噸重卡車的\n精神力量。"
        es_latam:
          legends_za: "Cuando percibe peligro, levanta las orejas y\ndesata un poder psíquico capaz de elevar\nun camión de unas diez toneladas."
    meowstic_female:
      form_id: 1
      names:
        jp_kanji: メスのすがた
        en: Female
        fr: Femelle
        it: Femmina
        de: Weiblich
        es: Hembra
        ko: 암컷의 모습
        zh_simp: 雌性的样子
        zh_trad: 雌性的樣子
