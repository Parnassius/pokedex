        fr:
          legends_za: "Quand il est exalté par un combat sans merci,\ndes étincelles s’échappent des interstices entre\nses plumes pendant qu’il vole."
        it:
          legends_za: "Quando si infervora in lotte senza esclusione\ndi colpi, vola sprizzando scintille dalle fessure\nche ha tra le piume."
        de:
          legends_za: "Verspürt es Aufregung in einem harten Kampf,\nsprüht es im Flug aus den Zwischenräumen\nseines Gefieders Funken."
        es:
          legends_za: "Si se exalta durante un combate reñido, arroja\nchispas y ascuas de los intersticios entre su\nplumaje mientras vuela."
        ko:
          legends_za: "격렬한 싸움으로 흥분하게 되면\n온몸의 깃털 사이에서\n불꽃을 뿜어내며 비행한다."
        zh_simp:
          legends_za: "因激烈的战斗而兴奋的话，\n会从全身的羽毛缝隙里\n喷出火花飞行。"
        zh_trad:
          legends_za: "因激烈的戰鬥感到興奮時，\n會從全身的羽毛間隙\n噴出火花飛行。"
        es_latam:
          legends_za: "Si se exalta durante un combate reñido, arroja\nchispas y brasas de entre los espacios de su\nplumaje mientras vuela."
