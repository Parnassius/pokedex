        zh_trad:
          legends_za: "用破破爛爛的布隱藏起可怕的模樣，\n接近人類和其他寶可夢的寂寞傢伙。"
        es_latam:
          legends_za: "El saco andrajoso le permite ocultar su aspecto\naterrador para acercarse a otros Pokémon o a la\ngente y vencer así la soledad que lo atormenta."
