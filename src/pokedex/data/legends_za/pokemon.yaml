        es:
          legends_za: "Si se enfada, causa auténticos estragos, pues\necha a volar e incendia campos y montañas\ndesde el cielo."
        ko:
          legends_za: "한번 화가 나면 크게 난동을 부린다.\n하늘을 날며 지상의 산과 들을\n불꽃으로 모조리 태운다."
        zh_simp:
