        zh_trad:
          legends_za: "會用全身上下的細毛\n來感受空氣的流動，\n預測敵人的想法和天氣。"
        es_latam:
          legends_za: "Su pelaje es tan sensible que percibe los cambios\nen el aire, y predice las condiciones atmosféricas\ny los pensamientos de sus enemigos."
