        en:
          legends_za: "It protects its skin by covering its body in delicate\nbubbles. Beneath its happy-go-lucky air, it keeps\na watchful eye on its surroundings."
        fr:
          legends_za: "Il protège son corps en l’entourant d’une mousse\ndélicate. Malgré son apparente insouciance,\nce Pokémon est en fait constamment à l’affût."
        it:
          legends_za: "Protegge la pelle rivestendo il corpo di schiuma\nsottile. Si finge sbadato ma scruta sempre con\nmolta attenzione l’ambiente circostante."
        de:
          legends_za: "Es schützt seine Haut mit feinen Blasen, die den\nKörper umhüllen. Obwohl es sich sorglos gibt,\nhat es die Umgebung stets aufmerksam im Auge."
        es:
          legends_za: "Protege su piel cubriendo el cuerpo con una\nfina capa de burbujas. Aunque parezca\ndespreocupado, no deja de vigilar con atención\nlo que lo rodea."
        ko:
          legends_za: "섬세한 거품으로 몸을 감싸\n피부를 보호한다. 태평한 척하면서\n빈틈없이 주위를 살핀다."
        zh_simp:
          legends_za: "用细腻的泡泡包住身体，\n保护皮肤。装得无忧无虑的，\n实则很精明地窥视着四周。"
        zh_trad:
          legends_za: "以細膩的泡泡包住身體，\n保護皮膚。裝出一副悠閒的樣子，\n但其實精明地打量著四周。"
        es_latam:
          legends_za: "Protege su piel al cubrirse el cuerpo con una\nfina capa de burbujas. Aunque parezca\ndespreocupado, no deja de vigilar con atención\nsus alrededores."
