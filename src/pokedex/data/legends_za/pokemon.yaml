      types:
        - steel
        - ghost
      descriptions:
        jp_kanji:
          legends_za: "￹死者￺ししゃ￻の　￹魂￺たましい￻が　￹古代￺こだい￻の　￹剣￺つるぎ￻に\n￹宿￺やど￻って　￹生￺う￻まれたらしい。\n￹人￺ひと￻に　とりつき　￹命￺いのち￻を　￹吸￺す￻う。"
        en:
          legends_za: "Apparently Honedge was born when a departed\nspirit began inhabiting an ancient sword. It\nattaches itself to people and drinks their life force."
        fr:
          legends_za: "Il serait né de l’âme d’un défunt ayant pris\npossession d’une épée ancienne. Il s’accroche\naux humains pour absorber leur énergie vitale."
        it:
          legends_za: "Sembra sia nato quando uno spirito si\nimpossessò di un’antica spada. Si lega agli\nesseri umani per assorbirne la forza vitale."
        de:
          legends_za: "Dieses Pokémon wurde offenbar geboren, als die\nSeele eines Verstorbenen sich in einem Schwert\nniedergelassen hat. Es heftet sich an Menschen\nund saugt deren Lebenskraft aus."
        es:
          legends_za: "Cuentan que este Pokémon nace cuando\nel espíritu de un difunto toma posesión de\nuna espada antigua. Se aferra a las personas\ny absorbe su energía."
        ko:
          legends_za: "죽은 자의 혼이 고대의 검에\n깃들어 태어났다고 한다.\n사람에게 씌어 생명을 빨아들인다."
        zh_simp:
          legends_za: "好像是死者的灵魂寄宿在\n古剑上转生而成。\n会附在人类身上吸食生命。"
        zh_trad:
          legends_za: "似乎是死者的靈魂寄宿在\n古代的劍上而誕生。\n會附在人類身上吸取生命。"
        es_latam:
          legends_za: "Cuentan que este Pokémon nace cuando\nel espíritu de un difunto toma posesión de\nuna espada antigua. Se aferra a las personas\ny absorbe su energía."
doublade:
