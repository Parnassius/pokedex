        en:
          legends_za: "Rayquaza cannot be seen from the ground\nbecause it lives in the ozone layer, far above the\nclouds."
        fr:
          legends_za: "On ne le voit pas depuis le sol, car il vit dans\nla couche d’ozone, bien au-dessus des nuages."
        it:
