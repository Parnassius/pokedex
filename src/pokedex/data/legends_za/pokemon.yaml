        fr:
          legends_za: "Ce Pokémon est né lorsqu’une âme rancunière\ns’est incarnée dans un pâté de sable. Il tient\nénormément à la pelle sur sa tête."
        it:
          legends_za: "È nato quando uno spirito rancoroso si è\nimpossessato di una montagna di sabbia.\nTiene molto alla paletta che ha sul capo."
        de:
          legends_za: "Es entstand aus einem Sandhaufen, in den der\nGroll eines Verstorbenen fuhr. Die Schaufel auf\nSankabuhs Kopf ist sein größter Schatz."
        es:
          legends_za: "Nace de un montículo de arena poseído por el\nresentimiento de un difunto. Siente mucho apego\npor la pala de su cabeza."
        ko:
          legends_za: "모래산에 죽은 자의 원념이\n깃들어 포켓몬이 되었다.\n머리의 삽을 마음에 들어 한다."
        zh_simp:
          legends_za: "死者的怨念附着在\n沙丘上，变成了宝可梦。\n很喜欢头上的小铲子。"
        zh_trad:
          legends_za: "死者的怨念附在沙丘上，\n從而變成的寶可夢。\n很喜歡頭上的鏟子。"
        es_latam:
          legends_za: "Nace de un montículo de arena poseído por el\nresentimiento de un difunto. Siente mucho apego\npor la pala de su cabeza."
