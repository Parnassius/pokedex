        en:
          legends_za: "Its four horns are a high-performance radar\nsystem. It uses them to sense sounds and smells,\nrather than using ears or a nose."
        fr:
          legends_za: "En lieu et place d’un nez et d’oreilles, ses quatre\ncornes agissent comme un puissant radar qu’il\nutilise pour percevoir les odeurs et les sons."
        it:
          legends_za: "Le quattro corna di questo Pokémon sono simili\na un potente radar e fungono da organi sensoriali\nal posto di orecchie e naso."
        de:
          legends_za: "Seine vier Fühler fungieren als hochleistungs-\nfähiges Radarsystem. Es setzt sie anstelle von\nNase und Ohren zur Wahrnehmung von Gerüchen\nund Geräuschen ein."
        es:
          legends_za: "Sus cuatro antenas constituyen un radar de gran\npotencia. Hacen las veces de nariz y oídos para\npercibir tanto ruidos como olores."
        ko:
          legends_za: "4개의 뿔은 고성능의 레이더이다.\n귀나 코를 대신해서\n소리나 냄새를 느낀다."
        zh_simp:
          legends_za: "４只角是高性能的雷达。\n取代耳朵和鼻子，\n感知声音和气味。"
        zh_trad:
          legends_za: "４隻角是高性能的雷達。\n會用它們代替耳朵與鼻子，\n感受聲音及氣味。"
        es_latam:
          legends_za: "Sus cuatro antenas constituyen un radar de gran\npotencia. Funcionan como nariz y oídos para\npercibir tanto ruidos como olores."
