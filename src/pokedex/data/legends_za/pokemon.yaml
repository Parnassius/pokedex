          legends_za: "Escala con rapidez incluso superficies verticales.\nPercibe la humedad con las colas y así prevé el\ntiempo que hará al día siguiente."
        ko:
          legends_za: "수직으로 된 벽도 쭉쭉 타고 올라간다.\n꼬리로 공기 중의 습도를\n감지해서 내일 날씨를 맞힌다."
        zh_simp:
          legends_za: "在垂直的墙壁上也能轻快地攀爬。\n会用尾巴感知湿度，\n以此来判断明天的天气。"
        zh_trad:
          legends_za: "在垂直的牆壁上也能輕快地攀爬。\n會用尾巴感知濕度，\n以此來判斷明天的天氣。"
        es_latam:
          legends_za: "Escala con rapidez incluso en superficies\nverticales. Puede detectar la humedad con sus\ncolas y predecir el tiempo del día siguiente."
