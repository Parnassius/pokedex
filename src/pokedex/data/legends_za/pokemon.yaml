        en:
          legends_za: "If it bites you in the dark and sucks your blood,\nyou won’t notice immediately—its fangs are so\nsharp that you won’t feel any pain."
        fr:
          legends_za: "Ses crocs sont si acérés que ses proies ne sentent\nrien quand il les mord. Il peut leur sucer le sang\ndans l’obscurité sans qu’elles s’en aperçoivent."
        it:
          legends_za: "Succhia il sangue alle sue vittime nell’oscurità.\nLe sue zanne sono così affilate che i suoi morsi\nsono indolori e le vittime non se ne accorgono."
        de:
          legends_za: "Iksbat hat sehr scharfe Zähne, sodass seine Beute\noft nichts davon merkt, wenn es in der Dunkelheit\nzubeißt und ihr Blut aussaugt."
        es:
          legends_za: "Sus colmillos son tan afilados que su mordedura\nresulta indolora y puede chupar la sangre a sus\npresas en la oscuridad sin que se percaten."
        ko:
          legends_za: "이빨이 예리해서 어둠 속에서 물려\n피를 빨려도 통증이 없기 때문에\n금세 알아차리지 못한다."
        zh_simp:
          legends_za: "牙齿锋利，就算在黑暗中被它\n咬住吸血也不会感到疼痛，\n所以无法立刻发觉。"
        zh_trad:
          legends_za: "牙齒很銳利，就算在黑暗中被牠\n咬住吸血，也會因感覺不到疼痛\n而無法立刻發現。"
        es_latam:
          legends_za: "Sus colmillos son tan afilados que su mordedura\nresulta indolora y puede succionarle la sangre\na sus presas en la oscuridad sin que se percaten."
