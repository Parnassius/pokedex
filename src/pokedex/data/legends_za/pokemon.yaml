        en:
          legends_za: "Keldeo’s magnificent horn is proof of its resolve.\nIts allies provided guidance, and their hopes\nbecame Keldeo’s tricolored plume of feathers."
        fr:
          legends_za: "Sa belle corne est le symbole de sa détermination.\nSes trois plumes colorées incarnent quant à elles\nle souvenir des compagnons qui l’ont guidé."
        it:
          legends_za: "Il magnifico corno è testimonianza della sua\ndeterminazione. L’affetto dei suoi mentori ha\npreso forma nell’ornamento di piume tricolore."
        de:
          legends_za: "Sein stolzes Horn zeugt von Entschlossenheit.\nDie drei bunten Federn verkörpern die Gefühle\nseiner Gefährten, die ihm einst den Weg wiesen."
        es:
          legends_za: "Su magnífico cuerno es símbolo de su resolución.\nLos sentimientos de sus mentores se han\nmanifestado en forma de tres plumas coloridas."
        ko:
          legends_za: "늠름한 뿔은 각오를 굳힌 증표다.\n자신을 이끌어 준 동료들을 향한 마음이\n세 가지 색의 깃털 장식이 되었다."
        zh_simp:
          legends_za: "非凡的角是觉悟之证。\n引导过它的同伴的心意\n化作了３色的羽饰。"
        zh_trad:
          legends_za: "挺拔的角是覺悟的證明。\n指引過自己的夥伴的心意\n轉化成為３色的羽毛裝飾。"
        es_latam:
