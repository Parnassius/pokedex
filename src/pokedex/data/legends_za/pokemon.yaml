        zh_simp:
          legends_za: "当它用力抓挠胸部的突起物\n来制造电力时，四周会响起\n如同吉他演奏般的声音。"
        zh_trad:
          legends_za: "當牠用力抓撓胸部的突起物\n來製造電力時，四周會響起\n如同吉他演奏般的聲音。"
        es_latam:
