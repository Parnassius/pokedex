        zh_simp:
          legends_za: "沐浴了超级进化能量的\n大舌贝是铜墙铁壁般的铠甲。\n对于呆呆兽来说并没有特别的变化。"
        zh_trad:
          legends_za: "吸收了超級進化能量的\n大舌貝成了銅牆鐵壁般的鎧甲。\n呆呆獸本身並沒有什麼變化。"
        es_latam:
          legends_za: "La energía de la megaevolución convirtió a\nShellder en una armadura impenetrable. No\nhay ningún cambio aparente en Slowpoke."
