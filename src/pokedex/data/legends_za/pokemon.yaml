        zh_simp:
          legends_za: "虽然只靠自己几乎无法行动，\n但在遇到危险的时候，\n好像会让外壳变硬并以此来保护自己。"
        zh_trad:
          legends_za: "雖然只靠自己幾乎無法行動，\n但在遇到危險的時候\n好像會讓外殼變硬來保護自己。"
        es_latam:
          legends_za: "Como es casi incapaz de moverse,\neste Pokémon solo puede endurecer\nsu caparazón para protegerse."
