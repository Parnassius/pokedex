      descriptions:
        jp_kanji:
          legends_za: "つぼみが　￹背中￺せなか￻に　ついていて\n￹養分￺ようぶん￻を　￹吸収￺きゅうしゅう￻していくと\n￹大￺おお￻きな　￹花￺はな￻が　￹咲￺さ￻くという。"
        en:
          legends_za: "There is a plant bulb on its back. When it absorbs\nnutrients, the bulb is said to blossom into a large\nflower."
        fr:
          legends_za: "Il y a un bourgeon sur son dos. On dit que\ns’il absorbe des nutriments, ce bourgeon\nse transforme en une grande fleur."
        it:
          legends_za: "Dicono che il bocciolo sul suo dorso si schiuda in\nun grande fiore dopo aver assorbito nutrimento."
        de:
          legends_za: "Es trägt eine Knospe auf seinem Rücken.\nWenn sie Nährstoffe absorbiert, soll sie zu\neiner großen Blume erblühen."
        es:
          legends_za: "Este Pokémon tiene un capullo en el lomo.\nDicen que, al absorber nutrientes, el capullo\nse transforma en una flor grande."
        ko:
          legends_za: "꽃봉오리가 등에 붙어 있으며\n양분을 잘 흡수하면\n커다란 꽃이 핀다고 한다."
        zh_simp:
          legends_za: "据说长在背上的花苞\n在吸收足够的养分后，\n就会开出大大的花朵。"
        zh_trad:
          legends_za: "據說長在背上的花苞\n在吸收足夠的養分之後\n會開出大大的花朵。"
        es_latam:
          legends_za: "Este Pokémon tiene un capullo en el lomo.\nDicen que, al absorber nutrientes, el capullo\nse transforma en una flor grande."
