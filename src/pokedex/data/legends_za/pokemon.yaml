        en:
          legends_za: "The moonlight that it stores in the wings on its\nback apparently gives it the ability to float in\nmidair."
        fr:
          legends_za: "La lumière de la lune qu’il absorbe par les ailes\nsur son dos lui permettrait de flotter dans les airs."
        it:
          legends_za: "Sembra che la luce lunare che raccoglie nelle ali\nsul dorso gli permetta di fluttuare a mezz’aria."
        de:
          legends_za: "Offenbar kann es aufgrund des gespeicherten\nMondlichts in seinen Flügeln auf dem Rücken\nin der Luft schweben."
        es:
          legends_za: "La luz de luna que guarda en las alas del lomo\nparece darle la habilidad de flotar en el aire."
        ko:
          legends_za: "등의 날개에 달빛을 모으면\n공중에 떠오를 수 있다는 듯하다."
        zh_simp:
          legends_za: "它好像能通过将月光聚集在\n后背的翅膀上来浮在空中。"
        zh_trad:
          legends_za: "似乎能夠將月光\n聚集在背後的翅膀上，\n藉此讓自己浮在空中。"
        es_latam:
          legends_za: "La luz de luna que guarda en las alas, al parecer,\nle da la habilidad de flotar en el aire."
