      descriptions:
        jp_kanji:
          legends_za: "サイコパワーで　なんでも　￹膨張￺ぼうちょう￻\n￹圧縮￺あっしゅく￻してしまう。　￹空間￺くうかん￻すら\nねじ￹曲￺ま￻げて　￹敵￺てき￻を　￹圧倒￺あっとう￻する。"
        en:
          legends_za: "Mega Meowstic can use its psychic power to\ncompress or expand anything. It overwhelms foes\nby contorting space itself."
        fr:
          legends_za: "Il dilate et comprime tout ce qu’il souhaite grâce\nà ses pouvoirs psychiques. Il va jusqu’à tordre\nl’espace-temps pour vaincre ses adversaires."
        it:
          legends_za: "Espande e comprime qualsiasi cosa con i suoi\npoteri psichici. Per sconfiggere i nemici arriva\npersino a distorcere lo spazio."
        de:
          legends_za: "Mit seinen Psycho-Kräften kann es ausdehnen\nund komprimieren, was es will. Um seine Gegner\nzu bezwingen, verzerrt es sogar den Raum selbst."
        es:
          legends_za: "Puede expandir y comprimir cualquier cosa con\nsus poderes psíquicos, e incluso distorsionar el\nespacio para desconcertar al rival."
        ko:
          legends_za: "사이코 파워로 무엇이든\n팽창시키거나 압축시켜 버린다.\n공간마저 비틀어서 적을 압도한다."
        zh_simp:
          legends_za: "能凭借精神力量\n让万物膨胀或收缩。\n甚至能扭曲空间，压制敌人。"
        zh_trad:
          legends_za: "能用精神力量\n讓萬物膨脹或壓縮。\n甚至能扭曲空間，壓制敵人。"
        es_latam:
          legends_za: "Puede expandir y comprimir cualquier cosa con\nsus poderes psíquicos, e incluso distorsionar el\nespacio para desconcertar al rival."
