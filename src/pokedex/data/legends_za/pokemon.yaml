        en:
          legends_za: "This is the least populous variety of Squawkabilly.\nThey don’t like conflict, but when they have to\nfight, they do so valiantly and resolutely."
        fr:
          legends_za: "Les Tapatoès blancs sont les moins nombreux\net n’aiment pas les conflits, mais s’ils doivent\nse battre, ils font preuve d’une grande bravoure."
        it:
          legends_za: "Sono i meno numerosi e non amano il conflitto,\nma se messi alle strette lottano con coraggio\ne audacia."
        de:
          legends_za: "Exemplare dieser Farbe gehören der kleinsten\nPopulation an und scheuen Konflikte. Im Ernstfall\nzeigen sie jedoch unerschütterlichen Mut."
        es:
          legends_za: "Aunque los ejemplares de este color sean la\nminoría y no les guste combatir, en caso de\napuro se muestran valientes y audaces."
        ko:
          legends_za: "가장 개체 수가 적고\n싸움을 좋아하지 않는 그룹이지만\n유사시에는 용맹하고도 과감하다."
        zh_simp:
          legends_za: "它们是个体数最少，\n不喜欢争执的队。\n但紧急时刻勇猛果敢。"
        zh_trad:
          legends_za: "個體數最為稀少，\n是不愛爭鬥的群體。\n但在緊要關頭會十分勇猛果敢。"
        es_latam:
          legends_za: "Aunque los ejemplares de este color sean la\nminoría y no les guste combatir, cuando corren\npeligro demuestran ser valientes y audaces."
