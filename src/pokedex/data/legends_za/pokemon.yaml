        es:
          legends_za: "Se protege de los rivales con su saliva tóxica\ny sus largos incisivos, desproporcionados en\nrelación con su pequeño cuerpo."
        ko:
          legends_za: "작은 몸에는 어울리지 않는\n길고 큰 앞니와 독이 든 침을 이용해\n적으로부터 몸을 지킨다."
        zh_simp:
