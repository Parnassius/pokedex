          legends_za: "물을 압축시켜 수리검을 만들어 낸다.\n고속으로 회전시키며 던지면\n금속도 두 동강이 난다."
        zh_simp:
          legends_za: "压缩水，制造出手里剑。\n让它高速旋转后飞出的话，\n连金属也能一劈两半。"
        zh_trad:
          legends_za: "將水壓縮，做出手裡劍。\n高速旋轉射出的手裡劍，\n就連金屬也能一分為二。"
        es_latam:
          legends_za: "Comprime el agua y crea estrellas ninja con las\nque ataca al enemigo. Cuando las hace girar a\ngran velocidad, cortan en dos hasta el metal."
