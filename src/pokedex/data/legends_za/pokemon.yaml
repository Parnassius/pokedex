        en:
          legends_za: "Its unkempt beard is a vestige from living in cold\nclimes. It fights dauntlessly using its steel claws."
        fr:
          legends_za: "Sa barbe hirsute est un héritage du temps où\nson espèce vivait dans les régions froides.\nIl se bat valeureusement avec ses griffes d’acier."
        it:
          legends_za: "La sua barba incolta è retaggio di un passato\ntrascorso in terre fredde. Lotta con intrepida\nrisolutezza usando i suoi artigli d’acciaio."
        de:
          legends_za: "Der wilde Bart ist ein Überbleibsel seines Lebens\nin kalten Gefilden. Mutig und entschlossen setzt\nes seine stählernen Krallen im Kampf ein."
        es:
          legends_za: "La barba espesa y enmarañada es un vestigio de\ncuando habitaba en climas fríos. Usa sus garras\nde acero para luchar con arrojo y determinación."
        ko:
          legends_za: "야성미가 느껴지는 수염은\n추운 땅에서 살아온 흔적이 남은 것이다.\n강철로 된 발톱으로 용감무쌍하게 싸운다."
        zh_simp:
          legends_za: "充满野性的胡须是受到了\n曾栖息于寒冷地带的影响。\n会用钢爪勇猛果敢地战斗。"
        zh_trad:
          legends_za: "狂野的鬍鬚是曾經棲息在\n寒冷的地方所留下的影響。\n會用鋼爪勇猛果敢地戰鬥。"
        es_latam:
          legends_za: "La barba espesa y enmarañada es un vestigio de\ncuando habitaba en climas fríos. Usa sus garras\nde acero para luchar con osadía y determinación."
