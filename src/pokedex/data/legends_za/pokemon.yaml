        en:
          legends_za: "It never lets go of a key that it likes, so people give\nit the keys to vaults and safes as a way to prevent\ncrime."
        fr:
          legends_za: "Comme il ne se sépare jamais d’une clé qu’il\ntrouve à son goût, les gens lui confient celle\nde leur coffre, afin d’éviter de se faire voler."
        it:
          legends_za: "Se una chiave gli piace, non la molla per nulla\nal mondo, e per questo motivo chi vuole prevenire\ni furti gli affida spesso le chiavi della cassaforte."
        de:
          legends_za: "Da es Schlüssel, die ihm gefallen, wie seinen\nAugapfel hütet, vertrauen Menschen ihm die\nSchlüssel ihrer Tresore an, um Diebstahl\nvorzubeugen."
        es:
          legends_za: "Como no se separa de las llaves que le gustan\nbajo ningún concepto, la gente le encomienda\nlas llaves de cajas fuertes para prevenir posibles\nrobos."
        ko:
          legends_za: "마음에 든 열쇠는 절대로\n손에서 놓지 않아서 방범을 위해\n금고 열쇠를 지니게 한다."
        zh_simp:
          legends_za: "对于喜欢的钥匙绝对不放手，\n所以为了防止盗窃，\n会让它拿着金库的钥匙。"
        zh_trad:
          legends_za: "喜歡的鑰匙絕不放手。\n可以將金庫的鑰匙交給牠\n以防止偷竊。"
        es_latam:
          legends_za: "Como no se separa de las llaves que le gustan\npor ningún motivo, la gente le encarga las llaves\nde cajas fuertes para prevenir posibles robos."
