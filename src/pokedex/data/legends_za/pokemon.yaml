          legends_za: "￹白￺しろ￻い　￹花￺はな￻の　フラージェスが\n￹作￺つく￻った　￹花園￺はなぞの￻は　￹色￺いろ￻とりどりの\n￹草花￺くさばな￻で　￹彩￺いろど￻られ　￹美￺うつく￻しい。"
        en:
          legends_za: "A flower garden made by a white-flowered Florges\nwill be beautifully decorated with flowering plants\nof many different colors."
        fr:
          legends_za: "Parsemés de fleurs aux mille couleurs, les jardins\ncréés par les Florges à fleurs blanches sont\nresplendissants."
        it:
          legends_za: "I giardini creati dai Florges Fiore Bianco sono\nricchi di piante variopinte e perciò molto belli."
        de:
          legends_za: "Florges mit weißen Blumen legen Gärten an,\ndie in allen erdenklichen Farben erstrahlen und\ndaher wunderschön anzuschauen sind."
        es:
          legends_za: "Las coloridas plantas con las que los Florges\nde flores blancas ornamentan sus jardines les\nconfieren una belleza exuberante."
        ko:
          legends_za: "하얀 꽃의 플라제스가 만든 화원은\n형형색색의 화초로 장식되어 있어 아름답다."
        zh_simp:
          legends_za: "白花的花洁夫人打造的\n花园由色彩缤纷的花草\n点缀，十分美丽动人。"
        zh_trad:
          legends_za: "白花的花潔夫人打造的花園\n有著色彩繽紛的花草點綴，\n十分地美麗動人。"
        es_latam:
          legends_za: "Las coloridas plantas con las que los Florges\nde flores blancas adornan sus jardines les\ndan una belleza exuberante."
skiddo:
  species_id: 672
