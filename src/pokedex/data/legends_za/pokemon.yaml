        en:
          legends_za: "Its fluffy coat doubles in size when static\nelectricity builds up. Touching it can be shocking."
        fr:
          legends_za: "Lorsque sa douce toison accumule de l’électricité\nstatique, elle double de volume. Si on la touche,\non reçoit une décharge."
        it:
          legends_za: "Il volume del suo soffice manto raddoppia quando\nè carico di elettricità statica. A toccarlo si prende\nla scossa."
        de:
          legends_za: "Sein weiches Fell wird doppelt so dick, wenn sich\nstatische Elektrizität darin ansammelt. Berührt\nman es, bekommt man einen Stromschlag."
        es:
          legends_za: "Su pelaje lanudo dobla su volumen al acumular\nelectricidad estática. Tocarlo puede dar calambre."
        ko:
          legends_za: "푹신푹신한 털은 정전기가 쌓이면\n2배로 부풀어 오른다.\n만지면 감전되어 버린다."
        zh_simp:
          legends_za: "储存了静电后，蓬松的体毛\n就会膨胀到原来的２倍。\n一旦触摸就会触电。"
        zh_trad:
          legends_za: "蓬鬆的體毛在儲存了靜電後\n會膨脹到原來的２倍。\n一旦觸摸就會觸電。"
        es_latam:
          legends_za: "Su pelaje lanudo duplica su volumen cuando\nacumula electricidad estática. Al tocarlo puede\ngenerar una descarga."
