        de:
          legends_za: "Mit seinem Äußeren, das seltsamerweise an\neinen Pokéball erinnert, lockt es andere an und\nbesprüht sie mit Giftsporen."
        es:
          legends_za: "Gracias a su misterioso parecido a una Poké Ball,\natrae a sus presas y lanza rápidamente esporas\nvenenosas."
        ko:
          legends_za: "몬스터볼을 닮은 무늬로\n유인한 후 독 포자를 뿌려 댄다.\n왜 닮았는지는 불가사의다."
        zh_simp:
          legends_za: "以酷似精灵球的花纹\n引诱对手并向其喷出毒孢子。\n为何那么像还是一个谜。"
        zh_trad:
          legends_za: "用酷似精靈球的花紋\n引誘敵人並向其噴出毒孢子。\n為什麼和精靈球那麼相似是一個謎。"
        es_latam:
          legends_za: "Gracias a su misterioso parecido con una\nPokébola, atrae a sus presas y les lanza\nrápidamente esporas venenosas."
