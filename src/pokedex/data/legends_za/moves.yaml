    es: Llamarada
    ko: 불대문자
    zh_simp: 大字爆炎
    zh_trad: 大字爆炎
    es_latam: Llamarada
  descriptions:
    jp_kanji: "大の字の炎で焼きつくす。\n相手をやけど状態にすることもある。"
    en: "The user attacks with an intense blast of all-consuming\nfire. This may also leave targets with a burn."
    fr: "Un déluge de flammes ardentes frappe la cible.\nPeut aussi la brûler."
    it: "Il Pokémon investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Der Anwender greift mit einer Feuersbrunst an, durch die\ngetroffene Gegner eventuell Verbrennungen erleiden."
    es: "Llama intensa que chamusca y puede causar\nquemaduras."
    ko: "큰대자의 불꽃으로 불태운다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽一切。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Una llama intensa que chamusca y puede causarle\nquemaduras al objetivo."
fire_fang:
  names:
    jp_kanji: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colmillo Ígneo
    ko: 불꽃엄니
    zh_simp: 火焰牙
    zh_trad: 火焰牙
    es_latam: Colmillo Fuego
  descriptions:
    jp_kanji: "炎をまとったキバでかみついて\n相手をひるませたり\nやけど状態にすることもある。"
    en: "The user attacks by biting targets with flame-cloaked\nfangs. This may also make targets flinch or leave them\nwith a burn."
    fr: "Le lanceur inflige une morsure enflammée à la cible.\nPeut aussi la brûler ou l’apeurer."
    it: "Il Pokémon morde con denti infuocati. Può anche\nscottare o far tentennare il bersaglio."
    de: "Der Anwender beißt mit flammenden Fangzähnen zu.\nGetroffene Gegner schrecken eventuell zurück oder\nerleiden Verbrennungen."
    es: "El usuario muerde al objetivo con colmillos en llamas y\npuede hacer que se amedrente o sufra quemaduras."
    ko: "불꽃을 두른 이빨로 문다.\n상대를 풀죽게 하거나\n화상 상태로 만들 때가 있다."
    zh_simp: "用覆盖着火焰的牙齿咬住对手，\n有时也会使对手畏缩\n或陷入灼伤状态。"
    zh_trad: "用纏繞火焰的牙齒咬住對手，\n有時還會讓對手畏縮\n或陷入灼傷狀態。"
    es_latam: "El usuario muerde al objetivo con colmillos en llamas\ny puede atemorizarlo o causarle quemaduras."
fire_lash:
  names:
    jp_kanji: ほのおのムチ
    en: Fire Lash
    fr: Fouet de Feu
    it: Frusta di Fuoco
    de: Feuerpeitsche
    es: Látigo Ígneo
    ko: 불꽃채찍
    zh_simp: 火焰鞭
    zh_trad: 火焰鞭
    es_latam: Látigo Ígneo
fire_pledge:
  names:
    jp_kanji: ほのおのちかい
    en: Fire Pledge
    fr: Aire de Feu
    it: Fiammapatto
    de: Feuersäulen
    es: Voto Fuego
    ko: 불꽃의맹세
    zh_simp: 火之誓约
    zh_trad: 火之誓約
    es_latam: Voto Fuego
fire_punch:
  names:
    jp_kanji: ほのおのパンチ
    en: Fire Punch
    fr: Poing Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
    zh_simp: 火焰拳
    zh_trad: 火焰拳
    es_latam: Puño Fuego
  descriptions:
    jp_kanji: "炎をこめたパンチで攻撃して\n相手をやけど状態にすることもある。"
    en: "The user attacks with a fiery punch. This may also leave\ntargets with a burn."
    fr: "Le lanceur attaque la cible d’un coup de poing\nenflammé. Peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio con un pugno ardente\nche può scottarlo."
    de: "Der Anwender greift mit einem feurigen Schlag an,\ndurch den getroffene Gegner eventuell Verbrennungen\nerleiden."
    es: Puñetazo ardiente que puede causar quemaduras.
    ko: "불꽃을 담은 펀치로 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用充满火焰的拳头进行攻击。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "用帶有火焰的拳頭進行攻擊，\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Puñetazo ardiente que puede causar quemaduras\nal objetivo."
fire_spin:
  names:
    jp_kanji: ほのおのうず
    en: Fire Spin
    fr: Danse Flammes
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
    zh_simp: 火焰旋涡
    zh_trad: 火焰旋渦
    es_latam: Giro Fuego
  descriptions:
    jp_kanji: "激しく渦をまく炎で相手を囲み\n中にいる相手にダメージを与えつづける。"
    en: "The user summons a fierce vortex of fire to surround\ntargets. Opponents within the vortex will take continual\ndamage."
    fr: "Le lanceur crée un tourbillon de flammes qui entoure\nl’adversaire. Tant qu’il se trouve à l’intérieur,\ncelui-ci subit des dégâts continus."
    it: "Il Pokémon genera un turbine di fuoco che continua\na infliggere danni agli avversari che si trovano al suo\ninterno."
    de: "Der Anwender schließt das Ziel in einem heftigen\nFlammenwirbel ein. Gegner, die sich darin aufhalten,\nnehmen kontinuierlich Schaden."
    es: "Un aro de fuego que envuelve al objetivo y que inflige\ndaño continuo a los rivales que permanezcan dentro."
    ko: "세차게 소용돌이치는 불꽃을 만들어\n안에 있는 상대에게 계속해서 데미지를 준다."
    zh_simp: "用激烈的火焰旋涡困住对手，\n并对旋涡里的对手持续造成伤害。"
    zh_trad: "以熊熊燃燒的火焰旋渦包圍對手，\n對困在其中的對手持續造成傷害。"
    es_latam: "Un aro de fuego que envuelve al objetivo y que le inflige\ndaño continuo a los rivales que permanezcan adentro."
first_impression:
  names:
    jp_kanji: であいがしら
    en: First Impression
    fr: Escarmouche
    it: Schermaglia
    de: Überrumpler
    es: Escaramuza
    ko: 만나자마자
    zh_simp: 迎头一击
    zh_trad: 迎頭一擊
    es_latam: Escaramuza
  descriptions:
    jp_kanji: "威力が高い技だが\n戦闘に出たら\nすぐに出さないと成功しない。"
    en: "The user attacks with tremendous power, but this move\nonly succeeds if it is used first thing upon the user\nentering a battle."
    fr: "Une capacité très puissante qui ne fonctionne que\nlorsqu’elle est utilisée immédiatement en entrant\nau combat."
    it: "È una mossa molto potente, ma funziona solo appena\nscesi in campo."
    de: "Diese sehr starke Attacke gelingt nur, wenn sie sofort\nnach Kampfantritt des Anwenders eingesetzt wird."
    es: "Movimiento de gran potencia que solo tiene efecto\nsi el usuario lo usa nada más entrar en combate."
    ko: "위력이 높은 기술이지만\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "威力很高的招式，\n但只有在出场战斗时，\n立刻使出才能成功。"
    zh_trad: "招式的威力雖高，\n但只有在出場戰鬥時，\n立刻使出才能成功。"
    es_latam: "Movimiento de gran potencia que solo tiene efecto\nsi el usuario lo usa justo al entrar en combate."
fishious_rend:
  names:
    jp_kanji: エラがみ
    en: Fishious Rend
    fr: Branchicrok
    it: Branchiomorso
    de: Kiemenbiss
    es: Branquibocado
    ko: 아가미물기
    zh_simp: 鳃咬
    zh_trad: 鰓咬
    es_latam: Branquibocado
fissure:
  names:
    jp_kanji: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
    zh_simp: 地裂
    zh_trad: 地裂
    es_latam: Fisura
  descriptions:
    jp_kanji: "大きな地割れの裂け目に\n相手を落として攻撃する。\n攻撃するまでとても時間がかかる。"
    en: "The user attacks by opening up a large fissure in the\nground and dropping targets in. This move takes a great\ndeal of time to carry out."
    fr: "Le lanceur fait tomber la cible dans une énorme crevasse.\nL’attaque prend beaucoup de temps à se déclencher."
    it: "Il Pokémon attacca il bersaglio gettandolo in una grande\nspaccatura nel terreno. L’attacco richiede molto tempo."
    de: "Der Anwender greift an, indem er das Ziel in eine riesige\nErdspalte stürzen lässt. Der Angriff geschieht mit langer\nVerzögerung."
    es: "Abre una enorme grieta en el suelo por la que hace caer\nal objetivo. Este movimiento requiere mucho tiempo para\nejecutarse."
    ko: "땅이 크게 갈라진 곳에\n상대를 떨어뜨려 공격한다.\n공격하기까지 상당한 시간이 걸린다."
    zh_simp: "让对手掉落于地裂的\n巨大裂缝中进行攻击。\n需要很长时间发动攻击。"
    zh_trad: "讓對手掉進巨大的\n地面裂縫中進行攻擊。\n需要非常多時間發動攻擊。"
    es_latam: "Abre una enorme grieta en el suelo por la que hace caer\nal objetivo. Este movimiento requiere mucho tiempo para\nejecutarse."
flail:
  names:
    jp_kanji: じたばた
    en: Flail
    fr: Gigotage
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
    zh_simp: 抓狂
    zh_trad: 抓狂
    es_latam: Azote
flame_burst:
  names:
    jp_kanji: はじけるほのお
    en: Flame Burst
    fr: Rebondifeu
    it: Pirolancio
    de: Funkenflug
    es: Pirotecnia
    ko: 불꽃튀기기
    zh_simp: 烈焰溅射
    zh_trad: 烈焰濺射
    es_latam: Golpe de Fuego
flame_charge:
  names:
    jp_kanji: ニトロチャージ
    en: Flame Charge
    fr: Nitrocharge
    it: Nitrocarica
    de: Nitroladung
    es: Nitrocarga
    ko: 니트로차지
    zh_simp: 蓄能焰袭
    zh_trad: 蓄能焰襲
    es_latam: Carga de Fuego
  descriptions:
    jp_kanji: "炎をまとい相手を攻撃する。\n少しのあいだ自分の動きを速くする。"
    en: "The user attacks after cloaking itself in flame. This also\nincreases the user’s movement speed for a short time."
    fr: "Le lanceur s’entoure de flammes pour attaquer la cible.\nAugmente aussi la vitesse de déplacement du lanceur\npendant un court instant."
    it: "Il Pokémon si copre di fuoco e attacca il bersaglio,\naccelerando inoltre i propri movimenti per un po’\ndi tempo."
    de: "Der Anwender hüllt sich in Flammen und greift das Ziel\nan. Für kurze Zeit bewegt er sich schneller."
    es: "El usuario carga contra el objetivo envuelto en llamas\ny se vuelve más rápido durante un breve período de\ntiempo."
    ko: "불꽃을 둘러 상대를 공격한다.\n잠시 동안 자신의 움직임이 빨라진다."
    zh_simp: "让火焰覆盖全身，攻击对手。\n会在一小段时间内让自己的动作变得更快。"
    zh_trad: "讓火焰圍繞全身後攻擊對手。\n在一小段時間內讓自己的行動變快。"
    es_latam: "El usuario embiste al objetivo envuelto en llamas\ny se vuelve más rápido durante un breve periodo."
flame_wheel:
  names:
    jp_kanji: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염바퀴
    zh_simp: 火焰轮
    zh_trad: 火焰輪
    es_latam: Rueda Ígnea
  descriptions:
    jp_kanji: "炎をまとって突進して攻撃。\n相手をやけど状態にすることもある。"
    en: "The user attacks by charging forward while wrapped in\nflames. This may also leave targets with a burn."
    fr: "Le lanceur s’entoure de feu et charge la cible.\nPeut aussi la brûler."
    it: "Il Pokémon si copre di fuoco e attacca scagliandosi\ncontro il bersaglio. Può anche scottarlo."
    de: "Der Anwender greift an, indem er sich in Flammen hüllt\nund vorstürmt. Getroffene Gegner erleiden eventuell\nVerbrennungen."
    es: "Ataca al objetivo envuelto en fuego. Puede causar\nquemaduras."
    ko: "불꽃을 두르고 돌진하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身进行猛撞攻击。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "用火焰圍繞身體，猛撞進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Ataca al objetivo envuelto en fuego. Puede causarle\nquemaduras."
flamethrower:
  names:
    jp_kanji: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flammes
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
    zh_simp: 喷射火焰
    zh_trad: 噴射火焰
    es_latam: Lanzallamas
  descriptions:
    jp_kanji: "激しい炎を発射して攻撃する。\n相手をやけど状態にすることもある。"
    en: "The user attacks with a stream of fierce flames. This may\nalso leave targets with a burn."
    fr: "Le lanceur envoie un torrent de flammes sur la cible.\nPeut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio lanciando intense\nfiammate che possono anche scottarlo."
    de: "Der Anwender greift mit heftigen Flammen an, durch die\ngetroffene Gegner eventuell Verbrennungen erleiden."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras al objetivo."
    ko: "세찬 불꽃을 발사하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "发射烈焰进行攻击。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "發射強烈火焰進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras al objetivo."
flare_blitz:
  names:
    jp_kanji: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
    zh_simp: 闪焰冲锋
    zh_trad: 閃焰衝鋒
    es_latam: Erupción
  descriptions:
    jp_kanji: "炎をまとって突進して攻撃。\n自分もダメージを受ける。\n相手をやけど状態にすることもある。"
    en: "The user attacks by charging forward while cloaked in\nflames. This may leave targets with a burn. The user will\nalso take some damage."
    fr: "Le lanceur s’embrase avant de charger la cible.\nPeut aussi la brûler. Blesse également le lanceur."
    it: "Il Pokémon si ricopre di fuoco e si lancia all’attacco,\nma subisce danni. Può anche scottare il bersaglio."
    de: "Der Anwender greift an, indem er sich in Flammen hüllt\nund vorstürmt. Dabei erleidet er selbst Schaden.\nGetroffene Gegner erleiden eventuell Verbrennungen."
    es: "El usuario se cubre de llamas y ataca cargando contra el\nobjetivo, aunque se hiere a sí mismo. Puede\ncausar quemaduras."
    ko: "불꽃을 두르고 돌진하여 공격한다.\n자신도 데미지를 입는다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身进行猛撞攻击。\n自己也会受到伤害。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛衝進行攻擊。\n自己也會受到傷害。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "El usuario se cubre con llamas y se lanza hacia el objetivo\npara atacarlo, aunque se hiere a sí mismo. Puede causar\nquemaduras."
flash:
  names:
    jp_kanji: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
    zh_simp: 闪光
    zh_trad: 閃光
    es_latam: Destello
flash_cannon:
  names:
    jp_kanji: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Cañón Resplandor
    ko: 러스터캐논
    zh_simp: 加农光炮
    zh_trad: 加農光炮
    es_latam: Cañón Resplandor
  descriptions:
    jp_kanji: "体の光を一点に集めて力を放つ。\n相手の特防を下げることもある。"
    en: "The user attacks by gathering its internal light energy and\nreleasing it all at once. This may also lower the targets’\nSp. Def stats."
    fr: "Le lanceur concentre son énergie lumineuse\net la projette sur la cible. Peut aussi baisser\nla Défense Spéciale de la cible."
    it: "Il Pokémon attacca raccogliendo e rilasciando energia\nluminosa. Può ridurre la Difesa Speciale del bersaglio."
    de: "Der Anwender bündelt das Licht seines Körpers an einer\nStelle und feuert es dann ab. Die Spezial-Verteidigung\ngetroffener Gegner wird eventuell gesenkt."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede reducir la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서 힘을 방출한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时也会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時還會降低對手的特防。"
    es_latam: "El usuario concentra toda la luz de su cuerpo y la libera.\nPuede reducir la Defensa Especial del objetivo."
flatter:
  names:
    jp_kanji: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
    zh_simp: 吹捧
    zh_trad: 吹捧
    es_latam: Halago
fleur_cannon:
  names:
    jp_kanji: フルールカノン
    en: Fleur Cannon
    fr: Canon Floral
    it: Cannonfiore
    de: Kanonenbouquet
    es: Cañón Floral
    ko: 플뢰르캐논
    zh_simp: 花朵加农炮
    zh_trad: 花朵加農炮
    es_latam: Cañón Floral
  descriptions:
    jp_kanji: "強力なビームを放ったあと\n自分の特攻がしばらくのあいだ下がる。"
    en: "The user attacks by unleashing a powerful beam. The\nrecoil will lower the user’s Sp. Atk stat for a while."
    fr: "Le lanceur envoie un rayon laser dévastateur, puis\nson Attaque Spéciale baisse pendant un certain temps."
    it: "Il Pokémon emette un potente raggio, ma riduce per un\ncerto tempo il proprio Attacco Speciale."
    de: "Der Anwender greift mit einem gewaltigen Strahl an.\nSein Spezial-Angriff wird für einige Zeit gesenkt."
    es: "El usuario emite un potente rayo, pero su Ataque Especial\nse reduce durante un tiempo."
    ko: "강력한 빔을 발산한 후\n한동안 자신의 특수공격이 떨어진다."
    zh_simp: "放出强力光束后，\n自己的特攻会在一段时间内降低。"
    zh_trad: "放出強力光束後，\n在一段時間內自己的特攻會降低。"
    es_latam: "El usuario emite un poderoso rayo, pero su\nAtaque Especial se reduce durante un tiempo."
fling:
  names:
    jp_kanji: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
    zh_simp: 投掷
    zh_trad: 投擲
    es_latam: Lanzamiento
flip_turn:
  names:
    jp_kanji: クイックターン
    en: Flip Turn
    fr: Eau Revoir
    it: Virata
    de: Rollwende
    es: Viraje
    ko: 퀵턴
    zh_simp: 快速折返
    zh_trad: 快速折返
    es_latam: Viraje
  descriptions:
    jp_kanji: "攻撃したあと\nものすごいスピードで\nトレーナーの近くにもどってくる。"
    en: "The user attacks by dishing out a quick blow, then rushes\nback to its Trainer with incredible speed."
    fr: "Le lanceur attaque, puis revient à toute vitesse\nà côté de son Dresseur ou de sa Dresseuse."
    it: "Dopo aver sferrato l’attacco il Pokémon torna\nrapidamente vicino al proprio Allenatore."
    de: "Der Anwender greift an und eilt danach an die Seite\nseines Trainers zurück."
    es: "Tras atacar, el usuario vuelve a toda prisa con su\nEntrenador."
    ko: "공격한 뒤\n굉장한 스피드로\n트레이너의 곁으로 돌아온다."
    zh_simp: "在攻击之后急速回到\n训练家的身边。"
    zh_trad: "攻擊後會極為迅速地\n返回到訓練家的身邊。"
    es_latam: "Luego de atacar, el usuario vuelve rápidamente\ncon su Entrenador."
floaty_fall:
  names:
    jp_kanji: ふわふわフォール
    en: Floaty Fall
    fr: Pika-Piqué
    it: Piombaflap
