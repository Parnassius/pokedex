    ko: 손바닥치기
    zh_simp: 猛推
    zh_trad: 猛推
    es_latam: Empujón
armor_cannon:
  names:
    jp_kanji: アーマーキャノン
    en: Armor Cannon
    fr: Canon Blindé
    it: Corazza Cannone
    de: Rüstungskanone
    es: Cañón Armadura
    ko: 아머캐논
    zh_simp: 铠农炮
    zh_trad: 鎧農炮
    es_latam: Cañón Armadura
  descriptions:
    jp_kanji: "この世への未練を剣先にこめて\n切りつける。　与えたダメージの\nいくらかＨＰを回復できる。"
    en: "The user attacks by focusing all its bitter feelings toward\nthis world into the tip of its blade. The user’s HP will be\nrestored by a portion of the damage dealt."
    fr: "Le lanceur concentre son amertume du monde des vivants\ndans la pointe de ses épées et tranche la cible. Convertit\nune partie des dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon concentra nelle lame tutti i rimorsi accumulati\nnel mondo dei vivi e assale il bersaglio, recuperando\nuna quantità di PS pari a una parte del danno inflitto."
    de: "Der Anwender tränkt seine Klinge in Bedauern und Reue\nund greift damit an. Einen Teil des dabei zugefügten\nSchadens regeneriert er als KP."
    es: "Imbuye la punta de su espada con su desazón por el\nmundo y asesta una estocada llena de rencor. El usuario\nrecupera algunos PS según el daño que produzca."
    ko: "현세의 미련을 칼끝에 담아 베어 버린다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "将对世间的留恋聚集于剑尖，\n并斩击对手。可以回复\n相当于给予的部分伤害的ＨＰ。"
    zh_trad: "將對這個世界的牽掛注入劍尖\n進行劈斬。可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Impregna la punta de su espada con su desazón por el\nmundo y lanza una estocada llena de rencor. El usuario\nrecupera algunos PS según el daño que produzca."
