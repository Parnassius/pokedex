  descriptions:
    jp_kanji: "相手のＨＰが\n必ず１だけ残るように\n手加減して攻撃する。"
    en: "The user attacks with restraint to ensure that targets are\nleft with at least 1 HP."
    fr: "Le lanceur attaque en retenant son coup pour s’assurer\nque la cible garde au moins 1 PV."
    it: "Il Pokémon attacca in modo contenuto, lasciando\nil bersaglio con almeno 1 PS."
    de: "Der Anwender hält sich beim Angriff zurück, sodass\ngetroffenen Gegnern mindestens 1 KP verbleibt."
    es: "Ataque moderado que no debilita al objetivo y le deja\nal menos 1 PS."
    ko: "상대의 HP가\n반드시 1만 남도록\n조절하여 공격한다."
    zh_simp: "对手的ＨＰ\n至少会留下１ＨＰ，\n如此般手下留情地攻击。"
    zh_trad: "手下留情地攻擊對手，\n一定會讓對手剩下１ＨＰ。"
    es_latam: "Ataque moderado que no debilita al objetivo y le deja\nal menos 1 PS."
feather_dance:
  names:
    jp_kanji: フェザーダンス
    en: Feather Dance
    fr: Danse Plumes
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
    zh_simp: 羽毛舞
    zh_trad: 羽毛舞
    es_latam: Danza de Plumas
  descriptions:
    jp_kanji: "羽毛をふりまいて\n相手の体にからませる。\nしばらくのあいだ相手の攻撃を下げる。"
    en: "The user buries targets in a mass of down, which lowers\ntargets’ Attack stats for a while."
    fr: "Une montagne de plumes ensevelit la cible, ce qui\nbaisse son Attaque pendant un certain temps."
    it: "Il Pokémon scatena un turbinio di piume che si attaccano\nal bersaglio riducendo il suo Attacco per un certo tempo."
    de: "Der Anwender hüllt das Ziel in Daunen. Der Angriff\ngetroffener Gegner wird für einige Zeit gesenkt."
    es: "Envuelve al objetivo con un manto de plumas para\nreducir su Ataque durante un tiempo."
    ko: "깃털을 흩뿌려\n상대의 몸에 휘감는다.\n한동안 상대의 공격을 떨어뜨린다."
    zh_simp: "撒出羽毛，\n缠到对手的身体上。\n在一段时间内降低对手的攻击。"
    zh_trad: "撒出羽毛，\n纏住對手的身體。\n在一段時間內降低對手的攻擊。"
    es_latam: "Envuelve al objetivo con un manto de plumas\npara reducir su Ataque durante un tiempo."
