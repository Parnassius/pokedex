    fr: "Le lanceur attaque la cible grâce au pouvoir de la lune.\nPeut aussi baisser l’Attaque Spéciale de la cible."
    it: "Il Pokémon sfrutta il potere della luna per attaccare\nil bersaglio. Può anche ridurne l’Attacco Speciale."
    de: "Der Anwender macht sich die Kraft des Mondes zunutze,\num anzugreifen. Der Spezial-Angriff getroffener Gegner\nwird eventuell gesenkt."
