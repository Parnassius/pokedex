    zh_simp: 抓
    zh_trad: 抓
    es_latam: Arañazo
screech:
  names:
    jp_kanji: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
    zh_simp: 刺耳声
    zh_trad: 刺耳聲
    es_latam: Chillido
  descriptions:
    jp_kanji: "おもわず耳をふさぎたくなる\nいやな音をだして\nしばらくのあいだ相手の防御を下げる。"
    en: "The user emits a horrible screech that makes targets\nreflexively want to cover their ears. This lowers their\nDefense stats for a while."
    fr: "Le lanceur émet un son strident qui donne envie de\nse boucher les oreilles. Baisse la Défense de la cible\npendant un certain temps."
    it: "Il Pokémon emette uno stridio assordante che riduce\nla Difesa del bersaglio per un certo tempo."
    de: "Der Anwender stößt einen ohrenbetäubenden Schrei aus,\nwodurch die Verteidigung getroffener Gegner für einige\nZeit gesenkt wird."
    es: "Alarido agudo que reduce la Defensa del objetivo durante\nun tiempo."
    ko: "그만 귀를 막아 버리고 싶은\n싫은 소리를 내어\n한동안 상대의 방어를 떨어뜨린다."
    zh_simp: "发出不由自主想要\n捂起耳朵的刺耳声，\n从而在一段时间内降低对手的防御。"
    zh_trad: "發出令人不由自主想要\n摀起耳朵的刺耳聲，\n在一段時間內降低對手的防禦。"
    es_latam: "Un alarido agudo que reduce la Defensa del objetivo\ndurante un tiempo."
