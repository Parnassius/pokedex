  descriptions:
    jp_kanji: "じゅうでん状態になって　次にだす\nでんきタイプの技の威力を上げる。\n少しのあいだ自分の特防も上がる。"
    en: "The user charges up to boost the power of the next\nElectric-type move it uses. This also boosts the user’s\nSp. Def stat for a short time."
    fr: "Le lanceur se charge en électricité, ce qui augmente la\npuissance de sa prochaine capacité Électrik. Sa Défense\nSpéciale augmente aussi pendant un court instant."
    it: "Il Pokémon si carica di elettricità e aumenta la potenza\ndella sua prossima mossa di tipo Elettro. Aumenta anche\nla propria Difesa Speciale per un po’ di tempo."
    de: "Der Anwender erhöht die Stärke seiner nächsten\nElektro-Attacke durch einen Ladevorgang. Außerdem\nwird seine Spezial-Verteidigung für kurze Zeit erhöht."
    es: "Recarga energía para potenciar su siguiente movimiento\nde tipo Eléctrico. También aumenta la Defensa Especial\ndurante un breve período de tiempo."
    ko: "충전 상태가 되어 다음에 사용하는\n전기타입 기술의 위력을 올린다.\n잠시 동안 자신의 특수방어도 올라간다."
    zh_simp: "变为充电状态，提高下次\n使出的电属性的招式威力。\n在一小段时间内自己的特防也会提高。"
    zh_trad: "變成充電狀態，\n提高下次使出的電屬性的招式威力。\n在一小段時間內也會提高自己的特防。"
    es_latam: "Recarga energía para potenciar su siguiente movimiento\nde tipo Eléctrico. También aumenta la Defensa Especial\ndurante un breve periodo."
charge_beam:
