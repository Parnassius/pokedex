    zh_trad: 特性互換
    es_latam: Intercambio
skitter_smack:
  names:
    jp_kanji: はいよるいちげき
    en: Skitter Smack
    fr: Ravage Rampant
    it: Strisciacolpo
    de: Krabbelkracher
    es: Golpe Rastrero
    ko: 엄습하는일격
    zh_simp: 爬击
    zh_trad: 爬擊
    es_latam: Golpe Rastrero
skull_bash:
  names:
    jp_kanji: ロケットずつき
    en: Skull Bash
    fr: Coud’Krâne
    it: Capocciata
    de: Schädelwumme
    es: Cabezazo
    ko: 로켓박치기
    zh_simp: 火箭头锤
    zh_trad: 火箭頭錘
    es_latam: Cabezazo
  descriptions:
    jp_kanji: "頭をひっこめて少しのあいだ\n防御を上げた後つっこんで攻撃する。\n攻撃するまで時間がかかる。"
    en: "The user boosts its Defense stat for a short time by\ntucking its head in, then attacks by ramming into targets.\nThis move takes some time to carry out."
    fr: "Le lanceur baisse la tête pendant un court instant pour\naugmenter sa Défense, puis percute sa cible.\nL’attaque prend un certain temps à se déclencher."
    it: "Il Pokémon ritira la testa aumentando la Difesa per un po’\ndi tempo, per poi attaccare il bersaglio lanciandoglisi\ncontro. L’attacco richiede tempo."
    de: "Der Anwender zieht den Kopf ein, um seine Verteidigung\nfür kurze Zeit zu erhöhen, und prescht dann vor,\num anzugreifen. Der Angriff geschieht mit Verzögerung."
    es: "El usuario retrae la cabeza y aumenta su Defensa durante\nun breve período de tiempo, tras lo cual embiste al\nobjetivo. El movimiento requiere tiempo para ejecutarse."
    ko: "머리를 움츠려 잠시 동안\n자신의 방어를 올리고 돌진하여 공격한다.\n공격하기까지 시간이 걸린다."
    zh_simp: "把头缩进去并在一小段时间内提高防御，\n随后扑向对手进行攻击。\n需要一定时间发动攻击。"
    zh_trad: "把頭後縮，在一小段時間內\n提高防禦後，衝向對手進行攻擊。\n需要一些時間發動攻擊。"
    es_latam: "El usuario retrae la cabeza y aumenta su Defensa durante\nun breve periodo, tras lo cual embiste al objetivo.\nEl movimiento requiere tiempo para ejecutarse."
sky_attack:
  names:
    jp_kanji: ゴッドバード
    en: Sky Attack
    fr: Piqué
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
    zh_simp: 神鸟猛击
    zh_trad: 神鳥猛擊
    es_latam: Ataque Celestial
  descriptions:
    jp_kanji: "力を溜めた後突進して相手を攻撃。\nたまにひるませ急所にも当たりやすい。\n攻撃するまで時間がかかる。"
    en: "The user attacks with a powered-up dive. This move has a\nheightened chance of landing a critical hit and may also\nmake targets flinch, but it takes some time to carry out."
    fr: "Le lanceur rassemble ses forces, puis fonce sur sa cible\npour l’attaquer. L’attaque peut apeurer la cible et prend\nun certain temps à se déclencher. Taux de critiques élevé."
    it: "Il Pokémon accumula energia per poi lanciarsi contro\nil bersaglio. Può anche farlo tentennare. Probabile brutto\ncolpo. L’attacco richiede tempo."
    de: "Der Anwender sammelt Kraft und stürmt auf das Ziel zu.\nGetroffene Gegner schrecken eventuell zurück. Hohe\nVolltrefferquote. Der Angriff geschieht mit Verzögerung."
    es: "Acumula energías y, luego, embiste al objetivo. Suele\nasestar un golpe crítico y puede amedrentar al objetivo.\nEste movimiento requiere tiempo para ejecutarse."
    ko: "힘을 모은 다음 상대에게 돌진하여 공격한다.\n가끔 상대를 풀죽게 만들 때가 있으며,\n급소에도 맞기 쉽다. 공격하기까지 시간이 걸린다."
    zh_simp: "蓄力后猛撞对手进行攻击。\n偶尔会使对手畏缩且容易击中要害。\n需要一定时间发动攻击。"
    zh_trad: "蓄力後衝撞攻擊對手。\n有時會使對手畏縮且容易擊中要害。\n需要一些時間發動攻擊。"
    es_latam: "Acumula energías y, luego, embiste al objetivo. Suele\nlanzar un golpe crítico y puede atemorizar al objetivo.\nEste movimiento requiere tiempo para ejecutarse."
