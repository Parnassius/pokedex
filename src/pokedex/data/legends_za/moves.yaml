    fr: "Le lanceur disperse devant lui des picots qui infligent\ndes dégâts quand on marche dessus."
    it: "Il Pokémon piazza davanti a sé delle punte che\ndanneggiano gli avversari che le calpestano."
    de: "Der Anwender legt Stacheln vor sich aus, die Gegnern\nSchaden zufügen, wenn diese auf sie treten."
