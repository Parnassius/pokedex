  descriptions:
    jp_kanji: "パンチを打つことで　こぶしを固くして\n少しのあいだ自分の攻撃が上がる。"
    en: "The user attacks targets with a punch that will make its\nown fist tougher. This boosts the user’s Attack stat for a\nshort time."
    fr: "Le lanceur frappe, ce qui fait durcir ses poings.\nAugmente son Attaque pendant un court instant."
    it: "Il Pokémon colpisce con un pugno che viene reso\npiù duro dall’impatto, aumentando così il proprio\nAttacco per poco tempo."
    de: "Der Anwender schlägt zu, um seine Fäuste zu härten und\nseinen Angriff für kurze Zeit zu erhöhen."
    es: "Ataca con puñetazos que fortalecen sus puños, por lo\nque su Ataque aumenta durante un breve período de\ntiempo."
    ko: "펀치를 날려 주먹을 단단하게 하여\n잠시 동안 자신의 공격을 올린다."
    zh_simp: "通过挥拳让拳头变硬，\n会在一小段时间内提高自己的攻击。"
    zh_trad: "藉由出拳擊打使自己的拳頭變硬，\n在一小段時間內提高自己的攻擊。"
    es_latam: "Ataca con puñetazos que fortalecen sus puños, por lo\nque su Ataque aumenta durante un breve periodo."
power_whip:
  names:
    jp_kanji: パワーウィップ
