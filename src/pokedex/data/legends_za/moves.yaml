iron_defense:
  names:
    jp_kanji: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Defensa Férrea
    ko: 철벽
    zh_simp: 铁壁
    zh_trad: 鐵壁
    es_latam: Defensa Hierro
  descriptions:
    jp_kanji: "皮膚を鉄のように硬くすることで\nしばらくのあいだ自分の防御を上げる。"
    en: "The user boosts its Defense stat for a while by hardening\nthe surface of its body until it becomes like iron."
    fr: "L’épiderme du lanceur devient dur comme du fer.\nAugmente sa Défense pendant un certain temps."
    it: "Il corpo del Pokémon si indurisce come il ferro,\nfacendone aumentare la Difesa per un certo tempo."
    de: "Der Anwender macht seine Haut stahlhart und erhöht\nso für einige Zeit seine Verteidigung."
    es: "Fortalece el cuerpo como si fuera de hierro y aumenta\nla Defensa durante un tiempo."
    ko: "피부를 쇠처럼 단단하게 만듦으로써\n한동안 자신의 방어를 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而在一段时间内提高自己的防御。"
    zh_trad: "將皮膚變得堅硬如鐵，\n藉此在一段時間內提高自己的防禦。"
    es_latam: "Fortalece el cuerpo como si fuera de hierro y aumenta\nla Defensa durante un tiempo."
iron_head:
  names:
    jp_kanji: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabeza de Hierro
    ko: 아이언헤드
    zh_simp: 铁头
    zh_trad: 鐵頭
    es_latam: Cabeza de Hierro
  descriptions:
    jp_kanji: "鋼のような\n硬い頭で攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by slamming its steel-hard head into\ntargets. This may also make targets flinch."
    fr: "Le lanceur heurte la cible avec sa tête dure comme\nde l’acier. Peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio con la sua testa dura\ncome l’acciaio. Può anche farlo tentennare."
    de: "Der Anwender greift mit seinem stahlharten Kopf an.\nGetroffene Gegner schrecken eventuell zurück."
    es: "Ataca con su cabeza dura como el hierro. Puede hacer\nque el objetivo se amedrente."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用钢铁般\n坚硬的头部进行攻击。\n有时也会使对手畏缩。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。\n有時還會讓對手畏縮。"
    es_latam: "Ataca con su cabeza dura como el hierro.\nPuede atemorizar al objetivo."
iron_tail:
  names:
    jp_kanji: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
    zh_simp: 铁尾
    zh_trad: 鐵尾
    es_latam: Cola de Hierro
  descriptions:
    jp_kanji: "硬い　しっぽで\n相手をたたきつけて攻撃する。\n相手の防御を下げることもある。"
    en: "The user attacks by slamming its hard tail into targets.\nThis may also lower targets’ Defense stats."
    fr: "Le lanceur frappe la cible avec une queue de fer.\nPeut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con una\nrobusta coda che può anche ridurne la Difesa."
    de: "Der Anwender greift an, indem er das Ziel mit einem\nharten Schweif schlägt. Die Verteidigung getroffener\nGegner wird eventuell gesenkt."
    es: "Ataca con una cola férrea y puede reducir la Defensa\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时也会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時還會降低對手的防禦。"
    es_latam: "Ataca con una cola de hierro y puede reducir la Defensa\ndel objetivo."
