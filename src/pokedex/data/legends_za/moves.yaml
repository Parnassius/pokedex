  descriptions:
    jp_kanji: "指をふり自分の脳を刺激して\nたくさんの技のなかから\nどれか１つをくりだす。"
    en: "The user waggles a finger and stimulates its brain to\nunleash a random move from among the many moves\nthat exist."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Il Pokémon fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Der Anwender wackelt mit dem Finger und stimuliert so\nsein Gehirn, um aus fast allen existierenden Attacken\neine nach Zufallsprinzip auszuwählen und einzusetzen."
    es: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를 자극해서\n다양한 기술 중 어느 하나를 사용한다."
    zh_simp: "挥动手指刺激自己的大脑，\n从许多的招式中\n随机使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從許多的招式中\n隨機選出１招使出。"
    es_latam: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
