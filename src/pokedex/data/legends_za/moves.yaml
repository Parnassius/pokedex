  descriptions:
    jp_kanji: "まくしたてるように怒鳴りつけて\n少しのあいだ相手の特攻を下げる。"
    en: "The user snarls incessantly at targets to lower their\nSp. Atk stats for a short time."
    fr: "Le lanceur hurle sur la cible. Baisse l’Attaque Spéciale\nde la cible pendant un court instant."
    it: "Il Pokémon si mette a urlare per un po’, riducendo\nl’Attacco Speciale del bersaglio per un po’ di tempo."
    de: "Der Anwender wäscht dem Ziel mit einer ausführlichen\nStandpauke den Kopf. Der Spezial-Angriff getroffener\nGegner wird für kurze Zeit gesenkt."
    es: "Chillido desagradable que reduce el Ataque Especial del\nobjetivo durante un breve período de tiempo."
    ko: "호되게 호통을 쳐서\n잠시 동안 상대의 특수공격을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n从而在一小段时间内降低对手的特攻。"
    zh_trad: "沒完沒了地向對手大聲咆哮，\n在一小段時間內降低對手的特攻。"
    es_latam: "Chillido desagradable que reduce el Ataque Especial\ndel objetivo durante un breve periodo."
