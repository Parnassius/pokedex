    zh_simp: 超级角击
    zh_trad: 超級角擊
    es_latam: Megacuerno
  descriptions:
    jp_kanji: "硬くてりっぱな　つのでおもいっきり\n相手を突き刺して攻撃する。"
    en: "The user attacks with a tough and impressive horn,\nramming into targets with all-out force."
    fr: "Le lanceur fonce sur la cible en donnant un grand coup\nde corne."
    it: "Il Pokémon usa il suo robusto e imponente corno\nper attaccare il bersaglio con tutto se stesso."
    de: "Der Anwender greift an, indem er das Ziel mit einem\nrobusten, beeindruckenden Horn unter vollem Einsatz\naufspießt."
    es: "Ensarta al objetivo con su imponente cuerno\no cornamenta."
    ko: "단단하고 훌륭한 뿔로 힘껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
    es_latam: "Ensarta al objetivo con su imponente cuerno\no cornamenta."
