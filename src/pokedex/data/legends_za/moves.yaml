    zh_trad: "鞏固防禦，\n完全防住對手的所有攻擊。"
    es_latam: Se defiende con firmeza y frena todos los ataques.
diamond_storm:
  names:
    jp_kanji: ダイヤストーム
    en: Diamond Storm
    fr: Orage Adamantin
    it: Diamantempesta
    de: Diamantsturm
    es: Torm. Diamantes
    ko: 다이아스톰
    zh_simp: 钻石风暴
    zh_trad: 鑽石風暴
    es_latam: Torm. Diamantes
  descriptions:
    jp_kanji: "ダイヤの嵐を巻き起こして攻撃。\n自分の防御が上がることもある。"
    en: "The user attacks by engulfing targets in a storm of\ndiamonds. This may also boost the user’s Defense stat."
    fr: "Provoque une tempête de diamants qui inflige\ndes dégâts. Peut aussi augmenter la Défense\ndu lanceur."
    it: "Il Pokémon attacca con una tempesta di diamanti.\nPuò anche aumentare la propria Difesa."
    de: "Der Anwender beschwört einen zerstörerischen\nDiamantsturm herauf und greift an. Seine Verteidigung\nwird eventuell erhöht."
    es: "Desata un devastador vendaval de diamantes para dañar\nal objetivo. Puede aumentar la Defensa del usuario."
    ko: "다이아 폭풍을 일으켜 공격한다.\n자신의 방어가 올라갈 때가 있다."
    zh_simp: "掀起钻石风暴进行攻击。\n有时也会提高自己的防御。"
    zh_trad: "吹起鑽石風暴進行攻擊。\n有時自己的防禦還會提高。"
    es_latam: "Desata un devastador ventarrón de diamantes para dañar\nal objetivo. Puede aumentar la Defensa del usuario."
dig:
  names:
    jp_kanji: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
    zh_simp: 挖洞
    zh_trad: 挖洞
    es_latam: Excavar
  descriptions:
    jp_kanji: "地面に潜って姿を消し\n少ししてから相手をめがけて攻撃する。"
    en: "The user attacks by disappearing underground for a short\ntime, then surfacing to strike targets."
    fr: "Le lanceur creuse et disparaît dans le sol.\nAprès un court instant, il refait surface pour\nattaquer la cible."
    it: "Il Pokémon si nasconde scavando nel terreno\nper attaccare il bersaglio poco dopo."
    de: "Der Anwender gräbt sich ein und verschwindet.\nNach kurzer Zeit greift er das Ziel an."
    es: "Cava en la tierra hasta quedar fuera de vista y, tras un\nbreve período de tiempo, arremete contra el objetivo."
    ko: "땅속으로 파고들어 모습을 숨긴 뒤\n잠시 후 상대를 공격한다."
    zh_simp: "潜入地下隐藏自身，\n片刻之后瞄准对手进行攻击。"
    zh_trad: "潛入地底銷聲匿跡，\n在片刻後朝向對手發動攻擊。"
    es_latam: "Cava en la tierra hasta quedar fuera de vista y, luego\nde un breve periodo, embiste al objetivo."
dire_claw:
  names:
    jp_kanji: フェイタルクロー
