    de: "Der Anwender legt schwebende Steine vor sich aus,\ndie Gegnern Schaden zufügen, wenn sie diese berühren."
    es: "Hace flotar innumerables rocas delante de sí mismo\nque hieren a quienes entren en contacto con ellas."
    ko: "자신의 정면에 무수히 많은 바위를 띄워\n접촉한 상대에게 데미지를 준다."
    zh_simp: "将无数岩石悬浮在自己的前方，\n给予碰到的对手伤害。"
    zh_trad: "在自己的前方撒下無數飄浮的岩石，\n讓接觸到的對手受到傷害。"
