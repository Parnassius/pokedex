    jp_kanji: "ツタや触手を激しくふるって\n相手をたたきつけ攻撃する。"
    en: "The user attacks by violently lashing targets with vines,\ntentacles, or the like."
    fr: "Le lanceur fait virevolter violemment ses lianes\nou ses tentacules pour fouetter la cible."
    it: "Il Pokémon attacca sferzando il bersaglio con liane\no tentacoli che agita violentemente."
    de: "Der Anwender wirbelt Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 휘둘러\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
    es_latam: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
precipice_blades:
  names:
    jp_kanji: だんがいのつるぎ
    en: Precipice Blades
    fr: Lame Pangéenne
    it: Spade Telluriche
    de: Abgrundsklinge
    es: Filo del Abismo
    ko: 단애의칼
    zh_simp: 断崖之剑
    zh_trad: 斷崖之劍
    es_latam: Filo del Abismo
  descriptions:
    jp_kanji: "大地の力を刃に変えて\n相手を攻撃する。"
    en: "The user attacks targets by manifesting the power of the\nland into blades."
    fr: "Le lanceur attaque en transformant la puissance de\nla terre en lames acérées."
    it: "Il Pokémon attacca il bersaglio trasformando la potenza\ndella terra in lame."
    de: "Der Anwender wandelt die Kraft des Erdreichs in Klingen\num und greift das Ziel damit an."
    es: "Hace que el poder latente de la tierra se manifieste en\nforma de hojas afiladas y ataca al objetivo con ellas."
    ko: "대지의 힘을 칼날로 바꿔\n상대를 공격한다."
    zh_simp: "将大地的力量变化为利刃\n攻击对手。"
    zh_trad: "將大地的力量化為利刃\n攻擊對手。"
    es_latam: "Hace que el poder latente de la tierra se manifieste\nen forma de hojas afiladas y ataca al objetivo con ellas."
