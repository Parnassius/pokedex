    zh_simp: 神秘之剑
    zh_trad: 神秘之劍
    es_latam: Espada Secreta
  descriptions:
    jp_kanji: "長いつので切りつけ攻撃する。\nつのがまとった不思議な力は\n物理的なダメージを与える。"
    en: "The user attacks by slashing targets with its long horn.\nThe odd power contained in the horn deals physical\ndamage to targets."
    fr: "Le lanceur lacère la cible avec une longue corne dont\nle pouvoir mystérieux inflige des dégâts physiques."
    it: "Il Pokémon attacca il bersaglio tagliandolo con\nil lungo corno. La misteriosa energia sprigionata\nprovoca danni fisici."
    de: "Der Anwender führt einen Schneideangriff mit seinem\nlangen Horn aus. Die mysteriöse Kraft aus dem Horn\nfügt getroffenen Gegnern physischen Schaden zu."
    es: "Ensarta al objetivo con un largo cuerno dotado de un\npoder místico que provoca daño físico."
    ko: "긴 뿔로 베어 공격한다.\n뿔이 머금은 이상한 힘은\n물리적인 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n角上拥有的神奇力量\n将给予物理伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n角上擁有的神奇力量\n會給予對手物理傷害。"
    es_latam: "Ensarta al objetivo con un largo cuerno dotado de un\npoder místico que causa daño físico."
seed_bomb:
  names:
    jp_kanji: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
    zh_simp: 种子炸弹
    zh_trad: 種子炸彈
    es_latam: Bomba Semilla
  descriptions:
    jp_kanji: "硬い殻をもつ大きなタネを\n上からたくさんたたきつけて\n相手を攻撃する。"
    en: "The user attacks by slamming a barrage of large, hard-\nshelled seeds down on targets from above."
    fr: "Le lanceur déclenche un déluge de grosses graines\nà la coque solide sur la cible."
    it: "Il Pokémon attacca il bersaglio dall’alto lanciando\nuna raffica di semi dal guscio duro."
    de: "Der Anwender greift an, indem er eine Menge großer\nSamen mit harter Schale von oben auf das Ziel fallen\nlässt."
    es: "Lanza al objetivo una descarga de enormes semillas\nde cáscara muy dura desde arriba."
    ko: "단단한 껍질을 가지고 있는 큰 씨앗을\n위에서 잔뜩 떨어뜨려서 상대를 공격한다."
    zh_simp: "将许多外壳坚硬的大种子\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下大量\n外殼堅硬的大種子，\n攻擊對手。"
    es_latam: "Le lanza al objetivo una descarga de enormes semillas\nde cáscara muy dura desde arriba."
seed_flare:
  names:
