    ko: 시그널빔
    zh_simp: 信号光束
    zh_trad: 信號光束
    es_latam: Rayo Señal
silk_trap:
  names:
    jp_kanji: スレッドトラップ
    en: Silk Trap
    fr: Piège de Fil
    it: Telatrappola
    de: Fadenfalle
    es: Telatrampa
    ko: 스레드트랩
    zh_simp: 线阱
    zh_trad: 線阱
    es_latam: Telatrampa
silver_wind:
  names:
    jp_kanji: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
    zh_simp: 银色旋风
    zh_trad: 銀色旋風
    es_latam: Viento Plateado
  descriptions:
    jp_kanji: "風にりんぷんをのせて\n相手を攻撃する。自分の\nすべての能力が上がることがある。"
    en: "The user attacks targets by scattering powdery scales on\nthe wind. This may also boost all the user’s stats at once."
    fr: "Le lanceur génère un vent qui projette des écailles\npoudreuses sur la cible. Peut aussi augmenter\ntoutes les stats du lanceur."
    it: "Il Pokémon attacca con una polvere di scaglie\ntrasportata dal vento. Può anche aumentare\ntutte le proprie statistiche."
    de: "Der Anwender greift das Ziel an, indem er Silberstaub in\nden Wind streut. Eventuell werden sämtliche seiner\nStatuswerte erhöht."
    es: "Ataque con un fuerte viento con polvo de escamas que\nademás puede aumentar todas las características del\nusuario."
    ko: "인분이 실린 바람으로 상대를 공격한다.\n자신의 모든 능력이 올라갈 때가 있다."
    zh_simp: "在风中掺入鳞粉攻击对手。\n有时会提高自己的全部能力。"
    zh_trad: "乘著風飄送鱗粉攻擊對手。\n有時會提高自己的所有能力。"
    es_latam: "Ataque con un fuerte viento con polvo de escamas que,\nademás, puede aumentar todas las características del\nusuario."
simple_beam:
  names:
    jp_kanji: シンプルビーム
    en: Simple Beam
    fr: Rayon Simple
    it: Ondisinvolta
    de: Wankelstrahl
    es: Onda Simple
    ko: 심플빔
    zh_simp: 单纯光束
    zh_trad: 單純光束
    es_latam: Onda Simple
sing:
  names:
    jp_kanji: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
    zh_simp: 唱歌
    zh_trad: 唱歌
    es_latam: Canto
  descriptions:
    jp_kanji: "心地好い　きれいな\n歌声を聞かせて\n相手をねむけ状態にする。"
    en: "The user sings with a beautiful, soothing voice to make\ntargets drowsy."
    fr: "Le lanceur chante une berceuse qui plonge la cible\ndans un état de somnolence."
    it: "Dolce ninnananna, cantata da una voce suadente,\nche causa sonnolenza nel bersaglio."
    de: "Der Anwender singt mit einer sanften, wohlklingenden\nStimme, um getroffene Gegner schläfrig zu machen."
    es: Cancioncilla que induce somnolencia en el objetivo.
    ko: "기분 좋게 예쁜\n노랫소리를 들려주어\n상대를 졸음 상태로 만든다."
    zh_simp: "让对手听舒适、\n美妙的歌声，\n令其陷入瞌睡状态。"
    zh_trad: "唱出舒服美妙的歌聲，\n讓對手陷入瞌睡狀態。"
    es_latam: Cancioncita que induce somnolencia en el objetivo.
sizzly_slide:
  names:
    jp_kanji: めらめらバーン
