  descriptions:
    jp_kanji: "大きな岩を激しく\nぶつけて攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by hurling large boulders. This may also\nmake targets flinch."
    fr: "Envoie de gros rochers sur la cible pour lui infliger\ndes dégâts. Peut aussi l’apeurer."
    it: "Il Pokémon attacca il bersaglio colpendolo violentemente\ncon grandi massi che possono anche farlo tentennare."
    de: "Der Anwender schleudert riesige Felsen auf das Ziel.\nGetroffene Gegner schrecken eventuell zurück."
    es: "Ataca lanzando grandes pedruscos. Puede amedrentar\nal objetivo."
    ko: "큰 바위를 세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時還會讓對手畏縮。"
    es_latam: "Ataca lanzando grandes rocas. Puede atemorizar\nal objetivo."
