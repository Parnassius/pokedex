    ko: 마구할퀴기
    zh_simp: 乱抓
    zh_trad: 亂抓
    es_latam: Garras Furiosas
fusion_bolt:
  names:
    jp_kanji: クロスサンダー
    en: Fusion Bolt
    fr: Éclair Croix
    it: Incrotuono
    de: Kreuzdonner
    es: Rayo Fusión
    ko: 크로스썬더
    zh_simp: 交错闪电
    zh_trad: 交錯閃電
    es_latam: Rayo Fusión
fusion_flare:
  names:
    jp_kanji: クロスフレイム
    en: Fusion Flare
    fr: Flamme Croix
    it: Incrofiamma
    de: Kreuzflamme
    es: Llama Fusión
    ko: 크로스플레임
    zh_simp: 交错火焰
    zh_trad: 交錯火焰
    es_latam: Llama Fusión
future_sight:
  names:
    jp_kanji: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
    zh_simp: 预知未来
    zh_trad: 預知未來
    es_latam: Premonición
  descriptions:
    jp_kanji: "技を使った後しばらくして\n相手がいた場所に\n念力の塊を送って攻撃する。"
    en: "A short time after this move is used, a blast of psychic\nenergy will strike the spot where the target was."
    fr: "Un certain temps après l’utilisation de cette capacité,\nde l’énergie psychique frappe l’endroit où se tenait\nla cible."
    it: "Poco dopo l’utilizzo della mossa, il Pokémon attacca\nscagliando energia psichica sul luogo in cui si trovava\nil bersaglio."
    de: "Der Anwender greift den Ort, an dem das Ziel war,\neine gewisse Zeit nach Einsatz der Attacke mit einem\nBall aus Psycho-Energie an."
    es: "Poco después de usar este movimiento, ataca el lugar\nen el que se encontraba el objetivo con energía psíquica\nconcentrada."
    ko: "기술을 사용하고 얼마 후에\n상대가 있던 위치로\n염동력 덩어리를 보내어 공격한다."
