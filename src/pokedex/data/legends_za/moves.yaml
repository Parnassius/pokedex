absorb:
  names:
    jp_kanji: すいとる
    en: Absorb
    fr: Vole-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
    zh_simp: 吸取
    zh_trad: 吸取
    es_latam: Absorción
  descriptions:
    jp_kanji: "養分を吸い取り攻撃する。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by draining targets of their nutrients.\nThe user’s HP will be restored by a portion of the damage\ndealt."
    fr: "Une attaque qui permet d’absorber les nutriments de\nla cible et de convertir une partie des dégâts infligés\nen PV pour le lanceur."
    it: "Il Pokémon attacca assorbendo sostanze nutritive\ne recupera una quantità di PS pari a una parte\ndel danno inflitto."
    de: "Der Anwender entzieht dem Ziel Nährstoffe und\nregeneriert einen Teil des dabei zugefügten Schadens\nals KP."
    es: "Un ataque que absorbe nutrientes. El usuario recupera\nalgunos PS según el daño que produzca."
    ko: "양분을 흡수하여 공격한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "吸取养分进行攻击。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "吸取養分進行攻擊。\n可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Un ataque que absorbe nutrientes. El usuario recupera\nalgunos PS según el daño que produzca."
