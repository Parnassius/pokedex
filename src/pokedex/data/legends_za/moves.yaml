    es_latam: Anclaje
ancient_power:
  names:
    jp_kanji: げんしのちから
    en: Ancient Power
    fr: Pouvoir Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
    zh_simp: 原始之力
    zh_trad: 原始之力
    es_latam: Poder Antiguo
  descriptions:
    jp_kanji: "原始の力で攻撃する。\n自分のすべての\n能力が上がることがある。"
    en: "The user attacks with a prehistoric power. This may also\nboost all the user’s stats at once."
    fr: "Le lanceur attaque grâce à une force primitive.\nPeut aussi augmenter toutes les stats du lanceur."
    it: "Il Pokémon attacca il bersaglio con una forza primordiale.\nPuò aumentare tutte le proprie statistiche."
    de: "Der Anwender greift mit antiker Kraft an, wodurch\neventuell sämtliche seiner Statuswerte erhöht werden."
    es: "Canaliza un poder prehistórico con el que ataca al\nobjetivo. Puede aumentar todas las características\ndel usuario."
    ko: "원시의 힘으로 공격한다.\n자신의 모든 능력이 올라갈 때가 있다."
    zh_simp: "用原始之力进行攻击。\n有时会提高\n自己所有的能力。"
    zh_trad: "用原始之力進行攻擊。\n有時會提高\n自己的所有能力。"
    es_latam: "Canaliza un poder prehistórico con el que ataca\nal objetivo. Puede aumentar todas las características\ndel usuario."
