swords_dance:
  names:
    jp_kanji: つるぎのまい
    en: Swords Dance
    fr: Danse Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
    zh_simp: 剑舞
    zh_trad: 劍舞
    es_latam: Danza de Espadas
  descriptions:
    jp_kanji: "戦いの舞を激しく踊って\nしばらくのあいだ自分の攻撃を上げる。"
    en: "The user boosts its Attack stat for a while by performing a\nfrenetic dance."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente l’Attaque du lanceur pendant\nun certain temps."
    it: "Il Pokémon si esibisce in una frenetica danza da battaglia\nche aumenta il suo Attacco per un certo tempo."
    de: "Der Anwender bietet einen wilden Kampftanz dar und\nerhöht so für einige Zeit seinen Angriff."
    es: "Este frenético baile de combate aumenta el Ataque\ndurante un tiempo."
    ko: "싸움의 춤을 격렬하게 춰서\n한동안 자신의 공격을 올린다."
    zh_simp: "激烈地跳起战舞，\n在一段时间内提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞，\n藉此在一段時間內提高自己的攻擊。"
    es_latam: "Este frenético baile de combate aumenta el Ataque\ndurante un tiempo."
synchronoise:
  names:
    jp_kanji: シンクロノイズ
    en: Synchronoise
    fr: Synchropeine
    it: Sincrumore
    de: Synchrolärm
    es: Sincrorruido
    ko: 싱크로노이즈
    zh_simp: 同步干扰
    zh_trad: 同步干擾
    es_latam: Sincrorruido
synthesis:
  names:
    jp_kanji: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Fotosíntesis
    ko: 광합성
    zh_simp: 光合作用
    zh_trad: 光合作用
    es_latam: Fotosíntesis
  descriptions:
    jp_kanji: "光合成で栄養を作り\n自分のＨＰを回復する。"
    en: "The user restores some HP by producing energy through\nphotosynthesis."
    fr: "Le lanceur récupère des PV en produisant des nutriments\npar photosynthèse."
    it: "Il Pokémon recupera PS per effetto dei nutrienti generati\ntramite la fotosintesi."
    de: "Der Anwender erzeugt durch Fotosynthese Nährstoffe\nund regeneriert KP."
    es: "El usuario restaura sus PS produciendo energía gracias\na la fotosíntesis."
    ko: "광합성을 통해 영양분을 만들어\n자신의 HP를 회복한다."
    zh_simp: "通过光合作用制造营养，\n回复自己的ＨＰ。"
    zh_trad: "以光合作用製造營養，\n回復自己的ＨＰ。"
    es_latam: "El usuario restaura sus PS produciendo energía\ngracias a la fotosíntesis."
