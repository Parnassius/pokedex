    ko: 페어리록
    zh_simp: 妖精之锁
    zh_trad: 妖精之鎖
    es_latam: Cerrojo Feérico
fairy_wind:
  names:
    jp_kanji: ようせいのかぜ
    en: Fairy Wind
    fr: Vent Féérique
    it: Vento di Fata
    de: Feenbrise
    es: Viento Feérico
    ko: 요정의바람
    zh_simp: 妖精之风
    zh_trad: 妖精之風
    es_latam: Viento Feérico
  descriptions:
    jp_kanji: "ようせいのかぜを起こし\n相手に吹きつけて攻撃する。"
    en: "The user attacks by stirring up a fairy wind to strike\ntargets."
    fr: Le lanceur déchaîne un vent magique qui cingle la cible.
    it: "Il Pokémon solleva un vento fatato che investe\nil bersaglio."
    de: Der Anwender greift das Ziel mit einer Feenbrise an.
    es: "El usuario desata un vendaval feérico que arremete\ncontra el objetivo."
    ko: "요정의 바람을 일으켜\n상대에게 몰아쳐서 공격한다."
    zh_simp: "刮起妖精之风，\n吹向对手进行攻击。"
    zh_trad: "刮起妖精之風，\n吹向對手進行攻擊。"
    es_latam: "El usuario desata un ventarrón feérico que embiste\nal objetivo."
fake_out:
  names:
    jp_kanji: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이기
    zh_simp: 击掌奇袭
    zh_trad: 擊掌奇襲
    es_latam: Sorpresa
  descriptions:
    jp_kanji: "先制攻撃で相手をひるませる。\n戦闘に出たら\nすぐに出さないと成功しない。"
    en: "The user attacks first to make targets flinch. This move\nonly succeeds if it is used first thing upon the user\nentering a battle."
    fr: "Le lanceur déclenche une attaque préventive qui apeure\nla cible. La capacité ne fonctionne que lorsqu’elle est\nutilisée immédiatement en entrant au combat."
    it: "Il Pokémon fa tentennare il bersaglio con un attacco\nad alta priorità. L’attacco funziona solo appena scesi\nin campo."
    de: "Der Anwender greift zuerst an und lässt getroffene\nGegner zurückschrecken. Gelingt nur, wenn die Attacke\nsofort nach Kampfantritt des Anwenders eingesetzt wird."
    es: "Amedrenta al objetivo con este movimiento de prioridad\nalta. Solo tiene efecto si el usuario lo usa nada más\nentrar en combate."
    ko: "선제공격으로 상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "进行先制攻击，使对手畏缩。\n要在出场后立刻使出才能成功。"
    zh_trad: "利用先制攻擊使對手畏縮。\n要在上場後立即使用才會成功。"
    es_latam: "Atemoriza al objetivo con este movimiento de prioridad\nalta. Solo tiene efecto si el usuario lo usa justo al\nentrar en combate."
fake_tears:
  names:
    jp_kanji: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
    zh_simp: 假哭
    zh_trad: 假哭
    es_latam: Llanto Falso
  descriptions:
    jp_kanji: "ないたふりをして涙を流す。\nこまらせることで\nしばらくのあいだ相手の特防を下げる。"
    en: "The user feigns crying to fluster targets, which lowers\ntheir Sp. Def stats for a while."
    fr: "Le lanceur fait semblant de pleurer pour troubler\nla cible. Baisse la Défense Spéciale de la cible pendant\nun certain temps."
    it: "Il Pokémon inscena un pianto teatrale per turbare\nil bersaglio, riducendo la sua Difesa Speciale\nper un certo tempo."
    de: "Der Anwender täuscht Weinen vor und senkt so für\neinige Zeit die Spezial-Verteidigung getroffener Gegner."
    es: "Lágrimas de cocodrilo que desconciertan al objetivo\ny reducen su Defensa Especial durante un tiempo."
    ko: "우는 척을 하며 눈물을 흘린다.\n난처하게 만들어\n한동안 상대의 특수방어를 떨어뜨린다."
    zh_simp: "装哭流泪。\n使对手不知所措，\n从而在一段时间内降低对手的特防。"
    zh_trad: "裝哭掉眼淚。\n讓對手不知所措，\n在一段時間內降低對手的特防。"
    es_latam: "Lágrimas de cocodrilo que desconciertan al objetivo\ny reducen su Defensa Especial durante un tiempo."
