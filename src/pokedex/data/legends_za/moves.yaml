    jp_kanji: "硬い岩石を\n５回連続で発射して攻撃する。"
    en: "The user attacks by shooting out five hard rocks, one\nafter the other."
    fr: "Le lanceur projette un rocher sur la cible cinq fois\nd’affilée."
    it: "Il Pokémon attacca lanciando cinque massi pesanti\nin rapida successione."
    de: "Der Anwender feuert fünfmal hintereinander harte\nFelsen ab."
    es: Ataca lanzando cinco pedruscos seguidos al objetivo.
    ko: "단단한 암석을\n5회 연속으로 발사하여 공격한다."
    zh_simp: 连续发射５次坚硬的岩石进行攻击。
    zh_trad: "連續５次發射\n堅硬的岩石進行攻擊。"
    es_latam: Ataca lanzando cinco piedras seguidas al objetivo.
