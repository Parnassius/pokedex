  descriptions:
    jp_kanji: "体の奥から波導の力を\n相手にうち放つ。"
    en: "The user attacks by letting loose a pulse of aura power\nfrom within its body."
    fr: "Le lanceur puise au fond de lui-même pour dégager\nune aura et projeter de l’énergie sur la cible."
    it: "Il Pokémon rilascia l’aura dal profondo del corpo e la\nspara verso il bersaglio."
    de: "Der Anwender entfesselt tief aus seinem Innern einen\nkraftvollen Stoß aus Aura-Energie."
    es: Libera una inmensa descarga de aura desde su interior.
    ko: "몸속에서 파동의 힘을 끌어내\n상대에게 쏜다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。"
