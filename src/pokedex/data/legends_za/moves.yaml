forests_curse:
  names:
    jp_kanji: もりののろい
    en: Forest’s Curse
    fr: Maléfice Sylvain
    it: Boscomalocchio
    de: Waldesfluch
    es: Condena Silvana
    ko: 숲의저주
    zh_simp: 森林咒术
    zh_trad: 森林詛咒
    es_latam: Condena Silvana
  descriptions:
    jp_kanji: "相手に森の呪いをかける。\n相手のタイプに\nくさタイプが追加される。"
    en: "The user places the curse of the forest on targets. This\nadds the Grass type to targets."
    fr: "L’esprit de la forêt charme la cible et lui ajoute\nle type Plante."
    it: "Il Pokémon invoca la maledizione del bosco sul bersaglio,\nche acquisisce così anche il tipo Erba."
    de: "Der Anwender belegt das Ziel mit einem Waldesfluch,\ndurch den dieses zusätzlich den Typ Pflanze annimmt."
    es: "El objetivo es presa de la maldición del bosque, por lo\nque pasa a ser un Pokémon de tipo Planta, además de\nconservar sus tipos habituales."
    ko: "상대에게 숲의 저주를 건다.\n상대의 타입에 풀타입이 추가된다."
    zh_simp: "向对手施加森林咒术。\n使对手被追加草属性。"
    zh_trad: "向對手施加森林詛咒。\n讓對手追加草屬性。"
    es_latam: "El objetivo es presa de la maldición del bosque,\npor lo que pasa a ser un Pokémon de tipo Planta,\nademás de conservar sus tipos habituales."
foul_play:
  names:
    jp_kanji: イカサマ
    en: Foul Play
    fr: Tricherie
    it: Ripicca
    de: Schmarotzer
    es: Juego Sucio
    ko: 속임수
    zh_simp: 移花接木
    zh_trad: 欺詐
    es_latam: Juego Sucio
freeze_dry:
  names:
    jp_kanji: フリーズドライ
    en: Freeze-Dry
    fr: Lyophilisation
    it: Liofilizzazione
    de: Gefriertrockner
    es: Liofilización
    ko: 프리즈드라이
    zh_simp: 冷冻干燥
    zh_trad: 冷凍乾燥
    es_latam: Liofilización
  descriptions:
    jp_kanji: "相手を急激に冷やして攻撃する。\nみずタイプにも効果バツグンになり\n相手をこおらせることもある。"
    en: "The user attacks by rapidly lowering targets’ temperature.\nThis move is super effective on Water-type Pokémon, and\nit may also leave targets frozen."
    fr: "Le lanceur refroidit violemment la cible. Peut aussi\nla geler. Super efficace sur les Pokémon de type Eau."
    it: "Il Pokémon attacca il bersaglio raffreddandolo\nistantaneamente e può anche congelarlo. Questa mossa\nrisulta superefficace contro i Pokémon di tipo Acqua."
    de: "Der Anwender greift an, indem er das Ziel blitzschnell\nabkühlt. Getroffene Gegner frieren eventuell ein. Die\nAttacke ist auch gegen Wasser-Pokémon sehr effektiv."
    es: "Ataca al objetivo enfriándolo súbitamente. Puede\ncongelar y es supereficaz contra Pokémon de tipo Agua."
    ko: "상대를 급격히 차갑게 하여 공격한다.\n물타입 포켓몬에게도 효과가 굉장해지며\n상대를 얼음 상태로 만들 때가 있다."
    zh_simp: "急剧冷冻对手进行攻击。\n对于水属性宝可梦也是效果绝佳。\n有时也会让对手陷入冰冻状态。"
    zh_trad: "急速冷凍對手進行攻擊。\n對水屬性寶可夢也是效果絕佳。\n有時還會讓對手陷入冰凍狀態。"
    es_latam: "Ataca al objetivo enfriándolo súbitamente. Puede\ncongelar y es supereficaz contra Pokémon de tipo Agua."
freeze_shock:
  names:
    jp_kanji: フリーズボルト
