    zh_simp: 虫扑
    zh_trad: 蟲撲
    es_latam: Brinco
  descriptions:
    jp_kanji: "草むらから飛びだすように攻撃する。\n軽快な足どりによって\n少しのあいだ自分の動きを速くする。"
    en: "The user attacks suddenly as if leaping out from tall\ngrass. The user’s nimble footwork also increases its\nmovement speed for a short time."
    fr: "Le lanceur attaque la cible avec agilité, comme s’il\nsurgissait des hautes herbes. La vitesse de déplacement\ndu lanceur augmente pendant un court instant."
    it: "Il Pokémon attacca come se saltasse fuori dall’erba alta\ne si muove con passo leggiadro, accelerando per un po’\ndi tempo i propri movimenti."
    de: "Der Anwender greift an, als würde er aus hohem Gras\nhervorspringen. Durch seine wendigen Schritte bewegt\ner sich für kurze Zeit schneller."
    es: "Ataca de pronto como si saltara desde la hierba alta.\nEl usuario se mueve con gran agilidad y se vuelve más\nrápido durante un breve período de tiempo."
    ko: "풀숲에서 튀어나오듯이 공격한다.\n경쾌한 발재간으로\n잠시 동안 자신의 움직임이 빨라진다."
    zh_simp: "跳出草丛进行攻击。\n通过轻快的步伐在一小段时间内\n让自己的动作变得更快。"
    zh_trad: "從草叢裡跳出來進行攻擊。\n輕快的腳步會使得\n自己的動作在一小段時間內變快。"
    es_latam: "Ataca de pronto como si saltara desde el césped.\nEl usuario se mueve con gran agilidad y se vuelve más\nrápido durante un breve periodo."
