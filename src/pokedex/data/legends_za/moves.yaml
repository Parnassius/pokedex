    jp_kanji: "静かに精神を統一し\n心を鎮めることで\n少しのあいだ自分の特攻と特防を上げる。"
    en: "The user boosts its Sp. Atk and Sp. Def stats for a short\ntime by quietly focusing its mind and calming its spirit."
    fr: "Le lanceur fait le vide dans son esprit pour augmenter\nson Attaque Spéciale et sa Défense Spéciale pendant\nun court instant."
    it: "Il Pokémon si concentra e placa il proprio spirito per\naumentare l’Attacco Speciale e la Difesa Speciale\nper un po’ di tempo."
    de: "Der Anwender sammelt und beruhigt sich und erhöht\nso für kurze Zeit seinen Spezial-Angriff und seine\nSpezial-Verteidigung."
    es: "Mejora la concentración y calma el espíritu para\naumentar el Ataque Especial y la Defensa Especial\ndurante un breve período de tiempo."
    ko: "조용히 정신을 통일하고 마음을 가라앉혀서\n잠시 동안 자신의 특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而在一小段时间内\n提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，在一小段時間內\n提高自己的特攻和特防。"
