    jp_kanji: "大きな声を出して驚かせ\n相手を後ろに大きくふきとばす。"
    en: "The user lets out a mighty roar, which startles targets and\ndrives them back a good distance."
    fr: "Le lanceur pousse un hurlement terrible qui repousse\nles cibles."
    it: "Il Pokémon sorprende il bersaglio con un verso fortissimo\ne lo spinge molto indietro."
    de: "Der Anwender gibt ein einschüchterndes Brüllen von\nsich, das getroffene Gegner weit zurückwirft."
    es: "Emite un temible rugido que sobresalta al objetivo y\nlo empuja hacia atrás."
    ko: "큰 소리를 내서 놀라게 하여\n상대를 뒤로 멀리 날려 버린다."
    zh_simp: "发出响亮的声音惊吓对手，\n将对手远远地向后吹飞。"
    zh_trad: "發出巨大叫聲驚嚇對手，\n將對手向後遠遠地震飛。"
    es_latam: "Emite un temible rugido que atemoriza al objetivo\ny lo empuja hacia atrás."
