    es: Vapodrenaje
    ko: 생생버블
    zh_simp: 活活气泡
    zh_trad: 活活氣泡
    es_latam: Vapodrenaje
branch_poke:
  names:
    jp_kanji: えだづき
    en: Branch Poke
    fr: Tapotige
    it: Ramostoccata
    de: Zweigstoß
    es: Punzada Rama
    ko: 가지찌르기
    zh_simp: 木枝突刺
    zh_trad: 木枝突刺
    es_latam: Ramazo Punzante
brave_bird:
  names:
    jp_kanji: ブレイブバード
    en: Brave Bird
    fr: Rapace
    it: Baldeali
    de: Sturzflug
    es: Pájaro Osado
    ko: 브레이브버드
    zh_simp: 勇鸟猛攻
    zh_trad: 勇鳥猛攻
    es_latam: Ave Brava
  descriptions:
    jp_kanji: "はねを折りたたみ\n低空飛行で突撃する。\n自分もダメージを受ける。"
    en: "The user attacks by tucking its wings and charging at\ntargets from a low altitude. The user will also take some\ndamage."
    fr: "Le lanceur replie ses ailes et charge en rase-mottes.\nBlesse aussi le lanceur."
    it: "Il Pokémon ripiega le ali e carica da bassa quota,\nma subisce danni."
    de: "Der Anwender legt seine Flügel an und greift aus\nniedriger Höhe an. Dabei erleidet er selbst Schaden."
    es: "Pliega las alas y ataca con un vuelo rasante. El usuario\nse hiere a sí mismo."
    ko: "날개를 접고 저공비행으로 돌격한다.\n자신도 데미지를 입는다."
    zh_simp: "收拢翅膀，\n通过低空飞行突击对手。\n自己也会受到伤害。"
    zh_trad: "收起翅膀，\n低空飛行突擊對手。\n自己也會受到傷害。"
    es_latam: "Pliega las alas y ataca con un vuelo de poca altitud.\nEl usuario se hiere a sí mismo."
breaking_swipe:
  names:
    jp_kanji: ワイドブレイカー
    en: Breaking Swipe
    fr: Abattage
    it: Vastoimpatto
    de: Breitseite
    es: Vasto Impacto
    ko: 와이드브레이커
    zh_simp: 广域破坏
    zh_trad: 廣域破壞
    es_latam: Vasto Impacto
  descriptions:
    jp_kanji: "きょうじんな　しっぽを\n激しくふりはらって攻撃する。\n少しのあいだ相手の攻撃を下げる。"
    en: "The user attacks by wildly swinging its tough tail.\nThis also lowers targets’ Attack stats for a short time."
    fr: "Le lanceur balaie violemment la cible avec son immense\nqueue. Baisse l’Attaque de la cible pendant un court\ninstant."
    it: "Il Pokémon attacca il bersaglio con la sua robusta coda\nriducendone l’Attacco per un po’ di tempo."
    de: "Der Anwender greift mit einem heftigen Schwung seines\nrobusten Schweifs an. Der Angriff getroffener Gegner\nwird für kurze Zeit gesenkt."
    es: "El usuario sacude violentamente su enorme cola para\ngolpear al objetivo y reducir su Ataque durante un breve\nperíodo de tiempo."
    ko: "강인한 꼬리를 세차게 휘둘러서 공격한다.\n잠시 동안 상대의 공격을 떨어뜨린다."
    zh_simp: "用坚韧的尾巴进行猛扫攻击，\n从而在一小段时间内降低对手的攻击。"
    zh_trad: "激烈地甩動強韌的尾巴攻擊對手，\n在一小段時間內降低對手的攻擊。"
    es_latam: "El usuario sacude violentamente su enorme cola\npara golpear al objetivo y reducir su Ataque durante\nun breve periodo."
brick_break:
  names:
    jp_kanji: かわらわり
    en: Brick Break
    fr: Casse-Brique
    it: Breccia
    de: Durchbruch
    es: Demolición
    ko: 깨트리기
    zh_simp: 劈瓦
    zh_trad: 劈瓦
    es_latam: Karatazo
  descriptions:
    jp_kanji: "手刀を勢いよく振りおろして攻撃する。\nひかりのかべやリフレクターを破壊できる。"
    en: "The user attacks with a swift chop. This move can also\nbreak barriers such as Light Screen and Reflect."
    fr: "Le lanceur attaque avec le tranchant de la main.\nPermet aussi de briser les barrières comme\nMur Lumière et Protection."
    it: "Il Pokémon attacca con una mano e rompe barriere\ncome Riflesso e Schermoluce."
    de: "Der Anwender greift mit einem beherzten\nHandkantenschlag an und durchbricht dabei\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca al objetivo con un potente golpe con el filo de la\nmano capaz de destruir barreras como Pantalla de Luz\ny Reflejo."
    ko: "수도로 기세 좋게 내려쳐서 공격한다.\n빛의장막이나 리플렉터를 파괴할 수 있다."
    zh_simp: "将手刀猛烈地挥下进行攻击。\n可以破坏光墙和反射壁。"
    zh_trad: "猛烈地揮下手刀進行攻擊。\n可以破壞光牆和反射壁。"
    es_latam: "Ataca al objetivo con un poderoso golpe con el filo\nde la mano capaz de destruir barreras como Pantalla\nde Luz y Reflejo."
brine:
  names:
    jp_kanji: しおみず
