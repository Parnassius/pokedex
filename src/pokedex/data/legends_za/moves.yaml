    ko: 모래뿌리기
    zh_simp: 泼沙
    zh_trad: 潑沙
    es_latam: Ataque Arena
sand_tomb:
  names:
    jp_kanji: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
    zh_simp: 流沙深渊
    zh_trad: 流沙地獄
    es_latam: Tumba de Arena
  descriptions:
    jp_kanji: "激しく吹きあれる砂あらしで相手を囲み\n中にいる相手にダメージを与えつづける。"
    en: "The user summons a raging sandstorm to surround\ntargets. Opponents within the sandstorm will take\ncontinual damage."
    fr: "Le lanceur crée une tempête de sable terrifiante qui\nentoure l’adversaire. Tant qu’il se trouve à l’intérieur,\ncelui-ci subit des dégâts continus."
    it: "Il Pokémon genera un turbine di sabbia che continua\na infliggere danni agli avversari che si trovano al suo\ninterno."
    de: "Der Anwender schließt das Ziel in einer heftigen\nSandhose ein. Gegner, die sich darin aufhalten,\nnehmen kontinuierlich Schaden."
    es: "Envuelve al objetivo en un violento remolino de arena que\ninflige daño continuo a los rivales que permanezcan\ndentro."
    ko: "세차게 부는 모래바람을 만들어\n안에 있는 상대에게 계속해서 데미지를 준다."
    zh_simp: "用铺天盖地的沙暴包围对手，\n并对其中的对手持续造成伤害。"
    zh_trad: "以鋪天蓋地的沙暴包圍對手，\n對困在其中的對手持續造成傷害。"
    es_latam: "Envuelve al objetivo en un violento remolino de arena que\ninflige daño continuo a los rivales que permanezcan\ndentro."
sandsear_storm:
