    es_latam: Cambio de Lado
amnesia:
  names:
    jp_kanji: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
    zh_simp: 瞬间失忆
    zh_trad: 瞬間失憶
    es_latam: Amnesia
  descriptions:
    jp_kanji: "頭を　からにして\n一瞬なにかを忘れることで\nしばらくのあいだ自分の特防を上げる。"
    en: "The user boosts its Sp. Def stat for a while by temporarily\nemptying its mind to forget all concerns."
    fr: "Le lanceur fait le vide dans son esprit pour oublier\nses soucis, ce qui augmente sa Défense Spéciale\npendant un certain temps."
    it: "Il Pokémon svuota per un po’ la mente per dimenticare\ni problemi. La Difesa Speciale aumenta per un certo\ntempo."
    de: "Der Anwender macht seinen Kopf frei und erhöht\ndurch das plötzliche Vergessen für einige Zeit seine\nSpezial-Verteidigung."
    es: "El usuario olvida sus preocupaciones y aumenta su\nDefensa Especial durante un tiempo."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n한동안 자신의 특수방어를 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而在一段时间内提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n在一段時間內提高自己的特防。"
    es_latam: "El usuario olvida sus preocupaciones y aumenta mucho\nla Defensa Especial durante un tiempo."
