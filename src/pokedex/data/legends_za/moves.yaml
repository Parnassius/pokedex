    ko: 얼어붙는시선
    zh_simp: 冰冷视线
    zh_trad: 冰冷視線
    es_latam: Mirada Glacial
freezy_frost:
  names:
    jp_kanji: こちこちフロスト
    en: Freezy Frost
    fr: Évo-Congélo
    it: Scricchiagelo
    de: Klirrfrost
    es: Glaceoprisma
    ko: 꽁꽁프로스트
    zh_simp: 冰冰霜冻
    zh_trad: 冰冰霜凍
    es_latam: Glaceoprisma
frenzy_plant:
  names:
    jp_kanji: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attaque
    it: Radicalbero
    de: Flora-Statue
    es: Planta Feroz
    ko: 하드플랜트
    zh_simp: 疯狂植物
    zh_trad: 瘋狂植物
    es_latam: Planta Feroz
  descriptions:
    jp_kanji: "大きな樹木で\n相手をたたきつけて攻撃する。\n少しのあいだ反動で動けなくなる。"
    en: "The user attacks by slamming targets with the roots of an\nenormous tree. The recoil will leave the user unable to\nmove for a short time."
    fr: "Le lanceur donne un violent coup de racines sur la cible.\nLe contrecoup empêche le lanceur d’agir pendant\nun court instant."
    it: "Il Pokémon attacca colpendo il bersaglio con un groviglio\ndi radici, ma non può muoversi per un po’ di tempo\na causa del contraccolpo."
    de: "Der Anwender greift an, indem er das Ziel mit riesigen\nWurzeln niederschlägt. Durch den Rückstoß kann er sich\nfür kurze Zeit nicht bewegen."
    es: "El usuario golpea al objetivo con las raíces de una\nenorme planta, pero no podrá moverse durante un\nbreve período de tiempo."
    ko: "큰 나무로\n상대를 힘껏 쳐서 공격한다.\n잠시 동안 반동으로 움직일 수 없다."
    zh_simp: "用大树摔打对手进行攻击。\n会在一小段时间内\n因反作用力而无法动弹。"
    zh_trad: "將大大的樹木甩向對手進行攻擊。\n在一小段時間內\n會因為反作用力而無法動彈。"
    es_latam: "El usuario golpea al objetivo con las raíces de una\nenorme planta, pero no podrá moverse durante un\nbreve periodo."
frost_breath:
  names:
    jp_kanji: こおりのいぶき
    en: Frost Breath
    fr: Souffle Glacé
    it: Alitogelido
    de: Eisesodem
    es: Vaho Gélido
    ko: 얼음숨결
    zh_simp: 冰息
    zh_trad: 冰息
    es_latam: Vaho Helado
  descriptions:
    jp_kanji: "冷たい息を\n相手に吹きつけて攻撃する。\n必ず急所に当たる。"
    en: "The user attacks by blowing its cold breath on targets.\nThis move always lands a critical hit."
    fr: "Le lanceur crache un souffle froid qui blesse la cible.\nL’attaque est toujours critique."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria gelida. Brutto colpo assicurato."
    de: "Der Anwender greift an, indem er dem Ziel eisigen Atem\nentgegenhaucht. Volltreffergarantie."
    es: "El usuario ataca expulsando un aliento gélido. Siempre\nasesta un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
    zh_simp: "将冰冷的气息\n吹向对手进行攻击。\n必定会击中要害。"
    zh_trad: "將冰冷的氣息\n吹向對手進行攻擊。\n必定會擊中要害。"
    es_latam: "El usuario ataca expulsando un aliento gélido. Siempre\nlanza un golpe crítico."
frustration:
  names:
    jp_kanji: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
