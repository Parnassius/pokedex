    fr: "Le lanceur plonge dans l’ombre de la cible,\nvole ses augmentations de stats, et l’attaque."
    it: "Il Pokémon ruba gli aumenti delle statistiche del\nbersaglio, poi si nasconde nella sua ombra e lo attacca."
    de: "Der Anwender schleicht sich in den Schatten des Zieles,\nstiehlt dessen erhöhte Statuswerte und greift an."
