    jp_kanji: "弱い念力を\n相手に送って攻撃する。\n相手を混乱させることもある。"
    en: "The user attacks by directing a weak telekinetic force\ntoward targets. This may also leave targets confused."
    fr: "Une faible vague télékinétique frappe la cible.\nPeut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio con una leggera forza\ntelecinetica che può anche confonderlo."
    de: "Der Anwender greift mit schwacher telekinetischer\nEnergie an, die getroffene Gegner eventuell verwirrt."
    es: Débil ataque telequinético que puede causar confusión.
    ko: "약한 염동력을\n상대에게 보내어 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "向对手发送\n微弱的念力进行攻击。\n有时也会使对手混乱。"
    zh_trad: "向對手發送\n微弱的念力進行攻擊。\n有時還會使對手混亂。"
