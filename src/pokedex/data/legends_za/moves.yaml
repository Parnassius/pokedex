    es: Sumisión
    ko: 지옥의바퀴
    zh_simp: 深渊翻滚
    zh_trad: 地獄翻滾
    es_latam: Sumisión
substitute:
  names:
    jp_kanji: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
    zh_simp: 替身
    zh_trad: 替身
    es_latam: Sustituto
  descriptions:
    jp_kanji: "自分のＨＰを少し削って\n分身をだす。"
    en: "The user sacrifices a small amount of HP to create a\nsubstitute for itself."
    fr: Le lanceur crée un clone en sacrifiant quelques PV.
    it: Il Pokémon crea una copia di se stesso usando alcuni PS.
    de: "Der Anwender setzt eine kleine Menge an KP ein,\num einen Doppelgänger zu erzeugen."
    es: Utiliza parte de los PS propios para crear un sustituto.
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。"
    es_latam: Utiliza parte de los PS propios para crear un sustituto.
