  descriptions:
    jp_kanji: "相手をしおづけ状態にして\nダメージを与え続ける。\nはがね　みずタイプはより苦しむ。"
    en: "The user attacks by salt-curing targets to inflict continual\ndamage. Water and Steel types are more strongly affected\nby this move."
    fr: "Le lanceur couvre la cible de sel, ce qui lui inflige\ndes dégâts continus. Si la cible est de type Acier\nou Eau, ces dégâts sont plus élevés."
    it: "Il Pokémon mette sotto sale il bersaglio continuando\na infliggergli danni. I Pokémon di tipo Acciaio e di tipo\nAcqua sono particolarmente vulnerabili a questa mossa."
    de: "Der Anwender pökelt das Ziel mit Salz ein, wodurch\ndieses kontinuierlich Schaden erleidet. Stahl- und\nWasser-Pokémon leiden besonders darunter."
    es: "Deja en salazón al objetivo, que pierde PS de forma\ngradual. Afecta especialmente a Pokémon de tipo Acero\ny tipo Agua."
    ko: "상대를 소금절이 상태로 만들어\n계속해서 데미지를 준다.\n강철타입이나 물타입에게 더 고통스럽다."
    zh_simp: "使对手陷入盐腌状态，\n持续地造成伤害。\n对手为钢或水属性时会更痛苦。"
    zh_trad: "讓對手陷入鹽醃狀態，\n並持續受到傷害。\n鋼、水屬性的寶可夢還會更痛苦。"
    es_latam: "Sala al objetivo, que pierde PS de forma gradual.\nAfecta especialmente a Pokémon de tipo Acero\ny tipo Agua."
