    ko: "달의 파워를 빌려서 상대를 공격한다.\n상대의 특수공격을 떨어뜨릴 때가 있다."
    zh_simp: "借用月亮的力量攻击对手。\n有时也会降低对手的特攻。"
    zh_trad: "借用月亮的力量攻擊對手。\n有時還會降低對手的特攻。"
