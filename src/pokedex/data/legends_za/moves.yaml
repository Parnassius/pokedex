    zh_simp: 流星闪冲
    zh_trad: 流星閃衝
    es_latam: Meteoimpacto
super_fang:
  names:
    jp_kanji: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
    zh_simp: 愤怒门牙
    zh_trad: 憤怒門牙
    es_latam: Supercolmillo
  descriptions:
    jp_kanji: "鋭い前歯で\n激しく噛みついて攻撃する。\n相手のＨＰによってダメージが変わる。"
    en: "The user attacks by chomping down on targets with its\nsharp incisors or front fangs. The damage dealt by this\nmove depends on targets’ HP."
    fr: "Le lanceur inflige une vilaine morsure avec ses incisives.\nLes dégâts varient en fonction des PV de la cible."
    it: "Il Pokémon attacca il bersaglio azzannandolo con i suoi\nincisivi affilati e infliggendo una quantità di danni che\ncambia in base ai PS del bersaglio."
    de: "Der Anwender beißt mit scharfen Vorderzähnen stark zu.\nDer Schaden richtet sich nach den KP des Zieles."
    es: "Asesta una dentellada con sus afilados incisivos. El daño\nque inflige varía según los PS del objetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대의 HP에 따라 데미지가 변화한다."
    zh_simp: "用锋利的门牙\n猛烈地咬紧进行攻击。\n伤害会根据对手的ＨＰ而改变。"
    zh_trad: "用銳利的門牙\n猛烈地咬住對手進行攻擊。\n傷害會根據對手的ＨＰ而改變。"
    es_latam: "Lanza un mordisco con sus afilados incisivos. El daño\nque inflige varía según los PS del objetivo."
