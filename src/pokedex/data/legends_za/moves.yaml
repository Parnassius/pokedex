  descriptions:
    jp_kanji: "一瞬の隙をついて\n相手を切りはらう。\n急所に当たりやすい。"
    en: "The user attacks by slashing the instant an opportunity\narises. This move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur lacère la cible à la première occasion.\nTaux de critiques élevé."
    it: "Il Pokémon colpisce il bersaglio appena si presenta\nl’occasione. Probabile brutto colpo."
    de: "Der Anwender schneidet das Ziel bei der ersten\nGelegenheit. Hohe Volltrefferquote."
    es: "Ataca al objetivo a la primera oportunidad. Suele asestar\nun golpe crítico."
    ko: "순간적으로 틈을 노려\n상대를 베어 버린다.\n급소에 맞기 쉽다."
    zh_simp: "抓住瞬间的空隙\n切斩对手。\n容易击中要害。"
    zh_trad: "抓住瞬間的空隙\n斬切對手。\n容易擊中要害。"
    es_latam: "Ataca al objetivo a la primera oportunidad. Suele lanzar\nun golpe crítico."
nightmare:
  names:
    jp_kanji: あくむ
    en: Nightmare
    fr: Cauchemar
    it: Incubo
    de: Nachtmahr
    es: Pesadilla
    ko: 악몽
    zh_simp: 恶梦
    zh_trad: 惡夢
    es_latam: Pesadilla
nihil_light:
  names:
    jp_kanji: ￹無￺む￻に￹帰￺き￻す￹光￺ひかり￻
    en: Nihil Light
    fr: Lux Nihilum
    it: Tabula Laser
    de: Tilgungslicht
    es: Luz Devastadora
    ko: 니힐레이저
    zh_simp: 归无之光
    zh_trad: 歸無之光
    es_latam: Luz Devastadora
  descriptions:
    jp_kanji: "あらゆる法則を無視する強い光を放つ。\nフェアリータイプのポケモンにも当たり\n相手の能力変化に関係なくダメージを与える。"
    en: "The user attacks by unleashing a powerful light that\ndefies all laws of nature, striking even Fairy types and\nignoring any stat changes affecting its targets."
    fr: "Le lanceur ignore les lois de l’univers et libère un puissant\nrayon de lumière qui ignore les changements de stats de\nla cible et inflige aussi des dégâts aux Pokémon Fée."
    it: "Il Pokémon lancia un potente raggio che va oltre le leggi\ndella natura. Ignora le modifiche alle statistiche del\nbersaglio e infligge danni anche ai Pokémon Folletto."
    de: "Der Anwender entfesselt ein Licht, das die Naturgesetze\nbricht und unabhängig von den Statusveränderungen\ndes Zieles Schaden zufügt, auch bei Feen-Pokémon."
    es: "Desata una poderosa luz que ignora todas las leyes de\nla naturaleza. Puede golpear a Pokémon de tipo Hada\ne ignora los cambios en las características del rival."
    ko: "온갖 법칙을 무시하는 강한 빛을 발사한다.\n페어리타입 포켓몬에게도 맞으며\n상대의 능력 변화에 상관없이 데미지를 준다."
    zh_simp: "释放无视所有法则的强光。\n连妖精属性的宝可梦也能击中，\n可不顾对手的能力变化给予伤害。"
    zh_trad: "釋放無視萬物法則的強烈光芒。\n連妖精屬性的寶可夢也能擊中，\n可不顧對手的能力變化給予傷害。"
    es_latam: "Desata una poderosa luz que ignora todas las leyes de\nla naturaleza. Puede golpear a Pokémon de tipo Hada\ne ignorar los cambios en las características del rival."
no_retreat:
  names:
    jp_kanji: はいすいのじん
    en: No Retreat
    fr: Ultime Bastion
    it: Spalle al Muro
    de: Finalformation
    es: Bastión Final
    ko: 배수의진
    zh_simp: 背水一战
    zh_trad: 背水一戰
    es_latam: Bastión Final
  descriptions:
    jp_kanji: "覚悟を決めて\n少しのあいだ自分のすべての能力が上がるが\n交代することができなくなる。"
    en: "The user puts everything on the line and boosts all its\nstats for a short time. In exchange, the user temporarily\nloses the ability to switch out of battle."
    fr: "Le lanceur montre sa détermination et toutes ses stats\naugmentent pendant un court instant. En contrepartie,\nil ne peut plus quitter le terrain."
    it: "Il Pokémon si mostra risoluto e aumenta tutte le sue\nstatistiche per un po’ di tempo, durante il quale non\npuò essere sostituito."
    de: "Der Anwender macht sich auf alles gefasst und erhöht\nfür kurze Zeit sämtliche Statuswerte. Währenddessen\nkann er nicht ausgewechselt werden."
    es: "El usuario se prepara para lo que venga y aumenta todas\nsus características durante un breve período de tiempo,\npero ya no puede ser cambiado por otro."
    ko: "각오를 다져서\n잠시 동안 자신의 모든 능력이 올라가지만\n교체할 수 없게 된다."
    zh_simp: "下定决心，在一小段时间内\n提高自己的所有能力，\n但无法进行替换。"
    zh_trad: "下定決心後在一小段時間內\n自己所有的能力會提高，\n但無法進行替換。"
    es_latam: "El usuario se prepara para lo que sea y aumenta todas\nsus características durante un breve periodo, pero ya no\nse puede cambiar por otro."
noble_roar:
  names:
    jp_kanji: おたけび
    en: Noble Roar
    fr: Râle Mâle
    it: Urlo
    de: Kampfgebrüll
    es: Rugido de Guerra
    ko: 부르짖기
    zh_simp: 战吼
    zh_trad: 戰吼
    es_latam: Rugido de Guerra
noxious_torque:
  names:
    jp_kanji: ポイズンアクセル
    en: Noxious Torque
    fr: Crash Toxique
    it: Turbotossina
    de: Toxiturbo
    es: Ponzochoque
    ko: 포이즌액셀
    zh_simp: 剧毒暴冲
    zh_trad: 劇毒暴衝
    es_latam: Ponzochoque
nuzzle:
  names:
    jp_kanji: ほっぺすりすり
    en: Nuzzle
    fr: Frotte-Frimousse
    it: Elettrococcola
    de: Wangenrubbler
    es: Moflete Estático
    ko: 볼부비부비
    zh_simp: 蹭蹭脸颊
    zh_trad: 蹭蹭臉頰
    es_latam: Frote
  descriptions:
    jp_kanji: "電気を帯びたほっぺを\nすりつけて攻撃。\n相手をまひ状態にする。"
    en: "The user attacks by nuzzling targets with its electrified\ncheeks. This leaves targets paralyzed."
    fr: "Le lanceur attaque la cible en frottant ses bajoues\nchargées d’électricité, ce qui la paralyse."
    it: "Il Pokémon attacca strofinando le guance elettrizzate\ncontro il bersaglio, paralizzandolo."
    de: "Der Anwender greift an, indem er seine elektrisch\ngeladenen Wangen am Ziel reibt. Getroffene Gegner\nwerden paralysiert."
    es: "El usuario frota sus mofletes cargados de electricidad\ncontra el objetivo para dañarlo y paralizarlo."
    ko: "전기를 띠는 볼을 비벼서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "将带电的脸颊\n蹭蹭对手进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "用帶電的臉頰\n磨蹭對手進行攻擊。\n能讓對手陷入麻痺狀態。"
    es_latam: "El usuario frota sus mejillas cargadas de electricidad\ncontra el objetivo para dañarlo y paralizarlo."
oblivion_wing:
  names:
    jp_kanji: デスウイング
    en: Oblivion Wing
    fr: Mort’Ailes
    it: Ali del Fato
    de: Unheilsschwingen
    es: Ala Mortífera
    ko: 데스윙
    zh_simp: 归天之翼
    zh_trad: 死亡之翼
    es_latam: Ala del Olvido
  descriptions:
    jp_kanji: "破壊の衝動を放ち\nねらいを定めた相手からＨＰを吸い取り\n自分のＨＰを回復する。"
    en: "The user unleashes a wave of destruction to absorb HP\nfrom targets and restore the user’s own HP."
    fr: "Le lanceur libère une vague d’énergie destructrice\net aspire les PV de la cible pour se soigner."
    it: "Il Pokémon rilascia un impulso distruttivo e assorbe\nenergia dal bersaglio, recuperando PS."
    de: "Der Anwender entfesselt seinen Zerstörungsdrang und\nraubt getroffenen Gegnern KP, um dadurch selbst KP\nzu regenerieren."
    es: "El usuario libera una onda destructiva que absorbe\nenergía del objetivo y le permite recuperar PS."
    ko: "파괴의 충동을 발산한다.\n조준한 상대의 HP를 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "释放想要破坏的冲动，\n从锁定的对手身上吸取ＨＰ\n来回复自己的ＨＰ。"
    zh_trad: "釋放破壞的衝動，\n從鎖定的對手身上吸取ＨＰ，\n回復自己的ＨＰ。"
    es_latam: "El usuario libera una onda destructiva que absorbe\nenergía del objetivo y le permite recuperar PS."
obstruct:
  names:
    jp_kanji: ブロッキング
    en: Obstruct
    fr: Blocage
    it: Sbarramento
    de: Abblocker
    es: Obstrucción
    ko: 블로킹
    zh_simp: 拦堵
    zh_trad: 攔堵
    es_latam: Obstrucción
octazooka:
  names:
    jp_kanji: オクタンほう
    en: Octazooka
    fr: Octazooka
    it: Octazooka
    de: Octazooka
    es: Pulpocañón
    ko: 대포무노포
    zh_simp: 章鱼桶炮
    zh_trad: 章魚桶炮
    es_latam: Octazuca
octolock:
  names:
    jp_kanji: たこがため
    en: Octolock
    fr: Octoprise
    it: Tentacolock
    de: Octoklammer
    es: Octopresa
    ko: 문어굳히기
    zh_simp: 蛸固
    zh_trad: 蛸固
    es_latam: Octopresa
  descriptions:
    jp_kanji: "相手を逃げられなくする。\nかためられた相手はしばらくのあいだ\n防御と特防が下がり続ける。"
    en: "The user locks targets in and prevents them from fleeing.\nThis move also continually lowers the targets’ Defense\nand Sp. Def stats for a while."
    fr: "Le lanceur empêche la cible de s’échapper.\nLa Défense et la Défense Spéciale de celle-ci\nbaissent en continu pendant un certain temps."
    it: "Il Pokémon impedisce al bersaglio di fuggire. Mentre\nè immobilizzato la sua Difesa e la sua Difesa Speciale\ncontinueranno a diminuire per un certo tempo."
    de: "Der Anwender hindert das Ziel an der Flucht und am\nAuswechseln. Die Verteidigung und Spezial-Verteidigung\ndes Zieles werden für einige Zeit kontinuierlich gesenkt."
    es: "Retiene al objetivo e impide que pueda huir o ser\ncambiado por otro, a la vez que reduce de forma gradual\nsu Defensa y su Defensa Especial durante un tiempo."
    ko: "상대를 도망칠 수 없게 한다.\n굳히기에 당한 상대는 한동안\n방어와 특수방어가 계속 떨어진다."
    zh_simp: "让对手无法逃走。\n对手被固定后，会在一段时间内\n持续降低防御和特防。"
    zh_trad: "讓對手無法逃走。\n對手被纏住後，在一段時間內\n防禦和特防會持續降低。"
    es_latam: "Retiene al objetivo e impide que pueda huir o ser\ncambiado por otro, a la vez que reduce de forma gradual\nsu Defensa y su Defensa Especial durante un tiempo."
odor_sleuth:
  names:
    jp_kanji: かぎわける
    en: Odor Sleuth
    fr: Flair
    it: Segugio
    de: Schnüffler
    es: Rastreo
    ko: 냄새구별
    zh_simp: 气味侦测
    zh_trad: 氣味偵測
    es_latam: Rastreo
ominous_wind:
  names:
    jp_kanji: あやしいかぜ
    en: Ominous Wind
    fr: Vent Mauvais
    it: Funestovento
    de: Unheilböen
    es: Viento Aciago
    ko: 괴상한바람
    zh_simp: 奇异之风
    zh_trad: 奇異之風
    es_latam: Viento Ominoso
  descriptions:
    jp_kanji: "みのけもよだつ突風で\n相手を攻撃する。自分の\nすべての能力があがることがある。"
    en: "The user attacks with a gust of horrible wind that makes\ntargets’ skin crawl. This may also boost all the user’s\nstats at once."
    fr: "Le lanceur frappe en créant une violente bourrasque.\nPeut aussi augmenter toutes ses stats."
    it: "Il Pokémon attacca il bersaglio con una raffica di vento\nraccapricciante che può anche aumentare tutte le proprie\nstatistiche."
    de: "Der Anwender greift das Ziel mit abscheulichem Wind an.\nEventuell werden sämtliche seiner Statuswerte erhöht."
    es: "Ataca con un viento horripilante que además puede\naumentar todas las características del usuario."
    ko: "소름이 끼칠 만한 돌풍으로 상대를 공격한다.\n자신의 모든 능력이 올라갈 때가 있다."
    zh_simp: "突然刮起毛骨悚然的暴风\n攻击对手。有时会提高\n自己的全部能力。"
    zh_trad: "用令人毛骨悚然\n的強風攻擊對手。\n有時會提高自己的所有能力。"
    es_latam: "Ataca con un viento horripilante que, además, puede\naumentar todas las características del usuario."
order_up:
  names:
    jp_kanji: いっちょうあがり
    en: Order Up
    fr: Plat du Jour
    it: Alta Cucina
    de: Auftischen
    es: Oído Cocina
    ko: 한판내기
    zh_simp: 上菜
    zh_trad: 上菜
    es_latam: Emplatar
origin_pulse:
  names:
    jp_kanji: こんげんのはどう
    en: Origin Pulse
    fr: Onde Originelle
    it: Primopulsar
    de: Ursprungswoge
    es: Pulso Primigenio
    ko: 근원의파동
    zh_simp: 根源波动
    zh_trad: 根源波動
    es_latam: Pulso Primigenio
  descriptions:
    jp_kanji: "青白く輝く無数の光線で\n相手を攻撃する。"
    en: "The user attacks targets with countless beams of light\nthat glow a bluish white."
    fr: "Le lanceur attaque en projetant d’innombrables rayons\nde lumière d’un bleu étincelant."
    it: "Il Pokémon attacca il bersaglio colpendolo con miriadi\ndi raggi di luce blu."
    de: "Der Anwender greift das Ziel mit unzähligen blau\nleuchtenden Strahlen an."
    es: "Ataca al objetivo con una infinidad de rayos de luz\nazulada."
    ko: "파랗게 빛나는 무수한 광선으로\n상대를 공격한다."
    zh_simp: "用无数青白色\n且闪耀的光线攻击对手。"
    zh_trad: "放出無數閃耀著青白色光輝的\n光線攻擊對手。"
    es_latam: "Ataca al objetivo con una infinidad de rayos de luz\nazulada."
outrage:
  names:
    jp_kanji: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
    zh_simp: 逆鳞
    zh_trad: 逆鱗
    es_latam: Enfado
  descriptions:
    jp_kanji: "激怒して攻撃する。\n技をだしたあと混乱する。"
    en: "The user attacks in a furious rampage, then becomes\nconfused."
    fr: Le lanceur enrage et attaque avant de devenir confus.
    it: "Il Pokémon s’infuria e attacca, ma dopo aver usato\nla mossa rimane confuso."
    de: "Der Anwender gerät in Rage und greift an. Nach Einsatz\nder Attacke ist er verwirrt."
    es: El usuario ataca enfurecido y, después, se queda confuso.
    ko: "격노하며 공격한다.\n기술을 사용한 다음 혼란에 빠진다."
    zh_simp: "勃然大怒进行攻击。\n招式结束后自己会陷入混乱。"
    zh_trad: "勃然大怒進行攻擊。\n招式結束後自己會陷入混亂。"
    es_latam: "El usuario ataca enfurecido y, después, se queda\nconfundido."
overdrive:
  names:
    jp_kanji: オーバードライブ
    en: Overdrive
    fr: Overdrive
    it: Overdrive
    de: Overdrive
    es: Amplificador
    ko: 오버드라이브
    zh_simp: 破音
    zh_trad: 破音
    es_latam: Amplificador
  descriptions:
    jp_kanji: "ギターやベースをかきならして\n激しく響く大きな振動を\n相手に与えて攻撃する。"
    en: "The user attacks targets by twanging a guitar or bass\nguitar, causing a huge echo and strong vibration."
    fr: "Le lanceur gratte ses cordes de guitare ou de basse\npour créer de violentes vibrations sonores qui blessent\nla cible."
    it: "Il Pokémon suona la chitarra o il basso creando un’onda\nsonora potentissima con cui attacca il bersaglio."
    de: "Der Anwender haut in die Saiten seiner Gitarre oder\nseines Basses und greift das Ziel mit dröhnenden,\nkraftvollen Vibrationen an."
    es: "El usuario rasguea la guitarra o el bajo para generar\nenormes vibraciones de intensa reverberación con las\nque ataca al objetivo."
    ko: "기타나 베이스를 쳐서\n큰 울림과 강한 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "奏响吉他和贝斯，释放出\n发出巨响的剧烈震动\n攻击对手。"
    zh_trad: "彈奏吉他和貝斯，\n用發出巨響的激烈震動\n攻擊對手。"
    es_latam: "El usuario rasguea la guitarra o el bajo para generar\nenormes vibraciones de intensa reverberación con las\nque ataca al objetivo."
overheat:
  names:
    jp_kanji: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
    zh_simp: 过热
    zh_trad: 過熱
    es_latam: Supercalor
  descriptions:
    jp_kanji: "フルパワーで相手を攻撃する。\n使うと反動で\nしばらくのあいだ自分の特攻が下がる。"
    en: "The user attacks with all the power it can muster.\nThe recoil will lower the user’s Sp. Atk stat for a while."
    fr: "Le lanceur attaque la cible à pleine puissance.\nLe contrecoup baisse l’Attaque Spéciale du lanceur\npendant un certain temps."
    it: "Il Pokémon sferra un potente attacco, ma il contraccolpo\nriduce il suo Attacco Speciale per un certo tempo."
    de: "Der Anwender greift das Ziel mit voller Kraft an.\nDurch den Rückstoß wird der Spezial-Angriff des\nAnwenders für einige Zeit gesenkt."
    es: "Ataca al objetivo con toda su fuerza, pero reduce\nel Ataque Especial del usuario durante un tiempo."
    ko: "풀 파워로 상대를 공격한다.\n사용하면 반동으로\n한동안 자신의 특수공격이 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后因为反作用力，\n在一段时间内自己的特攻会降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n在一段時間內自己的特攻會降低。"
    es_latam: "Ataca al objetivo con toda su fuerza, pero reduce\nel Ataque Especial del usuario durante un tiempo."
pain_split:
  names:
    jp_kanji: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
    zh_simp: 分担痛楚
    zh_trad: 分擔痛楚
    es_latam: Dividedolor
parabolic_charge:
  names:
    jp_kanji: パラボラチャージ
    en: Parabolic Charge
    fr: Parabocharge
    it: Caricaparabola
    de: Parabolladung
    es: Carga Parábola
    ko: 파라볼라차지
    zh_simp: 抛物面充电
    zh_trad: 拋物面充電
    es_latam: Carga Parabólica
  descriptions:
    jp_kanji: "電撃を放って攻撃する。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by unleashing a wave of electricity.\nThe user’s HP will be restored by a portion of the damage\ndealt."
    fr: "Une attaque qui libère une décharge électrique sur\nla cible et convertit une partie des dégâts infligés\nen PV pour le lanceur."
    it: "Il Pokémon attacca rilasciando una scossa elettrica\ne recupera una quantità di PS pari a una parte\ndel danno inflitto."
    de: "Der Anwender greift mit einem Stromstoß an und\nregeneriert einen Teil des dabei zugefügten Schadens\nals KP."
    es: "Ataca con una descarga eléctrica. El usuario recupera\nalgunos PS según el daño que produzca."
    ko: "전격을 방출하여 공격한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "释放电击进行攻击。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "放出電流進行攻擊。\n可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Ataca con una descarga eléctrica. El usuario recupera\nalgunos PS según el daño que produzca."
parting_shot:
  names:
    jp_kanji: すてゼリフ
    en: Parting Shot
    fr: Dernier Mot
    it: Monito
    de: Abgangstirade
    es: Última Palabra
    ko: 막말내뱉기
    zh_simp: 抛下狠话
    zh_trad: 拋下狠話
    es_latam: Última Palabra
  descriptions:
    jp_kanji: "すてゼリフで相手を　いかくし\n少しのあいだ相手の攻撃と特攻を下げて\n自分はトレーナーの近くにもどる。"
    en: "The user intimidates targets with a parting threat before\nrushing back to its Trainer. This lowers targets’ Attack\nand Sp. Atk stats for a short time."
    fr: "Le lanceur menace la cible et revient près de son\nDresseur ou de sa Dresseuse. Baisse l’Attaque et\nl’Attaque Spéciale de la cible pendant un court instant."
    it: "Il Pokémon riduce l’Attacco e l’Attacco Speciale del\nbersaglio per un po’ di tempo lanciando un monito\nintimidatorio, per poi tornare vicino al proprio Allenatore."
    de: "Der Anwender schüchtert das Ziel ein und kehrt dann an\ndie Seite seines Trainers zurück. Der Angriff und Spezial-\nAngriff getroffener Gegner wird für kurze Zeit gesenkt."
    es: "El usuario regresa con su Entrenador, pero antes intimida\nal objetivo y reduce su Ataque y su Ataque Especial\ndurante un breve período de tiempo."
    ko: "막말을 내뱉어 상대를 위협하여\n잠시 동안 상대의 공격과 특수공격을 떨어뜨린 후\n자신은 트레이너의 곁으로 돌아온다."
    zh_simp: "抛下狠话威吓对手，\n在一小段时间内降低对手的攻击和特攻，\n自己会回到训练家的身边。"
    zh_trad: "拋下狠話恐嚇對手，\n在一小段時間內降低對手的攻擊和特攻，\n自己則返回到訓練家的身邊。"
    es_latam: "El usuario regresa con su Entrenador, pero antes intimida\nal objetivo y reduce su Ataque y su Ataque Especial\ndurante un breve periodo."
pay_day:
  names:
    jp_kanji: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
    zh_simp: 聚宝功
    zh_trad: 聚寶功
    es_latam: Día de Pago
  descriptions:
    jp_kanji: "相手の体に\n小判を投げつけて攻撃する。\n相手に当たるとお金がもらえる。"
    en: "The user attacks by hurling coins at targets. If a target is\nsuccessfully struck, you will earn money."
    fr: "Le lanceur attaque en projetant des pièces.\nElles permettent d’obtenir de l’argent\nsi elles touchent la cible."
    it: "Il Pokémon attacca il bersaglio con delle monete.\nSe colpisce il bersaglio, ottieni dei soldi."
    de: "Der Anwender greift an, indem er das Ziel mit Münzen\nbewirft. Wenn die Attacke trifft, wird Geld aufgesammelt."
    es: "Ataca al objetivo arrojándole monedas. Si acierta,\nlas recupera en forma de ganancias."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n상대에게 맞으면 돈을 받을 수 있다."
    zh_simp: "向对手的身体\n投掷小金币进行攻击。\n打中对手后可以拿到钱。"
    zh_trad: "往對手身上\n投擲金幣進行攻擊。\n擊中對手就可以得到錢。"
    es_latam: "Ataca al objetivo arrojándole monedas. Si acierta,\nlas recupera en forma de ganancias."
payback:
  names:
    jp_kanji: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
    zh_simp: 以牙还牙
    zh_trad: 以牙還牙
    es_latam: Revancha
peck:
  names:
    jp_kanji: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Pikser
    es: Picotazo
    ko: 쪼기
    zh_simp: 啄
    zh_trad: 啄
    es_latam: Picotazo
  descriptions:
    jp_kanji: "鋭くとがったくちばしや　つので\n相手を突いて攻撃する。"
    en: "The user attacks by jabbing targets with a sharply pointed\nbeak or horn."
    fr: "Le lanceur attaque la cible avec son bec acéré ou\nsa corne pointue."
    it: "Il Pokémon attacca il bersaglio con il becco appuntito\no con un corno."
    de: "Der Anwender greift das Ziel mit einem äußerst\nspitzen Schnabel oder Horn an."
    es: Ensarta al objetivo con un cuerno o pico punzante.
    ko: "날카롭고 뾰족한 부리나 뿔로\n상대를 쪼아서 공격한다."
    zh_simp: "用尖锐的喙或角\n刺向对手进行攻击。"
    zh_trad: "用尖銳的喙或角\n刺向對手進行攻擊。"
    es_latam: Ensarta al objetivo con un cuerno o pico punzante.
perish_song:
  names:
    jp_kanji: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
    zh_simp: 终焉之歌
    zh_trad: 滅亡之歌
    es_latam: Canto Mortal
  descriptions:
    jp_kanji: "歌を聴いたポケモンは\nしばらくたつとひんしになる。\n交代すると効果はなくなる。"
    en: "Any Pokémon that hears this song will faint after a while,\nunless they switch out of battle."
    fr: "Tout Pokémon qui entend ce requiem est mis K.O. au\nbout d’un certain temps, à moins d’être remplacé."
    it: "Qualunque Pokémon che senta questo canto va KO\ndopo un po’ di tempo, a meno che non venga sostituito."
    de: "Pokémon, die dieses Lied hören, werden nach einiger\nZeit kampfunfähig. Der Effekt wird beim Auswechseln\naufgehoben."
    es: "Si un Pokémon escucha este canto y no es cambiado\npor otro, se debilita tras un tiempo."
    ko: "노래를 들은 포켓몬은\n얼마 후 기절한다.\n교체되면 효과가 사라진다."
    zh_simp: "倾听歌声的宝可梦\n经过一段时间后会陷入昏厥。\n替换后效果消失。"
    zh_trad: "聽了歌聲的寶可夢\n在一段時間後將陷入瀕死。\n替換寶可夢後效果就會消失。"
    es_latam: "Si un Pokémon escucha este canto y no se cambia\npor otro, se debilita tras un tiempo."
petal_blizzard:
  names:
    jp_kanji: はなふぶき
    en: Petal Blizzard
    fr: Tempête Florale
    it: Fiortempesta
    de: Blütenwirbel
    es: Tormenta Floral
    ko: 꽃보라
    zh_simp: 落英缤纷
    zh_trad: 落英繽紛
    es_latam: Tormenta Pétalos
petal_dance:
  names:
    jp_kanji: はなびらのまい
    en: Petal Dance
    fr: Danse Fleurs
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
    zh_simp: 花瓣舞
    zh_trad: 花瓣舞
    es_latam: Danza de Pétalos
  descriptions:
    jp_kanji: "３回連続で\n花をまきちらして相手を攻撃する。\nまきちらしたあとは混乱する。"
    en: "The user attacks by scattering petals in three waves, one\nafter another. The user then becomes confused."
    fr: "Le lanceur attaque trois fois d’affilée en projetant\ndes pétales avant de plonger dans la confusion."
    it: "Il Pokémon attacca il bersaglio tre volte in rapida\nsuccessione cospargendolo di petali, ma rimane confuso."
    de: "Der Anwender greift das Ziel dreimal hintereinander an,\nindem er Blütenblätter verstreut. Danach ist er verwirrt."
    es: "Ataca al objetivo lanzando pétalos tres veces seguidas y,\nal finalizar, el usuario se queda confuso."
    ko: "3회 연속으로\n꽃을 흩뿌려서 상대를 공격한다.\n흩뿌린 뒤에는 혼란에 빠진다."
    zh_simp: "连续３次\n散落花瓣攻击对手。\n之后自己会陷入混乱。"
    zh_trad: "連續３次灑出花瓣攻擊對手。\n招式結束後自己會陷入混亂狀態。"
    es_latam: "Ataca al objetivo lanzando pétalos tres veces seguidas\ny, al finalizar, el usuario se queda confundido."
phantom_force:
  names:
    jp_kanji: ゴーストダイブ
    en: Phantom Force
    fr: Hantise
    it: Spettrotuffo
    de: Phantomkraft
    es: Golpe Fantasma
    ko: 고스트다이브
    zh_simp: 潜灵奇袭
    zh_trad: 潛靈奇襲
    es_latam: Golpe Fantasma
  descriptions:
    jp_kanji: "闇にまぎれて姿を消し\n少ししてから相手をめがけて攻撃する。\nまもるや　みきりなども無視できる。"
    en: "The user attacks by disappearing into the shadows for a\nshort time, then surfacing to strike targets. This attack\ncan hit targets using moves such as Protect or Detect."
    fr: "Le lanceur se fond dans les ténèbres et disparaît. Après\nun court instant, il attaque en se précipitant sur la cible.\nIgnore les capacités comme Abri ou Détection."
    it: "Il Pokémon si nasconde tra le ombre per attaccare\nil bersaglio poco dopo, ignorando l’effetto di mosse\ncome Protezione e Individua."
    de: "Der Anwender verschwindet in der Dunkelheit und greift\nnach kurzer Zeit das Ziel an. Dabei durchbricht er\nAttacken wie Schutzschild und Scanner."
    es: "Se oculta en las sombras hasta quedar fuera de vista y,\ntras un breve período de tiempo, ataca al objetivo. Ignora\nlos efectos de movimientos como Protección y Detección."
    ko: "어둠 속으로 사라져 모습을 숨긴 뒤\n잠시 후 상대를 공격한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "藏身于黑暗中，\n片刻之后瞄准对手进行攻击。\n还可以无视守住和看穿等招式。"
    zh_trad: "融入黑暗銷聲匿跡，\n在片刻後朝向對手發動攻擊。\n可避開對手的守住和看穿等招式。"
    es_latam: "Se oculta en las sombras hasta quedar fuera de vista\ny, luego de un breve periodo, ataca al objetivo. Ignora\nlos efectos de movimientos como Protección y Detección."
photon_geyser:
  names:
    jp_kanji: フォトンゲイザー
    en: Photon Geyser
    fr: Photo-Geyser
    it: Geyser Fotonico
    de: Photonen-Geysir
    es: Géiser Fotónico
    ko: 포톤가이저
    zh_simp: 光子喷涌
    zh_trad: 光子噴湧
    es_latam: Géiser Fotónico
pika_papow:
  names:
    jp_kanji: ピカピカサンダー
    en: Pika Papow
    fr: Pika-Fracas
    it: Pikasaetta
    de: Pika-Flash
    es: Pikatormenta
    ko: 피카피카썬더
    zh_simp: 闪闪雷光
    zh_trad: 閃閃雷光
    es_latam: Pikatormenta
pin_missile:
  names:
    jp_kanji: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
    zh_simp: 飞弹针
    zh_trad: 飛彈針
    es_latam: Misil Aguja
  descriptions:
    jp_kanji: "鋭いハリを\n５回連続で発射して攻撃する。"
    en: "The user attacks by shooting out five sharp spikes, one\nafter the other."
    fr: "Le lanceur envoie une volée de dards acérés\ncinq fois d’affilée."
    it: "Il Pokémon attacca cinque volte in rapida successione\ncon delle spine appuntite."
    de: "Der Anwender feuert fünfmal hintereinander spitze\nNadeln ab."
    es: "Lanza afiladas púas que hieren al objetivo cinco veces\nseguidas."
    ko: "날카로운 침을\n5회 연속으로 발사하여 공격한다."
    zh_simp: 连续发射５次锐针进行攻击。
    zh_trad: "連續發射５次\n銳利的針進行攻擊。"
    es_latam: "Lanza afiladas púas que hieren al objetivo cinco veces\nseguidas."
plasma_fists:
  names:
    jp_kanji: プラズマフィスト
    en: Plasma Fists
    fr: Plasma Punch
    it: Pugni Plasma
    de: Plasmafäuste
    es: Puños Plasma
    ko: 플라스마피스트
    zh_simp: 等离子闪电拳
    zh_trad: 等離子閃電拳
    es_latam: Puños Plasma
  descriptions:
    jp_kanji: "電気をまとったこぶしで攻撃。\nたまにひるませることがあり、\n急所にも当たりやすい。"
    en: "The user attacks with electrically charged fists. This move\nhas a heightened chance of landing a critical hit and may\nalso make targets flinch."
    fr: "Le lanceur attaque en projetant de l’électricité avec\nses poings. Peut apeurer la cible. Taux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio con pugni carichi\ndi elettricità che possono anche farlo tentennare.\nProbabile brutto colpo."
    de: "Der Anwender greift mit elektrisch geladenen Fäusten\nan. Getroffene Gegner schrecken eventuell zurück.\nHohe Volltrefferquote."
    es: "El usuario ataca con puños cargados de electricidad.\nSuele asestar un golpe crítico y también puede\namedrentar al objetivo."
    ko: "전기를 두른 주먹으로 공격한다.\n가끔 상대를 풀죽게 만들 때가 있으며,\n급소에도 맞기 쉽다."
    zh_simp: "用覆盖着电流的拳头进行攻击。\n偶尔会使对手畏缩，\n也容易击中要害。"
    zh_trad: "用帶有電流的拳頭進行攻擊。\n有時會使對手畏縮\n且容易擊中要害。"
    es_latam: "El usuario ataca con puños cargados de electricidad.\nSuele lanzar un golpe crítico y también puede\natemorizar al objetivo."
play_nice:
  names:
    jp_kanji: なかよくする
    en: Play Nice
    fr: Camaraderie
    it: Simpatia
    de: Kameradschaft
    es: Camaradería
    ko: 친해지기
    zh_simp: 和睦相处
    zh_trad: 和睦相處
    es_latam: Camaradería
play_rough:
  names:
    jp_kanji: じゃれつく
    en: Play Rough
    fr: Câlinerie
    it: Carineria
    de: Knuddler
    es: Carantoña
    ko: 치근거리기
    zh_simp: 嬉闹
    zh_trad: 嬉鬧
    es_latam: Juego Rudo
  descriptions:
    jp_kanji: "じゃれついて攻撃。\n相手の攻撃を下げることもある。"
    en: "The user attacks by playing rough. This may also lower\ntargets’ Attack stats."
    fr: "Le lanceur attaque la cible en lui faisant des câlineries.\nPeut aussi baisser l’Attaque de la cible."
    it: "Il Pokémon attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nDer Angriff getroffener Gegner wird eventuell gesenkt."
    es: "El usuario le hace cucamonas al objetivo y lo ataca.\nPuede reducir el Ataque del objetivo."
    ko: "치근거리며 공격한다.\n상대의 공격을 떨어뜨릴 때가 있다."
    zh_simp: "嬉闹的同时进行攻击。\n有时也会降低对手的攻击。"
    zh_trad: "嬉鬧的同時進行攻擊。\n有時還會降低對手的攻擊。"
    es_latam: "El usuario apapacha al objetivo y lo ataca.\nPuede reducir el Ataque del objetivo."
pluck:
  names:
    jp_kanji: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
    zh_simp: 啄食
    zh_trad: 啄食
    es_latam: Picoteo
poison_fang:
  names:
    jp_kanji: どくどくのキバ
    en: Poison Fang
    fr: Crochet Venin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Veneno
    ko: 맹독엄니
    zh_simp: 剧毒牙
    zh_trad: 劇毒牙
    es_latam: Colmillo Veneno
  descriptions:
    jp_kanji: "毒のあるキバで\n相手にかみついて攻撃する。\n猛毒をおわせることがある。"
    en: "The user attacks by biting targets with toxic fangs. This\nmay also leave targets badly poisoned."
    fr: "Le lanceur mord la cible avec ses crocs toxiques, ce qui\npeut aussi gravement l’empoisonner."
    it: "Il Pokémon attacca il bersaglio mordendolo con denti\navvelenati che possono anche iperavvelenarlo."
    de: "Der Anwender greift an, indem er das Ziel mit giftigen\nReißzähnen beißt. Getroffene Gegner werden eventuell\nschwer vergiftet."
    es: "Mordedura con colmillos venenosos que inflige daño\nal objetivo y puede envenenarlo gravemente."
    ko: "독이 있는 이빨로\n상대를 물어서 공격한다.\n맹독을 주입할 때가 있다."
    zh_simp: "用有毒的牙齿\n咬住对手进行攻击。\n有时会使对手中剧毒。"
    zh_trad: "用有毒的牙齒\n咬住對手進行攻擊。\n有時會讓對手陷入劇毒狀態。"
    es_latam: "Mordedura con colmillos venenosos que le causa daño\nal objetivo y puede envenenarlo gravemente."
poison_gas:
  names:
    jp_kanji: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
    zh_simp: 毒瓦斯
    zh_trad: 毒瓦斯
    es_latam: Gas Venenoso
poison_jab:
  names:
    jp_kanji: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
    zh_simp: 毒击
    zh_trad: 毒擊
    es_latam: Golpe Venenoso
  descriptions:
    jp_kanji: "毒にそまった触手や腕で突き刺す。\n相手を毒状態にすることもある。"
    en: "The user attacks by stabbing targets with a poison-\nsoaked tentacle, arm, or the like. This may also leave\ntargets poisoned."
    fr: "Le lanceur attaque la cible avec un tentacule, un bras,\nou un autre membre imprégné de poison.\nPeut aussi l’empoisonner."
    it: "Il Pokémon infilza il bersaglio con un tentacolo o un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender sticht mit in Gift getränkten Gliedmaßen\nwie Tentakeln oder Armen zu. Getroffene Gegner werden\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo envenenado.\nPuede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로 꿰찌른다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂进行突刺。\n有时也会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂進行突刺攻擊。\n有時還會讓對手陷入中毒狀態。"
    es_latam: "Pincha al objetivo con un tentáculo o brazo envenenado.\nPuede envenenar al objetivo."
poison_powder:
  names:
    jp_kanji: どくのこな
    en: Poison Powder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
    zh_simp: 毒粉
    zh_trad: 毒粉
    es_latam: Polvo Venenoso
  descriptions:
    jp_kanji: "毒のある粉を\nたくさんふりまいて\n相手を毒状態にする。"
    en: "The user scatters a cloud of poisonous powder that\nleaves targets poisoned."
    fr: "Le lanceur répand une poudre toxique qui empoisonne\nla cible."
    it: "Il Pokémon investe il bersaglio con una nuvola di polvere\ntossica che avvelena."
    de: "Der Anwender verstreut jede Menge giftigen Puder,\nder getroffene Gegner vergiftet."
    es: Esparce polvo tóxico que envenena al objetivo.
    ko: "독이 있는 가루를 많이 흩뿌려서\n상대를 독 상태로 만든다."
    zh_simp: "撒出大量的毒粉，\n从而让对手陷入中毒状态。"
    zh_trad: "撒出大量的有毒粉末\n讓對手陷入中毒狀態。"
    es_latam: Esparce polvo tóxico que envenena al objetivo.
poison_sting:
  names:
    jp_kanji: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Veneno
    ko: 독침
    zh_simp: 毒针
    zh_trad: 毒針
    es_latam: Piquete Venenoso
  descriptions:
    jp_kanji: "毒のあるハリを\n突き刺して攻撃する。\n相手を毒状態にすることもある。"
    en: "The user attacks by stabbing targets with a poisonous\nstinger. This may also leave targets poisoned."
    fr: "Un dard toxique qui transperce la cible.\nPeut aussi l’empoisonner."
    it: "Il Pokémon attacca il bersaglio con un aculeo tossico\nche può anche avvelenarlo."
    de: "Der Anwender greift mit einem giftigen Stachel an,\nder getroffene Gegner eventuell vergiftet."
    es: Lanza un aguijón tóxico que puede envenenar al objetivo.
    ko: "독이 있는 침을\n상대에게 꿰찔러서 공격한다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "刺入有毒的针进行攻击。\n有时也会让对手陷入中毒状态。"
    zh_trad: "將有毒的針\n刺進對手進行攻擊。\n有時還會讓對手陷入中毒狀態。"
    es_latam: Lanza un aguijón tóxico que puede envenenar al objetivo.
