  descriptions:
    jp_kanji: "まもりを固め\n相手の攻撃をまったく受けない。"
    en: "The user takes on a protective stance that prevents\nincoming attacks from landing."
    fr: Le lanceur se protège de toutes les attaques.
    it: "Il Pokémon si protegge saldamente, annullando tutti\ngli attacchi ricevuti."
    de: "Der Anwender verstärkt seine Abwehr und wird so vor\njeder Attacke geschützt."
    es: Se defiende con firmeza y frena todos los ataques.
    ko: "방어 태세를 갖추어\n상대의 공격을 전혀 받지 않는다."
    zh_simp: "巩固防守，\n完全抵挡对手的攻击。"
    zh_trad: "鞏固防禦，\n完全防住對手的所有攻擊。"
    es_latam: Se defiende con firmeza y frena todos los ataques.
psybeam:
  names:
    jp_kanji: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
    zh_simp: 幻象光线
    zh_trad: 幻象光線
    es_latam: Psicorrayo
  descriptions:
    jp_kanji: "不思議な光線を\n発射して攻撃する。\n相手を混乱させることもある。"
    en: "The user attacks by shooting targets with a peculiar ray.\nThis may also leave targets confused."
    fr: "Un étrange rayon frappe la cible.\nPeut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio con un raggio speciale\nche può anche confonderlo."
    de: "Der Anwender greift mit einem mysteriösen\nLichtstrahl an, der getroffene Gegner eventuell\nverwirrt."
    es: Ataca con un extraño rayo que puede causar confusión.
    ko: "이상한 광선을 발사하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "发射神奇的光线进行攻击。\n有时也会使对手混乱。"
    zh_trad: "發射神奇的光線進行攻擊。\n有時還會使對手混亂。"
    es_latam: Ataca con un extraño rayo que puede causar confusión.
