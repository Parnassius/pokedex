heat_crash:
  names:
    jp_kanji: ヒートスタンプ
    en: Heat Crash
    fr: Tacle Feu
    it: Marchiafuoco
    de: Brandstempel
    es: Golpe Calor
    ko: 히트스탬프
    zh_simp: 高温重压
    zh_trad: 高溫重壓
    es_latam: Golpe de Calor
  descriptions:
    jp_kanji: "燃える体で\n相手にぶつかって攻撃する。\n自分が相手より重いほど威力があがる。"
    en: "The user attacks by slamming its burning body into\ntargets. The more the user outweighs the target, the\ngreater this move’s power."
    fr: "Le lanceur projette son corps enflammé contre la cible.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon carica con il suo corpo rovente. Più è pesante\nrispetto al bersaglio, maggiore è la potenza della mossa."
    de: "Der Anwender rammt das Ziel mit brennendem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto höher ist\ndie Stärke der Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "불타는 몸으로 상대에게 부딪쳐서 공격한다.\n자신이 상대보다 무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
    es_latam: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
heat_wave:
  names:
    jp_kanji: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
    zh_simp: 热风
    zh_trad: 熱風
    es_latam: Onda Ígnea
  descriptions:
    jp_kanji: "熱い息を\n吹きつけて攻撃する。\n相手をやけど状態にすることもある。"
    en: "The user attacks by exhaling hot breath. This may also\nleave targets with a burn."
    fr: "Le lanceur provoque une vague de chaleur pour attaquer\nla cible. Peut aussi la brûler."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria calda. Può anche scottarlo."
    de: "Der Anwender greift an, indem er einen heißen Atem\nausstößt. Getroffene Gegner erleiden eventuell\nVerbrennungen."
    es: "Provoca un viento abrasador que daña al objetivo y\npuede causar quemaduras."
    ko: "뜨거운 숨결을 내뿜어 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "吹出炎热的气息进行攻击。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "吹出炎熱的氣息進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Provoca un viento abrasador que daña al objetivo\ny puede causar quemaduras."
heavy_slam:
  names:
    jp_kanji: ヘビーボンバー
    en: Heavy Slam
    fr: Tacle Lourd
    it: Pesobomba
    de: Rammboss
    es: Cuerpo Pesado
    ko: 헤비봄버
    zh_simp: 重磅冲撞
    zh_trad: 重磅衝撞
    es_latam: Golpe Pesado
  descriptions:
    jp_kanji: "重たい体で\n相手にぶつかって攻撃する。\n自分が相手より重いほど威力が上がる。"
    en: "The user attacks by slamming its heavy body into targets.\nThe more the user outweighs the target, the greater this\nmove’s power."
    fr: "Le lanceur se jette sur la cible de tout son poids.\nPlus il est lourd par rapport à la cible, plus la puissance\nde cette capacité augmente."
    it: "Il Pokémon si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto al bersaglio,\nmaggiore è la potenza della mossa."
    de: "Der Anwender rammt das Ziel mit seinem massiven\nKörper. Je schwerer er im Vergleich zum Ziel ist, desto\nhöher ist die Stärke der Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
    ko: "무거운 몸으로 상대에게 부딪쳐 공격한다.\n자신이 상대보다 무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
    es_latam: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, mayor será\nla potencia del movimiento."
