  descriptions:
    jp_kanji: "眠くなる粉を\nたくさんふりまいて\n相手をねむけ状態にする。"
    en: "The user scatters a cloud of soporific powder that leaves\ntargets drowsy."
    fr: "Le lanceur répand une poudre soporifique qui plonge\nla cible dans un état de somnolence."
    it: "Il Pokémon investe il bersaglio con una nuvola di polvere\nsoporifera che gli causa sonnolenza."
    de: "Der Anwender verstreut jede Menge Schlafpuder,\nder getroffene Gegner schläfrig macht."
    es: Esparce polvo que induce somnolencia en el objetivo.
    ko: "잠이 오는 가루를 많이 흩뿌려서\n상대를 졸음 상태로 만든다."
    zh_simp: "撒出大量的催眠粉，\n从而让对手陷入瞌睡状态。"
    zh_trad: "撒出大量令人想睡的粉末，\n讓對手陷入瞌睡狀態。"
    es_latam: Esparce polvo que induce somnolencia en el objetivo.
