  descriptions:
    jp_kanji: "光をいっぱいに集め\n発射して攻撃する。\n攻撃するまで時間がかかる。"
    en: "The user attacks by gathering a great deal of light and\nthen shooting it at targets. This move takes some time\nto carry out."
    fr: "Le lanceur absorbe une grande quantité de lumière,\npuis envoie un puissant rayon.\nL’attaque prend un certain temps à se déclencher."
    it: "Il Pokémon assorbe luce e poi la emette per attaccare.\nL’attacco richiede tempo."
    de: "Der Anwender absorbiert eine große Menge Licht,\num diese dann gebündelt abzufeuern. Der Angriff\ngeschieht mit Verzögerung."
    es: "Absorbe mucha luz para atacar con un potente rayo de\nenergía. Necesita algo de tiempo antes de poder atacar."
    ko: "빛을 가득 모아\n발사하여 공격한다.\n공격하기까지 시간이 걸린다."
    zh_simp: "收集满满的日光，\n将其发射进行攻击。\n需要一定时间发动攻击。"
    zh_trad: "吸收大量日光後，\n發射光束進行攻擊。\n需要一些時間發動攻擊。"
    es_latam: "Absorbe mucha luz para atacar con un poderoso rayo\nde energía. Necesita algo de tiempo antes de atacar."
solar_blade:
  names:
    jp_kanji: ソーラーブレード
    en: Solar Blade
    fr: Lame Solaire
