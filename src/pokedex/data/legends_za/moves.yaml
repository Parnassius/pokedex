taunt:
  names:
    jp_kanji: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
    zh_simp: 挑衅
    zh_trad: 挑釁
    es_latam: Provocación
  descriptions:
    jp_kanji: "相手を怒らせる。\n少しのあいだ相手は\nダメージを与える技しか出せなくなる。"
    en: "The user taunts targets, sending them into a rage that\nwill allow them to use only damage-dealing moves for a\nshort time."
    fr: "Le lanceur provoque la cible, ce qui oblige celle-ci\nà n’utiliser que des capacités qui infligent des dégâts\npendant un court instant."
    it: "Il Pokémon provoca il bersaglio inducendolo a usare\nsolo mosse che infliggono danni per un po’ di tempo."
    de: "Der Anwender bringt das Ziel in Rage. Getroffene Gegner\nkönnen für kurze Zeit nur noch Attacken einsetzen,\ndie Schaden verursachen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante un breve período de tiempo."
    ko: "상대를 화나게 한다.\n잠시 동안 상대는\n데미지를 주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在一小段时间内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在一小段時間內讓對手\n只能使出給予傷害的招式。"
    es_latam: "Enfurece al objetivo para que solo use movimientos de\nataque durante un breve periodo."
