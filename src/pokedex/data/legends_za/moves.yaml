    ko: 스피드스타
    zh_simp: 高速星星
    zh_trad: 高速星星
    es_latam: Meteoros
  descriptions:
    jp_kanji: "星型の光を発射して\n相手を攻撃する。"
    en: The user attacks by firing star-shaped rays at targets.
    fr: Le lanceur envoie des rayons d’étoiles sur la cible.
    it: Il Pokémon attacca il bersaglio con raggi a forma di stella.
    de: Der Anwender feuert sternförmiges Licht auf das Ziel.
    es: Ataca al objetivo con rayos en forma de estrella.
    ko: "별 모양의 빛을 발사해서\n상대를 공격한다."
    zh_simp: 发射星形的光攻击对手。
    zh_trad: 發射星型光線攻擊對手。
    es_latam: Ataca al objetivo con rayos en forma de estrella.
