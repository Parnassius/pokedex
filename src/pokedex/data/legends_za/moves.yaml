    ko: 열사의대지
    zh_simp: 热沙大地
    zh_trad: 熱沙大地
    es_latam: Arenas Ardientes
  descriptions:
    jp_kanji: "熱く焼けた砂を\n相手にぶつけて攻撃する。\nやけど状態にすることがある。"
    en: "The user attacks by throwing scorching sand at targets.\nThis may also leave targets with a burn."
    fr: "Le lanceur projette du sable chauffé à blanc\nsur la cible, ce qui peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio scagliandogli addosso\ndella sabbia incandescente. Può anche scottarlo."
    de: "Der Anwender greift das Ziel mit brennend heißem\nSand an, durch den getroffene Gegner eventuell\nVerbrennungen erleiden."
    es: "Ataca al objetivo arrojándole arena a temperaturas muy\nelevadas. Puede causar quemaduras."
    ko: "뜨겁게 달궈진 모래를\n상대에게 부딪쳐서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将滚烫的沙子砸向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手投灑熾熱的沙子進行攻擊。\n有時會讓對手陷入灼傷狀態。"
    es_latam: "Ataca al objetivo arrojándole arena a temperaturas muy\nelevadas. Puede causar quemaduras."
scratch:
  names:
