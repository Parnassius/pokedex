    zh_simp: 绞紧
    zh_trad: 絞緊
    es_latam: Apretón
x_scissor:
  names:
    jp_kanji: シザークロス
    en: X-Scissor
    fr: Plaie Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
    zh_simp: 十字剪
    zh_trad: 十字剪
    es_latam: Tijera X
  descriptions:
    jp_kanji: "カマやツメを　ハサミのように\n交差させながら相手を切り裂く。"
    en: "The user attacks using scythes, claws, or the like as if\nthey were a pair of scissors."
    fr: "Le lanceur taillade la cible en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Il Pokémon squarcia il bersaglio con un attacco che\nricorda un colpo di forbici."
    de: "Der Anwender kreuzt seine Sicheln oder Klauen wie eine\nSchere und schlitzt das Ziel auf."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
    es_latam: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
yawn:
  names:
    jp_kanji: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
    zh_simp: 哈欠
    zh_trad: 哈欠
    es_latam: Bostezo
zap_cannon:
  names:
    jp_kanji: でんじほう
    en: Zap Cannon
    fr: Élecanon
    it: Elettrocannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
    zh_simp: 电磁炮
    zh_trad: 電磁炮
    es_latam: Electrocañón
  descriptions:
    jp_kanji: "大砲のような\n電気を発射して攻撃する。\n相手を必ずまひ状態にする。"
    en: "The user attacks by firing an electric blast like a cannon.\nThis also leaves targets paralyzed without fail."
    fr: "Le lanceur frappe la cible avec une puissante sphère\nélectrifiée. Paralyse à coup sûr."
    it: "Il Pokémon attacca scagliando una sfera elettrica.\nParalizza sempre il bersaglio."
    de: "Der Anwender greift mit einem kanonenähnlichen\nElektro-Schuss an. Getroffene Gegner werden garantiert\nparalysiert."
    es: "Dispara una descarga eléctrica que causa daño y\nparálisis."
    ko: "대포처럼 전기를 발사해서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "发射大炮一样的\n电流进行攻击。\n必定会使对手陷入麻痹状态。"
    zh_trad: "發射如大炮般的\n電流進行攻擊。\n必定會讓對手陷入麻痺狀態。"
    es_latam: "Dispara una descarga eléctrica que causa daño\ny parálisis."
zen_headbutt:
  names:
    jp_kanji: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
    zh_simp: 意念头锤
    zh_trad: 意念頭錘
    es_latam: Cabezazo Zen
  descriptions:
    jp_kanji: "思念の力を\n額に集めて攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by focusing all its willpower into a fierce\nheadbutt. This may also make targets flinch."
    fr: "Le lanceur concentre son énergie psychique dans\nson front et donne un coup de tête à la cible.\nPeut aussi l’apeurer."
    it: "Il Pokémon concentra le energie psichiche nella testa\ne attacca il bersaglio. Può anche farlo tentennare."
    de: "Der Anwender konzentriert seinen Willen in seiner Stirn\nund greift an. Getroffene Gegner schrecken eventuell\nzurück."
    es: "Concentra su energía psíquica en la cabeza para golpear.\nPuede hacer que el objetivo se amedrente."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将思念的力量集中在\n前额进行攻击。\n有时也会使对手畏缩。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。\n有時還會讓對手畏縮。"
    es_latam: "Concentra su energía psíquica en la cabeza para golpear.\nPuede atemorizar al objetivo."
