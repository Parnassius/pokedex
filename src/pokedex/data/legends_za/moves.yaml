tackle:
  names:
    jp_kanji: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
    zh_simp: 撞击
    zh_trad: 撞擊
    es_latam: Tacleada
  descriptions:
    jp_kanji: "相手にむかって\n全身でぶつかっていき攻撃する。"
    en: "The user attacks by charging forward and slamming into\ntargets with its whole body."
    fr: "Le lanceur charge la cible et la percute de tout\nson poids."
    it: "Il Pokémon attacca il bersaglio lanciandosi contro di lui\ncon tutto il suo corpo."
    de: "Der Anwender greift an, indem er das Ziel mit vollem\nKörpereinsatz rammt."
    es: Embestida con todo el cuerpo.
    ko: "상대를 향해서\n몸 전체를 부딪쳐가며 공격한다."
    zh_simp: "用整个身体\n撞向对手进行攻击。"
    zh_trad: "用整個身體\n撞向對手進行攻擊。"
    es_latam: Embestida con todo el cuerpo.
