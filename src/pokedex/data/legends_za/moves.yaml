    it: Colpo Infernale
    de: Neck Strike
    es: Golpe Mordaza
    ko: 지옥찌르기
    zh_simp: 深渊突刺
    zh_trad: 地獄突刺
    es_latam: Golpe al Cuello
thunder:
  names:
    jp_kanji: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
    zh_simp: 打雷
    zh_trad: 打雷
    es_latam: Trueno
  descriptions:
    jp_kanji: "激しい雷を\n落として攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by dropping a wicked thunderbolt.\nThis may also leave targets paralyzed."
    fr: "La foudre tombe violemment sur la cible.\nPeut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con un fulmine molto\nviolento che può anche paralizzarlo."
    de: "Der Anwender greift an, indem er einen gewaltigen Blitz\nherabfahren lässt. Getroffene Gegner werden eventuell\nparalysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를 떨어뜨려 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "劈下暴雷进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "劈下暴雷進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Un poderoso rayo que le causa daño al objetivo\ny puede paralizarlo."
thunder_cage:
  names:
    jp_kanji: サンダープリズン
    en: Thunder Cage
    fr: Voltageôle
    it: Elettrogabbia
    de: Blitzgefängnis
    es: Electrojaula
    ko: 썬더프리즌
    zh_simp: 雷电囚笼
    zh_trad: 雷電囚籠
    es_latam: Electrojaula
thunder_fang:
  names:
    jp_kanji: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Éclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colmillo Rayo
    ko: 번개엄니
    zh_simp: 雷电牙
    zh_trad: 雷電牙
    es_latam: Colmillo Trueno
  descriptions:
    jp_kanji: "電気をためたキバでかみついて\n相手をひるませたり\nまひ状態にすることもある。"
    en: "The user attacks by biting targets with electrified fangs.\nThis may also make targets flinch or leave them paralyzed."
    fr: "Le lanceur inflige une morsure électrifiée à la cible.\nPeut aussi la paralyser ou l’apeurer."
    it: "Il Pokémon morde con denti elettrificati che possono\nanche paralizzare o far tentennare il bersaglio."
    de: "Der Anwender beißt mit elektrifizierten Fangzähnen zu.\nGetroffene Gegner schrecken eventuell zurück oder\nwerden paralysiert."
    es: "El usuario muerde al objetivo con colmillos electrificados\ny puede hacer que se amedrente o se paralice."
    ko: "전기를 모은 이빨로 문다.\n상대를 풀죽게 하거나\n마비 상태로 만들 때가 있다."
    zh_simp: "用蓄满电流的牙齿咬紧，\n有时也会使对手畏缩\n或陷入麻痹状态。"
    zh_trad: "用蓄滿電流的牙齒咬住對手。\n有時還會讓對手畏縮\n或陷入麻痺狀態。"
    es_latam: "El usuario muerde al objetivo con colmillos electrificados\ny puede atemorizarlo o paralizarlo."
thunder_punch:
  names:
    jp_kanji: かみなりパンチ
    en: Thunder Punch
    fr: Poing Éclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
    zh_simp: 雷电拳
    zh_trad: 雷電拳
    es_latam: Puño Trueno
  descriptions:
    jp_kanji: "電撃をこめたパンチで攻撃して\n相手をまひ状態にすることもある。"
    en: "The user attacks with an electrified punch. This may also\nleave targets paralyzed."
    fr: "Le lanceur attaque la cible d’un coup de poing\nélectrique. Peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con un pugno elettrico\nche può paralizzarlo."
    de: "Der Anwender greift mit einem elektrischen Schlag an,\nder getroffene Gegner eventuell paralysiert."
    es: Puñetazo eléctrico que puede paralizar.
    ko: "전격을 담은 펀치로 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用充满电流的拳头进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用帶有電流的拳頭進行攻擊，\n有時還會讓對手陷入麻痺狀態。"
    es_latam: Puñetazo eléctrico que puede paralizar al objetivo.
thunder_shock:
  names:
    jp_kanji: でんきショック
    en: Thunder Shock
    fr: Éclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
    zh_simp: 电击
    zh_trad: 電擊
    es_latam: Impactrueno
  descriptions:
    jp_kanji: "電気の刺激を\n浴びせて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks with a jolt of electricity. This may also\nleave targets paralyzed."
    fr: "Une décharge électrique frappe la cible.\nPeut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una scarica elettrica\nche può anche paralizzarlo."
    de: "Der Anwender greift mit einem elektrischen Schock an,\nder getroffene Gegner eventuell paralysiert."
    es: "Ataca con una descarga eléctrica que puede paralizar\nal objetivo."
    ko: "전기 자극을 날려서 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "发出电流刺激进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "發出電流刺激進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Ataca con una descarga eléctrica que puede paralizar\nal objetivo."
thunder_wave:
  names:
    jp_kanji: でんじは
    en: Thunder Wave
    fr: Cage Éclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
    zh_simp: 电磁波
    zh_trad: 電磁波
    es_latam: Onda Trueno
  descriptions:
    jp_kanji: "弱い電撃を浴びせることで\n相手をまひ状態にする。"
    en: "The user launches a weak jolt of electricity to leave\ntargets paralyzed."
    fr: "Le lanceur émet une faible décharge électrique\nqui paralyse la cible."
    it: "Il Pokémon colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: "Der Anwender sendet einen schwachen Stromstoß aus,\nder getroffene Gegner paralysiert."
    es: Una ligera descarga que paraliza al objetivo.
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "发出微弱的电击进行攻击。\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
    es_latam: Una ligera descarga que paraliza al objetivo.
thunderbolt:
  names:
    jp_kanji: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
    zh_simp: 十万伏特
    zh_trad: 十萬伏特
    es_latam: Atactrueno
  descriptions:
    jp_kanji: "強い電撃を\n浴びせて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks with a strong electric blast. This may\nalso leave targets paralyzed."
    fr: "Une grosse décharge électrique frappe la cible.\nPeut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Der Anwender greift mit einem starken Stromstoß an,\nder getroffene Gegner eventuell paralysiert."
    es: Potente ataque eléctrico que puede paralizar al objetivo.
    ko: "강한 전격을 날려서 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "发出强力电击进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "放出強力電流進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: Poderoso ataque eléctrico que puede paralizar al objetivo.
thunderclap:
  names:
    jp_kanji: じんらい
    en: Thunderclap
    fr: Vif Éclair
    it: Saetta
    de: Sturmblitz
    es: Relámpago Súbito
