  descriptions:
    jp_kanji: "電撃の束を相手に発射する。\n電気をためて自分の\n特攻を上げることがある。"
    en: "The user attacks targets with an electric charge. The\nresidual electricity may also boost the user’s Sp. Atk stat."
    fr: "Le lanceur frappe en tirant un rayon chargé d’électricité\nsur la cible. Peut aussi augmenter l’Attaque Spéciale\ndu lanceur."
    it: "Il Pokémon lancia un fascio di elettricità molto intensa\nverso il bersaglio. Può anche aumentare il proprio\nAttacco Speciale."
    de: "Der Anwender greift an, indem er einen Elektrostrahl auf\ndas Ziel abschießt. Durch die angesammelte Elektrizität\nwird eventuell sein Spezial-Angriff erhöht."
    es: "Lanza un rayo eléctrico contra el objetivo. Puede\naumentar el Ataque Especial del usuario."
    ko: "전격의 다발을 상대에게 발사한다.\n전기를 모아서 자신의 특수공격을\n올릴 때가 있다."
    zh_simp: "向对手发射电击光束。\n由于蓄满电流，\n有时会提高自己的特攻。"
    zh_trad: "向對手發射電擊光束。\n有時會因電流蓄積，\n提高自己的特攻。"
    es_latam: "Lanza un rayo eléctrico contra el objetivo. Puede\naumentar el Ataque Especial del usuario."
