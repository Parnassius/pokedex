  descriptions:
    jp_kanji: "３回連続でキックをくりだして攻撃する。\n攻撃範囲は跳び上がるたび広くなる。"
    en: "The user attacks with three kicks, one after the other. The\nrange of these attacks grow wider each time the user\njumps up to unleash a kick."
    fr: "Le lanceur donne trois coups de pied d’affilée\ndont la portée augmente à chaque saut."
    it: "Il Pokémon attacca sferrando tre calci in rapida\nsuccessione. L’area d’effetto di questa mossa\naumenta con ogni salto."
    de: "Der Anwender greift mit drei Tritten hintereinander an.\nMit jedem Sprung vergrößert sich der Wirkungsbereich\nder Attacke."
    es: "Propina tres patadas seguidas, el alcance de las cuales\naumenta con cada salto."
    ko: "3회 연속으로 킥을 날려 공격한다.\n뛰어오를 때마다 공격 범위가 넓어진다."
    zh_simp: "连续３次踢对手进行攻击。\n每跳起一次，攻击范围都会扩大。"
    zh_trad: "連續踢對手３次進行攻擊。\n每跳起來一次，攻擊範圍就會變大。"
    es_latam: "Lanza tres patadas seguidas, cuyo alcance aumenta\ncon cada salto."
triple_dive:
  names:
    jp_kanji: トリプルダイブ
    en: Triple Dive
    fr: Triple Plongeon
    it: Triplo Tuffo
    de: Tauchtriade
    es: Triple Inmersión
    ko: 트리플다이브
    zh_simp: 三连钻
    zh_trad: 三連鑽
    es_latam: Triple Inmersión
  descriptions:
    jp_kanji: "回転して相手を攻撃する。\n少しのあいだ自分の動きを速くしつつ\n相手を毒状態にする。"
    en: "The user attacks by spinning about. This leaves targets\npoisoned and also increases the user’s movement speed\nfor a short time."
    fr: "Le lanceur attaque en tournant sur lui-même,\nce qui empoisonne la cible. Augmente la vitesse\nde déplacement du lanceur pendant un court instant."
    it: "Il Pokémon colpisce il bersaglio con un attacco rotante,\navvelenandolo e accelerando i propri movimenti\nper un po’ di tempo."
    de: "Der Anwender greift das Ziel mit einer wirbelnden\nAttacke an, die getroffene Gegner vergiftet. Für kurze Zeit\nbewegt sich der Anwender schneller."
    es: "Ataque giratorio que envenena al objetivo y vuelve más\nrápido al usuario durante un breve período de tiempo."
    ko: "회전해서 상대를 공격한다.\n잠시 동안 자신의 움직임이 빨라지고\n상대를 독 상태로 만든다."
    zh_simp: "通过旋转来攻击对手。\n在一小段时间内让自己的动作变得更快，\n同时让对手陷入中毒状态。"
    zh_trad: "藉由旋轉來攻擊對手。\n在一小段時間內一邊讓自己的動作變快，\n一邊讓對手陷入中毒狀態。"
    es_latam: "Ataque giratorio que envenena al objetivo y vuelve más\nrápido al usuario durante un breve periodo."
