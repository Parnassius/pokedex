    fr: "Le lanceur déclenche une explosion ardente qui consume\nla cible. Le contrecoup empêche le lanceur d’agir pendant\nun court instant."
    it: "Il Pokémon attacca incenerendo il bersaglio con\nle fiamme di una potente esplosione, ma per un po’\ndi tempo non può muoversi a causa del contraccolpo."
    de: "Der Anwender greift an, indem er das Ziel mit den\nFlammen einer Explosion verbrennt. Durch den Rückstoß\nkann er sich für kurze Zeit nicht bewegen."
    es: "El usuario calcina al objetivo con una explosión de fuego,\npero no podrá moverse durante un breve período de\ntiempo."
    ko: "폭발하는 불꽃으로\n상대를 태워서 공격한다.\n잠시 동안 반동으로 움직일 수 없다."
    zh_simp: "用爆炸的火焰烧尽对手进行攻击。\n在一小段时间内\n会因反作用力而无法动弹。"
    zh_trad: "用爆炸的火焰燒盡對手進行攻擊。\n在一小段時間內\n會因為反作用力而無法動彈。"
