string_shot:
  names:
    jp_kanji: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disparo Demora
    ko: 실뿜기
    zh_simp: 吐丝
    zh_trad: 吐絲
    es_latam: Disparo de Seda
  descriptions:
    jp_kanji: "口から吹きだした糸をまきつけて\n少しのあいだ相手の動きを遅くする。"
    en: "The user spits out strings of silk, which wrap around\ntargets and make them move more slowly for a short\ntime."
    fr: "Le lanceur crache des filaments qui s’enroulent autour\nde la cible, ce qui baisse sa vitesse de déplacement\npendant un court instant."
    it: "Il Pokémon produce della seta che avvolge l’avversario\ne ne rallenta i movimenti per un po’ di tempo."
    de: "Der Anwender schießt Fäden aus dem Mund und\numwickelt damit das Ziel. Getroffene Gegner bewegen\nsich für kurze Zeit langsamer."
    es: "Lanza seda por la boca y vuelve más lento al objetivo\ndurante un breve período de tiempo."
    ko: "입에서 뿜어낸 실을 휘감는다.\n잠시 동안 상대의 움직임이 느려진다."
    zh_simp: "用口中吐出的丝缠绕对手，\n在一小段时间内使对手的动作变得迟缓。"
    zh_trad: "用口中吐出的絲纏繞對手，\n在一小段時間內會讓對手的動作變慢。"
    es_latam: "Lanza seda por la boca y vuelve más lento al objetivo\ndurante un tiempo."
