    fr: "Le lanceur libère une puissante décharge lumineuse\nqui inflige des dégâts à la cible."
    it: "Il Pokémon emette una luce potentissima che infligge\ndanni al bersaglio."
    de: "Der Anwender greift an, indem er ein mächtiges Licht\nausstrahlt."
    es: Inflige daño al objetivo con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
    es_latam: Le causa daño al objetivo con una potente luz.
