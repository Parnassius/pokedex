    jp_kanji: "光をいっぱいに集めその力を\n巨大な剣に込めて攻撃する。\n攻撃するまで時間がかかる。"
    en: "The user attacks by gathering a great deal of light, then\nfunneling it into a huge blade to swing at its targets. This\nmove takes some time to carry out."
    fr: "Le lanceur absorbe une grande quantité de lumière puis\nfrappe en libérant cette énergie sous la forme d’une lame\ngéante. L’attaque prend un certain temps à se déclencher."
    it: "Il Pokémon assorbe la luce per poi condensarla in una\nlama e attaccare il bersaglio. L’attacco richiede tempo."
    de: "Der Anwender absorbiert eine große Menge Licht,\nformt daraus ein gewaltiges Schwert und greift damit an.\nDer Angriff geschieht mit Verzögerung."
    es: "El usuario absorbe energía lumínica y la concentra en\nforma de cuchilla gigante con la que ataca al objetivo.\nEste movimiento requiere tiempo para ejecutarse."
    ko: "빛을 가득 모아\n그 힘을 거대한 검에 담아 공격한다.\n공격하기까지 시간이 걸린다."
    zh_simp: "收集满满的日光并将此力量\n集中在巨大的剑上进行攻击。\n需要一定时间发动攻击。"
    zh_trad: "吸收大量日光後，把力量\n注入巨大的劍裡進行攻擊。\n需要一些時間發動攻擊。"
    es_latam: "El usuario absorbe energía lumínica y la concentra en\nforma de cuchilla gigante con la que ataca al objetivo.\nEste movimiento requiere tiempo para ejecutarse."
