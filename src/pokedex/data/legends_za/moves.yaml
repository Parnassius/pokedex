    fr: "Le lanceur se téléporte à côté de son Dresseur ou de\nsa Dresseuse."
    it: Il Pokémon si sposta all’istante vicino al suo Allenatore.
    de: "Der Anwender kehrt augenblicklich an die Seite seines\nTrainers zurück."
    es: El usuario se teletransporta a su Entrenador.
    ko: 트레이너의 곁으로 순간이동한다.
    zh_simp: 瞬间移动到训练家的身边。
    zh_trad: 瞬間移動到訓練家身邊。
    es_latam: El usuario se teletransporta a su Entrenador.
