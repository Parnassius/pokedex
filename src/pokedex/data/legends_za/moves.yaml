  descriptions:
    jp_kanji: "水の力でぶつかって攻撃する。\n相手の防御を下げることもある。"
    en: "The user attacks by slamming into targets using a full-\nforce blast of water. This may also lower targets’ Defense\nstats."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con la forza\ndell’acqua. Può anche ridurne la Difesa."
    de: "Der Anwender greift mit der Kraft des Wassers an.\nDie Verteidigung getroffener Gegner wird eventuell\ngesenkt."
    es: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
    ko: "물의 힘으로 부딪쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量进行撞击。\n有时也会降低对手的防御。"
    zh_trad: "用水之力量衝撞進行攻擊。\n有時還會降低對手的防禦。"
    es_latam: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
