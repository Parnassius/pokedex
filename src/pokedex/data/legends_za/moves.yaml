    es_latam: Golpe Roca
  descriptions:
    jp_kanji: "パンチで攻撃する。\n相手の防御を下げることもある。"
    en: "The user attacks with a punch. This may also lower\ntargets’ Defense stats."
    fr: "Le lanceur assène un coup de poing à la cible.\nPeut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca il bersaglio con un pugno che può\nanche ridurne la Difesa."
    de: "Der Anwender greift mit einem Hieb an und senkt\neventuell die Verteidigung getroffener Gegner."
    es: "Propina un gran puñetazo que puede reducir la Defensa\ndel objetivo."
    ko: "펀치로 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用拳头进行攻击。\n有时也会降低对手的防御。"
    zh_trad: "用拳頭進行攻擊。\n有時還會降低對手的防禦。"
    es_latam: "Lanza un gran puñetazo que puede reducir la Defensa\ndel objetivo."
rock_throw:
  names:
    jp_kanji: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
