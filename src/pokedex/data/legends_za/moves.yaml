    jp_kanji: "電気をまとい\n突進して攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by charging into targets while cloaked in\nelectricity. This may also leave targets paralyzed."
    fr: "Le lanceur envoie une décharge électrique sur la cible.\nPeut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio con una scarica elettrica\nche può anche paralizzarlo."
    de: "Der Anwender hüllt sich in Elektrizität und stürzt\nvorwärts. Getroffene Gegner werden eventuell paralysiert."
    es: "Se envuelve de electricidad y arremete contra el\nobjetivo. Puede llegar a paralizar."
    ko: "전기를 두르고 돌진하여 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身进行猛撞攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞全身並猛撞進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Se envuelve de electricidad y embiste al objetivo.\nPuede causar parálisis."
