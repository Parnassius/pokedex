volt_tackle:
  names:
    jp_kanji: ボルテッカー
    en: Volt Tackle
    fr: Électacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
    zh_simp: 伏特攻击
    zh_trad: 伏特攻擊
    es_latam: Tacleada de Voltios
  descriptions:
    jp_kanji: "電気をまとって突進して攻撃。\n自分もダメージを受ける。\n相手をまひ状態にすることもある。"
    en: "The user attacks by charging forward while cloaked in\nelectricity. This may leave targets paralyzed. The user will\nalso take some damage."
    fr: "Le lanceur électrifie son corps avant de charger\nla cible. Peut aussi la paralyser. Blesse également\nle lanceur."
    it: "Il Pokémon si carica di elettricità e si lancia all’attacco,\nma subisce danni. Può anche paralizzare il bersaglio."
    de: "Der Anwender greift an, indem er sich in Elektrizität hüllt\nund vorstürmt. Dabei erleidet er selbst Schaden.\nGetroffene Gegner werden eventuell paralysiert."
    es: "El usuario electrifica su cuerpo para luego atacar, pero\ntambién se hiere a sí mismo. Puede paralizar al objetivo."
    ko: "전기를 두르고 돌진하여 공격한다.\n자신도 데미지를 입는다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身进行猛撞攻击。\n自己也会受到伤害。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞全身後猛撞進行攻擊。\n自己也會受到傷害。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "El usuario electrifica su cuerpo para luego atacar, pero\ntambién se hiere a sí mismo. Puede paralizar al objetivo."
wake_up_slap:
