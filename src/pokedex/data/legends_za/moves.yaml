  descriptions:
    jp_kanji: "煙や墨などを吹き上げて\n周囲を覆う。\n煙の中では野生のポケモンに見つからない。"
    en: "The user cloaks the area in a cloud of smoke or ink.\nThose within the cloud will be undetectable to wild\nPokémon."
    fr: "Le lanceur disperse un nuage d’encre ou de fumée\nautour de lui. Les Pokémon sauvages ne peuvent pas\nvoir ce qui se trouve à l’intérieur."
    it: "Il Pokémon crea una nuvola di fumo o inchiostro\nattorno a sé. Rimanendo al suo interno non si viene\nnotati dai Pokémon selvatici."
    de: "Der Anwender hüllt seine Umgebung in Rauch, Tinte\noder Ähnliches. Wer sich in der Wolke befindet,\nkann von wilden Pokémon nicht entdeckt werden."
    es: "Genera a su alrededor una nube de humo o tinta que\nimpide que los Pokémon salvajes detecten a quien se\noculte en su interior."
    ko: "연기나 먹물을 내뿜어 주위를 뒤덮는다.\n연기 속에 있는 동안은\n야생 포켓몬에게 들키지 않는다."
    zh_simp: "向上喷出烟或墨汁等覆盖四周，\n在烟雾中不会被野生宝可梦发现。"
    zh_trad: "向上噴出煙霧或墨汁等覆蓋周圍。\n在煙霧中不會被野生寶可夢發現。"
    es_latam: "Genera a su alrededor una nube de humo o tinta que\nimpide que los Pokémon salvajes detecten a quien\nse oculte en su interior."
