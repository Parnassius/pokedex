    jp_kanji: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
    zh_simp: 龙卷风
    zh_trad: 龍捲風
    es_latam: Tornado
  descriptions:
    jp_kanji: "竜巻をおこして\n相手をまきこみ攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by whipping up a vicious tornado to tear\nat targets. This may also make targets flinch."
    fr: "Le lanceur déclenche un terrible ouragan qui s’abat sur\nla cible. Peut aussi l’apeurer."
    it: "Il Pokémon attacca scatenando un potente tornado che\nsi abbatte sul bersaglio. Può anche farlo tentennare."
    de: "Der Anwender verwickelt das Ziel in einen heftigen\nWirbelsturm. Getroffene Gegner schrecken eventuell\nzurück."
    es: "Crea un violento tornado para hacer trizas al objetivo.\nPuede amedrentarlo."
    ko: "회오리를 일으켜\n상대를 휩쓸어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "兴起龙卷风，\n将对手卷入进行攻击。\n有时也会使对手畏缩。"
    zh_trad: "刮起龍捲風，\n將對手捲入進行攻擊。\n有時還會使對手畏縮。"
    es_latam: "Crea un violento tornado para hacer trizas al objetivo.\nPuede atemorizarlo."
u_turn:
  names:
    jp_kanji: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
    zh_simp: 急速折返
    zh_trad: 急速折返
    es_latam: Ida y Vuelta
  descriptions:
    jp_kanji: "攻撃したあと\nものすごいスピードで\nトレーナーの近くにもどってくる。"
    en: "The user attacks by dishing out a quick blow, then rushes\nback to its Trainer with incredible speed."
    fr: "Le lanceur attaque, puis revient à toute vitesse\nà côté de son Dresseur ou de sa Dresseuse."
    it: "Dopo aver sferrato l’attacco il Pokémon torna\nrapidamente vicino al proprio Allenatore."
    de: "Der Anwender greift an und eilt danach an die Seite\nseines Trainers zurück."
    es: "Tras atacar, el usuario vuelve a toda prisa con su\nEntrenador."
    ko: "공격한 뒤\n굉장한 스피드로\n트레이너의 곁으로 돌아온다."
    zh_simp: "在攻击之后急速回到\n训练家的身边。"
    zh_trad: "攻擊後會極為迅速地\n返回到訓練家的身邊。"
    es_latam: "Luego de atacar, el usuario vuelve rápidamente\ncon su Entrenador."
