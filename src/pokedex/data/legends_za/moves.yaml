    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
    zh_simp: 气象球
    zh_trad: 氣象球
    es_latam: Meteorobola
whirlpool:
  names:
    jp_kanji: うずしお
