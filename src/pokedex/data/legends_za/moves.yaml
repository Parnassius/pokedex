    ko: 저리가루
    zh_simp: 麻痹粉
    zh_trad: 麻痺粉
    es_latam: Paralizador
  descriptions:
    jp_kanji: "しびれる粉を\nたくさんふりまいて\n相手をまひ状態にする。"
    en: "The user scatters a cloud of numbing powder that leaves\ntargets paralyzed."
    fr: Le lanceur répand une poudre qui paralyse la cible.
    it: "Il Pokémon investe il bersaglio con una nuvola di polvere\nche paralizza."
    de: "Der Anwender verstreut jede Menge lähmenden Puder,\nder getroffene Gegner paralysiert."
    es: Esparce polvo que paraliza al objetivo.
    ko: "저리가루를 많이 흩뿌려서\n상대를 마비 상태로 만든다."
    zh_simp: "撒出大量的麻痹粉，\n从而让对手陷入麻痹状态。"
    zh_trad: "撒出大量令人麻痺的粉末，\n讓對手陷入麻痺狀態。"
    es_latam: Esparce polvo que paraliza al objetivo.
submission:
  names:
