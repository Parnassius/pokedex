    ko: 오물웨이브
    zh_simp: 污泥波
    zh_trad: 污泥波
    es_latam: Ola de Lodo
  descriptions:
    jp_kanji: "ヘドロの波で\n周りにいるものを攻撃する。\n相手を毒状態にすることもある。"
    en: "The user attacks by sending a giant wave of sludge across\na wide area. This may also leave those hit poisoned."
    fr: "Une vague de détritus inflige des dégâts à tout ce qui\nse trouve alentour. Peut aussi empoisonner la cible."
    it: "Il Pokémon attacca tutto intorno con un’onda di fango\nche può anche avvelenare."
    de: "Der Anwender greift mit einer Schlammwelle alles im\nUmkreis an. Getroffene Pokémon werden eventuell\nvergiftet."
    es: "Una onda tóxica que causa daño a su alrededor.\nPuede envenenar."
    ko: "오물 파도로 주위에 있는 포켓몬을 공격한다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n周围所有的对象。\n有时也会让对手陷入中毒状态。"
    zh_trad: "用污泥波\n攻擊周圍所有的對象。\n有時還會讓對手陷入中毒狀態。"
    es_latam: "Una onda tóxica que causa daño a su alrededor.\nPuede envenenar."
