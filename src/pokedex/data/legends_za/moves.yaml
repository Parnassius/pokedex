    ko: 당신먼저
    zh_simp: 您先请
    zh_trad: 您先請
    es_latam: Ceda el Paso
agility:
  names:
    jp_kanji: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
    zh_simp: 高速移动
    zh_trad: 高速移動
    es_latam: Agilidad
  descriptions:
    jp_kanji: "力をぬいて体を軽くし高速で動く。\n少しのあいだ自分の動きを速くする。"
    en: "The user relaxes its muscles to make its body feel lighter,\nincreasing the user’s movement speed for a short time."
    fr: "Le lanceur se relaxe et allège son corps pour se déplacer\nrapidement. Augmente sa vitesse de déplacement\npendant un court instant."
    it: "Il Pokémon rilassa e alleggerisce il proprio corpo\nper accelerarne i movimenti per un po’ di tempo."
    de: "Der Anwender entspannt seinen Körper und macht sich\nleicht, wodurch er sich für kurze Zeit schneller bewegt."
    es: "Relaja y aligera el cuerpo para volverse más rápido\ndurante un breve período de tiempo."
    ko: "힘을 빼고 몸을 가볍게 해서 고속으로 움직인다.\n잠시 동안 자신의 움직임이 빨라진다."
    zh_simp: "让身体放松变得轻盈，以便高速移动。\n在一小段时间内让自己的动作变得更快。"
    zh_trad: "放鬆身體，讓自己變得輕盈以進行高速移動。\n在一小段時間內讓自己的動作變快。"
    es_latam: "Relaja y aligera el cuerpo para volverse más rápido\ndurante un breve periodo."
