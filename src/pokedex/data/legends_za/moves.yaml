    fr: "Le lanceur mitraille la cible avec une rafale de graines\ncinq fois d’affilée."
    it: Il Pokémon attacca sparando una raffica di cinque semi.
    de: "Der Anwender feuert fünfmal hintereinander mit großer\nWucht Samen ab."
    es: "Dispara rápido cinco ráfagas de semillas que dañan al\nobjetivo."
    ko: "씨앗을 기세 좋게\n5회 연속으로 발사하여 공격한다."
    zh_simp: "猛烈地连续发射\n５次种子进行攻击。"
    zh_trad: "猛烈地連續５次發射\n種子進行攻擊。"
    es_latam: "Dispara rápido cinco ráfagas de semillas que dañan\nal objetivo."
