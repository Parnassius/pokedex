    zh_simp: 热水
    zh_trad: 熱水
    es_latam: Escaldar
  descriptions:
    jp_kanji: "熱く煮えたぎる水を\n相手に発射して攻撃する。\nやけど状態にすることがある。"
    en: "The user attacks by shooting boiling hot water at targets.\nThis may also leave targets with a burn."
    fr: "Le lanceur projette un jet d’eau bouillante sur la cible,\nce qui peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio con un getto d’acqua\nbollente che può anche scottarlo."
    de: "Der Anwender greift an, indem er einen Schwall\nsiedend heißen Wassers auf das Ziel schießt.\nGetroffene Gegner erleiden eventuell Verbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede causar\nquemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
    es_latam: "Ataca arrojando agua hirviendo al objetivo. Puede causar\nquemaduras."
scale_shot:
  names:
    jp_kanji: スケイルショット
    en: Scale Shot
    fr: Rafale Écailles
    it: Squamacolpo
    de: Schuppenschuss
    es: Ráfaga Escamas
    ko: 스케일샷
    zh_simp: 鳞射
    zh_trad: 鱗射
    es_latam: Disparo Escamas
  descriptions:
    jp_kanji: "ウロコを撃ちだして\n５回連続で攻撃する。\n少しのあいだ動きが早くなるが防御が下がる。"
    en: "The user attacks by shooting out five volleys of scales,\none after the other. This increases the user’s movement\nspeed but also lowers its Defense stat for a short time."
    fr: "Le lanceur projette des écailles sur la cible cinq fois\nd’affilée. Augmente pendant un court instant la vitesse\nde déplacement du lanceur, mais baisse sa Défense."
    it: "Il Pokémon attacca lanciando delle squame cinque volte\nin rapida successione. Per un po’ di tempo accelera\ni propri movimenti ma riduce la propria Difesa."
    de: "Der Anwender greift fünfmal hintereinander mit\nSchuppen-Geschossen an. Für kurze Zeit bewegt er sich\nschneller, aber seine Verteidigung wird gesenkt."
    es: "Lanza escamas al objetivo cinco veces seguidas.\nDurante un breve período de tiempo, el usuario se\nvuelve más rápido, pero reduce su Defensa."
    ko: "비늘을 5회 연속으로 발사하여 공격한다.\n잠시 동안 움직임이 빨라지지만 방어가 떨어진다."
    zh_simp: "发射鳞片，连续攻击５次。\n在一小段时间内\n动作会变快但防御会降低。"
    zh_trad: "射出鱗片連續攻擊５次。\n在一小段時間內\n行動會變快但防禦會降低。"
    es_latam: "Lanza escamas al objetivo cinco veces seguidas.\nDurante un breve periodo, el usuario se vuelve\nmás rápido, pero reduce su Defensa."
