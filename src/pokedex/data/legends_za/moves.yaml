    zh_simp: 神通力
    zh_trad: 神通力
    es_latam: Extrasensorial
extreme_speed:
  names:
    jp_kanji: しんそく
    en: Extreme Speed
    fr: Vitesse Extrême
    it: Extrarapido
    de: Turbotempo
    es: Veloc. Extrema
    ko: 신속
    zh_simp: 神速
    zh_trad: 神速
    es_latam: Veloc. Extrema
  descriptions:
    jp_kanji: "目にも留まらぬものすごい速さで\n相手に突進して攻撃する。"
    en: "The user attacks by charging into targets with blinding\nspeed."
    fr: Le lanceur charge la cible à une vitesse renversante.
    it: "Il Pokémon carica il bersaglio a una tale velocità da\nrendersi quasi invisibile."
    de: "Der Anwender greift an, indem er extrem schnell auf das\nZiel zustürmt."
    es: Carga contra el objetivo a velocidad extrema y lo ataca.
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진하여 공격한다."
    zh_simp: "以迅雷不及掩耳之势\n猛撞向对手进行攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n猛撞向對手進行攻擊。"
    es_latam: "Se lanza contra el objetivo a una velocidad extrema\ny lo ataca."
facade:
  names:
    jp_kanji: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Fachada
    ko: 객기
    zh_simp: 硬撑
    zh_trad: 硬撐
    es_latam: Fachada
  descriptions:
    jp_kanji: "自分が毒　まひ　やけど　ねむけ状態のとき\n相手にくりだすと\n技の威力が２倍になる。"
    en: "The user attacks with a power that is doubled if the user\nis poisoned, paralyzed, burned, or drowsy."
    fr: "Quand le lanceur est empoisonné, paralysé, brûlé ou\nsomnolent, la puissance de cette capacité est doublée."
    it: "Mossa la cui potenza raddoppia se chi la usa è scottato,\navvelenato, paralizzato o affetto da sonnolenza."
    de: "Ist der Anwender vergiftet, paralysiert, schläfrig oder\nleidet er unter Verbrennungen, verdoppelt sich die Stärke\nder Attacke."
    es: "Si el usuario está quemado, paralizado, somnoliento o\nenvenenado, se duplica la potencia del movimiento."
    ko: "자신이 독, 마비, 화상, 졸음 상태일 때 사용하면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤、瞌睡状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷、瞌睡等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
    es_latam: "Si el usuario está quemado, paralizado, somnoliento o\nenvenenado, se duplica la potencia del movimiento."
fairy_lock:
  names:
    jp_kanji: フェアリーロック
    en: Fairy Lock
    fr: Verrou Enchanté
    it: Blocco Fatato
    de: Feenschloss
