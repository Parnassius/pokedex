    jp_kanji: "相手が最後に使った技を\nものまねして同じ技で攻撃する。"
    en: "The user attacks by mimicking the last move that a target\nused, unleashing that same move back upon it."
    fr: "Le lanceur copie la dernière capacité utilisée par\nla cible et l’utilise pour attaquer."
    it: "Il Pokémon copia l’ultima mossa usata dal bersaglio\nper poi attaccarlo con essa."
    de: "Der Anwender kopiert die zuletzt ausgeführte Attacke des\nZieles und greift damit an."
    es: "Copia el último movimiento usado por el objetivo\ny lo utiliza para atacar."
    ko: "상대가 마지막에 사용한 기술을 흉내 내어\n같은 기술로 공격한다."
    zh_simp: "模仿对手最后使用的招式，\n用相同的招式进行攻击。"
    zh_trad: "模仿對手最近一次使用的招式，\n用相同的招式進行攻擊。"
