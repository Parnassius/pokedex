    es: Plancha Voltaica
    ko: 썬더다이브
    zh_simp: 闪电强袭
    zh_trad: 閃電強襲
    es_latam: Golpe Voltaico
superpower:
  names:
    jp_kanji: ばかぢから
    en: Superpower
