    ko: 물의맹세
    zh_simp: 水之誓约
    zh_trad: 水之誓約
    es_latam: Voto Agua
water_pulse:
  names:
    jp_kanji: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
    zh_simp: 水之波动
    zh_trad: 水之波動
    es_latam: Pulso de Agua
  descriptions:
    jp_kanji: "水の振動を\n相手に与えて攻撃する。\n相手を混乱させることもある。"
    en: "The user attacks by shooting a pulsing blast of water.\nThis may also leave targets confused."
    fr: "Le lanceur projette une aura aquatique sur la cible.\nPeut aussi la rendre confuse."
    it: "Il Pokémon attacca lanciando sul bersaglio un getto\nd’acqua potentissimo che può anche confonderlo."
    de: "Der Anwender greift das Ziel mit einer Wasserwelle an.\nGetroffene Gegner werden eventuell verwirrt."
    es: "Ataca con una potente onda de agua. Puede confundir\nal objetivo."
    ko: "물의 진동을\n상대에게 전달하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用水的震动攻击对手。\n有时也会使对手混乱。"
    zh_trad: "用水的震動攻擊對手。\n有時還會使對手混亂。"
    es_latam: "Ataca con una potente onda de agua. Puede confundir\nal objetivo."
water_shuriken:
  names:
    jp_kanji: みずしゅりけん
    en: Water Shuriken
    fr: Sheauriken
    it: Acqualame
    de: Wasser-Shuriken
    es: Shuriken de Agua
    ko: 물수리검
    zh_simp: 飞水手里剑
    zh_trad: 飛水手裡劍
    es_latam: Shuriken de Agua
  descriptions:
    jp_kanji: "粘液でできた手裏剣を\n５回連続で飛ばして攻撃する。"
    en: "The user attacks with five throwing stars formed\nfrom mucus, launched one after the other."
    fr: "Le lanceur attaque la cible avec des shuriken\nde mucus cinq fois d’affilée."
    it: "Il Pokémon attacca il bersaglio con degli shuriken\ndi muco cinque volte di fila."
    de: "Der Anwender wirft fünfmal hintereinander Wurfsterne\naus einem verdickten Sekret."
    es: "Golpea al objetivo cinco veces seguidas con estrellas\narrojadizas hechas de mucosidad."
    ko: "점액으로 만든 수리검을\n5회 연속으로 날려서 공격한다."
    zh_simp: "射出用黏液制成的手里剑，\n连续攻击５次。"
    zh_trad: "向對手連續射出５次\n用黏液製成的手裡劍進行攻擊。"
    es_latam: "Golpea al objetivo cinco veces seguidas con estrellas\narrojadizas hechas de mucosidad."
water_sport:
  names:
    jp_kanji: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
    zh_simp: 玩水
    zh_trad: 玩水
    es_latam: Chapoteo de Agua
water_spout:
  names:
    jp_kanji: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 해수스파우팅
    zh_simp: 喷水
    zh_trad: 噴水
    es_latam: Columna de Agua
waterfall:
  names:
    jp_kanji: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
    zh_simp: 攀瀑
    zh_trad: 攀瀑
    es_latam: Cascada
  descriptions:
    jp_kanji: "すごい勢いで相手につっこむ。\n相手をひるませることもある。"
    en: "The user attacks by charging at targets with incredible\nmomentum. This may also make targets flinch."
    fr: "Le lanceur charge la cible avec une intensité\nremarquable. Peut aussi l’apeurer."
    it: "Il Pokémon carica il bersaglio a grande velocità e può\nfarlo tentennare."
    de: "Der Anwender stürzt sich mit viel Schwung auf das Ziel.\nGetroffene Gegner schrecken eventuell zurück."
    es: "Embiste con un gran impulso y puede llegar a\namedrentar al objetivo."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时也会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時還會讓對手畏縮。"
    es_latam: "Embiste con un gran impulso y puede atemorizar\nal objetivo."
wave_crash:
  names:
    jp_kanji: ウェーブタックル
