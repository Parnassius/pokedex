    jp_kanji: "かわいくみつめて油断を誘い\nしばらくのあいだ相手の攻撃を下げる。"
    en: "The user gazes charmingly at targets to make them less\nwary, which lowers their Attack stats for a while."
    fr: "Le lanceur fait les yeux doux pour berner la cible\net baisser son Attaque pendant un certain temps."
    it: "Il Pokémon ammalia il bersaglio con lo sguardo\nper renderlo meno cauto. Ne riduce l’Attacco\nper un certo tempo."
    de: "Der Anwender sieht das Ziel charmant an, wodurch es\nnachlässig wird. Der Angriff getroffener Gegner wird\nfür einige Zeit gesenkt."
    es: "Engatusa al objetivo y reduce su Ataque durante\nun tiempo."
    ko: "귀엽게 바라보아 방심을 유도하여\n한동안 상대의 공격을 떨어뜨린다."
    zh_simp: "可爱地凝视诱使对手疏忽大意，\n从而在一段时间内降低对手的攻击。"
    zh_trad: "用撒嬌的眼神\n誘使對手疏忽大意，\n在一段時間內降低對手的攻擊。"
    es_latam: "Engatusa al objetivo y reduce su Ataque durante\nun tiempo."
