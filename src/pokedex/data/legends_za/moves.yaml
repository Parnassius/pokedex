    jp_kanji: "攻撃した相手を\nやけど状態にすることがある。\n急所にも当たりやすい。"
    en: "The user attacks with a kick that may also leave targets\nwith a burn. This move has a heightened chance of\nlanding a critical hit."
    fr: "Le lanceur envoie un coup de pied qui peut aussi brûler\nla cible. Taux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio e può anche scottarlo.\nProbabile brutto colpo."
    de: "Getroffene Gegner erleiden eventuell Verbrennungen.\nHohe Volltrefferquote."
    es: "Patada que suele asestar un golpe crítico y puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
    es_latam: "Patada que suele lanzar un golpe crítico y puede causar\nquemaduras."
