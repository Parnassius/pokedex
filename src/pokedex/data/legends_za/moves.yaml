sacred_sword:
  names:
    jp_kanji: せいなるつるぎ
    en: Sacred Sword
    fr: Lame Sainte
    it: Spadasolenne
    de: Sanctoklinge
    es: Espada Santa
    ko: 성스러운칼
    zh_simp: 圣剑
    zh_trad: 聖劍
    es_latam: Espada Sagrada
  descriptions:
    jp_kanji: "つるぎで切りつけ攻撃する。\n相手の能力変化に\n関係なくダメージを与える。"
    en: "The user attacks by slicing targets with a sword. This\nmove ignores any stat changes affecting its targets."
    fr: "Le lanceur donne un violent coup d’épée qui lacère\nla cible et lui inflige des dégâts en ignorant\nses changements de stats."
    it: "Il Pokémon taglia il bersaglio con una spada. Il danno\ninflitto ignora le modifiche alle statistiche del bersaglio."
    de: "Der Anwender greift das Ziel mit einer Klinge an,\nwobei getroffenen Gegnern unabhängig von ihren\nStatusveränderungen Schaden zugefügt wird."
    es: "El usuario ataca con una espada, ignorando cualquier\ncambio en las características del objetivo."
    ko: "칼로 베어 공격한다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "用剑切斩对手进行攻击。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "用劍斬切對手進行攻擊。\n可不顧對手的能力變化\n給予傷害。"
    es_latam: "El usuario ataca con una espada e ignora cualquier\ncambio en las características del objetivo."
safeguard:
  names:
    jp_kanji: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
    zh_simp: 神秘守护
    zh_trad: 神秘守護
    es_latam: Velo Sagrado
  descriptions:
    jp_kanji: "不思議な力に守られて\nしばらくのあいだ状態異常にならなくなる。\n交代しても効果は続く。"
    en: "The user creates a peculiar field that prevents status\nconditions for a while. This effect continues even if the\nuser is switched out."
    fr: "Crée un champ protecteur qui empêche toutes\nles altérations de statut pendant un certain temps.\nL’effet persiste même si le lanceur est remplacé."
    it: "Il Pokémon crea un campo protettivo che previene\ni problemi di stato per un certo tempo.\nL’effetto persiste dopo la sostituzione."
    de: "Der Anwender wird für einige Zeit durch eine mysteriöse\nKraft vor Statusproblemen geschützt. Der Effekt bleibt\nauch nach dem Auswechseln bestehen."
    es: "Un poder misterioso que protege de los problemas de\nestado durante un tiempo. El efecto permanece aunque\nse cambie de Pokémon."
    ko: "이상한 힘의 보호를 받아\n한동안 상태 이상이 되지 않는다.\n교체해도 효과는 지속된다."
    zh_simp: "被神奇的力量守护，\n从而在一段时间内不会陷入异常状态。\n替换后效果也会持续。"
    zh_trad: "被神奇的力量守護，\n在一段時間內不會陷入異常狀態。\n替換後效果仍會持續。"
    es_latam: "Un poder misterioso que protege de los problemas\nde estado durante un tiempo. El efecto permanece\naunque se cambie de Pokémon."
