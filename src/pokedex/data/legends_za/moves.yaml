    zh_simp: 暴风
    zh_trad: 暴風
    es_latam: Huracán
  descriptions:
    jp_kanji: "強烈な風で相手を\n包みこんで攻撃する。\n相手を混乱させることもある。"
    en: "The user attacks by wrapping targets in a fierce wind.\nThis may also leave targets confused."
    fr: "Le lanceur déclenche une violente tempête qui s’abat\nsur la cible. Peut aussi la rendre confuse."
    it: "Il Pokémon attacca il bersaglio avvolgendolo con\nun vento fortissimo. Può anche confonderlo."
    de: "Der Anwender umgibt das Ziel mit heftigen Windböen.\nGetroffene Gegner werden eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte torbellino que\nlo envuelve y puede confundirlo."
    ko: "강렬한 바람으로\n상대를 둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用强烈的风席卷\n对手进行攻击。\n有时也会使对手混乱。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。\n有時還會使對手混亂。"
    es_latam: "Golpea al objetivo con un fuerte torbellino\nque lo envuelve y puede confundirlo."
hydro_cannon:
  names:
    jp_kanji: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
    zh_simp: 加农水炮
    zh_trad: 加農水炮
    es_latam: Hidrocañón
  descriptions:
    jp_kanji: "水の大砲を\n相手に発射して攻撃する。\n少しのあいだ反動で動けなくなる。"
    en: "The user attacks by hitting targets with a cannon blast\nof water. The recoil will leave the user unable to move for\na short time."
    fr: "Le lanceur projette un missile d’eau sur la cible.\nLe contrecoup empêche le lanceur d’agir pendant\nun court instant."
    it: "Il Pokémon attacca il bersaglio con un potente getto\nd’acqua, ma per un po’ di tempo non può muoversi\na causa del contraccolpo."
    de: "Der Anwender greift an, indem er eine Wasserkanone\nauf das Ziel abfeuert. Durch den Rückstoß kann er sich\nfür kurze Zeit nicht bewegen."
    es: "El usuario ataca al objetivo con un cañonazo de agua,\npero no podrá moverse durante un breve período de\ntiempo."
    ko: "물의 대포를\n상대에게 발사해서 공격한다.\n잠시 동안 반동으로 움직일 수 없다."
    zh_simp: "向对手喷射水炮进行攻击。\n在一小段时间内\n会因反作用力而无法动弹。"
    zh_trad: "向對手發射水炮進行攻擊。\n在一小段時間內\n會因為反作用力而無法動彈。"
    es_latam: "El usuario ataca al objetivo con un cañonazo de agua,\npero no podrá moverse durante un breve periodo."
hydro_pump:
  names:
    jp_kanji: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
    zh_simp: 水炮
    zh_trad: 水炮
    es_latam: Hidrobomba
  descriptions:
    jp_kanji: "大量の水を激しい勢いで\n相手に発射して攻撃する。"
    en: "The user attacks by blasting targets with a huge volume\nof water launched under great pressure."
    fr: Le lanceur projette un puissant jet d’eau sur la cible.
    it: "Il Pokémon attacca il bersaglio travolgendolo con un\npotente getto d’acqua spruzzato ad altissima pressione."
    de: "Der Anwender feuert eine große Menge Wasser mit\nHochdruck auf das Ziel."
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을 세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地\n喷射大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
    es_latam: Lanza una gran masa de agua a presión para atacar.
hydro_steam:
  names:
    jp_kanji: ハイドロスチーム
    en: Hydro Steam
    fr: Hydrovapeur
    it: Idrovapore
    de: Hydrodampf
    es: Hidrovapor
    ko: 하이드로스팀
    zh_simp: 水蒸气
    zh_trad: 水蒸氣
    es_latam: Hidrovapor
hyper_beam:
  names:
    jp_kanji: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
    zh_simp: 破坏光线
    zh_trad: 破壞光線
    es_latam: Hiperrayo
  descriptions:
    jp_kanji: "強い光線を\n相手に発射して攻撃する。\n少しのあいだ反動で動けなくなる。"
    en: "The user attacks by shooting a powerful beam at targets.\nThe recoil will leave the user unable to move for a short\ntime."
    fr: "Le lanceur projette un puissant rayon sur la cible.\nLe contrecoup l’empêche d’agir pendant un court instant."
    it: "Il Pokémon attacca il bersaglio con un potente raggio,\nma non può muoversi per un po’ di tempo a causa del\ncontraccolpo."
    de: "Der Anwender greift an, indem er einen mächtigen\nLichtstrahl auf das Ziel feuert. Durch den Rückstoß\nkann er sich für kurze Zeit nicht bewegen."
    es: "El usuario ataca al objetivo con un potente haz de luz,\npero no podrá moverse durante un breve período de\ntiempo."
    ko: "강한 광선을 상대에게 발사하여 공격한다.\n잠시 동안 반동으로 움직일 수 없다."
    zh_simp: "向对手发射强烈的光线进行攻击。\n在一小段时间内会因反作用力而无法动弹。"
    zh_trad: "向對手發射強烈的光線\n進行攻擊。在一小段時間內\n會因為反作用力而無法動彈。"
    es_latam: "El usuario ataca al objetivo con una poderosa descarga,\npero no podrá moverse durante un breve periodo."
hyper_drill:
  names:
    jp_kanji: ハイパードリル
    en: Hyper Drill
    fr: Hyperceuse
    it: Ipertrapano
    de: Hyperbohrer
    es: Hipertaladro
    ko: 하이퍼드릴
    zh_simp: 强力钻
    zh_trad: 強力鑽
    es_latam: Hipertaladro
hyper_fang:
  names:
    jp_kanji: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hipercolmillo
    ko: 필살앞니
    zh_simp: 终结门牙
    zh_trad: 必殺門牙
    es_latam: Hipercolmillo
hyper_voice:
  names:
    jp_kanji: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
    zh_simp: 巨声
    zh_trad: 巨聲
    es_latam: Hipervoz
  descriptions:
    jp_kanji: "うるさく響く大きな振動を\n相手に与えて攻撃する。"
    en: "The user attacks by unleashing horribly loud, resounding\nvibrations."
    fr: "Le lanceur pousse un cri assourdissant dont\nles vibrations infligent des dégâts à la cible."
    it: "Il Pokémon attacca il bersaglio lanciando un urlo\nstraziante."
    de: "Der Anwender greift das Ziel mit laut widerhallenden\nSchallwellen an."
    es: "Grito desgarrador cuyas vibraciones le infligen daño\nal objetivo."
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
    es_latam: "Grito desgarrador cuyas vibraciones le infligen daño\nal objetivo."
hyperspace_fury:
  names:
    jp_kanji: いじげんラッシュ
    en: Hyperspace Fury
    fr: Furie Dimension
    it: Urtodimensionale
    de: Dimensionswahn
    es: Cerco Dimensión
    ko: 이차원러시
    zh_simp: 异次元猛攻
    zh_trad: 異次元猛攻
    es_latam: Cerco Dimensión
  descriptions:
    jp_kanji: "たくさんの腕で攻撃する。\nまもるや　みきりを無視して攻撃できるが\n少しのあいだ自分の防御が下がる。"
    en: "The user attacks with a barrage from multiple arms. This\nattack ignores moves such as Protect or Detect, but it\nalso lowers the user’s Defense stat for a short time."
    fr: "Le lanceur frappe avec sa multitude de bras.\nIgnore les capacités comme Abri ou Détection.\nBaisse la Défense du lanceur pendant un court instant."
    it: "Il Pokémon attacca con i suoi molti arti ignorando\nl’effetto di mosse come Protezione o Individua,\nma la sua Difesa diminuisce per un po’ di tempo."
    de: "Der Anwender greift mit vielen Armen an und durchbricht\ndabei Attacken wie Schutzschild und Scanner. Seine\nVerteidigung wird für kurze Zeit gesenkt."
    es: "Ataca con una ráfaga de golpes que ignoran los efectos\nde movimientos como Protección o Detección. Reduce la\nDefensa del usuario durante un breve período de tiempo."
    ko: "많은 팔로 공격한다.\n방어나 판별 등도 무시할 수 있다.\n잠시 동안 자신의 방어가 떨어진다."
    zh_simp: "用许多手臂进行攻击。\n虽然能够无视守住或看穿进行攻击，\n但会在一小段时间内降低自己的防御。"
    zh_trad: "使用許多手臂進行攻擊。\n可不顧守住和看穿發動攻擊，\n但在一小段時間內自己的防禦會降低。"
    es_latam: "Ataca con una ráfaga de golpes que ignoran los efectos\nde movimientos como Protección o Detección. Reduce\nla Defensa del usuario durante un breve periodo."
hyperspace_hole:
  names:
    jp_kanji: いじげんホール
    en: Hyperspace Hole
    fr: TrouDimensionnel
    it: Forodimensionale
    de: Dimensionsloch
    es: Paso Dimensional
    ko: 이차원홀
    zh_simp: 异次元洞
    zh_trad: 異次元洞
    es_latam: Paso Dimensional
  descriptions:
    jp_kanji: "異次元ホールで突然\n相手の前に現れ攻撃する。\nまもるや　みきりなども無視できる。"
    en: "The user attacks by using a hyperspace hole to appear\nright near targets without warning. This attack can hit\ntargets using moves such as Protect or Detect."
    fr: "Le lanceur ouvre une faille dimensionnelle pour\napparaître soudainement devant la cible et l’attaquer.\nIgnore les capacités comme Abri ou Détection."
    it: "Il Pokémon sfrutta un passaggio interdimensionale per\ncomparire davanti al bersaglio e attaccarlo, ignorando\nl’effetto di mosse come Protezione e Individua."
    de: "Der Anwender positioniert sich direkt vor dem Ziel\nmithilfe eines Dimensionslochs und greift an. Dabei\ndurchbricht er Attacken wie Schutzschild und Scanner."
    es: "El usuario aparece frente al objetivo usando un agujero\ndimensional y le asesta un golpe que ignora los efectos\nde movimientos como Protección y Detección."
    ko: "이차원홀을 통해\n상대 앞에 갑자기 나타나 공격한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "通过异次元洞，\n突然出现在对手的面前进行攻击。\n还可以无视守住和看穿等招式。"
    zh_trad: "利用異次元洞，\n突然出現在對手的前方進行攻擊。\n可避開對手的守住和看穿等招式。"
    es_latam: "El usuario aparece frente al objetivo usando un agujero\ndimensional y le lanza un golpe que ignora los efectos\nde movimientos como Protección y Detección."
hypnosis:
  names:
    jp_kanji: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
    zh_simp: 催眠术
    zh_trad: 催眠術
    es_latam: Hipnosis
  descriptions:
    jp_kanji: "眠気を誘う暗示をかけて\n相手をねむけ状態にする。"
    en: "The user employs hypnotic suggestion to make targets\ndrowsy."
    fr: "Le lanceur hypnotise la cible pour la plonger dans\nun état de somnolence."
    it: "Il Pokémon si avvale della suggestione ipnotica\nper causare sonnolenza nel bersaglio."
    de: "Der Anwender nutzt Suggestion, die Müdigkeit\nhervorruft, um getroffene Gegner schläfrig zu machen."
    es: "Movimiento hipnótico que induce somnolencia en\nel objetivo."
    ko: "졸음을 유도하는 암시를 걸어서\n상대를 졸음 상태로 만든다."
    zh_simp: "施以诱导睡意的暗示，\n让对手陷入瞌睡状态。"
    zh_trad: "施加引發睡意的暗示，\n讓對手陷入瞌睡狀態。"
    es_latam: "Movimiento hipnótico que induce somnolencia\nen el objetivo."
ice_ball:
  names:
    jp_kanji: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
    zh_simp: 冰球
    zh_trad: 冰球
    es_latam: Bola Hielo
ice_beam:
  names:
    jp_kanji: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
    zh_simp: 冰冻光束
    zh_trad: 冰凍光束
    es_latam: Rayo de Hielo
  descriptions:
    jp_kanji: "凍えるビームを\n発射して攻撃する。\n相手をこおり状態にすることもある。"
    en: "The user attacks by shooting out a beam of icy-cold\nenergy. This may also leave targets frozen."
    fr: "Un rayon de glace frappe la cible.\nPeut aussi la geler."
    it: "Il Pokémon attacca il bersaglio con un raggio di energia\ngelida che può anche congelarlo."
    de: "Der Anwender greift mit einem eisigen Strahl an,\nder getroffene Gegner eventuell einfriert."
    es: Ataca con un rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을 발사하여 공격한다.\n상대를 얼음 상태로 만들 때가 있다."
    zh_simp: "发射冰冻光束进行攻击。\n有时也会让对手陷入冰冻状态。"
    zh_trad: "發射冰凍光束進行攻擊。\n有時還會讓對手陷入冰凍狀態。"
    es_latam: "Ataca con un rayo de hielo que puede congelar\nal objetivo."
ice_burn:
  names:
    jp_kanji: コールドフレア
    en: Ice Burn
    fr: Feu Glacé
    it: Vampagelida
    de: Frosthauch
    es: Llama Gélida
    ko: 콜드플레어
    zh_simp: 极寒冷焰
    zh_trad: 極寒冷焰
    es_latam: Llama Gélida
ice_fang:
  names:
    jp_kanji: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colmillo Hielo
    ko: 얼음엄니
    zh_simp: 冰冻牙
    zh_trad: 冰凍牙
    es_latam: Colmillo Hielo
  descriptions:
    jp_kanji: "冷気をひめたキバでかみついて\n相手をひるませたり\nこおり状態にすることもある。"
    en: "The user attacks by biting targets with cold-infused fangs.\nThis may also make targets flinch or leave them frozen."
    fr: "Le lanceur inflige une morsure glaciale à la cible.\nPeut aussi la geler ou l’apeurer."
    it: "Il Pokémon morde con denti ghiacciati. Può anche\ncongelare o far tentennare il bersaglio."
    de: "Der Anwender beißt mit eiskalten Fangzähnen zu.\nGetroffene Gegner schrecken eventuell zurück oder\nfrieren ein."
    es: "El usuario muerde al objetivo con colmillos helados y\npuede hacer que se amedrente o se congele."
    ko: "냉기를 품은 이빨로 문다.\n상대를 풀죽게 하거나\n얼음 상태로 만들 때가 있다."
    zh_simp: "用藏有冷气的牙齿咬住对手，\n有时也会使对手畏缩\n或陷入冰冻状态。"
    zh_trad: "用帶有寒氣的牙齒咬住對手。\n有時還會讓對手畏縮\n或陷入冰凍狀態。"
    es_latam: "El usuario muerde al objetivo con colmillos helados\ny puede atemorizarlo o congelarlo."
ice_hammer:
  names:
    jp_kanji: アイスハンマー
    en: Ice Hammer
    fr: Marteau de Glace
    it: Martelgelo
    de: Eishammer
    es: Martillo Hielo
    ko: 아이스해머
    zh_simp: 冰锤
    zh_trad: 冰錘
    es_latam: Martillo Hielo
  descriptions:
    jp_kanji: "強くて重いこぶしを\nふるってダメージを与える。\n自分の動きが少しのあいだ遅くなる。"
    en: "The user attacks by swinging its strong, heavy fist at\ntargets to inflict damage. This also lowers the user’s\nmovement speed for a short time."
    fr: "Le lanceur donne un puissant coup de poing à la cible.\nBaisse la vitesse de déplacement du lanceur pendant\nun court instant."
    it: "Il Pokémon infligge danni al bersaglio colpendolo con\nun pugno molto potente, ma i suoi movimenti\nrallentano per un po’ di tempo."
    de: "Der Anwender schwingt seine starke, schwere Faust und\nfügt getroffenen Gegnern so Schaden zu. Er bewegt sich\nfür kurze Zeit langsamer."
    es: "El usuario propina un golpe devastador con el puño, pero\nse vuelve más lento durante un breve período de tiempo."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n잠시 동안 자신의 움직임이 느려진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的动作会在一小段时间内变得迟缓。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n在一小段時間內自己的行動會變慢。"
    es_latam: "El usuario lanza un golpe devastador con el puño, pero\nse vuelve más lento durante un breve periodo."
ice_punch:
  names:
    jp_kanji: れいとうパンチ
    en: Ice Punch
    fr: Poing Glace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
    zh_simp: 冰冻拳
    zh_trad: 冰凍拳
    es_latam: Puño Hielo
  descriptions:
    jp_kanji: "冷気をこめたパンチで攻撃して\n相手をこおり状態にすることもある。"
    en: "The user attacks with an icy punch. This may also leave\ntargets frozen."
    fr: "Le lanceur attaque la cible d’un coup de poing glacé.\nPeut aussi la geler."
    it: "Il Pokémon attacca il bersaglio con un pugno di ghiaccio\nche può congelarlo."
    de: "Der Anwender greift mit einem eisigen Schlag an,\nder getroffene Gegner eventuell einfriert."
    es: Puñetazo helado que puede llegar a congelar.
    ko: "냉기를 담은 펀치로 공격한다.\n상대를 얼음 상태로 만들 때가 있다."
    zh_simp: "用充满寒气的拳头进行攻击。\n有时也会让对手陷入冰冻状态。"
    zh_trad: "用帶有寒氣的拳頭進行攻擊，\n有時還會讓對手陷入冰凍狀態。"
    es_latam: Puñetazo helado que puede congelar al objetivo.
ice_shard:
  names:
    jp_kanji: こおりのつぶて
    en: Ice Shard
    fr: Éclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Esquirla Helada
    ko: 얼음뭉치
    zh_simp: 冰砾
    zh_trad: 冰礫
    es_latam: Esquirla Helada
  descriptions:
    jp_kanji: "氷の塊を一瞬でつくり\n相手に素早く放つ。"
    en: "The user attacks by flash-freezing chunks of ice and\nhurling them at targets."
    fr: "Le lanceur crée en un instant des éclats de glace\nqu’il envoie à grande vitesse sur la cible."
    it: "Il Pokémon crea dei pezzi di ghiaccio in un istante\nper poi scagliarli rapidamente contro il bersaglio."
    de: "Der Anwender erzeugt im Nu Eisklumpen, die er dann\nblitzschnell auf das Ziel feuert."
    es: "Crea esquirlas de hielo y las lanza a gran velocidad contra\nel objetivo."
    ko: "얼음덩어리를 순식간에 만들어\n상대에게 빠르게 쏜다."
    zh_simp: "瞬间制作冰块，\n快速地扔向对手。"
    zh_trad: "將瞬間製造出的冰塊\n快速地扔向對手。"
    es_latam: "Crea esquirlas de hielo y las lanza a gran velocidad contra\nel objetivo."
ice_spinner:
  names:
    jp_kanji: アイススピナー
    en: Ice Spinner
    fr: Cryo-Pirouette
    it: Vortighiaccio
    de: Eiskreisel
    es: Pirueta Helada
    ko: 아이스스피너
    zh_simp: 冰旋
    zh_trad: 冰旋
    es_latam: Pirueta Helada
  descriptions:
    jp_kanji: "体を投げだす無謀な突撃。\n技のあと大きなスキをさらしてしまい\n少しのあいだ動けなくなる。"
    en: "The user attacks by throwing its entire body into a\nreckless charge. However, the user is left wide open and\nunable to move for a short time."
    fr: "Le lanceur se jette dans une charge inconsciente sur la\ncible. Cette attaque le rend grandement vulnérable et\nl’empêche d’agir pendant un court instant."
    it: "Il Pokémon si lancia in una carica avventata. Dopo aver\nsferrato questa mossa, abbassa la guardia e non può\nmuoversi per un po’ di tempo."
    de: "Der Anwender greift an, indem er sich waghalsig auf\ndas Ziel stürzt. Danach ist er ungeschützt und kann sich\nfür kurze Zeit nicht bewegen."
    es: "Embiste de forma temeraria con todo el cuerpo.\nTras ejecutar el movimiento, el usuario baja la guardia\ny no podrá moverse durante un breve período de tiempo."
    ko: "몸을 내던지는 무모한 돌격.\n기술을 사용한 다음, 큰 빈틈을 노출하게 되어\n잠시 동안 움직일 수 없다."
    zh_simp: "有勇无谋地舍身突击。\n使出招式后会露出很大的破绽，\n在一小段时间内无法动弹。"
    zh_trad: "豁出己身的魯莽突擊。\n使出招式後會露出很大的空隙，\n在一小段時間內將無法動彈。"
    es_latam: "Embiste de forma temeraria con todo el cuerpo.\nTras ejecutar el movimiento, el usuario baja la guardia\ny no podrá moverse durante un breve periodo."
icicle_crash:
  names:
    jp_kanji: つららおとし
    en: Icicle Crash
    fr: Chute Glace
    it: Scagliagelo
    de: Eiszapfhagel
    es: Chuzos
    ko: 고드름떨구기
    zh_simp: 冰柱坠击
    zh_trad: 冰柱墜擊
    es_latam: Carámbano
  descriptions:
    jp_kanji: "大きな氷柱を\n激しくぶつけて攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by crashing large icicles down upon\ntargets. This may also make targets flinch."
    fr: "Le lanceur envoie de gros blocs de glace sur la cible\npour lui infliger des dégâts. Peut aussi l’apeurer."
    it: "Il Pokémon attacca violentemente il bersaglio con grosse\nstalattiti di ghiaccio che possono anche farlo tentennare."
    de: "Der Anwender lässt einen großen Eiszapfen mit viel\nWucht auf das Ziel herabfallen. Getroffene Gegner\nschrecken eventuell zurück."
    es: "Ataca con grandes carámbanos que lanza con violencia.\nPuede amedrentar al objetivo."
    ko: "큰 고드름으로\n격렬하게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大冰柱激烈地进行撞击。\n有时会使对手畏缩。"
    zh_trad: "將巨大冰柱猛烈地\n砸向對手進行攻擊。\n有時還會使對手畏縮。"
    es_latam: "Ataca con grandes carámbanos que lanza con violencia.\nPuede atemorizar al objetivo."
icicle_spear:
  names:
    jp_kanji: つららばり
    en: Icicle Spear
    fr: Stalactite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
    zh_simp: 冰锥
    zh_trad: 冰錐
    es_latam: Lanza de Hielo
  descriptions:
    jp_kanji: "５本の鋭い氷柱を\n一斉に発射して攻撃する。"
    en: "The user attacks by launching five sharp icicles in a\nsingle volley at targets."
    fr: "Le lanceur attaque en projetant cinq pics de glace\nen même temps."
    it: "Il Pokémon attacca sparando cinque ghiaccioli affilati\ncontro il bersaglio."
    de: "Der Anwender greift an, indem er fünf spitze Eiszapfen\nauf einmal abschießt."
    es: "Lanza cinco carámbanos afilados al objetivo al mismo\ntiempo."
    ko: "날카로운 5개의 고드름을\n일제히 발사하여 공격한다."
    zh_simp: "向对手一口气发射\n５根锋利的冰柱进行攻击。"
    zh_trad: "一次發射５根尖銳的冰柱\n進行攻擊。"
    es_latam: "Lanza cinco carámbanos afilados al objetivo al mismo\ntiempo."
icy_wind:
  names:
    jp_kanji: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼어붙은바람
    zh_simp: 冰冻之风
    zh_trad: 冰凍之風
    es_latam: Viento Helado
  descriptions:
    jp_kanji: "凍てつく冷気を\n相手に吹きつけて攻撃する。\n少しのあいだ相手の動きを遅くする。"
    en: "The user attacks with a gust of chilled air. This also\nmakes targets move more slowly for a short time."
    fr: "Une bourrasque glaciale blesse la cible, ce qui baisse\nsa vitesse de déplacement pendant un court instant."
    it: "Il Pokémon attacca il bersaglio con una folata di aria\ngelida, rallentandone i movimenti per un po’ di tempo."
    de: "Der Anwender greift das Ziel mit eisigem Wind an.\nGetroffene Gegner bewegen sich für kurze Zeit\nlangsamer."
    es: "Ataque con aire helado que vuelve más lento al objetivo\ndurante un breve período de tiempo."
    ko: "차가운 냉기를 상대에게 내뿜어 공격한다.\n잠시 동안 상대의 움직임이 느려진다."
    zh_simp: "将结冰的冷气吹向对手进行攻击。\n会在一小段时间内\n使对手的动作变得迟缓。"
    zh_trad: "將冰冷的寒氣\n吹向對手進行攻擊。\n在一小段時間內會讓對手的動作變慢。"
    es_latam: "Un ataque con aire helado que vuelve más lento\nal objetivo durante un breve periodo."
