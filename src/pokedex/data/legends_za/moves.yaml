  descriptions:
    jp_kanji: "宝石のように　きらめく光を発射して\n相手を攻撃する。"
    en: "The user attacks with a ray of light that sparkles as if it\nwere made of gemstones."
    fr: "Le lanceur attaque la cible avec un rayon de lumière\nqui scintille comme s’il était composé de gemmes."
    it: "Il Pokémon attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Der Anwender greift an, indem er gebündeltes Licht,\ndas funkelt wie Juwelen, auf das Ziel feuert."
    es: "Ataca con un rayo de luz que centellea como si lo\nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을 발사하여\n상대를 공격한다."
    zh_simp: "发射如宝石般\n闪耀的光芒攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
    es_latam: "Ataca con un rayo de luz que centellea como si\nestuviera formado por miles de joyas."
