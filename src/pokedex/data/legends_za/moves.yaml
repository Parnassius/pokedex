    fr: "Crée de fabuleux murs de lumière qui réduisent les dégâts\ncausés par les attaques physiques pendant un certain\ntemps. L’effet persiste même si le lanceur est remplacé."
    it: "Il Pokémon innalza una barriera misteriosa che per un\ncerto tempo riduce i danni degli attacchi fisici subiti.\nL’effetto persiste dopo la sostituzione."
    de: "Der Anwender senkt mit mysteriösen Wänden für einige\nZeit den Schaden durch erlittene physische Angriffe.\nDer Effekt bleibt auch nach dem Auswechseln bestehen."
    es: "Barrera misteriosa que reduce durante un tiempo el daño\nproducido por los ataques físicos del rival. El efecto\npermanece aunque se cambie de Pokémon."
    ko: "이상한 장막을 쳐서 한동안\n상대로부터 받는 물리공격의 데미지를 약하게 한다.\n교체해도 효과는 지속된다."
    zh_simp: "利用神奇的墙壁，在一段时间内\n减弱来自对手的物理攻击的伤害。\n替换后效果也会持续。"
    zh_trad: "利用神奇的屏障，在一段時間內\n減輕來自對手的物理攻擊傷害。\n替換後效果仍會持續。"
    es_latam: "Una barrera misteriosa que reduce durante un tiempo\nel daño que producen los ataques físicos del rival.\nEl efecto permanece aunque se cambie de Pokémon."
