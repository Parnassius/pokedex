    jp_kanji: "守りを捨てて\n相手のふところに突撃する。\n少しのあいだ自分の防御と特防が下がる。"
    en: "The user attacks by abandoning defense and charging\nin close to targets. This lowers the user’s Defense and\nSp. Def stats for a short time."
    fr: "Le lanceur ne pense plus à se protéger et frappe la cible\nviolemment au corps à corps. Baisse la Défense et\nla Défense Spéciale du lanceur pendant un court instant."
    it: "Il Pokémon attacca abbassando la guardia.\nLa sua Difesa e la sua Difesa Speciale diminuiscono\nper un po’ di tempo."
    de: "Der Anwender greift an, indem er ohne Rücksicht\nauf Verluste losstürmt. Seine Verteidigung und\nSpezial-Verteidigung werden für kurze Zeit gesenkt."
    es: "Ataca ferozmente al objetivo sin protegerse, lo cual\nreduce la Defensa y la Defensa Especial del usuario\ndurante un breve período de tiempo."
    ko: "방어를 포기하고 상대의 품으로 돌격한다.\n잠시 동안 자신의 방어와 특수방어가 떨어진다."
    zh_simp: "放弃守护，\n向对手的怀里突击。\n在一小段时间内自己的防御和特防会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n在一小段時間內\n自己的防禦和特防會降低。"
