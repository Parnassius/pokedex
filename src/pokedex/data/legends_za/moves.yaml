    ko: 차밍보이스
    zh_simp: 魅惑之声
    zh_trad: 魅惑之聲
    es_latam: Voz Encantadora
  descriptions:
    jp_kanji: "魅惑の鳴き声をだして\n相手に精神的なダメージを与える。"
    en: "The user attacks by letting out a charming cry that causes\nemotional damage."
    fr: "Le lanceur laisse s’échapper une voix enchanteresse\nqui inflige des dégâts psychiques à la cible."
    it: "Il Pokémon emette una voce suadente che infligge danni\nspirituali al bersaglio."
    de: "Der Anwender stößt einen bezirzenden Ruf aus, mit dem\ner getroffenen Gegnern mentalen Schaden zufügt."
    es: "Obnubila al objetivo con su fascinante voz y le provoca\ndaños emocionales."
    ko: "매혹적인 울음소리를 내어\n상대에게 정신적 데미지를 준다."
    zh_simp: "发出魅惑的叫声，\n给予对手精神上的伤害。"
    zh_trad: "發出迷人的叫聲，\n給予對手精神上的傷害。"
    es_latam: "Obnubila al objetivo con su fascinante voz y le provoca\ndaños emocionales."
discharge:
  names:
    jp_kanji: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
    zh_simp: 放电
    zh_trad: 放電
    es_latam: Chispazo
  descriptions:
    jp_kanji: "まばゆい電撃で\n周りにいるものを攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by letting loose a flare of electricity\nacross a wide area. This may also leave those hit\nparalyzed."
    fr: "Une violente décharge d’électricité explose autour\ndu lanceur. Peut aussi paralyser la cible."
    it: "Il Pokémon attacca tutto intorno con un bagliore elettrico\nche può anche paralizzare."
    de: "Der Anwender greift mit Elektrizität alles im Umkreis an.\nGetroffene Pokémon werden eventuell paralysiert."
    es: "Una deslumbradora onda eléctrica que causa daño a su\nalrededor. Puede paralizar."
    ko: "눈부신 전격으로\n주위에 있는 포켓몬을 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用耀眼的电击\n攻击周围所有的对象。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用耀眼的電流\n攻擊周圍所有的對象。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Una deslumbrante onda eléctrica que causa daño a su\nalrededor. Puede paralizar."
