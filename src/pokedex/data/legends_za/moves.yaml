    fr: Saumure
    it: Acquadisale
    de: Lake
    es: Salmuera
    ko: 소금물
    zh_simp: 盐水
    zh_trad: 鹽水
    es_latam: Agua Salada
brutal_swing:
  names:
    jp_kanji: ぶんまわす
    en: Brutal Swing
    fr: Centrifugifle
    it: Vorticolpo
    de: Wirbler
    es: Giro Vil
    ko: 세차게휘두르기
    zh_simp: 狂舞挥打
    zh_trad: 狂舞揮打
    es_latam: Giro Vil
  descriptions:
    jp_kanji: "自分の体を　ぶんまわして\n周囲を攻撃する。"
    en: "The user attacks everything nearby by swinging about\nviolently."
    fr: "Le lanceur tourne violemment sur lui-même pour\nattaquer ce qui se trouve autour de lui."
    it: "Il Pokémon attacca attorno a sé facendo ruotare\nil suo corpo."
    de: "Der Anwender dreht schwungvoll seinen Körper und\ngreift alles im Umkreis an."
    es: Hace pivotar su cuerpo para causar daño a su alrededor.
    ko: "자신의 몸을 세차게 휘둘러서\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "用自己的身体狂舞挥打，\n并攻击周围。"
    zh_trad: "用自己的身體狂舞揮打，\n攻擊周圍。"
    es_latam: Hace pivotar su cuerpo para causar daño a su alrededor.
bubble:
  names:
    jp_kanji: あわ
    en: Bubble
    fr: Écume
    it: Bolla
    de: Blubber
    es: Burbuja
    ko: 거품
    zh_simp: 泡沫
    zh_trad: 泡沫
    es_latam: Burbuja
bubble_beam:
  names:
    jp_kanji: バブルこうせん
    en: Bubble Beam
    fr: Bulles d’O
    it: Bollaraggio
    de: Blubbstrahl
    es: Rayo Burbuja
    ko: 거품광선
    zh_simp: 泡沫光线
    zh_trad: 泡沫光線
    es_latam: Rayo Burbuja
  descriptions:
    jp_kanji: "泡を勢いよく\n発射して攻撃する。\n相手の動きを遅くすることもある。"
    en: "The user attacks by shooting out a blast of bubbles.\nThis may also make targets move more slowly."
    fr: "Le lanceur envoie une rafale de bulles sur la cible.\nPeut aussi baisser sa vitesse de déplacement."
    it: "Il Pokémon attacca il bersaglio con una forte scarica\ndi bolle che può anche rallentarne i movimenti."
    de: "Der Anwender greift an, indem er wuchtvoll Blasen\nabfeuert, durch die sich getroffene Gegner eventuell\nlangsamer bewegen."
    es: "Ataca con una ráfaga de burbujas que puede volver más\nlento al objetivo."
    ko: "거품을 기세 좋게 발사하여 공격한다.\n상대의 움직임이 느려질 때가 있다."
    zh_simp: "猛烈地喷射泡沫进行攻击。\n有时也会使对手的动作变得迟缓。"
    zh_trad: "猛烈地噴射泡沫進行攻擊。\n有時還會讓對手的動作變慢。"
    es_latam: "Ataca con una ráfaga de burbujas que puede volver\nmás lento al objetivo."
bug_bite:
  names:
    jp_kanji: むしくい
    en: Bug Bite
    fr: Piqûre
    it: Coleomorso
    de: Käferbiss
    es: Picadura
    ko: 벌레먹기
