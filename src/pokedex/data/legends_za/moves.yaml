psychic:
  names:
    jp_kanji: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
    zh_simp: 精神强念
    zh_trad: 精神強念
    es_latam: Fuerza Psíquica
  descriptions:
    jp_kanji: "強い念力を\n相手に送って攻撃する。\n相手の特防を下げることもある。"
    en: "The user attacks by directing a strong telekinetic force\ntoward targets. This may also lower targets’ Sp. Def stats."
    fr: "Une puissante vague télékinétique frappe la cible.\nPeut aussi baisser sa Défense Spéciale."
    it: "Il Pokémon attacca il bersaglio con una potente forza\ntelecinetica che può anche ridurne la Difesa Speciale."
    de: "Der Anwender greift mit starker telekinetischer Energie\nan. Die Spezial-Verteidigung getroffener Gegner wird\neventuell gesenkt."
    es: "Fuerte ataque telequinético que puede reducir la\nDefensa Especial del objetivo."
    ko: "강한 염동력을\n상대에게 보내어 공격한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时也会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時還會降低對手的特防。"
    es_latam: "Fuerte ataque telequinético que puede reducir\nla Defensa Especial del objetivo."
psychic_fangs:
  names:
    jp_kanji: サイコファング
    en: Psychic Fangs
    fr: Psycho-Croc
    it: Psicozanna
    de: Psychobeißer
    es: Psicocolmillo
    ko: 사이코팽
