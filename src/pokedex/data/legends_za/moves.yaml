  descriptions:
    jp_kanji: "全身から集めた　はがねを\nビームとして激しく撃ちだす。\n自分もダメージを受けてしまう。"
    en: "The user attacks by firing off a fierce beam of steel that\nhas been collected from its entire body. The user will also\ntake some damage."
    fr: "Le lanceur concentre du métal issu de tout son corps\nen un rayon qu’il projette violemment sur sa cible.\nLe lanceur subit aussi des dégâts."
    it: "Il Pokémon utilizza l’acciaio del proprio corpo per\nsparare un violento raggio, ma subisce danni."
    de: "Der Anwender schießt Stahl, den er in seinem ganzen\nKörper angesammelt hat, in Form eines mächtigen\nStrahls ab. Dabei erleidet er selbst Schaden."
    es: "Utiliza el acero de su cuerpo para disparar un potente\nrayo. El usuario se hiere a sí mismo."
    ko: "전신에서 끌어모은 강철을\n빔으로 바꿔 세차게 발사한다.\n자신도 데미지를 입는다."
    zh_simp: "将从全身聚集的钢铁\n化为光束，激烈地发射出去。\n自己也会受到伤害。"
    zh_trad: "將從全身匯聚起來的鋼鐵\n化為光束激烈地發射出去。\n自己也會受到傷害。"
    es_latam: "Utiliza el acero de su cuerpo para disparar un potente\nrayo. El usuario se hiere a sí mismo."
