    ko: 바다회오리
    zh_simp: 潮旋
    zh_trad: 潮旋
    es_latam: Remolino
  descriptions:
    jp_kanji: "激しく渦をまく水で相手を囲み\n中にいる相手にダメージを与えつづける。"
    en: "The user summons a violent, swirling whirlpool to\nsurround targets. Opponents within the whirlpool will\ntake continual damage."
    fr: "Le lanceur crée une trombe d’eau qui entoure\nl’adversaire. Tant qu’il se trouve à l’intérieur,\ncelui-ci subit des dégâts continus."
    it: "Il Pokémon genera un turbine d’acqua che continua\na infliggere danni agli avversari che si trovano al suo\ninterno."
    de: "Der Anwender schließt das Ziel in einer heftigen\nWasserhose ein. Gegner, die sich darin aufhalten,\nnehmen kontinuierlich Schaden."
    es: "Una tromba de agua que atrapa al objetivo y que inflige\ndaño continuo a los rivales que permanezcan dentro."
    ko: "세차게 소용돌이치는 물살을 만들어\n안에 있는 상대에게 계속해서 데미지를 준다."
    zh_simp: "用激烈的水流旋涡包围对手，\n并对其中的对手持续造成伤害。"
    zh_trad: "以激烈的水流漩渦包圍對手，\n對困在其中的對手持續造成傷害。"
    es_latam: "Una columna de agua que atrapa al objetivo y que inflige\ndaño continuo a los rivales que permanezcan adentro."
whirlwind:
  names:
    jp_kanji: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
    zh_simp: 吹飞
    zh_trad: 吹飛
    es_latam: Torbellino
  descriptions:
    jp_kanji: "強い風を起こして\n相手を後ろに大きくふきとばす。"
    en: "The user creates a strong wind to drive targets back a\ngood distance."
    fr: "Le lanceur génère une bourrasque puissante qui\nrepousse les cibles."
    it: "Il Pokémon crea una forte folata di vento e spinge\nil bersaglio molto indietro."
    de: "Der Anwender erzeugt starken Wind, der getroffene\nGegner weit zurückwirft."
    es: "Genera un potente viento que empuja al objetivo hacia\natrás."
    ko: "강한 바람을 일으켜서\n상대를 뒤로 멀리 날려 버린다."
    zh_simp: "掀起强风，\n将对手远远地向后吹飞。"
    zh_trad: "引起強風，\n將對手向後遠遠地吹飛。"
    es_latam: "Genera un viento poderoso que empuja al objetivo\nhacia atrás."
wicked_blow:
