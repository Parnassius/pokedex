    zh_trad: 千變萬花
    es_latam: Truco Floral
fly:
  names:
    jp_kanji: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
    zh_simp: 飞翔
    zh_trad: 飛翔
    es_latam: Vuelo
  descriptions:
    jp_kanji: "空へ飛び上がって姿を消し\n少ししてから相手をめがけて攻撃する。"
    en: "The user attacks by disappearing high into the sky for a\nshort time, then swooping back down."
    fr: "Le lanceur prend son envol et disparaît dans le ciel.\nAprès un court instant, il attaque en plongeant\nsur la cible."
    it: "Il Pokémon si nasconde alzandosi in volo per attaccare\nil bersaglio poco dopo."
    de: "Der Anwender steigt in die Lüfte empor und\nverschwindet. Nach kurzer Zeit greift er das Ziel an."
    es: "Vuela muy alto hasta quedar fuera de vista y, tras un\nbreve período de tiempo, arremete contra el objetivo."
    ko: "하늘로 날아올라 모습을 숨긴 뒤\n잠시 후 상대를 공격한다."
    zh_simp: "飞上天空隐藏踪影，\n片刻之后瞄准对手进行攻击。"
    zh_trad: "飛上天空銷聲匿跡，\n在片刻後朝向對手發動攻擊。"
    es_latam: "Vuela muy alto hasta quedar fuera de vista y, luego de\nun breve periodo, embiste al objetivo."
flying_press:
  names:
    jp_kanji: フライングプレス
    en: Flying Press
    fr: Flying Press
    it: Schiacciatuffo
    de: Flying Press
    es: Plancha Voladora
    ko: 플라잉프레스
    zh_simp: 飞身重压
    zh_trad: 飛身重壓
    es_latam: Plancha Voladora
  descriptions:
    jp_kanji: "空中から相手にダイブする。\nこの技は　かくとうタイプと同時に\nひこうタイプでもある。"
    en: "The user attacks by diving down onto targets from\nthe sky. This move is both Fighting and Flying type\nsimultaneously."
    fr: "Le lanceur plonge en piqué sur la cible depuis le ciel.\nCette capacité est à la fois de type Combat et de type Vol."
    it: "Il Pokémon si tuffa sul bersaglio dall’alto. Questa mossa\nè di tipo Lotta e Volante allo stesso tempo."
    de: "Der Anwender stürzt sich aus der Luft auf das Ziel.\nDie Attacke gehört sowohl dem Typ Kampf als auch\ndem Typ Flug an."
    es: "El usuario se lanza sobre su objetivo desde el aire.\nEste movimiento es de tipo Lucha y tipo Volador al\nmismo tiempo."
    ko: "공중에서 상대에게 다이브한다.\n이 기술은 격투타입임과 동시에\n비행타입이기도 하다."
    zh_simp: "从空中俯冲向对手。\n此招式同时带有\n格斗属性和飞行属性。"
    zh_trad: "從空中俯衝向對手進行攻擊。\n此招式同時具有\n格鬥屬性和飛行屬性。"
    es_latam: "El usuario se lanza sobre su objetivo desde el aire.\nEste movimiento es de tipo Pelea y tipo Volador\nal mismo tiempo."
focus_blast:
  names:
    jp_kanji: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
    zh_simp: 真气弹
    zh_trad: 真氣彈
    es_latam: Ataque Centrado
  descriptions:
    jp_kanji: "気合を高めて\nありったけの力を放出する。\n相手の特防を下げることもある。"
    en: "The user attacks by heightening its mental focus to\nunleash its power. This may also lower targets’ Sp. Def\nstats."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir sur la cible. Peut aussi baisser la Défense\nSpéciale de la cible."
    it: "Il Pokémon si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del bersaglio."
    de: "Der Anwender erhöht seine Konzentration und setzt\nseine ganze Kraft frei. Die Spezial-Verteidigung\ngetroffener Gegner wird eventuell gesenkt."
    es: "Agudiza la concentración mental y libera su poder.\nPuede reducir la Defensa Especial del objetivo."
    ko: "기합을 높여서 혼신의 힘을 방출한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时也会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時還會降低對手的特防。"
    es_latam: "Agudiza la concentración mental y libera su poder.\nPuede reducir la Defensa Especial del objetivo."
focus_energy:
  names:
    jp_kanji: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
    zh_simp: 聚气
    zh_trad: 聚氣
    es_latam: Centrar Energía
  descriptions:
    jp_kanji: "深く息を吸い　気合をこめる。\nしばらくのあいだ自分の攻撃が\n急所に当たりやすくなる。"
    en: "The user takes a deep breath and focuses, increasing the\nchance of its attacks landing critical hits for a while."
    fr: "Le lanceur prend une profonde inspiration et se\nconcentre pour augmenter son taux de critiques\npendant un certain temps."
    it: "Il Pokémon fa un profondo respiro e si concentra per\nrendere più probabili i brutti colpi per un certo tempo."
    de: "Der Anwender atmet tief ein und bündelt Kraft, wodurch\ndie Volltrefferquote seiner Angriffe für einige Zeit steigt."
    es: "Concentra energía para aumentar durante un tiempo\nla probabilidad de asestar un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n한동안 자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n在一段时间内自己的攻击\n会变得容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n在一段時間內自己的攻擊\n變得容易擊中要害。"
    es_latam: "Concentra energía para aumentar la probabilidad\nde lanzar un golpe crítico."
