    jp_kanji: "体を一気に\n大きく生長させて\n少しのあいだ自分の攻撃と特攻を上げる。"
    en: "The user boosts its Attack and Sp. Atk stats for a short\ntime by prompting its body to grow all at once."
    fr: "Le corps du lanceur se développe d’un seul coup,\nce qui augmente son Attaque et son Attaque Spéciale\npendant un court instant."
    it: "Il Pokémon provoca la crescita immediata del proprio\ncorpo, aumentando l’Attacco e l’Attacco Speciale\nper un po’ di tempo."
    de: "Der Anwender lässt plötzlich seinen Körper wachsen\nund erhöht so für kurze Zeit seinen Angriff und\nSpezial-Angriff."
    es: "Hace que su cuerpo crezca a marchas forzadas, con lo\nque aumenta su Ataque y su Ataque Especial durante\nun breve período de tiempo."
