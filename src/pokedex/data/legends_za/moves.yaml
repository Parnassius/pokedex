    jp_kanji: "霧状の羽毛で包みこみ攻撃する。\n相手の特攻を下げることがある。"
    en: "The user attacks with a ball packed with mist-like down.\nThis may also lower targets’ Sp. Atk stats."
    fr: "Le lanceur envoie une bulle de brume qui inflige\ndes dégâts à la cible et peut aussi réduire\nson Attaque Spéciale."
    it: "Il Pokémon attacca avvolgendo il bersaglio in una sfera\ndi nebbia. Può anche ridurne l’Attacco Speciale."
    de: "Der Anwender greift mit einem Nebelball aus Daunen an.\nDer Spezial-Angriff getroffener Gegner wird eventuell\ngesenkt."
    es: "Bola de plumas neblinosas que inflige daño al objetivo\ny puede reducir su Ataque Especial."
    ko: "안개의 깃털로 둘러싸 공격한다.\n상대의 특수공격을 떨어뜨릴 때가 있다."
    zh_simp: "用围绕着雾状\n羽毛的球进行攻击。\n有时会降低对手的特攻。"
    zh_trad: "將霧狀的羽毛聚集成團進行攻擊。\n有時會降低對手的特攻。"
