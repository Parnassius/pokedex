    en: "The user attacks by immersing targets in superheated\nsteam. This may also leave targets with a burn."
    fr: "Le lanceur projette de la vapeur extrêmement chaude\nsur la cible. Peut aussi la brûler."
    it: "Il Pokémon travolge il bersaglio con un’ondata di vapore\nrovente che può anche scottarlo."
    de: "Der Anwender bedeckt das Ziel mit siedend heißem\nDampf. Getroffene Gegner erleiden eventuell\nVerbrennungen."
    es: "Envuelve al objetivo con vapor extremadamente caliente\nque puede causar quemaduras."
    ko: "상대에게 굉장히 뜨거운 증기를 뿜는다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "将滚烫的蒸汽喷向对手。\n有时也会让对手灼伤。"
    zh_trad: "將超高溫的蒸汽噴向對手。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Envuelve al objetivo con vapor extremadamente caliente\nque puede causar quemaduras."
