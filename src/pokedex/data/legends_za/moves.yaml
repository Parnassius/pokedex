    zh_trad: 水波刀
    es_latam: Corte Acuático
aqua_jet:
  names:
    jp_kanji: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
    zh_simp: 水流喷射
    zh_trad: 水流噴射
    es_latam: Acuajet
  descriptions:
    jp_kanji: "目にも留まらぬ　ものすごい速さで\n相手につっこむ。"
    en: "The user attacks by lunging toward targets with blinding\nspeed."
    fr: "Le lanceur fonce sur la cible si rapidement qu’on\nparvient à peine à le discerner."
    it: "Il Pokémon colpisce a una tale velocità da rendersi\nquasi invisibile."
    de: Der Anwender stürzt sich extrem schnell auf das Ziel.
    es: Ataca al objetivo a tal velocidad que es casi imperceptible.
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다."
    zh_simp: "以迅雷不及掩耳之势\n扑向对手。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。"
    es_latam: Ataca al objetivo a tal velocidad que es casi imperceptible.
aqua_ring:
  names:
    jp_kanji: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
    zh_simp: 水流环
    zh_trad: 水流環
    es_latam: Acuaanillo
  descriptions:
    jp_kanji: "自分の体の周りを\n水でつくったベールで　おおい\n少しずつＨＰを回復しつづける。"
    en: "The user summons a ring of water that will gradually\nrestore its HP."
    fr: "Un voile d’eau recouvre le lanceur et régénère ses PV\npetit à petit."
    it: "Il Pokémon si avvolge in un velo d’acqua, recuperando PS\nun po’ alla volta."
    de: "Der Anwender umgibt sich mit einem Schleier aus\nWasser und regeneriert nach und nach KP."
    es: "El usuario se cubre con un manto de agua que restaura\nPS poco a poco."
    ko: "자신의 몸 주변을\n물로 만든 베일로 덮어\n조금씩 HP를 회복한다."
    zh_simp: "在自己身体的周围\n覆盖用水制造的幕。\n会持续地缓缓回复ＨＰ。"
    zh_trad: "在自己的身邊套上水流環，\n持續地緩緩回復自己的ＨＰ。"
    es_latam: "El usuario se cubre con un manto de agua que restaura\nPS poco a poco."
