    ko: 탁쳐서떨구기
    zh_simp: 拍落
    zh_trad: 拍落
    es_latam: Desarme
  descriptions:
    jp_kanji: "相手の持ち物をはたき落として\n戦闘が終わるまで使えなくする。\n物を持つ相手にはダメージが増す。"
    en: "The user attacks by slapping targets’ held items away,\nmaking the items unusable for the rest of the battle.\nThis move does more damage to targets holding items."
    fr: "Le lanceur inflige plus de dégâts aux cibles qui tiennent\nun objet. De plus, il fait tomber l’objet et empêche\nla cible de l’utiliser jusqu’à la fin du combat."
    it: "Il Pokémon fa cadere lo strumento del bersaglio,\nimpedendone l’uso nella lotta. Infligge più danni se\nil bersaglio ha uno strumento."
    de: "Der Anwender schlägt das Item des Zieles weg und\nvereitelt so dessen Gebrauch während des Kampfes. Der\nSchaden steigt bei Zielen, die ein Item bei sich tragen."
    es: "Hace que el objetivo suelte el objeto que lleva y le\nimpide usarlo hasta que concluye el combate. Inflige\nmás daño si el objetivo lleva un objeto."
    ko: "상대의 지닌 물건을 탁 쳐서 떨어뜨려\n배틀이 끝날 때까지 사용할 수 없게 한다.\n물건을 가진 상대에게는 데미지를 더 준다."
    zh_simp: "拍落对手的持有物，\n直到战斗结束都不能使用。\n对手携带道具时会增加伤害。"
    zh_trad: "拍落對手的持有物，\n讓對手在戰鬥結束前都無法使用。\n對手有攜帶物品時，傷害會增加。"
    es_latam: "Hace que el objetivo suelte el objeto que lleva y le\nimpide usarlo hasta que concluye el combate. Causa\nmás daño si el objetivo lleva un objeto."
kowtow_cleave:
  names:
    jp_kanji: ドゲザン
    en: Kowtow Cleave
    fr: Génusection
    it: Genufendente
    de: Kniefallspalter
    es: Genufendiente
    ko: 도각참
    zh_simp: 仆刀
    zh_trad: 仆斬
    es_latam: Genufendiente
lands_wrath:
  names:
    jp_kanji: グランドフォース
    en: Land’s Wrath
    fr: Force Chtonienne
    it: Forza Tellurica
    de: Bodengewalt
    es: Fuerza Telúrica
    ko: 그라운드포스
    zh_simp: 大地神力
    zh_trad: 大地神力
    es_latam: Fuerza Telúrica
  descriptions:
    jp_kanji: "大地のパワーを集め\n力を相手に集中させて攻撃する。"
    en: "The user attacks by gathering energy from the land and\nfocusing that power on targets."
    fr: "Le lanceur puise de l’énergie dans le sol et la concentre\nsur la cible pour infliger des dégâts."
    it: "Il Pokémon attacca accumulando energia tellurica\ne concentrandone il potere sul bersaglio."
    de: "Der Anwender sammelt die Kraft des weiten Landes und\ngreift an, indem er sie gebündelt auf das Ziel lenkt."
    es: "Acumula energía de la corteza terrestre y la concentra\ncontra el objetivo para dañarlo."
    ko: "대지의 힘을 모으고\n그 힘을 상대에게 집중시켜서 공격한다."
    zh_simp: "聚集大地的力量，\n将此力量集中攻击对手。"
    zh_trad: "聚集大地的能量後，\n將力量集中攻擊對手。"
    es_latam: "Acumula energía de la corteza terrestre y la concentra\ncontra el objetivo para causarle daño."
laser_focus:
  names:
    jp_kanji: とぎすます
    en: Laser Focus
    fr: Affilage
    it: Concentrazione
    de: Konzentration
    es: Aguzar
    ko: 예민해지기
    zh_simp: 磨砺
    zh_trad: 磨礪
    es_latam: Agudizar
lash_out:
  names:
    jp_kanji: うっぷんばらし
    en: Lash Out
    fr: Cent Rancunes
    it: Sfogarabbia
    de: Frustventil
    es: Desahogo
    ko: 분풀이
    zh_simp: 泄愤
    zh_trad: 洩憤
    es_latam: Desahogo
last_resort:
  names:
    jp_kanji: とっておき
    en: Last Resort
    fr: Dernier Recours
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 비장의무기
    zh_simp: 珍藏
    zh_trad: 珍藏
    es_latam: Último Recurso
last_respects:
  names:
    jp_kanji: おはかまいり
    en: Last Respects
    fr: Hommage Posthume
    it: Omaggio ai KO
    de: Letzte Ehre
    es: Homenaje Póstumo
    ko: 성묘
    zh_simp: 扫墓
    zh_trad: 掃墓
    es_latam: Homenaje Póstumo
lava_plume:
  names:
    jp_kanji: ふんえん
    en: Lava Plume
    fr: Ébullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
    zh_simp: 喷烟
    zh_trad: 噴煙
    es_latam: Bomba de Lava
  descriptions:
    jp_kanji: "真っ赤な炎で\n周りにいるものを攻撃する。\n相手をやけど状態にすることもある。"
    en: "The user attacks by unleashing an inferno of scarlet\nflames across a wide area. This may also leave those hit\nwith a burn."
    fr: "Des flammes jaillissent autour du lanceur.\nPeut aussi brûler la cible."
    it: "Il Pokémon attacca tutto intorno con fiamme scarlatte\nche possono anche scottare."
    de: "Der Anwender greift mit tiefroten Flammen alles im\nUmkreis an. Getroffene Pokémon erleiden eventuell\nVerbrennungen."
    es: "Un infierno de llamas que causa daño a su alrededor.\nPuede quemar."
    ko: "새빨간 불꽃으로\n주위에 있는 포켓몬을 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击周围所有的对象。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊周圍所有的對象。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Un infierno de llamas que causa daño a su alrededor.\nPuede quemar."
leaf_blade:
  names:
    jp_kanji: リーフブレード
    en: Leaf Blade
    fr: Lame Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
    zh_simp: 叶刃
    zh_trad: 葉刃
    es_latam: Hoja Aguda
  descriptions:
    jp_kanji: "はっぱを剣のように操り\n相手を切りつけて攻撃する。\n急所に当たりやすい。"
    en: "The user attacks by using a leaf like a sword to slice\ntargets. This move has a heightened chance of landing\na critical hit."
    fr: "Une feuille coupante comme une lame entaille la cible.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio manovrando una foglia\ncome se fosse una spada. Probabile brutto colpo."
    de: "Der Anwender schwingt Blätter wie ein Schwert und\nschneidet damit das Ziel. Hohe Volltrefferquote."
    es: "Acuchilla con una hoja fina. Suele asestar un golpe\ncrítico."
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
    es_latam: "Acuchilla con una hoja fina. Suele lanzar un golpe\ncrítico."
leaf_storm:
  names:
    jp_kanji: リーフストーム
    en: Leaf Storm
    fr: Tempête Verte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
    zh_simp: 飞叶风暴
    zh_trad: 飛葉風暴
    es_latam: Tormenta Hojas
  descriptions:
    jp_kanji: "とがった　はっぱで相手に嵐をおこす。\n使うと反動で\nしばらくのあいだ自分の特攻が下がる。"
    en: "The user attacks by whipping up a storm of sharp leaves\naround targets. The recoil will lower the user’s Sp. Atk\nstat for a while."
    fr: "Le lanceur invoque une tempête de feuilles acérées\nsur la cible. Le contrecoup baisse l’Attaque Spéciale\ndu lanceur pendant un certain temps."
    it: "Il Pokémon scatena sul bersaglio una tempesta di foglie\naffilate. Il contraccolpo riduce l’Attacco Speciale di chi\nla usa per un certo tempo."
    de: "Der Anwender weht einen Sturm aus scharfen Blättern\nauf das Ziel. Durch den Rückstoß wird sein\nSpezial-Angriff für einige Zeit gesenkt."
    es: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce el Ataque Especial del usuario durante\nun tiempo."
    ko: "뾰족한 잎사귀로 상대에게 돌풍을 일으킨다.\n사용하면 반동으로\n한동안 자신의 특수공격이 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力，\n在一段时间内自己的特攻会降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n在一段時間內自己的特攻會降低。"
    es_latam: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce el Ataque Especial del usuario durante\nun tiempo."
leaf_tornado:
  names:
    jp_kanji: グラスミキサー
    en: Leaf Tornado
    fr: Phytomixeur
    it: Vorticerba
    de: Grasmixer
    es: Ciclón de Hojas
    ko: 그래스믹서
    zh_simp: 青草搅拌器
    zh_trad: 青草攪拌器
    es_latam: Ciclón de Hojas
leafage:
  names:
    jp_kanji: このは
    en: Leafage
    fr: Feuillage
    it: Fogliame
    de: Blattwerk
    es: Follaje
    ko: 나뭇잎
    zh_simp: 树叶
    zh_trad: 樹葉
    es_latam: Follaje
  descriptions:
    jp_kanji: はっぱを相手に当てて攻撃する。
    en: The user attacks by pelting targets with leaves.
    fr: Le lanceur attaque la cible avec des feuilles.
    it: Il Pokémon attacca il bersaglio con delle foglie.
    de: Der Anwender greift das Ziel mit Blättern an.
    es: Ataca al objetivo lanzando hojas.
    ko: 잎사귀를 상대에게 맞혀서 공격한다.
    zh_simp: "将叶片打向对手，\n进行攻击。"
    zh_trad: 將葉片打向對手進行攻擊。
    es_latam: Ataca al objetivo lanzando hojas.
leech_life:
  names:
    jp_kanji: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
    zh_simp: 汲取
    zh_trad: 吸血
    es_latam: Chupavidas
  descriptions:
    jp_kanji: "血を吸い取って攻撃する。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by draining targets of their blood. The\nuser’s HP will be restored by a portion of the damage\ndealt."
    fr: "Une attaque qui permet d’aspirer le sang de la cible et\nde convertir une partie des dégâts infligés en PV pour\nle lanceur."
    it: "Il Pokémon succhia il sangue del bersaglio e lo attacca,\nrecuperando una quantità di PS pari a parte del danno\ninflitto."
    de: "Der Anwender saugt dem Ziel Blut ab und regeneriert\neinen Teil des dabei zugefügten Schadens als KP."
    es: "Ataca chupándole la sangre al objetivo. El usuario\nrecupera algunos PS según el daño que produzca."
    ko: "피를 빨아서 공격한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "吸取血液进行攻击。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "吸取血液進行攻擊。\n可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Ataca chupándole la sangre al objetivo. El usuario\nrecupera algunos PS según el daño que produzca."
leech_seed:
  names:
    jp_kanji: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
    zh_simp: 寄生种子
    zh_trad: 寄生種子
    es_latam: Drenadoras
  descriptions:
    jp_kanji: "タネを植えつけて\n相手のＨＰを少しずつ吸い取り\n自分のＨＰを回復する。"
    en: "The user plants seeds that will slowly but continually\nabsorb HP from targets and restore the user’s HP."
    fr: "Le lanceur sème une graine sur sa cible. Cette graine\nabsorbe peu à peu des PV pour les restituer au lanceur."
    it: "Il Pokémon pianta dei semi sul bersaglio.\nQuesti sottraggono PS a poco a poco permettendo\na chi la usa di curarsi."
    de: "Der Anwender pflanzt Samen auf dem Ziel ein und\nentzieht diesem nach und nach KP, wodurch er selbst\nKP regeneriert."
    es: "Planta semillas que absorben PS del objetivo poco a poco\ny que le sirven para recuperarse."
    ko: "씨가 뿌려진\n상대의 HP를 조금씩 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "植入寄生种子后，\n会一点一点吸取对手的ＨＰ，\n从而用来回复自己的ＨＰ。"
    zh_trad: "在對手身上植入種子，\n每回合緩緩吸取對手的ＨＰ，\n用來回復自己的ＨＰ。"
    es_latam: "Planta semillas que absorben PS del objetivo poco a poco\ny que le sirven para recuperarse."
leer:
  names:
    jp_kanji: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
    zh_simp: 瞪眼
    zh_trad: 瞪眼
    es_latam: Malicioso
  descriptions:
    jp_kanji: "鋭い目つきでおびえさせて\n少しのあいだ相手の防御を下げる。"
    en: "The user frightens targets with an intimidating leer,\nwhich lowers their Defense stats for a short time."
    fr: "Le lanceur fait les gros yeux à la cible pour l’effrayer\net baisser sa Défense pendant un court instant."
    it: "Il Pokémon terrorizza il bersaglio con uno sguardo\nfulminante e intimidatorio, riducendone la Difesa\nper un po’ di tempo."
    de: "Der Anwender schüchtert das Ziel mit einem\nbedrohlichen Blick ein. Die Verteidigung getroffener\nGegner wird für kurze Zeit gesenkt."
    es: "Intimida al objetivo con una mirada torva para reducir\nsu Defensa durante un breve período de tiempo."
    ko: "날카로운 눈초리로 겁을 주어\n잠시 동안 상대의 방어를 떨어뜨린다."
    zh_simp: "用犀利的眼神使对手害怕，\n从而在一小段时间内降低对手的防御。"
    zh_trad: "用犀利的眼神使對手害怕，\n在一小段時間內降低對手的防禦。"
    es_latam: "Intimida al objetivo con una mirada amenazadora\npara reducir su Defensa durante un breve periodo."
lick:
  names:
    jp_kanji: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
    zh_simp: 舌舔
    zh_trad: 舌舔
    es_latam: Lengüetazo
  descriptions:
    jp_kanji: "長い舌で\nなめまわして攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by licking targets with a long tongue.\nThis may also leave targets paralyzed."
    fr: "Le lanceur attaque en donnant un grand coup de langue\nà la cible. Peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio leccandolo con la sua\nlingua lunga. Può anche paralizzarlo."
    de: "Der Anwender greift an, indem er mit seiner langen\nZunge das Ziel ableckt. Getroffene Gegner werden\neventuell paralysiert."
    es: "El usuario ataca al objetivo lamiéndolo con su larga\nlengua. Puede causar parálisis."
    ko: "긴 혀로 핥아서 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用长长的舌头舔来舔去进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用長長的舌頭\n舔來舔去進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "El usuario ataca al objetivo lamiéndolo con su larga\nlengua. Puede causar parálisis."
life_dew:
  names:
    jp_kanji: いのちのしずく
    en: Life Dew
    fr: Fontaine de Vie
    it: Goccia Vitale
    de: Lebenstropfen
    es: Gota Vital
    ko: 생명의물방울
    zh_simp: 生命水滴
    zh_trad: 生命水滴
    es_latam: Gota Vital
light_of_ruin:
  names:
    jp_kanji: はめつのひかり
    en: Light of Ruin
    fr: Lumière du Néant
    it: Luce Nefasta
    de: Lux Calamitatis
    es: Luz Aniquiladora
    ko: 파멸의빛
    zh_simp: 破灭之光
    zh_trad: 破滅之光
    es_latam: Luz Aniquiladora
  descriptions:
    jp_kanji: "永遠の花のパワーをかりて\n強力な光線を撃ちだす。\n自分もダメージを受ける。"
    en: "The user attacks by drawing power from the Eternal\nFlower to fire off a powerful beam of light. The user will\nalso take some damage."
    fr: "Le lanceur utilise la puissance de la fleur Éternelle\npour lancer un formidable rayon d’énergie.\nBlesse aussi le lanceur."
    it: "Il Pokémon concentra il potere del Fiore Eterno per\nsparare un raggio di luce potentissimo, ma subisce danni."
    de: "Der Anwender nutzt die Kraft des Ewigblütlers, um einen\nmächtigen Lichtstrahl abzufeuern. Dabei erleidet er\nselbst Schaden."
    es: "El usuario emplea el poder de la Flor Eterna para lanzar\nun potente rayo de luz, pero también se hiere gravemente\na sí mismo."
    ko: "영원의 꽃의 파워를 빌려서\n강력한 광선을 쏜다.\n자신도 데미지를 입는다."
    zh_simp: "借用永恒之花的力量，\n发射出强力的光线。\n自己也会受到伤害。"
    zh_trad: "借用永恆之花的力量，\n發射出強力光線。\n自己也會受到傷害。"
    es_latam: "El usuario emplea el poder de la Flor Eterna para lanzar\nun poderoso rayo de luz, pero también se hiere\ngravemente a sí mismo."
light_screen:
  names:
    jp_kanji: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla de Luz
    ko: 빛의장막
    zh_simp: 光墙
    zh_trad: 光牆
    es_latam: Pantalla de Luz
  descriptions:
    jp_kanji: "不思議なかべで　しばらくのあいだ\n相手から受ける特殊攻撃のダメージを弱める。\n交代しても効果は続く。"
    en: "The user constructs a wondrous wall of light that will\nreduce damage taken from special moves for a while.\nThis effect continues even if the user is switched out."
    fr: "Crée de fabuleux murs de lumière qui réduisent les dégâts\ncausés par les attaques spéciales pendant un certain\ntemps. L’effet persiste même si le lanceur est remplacé."
    it: "Il Pokémon innalza una barriera misteriosa che per un\ncerto tempo riduce i danni degli attacchi speciali subiti.\nL’effetto persiste dopo la sostituzione."
    de: "Der Anwender senkt mit mysteriösen Wänden für einige\nZeit den Schaden durch erlittene Spezial-Angriffe.\nDer Effekt bleibt auch nach dem Auswechseln bestehen."
    es: "Barrera misteriosa que reduce durante un tiempo el daño\nproducido por los ataques especiales del rival. El efecto\npermanece aunque se cambie de Pokémon."
    ko: "이상한 장막을 쳐서 한동안\n상대로부터 받는 특수공격의 데미지를 약하게 한다.\n교체해도 효과는 지속된다."
    zh_simp: "利用神奇的墙壁，在一段时间内\n减弱来自对手的特殊攻击的伤害。\n替换后效果也会持续。"
    zh_trad: "利用神奇的屏障，在一段時間內\n減輕來自對手的特殊攻擊傷害。\n替換後效果仍會持續。"
    es_latam: "Una barrera misteriosa que reduce durante un tiempo\nel daño que producen los ataques especiales del rival.\nEl efecto permanece aunque se cambie de Pokémon."
liquidation:
  names:
    jp_kanji: アクアブレイク
