    zh_trad: 種子閃光
    es_latam: Fulgor Semilla
seismic_toss:
  names:
    jp_kanji: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Movim. Sismico
    de: Geowurf
    es: Sísmico
    ko: 지구던지기
    zh_simp: 地球上投
    zh_trad: 地球上投
    es_latam: Sísmico
self_destruct:
  names:
    jp_kanji: じばく
    en: Self-Destruct
    fr: Destruction
    it: Autodistruzione
    de: Finale
    es: Autodestrucción
    ko: 자폭
    zh_simp: 玉石俱碎
    zh_trad: 自爆
    es_latam: Autodestrucción
  descriptions:
    jp_kanji: "爆発をおこして\n周りにいるものを攻撃する。\n使ったあと　ひんしになる。"
    en: "The user emits explosive force, causing damage across a\nwide area. The user faints after using this move."
    fr: "Le lanceur explose et frappe tout ce qui se trouve\nalentour, puis tombe K.O."
    it: "Il Pokémon attacca tutto intorno causando\nun’esplosione, ma poi va KO."
    de: "Der Anwender greift mit einer Explosion alles im Umkreis\nan und wird danach kampfunfähig."
    es: "El atacante explota y causa daño a su alrededor.\nEl usuario se debilita de inmediato."
    ko: "폭발을 일으켜서\n주위에 있는 포켓몬을 공격한다.\n사용한 다음 기절하게 된다."
    zh_simp: "引发爆炸，\n攻击周围所有的对象。\n使用后自己会陷入昏厥。"
    zh_trad: "引起爆炸，\n攻擊周圍所有的對象。\n使用後自己會陷入瀕死。"
    es_latam: "El atacante explota y causa daño a su alrededor.\nEl usuario se debilita de inmediato."
shadow_ball:
  names:
    jp_kanji: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
    zh_simp: 暗影球
    zh_trad: 暗影球
    es_latam: Bola Sombra
  descriptions:
    jp_kanji: "黒い影の塊を投げつけて攻撃する。\n相手の特防を下げることもある。"
    en: "The user attacks by hurling a shadowy blob. This may\nalso lower targets’ Sp. Def stats."
    fr: "Le lanceur projette une grande ombre sur la cible.\nPeut aussi baisser la Défense Spéciale de la cible."
    it: "Il Pokémon attacca lanciando sul bersaglio un grumo\ndi ombre nere. Può anche ridurne la Difesa Speciale."
    de: "Der Anwender greift an, indem er einen dunklen\nSchattenball wirft. Die Spezial-Verteidigung getroffener\nGegner wird eventuell gesenkt."
    es: "Lanza una bola oscura que puede reducir la Defensa\nEspecial del objetivo."
    ko: "까만 그림자 덩어리를 내던져서 공격한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "投掷团状的黑影进行攻击。\n有时也会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時還會降低對手的特防。"
    es_latam: "Lanza una bola oscura que puede reducir la Defensa\nEspecial del objetivo."
shadow_bone:
  names:
    jp_kanji: シャドーボーン
    en: Shadow Bone
    fr: Os Ombre
    it: Ossotetro
    de: Schattenknochen
    es: Hueso Sombrío
    ko: 섀도본
    zh_simp: 暗影之骨
    zh_trad: 暗影之骨
    es_latam: Hueso Sombrío
  descriptions:
    jp_kanji: "魂の宿ったホネで\n相手をなぐりつけて攻撃する。\n相手の防御を下げることがある。"
    en: "The user attacks by beating targets with a bone in which\na spirit resides. This may also lower targets’ Defense\nstats."
    fr: "Le lanceur frappe avec un os possédé par l’âme\nd’un défunt. Peut aussi baisser la Défense de la cible."
    it: "Il Pokémon attacca colpendo il bersaglio con un osso\nin cui alberga uno spirito. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit einem Knochen an,\nin dem eine Seele haust. Die Verteidigung getroffener\nGegner wird eventuell gesenkt."
    es: "Ataca golpeando con un hueso poseído por un espíritu.\nPuede reducir la Defensa del objetivo."
    ko: "영혼이 머물고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用附有灵魂的骨头\n殴打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用寄宿了靈魂的骨頭\n毆打對手進行攻擊。\n有時會降低對手的防禦。"
    es_latam: "Ataca golpeando con un hueso que está poseído\npor un espíritu. Puede reducir la Defensa del objetivo."
shadow_claw:
  names:
    jp_kanji: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도클로
    zh_simp: 暗影爪
    zh_trad: 暗影爪
    es_latam: Garra de Sombra
  descriptions:
    jp_kanji: "影からつくった鋭いツメで\n相手を切り裂く。\n急所に当たりやすい。"
    en: "The user attacks by slashing with a sharp claw made\nfrom shadows. This move has a heightened chance of\nlanding a critical hit."
    fr: "Le lanceur attaque la cible avec une griffe acérée faite\nd’ombres. Taux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio con taglienti artigli\nd’ombra. Probabile brutto colpo."
    de: "Der Anwender schlitzt das Ziel mit einer scharfen Klaue\naus Schatten auf. Hohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha de sombras. Suele\nasestar un golpe crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
    es_latam: "Ataca con una garra afilada hecha de sombras. Suele\nlanzar un golpe crítico."
shadow_force:
  names:
    jp_kanji: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
    zh_simp: 暗影潜袭
    zh_trad: 暗影潛襲
    es_latam: Golpe Umbrío
shadow_punch:
  names:
    jp_kanji: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
    zh_simp: 暗影拳
    zh_trad: 暗影拳
    es_latam: Puño Sombra
  descriptions:
    jp_kanji: "影にまぎれて\n素早くパンチをくりだす。"
    en: "The user attacks by hiding in shadows and then throwing\nout a quick punch."
    fr: "Le lanceur se fond dans les ombres pour porter\nun rapide coup de poing."
    it: Il Pokémon tira un rapido pugno col favore delle tenebre.
    de: "Der Anwender verbirgt sich im Schatten und greift mit\neinem schnellen Faustschlag an."
    es: Puñetazo rápido procedente de las sombras.
    ko: "그림자에 섞여\n빠르게 펀치를 날린다."
    zh_simp: "藏身于阴影中，\n快速出拳。"
    zh_trad: 暗藏在陰影之中快速出拳。
    es_latam: Puñetazo rápido procedente de las sombras.
shadow_sneak:
  names:
    jp_kanji: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
    zh_simp: 影子偷袭
    zh_trad: 影子偷襲
    es_latam: Sombra Vil
  descriptions:
    jp_kanji: "影をのばして\n相手の背後から攻撃する。"
    en: "The user attacks by stretching out a shadow to strike\ntargets from behind."
    fr: "Le lanceur étend son ombre pour frapper la cible\npar-derrière."
    it: "Il Pokémon estende la sua ombra e attacca il bersaglio\nalle spalle."
    de: "Der Anwender erweitert seinen Schatten und greift das\nZiel von hinten an."
    es: Extiende su sombra y ataca al objetivo por la espalda.
    ko: "그림자를 늘려\n상대의 배후에서 공격한다."
    zh_simp: "伸长影子，\n从对手的背后进行攻击。"
    zh_trad: "伸長自己的影子，\n從對手的背後進行攻擊。"
    es_latam: Extiende su sombra y ataca al objetivo por la espalda.
