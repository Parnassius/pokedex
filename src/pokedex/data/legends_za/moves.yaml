    ko: 암석봉인
    zh_simp: 岩石封锁
    zh_trad: 岩石封鎖
    es_latam: Tumba de Rocas
  descriptions:
    jp_kanji: "岩石を投げつけて攻撃する。\n攻撃が当たると相手の動きを遅くする。\n当たらなかった岩はその場に残る。"
    en: "The user attacks by hurling a boulder. Boulders that hit\nwill also make targets move more slowly. Boulders that\nmiss will remain on the battlefield."
    fr: "Le lanceur attaque en jetant des rochers qui baissent\naussi la vitesse de déplacement des cibles touchées.\nTout rocher qui manque sa cible reste sur le terrain."
    it: "Il Pokémon attacca il bersaglio lanciando una roccia.\nSe colpisce il bersaglio lo rallenta, altrimenti la roccia\nrimane sul campo."
    de: "Der Anwender greift an, indem er einen Felsen\nschleudert. Getroffene Gegner bewegen sich langsamer.\nWenn der Felsen nicht trifft, bleibt er liegen."
    es: "Lanza rocas que infligen daño al objetivo y que lo vuelven\nmás lento. Si no aciertan, se quedarán en el terreno de\ncombate."
    ko: "암석을 내던져서 공격한다.\n공격에 맞은 상대는 움직임이 느려진다.\n맞지 않은 바위는 그 자리에 남는다."
    zh_simp: "投掷岩石进行攻击。\n击中时会使对手的动作变得迟缓，\n没有击中的岩石会留在原地。"
    zh_trad: "投擲岩石進行攻擊。\n命中時能讓對手的動作變慢。\n沒有擊中對手的岩石會留在場上。"
    es_latam: "Lanza rocas que infligen daño al objetivo y que lo vuelven\nmás lento. Si no aciertan, se quedarán en el terreno\nde combate."
