    ko: 전격파
    zh_simp: 电击波
    zh_trad: 電擊波
    es_latam: Onda de Choque
shore_up:
  names:
    jp_kanji: すなあつめ
    en: Shore Up
    fr: Amass’Sable
    it: Sabbiaccumulo
    de: Sandsammler
    es: Recogearena
    ko: 모래모으기
    zh_simp: 集沙
    zh_trad: 集沙
    es_latam: Recogearena
  descriptions:
    jp_kanji: "周りの砂をかき集め吸収することで\n自分のＨＰを回復する。"
    en: "The user restores some HP by kicking up a cloud of sand\nfrom its surroundings, then absorbing the sand into\nitself."
    fr: "Le lanceur rassemble le sable autour de lui et l’aspire\nafin de récupérer des PV."
    it: "Il Pokémon recupera metà dei propri PS massimi.\nDurante le tempeste di sabbia ne recupera di più."
    de: "Der Anwender sammelt Sand um sich herum und\nabsorbiert ihn, um KP zu regenerieren."
    es: "Recoge arena de los alrededores y la absorbe para\nrestaurar algunos PS."
    ko: "주변의 모래를 그러모은 다음 흡수해서\n자신의 HP를 회복한다."
    zh_simp: "聚集周围的沙子并吸收，\n回复自己的ＨＰ。"
    zh_trad: "收集並吸收周圍的沙子，\n藉此回復自己的ＨＰ。"
    es_latam: "Recoge arena de los alrededores y la absorbe para\nrestaurar algunos PS."
signal_beam:
  names:
    jp_kanji: シグナルビーム
