double_edge:
  names:
    jp_kanji: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
    zh_simp: 舍身冲撞
    zh_trad: 捨身衝撞
    es_latam: Doble Filo
  descriptions:
    jp_kanji: "命を懸けて\n相手に突進して攻撃する。\n自分もダメージを受ける。"
    en: "The user attacks with a reckless, all-out charge. The user\nwill also take some damage."
    fr: "Une charge dangereuse et imprudente.\nBlesse aussi le lanceur."
    it: "Il Pokémon attacca il bersaglio lanciandosi in una carica\nspericolata, ma subisce danni."
    de: "Der Anwender greift an, indem er unter Einsatz seines\nLebens auf das Ziel zustürmt. Dabei erleidet er selbst\nSchaden."
    es: Ataque arriesgado que también hiere al usuario.
    ko: "목숨을 걸고\n상대에게 돌진하여 공격을 한다.\n자신도 데미지를 입는다."
    zh_simp: "拼命地猛撞向对手进行攻击。\n自己也会受到伤害。"
    zh_trad: "捨身衝撞對手進行攻擊。\n自己也會受到傷害。"
    es_latam: Ataque arriesgado que también hiere al usuario.
double_hit:
  names:
    jp_kanji: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
    zh_simp: 二连击
    zh_trad: 二連擊
    es_latam: Doble Golpe
  descriptions:
    jp_kanji: "しっぽなどを使い\n相手をたたいて攻撃する。\n２回連続で攻撃を繰り出す。"
    en: "The user attacks with two strikes dealt with a tail or the\nlike, one after the other."
    fr: "Le lanceur frappe la cible deux fois d’affilée à l’aide\nde sa queue ou d’une autre partie de son corps."
    it: "Il Pokémon attacca il bersaglio colpendolo due volte\nin rapida successione con la coda, una liana o simili."
    de: "Der Anwender greift das Ziel zweimal hintereinander an,\nindem er es mit dem Schweif oder Ähnlichem schlägt."
    es: "Golpea al objetivo dos veces seguidas con la cola u otras\npartes de su cuerpo."
    ko: "꼬리 등을 써서\n상대를 때려 공격한다.\n2회 연속으로 공격한다."
    zh_simp: "使用尾巴等\n拍打对手进行攻击。\n连续攻击２次。"
    zh_trad: "用尾巴等\n向對手進行攻擊。\n連續攻擊２次。"
    es_latam: "Golpea al objetivo dos veces seguidas con la cola u otras\npartes de su cuerpo."
double_iron_bash:
  names:
    jp_kanji: ダブルパンツァー
    en: Double Iron Bash
    fr: Écrous d’Poing
    it: Pugni Corazzati
    de: Panzerfäuste
    es: Ferropuño Doble
    ko: 더블펀처
    zh_simp: 钢拳双击
    zh_trad: 鋼拳雙擊
    es_latam: Ferropuño Doble
  descriptions:
    jp_kanji: "胸のナットを軸に回転して\n２回続けて腕をたたきつける。\n相手をひるませることがある。"
    en: "The user attacks by spinning itself around the hex nut in\nits chest, striking targets twice with its arms, one after\nanother. This may also make targets flinch."
    fr: "Le lanceur fait pivoter l’écrou de sa poitrine pour\nfrapper la cible avec ses bras deux fois d’affilée,\nce qui peut aussi apeurer celle-ci."
    it: "Il Pokémon colpisce il bersaglio due volte con le braccia\nruotando su se stesso. Può anche farlo tentennare."
    de: "Der Anwender rotiert um die Schraubenmutter in seinem\nBrustkorb und schlägt zweimal hintereinander mit den\nArmen zu. Getroffene Gegner schrecken eventuell zurück."
    es: "Usando la tuerca del pecho como eje, gira sobre sí\nmismo y golpea con los brazos dos veces seguidas.\nPuede amedrentar al objetivo."
    ko: "가슴의 너트를 축으로 회전시켜\n2번 연속 팔로 힘껏 친다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以胸口的螺帽为中心旋转，\n并连续２次挥动手臂打击对手。\n有时会使对手畏缩。"
    zh_trad: "以胸口的螺帽為軸心旋轉，\n連續２次揮動手臂痛擊對手。\n有時會使對手畏縮。"
    es_latam: "Usando la tuerca del pecho como eje, gira sobre sí\nmismo y golpea con los brazos dos veces seguidas.\nPuede atemorizar al objetivo."
double_kick:
  names:
    jp_kanji: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번차기
    zh_simp: 二连踢
    zh_trad: 二連踢
    es_latam: Doble Patada
double_shock:
  names:
    jp_kanji: でんこうそうげき
    en: Double Shock
    fr: Double Décharge
    it: Doppiolampo
    de: Zweifachladung
    es: Electropalmas
    ko: 전광쌍격
    zh_simp: 电光双击
    zh_trad: 電光雙擊
    es_latam: Electropalmas
  descriptions:
    jp_kanji: "大きなハンマーを体ごと\nぶんまわして攻撃する。\n使った後しばらくこの技は使えない。"
    en: "The user attacks by swinging its whole body around to\nattack with its huge hammer. This move cannot be used\nagain for a short time after the blow is dealt."
    fr: "Le lanceur met tout son corps à contribution pour\nattaquer la cible avec un immense marteau. La capacité\nsera momentanément indisponible après utilisation."
    it: "Il Pokémon attacca con un grosso martello mettendoci\ntutta la forza che ha in corpo. Dopo l’utilizzo, è necessario\ndel tempo prima di poter sferrare di nuovo questa mossa."
    de: "Der Anwender greift mit einem großen Hammer an,\nden er mit vollem Körpereinsatz schwingt. Danach kann\ndiese Attacke für einige Zeit nicht eingesetzt werden."
    es: "El usuario se ayuda de su propio peso corporal para\npropinar un golpe con un enorme martillo. No se puede\nvolver a ejecutar el movimiento hasta pasado un tiempo."
    ko: "거대한 해머를 온몸으로\n휘둘러서 공격한다.\n사용한 다음 한동안 이 기술을 쓸 수 없다."
    zh_simp: "连同身体转起巨大的锤子进行攻击。\n使出后，在一段时间内\n无法使用这个招式。"
    zh_trad: "將大錘連同身體一起揮舞\n進行攻擊。使用此招式後，\n在一段時間內無法再使用。"
    es_latam: "El usuario aprovecha su propio peso corporal para\nlanzar un golpe con un enorme martillo. No se puede\nvolver a ejecutar el movimiento hasta pasado un tiempo."
double_slap:
  names:
    jp_kanji: おうふくビンタ
    en: Double Slap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doble Bofetón
    ko: 연속뺨치기
    zh_simp: 连环巴掌
    zh_trad: 連環巴掌
    es_latam: Doble Bofetón
double_team:
  names:
    jp_kanji: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
    zh_simp: 影子分身
    zh_trad: 影子分身
    es_latam: Doble Equipo
  descriptions:
    jp_kanji: "素早い動きで分身をつくり\n相手の攻撃を回避する。"
    en: "The user moves so quickly that it creates illusory copies\nof itself, allowing the user to evade incoming attacks."
    fr: "Le lanceur se déplace si vite qu’il crée des copies\nillusoires de lui-même et esquive les attaques."
    it: "Il Pokémon si muove in fretta e crea copie illusorie\ndi se stesso, eludendo gli attacchi avversari."
    de: "Der Anwender erzeugt durch schnelle Bewegungen\nEbenbilder, um so gegnerischen Attacken auszuweichen."
    es: "El usuario se mueve a velocidad vertiginosa y crea\ncopias ilusorias de sí mismo, lo que le permite evadir\nlos ataques del rival."
    ko: "재빠른 움직임으로 분신을 만들어\n상대의 공격을 회피한다."
    zh_simp: "通过快速移动来制造分身，\n从而闪避对手的攻击。"
    zh_trad: "利用快速移動製造出分身，\n閃避對手的攻擊。"
    es_latam: "El usuario se mueve a velocidad vertiginosa y crea\ncopias ilusorias de sí mismo, lo que le permite evadir\nlos ataques del rival."
draco_meteor:
  names:
    jp_kanji: りゅうせいぐん
    en: Draco Meteor
    fr: Draco-Météore
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
    zh_simp: 流星群
    zh_trad: 流星群
    es_latam: Meteoro Dragón
  descriptions:
    jp_kanji: "天空から隕石を相手に落とす。\n使うと反動で\nしばらくのあいだ自分の特攻が下がる。"
    en: "The user attacks by summoning comets to rain down\nfrom the sky. The recoil will lower the user’s Sp. Atk stat\nfor a while."
    fr: "Le lanceur invoque des comètes qui s’abattent sur\nla cible. Baisse l’Attaque Spéciale du lanceur\npendant un certain temps."
    it: "Il Pokémon attacca con meteore che cadono dal cielo,\nma il contraccolpo riduce il suo Attacco Speciale\nper un certo tempo."
    de: "Der Anwender lässt Kometen vom Himmel herabregnen.\nDurch den Rückstoß wird sein Spezial-Angriff für einige\nZeit gesenkt."
    es: "Hace que grandes cometas caigan del cielo sobre el\nobjetivo. Reduce el Ataque Especial del usuario durante\nun tiempo."
    ko: "천공에서 운석을 상대에게 떨어뜨린다.\n사용하면 반동으로\n한동안 자신의 특수공격이 떨어진다."
    zh_simp: "从天空中向对手落下陨石。\n使用之后因为反作用力，\n在一段时间内自己的特攻会降低。"
    zh_trad: "讓隕石從空中落下以攻擊對手。\n使用後因為反作用力，\n在一段時間內自己的特攻會降低。"
    es_latam: "Hace que grandes cometas caigan del cielo sobre\nel objetivo. Reduce el Ataque Especial del usuario\ndurante un tiempo."
dragon_ascent:
  names:
    jp_kanji: ガリョウテンセイ
    en: Dragon Ascent
    fr: Draco-Ascension
    it: Ascesa del Drago
    de: Zenitstürmer
    es: Ascenso Draco
    ko: 화룡점정
    zh_simp: 画龙点睛
    zh_trad: 畫龍點睛
    es_latam: Ascen. Dracónico
  descriptions:
    jp_kanji: "大空から急速落下して\n相手を攻撃する。\n少しのあいだ自分の防御と特防が下がる。"
    en: "The user attacks targets by dropping out of the sky at\nhigh speed. This also lowers the user’s Defense and\nSp. Def stats for a short time."
    fr: "Le lanceur s’abat à toute vitesse sur la cible depuis\nles cieux. Baisse la Défense et la Défense Spéciale\ndu lanceur pendant un court instant."
    it: "Il Pokémon attacca fiondandosi sul bersaglio dal cielo\nad altissima velocità, ma la sua Difesa e la sua Difesa\nSpeciale diminuiscono per un po’ di tempo."
    de: "Der Anwender greift das Ziel aus atemberaubender\nHöhe im Sturzflug an. Seine Verteidigung und\nSpezial-Verteidigung werden für kurze Zeit gesenkt."
    es: "El usuario se precipita desde el cielo a una velocidad de\nvértigo para atacar al objetivo, pero reduce su Defensa y\nsu Defensa Especial durante un breve período de tiempo."
    ko: "넓은 하늘에서 급속으로 강하하여\n상대를 공격한다.\n잠시 동안 자신의 방어와 특수방어가 떨어진다."
    zh_simp: "从天空中急速下降攻击对手。\n会在一小段时间内\n降低自己的防御和特防。"
    zh_trad: "從天空中急速下降攻擊對手。\n在一小段時間內\n自己的防禦和特防會降低。"
    es_latam: "El usuario se precipita desde el cielo a una velocidad\nvertiginosa para atacar al objetivo, pero reduce su\nDefensa y su Defensa Especial durante un breve periodo."
dragon_breath:
  names:
    jp_kanji: りゅうのいぶき
    en: Dragon Breath
    fr: Draco-Souffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
    zh_simp: 龙息
    zh_trad: 龍息
    es_latam: Aliento Dragón
  descriptions:
    jp_kanji: "ものすごい息を\n吹きつけて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by exhaling a mighty gust of breath. This\nmay also leave targets paralyzed."
    fr: "Le lanceur souffle fort sur la cible pour lui infliger\ndes dégâts. Peut aussi la paralyser."
    it: "Il Pokémon attacca investendo il bersaglio con un soffio\nd’aria potentissimo. Può anche paralizzarlo."
    de: "Der Anwender greift an, indem er einen gewaltigen Atem\nausstößt. Getroffene Gegner werden eventuell paralysiert."
    es: "Poderosa ráfaga de aliento que golpea al objetivo y\npuede paralizarlo."
    ko: "굉장한 숨결을 내뿜어 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "吹出强烈的气息进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "吹出強烈的氣息進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Poderosa ráfaga de aliento que golpea al objetivo\ny puede paralizarlo."
dragon_cheer:
  names:
    jp_kanji: ドラゴンエール
    en: Dragon Cheer
    fr: Cri Draconique
    it: Grido del Drago
    de: Drachenschrei
    es: Bramido Dragón
    ko: 드래곤옐
    zh_simp: 龙声鼓舞
    zh_trad: 龍聲鼓舞
    es_latam: Bramido Dragón
dragon_claw:
  names:
    jp_kanji: ドラゴンクロー
    en: Dragon Claw
    fr: Draco-Griffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤클로
    zh_simp: 龙爪
    zh_trad: 龍爪
    es_latam: Garra Dragón
  descriptions:
    jp_kanji: "鋭くとがった巨大なツメで\n相手を切り裂いて攻撃する。"
    en: The user attacks by slicing targets with huge, sharp claws.
    fr: "Le lanceur lacère la cible avec ses grandes\ngriffes aiguisées."
    it: "Il Pokémon attacca con artigli affilati che graffiano\nil bersaglio con grande forza."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an."
    es: Araña al objetivo con unas enormes garras afiladas.
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
    es_latam: Araña al objetivo con unas enormes garras afiladas.
dragon_dance:
  names:
    jp_kanji: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
    zh_simp: 龙之舞
    zh_trad: 龍之舞
    es_latam: Danza de Dragón
dragon_darts:
  names:
    jp_kanji: ドラゴンアロー
    en: Dragon Darts
    fr: Draco-Flèches
    it: Dragofrecce
    de: Drachenpfeile
    es: Dracoflechas
    ko: 드래곤애로
    zh_simp: 龙箭
    zh_trad: 龍箭
    es_latam: Dracoflechas
dragon_energy:
  names:
    jp_kanji: ドラゴンエナジー
    en: Dragon Energy
    fr: Draco-Énergie
    it: Dragoenergia
    de: Drachenkräfte
    es: Dracoenergía
    ko: 드래곤에너지
    zh_simp: 巨龙威能
    zh_trad: 巨龍威能
    es_latam: Dracoenergía
dragon_hammer:
  names:
    jp_kanji: ドラゴンハンマー
    en: Dragon Hammer
    fr: Draco-Marteau
    it: Marteldrago
    de: Drachenhammer
    es: Martillo Dragón
    ko: 드래곤해머
    zh_simp: 龙锤
    zh_trad: 龍錘
    es_latam: Martillo Dragón
dragon_pulse:
  names:
    jp_kanji: りゅうのはどう
    en: Dragon Pulse
    fr: Draco-Choc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
    zh_simp: 龙之波动
    zh_trad: 龍之波動
    es_latam: Pulso Dragón
  descriptions:
    jp_kanji: "大きな口から衝撃波を\nまきおこして相手を攻撃する。"
    en: "The user attacks by blasting targets with a shock wave\nemitted from its gaping mouth."
    fr: "Le lanceur ouvre la bouche pour projeter une aura\nqui frappe la cible."
    it: "Il Pokémon attacca il bersaglio generando un’onda d’urto\ndalla bocca."
    de: "Der Anwender greift an, indem er aus seinem offenen\nMaul eine Schockwelle auf das Ziel feuert."
    es: "Abre mucho la boca y libera una onda de choque con\nla que ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
    es_latam: "Abre mucho la boca y libera una onda de choque\ncon la que ataca al objetivo."
dragon_rage:
  names:
    jp_kanji: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
    zh_simp: 龙之怒
    zh_trad: 龍之怒
    es_latam: Furia Dragón
dragon_rush:
  names:
    jp_kanji: ドラゴンダイブ
    en: Dragon Rush
    fr: Draco-Charge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
    zh_simp: 龙之俯冲
    zh_trad: 龍之俯衝
    es_latam: Carga Dragón
  descriptions:
    jp_kanji: "すさまじい殺気で威圧しながら\n体当たりする。\n相手をひるませることもある。"
    en: "The user attacks by tackling targets while exhibiting\noverwhelming menace. This may also make targets flinch."
    fr: "Le lanceur frappe la cible en prenant un air terriblement\nmenaçant. Peut aussi l’apeurer."
    it: "Il Pokémon colpisce il bersaglio con fare minaccioso.\nPuò anche farlo tentennare."
    de: "Der Anwender rammt das Ziel und strahlt dabei eine\nfurchtbar bedrohliche Aura aus. Getroffene Gegner\nschrecken eventuell zurück."
    es: "Ataca de forma brutal mientras intimida al objetivo.\nPuede amedrentarlo."
    ko: "굉장한 살기로 위압하면서\n몸통박치기한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "释放出骇人的杀气，\n一边威慑一边撞击对手。\n有时也会使对手畏缩。"
    zh_trad: "釋放出駭人的殺氣\n威嚇並撞擊。\n有時還會使對手畏縮。"
    es_latam: "Ataca de forma brutal mientras intimida al objetivo.\nPuede atemorizarlo."
dragon_tail:
  names:
    jp_kanji: ドラゴンテール
    en: Dragon Tail
    fr: Draco-Queue
    it: Codadrago
    de: Drachenrute
    es: Cola Dragón
    ko: 드래곤테일
    zh_simp: 龙尾
    zh_trad: 龍尾
    es_latam: Cola de Dragón
drain_punch:
  names:
    jp_kanji: ドレインパンチ
    en: Drain Punch
    fr: Vampi-Poing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
    zh_simp: 吸取拳
    zh_trad: 吸取拳
    es_latam: Puño Drenador
  descriptions:
    jp_kanji: "こぶしから相手の力を吸い取る。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks with an energy-draining punch. The\nuser’s HP will be restored by a portion of the damage\ndealt."
    fr: "Le lanceur donne un coup de poing qui draine\nl’énergie de la cible et qui convertit une partie\ndes dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon assorbe energia dal bersaglio con un pugno\ne recupera una quantità di PS pari a una parte del danno\ninflitto."
    de: "Der Anwender greift mit einem Fausthieb an, der dem\nZiel Energie entzieht, und regeneriert einen Teil des dabei\nzugefügten Schadens als KP."
    es: "Un golpe que drena energía. El usuario recupera algunos\nPS según el daño que produzca."
    ko: "주먹으로 상대의 힘을 흡수한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "用拳头吸取对手的力量。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "從拳頭吸取對手的力量。\n可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Un golpe que drena energía. El usuario recupera algunos\nPS según el daño que produzca."
draining_kiss:
  names:
    jp_kanji: ドレインキッス
    en: Draining Kiss
    fr: Vampibaiser
    it: Assorbibacio
    de: Diebeskuss
    es: Beso Drenaje
    ko: 드레인키스
    zh_simp: 吸取之吻
    zh_trad: 吸取之吻
    es_latam: Beso Drenador
  descriptions:
    jp_kanji: "キッスによって相手からＨＰを吸い取り\n自分のＨＰを回復する。"
    en: "The user attacks with a draining kiss that steals HP from\ntargets to restore the user’s own HP."
    fr: "Le lanceur aspire la force vitale de la cible par un baiser\net récupère des PV."
    it: "Il Pokémon recupera PS assorbendo energia dal bersaglio\ncon un bacio."
    de: "Der Anwender stiehlt dem Ziel mit einem Kuss KP und\nregeneriert dadurch selbst KP."
    es: "El usuario absorbe energía del objetivo con un beso y\nrecupera PS."
    ko: "키스로 상대의 HP를 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "用吻吸取对手的ＨＰ\n来回复自己的ＨＰ。"
    zh_trad: "親吻對手來吸取對手的ＨＰ，\n回復自己的ＨＰ。"
    es_latam: "El usuario absorbe energía del objetivo con un beso\ny recupera PS."
dream_eater:
  names:
    jp_kanji: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Comesueños
    ko: 꿈먹기
    zh_simp: 食梦
    zh_trad: 食夢
    es_latam: Comesueños
  descriptions:
    jp_kanji: "ねむけ状態の相手の夢を食べて攻撃する。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by eating the dreams of drowsy targets.\nThe user’s HP will be restored by a portion of the damage\ndealt."
    fr: "Le lanceur mange le rêve d’une cible en état de\nsomnolence. L’attaque permet de convertir une partie\ndes dégâts infligés en PV pour le lanceur."
    it: "Il Pokémon divora i sogni del bersaglio affetto da\nsonnolenza, recuperando una quantità di PS pari\na una parte del danno inflitto."
    de: "Der Anwender frisst die Träume eines schläfrigen Zieles\nund regeneriert einen Teil des dabei zugefügten\nSchadens als KP."
    es: "Engulle los sueños de un objetivo somnoliento.\nEl usuario recupera algunos PS según el daño que\nproduzca."
    ko: "졸음 상태인 상대의 꿈을 먹어 공격한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "吃掉瞌睡状态的对手的梦进行攻击。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "吃掉陷入瞌睡狀態中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Engulle los sueños de un objetivo somnoliento.\nEl usuario recupera algunos PS según el daño que\nproduzca."
drill_peck:
  names:
    jp_kanji: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
    zh_simp: 啄钻
    zh_trad: 啄鑽
    es_latam: Pico Taladro
drill_run:
  names:
    jp_kanji: ドリルライナー
    en: Drill Run
    fr: Tunnelier
    it: Giravvita
    de: Schlagbohrer
    es: Taladradora
    ko: 드릴라이너
    zh_simp: 直冲钻
    zh_trad: 直衝鑽
    es_latam: Taladradora
  descriptions:
    jp_kanji: "ドリルのように\n体を回転しながら体当たりする。\n急所に当たりやすい。"
    en: "The user attacks by crashing into targets while rotating\nlike a drill. This move has a heightened chance of landing\na critical hit."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur la cible. Taux de critiques élevé."
    it: "Il Pokémon si scaglia ruotando su se stesso come\nun trapano perforante. Probabile brutto colpo."
    de: "Der Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro.\nSuele asestar un golpe crítico."
    ko: "드릴처럼 몸을 회전시켜서 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，一边旋转身体\n一边进行撞击。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體\n猛烈地撞擊。\n容易擊中要害。"
    es_latam: "El usuario golpea usando su cuerpo como un taladro.\nSuele lanzar un golpe crítico."
drum_beating:
  names:
    jp_kanji: ドラムアタック
    en: Drum Beating
    fr: Tambour Battant
    it: Tamburattacco
    de: Trommelschläge
    es: Batería Asalto
    ko: 드럼어택
    zh_simp: 鼓击
    zh_trad: 鼓擊
    es_latam: Batería Asalto
dual_chop:
  names:
    jp_kanji: ダブルチョップ
    en: Dual Chop
    fr: Double Baffe
    it: Doppiocolpo
    de: Doppelhieb
    es: Golpe Bis
    ko: 더블촙
    zh_simp: 二连劈
    zh_trad: 二連劈
    es_latam: Golpe Dual
  descriptions:
    jp_kanji: "体の硬い部分で\n相手を２回連続でたたいて攻撃する。"
    en: "The user attacks with two strikes dealt with a tough part\nof its body, one after the other."
    fr: "Le lanceur attaque la cible deux fois d’affilée\navec les parties les plus robustes de son corps."
    it: "Il Pokémon usa le parti dure del proprio corpo per\nattaccare il bersaglio due volte in rapida successione."
    de: "Der Anwender greift an, indem er dem Ziel zweimal\nhintereinander mit massiven Extremitäten Hiebe versetzt."
    es: "Golpea al objetivo dos veces seguidas con las partes más\nrecias de su cuerpo."
    ko: "몸의 단단한 부분을 이용해\n상대를 2회 연속으로 공격한다."
    zh_simp: "用身体坚硬的部分\n连续２次拍打对手进行攻击。"
    zh_trad: "連續２次\n用身體的堅硬部分攻擊對手。"
    es_latam: "Golpea al objetivo dos veces seguidas con las partes más\nrecias de su cuerpo."
dual_wingbeat:
  names:
    jp_kanji: ダブルウイング
    en: Dual Wingbeat
    fr: Double Volée
    it: Doppia Ala
    de: Doppelflügel
    es: Ala Bis
    ko: 더블윙
    zh_simp: 双翼
    zh_trad: 雙翼
    es_latam: Aletazo Doble
  descriptions:
    jp_kanji: "翼を相手にぶつけて攻撃する。\n２回連続でダメージを与える。"
    en: "The user attacks by slamming targets with its wings to\ndeal two strikes, one after the other."
    fr: "Le lanceur frappe la cible avec ses ailes deux fois\nd’affilée."
    it: "Il Pokémon attacca il bersaglio urtandolo con le ali e\ninfliggendogli danni due volte in rapida successione."
    de: "Der Anwender greift das Ziel zweimal hintereinander mit\nseinen Flügeln an und fügt getroffenen Gegnern so\nSchaden zu."
    es: "Ataca al objetivo golpeándolo dos veces seguidas con\nlas alas."
    ko: "날개를 상대에게 부딪쳐서 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "将翅膀撞向对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用翅膀撞向對手進行攻擊。\n連續２次給予傷害。"
    es_latam: "Ataca al objetivo golpeándolo dos veces seguidas con\nlas alas."
dynamax_cannon:
  names:
    jp_kanji: ダイマックスほう
    en: Dynamax Cannon
    fr: Canon Dynamax
    it: Cannone Dynamax
    de: Dynamax-Kanone
    es: Cañón Dinamax
    ko: 다이맥스포
    zh_simp: 极巨炮
    zh_trad: 極巨炮
    es_latam: Cañón Dinamax
dynamic_punch:
  names:
    jp_kanji: ばくれつパンチ
    en: Dynamic Punch
    fr: Dynamo-Poing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puño Dinámico
    ko: 폭발펀치
    zh_simp: 爆裂拳
    zh_trad: 爆裂拳
    es_latam: Puño Dinámico
  descriptions:
    jp_kanji: "こん身の力で\nパンチをくりだして攻撃する。\n相手を必ず混乱させる。"
    en: "The user attacks by punching targets with full\nconcentrated power. This also leaves targets confused\nwithout fail."
    fr: "Le lanceur rassemble ses forces et envoie un coup\nde poing à la cible, ce qui la rend confuse à coup sûr."
    it: "Il Pokémon attacca con una scarica di pugni davvero forti.\nIl bersaglio viene sicuramente confuso."
    de: "Der Anwender schlägt das Ziel mit voller Kraft.\nGetroffene Gegner werden garantiert verwirrt."
    es: "Puñetazo con toda la fuerza concentrada que causa\nconfusión."
    ko: "혼신의 힘으로\n펀치를 날려서 공격한다.\n상대를 반드시 혼란시킨다."
    zh_simp: "使出浑身力气出拳进行攻击。\n必定会使对手混乱。"
    zh_trad: "使出渾身力量出拳進行攻擊。\n必定會使對手混亂。"
    es_latam: "Puñetazo con toda la fuerza concentrada que causa\nconfusión."
earth_power:
  names:
    jp_kanji: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
    zh_simp: 大地之力
    zh_trad: 大地之力
    es_latam: Poder Terrestre
  descriptions:
    jp_kanji: "相手の足下へ大地の力を放出する。\n相手の特防を下げることもある。"
    en: "The user attacks by making the ground under targets\nerupt with power. This may also lower targets’ Sp. Def\nstats."
    fr: "Le lanceur libère la force de la terre où se tient la cible.\nPeut aussi baisser la Défense Spéciale de la cible."
    it: "Una forza devastante si sprigiona dal terreno sotto\nil bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Der Anwender lässt unter dem Ziel die Kraft der Erde\nhervorbrechen. Die Spezial-Verteidigung getroffener\nGegner wird eventuell gesenkt."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede reducir la Defensa Especial\ndel objetivo."
    ko: "상대의 발밑에 대지의 힘을 방출한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下\n释放出大地之力。\n有时也会降低对手的特防。"
    zh_trad: "向對手腳下釋放出大地之力。\n有時還會降低對手的特防。"
    es_latam: "La tierra a los pies del objetivo hace erupción\nviolentamente. Puede reducir la Defensa Especial\ndel objetivo."
earthquake:
  names:
    jp_kanji: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
    zh_simp: 地震
    zh_trad: 地震
    es_latam: Terremoto
  descriptions:
    jp_kanji: "地震の衝撃で\n周りにいるものを攻撃する。"
    en: "The user attacks by setting off an earthquake that strikes\na wide area."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tout ce qui se trouve alentour."
    it: "Il Pokémon attacca tutto intorno provocando\nun potente sisma."
    de: "Der Anwender greift mit einem mächtigen Beben alles\nim Umkreis an."
    es: Un terremoto que causa daño a su alrededor.
    ko: "지진의 충격으로\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击周围所有的对象。"
    zh_trad: "用地震的衝擊，\n攻擊周圍所有的對象。"
    es_latam: Un terremoto que causa daño a su alrededor.
echoed_voice:
  names:
    jp_kanji: エコーボイス
    en: Echoed Voice
    fr: Écho
    it: Echeggiavoce
    de: Widerhall
    es: Eco Voz
    ko: 에코보이스
    zh_simp: 回声
    zh_trad: 回聲
    es_latam: Eco Voz
eerie_impulse:
  names:
    jp_kanji: かいでんぱ
    en: Eerie Impulse
    fr: Ondes Étranges
    it: Elettromistero
    de: Mystowellen
    es: Onda Anómala
    ko: 괴전파
    zh_simp: 怪异电波
    zh_trad: 怪異電波
    es_latam: Onda Anómala
  descriptions:
    jp_kanji: "体から　かいでんぱを放ち\n相手に浴びせることによって\nしばらくのあいだ相手の特攻を下げる。"
    en: "The user generates an eerie impulse from its body, which\nlowers targets’ Sp. Atk stats for a while."
    fr: "Le corps du lanceur produit des ondes anormales\nqui enveloppent la cible et baissent son Attaque\nSpéciale pendant un certain temps."
    it: "Il Pokémon emette dal corpo onde anomale che\ninvestono il bersaglio, riducendone l’Attacco Speciale\nper un certo tempo."
    de: "Der Anwender bedeckt das Ziel mit mysteriösen Wellen.\nDer Spezial-Angriff getroffener Gegner wird für einige\nZeit gesenkt."
    es: "El usuario irradia unas raras ondas que, al alcanzar al\nobjetivo, reducen su Ataque Especial durante un tiempo."
    ko: "몸에서 발생시킨 괴전파를 상대에게 쏘아\n한동안 상대의 특수공격을 떨어뜨린다."
    zh_simp: "从身体放射出怪异电波，\n让对手沐浴其中，\n从而在一段时间内降低对手的特攻。"
    zh_trad: "從身體發出怪異電波影響對手，\n在一段時間內降低對手的特攻。"
    es_latam: "El usuario irradia unas raras ondas que, al alcanzar al\nobjetivo, reducen su Ataque Especial durante un tiempo."
eerie_spell:
  names:
    jp_kanji: ぶきみなじゅもん
    en: Eerie Spell
    fr: Sort Sinistre
    it: Inquietantesimo
    de: Schauderspruch
    es: Conjuro Funesto
    ko: 섬뜩한주문
    zh_simp: 诡异咒语
    zh_trad: 詭異咒語
    es_latam: Conjuro Funesto
egg_bomb:
  names:
    jp_kanji: タマゴばくだん
    en: Egg Bomb
    fr: Bombe Œuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
    zh_simp: 炸蛋
    zh_trad: 炸蛋
    es_latam: Bomba Huevo
electric_terrain:
  names:
    jp_kanji: エレキフィールド
    en: Electric Terrain
    fr: Champ Électrifié
    it: Campo Elettrico
    de: Elektrofeld
    es: Campo Eléctrico
    ko: 일렉트릭필드
    zh_simp: 电气场地
    zh_trad: 電氣場地
    es_latam: Campo Eléctrico
electrify:
  names:
    jp_kanji: そうでん
    en: Electrify
    fr: Électrisation
    it: Elettrocontagio
    de: Elektrifizierung
    es: Electrificación
    ko: 송전
    zh_simp: 输电
    zh_trad: 輸電
    es_latam: Electrificación
electro_ball:
  names:
    jp_kanji: エレキボール
    en: Electro Ball
    fr: Boule Élek
    it: Energisfera
    de: Elektroball
    es: Bola Voltio
    ko: 일렉트릭볼
    zh_simp: 电球
    zh_trad: 電球
    es_latam: Electrobola
electro_drift:
  names:
    jp_kanji: イナズマドライブ
    en: Electro Drift
    fr: Turbo Volt
    it: Fulmiscatto
    de: Blitztour
    es: Electroderrape
    ko: 라이트닝드라이브
    zh_simp: 闪电猛冲
    zh_trad: 閃電猛衝
    es_latam: Electroderrape
  descriptions:
    jp_kanji: "自分のＨＰを削って分身をだしたあと\nトレーナーの元に戻ってくる。\nしばらくのあいだ自分の動きをはやくする。"
    en: "The user creates a substitute for itself using its own HP\nbefore rushing back to its Trainer. This also increases the\nuser’s movement speed for a while."
    fr: "Le lanceur crée un clone en sacrifiant des PV, puis revient\nprès de son Dresseur ou de sa Dresseuse. Augmente\nsa vitesse de déplacement pendant un certain temps."
    it: "Il Pokémon crea una copia di se stesso usando parte\ndei suoi PS e torna vicino al proprio Allenatore. Inoltre,\naccelera i propri movimenti per un po’ di tempo."
    de: "Der Anwender setzt seine KP ein, um einen Doppelgänger\nzu erzeugen, und eilt danach an die Seite seines Trainers\nzurück. Für einige Zeit bewegt er sich schneller."
    es: "El usuario regresa con su Entrenador, pero antes utiliza\nparte de los PS propios para crear un sustituto. También\nse vuelve más rápido durante un breve período de tiempo."
    ko: "자신의 HP를 깎아서 분신을 만든 뒤,\n트레이너의 곁으로 돌아온다.\n한동안 자신의 움직임이 빨라진다."
    zh_simp: "削减自己的ＨＰ制造分身后，\n会返回训练家身边。\n在一段时间内让自己的动作变得更快。"
    zh_trad: "削減自己的ＨＰ，\n製造分身後返回訓練家身邊。\n在一段時間內讓自己的動作變快。"
    es_latam: "El usuario regresa con su Entrenador, pero antes utiliza\nparte de los PS propios para crear un sustituto. También\nse vuelve más rápido durante un breve periodo."
electro_shot:
  names:
    jp_kanji: エレクトロビーム
    en: Electro Shot
    fr: Fulgurayon
    it: Elettroraggio
    de: Stromstrahl
    es: Electrorrayo
    ko: 일렉트로빔
    zh_simp: 电光束
    zh_trad: 電光束
    es_latam: Electrorrayo
electroweb:
  names:
    jp_kanji: エレキネット
    en: Electroweb
    fr: Toile Élek
    it: Elettrotela
    de: Elektronetz
    es: Electrotela
    ko: 일렉트릭네트
    zh_simp: 电网
    zh_trad: 電網
    es_latam: Electrotela
  descriptions:
    jp_kanji: "電気のネットで\n相手を捕まえて攻撃する。\n少しのあいだ相手の動きを遅くする。"
    en: "The user attacks by catching targets in an electrified net.\nThis also makes targets move more slowly for a short\ntime."
    fr: "Le lanceur attaque la cible en l’attrapant dans un filet\nélectrique. Baisse aussi la vitesse de déplacement\nde la cible pendant un court instant."
    it: "Il Pokémon attacca il bersaglio catturandolo con una\nragnatela elettrica e rallentandone i movimenti per\nun po’ di tempo."
    de: "Der Anwender greift an, indem er das Ziel mit einem\nelektrischen Netz fängt. Getroffene Pokémon bewegen\nsich für kurze Zeit langsamer."
    es: "Atrapa y ataca al objetivo con una telaraña eléctrica\ny lo vuelve más lento durante un breve período de tiempo."
    ko: "전기 네트를 펼쳐서 상대를 공격한다.\n잠시 동안 상대의 움직임이 느려진다."
    zh_simp: "用电网捉住对手进行攻击。\n会在一小段时间内\n使对手的动作变得迟缓。"
    zh_trad: "用電網捉住對手進行攻擊。\n在一小段時間內會讓\n對手的動作變慢。"
    es_latam: "Atrapa y ataca al objetivo con una telaraña eléctrica\ny lo vuelve más lento durante un breve periodo."
embargo:
  names:
    jp_kanji: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
    zh_simp: 查封
    zh_trad: 查封
    es_latam: Embargo
ember:
  names:
    jp_kanji: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
    zh_simp: 火花
    zh_trad: 火花
    es_latam: Brasas
  descriptions:
    jp_kanji: "小さな炎を発射して攻撃する。\n相手をやけど状態にすることもある。"
    en: "The user attacks by shooting out small flames. This may\nalso leave targets with a burn."
    fr: "Le lanceur attaque la cible en envoyant de petites\nflammes. Peut aussi la brûler."
    it: "Il Pokémon attacca il bersaglio lanciando fiammelle\nche possono anche scottarlo."
    de: "Der Anwender greift mit einer kleinen Flamme an,\ndurch die getroffene Gegner eventuell Verbrennungen\nerleiden."
    es: "Ataca con llamas pequeñas que pueden causar\nquemaduras al objetivo."
    ko: "작은 불꽃을 발사하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "发射小型火焰进行攻击。\n有时也会让对手陷入灼伤状态。"
    zh_trad: "發射小火焰進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
    es_latam: "Ataca con llamas pequeñas que pueden causar\nquemaduras al objetivo."
encore:
  names:
    jp_kanji: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앙코르
    zh_simp: 再来一次
    zh_trad: 再來一次
    es_latam: Otra Vez
endeavor:
  names:
    jp_kanji: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
    zh_simp: 蛮干
    zh_trad: 蠻幹
    es_latam: Esfuerzo
endure:
  names:
    jp_kanji: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
    zh_simp: 挺住
    zh_trad: 挺住
    es_latam: Aguante
  descriptions:
    jp_kanji: "攻撃をこらえる構えを取る。\nこらえているあいだＨＰを必ず１だけ残せる。"
    en: "The user takes a ready stance to endure any attack. While\nin this stance, the user will be able to take a hit and be\nleft with at least 1 HP without fail."
    fr: "Le lanceur adopte une posture défensive. Tant que celle-ci\nest active, il résiste à toute attaque avec au moins 1 PV."
    it: "Il Pokémon si mette in posizione per resistere\nagli attacchi. Mentre si difende, gli rimane sempre\nalmeno 1 PS."
    de: "Der Anwender nimmt eine Abwehrhaltung ein.\nWährenddessen übersteht er garantiert jeden Angriff mit\nmindestens 1 KP."
    es: "El usuario se prepara para recibir ataques. En esta\nposición, resiste cualquier ataque y se queda con 1 PS\ncomo mínimo."
    ko: "공격을 버틸 자세를 취한다.\n버티는 동안에는 HP를 반드시 1만큼 남긴다."
    zh_simp: "做出挺住攻击的架势。\n挺住的时候一定会留下１ＨＰ。"
    zh_trad: "擺出挺住攻擊的架勢。\n在挺住的期間一定會剩下１ＨＰ。"
    es_latam: "El usuario se prepara para recibir ataques. En esta\nposición, resiste cualquier ataque y se queda con 1 PS\ncomo mínimo."
energy_ball:
  names:
    jp_kanji: エナジーボール
    en: Energy Ball
    fr: Éco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
    zh_simp: 能量球
    zh_trad: 能量球
    es_latam: Bola de Energía
  descriptions:
    jp_kanji: "自然から集めた\n命の力を発射する。\n相手の特防を下げることもある。"
    en: "The user attacks by drawing power from nature and firing\nit at targets. This may also lower targets’ Sp. Def stats."
    fr: "Le lanceur utilise les pouvoirs de la nature pour attaquer\nla cible. Peut aussi baisser la Défense Spéciale de la cible."
    it: "Il Pokémon attinge energia dalla natura e la scaglia\ncontro il bersaglio. Può anche ridurne la Difesa Speciale."
    de: "Der Anwender zieht Kraft aus der Natur und feuert sie\nab. Die Spezial-Verteidigung getroffener Gegner wird\neventuell gesenkt."
    es: "Aúna fuerzas de la naturaleza y libera su ataque.\nPuede reducir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은 생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时也会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時還會降低對手的特防。"
    es_latam: "Acumula fuerzas de la naturaleza y libera su ataque.\nPuede reducir la Defensa Especial del objetivo."
