    en: "The user attacks by slashing with claws, scythes, or the\nlike. This move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur tranche la cible avec ses griffes, une faux,\nou autre. Taux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio lacerandolo con artigli,\nfalci o altro. Probabile brutto colpo."
    de: "Der Anwender schlitzt das Ziel mit Klauen, Sicheln oder\nÄhnlichem auf. Hohe Volltrefferquote."
    es: "Ataca con cuchillas o con pinzas. Suele asestar un golpe\ncrítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用爪子或镰刀等\n劈开对手进行攻击。\n容易击中要害。"
    zh_trad: "用爪子或鐮刀等\n劈開對手進行攻擊。\n容易擊中要害。"
    es_latam: "Ataca con cuchillas o con pinzas. Suele lanzar\nun golpe crítico."
sleep_powder:
