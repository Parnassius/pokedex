    de: Plage
    es: Acoso
    ko: 엉겨붙기
    zh_simp: 纠缠不休
    zh_trad: 死纏爛打
    es_latam: Infestación
  descriptions:
    jp_kanji: "しばらくのあいだ相手にまとわりついて\nダメージを与え続ける。\nそのあいだ相手は交代できなくなる。"
    en: "The user infests targets so that they take continual\ndamage for a while. Targets cannot be switched out of\nbattle during this time."
    fr: "Harcèle la cible, lui inflige des dégâts continus et\nl’empêche de quitter le terrain pendant un certain temps."
    it: "Il Pokémon tormenta il bersaglio continuando\na infliggergli danni per un certo tempo, durante\nil quale gli impedisce di essere sostituito."
    de: "Der Anwender fällt einige Zeit wie eine Plage über\ndas Ziel her und richtet kontinuierlich Schaden an.\nGetroffene Gegner werden am Auswechseln gehindert."
    es: "Hostiga y daña al objetivo durante un tiempo e impide\nque pueda ser cambiado por otro mientras tanto."
    ko: "한동안 상대에게 엉겨 붙어서\n계속해서 데미지를 준다.\n그동안 상대는 교체할 수 없게 된다."
    zh_simp: "在一段时间内对对手死缠烂打，\n持续地造成伤害。\n在此期间对手将无法进行替换。"
    zh_trad: "在一段時間內死纏爛打地\n讓對手持續受到傷害。\n在此期間對手將無法替換。"
    es_latam: "Hostiga y daña al objetivo durante un tiempo e impide\nque se pueda cambiar por otro mientras tanto."
