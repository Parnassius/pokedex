    jp_kanji: "ムチのようにしなる細長いつるで\n相手をたたきつけて攻撃する。"
    en: "The user attacks by striking targets with slender, whiplike\nvines."
    fr: "Le lanceur attaque la cible en la fouettant avec de fines\nlianes."
    it: "Il Pokémon attacca il bersaglio sferzandolo con liane\nsottili simili a fruste."
    de: "Der Anwender greift das Ziel mit einer peitschenartigen,\nlangen Ranke an."
    es: "Azota al objetivo con lianas delgadas y largas tan flexibles\ncomo látigos."
    ko: "채찍처럼 휘어지는 가늘고 긴 덩굴로\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "用如同鞭子般弯曲而细长的藤蔓\n摔打对手进行攻击。"
    zh_trad: "將如同鞭子般彎曲而細長的藤蔓\n甩向對手進行攻擊。"
    es_latam: "Azota al objetivo con lianas delgadas y largas,\ntan flexibles como látigos."
