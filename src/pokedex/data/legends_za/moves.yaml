    fr: "L’Attaque et la Défense du lanceur augmentent, mais\nsa vitesse de déplacement baisse pendant un court\ninstant. L’effet change si le lanceur est de type Spectre."
    it: "Per un po’ di tempo il Pokémon riduce la propria velocità\ndi movimento ma aumenta l’Attacco e la Difesa. La mossa\nha un effetto diverso se chi la usa è di tipo Spettro."
    de: "Der Anwender bewegt sich für kurze Zeit langsamer,\ndafür steigen sein Angriff und seine Verteidigung. Der\nEffekt ist anders, wenn der Anwender vom Typ Geist ist."
    es: "Durante un breve período de tiempo, aumenta el Ataque\ny la Defensa del usuario pero lo vuelve más lento. Tiene\nefectos distintos si el usuario es de tipo Fantasma."
    ko: "잠시 동안 자신의 움직임이 느려지는 대신\n공격과 방어가 올라간다.\n고스트타입이 사용하면 효과가 변화한다."
    zh_simp: "在一小段时间内自己的动作会变得迟缓，\n同时会提高攻击和防御。\n幽灵属性使用时效果会不同。"
    zh_trad: "在一小段時間內自己的行動會變慢，\n但攻擊和防禦會提高。\n由幽靈屬性的寶可夢使出時，效果會改變。"
    es_latam: "Durante un breve periodo, aumenta el Ataque\ny la Defensa del usuario, pero lo vuelve más lento. \nTiene efectos distintos si el usuario es de tipo Fantasma."
cut:
  names:
    jp_kanji: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
    zh_simp: 居合劈
    zh_trad: 居合斬
    es_latam: Corte
dark_pulse:
  names:
    jp_kanji: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
    zh_simp: 恶之波动
    zh_trad: 惡之波動
    es_latam: Pulso Oscuro
  descriptions:
    jp_kanji: "体から悪意にみちた\n恐ろしいオーラを発する。\n相手をひるませることがある。"
    en: "The user attacks by releasing a horrible aura rife with ill\nintent. This may also make targets flinch."
    fr: "Le lanceur projette une horrible aura chargée de pensées\nmaléfiques sur la cible. Peut aussi l’apeurer."
    it: "Il Pokémon emana un’aura impregnata di oscuri pensieri.\nPuò anche far tentennare il bersaglio."
    de: "Der Anwender entfesselt eine fürchterliche Aura,\ndie von Boshaftigkeit erfüllt ist. Getroffene Gegner\nschrecken eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\nque puede amedrentar al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
    es_latam: "Libera una horrible aura llena de malos pensamientos\nque puede atemorizar al objetivo."
dark_void:
  names:
    jp_kanji: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
    zh_simp: 暗黑洞
    zh_trad: 暗黑洞
    es_latam: Abismo Negro
  descriptions:
    jp_kanji: "相手を暗黒の世界に送り　ねむけ状態にする。\nねむけ状態の相手へのダメージが増し\n与えたダメージのいくらかＨＰを回復できる。"
    en: "The user inflicts drowsiness through total darkness. This\ndeals extra damage to already drowsy targets. The user’s\nHP will be restored by a portion of the damage dealt."
    fr: "Les ténèbres emportent la cible et la plongent dans un\nétat de somnolence qui fait qu’elle subit plus de dégâts,\ndont une partie est convertie en PV pour le lanceur."
    it: "Il Pokémon trascina gli avversari in un mondo di totale\noscurità e li fa addormentare."
    de: "Der Anwender stürzt das Ziel in Dunkelheit und macht es\nschläfrig. Schläfrige Gegner erleiden zusätzlichen Schaden,\nvon dem der Anwender einen Teil als KP regeneriert."
    es: "Envía al objetivo a un mundo de tinieblas y le induce\nsomnolencia. Inflige más daño a objetivos somnolientos\ny restaura PS al usuario según el daño que produzca."
    ko: "상대를 암흑의 세계로 보내어 졸음 상태로 만든다.\n졸음 상태인 상대에게 주는 데미지가 증가하며\n준 데미지의 일부만큼 HP를 회복할 수 있다."
    zh_simp: "将对手送入黑暗的世界，让其陷入瞌睡状态。\n对瞌睡状态的对手造成的伤害会增加，\n可以回复相当于给予的部分伤害的ＨＰ。"
    zh_trad: "將對手送進黑暗的世界，讓其陷入瞌睡狀態。\n對陷入瞌睡狀態的對手造成的傷害會增加，\n並可以回復給予對手傷害的一部分ＨＰ。"
    es_latam: "Envía al objetivo a un mundo de tinieblas y le induce\nsomnolencia. Causa más daño a objetivos somnolientos\ny restaura PS al usuario según el daño que produzca."
darkest_lariat:
  names:
    jp_kanji: ＤＤラリアット
