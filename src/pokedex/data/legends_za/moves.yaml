    fr: "Le lanceur libère une lumière aveuglante qui frappe\nla cible et peut aussi baisser sa Défense Spéciale."
    it: "Il Pokémon sprigiona una luce abbagliante che può\nanche ridurre la Difesa Speciale del bersaglio."
    de: "Der Anwender greift an, indem er ein grelles Licht\nentfesselt. Die Spezial-Verteidigung getroffener Gegner\nwird eventuell gesenkt."
    es: "Fogonazo de luz que inflige daño al objetivo y puede\nreducir su Defensa Especial."
    ko: "눈부신 빛을 발산하여 공격한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "释放耀眼的光芒进行攻击。\n有时会降低对手的特防。"
    zh_trad: "放出耀眼的光芒進行攻擊。\n有時會降低對手的特防。"
    es_latam: "Fogonazo de luz que le causa daño al objetivo y puede\nreducir su Defensa Especial."
