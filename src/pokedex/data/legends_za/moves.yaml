    jp_kanji: "エネルギーを吸収して　しばらくのあいだ\n自分の特攻と特防を上げ　動きも速くする。\n効果が出るまで時間がかかる。"
    en: "The user absorbs energy to boost its Sp. Atk and Sp. Def\nstats and increase its movement speed for a while. This\nmove takes some time to carry out."
    fr: "Absorbe de l’énergie pour augmenter l’Attaque Spéciale,\nla Défense Spéciale et la vitesse de déplacement pendant\nun certain temps. L’effet met du temps avant de s’activer."
    it: "Il Pokémon assorbe energia e per un certo tempo\naccelera i propri movimenti e aumenta l’Attacco Speciale\ne la Difesa Speciale. L’effetto richiede tempo per attivarsi."
    de: "Der Anwender absorbiert Energie und erhöht für einige\nZeit Spezial-Angriff, Spezial-Verteidigung und\nBewegungstempo. Der Effekt tritt mit Verzögerung ein."
    es: "Concentra energía y, durante un tiempo, se vuelve más\nrápido y aumenta su Ataque Especial y Defensa Especial.\nEste movimiento tarda en hacer efecto."
    ko: "에너지를 흡수하여 한동안 자신의 특수공격과\n특수방어를 올리고 움직임도 빨라진다.\n효과가 나오기까지 시간이 걸린다."
    zh_simp: "吸收能量，在一段时间内提高自己的\n特攻和特防，动作也变得更快。\n需要一定时间生效。"
    zh_trad: "吸收能量，在一段時間內會提高\n自己的特攻和特防，行動也會變快。\n需要一些時間才能生效。"
    es_latam: "Concentra energía y, durante un tiempo, se vuelve más\nrápido y aumenta su Ataque Especial y Defensa Especial.\nEste movimiento tarda en hacer efecto."
giga_drain:
