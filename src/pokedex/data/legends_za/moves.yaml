    ko: 오라휠
    zh_simp: 气场轮
    zh_trad: 氣場輪
    es_latam: Rueda Aural
  descriptions:
    jp_kanji: "ほほぶくろに溜めたエネルギーで攻撃。\n少しのあいだ攻撃を上げ動きも速くなる。\nモルペコの姿でタイプが変わる。"
    en: "The user attacks with energy from its cheeks, increasing\nits movement speed and boosting its Attack stat for a short\ntime. This move’s type changes based on Morpeko’s form."
    fr: "Morpeko libère l’énergie dans ses joues pour attaquer, ce\nqui augmente son Attaque et sa vitesse de déplacement\npendant un court instant. Le type dépend de sa forme."
    it: "Il Pokémon attacca con l’energia accumulata. Per un po’\ndi tempo aumenta il proprio Attacco e accelera i propri\nmovimenti. Il tipo varia in base alla forma assunta."
    de: "Morpeko greift mit der Energie in seinen Backentaschen\nan. Für kurze Zeit erhöht es seinen Angriff und bewegt\nsich schneller. Der Attacken-Typ hängt von seiner Form ab."
    es: "La energía acumulada en las mejillas le sirve para atacar y\nvolverse más rápido durante un breve período de tiempo.\nEl movimiento cambia de tipo según la forma que adopte."
    ko: "볼주머니에 저장해 둔 에너지로 공격한다.\n잠시 동안 공격을 올리고 움직임도 빨라진다.\n모르페코의 모습에 따라 타입이 바뀐다."
    zh_simp: "用储存在颊囊里的能量进行攻击。\n在一小段时间内提高攻击，动作也会变快。\n其属性会随着莫鲁贝可的样子而改变。"
    zh_trad: "用儲存在頰囊中的能量進行攻擊。\n在一小段時間內會提高攻擊，動作也會變快。\n招式屬性會隨著莫魯貝可的樣子而改變。"
    es_latam: "La energía que acumula en las mejillas le sirve para\natacar y volverse más rápido durante un breve periodo.\nEl movimiento cambia de tipo según la forma que adopte."
