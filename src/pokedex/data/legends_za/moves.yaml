    jp_kanji: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Cascabel Cura
    ko: 치료방울
    zh_simp: 治愈铃声
    zh_trad: 治癒鈴聲
    es_latam: Cascabel Sanador
heal_block:
  names:
    jp_kanji: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
    zh_simp: 回复封锁
    zh_trad: 回復封鎖
    es_latam: Anticuración
  descriptions:
    jp_kanji: "しばらくのあいだ\n相手は技や道具によって\nＨＰを回復できなくなる。"
    en: "The user prevents targets from recovering HP through\nmoves or items for a while."
    fr: "Le lanceur empêche la cible de récupérer des PV à l’aide\nde capacités ou d’objets pendant un certain temps."
    it: "Per un certo tempo il Pokémon impedisce al bersaglio\ndi recuperare PS per mezzo di mosse o strumenti."
    de: "Der Anwender verhindert für einige Zeit, dass getroffene\nGegner durch Attacken oder Items KP regenerieren."
    es: "Impide que el objetivo recupere PS mediante\nmovimientos u objetos durante un tiempo."
    ko: "한동안 상대는\n기술이나 도구를 통해\nHP를 회복할 수 없게 된다."
    zh_simp: "在一段时间内，\n对手无法通过招式\n或道具来回复ＨＰ。"
    zh_trad: "對手在一段時間內\n無法透過招式或道具回復ＨＰ。"
    es_latam: "Impide que el objetivo recupere PS mediante\nmovimientos u objetos durante un tiempo."
