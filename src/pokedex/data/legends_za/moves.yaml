    ko: 메탈클로
    zh_simp: 金属爪
    zh_trad: 金屬爪
    es_latam: Garra de Metal
  descriptions:
    jp_kanji: "鋼鉄のツメで\n相手を切り裂いて攻撃する。\n自分の攻撃が上がることもある。"
    en: "The user attacks by raking targets with steel claws.\nThis may also boost the user’s Attack stat."
    fr: "Le lanceur lacère la cible avec des griffes d’acier.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Il Pokémon attacca il bersaglio con artigli d’acciaio.\nPuò anche aumentare il proprio Attacco."
    de: "Der Anwender schlitzt das Ziel mit Klauen aus Metall auf.\nDer Angriff des Anwenders wird eventuell erhöht."
    es: "Ataque con garras de acero que puede aumentar el\nAtaque del usuario."
    ko: "강철의 발톱으로\n상대를 베어 갈라 공격한다.\n자신의 공격이 올라갈 때도 있다."
    zh_simp: "用钢铁之爪\n劈开对手进行攻击。\n有时会提高自己的攻击。"
    zh_trad: "用鋼鐵之爪\n撕裂對手進行攻擊。\n有時還會提高自己的攻擊。"
    es_latam: "Ataque con garras de acero que puede aumentar\nel Ataque del usuario."
metal_sound:
  names:
    jp_kanji: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
    zh_simp: 金属音
    zh_trad: 金屬音
    es_latam: Sonido Metálico
  descriptions:
    jp_kanji: "金属をこすってでるような\nいやな音を聞かせる。\nしばらくのあいだ相手の特防を下げる。"
    en: "The user emits a horrible sound like screeching metal,\nwhich lowers targets’ Sp. Def stats for a while."
    fr: "Le lanceur pousse un cri horrible tel un crissement\nmétallique. Baisse la Défense Spéciale de la cible\npendant un certain temps."
    it: "Il Pokémon emette un orribile stridio, simile a quello\nprodotto sfregando il metallo, che riduce la Difesa\nSpeciale del bersaglio per un certo tempo."
    de: "Der Anwender stößt einen schrillen Laut aus, der wie\nmetallisches Kratzen klingt und die Spezial-Verteidigung\ngetroffener Gegner für einige Zeit senkt."
    es: "Horrible chirrido metálico que reduce la Defensa Especial\ndel objetivo durante un tiempo."
    ko: "금속을 긁을 때 나는 듯한\n싫은 소리를 들려준다.\n한동안 상대의 특수방어를 떨어뜨린다."
    zh_simp: "让对手听摩擦金属般\n讨厌的声音。\n在一段时间内降低对手的特防。"
    zh_trad: "讓對手聽如同金屬摩擦般的刺耳聲。\n在一段時間內降低對手的特防。"
    es_latam: "Horrible chirrido metálico que reduce la Defensa Especial\ndel objetivo durante un tiempo."
meteor_assault:
  names:
    jp_kanji: スターアサルト
    en: Meteor Assault
    fr: Joute Astrale
    it: Sfolgorassalto
    de: Sternensturm
    es: Asalto Estelar
    ko: 스타어설트
    zh_simp: 流星突击
    zh_trad: 流星突擊
    es_latam: Asalto Estelar
  descriptions:
    jp_kanji: "太いクキをふりまわして攻撃。\nただし自分もよろめいてしまうため\n少しのあいだ動けなくなる。"
    en: "The user attacks wildly with its thick leek. However, this\nalso makes the user stagger, leaving it unable to move for\na short time."
    fr: "Le lanceur attaque la cible avec son poireau.\nToutefois, cette action le fait vaciller et l’empêche d’agir\npendant un court instant."
    it: "Il Pokémon attacca il bersaglio brandendo un grosso\ngambo, ma perde l’equilibrio e non può muoversi\nper un po’ di tempo."
    de: "Der Anwender greift an, indem er seine Lauchstange\nschwingt. Dabei wird ihm jedoch so schwindelig, dass er\nsich für kurze Zeit nicht bewegen kann."
    es: "El usuario agita violentamente su grueso puerro para\natacar, pero el mareo que le provocan las sacudidas le\nimpide moverse durante un breve período de tiempo."
    ko: "굵은 줄기를 휘둘러서 공격한다.\n단, 자신도 비틀거리기 때문에\n잠시 동안 움직일 수 없다."
    zh_simp: "大力挥舞粗壮的茎进行攻击。\n但同时自己也会被晃晕，\n在一小段时间内无法动弹。"
    zh_trad: "揮舞粗壯的莖進行攻擊。\n但同時自己也會站不穩，\n在一小段時間內將無法動彈。"
    es_latam: "El usuario agita violentamente su grueso puerro para\natacar, pero el mareo que le provocan las sacudidas lo\nobliga a descansar durante un breve periodo."
meteor_beam:
  names:
    jp_kanji: メテオビーム
    en: Meteor Beam
    fr: Laser Météore
    it: Raggiometeora
    de: Meteorstrahl
    es: Rayo Meteórico
    ko: 메테오빔
    zh_simp: 流星光束
    zh_trad: 流星光束
    es_latam: Rayo Meteórico
  descriptions:
    jp_kanji: "宇宙の力を集めることで\nしばらくのあいだ特攻を上げた後　相手を攻撃。\n攻撃するまで時間がかかる。"
    en: "The user attacks with energy gathered from space. This\nboosts the user’s Sp. Atk stat for a while. This move takes\nsome time to carry out."
    fr: "Le lanceur concentre l’énergie cosmique pour augmenter\nson Attaque Spéciale pendant un certain temps, et frappe\nsa cible. L’attaque prend un certain temps à se déclencher."
    it: "Il Pokémon accumula l’energia dello spazio, aumentando\nl’Attacco Speciale per un certo tempo, e poi attacca\nil bersaglio. L’attacco richiede tempo."
    de: "Der Anwender sammelt kosmische Kräfte und erhöht so\nfür einige Zeit seinen Spezial-Angriff. Danach greift er\ndas Ziel mit Verzögerung an."
    es: "El usuario acumula energía cósmica y aumenta su\nAtaque Especial durante un tiempo, tras el cual ataca.\nEste movimiento requiere tiempo para ejecutarse."
    ko: "우주의 힘을 모아서 한동안\n자신의 특수공격을 올리고 상대를 공격한다.\n공격하기까지 시간이 걸린다."
    zh_simp: "聚集宇宙之力，\n在一段时间内提高特攻后攻击对手。\n需要一定时间发动攻击。"
    zh_trad: "聚集宇宙的力量，\n藉此在一段時間內提高特攻後攻擊對手。\n需要一些時間發動攻擊。"
    es_latam: "El usuario acumula energía cósmica y aumenta su\nAtaque Especial durante un tiempo, tras el cual ataca.\nEste movimiento requiere tiempo para ejecutarse."
