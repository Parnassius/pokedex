kings_shield:
  names:
    jp_kanji: キングシールド
    en: King’s Shield
    fr: Bouclier Royal
    it: Scudo Reale
    de: Königsschild
    es: Escudo Real
    ko: 킹실드
    zh_simp: 王者盾牌
    zh_trad: 王者盾牌
    es_latam: Escudo Real
  descriptions:
    jp_kanji: "相手の攻撃を防ぐと同時に\n防御態勢になる。\n触れた相手の攻撃を下げる。"
    en: "The user takes on a defensive stance and shields itself\nfrom incoming attacks. The shield lowers the Attack stats\nof attackers that make direct contact."
    fr: "Le lanceur prend une posture défensive pour bloquer\nles dégâts. Diminue l’Attaque de tout assaillant\nqui entre en contact avec le lanceur."
    it: "Il Pokémon si protegge dagli attacchi assumendo una\nposizione di difesa e riducendo l’Attacco di chiunque\nentri in contatto con lui a causa di un attacco."
    de: "Der Anwender geht in die Defensive und schützt\nsich. Berührt ihn währenddessen ein Pokémon mit\neinem Angriff, sinkt dessen Angriff."
    es: "El usuario adopta una postura defensiva y se protege de\ncualquier daño. Reduce el Ataque de cualquier Pokémon\nque lo ataque con un movimiento de contacto."
    ko: "상대의 공격을 막음과 동시에\n방어 태세를 갖춘다.\n접촉한 상대의 공격을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n自己变为防御姿态。\n能够降低所接触到的对手的攻击。"
    zh_trad: "防住對手攻擊的同時，\n使自己變為防禦姿態。\n降低接觸到的對手的攻擊。"
    es_latam: "El usuario adopta una postura defensiva y se protege\nde cualquier daño. Reduce el Ataque de cualquier\nPokémon que lo ataque con un movimiento de contacto."
knock_off:
  names:
