aerial_ace:
  names:
    jp_kanji: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
    zh_simp: 燕返
    zh_trad: 燕返
    es_latam: As Aéreo
  descriptions:
    jp_kanji: "素早い動きで\n相手を翻弄して切りつける。"
    en: "The user attacks by confounding targets with swift\nmovements before slashing."
    fr: Le lanceur prend la cible de vitesse et la lacère.
    it: "Il Pokémon sconvolge il bersaglio con movimenti\nvelocissimi e lo assale."
    de: "Der Anwender irritiert das Ziel mit schnellen\nBewegungen und greift an."
    es: "Desconcierta al objetivo con movimientos muy rápidos\nantes de cercenarlo."
    ko: "재빠른 움직임으로\n상대를 농락해 벤다."
    zh_simp: "以敏捷的动作\n戏弄对手后进行切斩。"
    zh_trad: "以敏捷的動作\n戲弄對手後進行切斬。"
    es_latam: "Desconcierta al objetivo con movimientos muy rápidos\nantes de cercenarlo."
