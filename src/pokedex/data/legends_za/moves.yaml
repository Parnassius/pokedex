    jp_kanji: ハードプレス
    en: Hard Press
    fr: Pression Extrême
    it: Pressa d’Acciaio
    de: Stahlpresse
    es: Prensa Metálica
    ko: 하드프레스
    zh_simp: 硬压
    zh_trad: 硬壓
    es_latam: Prensa Metálica
harden:
  names:
    jp_kanji: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
    zh_simp: 变硬
    zh_trad: 變硬
    es_latam: Fortaleza
  descriptions:
    jp_kanji: "全身に力をこめて\n体を硬くして\n少しのあいだ自分の防御を上げる。"
    en: "The user boosts its Defense stat for a short time by\ntensing its muscles to stiffen its body."
    fr: "Le lanceur contracte tous ses muscles pour augmenter\nsa Défense pendant un court instant."
    it: "Il Pokémon tonifica tutti i muscoli del corpo per\naumentare la propria Difesa per un po’ di tempo."
    de: "Der Anwender sammelt Kraft in seinem ganzen Körper\nund erhärtet ihn, um seine Verteidigung für kurze Zeit\nzu erhöhen."
    es: "El usuario tensa su musculatura para aumentar la\nDefensa durante un breve período de tiempo."
    ko: "전신에 힘을 주어\n몸을 단단하게 해서\n잠시 동안 자신의 방어를 올린다."
    zh_simp: "全身使劲，让身体变硬，\n从而在一小段时间内提高自己的防御。"
    zh_trad: "使用全身的力量讓身體硬化，\n在一小段時間內提高自己的防禦。"
    es_latam: "El usuario tensa su musculatura para aumentar la\nDefensa durante un breve periodo."
haze:
  names:
    jp_kanji: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
    zh_simp: 黑雾
    zh_trad: 黑霧
    es_latam: Niebla
  descriptions:
    jp_kanji: "黒い霧で周囲を覆う。\n霧に触れたポケモン全員の\n能力変化をもとにもどす。"
    en: "The user cloaks the area in a dark haze. Pokémon\ntouched by the haze will have their stat changes reverted."
    fr: "Le lanceur répand autour de lui un brouillard noir qui\nannule les changements de stats des Pokémon touchés."
    it: "Il Pokémon crea una nube nera attorno a sé che annulla\nogni modifica alle statistiche di tutti i Pokémon a contatto\ncon essa."
    de: "Der Anwender hüllt seine Umgebung in einen dunklen\nNebel. Die Statusveränderungen aller Pokémon, die den\nNebel berühren, werden zurückgesetzt."
    es: "Genera a su alrededor una neblina oscura que elimina\nlos cambios en las características de todos los Pokémon\nque entren en contacto con ella."
    ko: "검은 안개로 주위를 뒤덮는다.\n안개에 닿은 포켓몬 전원의\n능력 변화를 원래대로 되돌린다."
    zh_simp: "用黑雾覆盖四周。\n将碰到雾的全部宝可梦的\n能力变化复原。"
    zh_trad: "用黑霧覆蓋周圍。\n讓接觸到霧的全體寶可夢的\n能力變化回到初始狀態。"
    es_latam: "Genera a su alrededor una neblina oscura que elimina\nlos cambios en las características de todos los Pokémon\nque entren en contacto con ella."
head_charge:
  names:
    jp_kanji: アフロブレイク
    en: Head Charge
    fr: Peignée
    it: Ricciolata
    de: Steinschädel
    es: Ariete
    ko: 아프로브레이크
    zh_simp: 爆炸头突击
    zh_trad: 爆炸頭突擊
    es_latam: Carga de Cabeza
head_smash:
  names:
    jp_kanji: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
    zh_simp: 双刃头锤
    zh_trad: 雙刃頭錘
    es_latam: Topetazo
  descriptions:
    jp_kanji: "命を懸けて　こん身の力で\n相手に　ずつきをする。\n自分もダメージを受ける。"
    en: "The user attacks by slamming into targets with a\nreckless, full-power headbutt. The user will also take\nsome damage."
    fr: "Le lanceur assène un coup de tête désespéré à la cible.\nBlesse aussi le lanceur."
    it: "Il Pokémon dà una testata al bersaglio con tutta\nla potenza di cui dispone, ma subisce danni."
    de: "Der Anwender greift das Ziel unter Einsatz seines Lebens\nmit einem Kopfstoß an. Dabei erleidet er selbst Schaden."
    es: "El usuario arriesga su vida y lanza un cabezazo con toda\nsu fuerza, pero también se hiere a sí mismo."
    ko: "목숨을 걸고 혼신의 힘으로\n상대에게 박치기를 한다.\n자신도 데미지를 입는다."
    zh_simp: "拼命使出浑身力气，\n向对手进行头锤攻击。\n自己也会受到伤害。"
    zh_trad: "使出渾身力量，\n捨身向對手進行頭錘攻擊。\n自己也會受到傷害。"
    es_latam: "El usuario arriesga su vida y lanza un cabezazo con toda\nsu fuerza, pero también se hiere a sí mismo."
headbutt:
  names:
    jp_kanji: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
    zh_simp: 头锤
    zh_trad: 頭錘
    es_latam: Golpe Cabeza
  descriptions:
    jp_kanji: "頭を突き出して\nまっすぐつっこんで攻撃する。\n相手をひるませることもある。"
    en: "The user attacks by leaning forward and charging\nheadfirst into targets. This may also make targets flinch."
    fr: "Le lanceur donne un coup de tête à la cible.\nPeut aussi l’apeurer."
    it: "Il Pokémon attacca lanciandosi diritto di testa contro\nil bersaglio. Può anche farlo tentennare."
    de: "Der Anwender greift mit dem Kopf voraus an.\nGetroffene Gegner schrecken eventuell zurück."
    es: Potente cabezazo que puede amedrentar al objetivo.
    ko: "머리를 내밀고\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将头伸出，\n笔直地扑向对手进行攻击。\n有时也会使对手畏缩。"
    zh_trad: "將頭伸出，\n直直衝向對手進行攻擊。\n有時還會讓對手畏縮。"
    es_latam: Poderoso cabezazo que puede atemorizar al objetivo.
