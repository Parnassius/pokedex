    zh_trad: 精神之牙
    es_latam: Psicocolmillo
  descriptions:
    jp_kanji: "サイコパワーでかみついて\n相手を攻撃する。　ひかりのかべや\nリフレクターなども破壊できる。"
    en: "The user attacks by biting targets using psychic power.\nThis move can also break barriers such as Light Screen\nand Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs psychiques.\nBrise aussi les barrières comme Mur Lumière\net Protection."
    it: "Il Pokémon attacca il bersaglio mordendolo con delle\nzanne generate con l’energia psichica. Può rompere\nbarriere come Riflesso e Schermoluce."
    de: "Der Anwender greift an, indem er das Ziel mithilfe von\nPsycho-Kräften beißt. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a su objetivo con poderes psíquicos que además\ndestruyen barreras como Pantalla de Luz y Reflejo."
    ko: "사이코 파워로 물어서 상대를 공격한다.\n빛의장막이나 리플렉터 등도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
    es_latam: "Ataca a su objetivo con poderes psíquicos que, además,\ndestruyen barreras como Pantalla de Luz y Reflejo."
psychic_noise:
  names:
    jp_kanji: サイコノイズ
