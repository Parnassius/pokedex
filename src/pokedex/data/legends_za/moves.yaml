    fr: "Le lanceur barbote et éclabousse les environs.\nCette capacité n’a aucun effet."
    it: Il Pokémon saltella senza ottenere alcun effetto.
    de: "Der Anwender greift nicht an, sondern platscht nur\nherum, was überhaupt nichts bewirkt."
    es: No tiene ningún efecto. Solo salpica.
    ko: "공격도 하지 않고 팔딱팔딱 튈 뿐\n아무 일도 일어나지 않는다..."
    zh_simp: "也不攻击只是一蹦一蹦地跳，\n什么都不会发生……"
    zh_trad: "不攻擊對手，只是蹦蹦跳跳的，\n什麼事也不會發生……"
