sheer_cold:
  names:
    jp_kanji: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
    zh_simp: 绝对零度
    zh_trad: 絕對零度
    es_latam: Frío Extremo
  descriptions:
    jp_kanji: "絶対零度の冷たさで相手を攻撃する。\n当たった相手はこおり状態になるが\n攻撃するまでとても時間がかかる。"
    en: "The user attacks targets with an absolute-zero chill. This\nalso leaves targets frozen, but this move takes a great\ndeal of time to carry out."
    fr: "Le lanceur attaque en répandant un froid glacial.\nLes cibles touchées sont gelées. L’attaque prend\nbeaucoup de temps à se déclencher."
    it: "Il Pokémon attacca il bersaglio con un’ondata di freddo\npenetrante che lo congela. L’attacco richiede molto\ntempo."
    de: "Der Anwender greift das Ziel mit eisiger Kälte an.\nGetroffene Gegner frieren ein, aber der Angriff geschieht\nmit langer Verzögerung."
    es: "El usuario ataca con una temperatura del cero absoluto\nque congela al objetivo si acierta. Este movimiento\nrequiere mucho tiempo para ejecutarse."
    ko: "절대 영도의 추위로 상대를 공격한다.\n맞은 상대는 얼음 상태가 되지만\n공격하기까지 상당한 시간이 걸린다."
    zh_simp: "以绝对零度的冰冷攻击对手。\n会让命中的对手陷入冰冻状态，\n但需要很长时间发动攻击。"
    zh_trad: "用絕對零度的冰冷攻擊對手。\n雖然擊中的對手會陷入冰凍狀態，\n但需要非常多時間發動攻擊。"
    es_latam: "El usuario ataca con una temperatura del cero absoluto\nque congela al objetivo si acierta. Este movimiento\nrequiere mucho tiempo para ejecutarse."
shell_side_arm:
  names:
