    zh_simp: 溶解液
    zh_trad: 溶解液
    es_latam: Ácido
acid_armor:
  names:
    jp_kanji: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armadura Ácida
    ko: 녹기
    zh_simp: 溶化
    zh_trad: 溶化
    es_latam: Armadura Ácida
  descriptions:
    jp_kanji: "細胞の変化で液状になり\nしばらくのあいだ自分の防御を上げる。"
    en: "The user boosts its Defense stat for a while by altering its\ncellular structure to become liquefied."
    fr: "Le lanceur modifie sa structure cellulaire pour se\nliquéfier, ce qui augmente sa Défense pendant\nun certain temps."
    it: "Il Pokémon altera la sua struttura cellulare passando\nallo stato liquido e aumentando la sua Difesa\nper un certo tempo."
    de: "Der Anwender verändert seine Körperzellen und\nverflüssigt sich, um seine Verteidigung für einige\nZeit zu erhöhen."
    es: "Transforma su estructura celular para hacerse líquido y\naumentar la Defensa durante un tiempo."
    ko: "세포의 변화로 액체가 되어\n한동안 자신의 방어를 올린다."
    zh_simp: "通过细胞的变化进行液化，\n从而在一段时间内提高自己的防御。"
    zh_trad: "藉由細胞的變化讓身體液化，\n在一段時間內提高自己的防禦。"
    es_latam: "Transforma su estructura celular para hacerse líquido\ny aumentar mucho la Defensa durante un tiempo."
acid_spray:
  names:
    jp_kanji: アシッドボム
    en: Acid Spray
    fr: Bombe Acide
    it: Acidobomba
    de: Säurespeier
    es: Bomba Ácida
    ko: 애시드봄
    zh_simp: 酸液炸弹
    zh_trad: 酸液炸彈
    es_latam: Bomba Ácida
  descriptions:
    jp_kanji: "相手をとかす液体を\n吐きだして攻撃する。\nしばらくのあいだ相手の特防を下げる。"
    en: "The user attacks by spitting caustic fluid at targets. This\nalso lowers their Sp. Def stats for a while."
    fr: "Le lanceur projette un liquide acide qui fait fondre la cible.\nBaisse la Défense Spéciale de la cible pendant un certain\ntemps."
    it: "Il Pokémon attacca il bersaglio con un acido altamente\ncorrosivo, riducendo la sua Difesa Speciale per un certo\ntempo."
    de: "Der Anwender greift an, indem er eine ätzende\nFlüssigkeit auf das Ziel speit. Die Spezial-Verteidigung\ngetroffener Gegner wird für einige Zeit gesenkt."
    es: "Ataca con un líquido corrosivo que reduce la Defensa\nEspecial del objetivo durante un tiempo."
    ko: "상대를 녹이는 액체를\n토해 내서 공격한다.\n한동안 상대의 특수방어를 떨어뜨린다."
    zh_simp: "喷出能溶化对手的液体进行攻击。\n会在一段时间内降低对手的特防。"
    zh_trad: "噴出能溶化對手的液體進行攻擊。\n在一段時間內降低對手的特防。"
    es_latam: "Ataca con un líquido corrosivo que reduce la Defensa\nEspecial del objetivo durante un tiempo."
