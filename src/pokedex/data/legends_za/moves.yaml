  descriptions:
    jp_kanji: "素早い動きで相手の足を\nねらって攻撃する。\n少しのあいだ相手の動きを遅くする。"
    en: "The user attacks targets with a swift move aimed at their\nlegs. This also makes targets move more slowly for a\nshort time."
    fr: "Le lanceur envoie un coup rapide qui affecte la mobilité\nde la cible. Baisse la vitesse de déplacement de la cible\npendant un court instant."
    it: "Il Pokémon colpisce con un attacco fulmineo la parte\ninferiore del corpo del bersaglio, rallentandone inoltre\ni movimenti per un po’ di tempo."
    de: "Der Anwender greift mit blitzschnellen Bewegungen die\nBeine des Zieles an. Getroffene Gegner bewegen sich für\nkurze Zeit langsamer."
    es: "Ataque rápido dirigido a los pies del objetivo que lo\nvuelve más lento durante un breve período de tiempo."
    ko: "재빠른 움직임으로\n상대의 다리를 노려 공격한다.\n잠시 동안 상대의 움직임이 느려진다."
    zh_simp: "以敏捷的动作瞄准\n对手的脚进行攻击。\n会在一小段时间内使对手的动作变得迟缓。"
    zh_trad: "瞄準對手的腳，\n以敏捷的動作進行攻擊。\n在一小段時間內會讓對手的行動變慢。"
    es_latam: "Ataque rápido dirigido a los pies del objetivo que lo\nvuelve más lento durante un breve periodo."
lucky_chant:
