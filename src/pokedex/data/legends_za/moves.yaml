thousand_arrows:
  names:
    jp_kanji: サウザンアロー
    en: Thousand Arrows
    fr: Myria-Flèches
    it: Mille Frecce
    de: Tausend Pfeile
    es: Mil Flechas
    ko: 사우전드애로
    zh_simp: 千箭齐发
    zh_trad: 千箭齊發
    es_latam: Mil Flechas
  descriptions:
    jp_kanji: "体内から放出したエネルギーを\n無数の矢として降らせて攻撃する。\nひこうタイプのポケモンにも当たる。"
    en: "The user attacks by generating countless arrows from its\ninternal energy and raining them down upon targets.\nEven Flying-type Pokémon will be hit by this move."
    fr: "Le lanceur libère son énergie sous la forme d’une\nmyriade de flèches pour attaquer. Cette capacité\ntouche même les Pokémon de type Vol."
    it: "Il Pokémon attacca rilasciando la propria energia interna\nsotto forma di innumerevoli frecce. Questa mossa\ncolpisce anche i Pokémon di tipo Volante."
    de: "Der Anwender greift an, indem er Energie aus seinem\nKörper in Form von unzähligen Pfeilen herabregnen lässt.\nDie Attacke erfasst auch Flug-Pokémon."
    es: "Transforma su energía interna en un millar de flechas\ny ataca al objetivo con ellas. Acierta incluso a Pokémon\nde tipo Volador."
    ko: "체내에서 방출한 에너지를\n무수한 화살로 바꾸어 공격한다.\n비행타입 포켓몬에게도 맞는다."
    zh_simp: "将体内释放的能量化为无数的箭，\n使其降落进行攻击。\n也能击中飞行属性的宝可梦。"
    zh_trad: "將從體內釋出的能量\n化為無數的箭降下進行攻擊。\n也能命中飛行屬性的寶可夢。"
    es_latam: "Transforma su energía interna en un millar de flechas\ny ataca al objetivo con ellas. Acierta incluso a Pokémon\nde tipo Volador."
thousand_waves:
  names:
    jp_kanji: サウザンウェーブ
    en: Thousand Waves
    fr: Myria-Vagues
    it: Mille Onde
    de: Tausend Wellen
    es: Mil Temblores
    ko: 사우전드웨이브
    zh_simp: 千波激荡
    zh_trad: 千波激盪
    es_latam: Mil Temblores
  descriptions:
    jp_kanji: "地をはう　波によって攻撃。\n波に巻き込まれた相手は\n交代することができなくなる。"
    en: "The user attacks by unleashing a wave that crawls along\nthe ground. Any Pokémon hit by the wave cannot be\nswitched out of battle."
    fr: "Le lanceur attaque avec des vagues glissant au sol.\nLes cibles prises dedans ne peuvent pas quitter le terrain."
    it: "Il Pokémon attacca con delle onde che si propagano\nnel terreno, investendo il bersaglio e impedendogli\ndi essere sostituito."
    de: "Der Anwender greift mit einer Welle an, die dicht über\ndem Boden verläuft und Pokémon, die sie erfasst,\nam Auswechseln hindert."
    es: "El usuario genera ondas sísmicas que se propagan por\nel suelo y sacuden al objetivo. Los Pokémon alcanzados\nno podrán ser cambiados por otros."
    ko: "땅 위를 뻗어 나가는 파도로 공격한다.\n파도에 휩쓸린 상대는 교체할 수 없게 된다."
    zh_simp: "从地面掀起波浪进行攻击。\n被掀入波浪中的对手，\n将无法进行替换。"
    zh_trad: "化成波浪從地面進行攻擊。\n被捲入波浪中的對手\n將無法進行替換。"
    es_latam: "El usuario genera ondas sísmicas que se propagan por el\nsuelo y sacuden al objetivo. No se podrá cambiar por\notros a los Pokémon afectados."
