tidy_up:
  names:
    jp_kanji: おかたづけ
    en: Tidy Up
    fr: Grand Nettoyage
    it: Pulizie
    de: Aufräumen
    es: Limpieza General
    ko: 정리정돈
    zh_simp: 大扫除
    zh_trad: 大掃除
    es_latam: Limpieza General
topsy_turvy:
  names:
    jp_kanji: ひっくりかえす
    en: Topsy-Turvy
    fr: Renversement
    it: Sottosopra
    de: Invertigo
    es: Reversión
    ko: 뒤집어엎기
    zh_simp: 颠倒
    zh_trad: 顛倒
    es_latam: Reversión
  descriptions:
    jp_kanji: "相手にかかっている\nすべての能力変化を\nひっくり返して逆にする。"
    en: "The user turns all the stat changes affecting targets\ntopsy-turvy so that they become the opposite of what\nthey were."
    fr: Inverse tous les changements de stats de la cible.
    it: "Questa mossa inverte tutte le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender invertiert alle Statusveränderungen\ndes Zieles."
    es: "Invierte por completo los cambios en las características\ndel objetivo."
    ko: "상대에게 걸려 있는 모든 능력 변화를\n뒤집어서 반대로 만든다."
    zh_simp: "颠倒对手身上的\n所有能力变化，\n变成和原来相反的状态。"
    zh_trad: "讓對手身上所有的\n能力變化顛倒過來，\n變成和原來相反的狀態。"
    es_latam: "Invierte por completo los cambios en las características\ndel objetivo."
torch_song:
  names:
    jp_kanji: フレアソング
    en: Torch Song
    fr: Chant Flamboyant
    it: Canzone Ardente
    de: Loderlied
    es: Canto Ardiente
    ko: 플레어송
    zh_simp: 闪焰高歌
    zh_trad: 閃焰高歌
    es_latam: Canto Ígneo
torment:
  names:
    jp_kanji: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
    zh_simp: 无理取闹
    zh_trad: 無理取鬧
    es_latam: Tormento
  descriptions:
    jp_kanji: "相手に　いちゃもんをつけて\n同じ技を連続で出しにくくする。"
    en: "The user torments and enrages the target, making it\nharder for the same move to be used in quick succession."
    fr: "Le lanceur irrite la cible afin qu’elle ait plus de mal à\nutiliser la même capacité plusieurs fois d’affilée."
    it: "Il Pokémon tormenta e fa infuriare il bersaglio,\nrendendogli più difficile usare la stessa mossa\npiù volte di fila."
    de: "Der Anwender erzürnt das Ziel, um den wiederholten\nEinsatz derselben Attacke zu erschweren."
    es: "Atormenta y enfurece al objetivo, de modo que le\nresultará difícil usar el mismo movimiento de forma\nconsecutiva."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 연속으로\n쓰기 힘들게 만든다."
    zh_simp: "向对手无理取闹，\n令其难以连续使出相同招式。"
    zh_trad: "無理取鬧，\n讓對手難以連續\n使出相同招式。"
    es_latam: "Atormenta y enfurece al objetivo, por lo que le\nresulta difícil usar el mismo movimiento de forma\nconsecutiva."
toxic:
  names:
    jp_kanji: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
    zh_simp: 剧毒
    zh_trad: 劇毒
    es_latam: Tóxico
  descriptions:
    jp_kanji: "相手を猛毒の状態にする。\n時間がたつほど\n毒のダメージが増えていく。"
    en: "The user badly poisons targets. The poison’s damage\nworsens over time."
    fr: "Le lanceur empoisonne gravement la cible.\nPlus le temps passe, plus les dégâts infligés par\nle poison sont importants."
    it: "Il Pokémon iperavvelena il bersaglio con una potente\ntossina. I danni aumentano con il passare del tempo."
    de: "Der Anwender vergiftet das Ziel schwer. Der Schaden\ndurch das Gift steigt mit der Zeit."
    es: "Envenena gravemente al objetivo y causa más daño\ncuanto más tiempo pasa."
    ko: "상대를 맹독 상태로 만든다.\n시간이 경과할수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着时间的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n時間流逝而增加。"
    es_latam: "Envenena gravemente al objetivo y causa más daño\ncuanto más tiempo pasa."
toxic_spikes:
  names:
    jp_kanji: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
    zh_simp: 毒菱
    zh_trad: 毒菱
    es_latam: Púas Tóxicas
  descriptions:
    jp_kanji: "自分の正面にどくびしをしかける。\nどくびしを踏んだ相手は毒状態になる。"
    en: "The user lays a trap of poison spikes in front of itself. The\nspikes will poison susceptible opposing Pokémon that\nmake contact with them."
    fr: "Le lanceur disperse devant lui des pics toxiques\nqui empoisonnent quand on marche dessus."
    it: "Il Pokémon piazza davanti a sé delle punte velenose\nche avvelenano gli avversari che le calpestano."
    de: "Der Anwender legt giftige Stacheln vor sich aus,\ndie Gegner vergiften, wenn diese auf sie treten."
    es: "Lanza una trampa de púas tóxicas delante de sí mismo\nque envenena a los rivales que las pisan."
    ko: "자신의 정면에 독압정을 설치한다.\n독압정을 밟은 상대는 독 상태가 된다."
    zh_simp: "将毒菱扔到自己的前方。\n使踩到毒菱的对手陷入中毒状态。"
    zh_trad: "在自己的前方散布毒菱。\n讓踩到毒菱的對手陷入中毒狀態。"
    es_latam: "Lanza una trampa de púas tóxicas delante de sí mismo\nque envenena a los rivales que las pisan."
toxic_thread:
  names:
    jp_kanji: どくのいと
    en: Toxic Thread
    fr: Fil Toxique
    it: Velenotela
    de: Giftfaden
    es: Hilo Venenoso
    ko: 독실
    zh_simp: 毒丝
    zh_trad: 毒絲
    es_latam: Hilo Venenoso
trailblaze:
  names:
    jp_kanji: くさわけ
    en: Trailblaze
    fr: Désherbaffe
    it: Apripista
    de: Wegbereiter
    es: Abrecaminos
    ko: 개척하기
    zh_simp: 起草
    zh_trad: 起草
    es_latam: Abrecaminos
  descriptions:
    jp_kanji: "相手の元気を失わせるくらい\n冷たい水を浴びせて攻撃する。\n少しのあいだ相手の攻撃を下げる。"
    en: "The user attacks targets by showering them with water\nthat’s so cold it saps their power. This also lowers targets’\nAttack stats for a short time."
    fr: "Le lanceur attaque la cible en l’arrosant d’une eau\nsi froide que l’esprit combatif de celle-ci se détériore\net son Attaque baisse pendant un court instant."
    it: "Il Pokémon attacca il bersaglio con una doccia d’acqua\ntalmente fredda da farlo demoralizzare, riducendone\nl’Attacco per un po’ di tempo."
    de: "Der Anwender greift an, indem er das Ziel mit eiskaltem\nWasser überschüttet und so seinen Kampfgeist raubt.\nDer Angriff getroffener Gegner wird für kurze Zeit gesenkt."
    es: "Ataca rociando un agua gélida y desalentadora que\nreduce el Ataque del objetivo durante un breve período\nde tiempo."
    ko: "상대의 기운이 빠질 정도로\n차가운 물을 끼얹어서 공격한다.\n잠시 동안 상대의 공격을 떨어뜨린다."
    zh_simp: "泼洒冰冷得足以让对手\n失去活力的水进行攻击。\n会在一小段时间内降低对手的攻击。"
    zh_trad: "潑灑冰冷到足以讓對手\n失去活力的水進行攻擊。\n在一小段時間內降低對手的攻擊。"
    es_latam: "Ataca rociando agua gélida y desalentadora que\nreduce el Ataque del objetivo durante un breve periodo."
transform:
  names:
    jp_kanji: へんしん
    en: Transform
    fr: Morphing
    it: Trasformazione
    de: Wandler
    es: Transformación
    ko: 변신
    zh_simp: 变身
    zh_trad: 變身
    es_latam: Transformación
tri_attack:
  names:
    jp_kanji: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
    zh_simp: 三重攻击
    zh_trad: 三重攻擊
    es_latam: Triataque
  descriptions:
    jp_kanji: "３つの光線で攻撃する。\nまひか　やけどか　こおり状態の\nどれかにすることがある。"
    en: "The user attacks with three beams. This may also leave\ntargets burned, frozen, or paralyzed."
    fr: "Le lanceur projette trois rayons d’énergie qui frappent\nla cible et peuvent aussi la paralyser, la brûler ou la geler."
    it: "Il Pokémon attacca il bersaglio con tre raggi di luce\nche possono paralizzarlo, scottarlo o congelarlo."
    de: "Der Anwender greift mit drei Strahlen an. Getroffene\nGegner werden eventuell paralysiert, frieren ein oder\nerleiden Verbrennungen."
    es: "Ataque con tres rayos de luz que puede paralizar, quemar\no congelar al objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
    es_latam: "Ataque con tres rayos de luz que puede paralizar, quemar\no congelar al objetivo."
trick:
  names:
    jp_kanji: トリック
    en: Trick
    fr: Tour de Magie
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
    zh_simp: 戏法
    zh_trad: 戲法
    es_latam: Truco
trick_or_treat:
  names:
    jp_kanji: ハロウィン
    en: Trick-or-Treat
    fr: Halloween
    it: Halloween
    de: Halloween
    es: Halloween
    ko: 핼러윈
    zh_simp: 万圣夜
    zh_trad: 萬聖夜
    es_latam: Halloween
  descriptions:
    jp_kanji: "相手をハロウィンに誘う。\n相手のタイプに\nゴーストタイプが追加される。"
    en: "The user invites targets to go trick-or-treating. This adds\nthe Ghost type to targets."
    fr: "Insuffle à la cible l’esprit d’Halloween, et lui ajoute\nle type Spectre."
    it: "Il Pokémon invita il bersaglio a festeggiare Halloween,\nfacendogli così acquisire anche il tipo Spettro."
    de: "Der Anwender lehrt das Ziel das Fürchten. Dieses\nnimmt dadurch zusätzlich den Typ Geist an."
    es: "Invita al objetivo a celebrar Halloween, lo que añade\nel tipo Fantasma a los tipos de este."
    ko: "상대를 핼러윈에 초대한다.\n상대의 타입에 고스트타입이 추가된다."
    zh_simp: "邀请对手参加万圣夜。\n使对手被追加幽灵属性。"
    zh_trad: "邀請對手參加萬聖夜。\n讓對手追加幽靈屬性。"
    es_latam: "Invita al objetivo a celebrar Halloween, lo que añade\nel tipo Fantasma a los tipos de este."
