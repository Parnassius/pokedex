    jp_kanji: じだんだ
    en: Stomping Tantrum
    fr: Trépignement
    it: Battipiedi
    de: Fruststampfer
    es: Pataleta
    ko: 분함의발구르기
    zh_simp: 跺脚
    zh_trad: 跺腳
    es_latam: Pataleta
stone_axe:
  names:
    jp_kanji: がんせきアックス
    en: Stone Axe
    fr: Hache de Pierre
    it: Rocciascure
    de: Felsaxt
    es: Hachazo Pétreo
    ko: 암석액스
    zh_simp: 岩斧
    zh_trad: 岩斧
    es_latam: Hachazo Pétreo
  descriptions:
    jp_kanji: "岩の斧で攻撃する。\nばらまかれた岩の破片が\n相手の周りに浮かぶ。"
    en: "The user attacks by swinging its stone axes at targets.\nStone splinters left behind by this attack float around the\ntargets."
    fr: "Le lanceur attaque la cible avec sa hache de pierre.\nDes débris de pierre se répandent alors et se mettent\nà flotter autour de la cible."
    it: "Il Pokémon attacca il bersaglio con delle scuri di roccia.\nI frammenti rocciosi dispersi dall’attacco restano sospesi\nintorno al bersaglio."
    de: "Der Anwender greift mit seinen Felsäxten an.\nDadurch verstreut er schwebende Felssplitter\nim Umkreis des Zieles."
    es: "Ataca con un hacha de piedra y, al hacerlo, se\ndesprenden fragmentos que rodean al objetivo."
    ko: "암석 도끼로 공격한다.\n흩어진 암석 파편은\n상대의 주위에 떠다니게 된다."
    zh_simp: "用岩石之斧进行攻击。\n散落的岩石碎片\n会飘浮在对手周围。"
    zh_trad: "用岩石之斧進行攻擊。\n散落的岩石碎片\n會在對手周圍飄浮。"
    es_latam: "Ataca con un hacha de piedra y, al hacerlo, se\ndesprenden fragmentos que rodean al objetivo."
stone_edge:
  names:
    jp_kanji: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
    zh_simp: 尖石攻击
    zh_trad: 尖石攻擊
    es_latam: Roca Afilada
  descriptions:
    jp_kanji: "とがった岩を\n相手に突き刺して攻撃する。\n急所に当たりやすい。"
    en: "The user attacks by stabbing targets with sharpened\nstones. This move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur transperce la cible avec des rochers aiguisés.\nTaux de critiques élevé."
    it: "Il Pokémon attacca il bersaglio infilzandolo con pietre\naffilate. Probabile brutto colpo."
    de: "Der Anwender durchbohrt das Ziel mit scharfen Steinen.\nHohe Volltrefferquote."
    es: "Clava piedras muy afiladas al objetivo. Suele asestar\nun golpe crítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
    es_latam: "Le clava piedras muy afiladas al objetivo. Suele lanzar\nun golpe crítico."
stored_power:
  names:
    jp_kanji: アシストパワー
    en: Stored Power
    fr: Force Ajoutée
    it: Veicolaforza
    de: Kraftvorrat
    es: Poder Reserva
    ko: 어시스트파워
    zh_simp: 辅助力量
    zh_trad: 輔助力量
    es_latam: Poder Acumulado
storm_throw:
  names:
    jp_kanji: やまあらし
    en: Storm Throw
    fr: Yama Arashi
    it: Tempestretta
    de: Bergsturm
    es: Llave Corsé
    ko: 업어후리기
    zh_simp: 山岚摔
    zh_trad: 山嵐摔
    es_latam: Llave Tempestad
  descriptions:
    jp_kanji: "強烈な一撃を\n相手にくりだす。攻撃は\n必ず急所に当たる。"
    en: "The user attacks by striking targets with a powerful blow.\nThis move always lands a critical hit."
    fr: "Le lanceur porte un coup très puissant à la cible.\nL’attaque est toujours critique."
    it: "Il Pokémon sferra un colpo micidiale al bersaglio.\nBrutto colpo assicurato."
    de: "Der Anwender greift das Ziel mit einem wuchtigen\nSchlag an. Volltreffergarantie."
    es: "Lanza un golpe devastador. Siempre asesta un golpe\ncrítico."
    ko: "강렬한 일격을 상대에게 날린다.\n공격은 반드시 급소에 맞는다."
    zh_simp: "向对手使出强烈的一击。\n攻击必定会击中要害。"
    zh_trad: "向對手發動強烈的一擊。\n一定會擊中要害。"
    es_latam: "Lanza un golpe devastador. Siempre provoca un golpe\ncrítico."
