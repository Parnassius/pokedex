    zh_simp: 空气利刃
    zh_trad: 空氣利刃
    es_latam: Aire Cortante
air_slash:
  names:
    jp_kanji: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
    zh_simp: 空气之刃
    zh_trad: 空氣斬
    es_latam: Corte Aéreo
  descriptions:
    jp_kanji: "空をも切り裂く\n空気の刃で攻撃する。\n相手をひるませることもある。"
    en: "The user attacks with a blade of air that slices even the\nsky. This may also make targets flinch."
    fr: "Le lanceur attaque la cible avec une lame d’air qui fend\ntout sur son passage, même le vent.\nPeut aussi l’apeurer."
    it: "Il Pokémon attacca con un vento tagliente che squarcia\nil cielo. Può anche far tentennare il bersaglio."
    de: "Der Anwender greift mit einer Luftklinge an, die den\nHimmel selbst zerteilen kann. Getroffene Gegner\nschrecken eventuell zurück."
    es: "Ataca con un viento afilado que incluso corta el aire.\nTambién puede amedrentar al objetivo."
    ko: "하늘까지 베어 가르는\n공기의 칼날로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用连天空也能劈开的\n空气之刃进行攻击。\n有时也会使对手畏缩。"
    zh_trad: "用連天空也能劈開的\n空氣之刃進行攻擊。\n有時還會使對手畏縮。"
    es_latam: "Ataca con un viento afilado que incluso corta el aire.\nTambién puede atemorizar al objetivo."
