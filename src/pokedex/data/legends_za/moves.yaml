    ko: 와이드가드
    zh_simp: 广域防守
    zh_trad: 廣域防守
    es_latam: Guardia Amplia
wild_charge:
  names:
    jp_kanji: ワイルドボルト
    en: Wild Charge
    fr: Éclair Fou
    it: Sprizzalampo
    de: Stromstoß
    es: Voltio Cruel
    ko: 와일드볼트
    zh_simp: 疯狂伏特
    zh_trad: 瘋狂伏特
    es_latam: Carga Salvaje
  descriptions:
    jp_kanji: "電気をまとい相手にぶつかる。\n自分もダメージを受ける。"
    en: "The user attacks by charging forward while cloaked in\nelectricity. The user will also take some damage."
    fr: "Le lanceur s’enveloppe d’électricité et charge la cible,\nce qui le blesse également."
    it: "Il Pokémon si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce danni."
    de: "Der Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Dabei erleidet er selbst Schaden."
    es: "El usuario se envuelve de electricidad y carga contra el\nobjetivo, pero también se hiere a sí mismo."
    ko: "전기를 두르고 상대에게 부딪친다.\n자신도 데미지를 입는다."
    zh_simp: "让电流覆盖全身，撞向对手。\n自己也会受到伤害。"
    zh_trad: "用電流圍繞全身並衝撞對手。\n自己也會受到傷害。"
    es_latam: "El usuario se envuelve de electricidad y embiste\nal objetivo, pero también se hiere a sí mismo."
wildbolt_storm:
  names:
    jp_kanji: かみなりあらし
    en: Wildbolt Storm
    fr: Typhon Fulgurant
    it: Tempesta Tonante
    de: Donnerorkan
    es: Electormenta
    ko: 번개폭풍
    zh_simp: 鸣雷风暴
    zh_trad: 鳴雷風暴
    es_latam: Electormenta
will_o_wisp:
  names:
    jp_kanji: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
    zh_simp: 磷火
    zh_trad: 鬼火
    es_latam: Fuego Fatuo
  descriptions:
    jp_kanji: "不気味で怪しい炎を放って\n相手をやけど状態にする。"
    en: "The user shoots a sinister flame to inflict a burn on\ntargets."
    fr: "Le lanceur projette des flammes maléfiques sur la cible\net la brûle."
    it: "Il Pokémon lancia fiamme sinistre e misteriose\nche causano una scottatura al bersaglio."
    de: "Der Anwender feuert unheimliche Flammen ab, durch die\ndas Ziel Verbrennungen erleidet."
    es: Siniestras llamas moradas que producen quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
    es_latam: Siniestras llamas moradas que producen quemaduras.
wing_attack:
  names:
    jp_kanji: つばさでうつ
    en: Wing Attack
    fr: Cru-Ailes
    it: Attacco d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
    zh_simp: 翅膀攻击
    zh_trad: 翅膀攻擊
    es_latam: Ataque de Ala
  descriptions:
    jp_kanji: "大きくひろげた　りっぱな翼を\n相手にぶつけて攻撃する。"
    en: "The user attacks by spreading its imposing wings wide\nand slamming them into targets."
    fr: "Le lanceur déploie largement ses ailes majestueuses\npour attaquer la cible."
    it: "Il Pokémon attacca il bersaglio spiegando delle grandi\nali possenti."
    de: "Der Anwender greift das Ziel mit prächtigen,\nausgebreiteten Flügeln an."
    es: "Extiende totalmente sus majestuosas alas para golpear\nal objetivo con ellas."
    ko: "크게 펼친 훌륭한 날개를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "大大地展开美丽的翅膀，\n将其撞向对手进行攻击。"
    zh_trad: "用大大伸展開來的美麗翅膀，\n撞向對手進行攻擊。"
    es_latam: "Extiende totalmente sus majestuosas alas para golpear\nal objetivo con ellas."
wish:
  names:
    jp_kanji: ねがいごと
    en: Wish
    fr: Vœu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
    zh_simp: 祈愿
    zh_trad: 祈願
    es_latam: Deseo
  descriptions:
    jp_kanji: "技を使った後しばらくして\n自分か入れ替わったポケモンの\nＨＰを回復する。"
    en: "A short time after this move is used, HP will be restored\neither to the user or to the Pokémon that was switched\ninto battle in the user’s place."
    fr: "Un certain temps après l’utilisation de cette capacité,\nle lanceur ou le Pokémon qui le remplace récupère\ndes PV."
    it: "Poco dopo l’utilizzo della mossa, il Pokémon o chi\nlo sostituisce recupera PS."
    de: "Der Anwender oder ein eingewechseltes Pokémon\nregenerieren eine gewisse Zeit nach Einsatz der\nAttacke KP."
    es: "Poco después de usar este movimiento, el usuario o el\nPokémon que lo sustituya recupera PS."
    ko: "기술을 사용하고 얼마 후에\n자신 또는 교체한 포켓몬의 HP를 회복한다."
    zh_simp: "在使用招式的一段时间后\n会回复自己或是\n替换出场的宝可梦的ＨＰ。"
    zh_trad: "在使用招式的一段時間後，\n回復自己或是替換上場的\n寶可夢的ＨＰ。"
    es_latam: "Poco después de usar este movimiento, el usuario o el\nPokémon que lo sustituya recupera PS."
withdraw:
  names:
    jp_kanji: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
    zh_simp: 缩入壳中
    zh_trad: 縮入殼中
    es_latam: Refugio
wonder_room:
  names:
    jp_kanji: ワンダールーム
    en: Wonder Room
    fr: Zone Étrange
    it: Mirabilzona
    de: Wunderraum
    es: Zona Extraña
    ko: 원더룸
    zh_simp: 奇妙空间
    zh_trad: 奇妙空間
    es_latam: Zona Extraña
wood_hammer:
  names:
    jp_kanji: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
    zh_simp: 木槌
    zh_trad: 木槌
    es_latam: Mazazo
  descriptions:
    jp_kanji: "硬い胴体を\n相手にたたきつけて攻撃する。\n自分もダメージを受ける。"
    en: "The user attacks by slamming into targets with its rugged\nbody. The user will also take some damage."
    fr: "Le lanceur heurte la cible avec son corps robuste.\nBlesse aussi le lanceur."
    it: "Il Pokémon attacca scagliandosi con il suo corpo robusto\ncontro il bersaglio, ma subisce danni."
    de: "Der Anwender wirft sich mit seinem robusten Körper auf\ndas Ziel. Dabei erleidet er selbst Schaden."
    es: "Arremete contra el objetivo con su robusto cuerpo.\nEl usuario se hiere a sí mismo."
    ko: "단단한 몸통을\n상대에게 부딪쳐서 공격한다.\n자신도 데미지를 입는다."
    zh_simp: "用坚硬的躯体\n撞击对手进行攻击。\n自己也会受到伤害。"
    zh_trad: "用堅硬的軀體\n撞擊對手進行攻擊。\n自己也會受到傷害。"
    es_latam: "Embiste al objetivo con su robusto cuerpo.\nEl usuario se hiere a sí mismo."
work_up:
  names:
    jp_kanji: ふるいたてる
    en: Work Up
    fr: Rengorgement
    it: Cuordileone
    de: Kraftschub
    es: Avivar
    ko: 분발
    zh_simp: 自我激励
    zh_trad: 自我激勵
    es_latam: Avivar
  descriptions:
    jp_kanji: "自分を奮いたてて\n少しのあいだ攻撃と特攻を上げる。"
    en: "The user boosts its Attack and Sp. Atk stats for a short\ntime by getting worked up."
    fr: "Le lanceur se rengorge et augmente son Attaque\net son Attaque Spéciale pendant un court instant."
    it: "Il Pokémon si tira su di morale, aumentando l’Attacco\ne l’Attacco Speciale per un po’ di tempo."
    de: "Der Anwender erhält einen Kraftschub, der seinen\nAngriff und Spezial-Angriff für kurze Zeit erhöht."
    es: "El usuario se concentra y aumenta su Ataque y su\nAtaque Especial durante un breve período de tiempo."
    ko: "스스로 분발해서\n잠시 동안 공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而在一小段时间内提高攻击和特攻。"
    zh_trad: "激勵自己，\n在一小段時間內\n提高自己的攻擊和特攻。"
    es_latam: "El usuario se concentra y aumenta su Ataque\ny su Ataque Especial durante un breve periodo."
worry_seed:
  names:
    jp_kanji: なやみのタネ
