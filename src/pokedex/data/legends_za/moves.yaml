    ko: 벌레의야단법석
    zh_simp: 虫鸣
    zh_trad: 蟲鳴
    es_latam: Zumbido
  descriptions:
    jp_kanji: "振動で音波をおこして攻撃する。\n相手の特防を下げることもある。"
    en: "The user attacks with damaging sound waves created by\nvibration. This may also lower targets’ Sp. Def stats."
    fr: "Le lanceur fait vibrer son corps pour lancer une vague\nsonique sur la cible. Peut aussi baisser la Défense\nSpéciale de la cible."
    it: "Il Pokémon attacca generando un’onda sonora che può\nanche ridurre la Difesa Speciale del bersaglio."
    de: "Der Anwender greift an, indem er mithilfe von Vibration\nSchallwellen erzeugt. Die Spezial-Verteidigung\ngetroffener Gegner wird eventuell gesenkt."
    es: "El usuario crea una onda sónica dañina mediante\nvibraciones que también puede reducir la Defensa\nEspecial del objetivo."
    ko: "진동으로 음파를 일으켜서 공격한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时也会降低对手的特防。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時還會降低對手的特防。"
    es_latam: "El usuario crea una onda sónica dañina mediante\nvibraciones que también puede reducir la Defensa\nEspecial del objetivo."
bulk_up:
  names:
    jp_kanji: ビルドアップ
    en: Bulk Up
    fr: Gonflette
    it: Granfisico
    de: Protzer
    es: Corpulencia
    ko: 벌크업
    zh_simp: 健美
    zh_trad: 健美
    es_latam: Corpulencia
  descriptions:
    jp_kanji: "体に力をこめて筋肉をぶあつくすることで\n少しのあいだ自分の攻撃と防御を上げる。"
    en: "The user boosts its Attack and Defense stats for a short\ntime by tensing its muscles to bulk up its body."
    fr: "Le lanceur gonfle ses muscles pour augmenter\nson Attaque et sa Défense pendant un court instant."
    it: "Il Pokémon tende i muscoli per gonfiare il corpo,\naumentando Attacco e Difesa per un po’ di tempo."
    de: "Der Anwender spannt seine Muskeln an, um für kurze\nZeit seinen Angriff und seine Verteidigung zu erhöhen."
    es: "Robustece el cuerpo para aumentar el Ataque y la\nDefensa durante un breve período de tiempo."
    ko: "몸에 힘을 주어 근육을 두껍게 해서\n잠시 동안 자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而在一小段时间内提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n在一小段時間內提高自己的攻擊和防禦。"
    es_latam: "Robustece el cuerpo para aumentar el Ataque\ny la Defensa durante un breve periodo."
bulldoze:
  names:
    jp_kanji: じならし
    en: Bulldoze
    fr: Piétisol
    it: Battiterra
    de: Dampfwalze
    es: Terratemblor
    ko: 땅고르기
    zh_simp: 重踏
    zh_trad: 重踏
    es_latam: Terratemblor
  descriptions:
    jp_kanji: "地面を踏みならして\n相手を攻撃する。\n少しのあいだ相手の動きを遅くする。"
    en: "The user attacks targets by stomping on the ground. This\nalso makes targets move more slowly for a short time."
    fr: "Le lanceur piétine le sol et attaque la cible.\nBaisse aussi la vitesse de déplacement de la cible\npendant un court instant."
    it: "Il Pokémon calpesta il terreno e scatena un terremoto\nche danneggia il bersaglio, rallentandone i movimenti\nper un po’ di tempo."
    de: "Der Anwender greift das Ziel an, indem er auf den Boden\nstampft. Getroffene Gegner bewegen sich für kurze Zeit\nlangsamer."
    es: "Sacudida sísmica que daña al objetivo y lo vuelve más\nlento durante un breve período de tiempo."
    ko: "땅을 힘껏 밟아 상대를 공격한다.\n잠시 동안 상대의 움직임이 느려진다."
    zh_simp: "用力踩踏地面并攻击对手。\n会在一小段时间内\n使对手的动作变得迟缓。"
    zh_trad: "用力踩踏地面攻擊對手。\n在一小段時間內會讓\n對手的動作變得慢。"
    es_latam: "Sacudida sísmica que daña al objetivo y lo vuelve más\nlento durante un breve periodo."
bullet_punch:
  names:
    jp_kanji: バレットパンチ
    en: Bullet Punch
    fr: Pisto-Poing
    it: Pugnoscarica
    de: Patronenhieb
    es: Puño Bala
    ko: 불릿펀치
    zh_simp: 子弹拳
    zh_trad: 子彈拳
    es_latam: Puño Bala
  descriptions:
    jp_kanji: "弾丸のような速くて硬い\nパンチを相手にくりだす。"
    en: "The user attacks with a flurry of tough punches as fast as\nbullets."
    fr: "Le lanceur envoie sur la cible des coups de poing\naussi rapides que des balles de revolver."
    it: "Il Pokémon assesta sul bersaglio una scarica di pugni\nduri e veloci come proiettili."
    de: "Der Anwender schlägt mit Hieben auf das Ziel ein,\ndie so schnell und hart sind wie Patronen."
    es: "Ataca con fuertes puñetazos tan rápidos como\nproyectiles."
    ko: "탄환처럼 빠르고 단단한 펀치를\n상대에게 날린다."
    zh_simp: "向对手使出如子弹般\n快速而坚硬的拳头。"
    zh_trad: "向對手連續揮出如子彈般\n快速且堅硬的拳頭。"
    es_latam: Ataca con fuertes puñetazos rápidos como proyectiles.
