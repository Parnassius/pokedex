    fr: "Le lanceur déploie une toile visqueuse sous la cible.\nBaisse la vitesse de déplacement si on marche dessus."
    it: "Il Pokémon stende una rete appiccicosa ai piedi del\nbersaglio, rallentando i movimenti degli avversari\nche la calpestano."
    de: "Der Anwender spinnt unter dem Ziel ein klebriges Netz.\nGegner, die auf dieses treten, bewegen sich langsamer."
    es: "Coloca una red pegajosa alrededor del objetivo\nque reduce la Velocidad de los rivales que entran\nen combate."
    ko: "상대의 발밑에 끈적끈적한 네트를 펼친다.\n밟은 상대의 움직임이 느려진다."
    zh_simp: "在对手脚下围上黏黏的网，\n使踩到的对手动作变得迟缓。"
    zh_trad: "在對手腳下撒下黏黏的網，\n讓踩到網子的對手的動作變慢。"
    es_latam: "Coloca una red pegajosa alrededor del objetivo\nque reduce la Velocidad de los rivales que entran\nen combate."
