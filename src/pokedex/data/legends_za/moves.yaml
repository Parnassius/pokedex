    jp_kanji: "持てる力をすべて使って\n相手に突撃する。\n少しのあいだ反動で動けなくなる。"
    en: "The user attacks by charging into targets using every bit\nof its power. The recoil will leave the user unable to move\nfor a short time."
    fr: "Le lanceur charge la cible de toutes ses forces.\nLe contrecoup l’empêche d’agir pendant un court instant."
    it: "Il Pokémon carica il bersaglio usando tutta la propria\nforza, ma per un po’ di tempo non può agire a causa\ndel contraccolpo."
    de: "Der Anwender rennt mit seiner ganzen Kraft gegen das\nZiel. Durch den Rückstoß kann er sich für kurze Zeit nicht\nbewegen."
    es: "El usuario carga contra el objetivo con toda la fuerza\nque tiene, pero no podrá moverse durante un breve\nperíodo de tiempo."
    ko: "가진 힘을 모두 사용해서 상대에게 돌격한다.\n잠시 동안 반동으로 움직일 수 없다."
    zh_simp: "使出自己浑身力量突击对手。\n会在一小段时间内\n因反作用力而无法动弹。"
    zh_trad: "使出全身上下所有力量突擊對手。\n在一小段時間內\n會因為反作用力而無法動彈。"
