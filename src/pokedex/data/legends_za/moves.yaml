    ko: 누르기
    zh_simp: 泰山压顶
    zh_trad: 泰山壓頂
    es_latam: Golpe de Cuerpo
  descriptions:
    jp_kanji: "全身で相手にのしかかり攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by dropping onto targets with its full\nbody weight. This may also leave targets paralyzed."
    fr: "Le lanceur se laisse tomber sur la cible de tout\nson poids. Peut aussi la paralyser."
    it: "Il Pokémon attacca il bersaglio scagliandosi contro di lui\ncon tutto il corpo. Può causarne anche la paralisi."
    de: "Der Anwender greift an, indem er sich mit vollem\nKörpereinsatz auf das Ziel wirft. Getroffene Gegner\nwerden eventuell paralysiert."
    es: "Salta sobre el objetivo con todo su peso y puede llegar\na paralizarlo."
    ko: "온몸으로 상대를 덮쳐눌러 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用整个身体\n压住对手进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "用整個身體壓住對手進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Salta sobre el objetivo con todo su peso y puede\nparalizarlo."
