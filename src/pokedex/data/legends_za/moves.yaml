    en: "The user attacks by bashing targets with hard wings.\nThis may also boost the user’s Defense stat."
    fr: "Le lanceur frappe la cible avec des ailes d’acier.\nPeut aussi augmenter la Défense du lanceur."
    it: "Il Pokémon attacca colpendo con ali d’acciaio.\nPuò anche aumentare la propria Difesa."
    de: "Der Anwender greift mit harten Flügeln an.\nSeine Verteidigung wird eventuell erhöht."
    es: "Golpea al objetivo con unas alas robustas y macizas.\nPuede aumentar la Defensa del usuario."
    ko: "단단한 날개를 부딪쳐서 공격한다.\n자신의 방어가 올라갈 때가 있다."
