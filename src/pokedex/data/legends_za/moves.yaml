    en: "The user attacks swiftly by whirling its fists to create a\nwave of pure vacuum that it sends flying at targets."
    fr: "Le lanceur agite son poing pour projeter une onde\nde vide qui frappe la cible à toute vitesse."
    it: "Il Pokémon rotea i pugni per lanciare rapidamente\nun’onda di vuoto assoluto verso il bersaglio."
    de: "Der Anwender greift schnell an, indem er durch das\nSchwingen seiner Faust eine Vakuumwelle erzeugt."
    es: "Gira los puños y libera una rápida onda de vacío contra\nel objetivo."
    ko: "주먹을 휘둘러\n진공의 파장을 일으켜서 빠르게 공격한다."
    zh_simp: "挥动拳头，\n掀起真空波快速攻击。"
