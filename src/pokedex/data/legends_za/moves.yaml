techno_blast:
  names:
    jp_kanji: テクノバスター
    en: Techno Blast
    fr: Techno-Buster
    it: Tecnobotto
    de: Techblaster
    es: Tecno Shock
    ko: 테크노버스터
    zh_simp: 高科技光炮
    zh_trad: 高科技光炮
    es_latam: Tecno Shock
  descriptions:
    jp_kanji: "光弾を相手に放出する。\n自分の持つ\nカセットによりタイプが変わる。"
    en: "The user attacks by firing a beam of light at targets. This\nmove’s type changes depending on the kind of drive held\nby the user."
    fr: "Le lanceur frappe la cible en projetant un rayon\nde lumière. Le type de la capacité varie selon\nle module que tient le lanceur."
    it: "Il Pokémon rilascia un colpo di luce contro il bersaglio.\nIl tipo varia a seconda del modulo che ha."
    de: "Der Anwender feuert ein Lichtgeschoss auf das Ziel ab.\nDer Typ der Attacke hängt von dem des getragenen\nModuls ab."
    es: "Ataca al objetivo con un gran láser. El tipo del ataque\nlo determina el cartucho que porta el usuario."
    ko: "빛의 탄환을 상대에게 발사한다.\n자신이 지니고 있는\n카세트에 따라 타입이 바뀐다."
    zh_simp: "向对手放出光弹。\n属性会根据自己\n携带的卡带不同而改变。"
    zh_trad: "向對手發射光彈。\n招式的屬性會隨著自己\n攜帶的卡帶不同而改變。"
    es_latam: "Ataca al objetivo con un gran láser. El tipo del ataque\nlo determina el cartucho que porta el usuario."
