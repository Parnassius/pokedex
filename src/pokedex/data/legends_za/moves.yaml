explosion:
  names:
    jp_kanji: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
    zh_simp: 大爆炸
    zh_trad: 大爆炸
    es_latam: Explosión
  descriptions:
    jp_kanji: "大きな爆発で\n周りにいるものを攻撃する。\n使ったあと　ひんしになる。"
    en: "The user emits tremendous explosive force, causing\ndamage across a wide area. The user faints after using\nthis move."
    fr: "Le lanceur déclenche une grande explosion qui frappe\ntout ce qui se trouve alentour, puis tombe K.O."
    it: "Il Pokémon attacca tutto intorno causando\nuna grande esplosione, ma poi va KO."
    de: "Der Anwender greift mit einer großen Explosion alles im\nUmkreis an und wird danach kampfunfähig."
    es: "El atacante ocasiona una grandísima explosión y causa\ndaño a su alrededor. El usuario se debilita de inmediato."
    ko: "큰 폭발을 일으켜서\n주위에 있는 포켓몬을 공격한다.\n사용한 다음 기절하게 된다."
    zh_simp: "引发大爆炸，\n攻击周围所有的对象。\n使用后自己会陷入昏厥。"
    zh_trad: "引起大爆炸，\n攻擊周圍所有的對象。\n使用後自己會陷入瀕死。"
    es_latam: "El atacante causa una grandísima explosión y provoca\ndaño a su alrededor. El usuario se debilita de inmediato."
extrasensory:
  names:
