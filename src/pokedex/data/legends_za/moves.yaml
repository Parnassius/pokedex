    jp_kanji: "白い霧で周囲をおおう。\n霧の中にいるポケモンは\n相手に能力を下げられない。"
    en: "The user cloaks the area in a white mist. Pokémon within\nthe mist cannot have their stats lowered by opponents."
    fr: "Le lanceur répand une brume blanche autour de lui.\nLes adversaires ne peuvent pas baisser les stats\ndes Pokémon qui se trouvent à l’intérieur."
    it: "Il Pokémon crea della nebbia attorno a sé.\nRimanendo al suo interno, i Pokémon non subiscono\nle riduzioni di statistiche causate da altri."
    de: "Der Anwender hüllt seine Umgebung in einen weißen\nNebel. Solange ein Pokémon sich darin befindet, können\nseine Statuswerte nicht durch Gegner gesenkt werden."
    es: "Genera a su alrededor una niebla blanquecina que impide\nque se reduzcan las características de los Pokémon que\npermanezcan dentro."
    ko: "하얀 안개로 주위를 뒤덮는다.\n안개 속에 있는 포켓몬은\n상대에 의해 능력이 떨어지지 않는다."
    zh_simp: "用白雾覆盖四周。\n在雾中的宝可梦不会让\n对手降低自己的能力。"
    zh_trad: "用白霧覆蓋周圍。\n身處霧中的寶可夢不會\n讓對手降低自己的能力。"
