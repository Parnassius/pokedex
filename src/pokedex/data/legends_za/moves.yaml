    zh_trad: "用堅硬的翅膀撞擊進行攻擊。\n有時還會提高自己的防禦。"
    es_latam: "Golpea al objetivo con unas alas robustas y macizas.\nPuede aumentar la Defensa del usuario."
sticky_web:
