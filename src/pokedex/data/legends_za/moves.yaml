    jp_kanji: "かわいいなきごえを聞かせて油断させ\n少しのあいだ相手の攻撃を下げる。"
    en: "The user growls endearingly to make targets less wary,\nwhich lowers their Attack stats for a short time."
    fr: "Le lanceur pousse un petit rugissement pour tromper\nla vigilance de la cible et baisser son Attaque\npendant un court instant."
    it: "Il Pokémon fa abbassare la guardia al bersaglio con un\ntenero ruggito e ne riduce l’Attacco per un po’ di tempo."
    de: "Der Anwender heult herzzerreißend, um das Ziel\nnachlässig werden zu lassen. Der Angriff getroffener\nGegner wird für kurze Zeit gesenkt."
