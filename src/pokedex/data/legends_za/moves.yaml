    jp_kanji: ヘドロばくだん
    en: Sludge Bomb
    fr: Bombe Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
    zh_simp: 污泥炸弹
    zh_trad: 污泥炸彈
    es_latam: Bomba Lodo
  descriptions:
    jp_kanji: "汚いヘドロを投げつけて攻撃する。\n相手を毒状態にすることもある。"
    en: "The user attacks by hurling unsanitary sludge at targets.\nThis may also leave targets poisoned."
    fr: "Le lanceur projette des détritus toxiques sur la cible.\nPeut aussi l’empoisonner."
    it: "Il Pokémon attacca lanciando fango malsano\nsul bersaglio. Può anche avvelenarlo."
    de: "Der Anwender greift an, indem er toxischen Schlamm\nschleudert. Getroffene Gegner werden eventuell vergiftet."
    es: "Ataca arrojando residuos al objetivo. Puede llegar\na envenenar."
    ko: "더러운 오물을 내던져서 공격한다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "投掷污泥进行攻击。\n有时也会让对手陷入中毒状态。"
    zh_trad: "投擲污泥進行攻擊。\n有時還會讓對手陷入中毒狀態。"
    es_latam: "Ataca arrojando residuos al objetivo. Puede causar\nenvenenamiento."
