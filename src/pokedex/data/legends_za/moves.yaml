    de: Milchgetränk
    es: Batido
    ko: 우유마시기
    zh_simp: 喝牛奶
    zh_trad: 喝牛奶
    es_latam: Licuado
mimic:
  names:
    jp_kanji: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
    zh_simp: 模仿
    zh_trad: 模仿
    es_latam: Mímica
