    de: Kehrschelle
    es: Plumerazo
    ko: 스위프뺨치기
    zh_simp: 扫尾拍打
    zh_trad: 掃尾拍打
    es_latam: Golpe de Cola
tail_whip:
  names:
    jp_kanji: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Agitacola
    ko: 꼬리흔들기
    zh_simp: 摇尾巴
    zh_trad: 搖尾巴
    es_latam: Látigo de Cola
  descriptions:
    jp_kanji: "しっぽを左右にかわいく振って油断を誘う。\n少しのあいだ相手の防御を下げる。"
    en: "The user wags its tail cutely to make targets less wary,\nwhich lowers their Defense stats for a short time."
    fr: "Le lanceur remue son adorable queue pour tromper\nla vigilance de la cible et baisser sa Défense\npendant un court instant."
    it: "Il Pokémon agita la coda per distrarre il bersaglio,\nriducendone la Difesa per un po’ di tempo."
    de: "Der Anwender wedelt niedlich mit dem Schweif, um das\nZiel nachlässig werden zu lassen. Die Verteidigung\ngetroffener Gegner wird für kurze Zeit gesenkt."
    es: "Agita la cola para despistar al objetivo y reducir\nsu Defensa durante un breve período de tiempo."
    ko: "꼬리를 좌우로 귀엽게 흔들어 방심을 유도한다.\n잠시 동안 상대의 방어를 떨어뜨린다."
    zh_simp: "可爱地左右摇晃尾巴，\n诱使对手疏忽大意。\n会在一小段时间内降低对手的防御。"
    zh_trad: "可愛地左右搖晃尾巴，\n誘使對手疏忽大意。\n在一小段時間內降低對手的防禦。"
    es_latam: "Agita la cola para despistar al objetivo y reducir\nsu Defensa durante un breve periodo."
tailwind:
  names:
    jp_kanji: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
    zh_simp: 顺风
    zh_trad: 順風
    es_latam: Viento Afín
take_down:
  names:
    jp_kanji: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
    zh_simp: 猛撞
    zh_trad: 猛撞
    es_latam: Derribo
  descriptions:
    jp_kanji: "すごい勢いで相手にぶつかって攻撃する。\n自分もダメージを受ける。"
    en: "The user attacks by slamming into targets in an all-out\ncharge. The user will also take some damage."
    fr: Une charge violente qui blesse aussi le lanceur.
    it: "Il Pokémon attacca lanciandosi contro il bersaglio\ncon forza straordinaria, ma subisce dei danni."
    de: "Der Anwender rammt das Ziel mit großer Wucht.\nDabei erleidet er selbst Schaden."
    es: Carga desmedida que también hiere al usuario.
    ko: "굉장한 기세로 상대에게 부딪쳐 공격한다.\n자신도 데미지를 입는다."
    zh_simp: "以惊人的气势\n撞向对手进行攻击。\n自己也会受到伤害。"
    zh_trad: "以驚人的氣勢撞向對手進行攻擊。\n自己也會受到傷害。"
    es_latam: Ataque desmedido que también hiere al usuario.
