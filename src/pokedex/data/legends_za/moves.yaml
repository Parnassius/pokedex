    en: "The user attacks by launching countless toxic barbs,\nwhich may also poison targets. This move’s power is\ndoubled if a target is already poisoned."
    fr: "D’innombrables pointes toxiques frappent la cible,\nce qui peut aussi l’empoisonner. La puissance est\ndoublée si celle-ci est déjà empoisonnée."
    it: "Il bersaglio viene colpito da una miriade di spine tossiche\nche possono anche avvelenarlo. Se il bersaglio è già\navvelenato, la potenza della mossa raddoppia."
    de: "Der Anwender greift mit unzähligen Giftstacheln an,\ndie getroffene Gegner eventuell vergiften. Bei vergifteten\nZielen verdoppelt sich die Stärke der Attacke."
    es: "Dispara un sinfín de púas tóxicas que pueden envenenar\nal objetivo. La potencia del movimiento se duplica si este\nya está envenenado."
    ko: "무수히 많은 독침으로 공격한다.\n상대를 독 상태로 만들 때가 있다.\n상대가 독 상태인 경우 위력이 2배가 된다."
    zh_simp: "用无数的毒针进行攻击。\n有时还会让对手陷入中毒状态。\n攻击处于中毒状态的对手时，威力会变成２倍。"
    zh_trad: "用無數的毒針進行攻擊。\n有時還會讓對手陷入中毒狀態。\n攻擊處於中毒狀態的對手時，威力會變成２倍。"
    es_latam: "Dispara un sinfín de púas tóxicas que pueden envenenar\nal objetivo. La potencia del movimiento se duplica si este\nya está envenenado."
