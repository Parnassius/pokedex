    de: Urgesang
    es: Canto Arcaico
    ko: 옛노래
    zh_simp: 古老之歌
    zh_trad: 古老之歌
    es_latam: Canto Arcaico
  descriptions:
    jp_kanji: "魅惑のステップで敵の攻撃をかわしつつ\nいにしえのうたで相手の心にうったえて攻撃。\nねむけ状態にすることがある。"
    en: "The user attacks with an ancient song that strikes the\nhearts of its targets as it charmingly dances out of the\nway of attacks. This may also make targets drowsy."
    fr: "Le lanceur attaque la cible en lui chantant une chanson\nantique tout en dansant pour esquiver ses coups.\nIl peut aussi plonger la cible dans un état de somnolence."
    it: "Il Pokémon evita gli attacchi con ammalianti passi di\ndanza e attacca il bersaglio intonando un’antica melodia\nche ne colpisce lo spirito. Può anche causare sonnolenza."
    de: "Der Anwender weicht gegnerischen Angriffen mit einem\nbezaubernden Tanz aus und greift das Ziel mit Urgesang\nan, der getroffene Gegner eventuell schläfrig macht."
    es: "Ataca conmoviendo al objetivo con un antiguo canto\nmientras esquiva sus ataques con una encantadora\ndanza. Puede inducir somnolencia en el objetivo."
    ko: "매혹적인 스텝으로 상대의 공격을 피하면서\n심금을 울리는 옛 노래로 공격한다.\n졸음 상태로 만들 때가 있다."
    zh_simp: "以魅惑的舞步躲避敌人的攻击，\n用古老之歌打动对手的内心进行攻击。\n有时会让对手陷入瞌睡状态。"
    zh_trad: "一邊用魅惑的舞步閃避敵人的攻擊，\n一邊用古老之歌打動對手的心進行攻擊。\n有時會讓對手陷入瞌睡狀態。"
    es_latam: "Ataca conmoviendo al objetivo con un antiguo canto\nmientras esquiva sus ataques con una encantadora\ndanza. Puede inducir somnolencia en el objetivo."
