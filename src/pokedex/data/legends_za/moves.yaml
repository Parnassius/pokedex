    zh_simp: 骨头回力镖
    zh_trad: 骨頭回力鏢
    es_latam: Huesomerang
  descriptions:
    jp_kanji: "手に持ったホネを\n２回連続で相手に投げつけ\nダメージを与える。"
    en: "The user attacks by throwing the bone it holds two times,\none after the other."
    fr: "Le lanceur projette son os deux fois d’affilée sur la cible\npour infliger des dégâts."
    it: "Il Pokémon infligge danni lanciando contro il bersaglio\nl’osso che ha con sé due volte in rapida successione."
    de: "Der Anwender wirft zweimal hintereinander den\nKnochen in seiner Hand auf das Ziel und fügt getroffenen\nGegnern so Schaden zu."
    es: "Lanza el hueso que lleva a modo de bumerán contra\nel objetivo y le inflige daño dos veces seguidas."
    ko: "손에 들고 있는 뼈를\n2회 연속으로 날려서 데미지를 준다."
    zh_simp: "用手中的骨头\n连续２次投掷对手，\n给予伤害。"
    zh_trad: "連續向對手投擲２次\n手中的骨頭給予傷害。"
    es_latam: "Le lanza al objetivo el hueso que lleva a modo de\nbúmeran y le causa daño dos veces seguidas."
boomburst:
  names:
    jp_kanji: ばくおんぱ
    en: Boomburst
    fr: Bang Sonique
    it: Ondaboato
    de: Überschallknall
    es: Estruendo
    ko: 폭음파
    zh_simp: 爆音波
    zh_trad: 爆音波
    es_latam: Estruendo
  descriptions:
    jp_kanji: "すさまじい爆音の\n破壊力によって\n周りにいるものを攻撃する。"
    en: "The user attacks by unleashing the destructive power of a\nterrible explosive sound across a wide area."
    fr: "Le lanceur attaque tout ce qui se trouve alentour grâce\nà une onde sonore assourdissante qui détruit tout\nsur son passage."
    it: "Il Pokémon attacca tutto intorno con la forza\ndi un boato distruttivo."
    de: "Der Anwender greift mit einem gewaltigen Knall alles im\nUmkreis an."
    es: "Ataca con una potentísima onda sonora que causa daño\na su alrededor."
    ko: "무시무시한 폭음의 파괴력으로\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "通过震耳欲聋的爆炸声\n产生的破坏力，\n攻击周围所有的对象。"
    zh_trad: "利用震耳欲聾的爆炸聲\n所產生的破壞力，\n攻擊周圍所有的對象。"
    es_latam: "Ataca con una poderosísima onda sonora que causa\ndaño a su alrededor."
bounce:
  names:
    jp_kanji: とびはねる
    en: Bounce
    fr: Rebond
    it: Rimbalzo
    de: Sprungfeder
    es: Bote
    ko: 뛰어오르기
    zh_simp: 弹跳
    zh_trad: 彈跳
    es_latam: Rebote
  descriptions:
    jp_kanji: "空高く飛び跳ねて姿を消し\n少ししてから相手をめがけて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks by bouncing up and disappearing into\nthe sky for a short time, then dropping down onto\ntargets. This may also leave targets paralyzed."
    fr: "Le lanceur bondit très haut et disparaît dans le ciel.\nAprès un court instant, il attaque en plongeant sur\nla cible. Peut aussi la paralyser."
    it: "Il Pokémon balza in alto per sottrarsi alla vista\ne attaccare il bersaglio poco dopo. Può anche\nparalizzare il bersaglio."
    de: "Der Anwender springt hoch in die Luft und verschwindet.\nNach kurzer Zeit greift er das Ziel an. Getroffene Gegner\nwerden eventuell paralysiert."
    es: "Bota muy alto hasta quedar fuera de vista y, tras un\nbreve período de tiempo, arremete contra el objetivo.\nPuede paralizar."
    ko: "하늘 높이 뛰어올라 모습을 숨긴 뒤\n잠시 후 상대를 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "弹跳到高高的空中隐藏踪影，\n片刻之后瞄准对手进行攻击。\n有时也会让对手陷入麻痹状态。"
    zh_trad: "彈跳到高空中銷聲匿跡，\n在片刻後朝向對手發動攻擊。\n有時還會讓對手陷入麻痺狀態。"
    es_latam: "Rebota muy alto hasta quedar fuera de vista y, luego de\nun breve momento, arremete contra el objetivo.\nPuede paralizar."
bouncy_bubble:
  names:
    jp_kanji: いきいきバブル
