horn_leech:
  names:
    jp_kanji: ウッドホーン
    en: Horn Leech
    fr: Encornebois
    it: Legnicorno
    de: Holzgeweih
    es: Asta Drenaje
    ko: 우드혼
    zh_simp: 木角
    zh_trad: 木角
    es_latam: Drenacuerno
  descriptions:
    jp_kanji: "つのを突き刺して養分を吸い取る。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by using its horns to drain targets of\ntheir energy. The user’s HP will be restored by a portion\nof the damage dealt."
    fr: "Un coup de cornes qui draine l’énergie de la cible\net convertit une partie des dégâts infligés en PV\npour le lanceur."
    it: "Il Pokémon infilza il bersaglio con le corna e assorbe\nuna quantità di PS pari a una parte del danno inflitto."
    de: "Der Anwender greift mit einem Astgeweih an, zapft\ngetroffenen Gegnern Energie ab und regeneriert einen\nTeil des dabei zugefügten Schadens als KP."
    es: "Ensarta al objetivo con su cornamenta y absorbe su\nenergía. El usuario recupera algunos PS según el daño\nque produzca."
    ko: "뿔을 꿰찔러서 양분을 흡수한다.\n상대에게 준 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "将角刺入，吸取养分。\n可以回复相当于给予\n对手的部分伤害的ＨＰ。"
    zh_trad: "將角刺進並吸取養分。\n可以回復給予對手\n傷害的一部分ＨＰ。"
    es_latam: "Ensarta al objetivo con sus cuernos y absorbe su\nenergía. El usuario recupera algunos PS según el\ndaño que produzca."
