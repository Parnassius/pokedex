    jp_kanji: "激しい吹雪を\n吹きつけて攻撃する。\n相手をこおり状態にすることもある。"
    en: "The user attacks by blasting targets with a howling\nblizzard. This may also leave targets frozen."
    fr: "Une violente tempête de neige s’abat sur la cible.\nPeut aussi la geler."
    it: "Il Pokémon attacca il bersaglio con una tremenda\ntempesta di ghiaccio che può anche congelarlo."
    de: "Der Anwender greift mit einem heftigen Schneesturm an,\nder getroffene Gegner eventuell einfriert."
    es: "Ataca con una tormenta de hielo que puede llegar\na congelar."
    ko: "세찬 눈보라를 내뿜어 공격한다.\n상대를 얼음 상태로 만들 때가 있다."
    zh_simp: "吹起猛烈的暴风雪进行攻击。\n有时也会让对手陷入冰冻状态。"
    zh_trad: "吹起猛烈的暴風雪進行攻擊。\n有時還會讓對手陷入冰凍狀態。"
    es_latam: "Ataca con una tormenta de hielo que puede congelar\nal objetivo."
