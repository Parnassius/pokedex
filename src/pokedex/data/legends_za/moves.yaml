    fr: "Le lanceur se jette sur la cible de toutes ses forces\npour lui infliger des dégâts. Baisse l’Attaque de la cible\npendant un court instant."
    it: "Il Pokémon attacca lanciandosi con tutte le sue forze\nsul bersaglio e ne riduce l’Attacco per un po’ di tempo."
    de: "Der Anwender stürzt sich mit ganzer Kraft auf das Ziel.\nDer Angriff getroffener Gegner wird für kurze Zeit\ngesenkt."
    es: "Ataca al objetivo abalanzándose sobre él con todas sus\nfuerzas y reduce su Ataque durante un breve período de\ntiempo."
    ko: "전력으로 상대에게 덤벼들며 공격한다.\n잠시 동안 상대의 공격을 떨어뜨린다."
