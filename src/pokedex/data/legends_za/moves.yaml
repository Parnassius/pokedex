    en: "The user prevents incoming attacks from landing while\nalso dealing damage to any attackers that make direct\ncontact."
    fr: "Le lanceur bloque les dégâts et diminue les PV de tout\nassaillant qui entre en contact avec lui."
    it: "Il Pokémon si protegge dagli attacchi, riducendo inoltre\ni PS di chi entra in contatto con lui a causa di un attacco."
    de: "Der Anwender schützt sich vor Angriffen. Berührt ihn\nwährenddessen ein Gegner, erleidet dieser Schaden."
    es: "Protege al usuario de ataques e inflige daño a quien se\nlos lance si entra en contacto con él."
    ko: "상대의 공격을 막음과 동시에\n접촉한 상대의 체력을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n削减接触到自己的对手的体力。"
    zh_trad: "防禦來自對手的攻擊，\n同時削減接觸到自己的對手的ＨＰ。"
