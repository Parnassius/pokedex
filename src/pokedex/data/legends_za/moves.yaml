    zh_simp: 紧咬不放
    zh_trad: 緊咬不放
    es_latam: Presa Maxilar
jet_punch:
  names:
    jp_kanji: ジェットパンチ
    en: Jet Punch
    fr: Poing Sonique
    it: Pugnojet
    de: Düsenhieb
    es: Puño Jet
    ko: 제트펀치
    zh_simp: 喷射拳
    zh_trad: 噴射拳
    es_latam: Puño Jet
  descriptions:
    jp_kanji: "とんでもなく辛いエキスを出す。\nしばらくのあいだ相手の攻撃が上がり\n防御が下がる。"
    en: "The user emits an incredibly spicy extract, which boosts\ntargets’ Attack stats but also lowers their Defense stats\nfor a while."
    fr: "Le lanceur relâche un concentré extrêmement pimenté\nsur la cible. Pendant un certain temps, l’Attaque de\nla cible augmente, mais sa Défense baisse."
    it: "Il Pokémon secerne un’essenza straordinariamente\npiccante. Per un certo tempo aumenta l’Attacco del\nbersaglio ma ne diminuisce la Difesa."
    de: "Der Anwender setzt eine unglaublich scharfe Essenz frei,\ndie für einige Zeit den Angriff getroffener Gegner erhöht,\naber ihre Verteidigung senkt."
    es: "Libera un extracto extraordinariamente picante que,\ndurante un tiempo, aumenta el Ataque del objetivo,\npero también reduce su Defensa."
    ko: "어마어마하게 매운 엑기스를 발사한다.\n한동안 상대의 공격이 오르고 방어는 떨어진다."
    zh_simp: "放出极为辛辣的精华。\n在一段时间内对手的攻击会提高，\n防御会降低。"
    zh_trad: "放出相當強勁的辣味精華。\n在一段時間內對手的攻擊會提高，\n防禦會降低。"
    es_latam: "Libera un extracto extraordinariamente picante que,\ndurante un tiempo, aumenta el Ataque del objetivo,\npero también reduce su Defensa."
