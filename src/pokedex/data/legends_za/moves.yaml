    de: Superschall
    es: Supersónico
    ko: 초음파
    zh_simp: 超音波
    zh_trad: 超音波
    es_latam: Supersónico
  descriptions:
    jp_kanji: "特殊な音波を体から発して\n相手を混乱させる。"
    en: "The user generates peculiar sound waves that will leave\ntargets confused."
    fr: "Le lanceur produit d’étranges ondes sonores\nqui rendent la cible confuse."
    it: "Il Pokémon genera dal proprio corpo strane onde\nacustiche che confondono il bersaglio."
    de: "Der Anwender stößt aus seinem Körper spezielle\nSchallwellen aus, die getroffene Gegner verwirren."
    es: "El cuerpo del usuario emite unas ondas sónicas raras que\nconfunden al objetivo."
    ko: "특수한 음파를 몸에서 발산하여\n상대를 혼란시킨다."
    zh_simp: "从身体发出特殊的音波，\n从而使对手混乱。"
    zh_trad: "從身上發出特殊的音波，\n讓對手陷入混亂狀態。"
    es_latam: "El cuerpo del usuario emite unas ondas sónicas extrañas\nque confunden al objetivo."
surf:
  names:
    jp_kanji: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
    zh_simp: 冲浪
    zh_trad: 衝浪
    es_latam: Surf
  descriptions:
    jp_kanji: "大きな波で\n周りにいるものを攻撃する。"
    en: "The user attacks by swamping a wide area with a giant\nwave."
    fr: "Une énorme vague inflige des dégâts à tout ce qui\nse trouve alentour."
    it: Il Pokémon attacca tutto intorno con un’onda enorme.
    de: "Der Anwender greift mit einer gewaltigen Welle alles\nim Umkreis an."
    es: Una ola gigante que causa daño a su alrededor.
    ko: "큰 파도로\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击周围所有的对象。"
    zh_trad: "使用大浪\n攻擊周圍所有的對象。"
    es_latam: Una ola gigante que causa daño a su alrededor.
