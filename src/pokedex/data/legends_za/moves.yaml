    en: Surging Strikes
    fr: Torrent de Coups
    it: Idroraffica
    de: Trefferschwall
    es: Azote Torrencial
    ko: 수류연타
    zh_simp: 水流连打
    zh_trad: 水流連打
    es_latam: Golpe Torrencial
swagger:
  names:
    jp_kanji: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Fanfarronear
    ko: 뽐내기
    zh_simp: 虚张声势
    zh_trad: 虛張聲勢
    es_latam: Fanfarronear
  descriptions:
    jp_kanji: "相手を怒らせて混乱させる。\n怒りで相手の攻撃は\nしばらくのあいだ上がってしまう。"
    en: "The user enrages targets, leaving them confused but\nboosting their Attack stats for a while."
    fr: "Le lanceur fait enrager sa cible et la plonge dans\nla confusion, mais cela augmente l’Attaque de\nla cible pendant un certain temps."
    it: "Il Pokémon provoca il bersaglio e lo confonde, facendo\naumentare il suo Attacco per un certo tempo."
    de: "Der Anwender bringt das Ziel in Rage. Getroffene Gegner\nwerden verwirrt und vor lauter Zorn wird ihr Angriff\nfür einige Zeit erhöht."
    es: "Hace enfurecer y confunde al objetivo, pero también\naumenta su Ataque durante un tiempo."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 인해 상대의 공격이\n한동안 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会在一段时间内提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而在一段時間內提高。"
    es_latam: "Hace enfurecer y confunde al objetivo, pero también\naumenta su Ataque durante un tiempo."
