    ko: 물대포
    zh_simp: 水枪
    zh_trad: 水槍
    es_latam: Chorro de Agua
  descriptions:
    jp_kanji: "水を勢いよく\n相手に発射して攻撃する。"
    en: "The user attacks by blasting targets with a forceful shot\nof water."
    fr: Le lanceur projette de l’eau avec force sur la cible.
    it: "Il Pokémon attacca il bersaglio con un potente getto\nd’acqua."
    de: Der Anwender feuert kräftig Wasser auf das Ziel.
    es: Ataca disparando agua con gran potencia.
    ko: "물을 기세 좋게\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n水流进行攻击。"
    zh_trad: "向對手噴射\n強烈水流進行攻擊。"
    es_latam: Ataca disparando agua con gran potencia.
water_pledge:
  names:
