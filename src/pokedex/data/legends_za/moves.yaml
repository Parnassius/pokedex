    fr: Lumino-Impact
    it: Fotocollisione
    de: Lichteinschlag
    es: Fotocolisión
    ko: 루미나콜리전
    zh_simp: 琉光冲激
    zh_trad: 琉光衝激
    es_latam: Fotocolisión
  descriptions:
    jp_kanji: "いなせな身のこなしで攻撃。\n口の中にシャリタツがいると\nそのすがたによって能力が上がる。"
    en: "The user attacks with roguish poise. If the user has a\nTatsugiri in its mouth, this move boosts one of the user’s\nstats based on the Tatsugiri’s form."
    fr: "Le lanceur attaque avec adresse et élégance.\nS’il a un Nigirigon dans la gueule, une de ses stats\naugmente en fonction de la forme de celui-ci."
    it: "Il Pokémon attacca con deliziose movenze. Se ha\nin bocca un Tatsugiri, una sua statistica aumenta\nin base alla forma di quest’ultimo."
    de: "Der Anwender greift mit geübten Bewegungen an.\nTrägt er ein Nigiragi im Maul, erhöht sich je nach\ndessen Form ein Statuswert des Anwenders."
    es: "Ataca con porte gallardo. Si lleva un Tatsugiri en la boca,\naumenta una de sus características en función de\nla forma de este último."
    ko: "멋들어진 몸놀림으로 공격한다.\n입속에 싸리용이 있으면\n싸리용의 모습에 따라 능력이 올라간다."
    zh_simp: "以潇洒的身手进行攻击。\n若口中有米立龙，\n会按其样子提高能力。"
    zh_trad: "以瀟灑的身段進行攻擊。\n若口中有米立龍，\n會依米立龍的姿勢而提高不同能力。"
    es_latam: "Ataca con aplomo y elegancia. Si lleva un Tatsugiri en la\nboca, aumenta una de sus características dependiendo\nde la forma de este último."
