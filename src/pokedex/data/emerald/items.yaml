acro_bike:
  names:
    jp_kana: ダートじてんしゃ
    en: ACRO BIKE
    fr: VELO CROSS
    it: BICI CROSS
    de: KUNSTRAD
    es: BICI ACROB.
  descriptions:
    jp_kana: "ジャンプや　ウイリーの\nアクションが　できる\nおりたたみの　じてんしゃ"
    en: "A folding bicycle\ncapable of jumps\nand wheelies."
    fr: "Un vélo pliable\npour faire des\nsauts."
    it: "Bici pieghevole:\npermette salti\ne impennate."
    de: "Klapprad ermög-\nlicht Sprünge und\nWheelies."
    es: "Bici plegable ideal\npara saltar y hacer\ncaballitos y giros."
aguav_berry:
  names:
    jp_kana: バンジのみ
    en: AGUAV BERRY
    fr: BAIE GOWAV
    it: BACCAGUAVA
    de: GAUVEBEERE
    es: BAYA GUAYA
  descriptions:
    jp_kana: "もたせると　たいりょくを\nかいふく　できるが\nこんらんする　ことがある"
    en: "A hold item that\nrestores HP but\nmay confuse."
    fr: "Objet tenu qui res-\ntaure les PV. Peut\nrendre confus."
    it: "Strumento tenuto:\nrestituisce PS, ma\npuò confondere."
    de: "Item (Tragen) füllt\nKP auf, bewirkt\nevtl. Verwirrung."
    es: "Al llevarla, te\nrestaura PS, pero\npuede confundirte."
amulet_coin:
  names:
    jp_kana: おまもりこばん
    en: AMULET COIN
    fr: PIECE RUNE
    it: MONETAMULETO
    de: MÜNZAMULETT
    es: MON. AMULETO
  descriptions:
    jp_kana: "もたせた　ポケモンが\nせんとうに　でると\nおかねが　２ばいもらえる"
    en: "Doubles money in\nbattle if the\nholder takes part."
    fr: "Double l’argent ga-\ngné si le porteur\nse bat aussi."
    it: "Doppi guadagni in\nlotta se chi lo\ntiene vi partecipa."
    de: "Doppelter Geldbe-\ntrag, wenn Träger \nam Kampf teilnimmt."
    es: "Si el que lo lleva\nlucha en combate,\nduplica el dinero."
antidote:
  names:
    jp_kana: どくけし
    en: ANTIDOTE
    fr: ANTIDOTE
    it: ANTIDOTO
    de: GEGENGIFT
    es: ANTÍDOTO
  descriptions:
    jp_kana: "どく　じょうたいを\nかいふくする"
    en: "Heals a poisoned\nPOKéMON."
    fr: "Soigne les POKéMON\nempoisonnés."
    it: "Cura un POKéMON\ndall’avvelenamento."
    de: "Heilt Vergiftungen\nbei POKéMON."
    es: "Cura a un POKéMON\nenvenenado."
apicot_berry:
  names:
    jp_kana: ズアのみ
    en: APICOT BERRY
    fr: BAIE ABRIKO
    it: BACCACOCCA
    de: APIKOBEERE
    es: BAYA ARICOC
  descriptions:
    jp_kana: "もたせると　ピンチのとき\nとくぼうが　あがる"
    en: "A hold item that\nraises SP. DEF in\na pinch."
    fr: "Objet tenu qui\nmonte la DEF. SPE.\nsi nécessaire."
    it: "Strumento tenuto:\nin difficoltà au-\nmenta la DIF. SP."
    de: "Item (Tragen) hebt\nSP. VERT.-Wert\nin einer Notlage."
    es: "Al llevarla, subirá\nla DEF. ESP. en un\nmomento de apuro."
aspear_berry:
  names:
    jp_kana: ナナシのみ
    en: ASPEAR BERRY
    fr: BAIE WILLIA
    it: BACCAPERINA
    de: WILBIRBEERE
    es: BAYA PERASI
  descriptions:
    jp_kana: "もたせると　じぶんで\nこおり　じょうたいを\nかいふくする"
    en: "A hold item that\ndefrosts POKéMON\nin battle."
    fr: "Objet tenu qui dé-\ncongèle les PKMN\npendant un combat."
    it: "Strumento tenuto:\nscongela un POKé-\nMON nella lotta."
    de: "Item (Tragen) be-\nwirkt Selbstheilung\nbei Frost."
    es: "Al llevarla, \nte descongela\nen el combate."
auroraticket:
  names:
    jp_kana: オーロラチケット
    en: AURORATICKET
    fr: TICKETAURORA
    it: BIGL. AURORA
    de: AURORATICKET
    es: ORI-TICKET
  descriptions:
    jp_kana: "たんじょうのしまへ\nいくために　ひつような\nふねの　チケット"
    en: "A ticket required\nto board the ship\nto BIRTH ISLAND."
    fr: "Le ticket requis\npour aller sur\nl’ILE AURORE."
    it: "Biglietto per la\nnave che porta\nall’ISOLA MATERNA."
    de: "Fahrkarte für das\nSchiff zur\nENTSTEHUNGSINSEL."
    es: "Ticket necesario\npara navegar hasta\nISLA ORIGEN."
awakening:
  names:
    jp_kana: ねむけざまし
    en: AWAKENING
    fr: REVEIL
    it: SVEGLIA
    de: AUFWECKER
    es: DESPERTAR
  descriptions:
    jp_kana: "ねむり　じょうたいを\nかいふくする"
    en: "Awakens a sleeping\nPOKéMON."
    fr: "Réveille les\nPOKéMON endormis."
    it: "Sveglia un POKéMON\naddormentato."
    de: "Weckt schlafendes\nPOKéMON auf."
    es: "Despierta a un\nPOKéMON dormido."
basement_key:new_mauville:
  names:
    jp_kana: ちかのカギ
    en: BASEMENT KEY
    fr: CLE SOUS-SOL
    it: CHIAVE SOTT.
    de: KELLERÖFFNER
    es: LL. SÓTANO
  descriptions:
    jp_kana: "キンセツの　ちかにある\nニューキンセツに\nはいる　ための　カギ"
    en: "The key for NEW\nMAUVILLE beneath\nMAUVILLE CITY."
    fr: "La clé de NEW\nLAVANDIA, située\nsous LAVANDIA."
    it: "Chiave per \nCICLANOVA, sotto\nCICLAMIPOLI."
    de: "Schlüssel für NEU\nMALVENFROH unter\nMALVENFROH CITY."
    es: "Llave de MALVALA-\nNOVA (al sur de\nCIUDAD MALVALONA)."
bead_mail:
  names:
    jp_kana: トレジャーメール
    en: BEAD MAIL
    fr: LETTRE BULLE
    it: MESS. PERLE
    de: PERLENBRIEF
    es: CARTA IMAGEN
  descriptions:
    jp_kana: "もたせた　ポケモンの\nにがおえがでる　びんせん"
    en: "MAIL featuring a\nsketch of the\nholding POKéMON."
    fr: "Du papier avec un\ndessin du POKéMON\nqui le tient."
    it: "MESSAGGIO che\nraffigura il POKé-\nMON che lo tiene."
    de: "BRIEF mit Abbildung\ndes POKéMON, das\nihn trägt."
    es: "Carta con la imagen\ndel POKéMON que la\nlleva."
belue_berry:
  names:
    jp_kana: ベリブのみ
    en: BELUE BERRY
    fr: BAIE MYRTE
    it: BACCARTILLO
    de: MYRTILBEERE
    es: BAYA ANDANO
  descriptions:
    jp_kana: "ポロックの　ざいりょう\nつちのなかに　うめると\nベリブが　そだつ"
    en: "POKéBLOCK ingredient.\nPlant in loamy soil\nto grow BELUE."
    fr: "Ingrédient POKéBLOC.\nPlantez-la pour\navoir un MYRTE."
    it: "Ingrediente per le\nPOKéMELLE. Piantala in\nun terreno fertile."
    de: "Säe POKéRIEGEL-Zutat\nin Lehmboden, damit\nMYRTIL wächst."
    es: "En suelo fértil da\nANDANO. Sirve para\nhacer POKéCUBOS."
berry_juice:
  names:
    jp_kana: きのみジュース
    en: BERRY JUICE
    fr: JUS DE BAIE
    it: SUCCODIBACCA
    de: BEERENSAFT
    es: ZUMO DE BAYA
  descriptions:
    jp_kana: "きのみ　１００パーセント\nポケモンの　たいりょくを\n２０　かいふくする"
    en: "A 100% pure juice\nthat restores HP\nby 20 points."
    fr: "Une boisson 100%\npur jus qui\nrestaure 20 PV."
    it: "Puro succo di\nfrutta che\nrestituisce 20 PS."
    de: "Reiner Fruchtsaft,\nder die KP um\n20 Punkte auffüllt."
    es: "Zumo 100% natural\nque restaura 20 PS."
berry_pouch:
  names:
    jp_kana: きのみぶくろ
    en: BERRY POUCH
    fr: SAC A BAIES
    it: PORTABACCHE
    de: BEERENTÜTE
    es: SACO BAYAS
  descriptions:
    jp_kana: "きのみを　ほぞんする\nべんりな　いれもの"
    en: "A convenient\ncontainer that\nholds BERRIES."
    fr: "Un petit sac pour\ntransporter les\nBAIES."
    it: "Contenitore utile\nper le BACCHE."
    de: "Tüte, in der\nBEEREn aufbewahrt\nwerden."
    es: "Útil saquito que\nsirve para llevar\nBAYAS."
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    en: BIG MUSHROOM
    fr: GROS CHAMPI
    it: GRANDE FUNGO
    de: RIESENPILZ
    es: SETA GRANDE
  descriptions:
    jp_kana: "めずらしい　キノコ\nたかく　うれる"
    en: "A rare mushroom\nthat would sell at a\nhigh price."
    fr: "Un champignon rare.\nPeut être vendu\nà bon prix."
    it: "Un fungo raro che\nsi vende a caro\nprezzo."
    de: "Ein seltener\nPilz von \nhohem Wert."
    es: "Seta poco común.\nSe vende\na alto precio."
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    en: BIG PEARL
    fr: GRANDE PERLE
    it: GRANDE PERLA
    de: RIESENPERLE
    es: PERLA GRANDE
  descriptions:
    jp_kana: "とても　きれいな\nおおつぶの　しんじゅ\nたかく　うれる"
    en: "A lovely large pearl\nthat would sell at a\nhigh price."
    fr: "Une perle magni-\nfique. Peut être\nvendue à bon prix."
    it: "Una perla bella e\ngrande che si vende\na caro prezzo."
    de: "Schöne, große Per-\nle, die einen hohen\nPreis erzielt."
    es: "Perla grande y\nbella que se vende\na alto precio."
bike:
  names:
    jp_kana: じてんしゃ
    en: BICYCLE
    fr: BICYCLETTE
    it: BICICLETTA
    de: FAHRRAD
    es: BICICLETA
  descriptions:
    jp_kana: "おりたたみの　じてんしゃ\nランニングシューズより\nはやく　はしる"
    en: "A folding bicycle\nthat is faster than\nthe RUNNING SHOES."
    fr: "Un vélo pour aller\nplus vite qu’avec\nles CHAUSSURES."
    it: "Bici pieghevole,\npiù veloce delle\nSCARPE da CORSA."
    de: "Klapprad, das\nschneller als\nTURBOTRETER ist."
    es: "Bici plegable\nmás rápida que\nlas DEPORTIVAS."
bike_voucher:
  names:
    jp_kana: ひきかえけん
    en: BIKE VOUCHER
    fr: BON COMMANDE
    it: BUONO BICI
    de: RAD-COUPON
    es: BONO BICI
  descriptions:
    jp_kana: "ミラクル・サイクルで\nおりたたみ　じてんしゃと\nこうかん　できる　かみ"
    en: "A voucher for\nobtaining a bicycle\nfrom the BIKE SHOP."
    fr: "Bon à échanger\ncontre un vélo aux\nCYCLES A GOGO."
    it: "Buono per una\nbicicletta al\nNEGOZIO di BICI."
    de: "Gutschein für ein\nFAHRRAD im LADEN\nin AZURIA."
    es: "Puede canjearse\npor una bici en la\nTIENDA de BICIS."
black_belt:
  names:
    jp_kana: くろおび
    en: BLACK BELT
    fr: CEINT.NOIRE
    it: CINTURANERA
    de: SCHWARZGURT
    es: CINT. NEGRO
  descriptions:
    jp_kana: "ポケモンに　もたせると\nかくとうタイプの\nわざのいりょくが　あがる"
    en: "A hold item that\nboosts FIGHTING-\ntype moves."
    fr: "Objet tenu montant\nla puissance des\nattaques COMBAT."
    it: "Strumento tenuto:\npotenzia le mosse\ndi tipo LOTTA."
    de: "Item (Tragen)\nverstärkt KAMPF-\nAttacken."
    es: "Al llevarlo, forta-\nlece los ataques\nde tipo LUCHA."
black_flute:
  names:
    jp_kana: くろいビードロ
    en: BLACK FLUTE
    fr: FLUTE NOIRE
    it: FLAUTO NERO
    de: SCHW. FLÖTE
    es: FLAUTA NEGRA
  descriptions:
    jp_kana: "ガラスで　できた　ふえ\nやせい　ポケモンと\nそうぐう　しにくくなる"
    en: "A glass flute that\nkeeps away wild\nPOKéMON."
    fr: "Une flûte en verre\nqui repousse les\nPOKéMON sauvages."
    it: "Flauto di vetro che\ntiene alla larga i\nPOKéMON selvatici."
    de: "Eine gläserne\nFlöte, die wilde\nPOKéMON abhält."
    es: "Flauta de cristal\nque aleja a los\nPOKéMON salvajes."
black_glasses:
  names:
    jp_kana: くろいメガネ
    en: BLACKGLASSES
    fr: LUNET.NOIRES
    it: OCCHIALINERI
    de: SCHATTENGLAS
    es: GAFAS DE SOL
  descriptions:
    jp_kana: "ポケモンに　もたせると\nあくタイプの\nわざのいりょくが　あがる"
    en: "A hold item that\nraises the power of\nDARK-type moves."
    fr: "Objet tenu montant\nla puissance des\nattaques TENEBRES."
    it: "Strumento tenuto:\npotenzia le mosse\ndi tipo BUIO."
    de: "Item (Tragen)\nverstärkt\nUNLICHT-Attacken."
    es: "Al llevarlas, forta-\nlecen los ataques\nde tipo SINIESTRO."
blue_flute:
  names:
    jp_kana: あおいビードロ
    en: BLUE FLUTE
    fr: FLUTE BLEUE
    it: FLAUTO BLU
    de: BLAUE FLÖTE
    es: FLAUTA AZUL
  descriptions:
    jp_kana: "ガラスで　できた　ふえ\nねむり　じょうたいを\nかいふくする"
    en: "A glass flute that\nawakens sleeping\nPOKéMON."
    fr: "Une flûte en verre\nqui réveille les\nPOKéMON endormis."
    it: "Flauto di vetro che\nsveglia un POKéMON\naddormentato."
    de: "Eine gläserne Flö-\nte, die schlafende\nPKMN aufweckt."
    es: "Flauta de cristal\nque despierta a los\nPOKéMON dormidos."
blue_orb:
  names:
    jp_kana: あいいろのたま
    en: BLUE ORB
    fr: ORBE BLEU
    it: SFERA BLU
    de: BLAUE KUGEL
    es: ESFERA AZUL
  descriptions:
    jp_kana: "おおむかしの　ちからが\nこめられている　という\nあおく　かがやく　たま"
    en: "A blue, glowing orb\nsaid to contain an\nancient power."
    fr: "Un globe bleu lumi-\nneux censé abriter\nun pouvoir antique."
    it: "Sfera blu\nluminosa con\nun antico potere."
    de: "Blau glühende Ku-\ngel, die eine uralte\nMacht bergen soll."
    es: "Es azul y brillante.\nDicen que posee\nun poder ancestral."
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    en: BLUE SCARF
    fr: FOUL. BLEU
    it: FASCIA BLU
    de: BLAUER SCHAL
    es: PAÑUELO AZUL
  descriptions:
    jp_kana: "もたせて　コンテストに\nさんかすると　いつもより\nうつくしく　みられる"
    en: "A hold item that\nraises BEAUTY in\nCONTESTS."
    fr: "Objet tenu montant\nla stat BEAUTE\ndans les CONCOURS."
    it: "Strumento tenuto:\ndà più BELLEZZA\nnelle GARE."
    de: "Item (Tragen) hebt\nSCHÖN.-Wert für\nden WETTBEWERB."
    es: "Al llevarlo en los\nCONCURSOS,\nsube la BELLEZA."
blue_shard:
  names:
    jp_kana: あおいかけら
    en: BLUE SHARD
    fr: TESSON BLEU
    it: COCCIO BLU
    de: INDIGOSTÜCK
    es: PARTE AZUL
  descriptions:
    jp_kana: "むかしに　つくられた\nどうぐの　かけら　らしい\nやすく　うれる"
    en: "A shard from an\nancient item. Can\nbe sold cheaply."
    fr: "Fragment d’objet\nantique. Peut être\nvendu à bas prix."
    it: "Coccio di un antico\nstrumento. Si vende\na basso prezzo."
    de: "Scherbe eines\nantiken Relikts\nvon geringem Wert."
    es: "Parte de un objeto\nantiguo. Se vende\na bajo precio."
bluk_berry:
  names:
    jp_kana: ブリーのみ
    en: BLUK BERRY
    fr: BAIE REMU
    it: BACCAMORA
    de: MORBBEERE
    es: BAYA ORAM
  descriptions:
    jp_kana: "ポロックの　ざいりょう\nつちのなかに　うめると\nブリーが　そだつ"
    en: "POKéBLOCK ingredient.\nPlant in loamy soil\nto grow BLUK."
    fr: "Ingrédient POKéBLOC.\nPlantez-la pour\navoir un REMU."
    it: "Ingrediente per le\nPOKéMELLE. Piantala in\nun terreno fertile."
    de: "Säe POKéRIEGEL-Zutat\nin Lehmboden, damit\nMORB wächst."
    es: "En suelo fértil da\nORAM. Sirve para\nhacer POKéCUBOS."
bright_powder:
  names:
    jp_kana: ひかりのこな
    en: BRIGHTPOWDER
    fr: POUDRECLAIRE
    it: LUMINPOLVERE
    de: BLENDPUDER
    es: POLVO BRILLO
  descriptions:
    jp_kana: "もたせると　ひかりが\nあいてを　まどわして\nめいちゅうりつを　さげる"
    en: "A hold item that\ncasts a glare to\nreduce accuracy."
    fr: "Objet tenu qui\néblouit et baisse\nla précision."
    it: "Strumento tenuto:\nabbaglia riducendo\nla precisione."
    de: "Item (Tragen)\nsenkt die Genauig-\nkeit des Gegners."
    es: "Al llevarlo, lanza\nun destello que ba-\nja la PRECISIÓN."
burn_heal:
  names:
    jp_kana: やけどなおし
    en: BURN HEAL
    fr: ANTI-BRULE
    it: ANTISCOTTAT.
    de: FEUERHEILER
    es: ANTIQUEMAR
  descriptions:
    jp_kana: "やけど　じょうたいを\nかいふくする"
    en: "Heals POKéMON\nof a burn."
    fr: "Soigne les POKéMON\nde leurs brûlures."
    it: "Cura un POKéMON\nda una scottatura."
    de: "Heilt Verbrennun-\ngen bei POKéMON."
    es: "Cura a un POKéMON\nquemado."
calcium:
  names:
    jp_kana: リゾチウム
    en: CALCIUM
    fr: CALCIUM
    it: CALCIO
    de: KALZIUM
    es: CALCIO
  descriptions:
    jp_kana: "とくこうの\nきそポイントを　あげる"
    en: "Raises the base\nSP. ATK stat of one\nPOKéMON."
    fr: "Monte l’ATQ. SPE.\nd’un POKéMON."
    it: "Aumenta l’ATT. SP.\ndi un POKéMON."
    de: "Hebt den\nSP. ANGR.-Wert\neines POKéMON."
    es: "Sube el AT. ESP.\nde un POKéMON."
carbos:
  names:
    jp_kana: インドメタシン
    en: CARBOS
    fr: CARBONE
    it: CARBURANTE
    de: CARBON
    es: CARBURANTE
  descriptions:
    jp_kana: "すばやさの\nきそポイントを　あげる"
    en: "Raises the base\nSPEED stat of one\nPOKéMON."
    fr: "Monte la VITESSE\nd’un POKéMON."
    it: "Aumenta la\nVELOCITÀ di\nun POKéMON."
    de: "Hebt den\nINIT.-Wert\neines POKéMON."
    es: "Sube la VELOCIDAD\nde un POKéMON."
card_key:silph_co:
  names:
    jp_kana: カードキー
    en: CARD KEY
    fr: CARTE MAGN.
    it: APRIPORTA
    de: TÜRÖFFNER
    es: LL.MAGNÉTICA
  descriptions:
    jp_kana: "カードで　できた　カギ\nシルフカンパニー　ビルの\nドアロックを　はずせる"
    en: "A card-type door\nkey used in SILPH\nCO’s office."
    fr: "Carte magnétique\npouvant ouvrir\nla SYLPHE SARL."
    it: "Chiave a scheda per\nla DIREZIONE della\nSILPH SpA."
    de: "Schlüsselkarte für\nHQ der SILPH\nCO. in SAFFRONIA."
    es: "Abre las OFICINAS\nCENTRALES\nde SILPH S.A."
charcoal:
  names:
    jp_kana: もくたん
    en: CHARCOAL
    fr: CHARBON
    it: CARBONELLA
    de: HOLZKOHLE
    es: CARBÓN
  descriptions:
    jp_kana: "ポケモンに　もたせると\nほのおタイプの\nわざのいりょくが　あがる"
    en: "A hold item that\nraises the power of\nFIRE-type moves."
    fr: "Objet tenu montant\nla puissance des\nattaques FEU."
    it: "Strumento tenuto:\npotenzia le mosse\ndi tipo FUOCO."
    de: "Item (Tragen)\nverstärkt FEUER-\nAttacken."
    es: "Al llevarlo, forta-\nlece los ataques\nde tipo FUEGO."
cheri_berry:
  names:
    jp_kana: クラボのみ
    en: CHERI BERRY
    fr: BAIE CERIZ
    it: BACCALIEGIA
    de: AMRENABEERE
    es: BAYA ZREZA
  descriptions:
    jp_kana: "もたせると　じぶんで\nまひ　じょうたいを\nかいふくする"
    en: "A hold item that\nheals paralysis\nin battle."
    fr: "Objet tenu qui\nsoigne la paralysie\npendant un combat."
    it: "Strumento tenuto:\ncura paralisi\nnella lotta."
    de: "Item (Tragen) be-\nwirkt Selbstheilung\nbei Paralyse."
    es: "Al llevarla, cura\nla parálisis\nen el combate."
chesto_berry:
