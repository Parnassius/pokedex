    de: "Schlüssel zum\nLagerraum auf\ndem SCHIFFSWRACK."
    es: "Llave del ALMACÉN\nde la NAO ABAN-\nDONADA."
sun_stone:
  names:
    jp_kana: たいようのいし
    en: SUN STONE
    fr: PIERRESOLEIL
    it: PIETRASOLARE
    de: SONNENSTEIN
    es: PIEDRA SOLAR
  descriptions:
    jp_kana: "とくていの　ポケモンを\nしんかさせる"
    en: "Makes certain\nspecies of POKéMON\nevolve."
    fr: "Fait évoluer\ncertaines espèces\nde POKéMON."
    it: "Fa evolvere\ndeterminate specie\ndi POKéMON."
    de: "Löst bei bestimm-\nten POKéMON die\nEntwicklung aus."
    es: "Hace evolucionar\na varias especies\nde POKéMON."
super_potion:
  names:
    jp_kana: いいキズぐすり
    en: SUPER POTION
    fr: SUPER POTION
    it: SUPERPOZIONE
    de: SUPERTRANK
    es: SUPERPOCIÓN
  descriptions:
    jp_kana: "ポケモンの　たいりょくを\n５０　かいふくする"
    en: "Restores the HP of\na POKéMON by\n50 points."
    fr: "Restaure les PV\nd’un POKéMON\nde 50 points."
    it: "Restituisce ad un\nPOKéMON 50 PS."
    de: "Füllt die KP eines\nPOKéMON um\n50 Punkte auf."
    es: "Restaura 50 PS\nde un POKéMON."
super_repel:
  names:
    jp_kana: シルバースプレー
    en: SUPER REPEL
    fr: SUPEREPOUSSE
    it: SUPERREPELL.
    de: SUPERSCHUTZ
    es: SUPERREPEL
  descriptions:
    jp_kana: "２００ぽ　すすむ　あいだ\nよわい　ポケモンと\nそうぐう　しなくなる"
    en: "Repels weak wild\nPOKéMON for 200\nsteps."
    fr: "Repousse les PKMN\nsauvages faibles \ndurant 200 pas."
    it: "Allontana i POKéMON\nselvatici deboli\nper 200 passi."
    de: "Hält 200 Schritte\nlang schwache,\nwilde POKéMON ab."
    es: "Repele POKéMON\nsalvajes débiles\n200 pasos."
super_rod:
  names:
    jp_kana: すごいつりざお
    en: SUPER ROD
    fr: MEGA CANNE
    it: SUPER AMO
    de: SUPERANGEL
    es: SUPERCAÑA
  descriptions:
    jp_kana: "ポケモンを　つるどうぐ\nさいこうの　つりざおと\nいわれている"
    en: "The best fishing\nrod for catching\nwild POKéMON."
    fr: "La meilleure canne\npour pêcher des\nPOKéMON sauvages."
    it: "L’amo migliore\nper pescare\nPOKéMON selvatici."
    de: "Die beste Angel,\num nach POKéMON\nzu fischen."
    es: "Es la mejor caña\npara pescar\nPOKéMON salvajes."
tamato_berry:
  names:
    jp_kana: マトマのみ
    en: TAMATO BERRY
    fr: BAIE TAMATO
    it: BACCAMODORO
    de: TAMOTBEERE
    es: BAYA TAMATE
  descriptions:
    jp_kana: "ポケモンが　ちょっと\nなつくが　すばやさの\nきそポイントが　さがる"
    en: "Makes a POKéMON\nfriendly but lowers\nbase SPEED."
    fr: "Rend un POKéMON\namical, baisse la\nVITESSE de base."
    it: "Rende un POKéMON\namichevole, ma\nriduce la VELOCITÀ."
    de: "PKMN wird freund-\nlicher, aber Grund-\nINIT.-Wert sinkt."
    es: "Hace amable al\nPOKéMON, pero\nbaja la VELOCID."
tea:
  names:
    jp_kana: おちゃ
    en: TEA
    fr: THE
    it: TÈ
    de: TEE
    es: TÉ
  descriptions:
    jp_kana: "おばあさんが　いれた\nおいしい　おちゃ\nかわきを　うるおす"
    en: "A thirst-quenching\ntea prepared by an\nold lady."
    fr: "Un thé préparé par\nune vieille femme.\nEtanche la soif."
    it: "Tè dissetante\npreparato da\nun’anziana signora."
    de: "TEE, der von einer\nalten Dame\nzubereitet wird."
    es: "Té preparado por\nuna señora mayor.\nApaga la sed."
teachy_tv:
  names:
    jp_kana: おしえテレビ
    en: TEACHY TV
    fr: TV ABC
    it: POKéTIVÙ
    de: LEHRKANAL
    es: POKé TELE
  descriptions:
    jp_kana: "トレーナーの　やくにたつ\nばんぐみを　みることが\nできる　テレビ"
    en: "A TV set tuned to\nan advice program\nfor TRAINERS."
    fr: "Un programme qui\ndonne des conseils\naux DRESSEURS."
    it: "TV che mostra un\ncanale informativo\nper gli ALLENATORI."
    de: "Sendung, die dem\nAnfänger-TRAINER\nTipps gibt."
    es: "Tele que emite\nútiles consejos\npara ENTRENADORES."
thick_club:
  names:
    jp_kana: ふといホネ
    en: THICK CLUB
    fr: MASSE OS
    it: OSSOSPESSO
    de: KAMPFKNOCHEN
    es: HUESO GRUESO
  descriptions:
    jp_kana: "カラカラや　ガラガラに\nもたせると　こうげきの\nいりょくが　あがる"
    en: "A hold item that \nraises CUBONE or\nMAROWAK’s ATTACK."
    fr: "Objet tenu montant\nl’ATQ. d’OSSELAIT\net d’OSSATUEUR."
    it: "Strumento tenuto:\naumenta ATTACCO di\nCUBONE e MAROWAK."
    de: "Item (Tragen) er-\nhöht ANGR.-Wert v.\nTRAGOSSO/KNOGGA."
    es: "Al llevarlo, CUBONE\no MAROWAK tendrán\nmejor ATAQUE."
thunder_stone:
  names:
    jp_kana: かみなりのいし
    en: THUNDERSTONE
    fr: PIERREFOUDRE
    it: PIETRATUONO
    de: DONNERSTEIN
    es: PIEDRATRUENO
  descriptions:
    jp_kana: "とくていの　ポケモンを\nしんかさせる"
    en: "Makes certain\nspecies of POKéMON\nevolve."
    fr: "Fait évoluer\ncertaines espèces\nde POKéMON."
    it: "Fa evolvere\ndeterminate specie\ndi POKéMON."
    de: "Löst bei bestimm-\nten POKéMON die\nEntwicklung aus."
    es: "Hace evolucionar\na varias especies\nde POKéMON."
timer_ball:
  names:
    jp_kana: タイマーボール
    en: TIMER BALL
    fr: CHRONO BALL
    it: TIMER BALL
    de: TIMERBALL
    es: TURNO BALL
  descriptions:
    jp_kana: "ターンすうが　かかれば\nかかるほど　つかまえ\nやすくなる　ボール"
    en: "A BALL that gains\npower in battles\ntaking many turns."
    fr: "Plus efficace\npendant les\ncombats longs."
    it: "BALL più efficace\nse la lotta dura da\nmolti turni."
    de: "BALL wird effek-\ntiver, je länger der\nKampf dauert."
    es: "Funciona mejor al\navanzar el combate."
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    en: TINYMUSHROOM
    fr: PETIT CHAMPI
    it: MINIFUNGO
    de: MINIPILZ
    es: MINI SETA
  descriptions:
    jp_kana: "ふつうの　キノコ\nやすく　うれる"
    en: "A plain mushroom\nthat would sell\nat a cheap price."
    fr: "Un champignon or-\ndinaire. Peut être\nvendu à bas prix."
    it: "Un normale fungo\nche si vende a\nbasso prezzo."
    de: "Ein gemeiner\nPilz von \ngeringem Wert."
    es: "Seta común.\nSe vende\na bajo precio."
tm001:
  names:
    jp_kana: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
  descriptions:
    jp_kana: "てきに　だいダメージを\nあたえるが　こうげきを\nうけると　ひるんでしまう"
    en: "Powerful, but makes\nthe user flinch if\nhit by the foe."
    fr: "Puissant, mais peut\napeurer le lanceur\ns’il est touché."
    it: "Potente, ma chi la\nusa tentenna se\ncolpito dal nemico."
    de: "Stark. POKéMON er-\nschrickt vielleicht\nbei gegn. Attacke."
    es: "Es potente, pero\nhiere al atacante\nsi el rival le atiza."
tm002:
  names:
    jp_kana: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
  descriptions:
    jp_kana: "ながく　するどい　ツメで\nてきを　ひっかけて\nこうげきする"
    en: "Hooks and slashes\nthe foe with long,\nsharp claws."
    fr: "Attrape l’ennemi et\nle lacère d’un féro-\nce coup de griffe."
    it: "Lunghi artigli\naffilati sferzano\nil nemico."
    de: "Gegner wird mit\nlangen, scharfen\nKrallen attackiert."
    es: "Engancha y araña\nal rival con garras\nafiladas."
tm003:
  names:
    jp_kana: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
  descriptions:
    jp_kana: "ちょうおんぱ　こうげきで\nてきを　こんらんさせる\nことがある"
    en: "Generates an\nultrasonic wave\nthat may confuse."
    fr: "Génère des ultra-\nsons qui rendent\nconfus."
    it: "Onde ultrasoniche\nche possono con-\nfondere il nemico."
    de: "Eine Ultraschall-\nwelle, die den Geg-\nner verwirren kann."
    es: "Emite una onda\nultrasónica que\npuede confundir."
tm004:
  names:
    jp_kana: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
  descriptions:
    jp_kana: "せいしんを　しゅうちゅう\nさせて　とくこうと\nとくぼうを　あげる"
    en: "Raises SP. ATK and\nSP. DEF by focusing\nthe mind."
    fr: "Concentration pour\nmonter l’ATQ. SPE.\net la DEF. SPE."
    it: "Concentrazione che\naumenta l’ATT. SP.\ne la DIF. SP."
    de: "Verstärkt SP. ANGR.\nund SP. VERT. durch\nKonzentration."
    es: "Se concentra para\nsubir el AT. ESP.\ny la DEF. ESP."
tm005:
  names:
    jp_kana: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
  descriptions:
    jp_kana: "ほえて　てきを　にがす\nてきが　にげると\nせんとうは　おわる"
    en: "A savage roar that\nmakes the foe flee \nto end the battle."
    fr: "Un horrible hurle-\nment. Fait fuir pour\nterminer le combat."
    it: "Mette in fuga il \nnemico per porre \ntermine alla lotta."
    de: "Brüller schlägt\nGegn. in die Flucht \nund beendet Kampf."
    es: "Tremendo rugido\nque hace huir del\ncombate al rival."
tm006:
  names:
    jp_kana: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
  descriptions:
    jp_kana: "じょじょに　ダメージが\nふえる　もうどくを\nてきに　あたえる"
    en: "Poisons the foe\nwith a toxin that\ngradually worsens."
    fr: "Empoisonne l’ennemi\navec une toxine de\nplus en plus forte."
    it: "Avvelena il nemico\ncon intensità\ncrescente."
    de: "Vergiftet den Geg-\nner und schadet \nihm zunehmend."
    es: "Envenena con una\ntoxina que se va\nintensificando."
tm007:
  names:
    jp_kana: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
  descriptions:
    jp_kana: "あられを　ふらして\nこおりタイプ　いがいに\nダメージを　あたえる"
    en: "Creates a hailstorm\nthat damages all\ntypes except ICE."
    fr: "Lance une tempête\nde grêle. Ne blesse\npas le type GLACE."
    it: "Grandinata: il tipo\nGHIACCIO è l’unico\na esserne immune."
    de: "Hagelsturm schadet\nallen PKMN außer\ndenen des Typs EIS."
    es: "Tormenta de gra-\nnizo dañina salvo\npara el tipo HIELO."
tm008:
  names:
    jp_kana: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
  descriptions:
    jp_kana: "からだを　きたえて\nこうげきと　ぼうぎょの\nちからを　あげる"
    en: "Bulks up the body\nto boost both\nATTACK & DEFENSE."
    fr: "Se gonfle pour\nmonter l’ATTAQUE\net la DEFENSE."
    it: "Il corpo s’ingrossa \ne salgono ATTACCO \ne DIFESA."
    de: "Stärkt den Körper.\nSo steigen ANGR.-\nund VERT.-Wert."
    es: "Robustece el\ncuerpo para subir\nATAQUE y DEFENSA."
tm009:
  names:
    jp_kana: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
  descriptions:
    jp_kana: "タネを　２ー５かい\nれんぞくで　はっしゃして\nてきを　こうげきする"
    en: "Shoots 2 to 5 seeds\nin a row to strike\nthe foe."
    fr: "Mitraille l’ennemi\navec 2 à 5 graines\nde suite."
    it: "Da 2 a 5 raffiche\ndi semi sul nemico."
    de: "Beschießt den\nGegner mit 2 bis 5\nSamen auf einmal."
    es: "Dispara de 2 a 5\nráfagas de semillas\nseguidas."
tm010:
  names:
    jp_kana: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
  descriptions:
    jp_kana: "ポケモンによって　てきに\nあたえる　ダメージの\nりょうが　へんかする"
    en: "The attack power\nvaries among\ndifferent POKéMON."
    fr: "La puissance de\nl’attaque dépend\ndu POKéMON lanceur."
    it: "La potenza\ndell’attacco varia\nsecondo il POKéMON."
    de: "Die Stärke dieser\nAttacke hängt vom \njew. POKéMON ab."
    es: "La fuerza del\nataque varía según\nel POKéMON."
tm011:
  names:
    jp_kana: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
  descriptions:
    jp_kana: "５ターンの　あいだ\nほのおタイプの\nわざのいりょくが　あがる"
    en: "Raises the power of\nFIRE-type moves\nfor 5 turns."
    fr: "Améliore les\nattaques FEU\npendant 5 tours."
    it: "Potenzia per 5\nturni le mosse\ndi tipo FUOCO."
    de: "Verstärkt FEUER-\nAttacken über \n5 Runden."
    es: "Sube los ataques\nde tipo FUEGO\ndurante 5 turnos."
tm012:
  names:
    jp_kana: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
  descriptions:
    jp_kana: "あいてを　おこらせて\nこうげきわざ　しか\nだせない　ように　する"
    en: "Enrages the foe so\nit can only use\nattack moves."
    fr: "Provoque l’ennemi.\nL’oblige à utiliser\ndes attaques."
    it: "Provoca il nemico\nperché usi solo\nmosse d’attacco."
    de: "Reizt Geg. so, dass\ner nur Angriffs-\nattacken einsetzt."
    es: "Enfada al rival\npara que sólo\nuse ATAQUES."
tm013:
  names:
    jp_kana: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
  descriptions:
    jp_kana: "れいきを　はっしゃして\nてきを　こうげきする\nこおらせる　ことがある"
    en: "Fires an icy cold\nbeam that may\nfreeze the foe."
    fr: "Envoie un rayon\nde glace pouvant\ngeler l’ennemi."
    it: "Un raggio gelido\nche può congelare\nil nemico."
    de: "Eisig kalter Strahl,\nder den Gegner\neinfrieren kann."
    es: "Rayo de hielo\nque puede llegar\na congelar."
tm014:
  names:
    jp_kana: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
  descriptions:
    jp_kana: "ゆきを　つよいかぜに\nのせて　こうげきする\nこおらせる　ことがある"
    en: "A brutal snow-and-\nwind attack that\nmay freeze the foe."
    fr: "Violente tempête\nde neige pouvant\ngeler l’ennemi."
    it: "Attacco di neve e\nvento che può\ncongelare il nemico."
    de: "EIS- und Schnee- \nAttacke, die Gegner\neinfrieren kann."
    es: "Tormenta de viento\ny nieve que puede\nllegar a congelar."
tm015:
  names:
    jp_kana: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
  descriptions:
    jp_kana: "ダメージは　おおきいが\nつかうと　つぎのターン\nうごけなく　なってしまう"
    en: "Powerful, but needs\nrecharging the\nnext turn."
    fr: "Puissant. Oblige le\nlanceur à rechar-\nger le tour suivant."
    it: "È potente, ma chi la\nusa perde il turno \nsuccessivo."
    de: "Stark, muss sich\nin der nächsten\nRunde aufladen."
    es: "Es eficaz, pero\nnecesita 1 turno\npara recargarse."
tm016:
  names:
    jp_kana: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
  descriptions:
    jp_kana: "ひかりのかべを　つくり\nとくこうの　ダメージを\nよわめる"
    en: "Creates a wall of\nlight that lowers\nSP. ATK damage."
    fr: "Crée un mur lumi-\nneux. Baisse les\ndégâts d’ATQ. SPE."
    it: "Parete di luce che\nriduce i danni\ndell’ATT. SP."
    de: "Wand aus Licht, die\nSchaden des SP.\nANGR. verringert."
    es: "Pared de luz que\nreduce el daño del\nAT. ESP."
tm017:
  names:
    jp_kana: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
  descriptions:
    jp_kana: "そのターンの　こうげきを\nうけないが　れんぞくして\nだすと　しっぱいしやすい"
    en: "Negates all damage,\nbut may fail if used\nin succession."
    fr: "Ignore les dégâts,\nmais peut échouer\nsi réutilisée."
    it: "Elude gli attacchi:\nse usato ripetuta-\nmente può fallire."
    de: "Schützt, könnte\naber bei häufigem\nEinsatz versagen."
    es: "Anula los daños,\npero puede fallar\nsi se usa sin parar."
tm018:
  names:
    jp_kana: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
  descriptions:
    jp_kana: "５ターンの　あいだ\nみずタイプの\nわざのいりょくが　あがる"
    en: "Raises the power of\nWATER-type moves\nfor 5 turns."
    fr: "Améliore les\nattaques EAU\npendant 5 tours."
    it: "Potenzia per 5\nturni le mosse\ndi tipo ACQUA."
    de: "Verstärkt WASSER-\nAttacken über\n5 Runden."
    es: "Sube los ataques\nde tipo AGUA\ndurante 5 turnos."
tm019:
  names:
    jp_kana: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
  descriptions:
    jp_kana: "あたえた　ダメージの\nはんぶんの　たいりょくを\nかいふく　できる"
    en: "Recovers half the\nHP of the damage \nthis move inflicts."
    fr: "Une attaque qui\naspire la moitié des\ndégâts infligés."
    it: "Assorbe metà dei\nPS sottratti al\nnemico."
    de: "Füllt KP um die\nHälfte der zuge-\nfügten SP auf."
    es: "Recupera la mitad\nde PS del daño\nque produce."
tm020:
  names:
    jp_kana: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
  descriptions:
    jp_kana: "ふしぎな　ちからに\nまもられて　とくしゅ\nじょうたいに　ならない"
    en: "Prevents status\nabnormality with a\nmystical power."
    fr: "Force mystique em-\npêchant tout chan-\ngement de statut."
    it: "Forza magica:\nevita i problemi\ndi stato."
    de: "Mystische Macht,\nverhindert Status-\nveränderungen."
    es: "Evita alteraciones\nde estado usando\nun poder secreto."
tm021:
  names:
    jp_kana: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
  descriptions:
    jp_kana: "ポケモンが　なついて\nいないほど　あたえる\nダメージが　あがる"
    en: "The less the user\nlikes you, the more\npowerful this move."
    fr: "Attaque plus puis-\nsante si le lanceur\nvous déteste."
    it: "Più efficace se chi\nla usa non gradisce\nil suo ALLENATORE."
    de: "Je unbeliebter der\nTrainer, desto grö-\nßer die Wirkung."
    es: "Cuanto menos le\ngustes al POKéMON,\nmás fuerte ataca."
tm022:
  names:
    jp_kana: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
  descriptions:
    jp_kana: "１ターンめで　ひかりを\nきゅうしゅうして　つぎの\nターンに　こうげきする"
    en: "Absorbs sunlight in\nthe 1st turn, then\nattacks next turn."
    fr: "Absorbe la lumière\net attaque le tour\nsuivant."
    it: "Al primo turno\nassorbe la luce, al\nsecondo attacca."
    de: "Erst wird Sonnen-\nlicht absorbiert,\ndann erfolgt Angr."
    es: "1.ᵉʳ turno: toma\nluz.\n2.º turno: ataca."
tm023:
  names:
    jp_kana: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
  descriptions:
    jp_kana: "かたいシッポで　こうげき\nてきの　ぼうぎょを\nさげる　ことがある"
    en: "Slams the foe with\na hard tail. It may\nlower DEFENSE."
    fr: "Frappe l’ennemi\navec sa queue. Peut\nbaisser la DEFENSE."
    it: "Coda coriacea che\ncolpisce il nemico.\nPuò ridurre DIFESA."
    de: "Schlag mit harter\nRute. Kann gleichz.\nVERT.-Wert senken."
    es: "Golpea con un gran\ncoletazo y puede\nbajar la DEFENSA."
tm024:
  names:
    jp_kana: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
  descriptions:
    jp_kana: "でんげきを　あびせる\nあたった　てきを\nまひさせる　ことがある"
    en: "A powerful electric\nattack that may\ncause paralysis."
    fr: "Forte attaque\nélectrique pouvant\nparalyser l’ennemi."
    it: "Potente attacco\nelettrico che può\ncausare paralisi."
    de: "Starke ELEKTRO-\nAttacke. Kann\nParalyse bewirken."
    es: "Duro ataque eléc-\ntrico que puede\nparalizar al rival."
tm025:
  names:
    jp_kana: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
  descriptions:
    jp_kana: "かみなりを　おとす\nあたった　てきを\nまひさせる　ことがある"
    en: "Strikes the foe\nwith a thunderbolt.\nIt may paralyze."
    fr: "Une attaque fou-\ndroyante pouvant\nparalyser l’ennemi."
    it: "Il nemico è colpito\nda un tuono.\nPuò paralizzare."
    de: "Mächtiger Donner-\nschlag, der Paraly-\nse bewirken kann."
    es: "Ataca con un\nrayo que puede\nparalizar al rival."
tm026:
  names:
    jp_kana: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
  descriptions:
    jp_kana: "じめんを　つよく　ゆらす\nとんでいる　てきいがいに\nだいダメージを　あたえる"
    en: "Causes a quake\nthat has no effect\non flying foes."
    fr: "Séisme sans effet\nsur les adversaires\nvolants."
    it: "Terremoto. Non ha\neffetto sui nemici\nvolanti."
    de: "Starkes Beben. Hat\nkeinen Einfluss auf\nfliegende Gegner."
    es: "Provoca un temblor\nque no afecta a los\nvoladores."
tm027:
  names:
    jp_kana: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
  descriptions:
    jp_kana: "ポケモンが　なついて\nいるほど　あたえる\nダメージが　あがる"
    en: "The more the user\nlikes you, the more\npowerful this move."
    fr: "Attaque dont la\npuissance dépend\nde l’amitié."
    it: "Più potente se il\nPOKéMON è amico\ndell’ALLENATORE."
    de: "Je beliebter der\nTrainer, desto grö-\nßer die Wirkung."
    es: "Cuanto más le\ngustes al POKéMON,\nmás fuerte ataca."
tm028:
  names:
    jp_kana: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
  descriptions:
    jp_kana: "１ターンめで　じめんに\nもぐり　つぎのターンに\nてきを　こうげきする"
    en: "Digs underground\nthe 1st turn, then\nstrikes next turn."
    fr: "Creuse sous terre\nau 1ᵉʳ tour et\nfrappe au 2ᵉ."
    it: "Al primo turno\nscava, per attac-\ncare al secondo."
    de: "Erst gräbt sich An-\ngreifer ein, dann\nerfolgt Angriff."
    es: "1.ᵉʳ turno: cava.\n2.º turno: ataca."
tm029:
  names:
    jp_kana: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
  descriptions:
    jp_kana: "つよい　ねんりきを　だす\nてきの　とくぼうを\nさげる　ことがある"
    en: "A powerful psychic\nattack that may\nlower SP. DEF."
    fr: "Puissante attaque\nPSY pouvant\nbaisser la DEF. SPE."
    it: "Potente attacco\npsichico: può\nridurre la DIF. SP."
    de: "Starke PSYCHO-At-\ntacke, die SP. VERT.\nsenken kann."
    es: "Fuerte ataque psí-\nquico que puede\nbajar la DEF. ESP."
tm030:
  names:
    jp_kana: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
  descriptions:
    jp_kana: "くろいかたまりを　なげる\nてきの　とくぼうを\nさげる　ことがある"
    en: "Hurls a dark lump\nat the foe. It may\nlower SP. DEF."
    fr: "Projette une gran-\nde tache qui peut\nbaisser la DEF. SPE."
    it: "Una sfera oscura si\nabbatte sul nemico.\nPuò ridurre DIF. SP."
    de: "Dunkler Klumpen,\nder SP. VERT.\nsenken kann."
    es: "Lanza una bola\nnegra que puede\nbajar la DEF. ESP."
tm031:
  names:
    jp_kana: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
  descriptions:
    jp_kana: "ひかりのかべ　などを\nこわして　てきに　　\nダメージを　あたえられる"
    en: "Destroys barriers\nlike LIGHT SCREEN\nand causes damage."
    fr: "Détruit les barriè-\nres comme MUR\nLUMIERE et blesse."
    it: "Arreca danno e\ndistrugge barriere\ncome RIFLESSO."
    de: "Zerstört Barrieren\nwie SCHUTZSCHILD,\nfügt Schaden zu."
    es: "Destruye barreras\ncomo PANTALLA LUZ\ny causa daño."
tm032:
  names:
    jp_kana: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
  descriptions:
    jp_kana: "ぶんしんを　つくって\nてきを　まどわせて\nかいひりつを　あげる"
    en: "Creates illusory\ncopies to enhance\nelusiveness."
    fr: "Crée de fausses\ncopies pour aug-\nmenter l’esquive."
    it: "Copie illusorie\naumentano \nl’elusione."
    de: "Virtueller Doppel-\ngänger. Erhöht\nden Flucht-Wert."
    es: "Crea ilusiones\npara mejorar la\nEVASIÓN."
tm033:
  names:
    jp_kana: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
  descriptions:
    jp_kana: "ひかりのかべを　つくり\nぶつり　こうげきの\nダメージを　よわめる"
    en: "Creates a wall of\nlight that weakens\nphysical attacks."
    fr: "Crée un mur lumi-\nneux. Affaiblit les\natt. physiques."
    it: "Parete di luce che\nindebolisce gli\nattacchi fisici."
    de: "Wand aus Licht, die\nphysische Atta-\ncken schwächt."
    es: "Pared de luz que\nbaja los ataques\nfísicos."
tm034:
  names:
    jp_kana: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
  descriptions:
    jp_kana: "ぜったいに　よけられない\nすばやさで　てきに\nでんげきを　あびせる"
    en: "Zaps the foe with a\njolt of electricity\nthat never misses."
    fr: "Envoie un choc\nélectrique impos-\nsible à esquiver."
    it: "Infallibile scarica\nelettrica contro\nil nemico."
    de: "Fügt Gegner einen\nStromschlag zu,\nder nie verfehlt."
    es: "Propina un ataque\neléctrico rápido\ne ineludible."
tm035:
  names:
    jp_kana: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
  descriptions:
    jp_kana: "ほのおを　まきちらす\nあたった　てきを\nやけどさせる　ことがある"
    en: "Looses a stream of\nfire that may burn\nthe foe."
    fr: "Envoie un torrent\nde flammes pouvant\nbrûler l’ennemi."
    it: "Un flusso di fuoco\nche può scottare\nil nemico."
    de: "Entfesselt Feuer-\nstrahl, der Gegner\nverbrennen kann."
    es: "Lanza un chorro de\nfuego que puede\ncausar quemaduras."
tm036:
  names:
    jp_kana: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
  descriptions:
    jp_kana: "ヘドロを　なげつける\nあたった　てきに　どくを\nあたえることが　ある"
    en: "Hurls sludge at the\nfoe. It may poison\nthe foe."
    fr: "Envoie des détri-\ntus pour blesser.\nPeut empoisonner."
    it: "Fango lanciato sul\nnemico. Può\navvelenarlo."
    de: "Bewirft Gegner mit\nMatsch, der ihn\nvergiften kann."
    es: "Descarga de lodo\nque puede llegar\na envenenar."
tm037:
  names:
    jp_kana: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
  descriptions:
    jp_kana: "すなあらしを　おこして\nまいターン　てきに\nダメージを　あたえる"
    en: "Causes a sandstorm\nthat hits the foe\nover several turns."
    fr: "Une tempête de\nsable qui dure\nplusieurs tours."
    it: "Una tempesta di \nsabbia: colpisce\nper diversi turni."
    de: "Sandsturm trifft\netliche Runden lang\ndie Kämpfenden."
    es: "Tormenta de arena\nque dura varios\nturnos."
tm038:
  names:
    jp_kana: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
  descriptions:
    jp_kana: "だいの　もじで　すべてを\nやきつくす　こうげき\nやけどさせる　ことがある"
    en: "A powerful fire\nattack that may\nburn the foe."
    fr: "Puissante attaque\nenflammée pouvant\nbrûler l’ennemi."
    it: "Potente attacco di\nfuoco che può\nscottare il nemico."
    de: "Kraftvolle FEUER-\nAttacke, die Gegner\nverbrennen kann."
    es: "Potente ataque de\nfuego que puede\nquemar al rival."
tm039:
  names:
    jp_kana: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
  descriptions:
    jp_kana: "いわで　てきの　うごきを\nふうじて　こうげき\nすばやさを　さげられる"
    en: "Stops the foe from\nmoving with rocks.\nMay lower SPEED."
    fr: "Bloque l’ennemi\navec des rocs. Peut\nbaisser la VITESSE."
    it: "Rocce bloccano il\nnemico. Può ridurre\nla VELOCITÀ."
    de: "Begräbt Gegner mit\nSteinen. Kann\nINIT.-Wert senken."
    es: "Inmoviliza al rival\ncon rocas. Puede\nbajar la VELOCIDAD."
tm040:
  names:
    jp_kana: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
  descriptions:
    jp_kana: "すばやい　うごきで　\nぜったいに　よけられない\nこうげきを　する"
    en: "An extremely fast\nattack that can’t\nbe avoided."
    fr: "Une attaque\nextrêmement rapide\net inévitable."
    it: "Attacco\nrapidissimo e\ninevitabile."
    de: "Eine schnelle\nAttacke, die\nunausweichlich ist."
    es: "Ataque tremen-\ndamente rápido\ne ineludible."
tm041:
  names:
    jp_kana: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
  descriptions:
    jp_kana: "てきが　おなじわざを\nれんぞくで　だせない\nようにする"
    en: "Prevents the foe\nfrom using the same\nmove in a row."
    fr: "Empêche la\nréutilisation\nd’une attaque."
    it: "Impedisce al nemico\ndi usare la stessa\nmossa di seguito."
    de: "Blockiert gerade\nverwendete Atta-\ncke des Gegners."
    es: "Impide al rival que\nuse un ataque de\nforma continuada."
tm042:
  names:
    jp_kana: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
  descriptions:
    jp_kana: "どく　まひ　やけどのとき\nこうげきの　ちからを\nあげる　ことが　できる"
    en: "Raises ATTACK when\npoisoned, burned,\nor paralyzed."
    fr: "Améliore l’ATTAQUE\nsi brûlé, paralysé\nou empoisonné."
    it: "Con paralisi, avve-\nlenam. o scottatura\nsale l’ATTACCO."
    de: "Stärkt ANGR.-Wert\nbei Gift, Brand oder\nParalyse."
    es: "Sube el ATAQUE al\nestar quemado, \nparaliz. o enven."
tm043:
  names:
    jp_kana: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
  descriptions:
    jp_kana: "たたかう　ばしょに　より\nてきに　あたえる\nついか　こうかが　かわる"
    en: "Adds an effect to\nattack depending\non the location."
    fr: "Les effets\nde l’attaque\ndépendent du lieu."
    it: "L’attacco ha un\neffetto in più a\nseconda del luogo."
    de: "Die Umgebung\nbeeinflusst die Art\nder Attacke."
    es: "Tiene efectos\ndistintos según\nla zona."
tm044:
  names:
    jp_kana: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
  descriptions:
    jp_kana: "２ターンねむり　からだの\nいじょうと　たいりょくを\nぜんかいふく　する"
    en: "The user sleeps for\n2 turns to restore\nhealth and status."
    fr: "Le lanceur dort 2\ntours et regagne\nPV et statut."
    it: "Chi la usa dorme \nper 2 turni e re- \ncupera PS e stato."
    de: "POKéMON schläft\n2 Runden. Füllt KP\nund heilt Status."
    es: "El POKéMON duerme\n2 turnos y restaura\nsu salud y estado."
tm045:
  names:
    jp_kana: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
  descriptions:
    jp_kana: "オスなら　メスに\nメスなら　オスに\nわざが　だしにくくなる"
    en: "Makes it tough to\nattack a foe of the\nopposite gender."
    fr: "Le genre opposé\na moins de chances\nd’attaquer."
    it: "Nemici del sesso \nopposto attaccano\nmeno facilmente."
    de: "Erschwert Angriff\nauf Gegner des an-\nderen Geschlechts."
    es: "Hace difícil atacar\na un rival del otro\ngénero."
tm046:
  names:
    jp_kana: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
  descriptions:
    jp_kana: "こうげきちゅうに　すきを\nみて　てきが　もっている\nどうぐを　ぬすむ"
    en: "While attacking,\nit may steal the\nfoe’s held item."
    fr: "Peut voler l’objet\ntenu par l’ennemi\npendant l’attaque."
    it: "Può rubare lo \nstrumento tenuto\ndal nemico."
    de: "Beim Angriff wird\nItem des Gegners\nevtl. gestohlen."
    es: "Al atacar, puede\nquitar al rival\nel objeto que lleve."
tm047:
  names:
    jp_kana: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
  descriptions:
    jp_kana: "かたいつばさを　おおきく\nひろげて　そのまま\nてきに　たいあたりする"
    en: "Spreads hard-\nedged wings and\nslams into the foe."
    fr: "Frappe l’ennemi en\ndéployant ses ailes\nd’acier."
    it: "Si lancia ad ali\nspiegate contro\nil nemico."
    de: "Den Gegner\ntreffen stählerne\nFlügelschläge."
    es: "Bate las rígidas\nalas para golpear\nal rival."
tm048:
  names:
    jp_kana: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
  descriptions:
    jp_kana: "わざを　だした　ターンに\nじぶんと　てきの\nとくせいを　いれかえる"
    en: "Switches abilities\nwith the foe on the\nturn this is used."
    fr: "Le lanceur et\nla cible échangent\nleurs capacités."
    it: "Chi la usa scambia\nabilità speciali con\nun altro POKéMON."
    de: "Austausch der\nFähigkeiten bei der\nnächsten Attacke."
    es: "Intercambia la\nhabilidad especial\ndurante 1 turno."
tm049:
  names:
    jp_kana: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
  descriptions:
    jp_kana: "てきが　つかおうとした\nわざを　うばって\nじぶんに　つかう"
    en: "Steals the effects\nof the move the foe\nis trying to use."
    fr: "Vole les effets de\nla prochaine\nattaque ennemie."
    it: "Ruba l’effetto\ndella mossa che il\nnemico vuole usare."
    de: "Stiehlt die\nEffekte der gegne-\nrischen Attacke."
    es: "Roba el efecto del\nataque que el rival\nintenta usar."
tm050:
  names:
    jp_kana: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
  descriptions:
    jp_kana: "フルパワーで　こうげき\nできるが　とくこうが\nガクッと　さがってしまう"
    en: "Enables full-power\nattack, but sharply\nlowers SP. ATK."
    fr: "Attaque à pleine\npuissance, mais\nbaisse ATQ. SPE."
    it: "Potente attacco, \nma riduce di\nmolto l’ATT. SP."
    de: "Höchste Kraft,\naber senkt SP.\nANGR. enorm."
    es: "Ataca con toda la\nfuerza, pero baja\nmucho el AT. ESP."
tm_case:
  names:
    jp_kana: わざマシンケース
    en: TM CASE
    fr: BOITE CT
    it: PORTA-MT
    de: VM/TM-BOX
    es: TUBO MT-MO
  descriptions:
    jp_kana: "わざマシンを　ほかんする\nべんりな　いれもの"
    en: "A convenient case \nthat holds TMs and\nHMs."
    fr: "Une boîte pour\nranger les CT et\nles CS."
    it: "Contenitore utile\nper le MT e\nle MN."
    de: "Box, in der VMs und\nTMs aufbewahrt\nwerden."
    es: "Tubo que contiene\nlas MT y MO.\nEs muy útil."
town_map:
  names:
    jp_kana: タウンマップ
    en: TOWN MAP
    fr: CARTE
    it: MAPPA CITTÀ
    de: KARTE
    es: MAPA
  descriptions:
    jp_kana: "いつでも　みることが\nできる　べんりな　ちず\nじぶんの　いちも　わかる"
    en: "Can be viewed\nanytime. Shows your\npresent location."
    fr: "Carte pouvant être\nlue partout. Montre\nla position."
    it: "Comoda mappa,\nconsultabile in\nogni situazione."
    de: "Kann stets aufge-\nrufen werden.\nZeigt Standort."
    es: "Puede consultarse\ncuando sea. Indica\ndónde estás."
tri_pass:
  names:
    jp_kana: トライパス
    en: TRI-PASS
    fr: TRI-PASSE
    it: TRIS PASS
    de: TRI-PASS
    es: TRI-TICKET
  descriptions:
    jp_kana: "１のしまと　２のしまと\n３のしまを　いどうする\nふねに　のれる"
    en: "A pass for ferries\nbetween ONE, TWO,\nand THREE ISLAND."
    fr: "Un passe pour\naccéder aux\nILES 1, 2 et 3."
    it: "Pass per PRIMISO-\nLA, SECONDISOLA\ne TERZISOLA."
    de: "Pass für die Fähren\nzwischen EILAND\nEINS, ZWEI, DREI."
    es: "Ticket del ferry\nde ISLA PRIMA,\nSECUNDA y TERA."
tropic_mail:
  names:
    jp_kana: トロピカルメール
    en: TROPIC MAIL
    fr: LETTRE TROPI
    it: MESS. TROPIC
    de: TROPENBRIEF
    es: CAR. TROPIC.
  descriptions:
    jp_kana: "キレイハナの　すがたが\nプリントされた　びんせん\nポケモンに　もたせる"
    en: "A BELLOSSOM-print\nMAIL to be held by\na POKéMON."
    fr: "Papier JOLIFLOR\npouvant être tenu\npar un POKéMON."
    it: "MESSAGGIO tenuto:\npresenta l’immagine\ndi BELLOSSOM."
    de: "BRIEF (Tragen) mit \nBLUBELLA-\nAufdruck."
    es: "Sale BELLOSSOM.\nDebe llevarla\nun POKéMON."
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    en: TWISTEDSPOON
    fr: CUILLERTORDU
    it: CUCCH. TORTO
    de: KRÜMMLÖFFEL
    es: CUCHARA TOR
  descriptions:
    jp_kana: "ポケモンに　もたせると\nエスパータイプの\nわざのいりょくが　あがる"
    en: "A hold item that\nboosts PSYCHIC-\ntype moves."
    fr: "Objet tenu montant\nla puissance des\nattaques PSY."
    it: "Strumento tenuto:\npotenzia le mosse\ndi tipo PSICO."
