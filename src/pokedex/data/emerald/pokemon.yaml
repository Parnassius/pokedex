        jp_kana:
          emerald: "ふとい　しっぽの　ひとふりは　がんじょうな\nてっとうも　へしおる　すさまじい　はかいりょく。\nいちど　あばれだすと　てが　つけられない。"
        en:
          emerald: "A NIDOKING’s thick tail packs enormously\ndestructive power capable of toppling\na metal transmission tower. Once it goes\non a rampage, there is no stopping it."
        fr:
          emerald: "Son épaisse queue est d’une puissance\nincroyable. En un seul coup, il peut\nrenverser une tour métallique. Lorsqu’il\nse déchaîne, plus rien ne peut l’arrêter."
        it:
          emerald: "La possente coda di NIDOKING ha un potere\ntale da abbattere un pilone metallico con\nun solo colpo. Quando si scatena non c’è\nmodo di fermare la sua furia."
        de:
          emerald: "Sein Schweif ist enorm stark. Mit einer\nBewegung kann es einen metallenen Sende-\nmast zum Einsturz bringen. Wenn es in Rage\ngerät, ist es nur schwer aufzuhalten."
        es:
          emerald: "La gruesa cola de NIDOKING resulta\ndestructora. Con agitarla una vez, puede\ntumbar hasta una torre de transmisión.\nCuando se desboca, no hay quien lo pare."
clefairy:
  species_id: 35
  names:
    jp_kana: ピッピ
    en: CLEFAIRY
    fr: MELOFEE
    it: CLEFAIRY
    de: PIEPI
    es: CLEFAIRY
