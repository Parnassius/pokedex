        en:
          emerald: "If a MAGBY is spouting yellow flames from\nits mouth, it is in good health. When it is\nfatigued, black smoke will be mixed in with\nthe flames."
        fr:
          emerald: "Si MAGBY crache des flammes jaunes, c’est\nqu’il est en bonne santé. Lorsqu’il est\nfatigué, de la fumée noire s’ajoute aux\nflammes."
        it:
          emerald: "Se MAGBY sputa fiamme gialle, gode di\nbuona salute, mentre se è stanco o\naffaticato, le fiamme sono miste a fumo\nnero."
        de:
          emerald: "MAGBYs Gesundheitszustand kann man am\nFeuer erkennen, das es ausatmet. Stößt es\ngelbe Flammen aus, ist es in guter\nVerfassung."
        es:
          emerald: "Observando la respiración de MAGBY, se\nsabe su estado de salud: si expulsa llamas\namarillas, está bien. Pero si, además de las\nllamas, sale humo negro, está cansado."
miltank:
