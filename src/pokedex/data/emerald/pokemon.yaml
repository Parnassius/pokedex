        en:
          emerald: "A CLAYDOL sleeps while hovering in midair.\nIts arms are separate from its body.\nThey are kept floating by the POKéMON’s\nmanipulation of psychic power."
        fr:
          emerald: "KAORINE dort en flottant dans les airs.\nSes bras sont séparés de son corps et\nrestent en lévitation grâce aux pouvoirs\npsychiques de ce POKéMON."
        it:
          emerald: "CLAYDOL dorme fluttuando a mezz’aria. I\nsuoi arti superiori sono separati dal corpo\ne pare che riesca a mantenerli sospesi\ngrazie ai suoi poteri psichici."
        de:
          emerald: "LEPUMENTAS schläft schwebend. Seine Arme\nsind nicht an seinem Körper befestigt. Die\nManipulation durch Psykräfte lässt sie\nschweben."
        es:
          emerald: "CLAYDOL duerme mientras levita.\nTiene los brazos separados del cuerpo\ny los mantiene flotando gracias a\nsus poderes psicoquinéticos."
lileep:
  species_id: 345
