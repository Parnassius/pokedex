        en:
          emerald: "AERODACTYL is a POKéMON from the age\nof dinosaurs. It was regenerated from DNA\nextracted from amber. It is imagined to\nhave been the king of the skies."
        fr:
          emerald: "C’est un POKéMON de l’ère des dinosaures.\nIl fut ressuscité à partir de cellules dans\nun morceau d’ambre. On pense qu’il était\nle roi des cieux à l’époque préhistorique."
        it:
          emerald: "AERODACTYL risale all’epoca dei dinosauri.\nÈ stato rigenerato da materiale genetico \nestratto dall’ambra. Si suppone che nell’\nantichità fosse il signore dei cieli."
        de:
          emerald: "AERODACTYL ist ein PKMN aus dem Zeitalter\nder Dinosaurier. Es wurde aus genetischem\nMaterial reproduziert, das aus Bernstein\ngewonnen wurde."
        es:
          emerald: "Surgió en la era de los dinosaurios. Se\nregeneró a partir de material genético\ncontenido en ámbar. Se cree que fue el\namo de los cielos en épocas pasadas."
