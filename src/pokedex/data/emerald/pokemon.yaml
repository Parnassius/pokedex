        en:
          emerald: "A DRATINI continually molts and sloughs\noff its old skin. It does so because the\nlife energy within its body steadily builds\nto reach uncontrollable levels."
        fr:
          emerald: "MINIDRACO mue constamment. En effet,\nl’énergie vitale de son corps augmente\nrégulièrement et sa mue lui permet d’éviter\nd’atteindre des niveaux incontrôlables."
        it:
          emerald: "DRATINI fa la muta cambiando di continuo\nla pelle vecchia, perché l’energia vitale\ndel suo corpo aumenta fino a raggiungere\nlivelli incontrollabili."
        de:
          emerald: "DRATINI häutet sich ständig und entledigt\nsich so seiner Haut, da die Lebensenergie\nin seinem Körper stetig und unkontrollier-\nbar ansteigt."
        es:
          emerald: "Está mudando la piel continuamente.\nEs algo que necesita hacer porque la\nenergía que tiene en su interior alcanza\nniveles que resultan incontrolables."
dragonair:
  species_id: 148
