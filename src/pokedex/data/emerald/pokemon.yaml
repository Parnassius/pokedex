      descriptions:
        jp_kana:
          emerald: "いとで　つくった　ワナは　だい２の　しんけい。\nいとを　つたわる　わずかな　しんどう　だけで\nえものの　しゅるいが　わかると　いわれている。"
        en:
          emerald: "The web it spins can be considered its\nsecond nervous system. It is said that a\nSPINARAK determines its prey by the tiny\nvibrations it feels through the web."
        fr:
          emerald: "La toile tissée par MIMIGAL est comme un\nsecond système nerveux. On dit qu’il peut\ndéterminer quelle proie touche sa toile\ngrâce aux infimes vibrations des fils."
        it:
          emerald: "La ragnatela tessuta da SPINARAK può\nessere considerata il suo secondo sistema\nnervoso poiché dalle sue vibrazioni pare\nriesca a capire la natura della sua preda."
        de:
          emerald: "Das von WEBARAK gesponnene Netz ist sein\nzweites Nervensystem. Es kann anhand der\nfeinen Vibrationen der Netzfäden bestim-\nmen, welche Beute sich darauf befindet."
        es:
          emerald: "La tela que teje puede considerarse como\nsu segundo sistema nervioso. Dicen que\nadivina qué presa ha caído en su red por\nlas vibraciones de los hilos de la tela."
ariados:
  species_id: 168
