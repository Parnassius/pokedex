      descriptions:
        jp_kana:
          emerald: "すがたを　けしていても　テレパシーが　あるので\nなかまの　いる　ばしょや　きもちが　わかる。\nひとの　ことばを　りかいする　ちのうを　もつ。"
        en:
          emerald: "Even in hiding, it can detect the locations\nof others and sense their emotions since\nit has telepathy. Its intelligence allows\nit to understand human languages."
        fr:
          emerald: "Même en se cachant, il parvient à détecter\nles autres POKéMON et à sentir leurs\némotions grâce à son don de télépathie.\nIl comprend le langage des humains."
        it:
          emerald: "Anche quando si nasconde, LATIOS riesce a\nindividuare gli altri e a percepirne le\nemozioni grazie alla telepatia. È molto\nintelligente e capisce il linguaggio umano."
        de:
          emerald: "Auch wenn es sich versteckt, kann es\nmittels Telepathie die Aufenthaltsorte\nder anderen und ihre Emotionen wahr-\nnehmen. Es versteht sogar Menschen."
        es:
          emerald: "Incluso oculto, detecta la ubicación de\nlos demás y capta sus emociones\ntelepáticamente. Es tan inteligente\nque entiende el lenguaje humano."
kyogre:
