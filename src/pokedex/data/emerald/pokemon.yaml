        jp_kana:
          emerald: "３つの　あたまを　もつ　ちんしゅの　ポケモン。\nあめの　ふらない　かんそうした　きせつでも\nげんきに　そうげんを　はしりまわる。"
        en:
          emerald: "A peculiar POKéMON species with three\nheads. It vigorously races across grassy\nplains even in arid seasons with little\nrainfall."
        fr:
          emerald: "Une espèce rare de POKéMON à trois têtes.\nIl court énergiquement à travers les\nplaines même pendant les saisons où la\npluie tombe très peu."
        it:
          emerald: "DODRIO appartiene a una bizzarra specie\ndi POKéMON con tre teste. Non è raro\nvederlo sfrecciare instancabilmente su\nvaste pianure anche nella stagione secca."
        de:
          emerald: "Eine besondere POKéMON-Art mit drei\nKöpfen. Es rennt selbst in Trockenzeiten\nvoller Energie über unendliche Wiesen."
        es:
          emerald: "Pertenece a una rara especie de POKéMON\nque tiene tres cabezas. Corre con energía\npor verdes praderas incluso en estaciones\nsecas en las que llueve muy poco."
seel:
  species_id: 86
  names:
    jp_kana: パウワウ
    en: SEEL
    fr: OTARIA
    it: SEEL
    de: JUROB
    es: SEEL
