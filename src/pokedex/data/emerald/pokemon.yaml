      descriptions:
        jp_kana:
          emerald: "むれに　なった　ダンバルたちは　まるで　１ぴきの\nポケモンの　ように　いっしみだれぬ　うごき。\nのうはで　きもちを　こうしんしているのだ。"
        en:
          emerald: "When BELDUM gather in a swarm, they move\nin perfect unison as if they were but one\nPOKéMON. They communicate with each other\nusing brain waves."
        fr:
          emerald: "Quand les TERHAL se réunissent, ils\nse déplacent à l’unisson comme s’ils\nn’étaient qu’un POKéMON. Ils communiquent\ngrâce à leurs ondes cérébrales."
        it:
          emerald: "Quando sono in gruppo, i BELDUM si\nmuovono perfettamente all’unisono quasi\nfossero un unico POKéMON. Comunicano\nfra di loro servendosi delle onde cerebrali."
        de:
          emerald: "Wenn sich TANHEL versammeln, bewegen sie\nsich so synchron, dass man meinen könnte,\nes handele sich um ein PKMN. Sie reden\nüber ihre Gehirnwellen miteinander."
        es:
          emerald: "Cuando los BELDUM van en enjambre, se\nmueven al unísono en perfecta armonía,\ncomo si fueran un solo POKéMON.\nSe comunican por ondas cerebrales."
metang:
  species_id: 375
