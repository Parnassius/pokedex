      types:
        - normal
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          emerald: "ぜんしんの　ちが　たぎり　じっとしていられない。\n１にちじゅう　のやまを　かけまわり　こうふんを\nしずめないと　よる　ねむれなくなってしまうのだ。"
        en:
          emerald: "It can’t keep still because its blood boils\nwith energy. It runs through the fields\nand mountains all day to calm itself. If it\ndoesn’t, it can’t sleep at night."
        fr:
          emerald: "Son sang, qui circule énergiquement en lui,\nl’empêche de rester en place. Il court à\ntravers les champs et les montagnes pour\nse calmer et trouver le sommeil."
        it:
          emerald: "VIGOROTH è incapace di stare fermo perché\nil sangue gli ribolle nelle vene. Corre in\nlungo e in largo tutto il giorno, e se non\nriesce a calmarsi, di notte non dorme."
        de:
          emerald: "Da sein Blut vor Energie strotzt, kann es\nnicht stillsitzen. Den ganzen Tag rennt es\nüber Felder und Berge, um sich abzuregen.\nSchlägt das fehl, kann es nicht schlafen."
        es:
          emerald: "No puede estarse quieto porque tiene\nla sangre en continua ebullición. Se pasa\nel día corriendo por campos y montañas\npara calmarse y poder dormir por la noche."
slaking:
  species_id: 289
