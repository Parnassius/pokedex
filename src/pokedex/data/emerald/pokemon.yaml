      descriptions:
        jp_kana:
          emerald: "もりの　たいぼくに　すを　つくり　くらす。\nなわばりに　ちかづく　てきを　はげしく　いかく。\nもりの　きを　まもる　ポケモンと　いわれている。"
        en:
          emerald: "It makes its nest in a giant tree in the\nforest. It ferociously guards against\nanything nearing its territory. It is said\nto be the protector of the forest’s trees."
        fr:
          emerald: "Il fait son nid dans les arbres géants et\nprotège férocement son territoire de tout\nce qui s’en approche. On dit qu’il est le\nprotecteur des arbres de la forêt."
        it:
          emerald: "TREECKO fa il nido su enormi alberi nella\nforesta e difende accanitamente il proprio\nterritorio da chiunque si avvicini.\nÈ considerato il protettore degli alberi."
        de:
          emerald: "Es baut in einem Riesenbaum sein Nest.\nJeder Eindringling wird von ihm verjagt,\ndaher nennt man es auch den Wächter der\nBäume."
        es:
          emerald: "Hace su nido en un árbol gigante y\ndefiende ferozmente su territorio\nde cualquier peligro. Dicen que es el\nprotector de los árboles del bosque."
grovyle:
  species_id: 253
  names:
    jp_kana: ジュプトル
