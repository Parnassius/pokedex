      descriptions:
        jp_kana:
          emerald: "あまい　じゅえきを　もとめて　もりに　あつまる。\nてつの　ように　かたい　ひふに　おおわれている。\nじまんの　ツノで　あいてを　なげとばす。"
        en:
          emerald: "They gather in forests seeking the sweet\nsap of trees. It is completely clad in a\nsteel-hard shell. It is proud of its horn,\nwhich it uses to fling foes."
        fr:
          emerald: "Ils se réunissent dans les forêts à la\nrecherche de sève d’arbre. Il est\nextrêmement fier de sa corne qu’il utilise\npour faire voler ses adversaires."
        it:
          emerald: "HERACROSS è ghiotto della dolce linfa degli\nalberi, che trova nelle foreste. È rivestito\nda una corazza dura come l’acciaio e usa\nil corno per scagliare lontano i nemici."
        de:
          emerald: "Es versammelt sich mit seinen Artgenossen\nim Wald, um nach Baumharz zu suchen.\nSKARABORN ist stolz auf sein Horn, mit dem\nes Gegner herumwirft."
        es:
          emerald: "Va en grupo al bosque en busca de la dulce\nsavia de los árboles. Cubierto con una\ncoraza dura como el acero, luce su cuerno\norgulloso y voltea con él a los rivales."
sneasel:
  species_id: 215
