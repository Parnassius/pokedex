      descriptions:
        jp_kana:
          emerald: "あしこしが　きたえられて　２ほんあしに　なった。\nひふが　かんそうすると　よわってしまうため\nどろあそびを　して　すいぶんを　ほきゅうする。"
        en:
          emerald: "Its toughened hind legs enable it to stand\nupright. Because it weakens if its skin\ndries out, it replenishes fluids by playing\nin mud."
        fr:
          emerald: "Ses pattes arrière lui permettent de se\ntenir debout. Comme il ne supporterait\npas que sa peau s’assèche, il passe son\ntemps à jouer dans la boue."
        it:
          emerald: "Grazie alle robuste zampe posteriori,\nriesce a stare ritto in piedi. Si indeboli-\nsce se l’epidermide si secca, perciò\nla mantiene umida giocando nel fango."
        de:
          emerald: "Seine starken Hinterbeine ermöglichen es\nihm, aufrecht zu stehen. Da das Aus-\ntrocknen seiner Haut eine Schwächung\nbedeutet, spielt es gerne im Schlamm."
        es:
          emerald: "Tiene unas patas traseras fortísimas\nque le permiten mantenerse erguido.\nComo se debilita si se le seca la piel, juega\nen el lodo para mantenerse hidratado."
swampert:
  species_id: 260
  names:
    jp_kana: ラグラージ
    en: SWAMPERT
    fr: LAGGRON
    it: SWAMPERT
    de: SUMPEX
