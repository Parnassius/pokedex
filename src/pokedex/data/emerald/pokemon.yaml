      descriptions:
        jp_kana:
          emerald: "ジャングルの　なかでは　てきなしの　つよさ。\nくさきを　だいじに　そだてる　ポケモン。\nひなたぼっこをして　たいおんを　ちょうせつする。"
        en:
          emerald: "In the jungle, its power is without equal.\nThis POKéMON carefully grows trees and\nplants. It regulates its body temperature\nby basking in sunlight."
        fr:
          emerald: "Dans la jungle, sa force est sans égale.\nCe POKéMON prend grand soin des arbres\net des plantes. Il régule sa température\ncorporelle en se prélassant au soleil."
        it:
          emerald: "Nella giungla, nessuno è più potente di\nSCEPTILE. Coltiva amorevolmente alberi\ne piante e regola la sua temperatura\ncorporea crogiolandosi al sole."
        de:
          emerald: "Seine Kraft sucht im Dschungel ihres-\ngleichen. GEWALDRO züchtet vorsichtig\nBäume und Pflanzen. Es reguliert seine\nKörpertemperatur durch Sonnenlicht."
        es:
          emerald: "Cuando está en la selva, posee una fuerza\nsin igual. Este POKéMON se ocupa de que los\nárboles y las plantas crezcan bien. Regula\nsu temperatura corporal con la luz del sol."
torchic:
  species_id: 255
  names:
    jp_kana: アチャモ
