      descriptions:
        jp_kana:
          emerald: "シェルダーが　かみついて　いるので　しっぽで\nエサを　つれなくなった　ヤドランは　しぶしぶ\nすいちゅうを　およいで　エサを　つかまえている。"
        en:
          emerald: "Its tail has a SHELLDER firmly attached\nwith a bite. As a result, the tail can’t be\nused for fishing anymore. This forces it\nto reluctantly swim and catch prey."
        fr:
          emerald: "FLAGADOSS a un KOKIYAS solidement\nattaché à sa queue. Du coup, il ne peut\nplus l’utiliser pour pêcher et est donc\nobligé de nager pour attraper ses proies."
        it:
          emerald: "SLOWBRO non può usare la coda per pescare\nperché ha uno SHELLDER attaccato ad essa.\nAnche se di malavoglia, è quindi costretto\na nuotare per catturare una preda."
        de:
          emerald: "An LAHMUS’ Rute hat sich ein MUSCHAS fest-\ngebissen, daher kann es damit nicht mehr\nAngeln. Es ist gezwungen, umherzuschwim-\nmen und Beute zu finden."
        es:
          emerald: "Lleva en la cola un SHELLDER enganchado\npor los dientes. Como SLOWBRO no puede\npescar con la cola, se mete en el agua\nde mala gana en busca de sus presas."
magnemite:
  species_id: 81
