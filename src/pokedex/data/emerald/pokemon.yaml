      descriptions:
        jp_kana:
          emerald: "２どと　あえない　ははおやの　おもかげを\nまんげつに　みつけて　なきごえを　あげる。\nかぶっている　ホネの　しみは　なみだの　あと。"
        en:
          emerald: "It pines for the mother it will never see\nagain. Seeing a likeness of its mother in\nthe full moon, it cries. The stains on the\nskull it wears are from its tears."
        fr:
          emerald: "Sa maman lui manque terriblement et il ne la\nreverra jamais. La lune le fait pleurer, car\nelle lui rappelle sa mère. Les taches sur\nson crâne sont les marques de ses larmes."
        it:
          emerald: "CUBONE si strugge per la madre che non\nrivedrà più. Piange alla luna piena che \ngli ricorda la madre. Le macchie sul \nteschio sono dovute alle lacrime copiose."
        de:
          emerald: "TRAGOSSO vermisst seine tote Mutter.\nSieht es im Vollmond das Ebenbild seiner\nMutter, weint es. Die Flecken auf dem\nTotenkopf stammen von Tränen."
        es:
          emerald: "Le apena no volver a ver a su madre. La luna\nllena le recuerda a ella y se pone a chillar.\nLos churretes que tiene en el cráneo que\nlleva puesto son debidos a sus lágrimas."
marowak:
  species_id: 105
  names:
    jp_kana: ガラガラ
