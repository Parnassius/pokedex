      descriptions:
        jp_kana:
          emerald: "いちど　はしりだしたら　とまらない。\nのうみそが　ちいさいので　はしっている　りゆうを\nわすれてしまうほど　あたまが　わるいのだ。"
        en:
          emerald: "Once it starts running, it doesn’t stop.\nIts tiny brain makes it so stupid that it\ncan’t remember why it started running in\nthe first place."
        fr:
          emerald: "Un RHINOCORNE qui commence à courir\nne s’arrête jamais. Il est si stupide qu’il\noublie tout le temps pourquoi il a\ncommencé à courir."
        it:
          emerald: "Dotato di un cervello minuto, RHYHORN non\nè affatto brillante. Corre senza mai\nfermarsi, ma a volte durante la corsa\nfinisce col dimenticarsi dov’era diretto."
        de:
          emerald: "Wenn es rennt, kann es nicht mehr\naufhören. Da sein Gehirn so klein ist,\nkann es sich nicht mehr daran erinnern,\nwarum es gerannt ist."
        es:
          emerald: "Una vez que comienza a correr, no para:\nsu minúsculo cerebro lo hace tan bobo\nque ni siquiera es capaz de acordarse\nde por qué empezó a hacerlo."
rhydon:
  species_id: 112
  names:
    jp_kana: サイドン
