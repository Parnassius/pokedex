        en:
          emerald: "It climbs mountain paths using only the\npower of its arms. Because they look just\nlike boulders lining paths, hikers may step\non them without noticing."
        fr:
          emerald: "Il grimpe les chemins de montagne à la\nseule force de ses bras. Il se fait souvent\npiétiner par les promeneurs qui le\nprennent pour un vulgaire rocher."
        it:
          emerald: "GEODUDE è in grado di arrampicarsi su\nstrade di montagna con la sola forza delle\nbraccia. Poiché è simile ad una roccia, può\naccadere di inciamparvi involontariamente."
        de:
          emerald: "Es erklimmt Berge und setzt dabei nur\nseine Arme ein. Da es Felsen, die am Weges-\nrand liegen, sehr ähnlich sieht, treten\nWanderer oft darauf, ohne es zu bemerken."
        es:
          emerald: "Sube caminos de montaña usando sólo la\nfuerza de los brazos. Como parece un canto\nrodado que delimita el camino, algunos\nmontañeros se llegan a tropezar con él."
graveler:
  species_id: 75
  names:
