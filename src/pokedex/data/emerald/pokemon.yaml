        jp_kana:
          emerald: "てつくずも　しょうかしてしまう　いえきを　もつ。\nじぶんの　からだと　おなじ　おおきさの　ものも\nひとくちで　のみこむ　ことが　できる。"
        en:
          emerald: "This POKéMON’s stomach fluid can even\ndigest scrap iron. In one gulp, it can\nswallow something that is as large as\nitself."
        fr:
          emerald: "L’estomac de ce POKéMON peut même\ndigérer des morceaux de métal.\nD’une bouchée, il peut avaler quelque\nchose d’aussi gros que lui."
        it:
          emerald: "In un sol boccone, GULPIN può ingoiare\noggetti delle sue stesse dimensioni.\nI succhi del suo stomaco, poi, riescono a\nsciogliere persino dei pezzi di ferro."
        de:
          emerald: "Die Magensäure dieses POKéMON ist so\nstark, dass sie selbst Gusseisen\nzersetzen kann. Es kann einen Gegenstand\nseiner Größe auf einmal verschlucken."
        es:
          emerald: "Con el líquido que tiene en el estómago,\npuede digerir hasta hierro de desecho.\nEs capaz de tragarse de una sentada\ncualquier cosa que lo iguale en tamaño."
swalot:
  species_id: 317
