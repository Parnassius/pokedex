      abilities:
        - guts
      descriptions:
        jp_kana:
          emerald: "まいにち　トレーニング　しないと　ストレスが\nたまってしまうので　トレーナーは　そだてる　とき\nスケジュールかんりに　くふうが　ひつようだ。"
        en:
          emerald: "TYROGUE become stressed out if they do\nnot get to train every day. When raising\nthis POKéMON, the TRAINER must establish\na regular training schedule."
        fr:
          emerald: "Il devient nerveux s’il ne s’entraîne pas\ntous les jours. Lorsqu’un DRESSEUR élève\nce POKéMON, il doit établir et appliquer un\nprogramme d’entraînement très complet."
        it:
          emerald: "TYROGUE ha bisogno di allenarsi ogni giorno\nper scaricare la sua energia. Chi lo alleva\ndeve stabilire allenamenti metodici e \nregolari."
        de:
          emerald: "RABAUZ muss jeden Tag trainieren, sonst\nist es nicht ausgelastet. Wenn man es\ntrainiert, muss man zahlreiche\nTrainingsmethoden einsetzen."
        es:
          emerald: "Se pone demasiado nervioso si no lo sacan\na entrenarse cada día. Por esta razón, su\nENTRENADOR debe mantener una rutina\nde entrenamiento regular durante la cría."
hitmontop:
  species_id: 237
  names:
    jp_kana: カポエラー
    en: HITMONTOP
    fr: KAPOERA
    it: HITMONTOP
    de: KAPOERA
    es: HITMONTOP
