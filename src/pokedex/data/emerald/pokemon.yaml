        en:
          emerald: "It swims in the sea by swallowing water,\nthen jetting it out toward the rear.\nThe CLOYSTER shoots spikes from its\nshell using the same system."
        fr:
          emerald: "CRUSTABRI est capable de se déplacer dans\nles fonds marins en avalant de l’eau et en\nla rejetant vers l’arrière. Il envoie des\npointes en utilisant la même méthode."
        it:
          emerald: "CLOYSTER nuota in mare aperto ingerendo\nacqua dalla bocca per poi espellerla a mo’\ndi propulsore. Usa lo stesso metodo per \nsparare punte dalla conchiglia."
        de:
          emerald: "AUSTOS kann im Meerwasser schwimmen,\nindem es Wasser schluckt und wieder\nherausspritzt. Es kann sich auf diese\nWeise auch mit Stacheln verteidigen."
        es:
          emerald: "Puede nadar por el mar tragando agua y\nexpulsándola por el conducto que tiene en\nla parte trasera. Del mismo modo lanza\nlos pinchos que tiene sobre la concha."
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
