        en:
          emerald: "In forests, it is said that there are many\nstreams and towering trees where an\nURSARING gathers food. It walks through\nits forest collecting food every day."
        fr:
          emerald: "On dit que les URSARING trouvent leur\nnourriture dans les cours d’eau et les\ngrands arbres des forêts. Ils errent dans\nla forêt pour chercher de la nourriture."
        it:
          emerald: "Si dice che URSARING viva in foreste con\nmolti corsi d’acqua e alberi giganti dove\nnasconde le scorte di cibo. Si aggira\nsempre nella foresta cercando alimenti."
        de:
          emerald: "In den von URSARING bewohnten Wäldern\ngibt es viele Flüsse und Bäume, in denen\nes Nahrung findet. Es läuft täglich durch\nden Wald, um nach Essbarem zu suchen."
        es:
          emerald: "En los bosques que habita, dicen que hay\narroyos y árboles gigantes donde guarda\nsu alimento. A diario, pasea por el bosque\npara recolectar comida."
slugma:
  species_id: 218
