        en:
          emerald: "Its entire body is made of Antarctic ice.\nAfter extensive studies, researchers\nbelieve the ice was formed during an\nice age."
        fr:
          emerald: "Tout son corps est constitué de\nglace provenant de l’Antarctique. Les\nscientifiques pensent que ce POKéMON\ns’est constitué pendant l’âge de glace."
        it:
          emerald: "Il suo corpo è interamente costituito da\nghiaccio antartico che, secondo gli\nstudiosi, si sarebbe formato durante\nl’era glaciale."
        de:
          emerald: "Sein Körper besteht aus Eis der Antarktis.\nAusgiebige Forschungen haben ergeben,\ndass dieses Eis aus einer Eiszeit stammt."
        es:
          emerald: "Está formado en su totalidad por hielo\nde la Antártica. Todas las investigaciones\nparecen indicar que dicho hielo procede\nde alguna glaciación."
registeel:
  species_id: 379
