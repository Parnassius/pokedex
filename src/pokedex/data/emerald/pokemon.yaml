        en:
          emerald: "A LARVITAR is born deep under the ground.\nIt must eat its way through the soil above\nand reach the surface for it to see its\nparents’ faces."
        fr:
          emerald: "Il naît sous terre. Pour remonter à la\nsurface, il doit manger la terre au-dessus\nde lui. Jusqu’à ce qu’il y parvienne, il ne\npeut pas voir le visage de ses parents."
        it:
          emerald: "LARVITAR nasce nelle viscere della terra.\nPer emergere in superficie si fa strada\ninghiottendo terra. Non vede il volto\ndei propri genitori finché non emerge."
        de:
          emerald: "LARVITAR wird unter der Erde geboren.\nUm an die Oberfläche zu gelangen, muss\nes sich durch das Erdreich fressen. Erst\ndann bekommt es seine Eltern zu Gesicht."
        es:
          emerald: "Nace bajo tierra a gran profundidad y se\nabre paso hasta la superficie comiendo lo\nque encuentra en su camino. Hasta que\nno llega arriba, no conoce a sus padres."
pupitar:
  species_id: 247
