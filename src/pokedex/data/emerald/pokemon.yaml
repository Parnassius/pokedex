        jp_kana:
          emerald: "しっぽの　あかりを　ともしながら　しゅうだんで\nよぞらに　きかがくてきな　もようを　えがく。\nいけの　みずが　よごれると　すみかを　うつす。"
        en:
          emerald: "With their taillights lit, VOLBEAT fly in\na swarm, drawing geometric designs in the\nnight sky. They move their nests if their\npond water becomes dirty."
        fr:
          emerald: "Les MUCIOLE volent et dessinent des\nfigures géométriques dans le ciel à l’aide\nde la lumière sur leur queue. Ils changent\nd’étang si l’eau n’est pas assez propre."
        it:
          emerald: "Insieme ai suoi simili, VOLBEAT traccia\nfigure geometriche nel cielo notturno con\nla sua coda illuminata. Se l’acqua dello\nstagno si sporca, fa il suo nido altrove."
        de:
          emerald: "Mit leuchtenden Schwanzenden fliegt\nVOLBEAT durch den Nachthimmel und\nzeichnet dabei geometrische Muster."
        es:
          emerald: "Los VOLBEAT vuelan en enjambres dibujando\ncon la luz de la cola formas geométricas en\nel cielo nocturno. Si la charca en la que\nviven se ensucia, se mudan a otro sitio."
illumise:
  species_id: 314
