      descriptions:
        jp_kana:
          emerald: "たいぼくの　ねもとに　すみかを　つくる。\nまっくらな　ちちゅうの　ようすを\nヒゲの　ような　しょっかくで　さぐる。"
        en:
          emerald: "It makes its nest at the roots of a mighty\ntree. Using its whiskerlike antennae, it\nprobes its surroundings in the\npitch-black darkness of soil."
        fr:
          emerald: "Il fait son nid aux pieds des arbres\nimposants. A l’aide de ses antennes,\nil sonde son environnement dans\nl’obscurité des sous-sols."
        it:
          emerald: "NINCADA fa il suo rifugio tra le radici di\ngiganteschi alberi. Si muove nell’oscurità\nsottoterra sondando il terreno con le sue\nantenne, che sono simili a dei baffi."
        de:
          emerald: "Am Fuße von mächtigen Bäumen baut es\nsein Nest. Mit seinen schnurrbartähnlichen\nFühlern überprüft es die Umgebung aus\nder dunklen Erde."
        es:
          emerald: "Hace su nido en las raíces de un árbol\nresistente. Tiene unas antenas con forma\nde bigotes que usa para examinar\nel oscuro terreno que le rodea."
ninjask:
  species_id: 291
