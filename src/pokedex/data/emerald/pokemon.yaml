        jp_kana:
          emerald: "しっぽで　エサを　つつみ　もちはこぶ　ポケモン。\nデリバードに　エサを　わけてもらった　おかげで\nエベレストを　のぼりきれた　ぼうけんかが　いた。"
        en:
          emerald: "It carries food bundled up in its tail.\nThere was a famous explorer who\nmanaged to scale Mt. Everest thanks\nto a DELIBIRD sharing its food."
        fr:
          emerald: "Il transporte sa nourriture dans sa queue.\nUn célèbre explorateur réussit à atteindre\nle sommet de l’Everest grâce à l’un d’eux,\nqui partagea sa nourriture avec lui."
        it:
          emerald: "DELIBIRD trasporta il cibo avvolgendolo\nnella coda. Si narra di un esploratore che\nriuscì a raggiungere la vetta dell’Everest,\ngrazie alle riserve di questo POKéMON."
        de:
          emerald: "BOTOGEL sammelt seine Nahrung im Schweif.\nEin Entdecker bestieg einst dank eines\nBOTOGELs, das seine Nahrung mit ihm\nteilte, einen der höchsten Berge der Welt."
        es:
          emerald: "Usa la cola a modo de saco para llevar su\nalimento. Una vez, un escalador consiguió\ncoronar el Everest porque uno de estos\nPOKéMON compartió sus alimentos con él."
mantine:
  species_id: 226
