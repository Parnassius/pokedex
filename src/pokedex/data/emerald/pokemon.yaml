        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          emerald: "からだは　ちいさいが　ぜんしんが　きんにくの\nかたまりで　とても　ちからづよい　ポケモン。\nてつの　ような　あたまで　ずつきを　くりだす。"
        en:
          emerald: "Although it is small, this POKéMON is very\npowerful because its body is a bundle of\nmuscles. It launches head-butts with its\nironlike skull."
        fr:
          emerald: "Les muscles de ce petit POKéMON le\nrendent très puissant. Ses coups de tête\nsont redoutables grâce à son crâne solide\ncomme l’acier."
        it:
          emerald: "Malgrado le sue piccole dimensioni, BAGON è\nmolto potente perché il suo corpo è un\ninsieme di muscoli. Dà di continuo testate\ncon il suo cranio duro come l’acciaio."
        de:
          emerald: "Obwohl es sehr klein ist, ist es sehr\nkräftig, da sein Körper ein Muskelbündel\nist. Es verteilt Kopfstöße mit seinem\nstahlharten Schädel."
        es:
          emerald: "Aunque pequeño, este POKéMON es muy\nfuerte porque su cuerpo es puro músculo.\nPropina cabezazos con el cráneo, que\nes tan duro como el hierro."
shelgon:
  species_id: 372
  names:
    jp_kana: コモルー
    en: SHELGON
    fr: DRACKHAUS
    it: SHELGON
    de: DRASCHEL
    es: SHELGON
  forms:
    shelgon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 100
        special_attack: 60
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          emerald: "エサを　ほとんど　たべずに　しんかを　まつ。\nくうふくに　たえる　ことで　つよくなる。\nしんかの　しゅんかん　カラが　はがれおちる。"
        en:
          emerald: "It hardly eats while it awaits evolution.\nIt becomes hardier by enduring hunger.\nIts shell peels off the instant it begins\nto evolve."
        fr:
          emerald: "En attendant son évolution, ce POKéMON\nmange très peu pour s’endurcir. Sa coquille\nse détache dès qu’il commence à évoluer."
        it:
          emerald: "Quando è prossimo all’evoluzione, SHELGON\nnon mangia quasi nulla e in questo modo si\nirrobustisce. Quando si evolve, la sua\nconchiglia comincia a staccarsi."
        de:
          emerald: "Es isst kaum, wenn es sich auf seine\nEntwicklung vorbereitet. Dadurch wird\nes noch zäher. Bei der Entwicklung\nwird die Haut sofort abgestreift."
        es:
          emerald: "Apenas come cuando va a evolucionar.\nSoportar el hambre lo vuelve resistente.\nCuando empieza a evolucionar, comienza\na perder su coraza."
salamence:
  species_id: 373
