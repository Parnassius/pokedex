      descriptions:
        jp_kana:
          emerald: "にんげんが　かがくの　ちからで　つくりだした。\nじんこう　ちのうを　もたせたので　あたらしい\nしぐさや　かんじょうを　ひとりで　おぼえていく。"
        en:
          emerald: "It was created by humans using the power\nof science. It has been given artificial\nintelligence that enables it to learn new\ngestures and emotions on its own."
        fr:
          emerald: "PORYGON2 fut créé par des humains. Ce\nPOKéMON a été doté d’une intelligence\nartificielle qui lui permet d’apprendre des\nmouvements et des émotions par lui-même."
        it:
          emerald: "PORYGON2 è una creatura artificiale\nfrutto della scienza. È stato dotato\ndi un’intelligenza che gli consente\nd’imparare nuove abilità ed emozioni."
        de:
          emerald: "PORYGON2 wurde in einem wissenschaft-\nlichen Experiment von Menschen erzeugt.\nEs verfügt über künstliche Intelligenz\nund kann so Gesten und Gefühle erlernen."
        es:
          emerald: "PORYGON2 fue creado por el hombre gracias\na los avances científicos. Su inteligencia\nartificial le permite aprender gestos y\nemociones totalmente nuevas."
stantler:
  species_id: 234
  names:
    jp_kana: オドシシ
