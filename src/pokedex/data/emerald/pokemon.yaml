        en:
          emerald: "It is always seen with a stick from a plant.\nApparently, there are good sticks and bad\nsticks. This POKéMON occasionally fights\nwith others over choice sticks."
        fr:
          emerald: "On le voit tout le temps avec une tige,\nrécupérée sur une plante quelconque.\nIl y a des bonnes et des mauvaises tiges.\nElles peuvent faire l’objet de disputes."
        it:
          emerald: "FARFETCH’D ha sempre con sé lo stelo di\nqualche pianta. Pare che alcuni steli siano\nmigliori di altri. Spesso lotta con altri \nPOKéMON per avere lo stelo migliore."
        de:
          emerald: "PORENTA trifft man immer mit einer Lauch-\nstange an. Es gibt gute und schlechte\nStangen. Dieses POKéMON kämpft mit\nHilfe seiner Stange gegen seine Gegner."
        es:
          emerald: "Lleva siempre una especie de palo de algún\ntipo de planta y dicen que éste puede ser\nmejor o peor. Tiene fama de haber luchado\ncontra otros POKéMON por algún palo."
doduo:
