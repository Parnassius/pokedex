        en:
          emerald: "Its body is almost entirely composed of\nwater. It ensnares its foe with its two\nlong tentacles, then stabs with the poison\nstingers at their tips."
        fr:
          emerald: "Son corps est presque entièrement\ncomposé d’eau. Il enlace ses adversaires\nde ses deux longs tentacules avant de\nleur injecter du poison."
        it:
          emerald: "Il corpo di TENTACOOL è composto quasi\ninteramente di acqua. Afferra ed avvelena\nla preda con i lunghi tentacoli che sono\ndotati di pungenti aculei sulle punte."
        de:
          emerald: "Sein Körper besteht nahezu komplett aus\nWasser. Es umschlingt seine Gegner mit\nseinen langen Tentakeln und injiziert\nanschließend sein Gift."
        es:
          emerald: "Se compone casi enteramente de agua.\nAtrapa a su enemigo con sus dos largos\ntentáculos y le clava los venenosos\naguijones que tiene en los extremos."
tentacruel:
  species_id: 73
