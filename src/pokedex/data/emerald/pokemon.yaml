      descriptions:
        jp_kana:
          emerald: "サイコパワーを　じざいに　あやつる　ポケモン。\nねむっている　ときも　とびはねている。\nちちゅうに　はえる　キノコが　だいこうぶつ。"
        en:
          emerald: "A POKéMON that manipulates psychic power\nat will. It doesn’t stop bouncing even when\nit is asleep. It loves eating mushrooms\nthat grow underground."
        fr:
          emerald: "Ce POKéMON utilise les pouvoirs\npsychiques à sa guise. Il ne s’arrête\njamais de rebondir, même en dormant. Ses\nmets préférés sont les champignons."
        it:
          emerald: "SPOINK ha poteri psichici che usa a proprio\npiacimento. Non smette mai di rimbalzare,\nneppure quando dorme. Si nutre di funghi\nche crescono sottoterra."
        de:
          emerald: "SPOINK kann nach Belieben Psykräfte\nmanipulieren. Selbst wenn es schläft,\nhüpft es. Am liebsten isst es Pilze,\ndie unter der Erde wachsen."
        es:
          emerald: "Manipula energía psicoquinética a su\nantojo. No deja de botar ni cuando está\ndormido. Le encanta comer setas que\ncrecen bajo tierra."
grumpig:
  species_id: 326
