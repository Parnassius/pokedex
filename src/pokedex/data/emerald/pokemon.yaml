        - ghost
      egg_groups:
        - amorphous
      abilities:
        - insomnia
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          emerald: "うしみつどきに　なると　うらみや　ねたみの\nかんじょうを　もとめて　さまよう　ポケモン。\nあさひが　のぼると　すみかに　もどっていく。"
        en:
          emerald: "This POKéMON roams about deep in the\nnight seeking such negative emotions as\ngrudges and envy. It retreats to its nest\nwhen the sun begins to rise."
        fr:
          emerald: "POLICHOMBR erre la nuit à la recherche\nd’émotions négatives telles que la rancune\nou la jalousie. Il regagne son repaire aux\npremiers rayons de soleil."
        it:
          emerald: "SHUPPET si aggira nel cuore della notte in\ncerca di sentimenti turpi quali la vendetta\ne l’invidia, per ritirarsi poi nel suo nido\nallo spuntar del sole."
        de:
          emerald: "SHUPPET schleicht durch die finstere\nNacht und sucht nach negativen Emotionen\nwie Neid und Missgunst. Bei Sonnenaufgang\nkehrt es in sein Nest zurück."
        es:
          emerald: "Este POKéMON deambula en la oscuridad\nde la noche en busca de sentimientos\nnegativos, como el rencor y la envidia.\nAntes del amanecer, se retira a su hogar."
banette:
  species_id: 354
  names:
    jp_kana: ジュペッタ
    en: BANETTE
