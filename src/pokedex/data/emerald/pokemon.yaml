        jp_kana:
          emerald: "すぐに　ちからくらべを　いどむ　しゅうせい。\nせんろに　たちふさがり　はしってくる　れっしゃを\nつっぱりで　おしとどめた　ことが　あるぞ。"
        en:
          emerald: "It has the habit of challenging others\nwithout hesitation to tests of strength.\nIt’s been known to stand on train tracks\nand stop trains using forearm thrusts."
        fr:
          emerald: "Sans hésitation, il défie ceux qu’il croise\npour tester leur force. Il est connu pour\npouvoir arrêter un train en marche à la\nseule force de ses bras."
        it:
          emerald: "HARIYAMA ha l’abitudine di sfidare gli altri\nin prove di forza. Talvolta, è stato visto\nfermare un treno sui binari con la sola\nforza dei suoi avambracci."
        de:
          emerald: "Gewöhnlich zögert es nicht, andere zu ei-\nnem Kraftvergleich herauszufordern. Es\nist dafür bekannt, sich auf Gleise zu stel-\nlen und Züge mit Armstößen aufzuhalten."
        es:
          emerald: "Tiene la costumbre de desafiar a otros sin\nmedir la fuerza del adversario. Alguna vez\nse ha montado sobre las vías del tren\ny parado trenes a base de puñetazos."
azurill:
  species_id: 298
  names:
    jp_kana: ルリリ
