        en:
          emerald: "CARVANHA attack ships in swarms, making\nthem sink. Although it is said to be a very\nvicious POKéMON, it timidly flees as soon\nas it finds itself alone."
        fr:
          emerald: "Les CARVANHA unissent leurs forces\npour faire couler les bateaux. Ils sont\ntrès méchants en groupe mais fuient\ntimidement dès qu’ils se retrouvent seuls."
        it:
          emerald: "I CARVANHA si lanciano in branco contro\nle navi, facendole affondare. Sebbene sia\nconsiderato un POKéMON feroce, scappa\nnon appena si trova lontano dal gruppo."
        de:
          emerald: "Schiffe werden von KANIVANHA in Schwär-\nmen angegriffen und versenkt. Obwohl es\nein sehr brutales POKéMON sein soll,\nergreift es die Flucht, wenn es allein ist."
        es:
          emerald: "Los CARVANHA van en grupo atacando\nbarcos hasta que los hunden. Aunque dicen\nque es un POKéMON muy violento, huye presa\nde la timidez en cuanto se queda solo."
sharpedo:
