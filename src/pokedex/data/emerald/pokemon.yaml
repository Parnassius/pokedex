      descriptions:
        jp_kana:
          emerald: "あたたかい　みなみかぜに　のって　うみを　こえ\nがいこくまで　とんでいってしまう　ポケモン。\nつめたい　くうきに　ふれると　じめんに　おりる。"
        en:
          emerald: "JUMPLUFF ride warm southern winds to\ncross the sea and fly to foreign lands.\nThis POKéMON lands when it encounters\ncold air while it is floating."
        fr:
          emerald: "COTOVOL traverse la mer, porté par\nles vents, pour découvrir de nouveaux\nterritoires. Ce POKéMON se rapproche\ndu sol quand le vent est trop froid."
        it:
          emerald: "JUMPLUFF attraversa il mare grazie alle\ncorrenti d’aria calda, volando così verso\nterre lontane. Ridiscende a terra quando,\nfluttuando, incontra una corrente fredda."
        de:
          emerald: "PAPUNGHA nutzt den Südwind, um das Meer\nzu überqueren und in ferne Länder zu flie-\ngen. Es sinkt zu Boden, wenn es während\ndes Fluges auf kalte Luftschichten stößt."
        es:
          emerald: "JUMPLUFF se vale de los cálidos vientos\ndel sur para volar a tierras lejanas.\nSi llega a zonas de aire frío en pleno\nvuelo, descenderá y tomará tierra."
aipom:
  species_id: 190
