      descriptions:
        jp_kana:
          emerald: "はつでんしょに　たいりょうはっせいする。\nでんきを　たべてしまうため　ちかくの　まちでは\nだいていでんが　おこり　おおさわぎに　なる。"
        en:
          emerald: "They appear in great numbers at electric\npower plants. Because they feed on\nelectricity, they cause massive and\nchaotic blackouts in nearby cities."
        fr:
          emerald: "Ils apparaissent en grand nombre près\ndes centrales électriques. Comme ils\nse nourrissent d’électricité, ils causent\nd’énormes pannes dans les villes voisines."
        it:
          emerald: "Nutrendosi di elettricità, gli ELECTRODE si\naggirano numerosi attorno alle centrali\nelettriche, talvolta causando blackout\ne ingenti disagi nelle città circostanti."
        de:
          emerald: "In der Umgebung von Kraftwerken kann man\nsie sehr häufig antreffen. Da sie sich von\nElektrizität ernähren, können sie\nStromausfälle in Städten verursachen."
        es:
          emerald: "Se agrupa con muchos otros junto a las\nplantas de energía eléctrica. Como se\nalimenta de electricidad, causa grandes y\ncaóticos apagones en ciudades próximas."
exeggcute:
  species_id: 102
