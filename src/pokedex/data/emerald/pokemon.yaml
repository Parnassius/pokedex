        en:
          emerald: "While it has strong psychic abilities and\nhigh intelligence, an ALAKAZAM’s muscles\nare very weak. It uses psychic power to\nmove its body."
        fr:
          emerald: "Ce POKéMON est doté de pouvoirs\npsychiques et d’une grande intelligence\nqui compensent sa faiblesse physique.\nIl utilise ses pouvoirs pour se déplacer."
        it:
          emerald: "ALAKAZAM è dotato di un’intelligenza e di\npoteri psichici fuori dal comune, dei quali\nsi serve per muoversi. I suoi muscoli,\ninvece, sono molto deboli."
        de:
          emerald: "Im Gegensatz zu seinen enormen Psy-\nkräften und seiner hohen Intelligenz,\nsind seine Muskeln unterentwickelt. Es\nbewegt sich mittels Psykraft."
        es:
          emerald: "Aunque tiene una gran capacidad psíquica\ny una inteligencia excepcional, la\nmusculatura de ALAKAZAM es muy débil.\nPara moverse, utiliza poderes psíquicos."
