      descriptions:
        jp_kana:
          emerald: "やわらかい　からだは　とても　よく　はずむ。\nいっしょうけんめい　うたいつづけると\nぜんしんが　こい　ピンクいろに　そまっていく。"
        en:
          emerald: "Its soft and pliable body is very bouncy.\nWhen it sings continuously with all its\nmight, its body steadily turns a deepening\npink color."
        fr:
          emerald: "Son corps doux et souple est très\nélastique. Quand il chante de toutes ses\nforces, son corps se couvre d’un rose\nprofond."
        it:
          emerald: "Il corpo di IGGLYBUFF è morbido ed\nelastico. Quando canta a squarciagola\nsenza fermarsi, il suo corpo si colora\ndi un rosa intenso ed uniforme."
        de:
          emerald: "Sein weicher und elastischer Körper ist\nsehr federnd. Singt es mit voller Stimme,\nändert sich seine Körperfarbe zu einem\nintensiven Pink."
        es:
          emerald: "Es suave, flexible y capaz de botar.\nCuando canta sin parar con todas sus\nfuerzas, se va poniendo de un color\nrosa cada vez más intenso."
togepi:
  species_id: 175
