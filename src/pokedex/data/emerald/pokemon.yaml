      egg_groups:
        - human_like
      abilities:
        - soundproof
      held_items:
        rare: leppa_berry
      descriptions:
        jp_kana:
          emerald: "めに　みえない　ものを　みぶりで　そこに　あると\nしんじこませる　パントマイムの　たつじん。\nしんじさせた　ものは　ほんとうに　あらわれる。"
        en:
          emerald: "A MR. MIME is a master of pantomime. It can\nconvince others that something unseeable\nactually exists. Once believed, the\nimaginary object does become real."
        fr:
          emerald: "M. MIME est un pantomime hors pair. Il\nfait croire aux gens que quelque chose\nd’invisible existe réellement. Cet objet\nimaginaire devient alors réel."
        it:
          emerald: "MR. MIME è un esperto di mimica. Con la\ngestualità convince l’osservatore dell’\nesistenza di oggetti invisibili che saranno\npercepiti come reali."
        de:
          emerald: "PANTIMOS ist ein Meister der Pantomime.\nEs kann den Zuschauer glauben machen,\ndass etwas Unsichtbares existiert. Das\nObjekt manifestiert sich dann auch."
        es:
          emerald: "Domina la pantomima. Con sus gestos puede\nconvencer a sus espectadores de la\nexistencia de algo invisible y, cuando se lo\ncreen, las ilusiones se hacen realidad."
scyther:
  species_id: 123
  names:
    jp_kana: ストライク
    en: SCYTHER
    fr: INSECATEUR
    it: SCYTHER
    de: SICHLOR
    es: SCYTHER
  forms:
    scyther:
      form_id: 0
      base_stats:
        hp: 70
        attack: 110
        defense: 80
        special_attack: 55
        special_defense: 80
        speed: 105
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
      descriptions:
        jp_kana:
          emerald: "めにも　とまらぬ　スピードが　りょううでの\nカマの　きれあじを　さらに　するどく　するのだ。\nひとふり　すれば　たいぼくも　まっぷたつだ。"
        en:
          emerald: "Its blindingly fast speed adds to the\nsharpness of its twin forearm scythes.\nThe scythes can slice through thick logs\nin one wicked stroke."
        fr:
          emerald: "Il est incroyablement rapide. Sa vitesse\naméliore l’efficacité des deux lames sur\nses avant-bras. Elles peuvent trancher\nun énorme tronc d’arbre en un coup."
        it:
          emerald: "SCYTHER è veloce come una saetta. La\nrapidità rende le falci sulle zampe ante-\nriori così efficaci da tranciare con un\ncolpo secco persino un tronco secolare."
        de:
          emerald: "SICHLOR ist unheimlich schnell. Dadurch\nwerden die beiden Sensen an seinen Unter-\narmen noch effektiver. Es kann damit in\nSekundenschnelle Baumstämme zerteilen."
        es:
          emerald: "Es espectacular ver lo rápido que es. Su\nvelocidad potencia las guadañas que tiene\nen los brazos, de por sí contundentes,\npues rebanan gruesos troncos de un tajo."
jynx:
  species_id: 124
  names:
    jp_kana: ルージュラ
    en: JYNX
    fr: LIPPOUTOU
    it: JYNX
    de: ROSSANA
    es: JYNX
  forms:
    jynx:
      form_id: 0
      base_stats:
        hp: 65
        attack: 50
        defense: 35
        special_attack: 115
        special_defense: 95
        speed: 95
      evs_yield:
