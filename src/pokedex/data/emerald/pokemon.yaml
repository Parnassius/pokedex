        jp_kana:
          emerald: "ゴマゾウの　おおきな　みみは　うちわの　かわり。\nあつくなると　ぱたぱた　あおいで　すずむ。\nこどもでも　ちからは　とても　つよい。"
        en:
          emerald: "PHANPY’s big ears serve as broad fans.\nWhen it becomes hot, it flaps the ears\nbusily to cool down. Even the young are\nvery strong."
        fr:
          emerald: "PHANPY utilise ses oreilles comme de\ngros éventails. Quand il fait chaud, il les\nsecoue tranquillement pour se rafraîchir.\nMême les jeunes sont très forts."
        it:
          emerald: "I PHANPY usano le loro enormi orecchie a\nmo’ di ventaglio, sbattendole per\nrinfrescarsi nelle giornate afose. Sono \nPOKéMON molto forti, anche in tenera età."
        de:
          emerald: "PHANPYs große Ohren dienen als Fächer.\nWird es ihm zu warm, fächelt es mit den\nOhren, um sich abzukühlen. Selbst junge\nExemplare sind schon sehr stark."
        es:
          emerald: "Las enormes orejas que tiene PHANPY\nle sirven para abanicarse. Cuando tiene\ncalor, las usa para refrescarse. Ya\ndesde pequeño tiene mucha fuerza."
donphan:
  species_id: 232
