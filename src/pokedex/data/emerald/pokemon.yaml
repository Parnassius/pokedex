        en:
          emerald: "One of the ancient and long-since-extinct\nPOKéMON that have been regenerated\nfrom fossils by humans. If attacked,\nit withdraws into its hard shell."
        fr:
          emerald: "C’est un ancien POKéMON disparu depuis\nlongtemps qui a été ressuscité à partir\nde fossiles. Lorsqu’il est attaqué par un\nennemi, il se rétracte dans sa coquille."
        it:
          emerald: "OMANYTE è uno degli antichi POKéMON\nestinti rigenerati di recente dall’uomo.\nSe viene aggredito da un nemico, si ritira\nall’interno della sua dura corazza."
        de:
          emerald: "AMONITAS ist ein PKMN, das seit langer Zeit\nausgestorben war, aber von den Menschen\naus Fossilien reproduziert wurde. Bei An-\ngriff verkriecht es sich in sein Gehäuse."
        es:
          emerald: "Es un POKéMON ancestral que se extinguió\nhace mucho tiempo y se recuperó a partir\nde fósiles. Si le atacan, se esconderá\ndentro de su dura concha."
omastar:
