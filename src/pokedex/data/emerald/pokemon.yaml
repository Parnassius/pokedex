      descriptions:
        jp_kana:
          emerald: "なわばりいしきが　とても　つよいので　スピアーの\nすみかには　ちかづかない　ほうが　みの　ためだ。\nおこると　しゅうだんで　おそって　くるぞ。"
        en:
          emerald: "A BEEDRILL is extremely territorial.\nFor safety reasons, no one should \never approach its nest. If angered,\nthey will attack in a swarm."
        fr:
          emerald: "DARDARGNAN est extrêmement possessif.\nIl vaut mieux ne pas toucher son nid si\non veut éviter d’avoir des ennuis. En\ncolère, ils attaquent en groupe."
        it:
          emerald: "BEEDRILL difende strenuamente il proprio\nterritorio. Questi POKéMON attaccano\nviolentemente in sciami chi si avvicina al\nloro nido disturbandoli."
        de:
          emerald: "BIBOR sind sehr wehrhaft. Es sollte sich\nbesser niemand ihrem Nest nähern.\nWenn man sie ärgert, greifen sie in\nSchwärmen an."
        es:
          emerald: "Los BEEDRILL defienden su territorio a\ntoda costa. No conviene acercarse a su\ncolmena, por seguridad. Si se les molesta,\ntodo un enjambre atacará ferozmente."
pidgey:
  species_id: 16
