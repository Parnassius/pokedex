        en:
          emerald: "Whenever it sees something unfamiliar,\nit always licks the object because it\nmemorizes things by texture and taste.\nIt is somewhat put off by sour things."
        fr:
          emerald: "Chaque fois qu’il découvre quelque chose\nde nouveau, il le lèche. Sa mémoire est\nbasée sur le goût et la texture des objets.\nIl n’aime pas les choses acides."
        it:
          emerald: "La memoria di LICKITUNG è legata al gusto\ne alla consistenza degli oggetti. Pertanto,\nse vede una cosa nuova, la lecca istintiva-\nmente. Non ama i sapori aspri."
        de:
          emerald: "Wenn SCHLURP etwas Neues entdeckt, leckt\nes daran. Es merkt sich Gegenstände\nanhand der Struktur und des Geschmacks.\nSaure Sachen schrecken es eher ab."
        es:
          emerald: "Cada vez que se encuentra con algo\nque no conoce, le da un lametazo.\nAsí memoriza las cosas: por la textura\ny el sabor. No soporta los sabores ácidos."
koffing:
