      descriptions:
        jp_kana:
          emerald: "やみに　うかぶ　ゴーストが　てまねきしても\nぜったいに　ちかよっては　いけないよ。\nペロリと　なめられ　いのちを　すわれてしまうぞ。"
        en:
          emerald: "If a HAUNTER beckons you while it is\nfloating in darkness, don’t approach it.\nThis POKéMON will try to lick you with its\ntongue and steal your life away."
        fr:
          emerald: "SPECTRUM est un POKéMON dangereux. Si\nl’un d’entre eux fait signe d’approcher, il\nne faut pas l’écouter. Il risque de sortir\nsa langue pour essayer de voler votre vie."
        it:
          emerald: "HAUNTER è molto pericoloso. Se prende di\nmira qualcuno nell’oscurità, è meglio\nfuggire, perché cercherà di leccare il \nmalcapitato e succhiargli la vita."
        de:
          emerald: "Wenn ALPOLLO dich zu sich lockt, während\nes durch die Dunkelheit schwebt, darfst du\nihm nicht zu nahe kommen. Es wird an dir\nlecken und dein Leben stehlen."
        es:
          emerald: "Es un POKéMON peligroso. Si en la oscuridad\nves a uno flotando y haciéndote señas,\nno te acerques. Este POKéMON intentará\ndarte lametazos para robarte la energía."
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    en: GENGAR
    fr: ECTOPLASMA
    it: GENGAR
    de: GENGAR
    es: GENGAR
