        en:
          emerald: "It roots for food by rubbing its snout\nagainst the ground. Its favorite food is a\nmushroom that grows under dried grass.\nIt occasionally roots out hot springs."
        fr:
          emerald: "Il cherche à manger en reniflant le sol.\nSon mets préféré est un champignon\nqui pousse sous l’herbe fanée. Il découvre\nparfois des sources d’eau chaude."
        it:
          emerald: "SWINUB strofina il muso sul terreno,\nscovando i funghi di cui è ghiotto sotto\nil fogliame rinsecchito. Talvolta scova\nqualche sorgente termale."
        de:
          emerald: "Auf Nahrungssuche schnüffelt QUIEKEL am\nBoden entlang. Seine Lieblingsspeise ist\nein Pilz, der unter verwesendem Gras\nwächst. Manchmal findet es heiße Quellen."
        es:
          emerald: "Busca alimento frotando el hocico contra\nel suelo. Su comida preferida es una seta\nque crece bajo la hierba marchita. A veces,\nal frotar, descubre fuentes termales."
piloswine:
  species_id: 221
  names:
    jp_kana: イノムー
