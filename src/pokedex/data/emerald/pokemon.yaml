        jp_kana:
          emerald: "まっくらな　どうくつで　せいかつしている　うちに\nりょうめが　ふさがり　みえなくなってしまった。\nちょうおんぱで　しょうがいぶつを　たんちする。"
        en:
          emerald: "While living in pitch-black caverns, their\neyes gradually grew shut and deprived\nthem of vision. They use ultrasonic waves\nto detect obstacles."
        fr:
          emerald: "Il a perdu l’usage de ses yeux à force\nde vivre dans des cavernes obscures.\nIl utilise les ultrasons pour détecter\nles obstacles."
        it:
          emerald: "Poiché ZUBAT vive in grotte oscure, i suoi\nocchi si sono atrofizzati. Pur non vedendo,\nè in grado di identificare gli ostacoli\ngrazie agli ultrasuoni che emette."
        de:
          emerald: "Da sie in pechschwarzen Höhlen leben,\nschlossen sich ihre Augen allmählich und\nihr Augenlicht erlosch. Sie setzen Ultra-\nschallwellen ein, um Hindernisse zu orten."
        es:
          emerald: "Debido al tiempo que pasaron en oscuras\ncavernas, sus ojos están atrofiados y\ndesprovistos de visión. Utilizan ondas\nultrasónicas para detectar obstáculos."
golbat:
  species_id: 42
