        en:
          emerald: "MOLTRES is a legendary bird POKéMON\nthat can control fire. If injured, it is said\nto dip its body in the molten magma of\na volcano to burn and heal itself."
        fr:
          emerald: "C’est un POKéMON oiseau légendaire\npouvant contrôler le feu. On raconte que\nlorsqu’il est blessé, il se baigne dans un\nvolcan en ébullition pour se soigner."
        it:
          emerald: "MOLTRES è un POKéMON uccello leggendario\nin grado di gestire il fuoco. Se rimane\nferito, si dice che si immerga nel magma di\nun vulcano per ardere e tornare in salute."
        de:
          emerald: "LAVADOS ist ein legendäres Vogel-POKéMON,\ndas Feuer manipulieren kann. Wird es ver-\nletzt, taucht es seinen Körper in das Mag-\nma eines Vulkans, um sich selbst zu heilen."
        es:
          emerald: "Es un legendario pájaro POKéMON que tiene\nla habilidad de controlar el fuego. Dicen\nque, si resulta herido, se sumerge en el\nmagma de un volcán para arder y curarse."
dratini:
