      descriptions:
        jp_kana:
          emerald: "なかまや　かぞくと　いっしょの　ときは　おたがい\nきずつかないように　トゲが　ひっこんでいる。\nなかまから　はなれると　ふあんに　なるらしい。"
        en:
          emerald: "When it is with its friends or\nfamily, its barbs are tucked away to\nprevent injury. It appears to become\nnervous if separated from the others."
        fr:
          emerald: "Lorsqu’un NIDORINA est avec ses amis ou\nsa famille, il replie ses pointes pour ne\npas blesser ses proches. Il devient vite\nnerveux lorsqu’il est séparé de son groupe."
        it:
          emerald: "Quando si riuniscono con gli amici e la\nfamiglia, i NIDORINA tengono i loro aculei\na distanza per non ferirsi a vicenda. Se\nallontanati dal branco, diventano nervosi."
        de:
          emerald: "Wenn NIDORINA mit Freunden oder seiner\nFamilie zusammen ist, zieht es die Stacheln\nein, damit es niemanden verletzt. Trennt\nman es von den anderen, wird es nervös."
        es:
          emerald: "Cuando está en familia o con sus amigos,\nretrae las púas para no herir a nadie.\nSegún parece, si se la separa de su grupo,\nse pone muy nerviosa."
nidoqueen:
  species_id: 31
  names:
    jp_kana: ニドクイン
