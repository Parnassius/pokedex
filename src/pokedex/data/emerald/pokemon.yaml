        jp_kana:
          emerald: "ながい　くびと　くちばしは　つちや　みずの\nなかに　いる　エサを　つかまえるのに　べんり。\nほそながい　くちばしで　きように　つまむぞ。"
        en:
          emerald: "Its long neck and elongated beak are\nideal for catching prey in soil or water.\nIt deftly moves this extended and skinny\nbeak to pluck prey."
        fr:
          emerald: "On le reconnaît à son long cou et à son bec\nallongé qui lui permettent d’attraper ses\nproies facilement dans la terre ou l’eau.\nIl bouge son bec long et fin avec agilité."
        it:
          emerald: "Il lungo collo e il becco di FEAROW hanno\nuna forma ottimale per catturare la preda\na terra o in acqua. Muove agilmente \nil becco lungo e affusolato per stanarla."
        de:
          emerald: "IBITAKs langer Hals und Schnabel sind her-\nvorragend dafür geeignet, im Erdreich oder\nim Wasser Beute zu jagen. Es setzt seinen\ndünnen Schnabel dabei sehr geschickt ein."
        es:
          emerald: "Se le reconoce por tener un pescuezo\ny un pico largos que le permiten cazar\nen agua y en tierra firme. Mueve el pico\ncon habilidad para atrapar a sus presas."
ekans:
  species_id: 23
  names:
    jp_kana: アーボ
    en: EKANS
    fr: ABO
    it: EKANS
    de: RETTAN
    es: EKANS
