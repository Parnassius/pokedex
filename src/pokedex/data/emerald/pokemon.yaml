      abilities:
        - intimidate
      descriptions:
        jp_kana:
          emerald: "こうそく　かいてんしながら　はなつ　キックは\nこうげきと　ぼうぎょを　かねた　みごとな　わざ。\nあるく　よりも　かいてんした　ほうが　はやい。"
        en:
          emerald: "Its technique of kicking while spinning is\na remarkable mix of both offense and\ndefense. HITMONTOP travel faster\nspinning than they do walking."
        fr:
          emerald: "Il tournoie à toute vitesse sur sa tête\nen donnant des coups de pied et combine\ndes attaques offensives et défensives. Il\nva plus vite sur la tête qu’en marchant."
        it:
          emerald: "HITMONTOP fa roteare la testa veloce-\nmente sferrando calci violenti, tecnica \nefficace sia in attacco che in difesa e\nutile per muoversi con rapidità."
        de:
          emerald: "KAPOERA dreht sich auf dem Kopf stehend\num die eigene Achse und teilt Tritte aus.\nSeine Technik ist eine bemerkenswerte\nMischung aus Angriff und Verteidigung."
        es:
          emerald: "Su técnica de repartir patadas mientras\ngira rápidamente cabeza abajo es tanto\nofensiva como defensiva. Se desplaza\nmás rápido girando que andando."
smoochum:
  species_id: 238
