        jp_kana:
          emerald: "あたまに　ついている　ながい　つるを　ちいさな\nいきものに　みえる　うごきで　えものを　さそい\nちかづいてきた　ところを　ぱくりと　ひとのみ。"
        en:
          emerald: "The long vine extending from its head is\nwaved about as if it were a living thing to\nattract prey. When an unsuspecting victim\napproaches, it is swallowed whole."
        fr:
          emerald: "EMPIFLOR est doté d’une longue liane\nqui part de sa tête. Elle se balance et\nremue comme un animal pour attirer\nses proies. Les imprudents sont avalés."
        it:
          emerald: "VICTREEBEL è dotato di una lunga liana\nche parte dalla testa. La sventola come\nun’esca per attirare l’ignara preda che\ninghiottirà in un sol boccone."
        de:
          emerald: "SARZENIA schwingt mit einer langen Ranke\nhin und her, als ob es etwas fangen\nmöchte. Wenn sich ahnungslose Beute\nnähert, wird sie im Ganzen verschlungen."
        es:
          emerald: "Tiene una enredadera que le sale de la\ncabeza. Cuando la agita y colea, recuerda\na un animal y así consigue atraer a sus\npresas. Si se le acerca un rival, lo engulle."
tentacool:
