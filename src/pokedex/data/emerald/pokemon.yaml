      descriptions:
        jp_kana:
          emerald: "えいようが　たっぷり　つまった　しっぽは\nゴムボール　みたいに　よく　はずむ。\nはれた　ひは　みずべに　あつまり　みずあそび。"
        en:
          emerald: "Its tail, which is packed with nutrition,\nis very bouncy like a rubber ball. On sunny\ndays they gather at the edge of water and\nsplash about for fun."
        fr:
          emerald: "Sa queue, remplie de nourriture, est aussi\nélastique qu’un ballon gonflable. Les jours\nensoleillés, ils se réunissent au bord de\nl’eau et passent leur temps à s’arroser."
        it:
          emerald: "Gli AZURILL possiedono una coda elastica e\ngommosa che contiene sostanze nutritive.\nNelle giornate di sole, sono soliti giocare\ncon l’acqua su una riva."
        de:
          emerald: "Sein mit Nährstoffen gefüllter Schwanz\nist elastisch wie ein Gummiball. An\nsonnigen Tagen treffen sie sich am\nUfer und planschen einfach so herum."
        es:
          emerald: "Su cola es una especie de pelota de goma\nque bota y contiene los nutrientes que\nnecesita. En días soleados, se reúne con\notros en la orilla para jugar chapoteando."
nosepass:
  species_id: 299
  names:
    jp_kana: ノズパス
