          emerald: "おいしい　はなの　ミツを　さがす　のうりょくに\nすぐれ　すみかから　１０キロはなれた　ばしょに\nさく　はなから　ミツを　あつめて　はこんでいる。"
        en:
          emerald: "It has a superior ability to search for\ndelicious honey from flowers. It can seek,\nextract, and carry honey from flowers\nblooming over six miles away."
        fr:
          emerald: "PAPILUSION est très doué pour butiner\nles fleurs. Il peut détecter, extraire et\ntransporter le délicieux nectar de fleurs\nsituées à plus de dix kilomètres de son nid."
        it:
          emerald: "BUTTERFREE è molto abile nell’estrarre\nil delizioso nettare dai fiori. Riesce a\ntrovare, estrarre e trasportare il nettare\ndai fiori in boccio al nido anche per 10 km."
        de:
          emerald: "SMETTBOs größte Fähigkeit ist das Auf-\nspüren köstlichen Blütenhonigs. Es findet\nsogar Honig in Blumen, die fast 10 km von\nseinem Nest entfernt blühen."
        es:
          emerald: "BUTTERFREE tiene una habilidad especial\npara encontrar rico néctar en las flores.\nLocaliza, extrae y transporta polen de\nflores que están a 10 km de distancia."
