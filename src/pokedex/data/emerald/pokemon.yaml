      descriptions:
        jp_kana:
          emerald: "よぞらの　ほしの　またたきに　あわせて\nしゅうだんで　あかい　コアを　てんめつさせる。\nからだの　いちぶが　ちぎれても　さいせいする。"
        en:
          emerald: "It gathers with others in the night and\nmakes its red core glow on and off with\nthe twinkling stars. It can regenerate\nlimbs if they are severed from its body."
        fr:
          emerald: "Ils se réunissent la nuit et font briller\nleur cœur rouge au rythme des étoiles\nscintillantes. S’il se fait couper un de ses\nmembres, il est capable de le régénérer."
        it:
          emerald: "Quando gli STARYU si raggruppano di notte,\ni loro nuclei centrali brillano al ritmo \ndelle stelle. Se perde un’appendice, questo\nPOKéMON la rigenera senza problemi."
        de:
          emerald: "Es versammelt sich mit seinen Artgenossen\ndes Nachts. Wie die Sterne funkeln, so\nfunkelt sein roter Kern. Abgetrennte\nGliedmaßen wachsen nach."
        es:
          emerald: "De noche, se agrupan y hacen brillar su\nnúcleo rojo. Los destellos se intercalan\ncon el centelleo estelar. Si les arrancan\nalguna parte del cuerpo, la regeneran."
starmie:
  species_id: 121
  names:
    jp_kana: スターミー
    en: STARMIE
    fr: STAROSS
    it: STARMIE
    de: STARMIE
    es: STARMIE
