          emerald: "ひかりの　あたる　かくどに　よって　なないろに\nかがやく　ハネは　しあわせを　もたらすと　いう。\nにじの　ふもとに　すむと　いわれている。"
        en:
          emerald: "Its feathers--which glow in seven colors\ndepending on the angle at which they are\nstruck by light--are thought to bring joy.\nIt is said to live at the foot of a rainbow."
        fr:
          emerald: "Ses plumes brillent de sept couleurs selon\nl’orientation par rapport à la lumière. On\ndit qu’elles portent bonheur et que ce\nPOKéMON vit au pied d’un arc-en-ciel."
        it:
          emerald: "Il piumaggio di HO-OH emana sette colori\na seconda dell’angolazione dei raggi. Si\ndice che le sue piume portino felicità\ne che viva ai piedi di un arcobaleno."
        de:
          emerald: "HO-OHs Federn leuchten in sieben Farben,\nje nachdem aus welchem Winkel das\nLicht auf sie fällt. Die Federn sollen ihrem\nBesitzer Glück bringen."
        es:
          emerald: "Su plumaje contiene siete colores que se\nven según el ángulo desde el que le da la\nluz. Se cree que es portador de alegría.\nEste POKéMON vive a los pies del arco iris."
celebi:
  species_id: 251
