        jp_kana:
          emerald: "ドリルの　シッポを　つかって　うしろむきに\nじめんを　ほりすすみ　ふくざつな　かたちの\nすあなを　ちちゅう　ふかくに　つくる　ポケモン。"
        en:
          emerald: "Its drill-tipped tail is used to burrow into\nthe ground backwards. This POKéMON is\nknown to make its nest in complex shapes\ndeep under the ground."
        fr:
          emerald: "Il a une perceuse au bout de la queue. Il\nl’utilise pour creuser des souterrains à\nreculons. On dit que ce POKéMON enfouit\nson nid aux formes complexes sous terre."
        it:
          emerald: "DUNSPARCE ha una coda a forma di\ntrapano, che usa per scavare a ritroso\nnel terreno. È noto per la complessa\nforma delle tane che crea in profondità."
        de:
          emerald: "DUMMISEL hat einen Bohrer als Schweif.\nDamit gräbt es sich rückwärts in den\nBoden. Es baut seinen Nestkomplex tief\nunter der Erdoberfläche auf."
        es:
          emerald: "La cola es un taladro que usa para\nenterrarse de espaldas en el suelo.\nSe sabe que su nido tiene una forma muy\ncompleja y está a gran profundidad."
gligar:
  species_id: 207
