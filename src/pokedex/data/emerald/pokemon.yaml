      descriptions:
        jp_kana:
          emerald: "まいにち　なんじかんも　めいそうを　つづけ\nきたえられた　せいしんりょくで　そらを　とぶ。\nヨガの　しゅぎょうを　つづけてきた　せいかだ。"
        en:
          emerald: "It continually meditates for hours every\nday. As a result of rigorous and dedicated\nyoga training, it has tempered its\nspiritual power so much it can fly."
        fr:
          emerald: "Il médite sans s’arrêter plusieurs heures\npar jour. Grâce à cette discipline, il est\nmaintenant capable de léviter par la force\nde son esprit."
        it:
          emerald: "MEDITITE medita per ore e ore ogni giorno.\nGrazie a questi costanti esercizi di yoga\nha affinato il suo potere spirituale a tal\npunto da riuscire a volare."
        de:
          emerald: "Es meditiert kontinuierlich mehrere\nStunden täglich. Das Ergebnis seines\nhingebungsvollen Yogatrainings ist, dass\nes mittels seiner Psykräfte fliegen kann."
        es:
          emerald: "Medita sin parar durante muchas horas\nal día. Su práctica del yoga es rigurosa;\ncomo resultado, logra canalizar su\nenergía espiritual hasta llegar a volar."
medicham:
  species_id: 308
