      descriptions:
        jp_kana:
          emerald: "かたい　ひふでも　らくらく　つらぬく　キバ。\nひとや　ポケモンの　けつえきが　だいこうぶつ。\nくらやみを　とびまわり　はいごから　おそう。"
        en:
          emerald: "Its fangs easily puncture even thick\nanimal hide. It loves to feast on the blood\nof people and POKéMON. It flits about in\ndarkness and strikes from behind."
        fr:
          emerald: "Ses dents acérées peuvent transpercer\nfacilement la peau d’un animal. Il attaque\npar derrière et dans le noir pour se\nrassasier du sang de ses victimes."
        it:
          emerald: "Con i suoi denti affilati, GOLBAT riesce a\nmordere e a succhiare il sangue di prede\ndalla pelle durissima. Si aggira nel buio\npesto e attacca il nemico alle spalle."
        de:
          emerald: "Seine Zähne durchbohren selbst dicke\nTierhaut. Es ergeht sich an Blut von PKMN\nund Menschen. Gewöhnlich nutzt es die\nDunkelheit, um von hinten zuzuschlagen."
        es:
          emerald: "Tiene colmillos que atraviesan el pelaje\nmás grueso. Se ceba chupando la sangre\na la gente y a otros POKéMON. Revolotea\nen la oscuridad y ataca por la espalda."
oddish:
  species_id: 43
  names:
