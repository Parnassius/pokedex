        jp_kana:
          emerald: "でんきが　たまりすぎると　こうげきてきな\nせいかくに　かわるため　たまに　ほうでんして\nきもちを　おちつける　こうどうを　とる。"
        en:
          emerald: "If it stores too much electricity, its\nbehavior turns aggressive. To avoid this,\nit occasionally discharges excess energy\nand calms itself down."
        fr:
          emerald: "Il devient agressif s’il stocke trop\nd’électricité. Pour éviter ça, il relâche de\ntemps en temps son surplus d’énergie\net parvient ainsi à se calmer."
        it:
          emerald: "Se immagazzina troppa elettricità, RAICHU\ndiventa molto aggressivo. Per evitare\nche ciò accada, di tanto in tanto rilascia\nl’energia in eccesso per calmarsi."
        de:
          emerald: "Speichert es zu viel Elektrizität, wird es\naggressiv. Um dies zu vermeiden, entlädt\nes gelegentlich überschüssige Energie,\num sich abzuregen."
        es:
          emerald: "Si acumula demasiada electricidad, se\nvuelve violento. Para evitarlo, suele\ndescargar los excesos de energía,\nlo que lo mantiene calmado."
sandshrew:
  species_id: 27
  names:
