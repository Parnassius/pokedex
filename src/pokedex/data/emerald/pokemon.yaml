        en:
          emerald: "Its powerful stomach acid is capable of\ndigesting almost anything. The one thing\nin the whole world a SWALOT can’t digest is\nits own stomach."
        fr:
          emerald: "L’acide de son estomac peut dissoudre\npresque tout. La seule chose qu’il ne\npuisse pas dissoudre est l’estomac de\nce POKéMON."
        it:
          emerald: "Non c’è cosa che i micidiali succhi gastrici\ndi SWALOT non possano sciogliere, eccezion\nfatta per il suo stesso stomaco."
        de:
          emerald: "Seine starke Magensäure zersetzt fast\nalles. Das Einzige auf der Welt, das ein\nSCHLUKWECH nicht verdauen kann,\nist sein eigener Magen."
        es:
          emerald: "Tiene un ácido tan potente en el estómago\nque le permite digerir casi cualquier cosa.\nLo único que SWALOT no puede digerir\nes su propio estómago."
carvanha:
  species_id: 318
