      descriptions:
        jp_kana:
          emerald: "はれた　ひには　うみの　うえを　ゆうがに　はねる\nマンタインの　むれを　みることが　できるよ。\nテッポウオが　くっついていても　きにしない。"
        en:
          emerald: "On sunny days, schools of MANTINE can be\nseen elegantly leaping over the waves.\nIt is not bothered by the REMORAID that\nhitches rides."
        fr:
          emerald: "Les jours de beau temps, on peut voir des\nbancs de DEMANTA sauter au-dessus des\nvagues. Le REMORAID qui l’accompagne ne\ndérange pas ce POKéMON."
        it:
          emerald: "Nelle giornate soleggiate, banchi di\nMANTINE nuotano con eleganza sulle onde\nmarine. Talvolta offrono anche un comodo\ntrasporto ai REMORAID."
        de:
          emerald: "Ist es schön, sieht man MANTAX-Schwärme\nelegant über die Ozeanwellen springen.\nDurch REMORAID, die an ihm haften und ihn\nbegleiten, fühlt es sich nicht belästigt."
        es:
          emerald: "En días soleados, es posible ver bancos de\nMANTINE saltando con elegancia sobre\nlas olas del mar. A este POKéMON no le\nmolesta que se le pegue un REMORAID."
skarmory:
  species_id: 227
  names:
    jp_kana: エアームド
