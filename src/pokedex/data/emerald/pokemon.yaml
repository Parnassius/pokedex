      descriptions:
        jp_kana:
          emerald: "おおきな　はっぱを　はばたかせて　そらを　とぶ。\nくびに　なる　フサは　あまくて　おいしい。\nはるに　なると　くびから　かふんを　ばらまく。"
        en:
          emerald: "It flies by flapping its broad leaves.\nThe bunch of fruit that grows around its\nneck is deliciously sweet. In the spring,\nit scatters pollen from its neck."
        fr:
          emerald: "Il vole en secouant ses larges ailes.\nLes fruits qui poussent autour de son cou\nsont doux et délicieux. Au printemps, il\nsort du pollen de son cou."
        it:
          emerald: "TROPIUS vola agitando le sue grandi foglie\ncome ali. Frutti deliziosi gli crescono\nattorno al collo e da esso, in primavera,\nil POKéMON sparge il polline."
        de:
          emerald: "Es fliegt, indem es seine weiten Blätter\nbewegt. Die Früchte, die um seinen\nHals wachsen, sind schmackhaft und süß.\nEs verteilt Blütenstaub von seinem Hals."
        es:
          emerald: "Logra volar agitando sus amplias hojas.\nEl racimo de fruta que le crece alrededor\ndel cuello es de una dulzura exquisita.\nEn primavera, libera polen por el cuello."
chimecho:
  species_id: 358
  names:
    jp_kana: チリーン
