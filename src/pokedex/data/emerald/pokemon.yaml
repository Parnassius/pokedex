        jp_kana:
          emerald: "なんぜんねんも　かこくな　さばくで　くらすうちに\nけつえきが　すなと　おなじ　せいぶんに　なった。\nよるに　なると　えものを　さがす　やこうせい。"
        en:
          emerald: "After spending thousands of years in\nharsh deserts, its blood transformed into\nthe same substances as sand. It is\nnocturnal, so it hunts at night."
        fr:
          emerald: "Après des milliers d’années passées dans\nle désert, son sang a pris la consistance\ndu sable. C’est un POKéMON nocturne,\nil ne chasse donc que la nuit."
        it:
          emerald: "Avendo vissuto per migliaia di anni in\ndeserti ostili, il sangue di CACTURNE si è\ntrasformato in una sostanza uguale alla\nsabbia. Predilige cacciare di notte."
        de:
          emerald: "Nach 1000 Jahren in der Wüste hat sein\nBlut nun dieselbe Zusammensetzung wie\nWüstensand. Da es nachtaktiv ist, geht\nes nachts auf Beutejagd."
        es:
          emerald: "Como ha pasado miles de años en\náridos desiertos, la sangre se le ha\ntransformado en una especie de arena.\nEs nocturno, así que caza de noche."
swablu:
  species_id: 333
