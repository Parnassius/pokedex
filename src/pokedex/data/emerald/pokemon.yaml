      descriptions:
        jp_kana:
          emerald: "ハチミツの　しみこんだ　てのひらを　なめている。\nヒメグマの　ハチミツは　くだものと　スピアーの\nあつめた　かふんが　ブレンドされて　つくられる。"
        en:
          emerald: "It licks its palms that are sweetened by\nbeing soaked in honey. A TEDDIURSA makes\nits own honey by blending fruits and pollen\ncollected by BEEDRILL."
        fr:
          emerald: "Il aime se lécher les paumes quand elles\nsont encore pleines de miel. Il concocte\nson propre miel en mélangeant les fruits\net le pollen ramassés par DARDARGNAN."
        it:
          emerald: "È solito inzuppare nel miele le zampe\nanteriori per poi succhiarle avidamente.\nTEDDIURSA produce il proprio miele dai\nfrutti e dal polline raccolto da BEEDRILL."
        de:
          emerald: "TEDDIURSA leckt gern seine mit Honig be-\ndeckten Pranken ab. Es bereitet seinen\neigenen Honig zu, indem es die von BIBOR\ngesammelten Früchte und Pollen vermengt."
        es:
          emerald: "Le encanta chuparse las palmas, que tiene\nllenas de dulce miel. TEDDIURSA fabrica\nla suya propia mezclando frutos y el polen\nrecogido por BEEDRILL."
ursaring:
  species_id: 217
