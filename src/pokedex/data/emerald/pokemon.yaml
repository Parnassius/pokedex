        en:
          emerald: "To avoid detection by its enemies, it hides\nmotionlessly beneath large leaves and in\nthe gaps of branches. It also attaches\ndead leaves to its body for camouflage."
        fr:
          emerald: "Pour éviter d’être repéré, il se cache sans\nbouger entre les branches des arbres et\nattache également des feuilles mortes sur\nlui pour se camoufler."
        it:
          emerald: "Per non farsi vedere dal nemico, CASCOON\nse ne sta immobile sotto ampie foglie e\nnelle fessure dei tronchi. Talvolta si\nmimetizza coprendosi di foglie secche."
        de:
          emerald: "Um von Feinden nicht entdeckt zu werden,\nversteckt es sich unter Laubbergen oder\nin Astgabeln. Auch abgefallene Blätter\ndienen ihm als Tarnung."
        es:
          emerald: "Para evitar que el enemigo lo descubra,\nse oculta inmóvil debajo de hojas grandes\no entre ramas. También se recubre\nde hojas secas para camuflarse."
dustox:
  species_id: 269
  names:
