        en:
          emerald: "A PILOSWINE is covered by a thick coat\nof long hair for enduring freezing cold.\nIt uses its tusks to dig up food that has\nbeen buried under ice."
        fr:
          emerald: "Il est recouvert de longs poils épais lui\npermettant de supporter le froid hivernal.\nIl utilise ses défenses pour déterrer la\nnourriture cachée sous la glace."
        it:
          emerald: "PILOSWINE è ricoperto da una fitta chioma\ndi pelo lungo che lo aiuta a contrastare\nil freddo pungente. Usa le zanne per\ncercare il cibo sepolto sotto i ghiacci."
        de:
          emerald: "KEIFEL hat ein dichtes Fell aus langen\nHaaren. Dadurch ist es gegen eisige Kälte\ngewappnet. Es benutzt seine Hauer, um an\ndie Nahrung unter dem Eis zu gelangen."
        es:
          emerald: "Está cubierto por un pelaje tupido y de\nlargas cerdas que le permite soportar el\nfrío. Usa los colmillos para desenterrar\nlos alimentos cubiertos por el hielo."
corsola:
