        jp_kana:
          emerald: "かたい　ウロコで　おおわれた　からだを　ぶつけて\nあいてを　はじきとばす　こうげきが　とくいだ。\nこどもを　まもる　ときが　いちばん　つよい。"
        en:
          emerald: "It is adept at sending foes flying with\nharsh tackles using its tough, scaly body.\nThis POKéMON is at its strongest when\nit is defending its young."
        fr:
          emerald: "Son corps est protégé par des écailles\nextrêmement dures. Il envoie ses ennemis\nvoler en leur fonçant dessus. Il utilise\ntoute sa force pour protéger ses petits."
        it:
          emerald: "Con il suo corpo racchiuso in una corazza\ndurissima e squamosa, NIDOQUEEN scaglia\ni nemici lontano con un colpo secco. Dà il\nmassimo di sé nel difendere i cuccioli."
        de:
          emerald: "Es ist sehr geschickt darin, Gegner\nmit starken Attacken wegzuschleudern.\nDieses POKéMON entwickelt am meisten\nKraft, wenn es seine Jungen verteidigt."
        es:
          emerald: "Está recubierta de escamas durísimas.\nSuele lanzar por los aires a sus rivales\ngolpeándolos con violencia. Defiende\na sus crías con gran ferocidad."
nidoran_m:
  species_id: 32
