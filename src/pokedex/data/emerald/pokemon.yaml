      descriptions:
        jp_kana:
          emerald: "ふかふかの　けがわで　おおわれているので\nりゅうひょうの　うえを　ころがったり\nうみに　もぐっても　ぜんぜん　つめたくない。"
        en:
          emerald: "It is completely covered with plushy fur.\nAs a result, it never feels the cold even\nwhen it is rolling about on ice floes or\ndiving in the sea."
        fr:
          emerald: "Il est complètement recouvert d’une\nfourrure épaisse. Grâce à elle, il ne\nressent jamais le froid, même s’il nage\ndans de l’eau glacée."
        it:
          emerald: "SPHEAL è ricoperto da una morbida\npelliccia che gli permette di rotolare su\nlastre di ghiaccio o di tuffarsi in mare\nsenza avvertire il freddo."
        de:
          emerald: "SEEMOPS hat flauschiges Fell. Daher\nfriert es nie, wenn es sich auf dem Eis\nentlang rollt oder von Eisschollen aus\nins Meer hinabtaucht."
        es:
          emerald: "Está cubierto por completo con un grueso\npelaje. Gracias a él, nunca siente frío:\nni cuando rueda sobre placas de hielo\nni cuando bucea en el mar."
sealeo:
  species_id: 364
  names:
    jp_kana: トドグラー
