        jp_kana:
          emerald: "てきの　こうげきを　ふせぐときだけでなく\nきおんが　きゅうじょうしょうする　にっちゅうは\nにっしゃびょうを　ふせぐために　まるくなる。"
        en:
          emerald: "It curls up in a ball to protect itself from\nenemy attacks. It also curls up to prevent\nheatstroke during the daytime when\ntemperatures rise sharply."
        fr:
          emerald: "Il se roule sur lui-même pour se protéger\ndes attaques de ses ennemis. Cette\ntechnique lui permet aussi de se protéger\ndu soleil pendant la journée."
        it:
          emerald: "SANDSLASH si chiude a riccio per\nproteggersi dagli attacchi nemici e\nda ondate di calore nelle giornate\nestremamente calde."
        de:
          emerald: "Es rollt sich zu einer Kugel zusammen, um\nsich vor Angriffen zu schützen. So ent-\ngeht es auch aufgrund hoher Temperaturen\nhervorgerufener Hitzeschläge."
        es:
          emerald: "Se enrosca para protegerse del enemigo\ny de los golpes de calor que hay durante\nel día, cuando aumenta la temperatura."
nidoran_f:
  species_id: 29
  names:
    jp_kana: ニドラン♀
    en: NIDORAN♀
    fr: NIDORAN♀
    it: NIDORAN♀
