      descriptions:
        jp_kana:
          emerald: "わきみずの　やさしさを　やどした　ポケモン。\nすべる　ような　みのこなしで　だいちを　はしり\nにごった　みずを　きよめる　ちからを　もつ。"
        en:
          emerald: "SUICUNE embodies the compassion of\na pure spring of water. It runs across\nthe land with gliding elegance. It has the\npower to purify dirty water."
        fr:
          emerald: "SUICUNE incarne la tranquillité d’une\nsource d’eau pure. Il parcourt les plaines\navec grâce. Ce POKéMON a le pouvoir de\npurifier l’eau."
        it:
          emerald: "SUICUNE rappresenta la purezza delle\nsorgenti d’acqua dolce. Corre con grazia\nimmerso nella natura e ha la facoltà di\ndepurare le acque di scarico."
        de:
          emerald: "SUICUNE wohnt die Reinheit einer Quelle\ninne. Es bewegt sich graziös und hat die\nMacht, schmutziges Wasser zu reinigen."
        es:
          emerald: "Emana la pureza de los manantiales.\nSuele ir corriendo por el campo con\ngran elegancia. Este POKéMON tiene el\npoder de purificar el agua contaminada."
larvitar:
