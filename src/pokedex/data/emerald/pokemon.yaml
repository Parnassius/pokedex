        jp_kana:
          emerald: "きけんを　さっちすると　２ほんの　しょくしゅから\nプラスと　マイナスの　でんきを　ながす。\nひかりの　とどかない　かいていで　くらす。"
        en:
          emerald: "When it senses danger, it discharges\npositive and negative electricity from its\ntwo antennae. It lives in depths beyond\nsunlight’s reach."
        fr:
          emerald: "S’il pressent un danger, il décharge de\nl’électricité à partir de ses deux\nantennes. Il vit dans les profondeurs, là\noù la lumière ne parvient jamais."
        it:
          emerald: "Quando percepisce un pericolo, CHINCHOU\nemana scariche elettriche positive e\nnegative dalle due antenne. Vive in\nprofondità al riparo dalla luce del sole."
        de:
          emerald: "Bei Gefahr entlädt es positive und\nnegative Ladungen zwischen seinen\nAntennen. Es lebt so tief verborgen,\ndass es kein Sonnenlicht kennt."
        es:
          emerald: "Cuando detecta peligro, descarga\nelectricidad positiva y negativa por sus\ndos antenas. Vive en zonas profundas\na las que no llega la luz del sol."
lanturn:
  species_id: 171
