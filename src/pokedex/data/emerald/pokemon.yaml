      descriptions:
        jp_kana:
          emerald: "しんかいの　つよい　すいあつに　たえられるように\nとても　ふとく　がんじょうな　せぼねを　もつ。\nこざかなに　にた　しっぽの　めが　ひかる。"
        en:
          emerald: "To withstand the crushing pressure of\nwater deep under the sea, its spine is very\nthick and sturdy. Its tail, which is shaped\nlike a small fish, has eyes that light up."
        fr:
          emerald: "Grâce à sa colonne vertébrale très\nrobuste, il arrive à supporter la pression\nau fond de l’océan. Sa queue en forme de\npetit poisson a des yeux qui s’allument."
        it:
          emerald: "Grazie alla spina dorsale spessa e robusta,\nHUNTAIL può resistere alla pressione\ndegli abissi. La sua coda a forma di piccolo\npesce ha degli occhi che si illuminano."
        de:
          emerald: "Um dem hohen Druck tief unten im Meer\nstandzuhalten, ist sein Rückgrat stabil\nund solide. Sein fischähnlicher Schwanz\nhat Augen, die leuchten können."
        es:
          emerald: "Para soportar la machacante presión\ndel mar a gran profundidad, desarrolla una\nespina dorsal muy gruesa y fuerte. La cola,\ncon forma de pez, tiene ojos que brillan."
gorebyss:
  species_id: 368
  names:
    jp_kana: サクラビス
