      descriptions:
        jp_kana:
          emerald: "サニーゴの　えだを　ねどこに　している。\nすきな　あいてに　おもいを　つたえる　ときに\nラブカスを　おくる　ふうしゅうが　のこっている。"
        en:
          emerald: "LUVDISC make the branches of CORSOLA\ntheir nests. There is a custom from long\nago of giving a LUVDISC as a gift to\nexpress one’s feelings of love."
        fr:
          emerald: "LOVDISC crée son nid dans les branches\nd’un CORAYON. Une vieille tradition veut\nqu’on offre ce POKéMON aux personnes\nqui nous sont chères."
        it:
          emerald: "I LUVDISC dimorano nelle ramificazioni\ndei CORSOLA. La tradizione vuole che\nsi doni uno di questi POKéMON alla\npersona amata come pegno d’amore."
        de:
          emerald: "LIEBISKUS baut in den Armen von\nCORASONN sein Nest. Eine Tradition\nbesagt, dass man ein LIEBISKUS als\nZeichen seiner Liebe verschenkt."
        es:
          emerald: "Para LUVDISC, las ramas de CORSOLA\nson su nido. Existe una antigua costumbre\nque consiste en regalar un LUVDISC\npara expresar un sentimiento amoroso."
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
    en: BAGON
    fr: DRABY
    it: BAGON
    de: KINDWURM
    es: BAGON
  forms:
    bagon:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 60
        special_attack: 40
