        en:
          emerald: "A POKéMON that sleeps 18 hours a day.\nObservation revealed that it uses\nTELEPORT to change its location once\nevery hour."
        fr:
          emerald: "Ce POKéMON dort 18 heures par jour. Des\nétudes ont révélé qu’il utilise TELEPORT\npour changer de lieu toutes les heures."
        it:
          emerald: "ABRA dorme 18 ore al giorno. Gli studiosi\nhanno osservato che si trasferisce\nda un posto all’altro ogni ora usando\nTELETRASPORTO."
        de:
          emerald: "ABRA schläft täglich 18 Stunden.\nBeobachtungen haben ergeben, dass\nes mit TELEPORT seinen Aufenthaltsort\nstündlich wechselt."
        es:
          emerald: "Es un POKéMON que duerme 18 horas al día.\nSe ha demostrado que cada hora utiliza\nTELETRANSPORTE para cambiar de sitio."
