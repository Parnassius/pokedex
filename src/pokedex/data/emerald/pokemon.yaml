        en:
          emerald: "The flapping of its wings sounds like\nsinging. To prevent detection by enemies,\nit hides itself by flapping up a cloud of\ndesert sand."
        fr:
          emerald: "Le son du battement de ses ailes\nressemble à de la musique. Pour éviter\nd’être repéré, il se cache en soulevant un\nnuage de sable autour de lui."
        it:
          emerald: "Il movimento delle ali di FLYGON crea una\nsorta di melodia. Sbattendo le ali, inoltre,\nquesto POKéMON solleva nubi di sabbia che\ngli servono per nascondersi dai nemici."
        de:
          emerald: "Das Schlagen seiner Flügel hört sich\nwie Gesang an. Um sich vor den Angriffen\nder Feinde zu schützen, wirbelt es eine\nWolke Wüstensand auf."
        es:
          emerald: "El aleteo de sus alas es muy melódico.\nPara evitar que el enemigo lo descubra,\nlevanta con las alas una nube de arena\ndel desierto, tras la cual se oculta."
cacnea:
