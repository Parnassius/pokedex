      descriptions:
        jp_kana:
          emerald: "こうてつの　カラの　なかに　ほんたいが　いる。\nえものを　つかまえる　ときに　カラが　ひらくが\nあまりの　はやさに　なかみは　みえないのだ。"
        en:
          emerald: "It keeps itself inside its steel shell.\nThe shell is opened when it is catching\nprey, but it is so quick that the shell’s\ninside cannot be seen."
        fr:
          emerald: "FORETRESS se cache dans sa carapace en\nacier trempé. La carapace s’ouvre quand il\nattrape sa proie, mais cela va si vite\nqu’il est impossible de voir à l’intérieur."
        it:
          emerald: "FORRETRESS si nasconde nella conchiglia\nd’acciaio temprato che apre solo per\ncatturare la preda. Lo fa così rapidamente\nche è impossibile osservarne l’interno."
        de:
          emerald: "FORSTELLKA versteckt sich in seiner\nSchale. Sie öffnet sich, wenn es nach\nBeute schnappt. Dies geht jedoch so\nschnell, dass man das Innere nicht sieht."
        es:
          emerald: "Se esconde dentro de su concha de acero\nreforzado. Sólo la abre para atrapar a su\npresa, pero ocurre tan rápido que no da\ntiempo a ver su interior."
dunsparce:
  species_id: 206
