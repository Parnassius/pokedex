      descriptions:
        jp_kana:
          emerald: "ツノは　たいぼくも　へしおる　いりょく。\nカイロスは　さむさが　にがてな　ポケモン。\nひえこむ　よるは　つちの　なかで　ねむる。"
        en:
          emerald: "Their pincers are strong enough to\nshatter thick logs. Because they dislike\ncold, PINSIR burrow and sleep under\nthe ground on chilly nights."
        fr:
          emerald: "Ses pinces sont assez fortes pour\ndétruire de grosses bûches. Comme il\nn’aime pas le froid, il s’enfouit sous\nterre lors des nuits fraîches."
        it:
          emerald: "PINSIR è dotato di due potenti chele con\ncui riesce a spaccare tronchi enormi. È\nsensibile al freddo e pertanto scava\ncunicoli dove si rifugia nelle notti gelide."
        de:
          emerald: "Mit den Scheren kann es Baumstämme\nzerteilen. Da es kalte Temperaturen verab-\nscheut, gräbt sich PINSIR in kalten\nNächten tief in die Erde."
        es:
          emerald: "Sus cuernos tienen fuerza para destrozar\ngrandes troncos. Como tienen aversión al\nfrío, cavan madrigueras bajo tierra donde\nduermen cuando bajan las temperaturas."
tauros:
  species_id: 128
  names:
    jp_kana: ケンタロス
