      descriptions:
        jp_kana:
          emerald: "からだの　カラは　てっぱんの　ように　かたい。\nあまり　うごかないのは　カラのなかで　やわらかい\nなかみが　しんかの　じゅんびを　しているからだ。"
        en:
          emerald: "Its shell is as hard as an iron slab.\nA METAPOD does not move very much\nbecause it is preparing its soft innards\nfor evolution inside the shell."
        fr:
          emerald: "La carapace de CHRYSACIER est dure comme\ndu métal. Il ne bouge pas beaucoup car il\nprépare les organes à l’intérieur de sa\ncarapace en vue d’une évolution future."
        it:
          emerald: "La corazza di METAPOD è dura come una\nlastra di ferro. Sta spesso immobile per\npreparare il morbido interno della dura\ncorazza all’evoluzione."
        de:
          emerald: "Der Panzer dieses POKéMON ist hart wie\nStahl. SAFCON bewegt sich kaum, da es das\nweiche Innere unter seiner harten Schale\nauf seine Entwicklung vorbereitet."
        es:
          emerald: "La capa que le recubre el cuerpo es dura\ncomo una plancha de hierro. METAPOD\napenas se mueve para que las vísceras\nevolucionen dentro de su coraza."
butterfree:
