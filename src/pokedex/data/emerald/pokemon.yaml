        - levitate
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          emerald: "すすりなく　ような　なきごえで　こわがらせる。\nあいての　こわがる　こころを　あかい　たまで\nきゅうしゅうして　えいように　している　らしい。"
        en:
          emerald: "A MISDREAVUS frightens people with a\ncreepy, sobbing cry. It apparently uses\nits red spheres to absorb the fear of foes\nas its nutrition."
        fr:
          emerald: "Il effraie les gens avec son cri à faire\nfroid dans le dos, sorte de lamentation.\nIl utilise ses sphères rouges pour se\nnourrir de la terreur de ses ennemis."
        it:
          emerald: "MISDREAVUS terrorizza le persone con un\nsinghiozzo raccapricciante. Pare usi le\nsue sfere rosse per assorbire la paura\ndei nemici e cibarsene."
        de:
          emerald: "TRAUNFUGIL erschreckt Menschen mit einem\nmarkerschütternden Schrei. Mit seinen\nroten Kugeln nimmt es die Ängste seiner\nFeinde auf und wandelt sie in Nahrung um."
        es:
          emerald: "Asusta a la gente gritando y sollozando.\nDicen que usa las esferas rojas para\nabsorber los sentimientos de temor de\nsus enemigos y alimentarse con ellos."
