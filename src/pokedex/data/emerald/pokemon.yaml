        jp_kana:
          emerald: "かざんちたいで　くらす　ポケモンの　いっしゅ。\nからだが　ひえると　ひふが　かたまってしまい\nうごけなくなるため　マグマの　そばで　ねむる。"
        en:
          emerald: "It is a species of POKéMON that lives in\nvolcanic areas. If its body cools, its skin\nhardens and immobilizes it. To avoid that,\nit sleeps near magma."
        fr:
          emerald: "Cette espèce de POKéMON vit dans les\nzones volcaniques. Si son corps refroidit,\nsa peau durcit et l’immobilise. C’est pour\ncette raison qu’il dort près de la lave."
        it:
          emerald: "Se il suo corpo si raffredda, la pelle si\nsolidifica, immobilizzandolo. Pertanto\nSLUGMA vive nelle zone vulcaniche e\ndorme sempre in prossimità del magma."
        de:
          emerald: "Diese PKMN-Art lebt in vulkanischen Ge-\nbieten. Kühlt sich sein Körper ab, erhärtet\nseine Haut und es wird bewegungsunfähig.\nDaher schläft es neben Magma."
        es:
          emerald: "Es una especie de POKéMON que vive en\nzonas volcánicas. Si su cuerpo se enfría,\nla piel se le endurece y lo inmoviliza. Para\nevitarlo, duerme cerca de donde hay magma."
magcargo:
