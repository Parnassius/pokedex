        jp_kana:
          emerald: "ぜんしんを　おおう　もうどくの　トゲは\nかんぽうやくの　ざいりょうになり　きちょう。\nすみかに　ちかづく　てきには　ようしゃ　しない。"
        en:
          emerald: "The poisonous barbs all over its body are\nhighly valued as ingredients for making\ntraditional herbal medicine. It shows no\nmercy to anything approaching its nest."
        fr:
          emerald: "Les pointes empoisonnées qui couvrent son\ncorps entrent dans la composition de\ncertains remèdes. Il est sans merci\npour ceux qui s’approchent de son nid."
        it:
          emerald: "Gli aculei velenosi che ricoprono il corpo\ndi SEADRA sono usati in erboristeria per\nla produzione di medicinali. S’infuria molto\nse qualcuno si avvicina al suo rifugio."
        de:
          emerald: "Die Giftstacheln auf seinem Körper eignen\nsich hervorragend zur Herstellung von\nKräutermedizin. Es attackiert gnadenlos\njeden, der sich seinem Nest nähert."
        es:
          emerald: "Las púas venenosas que cubren su cuerpo\ntienen mucho valor a la hora de preparar\nremedios de hierbas tradicionales. Como\nalgo amenace su nido, atacará sin piedad."
goldeen:
  species_id: 118
  names:
    jp_kana: トサキント
    en: GOLDEEN
    fr: POISSIRENE
