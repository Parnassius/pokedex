      descriptions:
        jp_kana:
          emerald: "さいぼうの　だす　よわい　でんきを　たいもうの\nせいでんきで　ぞうふくさせ　カミナリを　おとす。\nさかだった　たいもうは　でんきを　おびた　はり。"
        en:
          emerald: "Its cells generate weak power that is\namplified by its fur’s static electricity\nto drop thunderbolts. The bristling fur is\nmade of electrically charged needles."
        fr:
          emerald: "Ses cellules génèrent un courant de faible\nintensité, amplifié par l’électricité\nstatique de sa fourrure faite d’aiguilles\nélectrisées. Il peut envoyer des éclairs."
        it:
          emerald: "Gli aghi carichi di elettricità statica\ndella pelliccia di JOLTEON si combinano\ncon il basso potenziale elettrico delle\nsue cellule scatenando fulmini."
        de:
          emerald: "BLITZAs Zellen erzeugen Elektrizität,\ndie durch die Aufladung des aus\nNadeln bestehenden Fells verstärkt wird,\nso dass es Blitzschläge erzeugen kann."
        es:
          emerald: "Crea algo de electricidad, cuya intensidad\naumenta con la estática que acumula\nen un pelaje formado por agujas cargadas\nde energía. Así puede lanzar rayos."
flareon:
  species_id: 136
  names:
    jp_kana: ブースター
