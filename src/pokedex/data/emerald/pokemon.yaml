        en:
          emerald: "Its voracious appetite compels it to\ndevour leaves bigger than itself without\nhesitation. It releases a terribly strong\nodor from its antennae."
        fr:
          emerald: "CHENIPAN a un appétit d’ogre. Il peut\nengloutir des feuilles plus grosses que\nlui. Les antennes de ce POKéMON dégagent\nune odeur particulièrement entêtante."
        it:
          emerald: "CATERPIE mangia voracemente. È in grado\ndi divorare foglie più grandi del suo corpo\nin pochi istanti. Emette un odore\nterrificante dalle antenne."
        de:
          emerald: "RAUPY ist sehr gefräßig, es kann Blätter\nverschlingen, die größer sind als es\nselbst. Seine Antennen sondern einen\nübel riechenden Gestank ab."
        es:
          emerald: "Tiene un apetito voraz. Es capaz de\ndevorar hojas que superan su tamaño\nen un abrir y cerrar de ojos. Libera\nun hedor terrible por las antenas."
metapod:
  species_id: 11
