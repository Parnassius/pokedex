      descriptions:
        jp_kana:
          emerald: "キバを　むいて　はげしく　いかくする。\nにげる　あいては　しつこく　おいかけまわすぞ。\nはんげき　されると　しっぽを　まいて　にげだす。"
        en:
          emerald: "It savagely threatens foes with bared\nfangs. It chases after fleeing targets\ntenaciously. It turns tail and runs,\nhowever, if the foe strikes back."
        fr:
          emerald: "Il menace férocement ses adversaires à\nl’aide de ses crocs acérés. Il est très\ntenace mais a tendance à rentrer la queue\net à fuir si son adversaire riposte."
        it:
          emerald: "POOCHYENA intimidisce i nemici mostrando\nle zanne e dà la caccia con tenacia a\nquelli che fuggono. Talvolta, se il nemico\ncontrattacca, POOCHYENA se la dà a gambe."
        de:
          emerald: "Es bedroht seine Feinde mit gefletschten\nZähnen. Fliehenden Gegnern hetzt es nach.\nFIFFYEN macht auf der Stelle kehrt,\nwenn der Gegner zurückschlägt."
        es:
          emerald: "Amenaza al enemigo enseñándole con\nviolencia los colmillos. Persigue a su\npresa cuando huye, pero, si le atacan,\nsale huyendo a todo correr."
mightyena:
  species_id: 262
  names:
    jp_kana: グラエナ
    en: MIGHTYENA
    fr: GRAHYENA
    it: MIGHTYENA
    de: MAGNAYEN
    es: MIGHTYENA
  forms:
    mightyena:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 60
        speed: 70
      evs_yield:
