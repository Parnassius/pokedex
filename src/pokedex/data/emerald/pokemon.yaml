        rare: aspear_berry
      descriptions:
        jp_kana:
          emerald: "げんき　いっぱい　うごきまわるが　よく　ころぶ。\nむっくり　おきあがると　みずうみの　すいめんに\nかおを　うつして　よごれていないか　しらべる。"
        en:
          emerald: "It actively runs about, but also falls\noften. Whenever it falls, it will check its\nreflection on a lake’s surface to make\nsure its face hasn’t become dirty."
        fr:
          emerald: "LIPPOUTI court dans tous les sens\net tombe souvent. Il regarde son reflet\ndans l’eau pour vérifier si son visage n’a\npas été sali par ses chutes."
        it:
          emerald: "SMOOCHUM scorrazza vivacemente, ma\nspesso inciampa e cade. Così, appena può,\ncerca di specchiarsi da qualche parte per\nassicurarsi di non avere il volto sporco."
        de:
          emerald: "KUSSILLA läuft hektisch umher und fällt\noft hin. Es muss ständig sein Spiegelbild\nbetrachten, um sicherzustellen, dass sein\nGesicht nicht schmutzig geworden ist."
        es:
          emerald: "SMOOCHUM va corriendo por todos lados,\npero también se cae con frecuencia y, en\ncuanto tiene ocasión, se mira en algún\nlago para ver si se ha manchado la cara."
elekid:
  species_id: 239
