        jp_kana:
          emerald: "からだは　ちいさいが　とても　ゆうかん。\nおおきな　エアームドと　ごかくに　たたかうが\nおなかが　すくと　よわきに　なってしまう。"
        en:
          emerald: "Although it is small, it is very courageous.\nIt will take on a larger SKARMORY on an\nequal footing. However, its will weakens if\nit becomes hungry."
        fr:
          emerald: "Petit mais téméraire, il n’hésite pas à\nse mesurer à un grand AIRMURE. Mais\nsa détermination diminue quand il\ncommence à avoir faim."
        it:
          emerald: "TAILLOW è sì piccolo, ma ha coraggio da\nvendere, tanto che riesce a tenere testa\na uno SKARMORY. Se è affamato, però,\nla sua determinazione si affievolisce."
        de:
          emerald: "Trotz seiner geringen Größe ist es mutig.\nEs stellt sich einem großen PANZAERON\ntapfer entgegen. Sein Kampfeswille wird\njedoch durch Hunger geschwächt."
        es:
          emerald: "Es pequeño, pero muy valiente. No tiene\nproblema en enfrentarse a un SKARMORY más\ngrande en igualdad de condiciones. Pero,\ncomo tenga hambre, pierde determinación."
swellow:
  species_id: 277
