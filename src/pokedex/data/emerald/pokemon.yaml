        en:
          emerald: "It has an extremely sharp sense of\ndirection. It can unerringly return home to\nits nest, however far it may be removed\nfrom its familiar surroundings."
        fr:
          emerald: "ROUCOOL a un excellent sens de\nl’orientation. Il retrouvera toujours son\nnid, même s’il est loin de chez lui et dans\nun environnement qu’il ne connaît pas."
        it:
          emerald: "PIDGEY ha un senso dell’orientamento\nmolto sviluppato. È sempre in grado di\nritornare al suo nido, anche quando si\nspinge lontano dal suo ambiente abituale."
        de:
          emerald: "TAUBSI verfügt über einen sehr geschulten\nOrientierungssinn. Es kehrt zielsicher zu\nseinem Nest zurück, egal, wie weit es von\nseiner gewohnten Umgebung entfernt ist."
        es:
          emerald: "PIDGEY tiene un sentido de la orientación\nmuy desarrollado. Aunque se encuentre\nmuy lejos de las zonas que le resultan\nfamiliares, es capaz de regresar a su nido."
pidgeotto:
  species_id: 17
  names:
    jp_kana: ピジョン
