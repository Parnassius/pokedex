        jp_kana:
          emerald: "こうらの　ふんしゃこうの　ねらいは　せいかく。\nみずの　だんがんを　５０メートル　はなれた\nあきかんに　めいちゅうさせる　ことが　できるぞ。"
        en:
          emerald: "The waterspouts that protrude from its\nshell are highly accurate. Their bullets of\nwater can precisely nail tin cans from\na distance of over 160 feet."
        fr:
          emerald: "TORTANK dispose de canons à eau très\nprécis émergeant de sa carapace. Leurs\nballes d’eau peuvent faire mouche sur une\ncible située à plus de 50 mètres."
        it:
          emerald: "I cannoni ad acqua che fuoriescono dalla\ncorazza di BLASTOISE emettono getti così\nprecisi da riuscire a colpire una lattina\nad una distanza di 50 metri."
        de:
          emerald: "TURTOKs Wasserdüsen sind sehr präzise.\nEs kann Wassergeschosse so genau\nverschießen, dass es damit aus fast\n50 Metern leere Dosen trifft."
        es:
          emerald: "Lanza chorros de agua por los tubos\ndel caparazón con gran precisión.\nTiene tanta puntería que no fallaría al\ntirar contra una lata pequeña a 50 metros."
caterpie:
