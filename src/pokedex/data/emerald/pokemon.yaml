      descriptions:
        jp_kana:
          emerald: "サイコパワーで　できた　くうかんの　さけめから\nみらいの　できごとを　みる　ちからを　もつ。\nはれた　あさは　きぶんよく　おどると　いわれる。"
        en:
          emerald: "A KIRLIA has the psychic power to create \na rip in the dimensions and see into the\nfuture. It is said to dance with pleasure\non sunny mornings."
        fr:
          emerald: "KIRLIA a la faculté de créer une faille\nentre les dimensions pour voir dans le\nfutur. On raconte qu’il danse joyeusement\nles matins ensoleillés."
        it:
          emerald: "Con i suoi poteri psichici, KIRLIA crea\nuna frattura spazio-temporale che gli\nconsente di vedere il futuro. Si dice\nche ami danzare al sole mattutino."
        de:
          emerald: "KIRLIA hat Psykräfte, mit denen es ein\nLoch in die Dimensionen reißen kann, um\nin die Zukunft zu sehen. An sonnigen\nMorgen soll es mit Freude tanzen."
        es:
          emerald: "KIRLIA tiene poderes psicoquinéticos con\nlos que crea un espacio dimensional para\nver el futuro. Dicen que baila con energía\nen las mañanas soleadas."
gardevoir:
  species_id: 282
  names:
    jp_kana: サーナイト
