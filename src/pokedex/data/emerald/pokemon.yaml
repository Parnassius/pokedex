        en:
          emerald: "A HITMONCHAN is said to possess the\nspirit of a boxer who aimed to become the\nworld champion. Having an indomitable\nspirit means that it will never give up."
        fr:
          emerald: "On raconte qu’il a l’état d’esprit d’un\nboxeur s’entraînant pour le championnat\ndu monde. Il a une ténacité à toute\népreuve et n’abandonne jamais."
        it:
          emerald: "Si dice che HITMONCHAN abbia l’animo di un\npugile destinato a diventare un campione\nmondiale. Ha uno spirito indomito e non\ndemorde mai di fronte alle avversità."
        de:
          emerald: "NOCKCHAN besitzt das Herz eines Boxers,\nder sich auf eine Weltmeisterschaft\nvorbereitet. Dieses POKéMON hat einen\nunbeugsamen Willen und gibt niemals auf."
        es:
          emerald: "Dicen que su alma es la de un boxeador que\nse entrenó para un campeonato mundial.\nTiene un espíritu indomable que nunca\nse doblega ante la adversidad."
lickitung:
  species_id: 108
