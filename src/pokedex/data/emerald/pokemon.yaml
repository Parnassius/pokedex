        jp_kana:
          emerald: "つめたい　こおりの　うえで　ねるのが　だいすき。\nむかし　ひょうざんで　ねむる　すがたを　みた\nふなのりが　にんぎょと　まちがえた。"
        en:
          emerald: "It loves to snooze on bitterly cold ice.\nThe sight of this POKéMON sleeping on\na glacier was mistakenly thought to be\na mermaid by a mariner long ago."
        fr:
          emerald: "LAMANTINE adore piquer un roupillon à même\nla glace. Il y a très longtemps, un marin\nayant aperçu ce POKéMON dormant sur\nun glacier a cru voir une sirène."
        it:
          emerald: "DEWGONG adora riposare su una gelida\nlastra di ghiaccio. In passato i marinai\nscambiavano questo POKéMON addormentato\nsulla superficie gelata per una sirena."
        de:
          emerald: "JUGONG liebt es, auf bitterkalten Eis-\nschollen zu schlafen. Ein Seemann hielt es\nirrtümlicherweise einst für eine\nMeerjungfrau."
        es:
          emerald: "Le encanta dormitar sobre la frialdad\ndel hielo. Una vez, un marinero que\nlo vio dormido sobre un glaciar\nlo confundió con una sirena."
grimer:
  species_id: 88
  names:
