        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          emerald: "いちど　かみついたら　ぜったいに　はなさない。\nキバの　さきが　つりばり　みたいに　そりかえって\nいるので　いちど　ささると　ぬけなく　なるのだ。"
        en:
          emerald: "Once its jaws clamp down on its foe, it will\nabsolutely not let go. Because the tips of\nits fangs are forked back like fishhooks,\nthey become irremovably embedded."
        fr:
          emerald: "Quand il a refermé sa mâchoire sur son\nennemi, il ne lâche pas prise. Ses crocs\nrecourbés comme des hameçons ne peuvent\npas être retirés une fois enfoncés."
        it:
          emerald: "Una volta azzannato il nemico, CROCONAW\nnon molla la presa facilmente. Le zanne\nricurve a mo’ di amo da pesca non si posso-\nno estrarre se conficcate in profondità."
        de:
          emerald: "Hat TYRACROC einen Feind mit seinen Kie-\nfern eingeklemmt, lässt es ihn nicht mehr\nlos. Seine angelhakenförmigen Zähne\nkann man nicht mehr entfernen."
        es:
          emerald: "Si le clava los colmillos a su presa,\nes imposible que huya, porque crecen\nhacia adentro con forma de anzuelo:\nuna vez hincados no hay escapatoria."
feraligatr:
  species_id: 160
  names:
    jp_kana: オーダイル
    en: FERALIGATR
    fr: ALIGATUEUR
    it: FERALIGATR
    de: IMPERGATOR
    es: FERALIGATR
  forms:
    feraligatr:
      form_id: 0
      base_stats:
        hp: 85
        attack: 105
        defense: 100
        special_attack: 79
        special_defense: 83
        speed: 78
      evs_yield:
        hp: 0
        attack: 2
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          emerald: "おおきな　くちを　あけて　あいてを　いかくする。\nきょうじんな　うしろあしで　じめんを　けって\nものすごい　スピードで　とっしん　してくるぞ。"
        en:
          emerald: "It opens its huge mouth to intimidate\nenemies. In battle, it runs using its thick\nand powerful hind legs to charge the\nfoe with incredible speed."
        fr:
          emerald: "Il impressionne ses ennemis en ouvrant son\nénorme gueule. Au combat, il piétine le sol\nde ses puissantes pattes arrière avant de\ncharger ses adversaires à pleine vitesse."
        it:
          emerald: "FERALIGATR spalanca l’enorme bocca per\nspaventare il nemico. In lotta, pesta il\nterreno con le possenti zampe posteriori\nper scagliarsi con furia contro il nemico."
        de:
          emerald: "IMPERGATOR schüchtert seine Feinde mit\nseinem riesigen Maul ein. Im Kampf rennt es\nmit riesiger Geschwindigkeit auf den\nGegner los und greift ihn an."
        es:
          emerald: "Intimida a su rival abriendo sus grandes\nfauces. Al luchar, golpea el suelo con\nsus gruesas y fuertes patas traseras, y\ncarga rápidamente contra el enemigo."
sentret:
  species_id: 161
  names:
    jp_kana: オタチ
    en: SENTRET
    fr: FOUINETTE
    it: SENTRET
    de: WIESOR
    es: SENTRET
  forms:
    sentret:
      form_id: 0
      base_stats:
        hp: 35
        attack: 46
        defense: 34
        special_attack: 35
        special_defense: 45
        speed: 20
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - keen_eye
      held_items:
        rare: oran_berry
      descriptions:
        jp_kana:
          emerald: "ねむる　ときには　こうたいで　みはりをする。\nきけんを　さっちすると　なかまを　おこすのだ。\nむれから　はぐれると　こわくて　ねむれなくなる。"
        en:
          emerald: "They take turns standing guard when it\nis time to sleep. The sentry awakens the\nothers if it senses danger. If one becomes\nseparated, it turns sleepless with fear."
        fr:
          emerald: "Lorsqu’un FOUINETTE dort, un autre monte\nla garde pour le réveiller au moindre\nsigne de danger. Un FOUINETTE séparé de\nsa meute arrête de dormir car il a peur."
        it:
          emerald: "SENTRET dorme soltanto se un suo simile\nrimane vigile. La vedetta allerta gli altri\ndel pericolo. Se viene allontanato dal\nbranco, non dorme più dalla paura."
        de:
          emerald: "Wenn WIESOR schläft, hält immer jemand\nWache. Bei Gefahr weckt die Wache die\nanderen auf. Wird es von seinen Artgenos-\nsen getrennt, kann es nicht mehr schlafen."
        es:
          emerald: "No duerme a menos que otro haga guardia.\nEl que hace de centinela lo despertará\nsi hay peligro. Si se separa de su manada,\nes incapaz de dormir, presa del miedo."
furret:
  species_id: 162
  names:
    jp_kana: オオタチ
