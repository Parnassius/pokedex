      descriptions:
        jp_kana:
          emerald: "むれを　つくり　りゅうひょうの　うえで　くらす。\nまえあしの　ちからが　つよく　こおりを　くだく。\n１にち　５かい　うみに　もぐり　えものを　とる。"
        en:
          emerald: "SEALEO live in herds on ice floes. Using its\npowerful flippers, it shatters ice.\nIt dives into the sea to hunt prey five\ntimes a day."
        fr:
          emerald: "Les PHOGLEUR vivent en groupe sur\nla banquise. Ils fracassent la glace à\nl’aide de leurs nageoires et plongent pour\nchasser cinq fois par jour."
        it:
          emerald: "I SEALEO vivono in branco su lastre di\nghiaccio, che riescono a rompere con le\npotenti pinne. Cinque volte al giorno si\ntuffano in mare per pescare."
        de:
          emerald: "SEEJONG lebt in Herden auf Eisschollen. Mit\nseinen ausgeprägten Flossen kann es\nEis zerschlagen. Fünf Mal am Tag taucht\nes hinab ins Meer, um Beute zu jagen."
        es:
          emerald: "SEALEO vive en manadas sobre placas\nde hielo. Puede romper el hielo usando\nsus potentes aletas y se zambulle en \nel mar cinco veces al día para pescar."
walrein:
  species_id: 365
  names:
    jp_kana: トドゼルガ
