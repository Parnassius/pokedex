        jp_kana:
          emerald: "ハネを　まったく　うごかして　いないのに\nくうちゅうに　うかんでいる　ふしぎな　ポケモン。\nからだの　なかは　くうどうで　まっくら。"
        en:
          emerald: "A peculiar POKéMON that floats in air even\nthough its wings remain completely still.\nThe inside of its body is hollow and\nutterly dark."
        fr:
          emerald: "Ce POKéMON étrange flotte dans les airs\nmême si ses ailes restent immobiles.\nL’intérieur de son corps est creux et\ntotalement sombre."
        it:
          emerald: "SHEDINJA è un POKéMON particolare che\nriesce a fluttuare nell’aria senza\nmuovere le ali. Il suo corpo è vuoto e\ncompletamente buio all’interno."
        de:
          emerald: "Dieses besondere POKéMON schwebt\nin der Luft, auch wenn es seine Flügel\nnicht bewegt. Das Innere seines Körpers\nist hohl und stockfinster."
        es:
          emerald: "Curioso POKéMON que permanece\nen suspensión sin mover las alas.\nSu interior está hueco y\ntotalmente oscuro."
whismur:
  species_id: 293
  names:
    jp_kana: ゴニョニョ
