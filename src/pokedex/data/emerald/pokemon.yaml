        jp_kana:
          emerald: "ダンプカーを　らくらく　ひっぱる　ちからもち。\nいわの　ように　かたくなった　ひふは\nすこしの　こうげきでは　キズも　つかない。"
        en:
          emerald: "A DONPHAN is so strong it can easily haul\na dump truck. Its hide has toughened to a\nrock-hard state. An ordinary sort of\nattack won’t even leave a scratch."
        fr:
          emerald: "Il est si fort qu’il peut facilement\nsoulever un gros camion. Sa peau est\naussi dure que la pierre et une attaque\nordinaire n’arriverait pas à l’égratigner."
        it:
          emerald: "DONPHAN dispone di una forza tale da trai-\nnare un autocarro. La sua epidermide è\ncosì dura che un attacco normale non\npuò neppure scalfirla."
        de:
          emerald: "DONPHAN ist so stark, dass es selbst\nKipplaster umwerfen kann. Seine Haut ist\nfelsenhart und normale Angriffe\nhinterlassen nicht mal einen Kratzer."
        es:
          emerald: "DONPHAN es tan fuerte que puede arrastrar\nfácilmente un camión de descarga. Tiene\nla piel dura como una roca. Para hacerle\ndaño, no bastan los ataques comunes."
porygon2:
  species_id: 233
  names:
    jp_kana: ポリゴン２
