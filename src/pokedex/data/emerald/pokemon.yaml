        jp_kana:
          emerald: "かこくな　ヨガの　しゅぎょうで　あいての\nうごきを　さきよみする　ちからを　みにつけた。\nおどる　ような　ゆうがな　うごきで　たたかう。"
        en:
          emerald: "Through crushingly harsh yoga training, it\ngained the power to foretell its foe’s\nactions. It battles with elegant, dance-\nlike movement."
        fr:
          emerald: "Grâce à sa pratique du yoga, CHARMINA\nest capable de prédire les actions de ses\nennemis. Quand il se bat, il donne\nl’impression d’être en train de danser."
        it:
          emerald: "Con rigorosi esercizi di yoga, MEDICHAM\nha acquisito la capacità di prevedere le\nmosse del nemico. I movimenti aggraziati\ndurante la lotta sembrano passi di danza."
        de:
          emerald: "Durch erbittertes Yogatraining kann es\ndie Angriffe seiner Feinde vorhersehen.\nSein Kampfstil ist anmutig und ähnelt\neinem Tanz."
        es:
          emerald: "Gracias a agotadoras sesiones de yoga,\nha adquirido la capacidad de prever las\nacciones del enemigo. Lucha realizando\nmovimientos elegantes y rítmicos."
electrike:
  species_id: 309
