        jp_kana:
          emerald: "よるに　なると　おおきな　ベロで　かいていの\nすなに　あなを　ほり　そのなかで　ねむる。\nカラを　とじて　ねむるが　ベロは　だしたまま。"
        en:
          emerald: "At night, it burrows a hole in the seafloor\nwith its broad tongue to make a place to\nsleep. While asleep, it closes its shell,\nbut leaves its tongue hanging out."
        fr:
          emerald: "La nuit, KOKIYAS utilise sa grande langue\npour creuser un trou dans les fonds marins\net y dormir. Une fois endormi, il referme sa\ncoquille mais laisse sa langue dépasser."
        it:
          emerald: "Di notte SHELLDER dorme in una buca sul\nfondo del mare scavata con la sua lingua\nlarga. Dormendo chiude la conchiglia, ma\nlascia la lingua fuori a penzoloni."
        de:
          emerald: "Nachts gräbt es mit seiner breiten Zunge\nein Loch in den Meeresboden, um darin\nzu schlafen. Dabei schließt es seine\nSchale, aber die Zunge hängt heraus."
        es:
          emerald: "De noche, usa su ancha lengua para hacer\nun agujero en el fondo del mar donde\ndescansar. Cuando duerme, SHELLDER cierra\nla concha, pero deja la lengua fuera."
cloyster:
  species_id: 91
  names:
    jp_kana: パルシェン
