        - swift_swim
        - water_veil
      descriptions:
        jp_kana:
          emerald: "かわぞこの　いわに　ツノで　あなを　あける。\nタマゴが　きゅうりゅうに　ながされたり　てきに\nおそわれない　ための　かしこい　くふう。"
        en:
          emerald: "It punches holes in boulders on stream-\nbeds. This is a clever innovation that\nprevents its eggs from being attacked or\nwashed away by the current."
        fr:
          emerald: "Il fait des trous dans les rochers dans\nle lit des rivières pour mettre ses œufs\nà l’abri des prédateurs et du courant."
        it:
          emerald: "Per evitare che vengano portate via dalla\ncorrente o rubate, SEAKING nasconde le\nsue uova in buchi scavati nelle rocce sul\nletto dei fiumi."
        de:
          emerald: "Es schlägt Löcher in Felsen und Fluss-\nbetten. Dadurch verhindert es, dass\nsein Laich angegriffen oder von der\nStrömung weggespült wird."
        es:
          emerald: "Perfora agujeros en los cantos rodados\nde las cuencas de los ríos. Así protege\nsus huevos de cualquier ataque y evita\nque los arrastre la corriente."
staryu:
  species_id: 120
  names:
    jp_kana: ヒトデマン
    en: STARYU
    fr: STARI
    it: STARYU
    de: STERNDU
    es: STARYU
