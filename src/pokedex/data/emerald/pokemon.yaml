        en:
          emerald: "It lives in complex rock formations on\nthe ocean floor and traps prey using its\n80 tentacles. Its red orbs glow when it\ngrows excited or agitated."
        fr:
          emerald: "Il vit dans les formations rocheuses au\nfond de l’océan et traque ses proies avec\nses 80 tentacules. Ses globes rouges\nbrillent quand il s’énerve ou s’agite."
        it:
          emerald: "TENTACRUEL vive sul fondo dell’oceano in\nprossimità di formazioni rocciose. Cattura\nle prede con i suoi 80 tentacoli e quando si\nagita, le sfere rosse cominciano a brillare."
        de:
          emerald: "Es bewohnt komplexe Felsformationen am\nMeeresgrund und lockt seine Beute mittels\nseiner 80 Tentakel in die Falle. Wenn es\naufgeregt ist, glühen seine roten Flecken."
        es:
          emerald: "Vive en formaciones complejas de roca en\nel suelo marino y atrapa a su presa usando\nsus 80 tentáculos. Si se pone nervioso,\nle brillan las esferas rojas de la cabeza."
geodude:
  species_id: 74
