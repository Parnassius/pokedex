        jp_kana:
          emerald: "みずくさの　おおい　いけに　せいそくする。\nあまりにも　みすぼらしい　すがたを　しているため\nそだてる　トレーナーが　すくないらしい。"
        en:
          emerald: "FEEBAS live in ponds that are heavily\ninfested with weeds. Because of its\nhopelessly shabby appearance, it\nseems as if few TRAINERS raise it."
        fr:
          emerald: "BARPAU vit dans les mares infestées\nd’algues. A cause de son apparence,\ntrès peu de DRESSEURS choisissent de\ns’occuper de lui."
        it:
          emerald: "FEEBAS vive in laghi infestati da alghe.\nA causa del suo aspetto estremamente\ndisordinato, solo pochi ALLENATORI\nallevano questo POKéMON."
        de:
          emerald: "BARSCHWA lebt in Teichen, die reich\nan Tang und Schilf sind. Aufgrund seiner\nliederlichen Gestalt, wird es nur von\nwenigen trainiert."
        es:
          emerald: "FEEBAS vive en charcas llenas de algas.\nParece que el aspecto terriblemente\ndescuidado que ofrece sea la causa de\nque pocos ENTRENADORES lo críen."
milotic:
  species_id: 350
  names:
