        jp_kana:
          emerald: "きの　えだに　くっついて　はっぱを　たべる。\nくちから　だす　いとは　くうきに　ふれると\nネバネバになり　てきの　うごきを　にぶらせる。"
        en:
          emerald: "It sticks to tree branches and eats\nleaves. The thread it spits from its mouth,\nwhich becomes gooey when it touches\nair, slows the movement of its foes."
        fr:
          emerald: "Il s’accroche aux branches des arbres\net mange leurs feuilles. Le fil qu’il\nsécrète devient gluant au contact de l’air\net sert à ralentir ses ennemis."
        it:
          emerald: "WURMPLE si aggrappa ai rami degli alberi e\nne mangia le foglie. Il filamento che\nsecerne diventa appiccicoso a contatto\ncon l’aria e serve a rallentare il nemico."
        de:
          emerald: "Es haftet an Ästen und frisst die Blätter.\nDer Faden, den es ausspuckt, wird an der\nLuft klebrig und schränkt den\nBewegungsfreiraum des Gegners ein."
        es:
          emerald: "Se encarama a las ramas de los árboles\ny come hojas. El hilo que escupe por la\nboca se solidifica al contacto con el aire\ny ralentiza los movimientos del enemigo."
silcoon:
  species_id: 266
  names:
    jp_kana: カラサリス
    en: SILCOON
