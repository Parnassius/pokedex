        jp_kana:
          emerald: "パラスから　ようぶんを　すいとって　おおきくなる\nキノコは　とうちゅうかそう　と　よばれている。\nちょうじゅの　くすりになる　きちょうな　キノコ。"
        en:
          emerald: "A PARAS has parasitic tochukaso\nmushrooms growing on its back. They grow\nby drawing nutrients from the host. They\nare valued as a medicine for long life."
        fr:
          emerald: "Des champignons parasites appelés\ntochukaso poussent sur son dos et\ngrandissent grâce à ses nutriments. Ces\nchampignons sont un élixir de longue vie."
        it:
          emerald: "PARAS ha sulla schiena dei funghi\nparassiti chiamati tochukaso, che\ntraggono nutrimento dal PARAS ospite.\nSono apprezzati come farmaco di longevità."
        de:
          emerald: "Auf PARAS’ Rücken wachsen Pilze, die man\nTochukaso nennt. Sie wachsen, indem sie\ndem Wirt Nährstoffe entziehen. Sie sind\nwertvoll als lebensverlängernde Medizin."
        es:
          emerald: "Lleva dos setas parásitas, llamadas\ntochukaso, que se alimentan a partir\nde los nutrientes del propio PARAS.\nLas setas se usan como elixir de vida."
parasect:
  species_id: 47
