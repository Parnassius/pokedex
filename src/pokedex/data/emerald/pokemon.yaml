        jp_kana:
          emerald: "からだから　はっする　きょうりょくな　じりょくで\nひきよせた　えものを　しょくりょうに　する。\nさむい　きせつの　ほうが　じりょくが　つよい。"
        en:
          emerald: "Its body emits a powerful magnetism.\nIt feeds on prey that is pulled in by the\nforce. Its magnetism is stronger in cold\nseasons."
        fr:
          emerald: "Son corps émet un puissant magnétisme.\nIl se nourrit des proies qu’il attire par\ncette force. Ce magnétisme est encore\nplus fort les saisons froides."
        it:
          emerald: "Il corpo di NOSEPASS emette una potente\nforza magnetica, grazie alla quale riesce a\nattirare la preda di cui si nutre. Questa\nforza si intensifica nella stagione fredda."
        de:
          emerald: "Sein Körper ist stark magnetisch. NASGNET\nernährt sich von Beute, die es mit Gewalt\nheranzieht. Im Winter ist sein Magnetfeld\nstärker."
        es:
          emerald: "Su cuerpo emite un magnetismo de gran\nalcance. Se alimenta de las presas que\natrae. La fuerza que ejerce se intensifica\nen las estaciones frías."
skitty:
