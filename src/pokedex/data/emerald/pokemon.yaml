        jp_kana:
          emerald: "すいちゅうを　およぎ　えものを　とらえていた。\nみずの　せいかつから　ちじょうで　くらせるように\nエラや　あし　などが　へんかを　はじめていた。"
        en:
          emerald: "KABUTOPS once swam underwater to hunt \nfor prey. It was apparently evolving from\nbeing a water dweller to living on land as\nevident from changes in its gills and legs."
        fr:
          emerald: "Jadis, il trouvait ses proies sous l’eau.\nLes changements dans ses branchies\nsemblent indiquer que ce POKéMON\nterrestre descend d’une créature marine."
        it:
          emerald: "Nell’antichità KABUTOPS cacciava le prede\nsott’acqua. Le mutazioni su branchie e\nzampe confermano la teoria che si stesse\nadattando alla vita sulla terraferma."
        de:
          emerald: "In der Antike jagte KABUTOPS unter Wasser\nnach Beute. Es hat sich von einem Meeres-\nzu einem Landbewohner entwickelt, was man\nan den Kiemen und Beinen sehen kann."
        es:
          emerald: "Antes buceaba para atrapar a su presa,\npero evolucionó, cambió de hábitat y ahora\nvive en tierra firme. El cambio que se\nve en patas y branquias así lo confirma."
aerodactyl:
