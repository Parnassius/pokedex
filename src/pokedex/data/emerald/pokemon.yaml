      descriptions:
        jp_kana:
          emerald: "わずかな　ひかりでも　みえる　すぐれた　めと\nはおとを　たてない　やわらかい　はねの　おかげで\nくらやみでは　えものを　ぜったいに　にがさない。"
        en:
          emerald: "It unfailingly catches prey in darkness.\nNOCTOWL owe their success to superior\nvision that allows them to see in minimal\nlight, and to their supple and silent wings."
        fr:
          emerald: "Dans l’obscurité, NOARFANG ne rate\njamais une proie. Il le doit à sa vision\nsurdéveloppée qui lui permet de tout voir\net à ses ailes souples et silencieuses."
        it:
          emerald: "NOCTOWL è infallibile nella cattura di una\npreda nell’oscurità, grazie alla sua vista\nacutissima nella luce flebile e alle sue\nali morbide e silenziosissime."
        de:
          emerald: "Dank seines Sehvermögens, mit dem es auch\nbei wenig Licht sehen kann, und dank\nseiner Flügel, mit denen es geräuschlos\nfliegt, entgeht NOCTUH keine Beute."
        es:
          emerald: "Puede cazar en la oscuridad y es que tiene\nuna vista privilegiada que le permite ver\nsin apenas luz. Posee unas alas ligeras y\nflexibles que casi no hacen ruido al volar."
ledyba:
  species_id: 165
  names:
    jp_kana: レディバ
    en: LEDYBA
    fr: COXY
    it: LEDYBA
    de: LEDYBA
    es: LEDYBA
