      descriptions:
        jp_kana:
          emerald: "マグマの　じょうねつを　やどした　ポケモン。\nかざんの　ふんかから　うまれたと　かんがえられ\nすべてを　やきつくす　ほのおを　ふきあげる。"
        en:
          emerald: "ENTEI embodies the passion of magma.\nIt is thought to have been born in the\neruption of a volcano. It blasts fire that\nconsumes all that it touches."
        fr:
          emerald: "ENTEI incarne la colère du magma. Il\nserait né suite à l’éruption d’un volcan. Il\npeut envoyer d’énormes jets de flammes\nqui calcinent tout ce qu’ils touchent."
        it:
          emerald: "ENTEI rappresenta l’ardore del magma. Si\nnarra che sia nato dall’eruzione di un\nvulcano. Emette lingue di fuoco tali da\nincenerire tutto ciò che lambiscono."
        de:
          emerald: "ENTEI verfügt über die Leidenschaft von\nMagma. Es wurde bei einem Vulkanaus-\nbruch geboren und bringt Feuersbrünste\nhervor, die alles auslöschen."
        es:
          emerald: "Contiene el furor del magma. Se cree que\nnació de la erupción de un volcán. Escupe\nráfagas de llamaradas que devoran todo\nlo que tocan, reduciéndolo a cenizas."
suicune:
  species_id: 245
