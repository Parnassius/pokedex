        jp_kana:
          emerald: "さんちょうの　かこうに　すみかが　あるという。\n１ねんに　１かい　だっぴして　おおきくなる。\nだっぴした　カラは　くずれて　つちに　かえる。"
        en:
          emerald: "It is said to live in volcanic craters\non mountain peaks. Once a year, it sheds\nits hide and grows larger. The shed hide\ncrumbles and returns to the soil."
        fr:
          emerald: "On dit qu’il vit dans les cratères des\nvolcans. Il mue une fois par an pour\ngrandir. Sa mue se désagrège alors\net retourne à la terre."
        it:
          emerald: "Si presume che GOLEM viva in montagna\nall’interno di crateri vulcanici. Una volta\nall’anno muta la pelle e si ingrandisce. La\npelle, sgretolandosi, va a nutrire il suolo."
        de:
          emerald: "Man sagt, es lebe in Vulkankratern auf\nBerggipfeln. Einmal im Jahr häutet es sich\nund wächst. Die abgestreifte Haut zerfällt\nund wird so der Erde wieder zugeführt."
        es:
          emerald: "Dicen que vive en cráteres volcánicos\nsituados en altas cimas. Una vez\nal año, muda la piel y crece. La muda\nse deshace y es absorbida por la tierra."
ponyta:
  species_id: 77
