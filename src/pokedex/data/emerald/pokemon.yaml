        jp_kana:
          emerald: "ぜんしんを　プログラム　データに　もどして\nでんし　くうかんに　はいる　ことが　できる。\nコピーガードされて　いるので　コピー　できない。"
        en:
          emerald: "It is capable of reverting itself entirely\nback to program data in order to enter\ncyberspace. A PORYGON is copy-\nprotected so it cannot be duplicated."
        fr:
          emerald: "Il peut se décompiler et retourner à l’état\nde programme informatique pour entrer\ndans le cyber-espace. Protégé contre le\npiratage, il est impossible à copier."
        it:
          emerald: "PORYGON può regredire ai suoi codici di\nprogrammazione originari ed entrare nel\nciberspazio. È dotato di un sistema anti-\npirateria per evitare la duplicazione."
        de:
          emerald: "PORYGON ist in der Lage, sich in Daten\nzurückzuverwandeln und in den Cyberspace\nzu gelangen. Es ist kopiergeschützt, so\ndass es nicht vervielfältigt werden kann."
        es:
          emerald: "Puede reconvertirse en datos informáticos\ny entrar en el ciberespacio.\nTiene protección anti-copia, así que\nes imposible duplicarlo."
omanyte:
