        jp_kana:
          emerald: "あたまの　まきげは　おうじゃの　あかしだ。\nながく　きれいに　まいている　ニョロトノほど\nなかまの　そんけいを　あつめると　いわれている。"
        en:
          emerald: "The curled hair on its head proves its\nstatus as a king. It is said that the\nlonger and curlier the hair, the more\nrespect it earns from its peers."
        fr:
          emerald: "Le cheveu bouclé sur la tête de TARPAUD\nest la preuve de son statut de roi. On dit\nque plus son cheveu est long et bouclé,\nplus il est respecté par ses semblables."
        it:
          emerald: "Il pennacchio sul capo di POLITOED\nsimboleggia il suo stato di re. Si dice che\npiù lungo e più arricciato è, maggiore sia\nil rispetto che riceve dai suoi pari."
        de:
          emerald: "QUAXO hat gelocktes Haar, das ihm den\nStatus eines Königs bescheinigt. Je länger\nund lockiger sein Haar ist, desto mehr\nRespekt erntet es von seinen Artgenossen."
        es:
          emerald: "El mechón rizado de POLITOED confirma\nsu condición de rey. Dicen que cuanto\nmás le crece y más se le riza, mayor es el\nrespeto que recibe de sus súbditos."
hoppip:
