      descriptions:
        jp_kana:
          emerald: "しめつける　ちからは　とても　きょうりょく。\nドラムかんも　ぺしゃんこに　してしまうぞ。\nまきつかれたら　にげだす　ことは　ふかのうだ。"
        en:
          emerald: "This POKéMON has a terrifically strong\nconstricting power. It can even flatten\nsteel oil drums. Once it wraps its body\naround its foe, escaping is impossible."
        fr:
          emerald: "Doté d’une force extraordinaire, il peut\nétrangler ses proies avec son corps et\nmême écraser des tonneaux métalliques.\nNul ne peut se libérer de son étreinte."
        it:
          emerald: "ARBOK riesce a stritolare qualsiasi cosa\ncol corpo, persino un bidone in acciaio.\nSe si avvinghia ad un nemico è impossibile\nsfuggire alla sua morsa fatale."
        de:
          emerald: "Dieses POKéMON ist unheimlich stark. Es\nkann sogar Ölfässer zerdrücken. Wenn\nARBOK einen Gegner umwickelt, ist\nes ihm unmöglich zu entkommen."
        es:
          emerald: "Es tremendamente fuerte y puede oprimir\ncualquier cosa con su cuerpo, aplastando\nincluso barriles de acero. Una vez atrapa\na su víctima, no hay forma de escapar."
pikachu:
  species_id: 25
  names:
    jp_kana: ピカチュウ
