      descriptions:
        jp_kana:
          emerald: "まよなか　がいとうの　あかりで　できた　かげが\nじぶんを　おいこして　いくのは　ゲンガーが\nかげに　なりすまして　はしって　いくからだ。"
        en:
          emerald: "Deep in the night, your shadow cast by\na streetlight may suddenly overtake you.\nIt is actually a GENGAR running past\nyou, pretending to be your shadow."
        fr:
          emerald: "Parfois, pendant les nuits noires, une\nombre projetée par un réverbère peut vous\ndépasser. C’est un ECTOPLASMA qui court\nen se faisant passer pour votre ombre."
        it:
          emerald: "Talvolta nelle notti buie, può accadere\nche un passante sia superato dalla propria\nombra. È opera di GENGAR, che si finge\nla sua sagoma scura."
        de:
          emerald: "Nachts kann es passieren, dass dich dein\nSchatten im Licht einer Laterne überholt.\nDann ist es ein GENGAR, das dich passiert\nund sich als dein Schatten ausgibt."
        es:
          emerald: "Si una noche oscura ves que tu sombra\nte adelanta de repente, en realidad\nestarás viendo a GENGAR haciéndose\npasar por la misma."
onix:
  species_id: 95
  names:
