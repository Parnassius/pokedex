        en:
          emerald: "A POKéMON that has wings like cottony\nclouds. After enduring winter, in which\nlittle food is available, SWABLU flocks\nmove closer to towns in the spring."
        fr:
          emerald: "Les ailes de ce POKéMON ressemblent à\ndes nuages de coton. Après l’hiver, passé\navec peu de nourriture, il se rapproche des\nvilles où il est sûr de trouver à manger."
        it:
          emerald: "Le ali degli SWABLU sono simili a nubi di\ncotone. Dopo aver superato l’inverno, pe-\nriodo in cui il cibo scarseggia, in prima-\nvera si spostano in stormi verso le città."
        de:
          emerald: "WABLU hat watteähnliche Flügel. Nach einem\nWinter ohne viel Nahrung, schwärmen WABLU\nim Frühling näher zu den Städten."
        es:
          emerald: "Tiene unas alas como nubes de algodón.\nTranscurrido el invierno, en el que la\ncomida escasea, bandadas de SWABLU\nmigran a los pueblos en primavera."
altaria:
  species_id: 334
