          emerald: "せなかの　カラは　マグマが　かたまって　できた。\nなんまんねんもの　あいだ　かざんの　かこうで\nくらす　うちに　からだが　マグマに　なった。"
        en:
          emerald: "The shell on its back is made of hardened\nmagma. Tens of thousands of years spent\nliving in volcanic craters have turned\nMAGCARGO’s bodies into magma."
        fr:
          emerald: "La carapace sur son dos est faite de magma\ndurci. Des dizaines de milliers d’années\npassées dans les cratères volcaniques ont\ntransformé son corps en magma."
        it:
          emerald: "Il guscio che hanno sul dorso non è\naltro che magma indurito. Nel corso dei\nsecoli, i corpi dei MAGCARGO, che vivono\nnei crateri, si sono trasformati in magma."
        de:
          emerald: "Das Haus auf seinem Rücken ist erhärtetes\nMagma. Zehntausende von Jahren in\nVulkankratern ließen den Körper von\nMAGCARGO zu Magma werden."
        es:
          emerald: "El caparazón que lleva es magma\nsolidificado. Los miles de años que lleva\nviviendo en cráteres volcánicos han hecho\ndel cuerpo de MAGCARGO puro magma."
swinub:
  species_id: 220
