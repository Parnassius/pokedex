      descriptions:
        jp_kana:
          emerald: "なかまの　ポケモンを　おうえんする　しゅうせい。\nりょうてから　はっした　でんきを　ショートさせて\nひばなの　ボンボンを　つくる　ことが　できる。"
        en:
          emerald: "It has the trait of cheering on its fellow\nPOKéMON. By shorting out the electricity\nit releases from its paws, it creates\npom-poms for cheering."
        fr:
          emerald: "Il est connu pour adorer encourager ses\nsemblables. Pour les motiver, il fait\njaillir en rythme de l’électricité par ses\npetites pattes."
        it:
          emerald: "Per rallegrare i suoi compagni, PLUSLE\ncrea un corto circuito con l’elettricità\nche emana dalle zampe, generando\ncosì un vivace scoppiettio di scintille."
        de:
          emerald: "Es spornt seine Mitstreiter an. PLUSLE\nentlädt Elektrizität aus seinen\nHandflächen und generiert so Pompons\nzum Anfeuern."
        es:
          emerald: "Siempre anima a sus compañeros POKéMON.\nCrea cortocircuitos con la electricidad\nque libera por las patas para hacer\npompones de chispas y animar al resto."
minun:
  species_id: 312
  names:
    jp_kana: マイナン
