        jp_kana:
          emerald: "ほっぺたの　でんきぶくろに　でんきを　ためる。\nおもいっきり　ほうでんすると　かみなりに\nひってきする　でんきを　はなつ　ことが　できる。"
        en:
          emerald: "It stores electricity in the electric sacs\non its cheeks. When it releases pent-up\nenergy in a burst, the electric power is\nequal to a lightning bolt."
        fr:
          emerald: "Il stocke de l’électricité dans les poches\nde ses joues. Quand il relâche d’un coup\ntoute l’énergie accumulée, la puissance\nélectrique équivaut à celle d’un éclair."
        it:
          emerald: "Se PIKACHU rilascia tutta in un colpo\nl’elettricità che ha immagazzinato\nnelle sacche sulle guance, si sprigionano\ndelle vere e proprie saette."
        de:
          emerald: "Es speichert Elektrizität in seinen\nBackentaschen. Entlädt es die\naufgestaute Energie auf einmal, kommt\ndies einem Blitz gleich."
        es:
          emerald: "Tiene unas bolsas en las mejillas en\nlas que almacena electricidad. Cuando\nla libera de golpe, la potencia de la\ndescarga es igual a la de un rayo."
raichu:
  species_id: 26
