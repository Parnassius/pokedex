        jp_kana:
          emerald: "なかまおもいの　６この　たまごは　おたがいに\nひきつけあい　くるくる　かいてんしている。\nカラの　ヒビが　ふえると　しんかは　まぢかだ。"
        en:
          emerald: "It consists of six eggs that care for each\nother. The eggs attract each other and\nspin around. When cracks increasingly\nappear, it is close to evolution."
        fr:
          emerald: "Il est constitué de six œufs formant une\ngrappe serrée qui s’attirent mutuellement\net pivotent. Des fissures apparaissent\nquand il est sur le point d’évoluer."
        it:
          emerald: "EXEGGCUTE consiste di un nucleo formato\nda sei uova che si attirano girando velo-\ncemente. Quando i gusci si crepano,\nil POKéMON è prossimo all’evoluzione."
        de:
          emerald: "Es besteht aus 6 Eiern, die füreinander\nsorgen. Die Eier ziehen sich gegenseitig\nan und drehen sich. Bekommen sie Risse,\nsteht OWEI kurz vor seiner Entwicklung."
        es:
          emerald: "Está compuesto de seis huevos que forman\nuna tupida piña que va girando. Si empiezan\na resquebrajarse las cáscaras, no hay duda\nde que está a punto de evolucionar."
exeggutor:
  species_id: 103
