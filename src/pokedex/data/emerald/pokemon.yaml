      descriptions:
        jp_kana:
          emerald: "うしろあしが　はったつして　ハネに　かわった。\nてあしの　ハネを　こうごに　やすませながら\nはばたけば　１にちじゅう　やすまず　とべる。"
        en:
          emerald: "Over the course of evolution, its hind legs\nturned into wings. By alternately resting\nits front and rear wings, it can fly all day\nwithout having to stop."
        fr:
          emerald: "Au cours de son évolution, ses pattes\narrière se sont transformées en une paire\nd’ailes. En alternant entre ses ailes avant\net arrière, il peut voler sans s’arrêter."
        it:
          emerald: "Con l’evoluzione, le zampe posteriori di\nCROBAT si sono trasformate in ali. È in\ngrado di volare per giornate intere alter-\nnando nell’uso ali posteriori e anteriori."
        de:
          emerald: "Im Laufe der Evolution wurden aus seinen\nHinterbeinen Flügel. Da es die Flügelpaare\nabwechselnd einsetzt, kann es den\nganzen Tag ohne Pause fliegen."
        es:
          emerald: "Al evolucionar, las patas traseras se le\nconvirtieron en alas. Si bate de forma\nalterna las alas delanteras y las traseras,\npuede volar todo el día sin parar."
chinchou:
  species_id: 170
  names:
