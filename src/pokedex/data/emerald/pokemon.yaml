        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          emerald: "こだいの　もじに　にた　すがたの　ポケモン。\nさきに　うまれたのは　もじか　アンノーンなのか。\nけんきゅうちゅうだが　いまだに　なぞである。"
        en:
          emerald: "This POKéMON is shaped like ancient text\ncharacters. Although research is ongoing,\nit is a mystery as to which came first,\nthe ancient writings or the various UNOWN."
        fr:
          emerald: "Il a la forme d’un caractère d’écriture\nantique. On ne sait pas si ces écritures\nantiques sont apparues avant les ZARBI ou\nle contraire. Des études sont en cours."
        it:
          emerald: "Questo POKéMON pare una lettera di un\nalfabeto antico. Malgrado le ricerche,\na tutt’oggi non si sa ancora chi sia\ncomparso prima, se l’alfabeto o UNOWN."
        de:
          emerald: "ICOGNITO hat die Form antiker Schrift-\nzeichen. Bis heute ist unklar, was zuerst\nda war: Die antiken Schriftzeichen oder die\nvielen unterschiedlichen ICOGNITO."
        es:
          emerald: "Tienen forma de caracteres antiguos.\nNo se sabe qué surgió primero:\nla escritura o los distintos UNOWN,\npero se sigue investigando."
