        jp_kana:
          emerald: "ゆうだちの　あと　みずたまりに　あつまってくる。\nみずの　ひょうめんを　すべる　ように　あるき\nあたまから　あまい　においの　みつを　だす。"
        en:
          emerald: "They gather on puddles after evening\ndownpours, gliding across the surface\nof water as if sliding. It secretes honey\nwith a sweet aroma from its head."
        fr:
          emerald: "Ils se réunissent sur les mares les\nlendemains d’averses pour y glisser comme\ns’ils patinaient. La tête d’ARAKDO sécrète\nun miel à l’arôme agréable."
        it:
          emerald: "Dopo un acquazzone serale, è facile vedere\ni SURSKIT scivolare a pelo d’acqua sulle\npozzanghere. Dal capo secernono un\nfluido dal dolce aroma."
        de:
          emerald: "GEHWEIHER trifft sich mit Artgenossen\nnach heftigen Regenfällen in Pfützen,\num über die Oberfläche zu gleiten. Es\nsondert einen Honig von seinem Kopf ab."
        es:
          emerald: "Se agrupan en charcos después de la lluvia\nde la tarde, moviéndose por la superficie\ndel agua como si se deslizaran. Segregan\nuna miel de dulce aroma por la cabeza."
masquerain:
