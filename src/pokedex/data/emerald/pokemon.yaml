      descriptions:
        jp_kana:
          emerald: "くらしている　かんきょうで　とつぜんへんい　する\nふあんていな　いでんしを　もつ　ポケモン。\nいしの　ほうしゃせんが　しんかを　ひきおこす。"
        en:
          emerald: "An EEVEE has an unstable genetic makeup\nthat suddenly mutates due to its\nenvironment. Radiation from various\nSTONES causes this POKéMON to evolve."
        fr:
          emerald: "EVOLI a une structure génétique instable\nqui se transforme en fonction de son\nenvironnement. Il évolue grâce aux\nradiations de diverses PIERRES."
        it:
          emerald: "EEVEE è dotato di un instabile corredo\ngenetico che muta in base all’habitat\nnaturale in cui vive. Le radiazioni di\ndiverse PIETRE ne scatenano l’evoluzione."
        de:
          emerald: "EVOLIs genetisches Erbmaterial ist so\ninstabil, dass die Umgebung Mutationen\nauslösen kann. Die Wirkung verschiedener\nSTEINe führt zur Entwicklung dieses PKMN."
        es:
          emerald: "Su configuración genética le permite\nmutar y adaptarse enseguida a cualquier\nmedio. Evoluciona gracias a las radiaciones\nemitidas por varias PIEDRAS."
vaporeon:
  species_id: 134
