      descriptions:
        jp_kana:
          emerald: "ふさふさの　たいもうは　あがりすぎた　たいおんを\nくうきに　ほうねつして　さげる　きのうを　もつ。\nたいおんは　さいこう　９００ど　まで　あがるぞ。"
        en:
          emerald: "FLAREON’s fluffy fur releases heat into\nthe air so that its body does not get\nexcessively hot. Its body temperature can\nrise to a maximum of 1,650 degrees F."
        fr:
          emerald: "Sa fourrure soyeuse a pour fonction de\nrejeter la chaleur dans l’air pour que son\ncorps ne surchauffe pas. La température\nde son corps peut atteindre 900 degrés."
        it:
          emerald: "La morbida pelliccia di FLAREON ha lo scopo\ndi liberare calore nell’aria abbassando in\ntal modo la temperatura corporea, che\nraggiunge al massimo 900 gradi centigradi."
        de:
          emerald: "FLAMARAs flauschiges Fell gibt Hitze an\ndie Luft ab, damit sein Körper nicht zu\nheiß wird. Die Körpertemperatur dieses\nPKMN kann bis auf 900 Grad ansteigen."
        es:
          emerald: "La suavidad de su pelaje tiene una función\nclara: liberar calor para que no se asfixie.\nLa temperatura corporal puede alcanzar\nlos 900 grados centígrados."
porygon:
