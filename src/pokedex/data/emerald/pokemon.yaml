        jp_kana:
          emerald: "おせんされた　うみの　ヘドロから　うまれた\nベトベターは　きたない　ものが　だいこうぶつ。\nこうじょうから　でる　はいえきが　しょくりょう。"
        en:
          emerald: "Born from polluted sludge in the sea,\nGRIMER’s favorite food is anything filthy.\nThey feed on wastewater pumped out from\nfactories."
        fr:
          emerald: "Né de la pollution des océans, TADMORV\nadore se nourrir de tout ce qui est\ncrasseux. On en voit souvent en train\nd’avaler les eaux usées des usines."
        it:
          emerald: "GRIMER è nato dal fango depositato sui\nfondali marini. Predilige tutto ciò che è\nsudicio e si nutre dei ripugnanti liquami\ndi scarico delle fabbriche."
        de:
          emerald: "SLEIMA entstand aus verseuchtem\nMeeresschleim. Es isst am liebsten\nalles, was dreckig ist, z.B. Abwasser\naus Industrieanlagen."
        es:
          emerald: "Nacido del lodo contaminado del mar,\nel alimento preferido de GRIMER es la\nbasura. Se alimenta de lo que encuentra\nen las aguas residuales de las fábricas."
muk:
  species_id: 89
