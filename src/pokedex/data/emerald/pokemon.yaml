        jp_kana:
          emerald: "ごくじょうの　けなみを　もつ　ポケモン。\nプクリンと　そいねすると　さいこうの　ねごこち。\nいきを　すうと　からだが　どんどん　ふくらむ。"
        en:
          emerald: "Its fur is the ultimate in luxuriousness.\nSleeping alongside a WIGGLYTUFF is simply\ndivine. Its body expands seemingly without\nend when it inhales."
        fr:
          emerald: "Sa fourrure est si douce que dormir à\nses côtés est tout simplement divin.\nSon corps semble pouvoir gonfler sans\nfin quand il inspire."
        it:
          emerald: "La pelliccia di WIGGLYTUFF è di un’eleganza\nineguagliabile. Dormirgli vicino è un’espe-\nrienza indimenticabile. Se aspira aria,\nil suo corpo pare gonfiarsi all’infinito."
        de:
          emerald: "Sein Fell ist der ultimative Luxus. Neben\neinem KNUDDELUFF zu schlafen ist schlicht\ngöttlich. Sein Körper scheint sich beim\nEinatmen unendlich auszudehnen."
        es:
          emerald: "Su piel tiene una calidad de lujo. Dormir\njunto a un WIGGLYTUFF es una maravilla.\nCuando aspira, su tamaño aumenta de\nforma desmesurada."
zubat:
  species_id: 41
  names:
