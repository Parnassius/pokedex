        jp_kana:
          emerald: "くさや　きのめを　たべる　そうしょくせい。\nキリンリキが　くさを　たべている　ときは\nシッポも　もぐもぐ　なにかを　たべる　しぐさ。"
        en:
          emerald: "A GIRAFARIG is an herbivore--it eats\ngrass and tree shoots. While it is eating,\nits tail makes chewing and swallowing\nmotions as if it were also eating."
        fr:
          emerald: "Ce POKéMON herbivore se nourrit d’herbes\net de pousses d’arbres. Quand il mange, sa\nqueue se met à bouger comme si elle\nétait aussi en train de mâcher."
        it:
          emerald: "GIRAFARIG è erbivoro e si nutre di erba e\ngermogli. Quando mangia, la sua coda si\nmuove a ritmo, come se stesse anch’essa\nmasticando e inghiottendo."
        de:
          emerald: "GIRAFARIG ist ein Pflanzenfresser, denn\nes ernährt sich von Gräsern und Pflanzen.\nBeim Essen macht sein Schwanz auch\nEsslaute und gibt vor zu kauen."
        es:
          emerald: "GIRAFARIG es herbívoro: come hierba\ny brotes de los árboles. Mientras se\nalimenta, mueve la cola como si también\nmasticara y tragara con ella."
pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
