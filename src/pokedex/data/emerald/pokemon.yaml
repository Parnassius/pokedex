        en:
          emerald: "A nocturnal POKéMON that becomes active\nupon nightfall. It leads a VOLBEAT swarm\nto draw patterns in the night sky. Over 200\ndifferent patterns have been confirmed."
        fr:
          emerald: "Ce POKéMON devient actif à la tombée de\nla nuit et dirige les MUCIOLE pour dessiner\ndes figures dans le ciel. Plus de 200\nfigures ont été recensées."
        it:
          emerald: "ILLUMISE è un POKéMON che diventa attivo\nsul far della sera. Dirige i voli dei VOLBEAT\nche disegnano figure nel cielo. Sono state\nidentificate oltre 200 figure diverse."
        de:
          emerald: "Es wird mit Einbruch der Nacht aktiv.\nILLUMISE führt einen Schwarm VOLBEAT an\nund lässt sie Muster in den Nachthimmel\nzeichnen. Es gibt über 200 Muster."
        es:
          emerald: "Este POKéMON nocturno sólo está activo\nde noche. Guía a un enjambre de VOLBEAT\npara que hagan dibujos en el cielo de la\nnoche y saben hacer hasta 200 distintos."
roselia:
  species_id: 315
