        en:
          emerald: "It continually undertakes strenuous\ntraining to master all forms of martial\narts. Its strength lets it easily hoist\na sumo wrestler onto its shoulders."
        fr:
          emerald: "Il s’entraîne sans cesse pour maîtriser\ntoutes les formes d’arts martiaux. Il est\nsi fort qu’il peut facilement porter un\nlutteur de sumo sur ses épaules."
        it:
          emerald: "Si allena instancabilmente per diventare\nimbattibile in ogni tipo di arte marziale. È\ncosì forte da riuscire a sollevare senza\nfatica un lottatore di sumo."
        de:
          emerald: "Es trainiert ständig sehr intensiv, um alle\nKampfsportarten perfekt zu beherrschen.\nSelbst einen Sumoringer kann es leicht\nauf die Matte werfen."
        es:
          emerald: "Se entrena hasta la extenuación para\ndominar todos los tipos de artes\nmarciales. Es tan fuerte que puede llevar\na un luchador de sumo sobre los hombros."
