          emerald: "えいよう　まんてんの　わきみずを　のませた\nロゼリアは　うつくしい　はなを　さかせる。\nはなの　かおりは　てきを　ゆだんさせる　こうか。"
        en:
          emerald: "A ROSELIA that drinks nutritionally rich\nspringwater blooms with lovely flowers.\nThe fragrance of its flowers has the\neffect of making its foes careless."
        fr:
          emerald: "Un ROSELIA qui boit de l’eau riche en\nnutriments donnera de jolies fleurs.\nL’odeur qu’elles dégagent a tendance à\ndéconcentrer ses adversaires."
        it:
          emerald: "Se ROSELIA beve acqua ricca di sostanze\nnutritive, i suoi fiori diventano bellissimi.\nIl loro profumo è un’arma che serve a\ndistrarre il nemico."
        de:
          emerald: "Trinkt ROSELIA nährstoffreiches\nQuellwasser, trägt es volle Blüte. Der\nDuft seiner Blüten veranlasst die Feinde,\nihre Vorsicht aufzugeben."
        es:
          emerald: "Si ROSELIA absorbe sus nutrientes\nde las ricas lluvias primaverales, florece\ncon gran belleza. La fragancia de sus\nflores hace que sus enemigos se confíen."
gulpin:
  species_id: 316
