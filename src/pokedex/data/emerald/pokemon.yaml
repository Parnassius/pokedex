      descriptions:
        jp_kana:
          emerald: "とても　するどい　きゅうかくを　もっている。\nこうぶつの　はっぱか　きらいな　はっぱか\nおおきな　あかい　はなで　かぎわける。"
        en:
          emerald: "A WEEDLE has an extremely acute sense\nof smell. It distinguishes its favorite\nkinds of leaves from those it dislikes by\nsniffing with its big red proboscis (nose)."
        fr:
          emerald: "L’odorat d’ASPICOT est très développé.\nIl lui suffit de renifler ses feuilles\npréférées avec son gros appendice\nnasal pour les reconnaître entre mille."
        it:
          emerald: "Il senso dell’olfatto di WEEDLE è molto \nsviluppato. Distingue le sue foglie\npreferite da quelle che lo disgustano\nannusandole con il grande naso rosso."
        de:
          emerald: "HORNLIU verfügt über einen exzellenten\nGeruchssinn. Es unterscheidet seine\nLieblingsblätter von anderen, indem es mit\nder großen, roten Nase daran schnuppert."
        es:
          emerald: "WEEDLE tiene un finísimo sentido del\nolfato. Puede distinguir las hojas que\nle gustan de las que no olisqueándolas\ncon su gran nariz roja."
kakuna:
  species_id: 14
