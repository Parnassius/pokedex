        en:
          emerald: "A PUPITAR creates a gas inside its body\nthat it ejects under compression to propel\nitself like a jet. Its body can withstand\na collision with solid steel."
        fr:
          emerald: "YMPHECT crée un gaz qu’il comprime\npuissamment pour se propulser. Son corps\nest très solide. Il ne l’endommage pas même\nlorsqu’il frappe de l’acier trempé."
        it:
          emerald: "Al suo interno, PUPITAR genera un gas che\ncomprime ed espelle con forza come il\npropulsore di un jet. Il suo corpo resiste\npersino all’impatto con l’acciaio massiccio."
        de:
          emerald: "PUPITAR erzeugt in seinem Körper ein Gas,\ndas es kraftvoll ausstößt, um sich wie ein\nDüsenflugzeug anzutreiben. Sein Körper\nist sehr robust und hält Stahl stand."
        es:
          emerald: "Crea un gas que comprime y expulsa\nviolentamente para autopropulsarse.\nSe mantiene inalterable incluso si\nse golpea contra el acero más duro."
tyranitar:
  species_id: 248
  names:
    jp_kana: バンギラス
