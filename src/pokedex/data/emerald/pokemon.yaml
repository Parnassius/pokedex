        jp_kana:
          emerald: "パラセクトは　しゅうだんで　たいぼくの　ねもとに\nくっついて　えいようを　すいとってしまう。\nかれると　いっせいに　べつの　きに　いどうする。"
        en:
          emerald: "PARASECT are known to infest the roots of\nlarge trees en masse and drain nutrients.\nWhen an infested tree dies, they move\nonto another tree all at once."
        fr:
          emerald: "En groupe, les PARASECT infestent le tronc\net les racines des grands arbres pour se\nnourrir de nutriments. Lorsqu’un arbre\nmeurt, ils se précipitent vers le prochain."
        it:
          emerald: "PARASECT è noto per la sua abilità di\ninfestare e di trarre nutrimento dalle\nradici di grandi alberi. Quando l’albero\nmuore, ne cerca subito un altro."
        de:
          emerald: "PARASEK sucht große Bäume heim und ent-\nzieht ihnen Nährstoffe. Stirbt ein\nbefallener Baum, sucht es sich zusammen\nmit seinen Artgenossen einen neuen Wirt."
        es:
          emerald: "Destruyen grandes árboles absorbiendo\nsus nutrientes. Cuando un árbol azotado\npor la plaga muere, los PARASECT van\na por el siguiente al instante."
venonat:
  species_id: 48
  names:
    jp_kana: コンパン
