      descriptions:
        jp_kana:
          emerald: "およぐ　ちからが　よわいため　ながされてしまう。\nながれの　よどんだ　ばしょを　のぞいてみれば\nながされてきた　コイキングが　たまっているぞ。"
        en:
          emerald: "Its swimming muscles are weak, so it is\neasily washed away by currents. In places\nwhere water pools, you can see many\nMAGIKARP deposited there by the flow."
        fr:
          emerald: "Ses muscles ne sont pas assez puissants\npour qu’il puisse lutter contre le courant.\nOn peut souvent voir des MAGICARPE\nlà où l’eau a tendance à stagner."
        it:
          emerald: "I muscoli di MAGIKARP sono così deboli\nda non farlo nuotare. Questo POKéMON\nsi fa trasportare dalle correnti, per poi\nfinire a riposare in acque stagnanti."
        de:
          emerald: "Da seine Muskeln nicht stark sind, wird\nes leicht von der Strömung weggespült.\nWo sich Wasser sammelt, findet man auch\nimmer viele angespülte KARPADOR."
        es:
          emerald: "Los músculos con los que nada son débiles,\nasí que se lo lleva la corriente\ncon facilidad. Muchos MAGIKARP\nvan a parar a piscinas naturales."
gyarados:
  species_id: 130
