        en:
          emerald: "It is impossible to defend against punches\nand chops doled out by its four arms.\nIts fighting spirit flares up when it faces\na tough opponent."
        fr:
          emerald: "Il est impossible d’esquiver les prises et\nles coups de poing de ses quatre bras.\nSon esprit de combattant s’enflamme quand\nil rencontre un adversaire à la hauteur."
        it:
          emerald: "È impossibile difendersi dai pugni e colpi\ninflitti dalle quattro braccia di MACHAMP.\nIl suo spirito di combattente si infiamma\nquando lotta contro avversari possenti."
        de:
          emerald: "Es ist unmöglich, den Fäusten und Tritten\ndieses vierarmigen PKMN auszuweichen.\nSteht es einem starken Konkurrenten\ngegenüber, entfacht sein Kampfgeist."
        es:
          emerald: "Es imposible defenderse de los puñetazos\ny golpes que reparte con los cuatro brazos\nque tiene. Si aparece un rival fuerte, le\nentran unas ganas enormes de luchar."
bellsprout:
