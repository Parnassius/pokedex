        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          emerald: "するどい　ツメで　ようしゃなく　たたきのめす。\nきょうてきと　むかいあうと　きぶんが　たかぶり\nしっぽの　ほのおが　あおじろく　もえあがる。"
        en:
          emerald: "Without pity, its sharp claws destroy foes.\nIf it encounters a strong enemy, it\nbecomes agitated, and the flame on its\ntail flares with a bluish white color."
        fr:
          emerald: "Il lacère ses ennemis sans pitié grâce à\nses griffes acérées. Face à un ennemi\npuissant, il est agressif et la flamme sur\nsa queue prend une couleur bleu clair."
        it:
          emerald: "Usa gli artigli affilati per distruggere il\nnemico senza pietà. Di fronte a un nemico\nmolto forte diventa aggressivo e la fiamma\nsulla coda si colora di un bianco bluastro."
        de:
          emerald: "Gnadenlos besiegt GLUTEXO seine Gegner\nmit seinen scharfen Klauen. Trifft es auf\nstarke Gegner, wird es wütend und die\nFlamme flackert in einem bläulichen Ton."
        es:
          emerald: "Acaba sin piedad con su enemigo usando\nsus afiladas garras. Ante rivales fuertes\nse vuelve agresivo y la llama que tiene\nen la cola arde con un tono azulado."
charizard:
  species_id: 6
  names:
    jp_kana: リザードン
