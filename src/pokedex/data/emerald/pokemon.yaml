        jp_kana:
          emerald: "みずの　きれいな　いけで　くらす　ポケモン。\nあたまの　はっぱに　のった　ちいさな　ポケモンを\nむこうぎしまで　はこんであげる　ことが　あるよ。"
        en:
          emerald: "This POKéMON lives in ponds with clean\nwater. It is known to ferry small POKéMON\nacross ponds by carrying them on the\nbroad leaf on its head."
        fr:
          emerald: "Ce POKéMON vit dans les étangs où l’eau\nest claire. Il transporte les POKéMON\nplus petits que lui sur la grande feuille\nse trouvant sur sa tête."
        it:
          emerald: "LOTAD vive in stagni di acqua pulita.\nTrasporta altri piccoli POKéMON da una\nsponda all’altra facendoli accomodare\nsulla foglia che ha in testa."
        de:
          emerald: "Es ist in Teichen mit reinem Wasser zu\nHause. Kleine POKéMON werden von ihm\nauf seinem weiten Blatt sicher über den\nTeich befördert."
        es:
          emerald: "Vive en charcas de agua clara. Se le\nconoce por ayudar a POKéMON pequeños\na cruzar las charcas transportándolos\nsobre la hoja que tiene en la cabeza."
lombre:
  species_id: 271
  names:
    jp_kana: ハスブレロ
