        - natural_cure
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          emerald: "おだやかな　うみに　うつった　よぞらの　ほしが\nすがたを　かえて　スターミーに　なったと\nおおむかしの　ひとは　くうそうしていた。"
        en:
          emerald: "People in ancient times imagined that\nSTARMIE were transformed from the\nreflections of stars that twinkled on\ngentle waves at night."
        fr:
          emerald: "Autrefois, les gens pensaient que les\nSTAROSS provenaient du reflet des étoiles\nsur les vagues lors d’une nuit paisible."
        it:
          emerald: "Nell’antichità si pensava che STARMIE\nvenisse generato dai riflessi delle stelle\nche brillano sulle onde leggere del mare\ndurante la notte."
        de:
          emerald: "Die Menschen im Altertum glaubten, dass\nSTARMIE aus den Reflektionen der Sterne,\ndie nachts in sanften Wellen blinken,\nentstanden ist."
        es:
          emerald: "En otro tiempo, se pensaba que STARMIE\nera el resultado de los reflejos de las\nestrellas que centelleaban con suavidad\nen el cielo nocturno."
mr_mime:
  species_id: 122
  names:
    jp_kana: バリヤード
    en: MR. MIME
    fr: M. MIME
    it: MR. MIME
    de: PANTIMOS
    es: MR. MIME
  forms:
    mr_mime:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 65
        special_attack: 100
        special_defense: 120
        speed: 90
      evs_yield:
