        en:
          emerald: "It becomes very active on the night of\na full moon. This POKéMON was first\ndiscovered 40 years ago at the site of\na meteor strike."
        fr:
          emerald: "Il devient très actif les soirs de pleine\nlune. Il fut découvert il y a 40 ans dans\nun cratère de météorite."
        it:
          emerald: "LUNATONE è stato scoperto 40 anni fa\nnella zona d’impatto di un meteorite.\nQuesto POKéMON diventa particolarmente\nattivo nelle notti di luna piena."
        de:
          emerald: "Bei Vollmond wird es sehr aktiv. Dieses\nPOKéMON wurde erst vor 40 Jahren neben\nder Einschlagstelle eines Meteoriten\nentdeckt."
        es:
          emerald: "Llega a ser muy activo en las noches\nde luna llena. Este POKéMON fue\ndescubierto hace 40 años en el lugar\nen el que había caído un meteorito."
solrock:
  species_id: 338
