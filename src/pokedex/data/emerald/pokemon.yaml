      descriptions:
        jp_kana:
          emerald: "まっすぐ　はしるだけなら　とても　はやい。\nいけに　すむ　えものを　すいめんから　みつけると\nすばやく　とびこみ　するどい　ツメで　とらえる。"
        en:
          emerald: "It is exceedingly fast if it only has to run\nin a straight line. When it spots pond-\ndwelling prey underwater, it quickly leaps\nin and catches it with its sharp claws."
        fr:
          emerald: "Il est très rapide quand il s’agit de courir\nen ligne droite. Quand il aperçoit une proie\nau fond de l’eau, il bondit dessus et la\nsaisit de ses griffes acérées."
        it:
          emerald: "LINOONE riesce a correre a tutta velocità,\nma solo in linea retta. Se individua una\npreda nell’acqua, vi salta dentro e la\ncattura con i suoi artigli affilati."
        de:
          emerald: "Wenn es nur geradeaus rennen muss, ist es\nsehr schnell. Sieht es im Teich Beute, die\nunter Wasser ist, springt es hinein\nund erlegt sie mit seinen scharfen Klauen."
        es:
          emerald: "Es tremendamente rápido si corre en línea\nrecta. Cuando detecta a su presa bajo\nel agua de una charca, da un veloz salto\ny la atrapa con sus afiladas garras."
wurmple:
  species_id: 265
  names:
    jp_kana: ケムッソ
    en: WURMPLE
    fr: CHENIPOTTE
    it: WURMPLE
    de: WAUMPEL
    es: WURMPLE
