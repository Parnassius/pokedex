          emerald: "いわの　したで　こうらの　なかに　たくわえた\nきのみを　たべながら　みを　ひそめている。\nたいえきと　まざり　きのみは　ジュースに　なる。"
        en:
          emerald: "A SHUCKLE hides under rocks, keeping its\nbody concealed inside its shell while\neating stored berries. The berries mix with\nits body fluids to become a juice."
        fr:
          emerald: "Il se cache sous les rochers, abritant son\ncorps dans sa carapace et mange les baies\nqu’il a mises de côté. Elles se mélangent à\nses fluides corporels pour produire du jus."
        it:
          emerald: "SHUCKLE si nasconde sotto le rocce\nper mangiare le bacche raccolte prece-\ndentemente nella sua corazza. Queste si\ntrasformano in succo col fluido del corpo."
        de:
          emerald: "Es versteckt sich unter Steinen, wenn es\ngesammelte Beeren zu sich nimmt. Die\nBeeren vermischen sich mit seinen\nKörperflüssigkeiten zu einem Saft."
        es:
          emerald: "Se esconde bajo las rocas, oculto en su\ncaparazón, para comerse las bayas que ha\nrecolectado. Las BAYAS se mezclan con\nsus fluidos corporales y originan zumo."
heracross:
  species_id: 214
