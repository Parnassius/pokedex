        - psychic
      egg_groups:
        - human_like
      abilities:
        - oblivious
      held_items:
        common: aspear_berry
        rare: aspear_berry
      descriptions:
        jp_kana:
          emerald: "おどるような　こしつきで　リズミカルに　あるく。\nその　うごきは　みている　ひとも　おもわず\nこしを　ふってしまうほど　かろやかなのだ。"
        en:
          emerald: "A JYNX sashays rhythmically as if it were\ndancing. Its motions are so bouncingly\nalluring, people seeing it are compelled to\nshake their hips without noticing."
        fr:
          emerald: "Il marche en rythme comme s’il dansait.\nSes mouvements sont si communicatifs\nque les gens qui le voient sont pris d’une\nterrible envie de bouger les hanches."
        it:
          emerald: "JYNX avanza oscillando ritmicamente come\nin una specie di danza che ammalia chi lo\nvede. L’osservatore viene così indotto a\ndanzare senza rendersene conto."
        de:
          emerald: "ROSSANA bewegt sich rhythmisch fort, als\nwürde es tanzen. Seine Bewegungen wirken\nso anziehend auf Menschen, dass diese\nbeginnen, mit den Hüften zu schwingen."
        es:
          emerald: "Camina con ritmo, cimbreándose y\nbalanceando las caderas como si bailara.\nHace movimientos tan atractivos que no\nhay quien se resista a mover las caderas."
electabuzz:
  species_id: 125
