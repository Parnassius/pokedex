        en:
          emerald: "The units at its sides are extremely\npowerful magnets. They generate enough\nmagnetism to draw in iron objects from\nover 300 feet away."
        fr:
          emerald: "Ses extrémités sont des aimants très\npuissants. Ils génèrent assez d’énergie\npour attirer des objets métalliques\nse trouvant dans un rayon de 100 mètres."
        it:
          emerald: "I due elementi laterali di MAGNEMITE sono\nmagneti molto potenti. Essi generano una\nforza tale da attirare oggetti di ferro\na oltre 100 metri di distanza."
        de:
          emerald: "An seinen Seiten trägt es starke Magnete.\nEisenhaltige Gegenstände werden aus einer\nEntfernung von bis zu 100 Metern\nangezogen."
        es:
          emerald: "Las unidades de las extremidades son\nimanes de gran alcance. Generan\nmagnetismo suficiente para atraer objetos\nde hierro que estén a 100 m de distancia."
magneton:
  species_id: 82
