      descriptions:
        jp_kana:
          emerald: "りくちを　つくったとして　しんわに　とうじょう。\nちていの　マグマの　なかで　ねむっていて\nおきると　かざんが　ふんかすると　いわれている。"
        en:
          emerald: "GROUDON has appeared in mythology as the\ncreator of the land. It sleeps in magma\nunderground and is said to make volcanoes\nerupt on awakening."
        fr:
          emerald: "GROUDON apparaît dans la mythologie\ncomme le créateur de la terre. Il dort dans\nle magma souterrain et créerait des\néruptions volcaniques en se réveillant."
        it:
          emerald: "Nella mitologia, GROUDON è il creatore\ndella terra. Dorme nel magma sottoterra\ne si dice che risvegliandosi possa fare\neruttare i vulcani."
        de:
          emerald: "Laut Mythologie soll GROUDON das Land\nerschaffen haben. Es schläft in Magma\nund soll Vulkanausbrüche hervorrufen,\nwenn es geweckt wird."
        es:
          emerald: "En la mitología se considera a GROUDON\nel creador de la tierra. Duerme enterrado\nen magma y dicen que, al despertar, hace\nque los volcanes entren en erupción."
rayquaza:
  species_id: 384
  names:
    jp_kana: レックウザ
    en: RAYQUAZA
