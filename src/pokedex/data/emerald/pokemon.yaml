        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          emerald: "じゅうぶんな　えいようと　たいようの　ひかりが\nはなの　いろを　あざやかに　すると　いわれる。\nはなの　かおりは　ひとの　こころを　いやす。"
        en:
          emerald: "VENUSAUR’s flower is said to take on vivid\ncolors if it gets plenty of nutrition and\nsunlight. The flower’s aroma soothes the\nemotions of people."
        fr:
          emerald: "Une belle fleur se trouve sur son dos. Elle\nprend une couleur vive lorsqu’elle est bien\nnourrie et bien ensoleillée. Le parfum de\ncette fleur peut apaiser les gens."
        it:
          emerald: "Con il giusto nutrimento e i raggi solari,\ni colori del fiore sulla schiena di VENUSAUR\ndiventano più vividi. Il suo profumo calma\nle reazioni emotive delle persone."
        de:
          emerald: "BISAFLOR hat eine Blume auf seinem Rü-\ncken. Wenn sie viel Nahrung und Sonne auf-\nnimmt, verfärbt sie sich bunt. Der Duft der\nBlume mildert die Emotionen der Menschen."
        es:
          emerald: "Según parece, la flor de VENUSAUR\nadquiere unos colores muy vivos con una\nbuena nutrición y mucho sol. El aroma\ndelicado de esta flor calma los ánimos."
charmander:
