      descriptions:
        jp_kana:
          emerald: "しっぽの　ほのおは　きぶんを　ひょうげん。\nたのしい　ときには　ゆらゆら　ほのおが　ゆれて\nおこった　ときには　めらめら　さかんに　もえる。"
        en:
          emerald: "The flame that burns at the tip of its\ntail is an indication of its emotions.\nThe flame wavers when CHARMANDER is\nhappy, and blazes when it is enraged."
        fr:
          emerald: "La flamme qui brûle au bout de sa queue\nindique son humeur. Elle vacille lorsqu’il\nest content mais prend de l’importance\net brûle plus ardemment lorsqu’il s’énerve."
        it:
          emerald: "La fiamma sulla punta della coda indica il\nsuo stato emotivo. Quando CHARMANDER\nsi diverte, la fiamma ondeggia. Quando si\ninfuria, la fiamma arde violentemente."
        de:
          emerald: "Die Flamme auf seiner Schweifspitze zeigt\nseine Gefühlslage an. Sie flackert, wenn\nGLUMANDA zufrieden ist. Wenn dieses PKMN\nwütend wird, lodert die Flamme gewaltig."
        es:
          emerald: "La llama que tiene en la punta de la cola\narde según sus sentimientos. Llamea\nlevemente cuando está alegre y arde\nvigorosamente cuando está enfadado."
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    en: CHARMELEON
    fr: REPTINCEL
    it: CHARMELEON
    de: GLUTEXO
    es: CHARMELEON
