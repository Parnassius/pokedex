        jp_kana:
          emerald: "ライボルトの　ちかくに　かみなりが　おちるため\nかみなりから　うまれたと　かんがえられていた。\nたたかいになると　かみなりぐもを　つくりだす。"
        en:
          emerald: "Because lightning falls in their vicinities,\nMANECTRIC were thought to have been born\nfrom lightning. In battle, they create\nthunderclouds."
        fr:
          emerald: "Comme l’orage gronde souvent autour\nd’eux, les gens ont longtemps pensé que\nles ELECSPRINT naissaient de la foudre."
        it:
          emerald: "Poiché i fulmini cadono sempre nelle\nloro vicinanze, un tempo si pensava\nche i MANECTRIC nascessero da essi.\nIn lotta creano nubi temporalesche."
        de:
          emerald: "Da Gewitter ständig in seiner Nähe\nauftauchen, nahm man an, dass\nVOLTENSO in Gewittern geboren wird.\nIm Kampf generiert es Donnerwolken."
        es:
          emerald: "Como los rayos caen cerca de donde está,\nse pensó que MANECTRIC nacía de ellos.\nEn combate, crea nubes de tormenta."
plusle:
  species_id: 311
  names:
    jp_kana: プラスル
