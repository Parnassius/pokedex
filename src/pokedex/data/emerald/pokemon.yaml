      abilities:
        - insomnia
        - keen_eye
      descriptions:
        jp_kana:
          emerald: "からだの　なかには　ちきゅうの　じてんを\nかんじとる　きかんを　もっているので　まいにち\nおなじ　じかんに　なると　なきごえを　あげる。"
        en:
          emerald: "It has an internal organ that senses\nthe earth’s rotation. Using this special\norgan, a HOOTHOOT begins hooting at\nprecisely the same time every day."
        fr:
          emerald: "HOOTHOOT est doté d’un organe interne qui\nressent et suit la rotation de la terre.\nGrâce à cet organe, il commence à hululer\ntous les jours exactement à la même heure."
        it:
          emerald: "HOOTHOOT è dotato di un organo interno\nche percepisce e segue la rotazione\nterrestre. Grazie ad esso, inizia ad ululare\nesattamente alla stessa ora ogni giorno."
        de:
          emerald: "HOOTHOOT besitzt ein inneres Organ, das\ndie Erdumdrehung wahrnimmt. Dieses Organ\nermöglicht es ihm, jeden Tag zur selben\nZeit zu schreien."
        es:
          emerald: "Tiene un órgano interno que percibe\nla rotación de la tierra. Por esta\nrazón, HOOTHOOT es capaz de ulular\ntodos los días a la misma hora."
noctowl:
  species_id: 164
  names:
    jp_kana: ヨルノズク
    en: NOCTOWL
    fr: NOARFANG
    it: NOCTOWL
    de: NOCTUH
