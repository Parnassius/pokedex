      descriptions:
        jp_kana:
          emerald: "あらしが　くると　きの　うえ　など　カミナリの\nおちそうな　たかい　ばしょへ　きそって　のぼる。\nひらいしん　がわりに　する　まちも　ある。"
        en:
          emerald: "When a storm approaches, it competes with\nothers to scale heights that are likely to\nbe stricken by lightning. Some towns use\nELECTABUZZ in place of lightning rods."
        fr:
          emerald: "Lorsqu’une tempête approche, ces\nPOKéMON se battent pour grimper où la\nfoudre a le plus de chance de tomber. Ils\nsont parfois utilisés comme paratonnerre."
        it:
          emerald: "All’arrivo di un temporale, gli ELECTABUZZ\nscalano a gara le vette sperando di \nprendere qualche fulmine. In certe città\nli usano al posto dei parafulmini."
        de:
          emerald: "Bei Gewitter konkurrieren diese PKMN, wie\nviele Spannungseinheiten sie erreichen,\nwenn sie vom Blitz getroffen werden.\nELEKTEK dient auch als Blitzableiter."
        es:
          emerald: "Al desatarse una tormenta, se enfrenta\na otros para ver quién alcanza antes los\nsitios altos en los que pueden caer rayos.\nHay ciudades que los usan como pararrayos."
magmar:
  species_id: 126
