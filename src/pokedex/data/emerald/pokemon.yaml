          emerald: "おおきな　みずうみの　そこに　いると　いわれる。\nもっとも　うつくしい　ポケモンと　いわれていて\nかいがや　ちょうこくの　モデルと　なっている。"
        en:
          emerald: "It is said to live at the bottom of\nlarge lakes. Considered to be the most\nbeautiful of all POKéMON, it has been\ndepicted in paintings and statues."
        fr:
          emerald: "On dit qu’il vit au fond des grands lacs.\nConsidéré comme le plus beau de tous\nles POKéMON, MILOBELLUS a été\nreproduit sur de nombreux tableaux."
        it:
          emerald: "MILOTIC vive sui fondali di grandi laghi.\nPare essere il più bello fra tutti i POKéMON\ne la sua immagine si ritrova in moltissime\nstatue e dipinti."
        de:
          emerald: "Man sagt, es lebe am Grund von großen\nSeen. Da es als das schönste aller\nPOKéMON gilt, wurde es schon oft\ngemalt und als Statue dargestellt."
        es:
          emerald: "Dicen que vive en el fondo de los grandes\nlagos. Se le considera el POKéMON más\nbello que existe y se le ha representado\nen multitud de pinturas y estatuas."
