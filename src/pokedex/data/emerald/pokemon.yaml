      descriptions:
        jp_kana:
          emerald: "いつも　あばれて　いないと　きが　すまない。\nたたかう　あいてが　いない　ときは　たいぼくに\nぶちあたり　なぎたおす　ことで　きを　しずめる。"
        en:
          emerald: "It is not satisfied unless it is rampaging\nat all times. If there is no opponent for\nTAUROS to battle, it will charge at thick\ntrees and knock them down to calm itself."
        fr:
          emerald: "Il n’est pas satisfait s’il ne détruit pas\ntout sur son passage. Lorsqu’il ne trouve\npas d’adversaire, il déracine de gros\narbres pour passer ses nerfs."
        it:
          emerald: "TAUROS è molto insofferente e sempre alla\nricerca della rissa. Se non trova nessuno\ncon cui lottare, si lancia contro grossi\ntronchi per abbatterli e calmarsi."
        de:
          emerald: "Es ist nur zufrieden, wenn es kämpfen\nkann. Findet TAUROS keinen Gegner,\nsucht es sich starke Bäume und lässt\nsich an ihnen aus, um sich abzureagieren."
        es:
          emerald: "Le resulta imposible estarse quieto. Si\nno hay ningún rival que luche con él, se\nestampa contra árboles para calmarse\ny los embiste para echarlos abajo."
magikarp:
  species_id: 129
