      descriptions:
        jp_kana:
          emerald: "１００００キロの　きょりを　いっちゅうやで\nはしると　いわれている　かいそくの　ポケモン。\nたいないで　もえさかる　ほのおが　パワーとなる。"
        en:
          emerald: "This fleet-footed POKéMON is said to run\nover 6,200 miles in a single day and night.\nThe fire that blazes wildly within its body\nis its source of power."
        fr:
          emerald: "ARCANIN serait capable de parcourir\nplus de 10 000 km en 24 h. Le feu qui\nbrûle à l’intérieur de son corps est la\nsource de son pouvoir."
        it:
          emerald: "ARCANINE è noto per la sua velocità. Si\ndice che possa percorrere 10.000 km in un\ngiorno e una notte. Il fuoco che arde \nindomabile nel suo corpo è fonte di forza."
        de:
          emerald: "ARKANI ist sehr schnell. Es kann an\neinem Tag fast 10.000 km zurücklegen.\nDas Feuer, das im Innern dieses POKéMON\nlodert, dient ihm als Energiequelle."
        es:
          emerald: "Es conocido por su velocidad. Dicen que\nes capaz de correr 10.000 km en 24 horas.\nEl fuego que arde con vigor en su interior\nconstituye su fuente de energía."
poliwag:
  species_id: 60
  names:
    jp_kana: ニョロモ
    en: POLIWAG
    fr: PTITARD
    it: POLIWAG
    de: QUAPSEL
    es: POLIWAG
  forms:
    poliwag:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      descriptions:
        jp_kana:
          emerald: "うずまき　もようの　ないぞうが　すけてしまうほど\nうすい　ひふだが　するどい　キバを　はねかえす\nだんりょくを　もっているのだ。"
        en:
          emerald: "It is possible to see this POKéMON’s spiral\ninnards right through its thin skin.\nHowever, the skin is also very flexible.\nEven sharp fangs bounce right off it."
        fr:
          emerald: "PTITARD a une peau si fine qu’on peut voir\nses entrailles en spirale à travers. Sa\npeau est aussi très élastique. Même des\ncrocs très acérés rebondissent dessus."
        it:
          emerald: "POLIWAG ha una pelle molto sottile attra-\nverso cui si vedono i suoi organi spirali-\nformi. Essa è così elastica che neppure\nzanne affilatissime riescono a lacerarla."
        de:
          emerald: "Durch QUAPSELs dünne Haut kann man sein\nspiralförmiges Inneres sehen. Sie ist zu-\ngleich so elastisch, dass selbst scharfe\nReißzähne sie nicht durchdringen können."
        es:
          emerald: "Tiene una piel muy fina que deja ver las\nvísceras en espiral que posee. Ahora bien,\nesta piel tiene la ventaja de ser flexible,\npor lo que hace rebotar más de un zarpazo."
poliwhirl:
  species_id: 61
  names:
    jp_kana: ニョロゾ
    en: POLIWHIRL
    fr: TETARTE
    it: POLIWHIRL
    de: QUAPUTZI
    es: POLIWHIRL
  forms:
    poliwhirl:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 65
        special_attack: 50
        special_defense: 50
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
