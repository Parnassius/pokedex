          emerald: "かせきから　ふっかつした　ポケモンだが　まれに\nいきつづけている　カブトを　はっけん　できる。\nその　すがたは　３おくねん　かわっていない。"
        en:
          emerald: "It is a POKéMON that has been regenerated\nfrom a fossil. However, in rare cases, living\nexamples have been discovered. KABUTO\nhave not changed for 300 million years."
        fr:
          emerald: "C’est un POKéMON ressuscité à partir d’un\nfossile. Cependant, on a découvert des\nspécimens vivants. Ce POKéMON n’a pas\nchangé depuis 300 millions d’années."
        it:
          emerald: "KABUTO è stato rigenerato da un fossile,\nsebbene in rari casi siano stati scoperti\nesemplari viventi. Non ha subito alcuna\nmutazione in oltre 300 milioni di anni."
        de:
          emerald: "KABUTO ist ein PKMN, das aus einem Fossil\nreproduziert wurde. Selten wurden lebende\nExemplare dieser Art entdeckt. Es hat sich\nseit 300 Mio. Jahren nicht verändert."
        es:
          emerald: "Lo han regenerado a partir de un fósil,\npero aún queda algún raro ejemplar vivo.\nAunque existe desde hace 300 millones de\naños, este POKéMON no ha cambiado nada."
