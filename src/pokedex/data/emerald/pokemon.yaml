        en:
          emerald: "An OMASTAR uses its tentacles to capture\nits prey. It is believed to have become\nextinct because its shell grew too large,\nmaking its movements slow and ponderous."
        fr:
          emerald: "Il capture ses proies avec ses tentacules.\nOn pense que l’espèce s’est éteinte parce\nque sa coquille était devenue trop grande,\nrendant ses mouvements lents et pesants."
        it:
          emerald: "OMASTAR usa i tentacoli per catturare la\npreda. Si pensa che si sia estinto a causa\ndella conchiglia troppo ingombrante, che\nrendeva i movimenti lenti e difficoltosi."
        de:
          emerald: "AMOROSO benutzt seine Tentakel, um Beute\neinzufangen. Man nimmt an, dass es damals\nausgestorben ist, weil seine Schale zu\ngroß und zu schwer geworden war."
        es:
          emerald: "Usa los tentáculos para cazar.\nSe cree que se ha extinguido debido\nal tamaño y al peso que alcanza su concha,\nque entorpece sus movimientos."
