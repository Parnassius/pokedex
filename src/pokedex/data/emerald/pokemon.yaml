        jp_kana:
          emerald: "てきに　おそわれても　ほそい　すきまに\nするりと　もぐりこんで　にげる　ことが　できる。\nてあしは　みじかいが　とても　すばしっこい。"
        en:
          emerald: "A FURRET has a very slim build. When under\nattack, it can squirm through narrow\nspaces and get away. In spite of its short\nlimbs, it is very nimble and fleet."
        fr:
          emerald: "Etant très mince, FOUINAR peut s’enfuir en\nse faufilant habilement dans les recoins\nétroits lorsqu’il est attaqué. Malgré ses\npattes courtes, il est très agile et rapide."
        it:
          emerald: "FURRET è di esile costituzione. Quando è\nattaccato sfugge intrufolandosi in ogni\nfessura. Malgrado i suoi arti siano corti,\nè molto agile e rapido nei movimenti."
        de:
          emerald: "WIESENIOR ist schlank. Wird es angegrif-\nfen, kann es sich durch enge Zwischen-\nräume schlängeln und entkommen. Trotz\nseiner kurzen Gliedmaßen ist es sehr flink."
        es:
          emerald: "Es de constitución delgada, lo que le sirve\nen combate para escabullirse con gran\nhabilidad por cualquier hueco y escapar.\nAunque tiene patas cortas, es ágil y veloz."
hoothoot:
  species_id: 163
  names:
    jp_kana: ホーホー
    en: HOOTHOOT
    fr: HOOTHOOT
    it: HOOTHOOT
    de: HOOTHOOT
