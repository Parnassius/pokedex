        en:
          emerald: "A brutish POKéMON that loves to battle.\nA veteran CRAWDAUNT that has prevailed in\nhundreds of battles has giant pincers\nmarked with countless scars."
        fr:
          emerald: "C’est une brute qui adore se battre. Tant\nelles sont nombreuses, il est impossible\nde compter les traces de combats sur les\npinces d’un vieux COLHOMARD."
        it:
          emerald: "POKéMON violento che ama la lotta,\nCRAWDAUNT possiede due chele affilate\nricoperte di cicatrici se si tratta di un\nesemplare con grande esperienza di lotta."
        de:
          emerald: "Dieses brutale PKMN liebt den Kampf. Als\nVeteran, der in hunderten von Kämpfen\nbestanden hat, sind seine mächtigen\nScheren mit Kratzern und Spuren übersät."
        es:
          emerald: "Es un POKéMON brutal que disfruta\nluchando. Un CRAWDAUNT veterano que\nha salido airoso de miles de combates tiene\nenormes pinzas llenas de cicatrices."
baltoy:
  species_id: 343
  names:
