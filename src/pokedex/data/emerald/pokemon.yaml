      descriptions:
        jp_kana:
          emerald: "まるくなると　どんな　こうげきでも　はねかえす。\nさばくで　せいかつしている　うちに　からだの\nひょうめんが　カチカチに　かたく　へんかした。"
        en:
          emerald: "When it curls up in a ball, it can make any\nattack bounce off harmlessly. Its hide has\nturned tough and solid as a result of\nliving in the desert."
        fr:
          emerald: "Quand il se met en boule, il est capable\nd’attaquer en rebondissant sans se\nblesser. Le désert a rendu sa peau\ndure et résistante."
        it:
          emerald: "SANDSHREW si chiude a sfera e in tal modo\nsi difende con facilità dagli attacchi.\nPoiché vive nel deserto, questo POKéMON\nha sviluppato una corazza resistente."
        de:
          emerald: "Rollt es sich zu einer Kugel zusammen,\nprallt jeder Angriff von ihm ab. Seine Haut\nist zäh und fest, da es in der Wüste lebt."
        es:
          emerald: "Cuando se hace una bola, repele\ncualquier ataque. Como vive en el\ndesierto, tiene una piel tosca y dura."
sandslash:
  species_id: 28
  names:
    jp_kana: サンドパン
    en: SANDSLASH
