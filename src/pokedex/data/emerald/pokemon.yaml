        en:
          emerald: "CACNEA live in deserts with virtually no\nrainfall. It battles by swinging its thick,\nspiked arms. Once a year, a yellow flower\nblooms."
        fr:
          emerald: "CACNEA vit dans les déserts où la pluie\nne tombe jamais. Il se bat en balançant ses\nbras couverts de pointes. Une fois par an,\nune fleur éclot sur sa tête."
        it:
          emerald: "CACNEA vive in deserti dove non piove mai.\nPer la lotta usa le sue grosse zampe\nricoperte di spine. Una volta all’anno\nsboccia il suo fiore giallo."
        de:
          emerald: "TUSKA wohnt in der Wüste, in der es nie\nregnet. Es kämpft, indem es seine dicken,\nmit Dornen übersäten Arme schwingt.\nEinmal im Jahr erblüht eine gelbe Blüte."
        es:
          emerald: "CACNEA vive en desiertos donde nunca\nllueve. Para luchar, balancea los brazos,\nmuy gruesos y cubiertos de pinchos.\nUna vez al año, le brota una flor amarilla."
cacturne:
  species_id: 332
