      descriptions:
        jp_kana:
          emerald: "ふかい　かいていで　しずかに　ねむる。\nすいめんへ　あがってくるとき　ふねを　のみこむ\nほど　おおきな　うずしおが　はっせいする。"
        en:
          emerald: "It sleeps quietly, deep on the seafloor.\nWhen it comes up to the surface, it\ncreates a huge whirlpool that can swallow\neven ships."
        fr:
          emerald: "Il dort tranquillement au fond de\nl’océan. Quand il remonte à la surface,\nil crée d’énormes tourbillons qui peuvent\navaler de gros bateaux."
        it:
          emerald: "KINGDRA dorme pacifico sui fondali marini.\nTuttavia, quando decide di muoversi verso\nla superficie provoca dei vortici tali da\ninghiottire persino una nave."
        de:
          emerald: "Es schläft friedlich auf dem Meeresgrund.\nTaucht es auf, verursacht es einen\nStrudel, der sogar Schiffe in Seenot\nbringen kann."
        es:
          emerald: "Duerme tranquilamente en el fondo\ndel mar. Cuando sale a la superficie,\ncrea un enorme torbellino que puede\ntragarse barcos enteros."
phanpy:
  species_id: 231
  names:
    jp_kana: ゴマゾウ
