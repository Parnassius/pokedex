      descriptions:
        jp_kana:
          emerald: "しゃくねつの　ほのおで　まわりに　かげろうを\nつくりだして　すがたを　かくす　ことが　できる。\nもえあがる　ばくふうは　すべてを　やきつくすぞ。"
        en:
          emerald: "It can hide behind a shimmering heat haze\nthat it creates using its intense flames.\nTYPHLOSION create blazing explosive\nblasts that burn everything to cinders."
        fr:
          emerald: "Il se cache derrière un chatoyant nuage de\nchaleur qu’il crée en attisant ses flammes\nintenses. Il peut générer des rafales\nexplosives qui réduisent tout en cendres."
        it:
          emerald: "TYPHLOSION si nasconde avvolto da una\nlucente nube di calore creata dalle sue\nfiamme roventi. Crea esplosioni spetta-\ncolari che riducono in cenere ogni cosa."
        de:
          emerald: "TORNUPTO versteckt sich hinter einem\nHitzeschild, den es mit Hilfe seiner\nFlammen erzeugt. Es erzeugt Explosionen,\ndie alles in Schutt und Asche legen."
        es:
          emerald: "Se oculta tras un trémulo haz de calor que\ncrea mediante intensas y sofocantes\nllamaradas. Provoca explosiones\nabrasadoras que reducen todo a cenizas."
totodile:
  species_id: 158
  names:
    jp_kana: ワニノコ
    en: TOTODILE
    fr: KAIMINUS
    it: TOTODILE
    de: KARNIMANI
    es: TOTODILE
