        - cute_charm
      held_items:
        common: leppa_berry
        rare: moon_stone
      descriptions:
        jp_kana:
          emerald: "つばさを　つかって　とぶように　スキップ。\nすいめんを　あるく　ことだって　できるのだ。\nしずかな　つきよに　みずうみを　あるく。"
        en:
          emerald: "A CLEFABLE uses its wings to skip lightly \nas if it were flying. Its bouncy step\nlets it even walk on water. On quiet,\nmoonlit nights, it strolls on lakes."
        fr:
          emerald: "Ils se déplacent en sautant doucement,\ncomme s’ils volaient. Cela leur permet même\nde marcher sur l’eau. Les soirs où la lune\nest claire, ils se promènent sur les lacs."
        it:
          emerald: "CLEFABLE saltella come se fluttuasse\nsorretto dalle sue ali e riesce a camminare\nsull’acqua. È solito passeggiare sui\nlaghi nelle silenziose notti di luna piena."
        de:
          emerald: "Es bewegt sich fort, indem es leicht mit\nden Flügeln schlägt. Sein federnder Gang\nermöglicht es ihm, über Wasser zu gehen. \nBei Mondschein spaziert es auf Seen."
        es:
          emerald: "Usa las alas para dar saltitos y poder\ncaminar por el agua, pero no llega a volar.\nSe sabe que le encanta pasear por los\nlagos en tranquilas noches de luna llena."
vulpix:
  species_id: 37
  names:
    jp_kana: ロコン
    en: VULPIX
    fr: GOUPIX
    it: VULPIX
    de: VULPIX
