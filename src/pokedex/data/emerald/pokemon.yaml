        en:
          emerald: "A belt is worn by a MACHOKE to keep its\noverwhelming power under control.\nBecause it is so dangerous, no one has\never removed the belt."
        fr:
          emerald: "La ceinture de MACHOPEUR lui sert à\nmaintenir sa puissance phénoménale sous\ncontrôle. Par peur du danger, personne n’a\njamais osé lui enlever."
        it:
          emerald: "MACHOKE indossa una cintura che serve\na tenere sotto controllo la sua forza\ntravolgente. Nessuno ha mai osato rimuo-\nverla per paura del suo fisico possente."
        de:
          emerald: "MASCHOCK trägt einen Gürtel, um seine\nunbändige Kraft zu kontrollieren. Da es\ngefährlich ist, hat sich bis heute\nniemand getraut, den Gürtel zu entfernen."
        es:
          emerald: "MACHOKE lleva un cinturón para controlar\nsu abrumadora energía. Como es tan\npeligroso, nadie se lo ha quitado nunca."
