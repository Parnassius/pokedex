        en:
          emerald: "The vicious and sly gangster of the sea.\nIts skin is specially textured to minimize\ndrag in water. Its speed tops out at over\n75 miles per hour."
        fr:
          emerald: "Le gangster rusé des océans. Sa peau est\nconçue pour offrir peu de résistance à\nl’eau. Il est capable de nager à plus de\n120 km/h."
        it:
          emerald: "Astuto e feroce tiranno dei mari,\nSHARPEDO ha una pelle speciale che\ngli permette di ridurre l’attrito in acqua e\ndi raggiungere velocità di oltre 120 km/h."
        de:
          emerald: "Der brutale und listige Schurke der See.\nSeine Haut ist so strukturiert, dass der\nWasserwiderstand gering ist. Es kann\nbis zu 120 km/h schnell schwimmen."
        es:
          emerald: "Este POKéMON, muy violento y astuto, es el\nterror de los mares. La textura de su piel\nreduce al mínimo la resistencia al agua.\nLlega a alcanzar los 120 km por hora."
wailmer:
  species_id: 320
  names:
