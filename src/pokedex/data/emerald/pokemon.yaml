        en:
          emerald: "It loves to toughen up its body above all\nelse. If you hear quaking rumbles in a cave,\nit is the sound of MAKUHITA undertaking\nstrenuous training."
        fr:
          emerald: "Il adore muscler son corps plus que tout\nau monde. Si vous entendez des\ngrognements dans une grotte, c’est qu’un\nMAKUHITA est en train de s’y entraîner."
        it:
          emerald: "MAKUHITA ama mantenersi in forma e\nrafforzare il proprio corpo. Se sentite un\nfrastuono provenire da una grotta, è di\nsicuro MAKUHITA che si sta allenando."
        de:
          emerald: "Es liebt es, seinen Körper zu stählen. Falls\ndu erdbebenartige Geräusche aus einer\nHöhle hörst, ist es bestimmt ein\nMAKUHITA, das intensiv trainiert."
        es:
          emerald: "Lo que más le gusta es fortalecer su\ncuerpo. Si notas que el suelo de una\ncueva tiembla y el sonido retumba, es\nporque MAKUHITA está entrenándose."
hariyama:
  species_id: 297
