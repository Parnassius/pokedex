        en:
          emerald: "It runs up short trees that grow on the\nsavanna to peck at new shoots.\nA NATU’s eyes look as if they are\nalways observing something."
        fr:
          emerald: "Il descend des petits arbustes de la\nsavane pour picorer de jeunes pousses.\nSes yeux donnent toujours l’impression\nqu’il observe quelque chose."
        it:
          emerald: "NATU si arrampica sugli alberi della\nsavana alla ricerca di germogli.\nIl suo sguardo sembra sempre\nessere fisso su qualcosa."
        de:
          emerald: "Es klettert auf kleine Bäume in der Wüste,\num die neuen Triebe anzuknabbern.\nSeine Augen scheinen stets etwas\nzu beobachten."
        es:
          emerald: "Da saltitos por los árboles bajos de la\nsabana para picotear los brotes nuevos.\nLos ojos de un NATU dan la sensación\nde estar siempre observando algo."
xatu:
