      descriptions:
        jp_kana:
          emerald: "てに　もっている　ふりこの　うごきと　かがやきが\nあいてを　ふかい　さいみんじょうたいに　おとす。\nえものを　さがしながら　ふりこを　みがいている。"
        en:
          emerald: "The arcing movement and glitter of the\npendulum in a HYPNO’s hand lull the foe\ninto deep hypnosis. While searching for\nprey, it polishes the pendulum."
        fr:
          emerald: "Le mouvement de balancier et les reflets\nbrillants de son pendule hypnotisent\nprofondément son ennemi. Lorsqu’il\ncherche ses proies, il nettoie son pendule."
        it:
          emerald: "HYPNO tiene in mano un pendolo i cui\nriflessi e movimento inducono l’avver-\nsario in uno stato d’ipnosi. Mentre cerca la\npreda si prepara lucidando il pendolo."
        de:
          emerald: "HYPNO schwingt ein Pendel in der Hand,\nwomit es seine Feinde in eine tiefe Hyp-\nnose versetzt. Während es auf der Suche\nnach Beute ist, poliert es sein Pendel."
        es:
          emerald: "Lleva un péndulo en la mano cuyo balanceo\ny brillo sumen a su rival en un profundo\nestado de hipnosis. Mientras busca a\nsu presa, saca brillo al péndulo."
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    en: KRABBY
    fr: KRABBY
    it: KRABBY
    de: KRABBY
    es: KRABBY
  forms:
    krabby:
