      descriptions:
        jp_kana:
          emerald: "りょうての　ツメは　ぶあつい　てっぱんを\nまるで　きぬの　ように　ひきさく　はかいりょく。\nじそく　１００キロの　はやさで　そらを　とぶ。"
        en:
          emerald: "The claws tipping its arms pack the\ndestructive power to tear through thick\niron sheets as if they were silk. It flies\nat over 60 miles per hour."
        fr:
          emerald: "Les griffes sur ses bras renferment toute\nsa puissance destructrice. Elles déchirent\nle métal aussi facilement que de la soie.\nIl vole à 100 km/h."
        it:
          emerald: "Gli artigli di METANG sono dotati di un\npotere distruttivo tale da ridurre a\nbrandelli spessi blocchi di ferro come \nse fossero seta. Vola a oltre 100 km/h."
        de:
          emerald: "Die Krallen an seinen Armen haben so\nviel Kraft, dass sie durch dicke Eisen-\nblöcke schneiden, als wären sie aus Seide.\nEs fliegt bis zu 100 km/h schnell."
        es:
          emerald: "Sus brazos acaban en unas garras que\nacumulan energía destructiva con la que\nrasga planchas de hierro como si fueran\nde papel. Vuela a más de 100 km por hora."
metagross:
  species_id: 376
  names:
    jp_kana: メタグロス
