      descriptions:
        jp_kana:
          emerald: "ガルーラの　こどもが　１ぴきで　あそんでいても\nぜったいに　つかまえたりしては　いけないよ。\nちかくに　いる　おやが　はげしく　おこりだすぞ。"
        en:
          emerald: "If you come across a young KANGASKHAN\nplaying by itself, never try to catch it.\nThe baby’s parent is sure to be in the area,\nand it will become violently enraged."
        fr:
          emerald: "Lorsqu’on rencontre un petit KANGOUREX\nseul, il ne faut pas essayer de l’attraper.\nSes parents sont sûrement dans le coin et\nrisquent d’entrer dans une colère noire."
        it:
          emerald: "È meglio non disturbare mai un cucciolo di\nKANGASKHAN cercando di prenderlo. Il suo\ngenitore, infatti, è sicuramente lì vicino\ne potrebbe reagire in modo violento."
        de:
          emerald: "Stößt du auf ein junges KANGAMA, solltest\ndu nicht versuchen, es einzufangen. Die\nMutter ist bestimmt in Reichweite und\nkönnte sehr wütend auf dich werden."
        es:
          emerald: "Si te cruzas con uno que esté jugando, no\nlo molestes ni intentes atraparlo. Seguro\nque uno de sus progenitores anda cerca\ny reaccionará con enfado y violencia."
horsea:
  species_id: 116
  names:
    jp_kana: タッツー
