          emerald: "あまい　くだものが　だいこうぶつ。\nみみの　ような　うでで　きように　つみとる。\nかおりに　さそわれて　かじゅえんに　あつまる。"
        en:
          emerald: "A WYNAUT loves to eat sweet fruits.\nIt cleverly picks fruits using its earlike\narms. They gather in fruit gardens, drawn\nby the fragrance."
        fr:
          emerald: "OKEOKE raffole des fruits sucrés qu’il\nattrape à l’aide de ses bras en forme\nd’oreilles. Ces POKéMON se réunissent dans\nles jardins fruitiers, attirés par l’odeur."
        it:
          emerald: "WYNAUT ama cibarsi di deliziosi frutti che\nraccoglie con le sue zampe a forma di\norecchie. Questi POKéMON si raggruppano\nnei frutteti, attirati dal dolce profumo."
        de:
          emerald: "ISSO liebt süße Früchte. Geschickt\npflückt es mit seinen ohrenartigen Armen\nObst. Sie versammeln sich in Obstgärten,\nda sie vom Geruch angezogen werden."
        es:
          emerald: "WYNAUT disfruta comiendo fruta dulce. Es\nvivo al escogerla: usa los brazos con pinta\nde oreja que tiene. Se reúne con otros en\nhuertos frutales, atraído por el aroma."
snorunt:
  species_id: 361
  names:
    jp_kana: ユキワラシ
    en: SNORUNT
    fr: STALGAMIN
    it: SNORUNT
    de: SCHNEPPKE
    es: SNORUNT
