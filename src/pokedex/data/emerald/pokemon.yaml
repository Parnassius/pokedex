        en:
          emerald: "SNORLAX’s typical day consists of nothing\nmore than eating and sleeping. It is such\na docile POKéMON that there are children\nwho use its big belly as a place to play."
        fr:
          emerald: "Les journées de RONFLEX se résument\naux repas et aux siestes. Il est tellement\ngentil que les enfants n’hésitent pas à\njouer sur son énorme ventre."
        it:
          emerald: "In una giornata tipica, SNORLAX non fa\naltro che mangiare e dormire. È così\ndocile che i bambini usano la sua enorme\npancia come parco giochi."
        de:
          emerald: "Der typische Tagesablauf von RELAXO\nbesteht lediglich aus Essen und Schlafen.\nEs ist so zutraulich, dass Kinder seinen\nBauch als Platz zum Spielen nutzen."
        es:
          emerald: "Se dedica a comer y dormir. Es tan dócil\nque es fácil ver a niños usando la gran\npanza que tiene como lugar de juegos."
articuno:
