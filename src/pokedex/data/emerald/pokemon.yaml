      descriptions:
        jp_kana:
          emerald: "すてられた　ぬいぐるみが　ポケモンに　なった。\nゴミすてばを　すみかにして　すてた　こどもを\nさがして　あるきまわると　いわれている。"
        en:
          emerald: "An abandoned plush doll became this\nPOKéMON. They are said to live in garbage\ndumps and wander about in search of the\nchildren that threw them away."
        fr:
          emerald: "C’est une peluche abandonnée devenue\nPOKéMON. Les BRANETTE errent dans\nles décharges à la recherche des enfants\nqui les ont abandonnés."
        it:
          emerald: "I BANETTE si sono generati da peluche\nvecchi e abbandonati. Pare che vivano\nnelle discariche e che si aggirino in cerca\ndei bambini che li hanno gettati via."
        de:
          emerald: "Dieses POKéMON war einst eine zurück-\ngelassene Plüschpuppe. BANETTE lebt\nauf Müllhalden und hält nach dem Kind\nAusschau, das es weggeworfen hat."
        es:
          emerald: "Solía ser un muñeco de felpa al que\nabandonaron. Dicen que vive en vertederos\nde basura y que va buscando al niño\nque lo tiró en su día."
duskull:
  species_id: 355
  names:
    jp_kana: ヨマワル
