        jp_kana:
          emerald: "ふわふわの　たいもうで　かなしんでいる　こころを\nキャッチすると　どんなに　とおくでも　かけつけて\nえがおに　なる　しあわせタマゴを　わけてあげる。"
        en:
          emerald: "If it senses sadness with its fluffy fur,\na BLISSEY will rush over to the sad person,\nhowever far away, to share an egg of\nhappiness that brings a smile to any face."
        fr:
          emerald: "LEUPHORIE ressent la tristesse grâce à\nson pelage duveteux. Si une personne est\ntriste, il partage avec elle un œuf rempli\nde bonheur qui fait sourire tout le monde."
        it:
          emerald: "BLISSEY percepisce la tristezza con la sua\nsoffice pelliccia. Si reca quindi da chi è\ntriste, ovunque si trovi, per condividere\nun uovo di felicità che riporta il sorriso."
        de:
          emerald: "HEITEIRA nimmt mit seinem flauschigen Fell\nTraurigkeit wahr. Es hastet zu einer\ntraurigen Person und teilt ein GLÜCKS-EI\nmit ihr, um sie zum Lächeln zu bringen."
        es:
          emerald: "Percibe la tristeza a través de su sedoso\npelaje. Si ve que alguien está apenado,\nacudirá a su lado y compartirá un\nhuevo de la felicidad para animarle."
raikou:
  species_id: 243
  names:
