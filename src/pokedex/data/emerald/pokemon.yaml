        en:
          emerald: "Its fleece quality changes to generate\nstrong static electricity with a small\namount of wool. The bare, slick parts of its\nhide are shielded against electricity."
        fr:
          emerald: "La qualité de sa laine change pour générer\nun maximum d’électricité statique avec un\nminimum de laine. Les sections glabres de\nsa peau résistent à l’électricité."
        it:
          emerald: "La poca lana che ricopre il corpo di\nFLAAFFY è in grado di generare un’alta\ncarica elettrostatica. Le parti scoperte\nsono schermate contro le scosse."
        de:
          emerald: "Die Qualität von WAATYs Wolle verändert\nsich, so dass mit wenig Wolle große Auf-\nladungen erzeugt werden. Die kahlen Stel-\nlen sind gegen Elektrizität abgeschirmt."
        es:
          emerald: "La calidad de su lana varía para generar\nelectricidad estática con poca cantidad\nde lana. Las zonas donde no hay pelaje\nestán protegidas contra la electricidad."
ampharos:
