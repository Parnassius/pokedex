        jp_kana:
          emerald: "はるか　じょうくうから　きゅうこうか。\nねらった　えものは　ぜったいに　にがさない。\nあたたかい　とちを　さがして　いどうする。"
        en:
          emerald: "A SWELLOW dives upon prey from far above.\nIt never misses its targets. It takes to\nthe skies in search of lands with a warm\nclimate."
        fr:
          emerald: "HELEDELLE vole très haut dans le ciel\npour piquer sur ses proies qu’il ne manque\njamais. Il recherche sans cesse des terres\nau climat chaud."
        it:
          emerald: "SWELLOW si lancia dall’alto in picchiata\nsulla preda, senza mai sbagliare un colpo.\nLo si vede volare alto nei cieli alla ricerca\ndi terre dal clima mite."
        de:
          emerald: "SCHWALBOSS stürzt sich aus großen\nHöhen auf seine Beute. Dabei verfehlt es\nsein Ziel nie. Es fliegt immer auf der\nSuche nach warmem Klima."
        es:
          emerald: "SWELLOW se lanza al agua para atrapar\na su presa y no se le escapa ni una.\nSuele ir volando en busca de tierras\nde clima cálido."
wingull:
  species_id: 278
