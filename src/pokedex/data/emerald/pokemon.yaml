        en:
          emerald: "A POKéMON that mutated from an\nextraterrestrial virus exposed to a laser\nbeam. Its body is configured for superior\nagility and speed."
        fr:
          emerald: "Il est le résultat de la mutation d’un virus\nextraterrestre exposé à un rayon laser.\nSa structure corporelle lui confère une\nagilité et une vitesse supérieures."
        it:
          emerald: "DEOXYS è la mutazione di un virus extra-\nterrestre colpito da un raggio laser.\nLa sua struttura corporea gli conferisce\nagilità e velocità superiori."
        de:
          emerald: "DEOXYS ist eine mutierte Form eines außer-\nirdischen Virus, das einem Laserstrahl\nausgesetzt war. Sein Körper ist auf \nAgilität und Geschwindigkeit konfiguriert."
        es:
          emerald: "Es el resultado de la mutación que sufrió\nun virus espacial expuesto a un rayo láser.\nSe caracteriza por tener una velocidad\ny agilidad superiores a las del resto."
