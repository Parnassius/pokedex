      descriptions:
        jp_kana:
          emerald: "ちいさい　からだを　まもるため　きょうりょくな\nどくばりが　はったつしたと　かんがえられている。\nおこると　ツノの　さきから　もうどくを　だす。"
        en:
          emerald: "Its highly toxic barbs are thought to have\ndeveloped as protection for this small-\nbodied POKéMON. When enraged, it releases\na horrible toxin from its horn."
        fr:
          emerald: "Ce POKéMON est couvert de pointes qui\nsécrètent un poison puissant. Il les\nutilise pour se défendre. Quand il est en\ncolère, une toxine sort de sa corne."
        it:
          emerald: "Gli aculei di NIDORAN femmina secernono un\npotente veleno e si sarebbero sviluppati\nper proteggere il corpo minuto. Se si adira\nrilascia una potente tossina dal corno."
        de:
          emerald: "NIDORAN besitzt Giftstacheln, die dem\nSchutz dieses schmächtigen POKéMON\ndienen. Wenn es wütend wird, stößt es ein\ngefährliches Gift aus seinem Horn aus."
        es:
          emerald: "Dado su pequeño tamaño, se cree que\ndesarrolló las púas venenosas a modo de\nprotección. Cuando se enfada, libera una\nhorrible sustancia tóxica por el cuerno."
nidorina:
  species_id: 30
  names:
    jp_kana: ニドリーナ
    en: NIDORINA
    fr: NIDORINA
    it: NIDORINA
    de: NIDORINA
    es: NIDORINA
