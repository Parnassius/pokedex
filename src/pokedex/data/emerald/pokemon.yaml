        common: rawst_berry
        rare: rawst_berry
      descriptions:
        jp_kana:
          emerald: "たたかいに　なると　からだから　しゃくねつの\nほのおを　ふきあげ　あいてを　いかくする。\nその　ねっぷうで　まわりの　くさきも　もやすぞ。"
        en:
          emerald: "In battle, it blows out intense flames from\nall over its body to intimidate its foe.\nThese fiery bursts create heat waves that\nignite grass and trees in the area."
        fr:
          emerald: "Lorsqu’il se bat, il fait jaillir des flammes\nde son corps pour intimider son adversaire\net déclenche des vagues de chaleur qui\nembrasent la végétation environnante."
        it:
          emerald: "In lotta, MAGMAR sputa fiamme roventi da\ntutto il corpo per intimidire l’avversario.\nLa sua furia provoca ondate di calore\nche bruciano la vegetazione circostante."
        de:
          emerald: "Im Kampf stößt es glühend heiße Flammen\naus, um seinen Gegner einzuschüchtern.\nDas erzeugt Hitzewellen, die das Gras und\ndie Bäume der Umgebung in Brand setzen."
        es:
          emerald: "Al luchar, expulsa violentas llamas para\nintimidar a su rival. Estos estallidos de\nfuego crean ondas de calor que abrasan\nla hierba y los árboles de la zona."
pinsir:
  species_id: 127
  names:
    jp_kana: カイロス
    en: PINSIR
    fr: SCARABRUTE
    it: PINSIR
