        en:
          emerald: "It breathes through nostrils that it\nraises above the sea. By inhaling to its\nmaximum capacity, a WAILORD can dive close\nto 10,000 feet beneath the waves."
        fr:
          emerald: "Il respire en faisant sortir ses évents\nhors de l’eau. En inhalant au maximum,\nil peut descendre jusqu’à 3 000 mètres\nde profondeur."
        it:
          emerald: "WAILORD respira con le narici a pelo dell’\nacqua. Dopo aver inalato quanta più aria\npossibile, si immerge fino a raggiungere\nuna profondità di quasi 3.000 metri."
        de:
          emerald: "Es atmet durch das Blasloch, das es dazu\naus dem Meer erhebt. Wenn es seine Lungen\nvollständig mit Luft gefüllt hat, kann\nWAILORD bis zu 3000 Meter tief tauchen."
        es:
          emerald: "Respira a través de los espiráculos que\nsaca a la superficie. Si toma aire hasta el\nmáximo de su capacidad, puede sumergirse\na una profundidad de hasta 3.000 m."
numel:
