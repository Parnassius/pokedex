        jp_kana:
          emerald: "ふくざつな　しんけい　ネットワークで　むすばれた\n４つの　のうみそを　もつ　メタグロスは\nスーパーコンピュータよりも　あたまが　いい。"
        en:
          emerald: "METAGROSS has four brains that are joined\nby a complex neural network. As a result of\nintegration, this POKéMON is smarter than\na supercomputer."
        fr:
          emerald: "Les quatre cerveaux de METALOSSE sont\nreliés par un réseau neuronal complexe.\nCe POKéMON est plus intelligent qu’un\nsuperordinateur."
        it:
          emerald: "METAGROSS possiede quattro cervelli\ncollegati fra di loro da una complessa\nrete neurale. Il risultato è un POKéMON\npiù intelligente di un supercomputer."
        de:
          emerald: "METAGROSS hat vier Gehirne, die über ein\nneurales Netzwerk miteinander verbunden\nsind. Das Ergebnis der Integrierung ist,\ndass es schlauer als ein Superrechner ist."
        es:
          emerald: "METAGROSS tiene cuatro cerebros unidos\npor una compleja red neuronal. Esta\nintegración hace que sea más inteligente\nque un ordenador de última generación."
regirock:
  species_id: 377
