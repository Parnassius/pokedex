      descriptions:
        jp_kana:
          emerald: "ふこうを　はこぶと　いわれ　おそれられていた。\nキラキラ　ひかる　ものに　きょうみを　しめし\nじょせいの　ゆびわを　とっていこうとする。"
        en:
          emerald: "MURKROW were feared as the alleged\nbearers of ill fortune. It shows strong\ninterest in anything that sparkles. It will\neven try to steal rings from women."
        fr:
          emerald: "Jadis, CORNEBRE était craint et détesté\ncar on disait qu’il portait malheur. Il est\nattiré par tout ce qui brille. Parfois, il\nessaye de voler les bagues des filles."
        it:
          emerald: "MURKROW era temuto e disprezzato poiché\nsi pensava portasse sfortuna. È attratto\nda tutto ciò che luccica, arrivando persino\na tentare di rubare gli anelli alle signore."
        de:
          emerald: "KRAMURX wurde als vermeintlicher Über-\nbringer des Unheils gefürchtet. Es hat ein\ngroßes Interesse an allem, was funkelt und\nglitzert. Es stiehlt auch Ringe von Frauen."
        es:
          emerald: "MURKROW ha sido temido y repudiado por\ntodos porque se cree que da mala suerte.\nLe encanta todo lo que resplandece. \nA las mujeres les roba los anillos."
