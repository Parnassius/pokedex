        en:
          emerald: "It gives off so much light that it can be\nseen even from space. People in the old\ndays used its light to send signals back\nand forth with others far away."
        fr:
          emerald: "PHARAMP est si lumineux qu’on peut le voir\nde l’espace. Jadis, les gens utilisaient sa\nlumière pour communiquer et s’envoyer des\nsignaux à grande distance."
        it:
          emerald: "AMPHAROS emana una luce così intensa da\nessere visibile anche dallo spazio. In\npassato veniva usato per mandare segnali\nluminosi a persone molto lontane."
        de:
          emerald: "AMPHAROS’ Licht ist so stark, dass es so-\ngar aus dem Weltraum gesehen werden kann.\nIn der Antike benutzten die Menschen\nsein Licht, um Signale auszutauschen."
        es:
          emerald: "Desprende tanta luz que es posible verlo\ndesde el espacio. Antes, la gente usaba\nsu luz como sistema de comunicación con\nel que enviaba señales a gran distancia."
bellossom:
