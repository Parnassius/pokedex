        jp_kana:
          emerald: "１ぴきずつ　ちがう　ブチもようが　とくちょう。\nフラフラと　おぼつかない　あしどりは\nあいての　ねらいを　はずす　こうかが　ある。"
        en:
          emerald: "It is distinguished by a pattern of\nspots that is always different. Its\nunsteady, tottering walk has the\neffect of fouling its foe’s aim."
        fr:
          emerald: "La forme de ses taches est unique. Sa\ndémarche maladroite et chancelante a\npour effet de faire perdre leur\nconcentration à ses ennemis."
        it:
          emerald: "Ogni esemplare di SPINDA ha un diverso\nmotivo maculato sul corpo. Il suo passo\nincerto e barcollante confonde il nemico,\nche non riesce a prenderlo di mira."
        de:
          emerald: "Da sein Punktmuster stets unterschiedlich\nist, kann man es dadurch unterscheiden.\nSein wankender Gang erschwert es\ndem Gegner, es zu treffen."
        es:
          emerald: "Se le diferencia por los dibujos del pelaje;\nno hay dos iguales. Su forma de andar,\ninestable y torpe, logra confundir al\nenemigo y hacer que su puntería falle."
trapinch:
  species_id: 328
