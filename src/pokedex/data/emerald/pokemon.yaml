        jp_kana:
          emerald: "あらしが　ちかづき　つなみを　よかんすると\nいわを　つみあげて　うみぞいの　すを　まもる。\nジェットスキーと　ごかくの　スピードで　およぐ。"
        en:
          emerald: "If it senses the approach of a storm and\na tidal wave, it protects its seaside nest\nby piling up boulders. It swims as fast as\na jet ski."
        fr:
          emerald: "S’il sent venir une tempête, il protège\nson nid au bord de l’eau en empilant de\ngros rochers. Quand il nage, il est aussi\nrapide qu’un jet-ski."
        it:
          emerald: "Quando SWAMPERT percepisce l’arrivo di\ntempeste e maree, crea pile di massi per\nproteggere il suo rifugio. È in grado di\nnuotare alla velocità di un acquascooter."
        de:
          emerald: "Spürt es einen Sturm oder eine Flutwelle\nkommen, versucht es sein Nest am Ufer\nmit Felsen zu schützen. Es schwimmt\nso schnell wie ein Jetski."
        es:
          emerald: "Si detecta que se acerca una tormenta,\nprotege su nido apilando cantos rodados\npara protegerlo del fuerte oleaje.\nNada tan rápido como una moto acuática."
poochyena:
  species_id: 261
  names:
    jp_kana: ポチエナ
