      descriptions:
        jp_kana:
          emerald: "あいきょう　たっぷりの　しぐさで　だいにんき。\nたたかう　ときは　しっぽを　けばだたせる。\nするどい　うなりごえを　あげて　てきを　いかく。"
        en:
          emerald: "A SKITTY’s adorably cute behavior makes it\nhighly popular. In battle, it makes its tail\npuff out. It threatens foes with a sharp\ngrowl."
        fr:
          emerald: "Le côté adorable de SKITTY en fait un\nPOKéMON très apprécié. En combat, il\nhérisse sa queue et menace ses\nadversaires d’un miaulement aigu."
        it:
          emerald: "SKITTY è un POKéMON molto apprezzato per\nla dolcezza del suo comportamento. In\nlotta, gonfia la coda ed emette un ringhio\nacuto che spaventa l’avversario."
        de:
          emerald: "Aufgrund seines niedlichen Verhaltens ist\nes sehr beliebt. Im Kampf schlägt es mit\ndem Schweif zu. Durch grimmiges\nFauchen schüchtert es den Feind ein."
        es:
          emerald: "La forma de ser de SKITTY, entrañable y\nadorable, lo hace tremendamente popular.\nEn combate, hincha la cola y amenaza\na su rival con un agudo gruñido."
delcatty:
  species_id: 301
