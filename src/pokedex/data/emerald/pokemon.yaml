        rare: rawst_berry
      descriptions:
        jp_kana:
          emerald: "きゅうかくに　すぐれ　いちど　かいだ　においは\nなにが　あっても　ぜったいに　わすれない。\nあいての　きもちを　においで　さっちする。"
        en:
          emerald: "Its superb sense of smell ensures that\nthis POKéMON won’t forget any scent,\nno matter what. It uses its sense of smell\nto detect the emotions of others."
        fr:
          emerald: "CANINOS a un odorat très développé qui lui\npermet de ne jamais oublier un parfum. Il\nutilise son puissant sens olfactif pour\ndeviner les émotions des autres."
        it:
          emerald: "GROWLITHE ha un senso dell’olfatto molto\nsviluppato: quando annusa qualcosa non\nne scorda più l’odore. Attraverso l’odore\ndetermina le emozioni delle altre creature."
        de:
          emerald: "Dank FUKANOs ausgezeichnetem Geruchs-\nsinn vergisst es nie einen Geruch. Es\nbenutzt diese Fähigkeit dazu, die\nGefühlslage von Lebewesen auszuloten."
        es:
          emerald: "Tiene un sentido del olfato excepcional\ny una gran memoria sensitiva: nunca olvida\nuna esencia e incluso puede identificar\nlas emociones de otros seres vivos."
arcanine:
  species_id: 59
  names:
    jp_kana: ウインディ
    en: ARCANINE
    fr: ARCANIN
    it: ARCANINE
    de: ARKANI
    es: ARCANINE
