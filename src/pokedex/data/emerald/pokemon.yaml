        jp_kana:
          emerald: "かがくの　ちからで　かせきから　よみがえった。\nさゆう　８まいの　はねを　くねらせて　およぐ。\nうみで　くらすうちに　あしが　ハネに　かわった。"
        en:
          emerald: "It was resurrected from a fossil using the\npower of science. It swims by undulating\nthe eight wings at its sides. They were\nfeet that adapted to life in the sea."
        fr:
          emerald: "La science l’a ressuscité à partir d’un\nfossile. Il nage en ondulant les huit ailes\nsur ses côtés. Celles-ci ont réussi à\ns’adapter à la vie sous-marine."
        it:
          emerald: "ANORITH è stato rigenerato da un fossile.\nLe sue otto pinne laterali, che sono zampe\ntrasformatesi per adattarsi alla vita in\nmare, servono al POKéMON per nuotare."
        de:
          emerald: "Dank der Wissenschaft konnte ANORITH\naus einem Fossil wiederhergestellt werden.\nEs schwimmt, indem es seine acht Flügel,\ndie sich dem Meer angepasst haben, bewegt."
        es:
          emerald: "La ciencia logró regenerarlo a partir de\nun fósil. Nada batiendo las ocho alas\nque tiene a los lados y que fueron patas\nque se adaptaron a su nueva vida en el mar."
armaldo:
  species_id: 348
  names:
    jp_kana: アーマルド
