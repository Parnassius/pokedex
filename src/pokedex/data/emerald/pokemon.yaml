        jp_kana:
          emerald: "９ほんの　しっぽには　それぞれ　ふしぎな\nちからが　やどっていると　いいつたえられる。\nながいきの　キュウコンは　たいもうが　きんいろ。"
        en:
          emerald: "It has long been said that each of the\nnine tails embody an enchanted power.\nA long-lived NINETALES will have fur that\nshines like gold."
        fr:
          emerald: "On raconte depuis longtemps que chacune\nde ses neuf queues possède un pouvoir\nmagique. Un FEUNARD très âgé se\nreconnaît à sa fourrure dorée."
        it:
          emerald: "Si narra che ognuna delle nove code di\nNINETALES abbia un potere magico. Se\nvive a lungo, la sua pelliccia diventa\nbrillante come l’oro."
        de:
          emerald: "Man ging lange Zeit davon aus, dass jeder\nder neun Schweife verzauberte Macht\nbesitzt. Das Fell eines alten VULNONA\nglänzt golden."
        es:
          emerald: "Dicen que cada una de sus nueve colas\ntiene poderes mágicos. Con el paso del\ntiempo, el pelaje de NINETALES\nadquiere un tono dorado."
jigglypuff:
  species_id: 39
