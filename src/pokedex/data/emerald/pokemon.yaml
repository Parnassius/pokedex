        jp_kana:
          emerald: "したアゴが　とても　はったつした　ポケモン。\nキバが　おもたいので　くびを　かしげている。\nおどろかさなければ　むやみに　かみつかない。"
        en:
          emerald: "It has a particularly well-developed lower\njaw. The huge fangs are heavy, causing\nit to tilt its head. Unless it is startled, it\nwill not try to bite."
        fr:
          emerald: "Il a une mâchoire inférieure très\ndéveloppée. Ses crocs sont si lourds\nqu’ils l’obligent à pencher la tête. Il ne\nmord jamais sans raison, sauf s’il a peur."
        it:
          emerald: "GRANBULL è dotato di una mascella\ninferiore molto sviluppata. A causa delle\nenormi zanne, inclina la testa per stare in\nequilibrio. Morde solo se viene spaventato."
        de:
          emerald: "GRANBULL besitzt einen besonders aus-\ngeprägten Unterkiefer. Wegen seiner\nschweren Zähne wackelt es mit dem Kopf.\nEs beißt nur zu, wenn es erschreckt wird."
        es:
          emerald: "Tiene una mandíbula inferior enorme y\ncolmillos pesados que le hacen inclinar\nla cabeza hacia atrás para compensar\nel peso. Si no le asustan, no muerde."
qwilfish:
  species_id: 211
