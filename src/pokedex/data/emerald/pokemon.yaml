        jp_kana:
          emerald: "ひとや　ポケモンの　かんじょうを　あたまの\nツノで　キャッチする　ちからを　もつ　ポケモン。\nてきいを　かんじとると　かくれてしまう。"
        en:
          emerald: "A RALTS has the power to sense the\nemotions of people and POKéMON with the\nhorns on its head. It takes cover if it\nsenses any hostility."
        fr:
          emerald: "Grâce aux cornes sur sa tête, TARSAL a\nla faculté de ressentir les émotions des\ngens et des POKéMON. Il se met à l’abri au\nmoindre signe d’hostilité."
        it:
          emerald: "RALTS ha la capacità di percepire le\nemozioni di uomini e POKéMON grazie alle\ncorna poste sul capo. Se avverte ostilità,\ncorre a rifugiarsi."
        de:
          emerald: "TRASLA kann die Emotionen der Menschen\nund POKéMON mit seinem Horn fühlen.\nFühlt es Feindseligkeit, versteckt es sich."
        es:
          emerald: "RALTS tiene la capacidad de detectar las\nsensaciones de la gente y de los POKéMON\ngracias a los cuernos de la cabeza. Si\npercibe energía negativa, se protegerá."
kirlia:
  species_id: 281
