      abilities:
        - chlorophyll
      descriptions:
        jp_kana:
          emerald: "くちから　たれている　みつの　においを　かぐと\nあまりの　くささに　きおくが　なくなる　らしい。\nむしろ　この　においを　このむ　マニアも　いる。"
        en:
          emerald: "A horribly noxious honey drools from its\nmouth. One whiff of the honey can result\nin memory loss. Some fans are said to\nenjoy this overwhelming stink, however."
        fr:
          emerald: "Un filet de miel nauséabond s’écoule\nde sa bouche. Le sentir peut entraîner\nune perte de mémoire mais on raconte\nque des gens raffolent de cette odeur."
        it:
          emerald: "La disgustosa resina che esce dalla bocca\ndi GLOOM può far perdere la memoria a chi\nl’annusa. Tuttavia, pare che alcuni\napprezzino questo fetido olezzo."
        de:
          emerald: "Ekliger, schleimiger Honig tropft aus sei-\nnem Mund. Eine kleine Menge reicht aus, um\nin Katatonie zu verfallen. Es gibt jedoch\nAnhänger dieses stechenden Gestanks."
        es:
          emerald: "De su boca cae una miel muy nociva que\ndesprende un hedor que puede provocar\nla pérdida de memoria. Con todo, hay\nquien afirma deleitarse con su fetidez."
vileplume:
  species_id: 45
