      descriptions:
        jp_kana:
          emerald: "しっぽの　さきから　にじみでる　たいえきで\nなわばりの　まわりに　じぶんの　マークを　かく。\n５０００　しゅるいの　マークが　みつかっている。"
        en:
          emerald: "A SMEARGLE marks its territory using a\nfluid that leaks out from the tip of its\ntail. About 5,000 different marks left by\nthis POKéMON have been found."
        fr:
          emerald: "Il délimite son territoire en libérant un\nfluide corporel qui sort de sa queue. On a\ndécouvert plus de 5 000 traces de fluide\ndifférentes laissées par ce POKéMON."
        it:
          emerald: "SMEARGLE delimita il suo territorio con il\nfluido corporeo secreto dalla punta della\ncoda. Sono stati rinvenuti ben 5.000\ndiversi segni di delimitazione."
        de:
          emerald: "FARBEAGLE markiert sein Revier mit einer\nFlüssigkeit, die aus seiner Schweifspitze\naustritt. Es wurden über 5000 Markierun-\ngen entdeckt, die es hinterlassen hat."
        es:
          emerald: "Marca su territorio liberando un fluido\ncorporal por el extremo de la cola. Hasta\nla fecha, se conocen más de 5.000 tipos\nde marcas dejadas por este POKéMON."
tyrogue:
  species_id: 236
  names:
    jp_kana: バルキー
    en: TYROGUE
    fr: DEBUGANT
    it: TYROGUE
    de: RABAUZ
    es: TYROGUE
  forms:
    tyrogue:
