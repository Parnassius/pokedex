        - overgrow
      descriptions:
        jp_kana:
          emerald: "ひなたで　ひるねを　する　すがたを　みかける。\nたいようの　ひかりを　いっぱい　あびることで\nせなかの　タネが　おおきく　そだつのだ。"
        en:
          emerald: "BULBASAUR can be seen napping in bright\nsunlight. There is a seed on its back.\nBy soaking up the sun’s rays, the seed\ngrows progressively larger."
        fr:
          emerald: "BULBIZARRE passe son temps à faire la\nsieste sous le soleil. Il absorbe les rayons\nde soleil pour faire doucement pousser la\ngraine qu’il a sur son dos."
        it:
          emerald: "È possibile vedere BULBASAUR mentre\nschiaccia un pisolino sotto il sole. Ha un\nseme piantato sulla schiena che cresce e\nsi ingrandisce grazie ai raggi solari."
        de:
          emerald: "BISASAM macht gern einmal ein Nickerchen\nim Sonnenschein. Auf seinem Rücken trägt\nes einen Samen. Indem es Sonnenstrahlen\naufsaugt, wird der Samen stetig größer."
        es:
          emerald: "A BULBASAUR es fácil verle echándose\nuna siesta al sol. La semilla que tiene\nen el lomo va creciendo cada vez más\na medida que absorbe los rayos del sol."
