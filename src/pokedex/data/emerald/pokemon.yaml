        jp_kana:
          emerald: "ひとや　ポケモンが　はっしている　やさしさや\nたのしい　きもちを　エネルギーに　している。\nカラの　なかに　ためた　しあわせを　わけている。"
        en:
          emerald: "As its energy, it uses the feelings of\ncompassion and pleasure exuded by\npeople and POKéMON. It stores up happy\nfeelings in its shell, then shares them out."
        fr:
          emerald: "L’énergie de TOGEPI provient du plaisir\net des émotions exprimés par les gens et\nles POKéMON. Il les accumule dans sa\ncoquille, puis les partage avec les autres."
        it:
          emerald: "TOGEPI ricava l’energia dai sentimenti di\naffetto e generosità emanati dai POKéMON\ne dall’uomo. Immagazzina le sensazioni di\nfelicità nel guscio per condividerle."
        de:
          emerald: "TOGEPI nutzt die positiven Emotionen, wie\nFreude und Mitgefühl, von Menschen und\nPKMN als Energie. Es speichert Glücks-\ngefühle in seiner Schale und teilt sie."
        es:
          emerald: "Usa la compasión y la alegría que emanan\nde la gente y de los POKéMON como energía.\nAlmacena sentimientos positivos en su\ninterior y después los comparte con otros."
