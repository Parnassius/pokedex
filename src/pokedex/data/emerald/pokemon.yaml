        jp_kana:
          emerald: "うっそうと　おいしげった　もりの　なかでは\nからだから　はえた　はっぱが　てきの　めから\nジュプトルの　すがたを　かくしてくれるのだ。"
        en:
          emerald: "Leaves grow out of this POKéMON’s body.\nThey help obscure a GROVYLE from the eyes\nof its enemies while it is in a thickly\novergrown forest."
        fr:
          emerald: "De grandes feuilles poussent sur le dos\nde ce POKéMON. Il les utilise pour se\ncacher de ses ennemis quand il se trouve\ndans une végétation luxuriante."
        it:
          emerald: "Sul corpo di GROVYLE crescono delle\nfoglie che gli servono per mimetizzarsi\ne nascondersi dai nemici quando si \ntrova in una fitta foresta."
        de:
          emerald: "Aus seinem Körper wachsen Blätter. Diese\nBlätter helfen ihm, sich vor Feinden im\ndichtbewachsenen Wald zu tarnen."
        es:
          emerald: "A GROVYLE le crecen hojas que le sirven\nde camuflaje e impiden que los enemigos\nlo detecten cuando se encuentra en un\nbosque cuya vegetación es frondosa."
sceptile:
  species_id: 254
  names:
    jp_kana: ジュカイン
