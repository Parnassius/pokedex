      descriptions:
        jp_kana:
          emerald: "でんきを　ためておく　ことが　まだ　ヘタ。\nびっくりすると　おもわず　ほうでんしてしまう。\nせいちょうすると　じょうずに　なっていく。"
        en:
          emerald: "It is still inept at retaining electricity.\nWhen it is startled, it discharges power\naccidentally. It gets better at holding\npower as it grows older."
        fr:
          emerald: "Il est incapable de retenir l’électricité en\nlui et en relâche accidentellement quand\nil s’agite. Il progresse dans ce domaine en\ngrandissant."
        it:
          emerald: "PICHU non è in grado di trattenere\nl’elettricità. Se si emoziona, ne rilascia\nun po’ senza volerlo. Col passare del\ntempo però, impara ad immagazzinarla."
        de:
          emerald: "Es kann noch nicht mit Elektrizität um-\ngehen. Erschrickt es, entlädt es zufällig\nEnergie. Mit zunehmendem Alter wird es in\nder Beherrschung der Energie erfahrener."
        es:
          emerald: "Sigue sin conseguir retener electricidad.\nCuando se asusta, descarga energía\nde forma accidental. Con todo, a medida\nque pasa el tiempo va mejorando."
cleffa:
  species_id: 173
  names:
    jp_kana: ピィ
    en: CLEFFA
    fr: MELO
    it: CLEFFA
    de: PII
    es: CLEFFA
