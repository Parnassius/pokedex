      descriptions:
        jp_kana:
          emerald: "サイコパワーで　からだを　ささえているため\nじゅうりょくを　かんじていない　らしい。\nトレーナーを　まもる　ために　いのちを　かける。"
        en:
          emerald: "It apparently does not feel the pull of\ngravity because it supports itself with\npsychic power. It will give its life to\nprotect its TRAINER."
        fr:
          emerald: "Apparemment, il ne ressent pas la force\nde la gravité car il lévite grâce à ses\npouvoirs psychiques. Ce POKéMON donnerait\nsa vie pour sauver son DRESSEUR."
        it:
          emerald: "Pare che GARDEVOIR non sia soggetto alla\nforza di gravità, perché è in grado di\nsostenersi con i poteri psichici. Darebbe\nla vita per proteggere il suo ALLENATORE."
        de:
          emerald: "Die Schwerkraft scheint ihm nichts\nauszumachen, da es mittels seiner\nPsykräfte schwebt. Es würde sein\nLeben für seinen TRAINER geben."
        es:
          emerald: "Al parecer, no siente la fuerza de la\ngravedad porque se sostiene gracias a\nla energía psicoquinética. Por proteger\na su ENTRENADOR, sería capaz de todo."
surskit:
  species_id: 283
