      descriptions:
        jp_kana:
          emerald: "きまった　すみかを　もたずに　いごこちの　よい\nばしょを　さがし　ねどこを　かえる　しゅうせい。\nやこうせいで　ひぐれから　こうどうを　はじめる。"
        en:
          emerald: "Rather than keeping a permanent lair,\nit habitually seeks comfortable spots and\nsleeps there. It is nocturnal and becomes\nactive at dusk."
        fr:
          emerald: "Plutôt que d’avoir un endroit bien à lui,\nil préfère chercher des endroits\nconfortables et s’y reposer. Ce POKéMON\ndevient actif à la tombée de la nuit."
        it:
          emerald: "DELCATTY non ha una tana fissa, ma si\nsposta sempre alla ricerca di un posto\ncomodo per dormire. È un POKéMON notturno\ne pertanto diventa attivo all’imbrunire."
        de:
          emerald: "Es hat keinen festen Schlafplatz, sondern\nsucht sich gewöhnlich ein gemütliches\nPlätzchen und schläft dort. Es wird bei\nEinbruch der Dunkelheit aktiv."
        es:
          emerald: "Prefiere buscar cada vez sitios cómodos\npara dormir a tener una guarida\npermanente. Es nocturno y se vuelve\nactivo al anochecer."
sableye:
  species_id: 302
