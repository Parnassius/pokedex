      egg_groups:
        - undiscovered
      abilities:
        - pressure
      descriptions:
        jp_kana:
          emerald: "いでんしそうさに　よって　つくられた　ポケモン。\nにんげんの　かがくりょくで　からだは　つくれても\nやさしい　こころを　つくることは　できなかった。"
        en:
          emerald: "A POKéMON that was created by genetic\nmanipulation. However, even though the\nscientific power of humans made its body,\nthey failed to give it a warm heart."
        fr:
          emerald: "MEWTWO a été créé par manipulation\ngénétique. Bien que les humains aient\nréussi à créer son corps, il n’a pas été\ndoté d’un cœur sensible."
        it:
          emerald: "MEWTWO è il risultato di una manipolazione\ngenetica. Sebbene la scienza sia riuscita a\ncreare un corpo di POKéMON, ha fallito\nnell’intento di dargli un animo generoso."
        de:
          emerald: "Es ist durch Genmanipulation entstanden.\nDie Menschen haben es zwar mit ihrem\nSachverstand erzeugt, aber nicht mit\neinem mitfühlenden Herzen ausgestattet."
        es:
          emerald: "Fue creado por manipulación genética,\npero, a pesar de que los científicos\ndieron a MEWTWO un cuerpo, no lograron\ndotarle de un corazón compasivo."
mew:
  species_id: 151
