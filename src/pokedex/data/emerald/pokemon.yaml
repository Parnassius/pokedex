      descriptions:
        jp_kana:
          emerald: "きおんが　１８どを　こえると　はなが　ひらく。\nおんどに　より　はなの　ひらきかたが　かわるので\nおんどけいの　かわりに　することも　ある。"
        en:
          emerald: "It blossoms when the temperature rises\nabove 64 degrees F. Because its flower’s\nblooming changes with the temperature,\nit is sometimes used as a thermometer."
        fr:
          emerald: "Sa fleur éclot lorsque la température\natteint 18 degrés. Son ouverture change\nen fonction de la température. Certains\nse servent de lui comme d’un thermomètre."
        it:
          emerald: "Il fiore di SKIPLOOM è sensibile alla\ntemperatura e sboccia quando questa\nsupera i 18 gradi centigradi. Questo\nPOKéMON è usato anche come termometro."
        de:
          emerald: "HUBELUPFs Blume beginnt bei 18 Grad zu\nblühen. Wie weit sich die Blüte öffnet,\nhängt von der Temperatur ab. Daher wird es\nmanchmal als Thermometer eingesetzt."
        es:
          emerald: "Florece si la temperatura llega a 18 grados\ncentígrados. La apertura de los pétalos\nvaría según la temperatura que haga, por\nlo que la gente lo usa como termómetro."
jumpluff:
