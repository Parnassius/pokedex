        en:
          emerald: "It is rumored that a boy with psychic\nabilities suddenly transformed into\nKADABRA while he was assisting research\ninto extrasensory powers."
        fr:
          emerald: "On dit que KADABRA était jadis un garçon.\nSes pouvoirs psychiques l’auraient fait se\ntransformer alors qu’il participait à des\nexpériences extrasensorielles."
        it:
          emerald: "Si dice che un bambino dotato di poteri\npsichici si sia trasformato in KADABRA\nmentre collaborava ad una ricerca sui\npoteri extrasensoriali."
        de:
          emerald: "Man sagt, dass ein Junge mit Psykräften\nbeim Assistieren von Untersuchungen im\nBereich des Parasinnlichen plötzlich zu\nKADABRA wurde."
        es:
          emerald: "Dicen que un chico que tenía capacidades\npsíquicas se transformó de repente en\nKADABRA mientras ayudaba en un estudio\nsobre poderes extrasensoriales."
