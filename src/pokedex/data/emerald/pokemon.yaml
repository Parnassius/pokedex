        jp_kana:
          emerald: "てあしの　カギヅメを　つきたてて　きを　のぼる。\nおやの　いない　すきを　ねらって　きの　うえに\nある　す　から　タマゴを　ぬすんで　たべる。"
        en:
          emerald: "A SNEASEL scales trees by punching its\nhooked claws into the bark. It seeks out\nunguarded nests and steals eggs for food\nwhile the parents are away."
        fr:
          emerald: "Il grimpe aux arbres en enfonçant ses\ngriffes crochetées dans l’écorce. Il\ncherche les nids non surveillés par les\nparents et vole les œufs pour les manger."
        it:
          emerald: "SNEASEL usa i suoi artigli uncinati per\narrampicarsi sugli alberi. È sempre alla\nricerca di nidi incustoditi per cibarsi\ndelle uova mentre i genitori sono assenti."
        de:
          emerald: "SNIEBEL klettert an Bäumen hoch, indem es\nseine Krallen in die Rinde schlägt. Es\nsucht nach unbewachten Nestern und\nstiehlt die Eier, wenn die Eltern weg sind."
        es:
          emerald: "Trepa a los árboles clavando en la\ncorteza sus garras curvadas. Busca\nnidos desprovistos de vigilancia paterna\npara robar huevos y comérselos."
teddiursa:
  species_id: 216
