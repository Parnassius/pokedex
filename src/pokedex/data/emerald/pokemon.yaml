      descriptions:
        jp_kana:
          emerald: "ほのおの　いきおいと　ねっぷうで　いかくする。\nすばやい　みのこなしで　あいての　こうげきを\nかわしながら　どうじに　ほのおで　もやす。"
        en:
          emerald: "It intimidates foes with intense gusts of\nflames and superheated air. Its quick\nnimbleness lets it dodge attacks even\nwhile scorching an enemy."
        fr:
          emerald: "Il garde ses ennemis à distance grâce à\nses flammes et à des rafales d’air brûlant.\nSon agilité lui permet d’éviter les\nattaques, tout en enflammant ses ennemis."
        it:
          emerald: "QUILAVA tiene a bada il nemico con le sue\nfiamme e con getti di aria rovente. Sfrutta\nla sua estrema destrezza per evitare gli\nattacchi anche mentre scotta il nemico."
        de:
          emerald: "IGELAVAR hält seine Gegner mit Flammen\nauf Distanz. Es nutzt seine Gewandtheit\ndazu, Angriffen auszuweichen und seinen\nGegner gleichzeitig zu versengen."
        es:
          emerald: "Intimida a sus rivales con la intensidad\nde sus llamas y sus ráfagas de aire ígneo.\nEs capaz de esquivar ataques con gran\nagilidad al tiempo que abrasa al rival."
typhlosion:
  species_id: 157
  names:
    jp_kana: バクフーン
    en: TYPHLOSION
    fr: TYPHLOSION
    it: TYPHLOSION
