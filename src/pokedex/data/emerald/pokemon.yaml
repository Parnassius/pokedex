        en:
          emerald: "When two LAIRON meet in the wild, they\nfight for territory by bashing into each\nother with their steel bodies. The sound\nof their collision carries for miles."
        fr:
          emerald: "Quand deux GALEGON se rencontrent,\nils se battent pour leur territoire en\nse fonçant dessus. On peut entendre\nces affrontements à des kilomètres."
        it:
          emerald: "Se due LAIRON si incontrano, si contendono\nil territorio scagliandosi l’uno contro\nl’altro con i corpi d’acciaio, producendo\nun rumore udibile a chilometri di distanza."
        de:
          emerald: "Treffen zwei STOLLRAK in der Wildnis auf-\neinander, kämpfen sie um ihr Gebiet, indem\nsie sich mit ihren Stahlkörpern beharken.\nDieses Geräusch ist meilenweit zu hören."
        es:
          emerald: "Si dos LAIRON se encuentran en su\nhábitat natural, luchan por su territorio\ngolpeándose con sus cuerpos de acero. El\nestruendo que forman se oye a kilómetros."
aggron:
