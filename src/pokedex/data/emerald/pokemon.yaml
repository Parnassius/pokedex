          emerald: "カラを　つかって　えものを　はさみ　にがさない。\nしんかする　ときに　つくられる　しんじゅは\nふしぎな　ちからを　やどしていると　いわれる。"
        en:
          emerald: "A CLAMPERL slams its shell closed on prey\nto prevent escape. The pearl it creates\nupon evolution is said to be infused with\na mysterious energy."
        fr:
          emerald: "COQUIPERL ferme sa coquille sur ses proies\npour qu’elles ne puissent pas s’enfuir. On\nraconte que sa perle contient une énergie\nmystérieuse."
        it:
          emerald: "CLAMPERL chiude di scatto la conchiglia\nper intrappolare il nemico. Si dice che la\nperla che produce quando si evolve sia\npermeata da una forza misteriosa."
        de:
          emerald: "PERLU fängt die Beute mit seiner Schale.\nDie Perle, die bei der Entwicklung\nentsteht, soll angeblich eine\ngeheimnisvolle Energie besitzen."
        es:
          emerald: "Un CLAMPERL cierra de golpe la concha\npara evitar que escape su presa.\nDicen que la perla que crea al evolucionar\nestá dotada de una misteriosa energía."
huntail:
  species_id: 367
