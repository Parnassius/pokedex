      descriptions:
        jp_kana:
          emerald: "じざいに　のびちぢみする　あしで　きょうれつな\nキックを　はなち　あいてを　けりたおす。\nたたかいの　あと　つかれた　あしを　もみほぐす。"
        en:
          emerald: "Its legs freely stretch and contract.\nUsing these springlike limbs, it bowls over\nfoes with devastating kicks. After battle,\nit rubs down its tired legs."
        fr:
          emerald: "Il peut terrasser ses ennemis en les\nrouant de coups de pied avec ses jambes\nqu’il contracte et étire à volonté. Il les\nmasse ensuite pour les reposer."
        it:
          emerald: "Le zampe di HITMONLEE sono molto\nelastiche. Le usa come molle, scagliandosi\nsul nemico con calci rovinosi. Dopo la lotta\nle strofina per recuperare le forze."
        de:
          emerald: "KICKLEE kann seine Beine ausfahren und\neinziehen. Es verblüfft seine Gegner mit\nbrutalen Tritten. Nach dem Kampf massiert\nes seine Beine und lockert die Muskeln."
        es:
          emerald: "Da unas patadas demoledoras\nencogiendo y estirando las patas.\nTras la lucha, se las masajea para\nrelajar los músculos y descansar."
hitmonchan:
  species_id: 107
