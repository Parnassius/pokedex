        en:
          emerald: "Solar energy is the source of this \nPOKéMON’s power. On sunny days, groups of\nSOLROCK line up facing the sun and absorb\nits light."
        fr:
          emerald: "L’énergie solaire est la source du pouvoir\nde ce POKéMON. Les jours clairs, des\ngroupes de SOLAROC s’alignent en plein\nsoleil pour absorber sa lumière."
        it:
          emerald: "SOLROCK attinge energia dalla luce solare.\nNelle belle giornate, è possibile vedere\nquesti POKéMON schierati con la faccia in\ndirezione del sole per assorbirne i raggi."
        de:
          emerald: "Dieses PKMN bezieht seine Energie\naus dem Sonnenlicht. Bei Sonnenschein\nkann man viele SONNFEL beim Sonnen\nbeobachten."
        es:
          emerald: "El origen de la fuerza de este POKéMON\nestá en la energía solar. En días soleados,\ngrupos de SOLROCK se alinean de cara\nal sol para absorber su luz."
barboach:
