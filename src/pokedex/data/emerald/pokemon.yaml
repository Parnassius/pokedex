        jp_kana:
          emerald: "えいよう　まんてんの　タマゴを　まいにち　うむ。\nしょくよくを　なくした　ひとでも　ペロリと\nたべてしまうほど　おいしい　タマゴだ。"
        en:
          emerald: "CHANSEY lay nutritionally excellent eggs\nevery day. The eggs are so delicious, they\nare eagerly devoured by even those people\nwho have lost their appetite."
        fr:
          emerald: "LEVEINARD pond tous les jours des œufs\npleins de vitamines. Ces œufs sont\ntellement bons que les gens les mangent\nmême quand ils n’ont pas faim."
        it:
          emerald: "Ogni giorno CHANSEY depone uova molto\nnutrienti. Queste uova sono così buone da\nfar tornare l’appetito a chi lo ha perso."
        de:
          emerald: "CHANEIRA legt täglich ausgesprochen\nnahrhafte Eier. Sie sind so köstlich, dass\nsie sogar von Menschen verspeist werden,\ndie gar keinen Appetit haben."
        es:
          emerald: "Pone a diario huevos con un enorme valor\nnutritivo. Están tan ricos que hasta quien\nno tenga hambre se los comerá en un abrir\ny cerrar de ojos."
tangela:
  species_id: 114
  names:
    jp_kana: モンジャラ
    en: TANGELA
    fr: SAQUEDENEU
