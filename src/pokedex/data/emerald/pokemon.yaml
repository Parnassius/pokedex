        jp_kana:
          emerald: "からだの　なかは　からっぽで　ひとだまが\nひとつだけ　もえていると　かんがえられているが\nまだ　だれも　たしかめた　ことは　ない。"
        en:
          emerald: "It is thought that its body is hollow with\nonly a spectral ball of fire burning inside.\nHowever, no one has been able to\nconfirm this theory as fact."
        fr:
          emerald: "On raconte que son corps creux ne\ncontiendrait qu’une boule de feu\nspectrale. Mais personne n’a jamais pu\nconfirmer cette théorie."
        it:
          emerald: "Secondo una teoria, il corpo di DUSCLOPS è\nvuoto, se non per una spettrale palla di\nfuoco che brucia al suo interno. Questa\nipotesi non è mai stata confermata."
        de:
          emerald: "Sein Körper ist angeblich hohl und nur\nein spektraler Feuerball glüht darin.\nNiemand ist jedoch in der Lage,\ndiese Theorie zu bestätigen."
        es:
          emerald: "Se piensa que su cuerpo es hueco y\nque sólo contiene una fantasmagórica\nbola de fuego. Con todo, nadie ha\npodido confirmar esta teoría."
tropius:
  species_id: 357
