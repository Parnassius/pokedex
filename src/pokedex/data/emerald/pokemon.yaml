      descriptions:
        jp_kana:
          emerald: "あたまの　ツノが　おおきく　そりかえって　いる\nヘルガーが　グループの　リーダーてき　そんざい。\nなかま　どうしで　あらそい　リーダーが　きまる。"
        en:
          emerald: "In a HOUNDOOM pack, the one with its horns\nraked sharply back serves a leadership\nrole. They choose their leader by fighting\namong themselves."
        fr:
          emerald: "Dans une meute de DEMOLOSSE, le\nleader est doté de cornes inclinées vers\nl’arrière. Ces POKéMON choisissent leur\nchef en organisant des combats entre eux."
        it:
          emerald: "In un branco di HOUNDOOM, quello con le\ncorna fortemente arcuate all’indietro e\nche si dimostra più forte nella lotta\nassume il ruolo di capobranco."
        de:
          emerald: "In einer Gruppe von HUNDEMON ist\ndasjenige mit den nach hinten gebogenen\nHörnern der Anführer. Sie legen den\nAnführer durch Kämpfe fest."
        es:
          emerald: "En la manada de HOUNDOOM, el que tiene\nlos cuernos especialmente orientados\nhacia atrás ejerce de líder. Para elegir al\njefe, estos POKéMON se baten entre sí."
kingdra:
  species_id: 230
  names:
    jp_kana: キングドラ
    en: KINGDRA
    fr: HYPOROI
    it: KINGDRA
