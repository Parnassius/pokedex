      descriptions:
        jp_kana:
          emerald: "せなかの　ヒレを　きように　うごかして\nまえを　むいたまま　ぜんごさゆうに　いどうする。\nきけんを　かんじると　スミを　はいて　にげる。"
        en:
          emerald: "By cleverly flicking the fins on its back\nside to side, it moves in any direction\nwhile facing forward. It spits ink to\nescape if it senses danger."
        fr:
          emerald: "Il arrive à se déplacer en bougeant les\nnageoires qui se trouvent sur son dos.\nIl crache de l’encre au moindre signe de\ndanger."
        it:
          emerald: "Agitando abilmente le pinne sulla schiena,\nHORSEA si muove in ogni direzione con lo\nsguardo rivolto in avanti. Se avverte un\npericolo, sputa inchiostro per sfuggire."
        de:
          emerald: "Geschicktes Bewegen der Rückenflossen\nermöglicht es ihm, in jede Richtung zu\nschwimmen und nach vorne zu blicken.\nBei Gefahr verspritzt es Tinte."
        es:
          emerald: "Batiendo hábilmente las aletas que\ntiene en el lomo, se mueve en cualquier\ndirección al avanzar. Si detecta peligro,\nescupe tinta para escapar."
seadra:
  species_id: 117
