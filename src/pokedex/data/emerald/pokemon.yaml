        - grass
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      descriptions:
        jp_kana:
          emerald: "からだに　ためた　えいようは　しんかの　ときまで\nとっておくため　ほとんど　うごこうとしない。\nなにも　たべずに　あさつゆ　だけを　のんでいる。"
        en:
          emerald: "SUNKERN try to minimize movement to\nconserve the nutrients they have stored\nin their bodies for evolution. They will\nnot eat, subsisting only on morning dew."
        fr:
          emerald: "Il essaye de bouger le moins possible pour\nconserver tous les nutriments qu’il stocke\ndans son corps pour son évolution. Il ne\nmange pas et vit grâce à la rosée matinale."
        it:
          emerald: "SUNKERN cerca di muoversi il meno possibile\nper preservare le sostanze nutritive\nimmagazzinate nel corpo per l’evoluzione.\nSi nutre solo di rugiada mattutina."
        de:
          emerald: "SONNKERN versucht, sich wenig zu bewegen,\num alle gespeicherten Nährstoffe für\nseine Entwicklung aufzusparen. Außer\nMorgentau nimmt es nichts weiter zu sich."
        es:
          emerald: "Intenta moverse poco para conservar los\nnutrientes que ha guardado en su interior\ny poder evolucionar. Ni siquiera come:\nsólo se alimenta del rocío de la mañana."
sunflora:
  species_id: 192
