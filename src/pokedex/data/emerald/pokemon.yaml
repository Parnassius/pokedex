      descriptions:
        jp_kana:
          emerald: "ひとが　ぜつめつの　ききに　おいこんでしまった。\nゆうぐれどきになると　すくなくなった　なかまを\nさがして　かなしそうな　こえで　うたうと　いう。"
        en:
          emerald: "People have driven LAPRAS almost to the\npoint of extinction. In the evenings,\nit is said to sing plaintively as it seeks\nwhat few others of its kind still remain."
        fr:
          emerald: "Les LOKHLASS sont en voie d’extinction.\nLe soir, on entend ce POKéMON chantonner\nune complainte mélancolique, espérant\nretrouver ses rares congénères."
        it:
          emerald: "L’uomo ha portato LAPRAS quasi alla totale\nestinzione. Si dice che la sera lo si senta\ncantare malinconico per richiamare i suoi\npochi simili ancora in vita."
        de:
          emerald: "Die Menschen sind dafür verantwortlich,\ndass LAPRAS fast ausgestorben wäre. \nAbends singt es Klagelieder, da nur noch\nwenige seiner Artgenossen übrig sind."
        es:
          emerald: "Por culpa de la gente, está en peligro de\nextinción. Dicen que, al anochecer, se pone\na cantar quejicoso mientras busca a los\nmiembros de su especie que puedan quedar."
ditto:
  species_id: 132
