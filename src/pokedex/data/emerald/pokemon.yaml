        jp_kana:
          emerald: "からだの　いろを　まわりの　けしきに　あわせて\nへんかさせる　のうりょくを　もつ　ポケモン。\nおどろくと　もとの　いろに　もどってしまう。"
        en:
          emerald: "A POKéMON that has the ability to alter its\nbody colors to match its surroundings.\nA KECLEON reverts to its original colors if\nit is startled."
        fr:
          emerald: "Ce POKéMON a la faculté de changer la\ncouleur de son corps pour se fondre dans\nson environnement. S’il est effrayé,\nil retrouve sa véritable couleur."
        it:
          emerald: "KECLEON cambia il colore del proprio corpo\nin base all’ambiente circostante.\nSe si spaventa, tuttavia, riprende il suo\ncolore originale."
        de:
          emerald: "KECLEON kann seine Körperfarbe der\nUmgebungsfarbe anpassen. Wird es\nerschreckt, kehrt seine ursprüngliche\nFarbe zurück."
        es:
          emerald: "Este POKéMON tiene la capacidad de alterar\nla coloración de su cuerpo para camuflarse\nen el medio en el que esté. Si se asusta,\nKECLEON recuperará sus colores originales."
shuppet:
  species_id: 353
  names:
    jp_kana: カゲボウズ
