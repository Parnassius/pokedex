        jp_kana:
          emerald: "おおきな　めだま　もようで　てきを　いかくする。\nあめに　ぬれると　とべなくなって　しまうため\nたいぼくの　したや　のきしたで　あまやどり。"
        en:
          emerald: "It intimidates foes with the large eyelike\npatterns on its antennae. Because it can’t\nfly if its wings get wet, it shelters itself\nfrom rain under large trees and eaves."
        fr:
          emerald: "Il intimide ses ennemis à l’aide de ses\nantennes en forme de gros yeux. Il évite\nla pluie car ses ailes mouillées seraient\ntrop lourdes pour qu’il puisse voler."
        it:
          emerald: "MASQUERAIN spaventa i nemici con il motivo\na forma d’occhio sulle antenne. Poiché non\nsa volare con le ali bagnate, si ripara dalla\npioggia sotto grandi alberi e cornicioni."
        de:
          emerald: "Es schüchtert seine Feinde mit dem großen\naugenartigen Muster auf seinen Fühlern\nein. Da es mit nassen Flügeln nicht fliegen\nkann, sucht es bei Regen Unterschlupf."
        es:
          emerald: "Intimida al enemigo con los ojos que tiene\ndibujados en las antenas. Como no puede\nvolar si se le mojan las alas, se protege\nde la lluvia bajo aleros y grandes árboles."
shroomish:
  species_id: 285
  names:
    jp_kana: キノココ
    en: SHROOMISH
    fr: BALIGNON
    it: SHROOMISH
    de: KNILZ
