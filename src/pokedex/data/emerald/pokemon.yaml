        en:
          emerald: "CORSOLA live in warm southern seas.\nIf the sea becomes polluted, the beautiful\ncoral stalks become discolored and crumble\naway in tatters."
        fr:
          emerald: "CORAYON vit dans les mers du sud.\nSi son environnement est pollué, ses belles\nbranches perdent leur couleur avant de\ntomber en morceaux."
        it:
          emerald: "CORSOLA vive nei caldi mari del sud.\nSe il mare viene inquinato, le meravigliose\nramificazioni coralline perdono il colore e\nsi sbriciolano in mille pezzi."
        de:
          emerald: "CORASONN lebt in den Gewässern der\nSüdsee. Wird die See verschmutzt,\nentfärben sich die Korallenarme und\nzerbröseln ganz langsam."
        es:
          emerald: "CORSOLA vive en las cálidas aguas de los\nmares del Sur. Cuando hay contaminación,\nlas bellas ramas coralinas que le cubren\nse decoloran y se caen a pedazos."
remoraid:
  species_id: 223
  names:
    jp_kana: テッポウオ
