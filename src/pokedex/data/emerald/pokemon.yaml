        en:
          emerald: "It battles using energy it gets from\nburning coal. When loosing smoke from its\nnostrils, it lets off a sound that is\nsimilar to a locomotive’s horn."
        fr:
          emerald: "Il tire sa force de la combustion de son\ncharbon. Le bruit qu’il fait en laissant\ns’échapper de la vapeur rappelle celui\ndes vieilles locomotives."
        it:
          emerald: "TORKOAL lotta grazie all’energia prodotta\ndalla combustione del carbone. Quando gli\nesce il fumo dalle narici, emette anche un\nsuono simile al fischio di una locomotiva."
        de:
          emerald: "Es verbrennt Kohle, um Energie für den\nKampf zu haben. Wenn es Rauch aus\nseinen Nasenlöchern stößt, macht es\nein Geräusch wie eine Dampflok."
        es:
          emerald: "Lucha usando la energía que obtiene\nquemando carbón. Cuando suelta humo por\nlos orificios nasales, emite un sonido que\nrecuerda a la chimenea de una locomotora."
