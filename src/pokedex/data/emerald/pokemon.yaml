        - sturdy
      descriptions:
        jp_kana:
          emerald: "はがねの　からだと　ハネを　もつ　ポケモン。\nむかしの　ひとは　ぬけおちた　ハネを　つかって\nかたなや　ほうちょうを　つくっていた。"
        en:
          emerald: "A POKéMON that has a body and wings of\nsteel. People in the past used feathers\nfallen from SKARMORY to make swords and\nknives."
        fr:
          emerald: "Son corps et ses ailes sont faits d’acier.\nAutrefois, les hommes utilisaient ses\nplumes pour fabriquer des épées et\ndes couteaux."
        it:
          emerald: "Il corpo e le ali di SKARMORY sono\nd’acciaio. In passato, le piume perse\nda questi POKéMON venivano usate\nper fare spade e coltelli."
        de:
          emerald: "PANZAERONs Körper und Flügel sind aus\nStahl. Einst haben die Menschen seine\nabgefallenen Federn zu Schwertern und\nMessern weiterverarbeitet."
        es:
          emerald: "Tiene el cuerpo y las alas de acero.\nHace mucho, la gente usaba las plumas\nque se le caían a SKARMORY para\nforjar espadas y cuchillos."
houndour:
  species_id: 228
  names:
    jp_kana: デルビル
    en: HOUNDOUR
    fr: MALOSSE
    it: HOUNDOUR
    de: HUNDUSTER
    es: HOUNDOUR
