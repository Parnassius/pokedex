      descriptions:
        jp_kana:
          emerald: "りくじょうでは　４ほんの　あしを　ふんばって\nおおきな　いわを　もちあげる　パワーを　はっき。\nみずべの　どろに　からだを　うめて　ねむる。"
        en:
          emerald: "On land, it can powerfully lift large\nboulders by planting its four feet and\nheaving. It sleeps by burying itself in soil\nat the water’s edge."
        fr:
          emerald: "Sur le sol, il peut facilement tirer de gros\nrochers grâce à ses puissantes pattes.\nPour dormir, il creuse des trous au bord\nde l’eau et s’y installe tranquillement."
        it:
          emerald: "MUDKIP riesce a sollevare enormi rocce\npiantando le sue quattro zampe nel\nterreno e facendo forza. Dorme nascosto\nsotto terra vicino all’acqua."
        de:
          emerald: "An Land kann es große Felsen heben, indem\nes seine vier Füße unter den Felsen bringt\nund ihn dann anhebt. Es schläft\neingegraben am Flussufer."
        es:
          emerald: "En tierra firme, puede levantar grandes\ncantos rodados haciendo palanca con\nsus cuatro patas. Duerme enterrado\nen el suelo, cerca del agua."
marshtomp:
  species_id: 259
  names:
    jp_kana: ヌマクロー
