      descriptions:
        jp_kana:
          emerald: "くうきちゅうの　すいぶんを　しゅんかんてきに\nこおらせる　ちからを　もつため　オニゴーリの\nまわりには　ダイヤモンドダストが　はっせいする。"
        en:
          emerald: "A GLALIE has the power to instantaneously\nfreeze moisture in the atmosphere.\nA dazzling cloud of diamondlike ice\ncrystals forms around its body."
        fr:
          emerald: "ONIGLALI a le pouvoir de geler\ninstantanément l’humidité de l’air.\nUn nuage de cristaux de glace se\nforme tout autour de son corps."
        it:
          emerald: "GLALIE ha la capacità di congelare\nl’umidità nell’atmosfera. Attorno al suo\ncorpo si forma un’abbagliante nuvola\ndi cristalli di ghiaccio simili a diamanti."
        de:
          emerald: "FIRNONTOR kann die Feuchtigkeit in der\nAtmosphäre sofort einfrieren. Eine\nschillernde Wolke diamantähnlichen\nEises umgibt seinen Körper."
        es:
          emerald: "Un GLALIE tiene el poder de congelar\nal instante la humedad de la atmósfera:\nasí forma una nube de cristales de hielo\ncon forma de diamantes a su alrededor."
spheal:
  species_id: 363
  names:
    jp_kana: タマザラシ
