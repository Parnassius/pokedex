        jp_kana:
          emerald: "たいもうが　こすれて　せいでんきが　たまる。\nでんりょくが　たくさん　たまるほど　しっぽの\nさきに　ついた　でんきゅうが　あかるく　ひかる。"
        en:
          emerald: "Its fluffy wool rubs together and builds\na static charge. The more energy is\ncharged, the more brightly the lightbulb\nat the tip of its tail glows."
        fr:
          emerald: "La fourrure cotonneuse de WATTOUAT se\ncharge d’électricité statique. Plus elle\nest chargée, plus l’ampoule au bout de sa\nqueue est lumineuse."
        it:
          emerald: "Il morbido manto lanoso di MAREEP genera\nuna carica elettrostatica mediante\nsfregamento. Più potente è la carica, più\nluminosa diventa la lampadina sulla coda."
        de:
          emerald: "VOLTILAMMs flauschiges, wollenes Fell er-\nzeugt durch Reibung statische Aufladung.\nJe höher die elektrische Ladung wird,\ndesto heller leuchtet seine Glühbirne."
        es:
          emerald: "Tiene un pelaje lanudo y suave que\nproduce carga estática por el roce. Cuanto\nmás se carga de electricidad estática,\nmás brilla la bombilla que lleva en la cola."
flaaffy:
