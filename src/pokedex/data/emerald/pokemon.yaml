      descriptions:
        jp_kana:
          emerald: "つばさを　かるく　はばたかせた　だけで　みんかを\nふきとばす　はかいりょくを　もっている　ために\nかいていで　ひとしれず　くらす　ように　なった。"
        en:
          emerald: "LUGIA is so powerful even a light\nfluttering of its wings can blow apart\nhouses. As a result, it chooses to live out\nof sight deep under the sea."
        fr:
          emerald: "Ses ailes ont une puissance dévastatrice.\nUn simple battement de celles-ci peut\ndétruire des petites maisons. Il vit loin de\ntout, dans les profondeurs océaniques."
        it:
          emerald: "Con un leggero battito delle sue potenti\nali, LUGIA è in grado di abbattere un’abi-\ntazione. Perciò ha scelto di vivere negli\nabissi, lontano dall’uomo."
        de:
          emerald: "LUGIAs Flügel haben eine zerstörerische\nKraft. Bereits ein leichtes Flattern kann\nHäuser hinfortwehen. Daher hat es sich\ndafür entschieden, tief im Meer zu leben."
        es:
          emerald: "La fuerza que tiene en las alas es\ndevastadora. Al batirlas, puede derribar\nedificios enteros, por eso prefiere vivir\ndonde no hay nadie, en el fondo del mar."
ho_oh:
