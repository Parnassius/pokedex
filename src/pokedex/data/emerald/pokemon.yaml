        jp_kana:
          emerald: "おでこの　くろしんじゅに　パワーを　ためる。\nサイコパワーを　つかうときに　おどる　ステップが\nむかし　がいこくで　だいりゅうこうした。"
        en:
          emerald: "It stores power in the black pearls on its\nforehead. When it uses psychic power, it\nperforms an odd dance step. Its style of\ndancing became hugely popular overseas."
        fr:
          emerald: "Il concentre son énergie à l’intérieur des\nperles sur sa tête. Il exécute d’étranges\npas de danse quand il utilise ses pouvoirs\npsychiques. Son style est très apprécié."
        it:
          emerald: "GRUMPIG concentra i propri poteri psichici\nnelle perle nere sulla fronte. Quando usa\ntali poteri esegue una danza bizzarra, che\nsta diventando popolare in alcuni paesi."
        de:
          emerald: "Die schwarzen Perlen auf seiner Stirn\nspeichern seine Energie. Setzt es\nPsykraft ein, tanzt es merkwürdig. Dieser\nTanzstil wurde Übersee sehr beliebt."
        es:
          emerald: "Almacena energía en las perlas negras de\nla frente. Al usar poderes psíquicos, hace\nun curioso paso de baile. Su manera de\nbailar se ha hecho de lo más popular."
