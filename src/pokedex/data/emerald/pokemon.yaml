      descriptions:
        jp_kana:
          emerald: "あたまの　かさの　あなから　ほうしを　ばらまく。\nあたたかく　しめった　きこうが　だいすき。\nそうげんや　しんりんの　くさきを　たべる。"
        en:
          emerald: "It scatters spores from holes in the cap\non its head. It loves warm and humid\nclimates. It feeds on trees and plants in\nfields and forests."
        fr:
          emerald: "Les trous se trouvant sur sa tête\ndégagent des spores. Il aime les\nclimats chauds et humides et se\nnourrit d’arbres et de plantes."
        it:
          emerald: "Dai fori presenti sul cappello di BRELOOM\nfuoriescono delle spore. Predilige i climi\ntiepidi e umidi e si nutre di alberi e piante\nche trova in campi e foreste."
        de:
          emerald: "Durch die Kappe auf seinem Kopf verteilt\nes Sporen. KAPILZ liebt warmes und\nfeuchtes Klima. Es ernährt sich von Bäumen\nund Pflanzen im Wald und auf den Wiesen."
        es:
          emerald: "Libera esporas por los orificios de la\ncubierta de la cabeza. Le encanta el clima\ncálido y húmedo. Se nutre de árboles y\nplantas que hay en el campo y en el bosque."
slakoth:
  species_id: 287
  names:
    jp_kana: ナマケロ
    en: SLAKOTH
    fr: PARECOOL
    it: SLAKOTH
    de: BUMMELZ
    es: SLAKOTH
  forms:
