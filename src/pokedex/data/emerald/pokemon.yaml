        en:
          emerald: "It hums in a beautiful soprano voice.\nIt flies among white clouds in the blue\nsky. It launches intensely hot fireballs\nfrom its mouth."
        fr:
          emerald: "Ce POKéMON possède une jolie voix de\nsoprano. Il vole au milieu des nuages dans\nle ciel bleu et est capable de cracher des\nboules de feu avec son bec."
        it:
          emerald: "ALTARIA ha una sublime voce da soprano.\nVola alto nel cielo blu in mezzo alle nuvole\ne lancia bollenti palle di fuoco dalla\nbocca."
        de:
          emerald: "Es hat eine wunderschöne Sopranstimme.\nALTARIA fliegt zwischen den weißen Wolken\nam blauen Himmel und schießt heiße\nFeuerbälle aus seinem Maul."
        es:
          emerald: "Canturrea con una bella voz de soprano.\nVuela entre las nubes blancas del cielo\nazul. Lanza ardientes bolas de fuego\npor el pico."
zangoose:
  species_id: 335
  names:
    jp_kana: ザングース
    en: ZANGOOSE
    fr: MANGRIFF
    it: ZANGOOSE
    de: SENGO
    es: ZANGOOSE
