      descriptions:
        jp_kana:
          emerald: "ほしが　たくさん　みえる　くうきの　きれいな\nとちには　レディアンが　たくさん　すむと　いう。\nほしあかりを　エネルギーに　しているからだ。"
        en:
          emerald: "It is said that in lands with clean air,\nwhere the stars fill the sky, there live\nmany LEDIAN. For good reason, they use\nthe light of the stars as energy."
        fr:
          emerald: "On dit que là où le ciel est dégagé et où\nles étoiles illuminent les cieux, vivent\nbeaucoup de COXYCLAQUE. En effet, leur\nénergie provient de la lumière des étoiles."
        it:
          emerald: "Si dice che in luoghi dall’aria pura e dal\ncielo terso e stellato vivano moltissimi\nLEDIAN. Essi, infatti, usano la luce delle\nstelle come fonte energetica."
        de:
          emerald: "In Ländern mit frischer Luft und Sternen\nam Himmel leben unzählig viele LEDIAN.\nDafür gibt es einen guten Grund: Es\nnutzt das Licht der Sterne als Energie."
        es:
          emerald: "Dicen que, en zonas de aire puro donde se\nven las estrellas, hay grandes grupos de\nLEDIAN. Y es que estos POKéMON usan la luz\nde las estrellas como fuente de energía."
spinarak:
  species_id: 167
  names:
    jp_kana: イトマル
    en: SPINARAK
    fr: MIMIGAL
    it: SPINARAK
    de: WEBARAK
    es: SPINARAK
