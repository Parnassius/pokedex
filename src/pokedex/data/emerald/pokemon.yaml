        en:
          emerald: "It disguises itself as seaweed by making\nits tentacles sway. Unsuspecting prey\nthat come too close are swallowed whole.\nIt became extinct 100 million years ago."
        fr:
          emerald: "Il se fait passer pour de vulgaires algues\nen faisant flotter ses tentacules. Ses\nvictimes sont avalées d’un coup. L’espèce\ns’était éteinte il y a 100 millions d’années."
        it:
          emerald: "LILEEP fa ondeggiare i suoi tentacoli,\nfingendosi così un’alga marina per\ninghiottire in un sol boccone le ignare\nprede. Si è estinto 100 milioni di anni fa."
        de:
          emerald: "Es wedelt mit den Tentakeln, um sich als\nSeetang zu tarnen. Beute, die ihm zu nahe\nkommt, wird ganz verschluckt. Vor 100\nMillionen Jahren galt es als ausgestorben."
        es:
          emerald: "Se disfraza de alga marina moviendo los\ntentáculos. Si una presa se le acerca\ndespistada, será engullida de golpe.\nSe extinguió hace 100 millones de años."
cradily:
  species_id: 346
