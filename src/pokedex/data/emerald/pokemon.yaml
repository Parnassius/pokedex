      descriptions:
        jp_kana:
          emerald: "ははおやに　あえない　かなしみを　のりこえた\nカラカラが　たくましく　しんかした　すがた。\nきたえられた　こころは　かんたんに　くじけない。"
        en:
          emerald: "A MAROWAK is the evolved form of a CUBONE\nthat has grown tough by overcoming the\ngrief of losing its mother. Its tempered\nand hardened spirit is not easily broken."
        fr:
          emerald: "Il est la forme évoluée d’OSSELAIT. Il a\nsurmonté le chagrin causé par la perte de\nsa maman et s’est endurci. Son tempérament\nle rend très difficile à amadouer."
        it:
          emerald: "MAROWAK si evolve da CUBONE facendosi\nforte e superando il lutto per la perdita\ndella madre. Il suo animo forgiato e\ntemprato non è facile da sconfiggere."
        de:
          emerald: "KNOGGA ist eine entwickelte Form von\nTRAGOSSO, die den Verlust der Mutter\nüberwunden hat. Der gestärkte Geist\ndieses PKMN ist nur schwer zu brechen."
        es:
          emerald: "Es la forma evolucionada de CUBONE. Es más\nfuerte porque ha superado la pena por la\npérdida de su madre. Tiene el ánimo curtido,\npor lo que no resulta fácil alterarlo."
hitmonlee:
  species_id: 106
