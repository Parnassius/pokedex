        jp_kana:
          emerald: "はるになると　トサキントの　しゅうだんが\nたきを　のぼって　じょうりゅうへ　むかう。\nいっぽんヅノの　こうげきは　きょうれつ。"
        en:
          emerald: "In the springtime, schools of GOLDEEN\ncan be seen swimming up falls and rivers.\nIt metes out staggering damage with its\nsingle horn."
        fr:
          emerald: "Au printemps, on peut voir des groupes de\nPOISSIRENE remonter les cours d’eau.\nIl inflige de sérieux dommages à l’aide\nde son unique corne."
        it:
          emerald: "In primavera, è possibile vedere banchi di\nGOLDEEN risalire fiumi e cascate. \nInfligge duri colpi al nemico con il suo\nunico corno."
        de:
          emerald: "Im Frühling schwimmen Schwärme von\nGOLDINI Wasserfälle und Flüsse hinauf.\nMit seinem Horn kann es erheblichen\nSchaden anrichten."
        es:
          emerald: "En primavera, se pueden ver bancos de\nGOLDEEN remontando cascadas y ríos.\nCausa mucho daño cuando embiste\ncon su único cuerno."
seaking:
  species_id: 119
  names:
    jp_kana: アズマオウ
    en: SEAKING
    fr: POISSOROY
    it: SEAKING
