      descriptions:
        jp_kana:
          emerald: "そらや　だいちの　へんかを　びんかんに　かんじ\nさいがいを　さっちする　のうりょくを　もつ。\n１００ねん　いきる　ちょうじゅの　ポケモン。"
        en:
          emerald: "It sharply senses even subtle changes in\nthe sky and the land to predict natural\ndisasters. It is a long-lived POKéMON that\nhas a life-span of 100 years."
        fr:
          emerald: "Il arrive à capter précisément le moindre\nchangement dans l’air ou sur terre et peut\nainsi prédire les catastrophes naturelles.\nIl a une espérance de vie de 100 ans."
        it:
          emerald: "ABSOL ha la capacità di percepire anche\nvariazioni minime nell’ambiente e di predire\ncosì disastri naturali. È molto longevo,\ninfatti, può vivere fino a cent’anni."
        de:
          emerald: "Es bemerkt sogar kleinste Veränderungen\nder Luft und der Erde und kann Natur-\nkatastrophen vorhersagen. ABSOL lebt\nsehr lange, um die 100 Jahre."
        es:
          emerald: "Detecta con precisión cualquier cambio\nproducido en la atmósfera o la tierra y\npredice catástrofes naturales. Es un\nPOKéMON longevo que vive 100 años."
wynaut:
  species_id: 360
