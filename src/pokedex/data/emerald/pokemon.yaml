      descriptions:
        jp_kana:
          emerald: "オゾンそうを　とびつづけている　ポケモン。\nカイオーガと　グラードンが　たたかうと\nちじょうに　おりてくると　いわれている。"
        en:
          emerald: "A POKéMON that flies endlessly in the\nozone layer. It is said it would descend\nto the ground if KYOGRE and GROUDON\nwere to fight."
        fr:
          emerald: "Ce POKéMON vole sans cesse au milieu\nde la couche d’ozone. On raconte qu’il\nviendrait sur terre en cas de combat\nentre GROUDON et KYOGRE."
        it:
          emerald: "RAYQUAZA vola incessantemente nello\nstrato d’ozono. Si dice che ritornerebbe\na terra se la lotta tra KYOGRE e GROUDON\ndovesse riprendere."
        de:
          emerald: "Dieses POKéMON fliegt ständig in der\nOzonschicht. Man sagt, es würde auf die\nErde zurückkehren, wenn KYOGRE und\nGROUDON zu kämpfen beginnen."
        es:
          emerald: "Este POKéMON vuela sin parar por la\ncapa de ozono. Dicen que, si KYOGRE\ny GROUDON fueran a luchar, bajaría\na tierra firme."
jirachi:
  species_id: 385
