        jp_kana:
          emerald: "イワークよりも　ふかい　ちちゅうに　すんでいる。\nちきゅうの　ちゅうしんに　むかって　ほりすすみ\nふかさ　１キロに　たっする　ことも　ある。"
        en:
          emerald: "STEELIX live even further underground\nthan ONIX. This POKéMON is known to dig\ntoward the earth’s core, reaching a depth\nof over six-tenths of a mile underground."
        fr:
          emerald: "Il vit sous terre, encore plus profon-\ndément qu’ONIX. On dit qu’il creuse vers le\ncentre de la terre. On l’a déjà vu aller à\nplus d’un kilomètre de profondeur."
        it:
          emerald: "STEELIX è noto per i suoi scavi in\nprofondità a distanze maggiori rispetto\na ONIX. Sono stati riportati record di\nprofondità pari a 1 km sottoterra."
        de:
          emerald: "STAHLOS lebt noch tiefer unter der Erde\nals ONIX. Es gräbt immer in Richtung des\nErdkerns. Nachweislich hat es bereits\nTiefen von einem Kilometer erreicht."
        es:
          emerald: "Vive a aún mayor profundidad que ONIX. Se\nle conoce por cavar hacia el centro de la\ntierra. Hay datos que demuestran que ha\nllegado a alcanzar 1 km de profundidad."
snubbull:
  species_id: 209
