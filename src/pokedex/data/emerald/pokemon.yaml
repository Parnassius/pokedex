        en:
          emerald: "It is an extremely vicious and violent\nPOKéMON. When humans begin to fight,\nit will appear and burn everything to the\nground with intensely hot flames."
        fr:
          emerald: "C’est un POKéMON extrêmement violent.\nQuand les humains commencent à se battre,\nil apparaît et brûle tout de ses flammes\nintenses."
        it:
          emerald: "GYARADOS è estremamente violento e\nferoce. Quando gli uomini cominciano una\nlotta, lui appare e distrugge tutto con\nfiammate incandescenti."
        de:
          emerald: "GARADOS ist ein extrem gewalttätiges und\nbrutales PKMN. Wenn Menschen kämpfen,\ntaucht es auf und brennt alles mit seinen\nheißen Flammen nieder."
        es:
          emerald: "Es extremadamente feroz y violento.\nCuando las personas comienzan a luchar,\naparece y reduce a cenizas todo lo que\npilla con intensas llamaradas."
lapras:
  species_id: 131
  names:
    jp_kana: ラプラス
