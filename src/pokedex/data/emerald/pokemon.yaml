        en:
          emerald: "It has the enigmatic power of foreseeing\nthe future. Some people in different lands\nhave long believed that XATU are\nemissaries from another world."
        fr:
          emerald: "Il a le pouvoir incroyable de deviner\nle futur. Les hommes ont longtemps cru\nque XATU était l’émissaire d’un autre\nmonde."
        it:
          emerald: "Gli XATU sono POKéMON molto enigmatici\nin grado di prevedere il futuro. Persone di\npaesi diversi credono da lungo tempo che\nprovengano da un altro mondo."
        de:
          emerald: "Es kann in die Zukunft blicken.\nMenschen unterschiedlicher Nationen\nglaubten lange Zeit, dass XATU ein\nAbgesandter einer anderen Welt sei."
        es:
          emerald: "Tiene el enigmático poder de prever\nel futuro. Gente de distintos sitios ha\ncreído durante mucho tiempo que los \nXATU eran mensajeros de otro mundo."
mareep:
