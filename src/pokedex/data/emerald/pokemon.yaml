        en:
          emerald: "It can circle the globe in just 16 hours.\nIt is a kindhearted POKéMON that leads\nlost and foundering ships in a storm\nto the safety of land."
        fr:
          emerald: "DRACOLOSSE est capable de faire le tour de\nla planète en seize heures à peine. Ce\nPOKéMON au grand cœur ramène à bon\nport les navires perdus dans les tempêtes."
        it:
          emerald: "DRAGONITE è in grado di fare il giro del\nmondo in sole sedici ore. È un POKéMON \nbuono e mansueto che guida fino alla\nterraferma le navi prossime al naufragio."
        de:
          emerald: "DRAGORAN kann die Welt innerhalb von 16\nStunden umkreisen. Es ist ein gutherziges\nPKMN, das vermisste und sinkende Schiffe\nbei Unwetter sicher an Land zurückbringt."
        es:
          emerald: "Es capaz de dar la vuelta al mundo en sólo\n16 horas. Tiene buen corazón: guía a tierra\nfirme a los barcos que se han perdido en\nplena tormenta o van a zozobrar."
mewtwo:
  species_id: 150
  names:
    jp_kana: ミュウツー
    en: MEWTWO
