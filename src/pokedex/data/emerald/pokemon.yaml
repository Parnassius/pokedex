        jp_kana:
          emerald: "なきごえは　ジェットき　なみの　おんりょうだ。\nみみの　あなから　いきを　すいこむ　しくみ。\nいきぎれしないで　なきつづける　ことが　できる。"
        en:
          emerald: "Its cries equal a jet plane in volume.\nIt inhales through its ear canals. Because\nof this system, it can cry continually\nwithout having to catch its breath."
        fr:
          emerald: "Ses cris sont aussi bruyants qu’un avion\nà réaction. Comme il inhale par ses oreilles,\nil est capable de crier continuellement\nsans reprendre sa respiration."
        it:
          emerald: "Le urla di WHISMUR sono assordanti quanto\nil frastuono di un jet. Poiché inala\nattraverso le orecchie, riesce a strillare\ndi continuo senza prendere il fiato."
        de:
          emerald: "Es schreit so laut wie ein Düsenjet.\nFLURMEL atmet durch seine Hörkanäle\nein und kann daher kontinuierlich\nschreien, ohne Luft zu holen."
        es:
          emerald: "Suena con el mismo volumen que un reactor.\nAspira a través de sus canales auditivos,\npor eso puede gritar continuamente\nsin parar para recuperar el aliento."
loudred:
  species_id: 294
  names:
