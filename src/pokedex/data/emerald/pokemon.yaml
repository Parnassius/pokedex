        en:
          emerald: "Once it grips prey with its large pincers,\nit will never let go, no matter what.\nIt is a hardy POKéMON that can thrive\nin any environment."
        fr:
          emerald: "Quoi qu’il arrive, il ne relâche jamais une\nproie tombée entre ses pinces. Ce POKéMON\ntrès robuste peut survivre dans n’importe\nquel environnement."
        it:
          emerald: "CORPHISH cattura il nemico con le sue\nenormi chele e non lo lascia andare per\nnessun motivo. È un POKéMON molto\nresistente che si adatta ad ogni ambiente."
        de:
          emerald: "Wenn es einmal die Beute mit seinen\ngroßen Scheren gegriffen hat, lässt es\nnicht mehr los. Es ist ein sehr zähes\nPKMN, das überall überleben kann."
        es:
          emerald: "Una vez que agarra a su presa con sus\ngrandes pinzas, no la suelta pase lo que\npase. Es un POKéMON resistente que\npuede subsistir en cualquier medio."
crawdaunt:
  species_id: 342
