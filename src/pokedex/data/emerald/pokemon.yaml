        en:
          emerald: "It is actually three MAGNEMITE linked\nby magnetism. It generates powerful radio\nwaves that raise temperatures by 3.6\ndegrees F within a 3,300-foot radius."
        fr:
          emerald: "Il est composé de trois MAGNETI reliés\nentre eux par magnétisme. Ses ondes radio\naugmentent la température de 2 degrés\ndans un rayon d’un kilomètre."
        it:
          emerald: "MAGNETON è formato da tre MAGNEMITE\nuniti dalla forza magnetica. Genera onde\nradio in grado di far alzare la temperatura\ndi 2 gradi centigradi in un raggio di 1 km."
        de:
          emerald: "Es entsteht, wenn sich drei MAGNETILO\nzusammenschließen. Seine Radiowellen\nerhöhen die Temperatur im Umkreis von\neinem Kilometer um 2 Grad Celsius."
        es:
          emerald: "Son tres MAGNEMITE que se atraen entre\nsí. Genera ondas de radio de gran alcance\nque provocan que la temperatura suba\n2 grados centígrados en un radio de 1 km."
farfetchd:
