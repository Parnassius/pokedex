      descriptions:
        jp_kana:
          emerald: "じしんを　よちする　ふしぎな　ちからを　もつ。\nひるまは　ぬまぞこの　どろの　なかで　ねむり\nおきると　ひとばんじゅう　エサを　たべつづける。"
        en:
          emerald: "Mysteriously, it can foretell earthquakes.\nIn the daytime, it sleeps in mud at the\nbottom of a pond. When it awakens, it\ncontinually feeds throughout the night."
        fr:
          emerald: "Mystérieusement, il est capable de\nprédire les tremblements de terre.\nIl passe la journée à dormir dans la boue\net chasse toute la nuit."
        it:
          emerald: "WHISCASH ha la sorprendente capacità di\nprevedere i terremoti. Di giorno dorme sul\nfondo melmoso di una palude, mentre di\nnotte mangia di continuo."
        de:
          emerald: "Es kann eigenartigerweise Erdbeben\nvorhersehen. Tagsüber schläft es im\nSchlamm auf dem Grund eines Teiches\nund nachts isst es permanent."
        es:
          emerald: "Nadie sabe cómo, pero puede predecir\nterremotos. De día duerme en el fango del\nfondo de una charca. Ya despierto, se\npasa toda la noche alimentándose."
corphish:
  species_id: 341
