      descriptions:
        jp_kana:
          emerald: "からだの　さいぼうを　くみかえて　へんしんする。\nおもいだしながら　いぜん　みた　ものに　かわると\nちょっと　ちがう　かたちに　なってしまうのだ。"
        en:
          emerald: "A DITTO rearranges its cell structure to\ntransform itself. However, if it tries to\nchange based on its memory, it will get\ndetails wrong."
        fr:
          emerald: "Il peut modifier sa structure moléculaire\npour prendre d’autres formes. Mais quand il\nessaye de se transformer de mémoire, il lui\narrive de se tromper sur certains détails."
        it:
          emerald: "DITTO cambia la sua struttura cellulare\nper assumere molte altre forme. Tuttavia,\nquando si affida solo alla sua memoria,\ntalvolta dimentica dettagli importanti."
        de:
          emerald: "DITTO verändert seine Zellstruktur, um\nsich zu verwandeln. Verlässt es sich dabei\njedoch auf sein Gedächtnis, unterlaufen \ndiesem POKéMON schon mal Fehler."
        es:
          emerald: "Altera su estructura celular para cambiar\nde forma. Pero, si intenta transformarse\nen algo según los datos que tenga en la\nmemoria, habrá detalles que se le escapen."
eevee:
  species_id: 133
  names:
    jp_kana: イーブイ
