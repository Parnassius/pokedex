        jp_kana:
          emerald: "およぎが　とくいな　ゴルダックは　すいえい\nせんしゅの　とっくんに　つきあう　ことも　ある。\nひたいが　かがやくとき　じんつうりきを　つかう。"
        en:
          emerald: "A GOLDUCK is an adept swimmer.\nIt sometimes joins competitive swimmers\nin training. It uses psychic powers when\nits forehead shimmers with light."
        fr:
          emerald: "Il nage si bien qu’il rejoint souvent des\nnageurs professionnels à l’entraînement.\nIl utilise ses pouvoirs psychiques quand\nla lumière sur son front s’allume."
        it:
          emerald: "GOLDUCK è un nuotatore provetto e a volte\nsi allena con altri professionisti.\nSe la fronte si illumina, significa che sta\nusando i suoi poteri psichici."
        de:
          emerald: "ENTORON ist ein exzellenter Schwimmer. Es\ntrainiert gelegentlich mit\nProfischwimmern. Seine Stirn glüht,\nwenn es Psykräfte einsetzt."
        es:
          emerald: "Es un experto nadador. A veces, se entrena\ncon nadadores profesionales.\nCuando le brilla la frente, utiliza poderes\npsíquicos."
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
    en: MANKEY
    fr: FEROSINGE
    it: MANKEY
    de: MENKI
    es: MANKEY
  forms:
    mankey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 35
        special_attack: 35
        special_defense: 45
