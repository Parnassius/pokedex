      descriptions:
        jp_kana:
          emerald: "みを　まもるために　ほそく　かたい　たいもうが\nぜんしんを　おおうように　なったと　いわれる。\nちいさな　えものも　みのがさない　めを　もつ。"
        en:
          emerald: "Its coat of thin, stiff hair that covers\nits entire body is said to have evolved\nfor protection. Its large eyes never fail\nto spot even miniscule prey."
        fr:
          emerald: "On raconte qu’il a évolué avec une fourrure\nde poils fins et drus qui protège son\ncorps. Ses grands yeux sont capables\nde repérer ses proies, même minuscules."
        it:
          emerald: "Si dice che per proteggersi VENONAT abbia\nsviluppato una pelliccia sottile e irsuta\nche ne ricopre il corpo. Nemmeno prede\npiccolissime sfuggono ai suoi occhi enormi."
        de:
          emerald: "BLUZUK hat einen Pelz aus dünnen Borsten\nentwickelt, der dem Schutz seines Körpers\ndient. Es hat große Augen, denen auch\nwinzig kleine Beute nicht entgeht."
        es:
          emerald: "Dicen que evolucionó con una fina capa\nde pelo rígido a modo de protección.\nTiene unos ojos tan grandes que no hay\npresa que le pase desapercibida."
venomoth:
  species_id: 49
  names:
    jp_kana: モルフォン
    en: VENOMOTH
    fr: AEROMITE
    it: VENOMOTH
    de: OMOT
    es: VENOMOTH
