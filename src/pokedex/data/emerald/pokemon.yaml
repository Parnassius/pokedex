        jp_kana:
          emerald: "ときを　こえ　みらいから　やってきた　ポケモン。\nセレビィが　すがたを　あらわす　かぎり　あかるい\nみらいが　まっていると　かんがえられている。"
        en:
          emerald: "This POKéMON came from the future by\ncrossing over time. It is thought that so\nlong as CELEBI appears, a bright and\nshining future awaits us."
        fr:
          emerald: "Ce POKéMON est venu du futur en voyageant\ndans le temps. On raconte que tant que\nCELEBI apparaît, cela signifie que le\nfutur sera bon et agréable."
        it:
          emerald: "CELEBI è giunto a noi dal futuro, \nviaggiando attraverso il tempo. Si dice\nche ogni sua apparizione preannunci\nun futuro roseo e splendente."
        de:
          emerald: "Dieses POKéMON kommt aus der Zukunft und\nist durch die Zeit gereist. Solange CELEBI\nauftaucht, ist der Menschheit angeblich\neine rosige Zukunft beschieden."
        es:
          emerald: "Vino del futuro haciendo un viaje en el\ntiempo. Hay quien piensa que, mientras\nCELEBI siga apareciendo, el futuro\nserá brillante y esperanzador."
treecko:
  species_id: 252
