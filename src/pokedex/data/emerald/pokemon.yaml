      descriptions:
        jp_kana:
          emerald: "うみを　つくったとして　しんわに　とうじょう。\nながねんに　わたり　グラードンと　たたかったのち\nかいていの　そこで　ねむりに　ついた。"
        en:
          emerald: "KYOGRE has appeared in mythology as the\ncreator of the sea. After long years of\nfeuding with GROUDON, it took to sleep at\nthe bottom of the sea."
        fr:
          emerald: "Selon la mythologie, KYOGRE serait le\ncréateur de la mer. Après s’être battu de\nlongues années contre GROUDON, il partit\nse reposer tout au fond de l’océan."
        it:
          emerald: "Nella mitologia, KYOGRE è il creatore del\nmare. Dopo anni di lotta con GROUDON,\nquesto POKéMON è andato in letargo\nsui fondali marini."
        de:
          emerald: "Laut Mythologie soll KYOGRE die See\nerschaffen haben. Nach jahrelanger\nFehde mit GROUDON schläft es\nam Grund der See."
        es:
          emerald: "En la mitología se considera a KYOGRE\ncomo el creador del mar. Tras largos años\nde enfrentamiento con GROUDON,\nse echó a dormir en el fondo del mar."
groudon:
  species_id: 383
  names:
    jp_kana: グラードン
