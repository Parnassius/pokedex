      descriptions:
        jp_kana:
          emerald: "たたかう　ときは　うしろあしで　たちあがり\nまえあしの　するどい　ツメで　こうげきする。\nハブネークに　であうと　たいもうが　さかだつ。"
        en:
          emerald: "When it battles, it stands on its hind legs\nand attacks with its sharply clawed\nforelegs. Its fur bristles if it encounters\nany SEVIPER."
        fr:
          emerald: "Pour se battre, il se dresse sur ses pattes\narrière et attaque avec les griffes de ses\npattes avant. Son poil se hérisse s’il\ncroise un SEVIPER."
        it:
          emerald: "ZANGOOSE attacca il nemico con gli artigli\naffilati delle zampe anteriori stando in\nequilibrio su quelle posteriori. Se incontra\nun SEVIPER, la sua pelliccia si increspa."
        de:
          emerald: "Beim Kampf steht es auf seinen Hinter-\nbeinen und greift mit seinen scharfen\nKlauen an den Vorderbeinen an. Trifft\nes auf VIPITIS, sträubt sich sein Fell."
        es:
          emerald: "Cuando lucha, se yergue sobre las patas\ntraseras y ataca con sus afiladas zarpas.\nEl pelaje se le eriza si se encuentra\ncon un SEVIPER."
seviper:
  species_id: 336
  names:
    jp_kana: ハブネーク
