        jp_kana:
          emerald: "あらゆる　きんぞく　よりも　かたい　からだ。\nからだの　きんぞくは　かたい　だけでは　なく\nのびちぢみする　しょうたい　ふめいの　ぶっしつ。"
        en:
          emerald: "Its body is harder than any other kind of\nmetal. The body metal is composed of a\nmysterious substance. Not only is it hard,\nit shrinks and stretches flexibly."
        fr:
          emerald: "Son corps est plus dur que n’importe quel\nmétal et est composé d’une substance\nmystérieuse. En plus d’être dur, il peut\négalement raccourcir ou s’allonger."
        it:
          emerald: "Il corpo metallico di REGISTEEL è\ncostituito da una sostanza misteriosa più\ndura di qualsiasi altro metallo e al tempo\nstesso estremamente elastica."
        de:
          emerald: "Sein Körper ist härter als jede andere Art\nMetall, da das Metall aus geheimnisvollen\nSubstanzen besteht. Es ist nicht nur fest,\nsondern schrumpft und dehnt sich auch."
        es:
          emerald: "Su cuerpo está compuesto del metal\nmás duro que hay; una misteriosa\nsustancia que, además de ser muy sólida,\nse contrae y dilata con facilidad."
latias:
  species_id: 380
