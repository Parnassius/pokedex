        jp_kana:
          emerald: "プリンの　うたで　ねむらない　ものは　いない。\nうたごえの　おとの　なみは　じゅくすいしている\nときの　のうはと　おなじ　かたちを　している。"
        en:
          emerald: "Nothing can avoid falling asleep hearing a\nJIGGLYPUFF’s song. The sound waves of its\nsinging voice match the brain waves of\nsomeone in a deep sleep."
        fr:
          emerald: "Ceux qui entendent sa chanson ne\npeuvent s’empêcher de dormir. Les ondes\nsonores de sa voix correspondent aux\nondes cérébrales d’une personne endormie."
        it:
          emerald: "Le onde sonore che JIGGLYPUFF emette\ncantando sono simili alle onde cerebrali\ndi chi dorme. Chiunque lo ascolti non può\nfar altro che cadere in un sonno profondo."
        de:
          emerald: "Jeder fällt in tiefen Schlummer, wenn\nPUMMELUFF singt. Die Wellenlänge des\nGesangs stimmt mit der Wellenlänge der\nHirnströme eines Schlafenden überein."
        es:
          emerald: "Aquel que oye su canción cae dormido. Las\nondas acústicas de su voz cantarina se\nacoplan a las ondas cerebrales de quien lo\noye y le hacen caer en un profundo sueño."
wigglytuff:
  species_id: 40
  names:
    jp_kana: プクリン
