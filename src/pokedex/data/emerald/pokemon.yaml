      descriptions:
        jp_kana:
          emerald: "ゆうぐれどき　かわの　なかから　ひょっこりと\nあらわれては　ひとを　おどろかせて　よろこぶ。\nかわぞこの　いしに　ついた　みずごけを　たべる。"
        en:
          emerald: "In the evening, it takes great delight in\npopping out of rivers and startling people.\nIt feeds on aquatic moss that grows on\nrocks in the riverbed."
        fr:
          emerald: "Le soir, il adore surgir des rivières pour\neffrayer les passants. Il se nourrit de la\nmousse qui pousse sur les rochers dans\nle lit des rivières."
        it:
          emerald: "Sul far della sera, LOMBRE si diverte un\nmondo a spaventare le persone schizzando\nfuori dai fiumi. Si nutre del muschio che\ncresce sui sassi nel letto dei fiumi."
        de:
          emerald: "Nachts macht es sich einen Riesenspaß,\nindem es aus Flüssen empor springt und\nLeute erschreckt. Es ernährt sich von\nMoos, das auf Felsen im Flussbett wächst."
        es:
          emerald: "De noche, le encanta surgir de repente\ndel río para asustar a la gente.\nSe alimenta del musgo que crece en\nlas rocas de las cuencas de los ríos."
ludicolo:
  species_id: 272
  names:
    jp_kana: ルンパッパ
