          emerald: "ドリルの　ように　かいてんする　ツノは\nひとつきで　こうそうビルを　はかいする。\nうしろあしで　たちあがり　のうが　はったつした。"
        en:
          emerald: "Its horn, which rotates like a drill,\ndestroys tall buildings with one strike.\nIt stands on its hind legs, and its brain\nis well developed."
        fr:
          emerald: "Sa corne qui pivote comme un foret est\ncapable de détruire un immeuble d’un \nseul coup. Il se tient sur ses pattes\narrière et son cerveau est très développé."
        it:
          emerald: "RHYDON fa ruotare il suo corno a mo’ di\ntrapano e con esso è in grado di abbattere\nun palazzo. Cammina sulle zampe posteriori\ne il suo cervello è ben sviluppato."
        de:
          emerald: "Mit seinem bohrerähnlichen Horn kann es\ngroße Gebäude mit nur einem Versuch ein-\nstürzen lassen. Es steht auf den Hinter-\nbeinen und sein Gehirn ist gut entwickelt."
        es:
          emerald: "Su cuerno, que gira como un taladro,\ndestroza altos edificios de una pasada.\nPuede erguirse sobre las patas traseras\ny tiene un cerebro muy bien desarrollado."
chansey:
  species_id: 113
  names:
