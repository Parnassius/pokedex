        jp_kana:
          emerald: "おとを　たてず　すべる　ように　かっくうする。\nりょううでの　おおきな　ツメと　あしの　ツメで\nえものの　かおに　しがみつき　どくばりを　さす。"
        en:
          emerald: "It glides without making a single sound.\nIt grasps the face of its foe using its\nhind and large front claws, then stabs\nwith its poison barb."
        fr:
          emerald: "Il plane dans les airs sans un bruit. Il\ns’accroche au visage de son ennemi grâce à\nses serres et aux pinces de ses pattes\navant, et pique avec son dard empoisonné."
        it:
          emerald: "GLIGAR scivola nell’aria senza far\nrumore. Si aggrappa al viso del nemico\ncon gli artigli posteriori e le chele\nanteriori, poi l’avvelena con il suo aculeo."
        de:
          emerald: "SKORGLA segelt lautlos durch die Lüfte.\nEs verankert sich mit Hilfe der Krallen und\nriesigen Scheren am Gesicht eines\nFeindes und vergiftet ihn anschließend."
        es:
          emerald: "Planea por el aire sin hacer ruido.\nSe agarra a la cara del rival con las garras\ntraseras y las pinzas delanteras,\ninyectándole veneno por el aguijón."
steelix:
  species_id: 208
