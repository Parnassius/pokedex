        jp_kana:
          emerald: "こうてつの　よろいに　みを　つつむ　ポケモン。\nしんかの　ときに　あたらしい　よろいが　できる。\nとれた　よろいは　てつせいひんの　ざいりょう。"
        en:
          emerald: "A POKéMON that is clad in steel armor.\nA new suit of armor is made when it evolves.\nThe old, discarded armor is salvaged as\nmetal for making iron products."
        fr:
          emerald: "Il est recouvert d’une armure en acier.\nQuand il évolue, il en revêt une nouvelle\net abandonne l’ancienne. Celle-ci est très\nrecherchée par l’industrie sidérurgique."
        it:
          emerald: "ARON è rivestito da un’armatura d’acciaio,\nche viene sostituita da una nuova quando\nil POKéMON evolve. Quella vecchia è utiliz-\nzata per produrre vari oggetti di metallo."
        de:
          emerald: "Es steckt in einem Stahlpanzer. Bei der\nEntwicklung entsteht ein neuer Panzer.\nDer abgeworfene Panzer wird eingesammelt,\num aus ihm Eisenwaren herzustellen."
        es:
          emerald: "Está cubierto por una coraza de acero\nque se regenera cuando evoluciona.\nLa coraza vieja, ya estropeada, se recicla\npara fabricar productos de hierro."
lairon:
  species_id: 305
