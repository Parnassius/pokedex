        jp_kana:
          emerald: "ほそく　しなやかな　からだは　どんな　つよい\nこうげきでも　しなって　よける　ことが　できる。\nくちから　てつも　とかしてしまう　えきを　だす。"
        en:
          emerald: "A BELLSPROUT’s thin and flexible body lets\nit bend and sway to avoid any attack,\nhowever strong it may be. From its mouth,\nit leaks a fluid that melts even iron."
        fr:
          emerald: "Son corps long et flexible lui permet de se\ntordre et d’osciller pour éviter tout type\nd’attaque. Il crache un fluide corrosif qui\npeut même dissoudre le fer."
        it:
          emerald: "Il corpo esile e flessibile di BELLSPROUT\ngli consente di oscillare per evitare\nanche attacchi violenti. Sputa un fluido\ncorrosivo che scioglie persino il ferro."
        de:
          emerald: "KNOFENSAs schlanker und elastischer\nKörper ermöglicht es ihm, jedem Angriff\nauszuweichen. Es spuckt eine ätzende\nFlüssigkeit aus, die Eisen zersetzen kann."
        es:
          emerald: "Tiene un cuerpo delgado y flexible que\nle permite inclinarse y balancearse para\nesquivar ataques. Escupe un fluido\ncorrosivo que derrite hasta el hierro."
