      descriptions:
        jp_kana:
          emerald: "おおきな　なきごえは　１キロ　さきまで　とどく。\nあちこちで　カンだかい　こえが　きこえる　ときは\nなかまたちに　きけんを　しらせている　あいずだ。"
        en:
          emerald: "Its loud cry can be heard over half a mile\naway. If its high, keening cry is heard\nechoing all around, it is a sign that they\nare warning each other of danger."
        fr:
          emerald: "Le cri de PIAFABEC peut être entendu à 1\nkilomètre. Ces POKéMON se préviennent d’un\ndanger en entonnant une mélopée très\naiguë, qu’ils se renvoient comme un écho."
        it:
          emerald: "SPEAROW emette un grido molto acuto,\npercepibile anche ad 1 km di distanza.\nCon questo grido riecheggiante avverte\ni suoi simili di un pericolo imminente."
        de:
          emerald: "HABITAK kann sehr laute Schreie aus-\nstoßen, die man über mehr als 1 km\nvernehmen kann. Das Echo der Schreie\nwarnt andere PKMN vor drohender Gefahr."
        es:
          emerald: "Cuando pía, se le puede oír a 1 km. Si\na su agudo chillido le sigue una especie\nde eco, estaremos oyendo a otros\nSPEAROW responder al aviso de peligro."
fearow:
