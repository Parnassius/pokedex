        jp_kana:
          emerald: "あつい　きせつに　なると　げんきに　とびまわる。\n７しゅるいの　なきごえを　つかいわけて\nなかまと　コミュニケーションを　とっている。"
        en:
          emerald: "They fly about very actively when the hot\nseason arrives. They communicate among\nthemselves using seven different and\ndistinguishing cries."
        fr:
          emerald: "Les EOKO volent plus vivement quand la\nsaison chaude arrive. Ils communiquent\nentre eux à l’aide de sept cris différents."
        it:
          emerald: "Quando arriva la stagione calda, i\nCHIMECHO cominciano a svolazzare\ndi qua e di là, comunicando fra di loro\ncon sette differenti versi caratteristici."
        de:
          emerald: "Wird es heiß, fliegen sie wild umher. Sie\nkommunizieren miteinander mit sieben\nunterschiedlichen Schreien."
        es:
          emerald: "Se ponen a volar sin parar cuando llega\nla estación cálida. Se comunica con otros\na través de siete tipos de grito distintos\nmuy característicos."
absol:
  species_id: 359
