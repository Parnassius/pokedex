        jp_kana:
          emerald: "のんだ　みずを　ふっきんを　つかい　いきおいよく\nふきだして　そらを　とぶ　えものを　しとめる。\nしんかが　ちかづくと　かわを　くだっていく。"
        en:
          emerald: "A REMORAID uses its abdominal muscles\nto forcefully expel swallowed water, then\nshoot down flying prey. When evolution\napproaches, it travels down rivers."
        fr:
          emerald: "Il aspire de l’eau qu’il recrache à forte\npression sur les proies volantes, grâce à\nses muscles abdominaux. Avant d’évoluer,\nil descend le courant des rivières."
        it:
          emerald: "Espelle l’acqua assorbita con i suoi\npotenti addominali per abbattere le prede\nin volo. Quando è prossimo all’evoluzione,\nsegue la corrente dei fiumi fino a valle."
        de:
          emerald: "REMORAID spritzt eingesogenes Wasser\nmittels seiner Bauchmuskeln heraus, um\nfliegende Beute zu erlegen. Rückt seine\nEntwicklung näher, geht es flussabwärts."
        es:
          emerald: "Traga agua y usa los abdominales para\nlanzarla rápido contra una presa que esté\nen el aire. Cuando va a evolucionar, se deja\narrastrar por la corriente de los ríos."
octillery:
  species_id: 224
