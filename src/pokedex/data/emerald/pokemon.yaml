      descriptions:
        jp_kana:
          emerald: "けいかいしんが　とても　つよく　ねている　ときも\nみみを　うごかし　まわりの　おとを　きいている。\nどこにでも　すみつき　す　を　つくる。"
        en:
          emerald: "A RATTATA is cautious in the extreme.\nEven while it is asleep, it constantly\nmoves its ears and listens for danger.\nIt will make its nest anywhere."
        fr:
          emerald: "RATTATA est extrêmement prudent. Même\nlorsqu’il est endormi, il fait pivoter ses\noreilles pour écouter autour de lui.\nIl peut faire son nid n’importe où."
        it:
          emerald: "RATTATA è estremamente cauto. Anche nel\nsonno muove le orecchie come sonde per\ncaptare i pericoli. Costruisce il suo nido\novunque."
        de:
          emerald: "RATTFRATZ ist extrem vorsichtig. Sogar\nim Schlaf nimmt es alles wahr, indem es\nseine Ohren bewegt. Es richtet sein\nNest überall ein."
        es:
          emerald: "RATTATA es cauto como él solo. Hasta\ncuando duerme mueve las orejas para oír\ntodo lo que pueda suponer un peligro.\nCava su madriguera en cualquier sitio."
raticate:
  species_id: 20
