      descriptions:
        jp_kana:
          emerald: "もともと　ひとつの　からだから　３つごに\nなったので　みんな　かんがえることは　おなじ。\nちからを　あわせ　どこまでも　ほりすすむ。"
        en:
          emerald: "Because the triplets originally split from\none body, they think exactly alike.\nThey work cooperatively to burrow\nendlessly through the ground."
        fr:
          emerald: "Ce sont des triplés qui ont émergé du même\ncorps. Chacun pense exactement comme les\ndeux autres. Ils creusent inlassablement,\ndans une coopération parfaite."
        it:
          emerald: "DUGTRIO è formato da tre unità prove-\nnienti da un solo corpo. Il trio è un’unica\nmente pensante. Le tre unità collaborano\nscavando instancabilmente."
        de:
          emerald: "DIGDRI sind Drillinge, die aus einem Körper\nentstanden sind. Daher denken alle Köpfe\ngleich. Sie arbeiten so gut zusammen,\ndass sie endlos graben können."
        es:
          emerald: "Los DUGTRIO son trillizos que salieron\nde un mismo cuerpo, por eso piensan de la\nmisma forma. A la hora de cavar, trabajan\nen equipo y sin descanso."
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
    en: MEOWTH
    fr: MIAOUSS
    it: MEOWTH
    de: MAUZI
    es: MEOWTH
