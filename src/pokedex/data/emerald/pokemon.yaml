          emerald: "キバを　むきだして　こわい　かおを　すれば\nちいさな　ポケモンなら　おびえて　にげだす。\nにげられた　ブルーは　ちょっと　さみしそう。"
        en:
          emerald: "By baring its fangs and making a scary\nface, it sends smaller POKéMON scurrying\nin terror. The SNUBBULL does seem a\nlittle sad at making its foes flee."
        fr:
          emerald: "Il terrorise les POKéMON plus petits que\nlui en montrant les dents et en faisant\nune grimace. Cependant, il est toujours un\npeu triste de voir ses ennemis s’enfuir."
        it:
          emerald: "Mostrando le zanne e ringhiando, SNUBBULL\nterrorizza i POKéMON più piccoli mettendoli\nin fuga. Tuttavia, pare intristirsi ogni\nvolta che il nemico scappa atterrito."
        de:
          emerald: "Indem es seine Zähne fletscht und ein\nFurcht erregendes Gesicht macht, schlägt\nSNUBBULL kleinere PKMN in die Flucht.\nDarüber ist es jedoch etwas traurig."
        es:
          emerald: "Al tener los colmillos por fuera, SNUBBULL\nda miedo y espanta, aterrados, a los\nPOKéMON pequeños. Aunque a él parece que\nle da un poco de pena que salgan huyendo."
granbull:
  species_id: 210
