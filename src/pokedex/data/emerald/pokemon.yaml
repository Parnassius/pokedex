      descriptions:
        jp_kana:
          emerald: "ケムッソの　ときに　たくわえた　エネルギーを\nつかって　しんかの　じゅんびを　している。\n２つの　めで　まわりの　ようすを　うかがう。"
        en:
          emerald: "It prepares for evolution using the\nenergy it stored while it was a WURMPLE.\nIt keeps watch over the surroundings with\nits two eyes."
        fr:
          emerald: "Il prépare son évolution en utilisant\nl’énergie accumulée quand il était un\nCHENIPOTTE. Il est très vigilant\net surveille sans cesse les alentours."
        it:
          emerald: "SILCOON si prepara all’evoluzione usando\nl’energia immagazzinata quando era un\nWURMPLE. Scruta l’ambiente attorno a\nsé con i suoi due occhi."
        de:
          emerald: "Es bereitet sich auf die Entwicklung vor\nund nutzt dabei die Energie, die es als\nWAUMPEL gespeichert hat. Mit seinen\nbeiden Augen beobachtet es die Umgebung."
        es:
          emerald: "Se prepara para la evolución usando la\nenergía que almacenó mientras era un\nWURMPLE. Los dos ojos que tiene le sirven\npara vigilar lo que ocurre en su territorio."
beautifly:
  species_id: 267
  names:
    jp_kana: アゲハント
