      descriptions:
        jp_kana:
          emerald: "えだに　ぶらさがり　えいようを　きゅうしゅう。\nしょくじを　おえて　からだの　おもくなった\nタネボーは　ぽとりぽとりと　じめんに　おちる。"
        en:
          emerald: "It hangs off branches and absorbs\nnutrients. When it finishes eating, its\nbody becomes so heavy that it drops to\nthe ground with a thump."
        fr:
          emerald: "Il s’accroche aux branches et absorbe\nleurs nutriments. Une fois rassasié, il a\npris tant de poids qu’il se laisse tomber\nlourdement sur le sol."
        it:
          emerald: "SEEDOT sta appeso ai rami succhiando le\nsostanze nutritive degli alberi. Alla fine\ndel pasto, il suo corpo è così pesante che\nil POKéMON cade a terra con un tonfo."
        de:
          emerald: "Es hängt von Ästen und nimmt Nährstoffe\nauf. Nach dem Essen ist sein Körper so\nschwer, dass es sich einfach fallen lässt\nund mit lautem Knall aufschlägt."
        es:
          emerald: "Se cuelga de las ramas y absorbe sus\nnutrientes. Cuando acaba de comer,\nse queda tan lleno que acaba cayéndose\nal suelo y dándose un tortazo."
nuzleaf:
  species_id: 274
  names:
    jp_kana: コノハナ
    en: NUZLEAF
    fr: PIFEUIL
    it: NUZLEAF
    de: BLANAS
