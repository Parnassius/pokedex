        en:
          emerald: "It alters its form depending on the\nweather. Changes in the climate such as\nthe temperature and humidity appear to\naffect its cellular structure."
        fr:
          emerald: "Il change son apparence en fonction du\ntemps. Les changements climatiques,\ncomme la température ou l’humidité,\naffectent sa structure cellulaire."
        it:
          emerald: "La forma di CASTFORM cambia con le\ncondizioni atmosferiche. Le variazioni di\ntemperatura e umidità, infatti, influiscono\nsulla sua struttura cellulare."
        de:
          emerald: "Sein Äußeres hängt vom Wetter ab. Ändert\nsich das Klima in Punkto Temperatur oder\nFeuchtigkeit, so ändert sich scheinbar\nseine Zellstruktur."
        es:
