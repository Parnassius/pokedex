        en:
          emerald: "ZAPDOS is a legendary bird POKéMON that\nhas the ability to control electricity.\nIt usually lives in thunderclouds. It gains\npower if it is stricken by lightning bolts."
        fr:
          emerald: "C’est un POKéMON oiseau légendaire\ncapable de contrôler l’électricité. Il vit\ngénéralement dans les nuages orageux. La\nfoudre le rend plus fort."
        it:
          emerald: "POKéMON uccello leggendario perfetta-\nmente in grado di gestire l’elettricità.\nVive nelle nubi temporalesche e acquista\nforza se colpito da qualche fulmine."
        de:
          emerald: "ZAPDOS ist ein legendäres Vogel-PKMN, das\ndie Fähigkeit besitzt, Elektrizität zu ma-\nnipulieren. Es lebt in Gewitterwolken und\nnimmt Energie von Blitzen auf."
        es:
          emerald: "Es un legendario pájaro POKéMON que tiene\nla habilidad de controlar la electricidad.\nSuele vivir en nubarrones. Gana mucha\nfuerza si le alcanzan los rayos."
moltres:
