      held_items:
        common: lum_berry
        rare: lum_berry
      descriptions:
        jp_kana:
          emerald: "すべての　ポケモンの　いでんしを　もつと　いう。\nじゆうじざいに　すがたを　けすことが　できるので\nひとに　ちかづいても　まったく　きづかれない。"
        en:
          emerald: "A MEW is said to possess the genes of all\nPOKéMON. It is capable of making itself\ninvisible at will, so it entirely avoids\nnotice even if it approaches people."
        fr:
          emerald: "On dit que MEW possède le code génétique\nde tous les autres POKéMON. Il peut se\nrendre invisible et ne se fait pas\nremarquer quand il s’approche des gens."
        it:
          emerald: "Si dice che MEW possegga il patrimonio\ngenetico di tutti i POKéMON. È in grado di\nrendersi invisibile quando vuole, in modo\nda non farsi notare nemmeno da vicino."
        de:
          emerald: "MEW soll die genetische Zusammensetzung\naller PKMN besitzen. Es kann sich unsicht-\nbar machen, so dass es sich auch Menschen\nnähern kann, ohne bemerkt zu werden."
        es:
          emerald: "Dicen que posee el mapa genético de todos\nlos POKéMON. Puede hacerse invisible\na voluntad, así que logra pasar\ninadvertido aunque haya gente cerca."
chikorita:
  species_id: 152
  names:
    jp_kana: チコリータ
    en: CHIKORITA
