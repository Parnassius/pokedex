        jp_kana:
          emerald: "ザングースとは　えいえんの　ライバルだ。\nもうどくの　しみだす　しっぽの　かたなで\nうごきの　すばやい　ザングースに　たいこうする。"
        en:
          emerald: "SEVIPER and ZANGOOSE are eternal rivals.\nIt counters a ZANGOOSE’s dazzling agility\nwith its swordlike tail, which also oozes\na horrible poison."
        fr:
          emerald: "C’est l’éternel rival de MANGRIFF.\nIl compense la vitesse de ce dernier à\nl’aide de sa queue tranchante qui contient\nun poison très puissant."
        it:
          emerald: "SEVIPER respinge gli attacchi dell’agile\nZANGOOSE, suo acerrimo nemico, con la\ncoda a forma di spada, che secerne anche\nun micidiale veleno."
        de:
          emerald: "VIPITIS und SENGO sind Erzrivalen.\nVIPITIS kontert die atemberaubende\nFlinkheit von SENGO mit seinem schwert-\nähnlichen Schwanz, aus dem Gift austritt."
        es:
          emerald: "SEVIPER y ZANGOOSE son rivales eternos.\nContrarresta la gran agilidad de ZANGOOSE\ncon una cola en forma de espada que\nademás rezuma un veneno terrible."
lunatone:
  species_id: 337
  names:
