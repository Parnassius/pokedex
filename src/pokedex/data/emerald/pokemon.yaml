        jp_kana:
          emerald: "ふだんは　おとなしいが　くろい　しっぽを\nこうげきされると　もうれつに　はんげきする。\nどうくつの　すみかで　ひぐれを　まつ。"
        en:
          emerald: "Usually docile, a WOBBUFFET strikes back\nferociously if its black tail is attacked.\nIt makes its lair in caves where it waits\nfor nightfall."
        fr:
          emerald: "Normalement très docile, il attaquera\nférocement si sa queue noire est\nattaquée. Il vit dans les grottes où il\nattend la tombée de la nuit."
        it:
          emerald: "Solitamente docile, WOBBUFFET può reagire\ncon violenza se qualcuno attacca la sua\ncoda nera. Attende la notte nella sua tana\nall’interno di una grotta."
        de:
          emerald: "WOINGENAU ist sehr ruhig. Wird jedoch sein\nschwarzer Schwanz angegriffen, schlägt es\nerbarmungslos zurück. Es lebt in Höhlen, wo\nes den Einbruch der Nacht erwartet."
        es:
          emerald: "Generalmente es dócil, pero si recibe un\nataque en su cola negra, WOBBUFFET se\ndefenderá con ferocidad. Se guarece\nen cuevas hasta que anochece."
girafarig:
  species_id: 203
