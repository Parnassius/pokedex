        jp_kana:
          emerald: "カラフルな　はねの　もようが　とくちょう。\nかふんを　あつめに　はなばたけに　あつまる。\nおこった　ときの　こうげきは　とても　はげしい。"
        en:
          emerald: "Its colorfully patterned wings are its\nmost prominent feature. It flies through\nflower-covered fields collecting pollen.\nIt attacks ferociously when angered."
        fr:
          emerald: "Ses ailes colorées sont son signe\ndistinctif. Il vole gentiment au-dessus\ndes champs fleuris mais sait aussi se\nmontrer féroce s’il est énervé."
        it:
          emerald: "BEAUTIFLY ha delle favolose ali colorate.\nÈ solito volare su campi ricoperti di fiori\nper raccogliere il polline. Se provocato,\nattacca il nemico in modo molto aggressivo."
        de:
          emerald: "Seine Kennzeichen sind die bunt bemuster-\nten Flügel. PAPINELLA fliegt durch\nblumenübersäte Wiesen und sammelt\nBlütenstaub. Es greift brutal an."
        es:
          emerald: "Su principal característica son los\ndibujos y colores de sus alas. Vuela por\ncampos cubiertos de flores para recoger\nel polen. Si le molestan, ataca sin dudar."
cascoon:
  species_id: 268
  names:
    jp_kana: マユルド
