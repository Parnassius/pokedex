      descriptions:
        jp_kana:
          emerald: "ぜつめつしたと　かんがえられていた　ポケモン。\n１おくねんの　あいだ　すがたが　かわっていない。\nむなびれを　つかって　かいていを　あるく。"
        en:
          emerald: "A POKéMON that was once believed to have\nbeen extinct. The species has not changed\nits form for 100 million years. It walks on\nthe seafloor using its pectoral fins."
        fr:
          emerald: "On a cru cette espèce éteinte et elle n’a\npas évolué depuis 100 millions d’années. Il\nse déplace au fond de la mer en utilisant\nses nageoires comme s’il marchait."
        it:
          emerald: "Un tempo si credeva che RELICANTH si\nfosse estinto. Questa specie, la cui forma\nè immutata da 100 milioni di anni, si muove\nsui fondali marini con le pinne pettorali."
        de:
          emerald: "Man nahm einst an, dieses PKMN sei\nausgestorben. Diese Art hat seine Form\nseit 100 Millionen Jahren nicht verändert.\nEs läuft mittels seiner Bauchflossen."
        es:
          emerald: "Se llegó a creer que se había extinguido.\nLa especie no ha cambiado de forma desde\nhace 100 millones de años. Camina por el\nfondo marino usando las aletas frontales."
luvdisc:
  species_id: 370
  names:
    jp_kana: ラブカス
    en: LUVDISC
    fr: LOVDISC
    it: LUVDISC
    de: LIEBISKUS
    es: LUVDISC
