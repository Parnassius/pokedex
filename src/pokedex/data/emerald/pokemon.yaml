        en:
          emerald: "It looses ultrasonic waves by rubbing its\nwings together. Since a VIBRAVA’s wings\nare still in the process of growing, it can\nonly fly short distances."
        fr:
          emerald: "Il crée des ultrasons en joignant ses ailes\nentre elles. Comme elles ne sont pas\ncomplètement formées, il ne peut voler que\nsur de courtes distances."
        it:
          emerald: "Sfregando le sue ali, VIBRAVA produce onde\nultrasoniche. Poiché le ali non hanno\nancora completato lo sviluppo, con esse\npuò volare solo per brevi distanze."
        de:
          emerald: "Reibt es seine Flügel aneinander,\ngeneriert es Ultraschallwellen. Da\nseine Flügel noch immer wachsen,\nkann es nur kurze Distanzen fliegen."
        es:
          emerald: "Cuando frota las alas, emite ondas\nultrasónicas, pero, como aún no están\ncompletamente desarrolladas, sólo\npuede volar distancias cortas."
flygon:
  species_id: 330
