      descriptions:
        jp_kana:
          emerald: "ながい　ねんげつを　かけて　からだの　さいぼうが\nとつぜんへんいを　おこして　つばさが　はえた。\nおこると　われを　わすれて　あばれまわる。"
        en:
          emerald: "After many long years, its cellular\nstructure underwent a sudden mutation to\ngrow wings. When angered, it loses all\nthought and rampages out of control."
        fr:
          emerald: "Après de longues années, sa structure\ncellulaire subit un grand changement pour\npermettre à ses ailes de pousser. Une fois\nénervé, il perd tout contrôle de lui-même."
        it:
          emerald: "Pare che le ali di SALAMENCE siano il\nrisultato di una mutazione cellulare\navvenuta nel corso degli anni. Se si infuria\nperde completamente il controllo di sé."
        de:
          emerald: "Nach vielen Jahren mutierte plötzlich\nseine Zellstruktur und es wuchsen ihm\nFlügel. Wenn es wütend ist, kann es\nnicht mehr klar denken und flippt aus."
        es:
          emerald: "Después de muchos años, su estructura\ncelular sufrió una mutación repentina y\nle crecieron alas. Cuando se enfada, no\nse atiene a razones y entra en cólera."
beldum:
  species_id: 374
