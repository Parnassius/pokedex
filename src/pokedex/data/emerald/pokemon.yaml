      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          emerald: "はなの　かおりは　きもちを　おだやかにする。\nたたかいの　ときは　かおりを　はっさんさせて\nあいての　たたかう　きもちを　にぶらせるのだ。"
        en:
          emerald: "The fragrance of a MEGANIUM’s flower\nsoothes and calms emotions. In battle,\nit gives off more of its becalming scent\nto blunt the foe’s fighting spirit."
        fr:
          emerald: "Le parfum de la fleur de MEGANIUM apaise\net calme les esprits. Pendant les combats,\nce POKéMON émet son parfum relaxant\npour atténuer l’agressivité de l’ennemi."
        it:
          emerald: "L’aroma del fiore di MEGANIUM placa le\nemozioni. Nella lotta, emana un profumo\ncon effetto calmante per smorzare\nl’aggressività del nemico."
        de:
          emerald: "Der Duft von MEGANIEs Blume besänftigt\nGemüter. Im Kampf gibt dieses PKMN mehr\nvon seinem beruhigenden Duftstoff ab, um\nden Kampfgeist des Gegners zu schwächen."
        es:
          emerald: "La fragancia de su flor aplaca y suaviza\nlos ánimos. Al luchar, libera más cantidad\nde esencia calmante para anular el\nespíritu de combate de su oponente."
cyndaquil:
  species_id: 155
  names:
    jp_kana: ヒノアラシ
