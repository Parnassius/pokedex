        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          emerald: "はっぱを　ふりまわして　あいてを　いかくするが\nはっぱから　あまい　かおりが　ただようので\nおたがいに　なごやかな　ふんいきに　なるよ。"
        en:
          emerald: "It waves its leaf around to keep foes\nat bay. However, a sweet fragrance also\nwafts from the leaf, creating a friendly\natmosphere that becalms the battlers."
        fr:
          emerald: "En combat, il secoue sa feuille pour tenir\nl’ennemi à distance. Un doux parfum s’en\ndégage, apaisant ainsi les POKéMON qui se\nbattent et créant une atmosphère amicale."
        it:
          emerald: "In lotta, CHIKORITA tiene a bada il nemico\nsventolando la sua foglia. Essa emana un \naroma dolce e calmante, che crea\nun’atmosfera gradevole e rilassata."
        de:
          emerald: "Im Kampf wedelt ENDIVIE mit seinem Blatt,\num den Feind fern zu halten. Das Blatt\nverströmt einen tollen Duft, der PKMN be-\nruhigt und eine nette Atmosphäre schafft."
        es:
          emerald: "Al luchar, agita la hoja de la cabeza para\nimpresionar al rival, pero también libera\nuna suave fragancia que apacigua los\nánimos y crea un ambiente amistoso."
bayleef:
  species_id: 153
  names:
    jp_kana: ベイリーフ
    en: BAYLEEF
    fr: MACRONIUM
    it: BAYLEEF
    de: LORBLATT
    es: BAYLEEF
