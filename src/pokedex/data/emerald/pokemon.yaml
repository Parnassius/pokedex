        jp_kana:
          emerald: "１にちの　ほとんどを　みずの　なかで　くらす。\nからだの　いろと　もようは　すいちゅうで\nてきに　みつかり　にくくする　カムフラージュ。"
        en:
          emerald: "It lives in water virtually all day long.\nIts body color and pattern act as\ncamouflage that makes it tough for\nenemies to spot in water."
        fr:
          emerald: "Il passe tout son temps sous l’eau.\nLa forme et la couleur de son corps\nservent de camouflage pour que ses\nennemis ne puissent pas l’apercevoir."
        it:
          emerald: "AZUMARILL trascorre tutta la giornata\nin acqua. Il colore e la forma del suo corpo\ngli permettono di mimetizzarsi, pertanto\ni nemici hanno difficoltà a localizzarlo."
        de:
          emerald: "Es ist quasi den ganzen Tag im Wasser.\nSowohl die Farbe als auch das Muster\nseines Körpers dienen als Tarnung vor\nFeinden im Wasser."
        es:
          emerald: "Está casi todo el día en el agua.\nEl dibujo y el color que tiene le sirven\nde camuflaje, por lo que resulta difícil\nque algún rival lo encuentre en el agua."
sudowoodo:
  species_id: 185
