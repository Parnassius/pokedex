        special_defense: 0
        speed: 0
      types:
        - grass
        - dark
      egg_groups:
        - field
        - grass
      abilities:
        - chlorophyll
        - early_bird
      descriptions:
        jp_kana:
          emerald: "こがらしに　のって　あらわれると　いわれている。\nむかしから　もりの　かみさまと　おそれられ\nひとの　おとずれない　みつりんで　くらす。"
        en:
          emerald: "It is said to arrive on chilly, wintry winds.\nFeared from long ago as the guardian of\nforests, this POKéMON lives in a deep\nforest where people do not venture."
        fr:
          emerald: "On dit qu’il arrive en même temps que\nles vents glacés de l’hiver. Ce POKéMON\nest le gardien des forêts où les\nhumains n’osent pas s’aventurer."
        it:
          emerald: "Si dice che arrivi trasportato dai gelidi\nventi invernali. SHIFTRY è da sempre un\ntemuto guardiano delle foreste, dove vive\nlontano dal mondo e dagli uomini."
        de:
          emerald: "Es soll mit den eisigen Winterwinden auf-\ntauchen. Seit langer Zeit wird es als\nWächter des Waldes gefürchtet und es lebt\ntief im Wald, wo kein Mensch hingelangt."
        es:
          emerald: "Dicen que llega con los fríos vientos de\ninvierno. Se le considera guardián de los\nbosques y se le teme; nadie se atreve\na adentrarse en su morada."
taillow:
  species_id: 276
  names:
    jp_kana: スバメ
    en: TAILLOW
