      descriptions:
        jp_kana:
          emerald: "むれを　まもる　リーダーは　なわばりに\nはいってきた　あいてを　いのちがけで　たおす。\nたたかいで　キバが　おれる　ことも　ある。"
        en:
          emerald: "To protect its herd, the leader battles\nanything that invades its territory, even\nat the cost of its life. Its tusks may snap\noff in battle."
        fr:
          emerald: "Pour protéger son groupe, KAIMORSE\nattaque au péril de sa vie tout ce qui\ns’aventure sur son territoire. Il peut\nperdre ses défenses pendant un combat."
        it:
          emerald: "Per proteggere il branco, il capogruppo dei\nWALREIN lotta contro chiunque invada il\nloro territorio, anche a costo della vita.\nIn lotta, a volte, le sue zanne si staccano."
        de:
          emerald: "Um seine Herde zu beschützen, greift der\nAnführer jeden Eindringling sofort an, \nauch wenn es ihn sein Leben kosten könnte.\nSeine Stoßzähne können im Kampf abfallen."
        es:
          emerald: "Para proteger a su manada, el líder luchará\nhasta el final contra todo lo que invada su\nterritorio. En el transcurso del combate,\nes posible que pierda los colmillos."
clamperl:
  species_id: 366
