      descriptions:
        jp_kana:
          emerald: "ねむっているとき　キミの　はなが　ムズムズしたら\nまくらもとに　たった　スリープが　はなの\nあなから　ゆめを　たべようとしている　あいず。"
        en:
          emerald: "If your nose becomes itchy while you are\nsleeping, it’s a sure sign that a DROWZEE is\nstanding above your pillow and trying to\neat your dream through your nostrils."
        fr:
          emerald: "Si jamais votre nez vous démange en\ndormant, c’est sans doute que ce\nPOKéMON se tient au-dessus de vous\npour manger vos rêves par les narines."
        it:
          emerald: "DROWZEE si nutre dei sogni degli altri\nmentre dormono, estraendoli dalle loro\nnarici. Se dormendo si avverte prurito\nal naso, significa che è già all’opera."
        de:
          emerald: "Wenn dir im Schlaf die Nase juckt, ist das\nein Zeichen dafür, dass eines dieser PKMN\nauf deinem Kissen sitzt, um deinen Traum\ndurch deine Nasenlöcher zu verspeisen."
        es:
          emerald: "Si te pica la nariz mientras duermes,\nseguro que es porque tienes a uno de\nellos en la almohada intentando sacarte\nlos sueños por la nariz para comérselos."
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    en: HYPNO
    fr: HYPNOMADE
    it: HYPNO
    de: HYPNO
    es: HYPNO
