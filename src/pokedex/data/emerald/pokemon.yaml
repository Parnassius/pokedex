      descriptions:
        jp_kana:
          emerald: "とつぜんへんいに　より　すいちゅうで　せいかつ\nできる　ように　ヒレと　エラが　はえてきた。\nみずを　じざいに　あやつる　ちからを　もつ。"
        en:
          emerald: "VAPOREON underwent a spontaneous\nmutation and grew fins and gills that\nallow them to live underwater. They have\nthe ability to freely control water."
        fr:
          emerald: "AQUALI a subi une mutation spontanée. Des\nnageoires et des branchies sont apparues\npour lui permettre de vivre dans les fonds\nmarins. Il contrôle l’eau à volonté."
        it:
          emerald: "VAPOREON, frutto di una mutazione\nnaturale, ha sviluppato pinne e branchie\nper vivere sott’acqua. Ha la capacità di\nsfruttare l’acqua a suo vantaggio."
        de:
          emerald: "AQUANA hat eine spontane Mutation durch-\ngemacht und ihm sind Flossen und Kiemen\ngewachsen. Dadurch kann es unter Wasser\nleben. Es kann Wasser beliebig ändern."
        es:
          emerald: "Sufrió una mutación repentina y desarrolló\naletas y branquias que le permiten vivir\nbajo el agua. Asimismo, este POKéMON\ntiene la habilidad de controlar las aguas."
jolteon:
  species_id: 135
  names:
    jp_kana: サンダース
