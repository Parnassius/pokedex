        jp_kana:
          emerald: "おもい　からだを　ひきずり　かいていを　いどう。\nあたたかい　うみの　あさせを　すみかにする。\nしおが　ひくと　すなはまに　すがたを　みせる。"
        en:
          emerald: "It drags its heavy body along the\nseafloor. It makes its nest in the shallows\nof warm seas. CRADILY can be seen on\nbeaches when the tide goes out."
        fr:
          emerald: "Il traîne lourdement son corps au fond\nde l’océan et fait son nid dans les\nhauts-fonds des mers chaudes. On peut\nen apercevoir à marée basse."
        it:
          emerald: "CRADILY trascina il suo pesante corpo sul\nfondo marino e costruisce il nido nei caldi\nbassifondi del mare. Con la bassa marea, si\npuò vedere il POKéMON sulle spiagge."
        de:
          emerald: "Es schleppt seinen schweren Körper über\nden Meeresboden. WIELIE baut sein Nest\nin Untiefen der warmen See. Bei Ebbe kann\nman es am Strand sehen."
        es:
          emerald: "Arrastra su pesado cuerpo por el fondo\nmarino. Anida cerca de la superficie, en\naguas templadas. Cuando hay marea baja,\nes posible ver a CRADILY en la playa."
anorith:
  species_id: 347
