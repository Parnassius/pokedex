        jp_kana:
          emerald: "きょうふうを　うけると　ガスじょうの　からだは\nみるみる　ふきとばされ　ちいさくなって　しまう。\nかぜを　さけた　ゴースが　のきしたに　あつまる。"
        en:
          emerald: "When exposed to a strong wind, a GASTLY’s\ngaseous body quickly dwindles away.\nThey cluster under the eaves of houses\nto escape the ravages of wind."
        fr:
          emerald: "Lorsqu’il est exposé au vent, le corps\ngazeux de FANTOMINUS rapetisse et se\ndisperse. Ces POKéMON se rassemblent sous\nles auvents des maisons pour se protéger."
        it:
          emerald: "GASTLY è composto per lo più di sostanze\ngassose. Se esposto al vento, il suo corpo\nsi disperde subito. Per ripararsi dal vento,\nsi ferma sotto i cornicioni delle case."
        de:
          emerald: "Wird es starkem Wind ausgesetzt, kann\nes davongeweht werden. Scharen dieses\nPKMN sammeln sich unter Dachrinnen,\num sich vor dem Wind zu schützen."
        es:
          emerald: "Tiene mucha materia gaseosa. Cuando\nes arrastrado por un vendaval mengua.\nSe agrupan bajo los aleros de las casas\npara resguardarse del viento."
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
