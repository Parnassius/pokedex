      descriptions:
        jp_kana:
          emerald: "きのぼりが　とくいな　もりに　すむ　ポケモン。\nとがった　ながい　はなが　じゃくてん。\nにぎられると　からだの　ちからが　ぬけてしまう。"
        en:
          emerald: "A forest-dwelling POKéMON that is skilled\nat climbing trees. Its long and pointed\nnose is its weak point. It loses power if\nthe nose is gripped."
        fr:
          emerald: "Ce POKéMON habite dans les forêts et est\ntrès doué pour grimper aux arbres. Son nez\nlong et pointu est son point faible et il\nperd ses forces si on l’agrippe."
        it:
          emerald: "NUZLEAF vive nella foresta ed è molto abile\na salire sugli alberi. Se qualcuno afferra il\nsuo lungo naso appuntito, il POKéMON\nperde potenza."
        de:
          emerald: "BLANAS lebt im Wald und ist ein geschickter\nKletterer. Seine lange, spitze Nase ist\nsein Schwachpunkt. Greift man seine Nase,\nwird es schwächer."
        es:
          emerald: "Vive en los bosques y se le da muy bien\nsubirse a los árboles. La nariz que tiene,\ngrande y puntiaguda, es su punto débil.\nSi se la pellizcan, pierde fuerza."
shiftry:
  species_id: 275
