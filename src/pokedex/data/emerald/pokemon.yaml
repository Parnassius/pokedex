      descriptions:
        jp_kana:
          emerald: "こうらの　やくめは　みを　まもる　だけではない。\nまるい　かたちと　ひょうめんの　みぞが　みずの\nていこうを　へらすので　はやく　およげるのだ。"
        en:
          emerald: "Its shell is not just for protection.\nIts rounded shape and the grooves on its\nsurface minimize resistance in water,\nenabling SQUIRTLE to swim at high speeds."
        fr:
          emerald: "Sa carapace ne sert pas qu’à le protéger.\nLa forme ronde de sa carapace et ses\nrainures lui permettent d’améliorer son\nhydrodynamisme. Il nage donc très vite."
        it:
          emerald: "La corazza di SQUIRTLE non serve solo da\nprotezione. La forma arrotondata e le sca-\nnalature riducono l’attrito in acqua e gli\npermettono di nuotare ad alta velocità."
        de:
          emerald: "SCHIGGYs Panzer dient nicht nur zum\nSchutz. Die runde Form und die Furchen auf\nder Oberfläche verbessern die Stromlinie,\nso dass es sehr schnell schwimmen kann."
        es:
          emerald: "El caparazón de SQUIRTLE no sólo lo\nprotege; su forma redondeada y sus\nhendiduras reducen su resistencia al\nagua y le permiten nadar más rápido."
wartortle:
  species_id: 8
