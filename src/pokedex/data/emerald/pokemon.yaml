        jp_kana:
          emerald: "かいめん　すれすれを　とび　エサを　みつけると\nおおきな　クチバシで　かいすいごと　すくいとる。\nクチバシの　なかに　タマゴを　いれて　まもる。"
        en:
          emerald: "It skims the tops of waves as it flies.\nWhen it spots prey, it uses its large beak\nto scoop up the victim with water.\nIt protects its eggs in its beak."
        fr:
          emerald: "Il frôle la surface des vagues quand il\nvole. Son large bec lui sert à attraper les\nproies qu’il repère dans l’eau, mais aussi\nà protéger ses œufs."
        it:
          emerald: "PELIPPER vola radente sulle onde del mare\ncercando di individuare le prede, che poi\ncattura immergendo il suo enorme becco.\nLì tiene al sicuro anche le uova."
        de:
          emerald: "Es überfliegt die Wellenspitzen. Sieht es\ndabei Beute, setzt es seinen langen\nSchnabel ein, um die Beute einzufangen.\nSeine Eier sind im Schnabel gut geschützt."
        es:
          emerald: "Va esquivando las crestas de las olas.\nCuando localiza a su presa, usa el enorme\npico que tiene para sacarla del agua.\nTambién protege sus huevos con él."
ralts:
  species_id: 280
