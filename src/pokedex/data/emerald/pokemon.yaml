        en:
          emerald: "Its feet are tipped with tiny hooked claws\nthat enable it to scuttle on ceilings and\nvertical walls. It constricts its foe with\nthin and strong silk webbing."
        fr:
          emerald: "A l’extrémité de ses pattes, on trouve des\ncrochets qui lui permettent de cavaler\nsur les surfaces verticales et au plafond.\nIl piège ses ennemis dans sa toile de soie."
        it:
          emerald: "Le zampe di ARIADOS sono dotate di artigli\nuncinati che gli consentono di aggrapparsi\na soffitti e pareti. Intrappola il nemico\ncon la sua ragnatela sottile e robusta."
        de:
          emerald: "ARIADOS hat kleine hakenförmige Krallen\nan seinen Füßen. Damit kann es an Decken\nund Wänden entlang flitzen. Es erdrückt\nseine Gegner mit starkem Seidenfaden."
        es:
          emerald: "ARIADOS tiene unas patas con forma de\ngarfio que le permiten correr por techos\ny superficies verticales. Oprime al rival\ncon una tela de araña fina y resistente."
crobat:
  species_id: 169
  names:
    jp_kana: クロバット
