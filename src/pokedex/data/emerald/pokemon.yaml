          emerald: "きゅうしゃめんを　ころがり　やまを　おりていく。\nゆくてを　ふさぐ　たいぼくや　おおいわは\nたいあたりで　なぎたおしてしまう　あらあらしさ。"
        en:
          emerald: "They descend from mountains by tumbling\ndown steep slopes. They are so brutal,\nthey smash aside obstructing trees and\nmassive boulders with thunderous tackles."
        fr:
          emerald: "Il descend de la montagne en dévalant\nles pentes abruptes. Il est si violent\nqu’il détruit les arbres et les rochers\nse trouvant sur son chemin."
        it:
          emerald: "GRAVELER rotola giù dai ripidi sentieri di\nmontagna con una veemenza talmente\ndirompente da abbattere gli alberi e\nfracassare i massi che incontra."
        de:
          emerald: "Es steigt von Bergen herab, indem es sich\nsteile Abhänge hinunterfallen lässt. Dabei\nstößt es mit voller Wucht gegen Bäume\nund Felsblöcke, die ihm im Weg stehen."
        es:
          emerald: "Baja las montañas rodando por cuestas\nescarpadas. Es tan robusto que\ndestroza árboles y cantos rodados\nal impactar contra ellos."
golem:
  species_id: 76
