      descriptions:
        jp_kana:
          emerald: "つきの　はどうを　うけて　しんかした　ポケモン。\nくらやみに　じっと　ひそみ　あいてを　うかがう。\nおそいかかる　とき　からだの　わっかが　ひかる。"
        en:
          emerald: "UMBREON evolved from exposure to the\nmoon’s energy pulses. It lurks in darkness\nand waits for its foes to move. The rings\non its body glow when it leaps to attack."
        fr:
          emerald: "Il a évolué suite à une exposition aux\nrayons lunaires. Il se cache dans le noir\net attend le passage de ses ennemis.\nSes anneaux s’illuminent quand il bondit."
        it:
          emerald: "UMBREON si è evoluto con l’esposizione\nalle onde lunari. Rimane nascosto al buio\nin attesa di un movimento del suo nemico.\nI cerchi sul corpo brillano quando attacca."
        de:
          emerald: "NACHTARA hat sich dadurch entwickelt,\ndass es Mondwellen ausgesetzt war.\nEs versteckt sich im Dunkeln und wartet\ndarauf, dass sich ein Feind bewegt."
        es:
          emerald: "Evolucionó tras haber estado expuesto a\nondas lunares. Se esconde en la oscuridad\nen silencio y espera a que su presa se\nmueva. Cuando ataca, le brillan los anillos."
murkrow:
  species_id: 198
