        jp_kana:
          emerald: "ぜんしんが　いわと　いしで　できた　ポケモン。\nたたかいで　からだの　いちぶが　けずれてしまうが\nじぶんで　あたらしい　いわを　つけて　なおす。"
        en:
          emerald: "A POKéMON that is made entirely of rocks\nand boulders. If parts of its body chip off\nin battle, REGIROCK repairs itself by\nadding new rocks."
        fr:
          emerald: "Ce POKéMON est uniquement constitué\nde pierres et de rochers. Quand il\nendommage son corps au combat, il le\nrégénère en ajoutant de nouveaux rochers."
        it:
          emerald: "REGIROCK è interamente formato da pietre\ne rocce. Se qualche roccia si stacca\ndurante la lotta, ne cerca delle nuove per\nsostituirle."
        de:
          emerald: "REGIROCK besteht nur aus Steinen und\nFelsen. Falls Teile seines Körpers im Kampf\ndavonfliegen, repariert es sich selbst,\nindem es einfach neue Steine hinzufügt."
        es:
          emerald: "Está enteramente formado por rocas\ny cantos rodados. Si se le desprendieran\npartes del cuerpo en combate, REGIROCK\nse repararía agregando rocas nuevas."
regice:
  species_id: 378
