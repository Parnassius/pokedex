      abilities:
        - pickup
      descriptions:
        jp_kana:
          emerald: "するどい　ツメを　ひっこめて　ぬきあし　さしあし\nあしおとを　たてずに　あるくことが　できる。\nキラキラ　ひかる　コインが　なぜか　だいすきだ。"
        en:
          emerald: "MEOWTH withdraw their sharp claws into\ntheir paws to silently sneak about.\nFor some reason, this POKéMON loves\nshiny coins that glitter with light."
        fr:
          emerald: "MIAOUSS peut rentrer ses griffes dans ses\npattes pour rôder gracieusement sans\nlaisser de traces. Il raffole des pièces\nd’or qui brillent à la lumière."
        it:
          emerald: "MEOWTH ritira i suoi artigli affilati\nall’interno delle zampe per poter aggirarsi\nfurtivo. Per ragioni oscure, è attratto\ndalle monetine che splendono alla luce."
        de:
          emerald: "MAUZI zieht seine scharfen Krallen ein, um\numherschleichen zu können, ohne Spuren\nzu hinterlassen. Dieses POKéMON hat eine\nVorliebe für Münzen, die im Licht glitzern."
        es:
          emerald: "Retrae sus afiladas uñas en las zarpas y\ncamina a hurtadillas. Así pasa inadvertido.\nNo se sabe por qué, pero adora las monedas\nbrillantes que resplandecen con la luz."
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
    en: PERSIAN
    fr: PERSIAN
    it: PERSIAN
    de: SNOBILIKAT
    es: PERSIAN
  forms:
    persian:
