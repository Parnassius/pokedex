      descriptions:
        jp_kana:
          emerald: "きように　うごく　しっぽの　さきを　てのひらの\nかわりに　つかっていたら　はんたいに　りょうてが\nぶきように　なってしまった　ポケモンだ。"
        en:
          emerald: "Its tail ends with a dexterous, handlike\nappendage. However, because it uses the\ntail so much, AIPOM’s real hands have\nbecome rather clumsy."
        fr:
          emerald: "L’extrémité de la queue de CAPUMAIN\nressemble à une main et peut être utilisée\nde façon ingénieuse. Il l’utilise tant, que\nses mains sont devenues très maladroites."
        it:
          emerald: "La coda di AIPOM termina in un’appendice a\nforma di mano dotata di grande abilità.\nPoiché usa così tanto la coda, le sue vere\nmani sono diventate molto maldestre."
        de:
          emerald: "An GRIFFELs Schweif befindet sich ein \nhandähnliches Anhängsel, mit dem es ge-\nschickt umgehen kann. Da es häufig den\nSchweif einsetzt, sind seine Hände plump."
        es:
          emerald: "Su cola termina en una especie de mano\na la que puede dar muy buen uso. Pero,\ncomo se ha acostumbrado a usarla mucho,\nlas de verdad se le han vuelto algo torpes."
sunkern:
  species_id: 191
