      descriptions:
        jp_kana:
          emerald: "さまざまな　なきごえを　つかいわけ　なかまと\nれんらくを　とりあい　えものを　おいこんでいく。\nチームワークの　みごとさは　ポケモンずいいち。"
        en:
          emerald: "HOUNDOUR communicate with each other\nusing a variety of cries to corner their\nprey. This POKéMON’s remarkable teamwork\nis simply unparalleled."
        fr:
          emerald: "Les MALOSSE chassent en meute organisée.\nIls communiquent grâce à une série de\npetits cris et encerclent ainsi leur proie.\nLeur travail d’équipe est remarquable."
        it:
          emerald: "Gli HOUNDOUR cacciano in squadre\ncomunicando tra loro con svariati versi\nper intrappolare la preda. Questo lavoro\ndi squadra è unico nel suo genere."
        de:
          emerald: "HUNDUSTER jagen in Gruppen. Sie kommuni-\nzieren miteinander über verschiedene Ge-\nheularten und treiben ihre Feinde in die\nEnge. Ihre Zusammenarbeit ist einzigartig."
        es:
          emerald: "Se comunica con sus compañeros de caza\nmediante aullidos para acorralar a las\npresas. Su capacidad de trabajo en equipo\nes sencillamente ejemplar."
houndoom:
  species_id: 229
  names:
    jp_kana: ヘルガー
