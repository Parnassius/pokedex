        en:
          emerald: "Its large tail is covered with rich, thick\nfur that deepens in color with age.\nThe scratches on its shell are evidence\nof this POKéMON’s toughness in battle."
        fr:
          emerald: "CARABAFFE a une large queue recouverte\nd’une épaisse fourrure qui devient foncée\navec l’âge. Les éraflures sur sa carapace\ntémoignent de son expérience au combat."
        it:
          emerald: "La grande coda di WARTORTLE è coperta da\nuna folta pelliccia, che si scurisce con\nl’avanzare dell’età. I graffi sulla corazza\ntestimoniano la sua potenza di lottatore."
        de:
          emerald: "SCHILLOK hat einen langen, buschigen\nSchweif, dessen Farbe intensiver wird,\nwenn es altert. Die Kratzer auf seinem\nPanzer zeugen von seiner Kampfkraft."
        es:
          emerald: "Tiene una cola larga y cubierta de un pelo\nabundante y grueso que se torna oscuro\ncon la edad. Los arañazos del caparazón\nmuestran lo buen guerrero que es."
blastoise:
