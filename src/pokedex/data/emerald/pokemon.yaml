        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          emerald: "やせいの　グラエナは　むれで　こうどうする。\nリーダーの　めいれいには　ぜったいに　さからわず\nいっしみだれぬ　チームワークで　てきを　たおす。"
        en:
          emerald: "In the wild, MIGHTYENA live in a pack.\nThey never defy their leader’s orders.\nThey defeat foes with perfectly\ncoordinated teamwork."
        fr:
          emerald: "Dans la nature, les GRAHYENA vivent en\nmeute. Ils obéissent toujours aux ordres\ndu dominant et battent leurs adversaires\ngrâce à leur travail d’équipe coordonné."
        it:
          emerald: "Allo stato brado, i MIGHTYENA vivono in\nbranco e cacciano il nemico dando prova di\nun perfetto lavoro di gruppo. Non disubbi-\ndiscono mai agli ordini del capobranco."
        de:
          emerald: "MAGNAYEN leben in der Wildnis im Rudel.\nSie gehorchen stets den Anordnungen des\nRudelführers. Beim Erlegen von Feinden\narbeiten sie perfekt zusammen."
        es:
          emerald: "MIGHTYENA vive con su jauría en estado\nsalvaje. Siempre obedece a su ENTRENADOR.\nDerrota al enemigo gracias a un trabajo\nde equipo perfectamente coordinado."
zigzagoon:
  species_id: 263
  names:
    jp_kana: ジグザグマ
