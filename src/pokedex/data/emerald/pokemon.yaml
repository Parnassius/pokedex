        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          emerald: "いつも　からだの　ひょうめんが　えきたいで\nぬるぬる　ぬれているため　てきに　つかまっても\nぬるりと　すりぬけ　にげる　ことが　できるぞ。"
        en:
          emerald: "Its body surface is always wet and slick\nwith an oily fluid. Because of this greasy\ncovering, it can easily slip and slide out\nof the clutches of any enemy in battle."
        fr:
          emerald: "Sa peau est lubrifièe par un liquide\nhuileux. Grâce à cette protection\ngraisseuse, il peut facilement se glisser\nhors de l’étreinte de n’importe quel ennemi."
        it:
          emerald: "Il corpo di POLIWHIRL è sempre umido e\nunto di fluido oleoso. Grazie a tale pelli-\ncola viscida, in lotta riesce a sfuggire\nagilmente alle grinfie del nemico."
        de:
          emerald: "QUAPUTZIs Körper ist immer feucht und\nglitschig. Dadurch kann es während\neines Kampfes leicht der Umklammerung\neines Gegners entkommen."
        es:
          emerald: "Tiene la piel húmeda y lubricada con un\nfluido aceitoso. Gracias a esta película\ngrasa, puede escapar de las garras de\ncualquier rival en pleno combate."
poliwrath:
  species_id: 62
  names:
    jp_kana: ニョロボン
    en: POLIWRATH
    fr: TARTARD
    it: POLIWRATH
    de: QUAPPO
    es: POLIWRATH
  forms:
    poliwrath:
      form_id: 0
      base_stats:
        hp: 90
        attack: 85
        defense: 95
        special_attack: 70
        special_defense: 90
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 3
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - fighting
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          emerald: "はったつした　きょうじんな　きんにくは　どんなに\nうんどうしても　つかれる　ことは　ない。\nたいへいようも　かるく　おうだん　できるほどだ。"
        en:
          emerald: "Its highly developed muscles never grow\nfatigued, however much it exercises.\nThis POKéMON can swim back and forth\nacross the Pacific Ocean without effort."
        fr:
          emerald: "Ses muscles solides et surdéveloppés ne\nse fatiguent jamais, quels que soient ses\nefforts. Il peut traverser les océans les\nplus grands avec une étonnante facilité."
        it:
          emerald: "Grazie ai suoi robustissimi muscoli,\nPOLIWRATH non si stanca mai. È così\ninfaticabile che riesce a nuotare da una\nparte all’altra dell’Oceano Pacifico."
        de:
          emerald: "QUAPPO besitzt hoch entwickelte Muskeln,\ndie nie ermüden, egal, wie sehr es sie auch\nbeansprucht. Es ist so kräftig, dass es\nmühelos den Pazifik durchschwimmen kann."
        es:
          emerald: "Tiene músculos fornidos y desarrollados,\nque nunca se cansan por más que los use.\nCruzarse el océano Pacífico un par de\nveces no le supone ningún esfuerzo."
abra:
  species_id: 63
  names:
