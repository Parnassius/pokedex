      descriptions:
        jp_kana:
          emerald: "かみなりの　スピードを　やどした　ポケモン。\nその　とおぼえは　かみなりが　おちた　ときの\nように　くうきを　ふるわせ　だいちを　ゆるがす。"
        en:
          emerald: "RAIKOU embodies the speed of lightning.\nIts roars send shock waves shuddering\nthrough the air and ground as if\nlightning bolts were crashing down."
        fr:
          emerald: "RAIKOU incarne la vitesse de l’éclair. Les\nrugissements de ce POKéMON libèrent des\nondes de choc provenant du ciel, frappant\nle sol avec la puissance de la foudre."
        it:
          emerald: "RAIKOU rappresenta la velocità del\nfulmine. Il suo ruggito crea terrificanti\nonde sonore e scuote il suolo come se\nfosse percosso dalla furia di un fulmine."
        de:
          emerald: "RAIKOU ist so schnell wie der Blitz. Sein\nGebrüll sendet Schockwellen aus, die\nwie Donnerschläge durch die Luft beben\nund den Boden erschüttern."
        es:
          emerald: "Tiene la velocidad del rayo. Al rugir, emite\nondas de choque que se esparcen vibrando\npor el aire y sacuden el suelo como si\nfueran auténticas descargas de rayo."
entei:
  species_id: 244
