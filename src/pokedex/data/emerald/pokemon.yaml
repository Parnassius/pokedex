        jp_kana:
          emerald: "こおりに　おおわれた　うみで　エサを　とる。\nいきつぎを　するときは　あたまの　でっぱりで\nこおりを　わって　うみから　かおを　だす。"
        en:
          emerald: "SEEL hunt for prey in frigid, ice-covered\nseas. When it needs to breathe, it punches\na hole through the ice with the sharply\nprotruding section of its head."
        fr:
          emerald: "OTARIA chasse ses proies dans l’eau gelée,\nsous la couche de glace. Lorsqu’il cherche\nà respirer, il perce un trou en frappant la\nglace avec la partie saillante de sa tête."
        it:
          emerald: "SEEL caccia le prede nel mare gelido sotto\nle lastre di ghiaccio. Per respirare apre un\nforo nel ghiaccio usando la protuberanza\nappuntita sulla sommità del capo."
        de:
          emerald: "JUROB jagt unter der eisigen Oberfläche\ndes Eismeeres nach Beute. Zum Luft holen\nschlägt es mit dem vorstehenden Teil\nseines Kopfes ein Loch ins Eis."
        es:
          emerald: "Busca a sus presas en aguas heladas,\nbajo las capas de hielo. Cuando necesita\nrespirar, abre un agujerito en el hielo con\nla protuberancia que tiene en la cabeza."
dewgong:
  species_id: 87
  names:
    jp_kana: ジュゴン
    en: DEWGONG
    fr: LAMANTINE
    it: DEWGONG
    de: JUGONG
    es: DEWGONG
