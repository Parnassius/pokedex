      descriptions:
        jp_kana:
          emerald: "はがねの　かたさを　もつ　からだは　ちょっとや\nそっとの　こうげきでは　びくとも　しないぞ。\nハネを　はばたかせ　たいおんを　ちょうせつする。"
        en:
          emerald: "A SCIZOR has a body with the hardness of\nsteel. It is not easily fazed by ordinary\nsorts of attacks. It flaps its wings to\nregulate its body temperature."
        fr:
          emerald: "Le corps de CIZAYOX est dur comme de\nl’acier. Les attaques ordinaires ne le\ndéstabilisent pas. Ce POKéMON bat des\nailes pour réguler sa température interne."
        it:
          emerald: "Il corpo di SCIZOR è duro come l’acciaio.\nGli attacchi normali non riescono neanche\na scalfirlo. Sbatte le ali per regolare \nla propria temperatura corporea."
        de:
          emerald: "SCHEROX’ Körper ist hart wie Stahl. Normale\nAngriffe jagen ihm keine Angst ein. Es\nschlägt mit den Flügeln, um seine\nKörpertemperatur zu regulieren."
        es:
          emerald: "SCIZOR tiene un cuerpo duro como el acero\nen el que los ataques comunes apenas\nhacen mella. Este POKéMON bate las alas\npara regular su temperatura corporal."
shuckle:
