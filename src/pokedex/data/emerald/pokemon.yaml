      descriptions:
        jp_kana:
          emerald: "つきあかりを　あびて　せいちょうする　ポケモン。\nひるまは　はっぱだけを　だして　じめんに\nうまっているので　てきから　みつかりにくいのだ。"
        en:
          emerald: "This POKéMON grows by absorbing moonlight.\nDuring the daytime, it buries itself in the\nground, leaving only its leaves exposed to\navoid detection by its enemies."
        fr:
          emerald: "Ce POKéMON grandit en absorbant la\nlumière de la lune. La journée, il s’enfouit\nsous terre pour se cacher et ne laisse\ndépasser que ses feuilles."
        it:
          emerald: "ODDISH cresce assorbendo la luce lunare.\nPer non farsi individuare dai nemici,\ndurante il giorno si nasconde nel terreno\nlasciando fuori solo le foglie."
        de:
          emerald: "Es wächst, indem es Mondlicht absorbiert.\nTagsüber vergräbt es sich und nur sein\nBlatt schaut heraus, um nicht von\nFeinden geortet zu werden."
        es:
          emerald: "Este POKéMON crece absorbiendo luz de\nluna. Durante el día, se entierra en el\nsuelo y sólo deja las hojas fuera. Así\nevita que los enemigos lo detecten."
gloom:
  species_id: 44
  names:
