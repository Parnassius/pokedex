      descriptions:
        jp_kana:
          emerald: "やこうせいで　よるに　かつどうを　はじめる。\nがいとうの　あかりに　さそわれ　あつまった\nちいさな　むしを　このんで　たべる。"
        en:
          emerald: "VENOMOTH are nocturnal--they only are\nactive at night. Their favorite prey are\ninsects that gather around streetlights,\nattracted by the light in the darkness."
        fr:
          emerald: "C’est un POKéMON nocturne, il ne sort donc\nque la nuit. Ses proies préférées sont les\npetits insectes qui se rassemblent autour\ndes réverbères, attirés par la lumière."
        it:
          emerald: "VENOMOTH è un POKéMON attivo soltanto\ndi notte. Come prede, predilige i piccoli\ninsetti che si raggruppano attorno ai\nlampioni attratti dalla luce nel buio."
        de:
          emerald: "OMOT ist ein nachtaktives PKMN. Kleine\nInsekten, die, vom Licht in der Dunkelheit\nangezogen, Straßenlaternen umschwärmen,\nsind seine bevorzugte Beute."
        es:
          emerald: "Es nocturno, sólo actúa en la oscuridad.\nSu alimento preferido son los pequeños\ninsectos que se concentran por\nla noche cerca de los focos de luz."
diglett:
  species_id: 50
