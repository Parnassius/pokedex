      descriptions:
        jp_kana:
          emerald: "たいようエネルギーから　えいようを　つくりだす。\nきおんの　たかい　にっちゅう　かっぱつに　うごき\nたいようが　しずむと　ぱったり　うごかなくなる。"
        en:
          emerald: "SUNFLORA convert solar energy into\nnutrition. They are highly active in the\nwarm daytime but suddenly stop moving as\nsoon as the sun sets."
        fr:
          emerald: "HELIATRONC convertit l’énergie solaire en\nnutriments. Il remue activement pendant la\njournée, quand il fait chaud. Il redevient\nimmobile dès que le soleil se couche."
        it:
          emerald: "SUNFLORA converte l’energia solare in\nnutrimento. È attivo durante il giorno\nquando fa caldo, ma appena il sole\ntramonta non fa più il minimo movimento."
        de:
          emerald: "SONNFLORA verwandelt Solarenergie in\nNährstoffe. Tagsüber, wenn es warm ist,\nist es aktiv. Wenn aber die Sonne unter-\ngegangen ist, hört es auf sich zu bewegen."
        es:
          emerald: "Transforma la energía solar en nutrientes.\nDe día, cuando hace calor, está en\ncontinuo movimiento. Sólo se detiene\ncuando comienza a anochecer."
