      descriptions:
        jp_kana:
          emerald: "みとめた　トレーナーには　きわめて　ちゅうじつ。\nトレーナーを　きけんから　まもる　ために\nよちのうりょくが　はったつしたと　いわれている。"
        en:
          emerald: "An ESPEON is extremely loyal to any\nTRAINER it considers to be worthy. It is\nsaid to have developed precognitive\npowers to protect its TRAINER from harm."
        fr:
          emerald: "MENTALI est extrêmement loyal envers les\nDRESSEURS qu’il respecte. On raconte que\nce POKéMON a développé des talents\ndivinatoires pour protéger son DRESSEUR."
        it:
          emerald: "È leale nei confronti degli ALLENATORI\nche considera alla sua altezza. Si dice\nabbia sviluppato capacità precognitive\nper proteggere il proprio ALLENATORE."
        de:
          emerald: "PSIANA ist jedem TRAINER treu, dem es\nzugetan ist. Es hat die Fähigkeit der\nProphezeiung entwickelt, um seine\nTRAINER vor Unheil zu bewahren."
        es:
          emerald: "Un ESPEON es muy leal al ENTRENADOR que\nconsidera digno. Dicen que desarrolló\nsus poderes adivinatorios para evitar que\nsu ENTRENADOR sufriera ningún daño."
umbreon:
  species_id: 197
  names:
    jp_kana: ブラッキー
    en: UMBREON
    fr: NOCTALI
    it: UMBREON
    de: NACHTARA
    es: UMBREON
