        jp_kana:
          emerald: "めだまを　うごかさずに　３６０ど　みわたせる。\nきゅうブレーキや　ほうこうてんかんが　とくい。\nねらった　えものを　すばやく　おいつめていく。"
        en:
          emerald: "It can see 360 degrees without moving\nits eyes. It is a great flier capable of\nmaking sudden stops and turning midair to\nquickly chase down targeted prey."
        fr:
          emerald: "Il a un champ de vision de 360 degrés sans\navoir besoin de bouger les yeux. Il vole\nincroyablement bien et peut descendre en\npiqué sur ses proies."
        it:
          emerald: "È dotato di un campo visivo a 360 gradi\nsenza muovere gli occhi. Mentre vola si\nferma all’improvviso e vira a mezz’aria,\nriuscendo così a raggiungere la preda."
        de:
          emerald: "YANMA hat einen Blickwinkel von 360 Grad,\nohne die Augen zu bewegen. Es ist ein\ntoller Flieger und geübt darin, im Flug\nanzuhalten oder zu wenden."
        es:
          emerald: "Tiene un ángulo de visión de 360 grados.\nEs capaz de pararse de repente y cambiar\nde dirección mientras vuela, lo que le\nresulta útil para dar caza a sus presas."
wooper:
