          emerald: "ねがいごとを　かなえる　ちからを　もつという。\nねむっている　とき　かたい　けっしょうたいが\nからだを　つつみこみ　てきから　みを　まもる。"
        en:
          emerald: "JIRACHI is said to make wishes come true.\nWhile it sleeps, a tough crystalline shell\nenvelops the body to protect it from\nenemies."
        fr:
          emerald: "Selon la légende, JIRACHI aurait le pouvoir\nd’exaucer les vœux. Quand il dort, il\ns’entoure d’une épaisse enveloppe de\ncristal pour se protéger de ses ennemis."
        it:
          emerald: "Si dice che JIRACHI possa realizzare\nqualsiasi desiderio. Mentre dorme,\nprotegge il suo corpo all’interno di\nun duro guscio cristallino."
        de:
          emerald: "JIRACHI soll Wünsche wahr werden lassen.\nWährend es schläft, beschützt eine\nkristalline Hülle seinen Körper vor\nAngriffen."
        es:
          emerald: "Dicen que JIRACHI hace que se cumplan\nlos deseos. Mientras duerme, una\nresistente capa cristalina lo envuelve\npara protegerlo de los enemigos."
