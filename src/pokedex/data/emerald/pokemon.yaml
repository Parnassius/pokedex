        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          emerald: "ちいさな　からだでも　アゴの　ちからは　つよい。\nワニノコじしんは　あまがみ　している　つもりでも\nおおけがを　してしまう　ほどの　ちからが　ある。"
        en:
          emerald: "Despite its small body, TOTODILE’s jaws\nare very powerful. While it may think it is\njust playfully nipping, its bite has enough\nstrength to cause serious injury."
        fr:
          emerald: "Malgré son tout petit corps, la mâchoire de\nKAIMINUS est très puissante. Il mordille\npour jouer, sans se rendre compte que sa\nmorsure peut gravement blesser quelqu’un."
        it:
          emerald: "Nonostante il suo corpo minuto, le mascelle\ndi TOTODILE sono molto potenti. Sebbene\ncreda di giocare, il suo morso è così forte\ne pericoloso da causare serie ferite."
        de:
          emerald: "KARNIMANI ist zwar sehr klein, aber seine\nKiefer sind sehr stark. Es denkt, dass es\nnur spielerisch knabbert, aber sein Biss\nkann zu schweren Verletzungen führen."
        es:
          emerald: "Tiene un cuerpo pequeño, pero fuertes\nmandíbulas. A veces, piensa que sólo está\ndando un mordisquito de nada y hace\nunas heridas bastante considerables."
croconaw:
  species_id: 159
  names:
    jp_kana: アリゲイツ
    en: CROCONAW
    fr: CROCRODIL
    it: CROCONAW
    de: TYRACROC
    es: CROCONAW
  forms:
    croconaw:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 80
        special_attack: 59
        special_defense: 63
        speed: 58
      evs_yield:
