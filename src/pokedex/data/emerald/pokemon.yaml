        jp_kana:
          emerald: "１びょうかんに　１０ぱつの　キックを　くりだす。\nあいてが　ギブアップするまで　たたかい　つづける\nつよい　とうそうほんのうを　もつ　ポケモンだ。"
        en:
          emerald: "It lashes out with 10 kicks per second.\nIts strong fighting instinct compels it\nto keep up its offensive until the\nopponent gives up."
        fr:
          emerald: "Il peut envoyer jusqu’à 10 coups de pied\nà la seconde. Son esprit de guerrier le\npousse à rester sur l’offensive jusqu’à\nl’abandon de son adversaire."
        it:
          emerald: "COMBUSKEN è in grado di sferrare 10 calci\nal secondo. Il suo spirito di combattente\nlo spinge a persistere nella lotta\nfintanto che il nemico non desiste."
        de:
          emerald: "Es kann bis zu zehn Tritte pro Sekunde\nausteilen. Sein unbändiger Kampfeswille\nveranlasst ihn, weiterzukämpfen, bis\nder Gegner aufgibt."
        es:
          emerald: "Propina hasta diez patadas por segundo.\nTiene un instinto de lucha tan fuerte\nque no deja de pelear hasta que el\nrival se rinde."
blaziken:
  species_id: 257
  names:
    jp_kana: バシャーモ
