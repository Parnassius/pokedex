      descriptions:
        jp_kana:
          emerald: "あたたかく　しっけの　おおい　とちを　このむ。\nなつばは　たいないの　どくそが　さらに　つよまり\nなまごみが　くさったような　においを　だす。"
        en:
          emerald: "It prefers warm and humid habitats.\nIn the summertime, the toxic substances\nin its body intensify, making MUK reek like\nputrid kitchen garbage."
        fr:
          emerald: "Il préfère les habitats chauds et humides.\nEn été, les substances toxiques de son\ncorps se développent et le font\nressembler à un véritable tas d’ordures."
        it:
          emerald: "MUK predilige gli ambienti tiepidi e umidi.\nIn estate emana un fetore di avanzi di\ncucina, poiché il suo organismo aumenta\nla produzione di sostanze tossiche."
        de:
          emerald: "Es liebt warme und feuchte Areale. Im Som-\nmer verdichten sich die giftigen Sub-\nstanzen in SLEIMOKs Körper und es\nentsteht ein ekliger Küchenabfallgestank."
        es:
          emerald: "Prefiere los hábitats cálidos y húmedos.\nEn verano, las sustancias tóxicas\nque contiene se intensifican y hacen\nque apeste como la basura podrida."
shellder:
  species_id: 90
