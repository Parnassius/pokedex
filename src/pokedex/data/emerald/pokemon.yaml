        jp_kana:
          emerald: "まんげつの　よるは　げんき　いっぱいに　あそぶ。\nあけがた　つかれた　ピッピたちは　しずかな\nやまおくで　なかまたちと　よりそって　ねむる。"
        en:
          emerald: "On every night of a full moon, they come\nout to play. When dawn arrives, the tired\nCLEFAIRY go to sleep nestled up against\neach other in deep and quiet mountains."
        fr:
          emerald: "Les nuits de pleine lune, ces POKéMON\nsortent jouer. A l’aube, ils rentrent dans\nleur retraite montagneuse et dorment\nblottis les uns contre les autres."
        it:
          emerald: "Nelle notti di luna piena i CLEFAIRY \nescono in gruppo a giocare. All’alba \ntornano a dormire stretti fra loro nella\nquiete delle loro tane montane."
        de:
          emerald: "In Vollmondnächten sammeln sich einige\ndieser POKéMON, um zu spielen. Wird es Tag,\nkehren sie in die Berge zurück und\nschlafen eingekuschelt neben anderen."
        es:
          emerald: "Cuando hay luna llena, salen en grupo para\njugar. Al amanecer, los CLEFAIRY, agotados,\nregresan a sus refugios de montaña para\ndormir acurrucados unos contra otros."
clefable:
  species_id: 36
  names:
    jp_kana: ピクシー
    en: CLEFABLE
    fr: MELODELFE
    it: CLEFABLE
    de: PIXI
    es: CLEFABLE
