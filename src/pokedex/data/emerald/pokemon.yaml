      descriptions:
        jp_kana:
          emerald: "ぐるぐる　からだを　まいて　やすんでいるのは\nどの　ほうこうから　てきが　おそってきても\nとっさに　あたまを　むけて　いかくできるからだ。"
        en:
          emerald: "An EKANS curls itself up in a spiral while\nit rests. This position allows it to quickly\nrespond to an enemy from any direction\nwith a threat from its upraised head."
        fr:
          emerald: "ABO s’enroule en spirale pour dormir. Sa\ntête reste relevée de telle sorte que\ncette position lui permette de réagir\nrapidement si une menace survenait."
        it:
          emerald: "EKANS si attorciglia a spirale per\nriposarsi. Riesce a reagire alle insidie\nprovenienti da ogni parte grazie alla\ntesta sollevata."
        de:
          emerald: "RETTAN ruht in einer Spirale zusammen-\ngerollt. Aus dieser Haltung kann es schnell\nauf Bedrohungen aus allen Richtungen\nreagieren, indem es seinen Kopf hebt."
        es:
          emerald: "Se enrosca para descansar. Esta posición\nle permite responder rápidamente en caso\nde amenaza, pues le basta erguir la cabeza\ncon ferocidad en cualquier dirección."
arbok:
  species_id: 24
  names:
    jp_kana: アーボック
    en: ARBOK
    fr: ARBOK
    it: ARBOK
    de: ARBOK
    es: ARBOK
