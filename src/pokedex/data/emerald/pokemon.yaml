        en:
          emerald: "DIGLETT are raised in most farms.\nThe reason is simple--wherever they\nburrow, the soil is left perfectly tilled\nfor growing delicious crops."
        fr:
          emerald: "Il est élevé dans la plupart des fermes.\nEn effet, lorsqu’il creuse quelque part, le\nsol est comme labouré. On peut alors y\nplanter de délicieux légumes."
        it:
          emerald: "DIGLETT è allevato in molte aziende\nagricole perché, scavando, lascia il suolo\nperfettamente arato e pronto per la\ncoltivazione di squisite verdure."
        de:
          emerald: "DIGDA wird zumeist auf Farmen gezüchtet.\nDenn wo es auch immer zu graben beginnt,\nhinterlässt es Erde, die für das Pflanzen\nvon Feldfrüchten perfekt geeignet ist."
        es:
          emerald: "En muchas granjas suelen criarlos porque,\ncaven donde caven, dejan la tierra bien\nlabrada para sembrar. El terreno queda\nlisto para plantar ricas verduras."
dugtrio:
  species_id: 51
  names:
    jp_kana: ダグトリオ
    en: DUGTRIO
    fr: TRIOPIKEUR
    it: DUGTRIO
    de: DIGDRI
    es: DUGTRIO
