        - fire
        - flying
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          emerald: "つよい　あいてを　もとめて　そらを　とびまわる。\nなんでも　とかして　しまう　こうねつの　ほのおを\nじぶんより　よわいものに　むけることは　しない。"
        en:
          emerald: "A CHARIZARD flies about in search of\nstrong opponents. It breathes intense\nflames that can melt any material. However,\nit will never torch a weaker foe."
        fr:
          emerald: "Il parcourt les cieux cherchant des adver-\nsaires à sa mesure et crache de puissantes\nflammes capables de tout faire fondre. Il\nn’attaque pas les plus faibles que lui."
        it:
          emerald: "CHARIZARD solca i cieli in cerca di nemici\nmolto forti. Emette intense fiammate che\nfondono ogni cosa, ma non le rivolge mai\ncontro avversari più deboli."
        de:
          emerald: "GLURAK fliegt durch die Lüfte, um starke\nGegner aufzuspüren. Sein heißer Feueratem\nbringt alles zum Schmelzen. Aber es richtet\nihn nie auf schwächere Gegner."
        es:
          emerald: "CHARIZARD va volando en busca de rivales\nfuertes. Echa fuego por la boca y es capaz\nde derretirlo todo. Ahora bien, si su rival\nes más débil que él, no usará este ataque."
squirtle:
  species_id: 7
