      descriptions:
        jp_kana:
          emerald: "ほのおを　あやつり　ひとだまの　ように　とばす。\nしんかする　ちょくぜんに　なると　６ぽんの\nしっぽが　もえたように　ねつを　おびる。"
        en:
          emerald: "It can freely control fire, making fiery\norbs fly like will-o’-the-wisps. Just\nbefore evolution, its six tails grow hot \nas if on fire."
        fr:
          emerald: "Il peut contrôler le feu à sa guise. Juste\navant d’évoluer, ses six queues deviennent\nsi chaudes qu’on les croirait enflammées."
        it:
          emerald: "VULPIX sa gestire il fuoco perfettamente\ne fa fluttuare nell’aria ardenti sfere.\nLe sei code che si surriscaldano sono il\nsegno della sua imminente evoluzione."
        de:
          emerald: "Es beherrscht das Feuer und ist in der\nLage, Feuerbälle wie Irrlichter fliegen zu\nlassen. Kurz vor der Entwicklung brennen\nseine sechs Schweife lichterloh."
        es:
          emerald: "Puede controlar el fuego a su antojo\ny libera llamas por la boca. Tiene seis\ncolas cuya temperatura sube de forma\nradical justo antes de evolucionar."
ninetales:
  species_id: 38
  names:
    jp_kana: キュウコン
    en: NINETALES
    fr: FEUNARD
    it: NINETALES
    de: VULNONA
    es: NINETALES
