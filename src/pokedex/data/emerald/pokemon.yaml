        jp_kana:
          emerald: "のうみそに　じしゃくが　あるので　つちの　なかを\nほり　すすんでいても　ほうこうを　まちがえない。\nとしを　とるほど　からだは　まるみを　おびる。"
        en:
          emerald: "There is a magnet in its brain that\nprevents an ONIX from losing direction\nwhile tunneling. As it grows older, its body\nbecomes steadily rounder and smoother."
        fr:
          emerald: "ONIX a dans le cerveau un aimant qui lui\nsert de boussole. Cela lui permet de ne pas\nse perdre pendant qu’il creuse. En prenant\nde l’âge, son corps s’arrondit et se polit."
        it:
          emerald: "Grazie alla calamita nel cervello, ONIX non\nperde l’orientamento quando scava sotto-\nterra. Col passare del tempo, il suo corpo\ndiventa sempre più smussato e levigato."
        de:
          emerald: "ONIX hat einen Magneten in seinem Gehirn.\nEr dient als Kompass, so dass es beim Gra-\nben nicht die Orientierung verliert. Wird es\nälter, wird sein Körper runder und glatter."
        es:
          emerald: "Tiene un imán en el cerebro que le sirve\nde brújula para no perder la orientación\ncuando está cavando túneles. A medida que\ncrece, se le redondea y suaviza el cuerpo."
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    en: DROWZEE
