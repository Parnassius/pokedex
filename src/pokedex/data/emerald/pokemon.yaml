        en:
          emerald: "In seasons when it produces more pollen,\nthe air around a VILEPLUME turns yellow\nwith the powder as it walks. The pollen is\nhighly toxic and causes paralysis."
        fr:
          emerald: "Les saisons où il produit le plus de pollen,\nun nuage jaune se forme autour de\nlui lorsqu’il marche. Ce pollen est\nhautement toxique et cause la paralysie."
        it:
          emerald: "Nelle stagioni di maggior produzione di\npolline, quando VILEPLUME cammina,\nl’aria si colora di giallo. Questo polline\nè altamente tossico e causa paralisi."
        de:
          emerald: "In Jahreszeiten, in denen es mehr Blüten-\nstaub produziert, ist beim Laufen die\nLuft um es herum gelb vor Puder. Der Puder\nist hochgiftig und verursacht Paralyse."
        es:
          emerald: "En las estaciones en las que produce más\npolen, VILEPLUME tiñe de amarillo el aire\nal caminar. El polen es altamente tóxico\ny provoca parálisis."
paras:
  species_id: 46
