        en:
          emerald: "It has sound-generating organs all over\nits body. It communicates with others by\nadjusting the tone and volume of the cries\nit emits."
        fr:
          emerald: "Sur tout le corps, il possède des organes\npouvant générer du son. Il communique\nen ajustant la tonalité et le volume des\ncris qu’il émet."
        it:
          emerald: "Il corpo di EXPLOUD è dotato di organi in\ngrado di emettere suoni. Comunica con gli\naltri grazie alle variazioni di tonalità e\nvolume delle urla che produce."
        de:
          emerald: "Sein Körper ist angefüllt mit geräusch-\nproduzierenden Organen. Es kommuniziert\nmit Artgenossen, indem es die Tonlage\nund Lautstärke seiner Schreie ändert."
        es:
          emerald: "Tiene órganos que generan sonido por\ntodo el cuerpo. Se comunica con otros\najustando el tono y el volumen de los\ngritos que emite."
makuhita:
  species_id: 296
  names:
