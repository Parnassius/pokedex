        jp_kana:
          emerald: "すこしずつ　てつの　ツノは　ながく　なるので\nながさで　ボスゴドラの　ねんれいが　わかる。\nよろいの　キズは　たたかいの　くんしょうだ。"
        en:
          emerald: "Its iron horns grow longer a little at\na time. They are used to determine the\nAGGRON’s age. The gouges in its armor are\nworn with pride as mementos from battles."
        fr:
          emerald: "Sa corne de fer grandit doucement au fil\ndu temps et peut servir à deviner son âge.\nIl conserve fièrement les marques sur son\narmure comme souvenir de ses combats."
        it:
          emerald: "Osservando le corna, che crescono poco\nalla volta, è possibile determinare l’età di\nAGGRON. Va fiero dei graffi sull’armatura\nche considera come dei trofei di lotta."
        de:
          emerald: "Seine Stahlhörner werden ständig ein wenig\nlänger. Daran kann man sein Alter ablesen.\nDie Kratzer und Abschürfungen in seinem\nPanzer sind stolze Andenken an Kämpfe."
        es:
          emerald: "Los cuernos de hierro que tiene le crecen\npoco a poco. Sirven para determinar la edad\nque tiene. Luce los desperfectos de su\ncoraza en recuerdo de sus combates."
meditite:
  species_id: 307
