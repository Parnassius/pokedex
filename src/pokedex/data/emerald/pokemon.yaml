      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          emerald: "くびの　まわりの　くるりと　まいた　はっぱの\nなかには　ちいさな　きのめが　１こ　なっている。\nその　かおりは　ひとを　げんきに　させるぞ。"
        en:
          emerald: "A BAYLEEF’s neck is ringed by curled-up\nleaves. Inside each leaf is a small tree\nshoot. The fragrance of this shoot\nmakes people peppy."
        fr:
          emerald: "Son cou est entouré de nombreuses\nfeuilles. Dans chacune d’elles se trouve\nune pousse d’arbre dont le parfum donne\nla pêche aux personnes qui le sentent."
        it:
          emerald: "Il collo di BAYLEEF è agghindato da\nfoglie dentro cui si trova il germoglio\ndi un albero. Questo germoglio emana\nun aroma dall’effetto energizzante."
        de:
          emerald: "LORBLATTs Nacken ist mit zusammengeroll-\nten Blättern behangen. In jedem Blatt be-\nfindet sich ein kleiner Trieb eines Baumes.\nDie Triebe bringen Menschen auf Trab."
        es:
          emerald: "Tiene un collar de hojas alrededor del\ncuello y un brote de un árbol en cada\nuna de ellas. La fragancia que desprenden\nestos brotes anima a la gente."
meganium:
  species_id: 154
  names:
    jp_kana: メガニウム
    en: MEGANIUM
    fr: MEGANIUM
    it: MEGANIUM
    de: MEGANIE
    es: MEGANIUM
