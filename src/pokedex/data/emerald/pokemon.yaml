      descriptions:
        jp_kana:
          emerald: "たのしい　おんがくを　きくと　からだじゅうの\nさいぼうが　うずき　リズムを　とりはじめるぞ。\nきょうてきを　あいてにしても　ひるまない。"
        en:
          emerald: "When it hears festive music, all the cells\nin its body become stimulated, and it\nbegins moving in rhythm. It does not\nquail even when it faces a tough opponent."
        fr:
          emerald: "Quand il entend de la musique festive, tout\nson corps réagit et il se met à danser en\nrythme. Il ne tremble jamais, même pas\ndevant un adversaire redoutable."
        it:
          emerald: "Se sente una musica festosa, LUDICOLO\ncomincia a muoversi a ritmo perché le sue\ncellule vengono sollecitate. Non ha paura\nneppure di fronte ai nemici più potenti."
        de:
          emerald: "Vernimmt es festliche Musik, möchten sich\nalle Zellen in seinem Körper zu diesem\nRhythmus bewegen. Es gibt sich selbst ei-\nnem übermächtigen Feind nicht geschlagen."
        es:
          emerald: "Cuando oye música festiva, las células\nse le revolucionan y comienza a bailar\ncon mucho ritmo. No se acobarda\nni delante del enemigo más fuerte."
seedot:
  species_id: 273
  names:
    jp_kana: タネボー
