        en:
          emerald: "A BALTOY moves by spinning on its single\nfoot. It has been depicted in murals \nadorning the walls of a once-bustling city\nin an ancient age."
        fr:
          emerald: "BALBUTO se déplace en tournant sur son\nunique pied. On a découvert des dessins\nle représentant dans les vestiges d’une\nville des temps anciens."
        it:
          emerald: "BALTOY si muove piroettando sulla\nsua unica estremità inferiore. Sono stati\nscoperti dipinti che raffigurano la sua\nvita in popolose città dell’antichità."
        de:
          emerald: "PUPPANCE dreht sich auf seinem Fuß. Es\nwurde bereits in Wandmalereien einer einst\ngeschäftigen Stadt der Antike abgebildet."
        es:
          emerald: "Los BALTOY se mueven haciendo girar\nsu única extremidad inferior. Aparecen\nrepresentados en las pinturas murales\nde las ruinas de una antigua ciudad."
claydol:
