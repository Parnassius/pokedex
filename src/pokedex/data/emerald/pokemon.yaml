      egg_groups:
        - field
      abilities:
        - limber
      descriptions:
        jp_kana:
          emerald: "たくましい　６ぽんの　ヒゲは　くうきの　うごきで\nまわりの　ようすを　キャッチする　やくわり。\nヒゲを　つかまれると　おとなしくなって　しまう。"
        en:
          emerald: "A PERSIAN’s six bold whiskers sense air\nmovements to determine what is in its\nvicinity. It becomes docile if grabbed\nby the whiskers."
        fr:
          emerald: "Ses six grosses vibrisses lui permettent\nde sentir les mouvements de l’air pour\nsavoir ce qui se trouve à proximité. Il est\ndocile si on l’attrape par les moustaches."
        it:
          emerald: "PERSIAN è dotato di sei baffetti furbi\nche captano ogni movimento dell’aria\nriconoscendo presenze vicine. Se\nafferrato per i baffi, diventa docile."
        de:
          emerald: "SNOBILIKAT hat sechs dicke Schnurrhaare,\nwomit es Bewegungen in seiner Nähe\nbemerkt. Es wird sehr zutraulich, wenn\nman es an den Schnurrhaaren berührt."
        es:
          emerald: "Tiene seis llamativos bigotes que le dan un\naspecto feroz y le sirven para detectar\ncualquier amenaza. Si se le agarra por los\nbigotes, se vuelve dócil."
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    en: PSYDUCK
    fr: PSYKOKWAK
    it: PSYDUCK
    de: ENTON
    es: PSYDUCK
  forms:
