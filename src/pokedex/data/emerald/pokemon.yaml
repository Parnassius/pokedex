        en:
          emerald: "A TYRANITAR is so overwhelmingly powerful,\nit can bring down a whole mountain to make\nits nest. It roams in mountains seeking\nnew opponents to fight."
        fr:
          emerald: "TYRANOCIF est si puissant qu’il peut\nabattre une montagne pour y faire son nid.\nIl se promène dans les montagnes pour y\ntrouver de nouveaux adversaires."
        it:
          emerald: "TYRANITAR ha una potenza tale da\nabbattere anche un’intera montagna per\ncrearsi la tana. Vaga tra i monti alla\nricerca di nuovi avversari con cui lottare."
        de:
          emerald: "DESPOTAR ist erstaunlich stark. Es kann\neinen ganzen Berg vernichten, um sein Nest\nzu bauen. Es wandert in den Bergen umher\nund sucht nach Gegnern für einen Kampf."
        es:
          emerald: "Tiene una fuerza imponente: puede derribar\nuna montaña para hacer su nido. Suele\nmerodear por zonas montañosas en busca\nde nuevos rivales contra los que luchar."
lugia:
  species_id: 249
  names:
    jp_kana: ルギア
