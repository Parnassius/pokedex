      descriptions:
        jp_kana:
          emerald: "せかいの　ふしぎを　かいめい　するため　まいにち\nけんきゅう　しているが　あたまの　シェルダーが\nはずれると　ぜんぶ　わすれてしまう　らしい。"
        en:
          emerald: "It undertakes research every day to\nsolve the mysteries of the world.\nHowever, it apparently forgets everything\nif the SHELLDER on its head comes off."
        fr:
          emerald: "Tous les jours, ROIGADA entreprend des\nrecherches pour résoudre les mystères du\nmonde. Cependant, il oublie tout si le\nKOKIYAS qui se trouve sur sa tête s’en va."
        it:
          emerald: "Ogni giorno SLOWKING cerca di comprendere\ne svelare i misteri del mondo. Tuttavia, se\nperde lo SHELLDER che ha sul capo, pare\nche dimentichi tutto ciò che ha imparato."
        de:
          emerald: "LASCHOKING betreibt jeden Tag Forschung,\num die Geheimnisse der Welt zu lüften. Es\nvergisst alles, was es bereits weiß, wenn\ndas MUSCHAS auf seinem Kopf abfällt."
        es:
          emerald: "SLOWKING investiga cada día los misterios\ndel mundo que aún no se han resuelto, pero\nal parecer se le olvida lo aprendido cuando\nel SHELLDER que lleva encima se suelta."
