        jp_kana:
          emerald: "はなを　じめんに　こすりつけ　あっち　こっちに\nいったり　きたり　いつも　なにかを　さがしてる。\nジグザグ　すすむ　あしあとが　とくちょうだ。"
        en:
          emerald: "Rubbing its nose against the ground, it\nalways wanders about back and forth in\nsearch of something. It is distinguished\nby the zigzag footprints it leaves."
        fr:
          emerald: "Il erre toujours de droite à gauche le nez\nplanté dans le sol à la recherche de\nquelque chose. Il laisse des empreintes\nen zigzag très caractéristiques."
        it:
          emerald: "ZIGZAGOON si muove di continuo a destra e\na manca strofinando il muso sul terreno\nalla ricerca di qualcosa. Si distingue per\nle tracce a zig zag che lascia."
        de:
          emerald: "ZIGZACHS sucht ständig mit der Nase auf\ndem Boden nach etwas. Man erkennt es an\nden Fußspuren, die es im Zickzackmuster\nhinterlässt."
        es:
          emerald: "Siempre se mueve hacia adelante y hacia\natrás frotando la nariz contra el suelo\nen busca de algo. Es fácil identificarlo\npor las huellas en zigzag que deja."
linoone:
  species_id: 264
  names:
    jp_kana: マッスグマ
