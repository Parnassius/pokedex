        jp_kana:
          emerald: "つよい　ひかりを　だす　まるい　ぶぶんは\nせびれの　いちぶが　へんかして　できたもの。\nしんかいの　やみを　てらす　ポケモン。"
        en:
          emerald: "The light-emitting orbs on its back are\nvery bright. They are formed from a part of\nits dorsal fin. This POKéMON illuminates\nthe inky darkness of deep seas."
        fr:
          emerald: "Les globes de son dos sont très lumineux.\nIls sont composés d’une partie de sa\nnageoire dorsale et éclairent la pénombre\ndes fonds marins."
        it:
          emerald: "Le sfere luminose sulle antenne di\nLANTURN emettono una luce molto intensa\nche illumina gli oscuri abissi del mare. Le\nantenne sono in realtà una pinna evoluta."
        de:
          emerald: "Seine Leuchten sind sehr stark. Sie\nwurden aus Teilen seiner Rückenflosse\ngebildet. LANTURN erhellt die finstersten\nMeeresgründe."
        es:
          emerald: "Las esferas brillantes que tiene en la\ncabeza emiten luz y se forman a partir de\nsu aleta dorsal. Este POKéMON logra\niluminar las profundidades abisales."
pichu:
  species_id: 172
  names:
    jp_kana: ピチュー
