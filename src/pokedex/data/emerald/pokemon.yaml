        jp_kana:
          emerald: "ほそい　くちで　えものの　たいえきを　すする。\nうすい　ピンクいろの　からだは　エサを\nたべおえると　さらに　あざやかに　いろづく。"
        en:
          emerald: "A GOREBYSS siphons the body fluids of prey\nthrough its thin, tubular mouth. Its light\npink body color turns vivid when it\nfinishes feeding."
        fr:
          emerald: "ROSABYSS aspire les fluides corporels\nde ses ennemis à l’aide de sa bouche très\nfine. Le rose clair de sa peau devient très\nvif quand il a fini de manger."
        it:
          emerald: "GOREBYSS assorbe i liquidi della preda\ncon il suo muso appuntito. Il rosa pallido\ndel suo corpo diventa vivido quando il\nPOKéMON termina il pasto."
        de:
          emerald: "SAGANABYSS filtert die Körperflüssigkeit\nseiner Beute in seinem dünnen, schlauch-\nartigen Mund. Seine hellpinke Körperfarbe\nintensiviert sich nach dem Mahl."
        es:
          emerald: "GOREBYSS absorbe los fluidos corporales\nde su presa a través de la boca, que es\nfina y tubular. Cuando acaba de comer,\nse le acentúa el tono rosado."
relicanth:
  species_id: 369
