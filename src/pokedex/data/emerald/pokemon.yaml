        jp_kana:
          emerald: "つぼみを　ささえるため　あしこしが　つよくなる。\nひなたで　じっとする　じかんが　ながくなれば\nいよいよ　たいりんの　はなが　さくころだ。"
        en:
          emerald: "To support its bulb, IVYSAUR’s legs\ngrow sturdy. If it spends more time lying in\nthe sunlight, the bud will soon bloom into\na large flower."
        fr:
          emerald: "HERBIZARRE a les pattes musclées afin de\nsupporter le poids du bourgeon qu’il a sur\nle dos. S’il se prélasse au soleil, son\nbourgeon va donner naissance à une fleur."
        it:
          emerald: "Per sopportare il peso del germoglio che ha\nsulla schiena, le zampe di IVYSAUR cresco-\nno robuste. Se passa più tempo al sole,\nil germoglio sboccerà in un grande fiore."
        de:
          emerald: "Die Beine von BISAKNOSP sind kräftig im\nWuchs, da sie die Knospe tragen müssen.\nWenn es lange in der Sonne liegt, beginnt\ndie Knospe bald zu blühen."
        es:
          emerald: "Soporta el peso del bulbo gracias\na sus fuertes patas y a su tronco.\nSi pasa mucho tiempo al sol, el bulbo\nse convierte en una enorme flor."
venusaur:
