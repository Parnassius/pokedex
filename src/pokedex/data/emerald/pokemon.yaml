      abilities:
        - truant
      descriptions:
        jp_kana:
          emerald: "１にちの　うち　ほとんどの　じかん　ねている。\nいっしょう　すみかを　かえないが　たまに\nかわを　およいで　ながい　きょりを　いどうする。"
        en:
          emerald: "It sleeps virtually all day and night long.\nIt doesn’t change its nest its entire life,\nbut it sometimes travels great distances\nby swimming in rivers."
        fr:
          emerald: "Il passe tout son temps à dormir, de jour\ncomme de nuit. Il garde le même nid toute\nsa vie mais voyage de temps en temps sur\nde grandes distances en nageant."
        it:
          emerald: "SLAKOTH sonnecchia tutto il giorno e \ntutta la notte. La sua tana è la stessa per\ntutta la vita. Talvolta, però, si avventura\nin lunghe nuotate che lo portano lontano."
        de:
          emerald: "Es schläft den ganzen Tag und die ganze\nNacht. Auch baut es in seinem ganzen\nLeben nur ein Nest. Manchmal legt es aller-\ndings große Strecken in Flüssen zurück."
        es:
          emerald: "Duerme prácticamente día y noche.\nNunca cambia de madriguera, aunque\na veces suele recorrer grandes distancias\nnadando en las aguas de los ríos."
vigoroth:
  species_id: 288
  names:
    jp_kana: ヤルキモノ
    en: VIGOROTH
    fr: VIGOROTH
    it: VIGOROTH
    de: MUNTIER
    es: VIGOROTH
