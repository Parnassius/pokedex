      descriptions:
        jp_kana:
          emerald: "きの　えだに　ぶらさがり　えものを　まっている。\nきを　ゆらされて　しょくじの　じゃまを　されると\nじめんに　おちてから　いきなり　ばくはつするぞ。"
        en:
          emerald: "A PINECO hangs from a tree branch and\nwaits for prey. While eating, if it is\ndisturbed by someone shaking its tree, it\nfalls on the ground and suddenly explodes."
        fr:
          emerald: "POMDEPIK s’accroche à une branche d’arbre\net attend patiemment que sa proie passe.\nSi quelqu’un secoue son arbre pendant qu’il\nmange, il tombe au sol et explose."
        it:
          emerald: "PINECO attende la preda appeso ad un\nalbero. Se mentre mangia l’albero viene\nscosso, il POKéMON cade a terra\nesplodendo senza preavviso."
        de:
          emerald: "TANNZA hängt an Ästen und wartet auf\nBeute. Schüttelt man es bei einer\nMahlzeit vom Baum, explodiert es ohne\nVorwarnung."
        es:
          emerald: "Permanece colgado de la rama de un árbol\nesperando a su presa. Si alguien sacude el\nárbol en el que está comiendo y le molesta,\nse tira al suelo y explota sin más."
forretress:
  species_id: 205
