        en:
          emerald: "At night, a WEEPINBELL hangs on to a tree\nbranch with its hooked rear and sleeps.\nIf it moves around in its sleep, it may\nwake up to find itself on the ground."
        fr:
          emerald: "Ce POKéMON est doté d’un gros crochet.\nLa nuit, il s’accroche à une branche pour\ns’endormir. Quand il a un sommeil agité,\nil se réveille par terre."
        it:
          emerald: "WEEPINBELL è dotato di un grande uncino\nposteriore con cui di notte si appende\nad un ramo. Talvolta, agitandosi nel\nsonno, si sveglia al suolo."
        de:
          emerald: "Nachts hängt sich ULTRIGARIA zum\nSchlafen an einen Ast. Wenn es sich im\nSchlaf bewegt, kann es passieren, dass\nes auf dem Boden wieder aufwacht."
        es:
          emerald: "Tiene un gancho a modo de extremidad\nsuperior trasera que usa por la noche para\ncolgarse de una rama y dormir. Si se mueve\nmientras duerme, puede acabar en el suelo."
victreebel:
