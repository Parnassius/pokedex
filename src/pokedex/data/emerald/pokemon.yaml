        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      descriptions:
        jp_kana:
          emerald: "キングラーは　きょだいな　ハサミを　ふって\nなかまどうしで　あいずを　おくりあっているが\nハサミが　おもすぎて　すぐに　つかれてしまう。"
        en:
          emerald: "It waves its huge, oversized claw in the\nair to communicate with others.\nBut since the claw is so heavy, this\nPOKéMON quickly tires."
        fr:
          emerald: "Il est doté d’une pince gigantesque,\nsurdimensionnée. Il l’agite en l’air pour\ncommuniquer avec ses semblables. Sa\npince est si lourde qu’il se fatigue vite."
        it:
          emerald: "KINGLER è dotato di un’enorme chela,\nche brandisce per comunicare con i suoi\nsimili. Tuttavia, dato il peso della chela,\nil POKéMON si stanca in fretta."
        de:
          emerald: "KINGLER hat eine riesige Schere. Es winkt\ndamit, um mit anderen zu kommunizieren.\nDa seine Schere aber so schwer ist, wird\ndieses POKéMON schnell müde."
        es:
          emerald: "Tiene una pinza enorme y descomunal\nque agita en el aire para comunicarse con\nlos demás. Lo malo es que pesa tanto\nque se cansa enseguida."
voltorb:
  species_id: 100
  names:
    jp_kana: ビリリダマ
    en: VOLTORB
    fr: VOLTORBE
    it: VOLTORB
    de: VOLTOBAL
