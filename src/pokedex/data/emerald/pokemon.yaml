        jp_kana:
          emerald: "うみべの　だんがいぜっぺきに　すを　つくる。\nながい　じかん　はばたく　ことは　にがて。\nじょうしょうきりゅうを　りようして　とぶ。"
        en:
          emerald: "It makes its nest on a sheer cliff at the\nedge of the sea. It has trouble keeping\nits wings flapping in flight. Instead, it\nsoars on updrafts."
        fr:
          emerald: "GOELISE fait son nid sur la paroi des\nfalaises au bord de la mer. Ayant des\ndifficultés pour battre des ailes, il aime\nprofiter des courants ascendants."
        it:
          emerald: "WINGULL nidifica su scogliere a picco sul\nmare. Poiché non riesce a sbattere le ali\nmolto a lungo, si fa trasportare dalle\ncorrenti ascensionali sul mare."
        de:
          emerald: "WINGULL baut sein Nest an kahlen Klippen\nnahe des Meers. Es fällt ihm nicht leicht,\nbeim Fliegen mit den Flügeln zu schlagen,\ndaher nutzt es Aufwinde."
        es:
          emerald: "Hace su nido en acantilados escarpados, a\nla orilla del mar. Como le cuesta batir las\nalas durante mucho tiempo, se deja llevar\npor las corrientes de aire ascendentes."
pelipper:
  species_id: 279
  names:
    jp_kana: ペリッパー
