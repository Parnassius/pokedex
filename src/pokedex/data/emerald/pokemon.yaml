        - shell_armor
      descriptions:
        jp_kana:
          emerald: "すなはまに　あなを　ほり　そこで　くらしている。\nエサの　すくない　すなはまでは　ばしょとりをする\nクラブたちの　あらそいを　みる　ことが　できる。"
        en:
          emerald: "KRABBY live in holes dug into beaches.\nOn sandy shores with little in the way\nof food, they can be seen squabbling with\neach other over territory."
        fr:
          emerald: "KRABBY vit sur les plages, enterré dans le\nsable. Sur les plages où l’on trouve peu de\nnourriture, on peut voir ces POKéMON se\ndisputer pour défendre leur territoire."
        it:
          emerald: "KRABBY vive in buche scavate nella sabbia.\nSulle spiagge dove il cibo scarseggia, \nquesto POKéMON difende il proprio\nterritorio attaccando i suoi simili."
        de:
          emerald: "KRABBY lebt an Stränden, in Löchern im \nSand. An Sandstränden, an denen es wenig\nNahrung findet, sieht man es mit\nArtgenossen um sein Revier streiten."
        es:
          emerald: "Viven en la playa, enterrados en la arena\nfina. Cuando escasea la comida, es común\nverlos enfrentados panza contra\npanza en defensa de su territorio."
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
    en: KINGLER
    fr: KRABBOSS
    it: KINGLER
    de: KINGLER
    es: KINGLER
  forms:
    kingler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 130
        defense: 115
        special_attack: 50
        special_defense: 50
        speed: 75
      evs_yield:
        hp: 0
