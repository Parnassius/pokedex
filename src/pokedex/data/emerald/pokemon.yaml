        jp_kana:
          emerald: "なぜか　モンスターボールに　すがたが　にている。\nすこしの　しげきで　だいばくはつ　してしまうため\nベテラン　トレーナーも　あつかいは　しんちょう。"
        en:
          emerald: "It bears an uncanny and unexplained\nresemblance to a POKé BALL. Because it\nexplodes at the slightest shock, even\nveteran TRAINERS treat it with caution."
        fr:
          emerald: "Nul ne sait d’où vient sa ressemblance\navec une POKé BALL. Comme il\nexplose au moindre choc, les DRESSEURS\nle manipulent avec précaution."
        it:
          emerald: "VOLTORB assomiglia inspiegabilmente a una\nPOKé BALL. Poiché esplode alla minima\nsollecitazione, anche gli ALLENATORI più\nesperti lo trattano con estrema cautela."
        de:
          emerald: "Es ähnelt einem POKéBALL sehr. Da es bei\nder geringsten Berührung explodiert,\ngehen sogar erfahrene TRAINER sehr\nvorsichtig mit ihm um."
        es:
          emerald: "Tiene un curioso e inexplicable parecido\ncon una POKé BALL. Como estalla a\nla mínima, hasta los ENTRENADORES\nveteranos lo tratan con mucho cuidado."
electrode:
  species_id: 101
