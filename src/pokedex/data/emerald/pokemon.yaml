      descriptions:
        jp_kana:
          emerald: "じょうぶな　キバは　どんどん　のびるので\nいわや　たいぼくを　かじって　けずっている。\nいえの　カベを　かじられる　ことも　あるよ。"
        en:
          emerald: "A RATICATE’s sturdy fangs grow steadily.\nTo keep them ground down, it gnaws on\nrocks and logs. It may even chew on the\nwalls of houses."
        fr:
          emerald: "Les crocs robustes de RATTATAC\npoussent constamment. Il se fait donc\nles dents sur des cailloux, des troncs\nd’arbre, voire des murs de maison."
        it:
          emerald: "Le potenti zanne di RATICATE crescono\ndi continuo. Per ridurne la crescita, rode\nrocce e tronchi. Le sue impronte si\nvedono spesso anche sui muri delle case."
        de:
          emerald: "RATTIKARLs kräftige Zähne wachsen\nständig. Deshalb nagt es unablässig Steine\nund Baumstämme an, um sie abzuwetzen.\nManchmal knabbert es sogar Hauswände an."
        es:
          emerald: "A RATICATE le crecen unos colmillos\nfirmes y fuertes. Para mantenerlos\nafilados, roe rocas, troncos e\nincluso las paredes de las casas."
spearow:
  species_id: 21
  names:
    jp_kana: オニスズメ
