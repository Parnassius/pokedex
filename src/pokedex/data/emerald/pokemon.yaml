      abilities:
        - blaze
      descriptions:
        jp_kana:
          emerald: "せなかから　ほのおを　ふきあげて　みを　まもる。\nおこった　ときの　ほのおは　いきおいが　いいが\nつかれている　ときは　ふかんぜんねんしょうする。"
        en:
          emerald: "It flares flames from its back to protect\nitself. The fire burns vigorously if the\nPOKéMON is angry. When it is tired,\nit sputters with incomplete combustion."
        fr:
          emerald: "Il se protège en faisant jaillir des\nflammes de son dos. S’il est en colère, elles\nsont violentes. S’il est fatigué, quelques\nflammèches vacillent laborieusement."
        it:
          emerald: "CYNDAQUIL si protegge grazie alle fiamme\nche ardono sul dorso: esse divampano impe-\ntuose se è adirato e diventano fiammelle\ndalla combustione incompleta se è stanco."
        de:
          emerald: "FEURIGEL lässt Flammen aus seinem Rücken\nlodern, um sich zu schützen. Sie sind sehr\ngroß, wenn es wütend ist, aber klein, wenn\nes müde und erschöpft ist."
        es:
          emerald: "Se protege con el fuego que le arde en\nel lomo. Si está enfadado, las llamas son\nfieras, pero, si está cansado, sólo suelta\nchispas que no llegan a inflamarse."
quilava:
  species_id: 156
  names:
    jp_kana: マグマラシ
    en: QUILAVA
    fr: FEURISSON
    it: QUILAVA
    de: IGELAVAR
    es: QUILAVA
  forms:
