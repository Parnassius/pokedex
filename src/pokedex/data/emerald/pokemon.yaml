        jp_kana:
          emerald: "どくガスを　とくしゅな　ほうほうで　うすめると\nさいこうきゅうの　こうすいが　できあがる。\nゴミから　でる　ガスが　さいこうの　ごちそう。"
        en:
          emerald: "By diluting its toxic gases with a special\nprocess, the highest grade of perfume can\nbe extracted. To WEEZING, gases emanating\nfrom garbage are the ultimate feast."
        fr:
          emerald: "Une technique spéciale diluant ses gaz\ntoxiques permet d’obtenir un parfum\nformidable. Mais pour SMOGOGO,\nrien ne vaut l’odeur d’une bonne décharge."
        it:
          emerald: "Per WEEZING, i gas emanati dai rifiuti sono\nun’esperienza sopraffina. Tuttavia, dilu-\nendo i gas che genera con un processo\nparticolare, si ottiene un ottimo profumo."
        de:
          emerald: "Die Veredelung seiner Giftgase in einem\nSpezialverfahren dient der Parfümher-\nstellung. SMOGMOG liebt die Dämpfe, die\neinem verrottenden Müllberg entweichen."
        es:
          emerald: "Al diluir sus gases tóxicos mediante un\nproceso especial, se extrae un perfume\ndelicioso. Para WEEZING, los gases que\nemana la basura son una exquisitez."
rhyhorn:
  species_id: 111
  names:
    jp_kana: サイホーン
