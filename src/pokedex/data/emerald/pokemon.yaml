      descriptions:
        jp_kana:
          emerald: "あしの　つけねから　だす　えきたいの　においで\nなかまと　コミュニケーションを　とっている。\nにおいの　ちがいで　きもちを　つたえるという。"
        en:
          emerald: "LEDYBA communicate using a fluid that\nthey secrete from where the legs join the\nbody. They are said to convey feelings to\nothers by altering the fluid’s scent."
        fr:
          emerald: "Les articulations des pattes de COXY\nsécrètent un fluide lui permettant de\ncommuniquer. Il exprime ses sentiments\nen modifiant l’odeur de ce fluide."
        it:
          emerald: "Dalla giuntura delle zampe col corpo\nLEDYBA secerne un fluido aromatico\ncon cui comunica le sue sensazioni\nai suoi simili alterandone l’odore."
        de:
          emerald: "LEDYBA sondert eine duftende Flüssigkeit\nab. Darüber kommuniziert es mit anderen.\nEs übermittelt seine Gefühle, indem es die\nDuftnote des Sekrets verändert."
        es:
          emerald: "Segrega un fluido por los seis puntos de\nunión que tiene entre patas y cuerpo.\nAl variar la esencia de éste, consigue\nexpresar abiertamente su estado de ánimo."
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
    en: LEDIAN
    fr: COXYCLAQUE
    it: LEDIAN
    de: LEDIAN
    es: LEDIAN
