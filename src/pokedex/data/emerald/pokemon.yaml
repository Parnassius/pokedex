        jp_kana:
          emerald: "くうきとの　まさつで　でんきを　つくりだす。\nとくに　くうきの　かんそうした　きせつは\nぜんしんから　ひばなを　はげしく　ちらしている。"
        en:
          emerald: "It generates electricity using friction\nfrom the atmosphere. In seasons with\nespecially arid air, its entire body blazes\nwith violent showers of sparks."
        fr:
          emerald: "Il génère de l’électricité en utilisant la\nfriction de l’air. Les saisons\nparticulièrement sèches, son corps entier\ncrée de violentes gerbes d’étincelles."
        it:
          emerald: "ELECTRIKE genera elettricità grazie all’\nattrito con l’atmosfera circostante. Nella\nstagione secca, lo si vede scintillare a\ncausa delle violente scariche elettriche."
        de:
          emerald: "Aus der Reibung der Atmosphäre generiert\nes Elektrizität. Wenn die Luft besonders\ntrocken ist, glüht sein ganzer Körper vor\nelektrischen Funken."
        es:
          emerald: "Genera electricidad usando la fricción\nde la atmósfera. En estaciones de vientos\náridos, su cuerpo se inflama y lanza\nchispas de forma violenta."
manectric:
  species_id: 310
  names:
    jp_kana: ライボルト
