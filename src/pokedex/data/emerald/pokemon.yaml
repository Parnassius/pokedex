      descriptions:
        jp_kana:
          emerald: "みみを　うごかす　きんにくが　はったつしていて\nどんな　むきにも　じざいに　みみを　うごかせる。\nかすかな　ものおとも　ききもらさない　ポケモン。"
        en:
          emerald: "The male NIDORAN has developed muscles\nthat freely move its ears in any direction.\nEven the slightest sound does not escape\nthis POKéMON’s notice."
        fr:
          emerald: "Le NIDORAN mâle a développé des muscles\npour bouger ses oreilles. Ainsi, il peut les\norienter à sa guise. Ce POKéMON peut\nentendre le plus discret des bruits."
        it:
          emerald: "NIDORAN maschio ha sviluppato dei muscoli\nper muovere le orecchie in qualsiasi\ndirezione. In questo modo, riesce\na percepire anche il più flebile fruscio."
        de:
          emerald: "Das männliche NIDORAN hat Muskeln ent-\nwickelt, um seine Ohren bewegen zu kön-\nnen. Diesem POKéMON entgeht nicht\neinmal das leiseste Geräusch."
        es:
          emerald: "El NIDORAN macho ha desarrollado músculos\npara mover las orejas y orientarlas en\ncualquier dirección. De este modo, es capaz\nde captar hasta el sonido más leve."
nidorino:
  species_id: 33
  names:
