        jp_kana:
          emerald: "あたまの　まるい　スピーカーを　うごかして\nおおごえの　ちょうおんぱを　てきに　ぶつける。\nあしを　ふみならして　パワーを　ためるぞ。"
        en:
          emerald: "It positions the round speakers on its\nhead to assail foes with ultrasonic waves\nat massive volume. It builds power by\nstomping the ground."
        fr:
          emerald: "Il utilise les haut-parleurs sur sa tête\npour attaquer ses adversaires à coup\nd’ondes ultrasoniques. Il concentre sa\nforce en piétinant le sol."
        it:
          emerald: "LOUDRED aggredisce il nemico emettendo\nonde ultrasoniche assordanti dalle sue\norecchie-altoparlanti. Pesta i piedi a\nterra per accumulare energia."
        de:
          emerald: "Es richtet die runden Lautsprecher auf\nseinem Kopf so aus, dass es Gegner mit\nUltraschallwellen in großer Lautstärke\nangreifen kann. Stampfen gibt ihm Kraft."
        es:
          emerald: "Orienta los altavoces redondos que tiene\nen la cabeza para atacar a su rival con\nondas ultrasónicas a gran volumen. Genera\nenergía dando pisotones en el suelo."
exploud:
  species_id: 295
