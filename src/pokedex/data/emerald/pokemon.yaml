          emerald: "うつくしい　こうたくの　はねを　もつ　ポケモン。\nあたまの　はねの　うつくしさに　こころ　うばわれ\nピジョットを　そだてる　トレーナーも　おおい。"
        en:
          emerald: "This POKéMON has gorgeous, glossy\nfeathers. Many TRAINERS are so captivated\nby the beautiful feathers on its head that\nthey choose PIDGEOT as their POKéMON."
        fr:
          emerald: "Ce POKéMON est doté d’un plumage\nmagnifique et luisant. La beauté fatale\nde sa crête fait de lui le POKéMON\npréféré de bien des DRESSEURS."
        it:
          emerald: "PIDGEOT è caratterizzato da uno stupendo\npiumaggio dai colori vivaci e brillanti.\nMolti ALLENATORI lo scelgono per la\nbellezza delle piume sulla testa."
        de:
          emerald: "Dieses POKéMON hat ein wunderschönes, \nglänzendes Gefieder. Viele TRAINER sind\nvon der Pracht des Gefieders begeistert,\nso dass sie TAUBOSS als ihr PKMN wählen."
        es:
          emerald: "Tiene un plumaje bonito e hipnótico.\nMuchos ENTRENADORES se quedan\nembobados con las plumas que tiene en\nla cabeza y lo eligen como su POKéMON."
rattata:
  species_id: 19
  names:
