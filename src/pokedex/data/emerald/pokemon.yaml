        en:
          emerald: "It is said to be a POKéMON that brings good\nfortune. When it spots someone who is pure\nof heart, a TOGETIC appears and shares its\nhappiness with that person."
        fr:
          emerald: "On raconte que TOGETIC porte chance. Si\nce POKéMON remarque quelqu’un doté d’un\ncœur pur, il apparaît et partage son\nbonheur avec la personne en question."
        it:
          emerald: "TOGETIC pare essere un POKéMON di buon\nauspicio. Quando riconosce un cuore puro,\nsi dice che condivida la sua felicità con\nquesta persona."
        de:
          emerald: "TOGETIC ist ein POKéMON, das Glück\nbringt. Wenn es jemanden trifft, der\nreinen Herzens ist, zeigt es sich und\nteilt sein Glück mit dieser Person."
        es:
          emerald: "Dicen que TOGETIC es un POKéMON\nque trae buena suerte y que, si detecta\na alguien que tenga un corazón puro,\nviene para compartir su alegría con él."
natu:
