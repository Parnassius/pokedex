        jp_kana:
          emerald: "かざんの　かこうで　くらしている　ポケモン。\n１０ねんごとに　せなかの　かざんが　だいふんか。\nげんいんの　けんきゅうが　すすめられている。"
        en:
          emerald: "A POKéMON that lives in the crater of\na volcano. Every 10 years, the volcanoes\non its back erupt violently. Research is\nunder way on the cause of eruption."
        fr:
          emerald: "Ce POKéMON vit dans les cratères des\nvolcans. Tous les 10 ans, les volcans sur\nson dos entrent violemment en éruption,\nmais personne ne sait pourquoi."
        it:
          emerald: "CAMERUPT vive in un cratere e ha a sua\nvolta dei vulcani sul dorso che eruttano\nogni 10 anni. Non si conoscono ancora le\ncause di questa violenta eruzione."
        de:
          emerald: "CAMERUPT lebt in einem Vulkankrater. Alle\n10 Jahre brechen die Vulkane auf seinem\nRücken aus. Forschungen beschäftigen\nsich bereits mit diesen Eruptionen."
        es:
          emerald: "Vive en el cráter de un volcán. Cada 10\naños, los volcanes que tiene en el lomo\nentran en erupción de forma violenta. Se\nestán investigando las posibles causas."
torkoal:
  species_id: 324
