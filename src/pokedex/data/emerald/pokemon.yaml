      descriptions:
        jp_kana:
          emerald: "こうそくで　はげしく　うごきまわっているため\nすがたを　とらえる　ことは　とても　むずかしい。\nなきごえを　ききつづけると　ずつうが　してくる。"
        en:
          emerald: "Because it darts about vigorously at high\nspeed, it is very difficult to see. Hearing\nits distinctive cries for too long induces\na headache."
        fr:
          emerald: "Comme il se déplace très rapidement,\nil est très difficile à apercevoir. On peut\nattraper des maux de tête si on écoute\nson cri distinctif trop longtemps."
        it:
          emerald: "NINJASK sfreccia a una tal velocità da\nrendersi praticamente invisibile. I suoi\nversi caratteristici fanno venire il mal\ndi testa a chi li ascolta troppo a lungo."
        de:
          emerald: "Da es sich blitzschnell bewegt, ist es\nschwer zu sehen. Wenn man seine\ncharakteristischen Schreie zu lange\nhört, bekommt man Kopfschmerzen."
        es:
          emerald: "Como se mueve de un lado a otro a una\nvelocidad de vértigo, es casi imposible\nverlo. Oír su zumbido durante mucho\ntiempo llega a dar dolor de cabeza."
shedinja:
  species_id: 292
  names:
    jp_kana: ヌケニン
    en: SHEDINJA
    fr: MUNJA
    it: SHEDINJA
    de: NINJATOM
