        jp_kana:
          emerald: "５ひき　ぐらいの　グループで　こうどうする。\nゆきぐにでは　まよなか　ユキワラシが　すがたを\nみせると　あさ　ゆきが　つもると　いわれている。"
        en:
          emerald: "They tend to move about in groups of\naround five SNORUNT. In snowy regions,\nit is said that when they are seen late at\nnight, snowfall will arrive by morning."
        fr:
          emerald: "Les STALGAMIN se déplacent souvent\npar groupes de cinq. En montagne, on dit\nqu’apercevoir ce POKéMON tard le soir\nannonce un matin enneigé."
        it:
          emerald: "Gli SNORUNT tendono a muoversi sempre in\ngruppi di cinque. Nelle regioni fredde, si\ndice che se gli SNORUNT si aggirano a notte\ntarda, il mattino seguente cadrà la neve."
        de:
          emerald: "Normalerweise ziehen sie in Fünfergruppen\numher. Wird ein SCHNEPPKE nachts\nin Schneegebieten gesehen, soll es\nam nächsten Morgen schneien."
        es:
          emerald: "Tienden a desplazarse en grupos de cinco\nSNORUNT. En las zonas de nieve se dice\nque, cuando se les ve entrada la noche, es\nporque va a nevar a la mañana siguiente."
glalie:
  species_id: 362
  names:
    jp_kana: オニゴーリ
    en: GLALIE
