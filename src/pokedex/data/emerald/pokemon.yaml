        jp_kana:
          emerald: "てきに　おそわれない　ように　きの　ふりをする。\nりょうては　１ねんじゅう　みどりいろなので\nふゆは　にせものだと　すぐに　ばれてしまう。"
        en:
          emerald: "It mimics a tree to avoid being attacked\nby enemies. But since its forelegs\nremain green throughout the year, it is\neasily identified as a fake in the winter."
        fr:
          emerald: "Il se camoufle en arbre pour éviter d’être\nattaqué par ses ennemis. Mais étant donné\nque ses pattes sont vertes toute l’année,\nil est facile à repérer pendant l’hiver."
        it:
          emerald: "SUDOWOODO evita gli attacchi nemici\ncamuffandosi da albero. In inverno si\ncapisce che non è una pianta dalle\nzampe anteriori sempreverdi."
        de:
          emerald: "MOGELBAUM tarnt sich als Baum, um Angrif-\nfen aus dem Weg zu gehen. Da seine Vorder-\nbeine aber das ganze Jahr über grünen,\nfällt seine Tarnung im Winter leicht auf."
        es:
          emerald: "Se camufla adoptando la imagen de un árbol\npara que no le ataque ningún enemigo.\nEl problema viene en invierno: las patas se\nle ven verdes y es fácil identificarle."
politoed:
  species_id: 186
  names:
