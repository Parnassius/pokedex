        en:
          emerald: "Its flower petals deepen in color through\nexposure to sunlight. When cloudy weather\npersists, it does a dance that is thought\nto be a ritual for summoning the sun."
        fr:
          emerald: "La couleur de ses pétales se renforce\ns’ils sont exposés à la lumière. Quand le\ntemps est couvert, il pratique une danse\nrituelle pour appeler le soleil."
        it:
          emerald: "Se esposti al sole, i colori dei petali di\nBELLOSSOM si intensificano. Se il tempo è\ncattivo, si cimenta in una danza. Si dice\nche sia un rituale per invocare il sole."
        de:
          emerald: "Der Farbton seiner Blütenblätter wird im\nSonnenlicht intensiver. Bei bewölktem\nHimmel tanzt es eine Art Ritual, um\ndie Sonne zu beschwören."
        es:
          emerald: "A los pétalos de las flores se les acentúa\nel color si están expuestos a la luz solar.\nCuando persiste el tiempo nublado, dicen\nque invoca al sol mediante un baile ritual."
marill:
