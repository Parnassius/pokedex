        jp_kana:
          emerald: "ふだんは　うみで　くらす　ポケモンだが　すこしの\nじかんなら　ちじょうでも　せいかつ　できる。\nからだが　かわくと　げんきが　なくなってしまう。"
        en:
          emerald: "While this POKéMON usually lives in the sea,\nit can survive on land, although not too\nlong. It loses vitality if its body becomes\ndried out."
        fr:
          emerald: "Bien qu’il vive dans les océans, il peut\nsurvivre quelque temps hors de l’eau.\nIl perd toute sa vitalité si son corps\ns’assèche."
        it:
          emerald: "Pur vivendo in mare, WAILMER può\nsopravvivere sulla terraferma, ma solo\nper brevi periodi. Se il suo corpo si secca,\ninfatti, il POKéMON perde vitalità."
        de:
          emerald: "Obwohl WAILMER normalerweise im Meer\nlebt, kann es auch an Land überleben, wenn\nauch nicht sehr lang. Es verliert Lebens-\nenergie, wenn sein Körper austrocknet."
        es:
          emerald: "Aunque este POKéMON vive generalmente\nen el mar, puede sobrevivir en tierra,\npero durante poco tiempo.\nSi se le seca el cuerpo, pierde vitalidad."
wailord:
