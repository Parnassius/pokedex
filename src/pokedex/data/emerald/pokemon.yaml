      descriptions:
        jp_kana:
          emerald: "うまれて　すぐは　たちあがるのも　やっとだが\nころびながら　おやの　あとを　おいかけている\nうちに　じょうぶな　あしこしに　そだつのだ。"
        en:
          emerald: "A PONYTA is very weak at birth. It can\nbarely stand up. Its legs become stronger\nas it stumbles and falls while trying to\nkeep up with its parent."
        fr:
          emerald: "A sa naissance, PONYTA est très faible\net peut à peine tenir debout. Il se muscle\nen trébuchant et en tombant, lorsqu’il\nessaye de suivre ses parents."
        it:
          emerald: "PONYTA è così debole alla nascita da non\nriuscire quasi a reggersi in piedi. Poi si\nrinforza a furia di cadere, cercando di \ntenere il passo dei suoi genitori."
        de:
          emerald: "Nach seiner Geburt kann PONITA kaum von\nallein aufstehen. Es wird stärker, da es\nsich beim Versuch, mit seinen Eltern\nSchritt zu halten, immer wieder aufrappelt."
        es:
          emerald: "Al nacer, es muy débil y apenas puede\nponerse en pie. Con todo, se va haciendo\nmás fuerte al tropezarse y caerse en su\nintento por seguir a sus progenitores."
rapidash:
  species_id: 78
  names:
