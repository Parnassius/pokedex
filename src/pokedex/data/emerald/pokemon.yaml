      descriptions:
        jp_kana:
          emerald: "まっかな　ひとつめに　にらまれると　くっきょうな\nおとなでも　からだが　すくんで　うごけなくなる。\nやみに　まぎれて　あるきまわる　やこうせい。"
        en:
          emerald: "A glare from its single scarlet eye makes\neven burly grown-ups freeze in utter fear.\nIt is a nocturnal POKéMON that roams\nabout under the cloak of darkness."
        fr:
          emerald: "Un seul regard de son œil écarlate\nsuffit à effrayer les plus courageux des\nhommes. C’est un POKéMON nocturne qui\nvagabonde, masqué par les ténèbres."
        it:
          emerald: "DUSKULL vaga nella tetra oscurità della\nnotte. Un solo sguardo lanciato dal suo\nocchio scarlatto fa raggelare il sangue\nanche a un adulto forte e coraggioso."
        de:
          emerald: "Ein Blick seines purpurroten Auges jagt\nsogar gestandenen Personen einen Schauer\nüber den Rücken. Es ist nachtaktiv und\nnutzt die Dunkelheit für seine Zwecke."
        es:
          emerald: "Una única mirada lanzada por su ojo\nescarlata basta para dejar petrificado\nde miedo al rival más fuerte. Deambula\nsin rumbo al amparo de la noche."
dusclops:
  species_id: 356
  names:
