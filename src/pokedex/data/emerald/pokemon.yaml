        jp_kana:
          emerald: "からだを　おおう　ヌルヌルの　ねんまくは\nどろみずに　いる　バイキンが　からだの　なかに\nはいるのを　ふせぐ　はたらきを　している。"
        en:
          emerald: "Its body is covered with a slimy film.\nThe film acts as a barrier to prevent germs\nin muddy water from entering the\nBARBOACH’s body."
        fr:
          emerald: "Son corps est couvert d’un film fin qui lui\nsert de protection contre les microbes\nque l’on trouve dans les eaux boueuses."
        it:
          emerald: "Il corpo di BARBOACH è ricoperto da una\npellicola viscida, che serve da barriera e\nlo protegge dall’infiltrazione di batteri\nprovenienti dalle acque melmose."
        de:
          emerald: "Sein Körper ist mit einem schleimigen Film\nüberzogen. Dieser Film dient zum\nSchutz vor Keimen, die sich im\nSchlammwasser tummeln."
        es:
          emerald: "Tiene el cuerpo cubierto de una película\nviscosa. Esta capa actúa como barrera y\nevita que los gérmenes del agua fangosa\npenetren en el cuerpo de BARBOACH."
whiscash:
  species_id: 340
