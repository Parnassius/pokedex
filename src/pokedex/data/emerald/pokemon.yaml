        en:
          emerald: "Its body is covered with water-repellent\nfur. Because of the fur, it can swim\nthrough water at high speed without being\nslowed by the water’s resistance."
        fr:
          emerald: "Son corps est couvert d’une fourrure\nimperméable. Grâce à elle, il peut nager\nà grande vitesse sans être ralenti par la\nrésistance de l’eau."
        it:
          emerald: "Il corpo di MARILL è coperto da una\npelliccia idrorepellente. Grazie ad essa,\nriesce a nuotare ad alta velocità senza\nfarsi rallentare dall’attrito dell’acqua."
        de:
          emerald: "Sein Fell ist wasserabweisend. Daher kann\nMARILL mit hoher Geschwindigkeit, ohne\nvom Wasser gebremst zu werden, schwimmen."
        es:
          emerald: "Está cubierto de una piel impermeable.\nGracias a ella, puede nadar a gran\nvelocidad sin que le afecte la resistencia\nque pueda ofrecer el agua."
azumarill:
  species_id: 184
