        jp_kana:
          emerald: "すうひきで　むれを　つくって　こうどうしていて\nめったに　ひとや　ポケモンと　せっしょくしない。\nてきの　けはいを　さっちすると　すがたを　けす。"
        en:
          emerald: "They make a small herd of only several\nmembers. They rarely make contact with\npeople or other POKéMON. They disappear\nif they sense enemies."
        fr:
          emerald: "Il n’existe qu’un faible nombre de LATIAS.\nIls ne rentrent que rarement en contact\navec les humains ou d’autres POKéMON et\nfuient dès qu’ils détectent un ennemi."
        it:
          emerald: "I LATIAS vivono in piccoli gruppi e solo\ndi rado entrano in contatto con altri\nPOKéMON o con gli uomini. Fuggono se\npercepiscono un pericolo."
        de:
          emerald: "Sie bilden nur kleine Gruppen und nehmen\nnur selten Kontakt zu den Menschen oder\nanderen PKMN auf. Spüren sie Feinde,\nverschwinden sie sofort."
        es:
          emerald: "Es parte de una manada de pequeño\ntamaño. Rara vez entra en contacto con\nla gente o con otros POKéMON. Si siente\nla presencia del enemigo, desaparece."
latios:
  species_id: 381
