        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          emerald: "からだが　ふるえ　はないきが　あらくなれば\nおこりだす　まえぶれ　なのだが　あっというまに\nはげしく　おこるので　にげだす　ひまは　ない。"
        en:
          emerald: "When it starts shaking and its nasal\nbreathing turns rough, it’s a sure sign\nof anger. However, since this happens\ninstantly, there is no time to flee."
        fr:
          emerald: "Lorsqu’il commence à trembler et que sa\nrespiration devient haletante, cela veut\ndire qu’il est en colère. Il s’énerve si vite\nqu’il est impossible de lui échapper."
        it:
          emerald: "Quando MANKEY sta per avere un attacco\nd’ira, inizia a tremare e a respirare pesan-\ntemente dal naso. Tali sfuriate sono così\nrepentine che è impossibile sfuggirgli."
        de:
          emerald: "Wenn MENKI sich schüttelt und schwer\ndurch die Nase atmet, dann ist es wütend.\nDa es blitzartig in Raserei gerät, ist es\nunmöglich, seinem Zorn zu entkommen."
        es:
          emerald: "Si empieza a temblar y a respirar de\nforma agitada, es que va a enfadarse.\nAunque prever su enfado es inútil, pues\nllega tan rápido que no da tiempo a huir."
primeape:
  species_id: 57
  names:
    jp_kana: オコリザル
    en: PRIMEAPE
    fr: COLOSSINGE
    it: PRIMEAPE
    de: RASAFF
    es: PRIMEAPE
  forms:
    primeape:
      form_id: 0
      base_stats:
        hp: 65
        attack: 105
        defense: 60
        special_attack: 60
        special_defense: 70
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
