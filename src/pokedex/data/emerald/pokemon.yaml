        en:
          emerald: "Its big jaws crunch through boulders.\nBecause its head is so big, it has a hard\ntime getting back upright if it tips over\nonto its back."
        fr:
          emerald: "Ses mâchoires arrivent à briser de gros\nrochers. Sa tête est si lourde qu’il a du\nmal à se remettre droit s’il tombe sur\nle dos."
        it:
          emerald: "Le possenti mascelle di TRAPINCH possono\nfrantumare persino la pietra. La sua testa\nè così grande che se cade all’indietro, ha\ndifficoltà a rialzarsi."
        de:
          emerald: "Seine kräftigen Kiefer zermalmen selbst\nFelsen. Da sein Kopf so groß ist, fällt\nes ihm schwer sich aufzurichten, wenn\nes umgefallen ist."
        es:
          emerald: "Tiene unas enormes fauces con las que\ndestruye piedras. Como tiene una cabeza\nmuy grande, le cuesta conseguir ponerse\nde pie si se cae de espaldas."
vibrava:
  species_id: 329
