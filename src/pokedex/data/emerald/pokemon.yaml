        jp_kana:
          emerald: "まいにち　２０リットルの　ミルクを　だす。\nあまい　ミルクは　おとなも　こどもも　だいすき。\nにがてな　ひとは　ヨーグルトにして　たべている。"
        en:
          emerald: "It gives over five gallons of milk daily.\nIts sweet milk is enjoyed by children and\ngrown-ups alike. People who can’t drink\nmilk turn it into yogurt and eat it instead."
        fr:
          emerald: "ECREMEUH produit plus de 20 litres de\nlait par jour. Son lait sucré fait la joie\ndes petits et des grands. Les gens qui\nne boivent pas de lait en font du yaourt."
        it:
          emerald: "Ogni giorno, MILTANK produce venti litri di\nun latte apprezzato da adulti e bambini\nperché leggermente dolce. Chi non può bere\nlatte, lo usa per fare uno yogurt squisito."
        de:
          emerald: "MILTANK gibt täglich 20 Liter Milch. Sie ist\nsüßlich und bei Kindern und Erwachsenen\nbeliebt. Menschen, die keine Milch trinken,\nessen sie stattdessen als Joghurt."
        es:
          emerald: "MILTANK da al día 20 litros de una dulce\nleche que gusta a grandes y pequeños.\nAquellos a los que no les agrada la leche,\nla toman en forma de yogur."
blissey:
  species_id: 242
