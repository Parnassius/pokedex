      descriptions:
        jp_kana:
          emerald: "しっぽを　かわに　いれて　エサを　つっているが\nそのうち　なにを　しているのか　わすれてしまい\nかわべりに　ねそべったまま　１にちを　おえる。"
        en:
          emerald: "It catches prey by dipping its tail in\nwater at the side of a river. But it often\nforgets what it is doing and spends entire\ndays just loafing at water’s edge."
        fr:
          emerald: "RAMOLOSS trempe sa queue dans l’eau au\nbord des rivières pour attraper ses proies.\nIl oublie souvent ce qu’il fait là et passe\ndes jours entiers à traîner."
        it:
          emerald: "SLOWPOKE immerge la coda in acqua dalle\nrive dei fiumi per pescare la preda. Spesso\ndimentica cosa stava facendo e ciondola\nvicino ai corsi d’acqua per intere giornate."
        de:
          emerald: "FLEGMON benutzt seinen Schweif, um vom\nFlussufer aus im Wasser Beute zu fangen.\nEs vergisst häufig, was es tun wollte, und\nverbringt Tage, am Ufer herumzutrödeln."
        es:
          emerald: "Con la cola, atrapa a su rival metiéndolo\nbajo agua en las riberas de los ríos. Suele\nolvidar lo que estaba haciendo y pasarse\ndías enteros holgazaneando en la orilla."
slowbro:
  species_id: 80
  names:
    jp_kana: ヤドラン
