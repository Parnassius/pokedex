        jp_kana:
          emerald: "パンチや　キックの　かくとうわざを　みにつける。\nすうねんごとに　ふるくなった　はねが　もえて\nあたらしく　しなやかな　はねに　はえかわるのだ。"
        en:
          emerald: "It learns martial arts that use punches\nand kicks. Every several years, its old\nfeathers burn off, and new, supple\nfeathers grow back in their place."
        fr:
          emerald: "Il maîtrise les arts martiaux à base de\ncoups de pied et de coups de poing. Tous\nles sept ans, ses vieilles plumes brûlent\net sont remplacées par des neuves."
        it:
          emerald: "BLAZIKEN si dedica alle arti marziali che\nusano pugni e calci. A cicli di molti anni,\nle sue piume bruciano, lasciando il posto a\nun nuovo morbido piumaggio."
        de:
          emerald: "Es erlernt Kampfsportarten bei denen man\nTritte und Faustschläge einsetzt. Alle\npaar Jahre verbrennen die Federn und\nneue, weiche Federn wachsen nach."
        es:
          emerald: "Aprende artes marciales en las que se dan\npuñetazos y patadas. Al cabo de varios\naños, se le queman las plumas y le crecen\notras nuevas, muy flexibles, en su lugar."
mudkip:
  species_id: 258
