        jp_kana:
          emerald: "なんごく　うまれの　ナッシーの　あたまは　つよい\nひざしを　いっぱい　あびて　どんどん　そだち\nじめんに　おちると　タマタマに　なると　いう。"
        en:
          emerald: "Originally from the tropics, EXEGGUTOR’s\nheads grow larger from exposure to strong\nsunlight. It is said that when the heads\nfall, they group to form an EXEGGCUTE."
        fr:
          emerald: "NOADKOKO vient des tropiques. Grâce au\nsoleil ardent, ses têtes ont rapidement\ngrandi. On raconte que lorsque ses têtes\ntombent, elles forment un NOEUNOEUF."
        it:
          emerald: "EXEGGUTOR è originario dei tropici. Le\nteste crescono costantemente alla luce\nsolare. Pare che quando le teste cadono,\nsi uniscano per formare un EXEGGCUTE."
        de:
          emerald: "KOKOWEI stammt ursprünglich aus den Tro-\npen. Seine Köpfe wachsen stetig, wenn es\nSonnenlicht ausgesetzt ist. Fallen seine\nKöpfe ab, bilden sie zusammen ein OWEI."
        es:
          emerald: "Es originario del trópico. Cuando se expone\na un sol intenso, le empiezan a crecer las\ncabezas. Dicen que, si caen al suelo, las\ncabezas se unen para formar un EXEGGCUTE."
cubone:
