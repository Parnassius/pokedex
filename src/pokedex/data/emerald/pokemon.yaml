        en:
          emerald: "ARTICUNO is a legendary bird POKéMON that\ncan control ice. The flapping of its wings\nchills the air. As a result, it is said that\nwhen this POKéMON flies, snow will fall."
        fr:
          emerald: "C’est un POKéMON oiseau légendaire qui\npeut contrôler la glace. Son battement\nd’ailes gèle l’air tout autour de lui. On dit\nque lorsqu’il vole, la neige va tomber."
        it:
          emerald: "ARTICUNO è un POKéMON uccello leggen-\ndario, a suo agio tra i ghiacci. Quando\nbatte le ali, l’aria diventa gelida. Quando\nnevica, si dice che sia passato di lì."
        de:
          emerald: "ARKTOS ist ein legendäres Vogel-PKMN, das\nEis manipulieren kann. Das Schlagen seiner\nFlügel bringt die Luft zum Gefrieren.\nDadurch soll es zu schneien beginnen."
        es:
          emerald: "Es un legendario pájaro POKéMON que\npuede controlar el hielo. El batir de sus\nalas congela el aire. Dicen que consigue\nhacer nevar cuando vuela."
zapdos:
