      descriptions:
        jp_kana:
          emerald: "おおあごは　はがねの　ツノが　へんけいしたもの。\nあいきょう　たっぷりの　しぐさに　ゆだんした\nあいてを　おおあごで　がぶりと　かみつく。"
        en:
          emerald: "Its giant jaws are actually steel horns\nthat transformed. It fools foes into\ncomplacency with its adorable gestures,\nthen chomps them with its huge jaws."
        fr:
          emerald: "Ses mâchoires géantes sont en fait ce qui\nreste de deux cornes en acier qui se sont\ntransformées. Il attire ses proies avec\nson air amical avant de les avaler."
        it:
          emerald: "Le enormi mascelle di MAWILE sono in realtà\ncorna d’acciaio trasformate. Inganna il\nnemico con il suo modo di fare mansueto e\npoi lo azzanna con le possenti mascelle."
        de:
          emerald: "Seine gewaltigen Kiefer sind eigentlich\nStahlhörner. Es ruft bei Feinden mit seinen\nanmutigen Gesten Selbstgefälligkeit her-\nvor und schnappt dann mit seinem Maul zu."
        es:
          emerald: "Las gigantescas fauces que tiene fueron\ncuernos de acero en su día. Engaña\nal enemigo con gestos dóciles y a\ncontinuación abre sus fauces."
aron:
  species_id: 304
