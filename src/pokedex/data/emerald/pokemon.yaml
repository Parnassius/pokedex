        en:
          emerald: "If it touches metal and discharges the\nelectricity it has stored in its body, an\nELEKID begins swinging its arms in circles\nto recharge itself."
        fr:
          emerald: "ELEKID stocke de l’électricité dans son\ncorps. S’il touche du métal et décharge\nson électricité, il fait des cercles avec\nses bras pour se recharger."
        it:
          emerald: "Se, a contatto col metallo, ELEKID scarica\naccidentalmente l’elettricità \nimmagazzinata nel corpo, si ricarica con\nmovimenti circolari degli arti superiori."
        de:
          emerald: "ELEKID speichert Elektrizität in seinem\nKörper. Berührt es Metall und entlädt \ndie aufgestaute Energie, rotiert es mit\nden Armen, um sich wieder aufzuladen."
        es:
          emerald: "Acumula electricidad. Si entra en contacto\ncon metal y descarga accidentalmente\ntoda la electricidad almacenada, agita\nlos brazos en círculo para recargarse."
