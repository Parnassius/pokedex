      descriptions:
        jp_kana:
          emerald: "みごとな　かたちの　ツノは　びじゅつひん　として\nたかく　うれた　ために　ぜつめつ　すんぜんまで\nらんかくされた　ことのある　ポケモン。"
        en:
          emerald: "STANTLER’s magnificent antlers were\nonce traded at high prices as works of art.\nAs a result, this POKéMON was hunted\nclose to extinction."
        fr:
          emerald: "Les superbes bois de CERFROUSSE\nétaient vendus très cher comme œuvres\nd’art. Ce POKéMON fut chassé et l’espèce\nproche de l’extinction à cause de ses bois."
        it:
          emerald: "Le magnifiche corna di STANTLER venivano\nvendute a caro prezzo come ornamenti. \nLa caccia indiscriminata a questo POKéMON\nl’ha portato al limite dell’estinzione."
        de:
          emerald: "DAMHIRPLEX hat ein prächtiges Geweih, für\ndas hohe Preise gezahlt werden, da es als\nKunstwerk gilt. Daher wurde es\ngejagt und wäre beinahe ausgestorben."
        es:
          emerald: "Antes se comerciaba con la cornamenta de\nSTANTLER, considerada una obra de arte\nde gran valor. Esto provocó que muchos\nintentaran darle caza y casi se extingue."
smeargle:
  species_id: 235
  names:
    jp_kana: ドーブル
    en: SMEARGLE
    fr: QUEULORIOR
    it: SMEARGLE
    de: FARBEAGLE
