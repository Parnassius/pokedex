        en:
          emerald: "WOOPER usually live in water but come\nout onto land seeking food occasionally.\nOn land, they coat their bodies with a\ngooey, toxic film."
        fr:
          emerald: "AXOLOTO vit généralement dans l’eau. Mais\nde temps en temps, il vient sur terre pour\nchercher à manger. A terre, il recouvre son\ncorps d’un voile visqueux et toxique."
        it:
          emerald: "Di solito WOOPER vive in acqua, ma talvolta\nsi avventura sulla terraferma in cerca di\ncibo. In queste occasioni, il corpo si copre\ndi una sostanza appiccicosa e velenosa."
        de:
          emerald: "FELINO lebt eigentlich im Wasser. Manchmal\nkommt es jedoch an Land, um nach Nahrung\nzu suchen. An Land bedeckt es seinen\nKörper mit einem schleimigen Giftfilm."
        es:
          emerald: "Suele vivir en el agua, pero también es\nposible verle en tierra en busca de comida.\nCuando está en terreno firme, se cubre\ncon una película viscosa y tóxica."
quagsire:
