      descriptions:
        jp_kana:
          emerald: "もりの　しめった　ふようどが　だいこうぶつ。\nながあめの　あと　もりに　はいると　キノココが\nたくさん　あつまって　ふようどを　たべているよ。"
        en:
          emerald: "It loves to eat damp, composted soil in\nforests. If you enter a forest after a\nlong rain, you can see many SHROOMISH\nfeasting on composted soil."
        fr:
          emerald: "Il adore se nourrir de compost humide.\nSi vous allez en forêt après une longue\naverse, vous trouverez certainement des\nBALIGNON en train de se régaler."
        it:
          emerald: "Gli SHROOMISH prediligono come nutrimento\nl’humus della foresta. Dopo lunghe piogge,\nè facile vederli riempirsene la pancia."
        de:
          emerald: "Es ernährt sich am liebsten von feuchter,\nverrotteter Walderde. Wenn du nach einem\nRegenguss in den Wald gehst, kannst du\nviele KNILZ auf Komposterde finden."
        es:
          emerald: "Le encanta alimentarse de la tierra\nabonada y húmeda de los bosques. Si vas a\nun bosque después de que haya llovido,\nverás a SHROOMISH engullendo tierra."
breloom:
  species_id: 286
  names:
    jp_kana: キノガッサ
