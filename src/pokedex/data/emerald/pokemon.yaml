      abilities:
        - truant
      descriptions:
        jp_kana:
          emerald: "くだものが　みのる　きせつに　なると　じゅもくの\nまわりに　ケッキングが　たくさん　あつまる。\nじゅくして　おちてくるのを　まっているのだ。"
        en:
          emerald: "Hordes of SLAKING gather around trees\nwhen fruits come into season. They wait\naround patiently for ripened fruits to fall\nout of the trees."
        fr:
          emerald: "Des hordes de MONAFLEMIT se réunissent\naux pieds des arbres à la saison des\nfruits. Ils attendent alors patiemment\nqu’ils tombent pour pouvoir les manger."
        it:
          emerald: "Quando i frutti giungono a maturazione,\ngli SLAKING si raggruppano sotto gli \nalberi e aspettano pazientemente che\ncadano a terra."
        de:
          emerald: "Wenn die Früchte reif sind, versammeln sich\nLETARKING um Bäume. Sie warten dort\ngeduldig, dass die reifen Früchte vom\nBaum fallen."
        es:
          emerald: "Cuando es temporada, los SLAKING\nse agrupan cerca de los árboles y esperan\ncon paciencia a que la fruta madura caiga."
nincada:
  species_id: 290
  names:
    jp_kana: ツチニン
    en: NINCADA
    fr: NINGALE
    it: NINCADA
    de: NINCADA
