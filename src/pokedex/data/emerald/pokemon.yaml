        jp_kana:
          emerald: "きゅうばんの　うでで　あいてに　からみつく。\nうごけなくなった　ところを　しとめるのだ。\nかなわない　ときは　スミを　はいて　にげる。"
        en:
          emerald: "It ensnares its foe with its suction-\ncupped tentacles before delivering the\nfinishing blow. If the foe turns out to be\ntoo strong, it spews ink to escape."
        fr:
          emerald: "OCTILLERY attrape son ennemi avec ses\ntentacules avant de lui asséner le coup\nfinal. Si l’ennemi s’avère trop fort, il lui\ncrache de l’encre à la figure et s’échappe."
        it:
          emerald: "OCTILLERY afferra il nemico con i tenta-\ncoli a ventosa immobilizzandolo prima\ndi sferrare il colpo finale. Se il nemico è\nmolto forte, sputa inchiostro e scappa."
        de:
          emerald: "OCTILLERY saugt sich mit seinen Tentakeln\nam Feind fest. Es betäubt seinen Gegner,\nbevor es ihm den Rest gibt. Ist ein Feind\nzu stark, speit es Tinte aus und flüchtet."
        es:
          emerald: "Se apodera de su enemigo con los\ntentáculos y lo deja inmovilizado antes de\npropinarle el golpe final. Si el rival es muy\nfuerte, le escupe tinta para escapar."
delibird:
  species_id: 225
