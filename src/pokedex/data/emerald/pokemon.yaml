        en:
          emerald: "A QWILFISH uses the pressure of water\nit swallows to shoot toxic quills all at\nonce from all over its body. It finds\nswimming to be somewhat challenging."
        fr:
          emerald: "Il se gonfle en aspirant de l’eau. Il utilise\nla pression de l’eau avalée pour envoyer\nd’un coup les pointes toxiques de son\ncorps. Nager lui demande un gros effort."
        it:
          emerald: "QWILFISH si gonfia assorbendo acqua e usa\npoi la pressione dell’acqua ingerita per\nsparare i suoi aculei velenosi. Non si può\ncerto dire che sia un grande nuotatore."
        de:
          emerald: "BALDORFISH saugt Wasser ein, um sich auf-\nzublasen. Es nutzt den Druck des Wassers\ndazu, Giftstacheln aus seinem Körper zu\nverschießen. Schwimmen fällt ihm schwer."
        es:
          emerald: "Bebe agua, se hincha y usa la presión\ndel agua que ha tragado para lanzar\nplumas tóxicas a través de la piel.\nPara QWILFISH, nadar es todo un desafío."
scizor:
  species_id: 212
  names:
    jp_kana: ハッサム
