      descriptions:
        jp_kana:
          emerald: "ダイヤモンドよりも　かたい　ツノを　もつ。\nてきの　けはいを　かんじると　せなかの　トゲが\nいっせいに　さかだち　ぜんりょくで　たちむかう。"
        en:
          emerald: "Its horn is harder than a diamond.\nIf it senses a hostile presence, all the\nbarbs on its back bristle up at once, and it\nchallenges the foe with all its might."
        fr:
          emerald: "Il dispose d’une corne plus dure que du\ndiamant. S’il sent une présence hostile,\ntoutes les pointes de son dos se hérissent\nd’un coup, puis il défie son ennemi."
        it:
          emerald: "Il corno di NIDORINO è più duro del\ndiamante. Se percepisce una presenza\nostile, gli aculei sulla schiena si rizzano\ne sfida il nemico con tutta la sua forza."
        de:
          emerald: "Sein Horn ist härter als Diamant. Wenn\nes einen Feind wahrnimmt, stellen sich die\nStacheln auf seinem Rücken auf und es\nstellt sich dem Gegner mit aller Kraft."
        es:
          emerald: "Tiene un cuerno de dureza superior a la del\ndiamante. Si siente una presencia hostil,\nse le erizan las púas del lomo y hace\nfrente al enemigo con todas sus fuerzas."
nidoking:
  species_id: 34
  names:
    jp_kana: ニドキング
