        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
      descriptions:
        jp_kana:
          emerald: "はげしく　おこる　ことで　けっこうが　よくなり\nきんにくの　ちからを　つよくするのだ。\nただし　あたまの　かいてんは　おそくなるぞ。"
        en:
          emerald: "When it becomes furious, its blood\ncirculation becomes more robust, and\nits muscles are made stronger. But it\nalso becomes much less intelligent."
        fr:
          emerald: "Lorsqu’il est furieux, sa circulation\nsanguine s’accélère. Du coup, ses muscles\nsont encore plus puissants. En revanche, il\ndevient bien moins intelligent."
        it:
          emerald: "Quando PRIMEAPE s’infuria, la circolazione\nsanguigna si fa intensa, irrobustendo i\nsuoi muscoli. Allo stesso tempo, tuttavia,\nperde anche lucidità e intelligenza."
        de:
          emerald: "Wenn RASAFF wütend ist, wird seine Blut-\nzirkulation gesteigert und seine Muskeln\nwerden stärker. Allerdings mindert das\nauch die Fähigkeit zum logischen Denken."
        es:
          emerald: "Cuando PRIMEAPE se enfada, se\nle acelera el ritmo cardíaco y se\nle fortalecen los músculos, pero\ntambién pierde en inteligencia."
growlithe:
  species_id: 58
  names:
    jp_kana: ガーディ
    en: GROWLITHE
    fr: CANINOS
    it: GROWLITHE
    de: FUKANO
