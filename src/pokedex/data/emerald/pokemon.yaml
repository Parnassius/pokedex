        jp_kana:
          emerald: "ふだんは　ちじょうで　くらす　アーマルドだが\nえものを　とる　ときには　うみに　もぐり\n２まいの　おおきな　はねを　つかって　およぐ。"
        en:
          emerald: "ARMALDO usually lives on land. However,\nwhen it hunts for prey, it dives beneath\nthe ocean. It swims around using its two\nlarge wings."
        fr:
          emerald: "ARMALDO vit généralement sur terre mais\nil chasse ses proies au fond de l’océan.\nIl arrive à nager en utilisant ses deux\ngrandes ailes."
        it:
          emerald: "ARMALDO vive solitamente sulla terra-\nferma. Quando caccia, tuttavia, si tuffa\nnell’oceano e nuota con le sue due\ngrandi ali."
        de:
          emerald: "Früher hat ARMALDO an Land gelebt. Wenn\nes jetzt jedoch nach Beute jagt, taucht\nes tief in den Ozean. Mittels seiner zwei\ngroßen Schwingen schwimmt es."
        es:
          emerald: "ARMALDO vive generalmente en tierra.\nSin embargo, cuando caza, se zambulle\nen el océano y se pone a nadar usando\nlas dos grandes alas que tiene."
feebas:
  species_id: 349
  names:
    jp_kana: ヒンバス
