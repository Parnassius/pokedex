      descriptions:
        jp_kana:
          emerald: "みずの　なかで　くちを　あけて　エサが　ぐうぜん\nとびこんで　くるのを　ただただ　まっている。\nうごかないので　あまり　おなかが　すかないのだ。"
        en:
          emerald: "A QUAGSIRE hunts by leaving its mouth wide\nopen in water and waiting for its prey to\nblunder in. Because it doesn’t move, it\ndoes not get very hungry."
        fr:
          emerald: "MARAISTE trouve sa nourriture en laissant\nsa bouche ouverte dans l’eau, il attend que\nses proies y pénètrent. Comme ce POKéMON\nest inactif, il n’a jamais très faim."
        it:
          emerald: "In acqua QUAGSIRE attende con la bocca\nspalancata per catturare qualche ignaro\nmalcapitato. Poiché non fa molto moto,\nnon è mai troppo affamato."
        de:
          emerald: "MORLORD jagt seine Nahrung, indem es im\nWasser sein Maul weit aufmacht und auf\nBeute wartet. Da es sich nicht bewegt,\nwird es auch nicht besonders hungrig."
        es:
          emerald: "QUAGSIRE caza dejando las fauces\nabiertas en el agua y esperando a que su\npresa entre sin darse cuenta. Como se\nqueda quieto, no pasa mucha hambre."
espeon:
