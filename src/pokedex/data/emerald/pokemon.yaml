      descriptions:
        jp_kana:
          emerald: "かぜに　のって　ふわふわ　ただよう　ポケモン。\nきょうふうの　けはいを　かんじると　なかまどうし\nはっぱを　からめ　とばされない　じゅんびをする。"
        en:
          emerald: "This POKéMON drifts and floats with the\nwind. If it senses the approach of strong\nwinds, a HOPPIP links leaves with others\nto prepare against being blown away."
        fr:
          emerald: "GRANIVOL flotte à la dérive, porté par le\nvent. S’il sent qu’un vent très fort\napproche, il attache ses feuilles aux\nautres GRANIVOL pour ne pas être emporté."
        it:
          emerald: "HOPPIP fluttua nell’aria trasportato dal\nvento. Se percepisce l’avvicinarsi di una\nforte corrente, unisce le foglie con quelle\ndei suoi simili per non farsi spazzare via."
        de:
          emerald: "HOPPSPROSS lässt sich vom Wind treiben.\nBemerkt es, dass ein Sturm aufkommt, ver-\nbindet es seine Blätter mit anderen seiner\nArt, damit es nicht davongeweht wird."
        es:
          emerald: "Flota en el aire y se deja llevar. Si percibe\nque el viento va a soplar con fuerza,\nentrelaza sus hojas con otros para hacer\nresistencia y evitar salir volando."
skiploom:
  species_id: 188
