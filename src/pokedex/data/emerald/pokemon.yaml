      descriptions:
        jp_kana:
          emerald: "しょくじの　ときも　ねている　ときも　どちらかの\nあたまが　つねに　まわりを　けいかいしている。\nきけんになると　じそく１００キロで　にげる。"
        en:
          emerald: "Even while eating or sleeping, one of the\nheads remains always vigilant for any sign\nof danger. When threatened, it flees at\nover 60 miles per hour."
        fr:
          emerald: "Même en dormant ou en mangeant, une de\nses têtes est toujours en train de monter\nla garde. S’il se sent menacé, il est\ncapable de courir à 100 km/h."
        it:
          emerald: "Anche mentre mangia o dorme, una delle due\nteste di DODUO rimane sempre vigile per \ncontrollare che non ci siano pericoli. Se si\nspaventa, può correre a oltre 100 km/h."
        de:
          emerald: "Egal ob beim Essen oder Schlafen, ein Kopf\nist stets erhoben und hält Wache. Bei\nGefahr flieht es mit über 100 km/h."
        es:
          emerald: "Incluso mientras come o duerme, una de\nlas cabezas sigue estando en guardia para\ndetectar cualquier peligro. Si lo amenazan,\nsale huyendo a 100 km por hora."
dodrio:
  species_id: 85
  names:
