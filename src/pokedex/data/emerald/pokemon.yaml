        jp_kana:
          emerald: "せなかの　コブに　にえたぎる　マグマを　ためる。\n１００キロの　にもつを　はこぶ　ちからもち。\nむかしから　ひとの　しごとを　てつだっている。"
        en:
          emerald: "A NUMEL stores boiling magma in the hump\non its back. It is a hardy POKéMON that can\ntransport a 220-pound load. It has served\nhumans at work since long ago."
        fr:
          emerald: "Il peut stocker du magma en fusion dans\nla bosse de son dos. Il peut porter des\ncharges de 100 kilos et s’avère souvent\nutile aux humains dans leurs travaux."
        it:
          emerald: "NUMEL accumula magma bollente nella gobba.\nUtilizzato da sempre dall’uomo per lavori\npesanti in virtù della sua forza, il POKéMON\npuò trasportare carichi di un quintale."
        de:
          emerald: "CAMAUB speichert kochendes Magma\nin seinem Höcker. Es ist ein zähes PKMN,\ndas bis zu 100 Kilo tragen kann. Die\nMenschen schätzen seine Hilfe."
        es:
          emerald: "Un NUMEL almacena magma en ebullición\ndentro de la joroba del lomo. Es robusto y\npuede cargar hasta con 100 kg. Ayuda a la\ngente en su trabajo desde hace mucho."
camerupt:
  species_id: 323
