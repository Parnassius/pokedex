      descriptions:
        jp_kana:
          emerald: "ひろい　なわばりを　とんで　みまわりを　する。\nなわばりを　あらす　あいては　ようしゃ　しない。\nするどい　ツメで　てっていてきに　こらしめるぞ。"
        en:
          emerald: "This POKéMON flies around, patrolling its\nlarge territory. If its living space is\nviolated, it shows no mercy in thoroughly\npunishing the foe with its sharp claws."
        fr:
          emerald: "ROUCOUPS surveille régulièrement son\nvaste espace aérien. Si quelqu’un pénètre\nsur son territoire, il corrige l’ennemi sans\npitié d’un coup de ses terribles serres."
        it:
          emerald: "PIDGEOTTO difende e controlla\ncostantemente il proprio immenso\nterritorio. Se viene invaso, punisce senza\npietà i nemici con i suoi artigli affilati."
        de:
          emerald: "TAUBOGA fliegt umher und kontrolliert\nseinen Lebensraum. Betritt jemand sein\nGebiet, zeigt es keine Gnade und greift\nmit seinen scharfen Krallen an."
        es:
          emerald: "Se hace con un territorio muy vasto y lo\nsobrevuela para controlarlo. Si invaden\nsu espacio vital, no tendrá ningún reparo\nen atacar con sus afiladas garras."
pidgeot:
  species_id: 18
