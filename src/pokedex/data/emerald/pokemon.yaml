        en:
          emerald: "Getting up close to a KOFFING will give\nyou a chance to observe, through its thin\nskin, the toxic gases swirling inside. It\nblows up at the slightest stimulation."
        fr:
          emerald: "Il suffit de s’approcher d’un SMOGO pour\napercevoir les gaz toxiques qui circulent\ndans son corps. Il explose à la moindre\nstimulation."
        it:
          emerald: "Se si osserva un KOFFING da vicino,\nattraverso la sottilissima pelle, si vedo-\nno i gas tossici al suo interno. Alla minima\nstimolazione, il POKéMON scoppia."
        de:
          emerald: "Wenn man sich einem SMOGON nähert, kann\nman die Giftgase in seinem Körperinneren\nbeobachten. Ein kleiner Reiz reicht aus\nund es geht in die Luft."
        es:
          emerald: "Ver de cerca a un KOFFING permite\nobservar, a través de su fina piel,\nlos gases tóxicos que se remolinan\nen su interior. A la mínima, explota."
weezing:
  species_id: 110
  names:
    jp_kana: マタドガス
