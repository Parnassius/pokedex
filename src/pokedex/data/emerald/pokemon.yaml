        en:
          emerald: "If attacked, it strikes back by spitting\nballs of fire it forms in its stomach.\nA TORCHIC dislikes darkness because it\ncan’t see its surroundings."
        fr:
          emerald: "S’il est attaqué, il crache des boules de\nfeu qu’il forme dans son estomac.\nIl déteste l’obscurité car il aime voir ce\nqui se trouve autour de lui."
        it:
          emerald: "Quando viene attaccato, TORCHIC sputa\nsfere di fuoco che si formano nel suo\nventre. Non ama l’oscurità perché non\nvede ciò che lo circonda."
        de:
          emerald: "Bei einem Angriff verteidigt es sich mit\nFeuerbällen, die es in seinem Magen formt.\nFLEMMLI mag die Dunkelheit nicht, weil\nes dort nichts sehen kann."
        es:
          emerald: "Si le atacan, se defiende escupiendo bolas\nde fuego que forma en el estómago. Los\nTORCHIC tienen aversión a la oscuridad\nporque les impide ver lo que les rodea."
combusken:
  species_id: 256
  names:
    jp_kana: ワカシャモ
