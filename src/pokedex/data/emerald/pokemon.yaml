        jp_kana:
          emerald: "ほとんど　うごかず　きに　つかまっているが\nなかでは　しんかの　じゅんびで　おおいそがし。\nその　しょうこに　からだが　あつくなっているぞ。"
        en:
          emerald: "It remains virtually immobile while it\nclings to a tree. However, on the inside,\nit busily prepares for evolution. This is\nevident from how hot its shell becomes."
        fr:
          emerald: "COCONFORT est souvent immobile car\nil reste accroché à un arbre. Il prépare \nintérieurement sa prochaine évolution,\nce qui explique la chaleur de sa carapace."
        it:
          emerald: "KAKUNA rimane quasi immobile abbarbicato\nagli alberi. L’intensità del calore svilup-\npato dal guscio indica che internamente è\nintento a preparare la sua evoluzione."
        de:
          emerald: "KOKUNA bewegt sich kaum, wenn es an einem\nBaum haftet. In seinem Inneren regt sich\neiniges, da es auf seine Entwicklung\nwartet. Dabei wird seine Schale sehr heiß."
        es:
          emerald: "Permanece casi inmóvil encaramado\na los árboles, pero mantiene una actividad\ninterna frenética para poder evolucionar.\nLa temperatura de la piel es muy alta."
beedrill:
  species_id: 15
