          emerald: "いつもは　のんびり　のはらを　かけまわっているが\nひとたび　ほんきを　だすと　たてがみの　ほのおが\nもえあがり　じそく２４０キロで　はしりだす。"
        en:
          emerald: "It usually canters casually in the fields\nand plains. But once a RAPIDASH turns\nserious, its fiery manes flare and blaze\nas it gallops its way up to 150 mph."
        fr:
          emerald: "On voit souvent GALOPA trotter dans les\nchamps et les plaines. Ce POKéMON peut\ngaloper à plus de 240 km/h et sa crinière\nflamboyante s’embrase."
        it:
          emerald: "RAPIDASH si vede comunemente galoppare\nin campagne e pianure. Quando si lancia a\ntutta velocità, la sua fiera criniera brilla\ne arde mentre galoppa fino a 240 km/h."
        de:
          emerald: "Man kann GALLOPA beobachten, wie es\nlässig über Felder und Wiesen galoppiert.\nWenn es jedoch Ernst macht, erreicht es\nbis zu 240 km/h und seine Mähne lodert."
        es:
          emerald: "Suele trotar sin rumbo por campos y llanos.\nPero, si debe ir a algún sitio, se le aviva el\nfuego de las melenas y emprende un galope\nllameante alcanzando 240 km por hora."
slowpoke:
  species_id: 79
  names:
