      descriptions:
        jp_kana:
          emerald: "プラスルと　マイナンの　でんきを　どうじに\nあびると　けっこうが　よくなり　げんきに\nなると　ポケモンがっかいで　はっぴょうされた。"
        en:
          emerald: "At a meeting of POKéMON academics, it was\nannounced that simultaneous exposure to\nelectricity from a PLUSLE and MINUN will\npromote circulation and boost vitality."
        fr:
          emerald: "Il a été récemment découvert qu’être\nexposé simultanément au courant d’un\nPOSIPI et d’un NEGAPI favorise la\ncirculation et augmente la vitalité."
        it:
          emerald: "Secondo alcuni studiosi di POKéMON, l’\nesposizione all’elettricità di un PLUSLE\ne di un MINUN favorirebbe la circolazione\nsanguigna e aumenterebbe la vitalità."
        de:
          emerald: "Bei einem Kongress von POKéMON-Weisen\nwurde bekannt gegeben, dass die\nElektrizität von PLUSLE und MINUN\nden Kreislauf und die Vitalität steigert."
        es:
          emerald: "En una reunión de estudiosos de POKéMON,\nse anunció que la exposición simultánea a\nla electricidad de un PLUSLE y de un MINUN\nmejora la circulación y da más vitalidad."
volbeat:
  species_id: 313
  names:
    jp_kana: バルビート
