        en:
          emerald: "A DRAGONAIR stores an enormous amount of\nenergy inside its body. It is said to alter\nthe weather around it by loosing energy\nfrom the crystals on its neck and tail."
        fr:
          emerald: "Il stocke de l’énergie dans son corps. On\nraconte qu’il peut modifier les conditions\nclimatiques en déchargeant l’énergie des\ncristaux de son cou et de sa queue."
        it:
          emerald: "DRAGONAIR accumula moltissima energia nel\nsuo corpo. Si dice che possa mutare le \ncondizioni meteorologiche scaricandola\ndai cristalli del collo e della coda."
        de:
          emerald: "DRAGONIR speichert viel Energie in seinem\nKörper. Es kann die Witterung in seiner\nUmgebung ändern, indem es Energie\naus den Kristallen entlädt."
        es:
          emerald: "Acumula gran cantidad de energía.\nDicen que altera el clima descargando\nenergía por las esferas de cristal\nque tiene en el cuello y en la cola."
dragonite:
