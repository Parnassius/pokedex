        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - damp
        - cloud_nine
      descriptions:
        jp_kana:
          emerald: "ずつうが　はげしくなると　ふしぎな　ちからを\nつかいだすが　そのときの　きおくは　のこらない。\nおもいだせないので　くびを　かしげているのだ。"
        en:
          emerald: "When its headache intensifies, it starts\nusing strange powers. However, it has no\nrecollection of its powers, so it always\nlooks befuddled and bewildered."
        fr:
          emerald: "Il utilise des pouvoirs étranges quand ses\nmaux de tête s’intensifient. Il n’en garde\ncependant aucun souvenir et a toujours\nl’air confus et désorienté."
        it:
          emerald: "Quando il suo mal di testa si fa intenso\nPSYDUCK acquisisce strani poteri, di cui\npoi non si ricorda. Per questo motivo il suo\nsguardo risulta sempre vacuo e distratto."
        de:
          emerald: "Verstärken sich seine Kopfschmerzen,\nsetzt es merkwürdige Kräfte ein. Es kann\nsich jedoch dieser Kräfte nicht erinnern,\ndaher sein verstörter Gesichtsausdruck."
        es:
          emerald: "Cuando le aumenta el dolor de cabeza,\ncomienza a usar extraños poderes.\nSin embargo, como nunca los recuerda,\nsiempre se le ve aturdido y desconcertado."
golduck:
  species_id: 55
  names:
    jp_kana: ゴルダック
    en: GOLDUCK
    fr: AKWAKWAK
    it: GOLDUCK
    de: ENTORON
    es: GOLDUCK
