      descriptions:
        jp_kana:
          emerald: "ながれぼしの　おおい　よるは　わ　に　なって\nおどる　ピィの　すがたを　みることが　できる。\nひのでまで　おどり　よつゆで　のどを　うるおす。"
        en:
          emerald: "On nights with many shooting stars,\nCLEFFA can be seen dancing in a ring.\nThey dance until daybreak, when they\nquench their thirst with the morning dew."
        fr:
          emerald: "Les nuits où il y a des étoiles filantes, on\npeut voir des MELO danser en cercle. Ils\ndansent toute la nuit et se désaltèrent\navec la rosée du matin."
        it:
          emerald: "Nelle notti con tante stelle cadenti, si\nvedono molti CLEFFA danzare in cerchio.\nSi fermano solo alle prime luci dell’alba\nper dissetarsi con le gocce di rugiada."
        de:
          emerald: "In Nächten mit vielen Sternschnuppen\nkann man PII im Kreis tanzen sehen. Es\ntanzt bis zum Sonnenaufgang und stillt\nanschließend seinen Durst mit Morgentau."
        es:
          emerald: "Cuando hay lluvia de estrellas, se les ve\ndanzando en círculos durante la noche.\nSólo paran de día; entonces, dejan\nde bailar y beben el rocío de la mañana."
igglybuff:
