      descriptions:
        jp_kana:
          emerald: "てきに　つかまれると　ツルは　ぷちっと　きれる。\nぜんぜん　いたくないので　その　スキに　にげる。\nよくじつには　あたらしい　ツルが　はえそろうぞ。"
        en:
          emerald: "Its vines snap off easily and painlessly\nif they are grabbed, allowing it to make a\nquick getaway. The lost vines are replaced\nby new growth the very next day."
        fr:
          emerald: "Ses lianes se brisent facilement lorsqu’on\nles attrape. Cela ne lui fait pas mal et lui\npermet de s’échapper rapidement. Les\nlianes cassées repoussent le lendemain."
        it:
          emerald: "Se afferrate, le liane di TANGELA si\nstaccano con facilità e in modo indolore,\nconsentendogli di scappare facilmente.\nLe liane crescono di nuovo il giorno dopo."
        de:
          emerald: "TANGELAs Ranken fallen bei Berührung\nleicht und schmerzlos ab, damit es schnell\nfliehen kann. Verliert es Ranken, werden\ndiese am nächsten Tag durch neue ersetzt."
        es:
          emerald: "Se le desprenden los tentáculos en cuanto\nse los agarran. Y no sólo no le duele,\nsino que le permite huir rápidamente.\nAdemás, al día siguiente le crecen otros."
kangaskhan:
  species_id: 115
  names:
    jp_kana: ガルーラ
    en: KANGASKHAN
    fr: KANGOUREX
    it: KANGASKHAN
    de: KANGAMA
