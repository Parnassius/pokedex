      descriptions:
        jp_kana:
          emerald: "するどい　ツメで　どうくつに　よこあなを　ほり\nほうせきの　げんせきを　さがしだして　たべる。\nやみに　ひそみ　めったに　すがたを　みせない。"
        en:
          emerald: "It digs branching holes in caves using its\nsharp claws in search of food--raw gems.\nA SABLEYE lurks in darkness and is seen\nonly rarely."
        fr:
          emerald: "Il creuse dans les grottes à la recherche\nde pierres précieuses, dont il se nourrit.\nLes TENEFIX restent dans l’obscurité\nà l’abri des regards."
        it:
          emerald: "SABLEYE scava nelle caverne con i suoi\nartigli affilati alla ricerca di gemme\ngrezze di cui si nutre. Questo POKéMON\nvive nell’oscurità e lo si vede raramente."
        de:
          emerald: "Mit seinen scharfen Klauen gräbt es\nAbzweigungen in Höhlen, um nach Futter\n- seltene Edelsteine - zu suchen. ZOBIRIS\nlauert im Dunkeln und man sieht es selten."
        es:
          emerald: "Cava conductos en cuevas usando sus\nafiladas garras para buscar rocas con las\nque alimentarse. SABLEYE permanece al\nacecho en la oscuridad; no es fácil verlo."
mawile:
  species_id: 303
