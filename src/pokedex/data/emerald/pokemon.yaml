        jp_kana:
          emerald: "まよなか　がいとうの　あかりに　さそわれて\nのやまから　とんでくる　やこうせいの　ポケモン。\nもうどくの　こなを　はねから　ふりまく。"
        en:
          emerald: "It is a nocturnal POKéMON that flies from\nfields and mountains to the attraction of\nstreetlights at night. It looses highly\ntoxic powder from its wings."
        fr:
          emerald: "La nuit venue, ce POKéMON nocturne quitte\nles champs et les montagnes, attiré par les\nlumières de la ville. En chemin, il laisse\ntomber de la poudre toxique de ses ailes."
        it:
          emerald: "POKéMON notturno, DUSTOX vola su\ncampi e monti attirato dalla luce dei\nlampioni. Dalle ali rilascia una polvere\naltamente tossica."
        de:
          emerald: "Dieses POKéMON ist nachtaktiv und fliegt\nbei Dunkelheit von den Feldern und Bergen\nzum Licht der Laternen. Dabei verstreut es\ngiftigen Puder von seinen Flügeln."
        es:
          emerald: "Es un POKéMON nocturno que llega\nvolando a la ciudad desde campos y\nmontañas atraído por las luces. Al batir\nlas alas, libera un polvillo muy tóxico."
lotad:
  species_id: 270
